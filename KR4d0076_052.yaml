body:
  text: 東坡全集巻五十二宋蘓軾撰奏議六首論河北京東盗賊狀熈寧七年月蘇軾奏臣伏見河北京東比年以來蝗旱相仍盜賊漸熾今又不雨自秋至冬方數千里麥不入土竊料明年春夏之際寇攘為患甚於今日是以輒陳狂瞽庶補萬一謹按山東自上世以來為腹心根本之地其與中原離合常係社稷安危昔秦并天下首收三晉則其餘强敵相繼滅亡漢髙祖殺陳餘走田横則項氏不支光武亦自漁陽上谷發突騎席巻以并天下魏武帝破殺袁氏父子收冀州然後四方莫敢敵宋武帝以英雄絶人之資用武歴年而不能并中原者以不得河北也隋文帝以庸夫穿窬之智竊位數年而一海内者以得河北也故杜牧之論以為山東之地王者得之以為王霸者得之以為霸猾賊得之以為亂天下自唐天寳以後奸臣僣峙於山東更十一世竭天下之力終不能取以至於亡近世賀徳倫挈魏博降後唐而梁亡周髙祖自鄴都入京師而漢亡由此觀之天下存亡之權在河北無疑也陛下即位以來北方之民流移相屬天災譴告亦甚於四方五六年間未有以塞大異者至於京東雖號無事亦當常使其民安逸富强緩急足以灌輸河北缾竭則罍恥脣亡則齒寒而近年以來公私匱乏民不堪命今流離饑饉議者不過欲散賣常平之粟勸誘蓄積之家盗賊縱横議者不過欲增開告賞之門申嚴緝捕之法皆未見其益也常平之粟累經振發所存無㡬矣而飢寒之民所在皆是人得升合官費丘山蓄積之家例皆困乏貧者未䝉其利富者先被其災昔季康子患盗問於孔子對曰茍子之不欲雖賞之不竊乃知上不盡利則民有以為生茍有以為生亦何苦而為盗其間凶殘之黨樂禍不悛則須敕法以峻刑誅一以警百今中民以下舉皆闕食冒法而為盗則死畏法而不盗則飢飢寒之與棄市均是死亡而賒死之與忍飢禍有遲速相率為盗正理之常雖日殺百人勢必不止茍非陛下至明至聖至仁至慈較得喪之孰多權禍福之孰重特於財利少有所捐衣食之門一開骨髓之恩皆徧然後信賞必罰以威克恩不以僥倖廢刑不以災傷撓法如此而人心不革盗賊不衰者未之有也謹條其事畫一如左一臣所領宻州自今嵗秋旱種麥不得直至十月十三日方得數寸雨雪而地冷難種雖種無生比常年十分中只種得二三竊聞河北京東例皆如此尋常檢放災傷依法須是檢行根苗以定所放分數今來二麥元不曾種即根苗可檢官吏守法無縁直放若夏税一例不放則人户必至逃移尋常逃移猶有逐熟去處今數千里無麥去將安往但恐良民舉為盗矣且天上無雨地下無麥有眼者共見有耳者共聞决非欺㒺朝廷豈可坐觀不放欲乞河北京東逐路選差臣僚一員體量放税更不檢視若未欲如此施行即乞將夏税斛㪷取今日以前五年酌中一年實直令三等已上人户取便納見錢或正色其四等以下且行倚閣縁今來麥田空閒若春雨調勻却可以廣種秋稼候至秋熟並將秋色折納夏税若是已種苗麥委有災傷仍與依條檢放其闕麥去處官吏諸軍請受且支白米或支見錢所貴小民不致大段失所一河北京東自來官不𣙜鹽小民仰以為生近日臣僚上章輒欲禁𣙜頼朝廷體察不行其言兩路官民無不相慶然臣勘㑹近年鹽課日增元本兩路祖額三十三萬二千餘貫至熈寧六年增至四十九萬九千餘貫七年亦至四十三萬五千餘貫顯見刑法日峻告捕日繁是致小民愈難興販朝廷本為此兩路根本之地而煮海之利天以養活小民是以不忍盡取其利濟恵鰥寡隂銷盗賊舊時孤貧無業惟務販鹽所以五六年前盗賊稀少是時吿捕之賞未嘗破省錢惟是犯人催納役人量出今鹽課浩大告訐如麻貧民販鹽不過一兩貫錢本偷税則賞重納税則利輕欲為農夫又值凶嵗若不為盗惟有忍飢所以五六年來課利日增盗賊日衆臣勘㑹宻州鹽税去年一年比祖額增二萬貫却支捉賊賞錢一萬一千餘貫其餘未獲賊人尚多以此較之利害得失斷可見矣欲乞特敕兩路應販鹽小客截自三百斤以下並與權免收税仍官給印本空頭闗子與竈户及長引大客令上厯破使逐旋書填月日姓名斤兩與小客限十日更不行用如敢借人為人影帶分减鹽貨許諸人陳告重立賞罰候將來秋熟日仍舊并元降敕牓明言出自聖意令所在雕印散牓鄉村人非木石寧不感動一飲一食皆誦聖恩以至舊來貧賤之民近日飢寒之黨不待驅率一歸於鹽奔走争先何暇為盗人情不逺必不肯捨安穏衣食之門而趨冒法危亡之地也議者必謂今用度不足若行此法則鹽税大虧必致闕事臣以為不然凡小客本少力微不過行得三兩程若三兩程外須藉大商興販决非三百斤以下小客所能行運無縁大段走失且平時大商所苦以鹽遲而無人買小民之病以僻逺而難得鹽今小商不出税錢則所在争來分買大商既不積滯則輪流販賣收税必多而鄉村僻逺無不食鹽所賣亦廣損益相補必無大虧之理縱使虧失不過却只得祖額元錢當時官司有何闕用茍朝廷捐十萬貫錢買此兩路之人不為盗賊所獲多矣今使朝廷為此兩路饑饉特出一二十萬貫見錢散與人户人得一貫只及二十萬人而一貫見錢亦未能濟其性命若特放三百斤以下鹽税半年則兩路之民人人受賜貧民有衣食之路富民無盜賊之憂其利豈可勝言哉若使小民無以為生舉為盗賊則朝廷之憂恐非十萬貫錢所能了辦又况所支捉賊賞錢未必少於所失鹽課臣所謂較得喪之孰多權禍福之孰重者為此也一勘㑹諸處盗賊大半是按問减等災傷免死之人走還舊處挾恨報讎為害最甚盗賊自知不死既輕犯法而人户亦憂其復來不敢吿捕是致盗賊公行切詳按問自言皆是詞窮理屈勢必不免本無改過自新之意有何可改獨使從輕同黨之中獨不免死其災傷勅雖不下與行不同而盗賊小民無不知者但不傷變主免死無疑且不傷變主情理未必輕於偶傷變主之人或多聚徒衆或廣置兵仗或摽異服飾或質劫變主或驅擄平人或賂遺貧民令作耳目或書寫道店恐動官私如此之類雖偶不傷人情理至重非止闕食之人茍營餱糧而已欲乞今後盗賊贓證未明但已經考掠方始承認者並不為按問减等其災傷地分委自長吏相度情理輕重内情理重者依法施行所貴凶民稍有畏忌而良民敢於捕告臣所謂衣食之門一開骨髓之恩皆徧然後信賞必罰以威克恩不以儌倖廢刑不以災傷撓法者為此也右謹具如前自古立法制刑皆以盗賊為急盗竊不已必為強劫强劫不已必至戰攻或為豪傑之資而致勝廣之漸而况東京之貧富係河北之休戚河北之治亂係天下之安危識者共知非臣私見願陛下深察此事至重所捐小利至輕斷自聖心决行此䇿臣聞天聖中蔡齊知宻州是時東方饑饉齊乞放行監禁先帝從之一方之人不覺飢寒臣愚且賤雖不敢望於蔡齊而陛下聖明度越堯禹豈不能行此事有愧先朝所以越職獻言不敢自外伏望聖慈察其區區之意赦其狂僣之誅臣無任悚懷待罪之至謹伏候敇㫖上皇帝書元豐元年十月某日尚書祠部員外郎直史館權知徐州軍州事臣蘇軾謹昧萬死再拜上書皇帝陛下臣以庸材備員冊府出守兩郡皆東方要地私竊以為守法令治文書赴期㑹不足以報塞萬一輒伏思念東方之要務陛下之所宜知者得其一二草具以聞而陛下擇焉臣前任宻州建言自古河北與中原離合常係社稷存亡而京東之地所以灌輸河北缾竭則罍恥脣亡則齒寒而其民喜為盗賊為患最甚因為陛下畫所以待盗賊之策及移守徐州覽觀山川之形勢察其風俗之所上而考之於載籍然後又知徐州為南北之襟要而京東諸郡安危所寄也昔項羽入闗既燒咸陽而東歸則都彭城夫以羽之雄畧捨咸陽而取彭城則彭城之險固形便足以得志於諸侯者可知矣臣觀其地三面被山獨其西平川數百里西走梁宋使楚人開闗而延敵材官騶發突騎雲縱真若屋上建瓴水也地宜宿麥一熟而飽數嵗其城三面阻水樓堞之下以汴泗為池獨其南可通車馬而戲馬臺在焉其髙十仞廣袤百步若用武之世屯千人其上聚櫑木砲石凡戰守之具以與城相表裏而積三年糧於城中雖用十萬人不易取也其民皆長大膽力絶人喜為剽掠小不適意則有飛揚跋扈之心未止為盗而已漢髙祖沛人也項羽宿遷人也劉裕彭城人也朱全忠碭山人也皆在今徐州數百里間耳其人以此自負凶桀之氣積以成俗魏太武以三十萬人攻彭城不能下而王智興以卒伍庸材恣睢於徐朝廷亦不能討豈非以其地形便利人卒勇悍故耶州之東北七十餘里即利國監自古為鐡官商賈所聚其民富樂凡三十六冶冶户皆大家藏鏹巨萬常為盗賊所窺而兵衛寡弱有同兒戲臣中夜以思即為寒心使劇賊致死者十餘人白晝入市則守者皆棄而走耳地既産精鐡而民皆善鍛散冶户之財以嘯召無頼則烏合之衆數千人之仗可以一夕具也順流南下辰發已至而徐有不守之憂矣不幸而賊有過人之才如吕布劉備之徒得徐而逞其志則京東之安危未可知也近者河北轉運司奏乞禁止利國監鐡不許入河北朝廷從之昔楚人亡弓不能忘楚孔子猶小之况天下一家東北二冶皆為國興利而奪彼與此不已隘乎自鐡不北行冶户皆有失業之憂詣臣而訴者數矣臣欲因此以征冶户為利國監之捍屏今三十六冶冶各百餘人採礦伐炭多飢寒亡命强力鷙忍之民也臣欲使冶户毎冶各擇有才力而忠謹者保任十人籍其名於官授以郤刄刀槊教之擊刺毎月兩衙集於知監之庭而閲試之藏其刄於官以待大盗不得役使犯者以違制論冶户為盗所擬乆矣民皆知之使冶出十人以自衛民所樂也而官又為除近日之禁使鐡得北行則冶户皆悦而聴命奸猾破膽而不敢謀矣徐城雖險固而樓櫓敝惡又城大而兵少緩急不可守今戰兵千人耳臣欲乞移南京新招騎射兩指揮於徐此故徐人也嘗屯於徐營壘材石既具矣而遷於南京異時轉運使分東西路畏餽餉之勞而移之西耳今兩路為一其去來無所損益而足以為徐之重城下數里頗産精石無窮而奉化廂軍見闕數百人臣願募石工以足之聴不差出使此數百人者常採石以甃城數年之後舉為金湯之固要使利國監不可窺則徐無事徐無事則京東無虞矣沂州山谷重阻為逋逃淵藪盗賊毎入徐州界中陛下若採臣言不以臣為不肖願復三年守徐州得領沂州兵甲巡檢公事必有以自効京東惡盗多出逃軍逃軍為盗民則望風畏之何也技精而法重也技精則難敵法重則致死其勢然也自陛下置將官修軍政士皆精鋭而不免於逃者臣甞考其所由葢自近嵗以來部送罪人配軍者皆不使役人而使禁軍軍士當部送者受牒即行往返常不下十日道路之費非取息錢不能辦百姓畏法不敢貸貸亦不可復得惟所部將校乃敢出息錢與之歸而刻其糧賜以上下相持軍政不修博奕飲酒無所不至窮苦無聊則逃去為盗臣自至徐即取不係省錢百餘千别儲之當部送者量逺近裁取以三月刻納不取其息將吏有敢貸息錢者痛以法治之然後嚴軍政禁酒博比朞年士皆飽暖練熟技藝等第為諸郡之冠陛下遣勅賜按閲所具見也臣願下其法諸郡推此行之則軍政脩而逃者衰亦去盗之一端也臣聞之漢相王嘉曰孝文帝時二千石長吏安官樂職上下相望莫有茍且之意其後稍稍變易公卿以下轉相促急司𨽻部刺史發揚隂私或居官數月而退二千石益輕賤吏民慢易之知其易危小失意則有離畔之心前山陽亡徒蘇令從横吏士臨難莫肯仗節死義者以守相威權素奪故也國家有急取辦於二千石尊重難危乃能使下以王嘉之言而考之於今郡守之威權可謂素奪矣上有監司伺其過失下有吏民持其短長未及按問而差替之命已下矣欲督捕盗賊法外求一錢以使人且不得得盗賊凶人情重而法輕者守臣輒配流之則使所在法司覆按其狀劾以失入惴惴如此何以得吏士死力而破奸人之黨乎由此觀之盗賊所以滋熾者以陛下守臣權太輕故也臣願陛下稍重其權責以大綱濶畧其小過凡京東多盗之郡自青鄆以降如徐沂齊曹之類皆慎擇守臣聴法外處置强盜頗賜緍錢使得以布設耳目畜養爪牙然緍錢多賜則難常少又不足於用臣以為每郡可嵗別給一二百千使以釀酒凡使人緝捕盗賊得以酒予之敢以為他用者坐贓論賞格之外嵗得酒數百亦足以使人矣此又治盗之一術也然此皆其小者其大者非臣之所當言欲黙而不發則又私自念遭值陛下英聖特達如此若有所不盡非忠臣之義故昧死復言之昔者以詩賦取士今陛下以經術用人名雖不同然皆以文詞進耳考其所得多吳楚閩蜀之人至於京東西河北河東陜西五路葢自古豪傑之埸其人沈鷙勇悍可任以事然欲使治聲律讀經義以與吳楚閩蜀之人争得失於毫釐之間則彼有不仕而已故其得人常少夫惟忠孝禮義之士雖不得志不失為君子若徳不足而才有餘者困於無門則無所不至矣故臣願陛下特為五路之士别開仕進之門漢法郡縣秀民推擇為吏考行察亷以次遷補或至二千石入為公卿古者不専以文詞取人故得士為多黄霸起於卒吏薛宣奮於書佐朱邑選於嗇夫邴吉出於獄吏其餘名臣循吏由此而進者不可勝數唐自中葉以後方鎮皆選列校以掌牙兵是時四方豪傑不能以科舉自達者皆争為之往往積功以取旄鉞雖老奸巨盗或出其中而名卿賢將如髙仙芝封常清李光弼來瑱李抱玉段秀實之流所得亦已多矣王者之用人如江河江河所趨百川赴焉蛟龍生之及其去而之他則魚鼈無所還其體而鯢鰍為之制今世胥吏牙校皆奴僕庸人者無他以陛下不用也今欲用胥吏牙校而胥吏行文書治刑獄錢榖其勢不可廢鞭撻鞭撻一行則豪傑不出於其間故凡士之刑者不可用用者不可刑故臣願陛下採唐之舊使五路監司郡守共選土人以補牙職皆取人材心力有足過人而不能從事於科舉者禄之以今之庸錢而課之鎮税場務督捕盗賊之類自公罪杖以下聴贖依將校法使長吏得薦其才者第其功閥書其嵗月使得出仕比任子而不以流外限其所至朝廷察其尤異者擢用數人則豪傑英偉之士漸出於此途而奸猾之黨可得而籠取也其條目委曲臣未敢盡言惟陛下留神省察昔晉武平吳之後詔天下罷軍役州郡悉去武備惟山濤論其不可帝見之曰天下名言也而不能用及永寧之後盗賊蠭起郡國皆以無備不能制其言乃驗今臣於無事之時屢以盗賊為言其私憂過計亦已甚矣陛下縱能容之必為議者所笑使天下無事而臣獲笑可也不然事至而圖之則已晩矣干犯天威罪在不赦臣軾誠惶誠恐頓首頓首謹言乞醫療病囚狀元豐二年正月某日尚書祠部員外郎直史館權知徐州軍州事蘇軾狀奏右臣聞漢宣帝地節四年詔曰令甲死者不可生刑者不可息此先帝之所重而吏未稱今繫者或以掠辜若飢寒瘐死獄中何用心逆人道也朕甚痛之其令郡國嵗上繫囚以掠笞若瘐死者所坐名縣爵里丞相御史課殿最以聞此漢之盛時宣帝之善政也朝廷重惜人命哀矜庶獄可謂至矣囚以掠笞死者法甚重惟病死者無法官吏上下莫有任其責者茍以時言上檢視無他故雖累百人不坐其飲食失時藥不當病而死者何可勝數若本罪應死猶不足深哀其以輕罪繫而死者與殺之何異積其寃痛足以感傷隂陽之和是以治平四年十二月二十四日手詔曰獄者民命之所繫也比聞有司嵗考天下之奏而瘐死者甚多竊懼乎獄吏與犯法者旁縁為奸檢視或有不明使吾元元横罹其害良可憫焉書不云乎與其殺不辜寧失不經其具為令後諸處軍巡州司理院所禁罪人一嵗内在獄病死及兩人者推司獄子並從杖六十科罪毎增一名加罪一等至杖一百止如係五縣以上州毎院嵗死及三人開封府府司軍巡院嵗死及七人即依上項死兩人法科罪加等亦如之典獄之官推獄經兩犯即坐本官仍從違制失入其縣獄亦依上條若三萬户以上即依五縣以上州軍條其有養療之不依條貫者自依本法仍仰開封府及諸路提㸃刑獄毎至嵗終㑹聚死者之數以聞委中書門下㸃檢或死者過多官吏雖已行罰當議更加黜責行之未及數年而中外臣僚争言其不便至熈寧四年十月二日中書劄子詳定編勅所狀令衆官㕘詳獄囚不因病死及不給醫藥飲食以至非理慘虐或謀害致死者有逐一條貫及至捕傷格鬬實縁病死則非獄官之罪况有不幸遭遇瘴疫死者或衆而使獄官濫被黜罰未為允當今請只行舊條外其上件獄囚病死條貫更不行用奉聖㫖依所申臣竊惟治平四年十二月二十四日手詔乃陛下好生之徳逺同漢宣方當推之無窮而郡縣俗吏不能深曉聖意因其小不通輒為駁議有司不能修其缺通其礙乃舉而廢之豈不過甚矣哉臣愚以為獄囚病死者獄官坐之誠為未安何者獄囚死生非人所能必責吏以其所不能必吏自懼罪多方以求免囚中有疾則責保門留不復療治茍無親屬與雖有而在逺者其捐瘠致死者必甚在獄臣謹案周禮醫師嵗終則稽其醫事以制其食十全為上十失一次之十失二次之十失三次之十失四為下臣愚欲乞軍巡院及天下州司理院各選差衙前一名醫人一名毎縣各選差曹司一名醫人一名専掌醫療病囚不得更充他役以一周年為界量本州縣囚繫多少立定傭錢以免役寛剰錢或坊場錢充仍於三分中先給其一俟界滿比較除罪人拒捕及鬬致死者不計數外毎十人失一以上為上等失二為中等失三為下等失四以上為下下上等全支中等支二分下等不支下下科罪自杖六十至杖一百止仍不分首從其上中等醫人界滿願再管勾者聴人給厯子以書等第若醫博士助教有闕則比較累嵗等第最優者補充如此則人人用心若療治其家人縁此得活者必衆且人命至重朝廷所甚惜而寛剩役錢與坊埸錢所在山積其費甚微而可以全活無辜之人至不可勝數感人心合天意無善於此者矣獨有一弊若死者稍衆則所差衙前曹司醫人與獄子同情使囚詐稱疾病以張人數臣以謂此法責罰不及獄官縣令則獄官縣令無縁肯與此等同情欺㒺欲乞毎有病囚令獄官縣令具保明以申州委醫官及本轄干繫官吏吏覺察如詐稱病獄官縣令皆科杖六十分故失為公私罪伏望朝廷詳酌早賜施行謹録奏聞伏候勅㫖登州召還議水軍狀元豐八年十二月某日朝奉郎前知登州軍州事蘇軾狀奉右臣竊見登州地近東北號為極邊塞外山川隠約可見便風一㠶奄至城下自國朝以來常屯重兵教習水戰旦暮傳烽以通警急毎嵗四月遣兵戍駞基島至八月方還以備不虞自景徳以後屯兵常不下四五千人除本州諸軍外更於京師南京濟鄆兖單等州差撥兵馬屯駐至慶厯二年知州郭志髙為諸處差來兵馬頭項不一軍政不肅擘畫奏乞創置澄海水軍弩手兩指揮并舊有平海兩指揮並用教習水軍以備警急為京東一路捍屏敵知有備故未甞有警議者見其乆安便謂無事近嵗始差平海六十人分屯宻州信陽板橋濤洛三處去年本路安撫司人更差澄海一百人往萊州一百人往宻州屯駐檢㑹景徳三年五月十二日聖㫖指揮今後宣命抽差本城兵士往諸處只於威邊等指揮内差撥即不得抽差平海兵士其平海兵士雖無不許差出指揮葢縁元初創置本為抵替諸州差來兵馬豈有却許差往諸處之理顯是不合差撥不惟兵勢分弱以起戎心而此四指揮更畨差出無處學習水戰武藝惰廢有誤緩急伏乞朝廷詳酌明降指揮今後登州平海澄海四指揮兵士並不得差往别州屯駐謹録奏聞伏候勅㫖乞罷登州𣙜鹽狀元豐八年十二月某日朝奉郎前知登州軍州事蘇軾狀奏右臣竊聞議者謂近嵗京東𣙜鹽既獲厚利而無甚害以謂可行以臣觀之葢比之河北淮浙用刑稀少因以為便不知舊日京東販鹽小客無以為生大半去為賊盗然非臣職事所當言者故不敢以聞獨臣所領登州計入海中三百里地瘠民貧商賈不至所在鹽貨只是居民喫用今來既𣙜入官官買價錢比之竈户賣與百姓三不及一竈户失業漸以逃亡其害一也居民咫尺大海而令頓食貴鹽深山窮谷遂至食淡其害二也商賈不來鹽積不散有入無出所在官舍皆滿至於露積若行配賣即與福建江西之患無異若不配賣即一二年間舉為糞土坐棄官本官吏被責專副破家其害三也官無一毫之利而民受三害决可廢罷竊聞萊州亦是元無客旅興販事體與此同欲乞朝廷相度不用行臣所言只乞出自聖意先罷登萊兩州𣙜鹽依舊令竈户賣與百姓官收鹽税其餘州軍更委有司詳講利害施行謹録奏聞伏候勅㫖論給田募役狀元豐八年十二月某日朝奉郎禮部郎中蘇軾狀奏右臣竊見先帝初行役法取寛剰錢不得過二以備災傷而有司奉行過當通計天下乃十四五然行之㡬十六七年常積而不用至三千餘萬貫石先帝聖意固自有在而愚民無知因謂朝廷以免役為名實欲重斂斯言流聞不可以示天下後世臣謂此錢本出民力理當還為民用不幸先帝升遐聖所欲行者民不知也徒見其其積未見其散此乃今日太皇太后陛下皇帝陛下所當追探其意還於役法中散之以塞愚民無知之詞以興長世無窮之利臣伏見熈寧中嘗行給田募役法其法亦係官田如退攤户絶沒納之類及用寛剩錢買民田以募役人大畧如邊郡弓箭手臣知宻州親行其法先募弓手民甚便之曾未半年此法復罷臣聞之道路本出先帝聖意而左右大臣意在速成且利寛剰錢以為它用故更相駁難遂不果行臣謂此法行之葢有正利朝廷若依舊行免役法則毎募一名省得一名雇錢因積所省益買益募要之數年雇錢無㡬則役錢可以大减若行差役法則毎募一名省得一名色役色役既减農民自寛其利一也應募之民正與弓箭手無異舉家衣食出於官田平時重犯法緩急不逃亡其利二也今者榖賤傷農農民賣田常苦不售若官與買則田榖皆重農可小紓其利三也錢積於官常苦幣重若散以買田則貨幣稍均其利四也此法既行民享其利追悟先帝所以取寛剩錢者凡以為我用耳疑謗消釋恩徳顯白其利五也獨有二弊貪吏狡胥與民為奸以瘠薄田中官雇一浮浪人蹔出應役一年半嵗即棄而走此一弊也愚民寡慮見利忘患聞官中買田募役即争以田中官以身充役業不離主既初無所失而驟得官錢必争為之充役之後永無休歇患及子孫此二弊也但當設法以防二弊而先帝之法决不可廢今日既欲盡罷寛剩錢將來無繼而繫官田地數目不多見在寛剩錢雖有三千萬貫石而兵興以來借支㡬半臣今擘畫欲於内帑錢帛中支還兵興以來所借錢斛復完三千萬貫石上於河北河東陜西被邉三路行給田家役法使五七年間役减大半農民完富以備緩急此無窮之利也今弓箭手有甲馬者給田二頃半以軀命償官且猶可募則其餘色役召募不難臣謂良田二頃可募一弓手一頃可募一散從官則三千萬貫石可以足用謹具合行事件畫一如左一給田募役更不出租依舊納兩税免支移折變一今來雖有一頃二頃為率若所在田不甚良即臨時相度添展畝數務令召募得行但役人所獲稍優則其法堅乆不壞一今若立法便令三路官吏推行若無賞罰則官吏不任其責繆悠滅裂有名無實若有賞罰則官吏有所趨避或抑勒買田或召募浮浪或多買瘠薄或取辦一時不顧後患臣今擘畫欲選才幹朴厚知州三人令自辟屬縣令毎路一州先次推行令一年終畧成倫理一州既成倫理一路便可推行仍委轉運提刑常切提舉若不切推行或推行乖方朝廷覺察重賜行遣一應募役人大抵多是州縣百姓所買官田去州縣太逺即乆逺難募召募欲乞所買田並即去州若干里去縣若干里一出牓告示百姓賣田如係所限去州縣里數内仍及所定頃畝或兩户及三户相近共及所定頃畝數目亦可即須先申官令佐親自相驗委是良田方得收買如官價低小即聴賣與其餘人户不得抑勒如買瘠薄田致乆逺召募不行即官吏並科違制分故失定㫁仍不以去官赦降原减一預先具給田頃畝數出牓召人投名應役第二等已上人户許充弓手仍依舊條揀選人材第三等以上許充散從官以下色役更不用保如等第不及即召第一等一戸或第二等兩户委保如充役七年内逃亡即勒元委保人承佃充役一毎買到田未得交錢先召投名人承佃充役方得支錢仍不得抑勒一賣田入官須得交業與應募人不許本户内人丁承佃充役一募役人老病走死者犯徒以上罪即須先勒本戸人丁充役如無丁方别召募一應募人交業承佃後給假半年令葺理田業一退攤户絶没納等係官田地今後不許出賣更不限去州縣里數仍以肥瘠髙下品定頃畝務令召募得行一係官田若是人户見佃者先問見佃人如無丁可以應募或自不願充役者方得别行召募右所陳五利二弊及合行事件一十二條伏乞朝廷詳議施行然議者必有二説一謂召募不行二謂欲留寛剩錢斛以備它用臣謂有以應之富民之家以三十二畝田中分其利役屬佃户有同僕𨽻今官以兩頃一頃良田有税無租而人不應召豈有此理又弓箭手已有成法無可疑者寛剩役錢本非經賦常入亦非國用所待而後足者今付有司逐旋支費終不能卓然立一大事建無窮之利如火鑠薪日减日亡若用買田募役譬如私家變金銀為田産乃是長乆萬全之策深願朝廷及此錢未散立此一事數年之後錢盡而事不立深可痛惜臣聞孝子者善繼人之志善述人之事者也周公所以見稱於萬世者徒以能行文王之志也昔蘇綽為魏立征税之法號為煩重已而歎曰此猶張弓也後之君子誰能解之其子威侍側聞之慨然以為已任及威事隋文帝為民部尚書奏减賦役如綽之言天下便之威為人臣尚能成父之道今給田募役真先帝本意陛下當優為武王周公之事而况蘇威區區人臣之孝何足道哉臣荷先帝之遇保全之恩又䝉陛下非次拔擢思慕感涕不知所報冒昧進計伏惟哀憐裁幸謹録奏聞伏候勅㫖東坡全集巻五十二
