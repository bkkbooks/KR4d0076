body:
  text: 東坡全集卷二十宋蘇軾撰詩六十二首次韻趙景貺春思且懷吳越山水嵗華來無窮老眼久已靜春風如繫馬未動意先騁西湖忽破碎鳥落魚動鏡縈城理枯瀆放閘起膠艇願君營此樂宦事何時竟清河西湖三閘督君成之思吳信偶然出處付前定飄然不繫舟乘此無盡興醉翁行樂處草木皆可敬明朝遊北渚急掃黃葉徑白酒真到齊紅裙已放鄭酒尚有香泉一壺為樂全先生服不作樂也次韻陳履常張公龍潭經明宣城宰家此百尺瀾鄭翁不量力敢以非意干𤣥黃雜兩戰絳青表雙蟠事見龍公碑烈氣斃強敵仁心惻饑寒精誠禱必赴苟簡求亦難蕭條麥牟枯浩蕩日月寬念子無吏責十日勤征鞍春蔬得雨雪少助先生槃龍不憚往來而我獨宴安閉閣默自責神交清夜闌竹間亭小酌懷歐陽叔弼季默呈趙景貺陳履常嵗暮自急景我閒方緩觴醉飲西湖晚步轉北渚長地坐略少長意行無澗岡久知薺麥青稍喜榆柳黃盎盎春欲動㶑㶑夜未央水天鷗鷺靜月霧松檜香撫景方婉娩懷人重淒涼豈無一老兵坐念兩歐陽我意正麋鹿君才亦圭璋此㑹恐難久此歡不可忘臘梅一首贈趙景貺天工㸃酥作梅花此有臘梅禪老家蜜蜂採花作黃蠟取蠟為花亦其物天工變化誰得知我亦兒嬉作小詩君不見萬松嶺上黃千葉玉蘃檀心兩竒絶醉中不覺度千山夜聞梅香失醉眠歸來却夢尋花去夢裏花仙覔竒句此間風物屬詩人我老不飲當付君君行適吳我適越笑指西湖作衣鉢送王竦朝散赴闕我家衡山公清而畏人知臧否不出口默識如蓍龜擢子拱把中云有驥騄姿胡為三十載尚作窮苦詞丈夫不妄語未效此何疑朅來清潁上淚濕中郎詩怪我一年長而作十年衰同時幾人在豈敢怨白髭願言指松柏永與霜雪期伯父為衡州日與君相知有送行詩次韻致政張朝奉仍招晚飲掃白非黃精輕身豈胡麻怪君仁而夀未覺生有涯曽經丹化米親授棗如瓜雲蒸作霧楷火滅噀雨巴自此養鉛鼎無窮走河車至今許玉斧猶事蕚緑華張曽見永州何仙姑得藥餌之人疑其以此夀也故有丹化米蕚緑華之句皆女仙事我本三生人疇昔一念差前生或草聖習氣餘驚蛇儒臞謝赤松佛縳慚丹霞時時一篇出擾擾四座譁清詩得可驚信美詞多夸回車入官府治具隨貧家萍虀與豆粥亦可成咄嗟閻立本職貢圖貞觀之德來萬邦浩如滄海吞河江音容傖獰服竒龎橫絶嶺海逾濤瀧珍禽瑰産爭牽扛名王解辮却蓋幢粉本遺墨開明窗我喟而作心未降魏徴封倫恨不雙次韻王滁州見寄斯人何似似春雨歌舞農夫怨行路君看永叔與元之坎軻一生遭口語兩翁當年鬢未絲玉堂揮翰手如飛教得滁人解吟詠至今里巷嘲輕肥君家聮翩盡卿相獨來坐嘯溪山上笑捐浮利一雞肋多取清名幾熊掌丈夫自重貴難售兩翁今與青山久後來太守更風流要伴前人作詩瘦我倦承明苦求出到處遺蹤尋六一慿君試與問琅邪許我來遊莫難色趙景貺以詩求東齊榜銘昨日聞都下寄酒來戲和其韻求分一壺作潤筆也王孫天麒麟眸子奧而徹囊空學愈富屋陋人更傑我老書益放筆落座爭掣欲求東齊銘要飲西湖雪長瓶分未到小硯乾欲裂不似淳于髠一石要燭滅洞庭春色并引安定郡王以黃柑釀酒謂之洞庭春色色香味三絶以餉其猶子德麟德麟以飲豫為此詩醉後信筆頗有沓拖風氣二年洞庭秋香霧長噀手今年洞庭春玉色疑非酒賢王文字飲醉筆蛟蛇走既醉念君醒逺餉為我夀瓶開香浮座盞凸光照牖方傾安仁醽潘嶽笙賦云披黃苞以授柑傾緑瓷以酌醽莫遣公逺嗅明皇食柑凡千餘枚皆闕一瓣問進柑使者云中塗嘗有道士嗅之蓋羅公逺也要當立名字未可問升斗應呼釣詩鈎亦號掃愁帚君知蒲萄惡止是嫫姆黝須君灔海杯澆我談天口送路都曹并引乖崖公在蜀有録曹參軍老病廢事公責之曰胡不歸明日參軍求去且以詩留别其略曰秋光都似宦情薄山色不如歸意濃公驚謝之曰吾過矣同僚有詩人而吾不知因留而慰薦之豫幼時聞父老言恨不問其姓名今都曹路君以小疾求致仕豫誦此事留之不可乃採前人意作詩送之并邀趙德麟陳履常各賦一篇積雪困桃李春心誰為容淮光釀山色先作歸意濃我亦倦遊者君恩繫踈慵欲留耿介士伴我衰遲蹤吏課升斗積﨑嶇等鉛舂那將露電身坐待收千鍾結髮空百戰市人看先封誰能搔白首抱關望夕烽子意亮已成我言寧復從恨無乖崖老一洗芥蒂胸我田荆溪上伏臘亦粗供懷哉江南路㑹作林下逢次韻陳履常雪中可憐擾擾雪中人饑飽終同寓一塵老檜作花真強項凍鳶儲肉巧謀身忍寒吟咏君堪笑得暖歡呼我未貧坐聽屐聲知有路擁裘來看玉梅春二鮮于君以詩文見寄作詩為謝我懷元祐初圭璋滿清班維時南隆老奉使獨未還迂叟向我言青齊嵗方艱斯人乃德星遣出虛危間司馬溫公謂軾曰子駿福星也京東人困甚且令往彼召用既晚矣天命良復慳一朝失老驥寂寞空帝間至今清夜夢枕衾有餘澘喜聞二三子結髮師閔顔髙論傾河漢清詩鳴珮環遙知三日雪積玉埋嵩山誰念此幽桂坐䝉榛與菅故人在潁尾投詩清泠灣次韻趙德麟雪中惜梅且餉柑酒三首千花未分出梅餘遣雪摧殘計已踈卧聞㸃滴如秋雨知是東風為掃除閬苑千葩映玉宸人間祇有此花新飛霙要欲先桃李散作千林火迫春蹀躞嬌黃不受鞿東風暗與色香歸偶逢白墮爭春手遣入王孫玉斚飛和陳傳道雪中觀燈新年樂事歎何曾閉閣燒香一病僧未忍便傾澆别酒且來同看照愁燈潁魚躍處新亭近湖雪消時畫舫升祇恐樽前無此客清詩還有士龍能閲世亭詩贈任仲微任公鎮西南嘗贈繞朝策當時若盡用善陳無赫赫淒涼十年後邪正久已白却留封德彞天意眇難測象賢真驥種號訴甘百謫豈云報私讐禍福指絡脈髙才食舊德但恐里門窄傷心千騎歸贈印黃壤隔惟有亭前檜閲世不改色千年與井在記此王粲宅新渡寺送任仲微春陰欲落雪野氣方升雲我遊清潁尾想見翠被君古來聚散地與子復言分倦遊安稅駕瘦田失歸耘獨宿古寺中荒雞亂鳴羣送子以曉角幽幽醒時聞送運判朱朝奉入蜀七首藹藹青城雲娟娟峨睂月隨我西北來照我光不滅我在塵土中白雲呼我歸我逰江湖上明月濕我衣岷峨天一方雲月在我側謂是山中人相望了不隔夢尋西南路默數長短亭似聞嘉陵江跳波吹錦屏送君無一物清江飲君馬路穿慈竹林父老拜馬下不用驚走藏使者我友生聽訟如家人細說為汝評若逢山中友問我歸何日為話腰腳輕猶堪踏泉石病中夜讀朱博士詩病眼亂燈火細書數塵沙君詩如秋露淨我空中花古語多妙寄可識不可誇巧笑在頩頰哀音餘摻撾曾坑一掬春紫餅供千家懸知貴公子醉眼無真茶﨑嶇爛石上得此一寸芽緘封勿浪出湯老客未嘉趙德麟餞飲湖上舟中對月老守惜春意主人留客情官餘閒日月湖上好清明新火發茶乳溫風散粥餳酒䦨紅杏暗日落大堤平清夜除燈坐孤舟擘岸撑逮君幘未墮對此月猶橫贈朱遜之并引元祐六年九月與朱遜之㑹議于潁或言洛人善接花嵗出新枝而菊品尤多遜之曰菊當以黃為正餘可鄙也昔叔向聞鬷蔑一言知其為人豫於遜之亦云黃花候秋節逺自夏小正坤裳有正色鞠衣亦令名一從人僞勝遂與天力爭易性寓非族改顔隨所令新竒既易售粹駁宜相傾疾惡逢伯厚識真似淵明君言我所印世論誰改評願君為霜風一掃紫與頳和趙德麟送陳傳道二陳既妙士兩歐惟德人王孫乃龍種世有籋雲鱗五君從我遊傾寫出怪珍俗物敗人意兹遊實清醇那知有聚散佳夢失缺伸我舟下清潁淮水吹玉塵君行踏曉月踈木挂寸銀尚寄别後詩翦刻淮南春上已日與二子逮過遊塗山荆山記所見此生終安歸還軫天下半朅來乘樏廟復作微禹歎昔自南河赴杭州過此蓋二十二年矣從祠及彼呱有啓廟像設偶此粲謂塗山氏秦祖當侑坐廟有伯翳夏郊亦薦裸有鯀廟可憐淮海人尚記􅋃矢旦淮南人謂禹以六月六日生是日數此萬人㑹山上雖傳記不載然相傳如荆山碧相照楚水清可亂刖人有餘坑美石肖溫瓉荆山下有卞氏採玉坑石色如玉不受鑱刻取出山下輒變色不復溫瑩龜泉木杪出牛乳石池漫龜泉在荆山下色白而井真陸羽所謂石池漫流者有石記云唐貞元中隨白龜流出小兒強好古侍史笑流汗歸時蝙蝠飛炬火記逺岸淮上早發淡月傾雲曉角哀小風吹水碧鱗開此生定向江湖老默數淮中十往來次韻徐仲車仲車耳聾惡衣惡食詩愈好恰似霜松囀春鳥蒼蠅莫亂逺雞聲世上誰如公覺早八年看我走三州元豐八年豫赴登州元祐四年赴杭州今赴揚州皆見仲車月自當空水自流人間擾擾真螻蟻應笑人呼作鬬牛次韻林子中春日新堤書事見寄東都寄食似孤雲襆被真成一宿賔收得玉堂揮翰手却為淮月弄舟人羡君湖上齊搖碧笑我花時甑有塵為報年來殺風景連江夢雨不知春來詩有芍藥春之句揚州近嵗率為此㑹用花十餘萬枝吏緣為奸民極病之故罷此㑹送陳伯修察院赴闕裕陵固天縱筆有雲漢姿嘗重連山象不數秋風辭龍騰與虎變貍豹復何施我窮真有數文字乃見知聞君射策日妙語發疇咨一日喧萬口驚倒同舍兒豈知二十年道路猶遲遲苦言如藥石瞑眩終見思屈信反覆手獨於君可疑四門方穆穆行矣及此時送張嘉父長官都城昔傾蓋駿馬初服輈再見江湖間秋鷹已離韝于今三㑹合每進不少留豫章既可惜瑚璉誰當收微官有民社妙割無雞牛歸來我益敬器博用自周百年子初筵我已迫旅酬但當記苦語髙節貫白頭軾在潁州與趙德麟同治西湖未成改揚州三月十六日湖成德麟有詩見懷次韻太山秋毫雨無窮巨細本出相形中大千起滅一塵裏未覺杭潁誰雌雄來詩云與杭爭雄我在錢塘拓湖渌大堤士女爭昌丰六橋橫絶天漢上北山始與南屏通忽驚二十五萬丈老葑席卷蒼雲空朅來潁尾弄秋色一水縈帶昭靈宫坐思吳越不可到借君月斧修朣朧二十四橋亦何有換此十頃玻瓈風雷塘水乾禾黍滿寶叉耕出餘鸞龍明年詩客來弔古伴我霜夜號秋蟲德麟見約來揚寄居亦有意求揚倅次韻趙德麟西湖新成見懷絶句壺中春色謂洞庭春色也飲中仙騎鶴東來獨惘然猶有趙陳同李郭不妨同泛過湖船再次韻趙德麟新開西湖使君不用山鞠窮饑民自逃泥水中欲將百瀆起凶嵗免使甔石愁揚雄西湖雖小亦西子縈流作態清而丰千夫餘力起三閘焦陂下與長淮通十年憔悴塵土窟清瀾一洗啼痕空王孫本自有仙骨平生宿衛明光宫一行作吏人不識正似雲月初朦朧時臨此水照氷雪莫遣白髮生秋風定須却致兩黃鵠新與上帝開濯龍湖成君歸侍帝側燈花已綴叉頭蟲豫以潁人苦饑奏乞留黃河夫萬人修境內溝洫詔許之因以餘力浚治此湖到官病倦未嘗㑹客毛正仲惠茶乃以端午小集石塔戲作一詩為謝我生亦何須一飽萬想滅胡為設方丈養此膚寸舌爾來又衰病過午食輒噎繆為淮海帥每愧廚傳缺㸑無欲清人奉使免內熱空煩赤泥印逺致紫玉玦為君伐羔豚歌舞菰黍節禪窗麗午景蜀井出冰雪坐客皆可人鼎器手自潔金叉候湯眼魚蟹亦應訣遂令色香味一日備三絶報君不虛授知我非輕啜雙石并引至揚州獲二石其一緑色岡巒迤邐有穴達于背其一玉白可鑒漬以盆水置几案間忽憶在潁州日夢人請住一官府榜曰仇池覺而誦杜子美詩曰萬古仇池穴潛通小有天乃戲作小詩為僚友一笑夢時良是覺時非汲水埋盆故自癡但見玉峯橫太白便從鳥道絶峨睂秋風欲作煙雲意曉日令涵草木姿一㸃空明是何處老人真欲住仇池次韻和朝無咎學士相迎少年獨識朝新城閉門却掃卷斾旌胸中自有談天口坐却秦軍發墨守有子不為謀置錐虹霓吞吐忘寒饑端如太史牛馬走嚴徐不敢連尻脽裴回未用疑相待枉尺知君有家戒避人聊復去瀛洲伴我真能老淮海夢中仇池千仞巖便欲攬我青霞幨且須還家與婦計我本歸路連西南老人飲酒無人佐獨看紅藥傾白墮每到平山憶醉翁懸知他日君思我路旁小兒笑相逢齊歌萬事轉頭空賴有風流賢别駕猶堪十里卷春風次韻范淳父送秦少章宿緣在江海世網如豫何西來庾公塵已濯長淮波十年淮海人初見一麥禾但欣爭訟少未覺舟車多秦郎忽過我賦詩如卷阿句法本黃子謂魯直也二豪與揩磨其兄少遊與張文潜嗟我久離羣逝將老西河後生多名士欲薦空悲歌小范真可人獨肯勤收羅瘦馬識騄耳枯桐得雲和近聞館李生李豸方叔病鶴借一柯贈行苦說我妙語慰蹉跎西羌己解仇烽火連朝那坐籌付公等吾將寄潛沱靈隱前一首贈唐林夫靈隱前天竺後兩澗舂淙一靈鷲不知水從何處來跳波赴壑如奔雷無情有意兩莫測肯向冷泉亭下相縈回我在錢塘六百日山中暫來不暖席今君欲作靈隱居葛衣草屨隨僧蔬能與冷泉作主一百日不用二十四考書中書滕達道挽詞二首先帝知公早虛懷第一人至今詩禮將惟數武宣臣材大雖難用時來亦少信髙平風烈在威敏典刑新公少受知於范希文孫元睨空試乘邊䇿寧留相漢身淒涼舊部曲淚濕塜前麟雲夢連江雨樊山落木秋公方占賈鵩我正買龔牛共有江湖樂俱懷畎畝憂荆溪欲歸老浮玉偶同遊骯髒儀刑在驚呼嵗月遒回頭雜歌哭挽語不成謳次韻蘇伯固逰蜀岡送李孝博奉使嶺表新苗未沒鶴老葉方翳蟬緑渠浸麻水白板燒松煙笑窺有紅頰醉卧皆華顛家家機杼鳴樹樹梨棗懸野無佩犢子府有騎鶴仙觀風嶠南使出相山東賢渡江弔狠石過嶺酌貪泉與君步徙倚望彼修連娟願及南枝謝早隨北鴈翩歸來春酒熟共看山櫻然送朝美叔我年二十無朋儔當時四海一子由君來扣門如有求頎然病鶴清而修醉翁遣我從子遊翁如退之蹈軻丘尚欲放子出一頭嘉祐初軾與子由寓興國浴室美叔忽見訪云君從歐陽公遊久矣公令我來與子定交謂子必名世老夫亦須放他出一頭地酒醒夢斷四十秋病鶴不病骨愈虯惟有我顔老可羞醉翁賓客散九州幾人白髮還相收我如懷祖拙自謀正作尚書己過優君求㑹稽實良籌往看萬壑爭交流君近乞越州王文玉挽詞才名誰似廣文寒月斧雲斤琢肺肝𤣥宴一生都卧病子雲三世不遷官幽蘭空覺香風在宿草何曾淚葉乾猶喜諸郎有曹志文章還復富波瀾送芝上人遊廬山二年閲三州我老不自惜團團如磨牛步步踏陳迹豈知世外人長與魚鳥逸老芝如雲月炯炯時一出比年三見之常若有所適逝將走廬阜計闊道愈密吾生如寄耳出處誰能必江南千萬峰何處訪子室送程德林赴真州君為縣令元豐中吏貪功利以病農君欲言之路無從移書諫臣以自通諫臣蹇受之也元豐天子為改容我時匹馬江西東問之逆旅言頗同老人愛君如劉寵小兒敬君如魯恭爾來明目達四聰收拾駔駿冀北空君為赤令有古風政聲直入明光宫天廄如海養羣龍并收其子豈不公君之子祁舉制策文學行義為時所稱白沙何必煩此翁谷林堂詩深谷下窈窕髙林合扶踈美哉新堂成及此秋風初我來適過雨物至如娛豫稚竹真可人霜節已專車老槐苦無賴風花吹填渠山鴉爭呼號溪蟬獨清虛寄懷勞生外得句幽夢餘古今正自同嵗月何必書豫少年頗知種松手植數萬株皆中梁柱矣都梁山中見杜輿秀才求學其法戲贈二首露宿泥行草棘中十年春雨養髯龍如今尺五城南杜欲問東坡學種松君方掃雪收松子我已開榛得茯苓為問何如插楊柳明年飛絮作浮萍行宿泗間見徐州張天驥次舊韻二年三躡過淮舟欵段還逢馬少遊無事不妨長好飲著書自要且窮愁孤松早偃元非病倦鳥雖還豈是休更欲河邊幾來往祇今霜雪已䝉頭次韻劉景文贈傳曦秀才窈眇文章宜和寡崢嶸肝肺亦交難未能飛瓦彈清角肯便投泥戲潑寒忽見秋風吹落水遙知霜葉滿長安詩成送與劉夫子莫遣孫郎帳下看在彭城日與定國為九日黃樓之㑹今復以是日相遇于宋凡十五年憂樂出處有不可勝言者而定國學道有得百念灰冷而顔益壯顧豫衰病心形俱瘁感之作詩菊盞茰囊自古傳長房寧復是臞仙應從漢武橫汾日數到劉公戲馬年對玉山人雖老矣見恆河性故依然王郎九日詩千首今賦黃樓第二篇九日次定國韻朝菌無晦朔蟪蛄疑春秋南柯已一世我眠未轉頭仙人視吾曹何異蜂蟻稠不知蠻觸氏自有兩國憂我觀去來今未始一念留奔馳竟何得而起無窮羞王郎誤涉世屢獻久不酬黃金散行樂清詩出窮愁俯仰四十年始知此生浮軒裳陳道路往往兒童收封侯起大第或是君家騶似聞負販人中有第一流炯然徑寸珠藏此百結裘意行無車馬倐忽略九州邂逅獨見之天與非人謀笑我方醉夢衣冠戲沐猴力盡病騏驥伎窮老伶優北山有雲根寸田自可耰㑹當無何鄉同作逍遙逰歸來城郭是空有纍纍丘召還至都門先寄子由老身倦馬河堤永踏盡黃榆緑槐影荒雞號月未三更客夢還家得俄頃歸老江湖無嵗月未填溝壑猶朝請黃門殿中奏事罷詔許來迎先出省已飛青蓋在河梁定餉黃封兼賜茗逺來無物可相贈一味豐年說淮潁次韻定國見寄還朝如夢中雙闕眩金碧復穿鵷鷺行強寄麋鹿迹勞生苦晝短展轉不能夕默坐數更鼓流水夜自逆故人為我謀此志何由畢越吟知聽否誰念病莊舄時方請越次韻蔣潁叔錢穆父從駕景靈宫二首歸來病鶴記城闉舊踏松枝雨露新半白不羞垂領髮軟紅猶戀屬車塵雨收九陌豐登後日麗三元下降辰粗識君王為民意不才何以助精禋前輩戲語有西湖風月不如東華軟紅香土與君竝直記初元白首還同入禁門玉殿齊班容小語霜廷稽首泫微溫適與穆父竝拜庭中地皆流濕相與小語道之病貪賜茗浮銅葉老怯香泉灧寶樽回首鵷行有人傑坐知羌虜是游魂東坡全集卷二十
