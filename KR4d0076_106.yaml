body:
  text: 東坡全集巻一百六宋蘓軾撰外制制勅六十七首除吕公著特授守司空同平章軍國事加食邑實封餘如故制元祐三年四月四日門下仁莫大於求舊智莫良於用衆既得天下之大老彼將安歸以至國人皆曰賢夫然後用今朕一舉仁智在焉宜告治朝以孚大號金紫光祿大夫守尚書右僕射兼中書侍郎上柱國東平郡開國公食邑七千一百戸食實封二千三百戸吕公著訏謨經逺精識造微非堯舜不談昔聞其語以社稷為悅今見其心三年有成百揆時敘維乃烈考相于昭陵蓋清淨以寧民亦勞謙而得士凡我儀刑之老多其賓客之餘在武丁時雖莫望於前烈作召公考固無易於象賢而乃屢貢封章力求退避朕重失此三益之友而閔勞以萬幾之煩是用遷平土之司釋文昌之任毋廢議論時遊廟堂於戲大事雖咨於房喬非如晦莫能果㫁重徳無逾於郭令而裴度亦寄安危罔俾斯人専美唐世可特授司空同平章軍國事加食邑七百戸食實封三百戸餘如故仍一月三赴經筵二日一入朝因至都堂議軍國事除吕大防特授太中大夫守尚書左僕射兼門下侍郎加上柱國食邑實封餘如故制元祐三年四月四日門下朕聞天子有道其徳不可得而名輔相有徳其才不可得而見故漢之文景紀無可書之事唐之房杜傳無可載之勲當時安榮後世稱頌予欲清心而省事不求智名與勇功天維顯思將啓承平之運民亦勞止願聞休息之期眷予元臣咸有一徳咨爾百辟明聴朕言中大夫守中書侍郎柱國汲郡開國公食邑二千二百户食實封三百户賜紫金魚袋吕大防造道純深受才𢎞毅果藝以達有孔門三子之風直大而方得坤爻六二之動久踐右闥蔚為名臣宜升左輔之崇兼綜東臺之務加賦進秩寵數益隆得位興時憂責彌重於戲若古有訓無競維人崔公建中之風以除吏八百而致裴垍元和之政以薦士三十而能惟公乃心何逺之有可特授太中大夫守尚書左僕射兼門下侍郎加上柱國食邑七百戸食實封三百戸餘如故除范純仁特授太中大夫守尚書右僕射兼中書侍郎進封髙平郡開國侯加食邑實封餘如故制元祐三年四月四日門下朕惟朝廷之盛衰常以輔相為輕重若根本彊固則精神折衝故蔿吕臣奉已而不在民則晉文無復憂色汲長孺直諫而守死節則淮南為之寢謀朕思得其人付之以政使天下聞風而心服則人主無為而日尊咨爾在廷咸聴朕命中大夫同知樞密院事上柱國髙平郡開國伯食邑九百戸食實封二百戸賜紫金魚袋范純仁器逺任重才周識明進如孟子之敬王退若蕭生之憂國朕覽觀仁祖之遺迹永懐慶厯之元臣强諫不忘喜臧孫之有後戎公是似命召虎以來宣雖兵政之與聞疑逺猷之未究坐論西省進貳文昌増秩益封兼隆異數於戲時難得而易失民難安而易危予欲守在四夷以汝為偃兵之姚宋予欲藏於百姓以汝為急民之蕭曹勉思古人以稱朕意可特授太中大夫守尚書右僕射兼中書侍郎進封髙平郡開國公加食邑七百戸實封三百戸餘如故除苗授特授武泰軍節度使殿前副都指揮使勲封食實封如故制元祐三年七月十二日門下出總元戎作先聲於士氣入為環尹寓軍政於國容將伸閫外之威以迪師中之吉咨于爾衆朕得其人侍衞親軍步軍副都指揮使威武軍節度觀察留後持節福州諸軍事福州刺史上柱國濟南郡開國公食邑二千八百戸食實封三百戸苗授早以異材見稱武畧被服忠義有烈丈夫之風砥礪亷隅得士君子之槩薦揚邊圉益著勞能抜自衆人既䝉先帝之遇遂拜大將無復一軍之驚祗扈殿巖肅將齊鉞予欲少長有禮而兵可用汝其夙夜在公而令必行於戲愛克厥威罔功兹為深戒師衆以順為武古有成言惟懋乃衷毋忘朕訓除皇伯祖宗晟特起復制元祐三年十一月一日門下曽閔之哀喪不貳事漢唐之舊禮有奪情矧予藩屏之親實兼臣子之重雖閨門以恩掩義而公侯以國為家伯臣司宗職不可曠要絰服事古有成言非予爾私其聴朕命皇伯祖彰化軍節度州管内觀察處置等使檢校司空開府儀同三司持節涇州諸軍事涇州刺史判大宗正事上柱國髙密郡王食邑七千八百戸食實封二千四百戸宗晟天資純茂徳履方嚴襲餘慶於祖宗蹈格言於師保典司屬籍克有令名郢客卒業於浮丘辟彊受知於先帝允釐厥位無愧昔人屬此閔凶纍然毁瘠嗟日月之逾邁重職業之久虚宜復寵名式從權制於戲出居官次非王事不談退適倚廬讀喪祭之禮則忠孝兩得人無間言功名益隆親有顯譽勉服朕訓光昭前聞給事中兼侍講傅堯俞可吏部侍郎敕士以徳望進則風俗厚而朝廷尊以經術用則議論正而名器重此君子所以難合而朕亦難其人焉具官傅堯俞博學篤行久聞于世歴事四世挺然一節懐道不試十年于兹朕欲聞仁人之言置之講席非堯舜之道蓋未嘗言給事黄門未究其用往貳太宰益修厥官董正治典以稱先帝復古之意可太常少卿趙瞻可戸部侍郎敕理財正辭禁民為非曰義先王之論理財也必繼之以正辭名正而言順則財可得而理民可得而正自頃功利之臣言政而不及化言利而不及義中外紛然朕益厭之具官趙瞻明於吏事輔以儒術忠義之節白首不衰爰自秩宗擢貳邦計將使四方之人知予以耆老舊徳居此官者蓋有盍徹之意焉可王克臣可工部侍郎依前龍圖閣直學士敕朕承先帝之丕業居其宮室而服其器用常懼不稱而何敢有加焉惟是軍國之備凡仰于百工者乃以諉于冬官有事于斯當識朕意具官王克臣奮自儒術蔚為聞人歴帥諸藩嘗佐事典才有餘裕所居見稱比由宛丘入奉朝謁而司空長貳艱於其人兹命爾以舊官仍兼内閣之重勉率厥職外以成爾繕治之勞内以全予恭儉之志可祥符知縣李之紀可廣西提刑具官李之紀近自畿甸逺至海隅朕視其地如戸庭視其民如一家爾賦政赤縣而亷平之稱達于朕聴是用命爾按刑嶺表其一乃心毋或鄙夷其民如在朕側往惟欽哉知楚州田待問可淮南轉運判官敕具官田待問朝廷取材必始於治民異時吏或不更郡縣而任刺舉剛柔失中民以告病以爾端靜敏恪悃愊無華試于劇郡吏民宜之其即本道以究爾才往悉乃心毋使厥聲減於治郡可兩浙轉運副使孫昌齡可秘閣校理知福州敕具官孫昌齡爾奉使吳越而亷平之稱達于朕聴七閩之㑹其民智巧易以理服難以力勝今命爾為守惟寛而明民乃宜之朕方復文館之職以廣育才之路遂以命爾往惟欽哉可知徐州馬黙可司農少卿敕具官馬黙爾以博學强記𢎞毅有守剛而不犯明而不苛歴試中外藹然有聞朕方選擇循吏入為卿佐凡爾所能巳試於外者其以告我而力行之往佐大農毋忽朕命兩浙轉運副使許懋可令再任敕具官許懋吳越之人凋敝久矣朕方蠲理煩碎以安養其衆非得循吏察視郡縣均通有無則民何賴焉以爾儒術精通吏事詳敏歴年于兹民便其政既信之俗必易為功庶無新故更代之勞而有上下相安之美勉脩前業無怠日新可新淮南轉運判官蔡朦可兩浙運判敕具官蔡朦以爾名臣之子進以儒術歴佐漕府治辦有成東南富庶比於西蜀而機巧過之惟寛且靜則民不媮可司農少卿范子淵可知兖州敕具官范子淵朕於士大夫未嘗求備也將歴試以事而收其所長有司言汝治河無狀耗國勞民積歲而功不成朕惟水土之政與郡縣異其觀汝于牧民尚勉來效以蓋往愆可故樞密副使包拯男太常寺太祝繶之妻壽安縣君崔氏可特封永嘉郡君仍封表門閭敕崔氏汝甲族之遺孤大臣之冢婦夫亡子夭惸然無歸而能誓死不嫁撫養孤弱使我嘉祐名臣之後有立於世惟汝之功昔衞世子蚤死共姜自誓詩人歌之韓愈幼孤養於嫂鄭愈喪之朞若崔氏者可謂兼之矣其改賜湯沐表異其所居以風曉郡國使薄於孝悌者有所愧焉可皇叔某贈婺州觀察使追封東陽侯皇兄某贈蔡州觀察使追封汝南侯敕生分竹符所以廣恩於宗室沒享茅社所以寵綏其子孫眷予盤石之宗夙被麟趾之化國有常典我其敢忘某等生于髙明克自抑畏恭儉寡過綽有士人之風忠孝著聞蓋服祖宗之訓屬既尊於中外禮當極於哀榮命以亷車即封其地爰疏五等之貴以慰九原之思庶其有知服我休命士奫可西頭供奉官敕具官士奫汝宗室子生於安逸而能誦習文法以求自試蓋亦有志於士者朕何愛一官不以成其志乎可童湜可特敘内殿崇班敕具官童湜汝奉法不謹坐廢歴年而能祗畏以蓋前失既更大眚稍復汝舊往服厥官益敬無怠可謝卿材可直秘閣福建轉運使敕具官謝卿材先王設官制祿非特以勸功興事也將以觀士之所守而進退之惟愛身者為能愛民惟知義者為能知利以爾臨事有守信道不回治郡有方奉使不擾力行古人之事庶幾循吏之風釋此大邦付之一路仍進直於書府俾尊重於使權無輕逺人謹視貪吏政成民恱朕不汝忘可趙偁可淮南轉運副使敕具官趙偁汝昔為文登守而海隅之民至今稱之推文登之政達之齊魯刑平賦簡所部以安今淮南之人困於征役而重以饑饉汝往按視如京東之政以寛吾憂可呂溫卿知饒州李元輔知絳州敇具官某等監司郡縣其職不同其為養民一也夫安靜之吏悃愊無華日計不足歲計有餘今自部使者移治一郡其深念之服于朕訓以永終譽可王誨知河中府敕具官王誨汝以名臣子老於治郡所至安靜吏民宜之河東吾股肱郡方唐之盛世有賢守風流未逺圖像具存勉思古人以紹前烈可邵剛通判泗州敕具官邵剛詩云淑問如臯陶在泮獻囚獄訟之事固儒者之所學也汝官于上庠既習其說矣其往試之可荆王楊王所乞推恩八人敕具官某等或以方伎世其學或以歲月積其勞給事王官既勤且久増秩改授以旌其能往服休恩益敬無怠可西頭供奉官張禧得三級轉三官敕具官張禧疆塲之政以首虜計功所從來尚矣爾既應格則賞隨之可鮮于侁可太常少卿敕具官鮮于侁奉常之職非特以治郊廟之度服器之數而巳國有大政事大議論必稽焉昔魯秉周禮齊不敢謀而晏子太師折衝於樽俎之間國之典常君臣之名分上下守之有死不易則國安而民服朕選建卿士付之禮樂意在於此非我老成之人學足以通古才足以御今智足以應變强足以守官深於經術達於人情其孰宜之詩不云乎彼其之子邦之司直往修厥官無斁朕命可范祖禹可著作郎敕具官范祖禹左右起居東觀著作皆史事也今左右史獨書巳行之政有司之常事至于廊廟大議君臣相與之際所以興壊治忽之由一歸于東觀則著作之任顧不重歟非得直亮多聞古之所謂益友者奮筆於其間則善惡瞀亂後世無所考信汝既任其事矣益進而専之朕苟有過猶當直書而況其餘乎往祗厥官無曠乃職可孫覺可給事中敕朕聞明主在上凡侍從皆得言若其不明雖臺諫亦失職朕以沖眇丕承祖宗未堪多難之憂常恐不聞其過下至執藝猶當盡規豈必諫臣而後論事矧兹封駁之重任參黄散之間知無不言職固當爾具官孫覺行不違道言不違仁處以孝聞出以忠顯先帝所以遺朕天下謂之正人屢告嘉猷固非小補間自西省遷之東臺而覺方進陽城之直詞固懐蕭生之雅意重違其請閱月于兹卒採羣言以遂前命以爾抗章伏閣之志施于還詔批敕之間其一乃心以稱朕意皇伯祖克愉可贈忠正軍節度使開府儀同三司敕國家䝉累聖之餘澤眷宗室之多賢雖設官以董其私置傅以導其學而重以吏事責之懿親青衿而服簪纓白首以奉朝請雖有間平之盛徳歆向之異材皆湮沒而無傳故歎息之何及尚賴本支之茂蔚為邦國之華不幸云亡惻然永悼具官克愉忠厚以為質禮敬以自文持滿矜髙蓋得諸侯之孝履信思順合於大有之賢小心自將沒齒無過方朕不言之際遽兹永逝之悲日月有時窀穸告具賁以旌旄之寵仍兼將相之榮豈獨慰九泉之思亦將勸庶邦之義可蕃官兀埿常等十二人覃恩轉官敕具官某等錯居吾圉世濟其忠矧兹臨御之初豈有中外之異各從遷秩以廣異恩祗服寵靈益堅守御可髙密郡王宗晟建安郡王宗綽所生母孫氏封康國太夫人敕母以子貴春秋之義也朕方因親以教愛廣愛以及民封節婦之閭以勸能賢賜髙年之爵以助養老而況屬籍至近賢王篤生欲大慰於慈心宜特推於異數孫氏四徳純備五福荐臻豈惟擢秀於閨門固巳流芳於宮閫舉觴坐上有伯仁仲智之賢持節洛濱皆汝南琅琊之貴爰改封於樂土俾正位於小君服我休恩介爾眉壽可客省副使劉琯知恩州敕軍國異容兵民異道治戎整旅以鷙勇為上承流宣化以忠厚為先爾久練武經本由才選屢更煩使克有成勞試于一州祗服朕訓可皇叔叔曹贈洺州防禦使封廣平侯敕官至持節爵為通侯非我勲勞之臣則必親賢之屬豈云虚受維以飾終具官叔曹生於髙明力自修飭克有常德以沒元身乃眷衡漳夙為重地爰假一麾之寵就分五等之封庶其有知服我休命可左侍禁李司可供奉官敕蠢爾裔夷憑嶮竊發不時討擊何以懲艾爾能奮命破走靖邊何愛一官以勸吏士可張汝賢可直龍圖閣發運副使敕具官張汝賢朝廷於南方復置都漕者所以均節諸路之有無使歲課時入而巳非以求贏也至俗吏為之則多收羨財以幸恩寵而民受其病以爾昔為御史號稱敢言奉使江表罪人斯得庶幾知義利之分者是以命爾寵之新職往惟欽哉狄諮劉定各降一官敕具官某等奉使一路以䘏民奉法為先今乃不然煩酷之聲溢于朕聴公肆其下曲法受賕收聚毫末與農圃爭利使民無所致其忿至欲賊殺官吏朕以更赦置之閒局而公議未厭其削一官往思厥愆服我寛政可范子淵知峽州敕朝請大夫新差知兖州范子淵汝以有限之財興必不可成之役驅無辜之民置之必死之地横費之財猶可以力補而既死之民不可以復生此議者所以不汝置而朕亦不得以赦原也夷陵雖小尚有民社朕有愧於民而於汝則厚矣可宣徳郎劉錫永父元年一百四歲可承事郎敕劉元年尚齒教民三代之義咨爾百年之故老乃吾六世之遺民自非吉人莫享上壽張蒼事秦柱下而至漢孝景思邈生隋開皇而及唐永淳古有其人乃今親見何愛一命慰其子孫可叔頗男旼之可三班借職敕旼之汝父無祿早世緣母之請以獲一官其思所以克家事母者惟敬毋怠可鮑耆年京東運判張峋京西運判敕具官某等朕惟百姓之命寄於郡縣而守令之賢不能人知其實獨賴部使者為朕耳目而巳爾長一郡以才良聞進之漕屬以究其用其使上無惰吏下無寃民以稱朕意可李周可太僕少卿敕具官李周僕臣正厥后克正見於周書思無邪思馬斯臧形於魯頌朕命此職亦難其人以爾秉心不回臨事有守通練世故灼知民情所以望爾者豈特車工馬政而巳哉可范純禮可吏部郎中敕具官范純禮嗚呼維乃顯考克明徳秉哲以左右我仁宗俾配徳於堯舜天亦維相之使世有人以任我樞機將帥之事今汝獨在外計朕惟瑚璉不可以䙝用驥騄不可以小試命以天官之屬其少進之益觀其能往欽哉可余希旦可知濰州敕具官余希旦爾本以才選坐累失職亦云久矣肆予大眚罔不更新北海名邦民朴而富往務忠厚以安其生可王晳可知衞州敕具官王晳凡我四朝之舊經徳秉哲篤老不衰者今幾人哉以爾好學守節名在循吏而久不治民朕甚惜之太行之麓民朴訟簡守以安靜莫如汝宜可郭祥正覃恩轉承議郎敕具官郭祥正朕丕承六朝陳錫四國覃及方外浹于有生矧余通籍之臣可無増秩之寵祗服休命永肩一心可王崇拯可遥郡刺史敕具官王崇拯刺史漢官秩六百石魏晉以來皆牧守之任今雖以為勇爵然非親賢勲舊不在此選爾入直禁省出分虎符兵民所宜選寄滋重有司言爾累勞當遷益修厥官以應名實可潮州澄海第六指揮使謝皋可三班借職敕謝皋汝自什伍長積勞累遷至一旅極矣今乃以去惡之功獲補武吏惟㢘與慎乃克有終可皇伯仲郃贈使相敕親親以藩王室賢賢以尊朝廷古之道也況於死生之際恩禮之重國有常典我其敢忘皇伯具官仲郃生於髙明克自祗畏出就外傅聞好禮之稱退省其私有為善之樂云何不淑罹此閔凶慰我永懐豈無異數衮衣赤舄寵均三事之臣玉節牙璋坐享専征之器豈云虚授維以飾終庶幾有知服我休命可士暇可右班殿直敕汝宗室子始名而祿得之非艱守之惟艱祗服朕訓乃克終譽可克鞏可遥郡防禦使敕具官某朕於宗室無所愛也然猶不欲虚授以速人言得之惟艱乃罔後悔凡有進秩必付有司攷其歲月察其行義則朕與汝皆無愧豈不休哉劉奭閣門祗候敕具官某惟我神考篤于將帥生則厚其寵死則恤其孤將使識朝廷之儀習軍旅之事無忝厥祖以世其家成汝之志可謂至矣將何以報之可王安石贈太傅敕朕式觀古初灼見天意將有非常之大事必生希世之異人使其名髙一時學貫千載智足以達其道辯足以行其言瑰瑋之文足以藻飾萬物卓絶之行足以風動四方用能於期歲之間靡然變天下之俗故觀文殿大學士守司空集禧觀使王安石少學孔孟晚師瞿耼罔羅六藝之遺文㫁以巳意糠粃百家之陳迹作新斯人屬熈寧之有為冠羣賢而首用信任之篤古今所無方需功業之成遽起山林之興浮雲何有脫屣如遺屢爭席於漁樵不亂羣於麋鹿進退之際雍容可觀朕方臨御之初哀疚罔極乃眷三朝之老邈在大江之南究觀規模想見風采豈謂告終之問在予諒闇之中胡不百年為之一涕於戲死生用舎之際孰能違天贈賻哀榮之文豈不在我是用寵以師臣之位蔚為儒者之光庶幾有知服我休命可特贈守太傅楊繪知徐州敕朝散大夫知興國軍楊繪士有拙於謀身而巧於治民疎於防患而密於慮國其自為計則過矣而朕何病焉先帝龍興首擢用爾置之臺諫以直諒聞言雖無功效於今日簡易輕信失之匪人坐廢十年陶然自得詩人所謂豈弟君子者繪庶幾焉彭城大邦吾股肱郡政成民悅朕不汝忘可依前官知徐州陳薦贈光祿大夫敕昔我英祖博求天下之士以輔翼我神考于東宫二十餘年之間山陵既成人物改謝顧瞻在廷一二臣外罔有存者朕惻然傷之永懐其人具官陳薦剛毅木訥器逺任重密勿左右以責難為愛君周旋藩輔以䘏民為報國淪喪未幾風烈如在雖死者不可復作而追榮之典猶足以寵綏其子孫且使朴忠守道之士知朕意之所予者可吕穆仲京東提刑唐義問河北西路提刑敕先帝立法更制所以約束監司守令使不得營私而害民者可謂至矣朕始罷賦泉之令復征徭之法凡先帝之約束當益申而嚴之使出力從政之民無所復病以爾穆仲等或端靜有守敏於為政或直諒多聞志於仕道而京東河朔皆天下重地也往脩厥官稱朕意焉可沈叔通知海州敕朕嗣位以來通商惠農施舎已責有不順成荒政畢舉而海濱之民羣聚剽掠此吏不稱職備災無素之過也今選命汝惟往安之非勝之也民苟有以生矣其肯自棄於惡可孫向保州通判敕孫向一郡之寄在汝守貳察姦舉能既復其舊矣則達政之吏可以有為爾通練民事既試有勞其從所請以觀來效可鄧闢朝散郎監邕州慎門金坑敕具官鄧闢瘴霧之鄉上幣所出累年於此勤亦至矣法當遷秩以荅久勞可荆王新婦王氏潭國夫人敕易稱中饋為家人之正吉詩美羔羊蓋鵲巢之功致婦徳有常含章不曜能使君子樂且有儀則内助之賢從可知矣王氏早服師傅習聞詩禮富貴而能恭儉俯仰極於孝慈令問藹然刑于宗族其改封大國象服是宜以稱我叔父之徳為内命婦之法豈不休哉可劉庠贈太中大夫敕國以求賢為先士以得時為急士既難進而易退時亦難得而易失日月逝矣歲不我與古人之歎復見于今故樞密直學士朝議大夫知渭州劉庠才備徳博器逺任重逮事三朝出入二紀英祖神考實知其人而剛毅朴忠率不少貶肆朕嗣位疇咨故老如庠等輩不過數人方當召用命不少假使九原而可作雖百身其何贖寵章異數有慰幽魂雖知無益以塞余哀可特贈太中大夫餘如故李琮知吉州敕具官李琮汝以久逺無根之賦使畏威懐賞之吏均之于無辜之民民以病告聞之惕然使吏覆視皆如所聞既正其事矣而汝猶自言若無罪然朕惟更赦不汝深咎遷于一州往深念之廬陵之富甲於江外使民安汝朕則汝安可髙士良可文思副使敕髙士良汝閱習民兵技藝超等課以歲月於法當遷往服寵靈益思來效可皇叔叔遂可贈懐州防禦使追封河内侯敕生于富貴而無驕逸之患終于祿位而有歸全之美始終之義有足賢者具官叔遂性於忠孝文以禮樂蓋䝉祖宗之澤而服師保之訓克有令問以沒元身是用爵之通侯官以持節上以惇勸於宗室下以寵綏其子孫可楊王子孝騫等二人荆王子孝治等七人並逺州圑練使敕某等先皇帝篤兄弟之好以恩勝義不許二叔出居于外葢武王待周召之意太皇太后嚴朝廷之禮以義制恩始從其請出就外宅得孔子逺其子之意二聖不同同歸于道可以為萬世法朕奉侍兩宫按行新第顧瞻懐思潸然出涕昔漢明帝問東平王在家何等為樂王言為善最樂帝大其言因送列侯印十九枚諸子年五歲以上悉帯之著之簡策天下不以為私今王諸子性于忠爱漸于禮義自勝衣以上頎然皆有成人之風朕甚嘉之其各進一官以助其為善之樂尚勉之哉毋忝父祖以為邦家光可吕公著妻魯氏贈國夫人敕婦人之徳如玉在淵雖不可見必形諸外視其夫有羔羊之直相其子有麟趾之仁則内徳之茂從可知矣具官吕公著故妻魯氏名臣之子元老之婦所資者深故志存乎仁所見者大故動協于禮環佩穆然閨門化之而降年不永祿不配徳其改封大國正位小君庶幾為女史之光非獨慰其夫子而巳可仲暹可遥郡防禦使敇仲暹居貧賤而有聞易處富貴而無過難凡我宗室皆有位著雖不任以事無所施其才而刑于厥家有以攷其行日月其邁爵秩當遷朕不爾私服之無愧可東坡全集巻一百六
