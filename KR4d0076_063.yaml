body:
  text: 東坡全集卷六十三宋蘇軾撰奏議一十三首乞擢用林豫劄子元祐七年十月日龍圖閣學士左朝奉郎守兵部尚書蘇軾劄子奏臣竊謂才難之病古今所同朝廷每欲治財賦除盜賊幹邊鄙興利除害常有臨事乏人之歎古人有言寬則寵名譽之人急則用介胄之士所用非所養所養非所用此古今之通患也臣伏見承議郎監東排岸司林豫自為布衣已有竒節及其從事所至有聲其在漣水屏除羣盜尤著方略其人勇於立事當有為國捐軀之意試之盤錯之地必顯利器伏望聖慈特與量材擢用若後不如所舉臣等甘伏朝典取進止乞賻贈劉季孫狀元祐七年十月日龍圖閣學士左朝奉郎守兵部尚書蘇軾狀奏臣等竊聞仁宗朝趙元昊寇延州危急環慶將官劉平以孤軍來援衆寡不敵姦臣不救平遂戰殁竟罵賊不食而死詔贈侍中賜大第官其諸子慶孫貽孫宜孫昌孫孝孫保孫季孫等七人諸子頗有異材而皆不壽卒無顯者家事狼狽賜第易主獨季孫仕至文思副使年至六十篤志好學博通史傳工詩能文輕利重義練達軍政至於忠義勇烈識者以為有平之風性好異書古文石刻仕宦四十餘年所得祿賜盡於藏書之費近䝉朝廷擢知隰州今年五月卒於官所家無甔石妻子寒餓行路傷嗟今者寄食晉州旅櫬無歸臣等實與季孫相知既哀其才氣如此死未半年而妻子流落又哀其父平以忠義死事聲迹相接四十年間而子孫淪替不䝉收録豈朝廷之意哉今執政侍從多知季孫者如加訪問必得其實欲望朝廷特詔有司優與賻贈以振其妻子朝夕饑寒之憂亦使人知忠義死事之子孫雖跨歷嵗月朝廷猶賜存恤於奬勸之道不為小補季孫之子三班借職璨見在京師乞早賜指揮謹録奏聞伏候敕㫖貼黃季孫身亡合得送還人為般擎女壻兩房並已死盡其喪柩見在晉州無由般歸京師欲乞指揮晉州候本家欲扶護歸葬日即與差得力廂軍三十人節級一人般至京師再論李直方捕賊功效乞别與推恩劄子元祐七年十一月初四日龍圖閣學士左朝奉郎守兵部尚書蘇軾劄子奏臣先知潁州日為有劇賊尹遇陳興鄭饒李松等皆宿姦大惡為一方之患而汝隂縣尉李直方本以進士及第母年九十餘只有直方一子相須為命而能奮不顧身躬親持刃刺倒尹遇又能多出家財緝知餘黨所在分遣弓手前後捕獲功效顯著直方先公後私致所差人先獲陳興等三人而直方躬親後獲尹遇一名與賞格小有不應臣尋具事由聞奏乞以臣合轉朝散郎一官特與直方比附第三等循資酬奬後來朝㫖只與直方免試竊緣選人免試恩例至輕其間以毫髮微勞得者甚多恐非所以激勸捐軀除患之士伏望聖慈特賜檢㑹前奏别與推恩仍乞許臣更不磨勘轉朝散郎一官所貴餘人難為援例取進止乞免五穀力勝稅錢劄子元祐七年十一月初七日龍圖閣學士左朝奉郎守兵部尚書兼侍讀蘇軾劄子奏臣聞穀太賤則傷農太貴則傷末是以法不稅五穀使豐熟之鄉商賈爭糴以起太賤之價災傷之地舟車輻輳以壓太貴之直自先王以來未之有改也而近嵗法令始有五穀力勝稅錢使商賈不行農末皆病廢百王不刋之令典而行自古所無之弊法使百世之下書之青史曰收五穀力勝錢自皇宋某年始也臣竊為聖世病之臣頃在黃州親見纍嵗穀熟農夫連車載米入市不了鹽酪之費而蓄積之家日夜禱祠願逢饑荒又在浙西纍嵗親見水災中民之家有錢無穀被服珠金餓死于市此皆官收五穀力勝稅錢致商賈不行之咎也臣聞以物與人物盡而止以法活人法行無窮今陛下每遇災傷捐金帛散倉廩自元祐以來蓋所費數千萬貫石而餓殍流亡不為少衰只如去年浙西水災陛下使江西湖北雇船運米以救蘇湖之民蓋百餘萬石又計糴本水腳官費不資而客船被差雇者皆失業破産無所告訴與其官司費耗為害如此何似削去近日所立五穀力勝稅錢一條只行天聖附令免稅指揮則豐凶相濟農末皆利縱有水旱無大饑荒雖目下稍失課利而災傷之地不必盡煩陛下出捐錢穀如近嵗之多也今元祐編敕雖云災傷地分雖有例亦免而穀所從來必自豐熟地分所過不免收稅則商賈亦自不行議者或欲立法如一路災傷則鄰路免稅一州災傷則鄰州亦然雖比今之法小為通疏而隔一路一州之外豐凶不能相救未為良法須是盡削近嵗弊法專用天聖附令指揮乃為通濟謹具逐條如後天聖附令諸商販斛㪷及柴炭草木博糴糧食者並免力勝稅錢諸賣舊屋材柴草米麵之物及木鐵為農具者並免收稅其買諸色布帛不及匹而將出城及陂池取魚而非販易者並准此元豐令諸商販穀及以柴草木博糴糧食者並免力勝稅錢舊收稅處依舊例諸買舊材植或柴草榖麵及木鐵為農具者並免稅布帛不及端匹并捕魚非貨易者准此元祐敕諸興販斛㪷及以柴炭草木博糴糧食者並免納力勝稅錢舊收稅處依舊例即災傷地分雖有舊例亦免諸賣舊材植或柴草斛㪷并麵及木鐵為農具者並免收稅布帛不及端匹并捕魚非貨易者准此右臣竊謂若行臣言稅錢亦必不至大段失陷何也五穀無稅商賈必大通流不載見錢必有回貨見錢回貨自皆有稅所得未必減於力勝而災傷之地有無相通易為振救官司省費其利不可勝計今肆赦甚近若得於赦書帶下益見聖德收結民心實無窮之利取進止奏內中車子爭道亂行劄子元祐七年南郊軾為鹵簿使導駕內中朱紅車子十餘兩有張紅蓋者爭道亂行於乾明寺前軾於車中草此奏奏入上在太廟馳遣人以疏白太皇太后明日中使傳命申敕有司嚴整仗衛自皇后以下皆不復迎謁中道元祐七年十一月十三日南郊鹵簿使龍圖閣學士左朝奉郎守兵部尚書兼侍讀蘇軾劄子奏臣謹按漢成帝郊祠甘泉泰畤汾隂后土而趙昭儀常從在屬車間時揚雄待詔承明奏賦以諷其略曰想西王母欣然而上壽兮屏玉女而却虙妃言婦女不當與齊祠之間也臣今備位夏官職在鹵簿准故事郊祀既成乘輿還齊宫改服通天冠綘紗袍教坊鈞容作樂還內然後后妃之屬中道迎謁已非典禮而況方當祀事未畢而中宫掖庭得在勾陳豹尾之間乎竊見二聖崇奉大祀嚴恭寅畏度越古今四方來觀莫不悅服今車駕方宿齊太廟而內中車子不避仗衛爭道亂行臣愚竊恐於觀望有損不敢不奏乞賜約束仍乞取問隨行合干勾當人施行取進止再薦宗室令畤劄子元祐七年十二月二十二日龍圖閣學士左朝奉郎守兵部尚書兼侍讀蘇軾劄子奏臣前任潁州日曾論薦本州僉判承議郎趙令畤儒學吏術皆有過人恭儉篤行若出寒素意望朝廷特賜進擢以風曉宗室成先帝教育之志至今未䝉施行令畤今已得替在京若依前與外任差遣臣竊惜之欲乞檢㑹前奏詳酌施行取進止論髙麗買書利害劄子三首元祐八年二月初一日端明殿學士兼翰林侍讀學士左朝奉郎禮部尚書蘇軾劄子奏臣近准都省批送下國子監狀准館伴髙麗人使所牒稱人使要買國子監文字請詳批印造供赴當所交割本監檢准元祐令諸蕃國進奉人買書具名件申尚書省今來未敢支賣䝉都省送禮部看詳臣尋指揮本部令申都省除可令收買名件外其䇿府元龜歷代史太學敕式本部未敢便令收買伏乞朝廷詳酌指揮尋准都省批狀云勘㑹前次髙麗人使到關已曾許買䇿府元龜并北史今本部並不檢㑹體例所有人使乞買書籍正月二十七日送禮部指揮許收買其當行人吏上簿者臣伏見髙麗人使每一次入貢朝廷及淮浙兩路賜豫餽送燕勞之費約十餘萬貫而修飾亭館騷動行市調發人船之費不在焉除官吏得少餽遺外並無絲毫之利而有五害不可不陳也所得貢獻皆是玩好無用之物而所費皆是帑廩之實民之膏血此一害也所至差借人馬什物攪撓行市修飾亭館民力暗有陪填此二害也髙麗所得賜豫若不分遺契丹則契丹安肯聽其來貢顯是借寇兵而資盜糧此三害也髙麗名為慕義來朝其實為利度其本心終必為契丹用何也彼足以制其死命而我不能故也今使者所至圖畫山川形勝窺測虛實豈復有善意哉此四害也慶厯中契丹欲渝盟先以增置塘泊為中國之曲今乃招來其與國使頻嵗入貢其曲甚於塘泊幸今契丹恭順不敢生事萬一異日有桀黠之人以此藉口不知朝廷何以答之此五害也臣心知此五害所以熙寧中通判杭州日因其餽送書中不稱本朝正朔却退其物待其改書稱用年號然後受之仍催促進發不令住滯及近嵗出知杭州却其所進金塔不為奏聞及畫一處置沿途接待事件不令過當仍奏乞編配狡商猾僧并乞依祖宗編敕杭明州並不許發舶往髙麗違者徒二年沒入財貨充賞并乞删除元豐八年九月內創立許舶客專擅附帶外夷入貢及商販一條已上事並䝉朝廷一一施行皆是臣素意欲稍稍裁節其事庶幾漸次不來為朝廷消久逺之害今既備員禮曹乃是職事近者因見館伴中書舍人陳軒等申乞盡數差勒相國寺行鋪入館鋪設以待人使買賣不惟移市動衆奉小國之陪臣有損國體兼亦抑勒在京行鋪以資吏人廣行乞取弊害不小所以具申都省乞不施行其乖一作多方作弊官吏並不䝉都省略行取問今來只因陳軒等不待申請直牒國子監收買諸般文字內有䇿府元龜歷代史及敕式國子監知其不便申稟都省送下禮部看詳臣謹按漢書東平王宇來朝上疏求諸子及太史公書當時大臣以謂諸侯朝聘考文章正法度非理不言今東平王幸得來朝不思制節謹度以防違失而求諸書非朝聘之義也諸子書或反經術非聖人或明鬼神信物怪太史公書有戰國縱橫權譎之謀漢興之初謀臣竒䇿天官災異地形厄塞皆不宜在諸侯王家不可豫詔從之臣竊以謂東平王骨肉至親特以備位藩臣猶不得賜而況海外之裔夷契丹之心腹者乎臣聞河北𣙜埸禁出文書其法甚嚴徒以契丹故也今髙麗與契丹何異若髙麗可與即𣙜埸之法亦可廢兼竊聞昔年髙麗使乞賜太平御覽先帝詔令館伴以東平王故事為詞却之近日復乞詔又以先帝遺㫖不與今歷代史䇿府元龜及北史竊以謂前次本不當與若便以為例即上乖先帝遺㫖下與今來不賜御覽聖㫖異同深為不便故申都省止是乞賜詳酌指揮未為過當便䝉行遣吏人上簿書罪臣竊謂無罪可書雖上簿薄責至為末事於臣又無絲毫之損臣非為此奏論所惜者無厭小國事必曲從官吏茍循其意雖動衆害物不以為罪稍有裁節之意便行詰責今後無人敢逆其請使意得志滿其來愈數其患愈深所以須至極論仍具今來合處置數事如後一臣任杭州日奏乞明州杭州今後並不得發舶往髙麗䝉已立條行下今來髙麗使却搭附閩商徐積舶船入貢及行根究即稱是條前發舶臣竊謂立條已經數年海外無不聞知而徐積猶執前條公慿影庇私商往來海外雖有條貫實與無同欲乞特降指揮出榜福建兩浙沿海州縣與限半年內令繳納條前所發公慿如限滿不納敢有執用並許人告捕依法施行貼黃據陳軒所奏語録即是髙麗知此條今來髙麗使所欲買歷代史䇿府元龜及敕式乞並不許收買貼黃准都省批狀指揮人使所買書籍內有敕式若令外夷收買事體不便看詳都省本為䇿府元龜及北史前次已有體例故以禮部並不檢㑹為罪未委敕式有何體例一槩令買一近日館伴所申乞為髙麗使買金薄一百貫欲於杭州妝佛臣未敢許巳申稟都省竊慮都省復以為罪竊緣金薄本是禁物人使欲以妝佛為名久住杭州搔擾公私竊聞近嵗西蕃阿里庫乞買金薄朝廷重難其事節次量與應副今來髙麗使朝辭日數巳迫乞指揮館伴令以打造不出為詞更不令收買一近據館伴所申乞與髙麗使抄寫曲譜臣謂鄭衛之聲流行海外非所以觀德若畫朝㫖特為抄寫尤為不便其狀臣已收住不行貼黃臣前任杭州不受髙麗所進金塔雖曾密奏聞元只作臣私意拒絶兼自來館伴使臣若有所求請不可應副即須一面說諭不行或其事體大即候拒訖密奏今陳軒等事事曲從便為申請若不施行即顯是朝廷不許令使臣悅已而怨朝廷甚非館伴之體右所申都省狀其歷代史䇿府元龜及敕式乞詳酌指揮事並出臣意不干僚屬及吏人之事若朝廷以為有罪則臣乞獨當責罰所有吏人乞不上簿取進止貼黃臣謹按春秋晉盟主也鄭小國也而晉之執政韓起欲買玉環於鄭商人子産終不與曰大國之求若無禮以節之是鄙我也又晉平公使其臣范昭觀政於齊昭請齊景公之觴為壽晏子不與又欲奏成周之樂太師不許昭歸謂晉侯曰齊未可伐也臣欲亂其禮而晏子知之欲亂其樂而太師知之今髙麗使契丹之黨而我之陪臣也乃敢干朝廷求買違禁物傳寫鄭衛曲子譜䙝慢甚矣安知非契丹欲設此事以嘗探朝廷深淺難易乎而陳軒等事事為請惟恐失其意臣竊惑之又據軒等語録云髙麗使言海商擅往契丹本國王捉送上國乞更賜約束恐不穩便而軒乃答云風訊不順飄過乃是與閩中狡商巧說詞理許令過界竊緣私往北界條禁至重海外陪臣猶知遵稟而軒乃為歸咎於風以薄其罪豈不乖戾倒置之甚乎臣忝備侍從事關利害不敢不奏又元祐八年二月十五日端明殿學士兼翰林侍讀學士左朝奉郎守禮部尚書蘇軾劄子奏臣近奏論髙麗使所買書籍及金薄等事准尚書省劄子二月十二日三省樞密院同奉聖㫖所買書籍曾經收買者許依例收買金薄特許收買餘依奏吏人免上簿者臣所以區區論奏者本為髙麗契丹之與國不可假以書籍非止為吏人上簿也今來吏人獨免上簿而書薄仍許收買臣竊惑之檢會元祐編敕諸以熟鐵及文字禁物與外國使人交易罪輕者徒二年看詳此條但係文字不問有無妨害便徒二年則法意亦可見矣以謂文字流入諸國有害無利故立此重法以防意外之患前來許買䇿府元龜及北史已是失錯古人有言一之謂甚其可再乎今乃廢見行編敕之法而用一時失錯之例後日復來例愈成熟雖買千百部有司不敢復執則中國書籍山積於髙麗而雲布於契丹矣臣不知此事於中國得為穩便乎昔齊景公田招虞人以旌不至曰招虞人以皮冠孔子韙之曰守道不如守官夫旌與皮冠於事未有害也然且守之今買書利害如此編敕條貫如彼比之皮冠與旌亦有間矣臣當謹守前議不避再三論奏伏望聖慈早賜指揮取進止貼黃臣㸃檢得館伴使公案內有行下承受所收買文字數內有一項所買䇿府元龜敕式雖不曾賣與然髙麗之意亦可見矣又貼黃臣已令本部備録編敕條貫符下髙麗人使所過州郡約束施行去訖亦合奏知又元祐八年二月二十六日端明殿學士兼翰林侍讀學士左朝奉郎守禮部尚書蘇軾劄子奏臣近再具劄子奏論髙麗買書事今准敕節文檢㑹國朝㑹要淳化四年大中祥符九年天禧五年曾賜髙麗九經書史記兩漢書三國志晉書諸子厯日聖惠方隂陽地理書等奉聖㫖依前降指揮臣前所論奏髙麗入貢為朝廷五害事理灼然非復細故近又檢坐見行編敕再具論奏並不䝉朝廷詳酌利害及編敕法意施行但檢坐國朝㑹要已曾賜豫便為收買竊緣臣所論奏所計利害不輕本非為有例無例而發也事誠無害雖無例亦可若其有害雖百例不可用也而況㑹要之為書朝廷以備檢閲非如編敕一一皆當施行也臣只乞朝廷詳論此事當遵行編敕耶為當檢行㑹要而已臣所憂者文書積於髙麗而流於契丹使北人周知山川嶮要邊防利害為患至大雖曾賜豫乃是前日之失自今止之猶賢於接續許買蕩然無禁也又髙麗人入朝動獲所欲頻嵗數來馴致五害如此之類皆不䝉朝廷省察深慮髙麗人復來遂成定例所以須至再三論奏兼今來髙麗人已發無可施行取進止貼黃今來朝㫖止為髙麗巳曾賜豫此書復許接續收買譬編敕禁以熟鐵與人使交易豈是外國都未有熟鐵耶謂其已有反不復禁此大不可也繳進免五穀力勝稅錢議劄子前連元祐七年十一月劄子元祐八年三月十三日端明殿學士兼翰林侍讀學士左朝奉郎守禮部尚書蘇軾劄子奏臣聞應天以實不以文動民以行不以言去嵗扈從南郊親見百姓父老瞻望聖顔歡呼鼓舞或至感泣皆云不意今日復見仁宗皇帝臣尋與范祖禹具奏其狀矣竊揆聖心必有下酌民言上繼祖武之意兼奉聖㫖催促祖禹所編仁宗故事尋以上進訖臣愚竊謂陛下既欲祖述仁廟即須行其實事乃可動民去嵗十一月七日曾奏乞放免五穀力勝稅錢蓋謂此事出於天聖附令乃仁宗一代盛德之事入人至深及物至廣望陛下主張決事尋䝉降付三省遂送戶部下轉運司相度必無行理謹昧萬死再録前來劄子繳連進呈伏願聖慈特賜詳覽若謂所捐者小所濟者大可以追復仁宗聖政慰答民心即乞只作聖意批出施行若謂不然即乞留中更不降出免煩勘當取進止貼黃臣所乞放免五穀力勝稅錢萬一上合聖意有可施行欲乞內出指揮大意若曰祖宗舊法本不收五穀力勝稅錢近乃著令許依例收稅是致商賈無利有無不通豐年則穀賤傷農凶年則遂成饑饉宜令今後不問有無舊例並不得收五穀力勝稅錢仍於課內除豁此一項臣昧死以聞無任戰汗待罪之至上圓丘合祭六議劄子元祐八年三月日端明殿學士兼翰林侍讀學士左朝奉郎守禮部尚書蘇軾劄子奏臣伏見九月二十二日詔書節文俟郊禮畢集官詳議祠皇地祗事及郊祀之嵗廟饗典禮聞奏者臣恭覩陛下近者至日親祀郊廟神祗饗答實䝉休應然則圓丘合祭允當天地之心不宜復有改更臣竊惟議者欲變祖宗之舊圓丘祀天而不祀地不過以謂冬至祀天於南郊陽時陽位也夏至祀地於北郊隂時隂位也以類求神則陽時陽位不可以求隂也是大不然冬至南郊既祀上帝則天地百神莫不從也古者秋分夕月於西郊亦可謂隂位矣至於從祀上帝則以冬至而祀月於南郊議者不以為疑今皇地祗亦從上帝而合祭於圓丘獨以為不可則過矣書曰肆類于上帝禋于六宗望于山川遍于羣神舜之受禪也自上帝六宗山川羣神莫不畢告而獨不告地祗豈有此理哉武王克商庚戌柴望柴祭上帝也望祭山川也一日之間自上帝而及山川必無南北郊之别也而獨略地祗豈有此理哉臣以知古者祀上帝則并祀地祗矣何以明之詩之序曰昊天有成命郊祀天地也此乃合祭天地經之明文而說者乃以比之豐年秋冬報也曰秋冬各報而皆歌豐年則天地各祀而皆歌昊天有成命也是大不然豐年之詩曰豐年多黍多稌亦有髙廩萬億及秭為酒為醴蒸畀祖妣以洽百禮降福孔皆歌於秋可也歌於冬亦可也昊天有成命之詩曰昊天有成命二后受之成王不敢康夙夜基命宥密於緝熙單厥心肆其靖之終篇言天而不及地頌所以告神明也未有歌其所不祭祭其所不歌也今祭地於北郊歌天而不歌地豈有此理也臣以此知周之世祀上帝則地祗在焉歌天而不歌地所以尊上帝故其序曰郊祀天地也春秋書不郊猶三望左氏傳曰望郊之細也說者曰三望太山河海或曰淮海也又或曰分野之星及山川也魯諸侯也故郊之細及其分野山川而巳周有天下則郊之細獨不及五嶽四瀆乎嶽瀆猶得從祀而地祗獨不得合祭乎秦燔詩書經籍散亡學者各以意推類而已王鄭賈服之流未必皆得其真臣以詩書春秋考之則天地合祭久矣議者乃謂合祭天地始於王莽以為不足法臣竊謂禮當論其是非不當以人廢光武皇帝親誅莽者也尚采用元始合祭故事謹按後漢書郊祀志建武二年初制郊兆於洛陽為圓壇八陛中又為重壇天地位其上皆南鄉西上此則漢世合祭天地之明驗也又按水經注伊水東北至洛陽縣圓丘東大魏郊天之所凖漢故事為圓壇八陛中又為重壇天地位其上此則魏世合祭天地之明驗也唐睿宗將有事於南郊賈曾議曰有虞氏褅黃帝而郊嚳夏后氏禘黃帝而郊鯀郊之與廟皆有褅褅於廟則祖宗合食於太祖禘於郊則地祗羣望皆合於圓丘以始祖配享蓋有事祭非常祀也三輔故事祭於圓丘上帝后土位皆南面則漢嘗合祭矣時褚無量郭山惲等皆以曾言為然明皇天寶元年二月敕曰凡所祠享必在躬親朕不親祭禮將有闕其皇地祗宜如南郊合祭是月二十日合祭天地於南郊自後有事於圓丘皆合祭此則唐世合祭天地之明驗也今議者欲冬至祀天夏至祀地蓋以為用周禮也臣請言周禮與今禮之别古者一嵗祀天者三明堂饗帝者一四時迎氣者五祭地者二饗宗廟者四凡此十五者皆天子親祭也而又朝日夕月四望山川社稷五祀及羣小祀之類亦皆親祭此周禮也太祖皇帝受天眷命肇造宋室建隆初郊先饗宗廟並祀天地自真宗以來三嵗一郊必先有事景靈遍饗太廟乃祀天地此國朝之禮也夫周之禮親祭如彼其多而嵗行之不以為難今之禮親祭如此其少而三嵗一行不以為易其故何也古者天子出入儀物不繁兵衛甚簡用財有節而宗廟在大門之內朝諸侯出爵賞必於太廟不止時祭而已天子所治不過王畿千里唯以齊祭禮樂為政事能守此則天下服矣是故嵗嵗行之率以為常至於後世海內為一四方萬里皆聽命於上幾務之繁億萬倍於古日力有不能給自秦漢以來天子儀物日以滋多有加無損以至於今非復如古之簡易也今所行皆非周禮三年一郊非周禮也先郊二日而告原廟一日而祭太廟非周禮也郊而肆赦非周禮也優賞諸軍非周禮也自后妃以下至文武官皆得䕃補親屬非周禮也自宰相宗室以下至百官皆有賜賚非周禮也此皆不改而獨於地祗則曰周禮不當祭於圓丘此何義也議者必曰今之寒暑與古無異而宣王薄伐玁狁六月出師則夏至之日何為不可祭乎臣將應之曰舜一嵗而巡四嶽五月方暑而南至衡山十一月方寒而北至常山亦今之寒暑也後世人主能行之乎周所以十二嵗一巡者唯不能如舜也夫周已不能行舜之禮而謂今可以行周之禮乎天之寒暑雖同而禮之繁簡則異是以有虞氏之禮夏商有所不能行夏商之禮周有所不能用時不同故也宣王以六月出師驅逐玁狁蓋非得巳且吉父為將王不親行也今欲定一代之禮為三嵗常行之法豈可以六月出師為比乎議者必又曰夏至不能行禮則遣官攝祭祀亦有故事此非臣之所知也周禮大宗伯若王不與則攝位鄭氏注曰王有故則代行其祭事賈公彥疏曰有故謂王有疾及哀慘皆是也然則攝事非安吉之禮也後世人主不能嵗嵗親祭故命有司行事其所從來久矣若親郊之嵗遣官攝事是無故而用有故之禮也議者必又曰省去繁文末節則一嵗可以再郊臣將應之曰古者以親郊為常理故無繁文今世以親郊為大禮則繁文有不能省也若帷城幔屋盛夏則有風雨之虞陛下自宫入廟出郊冠通天乘大輅日中而舍百官衛兵暴露於道鎧甲具裝人馬喘汗皆非夏至所能堪也王者父事天母事地不可偏也事天則備事地則簡是於父母有隆殺也豈得以為繁文末節而一切欲省去乎國家養兵異於前世自唐之時未有軍賞猶不能嵗嵗親祠天子出郊兵衛不可簡省大輅一動必有賞給今三年一郊傾竭帑藏猶恐不足郊賚之外豈可復加若一年再賞國力將何以給分而與之人情豈不失望議者必又曰三年一祀天又三年一祭地此又非臣之所知也三年一郊已為疏闊若獨祭地而不祭天是因事地而愈疏於事天自古未有六年一祀天者如此則典禮愈壞欲復古而背古益逺神祗必不顧饗非所以為禮也議者必又曰當郊之嵗以十月神州之祭易夏至方澤之祀則可以免方暑舉事之患此又非臣之所知也夫所以議此者為欲舉從周禮也今以十月易夏至以神州代方澤不知此周禮之經耶抑變禮之權也若變禮從權而可則合祭圓丘何獨不可十月親祭地十一月親祭天先地後天古無是禮而一嵗再郊軍國勞費之患尚未免也議者必又曰當郊之嵗以夏至祀地祗於方澤上不親郊而通爟火天子於禁中望祀此又非臣之所知也書之望秩周禮之四望春秋之三望皆謂山川在境內而不在四郊者故逺望而祭也今所在之處俯則見地而云望祭是為京師不見地乎此六議者合祭可不之決也夫漢之郊禮尤與古戾唐亦不能如古本朝祖宗欽崇祭祀儒臣禮官講求損益非不知圓丘方澤皆親祭之為是也蓋以時不可行是故參酌古今上合典禮下合時宜較其所得已多於漢唐矣天地宗廟之祭皆當嵗遍今不能嵗遍是故遍於三年當郊之嵗又不能於一嵗之中再舉大禮是故遍於三日此皆因時制宜雖聖人復起不能易也今並祀不失親祭而北郊則必不能親往二者孰為重乎若一年再郊而遣官攝事是長不親事地也三年間郊當行郊地之嵗而暑雨不可親行遣官攝事則是天地皆不親祭也夫分祀天地決非今世之所能行議者不過欲於當郊之嵗祀天地宗廟分而為三耳分而為三有三不可夏至之日不可以動大衆舉大禮一也軍賞不可復加二也自有國以來天地宗廟唯饗此祭纍聖相承唯用此禮此乃神祗所歆祖宗所安不可輕動動之則有吉凶禍福不可不慮三也凡此三者臣熟計之無一可行之理伏請從舊為便昔西漢之衰元帝納貢禹之言毁宗廟成帝用丞相衡之議改郊位皆有殃咎著於史䇿往鑒甚明可為寒心伏望陛下詳覽臣此章則知合祭天地乃是古今正禮本非權宜不獨初郊之嵗所當施行實為無窮不刋之典願陛下謹守太祖建隆神宗熙寧之禮無更改易郊祀廟饗以敉寧上下神祗仍乞下臣此章付有司集議如有異論即須畫一解破臣所陳六議使皆屈伏上合周禮下不為當今軍國之患不可固執更不論當今可與不可施行所貴嚴祀大典蚤以時定取進止貼黃唐制將有事於南郊則先朝獻太清宫朝享太廟亦如今禮先二日告原廟先一日享太廟然議者或亦以為非三代之禮臣謹按武王克商丁未祀周廟庚戌柴望相去三日則先廟後郊亦三代之禮也請詰難圓丘六議劄子元祐八年三月二十二日端明殿學士兼翰林侍讀學士左朝奉郎守禮部尚書蘇軾劄子奏臣近奏論圓丘合祭天地非獨適時之宜亦自然上合三代六經為萬世不刋之典然臣不敢必以為是故發六議以開異同之端欲望聖㫖行下令議者與臣反覆詰難盡此六議之是非而取其通者則其論可得而定也今奉聖㫖但云令集議官集議聞奏竊慮議者各伸其意不相詰難則是非可否終莫之決雖聖明必有所擇而人各自為一議但欲遂其前說豈聖朝考禮之本意哉臣今欲乞集議之日若所見不同即須畫一難臣六議明著可否之狀不得但持一說不相詰難臣非敢自是而求勝也蓋欲從長而取通也若議不通敢不廢前說以從衆論取進止乞改居喪婚娶條狀元祐八年三月日端明殿學士兼翰林侍讀學士左朝奉郎守禮部尚書蘇軾狀奏臣伏見元祐五年秋頒條貫諸民庶之家祖父母父母老疾謂於法應贖者無人供侍子孫居喪者聽尊長自陳驗實婚娶右臣伏以人子居父母喪不得嫁娶人倫之正王道之本也孟子論禮色之輕重不以所重徇所輕喪三年為二十五月使嫁娶有二十五月之遲此色之輕者也釋喪而婚㑹鄰於禽犢此禮之重者也先王之政亦有適時從宜者矣然不立居喪嫁娶之法者所害大也近世始立女居父母喪及夫喪而貧乏不能自存並聽百日外嫁娶之法既已害禮傷教矣然猶或可以從權而冒行者以女弱不能自立恐有流落不虞之患也今又使男子為之此何義也哉男年至於可娶雖無兼侍亦足以養父母矣今使之釋喪而婚㑹是直使民以色廢禮耳豈不過甚矣哉春秋禮經記禮之變必曰自某人始使秉直筆者書曰男子居父母喪得娶妻自元祐始豈不為當世之病乎臣謹按此法本因邛州官吏妄有起請當時法官有失考論便為立法臣備位秩宗前日又因邇英進讀論及此事不敢不奏伏望聖慈特降指揮削去上條稍正禮俗謹録奏聞伏候敕㫖東坡全集卷六十三
