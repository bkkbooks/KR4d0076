body:
  text: 東坡全集卷一百十二宋蘇軾撰內制口宣一百二十二首賜大遼賀興龍節人使雄州回程御筵口宣元祐二年十二月二十八日有敕卿等聘事既成歸途尚邈屬此冰霜之候眷言來往之勤宜賜燕私少紓行役賜大遼賀正旦使副春幡勝口宣元祐二年十日二月二十九有敕剪刻之工風俗惟舊眷皇華之在館屬春陽之肇新宜有分頒以增賁飾賜大遼賀正旦使副射弓例物口宣元祐二年十二月二十九日有敕卿等出遊禁籞觀藝射侯弓矢既均禮儀卒度宜加寵錫以侑燕歡瀛洲賜大遼賀正旦人使回程御筵口宣元祐三年正月五日有敇卿等來修舊好逺冒祁寒涉歷冬春服勤郵傳式頒嘉燕以答久勞賜宰相吕公著上第二表乞致仕不允批答口宣元祐三年三月二十九日有敕朕以沖眇垂拱仰成卿以耉老圖任共政無故而去於義未安賜宰相吕公著乞致仕不允斷來章批答口宣元祐三年四月一日有敕卿望重縉紳義均休戚如左右手可須臾離雖屢形於懇詞必難移於朕意閣門賜新除守司空同平章軍國事吕公著誥口宣元祐三年四月七日有敕卿正位三公具瞻多士式資坐論以副仰成體朕眷懷服此明命閣門賜新除宰相吕大防范純仁誥口宣元祐三年四月七日有敕朕稽參衆庶登用俊良並建宰司同升揆路祗承明命仰副眷懷賜新除尚書左僕射吕大防尚書右僕射范純仁辭免恩命不允批答口宣元祐三年四月十一日有敕卿望重縉紳才兼文武弼亮之選中外同然毋或固辭以稱朕意賜吕公著辭恩命上第二表不允斷來章批答口宣元祐三年四月十二日有敕卿以全德式符具瞻宜與師臣共為民表欽承明命佇聽嘉謨賜范純仁吕大防辭恩命上第二表不允斷來章批答口宣元祐三年四月十三日有敇卿以宏材久與大政擢升宰輔實慰具瞻宜速拜嘉毋煩謙避賜新除門下侍郎孫固辭免恩命不允斷來章批答口宣元祐三年四月十四日有敇卿金華雋老西樞舊臣與政東臺實慰輿議祗膺成命毋復固辭賜劉摰辭免恩命不允斷來章批答口宣元祐三年四月十四日有敕稽參衆言蔽自朕志西臺之二無以逾卿亟踐厥官毋煩固避賜王存辭免恩命不允斷來章批答口宣元祐三年四月十四日有敕卿純忠許國雅望在人官以次升義無足避其承休寵以副眷懷賜胡宗愈辭免恩命不允斷來章批答口宣元祐三年四月十四日有敇卿雅望在人純忠許國既以彚進胡為力辭宜體至懷即膺成命賜趙瞻辭免恩命不允斷來章批答口宣元祐三年四月十四日有敕朝廷用人議論先定不次之舉非卿孰宜亟服休恩毋煩固避賜河北西路諸軍秋季銀鞋兼傳宣撫問臣寮將校口宣元祐三年四月十八日有敇卿等憂寄之深疆事靡盬眷言勞勩想各平寧體我至懷受兹時賜宣詔許內翰入院口宣元祐三年四月十九日有敕卿拔自循良老於文學禁林之命儒者所榮往祗厥司以究所藴白溝驛賜大遼賀坤成節人使御筵兼傳宣撫問口宣元祐三年四月二十二日有敇卿等逺涉暑途來陳慶幣眷言徒御久犯風埃往賜燕娛少休行役賜大遼賀坤成節人使生餼口宣元祐三年五月十日有敕卿等肅將鄰好來慶誕辰徒馭久勞館字初定宜頒委積以示寵章賜安燾乞退不允斷來章批答口宣元祐三年六月一日有敕卿以舊德首冠西樞雅望既隆仰成彌重宜安厥位以卒輔豫賜北京恩冀等州修河官吏及都運運使運判監丞等銀合茶藥并兵級等夏藥特支兼傳宣撫問口宣元年三年六月十四日有敇卿等夙夜河壖暴露野次兹屬暑雨深軫豫懷往示寵頒少慰勞苦撫問保寧軍節度使知大名府馮京兼賜銀合茶藥口宣元祐三年六月十四日有敇河役方興吏士在野暑雨之際綏御為勞膺此寵頒尚加慎護賜太中大夫守尚書左僕射兼門下侍郎吕大防生日禮物口宣元祐三年六月二十二日有敇乃眷良辰篤生元輔豈獨縉紳之望允為河華之英今遣爾甥往致朕命受兹休寵永介壽祺賜皇弟山南東道節度使開府儀同三司大寧郡王佖生日禮物口宣元祐三年六月二十二日有敕乃眷賢王篤生兹日本枝之慶華萼相承宜分廄庫之良以致喬松之壽賜大遼人使賀坤成節入見訖歸驛御筵口宣元祐三年七月八日有敕卿等初柅使車已陳慶幣退安館舍往錫燕觴式示眷懷且旌勞勩賜大遼人使賀坤成節入見訖歸驛酒果口宣元祐三年七月八日有敕卿等趨庭致命就館即安少休行役之勞宜示眷懷之異式昭寵數往錫甘芳班荆館賜大遼賀坤成節人使回程御筵口宣元祐三年七月八日有敕卿等使事畢陳還車載啓改轅而北弭節少留就錫燕嘉式昭禮遇玉津園賜大遼賀坤成節人使射弓例物口宣元祐三年七月九日有敕卿等既陳慶幣復展射侯豈獨娛賓亦將觀德宜有珍良之錫以旌審固之能賜殿前司罷散坤成節道場香酒果口宣元祐三年七月九日有敇卿忠存衛上義切戴君爰祝壽山克成梵供宜加寵錫以示眷懷賜宗室開府儀同三司以下罷散坤成節道場香酒果口宣元祐三年七月九日有敇卿以令德懿親共輸誠悃名藍法供虔祝壽祺既徹淨筵宜加寵錫賜馬步軍司罷散坤成節道場香酒果口宣元祐三年七月十二日有敇卿等共罄臣衷力祈慈壽爰修法會亦既告成宜有寵頒以旌誠慤賜知樞密院事安燾已下罷散坤成節道場香酒果口宣元祐三年七月十二日有敕卿等忠存廟社義篤君親嘉法會之有成祝聖齡於無極宜加寵賚以示眷懷賜皇伯祖嗣濮王宗暉已下罷散坤成節道場香酒果口宣元祐三年七月十二日有敕卿等為國懿親助我孝治祝慈闈之永壽成法會於兹辰宜有寵頒以精忠悃賜皇叔楊王醴泉觀罷散坤成節道場香酒果口宣元祐三年七月十二日有敕卿等以周邵之親躬任姒之眷一作養力祈壽嘏祗扣佛乘既徹淨筵宜膺寵賚賜太師文彥博已下罷散坤成節道場香酒果口宣元祐三年七月十二日有敕元老在廷百官承式啓法筵於梵宇祝壽嘏於慈闈宜有寵頒以助燕喜相州賜大遼賀坤成節人使却回御筵口宣元祐三年七月十三日有敇卿等逺飭征驂少休近郡載惟勤勩良極軫懷往錫宴觴以華歸騎瀛洲賜大遼賀坤成節人使回程御筵口宣元祐三年七月十三日有敕卿等逺聘通歡言歸復命改轅北道弭節邊城宜錫燕觴少休行役賜護國軍節度使濟陽郡王曹修罷散坤成節道場香酒果口宣元祐三年七月十三日有敇卿以耆德首冠戚藩虔祝壽祺告成法會宜加寵賚以助燕私班荆館賜大遼賀坤成節人使回程酒果口宣元祐三年七月十三日有敇卿等致命言還改轅伊始暑雨方作徒馭實勞宜有寵頒以昭眷遇就驛賜大遼國賀坤成節人使宴口宣元祐三年七月十六日有敕卿等逺馳使傳來會誕辰言念勤勞宜加旌寵特頒燕喜以示眷懷就驛賜大遼賀坤成節人使花酒果口宣元祐三年七月十六日有敕卿等肅將慶幣來舉壽觴臨遣輔臣往頒燕豆仍加寵賚以示眷懷賜新除殿前副都指揮使武泰軍節度使苗授辭免恩命第二表不允批答口宣元祐三年日七月二十有敕卿早練武經晚著邊效進持帥節實允僉言矧以次遷無煩懇避撫問秦鳳路臣寮口宣元祐三年七月二十四日有敕卿等久以選掄出分憂寄疆場之重綏御為勞宜示眷懷往宣指諭閣門賜新除徐王誥口宣元祐三年八月十二日有敇卿望隆尊屬德冠宗藩改殿大邦實諧羣議往服朕命以為國華賜皇叔新封徐王上第二表辭免恩命不允斷來章批答口宣元祐三年八月十五日有敕朕始升徐方以胙叔父庶幾大彭之壽罔愧元王之賢毋復屢辭亟膺成命賜太師文彥博乞致仕不允斷來章批答口宣元祐三年九月五日有敇耆老在位華夷聳觀若聽公歸恐失民望朕命不再公其少留相州賜大遼賀興龍節使副御筵口宣元祐三年十一月六日有敇卿等將命鄰邦服勤郵傳久薄風霧少休車徒宜體眷懷式同燕衎賜皇伯祖宗晟辭免起復恩命不允批答口宣元祐三年十一月十日有敇官不可曠禮有從權茍愛君如愛親則王事為家事勉遵舊服少屈私誠賜皇伯祖宗晟辭免起復恩命不允斷來章批答口宣元祐三年十一月十八日有敕卿哀慕未衰懇辭彌切既寒暑之一變宜忠孝之兩全勉從朕言起服乃事賜駙馬都尉李瑋已下罷散興龍節道場香酒果口宣元祐三年十一月三十日有敕震夙紀辰邇遐同祝乃眷戚藩之重預修淨供之嚴亦既告成宜膺寵錫賜殿前副都指揮使苗授已下罷散興龍節道場香酒果口宣元祐三年十一月三十日有敕卿等以衛上之忠屬誕彌之慶預嚴淨會以薦壽祺及此告成宜加寵賚賜權管句馬軍司公事姚麟已下罷散興龍節道場酒果口宣元祐三年十一月三十日有敕卿等率職周廬歸誠梵宇共致延鴻之祝出於忠愛之深宜錫珍芳以助燕衎興龍節尚書省賜知樞密院事安燾已下酒果口宣元祐三年十一月三十日有敇卿等任重樞機忠存廟社屬誕辰之薦壽修法會以告成錫以珍芳助其燕喜賜大遼賀興龍節人使生餼口宣元祐三年十二月一日有敕卿等逺持慶幣申講鄰歡徒馭有華舍館方定宜往餼牽之錫以旌郵傳之勤賜濟陽郡王曹修罷散興龍節道場香酒果口宣元祐三年十二月一日有敕卿寵冠戚藩望隆舊德將祝無疆之壽故修最上之乘既徹淨筵宜膺寵錫賜皇伯祖嗣濮王宗暉已下罷散興龍節道場香酒果口宣元祐三年十二月一日有敕眷我宗英乃心王室修彼龍天之供慶兹虹電之祥宜有頒分以成燕喜賜皇叔祖同知大宗正事宗景罷散興龍節道場香酒果口宣元祐三年十二月一日有敕乃眷宗英祗率藩服慶誕辰而薦壽修淨會以告成宜有分頒以助燕喜賜皇叔徐王罷散興龍節道場香酒果口宣元祐三年十二月二日有敕卿望隆周召德邁間平屬誕慶之紀辰仗佛乘而薦祉助兹宴喜錫以柔嘉賜文太師已下罷散興龍節道場香酒果口宣元祐三年十二月二日有敇乃眷師臣身先百辟有嚴淨供祗薦萬齡宜有分頒以助燕喜賜樞密安燾以下罷散興龍節道場香酒果口宣元祐三年十二月二日有敇樞機之臣社稷是衛夙設人天之供共祈箕翼之祥宜膺寵頒式助燕喜班荆館賜大遼賀興龍節人使到闕御筵口宣元祐三年十二月五日有敇卿等逺將鄰好至止都門屬霜霧之嚴凝念車徒之勤瘁宜伸燕衎以示眷懷賜大遼賀興龍節人使朝辭訖就驛酒果口宣元祐三年十二月五日有敕卿等畢事告旋指期言邁念征途之勞瘁迫徂歲之沍寒體我至懷膺兹寵錫賜大遼賀興龍節人使朝辭訖歸驛御筵口宣元祐三年十二月五日有敕卿等聘事告成陛辭言邁念歸途之云逺復賓館之少留體我眷懷共兹宴喜七日賜大遼賀興龍節人使內中酒果口宣元祐三年十二月五日有敕卿等柅車就館布幣造廷既欣鄰好之修復歎使華之美就加寵賚式示眷存玉津園賜大遼賀興龍節人使射弓御筵口宣元祐三年十二月五日有敕卿等使節有華鄰歡載講既娛賓於靈囿將觀德於射侯宜有寵頒以旌命中相州賜大遼賀正旦人使御筵口宣元祐三年日十二月六有敕卿等春朝畢會鄰聘交馳屬徂歲之沍寒念逺勤於行李往頒燕衎以重使華班荆館賜大遼賀興龍節人使回程御筵口宣元祐三年十二月六日有敇卿等告辭中禁改乘北轅屬晚歲之嚴凝念征途之悠緬往頒嘉燕可復少留十日賜大遼賀興龍節人使內中酒果口宣元祐三年十二月七日有敕卿造廷稱壽率禮可觀豈惟鄰好之修亦見使華之美宜膺寵錫以示至恩班荆館賜大遼賀興龍節人使却回酒果口宣元祐三年十二月七日有敇卿等改轅北路供帳都門風埃浩然徒馭勤止宜膺寵錫以示恩華瀛洲賜大遼賀興龍節人使回程御筵口宣元祐三年十二月七日有敕卿等回車北道弭節邊亭使事已終歸驂少憩往頒燕衎益厚眷存賜皇弟普寧郡王似生日禮物口宣元祐三年日十二月七有敕朕之介弟生以兹辰眷棣萼之相輝祝椿齡之難老宜同慶喜往致寵頒相州賜大遼賀興龍節人使回程御筵口宣元祐三年十二月九日有敕卿等夙駕歸軒少休旁郡眷言勞勩良極顧懷往錫燕嘉以旌恩眷趙州賜大遼賀正旦使副茶藥口宣元祐三年日十二月十有敕卿等逺修舊好屬此沍寒載歷山川久蒙霜露宜有精良之賜式彰軫念之懷趙州賜大遼賀太皇太后正旦使副茶藥口宣元祐三年十二月十日有敕卿等逺馳四牡來慶三朝屬此歲寒勞於行役宜膺寵錫以示眷存興龍節尚書省賜宰相已下酒果口宣元祐三年十二月十日有敕誕彌之慶中外所同眷我臣鄰共兹燕喜宜加寵賚以示眷懷就驛賜大遼賀興龍節使副鈔鑼等口宣元祐三年十二月二十二日有敕卿等肅將鄰好逺涉寒塗眷言授館之初宜有勞來之禮往加寵錫以示眷懷玉津園賜大遼賀正旦人使射弓例物口宣元祐三年閏十二月三日有敇射以娛賔抑將觀德發而命中曾不出正宜旌審固之能膺受珍良之賜撫問知大名府馮京口宣元祐三年閏十二月八日有敇卿等夙分重寄言念久勞歲聿云周王事靡盬益加輔養以副眷懷冬季傳宣撫問河北東路沿邊臣寮口宣元祐三年閏十二月八日有敕疆場之守職思其憂霜露既凝歲聿云暮宜加厚愛以副眷懷賜大遼賀正旦人使銀鈔鑼唾盂子錦被等口宣元祐三年閏十二月十八日有敇卿等逺將鄰好來慶春朝眷言跋履之勤宜有珍華之錫受兹異寵體我至懷雄州撫問大遼賀正旦人使口宣元祐三年閏十二月二十五日有敇卿等肅將慶幣來會春朝逺犯風埃實勞徒馭欣聞入境良慰眷懷賜大遼賀正旦人使正月一日就驛御筵口宣元祐三年閏十二月二十五日有敇使華逺至春律肇新即卿舍館之安昭我惠慈之眷往陳燕豆以樂佳辰賜大遼賀正旦人使內中酒果口宣元祐三年閏十二月二十五日有敕卿等瑞車華軒來修舊好醇醪珍實以薦新春膺此寵頒體豫異眷班荆館賜大遼賀正旦人回程御筵口宣元祐三年閏十二月二十五日有敕卿等使事告成旋車言邁方改轅於北道暫弭節於都門昭示眷懷少留宴衎賜于闐國進奉人正旦就驛御筵口宣元祐三年閏十二月二十五日有敕重驛逺來觀光戾止屬人正之改律樂天敘之發春宜示寵休式同燕喜雄州賜大遼國賀正旦人使回程御筵兼傳宣撫問口宣元祐三年閏十二月二十五日有敕卿等已事告歸柅車少憩眷言長道逺犯餘寒宜賜燕嘉以旌勞勩瀛洲賜大遼賀正旦人使回程御筵口宣元祐三年閏十二月二十九日有敕卿等已聘言還犯寒逺邁方脂車於北道復弭節於邊城宜賜宴嘉以旌勞勩班荆館賜大遼賀正旦人使却回酒果口宣元祐四年正月一日有敕卿等還璋言邁弭節少留念鞭轡之方勤涉冰霜之餘凛宜陳燕爼以寵歸軒正月六日朝辭訖就驛賜大遼賀正旦人使御筵口宣元祐四年正月一日有敇卿等使事告成陛辭言邁命近臣之往勞庶逺道之少留體我眷懷共兹宴衎撫問鄜延路臣寮口宣元祐四年正月八日有敇卿等分寄邊陲輯寧吏士眷言勤勩良極軫懷往致朕言各宜尚慎撫問鄜延路臣寮口宣元祐四年六月十一日有敕卿等各膺器使祗服邊陲眷兹靖安時乃忠力特加勞問以示顧懷賜右正議大夫守尚書左僕射吕大防生日禮物口宣元祐四年六月十一日有敕惟兹榖旦生我元臣爰分服食之良往助閨門之喜式為爾壽宜識朕心賜皇叔徐王皓生日禮物口宣元祐四年六月二十一日有敕乃眷賢王實為社稷之衛載臨誕日永集邦家之休臨遣使車往致眉壽就驛賜大遼賀坤成節人使銀鑼等口宣元祐四年六月二十三日有敕卿等逺勤使節展慶誕辰畏暑長途方即安於舍館精金良幣冝往致於私恩賜皇弟大寧郡王佖生日禮物口宣元祐四年六月二十五日有敇桑蓬示喜復臨載育之辰金幣展親往致友于之愛膺豫寵賚俾爾壽昌班荆館賜大遼賀坤成節國信使副到闕酒果口宣元祐四年七月四日有敕卿等抗旃逺道解鞅近郊念館舍之未安宜驂騑之少憩式頒芳旨以示眷懷賜馬步軍太尉姚麟已下罷散坤成節道場香酒果口宣元祐四年七月四日有敕卿等誕辰祗慶法會告成嘉與函生同躋壽域往頒芳旨以勞忠勤賜大遼坤成節使副生餼口宣元祐四年七月七日有敕卿等抗旜暑路弭節驛亭眷惟行李之勤往致珍鮮之餽膺兹寵數明我眷懷雄州白溝驛賜大遼賀坤成節人使却回御筵兼傳宣撫問口宣元祐四年七月七日有敇卿等飛蓋西風改轅北道喜山川之漸近忘徒御之久勞往致眷懷少留燕衎玉津園賜大遼賀坤成節人使射弓例物口宣元祐四年七月八日有敇卿等圭璋致命既已講歡弓矢娛賓亦將觀德宜有珍華之賜以旌審固之能賜殿前都指揮使已下罷散坤成節道場香酒果口宣元祐四年七月九日有敇誕彌之慶海宇攸同嘉將帥之協恭設人天之妙果宜均寵錫以示褒優賜皇伯祖高密郡王宗晟已下罷散坤成節道場香酒果口宣元祐四年七月九日有敕眷我宗英志存忠報修等慈之妙供祝難老之昌期嘉此精誠均其慶賜賜同知樞密院事韓忠彥已下罷散坤成節道場香酒果口宣元祐四年七月九日有敕嘉我樞臣義均一體修兹淨供慶續千齡不有寵頒曷旌忠報相州賜大遼賀坤成節人使却回御筵口宣元祐四年七月九日有敇鄰好既成使華有耀眷邦畿之漸逺念郵傳之方勤服我恩私少留燕喜賜大遼國賀坤成節使副時花酒果口宣元祐四年七月十日有敇鄰歡既展賓館歸休宜分盞斚之醇復致瓜華之侑少將至意其服茂恩賜平海軍節度使駙馬都尉李瑋已下罷散坤成節道場香酒果口宣元祐四年七月十日有敕卿等義重戚藩志同忠報屬誕辰之均慶嘉法會之告成宜示褒優特加寵賚坤成節尚書省賜宰相已下御筵酒果口宣元祐四年七月十一日有敇忠存柱石誠貫人天共欣誕日之臨既畢祗園之會宜頒芳旨以助燕私坤成節賜同知樞密院事韓忠彥已下尚書省御筵酒果口宣元祐四年七月十二日有敕修佛勝因祈天永命既肅成於梵供益表見於忠誠宜有寵頒以同燕喜賜徐王罷散坤成節道場香酒果口宣元祐四年七月十二日有敕卿親賢莫二忠孝實兼饌蒲塞於祗園薦椿齡於崇慶喜成法會宜有寵頒賜大遼賀坤成節人使朝辭訖歸驛御筵口宣元祐四年七月十二日有敕卿等已聘告歸少休就館即頒燕爼臨遣輔臣式示異恩以榮回馭班荆館賜大遼賀坤成節人使回程御筵口宣元祐四年七月十二日有敕卿等方事回轅聊兹弭蓋念征途之尚永加秋暑之未衰往錫燕嘉少休徒馭賜宰相吕大防已下罷散坤成節道場香酒果口宣元祐四年七月十二日有敕卿等竭誠衛上體國均休恪修西竺之儀仰獻南山之祝宜膺寵錫以示褒優賜大遼賀坤成節使副內中酒果口宣元祐四年七月十二日有敕卿等來陳慶幣克講鄰歡載嘉逺聘之勤宜示寵綏之意頒兹芳旨服我恩私賜大遼賀坤成節人使朝辭訖歸驛酒果口宣元祐四年七月十二日有敕卿等逺敦使事率禮無違既上謁辭言還有日宜加頒錫益示寵榮坤成節就驛賜阿里庫進奉人使御筵口宣元祐四年七月十四日有敕汝等來修貢篚適遘誕辰宜均慶賜之恩共樂亨嘉之會往頒燕爼咸極歡心瀛洲賜大遼賀坤成節人使回程御筵口宣元祐四年七月十四日有敕鞭轡既勞封疆漸邇雖勤歸念少憩暑途服我恩私式同燕喜坤成節就驛賜于闐國進奉人使御筵口宣元祐四年七月十四日有敕汝等奉琛逺至授館少留適遘誕辰宜均慶澤欽承恩渥共樂燕私班荆館賜大遼賀坤成節人使回程酒果口宣元祐四年七月十七日有敇卿等奉璋來聘弭節言還眷此暑途少留歸馭往頒燕爼式示恩私賜新除守司空同平章軍國事吕公著辭免不允批答口宣有敕朕圖任元老以表四方以卿望在士民心存社稷勉膺異數式副僉言賜皇弟普寧郡王似生日禮物口宣有敕歲將更端月亦既望實以兹日篤生賢王宜厚寵頒以介多福班荆館賜大遼賀坤成節人使回程香酒果口宣有敕卿等講成聘禮歸次都門復此少留逝將言邁宜頒餞斚以寵行驂東坡全集卷一百十二
