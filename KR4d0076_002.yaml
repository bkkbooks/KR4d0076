body:
  text: 東坡全集巻二宋蘓軾撰詩八十三首和子由記園中草木十一首煌煌帝王都赫赫走羣彦嗟汝獨何為閉門觀物變㣲物豈足觀汝獨觀不倦牽牛與葵蓼採摘入詩巻吾聞東山傅置酒擕嬿婉富貴未能忘聲色聊自遣汝今又不然時節看瓜蔓懐寶自足珍藝蘭那計畹吾歸於汝處慎勿嗟歳晩荒園無數畆草木動成林春陽一已敷妍醜各自矜蒲萄雖滿架困倒不能任可憐病石榴花如破紅襟葵花雖粲粲蔕淺不勝簮叢蓼晚可喜輕紅隨秋深物生感時節此理等廢興飄零不自由盛亦非汝能種栢待其成栢成人亦老不如種叢篲春種秋可倒隂陽不擇物美惡隨意造栢生何苦艱似亦費天巧天工巧有幾肯盡為汝耗君看藜與藿生意常草草萱草雖微花孤秀自能拔亭亭亂葉中一一芳心插牽牛獨何畏詰曲自牙蘖走尋荆與榛如有宿昔約南齋讀書處亂翠曉如潑偏工貯秋雨嵗嵗壊籬落蘆筍初似竹稍開葉如蒲方春節抱甲漸老根生鬚不愛當夏緑愛此及秋枯黄葉倒風雨白花摇江湖江湖不可到移植苦勤劬安得雙野鴨飛來成畫圖行樂惜芳晨秋風常苦早誰知念離别喜見秋𤓰老秋𤓰感霜霰莖葉颯已槁宦逰歸無時身若馬繫皁悲鳴念千里耿耿志空抱多憂竟何為使汝𤣥髪縞官舍有叢竹結根問囚㕔下為人所徑上宻不容釘慇懃戒吏卒插棘䕶中庭遶砌忽墳裂走鞭瘦竛竮我常擕枕簟來此䕃寒青日暮不能去卧聴牕風泠芎藭生蜀道白芷來江南漂流到闗輔猶不失芳甘濯濯翠莖滿愔愔清露涵及其未花實可以資筐籃秋節忽已老苦寒非所堪斸根取其實對此㣲物慙自我來關輔南山得再逰山中亦何有草木媚深幽菖蒲人不識生此亂石溝山高霜雪苦苗葉不得抽下有千歲根蹙縮如蟠虬長為鬼神守德薄安敢偷我歸自南山山翠猶在目心隨白雲去夢繞山之麓汝從何方來笑齒粲如玉探懐出新詩秀語奪山緑覺來已茫昧但記說秋菊有如採樵子入洞聴琴筑歸來寫遺聲猶勝人間曲八月十一日夜宿府學方和此詩夢與弟逰南山出詩數十篇夢中甚愛之及覺唯記一句云蟋蟀悲秋菊野菊生秋澗芳心空自知無人驚歳晩唯有暗蛩悲花開澗水上花落澗水湄菊衰蛩亦蟄與汝嵗相期楚客方多感秋風詠江籬落英不滿匊何以慰朝饑周公廟廟在岐山西北七八里廟後百許歩有泉依山湧冽異常國史所謂潤德泉世亂則竭者也吾今那復夢周公尚喜秋來過故宫翠鳯舊依山硉兀清泉長與世窮通至今逰客傷離黍故國諸生詠雨濛牛酒不來烏鳥散白楊無數暮號風南溪之南竹林中新構一茆堂予以其所處最為深䆳故名之避世堂猶恨溪堂淺更穿修竹林高人不畏虎避世已無心隠几頽如病忘言兀以瘖茆茨追上古冠蓋謝當今曉夢猨呼覺秋懐鳥伴吟暫來聊解帶屢去欲擕衾湖上行人絶堦前暮雪深應逢緑毛叟叩戸夜抽簪自清平鎭逰樓觀五郡大秦延生仙逰徃反四日得十一詩寄舎弟子由同作樓觀鳥噪猨呼晝閉門寂寥誰識古皇尊青牛久已辭轅軛白鶴時來訪子孫山近朔風吹積雪天寒落日淡孤村道人應怪逰人衆汲盡堦前井水渾五郡古觀正依林麓斷居民來說水泉甘亂谿赴渭爭趨北飛鳥迎山不復南羽客衣冠朝上象野人香火祝春蠶汝師豈解言符命山鬼何知託老耼觀有明皇碑言夢老子告以享國長久之意授經臺乃南山一峯耳非復有築處劍舞有神通草聖海山無事化琴工此臺一覽秦川小不待傳經意已空大秦寺晃蕩平川盡坡陁翠麓横忽逢孤塔逈獨向亂山明信足幽尋逺臨風却立驚原田浩如海衮衮盡東傾仙逰潭五首潭上有寺三二在潭北循黒水而上為東路至南寺渡黒水西里餘從馬北上為西路至北寺東路險不可騎馬而西路隔潭潭水深不可測上以一木為橋不敢過故南寺有塔望之可愛而終不能到翠壁下無路何年雷雨穿光摇巖上寺深到影中天我欲然犀看龍應抱寶眠誰能孤石上危坐試僧禪潭東去愁攀石西來怯渡橋碧潭如見試白塔苦相招野餽慙微薄村沽慰寂寥路窮斤斧絶松桂得干霄南寺唐初傳有此亂後不留碑畏虎闗門早無村得米遲山泉自入甕野桂不勝炊信美那能久應先學忍饑北寺未應將軍聘初從季直逰絳紗生不識蒼石尚能留豈害依梁冀何須困李侯吾詩慎勿刻猿鶴為君羞馬融石室洞裏吹簫子終年守獨幽石泉為曉鏡山月當簾鈎歳晩杉楓盡人歸霧雨愁送迎應鄙陋誰繼楚臣謳玉女洞愛玉女洞中水既致兩瓶恐後復取而為使者見紿因破竹為契使寺僧藏其一以為徃來之信戲謂之調水符欺謾久成俗闗市有契繻誰知南山下取水亦置符古人辨淄澠皎若鶴與鳬吾今既謝此但視符有無常恐汲水人智出符之餘多防竟無及棄置為長吁自仙逰回至黒水見居民姚氏山亭高絶可愛復憩其上山鵶曉辭谷似報逰人起出門猶屢顧慘若去吾里道途險且迂繼此復能幾溪邊有危構歸駕聊復柅愛此山中人縹緲如仙子平生慕獨徃官爵同一屣胡為此谿邊眷眷若有竢國恩久未報念此慙且泚臨風浩悲咤萬世同一軌何年謝簪紱丹砂留迅晷南谿有㑹景亭處衆亭之間無所見甚不稱其名余欲遷之少西臨斷岸西嚮可以逺望而力未暇特為製名曰招隠仍為詩以告來者庶幾遷之飛簷臨古道髙榜勸逰人未即令公隠聊須濯路塵茆茨分聚落烟火傍城闉林缺湖光漏牕明野意新居民惟白帽過客謾朱輪山好留歸屐風迴落醉巾他年誰改築舊製不須因再到吾雖老猶堪作坐賔凌虛臺才髙多感激道直無徃還不如此臺上舉酒邀青山青山雖云逺似亦識公顔崩騰赴幽賞披豁露天慳落日銜翠壁暮雲㸃烟鬟浩歌清興發放意末禮删是時歳云暮微雪灑袍斑吏退迹如掃賔來勇躋攀臺前飛鴈過臺上彫弓彎聯翩向空墜一笑驚塵寰竹􅔺野人獻竹􅔺腰腹大如盎自言道旁得採不費罝罔鴟夷譲圓滑混沌慙瘦爽兩牙雖有餘四足僅能髣逢人自驚蹶悶若兒脱襁念兹㣲陋質刀几安足枉就禽太倉卒羞愧不能饗南山有孤熊擇獸行䑛掌渼陂魚陂在鄠縣霜筠細破為雙掩中有長魚如卧劍紫荇穿顋氣慘悽紅鱗照坐光磨閃擕來雖逺鬛尚動烹不待熟指先染坐客相看為解顔香粳飽送如填塹早歳嘗為荆渚客黄魚屢食沙頭店濵江易採不復珍盈尺輒棄無乃僣自從西征復何有欲致南烹嗟久欠游修瑣細空自腥亂骨縱横動遭砭故人逺餽何以報客俎久空驚忽贍東道無辭信使頻西隣幸有庖虀釅讀道藏嗟子亦何幸偶此琳宫居宫中復何有戢戢千函書盛以丹錦囊冒以青霞𥚑王喬掌闗籥蚩尤守其廬乗閒竊掀攪渉獵豈暇徐至人悟一言道集由中虛心閑反自照皎皎如芙蕖千載厭世去此言乃蘧蒢人皆忽其身治之用土苴何暇及天下幽憂吾未除十二月十四日夜㣲雪明日早徃南谿小酌至晩南谿得雪真無價走馬來看及未消獨自披榛尋履迹最先犯曉過朱橋誰憐破屋眠無處坐覺村飢語不囂惟有暮鵶知客意驚飛千片落寒條九月中曽題二小詩於南溪竹上既而忘之昨日再逰見而録之湖上蕭蕭疎雨過山頭靄靄暮雲横陂塘水落荷將盡城市人歸虎欲行誰謂江湖居而為虎豹宅焚山豈不能愛此千竿碧司竹監燒葦園因召都廵檢柴貽朂左藏以其徒㑹獵園下官園刈葦歲留槎深冬放火如紅霞枯槎燒盡有根在春雨一洗皆萌芽黄狐老兔最狡㨗賣侮百獸常矜誇年年此厄竟不悟但愛䝉宻爭來家風迴熖巻毛尾熱欲出已被蒼鷹遮野人來言此最樂徒手曉出歸滿車巡邊將軍在近邑呼來颯颯從矛叉戍兵久閒可小試戰鼓雖凍猶堪撾雄心欲搏南澗虎陣勢頗學常山蛇霜乾火烈聲爆野飛走無路號且呀迎人截來砉逢箭避犬逸去窮投罝擊鮮走馬殊未厭但恐落日催棲鵶弊旗仆鼓坐數獲鞍挂雉肩分麚主人置酒聚狂客紛紛醉語晩更譁燎毛燔肉不暇割飲㗖直欲追羲媧青丘雲夢古所咤與此何啻百倍加苦遭諫䟽說夷羿又被賦客嘲滛奢豈如閒官走山邑放曠不與趨朝衙農工已畢歲云暮車騎雖少賔殊佳酒酣上馬去不告獵獵霜風吹帽斜和子由木山引水二首蜀江久不見滄浪江上枯槎逺可將去國尚能三犢載汲泉何愛一夫忙﨑嶇好事人應笑冷淡為歡意自長遥想納涼清夜永牕前微月照汪汪千年古木卧無梢浪巻沙飜去似瓢幾度過秋生蘚暈至今流潤應江潮泫然疑有蛟龍吐斷處人言霹靂焦材大古來無適用不須鬱鬱慕山苗寄題興州晁太守新開古東池百畆新池傍郭斜居人行樂路人誇自言官長如靈運能使江山似永嘉縱飲坐中遺白帢幽尋盡處見桃花不堪山鳥號歸去長遣王孫苦憶家華隂寄子由三年無日不思歸夢裏還家旋覺非臘酒送寒催去國東風吹雪滿征衣三峰已過天浮翠四扇行看日照扉里堠消磨不禁盡速擕家餉勞驂騑和董傳留别麤繒大布裹生涯腹有詩書氣自華厭伴老儒烹瓠葉强隨舉子踏槐花囊空不辦尋春馬眼亂行看擇壻車得意猶堪誇世俗詔黄新濕字如鴉次韻柳子玉見寄薄雷輕雨曉晴初陌上春泥未濺𥚑行樂及時雖有酒出門無侣漫看書遥知寒食催歸騎定把鴟夷載後車他日見邀須強起不應辭病似相如送曽子固倅越得燕字醉翁門下士雜遝難為賢曽子獨超軼孤芳陋羣妍昔從南方來與翁兩聯翩翁今自憔悴子去亦宜然賈誼窮適楚樂生老思燕那因江鱠美遽厭天庖羶但苦世論隘聒耳如蜩蟬安得萬頃池飬此横海鱣王頥赴建州錢監求詩及草書我昔識子自武功寒㕔夜語樽酒同酒闌燭盡語不盡倦僕立寐僵屏風丁寧勸學不死訣自言親受方瞳翁嗟余聞道不早悟醉夢顛倒隨盲聾爾來憂患苦摧剥意思蕭索如霜蓬羡君顔色愈少壯外慕漸少由中充河車挽水灌腦黒丹砂伏火入頰紅大梁相逢又東去但道何日辭樊籠未能便乞勾漏令官曹似是錫與銅留詩河上慰離别草書未暇縁怱怱秀州僧本瑩静照堂鳥囚不忘飛馬繫常念馳静中不自勝不若聴所之君看厭事人無事乃更悲貧賤苦形勞富貴嗟神疲作堂名静照此語子謂誰江湖隠淪士豈無適時資老死不自惜扁舟自娯嬉從之恐莫見况肯從我為石蒼舒醉墨堂人生識字憂患始姓名粗記可以休何用草書誇神速開巻戃怳令人愁我嘗好之每自笑君有此病何年瘳自言其中有至樂適意無異逍遥逰近者作堂名醉墨如飲美酒銷百憂乃知栁子語不妄病嗜土炭如珍羞君於此藝亦云至堆墻敗筆如山丘興來一揮百紙盡駿馬倐忽踏九州我書意造本無法㸃畫信手煩推求胡為議論獨見假隻字片紙皆藏收不减鍾張君自足下方羅趙我亦優不須臨池更苦學完取絹素充衾禂送安惇秀才失解西歸舊書不厭百回讀熟讀深思子自知他年名宦恐不免今日栖遲那可追我昔家居斷還徃著書不復窺園葵朅來東逰慕人爵棄去舊學從兒嬉狂謀謬算百不遂惟有霜鬢來如期故山松栢皆手種行且拱矣歸何時萬事早知皆有命十年浪走寧非癡與君未可較得失臨别惟有長嗟咨送任伋通判黄州兼寄其兄孜吾州之豪任公子少年盛壯日千里無媒自進誰識之有才不用今老矣别來十年學不厭讀破萬巻詩愈美黄州小郡隔谿谷茆屋數家依竹葦知命無憂子何病見賢不薦誰當耻平泉老令更可悲六十青衫貧欲死桐鄉遺老至今泣潁川大姓誰能箠因君寄聲問消息莫對黄鷂矜𤓰觜和子由初到陳州見寄二首次韻道喪雖云久吾猶及老成如今各衰晚那更治刑名懶惰便樗散踈狂託聖明阿奴須碌碌門戸要全生舊隠三年别杉松好在不吾今尚眷眷此意恐悠悠閉戸時尋夢無人可說愁還來送别處雙淚寄南州次韻子由緑筠堂愛竹能延客求詩剰挂墻風梢千纛亂月影萬夫長谷鳥驚棊響山蜂識酒香只應陶靖節㑹聴北牕涼送劉攽倅海陵君不見阮嗣宗臧否不挂口莫誇舌在牙齒牢是中惟可飲醇酒讀書不用多作詩不須工海邊無事日日醉夢魂不到蓬萊宫秋風昨夜入庭樹蓴絲未老君先去君先去幾時回劉郎應白髪桃花開不開送錢藻出守婺州得英字老手便劇郡高懐厭承明聊紆東陽綬一濯滄浪纓東陽佳山水未到意已清過家父老喜出郭壺漿迎子行得所願愴悢居者情吾君方急賢日旰坐邇英黄金招樂毅白璧賜虞卿子不少自貶陳義空崢嶸古稱為郡樂漸恐煩敲搒臨分敢不盡醉語醒還驚送吕希道知和州去年送君守解梁今年送君守歴陽年年送人作太守坐受塵土堆胸腸君家聯翩三將相富貴未已今方將鳯雛驥子生有種毛骨徃徃傳諸郎觀君崛鬱負竒表便合劍佩趨明光胡為小郡屢奔走征馬未解風㠶張我生本自便江海忍耻未去猶徬徨無言贈君有長歎美哉河水空洋洋次韻王誨夜坐愛君東閣能延客顧我閒官不計員策杖頻過如未厭卜居相近豈辭遷莫將詩句驚摇落漸喜罇罍省撲縁待約月明池上宿夜深同看水中天送文與可出守陵州壁上墨君不解語見之尚可消百憂而况我友似君者素節凛凛欺霜秋清詩健筆何足數逍遥齊物追莊周奪官遣去不自覺曉梳脫髪誰能收江邊亂山赤如赭陵陽正在千山頭君知逺别懐抱惡時遣墨君解我愁送劉道原歸覲南康晏嬰不滿六尺長髙節萬仞陵首陽青衫白髪不自歎富貴在天那得忙十年閉戸樂幽獨百金購書收散亡朅來東觀弄丹墨聊借舊史誅姦强孔融不肯下曹操汲黯本自輕張湯雖無尺箠與寸刃口吻排擊含風霜自言静中閱世俗有似不飲觀酒狂衣巾狼藉又屢舞旁人大笑供千塲交朋翩翩去略盡惟我與子猶徬徨世人共棄君獨厚豈敢自愛恐子傷朝來告别驚何速歸意已逐征鴻翔匡廬先生古君子挂冠兩紀鬢未蒼定將文度置膝上喜動隣里烹猪羊君歸為我道姓字幅巾他日容登堂出都來陳所乘船上有題小詩八首不知何人作有感余心者聊為和之蛙鳴青草泊蟬噪垂楊浦吾行亦偶然及此新過雨鳥樂忘罝罦魚樂忘鈎餌何必擇所安滔滔天下是烟火動村落晨光尚熹微田園處處好淵明胡不歸我行無疾徐輕楫信溶漾船留村市鬧閘發寒波漲舟人苦炎熱宿此喬木灣清月未及上黒雲如頹山萬竅號地籟衝風散天池喧豗瞬息間還挂斗與箕潁水非漢水亦作蒲萄緑恨無襄陽兒令唱銅鞮曲我詩雖云拙心平聲韻和年來煩惱盡古井無由波次韻張安道讀杜詩大雅初微缺流風困暴豪張為詞客賦變作楚臣騷展轉更崩壊紛綸閱俊髦地偏蕃怪産源失亂狂濤粉黛迷真色魚鰕易豢牢誰知杜陵傑名與謫仙髙掃地收千軌爭標看兩艘詩人例窮苦天意遣奔逃塵闇人亡鹿溟翻帝斬鼇艱危思李牧述作謝王褒失意各千里哀鳴聞九臯騎鯨遁滄海捋虎得綈袍巨筆屠龍手㣲官似馬曹迂踈無事業醉飽死逰遨簡牘儀刑在兒童篆刻勞今誰主文字公合把旌旄開巻遥相憶知音兩不遭般斤思郢質鯤化陋儵濠恨我無佳句時䝉致白醪慇懃理黄菊未遣没蓬蒿送張安道赴南都留臺我公古仙伯超然羡門姿偶懐濟物志遂為世所縻黄龍遊帝郊簫韶鳯來儀終然反溟極豈復安籠池出入四十年憂患未嘗辭一言有歸意闔府諫莫移吾君信英睿搜士及茆茨無人長者側何以安子思歸來掃一室虚白以自怡逰於物之初世俗安得知我亦世味薄因循鬢生絲出處良細事從公當有時傅堯俞濟源草堂㣲官共有田園興老罷方尋隠退廬栽種成隂十年事倉黄求買萬金無先生卜築臨清濟喬木如今似畫圖鄰里亦知偏愛竹春來相與護龍雛陸龍圖詵挽詞挺然直節庇峩岷謀道從來不計身屬纊家無十金産過車巷哭六州民塵埃輦寺三年别罇俎岐陽一夢新他日思賢見遺像不論宿草更沾巾成都有思賢閣畫諸公像胡完夫母周夫人挽詞栢舟髙節冠鄉隣綘帳清風聳搢紳豈似凡人但慈母能令孝子作忠臣當年織屨隨方進晩節稱觴見伯仁回首悲凉便陳迹凱風吹盡棘成薪和柳子玉過陳絶糧二首風雨蕭蕭夜晦迷不須鳴呌强知時多才久被天公怪闕食惟應㸑婦知杜叟挽衣那及脛顔翁食粥敢言炊詩人情味真嘗遍試問於君底事虧如我自觀猶可厭非君誰復肯相尋圖書跌宕悲年老燈火青熒語夜深早歳便懐齊物意微官敢有濟時心南行十里成何事一聴秋濤萬鼓音潁州初别子由二首征㠶挂西風别淚滴清潁留連知無益惜此須臾景我生三度别此别尤酸冷念子似先君木訥剛且静寡詞真吉人介石乃機警至今天下士去莫如子猛嗟我久病狂意行無坎井有如醉且墜幸未傷輒醒從今得閒暇黙坐消日永作詩解子憂持用日三省近别不改容逺别涕沾胸咫尺不相見實與千里同人生無離别誰知恩愛重始我來宛丘牽衣舞兒童便知有此恨留我過秋風秋風亦已過别恨終無窮問我何年歸我言嵗在東離合既循環憂喜迭相攻悟此長太息我生如飛蓬多憂髪早白不見六一翁歐陽少師令賦所蓄石屏何人遺公石屏風上有水墨希微蹤不畫長林與巨植獨畫峩眉山西雪嶺上萬歳不長之孤松崖崩澗絶可望不可到孤烟落日相溟濛含風偃蹇得真態刻畫始信天有工我恐畢宏韋偃死葬虢山下骨可朽爛心難窮神機巧思無所發化為烟霏淪石中古來畫師非俗士摹寫物象略與詩人同願公作詩慰不遇無使二子含憤泣幽宫陪歐陽公燕西湖謂公方壯鬚似雪謂公已老光浮頰朅來湖上飲美酒醉後劇談猶激烈湖邊草木新着霜芙蓉晚菊爭煌煌插花起舞為公壽公言百歳如風狂赤松共逰也不惡誰能忍飢啖仙藥已將夭壽付天公彼徒辛苦吾差樂城上烏棲暮靄生銀缸畫燭照湖明不辭歌詩勸公飲坐無桓伊能撫箏十月一日將至渦口五里所遇風留宿長淮久無風放意弄清快今朝雪浪滿始覺平野隘兩山控吾前吞吐久不嘬孤舟繫桑本終夜舞澎湃舟人更傳呼弱纜恃菅蒯平生傲憂患久已恬百怪鬼神欺吾窮戲我聊一噫缾中尚有酒信命誰能戒出潁口初見淮山是日至壽州我行日夜向江海楓葉蘆花秋興長平淮忽迷天逺近青山久與船低昂夀州已見白石塔短棹未轉黄茅岡波平風軟望不到故人久立烟蒼茫夀州李定少卿出餞城東龍潭上山鵶噪處古靈湫亂沫浮涎遶客舟未暇然犀照竒鬼欲將燒燕出潜虯使君惜别催歌管村巷驚呼聚玃猴此地他年頌遺愛觀魚并記老莊周濠州七絶塗山下有鯀廟山前有禹㑹村川鎻支祁水尚渾地埋汪罔骨應存樵蘇已入黄熊廟烏鵲猶朝禹㑹村彭祖廟有雲母山云彭祖所採服也跨歴商周看盛衰欲將齒髪鬬蛇龜空餐雲母連山盡不見蟠桃著子時逍遥臺莊子祠堂在開元寺即墓為堂常怪劉伶死便埋豈伊忘死未忘骸烏鳶奪得與螻蟻誰信先生無此懐觀魚臺欲將同異較錙銖肝膽猶能楚越如若信萬殊歸一理子今知我我知魚虞姬墓帳下佳人拭淚痕門前壯士氣如雲倉黄不負君王意只有虞姬與鄭君四望亭太和中刺史劉嗣之立李紳以太子賔客分司東都過濠為作記今存而亭廢者數年矣頽垣破礎没柴荆故老猶言短李亭敢請使君重起廢落霞孤鶩換新銘浮山洞洞在淮上夏潦不能及而冬不加髙故人疑其浮也人言洞府是鼇宫升降隨波與海通共坐船中那得見乾坤浮水水浮空東坡全集巻二
