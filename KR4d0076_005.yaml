body:
  text: 東坡全集卷五宋蘇軾撰詩一百三首僧清順新作垂雲亭江山雖有餘亭榭苦難穩登臨不得要萬象各偃蹇惜哉垂雲軒此地得何晚天功爭向背詩眼巧增損路窮朱欄出山破石壁狠海門浸坤軸湖尾抱雲巘蔥蔥城郭麗淡淡煙村逺紛紛烏鵲去一一漁樵返雄觀快新獲微景收昔遁道人真古人嘯咏慕嵇阮空齋卧蒲褐芒屨每自捆天憐詩人窮乞與供詩本我詩久不作荒澀旋鋤墾從君覔佳句咀嚼廢朝飲五月十日與吕仲甫周邠僧惠勤惠思清順可久惟肅義詮同泛湖逰北山三吳雨連月湖水日夜添尋僧去無路瀲瀲水拍簷駕言徂北山得與幽人兼清風洗昏翳晚景分濃纎縹眇朱樓人斜陽半疏簾臨風一揮手悵焉起遐瞻世人騖朝市獨向溪山廉此樂得有命輕薄神所殱會客有美堂周邠長官與數僧同泛湖往北山湖中聞堂上歌笑聲以詩見寄因和二首時周有服藹藹君詩似嶺雲從來不許醉紅裙不知野屐穿山翠惟見輕橈破浪紋頗憶呼盧袁彥道難邀罵坐灌將軍皆取其有服也晚風落日元無主不惜清涼與子分載酒無人過子雲掩關晝卧客書裙歌喉不共聽珠貫醉面何因作纈紋僧侣且陪香火社詩壇欲斂鸛鵝軍慿君遍繞湖邊寺漲淥晴來巳十分席上代人贈别凄音怨亂不成歌縱使重來奈老何淚眼無窮似梅雨一畨勻了一畨多天上麒麟豈混塵籠中翡翠不由身那知昨夜香閨裏更有偷啼暗别人蓮子擘開須見臆楸枰著盡更無期破衫却有重逢處一飯何曽忘却時唐道人言天目山上俯視雷雨每大雷電但聞雲中如嬰兒聲殊不聞雷震也已外浮名更外身區區雷電若為神山頭只作嬰兒看無限人間失箸人追和子由去歲試舉人洛下所寄詩五首暴雨初晴樓上晚景秋後風光雨後山滿城流水碧潺潺煙雲好處無多子及取昏鴉未到間洛邑從來天地中嵩髙蒼翠北邙紅風流耆舊消磨盡只有青山對病翁謂富公也白汗翻漿午景前雨餘風物便蕭然應傾半熟鵝黃酒照見新晴水碧天疾雷破屋雨翻河一掃清風未覺多應似畫師吳道子髙堂巨壁寫降魔客路三年不見山上樓相對夢魂間明朝却踏紅塵去羞向清伊照病顔過廣愛寺見三學演師觀楊惠之塑寶山朱瑶畫文殊普賢三首寓世身如夢安間日似年敗蒲翻覆卧破裓再三連勸客眠風竹長齋飲石泉回頭萬事錯自笑覺師賢妙迹苦難尋兹山見幾層亂峰螺髻出絶澗陳雲崩措意元同畫觀空欲問僧莫交林下意終老歎何曽朱瑶唐晚輩得法尚雄深滿寺空遺迹何人識苦心長廊欹雨腳破壁撼鐘音成壞無窮事他年復弔今韓子華石淙莊絳侯百萬兵尚畏書牘背功名意不巳數與危機會我公抱絶識凛凛鎮橫潰欲收伊吕迹逺與巢由對誓言雖未從久巳斷諸內區區為懷祖頗覺羲之隘此身隨造物一葉舞澎湃田園不早定歸宿終安在彼美石淙莊每到百事廢泉流知人意屈折作濤瀨寒光洗肝鬲清響跨竽籟我舊門前客放言不自外園中亦何有薈蔚可勝計請公試回首歲晚餘蒼檜立秋日禱雨宿靈隱寺同周徐二令百重堆案掣身間一葉秋聲對榻眠牀下雪霜侵戶月枕中琴築落階泉﨑嶇世味嘗應遍寂寞山栖老漸便惟有憫農心尚在起占雲漢更茫然病中獨逰淨慈謁本長老周長官以詩見寄仍邀逰靈隱因次韻答之卧聞禪老入南山淨掃清風五百間我與世踈宜獨往君緣詩好不容攀自知樂事年年減難得髙人日日間欲問雲公覔心地要知何處是無還楞嚴經云我今示汝無所還地病中逰祖塔院紫李黃瓜村路香烏紗白葛道衣涼閉門野寺松隂轉欹枕風軒客夢長因病得間殊不惡安心是藥更無方道人不惜階前水借與匏樽自在嘗虎跑泉亭亭石塔東峰上此老初來百神仰虎移泉眼趁行腳龍作浪花供撫掌至今逰人灌濯罷卧聽空階環玦響故知此老如此泉莫作人間去來想佛日山榮長老方丈五絶陶令思歸久未成逺公不出但聞名山中只有蒼髯叟數里蕭蕭管送迎千株玉槊攙雲立一穗珠旒落鏡寒何處霜眉碧眼客結為三友冷相看東麓雲根露角牙細泉幽咽走金沙不堪土肉埋山骨未放蒼龍浴渥窪食罷茶甌未要深清風一榻抵千金腹搖鼻息庭花落還盡平生未足心日射回廊午枕明水沈鎖盡碧煙橫山人睡覺無人見只有飛蚊繞鬢鳴癸丑春分後雪雪入春分省見稀半開桃杏不勝威應慚落地梅花識却作漫天栁絮飛不分東君專節物故將新巧發隂機從今造物尤難料更暖須留御臘衣孤山二詠并引孤山有陳時柏二株其一為人所薪山下老人自為兒巳見其枯矣然堅悍如金石愈於未枯者僧志佺作堂於其側名之曰柏堂堂與白公居易竹閣相連屬余作二詩以記之柏堂道人手種幾生前鶴骨龍姿尚宛然雙幹一先神物化九朝三見太平年忽驚華構依巖出乞與佳名到處傳此柏未枯君記取灰心聊伴小乘禪竹閣海山兜率兩茫然古寺無人竹滿軒白鶴不留歸後語蒼龍猶是種時孫兩叢却似蕭郎筆千畝空懷渭上村欲把新詩問遺像病維摩詰更無言與述古自有美堂乘月夜歸娟娟雲月稍侵軒瀲瀲星河半隱山魚鑰未收清夜永鳳簫猶在翠微間淒風瑟縮經絃柱香霧凄迷著髻鬟共喜使君能鼓樂萬人爭看火城還有美堂暴雨逰人腳底一聲雷滿座頑雲撥不開天外黑風吹海立浙東飛雨過江來十分瀲灔金樽凸千杖敲鏗羯鼓催喚起謫仙泉灑面倒傾蛟室瀉瓊瑰八月十五日看潮五絶定知玉十分圓巳作霜風九月寒寄語重門休上鑰夜潮留向月中看萬人鼓噪懾吳儂猶似浮江老阿童欲識潮頭髙幾許越山渾在浪花中江邊身世兩悠悠久與滄波共白頭造物亦知人易老故教江水更西流吳兒生長狎濤淵冒利輕生不自憐東海若知明主意應教斥鹵變桑田是時新有旨禁弄潮江神河伯兩醯雞海若東來氣吐霓安得夫差水犀手三千強弩射潮低吳越王嘗以弓弩射潮頭與海神戰自爾水不近城東陽水樂亭為東陽令王都官槩作君不學白公引涇東注渭五斗黃泥一鍾水又不學哥舒橫行西海頭歸來羯鼓打涼州但向空山石壁下愛此有聲無用之清流流泉無絃石無竅強名水樂人人笑慣見山僧巳厭聽多情海月空留照洞庭不復來軒轅至今魚龍舞鈞天聞道磬襄東入海遺聲恐在海山間鏘然澗谷含宫徵節奏未成君獨喜不須寫入薰風絃縱有此聲無此耳與周長官李秀才逰徑山二君先以詩見寄次其韻二首少年飲紅裙酒盡推不去呼來徑山下試與洗塵霧瘦馬惜障泥臨流不肯渡獨有汝南君從我無朝暮肯將紅塵腳暫著白雲屨嗟我與世人何異笑百步功名一破甑棄置何用顧更慿陶靖節往問征夫路龍亦戀故居百年尚來去至今雨雹夜殿暗風纒霧而我棄鄉國大江忘北渡便欲此山前築室安遲暮又恐太幽獨歲晚霜入屨同逰得李生仄足隨蹇步孔明不自愛臨老起三顧吾歸便却掃誰踏門前路臨安三絶將軍樹阿堅澤畔菰蒲節玄德牆頭羽葆桑不會世間間草木與人何事管興亡錦溪楚人休笑沐猴冠越俗徒誇翁子賢五百年間異人出盡將錦繡裹山川石鏡山雞舞破半巖雲菱葉開殘野水春應笑武都山下土枉教明月殉佳人登玲瓏山何年僵立兩蒼龍瘦脊盤盤尚倚空翠浪舞翻紅罷亞白雲穿破碧玲瓏三休亭上工延月九折巖前巧貯風腳力盡時山更好莫將有限趂無窮宿九仙山九仙謂左元放許邁王謝之流風流王謝古仙真一去空山五百春玉室金堂餘漢士桃花流水失秦人困眠一榻香凝帳夢繞千巖冷逼身夜半老僧呼客起雲峰缺處湧氷輪陌上花三首并引逰九仙山聞里中兒歌陌上花父老云吳越王妃每歲春必歸臨安王以書遺妃曰陌上花開可緩緩歸矣吳人用其語為歌含思宛轉聽之凄然而其詞鄙野為易之云陌上花開蝴蝶飛江山猶是昔人非遺民幾度垂垂老逰女長歌緩緩歸陌上山花無數開路人爭看翠軿來若為留得堂堂去且更從教緩緩回生前富貴草頭露身後風流陌上花巳作遲遲君去魯猶歌緩緩妾回家逰東西巖即謝安東山也謝公含雅量世運屬艱難况復情所鍾感概萃中年正賴絲與竹陶寫有餘歡常恐兒輩覺坐令髙趣闌獨携縹眇人來上東西山放懷事物外徙倚弄雲泉一旦功業成管蔡復流言慷慨桓野王哀歌和清彈挽鬚起流涕始知使君賢意長日月促卧病巳辛酸慟哭西州門往駕那復還空餘行樂處古木昏蒼煙宿海會寺籃輿三日山中行山中信美少曠平下投黃泉上青𡨕線路每與猿猱爭重樓束縳遭澗坑兩股酸辛飢腸鳴北度飛橋踏彭鏗繚垣百步如古城大鐘橫撞千指迎髙堂延客夜不扄杉槽漆斛江河傾本來無垢洗更輕倒牀鼻息四鄰驚紞如五鼓天未明木魚呼粥亮且清不聞人聲聞屨聲海會寺清心堂南郭子綦初喪我西來達磨尚求心此堂不説有清濁逰客自觀隨淺深兩歲頻為山水役一溪長照雪霜侵紛紛無補竟何事慚愧髙人閉户吟徑山道中次韻答周長官兼贈蘇寺丞年來戰紛華漸覺夫子勝欲求五畝宅灑掃樂清淨學道恨日淺問禪慚聽瑩聊為山水行遂此麋鹿性獨逰吾未果覔伴誰復聽吾宗古遺直窮達付前定酺糟醉方熟灑面呼不醒奈何效燕蝠屢欲爭晨瞑不如從我逰髙論發犀柄溪南渡橫木山寺稱小徑太平寺俗號小徑山幽尋自兹始歸路微月映南望功臣山雲外盤飛磴三更渡錦水再宿留石鏡緬懷周與李能作洛生詠明朝二子至詩律嚴號令籃輿置紙筆得句輕千乘玲瓏苦竒秀名實巧相稱九仙更幽絶笑語千山應空巖側破甕飛溜灑浮磬山前見虎迹候吏鐃鼓競我生本艱竒塵土滿釜甑山禽與野獸知我久蹭蹬笑謂候吏還禦虎吾有命徑山雖云逺行李稍可併頗訝王子猷忽起山隂興但報菊花開吾當理歸榜汪覃秀才久留山中以詩見寄次其韻季子應嗔不下機棄家來伴碧雲師中秋冷坐無因醉半月長齋未肯辭擲簡搖毫無忤色汪善書託寫衆人詩投名入社有新詩飛騰桂籍他年事莫忘山中採藥時再逰徑山老人登山汗如濯到山困卧呼不覺覺來五鼓日三竿始信孤雲天一握古語云孤雲兩角去天一握平生未省出艱險兩足慣曽行犖確含暉亭上望東溟凌霄峰頭挹南嶽共愛絲杉翠絲亂誰見玉芝紅玉琢白雲何事自來往明月長圓無晦朔山有白雲峰明月菴塜上雞鳴猶憶欽山前鳳舞逺徵璞雪窗馴元不死煙嶺孤猿苦難捉從來白足傲死生不怕黃巾把刀槊榻上雙痕凛然在劔頭一吷何須角以上皆山中故事嗟我昏頑晚聞道與世齟齬空多學靈水先除眼界花清詩為洗心源濁騷人未要逃競病禪老但喜聞剝啄此生更得幾回來從今有暇無辭數洞霄宫上帝髙居愍世頑故留瓊館在凡間青山九鎖不易到作者七人相對間論語云作者七人矣今監宫凡七人庭下流泉翠蛟舞洞中飛鼠白鴉翻長松怪石宜霜鬢不用金丹苦駐顔初自徑山歸述古召飲介亭以病先起西風初作十分涼喜見新橙透甲香遲暮賞心驚節物登臨病眼怯秋光慣眠處士雲庵裏倦醉佳人錦瑟旁猶有夢回清興在卧聞歸路樂聲長明日重九亦以病不赴述古會再用前韻月入秋帷病枕涼霜飛夜簟故衾香可憐吹帽狂司馬空對親舂老孟光不作雍容傾座上翻成骯髒倚門旁人間此會論今古細看茱萸感歎長九日尋臻闍梨遂泛小舟至勤師院二首白髮長嫌嵗月侵病眸兼怕酒杯深南屏老宿間相過東閣郎君懶重尋試碾露芽烹白雪休拈霜蘃嚼黃金扁舟又截平湖去欲訪孤山支道林湖上青山翠作堆蔥蔥鬱鬱氣佳哉笙歌叢裏抽身出雲水光中洗眼來白足赤髭迎我笑拒霜黃菊為誰開明年桑苧煎茶處憶著衰翁首重回皎然有九日與陸羽煎茶詩羽自號桑苧翁余來年九日去此久矣九日舟中望見有美堂上魯少卿飲處以詩戲之指點雲間數點紅笙歌正擁紫髯翁誰知愛酒龍山客却在漁舟一葉中西閣珠簾卷落暉水沉煙斷佩聲微遙知通德凄涼甚擁髻無言怨未歸逰諸佛舍一日飲釅茶七盞戲書勤師壁示病維摩元不病在家靈運巳忘家何煩魏帝一丸藥且盡盧同七碗茶九日湖上尋周李二君不見君亦見尋於湖上以詩見寄明日乃次其韻湖上野芙蓉含思愁脈脈娟然如靜女不肯傍阡陌詩人杳未來霜艷冷難宅君行逐鷗鷺出處浩莫測葦間聞拿音雲表巳飛屐使我終日尋逢花不忍摘人生如朝露要作百年客喟彼終歲勞幸兹一日澤願言竟不遂人事多乖隔悟此知有命沉憂傷魂魄送杭州杜戚陳三掾罷官歸鄉秋風摵摵鳴枯蓼船閣荒村夜悄悄正當逐客斷腸時君獨歌呼醉連曉老夫平生齊得喪尚戀微官失輕矯君今憔悴歸無食五斗未可秋毫小君言失意能幾時月啖蝦蟇行復皎殺人無驗中不快此恨終身恐難了徇時所得無幾何隨手巳遭憂患繞期君正似種宿麥忍飢待食明年麨次韻周長官夀星院同餞魯少卿琉璃百頃水仙家風靜湖平響釣車寂歷踈松欹晚照伶俜寒蝶抱秋花困眠不覺依蒲褐歸路相將踏桂華更著綸巾披鶴氅他年應作畫圖誇次韻述古過周長官夜飲二更鐃鼓動諸鄰百首新詩間八珍巳遣亂蛙成兩部更邀明月作三人雲煙湖寺家家境燈火沙河夜夜春曷不勸公勤秉燭老來光景似奔輪述古以詩見責屢不赴會復次前韻我生孤癖本無鄰老病年來益自珍肯對紅裙辭白酒但愁新進笑陳人北山怨鶴休驚夜南畝巾車欲及春多謝清詩屢推轂豨膏那解轉方輪來詩有雲霄滿輪之句金門寺中見李西臺與二錢惟演易唱和四絶句戲用其韻跋之帝城春日帽簷斜二陸初來尚憶家未肯將鹽下蓴菜巳應知雪似楊花生平賀老慣乘舟騎馬風前怕打頭欲問君王乞符竹但憂無蟹有監州皆世所傳錢氏故事西臺妙迹繼楊風凝式無限龍蛇洛寺中一紙清詩弔興廢塵埃零落梵王宫五季文章墮劫灰升平格力未全回故知前輩宗徐庾數首風流似玉臺胡穆秀才遺古銅器似鼎而小上有兩柱可以覆而不蹶以為鼎則不足疑其飲器也胡有詩答之隻耳獸齧環長唇鵝擘喙三趾下鋭春蒲短兩柱高張秋菌細君看翻覆俯仰間覆成三角翻兩髻古書雖滿腹茍有用我亦隨世嗟君一見呼作鼎才注升合巳漂逝不如學鴟夷盡日盛酒真良計古有篆五字不可識賀陳述古弟章生子鬱蔥佳氣夜充閭始見徐卿第二雛甚欲去為湯餅客惟愁錯寫弄麞書參軍新婦賢相敵阿大中郎喜有餘我亦從來識英物試教啼看定何如贈治易僧智周寒窗孤坐凍生瓶尚把遺編照露螢閣束九師新得妙夢吞三畫舊通靈斷絃挂壁知音喪師與契嵩深相知時巳逝矣揮麈空山亂石聽齋罷何須更臨水胸中自有洗心經張子野年八十五尚聞買妾述古令作詩錦里先生自笑狂莫欺九尺鬢眉蒼詩人老去鶯鶯在公子歸來燕燕忙柱下相君猶有齒江南刺史巳無腸平生謬作安昌客略遣彭宣到後堂書雙竹湛師房我本江湖一釣舟意嫌髙屋冷颼颼羡師此室才方丈一炷清香盡日留暮鼓朝鐘自擊撞閉門孤枕對殘缸白灰旋撥通紅火卧聽蕭蕭雪打窗寶山新開徑藤梢橘刺元無路竹杖棕鞋不用扶風自逺來聞笑語水分流處見江湖回觀佛骨青螺髻踏遍仙人碧玉壺野客歸時山月上棠梨葉戰暝禽呼和述古冬日牡丹一朵妖紅翠欲流春光回照雪霜羞化工只欲呈新巧不放間花得少休花開時節雨連風却向霜餘染爛紅漏泄春光私一物此心未信出天工當時只道鶴林仙能遣秋花發杜鵑誰信詩能回造化直教霜枿放春妍不分清霜入小園故將詩律變寒暄使君欲見藍關詠更倩韓郎為染根和錢安道寄惠建茶我官于南今幾時嘗盡溪茶與山茗胸中似記故人面口不能言心自省為君細説我未暇試評其略差可聽建溪所産雖不同一一天與君子性森然可愛不可慢骨清肉膩和且正雪花雨腳何足道啜過始知真味永縱復苦硬終可録汲黯少戅寬饒猛草茶無賴空有名髙者妖邪次頑懭體輕雖復強浮泛性滯偏工嘔酸冷其間絶品豈不佳張禹縱賢非骨鯁葵花玉􅙧不易致道路幽嶮隔雲嶺誰知使者來自西開緘磊落收百餅嗅香嚼味本非别透紙自覺光炯炯粃粳團鳳友小龍奴𨽻日注臣雙井收藏愛惜待佳客不敢包裹鑽權幸此詩有味君勿傳空使時人怒生癭和栁子玉喜雪次韻仍呈述古詩翁愛酒長如渴瓶盡欲沽囊巳竭燈青火冷不成眠一夜撚鬚吟喜雪詩成就我覔歡處我窮正與君髣佛曷不走投陳孟公有酒醉君仍飽德瓊瑶欲盡天應惜更遣清光續殘月安得佳人擢素手笑捧玉碗兩竒絶豔歌一曲回陽春坐使髙堂生暖熱弔天竺海月辨師三首欲尋遺迹強沾裳本自無生可得亡今夜生公講堂月滿庭依舊冷如霜生死猶如臂屈伸情鍾我輩一酸辛樂天不是蓬萊客慿仗西方作主人欲訪浮雲起滅因無緣却見夢中身安心好住王文度此理何須更問人李頎秀才善畫山以兩軸見寄仍有詩次韻答之平生自是箇中人欲向漁舟便寫真詩句對君難出手雲泉勸我早抽身年來白髮驚秋速長恐青山與世新從此北歸休悵望囊中收得武林春雪後至臨平與栁子玉同至僧舍見陳尉列落帆古戍下積雪髙如丘強邀詩老出踈髯散颼飀僧房有宿火手足漸和柔靜士素寡言相對自忘憂銅爐擢煙穟石鼎浮霜漚我行雖有程坐穩且復留大哉天地間此生得浮逰夜至永樂文長老院文時卧病退院愁聞巴叟卧荒村來打三更月下門往事過年如昨日此生未死得重論老非懷土情相得病不開堂道益尊惟有孤栖舊時鶴舉頭見客似長言栁氏二外甥求筆迹退筆成山未足珍讀書萬卷始通神君家自有元和腳莫厭家雞更問人一紙行書兩絶詩遂良鬚鬢巳如絲何當火急傳家法欲見誠懸筆諫時錢安道席上令歌者道服烏府先生鐵作肝霜風卷地不知寒猶嫌白髮年前少故點紅燈雪裏看他日卜鄰先有約待君投紱我休官如今且作華陽服醉唱儂家七返丹除夜野宿常州城外二首行歌野哭兩堪悲逺火低星漸向微病眼不眠非守歲鄉音無伴苦思歸重衾腳冷知霜重新沐頭輕感髮稀多謝殘燈不嫌客孤舟一夜許相依南來三見歲云徂直恐終身走道塗老去怕看新厯日退歸擬學舊桃符煙花巳作青春意霜雪偏尋病客鬚但把窮愁博長健不辭醉後飲屠酥元日過丹陽明日立春寄魯元翰堆盤紅縷細茵蔯巧與椒花兩鬬新竹馬異時寧信老土牛明日莫辭春西湖弄水猶應早北寺觀燈欲及辰白髮蒼顔誰肯記曉來頻嚏為何人古纒頭曲鵾絃鐵撥世無有樂府舊工惟尚叟一生喙硬眼無人坐此困窮今白首翠鬟女子年十七指法巳似呼韓婦輕帆渡海風掣回滿面沙塵和淚垢青衫不逢湓浦客紅袖漫插曹綱手爾來一見哀駘他便著臂韝躬井臼我慚貧病百不足強對黃花飲白酒轉關濩索動有神雷輥空堂戰窗牖四絃一抹擁袂立再拜十分為我夀世人只解錦纒頭與汝作詩傳不朽刁同年草堂不用長竿矯繡衣南園北第兩參差青山有約長當户流水無情自入池歲久酴醿渾欲合春來楊栁不勝垂主人不用匆匆去正是紅梅著子時惠山謁錢道人烹小龍團登絶頂望太湖踏遍江南南岸山逢山未免更留連獨携天上小團月來試人間第二泉石路縈回九龍脊水光翻動五湖天孫登無語空歸去半嶺松聲萬壑傳錢道人有詩云直須認取主人翁作兩絶戲之首斷故應無斷者氷消那復有氷知主人苦苦令儂認認主人人竟是誰有主還須更有賓不如無鏡自無塵只從半夜安心後失却當年覺痛人和蘇州太守王規甫侍太夫人觀燈之什余時以劉道原見訪滯留京口不及赴此會二首不覺朱轓輾後塵爭看繡幰錦纒輪洛濵侍從三人貴京兆平反一笑春但逐東山携妓女那知後閣走窮賓滯留不見榮華事空作賡詩第七人翻翻緹騎走香塵激激飛濤射火輪美酒留連三夜月豐年傾倒五州春時浙西皆以不熟罷燈惟蘇獨盛安排詩律追強對蹭蹬歸期為惡賓墮珥遺簮想無限華胥猶見夢回人成都進士杜暹伯升出家名法通往來吳中欲識當年杜伯升飄然雲水一孤僧若教俯首隨韁鎖料得如今似我能栁子玉云通若及第不過似我東坡全集卷五
