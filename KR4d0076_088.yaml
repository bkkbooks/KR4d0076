body:
  text: 東坡全集卷八十八宋蘇軾撰墓志銘二首范景仁墓志銘熙寧元豐間士大夫論天下賢者必曰君實景仁其道德風流足以師表當世其議論可否足以榮辱天下二公蓋相得歡甚皆自以為莫及曰吾與子生同志死當同傳而天下之人亦無敢優劣之者二公既約更相為傳而後死者則志其墓故君實為景仁傳其略曰吕獻可之先見景仁之勇決皆豫所不及也軾幸得遊二公間知其平生為詳蓋其用捨大節皆不謀而同如仁宗時論立皇嗣英宗時論濮安懿王稱號神宗時論新法其言若出一人相先後如左右手故君實常謂人曰吾與景仁兄弟也但姓不同耳然至於論鐘律則反復相非終身不能相一君子是以知二公非苟同者君實之沒軾既狀其行事以授景仁景仁志其墓而軾表其墓道今景仁之墓其子孫皆以為君實既沒非子誰當志之且吾先君子之益友也其可以辭公姓范氏諱鎮字景仁其先自長安徙蜀六世祖隆始葬成都之華陽曽祖諱昌祐妣索氏祖諱璲妣張氏纍世皆不仕考諱度贈開府儀同三司妣李氏贈榮國太夫人龎氏贈昌國太夫人開府以文藝節行為蜀守張詠所知有子三人長曰鎡終隴城令次曰鍇終衛尉寺丞公其季也四嵗而孤從二兄為學薛奎守蜀道遇鎡求士可客者鎡以公對公時年十八奎與語竒之曰大范恐不壽其季廊廟人也還朝與公俱或問奎入蜀所得曰得一偉人當以文學名於世時故相宋庠與弟祁名重一時見公稱之祁與為布衣交由是名動埸屋舉進士為禮部第一故事殿廷唱第過三人則禮部第一人者必越次抗聲自陳因擢置上第公不肯自言至第七十九人乃出拜退就列無一言廷中皆異之釋褐為新安主簿宋綬留守西京召置國子監使教諸生秩滿又薦諸朝為東宫直講用參知政事王舉正薦召試學士院除館閣校勘充編修唐書官當遷校理宰相龎籍言公有異材恬於進取特除直袐閣為開封府推官擢起居舍人知諫院兼管句國子監上疏論民力困弊謂約祖宗以來官吏兵數酌取其中為定制以今賦入之數十七為經費而儲其三以備水早非常又言古者冡宰制國用唐以宰相兼鹽鐵轉運或判戶部度支今中書主民樞密主兵三司主財各不相知故財已匱而樞密益兵無窮民已困而三司取財不巳請使中書樞密通知兵民財利大計與三司同制國用葬溫成皇后太常議禮前謂之園後謂之園陵宰相劉沆前為監護使後為園陵使公言嘗聞法吏舞法矣未聞禮官舞禮也請詰問前後議異同狀又請罷焚瘞錦繡珠玉以紓國用從之時有敇凡內降不如律令者令中書樞密院及所屬執奏未及一月而內臣無故改官者一日至五六人公乞正大臣被詔故違不執奏之罪石全斌以護溫成葬除觀察使凡治葬事者皆遷兩官公言章獻章懿章惠三太后之葬推恩皆無此比乞追還全斌等告敇文彥博富弼入相百官郊迎時兩制不得詣宰相居第百官不得間見公言隆之以虛禮不若開之以至誠乞罷郊迎而除謁禁以通天下之情議減任子及每嵗取士皆公發之又乞令宗室屬疏者補外官仁宗曰卿言是也顧恐天下謂朕不能睦族耳公曰陛下甄別其賢者顯用之不沒其能乃所以睦族也雖不行至熙寧初卒如公言仁宗性寬容言事者務訐以為名或誣人隂私公獨引大體略細故時陳執中為相公嘗論其無學術非宰相器及執中嬖妾笞殺婢御史劾奏欲逐去之公言今隂陽不和財匱民困盜賊滋熾獄犴充斥執中當任其咎閨門之私非所以責宰相識者韙之仁宗即位三十五年未有繼嗣嘉祐初得疾中外危恐不知所為公獨奮曰天下事尚有大於此者乎即上疏曰太祖捨其子而立太宗此天下之大公也周王既薨真宗取宗室子養之宫中此天下之大慮也願陛下以太祖之心行真宗故事擇宗室賢者異其禮物而試之政事以系天下心章纍上不報因闔門請罪會有星變其占為急兵公言國本未立若變起倉卒禍不可以前料兵孰急於此者乎今陛下得臣疏不以留中而付中書是欲使大臣奉行也臣兩至中書大臣皆設辭以拒臣是陛下欲為宗廟社稷計而大臣不欲也臣竊原其意特恐行之而陛下中變耳中變之禍不過於死而國本不立萬一有如天象所告急兵之憂則其禍豈獨一死而已哉夫中變之禍死而無愧急兵之憂死且有罪願以此示大臣使自擇而審處焉聞者為之股栗除兼侍御史知雜事公以言不從固辭不受執政謂公上之不豫大臣嘗建此䇿矣今間言巳入為之甚難公復移書執政曰事當論其是非不當問其難易速則濟緩則不及此聖賢所以貴機會也諸公言今日難於前日安知他日不難於今日乎凡見上面陳者三公泣上亦泣曰朕知卿忠卿言是也當更俟三二年凡章十九上待罪百餘日須髮為白朝廷不能奪乃罷知諫院改集賢殿修撰判流內銓修起居注除知制誥公雖罷言職而無嵗不言儲嗣事以仁宗春秋益髙每因事及之冀以感動上心及為知制誥正謝上殿面論之曰陛下許臣今復三年矣願早定大計明年又因祫享獻賦以諷其後韓琦卒定策立英宗遷翰林學士充史館修撰改右諫議大夫英宗即位遷給事中充仁宗山陵禮儀使坐誤遷宰臣官改翰林侍讀學士復為翰林學士中書奏請追尊濮安懿王下兩制議以為宜稱皇伯髙官大國極其尊榮非執政意更下尚書省集議已而臺諫爭言其不可乃下詔罷議令禮官檢詳典禮以聞公時判太常寺率禮官上言漢宣帝於昭帝為孫光武於平帝為祖則其父容可以稱皇考然議者猶非之謂其以小宗而合太宗之統也今陛下既考仁宗又考濮安懿王則其失非特漢宣光武之比矣凡稱帝若皇若皇考立寢廟論昭穆皆非是於是具列儀禮及漢儒論議魏明帝詔為五篇奏之以翰林侍讀學士出知陳州陳飢公至三日發庫廪三萬貫石以貸不及奏監司繩之急公上書自劾詔原之是嵗大熟所貸悉還陳人至今思之神宗即位遷禮部侍郎召還復為翰林學士兼侍讀羣牧使句當三班院知通進銀臺司公言故事門下封駮制敇省審章奏紏舉違滯著於所授敇其後刋去故職寖廢請復之使知所守從之紏察在京刑獄王安石為政始變更法令改常平為青苗法公上疏曰常平之法始于漢之盛時視榖貴賤發斂以便農末最為近古不可改而青苗行於唐之衰亂不足法且陛下疾富民之多取而少取之此正百步與五十步之間耳今有二人坐市貿易一人下其直以相傾奪則人皆知惡之其可以朝廷而行市道之所惡乎疏三上不報邇英閣進讀與吕惠卿爭論上前因論舊法預買紬絹亦青苗之比公曰預買亦敝法也若陛下躬節儉府庫有餘當并預買去之奈何更以為比乎韓琦上疏極論新法之害安石使送條例司疏駮之諫官李常乞罷青苗錢安石令常分折公皆封還其詔詔五下公執如初司馬光除樞密副使光以所言不行不敢就職詔許辭免公再封還之上知公不可奪以詔直付光不由門下公奏由臣不才使陛下廢法有司失職乞解銀臺司許之會有詔舉諌官公以軾應詔而御史知雜謝景溫彈奏軾罪公又舉孔文仲為賢良文仲對策極論新法之害安石怒罷文仲歸故官公上疏爭之不報時年六十三即上言臣言不行無顔復立於朝請致仕疏五上最後指言安石以喜怒賞罰事曰陛下有納諫之資大臣進拒諫之計陛下有愛民之性大臣用殘民之術安石大怒自草制極口詆公落翰林學士以本官致仕聞者皆為公懼公上表謝其略曰雖曰乞身而去敢忘憂國之心又曰望陛下集羣議為耳目以除壅蔽之姦任老成為腹心以養和平之福天下聞而壯之安石雖詆之深人更以為榮焉公既退居專以讀書賦詩自娛客至輒置酒盡歡或勸公稱疾杜門公曰死生禍福天也吾其如天何同天節乞隨班上壽許之遂著為令久之歸蜀與親舊樂飲賑施其貧者期年而後還軾得罪下御史臺獄索公與軾往來書疏文字甚急公猶上書救軾不已朝廷有大事輒言之官制行改正議大夫今上即位遷光祿大夫初英宗即位祔仁宗主而遷僖祖及神宗即位復還僖祖而遷順祖公上言太祖起宋州有天下與漢髙祖同僖祖不當復還乞下百官議不報及上即位公又言乞遷僖祖正太祖東嚮之位時年幾八十矣韓維上言公在仁宗朝首開建儲之議其後大臣繼有論奏先帝追録其言存沒皆推恩而鎮未嘗以語人人亦莫為言者雖顔子不伐善介之推不言祿不能過也悉以公十九疏上之拜端明殿學士特詔長子清平縣令百揆改宣德郎且起公兼侍讀提舉中太一宫詔語有曰西伯善養二老來歸漢室卑詞四臣入侍為我強起無或憚勤公固辭不起天下益髙之改提舉嵩山崇福宫公仲兄之孫祖禹為著作郎謁告省公于許因復賜詔及龍茶一合存問甚厚數月復告老進銀青光祿大夫再致仕初仁宗命李照改定大樂下王朴樂三律皇祐中又使胡瑗等考正公與司馬光皆與公上疏論律尺之法又與光往復論難凡數萬言自以為獨得於心元豐三年神宗語公與劉凡定樂公曰定樂當先正律上曰然雖有師曠之聰不以六律不能正五音公作律尺籥合升斗豆區釜斛欲圖上之又乞訪求真黍以定黃鍾而劉凡即用李照樂加用四清聲而奏樂成詔罷局賜賚有加公謝曰此劉凡樂也臣何與焉及提舉崇福宫欲造樂獻之自以為嫌乃先請致仕既得謝請太府銅為之逾年乃成比李照樂下一律有竒二聖御延和殿召執政同觀賜詔嘉奬以樂下太常詔三省侍從臺閣之臣皆往觀焉時公已屬疾樂奏三日而薨實元祐二年閏十二月癸卯朔享年八十一訃聞輟視朝一日贈右金紫光祿大夫諡曰忠文公雖以上壽貴顯考終於家無所憾者而士大夫惜其以道德事明主閲三世皆以剛方難合故雖用而不盡及上即位求人如不及厚禮以起公而公已老無意於世矣故聞其喪哭之皆衰公清明坦夷表裏洞達遇人以誠恭儉慎默口不言人過及臨大節決大議色和而語壯常欲繼之以死雖在萬乘前無所屈篤於行義奏補先族人而後子孫鄉人有不克婚葬者輒為主之客其家者常十餘人雖僦居陋巷席地而坐飲食必均兄鎡率于隴城無子聞其有遺腹子在外公時未仕徒步求之兩蜀間二年乃得之曰吾兄異於人體有四乳是兒亦必然已而果然名之曰百常以公蔭今為承議郎公少受學於鄉先生龎直溫直溫之子昉卒於京師公娶其女為孫婦養其妻子終身其學本於六經仁義口不道佛老申韓異端之説其文清麗簡逺學者以為師法凡二入翰林知嘉祐二年六年八年及治平二年貢舉門生滿天下貴顯者不可勝數詔修唐書仁宗實録玉牒日歷類篇凡朝廷有大述作大議論未嘗不與契丹髙麗皆知誦公文賦少時嘗賦長嘯却胡騎及奉使契丹虜相目曰此長嘯公也其後兄子百祿亦使虜虜首問公安否有文集一百卷諫垣集十卷內制集三十卷外制集十卷正言三卷樂書三卷國朝韻對三卷國朝事始一卷東齋記事十卷刀筆八卷積勳柱國纍封蜀郡開國公食邑加至二千六百戶實封五百戶娶張氏追封清河郡君再娶李氏封長安郡君子男五人長曰燕孫未名而卒次百揆宣德郎監中嶽廟次百嘉承務郎先公一年卒次百嵗太康主簿先公六年卒次百慮承務郎女一人嘗適左司諫吳安詩復歸以卒孫男十人祖直襄州司戶參軍祖朴長杜主簿祖野祖平假承務郎祖封右承奉郎祖耕承務郎祖淳祖舒祖京祖恩孫女六人曽孫女三人公晚家于許許人愛而敬之其薨也里人皆出涕以元祐四年八月已未葬于汝之襄城縣汝安鄉推賢里夫人李氏祔公始以詩賦為名進士及為館閣侍從以文學稱雖屢諫爭及論儲嗣事朝廷信其忠然事頗祕世亦未盡知也其後議濮安懿王稱號守禮不回而名益重及論熙寧新法與王安石吕惠卿辨論至廢黜不用然後天下翕然師尊之無貴賤賢愚謂之景仁而不敢名有為不義必畏公知之公既得謝軾往賀之曰公雖退而名益重矣公愀然不樂曰君子言聽計從消患於未萌使天下隂受其賜無智名無勇功吾獨不得為此命也夫使天下受其害而吾享其名吾何心哉軾以是愧公銘曰凡物之生莫纍於名人顧趨之以纍為榮神人無名欲知者希人顧憂之以希為悲熙寧以來孰擅茲器嗟嗟先生名所不置君實在洛公在頴昌皆欲忘民民不汝忘君實既來遁歸于洛縶而維之莫之勝脫為天相君為君牧民道逺年徂卒徇以身公獨堅卧三詔不起遂解天刑竟以樂死世皆謂公貴身賤名孰知其功聖人之清貪夫以廉懦夫以立不尸其功無喪無得君實之用出而時施如彼水火寧除渴飢公雖不用亦相其行如彼山川出雲相望公維蜀人乃葬于汝子孫不忘尚告來者張文定公墓志銘仁宗皇帝在位四十二年搜攬天下豪傑不可勝數既自以為股肱心膂敬用其言以致太平而其任重道逺者又留以為三世子孫百年之用至于今賴之孔子曰惟天為大惟堯則之天下未嘗一日無士而仁宗之世獨為多士者以其大也賈誼歎細德之嶮微知鳯鳥之不下閔溝瀆之尋常知吞舟之不容傷時無是大者以容巳也故嘗竊論之天下大器也非力兼萬人其孰能舉之非仁宗之大其孰能容此萬人之英乎蓋即位八年而以制策取士一舉而得富弼再舉而得公公姓張氏諱方平字安道其先宋人也後徙揚州髙祖克唐末為毫州刺史曽祖文熙毫州軍事推官贈太師娶蘇氏追封武功郡太夫人祖嶠以進士及第太宗嘗召對選知鄆州賜親扎給全俸終於尚書都官員外郎娶劉氏追封沛國太夫人考堯卿生而端默寡言有出世間意以父命勉娶非其意也父沒遂居一室家人莫得見其面者十有七年與祖考皆贈太師開府儀同三司皆封魏國公娶稽氏追封譙國太夫人公年十三入應天府學頴悟絶人家貧無書嘗就人借三史旬日輒歸之曰吾已得其詳矣凡書皆一閲終身不再讀屬文未嘗起草宋綬蔡齊見之曰天下竒材也與范諷皆以茂材異等薦之以景祐元年中選授校書郎知崑山縣蔣堂為蘇州得公所著芻蕘論五十篇上之以賢良方正能直言極諫薦公射策優等遷著作佐郎通判睦州時趙元昊欲叛而未有以發則為嫚書求大名以怒朝廷規得譴絶以激使其衆公以謂朝廷自景德以來既與契丹盟天下忘備將不知兵士不知戰民不知勞蓋三十年矣若驟用之必有喪師蹶將之憂兵連民疲必有盜賊意外之患當含垢匿瑕順適其意使未有以發得嵗月之頃以其間選將厲士堅城除器為不可勝以待之雖元昊終於必叛而兵出無名吏士不直其上難以決勝小國用兵三年而不見勝負不折則破我以全制其後必勝之道也是時士大夫見天下全盛而元昊小醜皆欲發兵誅之惟公與吳育同議議者不深察以二人之論為出於姑息遂決用兵天下騷動公獻平戎十策大略以邉城千里我分而賊專雖屯兵數十萬然賊至常以一擊十必敗之道也既敗而圖之則老師費財不可為已宜及民力之完屯重兵河東示以形勢賊入冦必自延渭而興州巢穴之守必虛我師自麟府渡河不十日可至此所謂攻其所必救形格勢禁之道也宰相吕夷簡見之謂宋綬曰君能為國得人矣然不果用其策召對賜五品服直集賢院遷太常丞知諫院首論祖宗以來雖分中書樞密院而三聖英武獨運斷歸于一今陛下謙德仰成二府不可以不合仁宗嘉之會富弼亦論此遂命宰相兼樞密使方元昊之叛也禁兵皆西而諸路守兵多揀赴闕郡縣無備命調額外弓手公在睦州條上利害八事及是有旨遣使於陜西河東京西四路刺弓手為宣毅保捷指揮公連上疏爭之甚力不從宣毅十四萬人保捷九萬人皆市人不可用而宣毅驕甚所在為冦自是民力大困國用一空識者以不從公言為恨時夏竦并護四路劉平石元孫任福之敗皆貶主帥而竦獨不問賊圍麟府詔竦出兵牽制竦逗留不出使賊平豐州夷靈逺而去公極言之詔罷竦節制自是四路各得專達人人自效邉備修完賊至無所得及慶歷元年西方用兵蓋六年矣上既厭兵而賊亦困弊不得耕牧休息賊中匹布至十餘千元昊欲自通其道無由公慨然上疏曰陛下猶天地父母也豈與此犬豖豺狼較勝負乎願因今嵗郊赦引咎示信開其自新之路申敇邉吏勿絶其善意若猶不悛亦足以怒我而怠彼雖天地鬼神必將誅之仁宗喜曰是吾心也命公以疏付中書吕夷簡讀之拱手曰公之及此是杜稷之福也是嵗赦書開諭如公意明年元昊始請降自元昊叛公謀無遺策雖不盡用然西師解嚴公有力焉修起居注假起居舍人知制誥使契丹北主雅聞公名與其母后族人微行觀公於范陽門外及燕親詣前酌玉巵以飲公顧左右曰有臣如此佳哉騎而擊毬于公前以其所乘馬賜公朝廷知之自是北使挾事至者輒命公館之尋召試知制誥遷右正言賜三品服誥命簡嚴四方誦之兼史館修撰章得象監國史以日歷自乾興至慶歷廢不修以屬公於是粲然復完權知開封府府事至繁為尹者皆書板以記事公獨不用默記數百人以次決遣不遺毫釐吏民大驚以為神不敢復欺拜翰林學士領羣牧使牧事久不治公始整齊之元昊遣使求通已在境上而契丹與元昊搆隙使來約我請拒絶其使時議者欲遂納元昊故為答書曰元昊若盡如約束則理難拒絶仁宗以書示公與宋祁公上議曰書詞如此是拒契丹而納元昊得新附之小羌失久和之強敵也若巳封册元昊而契丹之使再至能終不聽乎若不聽契丹之怨必自是始聽而絶之則中國無復信義永斷招懷之理矣是一舉而失二敵也宜賜元昊詔曰朝廷納卿誠欵本緣契丹之請今聞卿招誘契丹邉戶失舅甥之歡契丹遣使為言卿宜審處其事但嫌隙朝除則封册暮行矣如此於西北為兩得時人伏其精識拜諫議大夫為御史中丞中外之事知無不言至於宫妾宦官濫恩橫賜皆力爭裁抑之尋知貢舉士方以遊詞嶮語為髙公上疏以謂文章之變實關盛衰不可長也詔以公言曉諭學者宰相賈昌朝與參知政事吳育忿爭上前公將對昌朝使人約公當以代育公怒叱遣曰此言何為至於我哉既對極論二人邪正曲直然育卒罷髙若訥代之時當郊而費用未具中外以為憂宰相欲以是危公復拜翰林學士為三司使公領使未幾以辦聞仁宗大喜至于今計司先郊告辦蓋自公始前三司使王拱辰請𣙜河北鹽既立法矣而未下公見上問曰河北再𣙜鹽何也仁宗驚曰始立法非再也公曰周世宗𣙜河北鹽犯輒處死世宗北伐父老遮道泣訴願以鹽課均之兩稅錢而弛其禁世宗許之今兩稅鹽錢是也豈非再𣙜乎且今未𣙜也而契丹常盜販不巳若𣙜之則鹽貴北鹽益售是為我斂怨而北獲福乎北鹽滋多非用兵莫能禁也邉隙一開所獲利能補用兵之費乎仁宗大悟曰卿與宰相立罷之公曰法雖未下民已戶知之當直以手詔罷不可自有司出也仁宗大喜命公密撰手詔下之河朔父老相率拜迎于澶州為佛老會七日以報上恩且刻詔書比京至今父老過其下必稽首流涕南京鴻慶宫成奉安三聖像當遣柄臣特命公為禮儀使鄉黨榮之仁宗遂欲用公而公以目疾求去甚力乃加端明殿學士歸院判尚書都省兼領銀臺司審刑院太常寺事慶歷中衛士夜逾宫垣為變仁宗旦語二府以貴妃張氏有扈蹕之功樞密使夏竦倡言宜講求所以尊異貴妃之禮宰相陳執中不知所為公見執中言漢馮婕妤身當猛獸不聞有所尊異且皇后在尊貴妃古無是禮若果行之天下謗議必大萃於公終身不可雪也執中聳然敬從公言而罷修宗正寺玉牒補綴失亡為書數百卷自陜右用兵公私困乏士大夫爭言豐財省費之道然多不得其要公自為諫官御史中丞三司使皆為上精言之一日仁宗御資政殿召兩府侍從賜坐手詔問天下事公退直禁林是日有旨鎖院公既草制書又條對所問數千言夜半與制書皆上仁宗驚異又手詔獨䇿公明日復出數千言大略以謂太祖定天下用兵不過十五萬今百餘萬而更言不足自祥符以來萬事墮弛務為姑息漸失祖宗之舊取士任子磨勘遷補之法既壞而任將養兵皆非舊律國用既窘則政出一切大商姦民乘隙射利而茶鹽香礬之法亂矣此治亂盛衰之本不可以不急治公既明習歷代損益又周知祖宗法度悉陳其本末贏虛所以然之狀及當今所宜救治施行之略而其末乃論古今治亂在上下離合之間比年已來朝廷頗引輕嶮之人布之言路違道干譽利口為賢內則臺諫外則監司下至胥吏僮奴皆可以搆危其上自將相公卿宿貴之人皆爭屈體以收禮後輩有不然者則謗毁隨之惴惴焉惟恐不免何暇展布心體為國立事哉此風不革天下無時而治也上益異之書文儒二字以賜月餘御迎陽門召兩制近侍復賜問目曰朕之闕失國之姦蠧朝之憸諛皆直言其狀獨引公近御榻密訪之且有大用語公歎曰暴人之私迫人於嶮而攘之我不為也終無所言公既剛簡自信不恤毁譽故小人思有以中之會三司判官楊儀以請求得罪公坐與儀厚善遂罷職出知滁州不數月上悟還端明殿學士知江寧府明年加龍圖閣學士遷給事中知杭州公平生學道虛一而靜故所至皆不言而治既去人必思之自杭丁太夫人憂服除以舊職還朝判流內銓建言幾內稅重非所以示天下是嵗郊赦減畿內稅三分遂為定制秦州叛羌斷古渭路帥張忭發兵討賊而副總管劉渙不受命皆罷之拜公侍讀學士知秦州公力辭不拜曰渙與忭有階級今互言而兩罷帥不可為也忭以故得不罷以公為禮部侍郎知滑州改戶部侍郎移鎮西蜀始李順以甲午嵗叛蜀人記之至是方以為憂而轉運使攝守事西南夷有卭部川首領者妄言蠻賊儂智髙在南詔欲來冦蜀攝守妄人也聞之大驚移兵屯邉郡益調額外弓手發民築城日夜不得休息民大驚擾爭遷居城中男女昏會不復以年賤粥榖帛市金銀埋之地中朝廷聞之發陜西步騎戍蜀兵仗絡繹相望於道詔促公行且許以便宜從事公言南詔去蜀二千餘里道嶮不通其間皆雜種不相役屬安能舉大兵為智髙冦我哉此必妄也臣當以靜鎮之道遇戍卒兵仗輒遣還入境下令卭部川曰冦來吾自當之妄言者斬悉歸屯邉兵散遣弓手罷築城之役會上元觀燈城門皆通夕不閉蜀遂大安已而得卭部川之譯人始為此謀者斬之梟首境上而配流其餘黨於湖南西南夷大震先是朝廷獲智髙母子留不殺欲以招智髙至是乃伏法復以三司使召還奏罷蜀橫賦四十萬減鑄鐵錢十餘萬蜀人至今紀之初主計京師有三年糧而馬粟倍之至是馬粟僅足一嵗而糧亦減半因建言今之京師古所謂陳留天下四通五達之郊非如雍洛有山河形勝足恃也特依重兵以立國耳兵恃食食恃漕運汴河控引江淮利盡南海天聖以前嵗發民浚之故河行地中有張君平者以疏導京東積水始輟用汴夫其後淺妄者爭以裁減費役為功河日以堙塞今仰而望河非祖宗之舊也遂畫漕運十四策宰相富弼讀公奏上前晝漏盡十刻侍衛皆跛倚仁宗太息稱善弼曰此國計大本非常奏也悉如所啓施行退謂公曰自慶歷以來公論食貨詳矣朝廷每有所損益必以公奏為議本凡除主計未嘗敢先公也其後未期年而京師有五年之蓄遷吏部侍郎復以目疾請郡遷尚書左丞知南京未幾以工部尚書知秦州時亮祚方驕僣閲士馬築堡篳篥城之西壓秦境上屬戶皆逃匿山林公即料簡將士聲言出塞實按軍不動賊既不至言者因論公無賊而輕舉宰相曽公亮昌言於朝曰兵不出塞何名為輕舉張公豈輕者哉賊所以不至者以有備故也有備而賊不至則以輕舉罪之邉臣自是不敢為先事之備也議者乃服初命公秦州有旨再任當除宣徽使議者欲以是沮撓之公笑曰吾於死生禍福未嘗擇也宣徽使於我何有哉力請解復知南京封清河郡公英宗即位遷禮部尚書知陳州過都留判尚書都省請知鄆州陛辭論天下事英宗歎曰學士其可以去朝廷哉公力請行加侍讀學士徙定州乞歸養改徐州英宗屢欲君還而左右無助公者一日謂執政曰吾在藩邸時見其芻蕘論及所對策近者代言之臣未嘗副吾意若使居典誥之任亦國華也執政乃始奉詔拜翰林學士承旨問治道體要公以簡易誠明為對言近而指逺不覺前席曰吾昔奉朝請望侍從大臣以謂皆天下選人今乃不然聞學士之言始知有人矣胡宿罷樞密副使上欲以公代之而執政請用郭逵英宗以語公公曰自慶歷以後擢任二府必參之中書臣知事君而巳遷刑部尚書英宗不豫學士王圭當直不召召公赴福寧殿上慿几不言賜公坐出書一幅八字曰來日降詔立皇太子公抗聲曰必潁王也嫡長而賢請書其名上力疾書以付公公既草制尋充册立皇太子禮儀使神宗即位召見側門公曰仁宗崩厚葬過禮公私騷然請損之上曰奉先可損乎公曰遺制固云以先志行之天子之孝也上歎曰是吾心也公又奏百官遷秩恩已過厚若錫賚復用嘉祐近比恐國力不能支乞追用乾興例足矣從之省費十七八遷戶部尚書御史中丞王陶擊宰相參知政事吳奎與之辨上欲罷奎公適對上曰奎罷當以卿代公力辭上曰卿歷三朝無所阿附左右莫為先容可謂獨立傑出矣先帝已欲用卿今復何辭公曰韓琦久在告意保全奎奎免必不復起琦勳在王室願陛下復奎位手詔諭琦以全始終之分上嗟歎久之繼出小紙曰奎位執政而擊中司謂朕手詔為內批持之三日不下不去可乎公復論如初上從之賜琦詔如公言久之琦求去堅甚夜召公議公復申前論上曰琦志不可奪也公遂建議宜寵以兩鎮節鉞且虛府以示復用從之面命公為參知政事以親疾辭上曰受命以慰親意庶有瘳也是夕復召知制誥鄭獬內東門別殿諭以用公意制詞皆出上旨制出公以親疾在告召對押赴中書御史中丞缺曽公亮欲用王安石公極論安石不可用不數日魏公捐館上歎息不巳命近璫及內司賓存問日至虛位以待公尋詔起復四上章乃免服除以安石不恱拜觀文殿學士留守西京入覲請南京留臺上欲以為宣徽使修國史不可則欲以為提舉集禧觀判都省所以留公者百方公皆力詞遂知陳州時方置條例司行新法太率欲豐財而強兵公因陛辭極論其害皆深言危語曰水所以載舟亦所以覆舟兵猶火也不戢當自焚若行新法不已其極必有覆舟自焚之憂上雅敬公不甚其言曰能復少留乎公曰退即行矣上亦悵然至陳陜西方用兵卒叛慶州聲搖關輔京西漕檄捕盜官以兵會所屬州白刃橫野民大惶駭公收其檄不行而奏之上謂執政曰守臣不當爾耶臨事乃見人詔京西兵各歸其舊吏方以苛察為能小不中意輒置司推治一州至數獄追逮數千里死者甚衆公以事聞詔立條約下諸路時監司皆新進趨時興利長吏初不與聞公曰吾衰矣雅不能事人歸歟以全吾志即力請留臺而歸未幾復知陳州暇日坐西軒聞外板築喧甚曰民築嘉應侯張大尉廟公曰巢賊亂天下趙犨以孤城力戰保此邦捍大患者也此而不祀張侯何為者哉命夷其廟立趙侯祠佛舍中未幾改南京且命入覲不待次對前殿曰先帝嘗言卿不立交黨退朝掩關終日無一客命坐賜茶尋拜宣徽北院使檢校太尉判應天府公曰宣徽使非寄任不除臣求鄉郡自便而得之恐啓僥幸路上曰朕未之思改判青州告免延和殿賜坐問祖宗禦戎之策孰長公曰太祖不勤逺略如夏州李彛興靈武馮暉河西折御卿皆因其酋豪許以世襲故邉圉無事董遵誨捍環州郭進守西山李漢超保關南皆十餘年優其祿賜寬其文法而少遣兵諸將財力豐而威令行間諜精審吏士用命賊所入輒先知併兵禦之戰無不克故以十五萬人而獲百萬之用終太祖之世邉鄙不聳天下安樂及太宗平并州欲遂取燕薊自是嵗有契丹之虞曹彬劉廷謙傅潛等數十戰各亡士卒十餘萬又內徙李彛興馮暉之族繼遷之變三邉皆擾而朝廷始旰食矣真宗之世趙德明納欵及澶淵之克遂與契丹盟至今人不識兵革可謂盛德大業祖宗之事大略如此亦可以鑒矣近嵗邉臣建開拓之議皆行嶮僥幸之人欲以天下安危試之一擲事成則身蒙其利不成則陛下任其患不可聽也上曰慶歷以來卿知之乎元昊初臣何以待之公曰臣時為學士誓詔封册皆臣所草具言本末上驚曰爾時已為學士可謂舊德矣時契丹遣泛使蕭禧來上問北意安在公曰北自與中國通好安於豢養吏士驕惰實不欲用兵昔蕭英劉六符來仁宗命二府置酒殿廬與語英頗泄其情六符色目之英歸竟以此得罪今禧狡詐願如故事令大臣與議無屈帝尊與之交口上曰朕念慶歷再和之後中國不復為善後之備故修戎事為應兵耳公曰應兵者兵禍之已成者也消變於未成善之善者也公每辭去上輒遷延之三易其期遂詔公歸院供職蕭禧至以河東疆事為辭上復以問公公曰嘉祐二年北使蕭扈嘗言之朝廷討論之詳矣命館伴王洙詰之扈不能對録其條目付扈以歸因以藁上之禧當辭偃蹇卧驛中不起執政未知為言公班次二府因朝謂樞密使吳充曰禧不即行使主者日致饋而勿問且使邉吏以其故檄北朝可也充啓用其説禧即日行除中太一宫使進對禮秩凡皆與執政同公在朝雖不任職然多建明上數欲廢易汴渠公曰此祖宗建國之本不可輕議餉道一鯁兵安所仰食則朝廷無置足之地矣非老臣誰敢言此自王安石為政始罷銅禁姦民日銷錢為器邉關海舶不復譏錢之出故中國錢日耗而西南北三敵皆山積公極論其害請詰問安石舉纍朝之令典所以保國便民者一旦削而除之其意安在有星孛于軫詔求直言公上疏論所以致變之故人皆為恐栗上皆優容之求去愈力上曰卿在朝豈有所好惡者歟何欲去之速也公曰臣平生未嘗與人交惡但欲歸老耳上知不可留乃以為宣徽南院使檢校太傅判應天府上曰朕初欲卿與韓綘共事而卿論政不同又欲除樞密使而卿論兵復異卿受先帝末命卒無以副朕意乎因泫然泣下賜帶如嘗任宰相者髙麗使過南京長吏當送迎公言臣班視二府不可為陪臣屈詔獨遣少尹使者見公恐栗不敢仰視師征安南公以謂舉西北壯士從馬棄之南方其患有不可勝言者若社稷之福則老師費財無功而還因論交址氣俗與諸夷不類自建隆以來吳昌文丁部黎桓李公緼四易姓矣皆以大校篡立有唐末五代藩鎮傾奪之風此可以計破者也遂條上九事習知蠻事者皆服其精鍊師還如公言新法既粥坊埸河渡司農又并祠廟粥之官既得錢聽民為賈區廟中邉侮穢踐無所不至公言宋王業所基也而以火王閼伯封於商丘以主大火微子為宋始封二祠者獨不可免於鬻乎上震怒批出曰慢神辱國理甚於斯於是天下祠廟皆不得鬻公自念將老無以報上論事益切至於論兵起獄尤為反復深言曰老臣且死見先帝地下有以籍口矣上為感動至永樂之敗頗思其言公請老不已拜東太一宫使就第章數十上拜太子少師以宣徽使致仕官制行罷宣徽院獨命公領使如舊今上即位執政輒罷公使以太子太保致仕元祐六年詔復置宣徽使乃命公復南院章四上不拜璽書嘉之以其年十二月二日薨享年八十五訃聞輟視朝一日特贈司空制服苑中官其親屬五人太皇太后對輔臣嗟歎其忠正公遺令不請諡尚書右丞蘇轍為請詔有司議諡曰文定娶馬氏太常少卿綘之女追封永嘉郡夫人四子邦彥大理評事邦直邦傑太常寺太祝皆先公卒恕今為右朝散郎通判應天府信厚敦敏篤學朝廷數欲用之以公老不忍去左右詔聽之三女長適殿中丞蔡天申次適右朝奉郎王鞏其季已嫁而復歸孫男四人欽咨欽亮欽弼欽憲孫女三人並幼公晚自謂樂全居士有樂全集四十卷玉堂集二十卷注仁宗樂書一卷神宗嘗賜親扎曰卿文章典雅煥然有三代之風書之典誥無以加焉西漢所不及也所與交者范仲淹吳育宋祁三人皆敬憚之曰不動如山安道有焉晚與軾先大夫遊論古今治亂及一時人物皆不謀而同軾與弟轍以是皆得出入門下軾嘗論次其文曰孔北海志大而論髙功烈不見於世然英偉豪傑之氣自為一時所宗其論盛孝章郗鴻豫書慨然有烈丈夫之風諸葛孔明不以文章自名而開物成務之姿總練名實之意自見於言語至出師表簡而盡直而不肆大哉言乎與伊訓説命相表裏非秦漢已來以事君為説者所能至也常恨二人之文不見其全公其庶幾乎烏乎士不以天下之重自任久矣言語非不工也政事文學非不敏且博也然至於臨大事鮮不忘其故失其守者其器小也公為布衣則頎然已有公輔之望自少出仕至老而歸未嘗以言徇物以色假人雖對人主必同而後言毁譽不動得喪若一真孔子所謂大臣以道事君者世逺道散雖志士仁人或少貶以求用公獨以邁往之氣行正大之言曰用之則行捨之則藏上不求合於人主故雖貴而不用用而不盡下不求合於士大夫故恱公者寡不恱公者衆然至言天下偉人則必以公為首世以軾為知言公始為諫官薦劉夔王質自代即日擢用及貝州軍叛上欲遣公出征舉明鎬自代即以為將而貝州平熙寧中軾將往見公於陳宰相曽公亮謂軾曰吾受知張公所以至此者公恩也軾以問公公悵然久之曰吾密薦公亮人無知者豈仁宗以語之乎軾以是知公雖不偶於世而人主信之蓋如此公性與道合得佛老之妙屬纊之日凛然如平生有星隕于北牗及薨赤氣自寢而升里人望驚焉以七年八月九日庚申葬于宋城縣永安鄉仁孝里其子恕使以王鞏之狀來求銘銘曰大道之行士貴其身維人求我匪我求人秦漢以來士賤君肆區區僕臣以得為喜功利之趍謗毁是逃我觀其身夏畦之勞紛紜叢脞千載一律帝閔下俗異人乃出是生我公龍章鳯姿翔于千仞世挽留之浩然直前有礙則止放為江河匯為沼沚穆穆三聖如天如淵前席惟誼見黯必冠豈不用公道有不契出其緒餘則已驚世公之所能我不敢知乘雲馭風與汗漫期噫天何時復生此傑我作銘詩以詔王國東坡全集卷八十八
