body:
  text: 東坡全集巻十八宋蘇軾撰詩一百一十八首次韻秦少章和錢蒙仲碧畦黄隴稻如京嵗美人和易得情鑑裏移舟天外思地中鳴角古來聲山圍故國城空在潮打西陵意未平二子有如雙白鷺隔江相照雪衣明次韻錢越州髯尹超然定逸羣南遊端為訪雲門謫仙歸侍玉皇案老鶴來乘刺史轓已覺簿書哀老子故知籩豆有司存年來齒頰生荆棘習氣因君又一言同秦仲二子雨中游寶山平明已報百吏散半日來陪二子閒立鵲低昻煙雨裏行人出沒樹林間去杭十五年復游西湖用歐陽察判韻我識南屏金鯽魚重來拊檻散齋餘還從舊社得心印似省前生覓手書葑合平湖久蕪漫人經豐嵗尚凋疎誰憐寂寞髙常侍老去狂歌憶孟諸與莫同年雨中飲湖上到處相逢是偶然夣中相對各華顛還來一醉西湖雨不見跳珠十五年送子由使契丹雲海相望寄此身那因逺適更沾巾不辭驛騎凌風雪要使天驕識鳳麟沙漠回看清禁月湖山應夣武林春單于若問君家世莫道中朝第一人次韻荅劉景文左藏我老詩壇仆鼓旗借君佳句發良時但空賀監杯中物莫示孫郎帳下兒夜燭催詩金燼落秋芳壓帽露華滋故應好語如爬癢有味難名只自知座上復借韻送岢嵐軍通判葉朝奉雲間踏白看纒旗莫忘西湖把酒時夣裏吳山連越嶠樽前羌婦雜胡兒夕烽過後人初醉春鴈來時雪未滋為問從軍真樂否書來粗遣故人知軾始於文登海上得白石數升如芡實可作枕聞梅丈嗜石故以遺其子子明學士子明有詩次其韻海隅荒怪有誰珍零落珊瑚泣季倫法供坐令㣲物重軾舊有怪石供色難歸致孝心純只疑薏苡來交阯未信蠙珠出泗濱願子聚為江夏枕不勞麾扇自寧親次韻錢越州見寄莫將牛弩射羊羣卧治何妨晝掩門稍喜使君無疾病時因送客見車轓搔頭白髪秋無數閉眼丹田夜自存欲息波瀾須引去吾儕豈獨坐多言文登蓬萊閣下石壁千丈為海浪所戰時有碎裂淘灑嵗久皆圜熟可愛土人謂此彈子渦也取數百枚以養石菖蒲且作詩遺垂慈堂老人蓬萊海上峯玉立色不改孤根捍滔天雲骨有破碎陽侯殺亷角陰火發光采纍纍彈丸間𤨏細成珠琲閻浮一漚耳真妄果安在我持此石歸袖中有東海垂慈老人眼俯仰了大塊置之盆盎中日與山海對明年菖蒲根連絡不可解儻有蟠桃生旦暮猶可待次韻毛滂法曹感雨詩江南佳公子遺我錦繡端攬之温如春公子焉得寒興雨自有時膚寸便濛􅟎歛藏以自潤牛斗何足干空庭月與影強結三友歡我豈不足歟要此清團團所歡在一醉常恐樽中乾捨酒尚可樂明珠如彈丸但恐千仞雀怱怱發虛彈迨子閒暇時種子田中丹一朝涉世故空腹容欺謾我頃在東坡秋菊為夕餐永愧坡間人布褐為我完雪堂初覆瓦上簟無下莞時時亦設客每醉筒輒殫一笑便傾倒五年得輕安公子豈我徒衣鉢傳一簞定非郊與島筆勢江河寛悲吟古寺中穿帷雪漫漫他年記此味芋火對懶殘送鄧宗古還鄉廣漢有姜子孝弟行里閭赤睂雖豺虎弛兵過其墟至今空清泉無復雙鯉魚南鄭有李郃得妙甘公書夜坐指流星驚倒兩使車抱闗不肯仕布褐䝉璠璵西南固多士君得二子餘凛凛忠文公搜士及樵漁澗谿有幽討蘋芷真嘉蔬嵗晚終不食心惻當何如參寥上人初得智果院㑹者十六人分韻賦詩軾得心字漲水返舊壑飛雲思故岑念君忘家客亦有懷歸心三間得幽寂數步藏清深攅金盧橘塢㪚火楊梅林茶筍盡襌味松杉真法音雲崖有淺井玉醴常半尋遂名參寥泉可濯幽人襟相擕横嶺上未覺衰年侵一眼吞江湖萬象涵古今願君更小築嵗晚解我簮哭王子立次兒子迨韻三首彭城初識子照眼白而長異夣成先兆予為宻州子立未嘗相識忽告同舍生曰吾夣為宻州婿何也已而果以子由之子妻之清言得未嘗豈惟知禮意遂欲補詩亡子立能詩而有禮學咄咄真相逼諸生敢鴈行非無伯鸞志獨有子雲悲恨子非天合猶能使我思兒曹莫凄慟老眼欲枯萎㑹哭皆豪傑誰為感舊詩子立與黄魯直張文潜晁無咎秦少㳺陳無已皆友善龍困嘗魚服羊儇或虎䝉怱怱成鬼録憒憒到天公偶落藩墻上同㳺羿彀中回看十年事黄葉巻秋風異鵲并叙熙寧中柯侯仲常通守漳州以救饑得民有二鵲栖其㕔事訖侯之去鵲亦送之漳人異焉為賦此詩昔我先君子仁孝行於家家有五畝園么鳳集桐花是時烏與鵲巢鷇可俯拏憶我與諸兒飼食觀羣呀里人驚瑞異野老笑而嗟云此方乳哺甚畏鳶與虵手足之所及二物不敢加主人若可信衆鳥不我遐故知中孚化可及魚與豭柯侯古循吏悃愊真無華臨漳所全活數等江干沙仁心格異族兩鵲栖其衙但恨不能言相對空楂楂善惡以類應古語良非夸君看彼酷吏所至號鬼車次韻詹適宣徳小飲巽亭君方夣謫仙來詩記李白郎官湖事我亦弔文園江上同三黜天涯又一樽濤雷殷白晝梅雪耿黄昏歸去多情雨應隨御史軒詹為御史主簿東川清絲寄魯冀州戲贈鵝溪清絲清如冰上有千嵗交枝藤藤生谷底飽風雪嵗晚忽作龍虵升嗟我雖為老侍從骨寒只愛布與繒牀頭錦衾未還客坐覺芒刺在背膺豈如髯卿晚乃貴福禄正似川方増醉中倒着紫綺裘下有半臂出縹綾封題不敢妄裁翦刀尺自有佳人能遥知千騎出清曉積雪未放㳺塵興白鬚紅帶柳絲下老弱空巷人相登但放竒紋出領袖吾髯雖老無人憎怡然以垂雲新茶見餉報以大龍團仍戲作小詩妙供來香積珍烹具大官揀芽分雀舌賜茗出龍團曉日雲庵暖春風浴殿寒聊將試道眼莫作兩般看次韻王忠玉逰虎丘絶句三首當年大白此相浮老守娛賓得二丘郡人有閭丘公太守王規父嘗云不謁虎丘即謁閭丘規父忠玉伯父也白髪重來故人盡空餘叢桂小山幽青蓋紅旗映玉山新詩小草落𤣥泉風流使者人爭看知有真娘立道邊虎丘中路有真娘墓舞衣歌扇轉頭空只有青山杳靄中莫共吳王鬬百草使君未敢借驚鴻寄蔡子華故人送我東來時手栽荔子待我歸荔子已丹吾髪白猶作江南未歸客江南春盡水如天腸斷西湖春水舩想見青衣江畔路白魚紫筍不論錢霜髯三老如霜檜舊交零落今誰在莫從唐舉問封侯但遣麻姑更爬背和錢四寄其弟龢再見濤頭湧玉輪煩君久駐浙江春年來總作維摩病堪笑東西二老人卧病彌月聞垂雲花開順闍棃以詩見招次韻荅之道人心似水不礙照花妍燕坐春強半清陰月屢遷平生無起滅一念有陳鮮嫋嫋風枝舉離離日萼蔫病吟終少味老醉不成顛何必遨頭出湖中有散仙故周茂叔先生濓谿谿在廬山下世俗眩名實至人疑有無怒移水中蟹愛及屋上烏坐令此溪水名與先生俱先生本全徳亷退乃一隅因抛彭澤米偶似西山夫遂即世所知以為溪之呼先生豈我軰造物乃其徒應同柳州柳聊使愚溪愚次韻子由使契丹至涿州見寄四首老人癡鈍已逃寒子復辭行理亦難要到盧龍看古塞投文易水弔燕丹余昔年辭免使比胡羊代馬得安眠窮髪之南共一天又見子卿持漢節遥知遺老泣山前氊毳年來亦甚都時時鴂舌問三蘇予與子由入京時北使巳問所在後余館伴北使屢誦三蘇文那知老病渾無用欲問君王乞鏡湖始憶庚寅降屈原旋看蠟鳳戲僧䖍隨翁萬里心如鐵此子何勞為買田時猶子遲侍行雪後便欲與同僚尋春一病彌月雜花都盡獨牡丹在耳劉景文左藏和順闍棃詩見贈次韻荅之殘花怨久病剰雨泣餘妍不見雙旌出空令九陌遷開園時市井皆入知君苦寂寞妙語嚼芳鮮淺紫從争發深紅任早蔫天葩尚青萼國色待華顛載酒邀詩將臞儒不是仙次韻劉景文周次元寒食同游西湖絮飛春減不成年老境同乗下瀨舩藍尾忽驚新火後樂天寒食詩云三盃藍尾酒一揲膠牙餳遨頭要及浣花前成都太守自正月二日出遊謂之遨頭至四月十九日浣花乃止山西老將詩無敵洛下書生語更妍共向北山尋二士畫橈鼉鼓聒清眠連日與忠玉張全翁游西湖訪北山清順道潜二詩僧登垂雲亭飲參寥泉最後過唐州陳使君夜飲忠玉有詩次韻荅之北山非自髙千仭付我足西湖亦何有萬象生我目雲深人在塢風靜響應谷與君皆無心信步行看竹竹間逢詩鳴眼色奪湖淥百篇成俯仰二老相追逐故應千頃池養此一雙鵠山髙路已斷亭小膝屢促夜尋三尺井渴飲半甌玉明朝閙絲管寒食雜歌哭使君坐無聊狂客來不速載酒有鴟夷扣門非啄木浮蛆灧金盌翠羽出華屋須㬰便陳迹覺夣那可續及君未渡江過我勤秉燭一笑換人爵百年終鬼録新茶送僉判程朝奉以餽其母有詩相謝次韻荅之縫衣付與溧陽尉捨肉懷歸潁谷封聞道平反供一笑㑹須難老待千鍾火前試焙分新胯雪裏頭綱輟賜龍從此升堂是兄弟一甌林下記相逢次韻送張山人歸彭城羨君飄蕩一虛舟來作錢塘十日逰水洗禪心都眼浄山供詩筆總睂愁雪中乘興真聊爾春盡思歸却罷休何日五湖從范蠡種魚萬尾橘千頭次韻林子中王彦祖唱醻早知身寄一漚中晚節尤驚落木風近聞莘老公擇皆逝故有此句昨夣巳論三世事嵗寒猶喜五人同軾與子中彦祖子敦完夫同試舉人景徳寺今皆健雨餘北固山圍座春盡西湖水映空差勝四明狂監在更將老眼犯塵紅夀星院寒碧軒清風肅肅摇窓扉窓前修竹一尺圍紛紛蒼雪落夏簟冉冉綠霧霑人衣日髙山蟬抱葉響人靜翠羽穿林飛道人絶粒對寒碧為問鶴骨何縁肥書劉景文所藏王子敬帖絶句家雞野鶩同登爼春蚓秋虵總入奩君家兩行十二字氣壓鄴侯三萬籖書劉景文所藏宗少文一筆畫宛轉回紋錦縈盈連理花何須郭忠恕匹素畫繅車真覺院有洛花花時不暇往四月十八日與劉景文同往賞枇杷緑暗初迎夏紅殘不及春魏花非老伴盧橘是鄉人井落依山盡巖崖發興新嵗寒君記取松雪看蒼鱗又和劉景文韻牡丹松檜一時栽付與春風自在開試問壁間題字客幾人不為看花來西湖夀星院此君軒卧聽謖謖碎龍鱗俯看蒼蒼立玉身一舸䲭夷江海去尚餘君子六千人仲天貺王元直自睂山來見余錢塘留半嵗既行作絶句五首送之仲君豈弟多學王子清修寡言病後空驚鶴瘦時來或作鵬騫海角煩君逺訪江源與我同來剰作數詩相送莫教萬里空回三人一旦同行二子與秦少章同寓髙齋復同舟北行留下髙齋月明遥想扁舟京口尚餘孤枕潮聲更欲留君久住念君去國彌年空使犀顱玉頰長懷髯舅悽然為予逺致慇懃瑞草橋邊老人紅帶雅冝華髪白醪光泛新春老人王慶源也贈善相程傑心傳異學不謀身自要清時閲搢紳火色上騰雖有數急流勇退豈無人書中苦覔元非訣醉裏㣲言却近真我似樂天君記取華顛賞遍洛陽春次韻林子中蒜山亭見寄竒逸多聞老敬通何人慷慨解憐翁十年簿領催衰白一笑江山發醉紅聞道賦詩臨北固未應舉扇向西風叩頭莫喚無家客歸掃岷峩一畝宫再和并荅楊次公毘盧海上妙髙峯二老遥知説此翁聊復艤舟尋紫翠不妨持節散陳紅髙懷却有雲門興好句真傳雪竇風唱我三人無譜曲馮夷亦合舞幽宫次韻劉景文送錢䝉仲三首誰識天閑老驥不爭日暮長途送盡青雲九子歸去扁舟五湖寄語竹林社友同書桂籍天倫王郎獨為鬼録世間無此玉人五字古原春草千金漢殿長門經緯尚餘三策典刑留與諸孫菩提寺南漪堂杜䳌花南漪杜䳌天下無披香殿上紅氍毹鶴林兵火真一夣不歸閬苑歸西湖題楊次公春蘭春蘭如美人不採羞自獻時聞風露香蓬艾深不見丹青寫真色欲補離騷傳對之如靈均冠佩不敢燕題楊次公蕙蕙本蘭之族依然臭味同曽為水仙佩相識楚詞中幻色雖非實真香亦竟空云何起㣲馥鼻觀已先通次韻曹輔寄壑源試焙新芽仙山靈雨濕行雲洗遍香肌粉未勻明日來投玉川子清風吹破武林春要知玉雪心腸好不是膏油首面新戲作小詩君一笑從來佳茗似佳人次韻袁公濟謝芎椒詩燥吻時時著酒濡要令卧疾致文殊河魚潰腹空號楚汗水流骹始信吳吳真君服椒法云半年脚心汗如水自笑方求三嵗艾不如長作獨眠夫羨君清瘦真仙骨更助飄飄鶴背軀次韻和楊次公惠徑山龍井水龍井水洗病眼有效漏盡雞號厭夜行年來小器溢缾罌棄官縱未歸東海罷郡猶堪作水衡幻色將空眼先暗勝游無礙脚殊輕空煩逺致龍淵水寧復臨池似伯英次韻劉景文登介亭澤國梅雨餘衰年困蒸溽髙堂磨新塼頗覺利腰足松根百尺井兩綆飛淨渌流觴聚兒童一笑為捧腹清風信可御剛氣在巖麓始知共此世物外無三伏長歌入雲去不待絃管逐西湖真西子煙樹㸃睂目濤江少醖藉髙浪翻雪屋俛仰拊四海百世飛鳥速逺追錢氏餘近弔祖侯躅吾生如寄耳寸晷輕尺玉誰似劉將軍逸韻謝邊幅千言一揮手五車不再讀春巖彩雞舞月峽哀猿哭朝先鶗鴂起莫與寒螿續我老廢吟哦賴君時擊觸從今事逺覽發軔此幽谷清游得三昧至樂謝五欲莫作狂道士氣壓劉師服袁公濟和劉景文登介亭詩復次韻荅之昬昬墮醉夣奈此六月溽君詩如清風吹我朝睡足登臨得佳句江白照湖渌袖手獨不言黙藁已在腹是時風雨過藹藹雲歸麓疎星帶㣲月金火爭見伏惜哉此清景變滅不可逐歸來讀君詩耿耿猶在目却思少年日聲價爭塲屋文如翻水成賦作叉手速秋風起鴻鴈我亦繼華躅那知君蹭蹬獨泣荆山玉相見南新道青衫垂破幅早知事大繆恨不十年讀莫嫌馮唐老終勝賈誼哭今年復為僚舊好許重續升沈何足道等是蠻與觸共為湖山主出入窮澗谷衆馳君不爭人棄我所欲何時神武門相約挂冠服介亭餞楊傑次公籃輿西出登山門嘉與我友尋仙村丹青明滅風篁嶺環珮空響桃花源郡人謂介亭山下為桃源路前朝欲上已蠟屐黑雲白雨如傾盆今晨積霧巻千里豈畏觸熱生病根在家頭陁無為子久與青山為弟昆孤峯盡處亦何有西湖鏡天江抹坤臨髙麾手謝好住清風萬壑傳其言風回響荅君聽取我亦到處隨君軒次京師韻送表弟程懿叔赴䕫州運判與子甥舅氏摧頽各蒼顔並為東諸侯長此佳江山寒松無時花安得揷髻鬟惟將老不死一笑榮枯間我甚似樂天但無素與蠻挂冠及未耄當獲一紀閒子亦拙進取才髙命堅頑譬如萬斛舟行此九折灣仲氏新得道一漚自塵寰君之兄徳孺自言近於佛法有得嵗晚家鄉路莫遣生榛菅葉教授和溽字韻詩復次韻為戲記龍井之游先生魯諸儒飲食清不溽空腸出秀句吟嚼五味足華堂閙絲管眸子漲春渌先生疾走避面冷毒在腹歸來煑瓠葉弟子歌旱麓聲淫及靈臺中有麀鹿伏功名一走兎何用千人逐故應容我軰清座時閉目髙亭石排衙木杪挂飛屋我來無時節客亦不待速似聞雪髯叟西嶺訪遺躅朝陽入潭洞金碧涵水玉泉扉夜不扄雲袂本無幅慈皇付寶偈神侣得幽讀訥庵有老人宴坐天魔哭時來獻纓絡法供燈相續吾儕詩酒汙欲往無乃觸齋厨費晨炊車騎滿山谷願聞第一義鉢飯非所欲便投切雲冠予㓜好竒服次韻林子中見寄飄零洛社數遺民詩酒當年困惡賔元亮本無適俗韻孝章要是有名人蒜山小隱雖為客江水西來亦帶岷巻却西湖千頃葑笑看魚尾更莘莘安州老人食蜜歌贈僧仲殊安州老人心似鐵老人心肝小兒舌不食五榖惟食蜜笑指蜜蜂作檀越蜜中有詩人不知千花百草爭含姿老人咀嚼時一吐還引世間癡小兒小兒得詩如得蜜蜜中有藥治百疾正當狂走捉風時一笑看詩百憂失東坡先生取人亷幾人相歡幾人嫌恰似飲茶甘苦雜不如食蜜中邊甜佛云吾言譬如食蜜中邊皆甜因君寄與雙龍餅鏡空一照雙龍影三吳六月水如湯老人心似雙龍井次韻錢穆父紫薇花二首虛白堂前合抱花秋風落日照横斜閲人此地知多少物化無涯生有涯虛白堂前紫薇兩株俗云樂天所種折得芳蕤兩眼花題詩相報字傾斜篋中尚有絲綸句坐覺天光照海涯樂天詩云絲綸閣下文章静鐘鼓樓中刻漏長獨坐黄昬誰是伴紫薇花對紫薇郎上嘗書此詩以賜軾送張嘉州少年不願萬戸侯亦不願識韓荆州頗願身為漢嘉守載酒時作凌雲逰虛名無用今白首夣中却到龍泓口浮雲軒冕何足言惟有江山難入手峨睂山月半輪秋影入平羌江水流謫仙此語誰解道請君見月時登樓笑談萬事真何有一時付與東巖酒佛峽人家白酒舊有名歸來還受一大錢好意莫違黄髪叟次韻蘇伯固主簿重九雲間朱袖拂雲和知是長松挂女蘿髻重不嫌黄菊滿手香新喜緑橙搓墨翻衫袖吾方醉紙落雲煙子患多只有黄雞與白髪玲瓏應識使君歌送李陶通直赴清溪忠文文正二大老司馬温公范蜀公君之師友蘇李廣平三舍人蘇子容宋次道與先公才元熙寧中封還李定詞頭天下謂之三舍人喜見通家賢子弟自言得邑少風塵從來勢利闗心薄此去溪山琢句新肯向西湖留數月錢塘初識小麒麟次韻楊公濟奉議梅花十首梅梢春色弄㣲和作意南枝翦刻多月黑林間逢縞袂覇陵醉尉誤誰何相逢月下是瑤臺藉草清樽連夜開明日酒醒應滿地空令饑鶴啄莓苔綠髪尋春湖畔回萬松嶺上一枝開而今縱老霜根在得見劉郎又獨來月地雲堦漫一樽玉奴終不負東昬臨春結綺荒荆棘誰信幽香是返魂日出冰湖散水花野梅官柳漸欹斜西郊欲就詩人飲黄四娘東子美家君知早落坐先開莫著新詩句句催嶺北霜枝最多思忍寒留待使君來冰盤未薦含酸子雪嶺先看耐凍枝應笑春風木芍藥豐肌弱骨要人醫寒雀喧喧凍不飛遶林空啅未開枝多情好與風流伴不到雙雙燕語時鮫綃翦碎玉簮輕檀暈粧成雪月明肯伴老人春一醉懸知欲落更多情縞裙練帨玉川家肝膽清新冷不邪穠李爭春猶辦此更教踏雪看梅花贈劉景文荷盡已無擎雨蓋菊殘猶有傲霜枝一年好景君須記最是橙黄橘綠時謝闗景仁送紅梅栽二首年年芳信負紅梅江畔垂垂又欲開珍重多情闗令尹直和根撥送春來為君栽向南堂下記取他年著子時酸釅不堪調衆口使君風味好攅睂辯才老師退居龍井不復出入軾往見之常出至風篁嶺左右驚曰逺公復過虎溪矣辯才笑曰杜子美不云乎與子成二老來往亦風流因作亭嶺上名之曰過溪亦曰二老謹次辯才韻賦詩一首日月轉雙轂古今同一丘惟此鶴骨老凛然不知秋去住兩無礙人天爭挽留去如龍出山雷雨巻潭湫來如珠還浦魚鼈爭駢頭此生暫寄寓常恐名實浮我比陶令愧師為逺公優送我還過溪溪水當逆流聊使此山人永記二老逰大千在掌握寧有離别憂送程之邵僉判赴闕夜光不自獻天驥良難知從來一狐腋或出五羖皮賢哉江東守收此幕中竒無華豈易識既得不自隨留君望此府助我憐其衰二年促膝語一旦長揖辭林深伏猛在岸改潜珍移去此當安從失君徒自悲念君瑚璉質當今臺閣宜去矣㑹有合豈常懷其私寄題梅宣義園亭仙人子真後還隱吳市門不惜十年力治此五畝園初期橘為奴漸見桐有孫清池壓丘虎異石來湖黿敲門無貴賤遂性各琴尊我本放浪人家寄西南坤敝廬雖尚在小圃誰當樊羨君欲歸去奈此未報恩愛予幸僚友久要疑弟昆明年過君西飲我空缾盆熙寜中軾通守此郡除夜直都㕔囚繋皆滿日莫不得返舎因題一詩于壁今二十年矣衰病之餘復忝郡寄再經除夜庭事蕭然三圄皆空盖同僚之力非拙朽所致因和前篇呈公濟子侔二通守前詩除日當早歸官事乃見留執筆對之泣哀此繫中囚小人營餱糧墮網不知羞我亦戀薄禄因循失歸休不須論賢愚均是為食謀誰能暫縱遣閔黙愧前修今和山川不改舊嵗月逝肯留百年一俯仰五勝更王囚同僚比岑范徳業前人羞坐令老鈍守嘯諾獲少休却思二十年出處非人謀齒髪付天公缺壞不可修遊寶雲寺得唐彦猷為杭州日送客舟中手書一絶句云山雨霏微不滿空畫舩來往疾輕鴻誰知獨卧朱簾裏一榻無塵四面風明日送彦猷之子坰赴鄂州舟中遇㣲雨感歎前事因和其韻作兩首送之且歸其書唐氏二妙凋零筆法空忽驚雲海戲羣鴻清詩不敢私囊篋人道黄門有父風黄門衛恒也出處榮枯一笑空十年社燕與秋鴻誰知白首長河路還卧當時送客風送江公著知吉州三吳行盡千山水猶道桐廬更清美豈惟濁世隱狂奴時平亦出佳公子初冠惠文讀城旦晚入奉常陪劒履方將華省起彈冠忽憶釣臺歸洗耳未應良木棄大匠要使名駒試千里奉親官舍當有擇得郡江南差可喜白粲連檣一萬艘紅粧執樂三千指簿書期㑹得餘閒亦念人生行樂耳二耳義不同故得重用聞錢道士與越守穆父飲酒送二壺龍根為脯玉為漿下界寒醅亦漫嘗一紙鵝經逸少醉他年鵬賦謫仙狂金丹自足留衰鬢苦淚何須㸃别腸吳越舊邦遺澤在定應符竹付諸郎次韻劉景文路分上元華燈閟艱嵗冷月掛空府三吳重時節九陌自歌舞云從月幾望遂至一百五嘉辰可屈指樂事相繼武今宵掃雲陣極目淨天宇嬉逰各忘歸闐咽頃未覩飛毬互明滅激水相吞吐老去反兒童歸來尚鐃鼓新年消暗雪舊嵗添絲縷何時九江城相對兩漁父予舊欲卜居廬山景文近買宅江州再和楊公濟梅花十絶一枝風物便清和看盡千林未覺多結習已空從著袂不須天女問云何天教桃李作輿臺故遣寒梅第一開慿仗幽人收艾納國香和雨入青苔白髪思家萬里回小軒臨水為花開故應剰作詩千首知是多情得得來人去殘英滿酒樽不堪細雨濕黄昬夜寒那得穿花蝶知是風流楚客魂春入西湖到處花裙腰芳草抱山斜盈盈解佩臨煙浦脈脈當壚傍酒家莫向霜晨怨未開白頭朝夕自相催斬新一朶含風露恰似西廂待月來洗盡鈆華見雪肌要將真色鬬生枝檀心已作龍涎吐玉頰何勞獺髓醫湖面初驚片片飛尊前吹折最繁枝何人㑹得春風意怕見梅黄雨細時長恨漫天柳絮輕只將飛舞占清明寒梅似與春相避未解無私造物情北客南來豈是家醉看參月半横斜他年欲識吳姬面秉燭三更對此花與葉淳老侯敦夫張秉道同相視新河秉道有詩次韻二首君不見元帥府前羅萬㦸濤頭未順千弩射至今鳳凰山下路長借一箭開兩翼我鑿西湖還舊觀一眼已盡西南碧又將回奪浮山險千艘夜下無南北坐陳三策本人謀惟留一諾待我畫老病思歸真暫寓功名如幻終何得從來自笑畫虵足此事何殊食雞肋憐君嗜好更迂闊得我新詩喜折屐江湖粗了我徑歸餘事後來當潤色一庵閒卧洞霄宫井有丹砂水長赤荆溪父老愁三害下斬長蛟本無賴平生倔強韓退之文字猶為鰐魚戒石門之役萬金耳首䑕不為吾已隘江湖開塞古有數兩鵠飛來告成壞勸農使者非常人一言已破黎民駭上饒使君更超逸坐睨浮山如累塊髯張乃我結襪生詩酒淋漓出狂怪我作水衡生作丞他日歸朝同此拜㯶筍并叙㯶筍狀如魚剖之得魚子味如苦筍而加丼芳蜀人以饌佛僧甚貴之而南方不知也筍生膚毳中蓋花之方孕者正二月間可剥取過此苦澀不可食矣取之無害於木而宜於飲食法當蒸熟所施畧與筍同蜜煮酢浸可致千里外今以餉殊長老贈君木魚三百尾中有鵝黄子魚子夜叉剖癭欲分甘籜龍藏頭敢言美願隨蔬果得自用勿使山林空老死問君何事食木魚烹不能鳴固其理次韻曹子方龍山真覺院瑞香花幽香結淺紫來自孤雲岑骨香不自知色淺意殊深移栽青蓮宇遂冠薝蔔林紉為楚臣佩散落天女襟君持風霜節耳冷歌笑音一逢蘭蕙質稍回鐵石心置酒要妍暖養花須晏陰及此隂晴間恐致慳嗇霖綵雲知易散鷤䳏憂先吟明朝便陳迹試著丹青臨次韻曹子方運判雪中同遊西湖詞源灔灔波頭展清唱一聲巖谷滿未容雪積句先髙豈獨湖開心自逺雲山已作歌睂淺山下碧流清似眼尊前侑酒只新詩何異書魚餐蠧簡次韻仲殊雪中游西湖二首夜半幽夣覺稍聞竹葦聲起續凍折絃為鼓一再行曲終天自明玉樓已崢嶸有懷二三子落筆先飛霙共為竹林㑹身與孤鴻輕秀語出寒餓身窮詩乃亨禪老復何為笑指孤煙生我獨念粲者誰與予目成寶雲樓閣閙千門林靜初無一鳥喧閉戸莫教風掃地巻簾疑有月臨軒水光㶑灔猶浮碧山色空濛已歛昏乞得湯休竒絶句始知鹽絮是陳言次韻參寥同前朝來處處白氊鋪樓閣山川盡一如總是爛銀并白玉不知竒貨有誰居送小本禪師赴法雲寓形天宇間出處㑹有役澹然都無營百年何由畢山林等憂患軒冕亦戲劇我未即歸休師寧便安逸王城滿豪傑議論紛黑白聖諦第一義對面誰不識師來亦何事孤月挂空碧是身如浮雲安可限南北出岫本無心既雨歸亦得珠泉有舊約何年挂缾錫書渾令公燕魚朝恩圖咸寧英氣似汾陽夜飲軍容出紅粧不須纒頭萬匹錦知卿未辦作吕強息壤詩并引淮南子曰鯀堙洪水盜帝之息壤帝使祝融殺之于羽淵今荆州南門外有狀若屋宇陷入地中而猶見其脊者旁有石記云不可犯畚鍤所及輒復如故又頗以致雷雨嵗大旱屢發有應予感之乃為作詩其詞曰帝息此壤以藩幽臺有神司之隨取而培帝勅下民無敢或開惟帝不言以雷以雨惟民知之幸帝之恕帝茫不知誰敢以告帝怒不常下土是震使民前知是役于民無是墳者誰取誰予惟其的之是以射之新渠詩并叙庚子正月予過唐州太守趙侯始復三陂疏召渠招懷逺人散耕于唐予方為旅人不得親執壺漿簞食以與侯勸逆四方之來者獨為新渠詩五章以告于道路致侯之意其詞曰新渠之水其來舒舒溢流于野至于通衢渠成如神民始不知問誰為之邦君趙侯新渠之田在渠左右渠來奕奕如赴如凑如雲斯積如屋斯溜嗟唐之人始識秔稌新渠之民自淮及潭挈其婦姑或走而顛王命趙侯宥我新民無與王事以訖七年侯調新民爾既來止其歸爾邑告爾隣里良田千萬爾擇爾取爾耕爾食遂為爾有築室于唐孔碩且堅生為唐民飽粥與饘死塟于唐祭有雉豚天子有命我惟爾安顔樂亭詩并叙顔子之故居所謂陋巷者有井存焉而不在顔氏久矣膠西太守孔君宗翰始得其地浚治其井作亭于其上命之曰顔樂昔夫子以簞食瓢飲賢顔子而韓子乃以為哲人之細事何哉蘇子曰古之觀人也必於其小者觀之其大者容有偽焉人能碎千金之璧不能無失聲於破釡能搏猛虎不能無變色於蠭蠆孰知簞食瓢飲之為哲人之大事乎乃作顔樂亭詩以遺孔君正韓子之説且以自警云天生烝民為之鼻口美者可嚼芬者可嗅美必有惡芬必有臭我無天遊六鑿交鬬騖而不反跬步商受偉哉先師安此㣲陋孟賁股慄虎豹却走眇然其身中亦何有我求至樂千載無偶執瓢從之忽焉在後東坡全集巻十八
