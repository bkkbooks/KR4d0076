body:
  text: 東坡全集卷二十八宋蘇軾撰詩一百十首問淵明或曰東坡此詩與淵明反此非知言也蓋亦相引以造意言者未始相非也元祐五年十月日子知神非形何復異人天豈惟三才中所在靡不然我引而髙之則為星斗懸我散而卑之寧非山與川三皇雖云沒至今在我前八百要有終彭祖非永年皇皇謀一醉發此露槿妍有酒不辭醉無酒斯飲泉立善求我譽饑人食饞涎委運憂傷生憂一作運去生亦還縱浪大化中正為化所纒應盡便須盡寧復事此言題雲龍草堂石磬折為督郵腰懸作山人室殊非濮上音信是泗濱石朱亥墓昔日朱公子雄豪不可追今來遊故國大塜屈稱兒平日輕公相千金棄若遺梁人不好事名字寄當時魯史盜齊豹求名誰復知慎無怨世俗猶不遭仲尼嚴顔碑先主反劉璋兵意頗不義孔明古豪傑何乃為此事劉璋固庸主誰為死不二嚴子獨何賢談笑傲砧兒國亡君已執嗟子死誰為何人刻山石使我空涕淚吁嗟斷頭將千古為病悸峴山逺客來自南游塵昏峴首過關無百步曠蕩吞楚藪登髙忽惆悵千載意有偶所憂誰復知嗟我生苦後團團山上檜嵗嵗閲榆栁大才固已殊安得同永久可憐山前客倐忽星過霤賢愚未及分來者當自剖驪山君門如天深幾重君王如帝坐法宫人生難處是安穩何為來此驪山中復道凌雲接金闕樓觀隱煙橫翠空林深霧暗迷八駿朝東暮西勞六龍六龍西幸峨眉棧悲風便入華清院霓裳蕭散羽衣空麋鹿來游猿鶴怨我上朝元春半老滿地落花無人掃羯鼓樓髙掛夕陽長生殿古生青草可憐吳楚兩醯雞築臺未就已堪悲長楊五柞漢幸免江都樓成隋自迷由來留連多喪國晏安鴆毒因奢惑三風十愆古所戒不必驪山可亡國和子由除日見寄薄官驅我西逺别不容惜方愁後㑹逺未暇憂嵗夕强歡雖有酒冷酌不成席秦烹惟羊羮隴饌有熊臘念為兒童嵗屈指已成昔往事今何追忽若箭已釋感時嗟事變所得不償失府卒來驅儺矍鑠驚逺客愁來豈有魔煩汝為攘磔寒梅與凍杏嫩萼初似麥攀條為惆悵玉蕊何時拆不憂春豔晚行見棄夏核人生行樂耳安用聲名藉胡為獨多感不見膏自炙詩來苦相寬子意逺可射依依見其面疑子在咫尺兄今雖小官幸忝佐方伯北池近所鑿中有汧水碧臨池飲美酒尚可消永日但恐詩力弱鬬健未免馘詩成十日到誰謂千里隔一月寄一篇憂愁何足擲過巴東縣不泊聞頗有萊公遺迹萊公昔未遇寂寞在巴東聞道山中樹猶餘手種松江山養豪俊禮數困英雄執版迎官長趨塵拜下風當年誰刺史應未識三公白帝廟朔風催入峽慘慘去何之共指蒼山路來朝白帝祠荒城秋草滿古樹野藤垂浩蕩荆江逺凄凉蜀客悲遲回問風俗涕泗閔興衰故國依然在遺民豈復知一方稱警蹕萬乘擁旌旗逺略初吞漢雄心豈在䕫﨑嶇來野廟閔默愧常時破甑蒸山麥長歌唱竹枝荆邯真壯士吳柱本經師失計雖無及圖王固已竒君餘帝王號皎皎在門楣戎州亂山圍古郡市易帶羣蠻庾嶺春耕少孤城夜漏閒往時邊有警征馬去無還自頃方從化年來亦款關頗能貪漢布但未脫金鐶何足爭强弱吾民盡玉顔孔周翰嘗令仙源中秋以事留東武時陳君榮右王君建中皆在郡後十七年中秋周翰持節過郡二君己亡感時懷舊留詩於壁又五年中秋軾與客飲超然臺聞周翰乞此郡客有誦其詩者乃次其韻二篇以為他日一笑屈指從來十七年交情零落一澘然嬋娟再見中秋月依舊清輝照客眠右孔壞壁題詩巳五年故人風物兩依然定知來嵗中秋月又照先生枕麴眠更邀明月說明年記取孤吟孟浩然此去宦遊如傳舍揀枝驚鵲幾時眠獲果莊二十二韻青唐有逋冦白首已窮妖竊據臨洮郡潛通講渚橋廟謀周召虎邊帥漢班超堅壘千兵破連航一炬燒擒姦從窟穴奏捷上煙霄詭異人圖像歡娛路載謠干誅非一事伐叛自先朝取道經陵寢前期告廟祧西來聞幾日面縛見今朝二聖臨雲陛千官溢海潮載囚車轣轆失主馬蕭條橫拜如蹲犬胡裝尚衣貂理卿辭具服譯長舌初調緩死恩殊厚求生尾屢搖慈仁逢太母寬厚戴唐堯赤手真擒虎和羮未賜梟藁街虛授首東市偶全腰困獸何須殺遺雛或可招威聲西振夏武節北通遼帝道有强弱天時或長消羌情防報復軍勝忌矜驕慎重關西將竒功勿再要光祿庵二首文章恨不見文園禮樂方將訪石泉何事庵中著光祿枉教閒處筆如椽城中太守的何人林下先生非我身若向庵中覔光祿雪中履迹鏡中真過木櫪觀石壁髙千尺微蹤逺欲無飛簷如劒寺出劒門東望上寺宇倣佛可見古柏似仙都許子嘗髙遁行舟悔不迂斬蛟聞猛烈提劒想﨑嶇寂寞棺猶在修崇世已愚隱居人不識化去俗爭吁洞府煙霞逺人間爪髮枯飄飄乘倒景誰復顧遺軀觀開西湖次吳左丞韻偉人謀議不求多事定紛紛自唯阿盡放龜魚還緑淨肯容蕭葦障前坡一朝美事誰能紀百尺蒼崕尚可磨天上列星當亦喜月明時下浴明波荆州十首遊人出三峽楚地盡平川北客隨南賈吳檣間蜀船江侵平野斷風捲白沙旋欲問興亡意重城自古堅南方舊戰國慘淡意猶存慷慨因劉表凄凉為屈原廢城猶帶井古姓聚成村亦解觀形勝升平不敢論楚地闊無邊蒼茫萬頃連耕牛未嘗汗投種去如捐農事誰當勸民愚亦可憐平生事遊惰那得怨凶年朱檻城東角髙王此望沙江山非一國烽火畏三巴戰骨淪秋草危樓倚斷霞百年豪傑盡擾擾見魚蝦沙頭煙漠漠來往厭喧卑野市分麞閙官帆過渡遲遊人多問卜傖叟盡携龜日暮江天靜無人唱楚詞太守王夫子山東老俊髦壯年聞猛烈白首見雄豪食雁君應厭驅車我正勞中書有安石慎勿賦離騷殘臘多風雪荆人重嵗時客心何草草里巷自嬉嬉爆竹驚鄰鬼驅儺逐小兒故人應念我相望各天涯江水深成窟潛魚大似犀赤鱗如琥珀老枕勝玻瓈上客舉雕俎佳人搖翠箆登庖更作器何以免屠刲北雁來南國依依似旅人縱橫遭折翼感惻為沾巾平日誰能挹髙飛不可馴故人持贈我三嗅若為珍栁門京國道驅馬及春陽野火燒枯草東風動緑芒北行連許鄧南去極衡湘楚境橫天下懷王信弱王渝州寄王道祖曽聞五月到渝州水泊長亭砌下流唯有夢魂長繚繞莫論唐史更綢繆舟經故國嵗時改霜落寒江波浪收歸夢不成冬夜永厭聞船上報更籌過安樂山聞山上木葉有文如道士篆符云此山乃張道陵所寓二首天師化去知何在玉印相傳世共珍故國子孫今尚死滿山秋葉豈能神真人已不死外慕墮空虛猶餘好名意滿樹寫天書涪州得山胡善鳴出黔中終日鎖筠籠回頭惜翠茸誰知聲㗲㗲亦自意重重夜宿烟生浦朝鳴日上峯故巢何足戀鷹隼豈能容巫山廟上下數十里有烏鳶無數取食於行舟之上舟人神之故亦不敢害羣飛來去噪行人得食無憂便可馴江上饑烏無足怪野鷹何事亦頻頻夷陵縣歐陽永叔至喜堂夷陵雖小邑自古控荆吳形勝今無用英雄久巳無誰知有文伯逺謫自王都人去年年改堂傾嵗嵗扶追思猶咎吕感歎亦憐朱時朱太守為公築此堂舊種孤楠老新霜一橘枯清篇留峽洞醉墨寫邦圖三游洞有詩夷陵圖後有留題處故老問行客長官今白鬚著書多念慮許國减歡娛寄語公知否還須數倒壺入峽自昔懷幽賞今兹得縱探長江連楚蜀萬派瀉東南合水來如電黔波緑似藍餘流細不數逺勢競相參入峽初無路連山忽似龕縈迂收浩渺蹙縮作淵潭風過如呼吸雲生似吐含墜崖鳴窣窣垂蔓緑毶毶冷翠多崕竹孤生有石楠飛泉飄亂雪怪石走驚驂絶澗知深淺樵童忽兩三人言偶逢郭沙岸可乘籃野戍荒州縣邦君古子男放衙鳴晚鼓留客薦霜柑聞道黃精草叢生緑玉篸盡應充食飲不見有彭𥅆氣候冬猶暖星河夜半涵遺民悲昶衍孟昶從此入覲玉衍亦蜀主舊俗接魚蠶版屋漫無瓦嵓居窄似庵伐薪常冒嶮得米不盈甔歎息生何陋劬勞不自慙葉舟輕逺泝大浪固嘗諳矍鑠空相視嘔啞莫與談蠻荒安可駐幽邃信難妉獨愛孤棲鶻髙超百尺嵐橫飛應自得逺揚似無貪振翮游霄漢無心顧雀䳺塵勞世方病局束我何堪盡解林泉好多為富貴酣試看飛鳥樂髙遁此心甘題贈田辨之琴姬流水隨絃滑清風入指寒坐中有狂客莫近繡簾彈四十年前元夕與故人夜遊得此句午夜朧朧淡月黃夢回猶有暗塵香縱橫滿地霜槐影寂寞蓮燈半在亡戲孫公素投扇昔年笑溫嶠握刀晚嵗戰劉郎不須戚戚如馮衍便與時時說李陽南康望湖亭一本云過洞庭八月渡長湖蕭條萬象疏一本云瀟湘景物疏秋風片帆急暮靄一本作雨一山孤許國心猶在康時術已虛術一作業岷峨家萬里投老得歸無半山亭登嶺勢巍巍蓮峯太華齊憑欄紅日早回首白雲低松柏月中老猿猴物外啼禪師吟絶後千古指人迷儋耳山突兀隘空虛他山總不如君看道傍石盡是補天餘次韻聞復上人前身本同社宿業獨臨邉一悟鏡空老始知圓澤賢歸心忘犢佩生術寄羊鞭不似歐陽子空留六一泉宋復古畫瀟湘晚景圖三首西征憶南國堂上畫瀟湘照眼雲山出浮空野水長舊游心自省信手筆都忘㑹有衡陽客來看意渺茫落落君懷抱山川自屈蟠經營初有適揮灑不應難江市人家少烟村古木攢知君有幽意細細為尋看咫尺殊非少隂晴自不齊徑蟠趨後崦水㑹赴前溪自說非人意曽經是馬蹄他年宦遊處應話劒山西儋州二首小邑浮橋外青山石岸東茶槍燒後出麥浪水前空萬户不禁酒三年真識翁結茅來此住嵗晚有誰同荔子幾時熟花頭今巳繁探春先揀樹買夏欲論園居士常携客參軍許扣門周參軍家多荔子明年更有味懷抱鬧諸孫一云帶諸孫海上道人傳以神守氣訣但向起時作還於作處收蛟龍莫放睡雷雨直須休要㑹無窮火嘗觀未盡油夜深人散後惟有一燈留曹溪夜觀傳燈録燈花落一僧字上口占山堂夜岑寂燈下看傳燈不覺燈花落茶毗一個僧贈包安靜先生三首皓色生甌面堪稱雪見羞東坡調詩腹今夜睡應休偶謁大中精藍中故人烹日注茶果不虛示故詩以記之建茶三十片不審味如何奉贈色居士僧房戰睡魔昨日㸃日注極佳㸃此復云罐中餘者可示及舟中滌神耳野菜初出珍又珍送與安靜病酒人便須起來和熱喫不消洗面裹頭巾杭州次周燾韻遊天竺觀激水道眼轉丹青常於寂處鳴早知雨是水不作兩般聲過海得子由書經過廢來久有弟忽相求門外三竿日江關一葉秋蕭疏悲白髮漫浪散窮愁世事江聲外吾生幸且休去嵗與子野遊逍遙堂日欲沒因並西山叩羅浮道院至已二鼓矣遂宿于西堂今嵗索居儋耳子野復來相見作詩贈之往嵗追歡地寒窗夢不成笑談驚半夜風雨暗長檠雞唱山椒曉鐘鳴霜外聲只今那復見髣佛似三生元祐五年十二月十二日同景文義伯聖途次元伯固仲䝉游七寶寺題竹上結根豈殊衆修柯獨出林孤髙不可恃嵗晚霜風侵泗州過倉中劉景文老兄戲贈一絶既聚伏波米還數魏舒籌應笑蘇夫子僥幸得湖州戲題巫山縣用杜子美韻巴俗深留客吳儂但憶歸直知難共語不是故相違東縣聞銅臭江陵換夾衣丁寧巫峽雨慎莫暗朝暉初貶英州過杞贈馬夢得萬古他池穴歸心負雪堂殷勤竹林詠猶得比山王答朝以道索書閲世真難記如公自不忘其於書太簡正以懶相妨大老寺竹間閣子殘花帶葉暗新筍出林香但見竹隂緑不知汧水黃樹髙傾隴鳥池浚落河魴栽種良辛苦孤僧瘦欲尫和廬山上人竹軒洞外復空中千千萬萬同勞師向竹頌清是阿誰風款塞來享蠢爾氐羌國天誅亦久稽既能知面內不復議征西斥堠銷烽火邊城息鼓鼙輸忠修貢職棄過為黔黎雪滿流沙靜雲沉太白低巍巍二聖治盛德古難齊觀臺三界無所住一臺聊自寧塵勞付白骨寂照起黃庭殘磬風中嫋孤燈雪後青須防童子戲投瓦犯清泠吳江岸曉色兼秋色蟬聲雜鳥聲壯懷銷鑠盡回首尚心驚嘲子由堆几盡埃簡攻之如蠧蟲誰知聖人意不在古書中無題六秩行當啓區中緣更疏不貪為我寶安步當君車故國多喬木先人有弊廬誓將閒散好不著一行書元祐九年立春熊白來山北猪紅削劔南春盤得青韭臘酒寄黃柑扶風天和寺逺望若可愛朱欄碧瓦溝聊為一駐足且慰百回頭水落見山石塵髙昏市樓臨風莫長嘯遺涕浩難收再贈常州報恩長老薦福老懷真巧便淨慈兩本更尖新憑師為作鐡門限凖備人間請話人聞洮西捷報漢家將軍一丈佛詔賜天池八尺龍露布朝馳玉關塞捷書夜到甘泉宫似聞指揮築上郡已覺談笑無西戎牧臣不見天顔喜但驚草木放一作皆春容三萼牡丹風雨何年别留真向此邦至今遺恨在巧過不成雙已未十月十五日獄中恭聞太皇太后不豫有赦作詩庭柏隂隂晝掩門烏知有赦鬧黃昏漢宫自種三生福楚客還招九死魂縱有鋤犂及田畝已無面目見丘園只應聖主如堯舜猶許先生作正言題李景元畫聞說神仙郭恕先醉中狂筆勢瀾翻百年寥落何人在只有華亭李景元謝人惠雲巾方舄二首燕尾稱呼理未便剪裁雲葉却天然無心只是青山物覆頂宜歸紫府仙轉覺周家新樣俗頭巾起後周未容陶令舊名傳鹿門佳士勤相贈黑霧𤣥霜合比肩皮襲美贈天隨子紗中詩云掩斂乍疑裁黑霧輕明渾似帶𤣥霜胡鞾短靿格粗疏古雅無如此樣殊妙手不勞盤作鳯晉永嘉中有鳯頭鞋輕身只欲化為鳬魏風褊儉堪羞葛楚客豪華可笑珠擬學粱家名解脫武帝作解脫履便於禪坐作跏趺謝宋漢傑惠李承晏墨老松燒盡結輕花妙法來從北李家翠色冷光何所似墻東鬒髮墮寒鴉被命南遷塗中寄定武同僚人事千頭及萬頭得時何喜失時憂只知紫綬三公貴不覺黃粱一夢遊適見恩綸臨定武忽遭分職赴英州南行若到江干側休宿潯陽舊酒樓李委吹笛並引元符五年十二月十九日東坡生日也置酒赤壁磯下踞髙峰俯鵲巢酒酣笛聲起於江上客有郭石二生頗知音謂坡曰笛聲有新意非俗工也使人問之則進士李委聞坡生日作新曲曰鶴南飛以獻呼之使前則青巾紫裘要笛而已既奏新曲又快作數弄嘹然有穿雲裂石之聲坐客皆引滿醉倒委袖出嘉紙一幅曰吾無求於公得一絶句足矣坡笑而從之山頭孤鶴向南飛載我南遊到九嶷下界何人也吹笛可憐時復犯龜兹書黃筌畫翎毛花蝶圖二首短翎長喙喜喧卑曳練雙翔亦自竒賴有黃鸝鬬嬛好獨依蘚石立多時緑隂青子已愁人忍見中庭燕麥新惆悵劉郎今白首時來看卷覔餘春次韻王定國得晉卿酒相留夜飲短衫壓手氣橫秋更著仙人紫綺裘使我有名全是酒從他作病且忘憂詩無定律君應將醉有真鄉我可侯且倒餘樽盡今夕睡蛇已死不須鈎偶於龍井辨才處得歙硯甚竒作小詩羅細無文角浪平半丸犀壁浦雲泓午窗睡起人初靜時聽西風拉瑟聲秋晚客興草滿池塘霜送梅疏林野色近樓臺天圍故越侵雲盡潮上孤城帶月回客夢冷隨楓葉斷愁心低逐雁聲來流年又喜經重九可意黃花是處開陳伯比和回字復次韻下里馮生寧屑去湖海陳侯猶肯來詩書好在家四壁蒲栁蓊然城一隈騎上下山亦疏矣倏從容出何為哉市橋十步即塵土晚雨瀟瀟殊未回廣陵後園題申公扇子露葉風枝曉自勻緑隂青子淨無塵閒吟繞屋扶疏句須信淵明是可人山光寺回次芝上人韻鬧裏清遊借隙光醉時真境發天藏夢回拾得吹來句十里南風草木香與道源遊西莊遇齊道人同往草堂為齊書此桑麻巳零落藻荇復銷沉園宅在人境嵗時傷我心强穿南埭路遙望北山岑欲與道人語跨鞍聊一尋寒食夜漏聲透入碧窗紗人靜鞦韆影半斜沉麝不燒金鴨冷淡雲籠月照梨花答子勉三首君不登郎省還應上諌坡才髙殊未識嵗晚幸無他櫪馬羸難出鄰雞凍不歌寒爐餘幾火灰裏撥隂何驚人得佳句或以傲王公處士還清節滑稽安足雄深沉似康樂簡逺到安豐一㸃無俗氣相期林下風欲舞腰身栁一窠小梅催拍大梅歌舞餘片片梨花落爭奈當塗風物何送楊奉禮譜牒推關右風流出靖恭時情任險陂家法故雍容南去河千頃大水中相别餘惟酒一鍾更誰哀老子令得放疏慵别東武流杯莫笑官居如傳舍故應人世等浮雲百年父老知誰在唯有雙松識使君走筆謝吕行甫惠子魚卧沙細肋吾方厭通印長魚誰肯分好事東平貴公子貴人不與與蘇君訪詹使君食槐芽一作葉冷淘枇杷已熟粲金珠桑落初嘗灧玉蛆暫借垂蓮十分盞來澆空腹五車書青浮卵碗槐芽餅紅㸃冰盤藿葉魚醉飽髙眠真事業此生有味在三餘贈䖍州慈雲寺鑒老居士無塵堪洗沐道人有句借宣揚窗間但見蠅鑽紙門外唯聞佛放光遍界難藏真薄相一絲不掛且逢埸却須重說圓通偈千眼薰籠是法王和方南圭寄迓周文之三首共惜相從一寸隂酒杯雖淺意殊深且同月下三人影聊豁一作莫作天涯萬里心東嶺舊一作近開松竹徑南堂初絶斧斤音知君善頌如張老猶望携壺更一臨數畝蓬蒿古縣隂小窗明快夜堂深也知卜築非真宅聊欲跏趺看此心聞道携壺問竒字更宜登木助徽音一云振履出商音相娛比户江千頃直下都無地可臨此生真欲老墻隂却掃都忘嵗月深拔薤已觀賢守政摘蔬聊慰故人心風流賀監常吳語憔悴鍾儀獨楚音治狀兩邦俱第一潁川歸去肯重臨壺中九華詩並引湖口人李正臣蓄異石九峰玲瓏宛轉若窗􅎉然余欲以百金買之與仇池石為偶方南遷未暇也名之曰壺中九華且以詩識之我家岷蜀最髙峰一作清溪電轉失雲峯夢裏猶驚翠掃空五嶺莫愁千嶂外九華今在一壺中天池水落層層見一作石泉影落涓涓滴玉女窗明處處通念我仇池太孤絶百金歸買小一作碧玲瓏留别登州舉人身世相忘久自知此行閒看古黃腄自非北海孔文舉誰識東萊太史慈落筆已吞雲夢客抱寒欲訪水仙師莫嫌五日匆匆守歸去先傳樂職詩過海又見二十五卷參橫斗落轉一作轉欲三更苦雨終風也解晴雲散月明誰㸃綴天宫海色本澄清空餘魯叟乘桴意無復一作粗識軒皇奏樂聲九死南荒吾不恨兹游竒絶冠平生過嶺寄子由三首七年來往我何堪又試曹溪一勺甘夢裏似曽遷海外醉中不覺到江南波生濯足鳴空澗霧繞征衣滴翠嵐誰遣山雞忽驚起半巖花雨落毶毶投章獻策謾多談能雪寃忠死亦甘一片丹心天日下數行清淚嶺雲南光榮歸佩呈佳瑞瘴癘幽居弄晚嵐從此西風庾梅謝却迎誰與馬毶毶山林瘴霧老難堪歸去中原荼亦甘有命誰憐終反北無心却笑亦巢南蠻音慣習疑傖語脾病縈纒帶嶺嵐賴有祖師清淨水塵埃一洗落毶毶歇白塔鋪甘山廬阜鬱長望林隙依稀一作熹微漏日光吳國晚蠶初斷葉占城早稻欲移秧迢迢澗水隨人急冉冉巖花撲馬香望眼儘從一作窮飛鳥逺白雲深處是吾鄉西蜀楊耆二十年前見之甚貧今見之亦貧所異於昔者蒼顔華髮耳女無美惡富者姸士無賢不肖貧者鄙使其逢時遇合豈減當世之士哉頃宿長安驛舍聞泣者甚怨問之乃昔富而今貧者乃作一詩今以贈楊君孤村漸一作微雨逐秋凉逆旅愁人怨夜長不寐相看唯櫪馬愁吟一作悲歌互答有寒螿天寒滯穗猶橫畝嵗晚空機尚倚墻勸爾一杯聊復睡人間貧富海茫茫贈人别後休論信息疏仙凡自古亦殊途蓬山路逺人難到霜柏威髙道轉孤舊賞未應亡楚國新詩聞巳滿皇都誰憐澤畔行吟者目斷長安貌欲枯趙成伯家有姝麗僕忝鄉人不肯開樽徒吟春雪謹依元韻以當一笑繡簾朱户未曽開誰見梅花落鏡臺試問髙吟三十韻俗云檢驗死秀才帶上有詩三十韻何如低唱兩三杯世傳陶穀學士買得党太尉家故妓遇雪陶取雪水烹團茶謂妓曰党家應不識此妓曰彼粗人安有此景但能於銷金暖帳下淺斟低唱喫羊羔兒酒耳陶默然愧其言莫嫌衰鬢聊相映須得纎腰與共回知道文君隔青鎖梁園賦客敢言才聊答來句義取婦人而已罪過罪過東坡全集卷二十八
