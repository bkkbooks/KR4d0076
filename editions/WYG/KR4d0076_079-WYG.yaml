body:
  text: 東坡全集巻七十九宋蘓軾撰尺牘八十三首謝吕龍圖三首京師龍圖閣老執事某西蜀之鄙人幼承家訓長知義方麤識名教遂堅晚節兩登進士舉一中茂材科故當世名公巨卿亦嘗賜其提挈愛憐之意故歐公引之於其始韓公薦之於其中今又閣下舉之於其後自惟末學辱大賢者之知出自天幸然君子之心以公而取士其小人之志終貿恩以歸心但空省循何由論報比者上以片言隻字謝徳於門下而其誠之所加意有所不能盡意之所至言有所不能宣故其見於筆舌者止此而已惟高明有以容而亮之又前以拙納上塵聽覽方懼獲罪於門下而無以容其誅又辱荅教言辭欵宻禮遇優隆而褒揚之句有加於前日此不肖所以且喜且懼而莫知所措也珍函已捧受訖謹藏之於家以為子孫之美觀蔀屋之陋復生光彩陳根之朽再出英華乃閣下暖然之春有以嫗育成就之故也擇日齋沐再詣閣下臨紙澁納情不能宣伏惟恕其愚又某久以局事汩没殊不獲覯止竊惟應得踈絶之罪於左右不意寛仁含垢察其俗狀之常情恕其簡略之小過光降書辭曲加勞問拜貺之際益増厚顔旦夕詣賔次盛暑伏惟為朝廷自愛上副注倚之心下慰輿人之望與楊濟甫為别忽已半歲傾想之懐逺而益甚即日起居何如貴眷各安不自離家至荆南數次奉書計並聞達前月半已至京一行無恙得臘月中所恵書甚慰逺意見在西崗賃一宅子居住恐要知悉春暄未縁會見千萬珍重珍重荅王龍圗辱簡承孝履如宜新詩寵行甚幸但稱道太過非所以安不肖也餘所諭謹在意與楊濟甫鳯翔奉别三更歲律思渴日深即日履此新春起居多勝貴聚各嘉安某前月十四日到鳳翔十五日已交割訖人事紛紛乆稽裁問想自尊君㐮事後來漸獲閒静營幹諸事必且濟辦某此與賤累如常今因范元歸奉書聞露氣候漸和更希珍重與蒲城之六首某啓聞軒馬已至多時而性懶作書不因使齎手教來雖有傾渴之心終不能致一字左右也悚愧悚愧盛熱殊不可過承起居佳裕甚喜甚喜某此並無恙京師得信亦安但近得山南書報伯母於六月十日傾背伯父之喪未及一年而災禍仍重如此何以為心家兄惟三哥在左右大哥二哥必取次一人歸山南謀扶匶還鄉也人生患難至有如此極者煩惱煩惱知郡事頗簡足以尋繹舊學也同僚中有可與相處而樂者否新牧倅皆在此常相見恐知悉殘暑更冀順時珍重又近聞員秘丞言聞於誠之韓益州欲令誠之替某若得情固所喜幸也然某盡今歲方及二年不知朝廷肯令某成資解去否若必俟三考則於誠之為太淹緩安用也向經由時甚恨不欵曲今若因此得從容接奉何喜如之陳文日日見甚安又近遞中辱書方欲附問人來又承手教審聞起居佳勝差慰瞻望新命必已下伏増欣慶茍相知豈必為交代但奉見稍逺耳承又須歸覲奔波良不易也秋冷千萬善愛又聞車騎已在二曲即見風采喜慰可知冒寒行李不易乆此僻左獲奉清游幸甚也又今日比欲更接清話少頃而人事紛紛至今不得暫息欲奉謁次聞府官盡出接張省簉須至旦出城恐訝不來走此聞逹又長安之别忽然改歲伏計履兹新春起居増慶某明日至府謁見預増欣抃然不免有少事千聒為本府帶得接新戎兵士數十人比謂到京却中途逢本官行李頗闕事欲告於貴府添差防䕶廂軍十餘人昨本有防䕶二十人為華州減却十人但只依元數亦差較也告早為擘畫某更不住後日絶早發去也恃眷契喋喋喧黷幸為留念與楊濟甫冬寒逺想起居佳勝此去替不兩月更不能歸鄉且入京去逾逺依黯近得王道矩書云朝夕一來此相看告便如遞中恵一書貴知道矩㡬日起發此幹告早及某只十二月十七八間離岐下也荅楊濟甫二首除䘮還朝某近領臘下教墨感服眷厚兼審起居佳勝某此與賤累如常舍弟差入貢院更半月可出都下春色已盛但塊然獨處無與為樂所居㕔前有小花圃課童種菜亦少有佳趣傍宜秋門皆髙槐古栁一似山居頗便野性也漸暖惟千萬珍重又遞中屢得數書知尊體佳勝貴眷欠安示及發遞引自契勘得並到但鄉親書皆五六十日不獨濟甫也府推之命只是暫權發遣更月餘正官到即仍舊管官誥院也府中冗絆非拙者所樂恐知都下所須示及與楊濟甫近領來書喜知眠食佳安某此與賤累皆安陳州舍弟並安不煩念及久客都下桂玉所迫囊装並竭今冬積雪四五尺僦居弊陋殊無聊惟日望一差遣出去耳未由披奉千萬珍重荅寳月大師二首久不奉書蓋冗惰相因必未訝也史厚秀才及蔡子華處領來書知法體佳勝此中並安請補外䝉恩除杭倅旦夕出京且往陳州相聚至九月初方行逾逺鄉里曷勝依黯累示及瑜隆紫衣師號近為干得王詵駙馬奏瑜為海慧大師文字更旬日方出圓覺經云法界海慧照了諸相文潞公亦許奏隆紫衣然須俟來年遇聖節方可奏已差祠部吏人到王附馬宅計會瑜師文字纔得便入遞次莫更一兩月方得勅出此事自難得偶成此二事也臨行草草書不盡此懐惟千萬珍重又屢䝉寄紙一一愧荷附馬都尉王晉卿畫山水寒林冠絶一時非畫工能髣髴得一古松帳子奉寄非吾兄别識不寄去也幸秘藏之亦使蜀中工者見長意思也他甚珍惜不妄與人與大覺禪師璉公杭倅人至辱書伏承法候安裕傾向傾向昨奉聞欲捨禪月羅漢非有他也先君愛此畫私心以為捨施莫如捨所甚愛而先君所與厚善者莫如公又此畫頗似靈異累有所覺於夢寐不欲盡談嫌渉怪爾以此益不欲於俗家收藏意只如此而來書乃見疑欲換金水羅漢開書不覺失笑近世士風薄惡動有可疑不謂世外之人猶復爾也請勿復談此某比乏人可令齎卡兵卒之類又不足分付告吾師差一謹幹小師齎籠仗來迎取并古佛一軸亦同捨也錢塘景物樂之忘歸舍弟今自陳州得替當受東南幕官冬初恐到此亦未甚的詩筆計益老健或借得數首一觀良幸到此亦有拙惡百十首閒暇當録寄也答范夢得二首乆以事牽不遑奉書深以為愧中間安上處及遞中捧來教具審起居佳勝某旅宦粗遣春夏間殊少事近日併覺冗坌盗賊獄訟常滿蓋新法方行故也疲薾無状館中清佚至為福地然知平日交游皆不在何以為樂某旬日來被差本州監試得閒二十餘日在中和堂望海樓閒坐漸覺快適有詩數首寄去以發一笑又久不奉書愧負不可言不審比辰起居佳否某此粗遣但親友疎濶旅懐牢落爾屢得蜀公書知佳徤二家兄書云毎去輒留食食倍於我軰此大慶也頻得潞公手筆皆詳悉精好富公必時見之聞其似四十許人信否君實固甚清安得此數公無恙差慰人意無縁言面惟順時自愛與郭功父五首昨日承顧訪殊慰久濶經夕起居佳否某出院本欲往見以下痢乏力未果想未訝也略奉啓布謝萬一又元本闕四字瞻奉喜慰可量既以不出又數日卧病遂元本闕五字起居佳否某下痢雖止尚羸薾也謹奉啓布謝又兒子歸來别無可為土物御筆一雙賜墨一圭新茶兩餅皆得之大臣家真物也不罪凂凟又辱訪臨感怍獨以怱遽為恨廹行不往謝惟寛恕乍熱萬萬自重不宣又别來瞻仰無窮風雪凝寒從者勤矣辱書承起居甚佳為使者即至必且暫還惟萬萬自重與康公操都管三首某稔聞才業之美尚淹擢用向承非罪被移衆論可怪賢者處之想恬適也希聲乆不得書承示諭方知得蜀州應甚慰意二浙處處佳山水守官殊可樂鄉人之至此者絶少舉目無親故而杭又多事時投餘隙輒出訪覽亦自可卒歲也東陽自昔勝處見劉夢得有三伏生秋之句此境猶在否未知會晤之日但有企咏又所索詩非敢以淺陋為辭但希世絶境衆賢所共詠嘆不敢草草為寄也幸恕察又向辱教乆欲裁謝值出入紛紛無定因循至今即日履兹春和起居佳適向承寄示圗記及時實深慰仰此真得賢者之樂雖鄙拙亦欲勉作歌詩庶㡬附託髙人絶境以傳永久適會紛紛未暇更旬日當寄上也答楊君素久不奉書遞中領來教欣承起居佳勝眷愛各無恙奉别忽四年薄廪維絆歸計未成懐想親舊可勝惋嘆吾丈優游自得心恬體舒必享龜鶴之夀劣姪與時齟齬終當捨去相從林下也與楊濟甫久不奉書亦少領來信思念不去心不審即日起居佳勝眷愛各無恙某此安健官滿本欲還鄉又為舍弟在京東不忍連年與之逺别已乞得宻州風土事體皆佳又得與齊州相近可以時得治牒相見私願任便之但歸期又須更數年瞻望墳墓懐想親舊不覺澘然未縁會面惟冀順時自重與周開祖某忝命皆出奨借尋自杭至吳興見公擇而元素子野孝叔令舉皆在湖燕集甚盛深以開祖不在坐為恨别後每到佳山水處未嘗不懐想談笑出京北去風俗既椎魯而游従詩酒如開祖者豈可復得乃知向者之樂不可得而繼也令舉特來錢塘相别遂見送至湖久在吳中别去真作數日惡然詩人不在大家省得三五十首唱酬亦非細事與何浩然人還辱書且喜起居佳勝寫真竒妙見者皆言十分形神甚奪真也非故人倍常用意何以及此感服之至所要詩稍暇作寫去雙幅已令蜀中織造至便寄納未即會見千萬珍重答水陸通長老五首宻州近過蘇䑓不得一見而别深為耿耿専人來辱書且喜法履清勝某到此旬日郡僻事少足養衰拙然城中無山水寺宇朴陋僧麄野復求蘇杭湖山之遊無復髣髴矣何日會集慰此牢落惟萬萬自重又三瑞堂詩已作了納去惡詩竟何用是家求之如此其切不敢不作也恵及温柑甚竒此中未嘗識也棗子兩􅤮不足為報但此中所有只此耳單君貺必常相見路中屢有書去久望來書且請附宻州遞寄數字告為速達此意又别後一向冗忙有疎奉問叠辱手教愧悚良深仍審履兹初涼法體増勝為慰承開堂未㡬學者日増吾師久安閒獨廹於衆意無乃少勞然以濟物為心應不計勞逸也未縁會合千萬珍重人還布謝又姚君篤善好事其意極可佳然不須以物見遺也惠香十八罐却託還之已領其厚意與収留無異實為他相識所恵皆不留故也切為多致此懇又且説與姚君勿疑訝只為自來不受非親舊之餽恐他人却見怪也元伯昆仲因見各為致懇乍到未及奉書答陳履常二首吳中屢得瞻見時以餘棄洗濯䝉鄙别來仰佇日深遞中首辱教尺感服良厚即日履兹酷暑起居何如貴眷令子各佳勝披奉杳然臨紙悵惘惟冀為時調䕶又逺承寄貺詩刻讀之灑然如聞玉音何幸獲此榮觀不獨以見作者之格且足以知風政之多暇而髙躅之難繼也輒和光禄菴二絶聊以寄欽羡之懐一笑投之可也所須接骨丹方謹録呈髙宻連年旱蝗應副朔方百須紛然疲薾日俟汰逐企仰仙館如在雲漢矣因風不吝誨字答程彛仲二首某啓奉别積年因循不修書問毎以為愧遞中辱手書勞問甚厚感戴不可言也承以科詔入都跋履之餘起居佳否老兄循道既乆文行逾粹决無終否不振之理更少貶以就繩墨即當俯拾也未縁披奉惟冀以時自重謹因鄉人李君行奉啓布問又得聖此行得失必且西歸計無縁過我而東武任滿當在來歲冬杪亦無縁及見於京師矣此任滿日舍弟亦解罷當求鄉里一任與之西還近制既得連任蜀中遂可歸老守死墳墓也心貌衰老不復往日惟念斗酒隻雞與親舊相從耳星橋别業比來更増葺否因便無惜一兩字與王慶源二首陵州遞中辱書及詩如接風論忽不知萬里之逺也即日履兹秋暑尊候何似某此粗遣雖有江山風物之美而新法嚴宻風波險惡况味如不佳退之所謂居閒食不足從官力難任兩事皆害性一生常苦心正此謂矣知叔丈年來頗窘此事有定分但兄以安健無事多子孫為樂亦可自遣何時歸休得相從田里但言此心已馳於瑞草橋之西南矣秋暑更冀以時珍重又髙宻風土食物稍佳但省租公庫減削索然貧儉始至值歲饑人豪剽刼無虛日凢督捕姦兇五七十人近始肅然鬬訟頗簡稍葺治園亭居之亦粗可樂但時登髙西南引領即悵然終日近稍能飲酒終日可飲十五銀盞他日粗可奉陪於瑞草橋路上放歌倒載也答金山寳覺禪師去歲赴官廹於程限不能枉舟一别中流縱望雲山杳然有不可及之歎既渡江遂䝉輕舟見餞復得笑語一餉之樂暫荷之懐殆不可勝言别來因循未及修書專人至辱教累幅慰喻反覆讀之爽然如對妙論仍審比來法履佳勝某此粗遣但未有會見之期臨紙惘然惟萬萬自重至游堂記即當下筆逓中寄去近有後杞菊賦一首寫寄以當一笑荅富道人承録示秘方及寄遺藥具感厚意然此事本林下無以遣日聊用適意可也若待以為生則為造物者所惡矣僕方茍禄出仕豈暇為此謹却馳納且寄之左右異日歸田却咨請感愧之至答周開祖逓中辱書教累幅如接笑語即日逺想起居佳勝某此無恙已被㫖移河中府候替人十二月上旬中行想去益逺矣往日相從湖山之景何縁復有别後百事紛紛皆不足道惟令舉逝去令人不復有意於兹世細思此公所以不夀者而不可得不免為之出涕讀所示記文述略盡其美甚善其家能入石否亦欲作一首哀詞未暇也當作寄去開祖筆力頗長魏武所謂老而能學惟予與袁伯業真難得也寄示山圗欲尋善本而不可得者新詩清絶輒和兩首取笑浩然亭欲續和寄去今日大雪與客飲於玉山堂適遣人往舍弟處遂作此書手冷殊不成字惟冀自重而已答蜀僧幾演幾演大士䝉恵蟠龍集向已盡讀數册迺詩迺文筆力竒健深増嘆服僕嘗觀貫休齊己詩尤多凢陋而遇知得名赫奕如此蓋時文凋弊故使此二僧為雄强今吾師老於吟咏精敏豪放而汩没流俗豈亦有幸不幸耶然此道固亦澹泊寂寞非以蘄人知而鼓譽也但鳴一代之風雅而已既承厚貺聊奉廣耳與人違去門下已八年愚魯罷殆人事廢書疏缺然怠慢之罪宜在譴絶比承柄用又不以時隨衆修賀蓋疎懶愧縮日復一日不知復憐恕之否即日履兹寒凝台候萬福某去替止數月而貧困難以赴闕相次乞江浙一郡君幸得之拜見未可期惟冀為國自重答張主簿改歲無縁展慶伏惟履兹新春百福來集旬日前辱教感服眷厚不即馳答悚怍悚怍向日披奉但有馳仰餘寒冀以時自重與人二首浙右之别遂不上問至今想必察其情也特枉書問感慰兼集比日起居何如渉海恬然繼以題擢衆論翕然知忠信之可恃名實之相副也雅故之末忻慰可量又前日使車道由郡下雖展接顔表殊慰瞻傃之懐惟是禮勞不腆實深愧悚逮兹違間吏役絆攖未皇奉書以伸繾綣之情特䝉髙明逺貺珍牘披繹數四感仰交懐初暑微熱竊承跋履之餘動止佳勝未縁會集臨紙増慨與梅守黎希聲三首徐州傾向己乆展奉無由竊計比日履兹酷暑起居佳勝某占籍部中不獲俯伏門下一修桑梓之儀瞻望鈴齋豈勝懐仰伏順時為民自愛又去歲王秀才西歸奉狀必達即日逺想起居佳勝承朝廷俯狥民欲有㫖借留雖滯留髙歩士論未厭而鄉閭之慶特以自私而己然山水之秀園亭之勝士人之衆多食物之便美計公亦自樂之忘歸也某久去墳墓貪禄忘家念之輒面熱但差使南北不敢自擇爾何時復得一笑為樂尚冀為時自重又向自宻将赴河中至陳橋受命改差彭城便欲赴任以兒子娶婦暫留城東景仁園中旦夕自汴東去逾逺風問可勝悵然墳墓毎煩戒敕惟増感噎堂兄欲葬祖墳為諸房衆多某既不敢果决恐衆意難允也乞知之答李秀才元熱甚竟不再别悵仰殊深辱教承起居佳勝寵恵皆竒筆雅制刻荷無已仁者之恵誠足慰彼黎庶然不知者以為見教以是搖之呵呵安道舍弟當具道盛意乍逺萬乞保重即復顯用以慰士望答范蜀公前日辱書并新詩累幅詞格清美欽味不釋手屬使者交至紛紛無暇裁答後時再領手教愧悚無地比日起居何如未由披奉萬萬以時自重答晁叔美二首自别兩辱存問荷眷契之厚無以為喻日欲裁謝而拙鈍懶放因循至今計明哲雅量不深讉過而自訟亦乆矣即日不審尊履何如某此無恙但奉行新政多不如法勘劾相尋日竢汰譴耳若得放歸過淮必遂候見未間為國自重又向承出按淮甸不即具賀幅者以吾兄素性亮直而此職多有可愧者計非所樂耳然仁者於此時力行寛大之政少舒吏民於網羅中亦所益不小此中常賦之外徵歛雜出而鹽禁繁宻急於兵火民既無告吏亦僅且免罪益茍簡矣向聞吾兄議論頗與時軰不合今兹躬履其事必有可觀者矣令兄佳士久淹諸君亦自知之與蒲廷淵河中永洛出棗道家所貴事見真誥唐有道士侯道華嘗得無核者三食之後竟竊鄧太主藥上昇君到彼試求之但恐得之不偶然非力求所能致耳與晁君成苦寒審尊履佳勝新文極為精妙久不見之甚慰喜莊子用志不分乃疑於神古語以疑為似耳如易隂疑於陽世俗不知乃改作凝不敢不告人還草草與范子豐六首伏審子豐南宫殊健慶抃可量即日想已唱第必在髙等期集之暇起居佳勝某更五七日泝汴愈逺左右臨書悵然惟祈慎重别膺亨寵又小事拜聞欲乞東南一郡聞四明明年四月成資尚未除人託為問看回書一報前所託殊不䝉留意恐非久東南遂請逾難望矣無乃求備之過乎然亦慎不可汎愛輕取也人還且略示諭又近專人奉狀達否即日起居何如貴眷各安局事漸清簡否某幸無恙水旱相繼流亡盜賊並起决口未塞河水日増勞苦紛紛何時定乎近乞四明不知可得否不爾但得江淮間一小郡皆所樂更不敢有擇也子豐能為一言於諸公間乎試留意人還仍乞一報幸甚未見無期惟萬萬以時自重又稍不通問伏想起居佳勝侍郎丈必在郊外過夏台候必更康安某此與㓜累如常八月九月間秋水既過彭城城下徹備髙麗使已還四明可以易守當更理前請也會合杳未有涯萬萬自重又南方夏熱殊非中原之比入秋稍得清涼然夏田旱損七八鹽法更變課入不登雖閒局不免以此為累自餘麤如常也子中子老頃在左右今已赴官未何時參候北望不勝馳情又新珠想日長進愛壻無恙甚望丈人髙等待乞利市也納銀一笏託用買圓熟珠子二千枚少錢告那出便納上婚嫁所須不可奈何甚非情願幸留意承問似叔頗長成毎日作詩讀史但蒙拙少訓督耳内孫想亦聰淑諸郎娘亦計安也答王慶源久以官冗不暇奉問忽辱手訊喜知車從己達輦下起居佳勝即日南宫必榜出矣淪屈已久必遂了當欣荷良深來書謙抑過當四方赴者甚衆豈獨吾叔元昆勸駕良合事宜恨此拘繫無縁於東華門外奉接京師一别二十餘年豈惟吾儕衰老可嘆至於都城風物事體索然無復往時矣東南守官極可樂而民間蹙廹不聊生懐抱殊不佳深願慶源了當後千萬一來相從數月少慰平生幸勿以他事為辭至懇至懇與參寥别來思企不可言毎至逍遥堂未嘗不悵然也為書勤勤不忘如此仍審比來法體康佳感服兼至三詩皆清妙讀之不釋手且和一篇為答所要真賛尚未作來人又不敢乆留甚愧知且伴太虛為湯泉之遊甚善甚善某開春乞江浙一郡候見去處當以書奉約也要墨納兩笏皆品佳也餘惟為法自重適有數客逺來相看陪接少暇奉啓不盡意與文與可三首與可抱才不試遁道彌乆尚未聞大用公議不厭計當在即然廊廟間誰為䘏公議者乎老兄既不計較但乍失為郡之樂而有桂玉之困又却不見使者嘴面得失相乘除亦略相當也彭門無事甚可樂但未知今夏得免水患否子由頻得書甚安示諭秋冬過親甚幸甚幸令嗣昆仲各計安勝為學想皆成就矣又離浙中已四年向亦有少浙物久已分散零落矣有藥王船兩隻獻上恰好吻酌不通客矣呵呵杭州故人頗多致之不難當續營之但恐得後不肯将盛作見借也又近屢於相識處見與可近作墨竹惟劣弟只得一竿未説字説潤筆只到處作記作賛備員火下亦合剰得幾紙専令此人去請幸毋乆秘不爾不惟到處亂畫題云與可筆亦當執所恵絶句過狀索二百五十疋也呵呵與鮮于子駿三首久不奉狀方深愧悚逓中伏辱手教并新文石刻等疾讀善快無量即辰起居佳否公文學徳度宜在朝廷久此外逺何也然聞一路蒙被仁政不爾吏民皆在倒懸中也况鄉井墳墓在焉計居之甚以為樂某到郡正一年諸况粗遣歲凶民貧力所無如之何者多矣然在己者未嘗敢行所愧也如此而已忝厚眷故及末縁瞻奉惟冀以時自重不宣又忝厚眷不敢用啓狀必不深訝所恵詩文皆蕭然有逺古風味然此風之亡也久矣欲以求合世俗之耳目則疎矣但時獨於閒處開看末嘗以示人蓋知愛之者絶少也所索拙詩豈敢措手然不可不作特未暇耳近作小詞雖無栁七郎風味亦自是一家呵呵數日前獵於郊外所獲頗多作得一闋令東州壯士抵掌頓足而歌之吹笛擊鼓以為節頗壮觀也寫呈取笑又故人劉格字道純故友劉恕道原之親弟讀書強記辨博文詞粲然可觀而立節強鯁吏事亦健君實頗知之餘人未識也欲告子駿與一差遣收置門下公若可以踏逐辟召幸先之敢保稱職也旦夕歸南康軍待闕公若有以處之他必願就也某非私之也為時惜才也與何正道教授三首一作何正通忝命假手出於奨比禮當詣謝以衰疾疲曳不給於力愧悚無已乍熱起居佳勝登舟遽迫不果造别益増仰戀又辱書承起居佳勝鄉校淹留然使徐之士子識文章瑰瑋之氣非小補也某又復西上紛紛無補甚愧朋友矣又張聖途來稍聞動止為慰退之所難乃今見之大匠旁觀愧汗深矣行役匆匆不盡區區與歐陽仲純五首去歲城東屢獲陪從䝉益既多樂亦無量既别日苦賤事不克馳問慙負不可言即日起居何如見報除審簿信否殊不知即日從者所在徒有仰詠某䝉庇粗遣彭門本無一事足以藏拙河水一至事無不有中間㡬殆者數矣必亦聞之今方稍安而夏秋之患未可量蓋命窮所至感召此何時復得一笑之樂也近詩數首聊以破顔餘寒萬萬以時自重又伯仲叔弼昆仲各計安勝楊掾行速未及拜書乞道下懇子由在南都時得書無恙彭城最處下流水患甲於東北奏乞錢與夫為夏秋之備數章皆不報曹河若可塞固大善不爾倉卒之間不免調急夫使係省錢豈暇復禀命乎所費必多而為備不如先事之精也人微言輕信命而己仲純知我之深者聊復及之又去春寄舍國門屢辱臨顧喜慰無量别來逾年奔走俗狀未嘗通問瞻企徒深即日履此煩暑起居何如眷愛各安否傳聞車馬已到宛丘相去甚近書問自此可時相及矣千萬順時珍重又崔度者頃年在陳與之甚熟今作過海之行妻子仍在陳學幸略與垂顧又伯仲兄聞監西岸已視事未叔弼近託孫元忠附書季黙今安在因風無惜恵問宛丘誰與往還有可與語者否東坡全集巻七十九
