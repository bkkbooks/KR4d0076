body:
  text: 東坡全集巻三十宋蘇軾撰詩一百十首謝都事惠米平生忍慾今忍貧閉口逢人不少陳俸薄身輕趙都事也能作意向詩人擷菜并引吾借王㕘軍地種菜不及半畆而吾與過子終年飽菜夜半飲醉無以解酒輒擷菜煑之味含土膏氣飽風露雖粱肉不能及也人生須底物而更貪耶乃作四句秋來霜露滿東園蘆菔生兒芥有孫我與何曽同一飽不知何苦食雞豚别公擇黍離不復閔宗周何暇雷塘弔一丘若問西來祖師意竹西歌吹是揚州絶句春來濯濯江邊栁秋後離離湖上花不羡千金買歌舞一篇珠玉是生涯書寄韻已將鏡鑷投諸地喜見蒼頭白髪新厯數三朝軒冕客色聲誰是獨完人遊靈隱寺戲僧開軒李居士推倒垣墻也不難一軒復作兩軒看若教從此成千里巧厯如今也被漫常州太平寺薝蔔亭六花薝蔔林間佛九節菖蒲石上仙何似東坡鐡拄杖一時驚起野狐禪過文覺顯公房斕斑碎玉養菖蒲一勺清泉滿石盂淨几明牕書小楷便同爾雅注蟲魚惠州靈惠院壁間畫一仰面向天醉僧云是蜀僧隱巒所作題詩於其下直視無前氣吐虹五湖三島在胸中相逢莫怪不相揖只見山僧不見公同狀元行老學士秉道先輩遊太平寺凈土院觀牡丹中有淡黄一朶特竒為作醉中眼纈自斕斑天雨曼陀照玉盤一朶淡一作官黄微拂掠鞓紅魏紫不須看此君軒雲幢烟節十洲一作七州人犀甲檀槍百萬軍蘙薈發生何足道一作數此君真是此君君觀子美病中作嗟嘆不足次韻百尺長松澗下摧知君此意為誰來霜枝半折孤根出尚有狂風急雨催謁敦詩先生因留一絶凜凛人言君似雪我言凜凜雪如君時人盡怪蘇司業不解將錢與廣文余將赴文登過廣陵而擇老移住石塔相送竹西亭下留詩為别竹西失却上方老石塔還逢惠照師我亦化身東海去姓名莫遣世人知絶句三首松栢蕭森溪水南道人只作兩團菴市區收罷豚魚稅來與彌陀共一龕此身分付一蒲團靜對蕭蕭竹數竿偶為老僧煎茗粥自携脩綆汲清泉天風吹月入闌干烏鵲無聲夜向闌織女明星來枕上乃知身不在人間呈定國舊病應逢醫口藥新粧漸畫入時眉信知詩是窮人物近覺王郎不作詩絶句二首峩峩疊石立何孤賴有蕭蕭翠竹俱日暮無人鷗鳥散空留逺水伴寒蘆漠漠秋髙露氣清新蒲倚石近溪生夜來雨後西風急靜向牕前似有聲破琴詩後幷引余作破琴詩求得宋復古畫邢和璞於栁仲逺仲逺以此本託王晉卿臨寫為短軸名為邢房悟前生圖作詩題其上此身何處不堪為逆旅浮雲自不知偶見一張閒故紙便疑身是永禪師送栁子玉至靈山此事方艱便猛迴此心未老已先灰何時夢入真君殿也學傳呼觀主來次韻章子厚飛英留題款段曾陪馬少游而今人在鳯麟洲黄公酒肆如重過杳杳白蘋天盡頭贈江州景徳長老白足髙僧解達觀安排春事滿幽欄不須天女來相試總把空花眼裏看雜詩二首窻搖細浪魚吹沫一作日手弄黄花蝶遶一作透衣不覺春風吹酒醒空教明月照人歸昔日雙鵶照淺眉如今妸娜緑雲垂蓬萊老守明朝去腸斷簾間蟋蟀悲元祐癸酉八月二十七日於建隆章淨館書贈王覯海上東風犯雪來臘前先折鏡湖梅遙思禁苑青春夜坐待宫人畫詔回元祐元年二月八日朝退獨在起居院讀漢書儒林傳感申公故事作小詩一絶寂寞申公謝客時自言已見穆生幾綰臧下吏明堂廢又作龍鍾病免歸聞捷幷引元豐四年十月二十二日謁王文父齊愈於江南坐上得陳季常書報是月四日种諤領兵深入破殺西夏六萬餘人獲馬五千匹衆喜抃各飲一巨觥聞說將軍取乞誾將軍旗鼓捷如神故知無定河邊栁得共中原雪絮春睡起杮葉滿庭紅顆秋薰爐沉水度春篝松風夢與故人遇自駕飛鴻跨九州秋思寄子由黄葉山川知晚秋小蟲催女獻功裘老松閱世卧雲壑挽著蒼江無萬牛碣石菴戲贈湛菴主相國寺僧也保康橋上夜觀燈碣石巖前夏飲冰莫把山林笑朝市老夫手裏有烏藤散郎亭法花下有散郎亭老樹蒼崖如有情歡戚已隨時事去壁間只有古人名侯灘江邊皎皎過侯灘更上山腰看打盤百歲老兒親擊鼓城中憂患不相干春夜春宵一刻值千金花有清香月有隂歌管樓臺聲細細鞦韆院落夜沉沉火星巖火星巖下石凌壁閣上相㤀止一僧莫問人間興廢事門前流水几前燈讀開元天寶遺事三首姚宋亡來事事興一官銖重萬人輕朔方老將風流在不取西蕃石堡城潭裏春船百倍多廣陵銅器越溪羅三郎官爵如泥土争唱𢎞農得寶歌琵琶絃急衮梁州羯鼓聲髙舞臂鞲破費八姨三百萬大唐天子要纒頭過泗上喜見張嘉父二首眉間冰玉照淮明筆下波瀾老欲平直得全生如許妙不知形諜巳多名空翠娯人意自還明窻一榻共秋閒㑹知名利不到處定把清觴屬此山謝惠猫兒頭笋長沙一日煨籩筍鸚鵡洲前人未知走送煩公助湯餅猫兒突兀鼠穿籬題淨因壁瞑倚蒲團卧鉢囊半窻疎箔度微凉蕉心不展待時雨葵葉為誰傾夕陽同景文詠蓮塘塘上鈎簾對晚香不知斜日已侵牀江妃自借淩波韈長在髙荷扇影凉睡起食罷茶甌未要深清風一榻直千金腹搖鼻息庭花落還盡平生未足心書望洪亭壁河漲平來出舊洪山城都在水光中忽然歸壑無尋處千里禾麻一半空子美召公擇飲偶以病不及徃公擇有詩次韻樊素阿蠻皆已出使君應作玉筝歌可憐病士西窻下一夜丹田手自摩和㕘寥芥舟只合在坳堂紙帳心期老孟光不道山人今忽去曉􅆐啼處月茫茫醉題信老方丈鶴作精神松作筋堦庭蘭玉一時春願君且住三千嵗長與東坡作主人常州太平寺觀牡丹武林千葉照觀空别後湖山幾信風自笑眼花紅緑眩還將白首看鞓紅竹枝詞自過鬼門闗外天命同人鮓瓮頭船北人墮淚南人笑青嶂無梯問杜鵑寄歐叔弼昔葬衣冠今在否近來消息不須疑曽聞圯上逢黄石乆矣留侯不見欺題淨因院門外黄塵不見山箇中草木亦常閒履聲如渡薄冰過催粥華鯨吼夜闌絶句柴桑春晚思依依屋角鳴鳩雨欲飛昨日已收寒食火吹花風起却添衣和黄龍清老三首萬山不隔中秋月一雁能傳寄逺書深密伽陀枯戰筆真誠相見問何如風前橄欖星宿落月下桄榔羽扇開靜嘿堂中有相憶清江或遣化人來騎驢覔驢真可笑以馬喻馬亦成癡一天月色為誰好二老風流各自知過土山寨南風日日縱篙撑時喜北風將我行湯餅一杯銀線亂蔞蒿如筯玉簪横書辨才白雲堂壁不辭清曉叩松扉却值支公乆不歸山鳥不鳴天欲雪巻簾惟見白雲飛琴詩若言琴上有琴聲放在匣中何不鳴若言聲在指頭上何不於君指上聴韓康公坐上侍兒求書扇一一窻扉面水開更於何處覔蓬萊天香滿袂人知否曽到旃檀小殿來驪山絶句三首功成雖欲善持盈可嘆前王恃太平辛苦驪山山下土阿房纔廢又華清幾變雕墻幾變灰舉烽指鹿事悠哉上皇不念前車戒却怨驪山是禍胎海中方士覔三山萬古明知去不還咫尺秦陵是商監朝元何必苦躋攀短橋誰能鋪白簟永日卧朱橋樹影欄邊轉波光板底搖軒窻東鄰多白楊夜作雨聲急窻下獨無眠秋蟲見燈入曲檻流水照朱欄青紅亂明鑑誰見檻上人無言觀物泛雙池泝流入城郭亹亹渡千家不見雙池水長漂十里花荷華田田抗朝陽節節卧春水平鋪亂萍葉屢動報魚子魚湖上移魚子初生不畏人自從識鈎餌欲見更無因牡丹花好常患稀花多信佳否未有四十枝枝枝大如斗桃花争開不待葉密綴欲無條傍沼人窺鑑驚魚水濺橋李不及梨英軟應慚梅萼紅西園有千葉淡佇更纎穠杏開花送餘寒結子及新火闗中幸無梅汝彊充鼎和梨霜降紅梨熟柔柯已不勝未嘗蠲夏渴長見助冬冰棗居人幾畨老棗樹未成槎汝長才堪軸吾歸巳及瓜櫻桃獨遶櫻桃樹酒醒喉肺乾莫除枝上露從向口中漙石榴風流意不盡獨自送殘芳色作裙腰染名隨酒琖狂樗自昔為神樹空聞蜩鵙鳴社公煩見輟為爾致羊羮槐採擷殊未厭忽然已成隂蟬鳴看不見鶴立赴還深松彊致南山樹來經渭水灘生成未有意鴉鵲莫相干檜依依古仙子鬱鬱緑毛身每長須成節明年漸庇人栁今年手自栽問我何年去他年我復來摇落傷人思跋姜君弼課冊姜君瓊州人已夘閏九月來從學於東坡至儋耳庚辰三月方還瓊四言雲興天際歘若車蓋凝矑未瞬瀰漫霮䨴驚雷出火喬木糜碎殷地爇空萬夫皆廢霤綆四墜一作懸溜綆墜日中見沬移晷而收野無完塊憶江南寄純如五首六言楚水别來十載蜀山望斷千重畢竟擬為傖父憑君說與呉儂湖目也堪供眼木奴自足為生若話三呉勝事不惟千里蓴羮人在畫屛中住客依明月邊游未卜柴桑舊宅須乘五馬一作湖扁舟生計曾無聚沬孤蹤謾有清風治産猶嫌范蠡携孥頗笑梁鴻弱累已償俗盡老身將伴僧居未許季鷹髙潔秋風直為鱸魚數日前夢人示余一巻文字大畧若諭馬者用吃蹶兩字夢中甚賞之覺而忘其餘戲作數語足之四言天驥雖老舉鞭脫逸交馳蟻封步中衡石旁睨駑駘豐肉滅節徐行方軌動輒吃蹶天資相絶未易致詰惠崇蘆鴈六言惠崇烟雨蘆鴈坐我瀟湘洞庭欲買扁舟歸去故人云是丹青竹枝歌幷叙竹枝歌本楚聲幽怨惻怛若有所深悲者豈亦徃者之所見有足怨者歟夫傷二妃而哀屈原思懷王而憐項羽此亦楚人之意相傳而然者且其山川風俗鄙野懃苦之態固已見於前人之作與今子由之詩故特縁楚人疇昔之意為一篇九章以補其所未道者蒼梧山髙湘水深中原北望度千岑帝子南遊飄不返惟有蒼蒼楓桂林楓葉蕭蕭桂葉碧萬里逺來超莫及乘龍上天去無蹤草木無情空寄泣水濱擊鼓何喧闐相將扣水求屈原屈原已死今千載滿船哀唱似當年海濱長鯨徑千尺食人為糧安可入招君不歸海水深海魚豈解哀忠直吁嗟忠直死無人可惜懷王西入秦秦闗己閉無歸日章華不復見車輪君王去時簫鼓咽父老送君車軸折千里逃歸迷故鄉南公哀痛彈長鋏三户亡秦信不虚一朝兵起盡讙呼當時項羽年最少提劔本是耕田夫横行天下竟何事棄馬烏江自垂涕項王巳死無故人首入漢庭身委地富貴榮華豈足多至今唯有塜嵯峨故國凄凉人事改楚鄉千古為悲歌山坡陁行山坡陁兮下屬江勢崖絶兮游波所蕩如頽墻松茀律兮百尺旁抜此驚葛藟之上不見日兮下可依吾曳杖兮吾僮亦吾之書隨藐余望兮水中泜頎然而長者黄冠而羽衣幹頥坦腹盤石箕坐兮亦有趾安不危四無人兮可忘饑仙人偓佺自言其居瑤之圃一日一夜飛相徃來不可數使其開口言兮豈惟河漢無極驚余心黙不言兮蹇昭氏之不鼓琴憺將山河與日月長在昔有人兮夢中仇池我歸路此非小有兮噫乎何以樂此而不去昔余游於葛天兮身非陶氏猶與偕乗𣺌茫良未果兮僕夫悲余馬懐聊逍遙兮容與晞余髪兮蘭之渚余論世兮千載一人猶並時余行詰曲兮欲知余者稀峨峨洋洋余方樂兮譬余繫舟於水魚潛鳥舉亦不知何必每念輒得應余若響坐有如此兮人子期鳴泉思思君子也君子抱道且殆而時始弗與民咸思之鳴泉故基堙圮殆盡眉山蘇公搔首踟蹰作鳴泉思以思之鳴泉鳴泉經雲而潺湲作其毛骨者脩竹蒸為雲氣者霏烟山䕫莫能隱其怪野翟詎敢藏其妍茅蘆蕭蕭昔有人焉其髙如山其清如水其心金與玉其道砥與絃執徳沒世落月入地英名皎然陽曦麗天舊隱寂寂新篁娟娟思彼君子我心若懸谷鳥在上巖花炫前鳴泉鳴泉能使我宛結而華顛轆轤歌新繫青絲百尺繩心在君家轆轤上我心皎潔君不知轆轤一轉一惆悵何處春風吹曉幕江南緑水通珠閣美人二八顔如花泣向花前畏花落臨春風聴春鳥别時多見時少愁人一夜不得眠瑤井玉繩相對曉美哉一首送韋城主簿歐陽君美哉水洋洋乎我懷先生送之子于城隅洋洋乎美哉水送之子至於新渡念彼嵩雒眷焉西顧之子于邁至於白馬白馬舊邦其構惟新邦人流涕畫舫之孫相其口髯尚克似之先生遺民之子徃字辨道歌北方正氣名袪邪東郊西應歸中華離南為室坎為家光凝白雪生黄芽黄河流駕紫河車水精池産紅蓮花赤龍騰霄驚盤蛇姹女含笑嬰兒呀十二樓瞰靈泉䨟華池玉液隂交加子馳午前無停差三田聚寶真生涯龜精鳯髓填谽谺天地駭有鬼神嗟一丹休别内外砂長脩乆餌須叔遐腸中澄結無餘柤俗骨變換顔如葩哀哉世人争齒牙指偽為真正為哇輕肥甘美形驕奢譎詭詐妄言矜誇遊魚在網在罝一氣頓盡猶嘔啞餘生所託誠棲槎九原枯髀如亂麻胡不割衆如鏌鎁空與利名交掌拏胡不讓霜如文騧可惜貪愛相漫塗真心道意非不嘉飡金閒話非虚譁何須横議相疵瑕衆口並發鳴羣鴉安知聚散同魚蝦自纒如繭居如蝸日懷嗔喜甘籠笯其去死地猶獵豭吾恨爾見有所遮海波或至驚井蛙烏輪即晚蟾影斜吾時俱覩超雲霞與葉淳老侯敦夫張秉道同相視新河秉道有詩次韻二首君不見元帥府前羅萬㦸濤頭未順千弩射至今鳯凰山下路長借一箭開兩翼我鑿西湖還舊觀一眼已盡西南碧又將回奪浮山險千艘夜下無南北坐陳三策本人謀惟留一諾待我畫老病思歸真暫寓功名如幻終何得從來自笑畫蛇足此事何殊食雞肋憐君嗜好更迂闊得我新詩喜折屐江湖粗了我徑歸餘事後來當潤色一菴閒掛洞霄宫井有丹砂水長赤荆溪父老愁三害下斬長蛟本無頼平生倔强韓退之識字猶為鰐魚戒石門之役萬金耳首鼠不為吾已隘江湖開塞古有數兩鵠飛來告成壞勸農使者非常人一言已破黎民駭上饒使君更超逸坐睨浮山如累塊髯張乃我結襪生詩酒淋漓出狂怪我作水衡生作丞他日歸朝同此拜陳守道一氣混淪生復生有形有心即有情共見利欲飲食事各有爪牙頭角争争時怒發霹靂火險處直在嵌巖坑人偽相加有餘怨天真喪盡無純誠徒自取先用極力誰知所得皆空名少微處士松柏寒蓬萊真人冰玉清山是心兮海為腹陽為神兮隂為精渴飲靈泉水饑食玉樹枝白虎化坎青龍離鎖禁姹女闗嬰兒樓臺十二紅玻璃木公金母相東西純鉛真汞星光輝烏升降無年期停顔郤老只如此哀哉世人迷不迷老人行有一老翁老無齒處處無人問年紀白髪如絲向下垂一雙眸子碧如水不裹頭又無履相識雖多少知已問翁畢竟何所止笑言只在紅塵裏秋風獵獵行雲飛老人此意無人㑹目注雲歸心自知黄口小兒莫相笑老人舊日曽年少浪迹常如不繫舟地角天涯知自跳亦曽樂半夜傳籌醉朱閣美人如花弄絃索只恨樽前明月落亦曽憂羇旅他鄉迫暮秋故國日邊無信息斷鴻空逐水長流或安貧或安富或爵通侯封萬户一任秋霜換鬢毛本來面目長如故水有蘋兮山有芝人意雖存事巳非有時却憶經由處都似茫茫春夢歸邇來尤解安貧賤不為公卿强陪面皎如明月在秋潭動著依前還不見還不見可奈何空使逺人増眷戀但祗從他隨物轉青樓黄閣長相見若相見莫慇懃却是翁家舊主人襄陽樂府三篇野鷹來野鷹來萬山下荒山無食鷹苦饑飛來為爾繫綵絲北原有老且白年年養子秋食菽我欲擊之不可得年深老鷹力弱野鷹來城東有臺髙崔嵬臺中公子著皮袖東望萬里心悠哉鷹何在嗟爾公子歸無勞使鷹可呼亦凡曹天隂月黑狐夜嘷上堵吟臺上有客吟秋風悲聲蕭㪚飄入宫臺邊遊女來竊聴欲學聲同意不同君悲竟何事千里金城兩稚子白馬為塞鳯為闗山川無人空且閒我悲亦何苦江水冬更深鯿魚冷難捕悠悠江上聴歌人不知我意徒悲辛襄陽樂使君未來襄陽愁提戈入市裹氊裘自從氊裘南渡沔襄陽無事多春遊襄陽春遊樂何許峴山之陽漢江浦使君朱斾來翻翻人道使君似羊杜道邊逢人問洛陽中原苦戰春田荒北人聞道襄陽樂目送飛鴻應斷腸仙都山鹿老泉詩序云至豐都縣將遊仙都觀見知縣李長官云固知君之將至也此山有鹿甚老而猛獸獵人終莫能害將有客來遊鹿輒夜鳴故常以此候之而未嘗失余聞而異之乃為作詩日月何促促塵世苦局束仙子去無蹤故山遺白鹿仙人已去鹿無家孤棲悵望層城霞至今聞有遊洞客夜來江市呌平沙長松千樹風蕭瑟仙宫去人無咫尺夜鳴白鹿安在哉滿山秋草無行迹白鶴吟留鍾山覺海白鶴聲可憐紅鶴聲可惡白鶴招不來紅鶴揮不去長松受穢死乃以紅鶴故北山道人曰美者自美吾何為而喜惡者自惡吾何為而怒去自去耳吾何駛而追來自來耳吾何妨而拒吾豈厭喧而求靜吾豈好丹而非素汝謂松死吾無依焉吾方捨隂而坐露虚飄飄三首虚飄飄畫簷蛛結網銀漢鵲成橋塵漬雨桐葉霜飛風栁條露凝殘㸃見紅日星曳餘光横碧霄虚飄飄比浮名利猶堅牢虛飄飄花飛不到地虹起謾成橋入夢雲千疊游空絲萬條蜃樓百尺横蒼海雁字一行書絳霄虚飄飄比人身世猶堅牢虚飄飄風寒吹絮浪春水暖冰橋勢緩􅀢垂線聲乾葉下條雨中漚㸃隨流水風裏綵雲横碧霄虚飄飄比時富貴猶堅牢次韻張甥棠美述志名宗奭仲子甘心織屨避萬鍾淵明不肯折腰為五斗一年鴻雁識來徃終日沐猴誰去取知甥詩意慕兩君讀書要在存心乆平生所談性命奥長棄不憂金石朽我今已習鶖子定猶復晨朝怖頭走刳心先擬射聲名不作羊鄒悲峴首雲梯雨矢集無方我已中灰同墨守恐甥自是禹門鱗未可潛逃入吾藪琢磨晚覺孟光賢畏我放言時被肘甥能鉏我青門瓜正午時來休老手東坡全集巻三十
