body:
  text: 東坡全集巻一百宋蘓軾撰雜文一十八首明正送于伋失官東歸世俗之患患在悲樂不以其正非不以其正其所取以為正者非也請借子以明其正子之失官有為子悲如子之自悲者乎有如子之父兄妻子之為子悲者乎子之所以悲者惑於得也父兄妻子之所以悲者惑於愛也惟不與於已者則不惑亦不悲夫惑則悲不惑則不悲人宜以惑者為正歟抑將以不惑者為正歟以不惑者為正則不悲者正也然子亦有所樂者曰吾之所以為吾者豈以是哉雖失是其所以為吾者猶存則吾猶可樂焉已而不樂又從而悲之則亦不忍夫天下之凡愛我者之悲而不釋夫天下之凡惡我者之喜也夫愛我而悲惡我而喜是知我之粗也樂其所以為吾者存是自知之深也人不以自知之深為正而以知我之粗者為正是得為正也歟故吾願為子言其正子將終身樂而不悲詩云優哉游哉聊以卒歲慎改竄近世人輕以意改書鄙淺之人好惡多同故從而和之者衆遂使古書日就訛舛深可忿疾孔子曰吾猶及史之闕文也自予少時見前軰皆不敢輕改書故蜀本大字書皆善本蜀本荘子云用志不分乃疑於神此與易隂疑於陽禮使人疑汝于夫子同今四方本皆作凝陶潛詩採菊東籬下悠然見南山採菊之次偶然見山初不用意而境與意㑹故可喜也今皆作望南山杜子美云白鷗没浩蕩萬里誰能馴葢滅沒於烟波間耳而宋敏求謂予云鷗不善没改作波字二詩改兩字便覺一篇神氣索然也捨銅龜子文蘇州報恩寺重造古塔諸公皆捨所藏舍利予無舍利可捨獨捨盛舍利者敬為四恩三有捨之故人王頥為武功宰長安有脩古塔者發舊葬得之以遺予予以藏私印成壊者有形之所不免而以藏舍利則可以乆存藏私印或以速壊貴舍利而賤私印樂乆存而悲速壊物豈有是哉予其并捨之日喻生而眇者不識日問之有目者或告之曰日之狀如銅槃扣槃而得其聲他日聞鐘以為日也或告之曰日之光如燭捫燭而得其形他日揣籥以為日也日之與鐘籥亦逺矣而眇者不知其異以其未嘗見而求之人也道之難見也甚于日而人之未逹也無以異於眇逹者告之雖有巧譬善導亦無以過於槃與燭也自槃而之鐘自燭而之籥轉而相之豈有既乎故世之言道者或即其所見而名之或莫之見而意之皆求道之過也然則道卒不可求歟蘇子曰道可致而不可求何謂致孫武曰善戰者致人不致於人子夏曰百工居肆以成其事君子學以致其道莫之求而自至斯以為致也歟南方多没人日與水居也七歲而能涉十歲而能浮十五而能没矣夫没者豈茍然哉必將有得於水之道者日與水居則十五而得其道生不識水則雖壯見舟而畏之故北方之勇者問於没人而求其所以没以其言試之河未有不溺者也故凡不學而務求道者北方之學没者也昔者以聲律取士士雜學而不志於道今者以經術取士士求道而不務學渤海吳君彦律有志於學者也方求舉於禮部作日喻以告之問養生余問養生於吳子得二言焉曰和曰安何謂和曰子不見天地之為寒暑乎寒暑之極至於折膠流金而物不以為病其變者微也寒暑之變晝與日俱逝夜與月並馳俯仰之間屢變而人不知者微之至和之極也使此二極者相尋而狎至則人之死乆矣何謂安曰吾嘗自牢山浮海逹于淮遇大風焉舟中之人如附於桔橰而與之上下如蹈車輪而行反逆眩亂不可止而吾飲食起居如他日吾非有異術也惟莫與之争而聽其所為故凡病我者舉非物也食中有蛆人之見者必嘔也其不見而食者未嘗嘔也請察其所從生論八珍者必嚥言糞穢者必唾二者未嘗與我接也唾與嚥何從生哉果生於物乎果生於我乎知其生於我也則雖與之接而不變安之至也安則物之感我者輕和則我之應物者順外輕内順而生理備矣吳子古之静者也其觀於物也審矣是以私識其言而時省觀焉怪石供禹貢青州有鉛松怪石觧者曰怪石石似玊者今齊安江上往往得美石與玉無辨多紅黄白色其文如人指上螺清明可愛雖巧者以意繪畫有不能及豈古所謂怪石者耶凡物之醜好生於相形吾未知其果安在也使世間石皆若此則今之凡石復為怪矣海外有形語之國口不能言而相喻以形其以形語也㨗於口使吾為之不已難乎故夫天機之動忽焉而成而人真以為巧也雖然自禹以來怪之矣齊安小兒浴於江時有得之者戲以餅餌易之既乆得二百九十有八枚大者兼寸小者如棗栗菱芡其一如虎豹首有口鼻眼處以為羣石之長又得古銅盆一枚以盛石挹水注之粲然而廬山歸宗佛印禪師適有使至遂以為供禪師嘗以道眼觀一切世間混淪空洞了無一物雖夜光尺璧與瓦礫等而況此石雖然願受此供灌以墨池水强為一笑使自今以往山僧野人欲供禪師而力不能辦衣服飲食卧具者皆得以淨水注石為供盖自蘇子瞻始時元豐五年五月黄州東坡雪堂書後怪石供蘇子既以怪石供佛印佛印以其言刻諸石蘇子聞而笑曰是安所從來哉予以餅易諸小兒者也以可食易無用予既足笑矣彼又從而刻之今以餅供佛印佛印必不刻也石與餅何異參寥子曰然供者幻也受者亦幻也刻其言者亦幻也夫幻何適而不可舉手而示蘇子曰拱此而揖人人莫不喜㦸此而詈人人莫不怒同是手也而喜怒異世未有非之者也子誠知拱㦸之皆幻則喜雖存而根亡刻與不刻無不可者蘇子大笑曰子欲之耶乃亦以供之凡二百五十并二石槃云太息送秦少章孔北海與曹公論盛孝章云孝章實丈夫之雄者也游談之士依以成聲今之少年喜謗前軰或譏評孝章孝章要為天下重名九牧之人所共稱歎吾讀至此未嘗不廢書太息也曰嗟乎英偉竒逸之士不容於世俗也乆矣雖然自今觀之孔北海盛孝章猶在世而向之譏評者與草木同腐乆矣昔吾舉進士試於禮部歐陽文忠公見吾文曰此我軰人也吾當避之方是時士以剽裂為文聚而見訕且訕公者所在成市曽未數年忽然若潦水之歸壑無復見一人者此豈復待後世哉今吾衰老廢學自視缺然而天下士不吾棄以為可以與於斯文者猶以文忠公之故也張文潛秦少游此兩人者士之超逸絶塵者也非獨吾云爾二三子亦自以為莫及也士駭於所未聞不能無異同故紛紛之言常及吾與二子吾䇿之審矣士如良金美玉市有定價豈可以愛憎口舌貴賤之歟少游之弟少章復從吾游不及朞年而論議日新若將施於用者欲歸省其親且不忍去嗚呼子行矣歸而求諸兄吾何加焉作太息一篇以餞其行使藏于家三年然後出之藥誦嵇中散作幽憤詩知不免矣而卒章乃曰采嶶山阿散髮巖岫永嘯長吟頥性養夀者悼此志之不遂也司馬景王既殺中散而悔使悔於未殺之前中散得免於死者吾知其掃迹滅景於人世如脱兔之投林也采薇散髪豈其所難哉孫真人著大風惡疾論曰神仙傳有數十人皆因惡疾而得仙道何者割棄塵累懐潁陽之風所以因禍而取福也吾始得罪遷嶺表不自意全既逾年無後命知不死矣然舊苦痔至是大作呻呼幾百日地無醫藥有亦不效道士教吾去滋味絶薰血以清淨勝之痔有蟲館於吾後滋味薰血既以自養亦以養蟲自今日以往旦夕食淡麫四兩猶復念食則以胡麻伏苓麨足之飲食之外不啖一物主人枯槁則客自棄去尚恐習性易流故取中散真人之言對病為藥使人誦之日三曰東坡居士汝忘逾年之憂百日之苦乎使汝不幸而有中散之禍伯牛之疾雖欲採薇散髮豈可得哉今食麻麥伏苓多矣居士則歌以荅之曰事無事之事百事治兮味無味之味五味備兮伏苓麻麥有時而匱兮有則食無則已者與我無既兮嗚呼噫噫館客不終以是為愧兮補龍山文并引丙子重九客有言桓温龍山之㑹風吹孟嘉帽落温遣孫盛嘲之嘉作觧嘲文辭超卓四坐歎伏恨今世不見此文予乃戲為補之曰征西天府重九令節駕言龍山燕凱羣哲壺歌雅奏緩帶輕帢胡為中觴一笑粲發楩楠競秀榆柳獨脱驥騄交騖駑蹇先蹶楚狂醉亂隕帽莫覺戎服囚首枯顱茁髮維明將軍度量閎逹容此下士顛倒冠韈宰夫揚觶兕觥舉罰請歌相䑕以侑此爵右嘲吾聞君子蹈常履素晦明風雨不改其度平生丘壑散髪箕踞墜車天全顛沛何懼腰適忘帶足適忘履不知有我帽復奚數流水莫繫浮雲暫寓飄然隨風非去非取我冠明月被服寳璐不纓而結不簮而附歌詩寜擇請歌相䑕罰此陋人俾出童羖右解嘲東坡酒經南方之氓以糯與粇雜以卉藥而為餅嗅之香嚼之辣揣之枵然而輕此餅之良者也吾始取麫而起肥之和之以薑液烝之使十裂繩穿而風戾之愈乆而益悍此麴之精者也米五斗以為率而五分之為三斗者一為五升者四三斗者以釀五升者以投三投而止尚有五升之贏也始釀以四兩之餅而每投以二兩之麴皆澤以少水取足以散觧而匀停也釀者必甕按而并泓之三日而并溢此吾酒之萌也酒之始萌也甚烈而微苦葢三投而後平也凡餅烈而麴和投者必屢嘗而增損之以舌為權衡也既溢之三日乃投九日三投通十有五日而後定也既定乃注以斗水凡水必熟而冷者也凡釀與投必寒之而後下此炎州之令也既水五日乃篘得二斗有半此吾酒之正也先篘半日取所謂贏者為粥米一而水三之揉以餅麴凡四兩二物并也投之糟中熟撋而再釀之五日壓得斗有半此吾酒之少勁者也勁正合為四斗又五日而飲則和而力嚴而不猛也篘絶不旋踵而粥投之少留則糟枯中風而酒病也釀乆者酒醇而豐速者反是故吾酒三十日而成也罪言吾聞肉食之憂非藿食者所宜慮也府居之謀非巷居者所宜處也分之所不及義之所弗出也義之所弗出利之所不釋也犯義者惑維卒不自克作罪言萬夫之望萬夫所依匪才尚之而量包之丘山之憾一笑可散芥蔕之讐千河不収嗚呼寜汝容汝豈汝不可神之聽之終和而同乎乘人之氣决人易耳觧忮觸猜是惟艱哉水激則旱其傷淫夷矢激則逺行將安追嗚呼佐涉者湍佐鬬者呼柴不立其愚乃可以湏愛心之偏其辭溢妍惡心之厚其辭溢醜惟仁人之言愛惡兩捐廣大恬愉上通于天嗚呼善言未升貧客瞰門曷以壽我公侯承之天道好還莫適後先人事喜復無常倚伏前之所是事定而偷今之所是後當焉如嗚呼禍不在先亦不在人還隱其心有萬其全疾惡過義美惡易位矯枉過直美惡同則如食宜饇饜則為度如酌孔取劇則荒舞嗚呼乃隂乃陽神理所藏一弛一張人道之常論文吾文如萬斛泉源不擇地皆可出在平地滔滔汩汩雖一日千里無難及其與石山曲折隨物賦形而不可知也所可知者常行于所當行常止于不可不止如是而己矣其他雖吾亦不能知也記講筵秘書監侍講傅堯俞始召赴資善堂對邇英閣堯俞致謝上遣人宣召曰卿以博學參預講筵宜尊所聞以輔不逮堯俞講畢曲謝上復遣人宣諭卿講義淵博多所發揮良深嘉歎是日上讀三朝寳訓至天禧中有二人犯罪法當死真宗皇帝惻然憐之曰此等安知法殺之則不忍捨之則無以勵衆乃使人持去笞而遣之以斬訖奏又祀汾隂日見一羊自擲道左怪問之曰今日尚食殺其羔真宗慘然不樂自是不殺羊羔資政殿學士韓維讀畢因奏言此特真宗皇帝小善耳然推其心以及天下則仁不可勝用也真宗自澶淵之役却敵之後十九年不言兵天下富其源葢出于此昔孟子論齊王不忍殺觳觫之牛以為是心足以王今恩足以及禽獸而不及于百姓豈不能哉葢不為耳外人皆云皇帝陛下仁孝發于天性每行見昆蟲螻蟻違而過之且勅左右勿踐履此亦仁術也臣願陛不推此心以及百姓則天下幸甚某時為右史奏曰臣今月十五日侍邇英殿竊見資政殿學士韓維因讀三朝寳訓至真宗皇帝好生惡殺因論皇帝陛下在宫中不忍踐履螻蟻其言深切可以推明聖徳益增福壽臣沗備位右史謹書其事於册又録一本上進意望陛下采鑒無忘此心以廣好生之徳臣無任大願天華宫天華宫在羅浮山之西蘇軾曰南漢主建有甘露羽蓋等亭雲華閣命中書舍人鍾有章作記初南漢主夢神人指羅浮山之西去延祥寺西北有兩峰相疊一洞對流可以為宫訪之得其地又夢金龍起於宫所遂改為黄龍洞此地即葛仙西庵至宋朝革命四方僭叛以次誅服劉氏懼焉將欲潛遁羅浮為狡兎之穴又命於增江水口鑿濠通山往來山洞倉卒為航舟之計開寳四年乃始歸命則知劉氏為寳宫於山間無事則為臨賞之樂警急則為逋逃之所其計窘矣錫杖泉錫杖泉在羅浮寳積寺即景泰禪師卓錫之地亦謂之卓錫泉蘇軾曰予昔自汴入淮泛江泝漢歸蜀飲江淮水葢彌年既至覺井水腥澁百餘日然後安之以此知江之甘於井也審矣予來嶺外自揚子江始飲江水及至南康江益清駛水益甘則又知南江賢於北江也近度嶺入清逺峽水色如碧玉味亦益勝今日遊羅浮酌景泰禪師錫杖泉則清逺水又在下矣嶺外惟惠人喜鬬茶此水不虚出也白水山白水山在象頭南蘇軾曰羅浮之東麓也有懸泉百仞山八九折折處輒為潭深者縋石四五丈不能及旁有巨人􅎤數十謂之佛跡巖巖西故有院亦曰佛跡縣榜先朝值邊庭懐服兵革寖息而又體質㳟儉在位四十有二年宫室苑囿無所益故民無暴賦横徭而生齒歲登墾田日廣至于法令則去苛慘尚寛簡守令則進賢良退貪殘牛酒以禮髙年粟帛以旌孝行廣惠以廪惸獨寛恤以省力役除身丁之筭弛鹽榷之利故能道迎休祥年糓登衍其裕民之徳固已浹肌膚而淪骨髓矣然猶慊然憂下民之疾􅐄無良劑以全濟於是詔太醫集名方曰簡要濟衆凡五巻三䇿鏤板模印以賜郡縣俾人得傳録用廣拯療意欲錫以康寜之福躋以仁夀之域己而縣與律令同藏殆逾一紀窮逺之民或莫聞知聖澤壅而不宣吏之罪也乃書以方版揭之通㑹不獨流傳民間痊疴愈疾亦欲人人知上恩也後之君子儻不以是為誚嵗一檢案之使無遺毁焉嘉祐七年正月日擬作二首代侯公說項羽辭并叙漢與楚戰敗於彭城太公間走見獲於楚項羽常置軍中以為質漢王遣辯士陸賈説項羽請之不聽後遣侯公羽許之遂歸太公侯公之辯過陸生矣而史闕其所以説羽之辭遂探其事情以補之作代侯公説項羽辭漢王四年遣辯士陸賈東説項王請還太公項羽弗聽賈還漢王不懌者累日左右計無所出侯公在軍中而未知名乃超進而言曰秦為無道荼毒天下戮人之父刑人之子如刈草菅大王奮不顧身建大義除殘賊為萬民請命今秦氏已誅天下且定民之父子室家皆得保完以相守也其慶大矣宜與太公享萬歲無窮之歡不幸太公拘於强讎以重大王夙夜之憂臣聞主憂臣辱主辱臣死大王諸臣未有輸忠出竒以還太公之屬車蹈義死節以折項羽之狼心者臣恐天下有以議漢為無人矣此臣等之罪也臣願先即辱國之誅漢王嘻嚱曰吾惟不孝不武而太公暴露拘辱於楚者三年矣吾重念天下大計未獲即死之此吾所以早夜痛心疾首東嚮而不忘也顧為之奈何侯公曰臣雖不敏願大王假臣革車一乘騎卒十人臣朝馳至楚壁而暮與太公驂乘而歸可乎漢王慢罵曰腐儒何言之易也夫陸賈天下之辯士吾前日遣之智窮辭屈抱頭䑕􅇡顛狽而歸僅以身免若何言之易也侯公曰待人以必能者不能則䘮氣倚事之必集者不集則挫心大王前日之遣賈也恃之為必能之人望之有必集之事今賈乃困辱而歸是大王氣䘮而心挫也宜有以深鄙臣也且大王一失任於陸賈乃遂懲艾以為無足使令也者是大王示太公之無還期待天下為無事也漢王曰吾豈忘親者耶顧若無足以辦此且項王隂忮不仁徒觸其鋒與之俱靡耳侯公曰昔趙平原君苦秦之侵欲結楚從也求其可與從適楚者二十人葢擇於門下也食客數千得十九焉其一人無得也最下客毛遂請行平原君不擇而與之俱卒至强楚廷叱其王而定從於立談之間者毛遂功也日者趙王武臣見獲於燕以其臣陳餘張耳之賢擇人請王往者十軰無一返者終於養卒請行朝炊未終乃與趙王同載而歸此大王之所知者臣乃今日願為大王之毛遂養卒大王何慊不辱平原餘耳之聽哉漢王曰善即飭車十乘騎卒百人以遣侯公侯公至楚晨扣軍門謁項王曰臣聞漢王之父太公為俘囚臣竊慶大王獲所以勝於漢者前日漢王遣使請之而大王不與至將烹焉臣竊弔大王似不䘏楚矣項王嗔目大怒叱侯公曰若自薦死乃欲為而主行説以僥倖也且吾親與人角而獲其父固將甘心焉今乃言無䘏者何也侯公曰臣以區區之身備漢之使而有謁於大王故大王以臣為漢游説而忘忠楚也大王試幸聽之使其言有可用則楚漢之大利兩君之至歡豈臣之私幸也使其言無可用則臣徐蹈鼎鑊以從太公之烹葢未晩也項王曰太公之不得歸必矣若將何言侯公曰夫漢王失職怏怏而西因思歸之士収豪傑之伍舉梁漢之師下巴蜀之粟并三秦定齊魏日引而東以與大王決一旦之命大王視其志固將一天下朝諸侯建七廟定大號為萬世基業耶抑將區區狥匹夫之節為曾參之孝而已者耶且連兵帶壘與楚百戰以決雌雄乃有天下三分之二大王軍覆將死自救不暇凡所以運竒決敵為大王之勍敵者在漢王與諸將了事耶抑太公實為之也耶雖庸人孺子固知之然則太公獨一亡似人耳不足為楚漢之輕重大王幸擄獲之而禍福實係焉視其用之何如耳得所以用而用之者强失所以用而用之者亡茍為失其所用未若不獲之為善也大王所以乆拘而不歸者固以要之誠是也且要而能致之則權在我要而不能致則權在人權之所在以戰必克則要者名也歸者實也大王茍不得志於名當速収效於實無為兩失而自遺其患是以臣竊為大王慎惜此舉也大王固嘗置之爼上而命之矣彼報之曰必欲烹之願分羹焉且父子相愛之情豈相逺哉方漢王窘於彭城二子同載推墮捐之弗顧也安知其視父不與子同也太公之囚楚者三年矣彼誠篤于愛父固將捐兵解甲膝行頓顙楚之轅門為之請一旦之命今勵士方力督戰方急無一日而忘與楚從事此其志在天下無以親為也大王今不歸之以収其實將乆留之以執其名故曰似不䘏楚也項王怒氣少息徐曰顧吾所讎者漢王爾其父何與耶且漢王親以其身投吾掌握者數矣我常易而釋之今乃曰東向必欲亡楚而後已故吾深讎之欲葅醢其父聊快於一時況與之歸耶侯公曰辱大王幸賜聽臣臣請言其不可者夫首建大義誅暴秦者惟楚世為賢明顯名於天下者惟楚天下豪傑樂從而争赴者惟楚披堅執鋭為士卒先所向摧靡莫如大王兵强將武百戰百勝莫如大王諸侯畏懼惟所號令莫如大王割地據國連城數十莫如大王大王持此數者以令天下朝諸侯建大號何待于今然而為之八年智窮兵敗土疆日促反為漢雌大王嘗自知其所以失乎項王曰吾誠每不自知如公言焉公試論吾所以失者侯公曰大王知夫博者事乎夫財均則氣均氣均則敵偶然後勝負之勢決於一時今大王求與漢博方布席徒手未及投地而驟以已資推遺之己而財索氣竭徒手而校之則大王之勝勢去矣夫仁義禮智所以取天下之資而制敵之具也大王乃棄資委具以為無所事以故漢皆獲而収執之此所以自引而東視大王如無也項王曰何謂棄資委具侯公曰夫秦民之不聊生乆矣漢王之入闗也秋毫無所犯觧秦之罟約法三章民大慶悦惟恐其不王秦也大王之至燔燒屠戮酷甚於秦秦人失望何以為仁大王始與諸侯受約懐王先入闗者王之漢王出萬死不顧一生之計叩闗決戰降俘其主以待大王而大王背約遷之南鄭何以為信大王以世為楚將方舉大義不立其後無以令天下遂共立懐王而禀聽之及天下且定乃陽尊為帝而放殺之何以為義以范增之忠陳平之智韓信之勇皆人傑争天下者視此三人為之存亡然而增死於疑平信去而不用何以為智是以漢王於其入闗也天下歸其仁其還定三秦也天下歸其信為義帝縞素也天下歸其義其用平信也天下歸其智此四者大王素有之資可畜之具惟其委棄而不用故漢皆得而収執之是以大王未得所以税駕也方今之勢漢王者髙資富室也大王者窶人也天下者市人也市人不趨窶人而趨髙資富室明矣然則大王今日之資恃有一太公爾天所以相楚也今不歸之以伸區區之信義紓旦夕之急臣恐漢人怒氣益奮戰士倍我是大王又以其資遺漢且將索然而為窮人矣此臣所以為大王寒心也夫制人之與見制於人克人之與見克於人豈同日而語哉願大王熟計之項王曰孤所以恩漢者亦至矣然去輒背我今其父在此猶日急鬬誠一旦歸之徒益其氣爾侯公曰不然臣聞懐敵者强怒敵者亡大王於漢有足懐而制之乃欲怒而鬬之臣意天溺大王之衷將遂孤楚矣大王誠惠辱一介之使䕶太公且致言漢王曰前日太公播越于外羇旅敝軍獲侍盥沐者三年于兹而君王方深督過之是以下國君臣未敢議太公之歸今君王勅駕迎之孤恐乆稽君王旦暮問安侍膳之歡敢不承令敬遣下臣衛送太公之屬車以還行宫孤亦願自今之日與君王捐忿與瑕繼平昔之歡君王有以報不榖者皇天后土實與聞之如此而漢不觧甲罷兵以荅大義則曲在彼矣大王因之號令士卒以趨漢王此秦所以獲晋惠公也今大王不辱聽臣臣無所受命而歸漢王固將慟哭於軍曰楚之讎我者深矣使者再返而太公不歸矣且號為舉大義除殘賊拯萬民終之有不共戴天之讎何面目以視天下今日之事有楚無漢有漢無楚吾將前死楚軍不返顧矣漢王持此感怒士心整甲而趨楚軍此伍子胥所以鞭平王之屍也項王曰善吾聽公姑無烹公第還語而王令罷兵吾今歸之矣侯公曰此又不可夫智貴乎早决勇貴乎必為早決者無後悔必為者無棄功王陵楚之驍將也一旦亡去漢大王拘執其母將以還陵也而其母慷慨對使者為陵陳去就之義勅陵無還遂伏劍而死故天下皆賢智其母而莫不哀其死也今太公幽囚鬱抑於大王之軍乆矣今聞使者再返而大王無意幸赦還之臣竊意其變生於無聊不勝恚辱之積一旦引決以蹈陵母之義則大王悔恐自失雖欲回漢軍之鋒不可得矣臣聞來而不可失者時也蹈而不可失者機也方今大王糧匱師老無以支漢而韓信之軍乘勝之鋒亦且至矣大王雖欲解而東歸不可得矣臣願大王因其時而用其機急歸太公與漢王約中分天下割鴻溝以西為漢以東為楚大王解甲登壇建號東帝以撫東方之諸侯亦休兵儲粟以待天下之變漢王老且厭兵尚何求哉固將世為西藩以事楚矣項王大悦聽其計引侯生為上客召太公置酒髙㑹三日而歸之太公吕后既至漢王大悦軍皆稱萬歲即日封侯公平國君曰此天下辯士所居傾國者故號平國君焉擬孫權荅曹操書權白孟徳足下辱書開示禍福使之内殺子布外擒劉備以自効書辭勤欵若出至誠雖三尺童子亦曉然知利害所在矣然僕懐固陋敢略布昔田横齊之遺虜漢髙祖釋酈生之憾遣使海島謂横來大者王小者侯猶能以力自剄不肯以身辱於劉氏韓信以全齊之地束手於漢而不能死於牖下自古同功一體之人英雄豪傑之士世亂則藉以剪伐承平則理必猜疑與其受韓信之誅豈若死田横之節也哉僕先將軍破虜遭漢陵夷董卓僣亂焚燒宗廟發掘陵寢故依袁術以舉義師所指城邑響應天下思得董卓而食之不厭不幸此志未遂而無禄早世先兄伯符嗣命馳驅鋒鏑周旋江漢豈有他哉上以雪天子之恥下以畢先將軍之志耳不意袁術亦僭位號汚辱義師又聞諸君各盜名字伯符提偏師進無所歸退無所守故資江東為之業耳不幸有荆軻舞陽之變不以權不肖使統士卒以卒先臣之志僕受遺以來卧薪嘗膽悼日月之逾邁而歎功名之不立上負先臣未報之忠下沗伯符知人之明且權先世以徳顯於吳權若效諸君有非常之志縱不䝉顯戮豈不墜其家聲耶漢自桓靈以來上失其道政出多門宦官之亂纔息董卓之禍復興傕汜未誅袁劉割據天下所恃惟權與公及劉備三人耳比聞卓已鯨鯢天子反正僕意公當掃除餘孽同奬王室上助天子與宗廟社稷之靈退守藩國無失春秋朝覲之節而足下乃有欺孤之志威挾天子以令天下妄引厯數隂構符命昔笑王莽之愚今竊歎足下蹈覆車也僕與公有婚姻之舊加之同好相求然自聞求九錫納椒房不惟同志失望天下甚籍籍也劉備之兵雖少然僕觀其為人雄材大畧寛而有容拙於攻取巧於馭人有漢髙祖之餘風輔以孔明未可量也且以忠義不替曩昔僕以為今海内所望惟我二人耳僕之有張昭正如備之孔明左提右挈以就大事國中文武之事盡以委之而見教殺昭與備僕豈病狂也哉古諺有之輔車相依唇亡齒寒僕與劉備實有唇齒相須之勢足下所以不能取武昌又不能到成都者吳蜀皆存也今使僕取蜀是吳不得獨存也蜀亡呉亦隨之矣晋以垂棘屈産假道於虞以伐虢夫㓕虢是所以取虞虞以不知故及禍足下意何以異此古人有言曰白首如新傾葢如故言以身託人必擇所安孟徳視僕豈惜此尺寸之土者哉特以公非所託故也荀文若與公共起艱危一旦勸公讓九錫意便憾使卒憂死矧僕與公有赤壁之隙雖復盡釋前憾然敢必公不食斯言乎今日歸朝一匹夫耳何能為哉縱公不見害交鋒兩陣之間所殺過當今其父兄子弟實在公側怨讎多矣其能安乎季布數窘漢王及即位猶下三族之令矧足下記人之過忘人之功不肯忘文若於九錫其肯赦僕於赤壁乎孔文舉與楊徳祖海内竒士足下殺之如皂𨽻豈復有愛于權天下之才在公右者即害之矣一失江東豈容復悔耶甘言重幣幸勿復再東坡全集巻一百
