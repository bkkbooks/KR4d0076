body:
  text: 東坡全集巻九十九宋蘓軾撰祝文六十八首禱雨磻溪祝文歲秋矣物之幾成者待雨而已穟者已秀待雨而實三日不雨則穟者不實矣莢者已孕待雨而秀五日不雨則莢者不秀矣野有餘土室有閒民待雨而耕且種七日不雨則餘土不耕閒民不種矣穟者不實莢者不秀餘土不耕而閒民不種則守土之臣將有不任職之誅而山川鬼神將乏其祀兹用不敢寧居齋戒擇日並走羣望而精誠不歆神不顧答吏民無所請命聞之曰虢有周文武之師大公其可以病告乃用大祲之禮禱而不祠穀梁子曰古之神人有應上公者通乎隂陽君親帥諸大夫道之而以請焉夫生而為上公没而為神人非公其誰當之詩曰維師尚父時維鷹揚涼彼武王肆伐大商㑹朝清明公之仁且勇計其神靈無所不能為也吏民既以雨望公公亦當任其責敢布腹心公實圖之尚饗鳯翔太白山祈雨祝文維西方挺特英偉之氣結而為此山惟山之陰威潤澤之氣又聚而為湫潭缾罌罐勺可以雨天下而況於一方乎乃者自冬徂春雨雪不至西民之所恃以為生者麥禾而巳今旬不雨即為凶歲民食不繼盜賊且起豈惟守土之臣所任以為憂亦非神之所當安坐而熟視也聖天子在上凡所以懷柔之禮莫不備至下至於愚夫小民奔走畏事者亦豈有他哉凡皆以為今日也神其盍亦鑒之上以無負聖天子之意下以無失愚夫小民之望尚饗告封太白山明應公祝文天作山川以鎮四方俾食于民以雨以暘惟公聰明能率其職民以旱告應不踰夕帝謂守臣予嘉乃功惟新爵號往耀其躬在唐天寶亦賜今爵時惟術士探符訪藥謂為公榮實為公羞中原顛覆神不顧救今皇神聖惟民是憂民既飽溢皇無禱求衮衣煌煌赤舄繡裳捨舊即新以佑我民尚饗祈雨龍祠祝文杭州神食于民吏食于君各思乃事食則無愧吏事農桑神事雨暘匪農不力雨則時嗇召呼風霆來㑹我庭一勺之水膚寸千里尚饗祈雨吳山祝文杭之為邦山澤相半十日之雨則病水一月不雨則病旱故水旱之請黷神為甚今者止雨之禱未能踰月又以旱告矣吏以不德為愧神以不倦為德願終其賜俾克有秋尚饗祈晴風伯祝文維神開闔隂陽鼔舞萬類行巽之權直箕之次陰淫為霖神能散之下土墊澇神能暵之發軫西北弭節東南風反雨霽神亦不慙尚饗祈晴雨師祝文天以風雨寒暑付於神亦如人君之設官置吏以治刑政也人君未嘗不欲民之安天亦何嘗不欲歲之豐乎刑政之失中民惟吏之怨雨暘之不時民亦不能無望於神也今淫雨彌月農工告窮歲之豐凶决於朝夕而並走羣望莫肯顧答維天之所以畀於神神之所以食於民者庶其在此尚率厥職俾克有秋尚饗祈晴吳山祝文歲既大熟惟神之賜害於垂成匪神之意築場為塗臥穟生耳農泣于野其忍安視生為楚英没為吳豪烈氣不泯視此海濤反雨為暘何足告勞有潔斯醴匪神孰號尚饗奉詔禱雨諸廟祝文噫嗟艱歲胡閟斯雨念我東南餔饟中土迎秋餞伏農不再舉有事郊廟萬方畢助漕溝絶流庭實未旅下書哀痛超軼堯禹矧兹守臣廢食悼懼民之禍福間不容縷今不愍救後訴無所天高莫謁神或可籲尚饗禱雨社神祝文噫我侯社我民所恃祭于北墉答陰之義陽亢不反自春徂秋迄冬不雨嗣歲之憂吏民嗷嗷謹以病告錫之雨雪民敢無報尚饗禱雨后土祝文神食于社蓋數千年更歴聖王訖莫能遷源深流逺愛民宜厚雨不時應亦神之疚社稷惟神我神惟人去我不逺宜軫我民尚饗禱雨稷神祝文農民所病春夏之際舊穀告窮新穀未穟其間有麥如暍得涼如行千里弛擔得漿今神何心毖此雨雪敢求其他尚憫此麥尚饗禱雨后稷祝文維神之生稼穡是力瘽身為民尚莫顧惜矧今在天與天同功召呼風雲孰敢不從豈惟農田井竭無水我求於神亦云亟矣尚饗祭常山祝文五首密州洪惟上帝以斯民屬於山川羣望亦如天子以斯民屬於守土之臣惟吏與神其職惟通殄民廢職其咎惟均哀我邦人遭此凶旱流殍之餘其命如髪而飛蝗流毒遺種布野使其變躍飛騰則桑柘麥禾舉罹其災民其罔有孑遺吏將獲罪神且乏祀兹用慄慄危懼謹以四月初吉齋居蔬食至于閏月辛丑若時雨沾洽蝗不能生當與吏民躬執牲幣以答神休嗚呼我州之望不在神乎父老謂神求無不獲克有常德以名兹山其可不答以愧此名若曰歲之豐凶在天非神之所得專吏將亦曰民之休戚在朝廷我何知焉則誰任其責矣上帝與吾君愛民之心一也凡吏之可以請于朝者既不敢不盡則神之可以謁于帝者宜無所不為尚饗又峩峩兹山望我東國為帝司雨涵濡百物自我再禱應不旋轂迨兹有秋歲得中熟嗟此薄禮曷稱其德陶匠並作新其楹桷豈以為報民茍不怍歲云徂矣麰麥未殖嗣歲之憂既謝且謁惠然雨我以永休烈尚饗又比年以來蝗旱相屬中民以上舉無歲蓄量日計口斂不待熟秋田未終引領新穀如行逺道百里一宿茍無舍館行李夜哭有秋不雨霜露殺菽黄穈黑黍不滿囷簏麥田未耕狼顧相目道之云逺飢腸誰續五日不雨民在坑谷猗嗟我侯靈應響速帝用嘉之惟新命服祈而不獲厥愆在僕洗心祇載敢辭屢凟庶哀斯民朝夕濡足尚饗又天子有命閔兹旱暵俾我守臣並走羣望惟神聰明慈惠求無不獲既再禱矣雖嘗一雨不及膚寸吏實不德不足以䝉神之休導迎善氣以致甘澤洪惟聖天子之意其可不答而飢羸之民將轉于溝壑其可不一救之瀆神之罰吏其敢辭尚饗又熙寧九年七月某日詔封常山神為潤民侯十月某日具位蘇軾謹以清酌少牢之奠昭告于侯之廟曰嗚呼旱蝗之為虐也三年於兹矣東南至于江海西北被于河漢饑饉疾疫靡有遺矣我瞻四方大川喬嶽食于斯民者甚衆而受寵於吾君者可謂巍巍矣訴之而必聞求之而必獲思我農夫而救其災沴不為倐雲驟雨茍以應禱之虛名而有膏澤積潤可以及民之實效卓然如侯者幾希矣凡天子之爵命有德而致之則為榮無功而享之則為辱今侯澤此一郡而施及于四鄰其受五等之爵而被七命之服也可謂無愧而有光輝矣願侯益脩其實以充其名上以副天子之意而下以塞吏民之望民其奉事有進而無衰矣尚饗謝雪祝文徐州天不吝澤神不忘職胡為水旱吏則不德失政召災莫知自刻雨則號晴旱則謁雪神既不譴又滿其欲四山暮霰萬瓦晨白驅攘疫癘甲拆麰麥牲酒匪報維以告潔神食無愧吏則慚慄尚饗祭風伯雨師祝文自秋不雨以至于今夏田將空秋種不入天子命我禱于羣望雲物既合風輒散之吏民皇皇不知所獲罪敢以薄奠訴于有神風若不作雨則隨至當以牲幣報神之賜若格絶天澤棄民乏祀上帝臨視神其不然尚饗謁文宣王廟祝文湖州竊惟吏治以仁義為本教化為急故以視事之三日祇見于先聖先師問所當先於學其所從來尚矣敢忘其舊尚饗謁諸廟祝文軾猥以不肖來長此邦實與有神分職幽明謹以視事之三日祇見于廟惟神保佑斯民俾風雨時若疫癘屏息吏既免罪神亦不愧尚饗謁廟祝文杭州軾以王命來守此邦事神養民敢不祇飭莅政之始見于祠下安靜無事豐樂有年惟神相之使免罪戾尚饗謁文宣王廟祝文軾以諸生誤䝉選擢昔自太史通守此邦今由禁林出使浙右莅事之始祇見儒宮聖神臨之敢忘夙學尚饗祭英烈王祝文欽誦舊史仰瞻高風報楚為孝徇吳為忠忠孝之至實與天通開塞陰陽斡旋濤江保障斯民以食此邦嗟我惷愚所向奇窮豈以其誠有請輒從庚子之禱海若伏降完我岸閘千夫奏功牲酒薄陋報微施豐敬陳頌詩侑此一鍾尚饗祈雨祝文杭州之為郡負山帶江水澤不留逾旬不雨農有憂色挽州浚河公私告病吏既無術莫知所救不敢坐視惟神之求庶幾閔民之窮赦吏之瀆賜以一雨敢忘其報尚饗謝雨祝文舊穀不登陳廪已發稍失雨暘之節則懷溝壑之憂惟神至明有禱必應敢陳薄奠少答殊私願推無倦之仁以畢有年之賜尚饗祈晴祝文大雪連日凝陰傷春閔惟艱食之民重此常寒之虐役兵墮指行旅摧輈老弱號呼吏既慚於無術陰陽舒巻神何惜而不為願掃重雲以昭靈貺使民奉事永歲益䖍尚饗謝晴祝文軾以憂寄出守此邦歲之不登實任其咎政雖無術心則在民惟神聰明其應如響雨不暴物晴不失時喜愧之心吏民所共式陳菲薦少答神休尚饗祈晴吳山廟祝文秋穀未登既食其陳嗣歲之虞當斂其新逮此秋暘載穫載舂陰雨害之穡人罔功我發庫泉以實高廩曷敇雨官遄止其淫既暵我場萬杵皆作待此坻京援我溝壑英文烈武雨霽在余稽首告病其忍弗圖尚饗謝晴祝文賞罰在朝吏申明之及其有愆吏得正之雨暘在天神奉行之及其不時神得請之惟吏與神各率其職有求必獲則無虛食淫雨既止惟神之功肴酒匪報惟以告衷尚饗開湖祭禱吳山水仙五龍三廟祝文杭之西湖如神之有目湖生茭葑如目之有翳翳乆不治目亦將廢河渠有膠舟之苦鱗介失解網之惠六池化為眢井而千頃無復豐歲矣是用因賑䘏之餘資興開鑿之利勢百日奏功所患者淫雨千夫在野所憂者疾癘庶神明之陰相與人謀而協濟魚龍前導以破堅菰葦解拆而迎銳復有唐之舊觀盡四山而為際澤斯民於無窮宜事神之益勵我將大合樂以為報豈徒用尊酒之薄祭也尚饗謝吳山水仙五龍三廟祝文西湖堙塞積歲之患坐閲百吏熟視而歎惟愚無知妄謂非難禱于有神陰假其便不愆于素咸出幽贊大堤雲横老葑席巻歴時未幾功已過半嗣事告終來哲所繕神卒相之罔咈民願肴酒之報我愧不腆尚饗潁州謁文宣王廟祝文軾以諸生遭遇入侍帷幄出典民社涖事之始祇見于學先聖先師實臨之敬行所聞敢忘其舊尚饗謁諸廟祝文軾以侍臣出守承宣上意以民為本祇敬事神所以芘民涖事之始祇見祠下尚饗德音到州祭諸廟祝文維年月日具位蘇軾謹以清酌庶羞之奠敢昭告于某神上清儲祥宫成敷宥四海均福于下有詔守臣凡在秩祀罔不祇薦維神導和却沴保民無疆以稱朝廷至仁之意尚饗祈雨迎張龍公祝文維元祐六年歲次辛未十月丙辰朔二十五日庚辰龍圖閣學士左朝奉郎知潁州軍州事蘇軾謹請州學教授陳師道并遣承務郎迨以清酌庶羞之奠敢昭告于昭靈侯張公之神稽首龍公民所祇威德博而化能潛能飛食于潁人淮潁是依受命天子命服有輝為國庇民凡請莫違歲旱夏秋秋穀既微冬又不雨麥稿而腓閔閔農夫望歲畏饑並走羣望莫哀我欷於赫遺蛻靈光照幃惠肯臨我言從其妃翿舞雩詠薦其潔肥雨雪在天公執其機游戲俛仰千里一麾被及淮甸三輔王畿積潤滂流浹日不晞我率吏民鼓鐘旄旗拜送于郊以華其歸尚饗送張龍公祝文維元祐六年歲次辛未十一月乙酉朔十日甲午龍圖閣學士左朝奉郎知潁州軍州事兼管内勸農使輕車都尉賜紫金魚袋蘇軾謹以清酌庶羞之奠敢昭告于昭靈侯張公之神赫赫龍公甚武且仁赴民之急如謀其身有不應祈惟汝不䖍我自洗濯齋居誠陳旱我之罪勿移於民公顧聽之如與我言玉質金相其重千鈞惠然肯來期者四人眷此行宮為留浹辰再雨一雪既洽且均何以報之榜銘皆新詔公之德千億萬年惟師道迨復餞公還咨爾庶邦益敬事神尚饗立春祭土牛祝文三陽既應庶草將興爰出土牛以戒農事丹青設象蓋惟風俗之常耕穫待時必有陰陽之助仰惟靈德佑我穡人尚饗謝晴祝文吏既不德致災病民一雨一霽輒號于神風回雪止農事並作神則有功吏亦知怍凍餒之蘇其賜不貲嗟我吏民為報之微尚饗祈雨僧伽塔祝文維元祐七年歲次壬申三月甲申朔十二日乙未龍圖閣學士左朝奉郎新知揚州軍州事充淮南東路兵馬鈐轄蘇軾謹以香燭茶果之供敢昭先于大聖普照王之塔淮東西連歲不稔農末皆病公私並竭重以浙右大荒無所仰食望此夏田以日為歲大麥已秀小麥已孕時雨不至垂將焦枯凶豐之决近在旬日軾移守廣陵所部十郡民窮為盜職所當憂才短德薄救之無由伏願大聖普照王以解脫力行平等慈噫欠雲雷咳唾雨澤救焚拯溺不待崇朝敬瀝肝膽尚鑒聽之尚饗定州謁諸廟祝文惟皇上帝分命羣祀降釐下土惟我元后臨遣近臣鎮撫一方幽明雖殊保民惟均涖事之始祇見祠下若賦政疵纇敢逃其罰雨暘以時疾疫不作亦竊有望于神尚饗謁文宣王祝文軾以諸生進位于朝入叅侍從出典方面涖事之始祇見廟下居敬行簡以臨其民軾雖不敏請事斯語尚饗北嶽祈雨祝文維元祐九年歲次甲戌四月壬寅朔十六日丁巳端明殿學士兼翰林侍讀學士左朝奉郎定州路安撫使兼馬步軍都總管知定州軍州及管内勸農使輕車都尉賜紫金魚袋蘇軾敢以制幣茶果清酌之奠敢昭告于北嶽安天元聖帝都城以北燕薊之南既徂歲而不登又歴時而未雨公私並竭農末皆傷麥將槁而禾未生民既流而盜不止豐凶之决近在浹辰溝壑之憂上貽當宁仰止喬嶽食于朔方巻舒雲霓呼吸雨霽若其安視小民之急何以仰符上帝之仁軾以短才謬膺重寄儻有罪以致旱寧降罰于微躬今者得請于朝齋居以禱旦夕是望吁夏而求雨我夏田兼致西成之富實兹邊廩少寛北顧之憂拜賜以時敢忘其報尚饗立春祭土牛祝文敢昭告于勾芒之神木鐸傳音官師相儆土牛示候稼穡將興敢徼福于有神庶保民於卒歲無作水旱以登麥禾尚饗春祈北嶽祝文西起太行東屬碣石南至于河皆神所食吏謹刑政農畢其力風雨時若則神之職方此東作敬薦其潔錫之豐歲以昭靈德尚饗春祈諸廟祝文天既佑民必期于無害農惟望歲敢請于有神願疾沴之不興庶風雨之時若敢忘舊典以報豐年尚饗祈雨諸廟祝文某神之靈去歲之秋民苦饑饉望此一麥以日為歲不雨彌月敢以病告與其救之於已竭不若起之於未枯敢冀有神時賜甘澤豐登之報我其敢忘尚饗定州辭諸廟祝文軾得罪于朝將適嶺表雖以謫去敢不告行區區之心神所鑒聽尚饗告文宣王祝文嗟嗟元王三代之英言不鉤用於一君而為無窮之遺教身不寵利於一時而有不朽之餘榮嗟嗟元王以道而鳴肆筆成書吐辭為經炳然不渝言若丹青乆而愈盈聲非雷霆瞽者可以使剔目以核視瞶者可以使抉耳以犇驚奈何轍環天下卒老于行載空言於典籍示後世之儀刑囘狂瀾於既倒支大厦於將傾揭日月之昭昭破陰氛之㝠㝠嗟乎一氣之委和與萬物之至精或為淮夷之蠙珠或為雲漢之華星雖光輝之成彩未離乎散聚以流形豈若王之道德愈乆而彌明曄曄而華涵涵而停融而在天者為雲漢之文章結而在地者為山嶽之元靈詭然如龍翔鳯躍純乎玉振而金聲嗟嗟元王德博難名某奉王命俯臨邊城畝有滯穗境無交兵鳴玉載道紛袍在庭有踐籩豆有豐粢盛敢用昭薦饗于克誠尚饗告顔子祝文志不行于時而能驅世以歸仁澤不加于民而能顯道以終身德無窮通古難其人惟公能之絶世離倫富貴不義視之如雲飲止一瓢不憂其貧受教孔子門人益親血食萬世配享惟神敢不昭薦公乎有聞告五嶽祝文相天以育物者五方之帝也配地以作鎮者五嶽之神也天為真君帝為真宰五嶽者三公之象也某叨受朝寄出守藩土神不虐罰民有豐歲敢用告誠以謝靈貺秋賽祝文二首惟神聰明為民依庇宜秩典祀欽奉靈祠況農事之肈興賴神靈之降宥一拜䝉惠已膺風雨之時百里有嚴將享秋冬之報又惟神光昭祀典幽贊化功享廟食以惟嚴垂介福而無爽屬兹豐歲爰舉舊規式陳蠲潔之儀冀報有年之慶杭州禱觀音祈晴祝文三吳之災連歲不稔尚賴朝廷之澤大分倉廩之陳乃眷疲羸僅免流殍今者淫雨彌月秋成半空永惟嗣歲之憂將有流離之懼我大菩薩行平等慈覩此衆生皆同赤子反雨暘於指顧化豐歉於斯須雖某等不德而召災念斯民無辜而可憫願興慈率一拯含生謝觀音晴祝文民無常心固何知於帝力天作淫雨當有感於佛慈慧光照臨陰沴消復拯農工於溝壑寛吏責於簡書某等共銜不報之恩願頌難名之德恭馳梵宇少薦微誠祈晴祝文常平之政覩歲美惡操其嬴虛以馭農末秋穀未登已食其陳嗣歲之虞當斂其新迨兹秋暘載穫載舂陰雨害之穡人罔功我發庫泉以實高廩盍勅雨官遄止其霪既暵我場萬杵皆作待此坻京援我溝壑不顯大神雨霽在予匪民焉依其忍弗圖謝晴祝文天作淫雨害于粢盛䝉神之休猶得中蒸薄奠匪報式昭厥誠祈雨祝文六月不雨乃時之常或霖或霪於稼則傷稼將有秋民饑所望某也不德守此一方罪在守臣無俾民殃人不能神易雨而暘神其聽之庶乎降康謝雨祝文竊以農事告成旱魃為沴寖罹焦爍之害遂稽收刈之勤自非降靈大庇羣俗以下膏澤之賜庶有豐盈之期實神助之使然豈愚誠之能致是用特臨神宇再欵睟容輒傾涓潔之誠仰答靈威之佑祈雪霧猪泉祝文噫嘻我民何辜于天不水則旱于今二年天未悔禍百日不雨雪不斂塵麥不蓋土天子命我禱于山川側聞此山神龍之淵躬拜稽首敢丐一勺得雪盈尺牲酒是酢祈雪祝文水旱輒求惟吏之羞有求不倦惟神之休乙夘之雪膚寸而已如燔輿薪救以勺水嘉肴旨酒既謝且祈願終其賜盈尺為期祭勾芒神祝文夫帝出乎震神實輔之兹日立春農事之始將平秩於東作先恭授於人時乃出土牛以示早晚惟神其祐之春律既應農事將作爰出土牛以為耕候維爾有神實左右之雨暘以時螟螣不作以克有年敢忘其報祭佛陀波利祝文積雪始消陰沴再作小民無辜弊于飢寒草木昆蟲悉罹其虐並走羣望祈而未報意雨霽有數非神得專惟我大士含法分無為不入塵數願以大解脫力作不可思議事愍此無生豁然開明盡二月晦雨雪不作大拯羸餓以發信根此大布施實無限量惟大士念之祭常山神祝文吏實不德無以導迎順氣消復災沴惟神之求神亦閔其不才而嘉其勤凡有告請靡所不答乃者有謁乎神即退之三日時雨周洽去城百里而近蝗獨不生凡我吏民孰不歸德于神然而一雨之後彌月不繼百里之外蝝生如初豈神之能應於前不能應於後能䘏其近不能䘏其逺蓋吏不稱職政刑失中戾于民心以不能終神之賜而我州之民比歲饑殍凋殘之餘不復堪命若又不熟則流離之禍其莫知所止矣神之聰明其忍以吏不稱職之所致而不卒救之歟今夏麥垂登而秋穀將稿若時賜霈澤驅攘蟲災以完我西成之資歲秋九月當與吏民復走廟下祭泗州塔祝文淮南東西連歲不稔士農皆病公私並竭重以浙右大荒無所仰食望此夏苗以日為歲大麥已秀小麥初孕時雨不至垂將焦枯豐凶之决近在旬日某移牧廣陵所部十郡民窮為盜吏職所憂才短德薄救之無術伏願大聖普照王以解脫力行平等慈噫欠風雷咳唾雨澤救焚拯溺不待崇朝敬瀝肝膽尚矜聽之某上承府檄旁採民言供奉安輿願登法座伏願江海貢潤龍天㑹朝布為三日之霖適副一邦之望禱龍水祝文雲布多峯日有焚空之勢雨無破塊人懷暍虐之憂雖屢叩於明靈終未懷於通感府主舍人存心為國俯念輿民燃香靄以禱祈對龍湫而懇望伏願明靈敷感使雨澤以旁滋聖化荐臻致田疇之益濟祈晴祝文均糴之法著于甲令視歲豐凶以馭重輕歲且中熟雨則害之如此失時公私交病神食此土民命係焉無俾歉荒以作神羞偈二十首靈感觀音偈并引或問居士佛無不在云何僧榮所常供養觀世音像獨稱靈感居士答言譬如靜夜天清無雲我目無病未有舉頭而不見月今此畫像方其畫時工適清淨又此僧榮方供養時秉心端嚴不入諸相無有我人衆生夀者則觀世音廓然自現爾時居士作此言已心開形解隨其所得而說偈言夫物芸芸各升其英為天蒼蒼為日月星無在不在容光則明矧我大士淵兮淨神妙湛生光即光為形亭亭空中靡所倚憑眷此幻身如鬼如氓生則囿物軒昂權衡地所不載而能空行滅則蕩空附離四生不可控摶矧此亭亭涕淚請救搏頰頓纓如月下照著心寒清不因脩為得法眼淨碎身微塵莫報聖靈無名和尚頌觀音偈徐因饒州人我觀諸佛及菩薩皆以六塵作佛事雖有妙智如觀音根性亦自聞思復佛子流蕩無始劫未空言語文字性譬如多財石季倫知財為害不早散手揮金寶棄溝壑不如施與貧病者纍纍三百五十珠持與觀音作纓絡送夀聖聰長老偈并序佛說作止任滅是謂四病如我所說亦是諸佛四妙法門我今亦作亦止亦任亦滅滅則無作作則無止止則無任任則無滅是四法門更相掃除火出木盡灰飛煙滅如佛所說不作不止不任不滅是則滅病否即任病如我所說亦作亦止亦任亦滅是則作病否即正病我與佛說既同是法亦同是病昔維摩詰黙然無語以對文殊而舍利佛亦復黙然以對天女此二人者有何差别我以是知茍非其人道不虛行時長老聰師自筠來黄復歸於筠東坡居士為說偈言珍重夀聖師聽我送行偈願閔諸有情不斷一切法人言眼睛上一物不可住我謂如虛空何物住不得我亦非然我而不然彼義然則兩皆然否則無然者朱夀昌梁武懴贊偈并序我觀世間諸得道者多因苦惱苦惱之極無所告訴則呼父母父母不聞仰而呼天天不能救則當歸命於佛世尊佛以大悲方便開示令知諸苦以愛為本得愛則喜犯愛則怒失愛則悲傷愛則懼而此愛根何所從生展轉觀察愛盡苦滅得安樂處諸佛亦言愛别離苦父母離别其苦無量於離别中生離最苦有大長者曰朱夀昌生及七歲而母捨去長大懷思涕泣追求刺血寫經禮佛懺悔四十餘年乃見其母念報佛恩欲度衆苦觀諸教門切近周至莫如梁武所說懺悔文既繁重旨亦淵秘一切衆生有不能了乃以韻語諧諸音律使一切人歌詠讚歎獲福無量時有居士蜀人蘇軾見聞隨喜而說偈曰長者失母常自念言母本生我我生母去有我無母不如無我誓以此身出生入死母若不見我亦隨盡在衆人中猶如狂人終日皇皇四十餘年乃見其母我初不記母之長短大小肥瘠云何一見便知是母母子天性自然㝠契如磁石鍼不謀而合我未見母不求何獲既見母已即無所求諸佛子等歌詠懺文既懺罪已當求佛道如我所說作求母觀玉石偈嘻嘻呀呀三伏中草木生煙地生火遺君玉石百有八願君置之白石盆注以碧蘆井中泉遣君肝肺涼如水熱惱既除心自定當觀熱相無去來寒至折膠熱流金是我法身一呼吸寒人者冰熱者火冰火初不自寒熱一切世間我四大畢竟誰受寒熱者願以法水浸摩尼當觀此石如瓦礫地獄變相偈我聞吳道子初作酆都變都人懼罪業兩月罷屠宰此畫無實相筆墨假合成譬如說食飽何從生怖汗乃知法界性一切惟心造若人了此言地獄自破碎十二時中偈十二時中常切覺察遮箇是什麽十二月二十日自泗守席上回忽然夢得箇消息乃作偈曰百滚油鐺裏恣把心肝煠遮箇在其中不寒亦不熱似則是似則未是不唯遮箇不寒熱那箇也不寒熱咄甚呌做遮箇那箇無相庵偈出庵見庵入庵見圓問此圓相何所因起非土非木亦非虛空求此圓相了不可得乃至無有無有亦無是中有相名大圓覺是佛心也是諸魔種送海印禪師偈海印禪師紀公將赴峨眉往别太子少保趙公於三衢公以三詩贈行復枉道過某於齊安亦求一偈公以元臣大老功成而歸某以非才竊禄得罪而去禪師道眼了無分别迺知法界海惠照了萬殊大小從横不相留礙直從巴峽逢僧晏道到東坡别紀公當時半破峨眉月還在平羌江水中請以此偈附于三詩之末南屏激水偈水激之高如所從來屈伸杓報盡而止止不先平於以觀法觀藏真畫布袋和尚像偈拄杖指天布袋著地掉却數珠好一覺睡木峰偈元豐七年臘月朔日東坡居士過臨淮謁普照王塔過襄師房觀所藏佛骨舍利捨山木一峯供養乃說偈言枵然無根生意永斷劫火洞然為君作炭寒熱偈今歲大熱八十餘日物我同病是熱非虛方其熱時謂不復涼及其既涼熱復安在凡此寒熱更相顯見熱既無有涼從何立今我又復認此為涼後日更涼此還是熱畢竟寒熱為無為有如此分别皆是衆生客塵浮想以此為達無有是處使謂為迷則又不可如火燒木從木成炭從炭成灰為灰不已了無一物當以此偈更問子由僕在黄州戲書為江夏李樂道持去後七年復相見京師出此書茫然如夢中語也元祐戊辰六年三月三日佛心鑑偈軾第三子過蓄烏銅鑑圜徑數寸光明洞澈元豐八年十一月二日游登州延洪禪院院僧文泰方造釋迦文像乃捨為佛心鑑且說偈云鑒中面像熱時炎無我無造無受者心花發明照十方還度如是常沙衆戲答佛印偈百千燈作一燈光盡是恒沙妙法王是故東坡不敢惜借君四大作禪牀養生偈閑邪存誠練氣養精一存一明一練一清清明乃極丹元乃生坎離乃交梨棗乃成中夜危坐服此四藥一藥一至到極則處幾費千息閑之廓然存之卓然養之郁然煉之赫然守之以一成之以乆功在一日何遲之有易曰閑邪存其誠詳味此字知邪中有誠無非邪者閑亦邪也至於無所閑乃見其誠者幻滅滅故非幻不滅送僧應託偈蘇夀明巢穀僧應託與東坡居士皆眉人也㑹于黄崗將之廬山作偈送之一般口眼兩般腸肚認取鄉人聞早歸去王晉卿前生圖偈王晉卿得破墨三昩又嘗聞祖師第一義故畫邢和璞房次律論前生圖以寄其高趣東坡居士既作破琴詩記夢異矣復說偈言前夢後夢真是一此幻彼幻非有二正好長松水石間更憶前身後身事東坡居士過龍光求大竹作肩輿得兩竿時南華珪首座方受請為此山長老乃留一偈院中須其至授之以為他時語録中第一問斫得龍光竹兩竿持歸嶺北萬人看竹中一滴曹溪水漲起西江十八灘南華長老寵示四頌事忙只還一偈宿業相纒四十年常行八棒十三禪今著衲衣歸玉局可憐化作五通仙東坡全集巻九十九
