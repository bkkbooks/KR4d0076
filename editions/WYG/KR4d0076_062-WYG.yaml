body:
  text: 東坡全集巻六十二宋蘓軾撰奏議八首再論積欠六事四事劄子元祐七年六月十六日龍圖閣學士左朝奉郎知揚州蘇軾劄子奏臣已具積欠六事及舊所論四事上奏臣聞之孟子曰以不忍人之心行不忍人之政若陛下初無此心則臣亦不敢必望此政屢言而屢不聴亦可以止矣然臣猶孜孜强聒不已者葢由陛下實有此心而為臣子所格沮也竊觀即位之始發政施仁天下聳然望太平於朞月今者八年而民益貧此何道也願陛下深思其故若非積欠所壓自古至今豈有行仁政八年而民不蘇者哉臣前所論四事不為不切而經百餘日畧不施行臣既論奏不巳執政乃始奏云初不見臣此疏遂奉聖㫖令臣别録聞奏意謂此奏朝上而夕行今又二年於此矣以此知欠積之事大臣未欲施行也若非陛下畱意痛與指揮只作常程文字降出仍却作熟事進呈依例送户部詳看則萬無施行之理臣人㣲言輕不足計較所惜陛下赤子日困日急無復生理也臣又竊料大臣必云今日西邊用兵急於財利未可行此臣謂積欠之在戸部者其數不貲實似可惜若實計州縣催到數目經涉嵗月積欠之在戸部者累毫何足以助經費之萬一臣願聖主特出英斷早賜施行臣訪聞浙西饑疫大作蘇湖秀三州人死過半雖積水稍退露出泥田然皆無土可作田塍有田無人有人無糧有糧無種有種無牛殍死之餘人如鬼腊臣竊度此三州之民朝廷加意惠養仍須官吏得人十年之後庶可完復書曰制治於未亂保邦於未危浙西災患若於一二年前上下疚心同方拯濟其勞費殘弊必不至若今之甚也臣知杭州日預先奏乞下發運司多糴米斛以備來年拯濟饑民聖明垂察支賜緡錢百萬收糴而發運使王覿堅稱米貴不糴是年米雖稍貴而比之次年春夏猶為甚賤縱使貴糴尚勝於無而覿執所見終不肯收糴顆粒是致次年拯濟失備上下共知而不詰問小人淺見只為朝廷惜錢不為君父惜民類皆如此淮南東西諸郡累嵗災傷近者十年逺者十五六年矣今來夏田一熟民於百死之中㣲有生意而監司爭言催欠使民反思凶年怨嗟之氣必復致水旱欲望聖慈救之於可救之前莫待如浙西救之於不可救之後也臣敢昧死請内降手詔云訪聞淮浙積欠最多累嵗災傷流殍相屬今來淮南始獲一麥浙西未保豐凶應淮南東西浙西諸般欠負不問新舊有無官本並特與權住催理一年使久困之民稍知一飽之樂仍更别賜指揮行下臣所言六事四事令諸路安撫鈐轄司推類講求與天下疲民一洗瘡痏則猶可望太平於數年之後也臣伏覩詔書以五月十六日册立皇后本枝百世天下大慶孟子有言詩曰古公亶父來朝走馬率西水滸至於岐下爰及姜女聿來胥宇當是時也内無怨女外無曠夫此周之所以王也今陛下膺此大慶猶不念積欠之民流離道路室家不保鬻田質子以輸官者乎若親發徳音力行此事所全活者不知幾千萬人天監不逺必為子孫無疆之福臣不勝拳拳孤忠昧死一言取進止論倉法劄子元祐七年七月二十七日龍圖閣學士左朝奉郎知揚州蘇軾劄子奏臣竊謂倉法者一時權宜指揮天下之所駭古今之所無聖代之猛政也自陛下即位首寛此法但其間有要劇之司胥吏仰重禄為生者朝廷不欲遽奪其請受故且因循至今葢不得已而存畱非謂此猛政可恃以為治也自有刑罰以來皆稱罪立法譬之權衡輕重相報未有百姓造銖兩之罪而人主報以鈞石之刑也今倉法不滿百錢入徒滿十貫刺配沙門島豈非以鈞石報銖兩乎天道報應不可欺罔當非社稷之利凡為臣子皆當為陛下重惜此事豈可以小小利害而輕為之哉臣竊見倉法已罷者如轉運提刑司人吏之類近日稍稍復行若監司得人胥吏誰敢作過若不得人雖行軍令作過愈甚今執政不畱意於揀擇監司而獨行倉法是謂此法可恃以為治也耶今者又令真揚楚泗轉般倉㪷子行倉法綱運敗壞執政終不肯選擇一强明發運使以辦集其事但信倉部小吏妄有陳請便行倉法臣所未喻也今來所奏只是申明元祐編敕不過嵗捐轉運司違法所收糧綱税錢一萬貫而能使六百萬石上供斛㪷不大失䧟又能全活六路綱梢數千牽駕兵士數萬人免䧟深刑而押綱人員使臣數百人保全身計以至商賈通行京師富庶事理明甚無可疑者但恐執政不樂臣以踈外輙議已行之政必須却送戸部或却令本路監司相度多方沮難決無行理臣材術短淺老病日侵常恐大恩不報銜恨入地故貪及未死之間時進瞽言但可以上益聖徳下濟蒼生者臣雖以此得罪萬死無悔若陛下以臣言為是即乞將此劄子畱中省覽特發徳音主張施行若以臣言為妄即乞並此劄子降出議臣之罪取進止論綱稍欠折利害狀元祐七年七月二十七日龍圖閣學士左朝奉郎知揚州蘇軾狀奏臣聞唐代宗時劉晏為江淮轉運使始於揚州造轉運船每船載二千石十船為一綱揚州差軍將押赴河隂每造一船破錢一千貫而實費不及五百貫或譏其枉費晏曰大國不可以小道理凡所剏置須謀經乆船埸既興執事者非一須有餘剰衣食養活衆人私用不窘則官物牢固乃於揚子縣置十船埸差專知官十人不數年間皆致富贍凡五十餘年船埸既無破敗餽運亦不闕絶至咸通末有杜侍御者始以一千石船分造五百石船二隻船始敗壞而吴堯卿者為揚子院官始勘㑹每船合用物料實數估給其錢無復寛剰專知官十家即時凍餒而船埸遂破餽運不繼不久遂有黄巢之亂劉晏以千貫造船破五百貫為干繫人欺隱之資以今之君子寡見淺聞者論之可謂疏繆之極矣然晏運四十萬石當用船四百隻五年而一更造是嵗造八十隻也每隻剰破五百貫是嵗失四萬貫也而吴堯卿不過為朝廷嵗寛四萬貫耳得失至㣲而餽運不繼以貽天下之大禍臣以此知天下之大計未嘗不成於大度之士而敗於寒陋之小人也國家財用大事安危所出願常不與寒陋小人謀之則可以經久不敗矣臣竊見嘉祐中張方平為三司使上論京師軍儲云今之京師古所謂陳畱四通八達之地非如雍洛有山河之險足恃也特恃重兵以立國耳兵恃食食恃漕運漕運一虧朝廷無所措手足因畫十四䇿内一項云糧綱到京每嵗少欠不下六七萬石皆以折㑹償填發運司不復抱認非祖宗之舊也臣以此知嘉祐以前嵗運六百萬石而以欠折六七萬石為多訪聞去嵗止運四百五十餘萬石而欠折之多約至三十餘萬石運法之壞一至於此又臣到任未幾而所斷糧綱欠折干繫人徒流不可勝數衣糧罄於折㑹船車盡於折賣質妻鬻子飢瘦伶俜聚為乞丐散為盜賊竊計京師及縁河諸郡例皆如此朝廷之大計生民之大病如臣等輩豈可坐觀而不救耶輙問之於吏下有闕文乃金部便敢私意創立此條不取聖㫖公然行下不惟非理刻剥敗壞祖宗法度而人臣私意乃能廢格制敕監司州郡靡然奉行莫敢誰何此豈小事哉謹按一綱三十隻船而税務監官不過一員未委如何隨船㸃檢得三十隻船一時皆遍而不勒畱住岸一船㸃檢即二十九隻船皆須住岸伺候顯是違條舞法析文破敕茍以隨船為名公然勒畱㸃檢與兒戲無異訪聞得諸州多是元祐三年以來始行㸃檢收税行之數年其弊乃出綱梢既皆赤露妻子流離性命不保雖加刀鋸亦不能禁其攘竊此弊不革臣恐今後欠折不止三十餘萬石京師軍儲不繼其患豈可勝言揚州税務自元祐三年十月始行㸃檢收税至六年終凡三年間共收糧綱税錢四千七百餘貫折長補短每嵗不過收錢一千六百貫耳以淮南一路言之真揚髙郵楚泗宿六州軍所得不過萬緡而所在税務專攔因金部轉運司許令㸃檢縁此為姦邀難乞取十倍於官遂致綱梢皆窮困骨立亦無復富商大賈肯以物貨委令搭載以此專仰攘取官米無復限量拆賣船板動使浄盡事敗入獄以命償官顯是金部與轉運司違條刻剥得糧綱税錢一萬貫而令朝廷失䧟綱運米三十萬餘石利害皎然今來倉部並不體訪綱運致欠之因却言縁倉司㪷子乞覽綱梢錢物以致欠折遂立法令真揚楚泗轉般倉並行倉法其逐處㪷子仍只存畱一半命下之日揚州轉般倉㪷子四十人皆詣臣陳狀盡乞歸農臣雖且多方抑按曉喻退還其狀然相度得此法必行則見今㪷子必致星散雖别行召募未必無人然皆是浮浪輕生不畏重法之人所支錢米決不能贍養其家不免乞取既冒深法必須重賂輕齎宻行交付其押綱綱梢等知專㪷若不受賂必無寛剰㪷面決難了納即須多方宻行重賂不待求乞而後行用此必然之理也臣細觀近日倉部所立條約皆是枝葉小節非利害之大本何者自熙寧以前中外並無倉法亦無今來倉部所立條約而嵗運六百萬石欠折不過六七萬石葢是朝廷捐商税之小利以養活綱梢而縁路官司遵守編敕法度不敢違條㸃檢收税以致綱梢飽暖愛惜身命保全官物事理灼然臣已取責得本州税務狀稱隨船㸃檢不過檢得一船其餘二十九船不免住岸伺候顯有違礙臣尋已備坐元祐編敕曉示今後更不得以隨船為名違條勒令住岸㸃檢去訖其税務官吏為准本州及倉部發運轉運司指揮非是自擅為條未敢便行取勘其諸州軍税務非臣所管無由一例行下欲乞朝廷申明元祐編敕不得勒令住岸條貫嚴賜約束行下并乞廢罷近日倉部起請倉法仍取問金部官吏不取聖㫖擅立隨船一法刻剥兵梢敗壞綱運以誤國計及發運轉運司官吏依隨情罪施行庶使今後刻薄之吏不敢擅行胸臆取小而害大得一而喪百臣聞東南餽運所係國計至大故祖宗以來特置發運司專任其責選用既重威令自行如昔時許元輩皆能約束諸路主張綱運其監司州郡及諸埸務豈敢非理刻剥邀難但發運使得人稍假事權東南大計自然辦集豈假朝廷更行倉法此事最為簡要獨在朝廷畱意而已謹具元祐編敕及金部擅行隨船㸃檢指揮如左一准元祐編敕諸綱運船栰到岸檢納税錢毋有違限如限内無故稽畱及非理搜檢并約喝無名税錢者各徒二年諸新錢綱及糧綱縁路不得勒令住岸㸃檢雖有透漏違禁之物其經歴處更不問罪至京下鏁通津門准此一准元祐五年十一月十九日尚書金部符省部看詳監糧綱運雖不得勒畱住岸若是隨船㸃檢得委有税物名件自合依例饒潤收納税錢即無不許納税錢事理若或别無税物自不得依例喝貌税錢事理甚明右謹件如前者若朝廷盡行臣言必有五利綱梢飽暖惜身畏法運餽不大䧟失一利也省徒配之刑消流亡賊盜之患二利也梢工衣食既足人人自重以船為家既免拆賣又常修完省逐處船埸之費三利也押綱綱梢既與客旅附載物貨官不㸃檢專攔無由乞取然梢工自須赴務量納税錢以防告訐積少成多所獲未必減於今日四利也自元豐之末罷市易務導洛司堆垜場議者以為商賈必漸通行而今八年畧無絲毫之效京師酒税課利皆虧房廊邸店皆空何也葢祖宗以來通許綱運攬載物貨既免徴税而脚錢又輕故物貨通流縁路雖失商税而京師坐獲富庶自導洛司廢而淮南轉運司隂收其利數年以來官用窘逼轉運司督迫諸處税務日急一日故商賈全然不行京師坐至枯涸今若行臣此䇿東南商賈久閉乍通其來必倍則京師公私數年之後必復舊觀此五利也臣竊見近日官私例皆輕玩國法習以成風若朝廷以臣言為非臣不敢避妄言之罪乞賜重行責罰若以臣言為是即乞盡理施行少有違戾必罰無赦則所陳五利可以朝行而夕見也謹録奏聞伏候勅㫖貼黄本州巳具轉般倉㪷子二十人不足於用必致闕誤事理申乞依舊存畱四十人去訖其㪷子所行倉法臣又體訪得深知綱運次第人皆云行倉法後欠折愈多若㪷子果不取錢則裝發更無㪷面兵梢未免偷盜則欠折必甚於今若㪷子不免取錢則舊日行用一貫者須取三兩貫方肯收受然不敢當面乞取勢須宛轉託人減刻隔落為害滋深伏乞朝廷詳酌早賜廢罷且依舊法又貼黄臣今看詳倉部今來起請條約所行倉法支用錢米不少又添差監門小使臣支與驛劵又許諸色人告捉構合乞取之人先支官錢五十貫為賞又支係省上供錢二萬貫召募綱梢如此之類費用浩大然皆不得利害之要行之數年必無所補臣今所乞不過減却淮南轉運司違條收税一萬貫使綱梢飽暖官物自完其利甚大乞罷轉般倉㪷子倉法狀元祐七年八月一日龍圖閣學士左朝奉郎知揚州蘇軾狀奏右臣近於七月二十七日具狀奏論綱梢欠折利害内一事乞罷真揚楚泗轉般倉㪷子倉法并乞揚州轉般倉㪷子依舊存畱四十人今來揚州轉般倉㪷子四十人並曾詣臣投狀乞一時歸農臣雖且抑按曉喻退還其狀然體訪得衆情未安惟欲逃竄兼訪聞泗州轉般倉㪷子已竄却一十二人深慮逐州轉般倉㪷子漸次星散别行召募必是費力兼恐多是浮浪輕犯重法之人愈見敗壞綱運其逐一利害巳具前狀只乞朝廷詳酌先次施行廢罷轉般倉㪷子倉法及揚州依舊存畱轉般倉㪷子四十人為額仍乞入急逓行下貴免㪷子星散住滯綱運謹録奏聞伏候敕㫖乞罷税務嵗終賞格狀元祐七年八月初五日龍圖閣學士左朝奉郎知揚州蘇軾狀奏准元祐三年八月二十三日敕陜西轉運司奏准敕節文賣鹽并酒税務增剰監專等賞錢更不支給本司相度欲且依舊條支給所貴各肯用心趂辦課利戸部狀欲依本司所乞並從元豐賞格依舊施行檢㑹元豐七年六月二十四日敕賣鹽及税務監官年終課利增額計所增數給一釐賣鹽務專副秤子税務專攔年終課利增額計所增數給半釐及檢㑹元豐賞格酒務鹽官年終課利增額計所增數給二釐酒務專匠年終課利增額計所增數給一釐者右臣聞之管仲禮義亷恥國之四維四維不張國乃滅亡今鹽酒税務監官雖為卑賤然縉紳士人公卿胄子未嘗不由此進若使此等不顧亷恥決壞四維掊歛刻剥與專攔枰匠一處分錢民何觀焉所得毫末之利而所敗者天下風俗朝廷綱維此有識之所共惜臣至淮南體訪得諸處税務自數年來刻虐日甚商旅為之不行其間課利雖巳不虧或巳有增剰而官吏刻虐不為少衰詳究厥由不獨以財用窘急轉運司督迫所致葢縁有上件給錢充賞條貫故人人務為刻虐以希嵗終之賞顯是借闗市之法以蓄聚私家之囊槖若朝廷憫救風俗全養士節即乞盡罷上件嵗終支賞條貫仍乞詳察上件條貫於税務施行尤為害物先賜廢罷況祖宗以來元無此格所立埸務增虧賞罰各巳明備不待此條方為勸奬臣竊見今年四月二十七日敕廢罷諸路人户買撲土産税埸命下之日天下歌舞以致深山窮谷之民皆免虐害臣既親被詔㫖輒敢仰縁徳音推廣聖意具論利害以候敕裁謹録奏聞伏候敕㫖乞嵗運額斛以到京定殿最狀元祐七年八月五日龍圖閣學士左朝奉郎知揚州蘇軾狀奏右臣近者論奏江淮糧綱運欠折利害竊謂欠折之本出於綱梢貧困貧困之由起於違法收税若痛行此一事則朞年之間公私所害十去七八此利害之根源而其他皆枝葉小節也若朝廷每聞一事輒立一法法出姦生有損無益則倉部前日所立㪷子倉法及其餘條約是矣臣愚欲乞盡賜寢罷只乞明詔發運使責以虧贏而為之賞罰假以事權而助其耳目則餽運大計可得而辦也何謂責以虧贏而為之賞罰葢發運使嵗課當以到京之數為額不當以起發之數為額也今者折欠盡以折㑹償填而發運使不復抱認其數但得起發數足則在路雖有萬般踈虞發運使不任其責矣今諸路轉運司嵗運斛㪷皆以到發運司實數為額而發運司獨不以到京及府界實數為額此何義也臣欲乞立法今後發運司嵗運額斛計到京欠折分毫以定殿罰則發運司自然竭力㸃檢矣凡綱運弊害其略有五一曰發運司人吏作弊取受交裝不公二曰諸倉專㪷作弊出入㪷器三曰諸埸務排岸司作弊㸃檢附搭住滯四曰諸押綱使臣人員作弊減刻雇夫錢米五曰在京及府界諸倉作弊多量剰取非理曝揚如此之類皆可得而去也縱未盡去亦賢於立空法而人不行者逺矣何謂假以事權而助其耳目葢運路千餘里而發運使二人止在真泗二州其間諸色人作弊侵欺綱梢於百里之外則此等必不能去離綱運而逺赴訴也況千里乎臣欲乞朝廷選差或令發運使舉辟京朝官兩員為勾當綱運自真州至京徃來㸃檢逐州住不得過五日至京及本司住不得過十日以船為廨宇常在道路專切㸃檢諸色人作弊杖以下罪許決徒以上罪送所屬施行使綱梢使臣人員等常有所赴訴而諸色人常有所畏忌不敢公然作弊以嵗運到京數足及欠折分毫為賞罰行此二者則所謂人存政舉必有大益伏望朝廷畱念餽運事大特賜檢㑹前奏一處詳酌施行臣忝備侍從懷有所見不敢不盡屢瀆天威無任戰恐待罪之至謹録奏聞伏候勅㫖貼黄臣前奏乞舉行元祐編敕錢糧綱不得㸃檢指揮竊慮議者必謂錢糧綱既不㸃檢今後東南物貨盡入綱船攬載則商税所失多矣臣以謂不然自祖宗以來編敕皆不許㸃檢當時不聞商税有虧只因導洛司既廢而轉運司隂收其利又自元祐三年十月後來始於法外擅立隨船㸃檢一條自此商賈不行公私為害今若依編勅放行不惟綱梢自須投務納税如前狀所論而商賈坌集於京師囘路貨物無由復入空綱攬載所獲商税必倍此必然之理也申明揚州公使錢狀元祐七年八月初六日龍圖閣學士左朝奉郎知揚州蘇軾狀奏右臣勘㑹本州公使額錢每年五千貫文除正賜六百貫諸雜收簇一千九百貫外二千五百貫並係賣醋錢檢㑹當日初定額錢日本州醋務係百姓納淨利課利錢承買其錢並歸轉運司當日以賣醋錢二千五百貫入額錢即亦是撥係省官錢充數後來公使庫方始依新條認納百姓淨利課利等錢承買逐年趂辦上項額錢二千五百貫檢准編敕諸州公使庫許以本庫酒糟造醋沽賣即係官監醋務本庫願認納元額諸般課淨錢承買者聴其所收醋息錢並聴額外收使今契勘醋庫每年酤賣到錢外除糟米本分并認納買撲浄利課利錢外實得息錢每年只收到一千六七百貫至二千貫以來常不及元立額錢二千五百貫之數更豈有額外收使之理如此即顯是敕條雖許公使庫買撲醋務而揚州獨無額外得錢之實竊以揚於東南實為都㑹八路舟車無不由此使客雜遝餽送相望三年之間八易守臣將迎之費相繼不絶方之他州天下所無每年公使額錢只與真泗等列郡一般比之楚州少七百貫況今現行例册元修定日造酒糯米每㪷不過五十文足自元祐四年後來每㪷不下八九十文足本州之費一切用酒准折又難為將例册隨米價髙下逐年增減兼復累年接送知州實為頻數用度不貲是致積年諸般逋欠約計七八千貫若不申明嵗月愈深積數逾多隱而不言則州郡負違法之責創有陳乞則朝廷有生例之難雖天下諸郡比之揚州實難攀援今來亦不敢輒乞增添額錢及蠲放欠負只乞檢㑹見行條貫并當日元定額錢因依既是於係省官醋務錢内撥二千五百貫元額錢即乞逐年更不送納買撲淨利課利錢及更不用錢收買官糟庶得賣醋錢相添支用如此即積年欠負漸可還償㑹藩事體不致大段衰削謹録奏聞伏候敕㫖貼黄勘㑹本州與杭州事體一般本州當八路口使客數倍於杭州杭州公使錢七千貫而本州止有五千貫顯是支使不足又貼黄准條雖許公使庫收遺利縁本州委無遺利可收須至奏乞乞罷宿州修城狀元祐七年九月日龍圖閣學士左朝奉郎新除兵部尚書蘇軾狀奏臣近自淮南東路鈐轄被召過所部宿州體訪得本州見將零壁鎮改作零壁縣及本州見准朝㫖展築外城兩事各有利害既係臣前任部内公事而改鎮作縣又係兵部所管所以須至奏陳謹具條件如後一零壁鎮人戸靳淙等先經本路及朝省陳狀乞改零壁鎮為縣却准轉運使趙偁狀稱看詳得元只是本鎮官有勢力人户意欲置縣增添諸般營運妄有陳狀尋准敕依奏依舊為鎮後來有轉運使張修等及知州周秩别行奏請却欲置縣仍取得本鎮人户狀稱所有置縣費用情願自備錢物致朝廷信慿許令置縣臣今體訪得零壁人戸出辦上件錢物深為不易元料置縣用錢四千五十餘貫至今年八月終已納二千八百五十餘貫其餘未納錢數認是催納不行縱使盡行催納亦恐使用不足看詳始議置縣只為本鎮居民曾被驚刼及人户輸納詞訟去縣稍逺然未置縣時本鎮巳有守把兵士八十人及京朝官一員專領本鎮烟火盜賊别有監務官一員又巳移虹縣尉一員弓手六十人在本鎮足以彈壓盜賊而本鎮去虹縣六十里至符離縣一百二十里至蘄縣一百里即非地逺又至符離縣各係水路本不須添置一縣委只是本鎮豪民靳琮等私自為計却使近下人户一時出錢深為不便一宿州自唐以來羅城狹小居民多在城外本朝承平百餘年人户安堵不以城小為病兼諸處似此城小人多散在城外謂之草市者甚衆豈可一一展築外城近年周秩奏論過為危語以動朝廷意謂恐有盜賊竊據以斷運路遂奏乞展築外城一十一里有餘役兵及雇夫共五十七萬有餘工每夫用七十省錢召募雇夫及物料合用錢一萬九千餘貫約五年畢工已䝉朝廷支賜抵當息錢一萬貫欲取來年春興工臣體訪得元只是宿州豪民多有園宅在外扇搖此説官吏不察遂與奏請況宿州土脈踈惡若不用磚砌甃隨即頺毁若待五年畢工則東城未了西城已壞或更用磚其費不貲又七十省錢亦恐召募不行官吏避罪必行差雇搔擾不細其間一事深害仁政縁今來踏逐外城基地合起遣人户大墳墓六千九百所小者猶不在數不知本州有何急切利害而使居民六千九百家暴露父祖骸骨費耗擘畫改葬若家貧無力便致棄捐勞費公私痛傷存殁已上並有公案可以覆驗右臣今相度上件改鎮作縣事係已行之命兼構築廨宇略巳見功恐難中輟而展城一事有大害而無小利兼未曾下手猶可止罷欲乞速賜指揮更不展築却於已支賜一萬貫錢内量新置縣合用數目特與支撥修蓋了當其人户未納到錢數均乞與放免謹録奏聞伏候敕㫖東坡全集巻六十二
