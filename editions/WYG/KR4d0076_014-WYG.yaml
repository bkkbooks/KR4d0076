body:
  text: 東坡全集巻十四宋蘓軾撰詩七十九首岐亭五首并叙元豐三年正月余始謫黃州至岐亭北二十五里山上有白馬青蓋來迎者則余故人陳慥季常也為留五日賦詩一篇而去明年正月復徃見之季常使人勞余於中塗余久不殺恐季常之為余殺也則以前韻作詩為殺戒以遺季常季常自爾不復殺而岐亭之人多化之有不食肉者其後數徃見之徃必作詩詩必以前韻凡余在黃四年三徃見季常而季常七來見余蓋相從百餘日也七年四月余量移汝州自江淮徂雒送者皆止慈湖而季常獨至九江乃復用前韻通為五篇以贈之昨日雲隂重東風融雪汁逺林草木暗近舍烟火濕下有隠君子嘯歌方自得知我犯寒來呼酒意頗急拊掌動鄰里遶村捉鵝鴨房櫳鏘器聲蔬果照巾羃久聞蔞蒿美初見新芽赤洗盞酌鵝黃磨刀削熊白須臾我徑醉坐睡落巾幘醒時夜向闌唧唧銅缾泣黄州豈云逺但恐朋友缺我當安所主君亦無此客朝來静庵中惟見峰巒集我哀籃中蛤閉口護殘汁又哀網中魚開口吐㣲濕刳腸彼交病過分我何得相逢未寒温相勸此最急不見盧懐慎烝壺似烝鴨坐客皆忍笑髠然發其羃不見王武子毎食刀几赤琉璃載烝豚中有人乳白盧公信寒陋衰髮得滿幘武子雖豪華未死神巳泣先生萬金璧護此一蟻缺一年如一夢百嵗真過客君無廢此篇嚴詩編杜集君家蜂作窠嵗嵗添漆汁我身牛穿鼻巻舌聊自濕二年三過君此行真得得愛君似劇孟叩門知緩急家有紅頰兒能唱緑頭鴨行當隔簾見花霧輕羃羃為我取黄封親拆官泥赤仍須煩素手自㸃葉家白樂哉無一事十年不蓄幘閉門弄添丁哇笑雜呱泣西方正苦戰誰補将帥缺披圖見八陣合散更主客不須親戎行坐論教君集酸酒如虀湯甜酒如蜜汁三年黃州城飲酒但飲濕我如更揀擇一醉豈易得幾思壓茅柴禁網日夜急西鄰推甕盎醉倒猪與鴨君家大如掌破屋無遮羃何從得此酒冷面妬君赤定應好事人千石供李白為君三日醉蓬髮不暇幘夜深欲逾垣卧想春甕泣君奴亦笑我鬢齒行秃缺三年巳四至嵗嵗遭惡客人生幾兩屐莫厭頻來集枯松强鑚膏槁竹欲瀝汁兩窮相值遇相哀莫相濕不知我與君交逰竟何得心法幸相語頭然未為急願為穿雲鶻莫作将雛鴨我行及初夏煮酒映疏羃故鄉在何許西望千山赤兹逰定安歸東泛萬頃白一歡寧復再起舞花墮幘将行出苦語不用兒女泣吾非固多矣君豈無一缺各念别時言閉户謝衆客空堂浄掃地虛白道所集郭祥正家醉畫竹石壁上郭作詩為謝且遺古銅劒二空腸得酒芒角出肝肺槎牙生竹石森然欲作不可回吐向君家雪色壁平生好詩仍好畫書墻涴壁長遭罵不嗔不罵喜有餘世間誰復如君者一雙銅劒秋水光兩首新詩爭劒鋩劒在床頭詩在手不知誰作蛟龍吼龍尾硯歌并引余舊作鳯咮石硯銘其略云蘇子一見名鳯咮坐令龍尾羞牛後巳而求硯於歙歙人云子自有鳯咮何以此為蓋不能平也奉議郎方君彦徳有龍尾大硯奇甚謂余若能作詩少解前語者當奉餉乃作此詩黄琮白琥天不惜顧恐貪夫死懐璧君看龍尾豈石材玉徳金聲寓於石與天作石來幾時與人作硯初不辭詩成鮑謝石何與筆落鍾王硯不知錦茵玊匣俱塵垢擣練支牀亦何有况瞋蘇子鳯咮銘戯語相嘲作牛後碧天照水風吹雲明牕大几清無塵我生天地一門物蘇子亦是支離人麄言細語都不擇春蚓秋蛇隨意畫願從蘇子老東坡仁者不用生分别張近幾仲有龍尾子石硯以銅劒易之我家銅劒如赤蛇君家石硯蒼璧橢而窪君持我劒向何許大明宮裏玉佩鳴衝牙我得君硯亦安用雪堂牕下爾雅箋蟲鰕二物與人初不異飄落髙下隨風花蒯緱玉具皆外物視草草𤣥無等差君不見秦趙城易璧指圖睨柱相矜誇又不見二生妾換馬驕鳴啜泣思其家不如無情兩相與永以為好譬之桃李與瓊華張作詩送硯反劒乃和其詩卒以劒歸之贈君長鋏君當歌毎食無魚歎委蛇一朝得見暴公子櫑具欲與冠争峩豈比杜陵貧病叟終日長鑱隨短蓑斬蛟刺虎老無力帶牛佩犢吏所訶故将換硯豈無意恐君琱琢傷天和作詩反劒亦何謂知君欲以詩相磨報章苦恨無好語試向君硯求餘波詩成劒徃硯應笑那将屋漏供懸河去嵗九月二十七日在黄州生子名遯小名幹兒頎然頴異至今年七月二十八日病亡於金陵作二詩哭之吾年四十九羈旅失㓜子㓜子真吾兒眉角生巳似未期觀所好蹁躚逐書史摇頭却棃栗似識非分耻吾老常鮮歡賴此一笑喜忽然遭奪去惡業我累爾衣薪那免俗變滅須臾耳歸來懐抱空老淚如瀉水我淚猶可拭日逺當日忘母哭不可聞欲與汝俱亡故衣尚懸架漲乳巳流牀感此欲忘生一卧終日僵中年忝聞道夢幻講巳詳儲藥如丘山臨病更求方仍將恩愛刃割此衰老腸知迷欲自反一慟送餘傷葉濤致逺見和二詩復次其韻濤顛倒元韻平生無一女誰復歎耳耳滯留生此兒足慰周南史那知非真實造物聊戲爾煩惱初無根恩愛為種子煩公為假説反復相指似欲除苦海浪先乾愛河水棄置一寸鱗悠然笑侯喜為公寫餘習缾罍一時耻聞公少巳悟拄杖久倚牀笑我老而癡負鼓欲求亡庶幾東門子柱史安敢望嗜毒戲猛獸慮患先不詳嚢破蛇巳走尚未省齧傷妙哉兩篇詩洗我千結腸黠蠶不作蠒未老輒自僵求謝湯火厄泠然超無方次荆公韻四絶青李扶疎禽自來清真逸少手親栽深紅淺紫從争發雪白鵝黄也鬬開斫竹穿花破緑苔小詩端為覔榿栽細㸔造物初無物春到江南花自開騎驢𣺌渺入荒陂想見先生未病時勸我試求三畆宅從公巳覺十年遲甲第非真有閒花亦偶栽聊為清淨供却對道人開公病後捨宅作寺張庖民挽詞東晉巾車令西京執戟郎甘心向山水結髮事文章故自輕千户何曾羡一囊才髙鬼神惡骨朽姓名芳庾嶺銘旌暗秦淮舊宅荒吾詩不用刻妙語有黄香黄魯直作哀詞次韻葉致逺見贈欲求五畆寄樵蘇所至遲留似賈胡信命不須歌去汝逢人未免歎猶吾人皆勸我杯中物我獨憐君屋上烏一技文章何足道要言摩詰是文殊次韻杭人裴維甫餘杭門外葉飛秋尚記居人挽去舟一别臨平山上塔五年雲夢澤南州凄凉楚些縁吾發邂逅秦淮為子留寄謝西湖舊風月故應時許夢中㳺次韻段縫見贈季子東周負郭田須知力穡是家傳細思種薤五十本大勝取禾三百㕓若得與君連北巷故應終老忘西川短衣匹馬非吾事只擬闗門不問天題孫思邈真先生一去五百載猶在峨眉西崦中自為天仙足官府不應尸解坐蝱蟲戯作鮰魚一絶粉紅石首仍無骨雪白河豚不藥人寄與天公與河伯何妨乞與水精鱗同王勝之㳺蒋山到郡席不暖居民空惘然好山無十里遺恨恐他年欲款南朝寺同登北郭船朱門牧畫㦸紺宇出青蓮荆公宅巳為寺夾路蒼髯古迎人翠麓偏龍腰蟠故國鳥爪寄曽巔竹杪飛華屋松根泫細泉峯多巧障日江逺欲浮天略彴横秋水浮圖挿暮煙歸來踏人影雲細月娟娟至真州再和二首老手王摩詰窮交孟浩然論詩曾伴直話舊巳忘年北上難陪驥東行且趂船離亭花映肉醉眼鷺窺蓮柁轉三山没風囘五兩偏荒祠過𤓰步古甃墮松巔聞道清香閣新篘白玉泉莫教門掩夜坐待月流天小院檀槽鬧空庭樺燭烟公詩便堪唱為付小嬋娟公顔如雪柏千載故依然笑我無根柳空中不待年肯留歸闕斾坐待逆風船特許門傳籥那知箭起蓮相逢月上後小語坐西偏流落千㠶側追思百尺巔躬耕懐谷口水石羡平泉茅屋歸元亮霓裳醉樂天行聞宣室召歸近御爐煙未用歌池上隨宜教李娟次韻荅寶覺芒鞵竹杖布行纒遮莫千山更萬山從來無脚不解滑誰信石頭行路難眉子石硯歌贈胡誾君不見成都畫手開十眉横雲却月争新奇㳺人指㸃小顰處中有漁陽胡馬嘶又不見王孫青𤨏横雙碧腸斷浮空逺山色書生性命何足論坐費千金買消渇爾來䘮亂愁天公謫向君家書硯中小窓虛幌相嫵媚令君曉夢生春紅毗耶居士談空處結習巳空花不住試教天女為磨鉛千偈瀾翻無一語以玉帶施元長老元以衲裙相報次韻病骨難堪玉帶圍鈍根仍落箭鋒機欲教乞食歌姬院故與雲山舊納衣此帶閲人如傳舍流傳到我亦悠哉錦袍錯落真相稱乞與佯狂老萬囘次韻滕元發許仲途秦少逰二公詩格老彌新醉後狂吟許野人坐㸔青丘吞澤芥自慙黄潦薦溪蘋兩邦旌纛光相照十畆鋤犂手自親何似秦郎妙天下明年獻頌請東巡送金山鄉僧歸蜀開堂撞鐘浮玉山迎我三千指衆中聞謦欬未語知鄉里我非箇中人何以黙識子振衣忽歸去隻影千山裏涪江與中泠共此一味水冰盤薦琥珀何似糖霜美送沈逵赴廣南嗟我與君皆丙子四十九年窮不死君隨幕府戰西羌夜渡冰河斫雲壘飛塵漲天箭洒甲歸對妻孥真夢耳我謫黄岡四五年孤舟出没煙波裏故人不復通問訊疾病饑寒疑死矣相逢握手一大笑白􅄠蒼顔略相似我方北渡脫重江君復南行輕萬里功名如幻何足計學道有牙真可喜句漏丹砂巳付君汝陽罋盎吾何恥君歸趁我雞黍約買田築室從今始豆粥君不見虖沱流澌車折軸公孫倉黄奉豆粥濕薪破竈自燎衣饑寒頓解劉文叔又不見金谷敲冰草木春帳下烹煎皆美人萍虀豆粥不傳法咄嗟而辦石季倫干戈未解身如寄聲色相纒心巳醉身心顛倒自不知更識人間有真味豈如江頭千頃雪色蘆茆簷出没晨煙孤地碓舂秔光似玉沙缾煮豆軟如酥我老此身無着處賣書來問東家住卧聽雞鳴粥熟時蓬頭曳履君家去秦少游夢發殯而葬之者云是劉發之柩是嵗發首薦秦以詩賀之劉涇亦作因次其韻君㸔三代士執雉本以殺身為小補居官死職戰死綏夢尸得官真古語五行勝巳斯為官官如草木吾如土仕而未禄猶賔客待以純臣蓋非古餽焉曰獻稱寡君豈比公卿相爾汝世衰道㣲士失巳得䘮悲懽反其故草袍蘆箠相嫵媚飲食嬉逰事羣聚曲江船舫月燈毬是謂舞殯而歌墓㸔花走馬到東野餘子紛紛何足數二生年少兩豪逸詩酒不知軒冕苦故令將仕夢發棺勸子勿為官所腐塗車芻靈皆假設著眼細㸔君勿誤時來聊復一飛鳴進隠不須煩伍舉金山夢中作江東賈客木緜裘㑹散金山月滿樓夜半潮來風又熟卧吹簫管到揚州次韻周穜惠石銚銅腥鐵澁不宜泉愛此蒼然深且寛蟹眼翻波湯巳作龍頭拒火柄猶寒薑新鹽少茶初熟水漬雲蒸蘚未乾自古函牛多折足要知無脚是輕安次韻蒋頴叔月明驚鵲未安枝一棹飄然影自隨江上秋風無限浪枕中春夢不多時瓊林花草聞前語罨畫溪山指後期豈敢便為雞黍約玉堂金殿要論思蔣詩記及第時瓊林宴坐中所言且約同卜居陽羡龜山辯才師此生念念浮雲改寄語長淮今好在故人宴坐虹梁南新河巧出龜山背木魚呼客振林莽鐵鳯横空飛綵繪忽驚堂宇變雄深坐覺風雷生謦欬羡師㳺戯浮漚間笑我榮枯彈指内嘗茶㸔畫亦不惡問法求詩了無礙千里孤㠶又獨來五年一夢誰相對何當來世結香火永與名山躬井磑贈潘谷潘郎曉踏河陽春明珠白璧驚市人那知望拜馬蹄下胸中一斛泥與塵何似墨潘穿破褐琅琅翠餅敲𤣥笏布衫漆黒手如龜未害冰壺貯秋月世人重耳輕目前區區張李爭媸妍一朝入海㝷李白空看人間畫墨仙徐大正閒軒冰蠶不知寒火鼠不知暑知閒見閒地巳覺非閒侣君㸔東坡翁懶散誰比數形骸墮醉夢生事委塵土早眠不見燈晚食或欺午卧㸔氈取盗坐視麥漂雨語希舌頰强行少腰脚僂五年黄州城不踏黄州鼓人言我閒客置此閒處所問閒作何味如眼不自覩頗訝徐孝亷得閒能幾許介子願奉使翁歸備文武應緣不耐閒名字挂庭宇我詩為閒作更得不閒語君如汗血駒轉盼略燕楚莫嫌鑾輅重終勝鹽車苦蒜山松林中可卜居余欲僦其地地屬金山故作此詩與金山元長老魏王大瓠無人識種成何翅實五石不辭破作兩大尊只憂水淺江湖窄我材濩落本無用虛名驚世終何益東方先生好自譽伯夷子路并為一杜陵布衣老且愚信口自比契與稷暮年欲學柳下惠嗜好酸鹹不相入金山也是不羈人早嵗聞名晚相得我醉而嬉欲仙去旁人笑倒山謂實問我此生何所歸笑指浮休百年宅蒜山幸有閒田地招此無家一房客王中父哀詞并叙仁宗朝以制䇿登科者十五人軾沗冒時尚有富彦國張安道錢子飛呉長文夏公西陳令舉錢醇老王中父并軾與家弟轍九八存焉其後十有五年哭中父於密州作詩弔之則子飛長文令舉没矣又八年軾自黄州量移汝海與中父之子沇之相遇於京口相持而泣則十五人者獨三人存耳蓋安道及軾與家弟而巳嗚呼悲夫乃復次前韻以遺沇之時沇之亦以罪謫家于錢塘云生芻不獨比前人束藁端能廢謝鯤子逹想無身後念吾衰不復夢中論巳知毅豹為均死未識荆凡定孰存堪笑東坡癡鈍老區區猶記刻舟痕蔡景繁官舍小閣使君不獨東南美典刑長記先君子戯嘲王叟短轅車肯為徐郎書紙尾三年弭節江湖上千首放懐風月裏手開東閣坐虛明目浄東溪照清泚素琴濁酒容一榻落霞孤鶩供千里大舫何時繫門柳小詩屢欲書牕紙文昌新構滿鵷鸞都邑正喧收杞梓相逢一醉豈有命南來寂寞君歸矣髙郵陳直躬處士畫鴈二首野鴈見人時未起意先改君從何處㸔得此無人態無乃槁木形人禽兩自在北風振枯葦㣲雪落皠皠慘淡雲水昏晶熒沙礫碎弋人悵何慕一舉渺江海衆禽事紛争野鴈獨閒潔徐行意自得俯仰苦有節我衰寄江湖老伴雜鵝鴨作書問陳子曉景畫苕霅依依聚圓沙稍稍動斜月先鳴獨鼓翅吹亂蘆花雪和王斿二首斿平父子異時常恠謫仙人舌有風雷筆有神聞道騎鯨遊汗漫憶嘗捫蝨話悲辛氣吞餘子無全目詩到諸郎尚絶倫白髪故交空掩巻淚河東注問蒼旻嫋嫋春風送渡闗娟娟霜月照生還遲留嵗暮江淮上來徃君家伯仲間未厭冰灘吼新洛且看松雪媚南山野梅官柳何時動飛蓋長橋待子閒次韻張畹新洛霜餘兩岸隆塵埃舉袂識西風臨淮自古多名士樽酒相從樂寓公半日偷閒歌嘯裏百年暗盡徃來中知君不向窮愁老尚有清詩氣吐虹次韻王定國南遷囘見寄土暈銅花蝕秋水要須悍石相礱砥十年氷蘖戰膏梁萬里煙波濯紈綺歸來詩思轉清激百丈空潭數魴鯉逝將桂浦擷蘭蓀不記槐堂收劒履却思庾嶺今何在更説彭城真夢耳來詩述彭城舊㳺君知先竭是甘井我願得全如苦李妄心不復九回膓至道終當三洗髓廣陵陽羡何足較只有無何真我里余買田陽羡來詩以為不如廣陵樂全老子今禪伯張安道也定國其壻掣電機鋒不容擬心通豈復問云何印可聊須荅如是相逢為我話留滯桃花春漲孤舟起贈梁道人採藥壺公處處過笑看金狄手摩挲老人大父識君久造物小兒如子何寒盡山中無厯日雨斜江上一漁蓑神仙䕶短多官府未厭人間醉踏歌題雍秀才畫草蟲八物促織月叢號耿耿露葉泣溥溥夜長不自暖那憂公子寒蟬蛻形濁汙中羽翼便翾好秋來閒何闊巳抱寒莖槁蝦蟇睅目知誰瞋皤腹空自脹慎勿困蜈蚣饑虵不汝放蜣蜋洪鐘起暗室飄瓦落空庭誰言轉丸手能作殷牀聲天水牛兩角徒自長空飛不服箱為牛竟何事利吻穴枯桑蝎虎跂跂有足蛇脉脉無角龍為虎君勿笑食盡蠆尾蟲蝸牛腥涎不滿殻聊足以自濡升髙不知回竟作粘壁枯鬼蝶雙眉巻鐵絲兩翅暈金碧初來花争妍忽去鬼無迹泗州南山監倉蕭淵東軒二首偶隨樵父採都梁南山名都梁山山出都梁香故也竹屋松扉試乞漿但見東軒堪隠几不知公子是監倉溪中亂石牆垣古山下寒蔬匕箸香我是江南舊㳺客挂冠知有老蕭郎北望飛塵苦晝霾洗心聊復寄東齋珍禽聲好猶思越野橘香清未過淮有信㣲泉來逺嶺無心明月轉空堦一官倉庾真堪老坐看松根絡斷崖泗州除夜雪中黄師是送酥酒二首暮雪紛紛投碎米春流咽咽走黄沙舊㳺似夢徒能説逐客如僧豈有家冷硯欲書先自凍孤燈何事獨成花使君半夜分酥酒驚起妻孥一笑譁闗右土酥黄似酒揚州雲液却如酥欲從元放覓拄杖忽有麴生來座隅對雪不堪令飽煖隔船應巳厭歌呼明朝積玉深三尺髙枕牀頭尚一壺章錢二君見和復次韻荅之黄昏巳作風翻絮半夜猶驚月在沙照汴玉峰明佛刹隔淮雲海暗人家來牟有信迎三白薝蔔無香散六花薝蔔梔子花也與雪花皆六出欲喚阿咸來守嵗林烏櫪馬鬬喧譁分無纎手裁春勝况有新詩㸃蜀酥醉裏冰髭失纓絡夢回布被起廉隅君應旅睫寒生暈我亦饑腸夜自呼明日南山春色動不知誰佩紫㣲壺正月一日雪中過淮謁客回作二首十里清淮上長堤轉雪龍冰崖落屐齒風葉亂裘茸萬頃穿銀海千㝷渡玉峰從來脩月手合在廣寒宫攅眉有底恨得句不妨清霽霧開寒谷饑鴉舞雪城橋聲春市散塔影莫淮平不用殘燈火船窓夜自明劉乙新作射堂乙父嘗知眉州蘭玉當年刺史家雙鞬馳射笑穿花而今白首閒驄馬只有清樽照畫蛇寂寂小軒蛛網遍隂隂垂柳鴈行斜手柔弓燥春風後置酒看君中㦸牙孫莘老寄墨四首徂徠無老松易水無良工珍材取樂浪妙手惟潘翁潘谷作墨雜用髙麗煤魚胞熟萬杵犀角盤雙龍墨成不敢用進入蓬萊宫蓬萊春晝永玉殿明房櫳金箋洒飛白瑞霧縈長虹遥憐醉常侍一笑開天容谿石琢馬肝剡藤開玉版噓噓雲霧出奕奕龍虵綰此中有何好秀色紛滿眼故人歸天禄古漆窺蠧簡隃麋給尚方老手擅編剗分餘幸見及流落一歎􅎼我貧如饑鼠長夜空齩齧瓦池研竈煤葦管書杮葉近者唐夫子逺致烏玉玦唐林夫寄張遇墨半丸先生又繼之圭璧爛箱篋清窓洗硯坐虵蚓稍蟠結便有好事人敲門求醉帖吾窮本坐詩久服朋友戒五年江湖上閉口洗殘債今來復稍稍快癢如爬疥先生不譏訶又復寄詩械幽光發竒思㸃黮出荒怪詩成一自笑故疾逢鰕蟹留題蘭皋亭雪後東風未肯和扣門遷客夜經過不知舊竹生新筍但見清伊換濁河無復徃來乗下澤聊同笑語説東坡明年我亦開三徑寂寂兼無雀可羅和人見贈只寫東坡不著名此身巳是一長亭壯心無復春流起衰鬢從交病葉零知有雪兒供筆硯應嗤竈婦洗盆缾回來索酒公應厭京口新傳作客經和田仲宣見贈頭白江南醉司馬寛心時復喚殷兄寒潮不應淮無信客路相隨月有情未許低頭拜東野徒言共飲勝公榮好詩惡韻那容和刻燭應須便置觥和王勝之三首城上湖光暖欲波美人唱我踏春歌魯公賔客皆詩酒誰是神仙張志和齋釀如澠漲緑波公詩句句可絃歌流觴曲水無多日更作新詩繼永和要知太守憐孤客不惜陽春和俚歌坐睡樽前呼不應為公雕琢損天和記夢并序樂全先生夢人以詩三篇示之字皆旁行而不可識旁有人道衣古貌為讀其中一篇云人事且常在留質悟圓間凡四句覺而忘其二以告其客蘇軾軾以私意廣之云圓間有物物間空豈有圓空入井中不信天形真箇様故應眼力自先窮連環巳解如神手萬竅猶號未濟風稽首問公公大笑本來誰礙更求通東坡全集巻十四
