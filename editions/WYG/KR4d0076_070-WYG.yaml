body:
  text: 東坡全集巻七十宋蘓軾撰啓四十三首謝館職啓試言無取錫命過優進貽朋友之譏退有簡書之畏靦顔就列撫已若驚國家取士之門至多而制舉號為首冠育才之地非一而冊府處其最髙觀其所以待之蓋亦可謂至矣知寳玉璠璵難得而易毁故篋櫝以養其全知楩楠豫章積嵗而後成故封殖以待其長施等天地恩均父師恭惟先帝臨御以來四十二載所擢賢良方正之士十有五人其志莫不欲舉明主於三代之隆其言莫不欲措天下於泰山之固大則欲興禮樂以範來世小則欲操數術以馭四夷然而進有後先名有隠顯命有窮達時有重輕或已踐廟堂之崇或已登侍從之列或反流落於逺郡或尚滯留於小官或死生之乖暌已為陳迹或擯斥於罪戾僅齒平民雖曰功名富貴所由之塗亦為毁譽得䘮必爭之地名重則於實難副論髙則與世常疎故雖絶異之資猶有不任之懼軾之内顧豈不自知性任已以直前學師心而無法自始操筆知不適時㑹宗伯之選掄疾時文之靡弊擢居異等以風四方不知滿溢之憂復玷良能之舉負賢者所難之任爭四海欲得之求其為惷愚可為危慄是以一參賔幕輒蹈危機已嘗名挂於深文不自意全於今日而况大明繼照百度惟新理財訓兵有鞭笞戎狄之志信賞必罰有追述祖宗之風凡用人歴試其能茍敗事必誅無赦此太平可待之日豈不肖兼容之時而乃度越賢豪曲収微賤縱不能力辭而就下亦當知非分以自慙此蓋伏遇某官志在斯民仁為已任欲辦大事務兼寸尺之長將求多聞故引涓埃之助致此忝冐有踰等倫欲報無縁將何望於頑鄙遇寵知懼庶不至於惰媮賀韓丞相啓右軾啓伏審誕膺策命首冠輔臣四方聳觀萬口同慶天下幸甚天下幸甚自古在昔治少亂多夫天將欲措世於大安必有異人之間出使民莫不回心而向道類非俗吏之所能方陋漢唐將追堯舜洪惟上聖之后眷求一徳之臣謂莫如公遂授以政付八音於師曠孰敢爭能捐六轡於王良坐將致逺引領以望惟日為年恭以昭文相公全徳難名巨才不器亹亹申伯之望堂堂漢相之風出入三朝險夷一節蕞爾種羌之叛命慨然當宁以請行威聲所加膻穢自屏淮蔡既定而裴度相徐方不回而召虎歸縱復遺種龍荒遊魂沙海譬之癬疥豈足爬搔必將訓兵擇帥而授之規摹積穀堅城而磨以嵗月破斧之惡四國實願周公之亟還折箠以鞭赤眉無煩鄧禹之乆外天下是望豈惟一人即日邊徼苦寒台候何似伏冀為國善調寢興謹奉啓起居荅曾學士啓伏審祗奉詔恩榮升冊府允厭朝論増輝士林伏惟慶慰恭以聖神在御政化惟新顧籲俊之無方豈拔賢而待次賤如莘野猶為席上之珎逺若傅巖盡入彀中之選而况圭璋之質近生閥閱之家固宜首膺寤寐之求於以助成肅雍之化府判學士天資粹美儒術講明向屈處於下僚蓋避嫌而自晦屬文子之請老察少翁之最賢撫念老成聿求義訓豈獨褒崇之盛典固將樂育於英才自顧庸虚獲聯齋舎忽捧書詞之辱益知謙徳之光喜愧于心踧踖無措賀歐陽少師致仕啓伏審抗章得謝釋位言還天眷雖隆莫奪已行之志士流太息共髙難繼之風凡在庇庥共増慶慰伏以懐安天下之公患去就君子之所難世靡不知人更相笑而道不勝欲私於為身君臣之恩係縻之於前妻子之計推荷之於後至於山林之士猶有降志於垂老而况廟堂之舊欲使辭禄於當年有其言而無其心有其心而無其决愚智共蔽古今一塗是以用捨行藏仲尼獨許於顔子存亡進退周易不及於賢人自非智足以周知仁足以自愛道足以忘物之得䘮志足以一氣之盛衰則孰能見幾禍福之先脱屣塵垢之外常恐茲世不見其人伏惟致政觀文少師全徳難名巨材不器事業三朝之望文章百世之師功存社稷而人不知躬履艱難而節乃見縱使耄期篤老猶當就見質疑而乃力辭於未及之年退託以不能而止大勇若怯大智如愚至貴無軒冕而榮至仁不𨗳引而壽較其所得孰與昔多軾受知最深聞道有自雖外為天下惜老成之去而私喜明哲得保身之全伏暑向闌台候何似伏冀為時自重少慰輿情賀韓丞相再入啓伏覩詔書登庸舊徳傳聞四海歡喜一辭竊以君臣之間古今異道任法而不任人則責輕而憂淺庸人之所安任人而不任法則責重而憂深賢者之所樂凡吾君所以推心忘已一切不問而聴其所為蓋其後必將責報収功三年有成而底於至治自非量足以容物智足以知人强足以濟艱難勇足以斷取舎則何以首膺民望力報主知恭惟史館相公忠誠在天徳望冠世如乾之中正挺然而純粹精如坤之六二隤然而直方大更練三朝之用舎出入四方之險夷疲民系心有識引領必將發其藴蓄以次施行始緩獄以裕民終措刑而隆禮軾登門最舊荷顧亦深喜忭之懐實倍倫等宻州到任謝執政啓䝉恩授前件差遣已於今月三日赴任訖帯山負海號為持節之邦多病無功乆在散材之目授非所稱愧靡自任矧茲願治之辰方以求賢為急宜得敏鋭兼人之器以副厲精更化之懐如軾者天與愚忠家傳朴學議論止於汙俗交逰謂之陳人出佐郡條荐更嵗籥雖僅脱網羅之患然卒無毫髪之稱豈伊寵榮偶及衰鈍此蓋伏遇某官股肱元聖師表萬邦欲隆太平極治之風故開兼収並採之路重使一夫之不獲特捐支郡以見収荷恩至深論報何所謹當鐫磨朽鈍箠䇿疲駑雖無望於功名庶少逃於罪戾過此以往未知所裁荅楊屯田啓二首伏承枉顧寵示長書禮數過隆既匪妄庸之稱文詞深厚足為衰拙之光反復䆒觀愧汗交集伏惟通判屯田學深經術名重薦紳頃者劒外屈臨百里之間已是部中受賜一人之數豈伊幸㑹復此逢迎聽其言信仁人之溥哉居是邦蓋大夫之賢者欲報瓊瑶之貺適苦簿書之煩言之不文永以為好又向者不遺特䝉枉顧愧無琴瑟㫖酒以樂我嘉賔但喜直亮多聞真古之益友謂將繼此而得見豈意闕然而有行伏讀誨音惟知感歎伏惟通判屯田才猷通敏學術深純非獨東州杞梓之珍將為清廟璠璵之寳蹔臨邊服行履要津而軾早以空疎加之衰病不縁曠官而罷去則當引分以歸耕自茲恐遂有出處之疎故臨紙不能無悵惘之意惟祈自重少副下情謝監司薦舉啓猥以庸虚過䝉知遇既免尤譴復加薦論自省孤危加之衰病生而賦朴野之性愚不識禍福之機但知任已以直前不復周防而慮後動觸時忌言為身災擠而去之則為有功引而進之亦或招悔自非不以利禄為意而以仁厚為心顧茲鈍頑誰肯收録伏惟某官時望至重主知已深方將長育於羣材專務掩覆於小過憐其謀身之甚拙進絶望而退無歸知其為政之雖迂嵗有餘而日不足特矯世俗借之齒牙軾敢不祗畏簡書益自修飭豈云報徳茍不辱知過此以還未知所措徐州謝兩府啓移守河中已愧超陞之異改臨泗上仍叨藩鎮之雄既見吏民周覽風俗地形襟要當東南水陸之衝民食艱難正春夏旱蝗之際宜得一時之循吏以安千里之疲民如軾者才不逮人學非適用冒塵䇿府自知拙直之難安屢乞守符意謂茍全之善計然自往來三郡首尾七年足蹈危機僅説風波之險心存吏役都忘學術之源既未决於歸耕敢復求於善地伏遇某官權衡萬物髙下一心頑礦悍堅實費陶鎔之力散材踈惡徒施封殖之恩謹當箠䇿疲駑鐫磨朽鈍上酬天造次答已知賀吕副樞啓伏審近膺告命入總樞機中外聳觀朝廷増重伏惟慶慰竊以古之為國權在用人徳厚者輔其才而名益隆望重者無所為而人自服是以淮南叛國先止謀於長孺汾陽元老尚改觀於公權樽爼可以折衝藜藿為之不採哀此風流之莫繼乆矣寂寥而無聞天亦厭於凡才上復思於舊徳恭惟樞宻侍郎性資仁義世濟忠嘉豈惟清節以鎮浮固已直言而中病出領數郡若將終身小人謂之失時君子意其復用迨茲顯拜夫豈偶然然而荷三朝兩世之恩當春秋賢者之責推之不去凜乎其難進伯玉而退子瑖人皆望於門下烹桑羊而斬樊噲公無愧於古人莫若盡行疇昔之言庶幾大慰天下之望軾登門最舊稱慶無縁踊躍之懐實倍倫等賀趙大資致仕啓伏審抗章得謝奉冊言還搢紳聳觀閭里相慶竊謂富貴不為至樂功名非有甚難樂莫樂於還故鄉難莫難於全大節歴數當今之卿相或寓他邦䆒觀自古之忠賢少有完傳錦衣而夜行者多矣狐裘而羔袖者有之至若百行渾圓五福純備當世所羡非公而誰恭惟致政大資少保道心精㣲徳望宏逺無施不可尤高臺諫之風所臨有聲最宜吳蜀之政才不䆒於大用命乃係於生民與時偕行不可則止見故人而一笑綽有餘歡念平生之百為一無可恨方將深入不二獨逰無何黙追粲可之風坐致喬松之壽軾荷知有素貪禄忘歸慕鸞鵠之高翔眷樊籠而永歎傾頌之素敷寫莫窮答陳齋郎啓伏審祗膺寵命榮踐亨塗拜慶庭闈溢歡聲於觀者馳書士友掞華藻之燦然顧此衰羸實難當捧伏惟齋郎天資深茂學術淹通經行兩純窮達一操乆困有司之尺度退從老圃於丘園陋彼素餐是聞也非達也凜然遺直惟有之則似之假道一官權輿千里幅巾藜杖願為二老之風流甲第高門坐看諸郎之富貴欣頌之至筆舌難周賀文太尉啓伏審孚號揚庭臨軒遣使出節少府授鉞齋壇夷夏聳觀兵民交慶蓋功業盛大則極名器而後稱惟徳度宏逺故舉富貴而若無蔚為三世之宗臣豈獨一時之盛事恭惟留守文太尉道本天合徳為人師信及三川之豚魚威加兩河之草木身任休戚言為重輕始若留侯弱冠而遇高祖晚同尚父黄髪而亮武王既奉冊書益新民聽方將威懐北虜係頸長纓約束河公軌流故道然後入調伊傅之鼎歸躡松喬之游輿論所期斯言可必軾謫官有限趨侍無縁踴躍之心宣寫難盡登州謝兩府啓右軾啓䝉恩授前件官已於今月十五日到任上訖者迂愚之守没齒不移廢逐之餘歸田已幸豈謂承宣之寄忽為枯朽之榮眷此東州下臨北徼俗習齊魯之厚迹皆秦漢之陳賔出日於麗譙山川炳煥傳夕烽於海嶠鼓角清閒顧静樂之難名笑妄庸之竊㨿此蓋伏遇某官股肱元聖師保萬民才全而徳不形任重而道愈逺謂使功不如使過而觀過足以知仁特借齒牙曲成羽翼軾敢不服勤簿領祗畏簡書䇿蹇磨鉛少荅非常之遇息黥補劓漸收無用之身過此以還未知所措謝中書舎人啓右軾啓䝉恩授前件官者起於貶所未及朞年擢置周行遽參法從省躬無有被寵若驚竊惟人材進退之間實為風俗隆替之漸必欲致治在於積賢雖一薛居州齊言不能移楚而用范武子晉盗可使奔秦崔琰進而亷儉成風楊綰用而淫侈改度誠國是之先定雖民散而可收拔茅茹者以彚而征附馬棧者必先其直用舎既見好惡自明人知所趨勢有必至今朝廷方講當世之務力追前代之隆雖改定法令足以便事而未足以安民寛弛賦役足以安民而未足以成俗是以登進耆老搜求雋良將使士知向方民亦有耻如軾者山林下士軒冕棄材少而學文本聲律雕蟲之技出而從仕有狂狷嬰鱗之愚溝中不願於青黄㸑下無心於宫徴誤䝉收拾已出優恩荐履禁嚴殊非素望此蓋伏遇某官徳配前哲望隆本朝名重圭璋上助廟堂之用言為蓍蔡下同卿士之謀餘論所加虛名増重知丹心之尚在憐白首之無歸特借寵光以寛衰病任隆才下恩重報輕直道而行恐非所以安愚不肖之分充位而已又不足以解卿大夫之憂蚤夜以思進退惟谷恐懼戰越不知所裁謝翰學士啓叨奉寵恩擢居禁近任逾器表憂與愧并内自顧於衰遲宜退安於冗散豈期晚節伏與英逰此蓋伏遇某官徳配先民望隆多士至誠樂與共推人物之評雅量兼容曲借齒牙之末致兹朽鈍亦踐高華方修問之未遑遽移書之見及其為感佩難盡敷陳答試館職人啓伏承射䇿玉堂方觀筆陣校文天禄遂秀儒林黨友増華縉紳共慶國家求賢之道必於閒暇無事之時賢者報國之功乃在緩急有為之際養之無素則一旦欲用而何由待以非常則臨事欲辭而不可故納之於英俊相從之地觀之以世俗不見之書非獨使之業廣而材成抑將待其資深而望重某官學優而仕行浮於名詞令從容議論慷慨追還正始文章為之一新傳寫都城紙墨幾於驟貴得士之喜非我敢私軾衰病侵尋文思荒落職在翰苑當發䇿而莫辭識非通儒懼品藻之不稱過煩臨貺寵以書詞永為巾笥之珍愧乏瓊瑶之報答李寳文啓伏審祗奉異恩逺臨全蜀奎文寳訓方入直於禁嚴井絡提封旋出分於憂顧風猷所暨謡頌率同恭惟知府寳文望重搢紳材宜廊廟譬之金石蓋闇然而日彰浩若江河固窮之而益逺西南之俗信服已深民物子來氣復岷峨之舊舟車雲集惠通秦楚之商曽未下車已聞報政軾倦㳺滋乆寤寐懐歸空詠甘棠之思莫展維桑之敬悵焉永望言不寫心答王欽臣啓伏審祗奉明緡特膺異選以高才望冊府以令徳正僕臣側聞除書大慰輿論伏惟太僕學士文鳴早嵗學配前人豫章雖老於中林瑚璉終升於清廟萬事不理問伯始而可知三篋雖亡得安世而何患清塗方踐逺業難量愧修慶之未皇辱移書之見及感佩之至但切下懐答彭舎人啓伏審顯膺宸命進直掖垣除目播騰輿情欣屬國家董正百官之治聿追三代之隆用事考言因名責實然而憲臺省闥無預於文詞儒館學宫不關於政理惟此六押之任要須二者之長非該通經術則不足以代王言非曉達吏方則不足以分省事是為文士之極任豈止時人之美談果有真才來應妙選伏惟某官道師古始識造精㣲學窮游夏之淵源文列馬班之伯仲自期甚厚所得實多射䇿决科嘗魁天下之士犯顔逆指有古名臣之風粤從言動之司亟掌絲綸之美璠璵美質豈獨一時宗廟之華杞梓異材固為後日棟梁之用軾備員法從竊庇餘光聊陳輿誦之言少答函封之辱其為欣佩莫䆒頌言謝賈朝奉啓右軾啓自蜀徂京幾四千里㩦孥去國蓋二十年側聞松楸已中梁柱過而下馬空瞻董相之陵酹以隻鷄誰副橋公之約宦游嵗晚坐念涕流未報不貲之恩敢懐盍歸之意常恐樵牧不禁行有雍門之悲雨露既濡空引太行之望豈謂通判某官政先慈孝義篤友朋首隆學校之師儒次訪里閭之耆舊自嗟來暮不聞拔薤之規尚意神交特致生芻之奠父老感歎桑梓光華深衣練冠莫克垂洟於墓道昔襦今袴尚能鼓舞於民謡仰佩之深力占難盡賀范端明啓右軾啓恭承明詔追録舊勲名陞祕殿之嚴實遂安車之養仍惟餘澤以及後昆聞命以還有識相慶竊謂死生之事聖賢有不能了父子之際古今以為難言方其犯雷霆於一時豈意收功名於今日惟天知我絶口不言偉事發之相重非人謀之所及恭惟致政端明學士至誠格物隠徳在人弼亮四世如畢公壽考百年如衛武獨立不懼舎之則藏惟有青蒲之言尚在金縢之匱白日一照浮雲自開坐使遺民復觀盛事子孫歸沐下萬石之里門君相乞言授三老之几杖更延眉壽永作元龜軾無任歡喜頌詠激切之至答范端明啓伏審參稽古樂追述新書琢石鑄金成之有數立均出度施及無窮搢紳雲集於奉常端冕天臨於便座偉兹壯觀自我元臣竊以樂之盛衰寄於人之存否秦漢以下鄭衛律行雖喜三雍之成旋遘五胡之亂平陳之後粗獲雅音天寳之中遂雜胡部道䘮乆矣孰能起之獨求三代之遺聲允屬四朝之舊徳恭惟致政端明丈人耄期稱道直亮多聞進不謀安昔既以身而徇義退猶憂國今推所學以及人豈惟盡力於考音至復傾家而制器蓋事關於治忽必幽賛於神明得商頌十二篇於周太師雖賢者之事也獲古磬十六枚於犍為郡豈偶然而已哉軾本非知音之人空荷移書之辱䆒觀累日喜愧兼懐徒誦詠於再三豈發明於萬一杭州謝執政啓右軾啓小器易盈宜處不爭之地大恩難報終為有愧之人到郡浹旬汗顔數四湖山如舊魚鳥亦怪其衰殘爭訟稍稀吏民習知其遲鈍雖尚嬰於寵劇庶漸即於安閒顧此惷愚亦䝉徼倖此蓋伏遇某官輔世以徳事君以仁嘉善而矜不能與人不求其備故令狂直得保始終措歩武於夷途收桑榆之暮景軾敢不欽承令徳推本上心政拙催科自占陽城之考姦容獄市敢師齊相之言庶寡悔尤少償知遇答杭州交代啓右軾啓罷直禁中本縁衰病分符浙右更竊寵榮既尋少壯之舊逰復繼老成之前躅養痾卧治之所䝉成坐嘯之餘顧此鈍頑實為忝昩伏惟知府待制宏才緯俗雅望鎮浮神馳方切於望塵心照已先於傾蓋借之餘潤成此虚名滕大夫之才豈堪治劇楚令尹之政或許告新望見有期瞻依愈切答莫提刑啓右軾啓得請江湖雖適平生之願剸煩獄市豈堪老病之餘賴兹徳大而有容愍其心勞而愈拙故於始至借以一言此蓋伏遇提刑某官威肅列城徳懐雅俗雖在按臨之屬部不忘宿昔之交情豈獨敦忠厚之風抑以増衰朽之重其為感怍未易名言答王明州啓伏審奉詔牧民㳙辰莅事教條清簡曾無頥指之勞吏下肅承皆有心服之敬風聲所暨隣境為先伏惟知府龍圖廸哲而文剛中莫屈大辯若訥耻為利口之言小智自私誰識仁人之勇道不容於羣枉身乃獲於退安回觀爭奪之塗日有榮枯之變坐嘯之樂勿以語人强食自頥猶當為國謝生日詩啓一首蓬矢之祥雖世俗之所尚蓼莪之感迨衰老而不忘豈謂某官意重瓊瑶文成黼黻推仁心而錫類出妙語以嘘枯攝提正於孟陬已光初度月宿直於南斗更借虛名永惟難報之珍但結無窮之好賀林待制啓一首伏審圖舊聖時陞華法從僉言諧允有識歎咨萬木嵗寒配喬松於巨栢衆星夜艾凜明月與長庚斧藻昌朝領袖後進傳聞四逺歡喜一詞恭惟某官名重弱齡望高晚節文章爾雅蓋西漢之餘風悃愊無華亦東京之循吏凡閲四朝而後用獨為三館之老臣著書已成特未寫之琬琰立功何晚㑹當收之桑榆軾交舊最深慰喜良甚尺書為賀鄙志莫宣賀蔣發運啓伏審上計入覲拜恩言還擁節東南上寄一方之休戚考圖廣内示將大用之權輿凡在庇庥舉增忭躍恭惟某官受材秀傑秉徳純忠蔚然西漢之文深厚爾雅展矣東京之吏悃愊無華雖已得正法眼藏於大祖師猶有一大事因縁於當來世固將入踐卿相坐致功名以斯道而結主知隨所寓而作佛事某竄流已乆衰病相仍方稱慶之未皇忽移書之見及欣感之幸筆舌難宣謝制科啓右軾啓今月某日䝉恩授前件官者臨軒䇿士方搜絶異之材隨問獻言誤占乆虚之等忽從佐縣擢與評刑内自顧於無堪凜不知其所措恭惟制治之要惟有取人之難用法者畏有司之不公故舎其平生而論其一日通變者恐人才之未盡故詳於採聽而畧於臨時兹二者之相形顧兩全而未有一之於考試而掩之於倉卒所以為無私也然而才行之迹無由而深知委之於察舉而要之於乆長所以為無失也然而請屬之風或因而滋長此隋唐進士之所以為有弊魏晉中正之所以為多姦惟是賢良茂異之科兼用考試察舉之法每中年輒下明詔使兩制各舉所聞在家者能孝而恭在官者能亷而慎臨之以患難而能不變邀之以寵利而能不回既已得其行已之大方然後責其當世之要用學博者又須守約而後取文麗者或以用寡而見尤特於萬人之中求其百全之美凡與中書之召命已為天下之選人而又有不可測知之論以觀其黙識之能無所不問之䇿以效其博通之實至於此而不去則其人之可知然猶使御史得以求其疵諫官得以考其素一䧟清議輒為廢人是以始由察舉而無請謁公行之私終用考試而無倉卒不審之患蓋其取人也如此之宻則夫不肖者安得而容軾才不迨人少而自信治經獨傳於家學為文不願於世知特以饑寒之憂出求斗升之禄不謂諸公之過聽使與羣豪而並遊始不自量欲行其志遂竊俊良之舉不知氣力之微論事迂闊而不能動人讀書疎畧而無以應敵取之甚愧得而益慙此蓋伏遇某官徳為世之望人位為時之顯處聲稱所被四方莫不奔趨議論一加多士以為進退致兹庸末亦與甄收然而志卑處高徳薄寵厚歴觀前輩由此為致君之資敢以微軀自今為許國之始過此以往未知所裁賀楊龍圖啓右軾啓伏審新改直職擢司諫垣傳聞邇遐竦動觀聽咸謂國家之鉅福乃用諫諍之真才必能深言以補大化方今朝廷之上號為無諱而太平之美終不能全臺諫之列嵗不乏人而衆弊之原猶或未去豈聴之者徒能容而不能用言之者但為名而不為功厯觀古人之效忠皆因當世而用智不務過直期於必行右尹子革因墳典而道祈招之詩左師觸龍語饘粥而及長安之質徒盡拳拳之意不求赫赫之名此仁人及物之休功忠臣愛君之至分伏自頃嵗所更幾人席未暖而輒遷踵相躡而繼去一身之譏固足以免矣而積嵗之病當使誰去之恐習慣以為常遂因循而不振雖在僻陋顧常隠憂以為必得朴忠憂國之人而又加以辯智得君之術言茍獲用國其庶幾伏惟諫院龍圖才雄於世而常若不勝節過於人而未嘗自異素練邊事深知兵驕頃持銓衡實識官冗必將舉大體而不論小事務實效而不為虚名軾最䝉深知愧無少補方傾耳以聽願續書諫苑之篇若有待而言或能著爭臣之論阻以在外無由至門踴躍之懐實倍倫等鳯翔到任謝執政啓右軾啓違去軒屏忽已改嵗向風瞻戀何翅饑渇前月十四日到任翌日尋已交割訖軾本凡材繆承選取忽從州縣便與賔佐捫躬自省豈不媿幸伏自到任已來日夜厲精雖無過人庶幾寡過伏惟昭文相公素所奬庇曲加搜揚既䝉最深之知遂有自重之意所任僉署一局兼掌五曹文書内有衙司最為要事編木栰竹東下河渭飛芻輓粟西赴邊陲大河有每嵗之防販務有不蠲之課破蕩民業忽如春氷于今雖有優輕酬奬之名其實不及所費百分之一救之無術坐以自慙惟有署置之必均姑使服勞而無怨過此以往未知所裁賀吳副樞啓頃聞休命擢領上都曽安坐之未皇已歡聲之布出即欲裁問少通勤拳以為不乆當有非常之聞是以未敢輕為率爾之賀逮兹未幾果已如言釋府事之喧繁總兵權於禁宻傳聞四逺歡喜一詞伏惟某官機畧足以應無方而有朴忠沉厚之量文華足以表當世而有簡素質直之風置之於都㑹則其為效也速而所及者亷委之於樞機則其成功也遲而所被者廣深惟賢者之處世皆以得時為至難幸而得之或已老矣今以明公之至盛正如大川之方増天下方將以未獲之事盡付於明公明公宜愛此不貲之軀以畢其能事區區之意言不能勝答許狀元啓右軾啓伏以賢俊之士固將有以挾持富貴之來豈能為之損益昔者在貧賤之辱所有無以異於今一朝居豪傑之先而人然後知其貴伏惟狀元僉判廷評以粹美之質負傑異之才自逺方而遊上都以一日而蓋天下士既望風而知不敵人皆斂袵而謂當然茍非素與交遊之流安敢輕為賀問之禮不期謙抑過録庸虚忽承牋牘之臨皆自聽聞之誤禮非所稱媿靡自任先皇帝未明求衣乆已格於至治洮盥慿几尚不忘於選賢庸登哲民以遺後聖雖喜車旌之召旋興弓劒之悲臣子之心逺邇若一即日承已拜命計將就塗念展謁之何時徒向風而永望謹奉啓陳謝不宣謝秋賦試官啓伏以聖人設文章之教本以御民君子在野田之間亦學為政故知禮樂者可與言化通春秋者長於治人蓋三代之所常行於六經可以備見事為之制曲為之防使學者皆能明其心則天下可以運諸掌降及近世析為二塗凡王政皆出於刑書故儒術不通於吏事惟其所以治民者固不本於學而其所以為學者亦無施於民遊庠校者忘朝廷讀法律者捐詩賦埸屋後進挾聲技以相夸王公大人顧雕蟲而自笑舊學無用古風遂忘終始之意曽不相沿貴賤之間亦因遂闊下之士有學古之志而無學古之功上之人有用儒之名而無用儒之實顧兹媮弊常竊憫嗟茍非當世之大賢孰拯先王之墜典伏惟某官才出間世志存生民曩在布衣能通天下之務旋居要職又為儒者之宗明習政事而皆有本原守持經術而不為迂闊世之系望上所深知輟自朝聮付之文柄命題甚易而不肖者無所兼容用法至寛而犯令者未嘗茍免觀其發問於䇿足以盡人之材講求先聖之心考其詩義深悲古學之廢訊以厯書條任子之便宜訪成均之故事不泥於古不牽於今非有苛碎難知之文將觀磊落不羈之士使天下知文章誠可以制治知聲律不足以入官失之者固因而自新得之者不至於捐舊疇昔所欲於今遂忘軾才無他長學以自守為文病拙不能當世俗之心奏籍有名大懼辱賢材之舉翻然如畀之羽翼追逸翮以並遊沛然如假之舟航臨長川而獲濟偶縁大庇粗遂一名方將區區於簿書米鹽之間碌碌於塵埃箠楚之地雖識恩之所自顧力報之末由感懼之懐不知所措謝韓舎人啓右軾啓軾聞古者至治之世天子推恩以收天下之望有司執法以繩天下之媮蓋不推恩則無所兼容不執法則有所僥倖有司推恩而求名則侵君之權天子執法而責實則失民之望為君者常病於察為臣者又失之寛古之明天子信其臣而不惑於多言故有司執法而無所忌古之良有司憂其君而不䘏於私計故天下歸怨而不敢辭况欲選材而置官是將教民而圖任唯所利國豈容樹恩今聖上推不忍之心使賢愚皆遂其所欲而大臣用至明之法使工拙不至於相淆嚮者哀憐老儒故為特奏之令憫惻連坐又開别試之塗此天下所以詠謌至仁鼓舞盛徳君臣之體夫豈同條伏惟舎人執事為時求材憂國忘已所圖甚逺將深計於安危自信至明曾不牽於毁譽變茍且依違之俗去浮偽囂譁之文罷黜俗儒動以千計講通經術得者九人顧兹小才偶在殊選惟天子推恩如此之厚惟大人執法如此之堅將天下實被其休功豈一夫獨遂其私願感荷激切不能自勝謝王内翰啓右軾啓竊以取士之道古難其全欲求倜儻超拔之才則懼其放蕩而或至於無度欲求規矩尺寸之士則病其齷齪而不能有所為進士之科昔稱浮剽本朝更制漸復古風博觀䇿論以開天下豪俊之塗精取詩賦以折天下英雄之氣使齷齪者望而不敢進放蕩者退而有所裁此聖人所以罔羅天下之逸民追復先王之舊迹元臣大老皆出此塗伏惟内翰執事天材俊麗神氣横溢竒文高論大或出於繩檢比聲協句小亦合於方圓蓋天下望為權衡故明主委之黜陟軾之不肖與在下風顧惟山野之見聞安識朝廷之忌諱軾亦恃有執事之英鑒以為小節之何拘執事亦將收天下之遺才觀其大綱之所在驟置殊等寔聞四方使知大國之選材非顧當時之所悦𦕈然陋器雖不能勝多士之喧言卓爾大賢自足以破萬人之浮議方將奔走厥職厲精乃心茍庶幾無朝夕之愆以辱知已亦萬一有毛髪之效少答至仁感懼之懐不知所措潁州到任謝執政啓入參兩禁每玷北扉之榮出典二邦輙為西湖之長皆縁天幸豈復人謀惟汝水之名邦乃裕陵之故國人醇事簡地壤泉甘豈惟暫養於不才抑亦此生之可老恭惟某官嘉猷經世茂徳範時元老廟堂自有權衡之信餘生江海得同品物之安感佩之私筆舌難既定州到任謝執政啓燕南趙北昔稱謀帥之難尺短寸長今以乏人而授幸此四夷之守忘其一障之乗坐食何功捫心知愧伏念軾愚忠自信朴學無華孔融意廣才踈訖無成效嵇康性􅄶傷物頻致怨憎叨逢聖世之休明未分昔人之憂患故求散地以養衰年終成命之莫回悼此心之未亮伏惟某官躬行周孔力致唐虞燮和天人方遂萬物之性虚受海宇固容一介之微眷此餘生實無他望老如安國既倦北平之遷惷比方回終有㑹稽之請歸依之至筆舌奚周上執政謝奬諭啓事有服勤此實守臣之職功無可録遽膺褒詔之榮聞命惟驚反身自愧伏自河失故道遺患及於東方徐居下流受害甲於他郡比縁衆力獲保孤城灑沈澹災無補洪源之塞増卑培薄僅循下䇿之施敢圖天聽之卑乃辱璽書之賜兹蓋伏遇某官左右元聖師保萬民方以一夫不獲為已羞故衆人皆樂以善告遂縁過聽致此曲恩某敢不祗服訓詞益修吏職深自策其駑鈍庶有補於涓埃過此以還罔知所措上留守宣徽啓右某啓少年游學方成都樂職之秋壯嵗效官復淮陽卧理之日矧留都之清淨眷幙府之優閒再枉辟書重收孤迹哀憐廢棄之乆誰復肯然綢繆樽爼之歡亦非偶爾伏惟留守宣徽太尉才高一世望重屢朝體河嶽之兼容納涓塵而不間衣食有奉已寛盡室之憂道徳照人况復終身之幸其為感激難盡敷陳東坡全集巻七十
