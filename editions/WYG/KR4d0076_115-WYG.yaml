body:
  text: 東坡全集巻一百十五宋蘓軾撰樂語十六章春貼子詞元祐三年皇帝閤六首藹藹龍旂色琅琅木鐸音數行寛大詔四海發生心暘谷賔初日清臺告協風願如風有信長與日俱中草木漸知春萌芽處處新從今八千歲合抱是靈椿聖主憂民未解顔天教瑞雪報豐年蒼龍掛闕農祥正一作慶老穉相呼㸔藉田昨夜東風入律新玉關知有受降人聖恩與解河湟凍得共中原草木春翰林職在明光裏行樂詩成拜舞中不待驚開小桃杏始知天子是天公太皇太后閤六首琱刻春何力欣榮物自知發生雖有象覆載本無私小殿黄金榜朱簾白玉鉤一聲雙日蹕春色滿皇州仗下春朝散宫中晝漏稀兩廂休侍御應下讀書帷五日占雲十日風憂懃終歲為三農春來有喜何人見好學神孫類祖宗共道十年無臘雪且欣三白壓春田盡驅南畆扶犂手稍發中都朽貫錢不獨清心能省事應縁克已自消兵傳聞塞外千君長欲趂新年賀太平皇太后閤六首寶冊瓊瑤重新庭松桂香雪消春未動碧瓦麗朝陽瑞日明天仗仙雲擁夀山倚欄春晝永金母在人間朝罷金鋪掩人閒寶瑟塵欲知慈儉徳書史樂青春仙家日月本長閒送臘迎春豈亦然一作亦偶翠管銀罌傳故事金花綵勝作新年彤史年來不絶書三朝徳化婦承姑宫中侍女減珠翠雪裏貧民得袴襦邊庭無事羽書稀閒遣詞臣進小詩共助至尊歌喜事今年春日得春衣皇太妃閤五首葦桃猶在户椒栢已稱觴歲美風先應朝回日漸長甲觀開千柱飛樓擢九層雪殘烏鵲喜翔舞下􅒀稜孝心日奉東朝養儉德應師大練一作太姒風太史新年瞻瑞氣四星朗潤紫宫中九門掛月未催班清禁風和玉漏閒崇慶早朝銀燭下珮環聲在五雲間東風弱栁萬絲垂的皪殘梅尚一枝繭館乍欣蠶浴後禖壇猶記燕來時夫人閤四首綵勝鏤新語酥槃滴小詩昇平多樂事應許外庭知細雨曉風柔春聲入御溝已漂新荇沒猶帶㫁冰流扶桑初日映簾昇已覺銅瓶暖不冰七種共挑人日菜千枝先剪上元燈雪消鴛瓦已流澌風暖犀盤尚鎮帷縹緲紫簫明月下壁門桂影夜㕘差端午貼子詞元祐三年皇帝閤六首盛德初融後潛隂未妬時侍臣占易象明兩作重離採秀擷羣芳爭儲百藥良太醫初薦艾庶草驗蕃昌微凉生殿閤習習滿皇都試問吾民愠南風為解無西檻新來玉宇風侍臣茗盌得雍容庭槐似識天顔喜舞破清隂作兩龍講餘交翟轉回廊始覺深宮夏日長揚子江心空百鍊只將無逸鑑興亾一扇清風灑面寒應縁飛白在冰紈坐知四海䝉膏澤沐浴君王徳似蘭太皇太后閤六首漸臺通翠浪暑殿轉清風簾捲東朝散金烏未遽中日永蠶收簇風高麥上塲朝來藉田令菰黍獻時芳舞羽諸羌伏銷兵萬彚蘓只應黄紙誥便是赤靈符令節陳詩歲歲新從臣何以壽吾君願儲醫國三年艾不作沉湘九辨文忠臣諒節今千歲孝女孤風滿四方不復巫陽占郢夢空餘仲御扣河章長養恩深動植均只憂貪吏尚殘民外廷已拜梟羮賜應助吾君去不仁皇太后閤六首露簟琴書冷琱槃􅊡餌新深宫猶畏日應念暑耘人萬壽菖蒲酒千金琥珀杯年年行樂處新月掛池臺翠筒初窒棟薌黍復纒菰水殿開冰鑑瓊漿凍玉壺秘殿扶疎夏木深雨餘初有一蟬吟應將嬴女乗鸞扇更助南風長棘心上林珍木暗池臺蜀産吳包萬里來不獨槃中見盧橘時於㯶裏得楊梅閔楚遺風萬古情湘沅舊俗到金明翠輿黄繖何時幸畫鷁飛鳬盡日横皇太妃閤五首午景簾櫳静薰風草木酣誰知恭儉德綵縷出親蠶雨細方梅夏風高已麥秋應憐百花盡緑葉暗紅榴辟兵已佩靈符小續命仍縈綵縷長不為祈禳得天助要隨風俗樂時康玉盆沉李灧清泉金鴨嘘空裊細烟自有梧楸鄣畏日仍欣麥黍報豐年良辰樂事古難同繡繭朱絲奉兩宫仁孝自應禳百沴艾人桃印本無功夫人閤四首肅肅槐庭午沉沉玉漏稀皇恩樂佳節鬬草得珠璣節物荆吳舊嬉游禁掖閒仙風隨畫箑拜賜落人間五綵縈筒秫稻香千門結艾􅁂髯張旋開寳典尋風物要及靈辰共祓禳欲曉銅瓶下井欄鏗鍠金殿發清寒似聞人世南風熱日上牆東問幾竿内中御侍以下賀冬至詞語元祐二年十月二十日皇帝伏以月臨天統首冠於三正氣應黄宫復來於七日君道寖長陽德光亨恭惟皇帝陛下清明在躬仁孝遍物垂衣南面天何言而四時成學問西清日將旦而羣隂伏裔夷奔走年榖順成豈惟四海之歡心自識三靈之隂贊如川方至受命無疆妾等待罪掖庭備員婦職共慶一陽之節敢陳萬歲之觴太皇太后伏以消長有時候微陽之來復賢愚同慶知君子之彚征德化所加神人並應恭惟太皇太后陛下睿明天縱慈儉身先振河嶽以不傾地無私載順隂陽而自化天且不違成功已陋於漢唐論德蓋高於任姒大有上吉方獲助於三靈既醉太平當純備於五福妾等職㕘長御心奉慈闈慶陽德之朋來願夭壽之平格皇太后伏以矇瞍奏功驗人和於緹室日官占物效嵗美於黄雲慶自宫庭澤均海宇恭惟皇太后殿下輔佐内治儀刑王家推美國風夙茂周南之化考祥羲易共成坤厚之功方迎日於三微敢稱觴於萬壽豈獨宫闈之願實同中外之歡妾等猥以微軀被䝉慈渥仰獻岡陵之祝庶殫草木之誠内中御侍以下賀年節詞語元祐二年十二月一日皇帝伏以齊七政於璣衡天人並應受三朝之圖籍海宇來同恭惟皇帝陛下至仁無私神武不殺祖述堯帝厯象以授民時儀刑文王正家而齊天下方肇新於歲律宜嚮用於神休妾等幸侍禁嚴仰陶化育願上萬年之壽永膺百順之祥太皇太后伏以太簇旋宫既贊陽而出滯勾芒司厯方布徳以緩刑恭惟太皇太后陛下化始六宫風行九有損財振廩救民溝壑之中求賢審官拔士茒茨之下方履端之資始膺景福於無疆妾等幸侍禁嚴粗供婦職願獻岡陵之壽少輸草木之誠皇太后伏以三元資始磔禳以餞餘寒萬寶更新燔烈以興嗣歲恭惟皇太后殿下道光溈汭德配周南輔導兩朝孝慈格於上下儀刑九御恭儉聞於邇遐順履三陽誕膺百禄妾等幸班禁掖久被餘光莫報生成之恩但祝靈長之算内中御侍以下賀冬至詞語元祐三年十月三十日皇帝伏以日合天統時推建子之正律中黄鍾氣驗微陽之應德施自上惠均於民伏惟皇帝陛下道配皇王化行夷夏觀其來復見乎天地之心静以無為待此隂陽之定雲物告瑞宫聲協和豈惟至治之祥自得上天之祐一人有慶萬壽無疆妾等䝉被天光叨塵婦職敢獻如山之祝庶同率土之歡太皇太后伏以書奏清臺驗厯象之䆳密日移黄道迎化國之舒長寰宇和平宫闈歡豫恭惟太皇太后陛下教隆隂禮位正坤儀嗣太任之徽音道光千古衣明德之大練儉化六宫體柔静以臨朝配清明而燭物慶雲可望共占至治之祥彤史何知莫贊無為之德妾等猥㕘女職仰奉慈顔因來復之一陽祝無疆之萬壽皇太后伏以候氣葭灰喜律筒之已應課功綵線知宫日之初長品物向榮掖庭胥悦恭惟皇太后殿下母臨四海婦應東朝求賢審官但有憂勤之志躬儉節用豈㤀澣濯之衣宜福禄之日康樂宫闈之無事妾等濫塵女職獲奉慈顔願先栢酒以稱觴更指椿年而獻壽坤成節集英殿宴教坊詞元祐二年七月十五日教坊致語臣聞視履考祥既占衷月之夢對時育物必有繼天之功方大火之西流履隂靈之既望帝於是日誕降仁人意使斯民咸歸壽域共慶千年之遇得生二聖之朝式宴示慈與民同樂恭惟皇帝陛下文思天縱睿哲生知力行禹湯之仁常恐一夫之不獲躬蹈曽閔之孝故得萬國之歡心恭惟太皇太后陛下道契天人德超載籍知人則哲蓋帝堯之所難修已安民雖虞舜其猶病風雲從而萬物覩日月照而四時行自然動植之咸安莫知天地之何力三宫交慶羣后駿奔寳鄰通四牡之歡航海致重譯之賮洞庭九奏始識咸池之音靈嶽三呼共獻後天之祝臣等叨居法部輒採民言上瀆宸聰敢陳口號口號三朝遺老九門前又見承平大有年文母憂勤初化俗曽孫仁孝已通天史書元祐三千牘樂奏坤成第一篇欲採蟠桃歸獻壽蓬萊清淺半桑田勾合曲秋風協應生殿角之微凉廣樂具陳韻金絲而間作欲觀鳥獸之率舞願聞笙磬之同音上奉宸顔教坊合曲勾小兒隊朱干玉戚本以象功白叟黄童皆知頌聖盍命髧髦之侣來陳舞勺之儀上侑皇歡教坊小兒入隊隊名願同千歲樂長奏太平謠問小兒隊鎬京廣燕方雲集於縉紳沂水游童忽鳬趨於庭廡雖云小技必有可觀咫尺天顔悉言汝志小兒致語臣聞功存社稷慶鍾高密之門澤及本枝天祚太任之德候西風之入律藹瑞氣之盈庭嘉與四方同稱萬壽恭惟皇帝陛下文思稽古濬哲在躬日奉東朝之歡率用家人之禮以謂慈儉之化無德而能名保佑之功如天之難報惟流傳於歌舞庶髣髴其儀刑臣等雖在弱齡久陶孝治敢率垂髫之侣共陳振萬之儀未敢自專伏取進止勾雜劇鸞旗日轉雉扇雲開暫回綴兆之文少進俳諧之技來陳善戲以佐歡聲上樂天顔雜劇來歟放小兒隊青衿旅進雖末技而畢陳黄屋天臨知下情之無壅既成文於綴兆爰整袂以徘徊再拜天階相將好去勾女童隊彤壺漏箭隨雞唱以漸移絳節綵髦聞鳯簫而自舉冝召散花之侣來陳回雪之姿上奉宸歡兩軍女童入隊隊名金風回翠袖玉琯倚清歌問女童隊鳯歌諧律方資燕爼之歡鷺羽分庭忽集壽山之下低鬟有待振袂欲前密邇天階悉陳來意女童致語妾聞塗山啟夏來玉帛於萬邦摯仲興周胙本枝於百世嘉辰共樂壯觀一新恭惟皇帝陛下舜孝自天堯仁浹物膺昊穹之成命席累聖之詒謀惟地勢坤永載無疆之德以天下養躬持胥樂之觴六樂在庭百工奏技妾等親逢盛旦獲望嚴宸藝雖愧於驚鴻心已先於儀鳯願陳舞綴上奉天顔未敢自専伏取進止勾雜劇風清羽蓋日轉槐庭欲資載笑之歡必有應諧之妙暫回舞綴少進詼辭上悦天顏雜劇來歟放女童隊八音間作既成皦繹之文萬舞畢陳曲盡囘翔之態望彤闈而却立歛翠袂以言歸再拜天墀相將好去集英殿春宴教坊詞教坊詞語中和化育萬壽排塲臣聞人和則氣和故王道得而四時正今樂猶古樂故民心悦而八音平幸此聖朝陶然化國飭三農於保介維暮之春興五福於太平既醉以酒恭惟皇帝陛下乗乾有作出震無私憲章六聖之典謨斟酌百王之禮樂天方祚於舜孝人已誦於堯言故得彛倫叙而水土平北流軌道壬人退而蠻夷服西旅在庭稍寛中昊之憂一均湛露之澤方將麯蘖羣賢而惡㫖酒鼓吹六藝而放鄭聲雖白雪陽春莫致天顔之一笑而獻芹負日各盡野人之寸心臣猥以賤工叨塵法部幸獲望雲之喜敢陳擊壤之音不揆蕪才上進口號口號萬人歌舞樂芳辰長養恩深第四春令下風雷常有信時來草木豈知仁璿璣已正三階泰玉琯初知九奏純更欲年年同此樂故應相繼得元臣勾合曲太平無象善萬物之得時和氣致祥喜八風之從律大合鈞天之奏克諧治世之音上奉嚴宸教坊合曲勾小兒隊斑白之老既無負戴之憂齠齔之童亦遂嬉遊之樂行歌道路聫袂闕庭仰奉宸慈小兒入隊隊名初成暮春服來獻太平謠問小兒隊聚戲里閭豈識九重之奥成文綴兆忽隨六樂之和宜近彤墀悉陳來意小兒致語臣聞春為陽中生物各遂其性樂以天下聖人豈私其身故飲食盡忠臣心而遊豫為諸侯度方遲日之無事矧嗣歲之有年大啟璧門肅陳燕豆恭惟皇帝陛下道隆而德備質文而性仁總攬羣才蓋天受之神䇿澄清庶政故民獻以寶符顧良辰樂事之難并宜羣臣嘉賔之並集廣塲千步方山立於衆工大樂九成固海函於雜技臣等沐浴膏澤咏歌昇平幸以髧髦之微得㕘舞羽之末敢干宸聴伏俟俞音勾雜劇臚傳已久陛楯將更宜資載笑之歡少進羣優之技緩調絲竹雜劇來歟放小兒隊清歌屢奏葢曲盡於下情妙舞載陳示不遺於小物既畢沛風之和稍同沂水之歸再拜天階相將好去勾女童隊燕私之樂下侍於臣工靡曼之觀聊同於俚俗審音而作振袂稍前上奉宸歡兩軍女童入隊隊名瑞日明歌扇仙飇動舞衣問女童隊工師奏技侍衛聳觀顧游女之何施集彤庭而有待欲知來意宜悉敷陳女童致語妾聞聖人授民以時王者與衆同樂故倉庚鳴而蠶女出游魚躍而靈沼春蓋良辰豈易得哉亦賢者而後樂此伏惟皇帝陛下温恭允塞緝熙光明學無常師文武識其大者仁能濟衆堯舜其猶病諸齊泰階之六符走重譯之萬里天人並應禮樂將興豈惟塵土之賤微敢度乾坤之廣大萬舞九奏雖未象於成功間歌三終亦庶㡬於頌德欲殫末技少効寸誠勾雜劇風斜御栁既窮綺麗之觀日轉庭槐少進詼優之戲再調絲竹雜劇來歟放女童隊翠袖風回已盡折旋之妙文茵霞巻尚觀顧步之餘再拜天墀相將好去集英殿秋宴教坊詞教坊致語臣聞天無言而四時成聖有作而萬物覩清淨自化雖仰則於帝心愷悌不回亦俛同於衆樂屬此九秋之候粲然萬寳之成吾王不游何以勞農而休老君子如喜則必大亨以養賢恭惟皇帝陛下孝通神明仁及草木行堯禹之大道守成康之小心華夷來同天地並應以謂福莫大於無事瑞曷加於有年南極呈祥候秋分而老人見西夷慕義涉流沙而天馬來嘉與臣工肅陳燕爼禮元侯於三夏諧庶尹於九成宣示御觴聳近臣之榮觀臚傳天語溢兩廡之歡聲臣等幸覯昌辰叨塵法部採謠言於擊壤助矇瞍之陳詩仰奉威顔敢進口號口號霜霏碧瓦尚生烟日泛彤庭已集仙藹藹四門多吉士熙熙萬國屢豐年高秋爽氣明宫殿元祐和聲入管絃菊有芳兮蘭有秀從臣誰和白雲篇勾合曲西風入律間歌秋報之詩南籥在廷備舉徳音之器絃匏一倡鐘鼓畢陳上奉宸嚴教坊合曲勾小兒隊皇慈下逮罄百執以均歡衆技畢陳示四方之同樂宜進垂髫之侣來脩秉翟之儀上奉威顔教坊小兒入隊隊名登歌依頌磬下管舞成童問小兒隊大君有命肆陳管磬之音童子何知入造工師之末欲詳來意宜悉奏陳小兒致語臣聞天行有信正得秋而萬寳成君德無私日將旦而羣隂伏清風應律廣樂在庭占歲事於金穰望天顔之玉粹沐浴膏澤詠歌升平恭惟皇帝陛下天縱聰明日躋聖知無一物之失所得萬國之歡心雖擊壤之民固何知於帝力而後天之祝亦各抒於下情臣等幸以齠齔之年得居仁壽之域詠舞雩於沂水久樂聖時唱銅鞮於漢濵空慚郢一作俚曲願陳舞綴少奉宸歡未敢自專伏候進止勾雜劇朱絃玉管屢進清音華翟文竿少停逸綴宜進詼諧之技少資色笑之歡上悦天顔雜劇來歟放小兒隊回翔丹陛已陳就日之誠合散廣庭曲盡回風之妙歌鐘告闋羽籥言旋再拜天階相將好去勾女童隊錦薦雲舒來九成之丹鳳霞衣鱗集隠三疊之靈鼉上奉宸嚴教坊女童入隊隊名香雲浮繡扆花浪舞彤庭問女童隊清禁深嚴方縉紳之雲集仙音彈緩忽簪珥之星陳徐步香茵悉陳來意女童致語妾聞鈞天廣樂空傳帝所之游閶闔清風理絶庶人之共夫何仙聖靡隔塵凡仰瞻八采之威目慶千齡之運恭惟皇帝陛下乾健而粹離明而文規摹六聖之心人將自化儀刑文母之德天且不違樂兹大有之年申以宗慈之㑹虞韶既畢夏籥將興妾等分綴以須審音而作願俟工歌之闋少同率舞之歡未敢自專伏取進止勾雜劇絃匏迭奏干羽畢陳洽聞舜樂之和稍進齊諧之技金絲徐韻雜劇來歟放女童隊羽觴湛湛方陳既醉之詩鼉鼓淵淵復奏言歸之曲峩鬟佇立歛袂却行再拜天階相將好去興龍節集英殿宴教坊詞元祐二年教坊致語臣聞帝武造周已兆興王之迹日符祚漢實開受命之祥非天私我有邦惟聖乃作神主仰止誕彌之慶集於建丑之正瑞玉旅庭爰講比鄰之好虎臣在泮復通西域之琛式燕示慈與人均福恭惟皇帝陛下睿思冠古濬哲自天煥乎有文日講六經之訓述而不作思齊累聖之仁夷夏宅心神人協德卜年七百方過厯以承天有臣三千咸一心而戴后彤庭振萬玉座傳觴誦干戈載戢之詩作君臣相悦之樂斯民何幸白首太平臣猥以微生親逢盛旦始慶猗蘭之㑹願賡擊壤之音下採民言上陳口號口號凛凜重瞳日月新四方驚喜識天人共知若木初升旦且種蟠桃莫計春請吏黒山歸屬國給扶黄髪拜嚴宸紫皇應在紅雲裏試問清都侍從臣勾合曲祝堯之壽既罄於歡謠象舜之功願觀於備樂羽旄在列管磬同音上奉宸嚴教坊合曲勾小兒隊魚龍奏技畢陳詭異之觀齠齔成童各效回旋之妙嘉其尚幼有此良心仰奉宸慈教坊小兒入隊隊名兩階陳羽籥萬國走梯航問小兒隊工師在列各懐自獻之能侲子盈庭必有可觀之技未知來意宜悉奏陳小兒致語臣聞生民以來未有祖宗之仁厚上帝所眷錫以聖神之子孫孚佑下民篤生我后瞻舜瞳之日月望堯顙之山河若帝之初達四聰於無外如川方至傾萬宇以來同恭惟皇帝陛下齊聖廣淵剛健篤實識文武之大者體仁孝於自然歌詩思齊見文王之所以聖誦書無逸法中宗之不敢康誕日載臨輿情共祝神筴授萬年之算洛書開五福之祥臣等嬉遊天街沐浴皇化欲陳舞蹈之意不知手足之隨未敢自專伏取進止勾雜劇金奏鏗純既度九韶之曲霓裳合散又陳八佾之儀舞綴暫停伶優間作再調絲竹雜劇來歟放小兒隊游童率舞逐物性之熙怡小技畢陳識天慈之廣大清歌既闋疊鼓屢催再拜天階相將好去勾女童隊垂鬟在列歛袂稍前豈知北里之微敢獻南山之壽霓旌坌集金奏方諧上奉威顔兩軍女童入隊隊名君臣千載遇歌舞八方同問女童隊摻撾屢作旌斾前臨顧游女之何能造彤庭而獻技欲知來意宜悉奏陳女童致語妾聞瑞乙來翔共紀生商之兆羣龍下集適同浴佛之辰佳氣充庭和聲載路輦出房而雷動扇交翟以雲開喜動人天春還草木恭惟皇帝陛下凝神昭曠受命穆清三后在天宜興王之世有四人迪哲知享國之無窮乃眷良辰欲均景福庭設九賔之禮樂歌四牡之章妾等幸覯昌期獲瞻文陛雖乏流風之妙願輸率舞之誠未敢自專伏候進止勾雜劇清淨自化雖莫測於宸心詼笑雜陳示俛同於衆樂金絲再舉雜劇來歟放女童隊分庭久立漸移愛日之隂振袂再成曲盡回風之態龍樓却望鼉鼓屢催再拜天階相將好去紫宸殿正旦教坊詞元祐四年教坊致語臣聞行夏之時正莫加於人統採周之舊王方在於鎬京惟吉月之布和休庶工而未作使華逺集鄰好交脩萃簪笏於九門來車書於萬里將興嗣歲以樂太平恭惟皇帝陛下躬履至仁誕膺眷命法天地四時之運民日用而不知傳祖宗六聖之心我無為而自化九德咸事三年有成始御八音之和以臨元日之㑹人神相慶夷夏來同臣等忝與賤工得親壯觀知輿情之願頌顧盛德之難形不度荒蕪敢進口號口號九霄清蹕一聲雷萬物欣榮意已開曉日自隨天仗出春風不待斗杓回行㸔菖葉催耕耤共喜椒花映壽杯欲識太平全盛事振振鵷鷺滿雲臺勾合曲東風應律南籥在庭餞臘迎春方慶三朝之㑹登歌下管願聞九奏之和上悦天顔教坊合曲勾小兒隊工師奏技咸踴躍以在庭穉孺聞音亦回翔而赴節方資其樂豈間微情上奉宸歡教坊小兒入隊隊名仙山來絳節雲海戲羣鴻問小兒隊六樂充庭九賔在列何彼垂髫之侣欲陳振袂之能必有來誠少前敷奏小兒致語臣聞正月上日萬彚所以更新羣臣嘉賔四方於焉觀禮雪方占於上瑞風已告於先春及此良辰設為高㑹恭惟皇帝陛下子來九有天覆兆民煥乎其有文章昭然若揭日月安西都䕶來輸八國之琛南極老人出效萬年之壽還圭璋於鄰使受圖籍於春朝擊石樅金奏鈞天之廣樂跳毬舞索戲平樂之都塲臣等沐浴太平詠歌新歲鼓舞咸韶之韻蹌揚鳥獸之間未敢自專伏候進止勾雜劇以雅以南既畢陳於衆技載色載笑期有悦於威顔舞綴暫停優詞間作金絲徐韻雜劇來歟放小兒隊酒闌金殿既均湛露之恩漏減銅壺曲盡流風之妙望彤墀而申祝整翠袖以言歸再拜天階相將好去興龍節集英殿宴教坊詞教坊致語臣聞天所眷命生而神靈惟三代受命之符萃於兹日實萬世無疆之福延及我民候南極之祥輝交北鄰之瑞節同趨燕鎬爭頌堯封恭惟皇帝陛下稽古温文乗乾剛粹體生知而猶學藏妙用於何言故得六聖承休三靈眷佑德隆星晷齊六符而泰階平河行地中錫九疇而彛倫正屬誕彌之令旦履長發之嘉祥夙設九賔於廷遍舞六代之樂日無私於臨照葵藿自傾天有信於發生勾萌必達臣等歴塵法部獲造彤墀下採民言得三萬里之謠頌登歌壽斚以八千歲為春秋不度蕪音敢進口號口號風巻雲舒合兩班曈曈瑞日映天顔觀書已獲千秋鏡積德長為萬壽山臘雪未消三務起壬人不用五兵閒相逢父老爭相賀却笑華胥是夢間勾合曲笙磬同音考中聲於神鼓鳥獸率舞浹和氣於敷天上奉宸歡教坊合曲勾小兒隊衆技旅庭振歡聲於無外游童頌聖陶至化於自然上奉皇威教坊小兒入隊隊名壤歌皆白髪象舞及青衿問小兒隊跳踉廣陌初疑竹馬之遊合散彤墀忽變驚鴻之狀欲知來意宜悉敷陳小兒致語臣聞流虹啟聖非人力所致之符湛露均恩與天下共享其樂旁行海宇外薄戎夷咸欣載夙之辰共獻無疆之祝恭惟皇帝陛下神武不殺將聖多能天生德於予既稟狥齊之質人樂告以善輔成經緯之文法慈儉於東朝紬詩書於西學載臨誕日俛答輿情非為靡曼之觀庶備太平之福臣等樂生齠齔學樂父師就列紛紜雖無殊於鳥獸赴音俛仰亦少效於涓塵未敢自專伏候進止勾雜劇樂且有儀乃古君之相悦張而不弛豈文武之常行欲佐歡聲宜陳善謔金絲徐韻雜劇來歟放小兒隊末技畢陳下情無壅既成文於綴兆猶歛袂以回翔再拜天階相將好去勾女童隊飛步壽山起香塵於羅襪散花御路泛回雪於錦茵上奉宸顔兩軍女童入隊隊名生商來瑞鳦浴佛降羣龍問女童隊玉座天臨雖仙凡之有隔翠鬟雲合豈草木之無知密邇天階悉陳來意女童致語妾聞千里一曲變澄瀾於濁河萬歲三稱隠歡聲於靈岳天人並應夷夏來同雖云北里之微敢獻華封之祝恭惟皇帝陛下睿文冠古神智無方同堯舜之性仁而能濟衆陋成康之刑措猶待積年共欣建丑之正再覩興龍之㑹桑田東海傾壽斚而未乾汗竹南山書頌聲而無極妾等幸縁賤藝獲望載顔振萬于庭欲赴干旄之節間歌以雅庶諧笙磬之音未敢自專伏候進止勾雜劇舞綴暫停歌鐘少闋必有應諧之妙以資載笑之歡上悦天顔雜劇來歟放女童隊振袂再成曲盡回風之妙分庭久立漸移愛日之隂再拜天階相将好去齋日致語口號旋復隂陽配五支於六幹誕彌歲月與元旦為三申神后降慶於當年曽孫効誠於兹旦不煩巧厯自契真符道俗讙謠天人協應太皇太后陛下功高任姒德配唐虞上推顧托之心下布仰成之政寳慈與儉蹈光憲之成規却敵安邦襲烈武之餘慶三朝順履萬壽維新雖絳縣之老人難窮甲子如楚南之靈木莫計春秋臣賤等草茅心傾葵藿採民謳於擊壤効樂語之陳詩媧皇得道自神仙金母長生不記年甲子㑹逢三朔旦歲星行㸔百周天消兵漸覺腰無犢種徳方知福有田彤管何人書後㑹椒花椿頌一時編黄樓致語口號百川返壑五稼登塲初成百尺之樓適及重陽之㑹高髙下下既休畚鍤之勞歲歲年年共覩茱萸之美恭惟知府學士民人所恃憂樂以時度餘力而取羨材因備灾而成勝事起東郊之壯觀破西楚之淫名賔客如雲來四方之豪傑鼓鐘隠地竦萬目之觀瞻實與徐民長為佳話一新柱石壯嚴闉更值西風落帽辰不用游從誇燕子直將氣焰壓波臣山川尚遶當時國城郭猶飄廣陌塵誰凭欄杆賞風月使君留意在斯民趙倅成伯母生日致語口號昔年占夢適當重九之佳辰今日獻香願祝大千之遐算慶婦姑之同日雜茱菊以稱觴殺雞已效於龎公剪髪敢資於陶母但某叨居樂部忝預年家不度蕪材上塵口號今朝壽酒泛黄花鬱鬱葱葱氣滿家願得唐兒舞一曲莫嫌國小向長沙王氏生子致語口號人中五日知織女之暫來海上三年喜花枝之未老事協紫銜之夢歡傾白髪之兒好人相逢一杯徑醉伏以某人女郎蒼梧仙裔南海貢餘憐謝瑞之早孤潛炊相助歎張鎬之沒興遇酒輒歡采楊梅而朝飛擘青蓮而暮返長新玉女之年貌未厭金膏而掃除萬里乗桴已慕仲尼而航海五絲繡鳯將從老子以俱仙東坡居士尊爼千峯笙簧萬籟聊設三山之湯餅共傾九醖之仙醪尋香而來苒天風之引步此興不淺炯江月之升樓羅浮山下已三春松筍穿階晝掩門太白猶逃水仙洞紫簫來問玉華君天容水色聊同夜髮澤膚光自鑑人萬户春風為子壽坐㸔滄海起揚塵寒食宴提刑致語口號良辰易失四者難并故人相逢五斗徑醉况中年離合之感正寒食清明之間時乎不可再來賢者而後樂此恭惟提刑學士才本天授學為人師事業存乎斯民文章葢其餘事望之已試於馮翊翁子暫還於㑹稽知府學士接好鄰邦締交冊府莫逆之契義等於天倫不腆之辭意勤於地主力講兩君之好可無七子之詩欲使異時争傳盛事雲間畫鼓疊春雷千騎尋芳戲馬臺半道已逢山簡醉萬人爭㸔謫仙來淮西按部威尤凜歴下懐仁首重回還把去年留客意折花臨水更徘徊東坡全集巻一百十五
