body:
  text: 東坡全集巻四十一宋蘓軾撰論一十九首易論易者卜筮之書也挾䇿布卦以分隂陽而明吉凶此日者之事而非聖人之道也聖人之道存乎其爻之辭而不在其數數非聖人之所盡心也然易始於八卦至於六十四此其為書未離乎用數也而世之人皆恥其言易之數或者言而不得其要紛紜迂闊而不可解此髙論之士所以不言歟夫易本於卜筮而聖人開言於其間以盡天下之人情使其為數紛亂而不可考則聖人豈肯以其有用之言而託之無用之數哉今夫易之所謂九六者老隂老陽之數也九為老陽而七為少陽六為老隂而八為少隂此四數者天下莫知其所為如此者也或者以為陽之數極於九而其次極於七故七為少而九為老至於老隂苟以為以極者而言也則老隂當十而少隂當八今少隂八而老隂反當其下之六則又為之説曰隂不可以有加於陽故抑而處之於下使隂果不可以有加於陽也而曷不曰老隂八而少隂六且夫隂陽之數此天地之所為也而聖人豈得與於其間而制其予奪哉此其尤不可者也夫隂陽之有老少此未嘗見於他書也而見於易易之所以或為老或為少者為夫揲蓍之故也故夫説者宜於其揲蓍焉而求之揲蓍之法曰掛一歸竒三揲之餘而以四數之得九而以為老陽得八而以為少隂得七而以為少陽得六而以為老隂然而隂陽之所以為老少者不在乎七八九六也七八九六徒以為識焉耳老者隂陽之純也少者隂陽之雜而不純者也陽數皆竒而隂數皆偶故乾以一為之爻而坤以二天下之物以少為主故乾之子皆二隂而坤之女皆二陽老陽老隂者乾坤是也少隂少陽者乾坤之子是也揲蓍者其一揲也少者五而多者九其二其三少者四而多者八多少者竒偶之象也一爻而三揲蓍譬如一卦而三爻也隂陽之老少於卦見之於爻而於爻見之於揲使其果有取於七八九六則夫此三揲者區區焉分其多少而各為處果何以為也今夫三揲而皆少此無以異於乾之三爻而皆竒也三揲而皆多此無以異於坤之三爻而皆偶也三揲而少者一此無以異於震坎艮之一竒而二偶也三揲而多者一此無以異於巽離兊之一偶而二竒也若夫七八九六此乃取以為識而非其義之所在不可以彊為之説也書論愚讀史記商君列傳觀其改法易令變更秦國之風俗誅秦民之議令者以數千人黥太子之師殺太子之傳而後法令大行蓋未嘗不壯其勇而有決也曰嗟夫世俗之人不可以慮始而可樂成也使天下之人各陳其所知而守其所學以議天子之事則事將有格而不得成者然及觀三代之書至其將有以矯拂世俗之際則其所以告諭天下者常丁寧激切亹亹而不倦務使天下盡知其君之心而又從而折其不服之意使天下皆信以為如此而後從事其言迴曲宛轉譬如平人自相議論而詰其是非愚始讀而疑之以為近於濡滯迂逺而無决然其使天下樂從而無黽勉不得已之意其事既發而無紛紜異同之論此則王者之意也故常以為當堯舜之時其君臣相得之心歡然樂而無間相與吁俞嗟嘆唯諾於朝廷之中不啻若朋友之親雖其有所相是非論辨以求曲直之際當亦無足怪者及至湯武征伐之際周旋反覆自述其用兵之意以明曉天下此又其勢然也惟其天下既安君民之勢闊逺而不同天子有所欲為而其匹夫匹婦私有異論於天下以齟齬其上之畫䇿令之而不肯聽當此之時刑驅而勢脅之天下夫誰敢不聽從而上之人優㳺而徐譬之使之信之而後從此非王者之心誰能處而待之而不倦歟蓋盤庚之遷天下皆咨嗟而不悦盤庚為之稱其先王盛德明聖而猶五遷以至於今今不承於古恐天之斷棄汝命不救汝死既又恐其不從也則又曰汝罔暨余同心我先后將降爾罪暨乃祖乃父亦將告我髙后曰作大戮於朕孫蓋其所以開其不悟之心而諭之以其所以當然者如此其詳也若夫商君則不然以為要使汝獲其利而何䘏乎吾之所為故無所求於衆人之論而亦無以告諭天下然其事亦終於有成是以後世之論以為三代之治柔懦不决然此乃王霸之所以為異也夫三代之君惟不忍鄙其民而欺之故天下有故而其議及於百姓以觀其意之所嚮及其不可聽也則又反覆而諭之以窮極其説而服其不然之心是以其民親而愛之嗚呼此王霸之所為不同也哉詩論自仲尼之亡六經之道遂散而不可解蓋其患在於責其義之太深而求其法之太切夫六經之道惟其近於人情是以乆傳而不廢而世之迂學乃皆曲為之説雖其義之不至於此者必彊牽合以為如此故其論委曲而莫通也夫聖人之為經惟其禮與春秋合然後無一言之虚而莫不可考然猶未嘗不近於人情至於書出於一時言語之間而易之文為卜筮而作故時亦有所不可前定之説此其於法度已不如春秋之嚴矣而况詩者天下之人匹夫匹婦羈臣賤𨽻悲憂愉佚之所為作也夫天下之人自傷其貧賤困苦之憂而自述其豐美盛大之樂上及於君臣父子天下興亡治亂之迹而下及於飲食牀笫昆蟲草木之類蓋其中無所不具而尚何以繩墨法度區區而求諸其間哉此亦足以見其志之無不通矣夫聖人之於詩以為其終要入於仁義而不責其一言之無當是以其意可觀而其言可通也今之詩傳曰殷其雷在南山之陽出自北門憂心殷殷揚之水白石鑿鑿終朝采緑不盈一掬瞻彼洛矣維水泱泱若此者皆興也而至於關關雎鳩在河之洲南有樛木葛藟纍之南有喬木不可休息維鵲有巢維鳩居之喓喓草蟲趯趯阜螽若此者又皆興也其意以為興者有所象乎天下之物以自見其事故凡詩之為此事而作其言有及於是物者則必彊為是物之説以求合其事蓋其為學亦已勞矣且彼不知夫詩之體固有比也而皆合之以為興夫興之為言猶曰其意云爾意有所觸乎當時時已去而不可知故其類可以意推而不可以言解也殷其雷在南山之陽此非有所取乎雷也蓋必其當時之所見而有動乎其意故後之人不可以求得其説此其所以為興也嗟夫天下之人欲觀於詩其必先知比興若夫關關雎鳩在河之洲是誠有取於其摯而有别是以謂之比而非興也嗟夫天下之人欲觀於詩其必先知夫興之不可與比同而無彊為之説以求合其當時之事則夫詩之意庶乎可以意曉而無勞矣禮論昔者商周之際何其為禮之易也其在宗廟朝廷之中籩豆簠簋牛羊酒醴之薦交於堂上而天子諸侯大夫卿士周旋揖讓獻酬百拜樂作於下禮行於上雍容和穆終日而不亂夫古之人何其知禮而行之不勞也當此之時天下之人惟其習慣而無疑衣服器皿冠冕佩玉皆其所常用也是以其人入於其間耳目聰明而手足無所忤其身安於禮之曲折而其心不亂以能深思禮樂之意故其亷恥退讓之節睟然見於面而盎然發於其躬夫是以能使天下觀其行事而忘其暴戾鄙野之氣至於後世風俗變易更數千年以至於今天下之事已大異矣然天下之人尚皆記録三代禮樂之名詳其節目而習其俯仰冠古之冠服古之服而御古之器皿傴僂拳曲勞苦於宗廟朝廷之中區區而莫得其紀交錯紛亂而不中節此無足怪也其所用者非其素所習也而彊使焉甚矣夫後世之好古也昔者上古之世蓋嘗有巢居穴處汙樽抔飲燔黍捭豚蕢桴土鼓而以為是足以養生送死而無以加之者矣及其後世聖人以為不足以大利於天下是故易之以宫室新之以籩豆鼎俎之器以濟天下之所不足而盡去太古之法惟其祭祀以交於鬼神乃始薦其血毛豚解而腥之體解而爓之以為是不忘本而非以為後世之禮不足用也是以退而體其犬豕牛羊實其簠簋籩豆鉶羮以極今世之美未聞其牽於上古之説巽愞而不決也且方今之人佩玉服韍冕而垂旒拱手而不知所為而天下之人亦且見而笑之是何所復望於其有以感發天下之心哉且又有所大不安者宗廟之祭聖人所以追求先祖之神靈庶幾得而享之以安䘏孝子之志者也是以思其平生起居飲食之際而設其器用薦其酒食皆從其生以冀其來而安之而後世宗廟之祭皆用三代之器則是先祖終莫得而安也蓋三代之時席地而食是以其器用各因其所便而為之髙下大小之制今世之禮坐於牀而食於牀上是以其器不得不有所變雖正使三代之聖人生於今而用之亦將以為便安故夫三代之視上古猶今之視三代也三代之器不可復用矣而其制禮之意尚可依倣以為法也宗廟之祭薦之以血毛重之以體薦有以存古之遺風矣而其餘者可以易三代之器而用今世之所便以從鬼神之所安惟其春秋社稷釋奠釋菜凡所以享古之鬼神者則皆從其器蓋周人之祭蜡與田祖也吹葦籥擊土鼓此亦各從其所安耳嗟夫天下之禮宏闊而難言自非聖人而何以處此故夫推之而不明講之而不詳則愚實有罪焉唯其近於正而易行庶幾天下之安而從之是則有取焉耳春秋論事有以拂乎吾心則吾言忿然而不平有以順適乎吾意則吾言優柔而不怒天下之人其喜怒哀樂之情可以一言而知也喜之言豈可以為怒之言耶此天下之人皆能辨之而至於聖人其言丁寧反覆布於方冊者甚多而其喜怒好惡之所在者又甚明而易知也然天下之人常患求而莫得其意之所主此其故何也天下之人以為聖人之文章非復天下之言也而求之太過是以聖人之言更為深逺而不可曉且天下何不以已推之也將以喜夫其人而加之以怒之之言則天下且以為病狂而聖人豈有以異乎人哉不知其好惡之情而不求其言之喜怒是所謂大惑也昔者仲尼刪詩於衰周之末上自商周之盛王至於幽厲失道之際而下訖於陳靈自詩人以來至於仲尼之世蓋已數百餘年矣愚嘗怪大雅小雅之詩當幽厲之時而稱道文武成康之盛德及其終篇又不見幽厲之暴虐此誰知其為幽厲之詩而非文武成康之詩者蓋察其辭氣有幽憂不樂之意是以系之幽厲而無疑也若夫春秋二百四十二年之間天下之是非雜然而觸乎其心見惡而怒見善而喜則求其是非之際又可以求諸其言之喜怒之間矣今夫人之於事有喜而言之者有怒而言之者有怨而言之者喜而言之則其言和而無傷怒而言之則其言厲而不温怨而言之則其言深而不洩此其大凡也春秋之於仲孫湫之來曰齊仲孫來於季友之歸曰季子來歸此所謂喜之之言也於魯鄭之易田曰鄭伯以璧假許田於晉文之召王曰天王狩于河陽此所謂怒之之言也於叔牙之殺曰公子牙卒於慶父之奔曰公子慶父如齊此所謂怨之之言也夫喜之而和怒之而厲怨之而深此三者無以加矣至於公羊穀梁之傳則不然日月土地皆所以為訓也夫日月之不知土地之不詳何足以為喜而何足以為怒此喜怒之所不在也春秋書曰戎伐凡伯于楚丘而以為衛伐凡伯春秋書曰齊仲孫來而以為呉仲孫怒而至於變人之國此又喜怒之所不及也愚故曰春秋者亦人之言而已而人之言亦觀其辭氣之所嚮而已矣中庸論上甚矣道之難明也論其著者鄙滯而不通論其㣲者汗漫不可考其弊始於昔之儒者求為聖人之道而無所得於是務為不可知之文庶幾乎後世之以我為深知之也後之儒者見其難知而不知其空虚無有以為將有所深造乎道者而自恥其不能則從而和之曰然相欺以為髙相習以為深而聖人之道日以逺矣自子思作中庸儒者皆祖之以為性命之説嗟夫子思者豈亦斯人之徒歟蓋嘗試論之夫中庸者孔氏之遺書而不完者也其要有三而已矣三者是周公孔子之所從以為聖人而其虛詞蔓延是儒者之所以為文也是故去其虚詞而取其三其始論誠明之所入其次論聖人之道所從始推而至於其所終極而其卒乃始内之於中庸蓋以為聖人之道略見於此矣記曰自誠明謂之性自明誠謂之敎誠則明矣明則誠矣夫誠者何也樂之之謂也樂之則自信故曰誠夫明者何也知之之謂也知之則逹故曰明夫惟聖人知之者未至而樂之者先入先入者為主而待其餘則是樂之者為主也若夫賢人樂之者未至而知之者先入先入者為主而待其餘則是知之者為主也樂之者為主是故有所不知知之未嘗不行知之者為主是故雖無所不知而有所不能行子曰知之者不如好之者好之者不如樂之者知之者與樂之者是賢人聖人之辨也好之者是賢人之所由以求誠者也君子之為學慎乎其始何則其所先入者重也知之多而未能樂焉則是不如不知之愈也人好惡莫如好色而惡臭是人之性也好善如好色惡惡如惡臭是聖人之誠也故曰自誠明謂之性孔子蓋長而好學適周觀禮問於老耼師襄之徒而後明於禮樂五十而後讀易蓋亦有晚而後知者然其所先得於聖人者是樂之而已孔子厄於陳蔡之間問於子路子貢二子不悦而子貢又欲少貶焉是二子者非不知也其所以樂之者未至也且夫子路能死於衛而不能不慍於陳蔡是豈其知之罪也故夫弟子之所為從孔子㳺者非専以求聞其所未聞蓋將以求樂其所有也明而不誠雖挾其所有倀倀乎不知所以安之苟不知所以安之則是可與居安而未可與居憂患也夫惟憂患之至而後誠明之辨乃可以見由此觀之君子安可以不誠哉中庸論中君子之欲誠也莫若以明夫聖人之道自本而觀之則皆出於人情不循其本而逆觀之於其末則以為聖人有所勉强力行而非人情之所樂者夫如是則雖欲誠之其道無由故曰莫若以明使吾心曉然知其當然而求其樂今夫五常之敎惟禮為若强人者何則人情莫不好逸豫而惡勞苦今吾必也使之不敢箕踞而罄折百拜以為禮人情莫不樂富貴而羞貧賤今吾必也使之不敢自尊而卑讓退抑以為禮用器之為便而祭器之為貴䙝衣之為便而衮冕之為貴哀欲其速已而伸之三年樂欲其不已而不得終日此禮之所以為强人而觀之於其末者之過也盍亦反其本而思之今吾以為罄折不如立之安也而將惟安之求則立不如坐坐不如箕踞箕踞不如偃仆偃仆而不已則將裸袒而不顧苟為裸袒而不顧則吾無乃亦將病之夫豈獨吾病之天下之匹夫匹婦莫不病之也苟為病之則是其勢將必至於罄折而百拜由此言之則是罄折而百拜者生於不欲裸袒之間而已也夫豈惟罄折百拜將天下之所謂强人者其皆必有所從生也辨其所從生而推之至於其所終極是之謂明故記曰君子之道費而隠夫婦之愚可以與知焉及其至也雖聖人有所不知焉夫婦之不肖可以能行焉及其至也雖聖人有所不能焉君子之道推其所從生而言之則其言約約則明推其逆而觀之故其言費費則隠君子欲其不隠是故起於夫婦之有餘而推之至於聖人之所不及舉天下之至易而通之於至難使天下之安其至難者與其至易無以異也孟子曰簞食豆羮得之則生不得則死嘑爾而與之行道之人弗受蹴爾而與之乞人不屑也萬鍾則不辨禮義而受之萬鍾於我何加焉向為身死而不受今為朋友妻妾之奉而為之此之謂失其本心且萬鍾之不受是王公大人之所難而以行道乞人之所不屑而較其輕重是何以異於匹夫匹婦之所能行通而至於聖人之所不及故凡為此説者皆以求安其至難而務欲誠之者也天下之人莫不欲誠而不得其説故凡此者誠之説也中庸論下夫君子雖能樂之而不知中庸則其道必窮記曰君子遵道而行半途而廢吾弗能已矣君子非其信道之不篤也非其力行之不至也得其偏而忘其中不得終日安行乎通塗夫雖欲不廢其可得耶記曰道之不行也我知之矣賢者過之不肖者不及也以為過者之難歟復之中者之難歟宜若過者之難也然天下有能過而未有能中則是復之中者之難也記曰天下國家可均也爵禄可辭也白刃可蹈也中庸不可能也既不可過又不可不及如斯而已乎曰未也孟子曰執中為近執中無權猶執一也書曰不協于極不罹于咎皇則受之又曰㑹其有極歸其有極而記曰君子之中庸也君子而時中皇極者有所不極而㑹于極時中者有所不中而歸於中吾見中庸之至於此而尤難也是有小人之中庸焉有所不中而歸於中是道也君子之所以為時中而小人之所以為無忌憚記曰小人之中庸也小人而無忌憚也嗟夫道之難言也有小人焉因其近似而竊其名聖人憂思恐懼是故反覆而言之不厭何則是道也固小人之所竊以自便者也君子見危則能死勉而不死以求合於中庸見利則能辭勉而不辭以求合於中庸小人貪利而苟免而亦欲以中庸之名私自便也此孔子孟子之所為惡鄉原也一鄉皆稱原人焉無所往而不為原人同乎流俗合乎汙世曰古之人行何為踽踽涼涼生斯世也善斯可矣以古之人為迂而以今世之所善為足以已矣則是不亦近似於中庸邪故曰惡紫恐其亂朱也惡莠恐其亂苗也何則惡其似也信矣中庸之難言也君子之欲從事乎此無循其迹而求其味則幾矣記曰人莫不飲食也鮮能知味也論好德錫之福昔聖人既陳五常之道而病天下不能萬世而常行也故為之大中之敎曰賢者無所過愚者無所不及是之謂皇極極之於人也猶方之有矩也猶圓之有規也皆有以繩乎物者也聖人安焉而入乎其中賢者俛而就之愚者跂而及之聖人以為俛與跂者皆非其自然而猶有以强之者故於皇極之中又為之言曰苟有過與不及而要其終可以歸皇極之道者是皇極而已矣故洪範曰凡厥庶民有猷有為有守汝則念之不協于極不罹于咎皇則受之又悲天下有為善之心而不得為善之利也有求中之志而不知求中之道也故又為之言曰而康而色曰予攸好德汝則錫之福時人斯其惟皇之極聖人之待天下如此其廣也其誘天下之人不忍使之至於罪戾如此其勤且備也天下未有好德之實而自言曰予攸好德聖人以為是亦有好德之心矣故受而爵禄之天下之為善而未協于中也則受而敎誨之又恐夫民之愚而不我從也故遜其言卑其色以下之如是而不從然後知其終不可以敎誨矣故又為之言曰凡厥正人既富方穀汝弗能使有好于而家時人斯其辜于其無好德汝雖錫之福其作汝用咎且夫其始也恐天下之人有可以至於皇極之道而上之人不誘而敎誨之也故曰予攸好德汝則錫之福其終也恐天下之以虛言而取其爵禄也故曰于其無好德汝雖錫之福其作汝用咎蓋聖人之用心憂其始之不幸而懼其終之至於僥倖也故其言如此之詳備夫君子小人不可以一道待也故皇極之中有待小人之道不協于極而猶受之至於待君子之道何其責之深也曰無偏無黨無反無側無有作好無有作惡而後可以合於皇極然則先王御天下之術蓋用此歟論鄭伯克段于鄢隠元年春秋之所深譏聖人之所哀傷而不忍言者三晉趙鞅帥師納衞世子蒯瞶于戚齊國夏衞石曼姑帥師圍戚而父子之恩絶公與夫人姜氏遂如齊而夫婦之道喪鄭伯克段于鄢而兄弟之義亡此三者天下之大戚也夫子傷之而思其所以至此之由故其言尤為深且逺也且夫蒯聵之得罪於靈公逐之可也逐之而立其子是召亂之道也使輒上之不得從王父之言下之不得從父之令者靈公也故書曰晉趙鞅帥師納衞世子蒯聵于戚蒯聵之不去世子者是靈公不得乎逐之之道靈公何以不得乎逐之之道逐之而立其子也魯桓公千乘之君而陷於一婦人之手夫子以為文姜之不足譏而傷乎桓公制之不以漸也故書曰公與夫人姜氏遂如齊言其禍自公作也段之禍生於愛鄭莊公之愛其弟也足以殺之耳孟子曰舜封象於有庳使之源源而來不及以政孰知夫舜之愛其弟之深而鄭莊公賊之也當太叔之據京城取廩延以為已邑雖舜復生不能全兄弟之好故書曰鄭伯克段于鄢而不曰鄭伯殺其弟段以為當斯時雖聖人亦殺之而已矣夫婦父子兄弟之親天下之至情也而相殘之禍至如此夫豈一日之故哉穀梁曰克能也能殺也不言殺見段之有徒衆也段不稱弟不稱公子賤段而甚鄭伯也于鄢逺也猶曰取之其母之懐中而殺之云爾甚之也然則為鄭伯宜奈何緩追逸賊親親之道也嗚呼以兄弟之親至交兵而戰固親親之道絶已乆矣雖緩追逸賊而其存者幾何故曰於斯時也雖聖人亦殺之而已矣然而聖人固不使至此也公羊傳曰母欲立之已殺之如勿與而已矣而又區區於當國内外之言是何思之不逺也左氏以為段不弟故不稱弟如二君故曰克稱鄭伯譏失敎求聖人之意若左氏可以有取焉論鄭伯以璧假許田桓元年鄭伯以璧假許田先儒之論多矣而未得其正也先儒皆知夫春秋立法之嚴而不知其甚寛且恕也皆知其譏不義而不知其譏不義之所由起也鄭伯以璧假許田者譏隠而不譏桓也始其謀以周公之許田而易泰山之祊者誰也受泰山之祊而入之者誰也隠既已與人謀而易之又受泰山之祊而入之然則為桓公者不亦難乎夫子知桓公之無以辭於鄭也故譏隠而不譏桓何以言之隠八年書曰鄭伯使宛來歸祊又曰庚寅我入祊入祊云者見魯之果入泰山之祊也則是隠公之罪既成而不可變矣故桓元年書曰鄭伯以璧假許田而已夫許田之入鄭猶祊之入魯也書魯之入祊而不書鄭之入許田是不可以不求其説也鄭伯使宛來歸祊庚寅我入祊見鄭之來歸而魯之入之也鄭伯以璧假許田者見鄭之來請不見魯之與之也見鄭之來請而不見魯之與之者見桓公之無以辭於鄭也嗚呼作而不義使後世無以辭焉則夫子之罪隠深矣夫善觀春秋者觀其意之所嚮而得之故雖夫子之復生而無以易之也公羊曰曷為繫之許近許也諱取周田也穀梁曰假不言以以非假也非假而曰假諱易地也春秋之所為諱者三為尊者諱敵為親者諱敗為賢者諱過魯親者也非敗之為諱而取易之為諱是夫子之私魯也論取郜大鼎于宋桓二年孔子何為而作春秋哉舉三代全盛之法以治僥倖苟且之風而歸之於至正而已矣三代之盛時天子秉至公之義而制諸侯之予奪故勇者無所加乎怯弱者無所畏乎强匹夫懷璧而千乘之君莫之敢取焉此王道之所由興也周衰諸侯相并而强有力者制其予奪邾莒滕薛之君惴惴焉保其首領之不暇而齊晉秦楚有吞諸侯之心孔子慨然歎曰乆矣諸侯之恣行也後世將有王者作而不遇焉命也故春秋之法皆所以待後世王者之作而舉行之也鍾鼎龜玉天子之所以分諸侯使諸侯相傳而世守也桓二年取郜大鼎于宋戊申納于太廟且夫鼎也不幸使齊挈而有之是齊鼎也是百傳而不易未可知也仲尼曰不然是鼎也何為而在魯之太廟曰取之宋宋安得之曰取之郜故書曰郜鼎郜之得是鼎也得之天子宋以不義取之而又以與魯也後世有王者作舉春秋之法而行之魯將歸之宋宋將歸之郜而後已也昔者子路問孔子所以為政之先子曰必也正名乎故春秋之法尤謹於正名至於一鼎之㣲而不敢忽焉聖人之用意蓋深如此夫以區區之魯無故而得器是召天下之爭也楚王求鼎于周王曰周不愛鼎恐天下以器讎楚也鼎入宋而為宋入魯而為魯安知夫秦晉齊楚之不動其心哉故書曰郜鼎明魯之不得有以塞天下之爭也穀梁傳曰納者内弗受也以為周公不受也又曰號從中國名從主人而左氏記臧哀伯之諫愚於公羊有取焉曰器從名地從主人宋始以不義取之故謂之郜鼎至於地之與人則不然俄而可以為其有矣善乎斯言吾有取之論齊侯衞侯胥命于蒲桓三年荀卿有言曰春秋善胥命詩非屢盟其心一也敢試論之謹按桓三年書齊侯衞侯胥命于蒲説春秋者鈞曰近正所謂近正者以其近古之正也古者相命而信約言而退未嘗有㰱血之盟也今二國之君誠信協同約言而㑹可謂近古之正者已何以言之春秋之時諸侯競騖争奪日尋拂違王命糜爛生聚前日之和好後日之戰攻曽何正之尚也觀二國之君胥命于蒲自時厥後不相侵伐豈與夫前日之和好後日之戰攻者班也故聖人於春秋止一書胥命而已荀卿謂之善者取諸此也然則齊也衞也聖人果善之乎曰非善也直譏爾曷譏爾譏其非正也周禮大宗伯掌六禮以諸侯見王為文乃有春朝夏宗秋覲冬遇時會衆同之法言諸侯非此六禮罔得踰境而出矣不識齊衞之君以春朝相命而出耶以夏宗相命而出耶或以秋覲相命而出耶以冬遇相命而出耶或以時㑹相命而出耶衆同相命而出耶非春朝夏宗秋覲冬遇時㑹衆同而出則私相為㑹耳私相為㑹匹夫之舉也以匹夫之舉而謂之正其可得乎宜乎聖人大一王之法而誅之也然而聖人之意豈獨誅齊衞之君而已哉所以正萬世也荀卿不原聖人書經之法而徒信傳者之説以謂春秋善胥命失之逺矣且春秋二百四十二年間諸侯之賢者固亦鮮矣奚特於齊衞之君而善其胥命耶信斯言也則姦人得以勸也未嘗聞聖人作春秋而勸姦人也論禘于太廟用致夫人僖八年甚哉去聖之乆逺三傳紛紛之不同而莫或折之也禘于太廟用致夫人左氏曰禘而致哀姜非禮也凡夫人不薨於寢不殯於廟不赴於同不祔於姑則弗致也公羊曰夫人何以不氏譏以妾為妻也蓋聘于楚而脅于齊媵女之先至者也穀梁曰成風也言夫人而不言氏姓非夫人也立妾之詞非正也夫人之我可以不夫人乎夫人卒葬之我可以不卒葬之乎一則以宗廟臨之而後貶焉一則以外之弗夫人而見正焉三家之説左氏踈矣夫人與公一體也有曰公曰夫人既葬公以諡配公夫人以諡配氏此其不易之例也蓋有既葬稱諡而不稱夫人者矣天王使宰咺來歸恵公仲子之賵秦人來歸僖公成風之襚而未有不稱諡而稱夫人也公羊之説又非人情無以信於後世以齊楚之彊齊能脅魯使以其媵妾為夫人而楚乃肯安然使其女降為妾哉此甚可怪也且夫成風之為夫人非正也春秋以為非正而不可以廢焉故與之不足之文而已矣方其存也不可以不稱夫人而去其氏及其没也不可以不稱諡而去其夫人皆所以示不足於成風也况乎禘周公而用致焉則其罪固已不容於貶矣故公羊曰用者不宜用者也致者不宜致者也禘用致夫人非禮也論閏月不告朔猶朝于廟文六年春秋之文同其所以為文異者君子觀其意之所在而已矣先儒之論閏月不告朔者牽乎猶朝于廟之説而莫能以自解也春秋之所以書猶者二曰如此而猶如此者甚之之詞也辛巳有事于太廟仲遂卒于垂壬午猶繹是也曰不如此而猶如此者幸之之詞也不郊猶三望閏月不告朔猶朝于廟是也夫子傷周道之殘缺而禮樂文章之壞也故區區焉掇拾其遺亡以為其全不可得而見矣得見一二斯可矣故書曰猶朝于廟者傷其不告朔而幸其猶朝于廟也夫子之時告朔之禮亡矣而有餼羊者存焉夫子猶不忍去以志周公之典則其朝于廟者乃不如餼羊之足存歟公羊傳曰曷為不言告朔天無是月也穀梁傳曰閏月者附月之餘日也天子不以告朔而喪事不數也而皆曰猶者可以已也是以其幸之之詞而為甚之之詞宜其為此異端之説也且夫天子諸侯之所為告朔聽政者以為天歟為民歟天無是月而民無是月歟彼其孝子之心不欲因閏月以廢喪紀而人君乃欲假此以廢政事歟夫周禮樂之衰豈一日之故有人焉開其端而莫之禁故其漸遂至於掃地而不可救文十六年夏六月公四不視朔公羊傳曰公有疾也何言乎公有疾不視朔自是公無疾不視朔也故夫有疾而不視朔者無疾而不視朔之原也閏月而不告朔者常月而不告朔之端也聖人憂焉故謹而書之所以記禮之所由廢也左氏傳曰閏以正時時以作事事以厚生生民之道於是乎在不告閏朔棄時政也何以為民而杜預以為雖朝于廟則如勿朝以釋經之所書猶之意是亦曲而不通矣論用郊成十七年先儒之論或曰魯郊僣也春秋譏焉非也魯郊僣也而春秋之所譏者當其罪也賜魯以天子之禮樂者成王也受天子之禮樂者伯禽也春秋之譏魯郊也上則譏成王次則譏伯禽成王伯禽不見於春秋而夫子無所致其譏也無所致其譏而不譏者春秋之所以求信於天下也夫以魯而僣天子之郊其罪惡如此之著也夫子以為無所致其譏而不譏焉則其譏之者固天下之所用而信之也郊之書於春秋者其類有三書卜郊不從乃免牲者譏卜常祀而不譏郊也鼷䑕食郊牛角郊牛之口傷改卜牛者譏養牲之不謹而不譏郊也書四月五月九月郊者譏郊之不時而不譏郊也非卜常祀非養牲之不謹非郊之不時則不書不書則不譏也禘于太廟者為致夫人而書也有事于太廟者為仲遂卒而書也春秋之書郊者猶此而已故曰不譏郊也郊祀者先王之大典而夫子不得見之於周也故因魯之所有天子之禮樂而記郊之變焉耳成十七年九月辛丑用郊公羊傳曰用者不宜用者也九月非所用郊也穀梁傳曰夏之始猶可以承春以秋之末承春之始蓋不可矣且夫郊未有至九月者也曰用者著其不時之甚也杜預以為用郊從史文或説用然後郊者皆無取焉論㑹于澶淵宋災故襄三十年春秋之時忠信之道缺大國無厭而小國屢叛朝戰而夕盟朝盟而夕㑹夫子蓋厭之矣觀周之盛時大宗伯所制朝覲㑹同之禮各有逺近之差逺不至於疎而相忘近不至於數而相瀆春秋之際何其亂也故曰春秋之盟無信盟也春秋之㑹無義㑹也雖然紛紛者天下皆是也夫子將譏之而以為不可以勝譏之也故擇其甚者而譏焉桓二年㑹于稷以成宋亂襄三十年㑹于澶淵宋災故皆以深譏而切責之也春秋之書㑹多矣書其所㑹而不書其所以㑹書其所以㑹桓之稷襄之澶淵而已矣宋督之亂諸侯將討之桓公平之不義孰甚焉宋之災諸侯之大夫㑹以謀歸其財既而無歸不信孰甚焉非不義不信之甚春秋之譏不至於此也左氏之論得其正矣皆諸侯之大夫而書曰某人某人㑹于澶淵宋災故尤之也不書魯大夫諱之也且夫見鄰國之災匍匐而救之者仁人君子之心也既言而忘之既約而背之委巷小人之事也故書其始之為君子仁人之心而後可以見後之為委巷小人之事春秋之意蓋明白如此而公羊傳曰㑹未有言其所為者此言其所為何録伯姬也且春秋為女子之不得其所而死區區焉為人之死録之是何夫子之志不廣也穀梁曰不言災故則無以見其為善澶淵之㑹中國不侵夷狄夷狄不入中國無侵伐八年善之也晉趙武楚屈建之力也如穀梁之説宋之盟可謂善矣其不曰息兵故何也嗚呼左氏得其正矣論黑肱以濫來奔昭三十一年諸侯之義守先君之封土而不敢有失也守天子之疆界而不敢有過也故夫以力而相奪以兵而相侵者春秋之所謂暴君也侵之雖不以兵奪之雖不以力而得之不義者春秋之所謂汙君也鄭伯以璧假許田晉侯使韓穿來言汶陽之田歸之于齊此諸侯之以不義而取魯田者也邾庶其以漆閭丘來奔莒牟夷以防兹來奔黑肱以濫來奔此魯之以不義而取諸侯之田者也諸侯以不義而取魯田魯以不義而取諸侯之田皆不容於春秋者也夫子之於庶其牟夷黒肱也責之薄而於魯也罪之深彼其竊邑叛君為穿窬之事市人屠沽且羞言之而安足以重辱君子之譏哉夫魯周公之後守天子之東藩招聚小國叛亡之臣與之為盜竊之事孔子悲傷而悼痛之故於三叛之人具文直書而無隠諱之詞蓋其罪魯之深也先儒之説區區於叛人之過惡其論固已狹矣且夫春秋豈為穿窬竊盜之人而作哉使天下之諸侯皆莫肯容夫如此之人而穿窬盜竊之事將不禁而自絶此春秋之所以用意於其本也左氏曰或求名而不得或欲蓋而名彰書齊豹盜三叛人名而公羊之説最為疎謬以為叔術之後而通濫於天下故不繫黒肱於邾嗚呼誰謂孔子而賢叔術耶蓋嘗論之黒肱之不繫邾也意其若欒盈之不繫于晉歟欒盈既奔齊而還入曲沃以叛故書曰欒盈入于晉黒肱或者既絶于邾而歸竊其邑以叛歟當時之簡牘既亡其詳不可得而聞矣然以類而求之或亦然歟穀梁曰不言邾别乎邾也不言濫子非天子之所封也此尤迂闊而不可用矣論春秋變周之文何休解三家之傳迂誕竒怪之説公羊為多而何休又從而附成之後之言春秋者黜周王魯之學與夫䜟緯之書者皆祖公羊公羊無明文何休因其近似而附成之愚以為何休公羊之罪人也凡所謂春秋變周之文從商之質者皆出於何氏愚未嘗觀焉滕侯薛侯來朝齊侯使其弟年來聘何休曰質家親親故先滕侯而加録齊侯之母弟且夫親親者周道也先宗盟而後異姓者周制也鄭忽出奔衞公羊傳曰忽何以名春秋伯子男一也詞無所貶何休曰商爵三等春秋變周五等之爵而從焉記曰諸侯失地名而文十二年郕伯來奔公羊亦曰何以不名兄弟詞也忽之出奔其為失國豈不甚明而春秋獨無貶哉雖然公羊何為而為此説也春秋未踰年之君皆稱子而忽獨不然此公羊之所以為此説也且春秋之書夫豈一槩衞宣未葬而嗣子稱侯以出㑹書曰及宋公衞侯燕人戰鄭忽外之無援内之無黨一夫作難奔走無告鄭人賤之故赴以名書曰鄭忽出奔衞衞侯未踰年之君也鄭忽亦未踰年之君也因其自侯而侯之因其自名而名之皆所以變常而示譏也且夫以例而求春秋者乃愚儒之事也孔子行夏之時乘殷之輅服周之冕又曰郁郁乎文哉吾從周由此觀之夫子皆有取於三代而周居多焉况乎採周公之集以作春秋而曰變周之文者吾不信也東坡全集巻四十一
