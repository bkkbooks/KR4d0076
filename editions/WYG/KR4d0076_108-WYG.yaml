body:
  text: 東坡全集巻一百八宋蘓軾撰外制制勅七十四首李之純可集賢殿修撰河北都轉運使敕乃者役錢貸息之弊民兵馬政之勞萃于北方而天不靖民河溢為灾老㓜奔走流離道路十年於此矣嗚呼其孰為朕勞来安集使復其舊乎以爾中大夫直龍圖閣權知滄州李之純治辦之能嘗見於用忠厚之質不移於勢是用進秩書殿増重使指其徃撫疲瘵之俗察貪暴之吏無縱詭随以謹無良朕將酌民言以觀汝政可不勉歟可吕大臨太學博士敕具官吕大臨大學禮義之所從出也不擇人以為法而恃法以為治可乎漢之郭㤗符融唐之陽城韓愈士皆靡然化之其賢於法逺矣朕方詔有司䟽理學政而近侍之臣言汝可用必能於法禁之外使士有所愧而不為乃稱朕意可羅適知開封縣程之邵知祥符縣敕某等赤縣之衆甚於劇郡五方豪傑之林百賈盗賊之淵盖自平時號為難治而况市易始去逋負尚繁役法初復農民未信以爾適學行純固有䘏民之心以爾之邵才力强敏無媮安之意各服乃事以觀其能不患不已知求為可知者可杜純可刑部員外郎敕具官杜純用法如權衡權可以輕重移而衡不可以毫髪欺故司冦之職必有守道之長貳而輔之以守官之僚属汝昔為士師秉節不回獨持正議以直羣枉徃服厥官無易汝守以不忍之心行無心之法則予汝嘉可劉霆知陳留縣敕具官劉霆縣劇而難治故有司艱於用人地近而易知故才者樂於自用臨政以簡决獄以明御吏以嚴去盗以武能此四者孰不汝知可皇伯仲煜可贈保寧軍節度使東陽郡王敕祖宗之徳天地並隆施及子孫皆享民社勝衣有朝請之奉闔棺有茅土之封始終之間哀榮斯極具官仲曄寛厚寡過雍容有常生不勤於父師沒見思於姻族既得考終之道可無追逺之恩豹尾神旗守臣之威命金璽盭綬諸侯之寵章服我寵光以賁窀穸可杜紘可右司郎中勅具官杜紘士一厯都司即踐清要非一時名勝不在此選爾以文無害而宿其業徃服乃事益茂厥徳以稱朕命可皇城使裴景知慈州荘宅副使郭逢知階州西京左藏庫副使王克詢知順安軍敕具官某等朕銓擇將吏視其才力彊敏可任以事者必試之治民茍不知愛民奉法馭吏而戢士雖智勇有聞朕無取焉爾等皆以考績察㢘號稱明練薦者交章故在此選徃服厥官無失朕命可依云云借職楊晟該差使吳奉雲等各轉一官敕某等向敕邉臣増葺城堡所以䕶安民夷各全其生爾能相率獻田出力有足嘉者服我爵秩永保忠順可吕大忠可發運副使敕具官吕大忠發運使按治六路所部㡬萬里持節出使未有若此其重者也以爾更練世故果於從政屢試劇部厥聲藹然是以命爾均南北之有無權貨幣之輕重使農末俱利公私宜之以稱朕意可蔣之竒可集賢殿脩撰知廣州敕具官蔣之竒按治嶺海統制南極聲教所暨聳聞風采自唐以来不輕付予朕既擇其人復寵以秘殿之職使民夷縱觀知其輟自禁嚴以見朝廷重逺之意其於服従畏信豈不有助也哉可吳安持知蘇州劉珵知滑州敕具官某等兩河之俗朴其弊也悍而輕犯法三吳之俗巧其弊也流而不知止惟君子為能去其巳甚濟其所不及故所居而民安之朕求二郡守訪之左右咸曰汝宜徃服朕訓因俗而治可依云云謝卿材可陕西轉運使敕具官謝卿材治邉者不計財惟邉之所用治財者不䘏民惟財之為富此古今之通患也朕知汝才知可倚忠厚可信故以西方之政責成於汝往與帥守者謀之惟適厥中以民為本可李曼知果州敕具官李曼蜀之人治蜀知其好惡察其情偽宜若易然又况於寛而明和而毅如汝曼者乎乃者無實之訴朕既察之矣乗傳西歸平賦役省條教以慰父老之望可黎珣知南雄州敕具官黎珣嶺海之逺吏輕為姦非良守令民無所赴告徃祗厥官如在近甸則予汝嘉可張赴再任乾寧軍敕具官張赴使者言汝為政有方民甚宜之當解而留以慰民望可不勉哉可皇伯仲嬰可贈㤗國軍節度使追封申國公敕祖宗之意仁孝為先孝故専篤於親仁故閔勞以事雖豐功盛烈不見於宗室而令名美實克全於始終死喪之戚哀歎何及具官仲嬰少而簡素輔以温文既克已以歸仁亦樂善而忘勢信順多助盖大有上吉之祥髙明令終真既醉太平之福建元戎之六纛錫上公之九章維以勸忠豈云虚授庶㡬幽壤服我寵靈可林郡開封推官敕具官林郡天府之劇古稱難治非兼人之資有不能濟今自逋負逃亡悉歸之四廂宜若易辦然夫辦之易則責之詳爾材敏素聞而以舉用徃助乃長使治衆如治寡以稱所舉可鄧羲叔可主客郎中王諤可水部郎中敕具官某等吏惡數易而事有不得已者通商惠農水政為急而招携柔逺賔客之事亦重矣各祗乃事為安官樂職之計可依云云王荀龍知棣州敕具官王荀龍平原厭次沃野千里桑麻之富衣被天下宜得老成循吏以輔安良民式遏姦慝訪之左右咸曰汝宜徃悉乃心朕將觀焉可黄憲章獲賊可承事郎敕具官黄憲章勞能之賞不計日月爵禄之報必視首功宜從遷秩之勞以勸追胥之勇可御史中丞劉摯可兼侍讀敕孟子有言君仁莫不仁君義莫不義一正君而天下定矣朕惟臺諌言責之臣雖知無不言常救之於巳失而勸講進讀之士盖朝夕納誨故日化而不知合於孟子正君之義非獨有司之事也具官劉摯以道事君非法不言使朕日聞所不聞天下稱焉宜因古今冊書之成文取其興壊治忽之要論言之於無事救之於未失使朕立於無過之地豈非汝爭臣之大願乎可處士王臨可試太學録敕具官王臨觀近臣以其所為主觀逺臣以其所主朕初不汝知也而光論汝可用其試之太學汝勉之矣朕既因光以知汝亦将考汝所為而觀光焉可皇叔克眷可贈曹州觀察使追封濟隂侯敕先王建邦啓土必先宗盟上自魯衛下至應韓側室之子莫不南面國家自仁率親専於教愛故生無吏責而富以禄没享隆名而告諸幽忠怒之道可謂備矣具官克眷以茂美之質服信厚之化雖功名才業不見於用而恭儉孝悌刑于厥官命以㢘車即侯其地皆國之舊非朕敢私庶㡬有知服我休命可冦彦卿彦明左班殿直以兄殿直冦彦古永樂成死事敕具官冦彦卿士不惜以身狥國朕獨何愛一官不以收恤其家乎祗服朕命毋忘死者可駙馬都尉張敦禮可節度觀察留後敕軒冕之来徳量為稱外無充詘之容可以觀徳内若固有之安可以言量具官張敦禮少以經術秀於士林雖縁姻戚之選不失儒素之行日奉朝請既抱才而未試坐閱歲月亦久次而當遷進居兩使之間増重諸倩之遇益礪士節以為國華可内人張氏可特封典賛敕張氏朕㓜學之初未就外傅命爾執業以待左右勤勞有年恭謹寡過進掌儀範以旌徽柔可故尚宫趙氏可特贈郡君敕趙氏先朝差擇女士以輔隂教侍御左右罔匪淑人矧兹六尚之選必備四教之法奄焉淪喪宜極哀榮以爾名族之英掖廷之舊行應圖史言中物則彤管有煒既傳好徳之芳象服是宜無愧飾終之典庶㡬幽壤服我寵章可馮宗道可右騏驥使内侍省内侍押班梁惟簡可文思副使内侍省内侍押班敕具官某等爵禄天下之公器也朕不敢以私暱之愛而輕用其賞亦不敢以近習之嫌而不録其功以爾等小心忠孝逮事列聖出入中外劬勞百為而宗道以藩邸攀附之勤惟簡以東朝奉事之久各還所寄加重其任益勵素丹以稱異恩可依云云梁從吉可遥郡團練使入内内侍省副都知敕祖宗之化自家刑國故雖左右近習之臣莫不好善而知義彬彬然有士君子之風焉具官梁從吉荘重有守温良寡過給事宫省知無不為服勤邉徼克有成績改錫戎團之命進助内宰之政益勵素守以稱異恩可劉有方可内侍省右班副都知敕祖宗之化自家刑國故雖左右近習之臣莫不好善而知義彬彬然有士君子之風焉具官劉有方温恭和毅勤强練宻進從王事以法令為師退安私室以圖史為樂進領右璫之貳益親中禁之嚴惟忠與敬乃稱朕命可翟思知泉州周之純知秀州沈季長知南康軍敕具官某等朕惟四海之廣一夫不獲足以害教化之成傷隂陽之和故選建守長必以學士大夫為先孔子曰君子學道則愛人小人學道則易使也爾等皆以儒術進有聞于時矣其深識朕意徃行所聞欽哉可馬𫝊正大理寺主簿敕具官馬𫝊正哀敬折獄明啓刑書理官之任也主簿雖卑亦有事於其間矣爾以選用其勉服此言可張之諌權知涇州康識權發遣鄜州敕具官某等邉郡之政兵食為先郡守之責文武兼綜以爾等才力之選卓然有聞治辦之效見于已試朕雖招携来逺不求邉功爾當積榖訓兵常若冦至祗率厥服徃惟欽哉可依云云梁諝可供備庫副使轉出敕具官梁諝奉事之久累勞當陞求從外遷亦各其志進貳諸使徃齒外朝益務㢘平以答休寵可燕若古知渝州敕具官燕若古汝向以才選奉使東方官省而歸因以得郡盖可謂異恩矣巴峡之嶮邑居褊陋負山臨谷以争尋常獨渝為大州水土和易商農㑹通賦役爭訟甲於旁近毋以僻逺鄙夷其民欽哉可刪定官孫諤鮑朝賔並宣議郎敕具官某等廷見乃官法之所嚴也嵗月之課保任之數差若銖黍輙不得遷今於汝獨畧之者豈非以制法定令汝與其議故歟祗服朕命以法自律無徒知之可王振可大理少卿敕具官王振任法而不任人則法有不通無以盡萬變之情任人而不任法則人各有意無以定一成之論朕虚心以聽人法兼用以爾出入中外敏於従政詳平奏讞審於用律廷尉之事爾惟副之夫法出於禮本於仁成於義勉思古人以稱朕命可李籲可宣徳郎敕具官李籲朕有大政令使近臣縂領其議民之休戚國之治亂成於其手可謂重任矣爾以儒術進以邑政選而為之官属亦豈輕哉二三臣者言爾當遷其服朕命益祗乃事可趙思明可西上閤門副使敕具官趙思明國之宗臣義同休戚故文終之後配漢並隆而梁公之孫與唐無極國家佐命元老獨髙韓王銘勲太常侑食清廟爰自近嵗歎其中微乃眷裔孫尚有遺烈宜因近侍之請進陞上閤之貳勉蹈祖武副朕懐人追逺之心可李承祐可内殿崇班内臣轉出敕具官李承祐奉事兹久累勞當遷遂齒外朝縉紳之列益思忠藎毋忝恩榮可蕭士元知隰州趙永寧知永靜軍敕具官某等文武異用而其道同軍國異容而其情一爾以才選徃莅厥服惟少私寡欲則民自靖惟奉法循理則吏自畏祗率朕訓欽哉可黄光瑞可内殿崇班敕黄光瑞朕覆養華夷義均臣子慎重爵賞必加有功以爾昔助王師逺獲逋冦厯年滋久宜示異恩服我寵休永思忠藎可文貽慶可都官員外郎居中可宗正寺主簿敕具官某等昔江左二老王導謝安唐之元勲汾陽西平皆以積徳流慶子孫昌衍布列臺省為邦之光今吾太師氏亦庶㡬焉爾等才行之美所資者深聞見之廣不扶自直宜近而逺未稱朕意其歸服乃事同寅協恭以䆒事君親之義可皇兄令夬可贈博州防禦使博平侯敕爵齒之貴並隆於朝廷死喪之威莫先於兄弟禮有裒䘏義兼哀榮故具官令夬端厚有常靖恭寡過生不勤於保傅没見思於族姻宜分竹符就賜茅社服予惇叙之寵慰爾永歸之魂可髙士永知文州敕具官髙士永自将為守非藝而果不在此選治兵欲嚴御吏欲明撫民欲寛守邉欲信汝勉之矣毋廢朕命可太皇太后再從弟髙士纘髙士涺可並左班殿直文思副使梁惟簡可皇城副使敕具官某等朕惟坤元成物之恩雖以天下養無足稱其徳者故推餘澤以及葭莩之親左右奉事之臣雖天地之施無所報塞尚勉忠孝以荅萬一可范百禄刑部侍郎敕朕哀敬五刑期協中道酷者志於殺惟殺之務則深刻而失情恕者志於生惟生之知則玩刑而廢法朕欲情法兩得生殺必中非俗吏之所能思古人而永歎爰試以事乃得其人具官范百禄少以異材輔之篤學昔奉大對有守禮憂國之言旋為爭臣有責難愛君之意必能㕘用經術折中人情民自以為不寃汝當務致此者必也使無訟朕亦將庶㡬焉可朱光庭可左司諌王覿可右司諌敕具官某等惟善人能受盡言故昔之諌者常有不容之憂然有志之士猶且不顧忠義所激憂患可忘今朕恭巳無為虚心以聽汝等所論盖無虚日朕亦有拒而不聽聽而不用者乎各服新命盡所欲言言而不從朕則有愧知而不言汝亦負朕可不勉哉可鮮于侁可左諌議大夫梁燾可右諌議大夫敕仲虺言湯之徳曰改過不吝孔子論一言而喪邦曰惟予言而莫予違嗚呼天下之治亂安危有不出於此者乎朕夙興夜寐思聞其過厥愆曰朕之愆不啻不敢含怒而況於左右輔弼之臣歟具官鮮于侁邦之老成乆試于外金石之節皓首不衰具官梁燾出入館殿葢二十年守道篤志無所阿附皆吾争臣之選也朕之於事無必無我可則行之否則更之使天下曉然知朕樂聞其過書之史冊足為美談若乃進則詭詞退則焚草衰世之事朕無取焉可王巖叟可侍御史敕具官某爾以御史論事稱職擢居諫垣而能秉心不回忠言屢聞考其所争之義皆有可行之實予維寵嘉之兹復命爾往貳執法樂於從善朕志亦可見矣易曰大君有命開國承家小人勿用必亂邦也爾謹視中外毋縱詭隨以成我純一之政可錢勰可給事中敕朝廷之政根本於中書而樞機於門下出入考慎然後布之天下一成而不反後世有述焉雖用人惟均而至於封駮之任其選尤甚具官錢勰文學議論世其先人典章憲度博通前世詞命之富多而愈工風力之憂煩而不亂其服新命益修厥官使為改者難於造令而承流者無所議法則惟汝賢可明堂執政加恩門下侍郎韓維敕朕於訪落之初躬總章之祀追嚴烈考以侑上帝七政軌道四海來格禮樂具舉天人並應非余一二大臣同徳比義爕和神民何以致此哉具官韓維全徳雅量外為師表忠言嘉謀入告帷幄望其容貎足以知朝廷之尊聞其風采足以立貪懦之志艱難之際垂拱仰成宜修舊典之常均被慶成之澤同底于道朕有賴焉中書侍郎張璪敕親祠合宫昭事上帝明發不寐惕然有懐永惟神考之烈髙出百王之表選建群辟遺我後人濟于艱難克有成績具官張璪碩材不器俊徳自明衛上之忠悃欵四世應務之敏勤勞百為迨兹配饗之成宜均慈嘏之福服我明命永肩一心尚書左丞李清臣敕祗奉嚴禋肆行大賚誠通幽顯澤被中外六成之樂上格於穹壤四簋之黍下浹於煇庖矧余元臣相成釐事神人所保霈澤宜先具官李清臣徳配先民才髙當世早以天人之學發為經緯之文左右先朝克有成績屬余訪落之始共濟艱難之中迨兹慶成均被慈告宜䟽井邑之賜以示臣工之榮永孚于休以稱朕意知樞宻院事安燾敕於皇烈考屬余大器夙夜祗懼若渉氷淵乃者饗帝合官風雨時若肆眚象魏謳歌聿歸惟天人之應萃于𦕈躬葢左右之助實賴將相具官安燾􅁬自儒術為時名臣爕和兵戎無傷財害民之警持守法度有送往事居之忠迨兹慶成均被慈告井邑之賜國有舊章與民同休居寵無愧同知樞宻院事范純仁敕朕出欵真室還祀合宫祗見昊天陟配文考禮樂具舉華夷駿奔方恭黙無言之中繄辟公顯相之賴率禮弗越肆予汝嘉具宫范純仁慶厯名臣之家熈寧正諫之士著績西鄙授任中樞謨猷靖深兵革消伏領使奉祠之日助成大享之勤降福孔多推恩宜廣矧兹宥宻之地可無勲邑之加往服寵章益敬毋怠尚書右丞吕大防敕朕有事總章升侑神考四輔在位百工在廷鬷假無言各率乃職迨此釐事之畢匪我沖人之能思與羣公均受帝祉具官吕大防擢自英祖休有直聲被遇裕陵益彰忠力入總文章之轄手䟽盤錯之煩六事所瞻倚以為重三府之議於焉取平宜加勲伐之隆益増井賦之衍服我休命思勉厥終韓忠彦黄履並特轉朝請郎敕考績之法三代共由雖余左右之信臣猶以嵗月而叙進率循其舊示不爾私具官韓忠彦頎然異材奮以儒術典朕三禮識古人之大全歴事四朝有宗臣之餘烈黄履受材宏深秉徳純固入踐臺省休有老成之風出更藩垣遂無東顧之念祇服新命益修厥官尚勵有為之心以需不次之舉可皇叔祖克愛皇叔仲虢並遥郡團練使敕朕不以親廢法亦不以義掩恩故宗室之英雖不任事而嵗月之考必付有司以爾具官克愛篤行有常率履如一以爾具官仲虢居寵而戒好徳不回既累日以當遷非無名而虚授益務忠敬以保厥家可王獻可洛苑使敕具官王獻傳不云乎詩書義之府禮樂徳之則禦侮扞城亦儒者之事也汝以詞學進而以武幹聞肆予虎臣謂汝可用往服新命以成汝志可陳次升可淮南提刑敕具官陳次升春秋書無麥禾葢病之也今吾淮甸之民夏旱秋水望熟於來嵗譬如負重渉逺未知所舍朕甚憂之汝自百里長以才能選為朕耳目其往按視省刑獄均力役督盗賊去姦吏使民忘其灾以稱朕意可杜純可大理少卿敕具官杜純治獄得其道仁及幽顯澤流子孫茍非其人灾及草木身任其禍朕敬而畏之乆難其人以爾用法平直守道純固不以進退榮辱抑揚其心故在此選靡不有初終之實難可不勉哉可郭晙可開封府司録參軍敕具官郭晙汝昔為獄官不撓于執事以䧟無辜之人坐失厥職秉義不回有足嘉者往𨽻天府總攝羣掾毋易汝守朕將觀焉可林希可中書舍人敕文章之變與時盛衰譬如八音可以觀政而況誥命之出學者所師號令以之重輕風俗因而厚薄本朝革五代積衰之氣繼兩漢爾雅之文而大道中㣲異端所汩欲復祖宗之舊必以訓詞為先故難其人不以輕授具官林希博問强識篤學力行綽有建安之風流逮聞正始之議論徑踐外制為朝廷常潤色其精微期配昔人使天下識典刑之髣髴務究所學朕將觀焉可司馬光左僕射追封溫國公制敕執徳不回用安社稷為悦以死勤事坐致股肱或虧方予訪落之初遽興殄瘁之感其於䘏典豈限彛章具官司馬光超軼絶塵應期降命蹈履九徳湛涵六經逮事仁宗以論思獻納任言責翊我英祖以安危治亂鑒古今粤惟先朝延登近弼方事獻可而替否不肯枉尺而直尋紬繹新書優㳺卒嵗乃心無不在王室不起何以慰蒼生顧惟𦕈躬肇稱毖祀雖未能求諸野而得傅説亦庻幾選於衆而舉臯陶激濁揚清方甄明於流品制法成治永振悳於黎元而憖遺之悲天不得於一老惴慄之歎人皆輕於百身兹大享於合寢仍不預於小歛師垣一品降之九原開國於溫用旌直徳納棺以禭式勸具僚念涕泗以無從想話言之猶在俯惟英爽歆此寵靈可特贈溫國公張繢除宣徳郎制敕太學博士張繢祖宗設賢良文學之科以網羅天下之豪俊間得偉人爾繇是選而沈黙恬淡安於冗散學士鄧溫伯與東西省從官列上奏狀朕嘉乃沖静特俾遷秩益務敦毖將有試焉可特授宣徳郎依舊太學博士孫覺除吏部侍郎制敕自國家還政文昌將以致治而天官四銓總覈人物澄清流品未見其人除擬之間賢愚同滯以爾朝請郎試給事中孫覺文學論議燭知本原諌省東臺乆從踐厯選掄之慎委寄益隆噫法之窒閡者更吏之不虔者逐賕文弗作甄序有倫服我訓詞尚有大用可特授依前官試吏部侍郎曹旦知南平軍制敕供備庫副使曹旦西南瀘夷諸種部族散處藂篁谿谷之阻與魚鳥羣卉服而居畬田而食樂生惡死情無甚異軍摩邉戍備預不虞静而緩之彼自馴擾往服吾訓以稱人知可特授依前官權知南平軍事吕和卿知台州制敕承議郎尚書金部員外郎吕和卿臨海雖小邦而有民社之重朕豈輕之爾以仕優而學誠知戒夫墻靣之煩製錦之未易乎往欽用勵毋忽吾訓可依前官差權知台州陸佃禮部侍郎制敕文昌貳卿位次八座各有典司咸用専達天官之選目色實繁以爾朝奉郎試吏部侍郎陸佃方頒以先朝一代大典纉修筆削勢難兼綜春官宗伯事雖稀簡目力可周而典章文物動闗國體益思明練以稱恩休可特授依前官試禮部侍郎依舊充修實録院修撰官龍圖閣直學士朝請大夫知定州蔡延慶朝請大夫試戸部尚書李常並磨勘轉朝議大夫制三考而議黜陟古今所同積日而叙勤勞貴賤無間矧夫内與六官之長外總連帥之權均大計之盈虚司隣邦之動静厯年應格稽法當遷有司以言朕何敢後具官李常奮由踈逺深自刻修財賦所存綱目具舉具官蔡延慶名臣之後吏治有餘干城四方安静不擾咸以侍從之選而應股肱之良雖尺寸以遷未彰於異數而命秩之寵差慰於乆勞朝奉郎孫覽除右司員外郎制奉使北方治河而備邉任亦重矣以為未足以盡其才也而寘之都司吾之所以責任爾者可見也夫分治六官事無鉅細畢陳於前若網在綱振之則舉弛之則盡廢爾昔既稱治辦矣勉既厥心以待來効朝奉大夫田待問淮南提刑制揚楚春旱秋水民艱於食漸起為盗遂使州縣犴獄充滿朕憂之未始一日忘也間起爾於山陽守參領漕事今又命爾按視刑辟徒以爾習其風俗知吏民所習苦夫察貪暴謹追擾均有無督盗賊此荒政之急也勉勤其職以稱朕意朝散郎殿中侍御史林旦淮南運副制淮甸之民荐罹饑饉乃者詔發倉廩發吴楚之漕以拯其急猶以乏食流徙達於朕聽朕惟救荒之政行之略盡惟得良使者因事施宜為若可賴爾由郎官以才任御史習於揚楚之俗其為朕往視之均徭薄歛禁暴戢姦無使斯人重被其困東坡全集巻一百八
