body:
  text: 東坡全集巻二十五宋蘇軾撰詩八十六首汲江煎茶活水還須活火烹唐人云茶須緩火炙活火煎自臨釣石取深清大瓢貯月歸春罋小杓分江入夜缾茶雨已翻煎處脚松風忽作㵼時聲枯腸未易禁三盌坐數荒村長短更予來儋耳得吠狗曰烏觜甚猛而馴隨予遷合浦過澄邁泅而濟路人皆驚戲為作此詩烏喙本海獒幸我為之主食餘巳瓠肥終不憂鼎俎晝馴識賔客夜悍為門戸知我當北還掉尾喜欲舞跳踉趂僮僕吐舌喘汗雨長橋不肯躡徑度清深浦拍浮似鵞鴨登岸劇虓虎盗肉亦小疵鞭箠當貰汝再拜謝恩厚天不遣言語何當寄家書黄耳定乃祖澄邁驛通潮閣二首倦客愁聞歸路遙眼明飛閣俯長橋貪㸔白鷺横秋浦不覺青林没晩潮餘生欲老海南村帝遣巫陽招我魂杳杳天低鶻没處青山一髪是中原泂酌亭詩并引瓊山郡東衆泉觱發然皆冽而不食丁丑歲六月軾南遷過瓊始得雙泉之甘於城之東北隅以告其人自是汲者常滿泉相去咫尺而異味庚辰歲六月十七日遷於合浦復過之太守承議郎陸公求泉上之亭名與詩名之曰泂酌其詩曰泂酌彼兩泉挹彼注兹一缾之中有澠有淄以瀹以烹衆喊莫齊自江徂海浩然無私豈弟君子江海是儀既味我泉亦嚌我詩六月二十日夜渡海又見二十八巻參横斗轉欲三更苦雨終風也解晴雲散月明誰㸃綴天容海色本澄清空餘魯叟乘桴意粗識軒轅奏樂聲九死南荒吾不恨兹游竒絶冠平生自雷適亷宿於興亷村浄行院荒涼海南北佛舍如雞棲忽此榕林中跨空飛栱枅當門冽碧井洗我兩足泥高堂磨新甎洞戸分角圭倒牀便甘寢鼻息如虹霓僮僕不肯去我為半日稽晨登一葉舟醉兀十里谿醒來知何處歸路老更迷亷州龍眼質味殊絶可敵茘支龍眼與茘支異出同父祖端如柑與橘未易相可否異哉西海濵琪樹羅𤣥圃纍纍似桃李一一流膏乳坐疑星隕空又恐珠還浦圖經未嘗説玉食遠莫數獨使皴皮生弄色映琱俎蠻荒非汝辱幸免妃子汙合浦愈上人以詩名嶺外將訪道南嶽留詩壁上云閒伴孤雲自在飛東坡居士過其精舍戲和其韻孤雲出岫豈求伴錫杖凌空自要飛為問庭松尚西指不知老壯幾年歸梅聖俞之客歐陽晦夫使工畫茅庵已居其中一琴横牀而巳曹子方作詩四韻僕和之云寂寞王子猷囘舩剡溪路迢遙戴安道雪夕誰與度倒披王恭氅半掩袁安戸應調折絃琴自和撚鬚句歐陽晦夫惠琴枕中郎不眠仰㸔屋得此古椽圍尺竹輪囷濩落非笛材剖作袖琴徽軫足流傳幾處到淵明卧枕綸巾酒新漉孤鸞别鵠誰復聞鼻息齁齁自成曲留别亷守編萑以苴猪墐塗以塗之小餅如嚼月中有酥與飴懸知合浦人長誦東坡詩好在真一酒為我醉宗資缾笙詩并引庚辰八月二十八日劉幾仲餞飲東坡中觴聞笙簫聲杳杳若在雲霄間抑揚往返粗中音節徐而察之則出於雙缾水火相得自然吟嘯蓋食頃乃已坐客驚嘆得未曾有請作缾笙詩記之孤松吟風細泠泠獨蠒長繅女媧笙陋哉石鼎逢彌明丘蚓竅作蒼蠅聲缾中宫商自相賡昭文無虧亦無成東坡醉熟呼不醒但云作勞吾耳鳴歐陽晦夫遺接䍦琴枕戲作此詩謝之攜兒過嶺今七年晩塗更著黎衣冠白頭穿林要藤㡌赤脚渡水須花縵不愁故人驚絶倒但使俚俗相恬安見君合浦如夢寐挽鬚握手俱汍瀾妻縫接䍦霧縠細兒送琴枕氷徽寒無絃且寄陶令意倒載猶作山公㸔我懷汝隂六一老眉宇秀發如春巒羽衣鶴氅古仙伯岌岌兩柱扶霜紈至今畫像作此服凜如退之加渥丹爾來前輩皆鬼録我亦帶脱巾欹寛作詩頗似六一語往往亦帶梅公酸次韻王鬱林晩塗流落不堪言海上春泥手自翻漢使節空餘皓首故侯𤓰在有頽垣平生多難非天意此去殘年盡主恩誤辱使君相􅋞拭寧聞老鶴更乘軒藤州江下夜起對月贈邵道士江月照我心江水洗我肝端如徑寸珠墮此白玉盤我心本如此月滿江不湍起舞者誰歟莫作三人㸔嶠南瘴毒地有此江月寒乃知天壤間何人不清安牀頭有白酒盎若白露漙獨醉還獨醒夜氣清漫漫仍呼邵道士取琴月下彈相將乘一葉夜下蒼梧灘徐元用使君與其子端常邀僕與小兒過同游東山浮金堂戲作此詩昔與徐使君共賞錢塘春愛此小天竺時來中聖人松如遷客老酒似使君醇繫舟藤城下弄月鐔江濱江月夜夜好雲山朝朝新使君有令子真是石麒麟我子乃散材有如木輪囷二老白接䍦兩郎烏角巾醉卧松下石扶歸江上津浮橋半没水揭此碧鱗鱗送鮮于都曹歸灌口舊居籋盡霜鬚照碧銅依然春雪在長松朝行犀浦催收芋夜渡繩橋㸔伏龍莫歎倦游無駟馬要將老健敵千鐘子雲三世惟身在為向西南説病容送邵道士彦肅還都嶠乞得紛紛擾擾身結茆都嶠與仙隣少而寡慾顔常好老不求名語益真許邁有妻還學道陶潜無酒亦從人相隨十日還歸去萬刼清游結此因書韓幹二馬赤髯碧眼老鮮卑囘䇿如縈獨善騎赭白紫騮俱絶世馬中岳湛有妍姿將至廣州用過韻寄邁迨二子皇天遣出家臨老乃學道比歸為兒子破戒堪一笑披雲見天眼囘首失海潦蠻唱與黎歌餘音猶杳杳大兒牧衆穉四歲守孤嶠次子病學醫三折乃粗曉小兒耕且養得暇為書繞我亦困詩酒去道愈茫渺紛紛何時定所至皆可老莫學栁儀曹詩書教氓獠亦莫事登陟谿山有何好安居與我遊閉戸浄洒掃贈鄭清叟秀才風濤戰扶胥海賊横泥子胡為犯二怖慱此一笑喜問君奚所欲欲談仁義耳我才不逮人所有聊足已安能相付予過聽君誤矣霜風掃瘴毒冬日稍清美年來萬事足所欠惟一死澹欲兩無求滑浄空棐几和孫叔静兄弟李端叔唱和病骨瘦欲折霜髯籋更疎喜聞新國政兼得故人書秉燭真如夢傾盃不敢餘天涯老兄弟懷抱幾時攄廣倅蕭大夫借前韻見贈復和答之坐還粗勝虞早退不如疎垂死初聞道平生誤信書風濤驚夜半疾病送災餘賴有蕭夫子幽懷得少攄心閒詩自放筆老語翻疎贈我皆强韻知君得異書滔滔沮叟是綽綽孟生餘一笑滄溟側應無憤可攄王晉叔所藏畫跋尾五首徐熙杏花江左風流王謝家盡攜書畫到天涯却因梅雨丹青暗洗出徐熙落墨花趙昌四季芍藥倚竹佳人翠袖長天寒猶著薄羅裳揚州近日紅千葉自是風流時世粧躑躅楓林翠壁楚江邊躑躅千層不忍㸔開巻便知歸路近劍南樵叟為施丹寒菊輕肌弱骨散幽葩真是青裙兩髻丫便有佳名配黄菊應縁霜後苦無花山茶逰蜂掠盡粉絲黄落蕋猶收蜜露香待得春風幾枝在年來殺菽有飛霜和黄秀才鑒空閣明月本自明無心孰為境挂空如水鑒冩此山河影我觀大瀛海巨浸與天永九州居其間無異蛇盤鏡空水兩無質相照但耿耿妄云桂蟇俗説皆可屏我遊鑒空閣缺月正凄冷黄子寒無衣對月句愈警借君方諸淚一沐管城穎誰言小叢林清絶冠五嶺韋偃牧馬圖神工妙技帝所收江都曹韓逝莫留人間畫馬唯韋侯當年為誰掃驊騮至今霜蹏踏長楸圉人困卧沙壠頭沙苑茫茫蒺藜秋風鬉霧鬛寒颼颼龍種尚與駑駘遊長稭短荳豈我羞八鑾六轡非馬謀古來西山與東丘題靈峯寺壁靈峯山上寳陀寺白髪東坡又到來前世徳雲今我是依希猶記妙高臺衆妙堂廣州何道士湛然無觀古真人我獨觀此衆妙門夫物芸芸各歸根衆中得一道乃存道人晨起開東軒趺坐一醉扶桑暾餘光照我玻璃盆倒射窻几清而温欲收月魄餐日魂我自日月誰使吞題馮通直明月湖詩後老衍清篇墨未枯小馮新作語尤殊呼兒浄洗涵星硯為子賡歌墮月湖聞道䍧江空抱珥年來合浦自還珠請君多釀蓮花酒凖擬王喬下履鳬南詔有西珥河即古䍧牱江也河形如月抱珥故名之西珥云次韻鄭介夫二首一落泥塗迹愈深尺薪如桂米如金長庚到曉空陪月太歲今年合守心相與齧氊持漢節何妨振履出商音孤雲倦鳥空來往自要閒飛不作霖一生憂患萃殘年心似驚蠶未易眠海上偶來期汗漫葦間猶得見延縁良醫自要經三折老將何妨敗兩甄收取桑榆種梨棗祝君眉夀似増川昔在九江與蘓伯固唱和其略曰我夢扁舟浮震澤雪浪横江千頃白覺來滿眼是廬山倚天無數開青壁蓋實夢也昨日又夢伯固手持乳香嬰兒示予覺而思之蓋南華賜物也豈復與伯固相見於此耶今得來書已在南華相待數日矣感歎不已故先寄此詩扁舟震澤定何時滿眼廬山覺又非春草池塘惠連夢上林鴻雁子卿歸水香知是曹谿口眼浄同㸔古佛衣不向南華結香火此生何處是真依次韻韶守狄大夫見贈二首華髪蕭蕭老遂良禇河南帖云即日遂良鬚髪盡白蓋謫長沙時也一身萍挂海中央無錢種菜為家業有病安心是藥方才疎正類孔文舉癡絶還同顧長康萬里歸來空泣血七年供奉殿西廊邇英閣在延和殿西廊下森森畫㦸擁朱輪坐詠梁公覺有神白傅閒遊空誦句事見樂天呉郡詩石叙拾遺窮老敢論親事見子美贈狄明府詩東海莫懷疎受意西風幸免庾公塵為公過嶺傳新唱催發寒梅一信春次韻韶倅李通直二首一篇瀧吏可書紳莫向長沮更問津老去常憂伴新鬼歸來且喜是陳人曽陪令尹蒼髯古又見郎君白髪新囘首天涯一惆悵却登梅嶺望楓宸青山衹在古城隅萬里歸來卜築初㑹見四山朝鶴駕更㸔二李控鯨魚欲從抱朴傳家學應怪中郎得異書待我丹成馭風去借君瓊佩與霞裾僕昔為開封幕先公為赤令暇日相與論内外丹且出其丹示僕今三十年而見君曲江同遊南華行山水間數日道舊感歎且勸我卜居於舒故詩中皆及之狄韶州煮蔓菁蘆菔羮我昔在田間寒庖有珍烹常支折脚鼎自煮花蔓菁中年失此味想像如隔生誰知南嶽老解作東坡羮中有蘆菔根尚含曉露清勿語貴公子從渠醉羶腥李伯時畫其弟亮功舊宅圖樂天蚤退今安有摩詰長閒古亦無五畝自栽池上竹十年空㸔輞川圖近聞陶令開三徑應許揚雄借一區晩歲與君同活計如雲鵞鴨散平湖贈龍光長老斫得龍光竹兩竿持歸嶺北萬人㸔竹中一滴曹溪水漲起西江十八灘贈嶺上老人鶴骨霜髯心已灰青松合抱手親栽問翁大庾嶺頭住曾見南遷幾箇囘贈嶺上梅梅花開盡百花開過盡行人君不來不趂青梅嘗煮酒要㸔細雨熟黄梅予昔過嶺而南題詩龍泉鐘上今復過而北次前韻秋風巻黄落朝雨洗緑浄人貪歸路好節近中原正下嶺獨徐行艱嶮未敢忘遙知叔孫子已致魯諸生過嶺暫著南冠不到頭却隨北鴈與歸休平生不作兔三窟今古何殊貉一丘當日無人送臨賀至今有廟祀潮州劍關西望七千里乘興真為玉局游留題顯聖寺𣺌𣺌疎林集晩鴉孤村烟火梵王家幽人自種千頭橘逺客來尋百結花浮石已乾霜後水焦坑閒試雨前茶祇疑歸夢西南去翠竹江村遶白沙予初謫嶺南過田氏水閣東南一峯豐下銳上俚人謂雞籠山予更名獨秀峰今復過之戯留一絶倚天巉絶玊浮屠肯與彭郎作小姑獨秀江南知有意要三二别四三壺乞數珠一首贈南禪湜老從君覔數珠老境仗消遣未敢轉千佛且從千佛轉儒生推變化乾䇿數大衍道士守𤣥牝龍虎㸔舒巻我老安能為萬刼付一喘黙坐閲塵界往來八十反區區我所寄蹙縮蠶在蠒適從海上囘蓬萊又清淺鬱孤臺再過䖍州和前韻吾生如寄耳嶺外亦閒遊贛石三百里寒江尺五流楚山㣲有霰越瘴久無秋望㫁横雲嶠魂飛咤雪洲曉鐘時出寺暮鼓各鳴樓歸路迷千嶂勞生閲百州不隨猿鶴化甘作賈胡留祇有貂裘在猶堪買釣舟䖍守霍大夫監郡許朝奉見和此詩復次前韻大邦安静治小院得閒遊贛水雨已漲亷泉春水流同烹貢茗雪一洗瘴茅秋秋思生蓴鱠寒衣待橘州揚雄未有宅王粲且登樓老景無多日歸心夢幾州敢因逃酒去端為和詩留舊篋藏新語清風自滿舟贈䖍州術士謝君屬國新從海外歸君平且莫下簾帷前生恐是盧行者後學過呼韓退之死後人傳戒定慧生時宿直斗牛箕憑君為筭行年㸔便數生時到死時䖍州景徳寺榮師湛然堂卓然精明念不起兀然灰槁照不滅方定之時慧在定定慧寂照非兩法妙湛總持不動尊黙然真入不二門語息則黙非對語此話要將周易論諸方人人把雷電不容細㸔真頭面欲知妙湛與總持更問江東三語掾和陽行先用鬱孤臺韻室空惟法喜心定有天游摩詰元無病須洹不入流苦嫌尋直枉坐待寸田秋雖未麒麟閣巳逃鸚鵡洲酒醒風動竹夢㫁月窺樓衆謂元徳秀自稱陽道州抜葵終相魯辟糓㑹封留用舍俱無碍飄然不繫舟用數珠韻贈湜長老嗣宗雖不言叔寳猶理遣東坡但熟睡一夕一展轉南遷昔虞翻却掃今馮衍古佛既手提諸方皆席巻當年清隱老鶴瘦龜不喘和我彈丸詩百發亦百反耆年日凋䘮但有犢角蠒時來窺方丈共笑虎毛淺和猶子遲贈孫志舉軒裳大爐韛陶冶一世人從衡落模範誰復甘饑貧可憐方囘癡初不疑嘉賔頗念懷祖黠瞋兒與兵姻失身墮浩渺投老無涯垠囘㸔十年舊誰似數子真孫郎表獨立霜㦸交重闉深居不汝覿豈問親與隣連枝皆秀傑英氣推伯仁我從海外歸喜及崆峒春新年得異書西郭有逸民陽行先以登真隱訣見借小孫又過我歡若平生親清詩五百言句句皆絶倫養火雖未伏要是丹砂銀我家六男子朴學非時新詩詞各璀璨老語徒周諄願言敦夙好永與竹林均六子豈可忘從我屢厄陳南禪長老和詩不巳故作六蟲篇答之鳯凰覽徳輝逺引不待遣鷾鴯戀庭宇倐忽來千轉那將坐井蛙而比談天衍蠧魚著文字槁死猶遭巻老牛疲耕作見月亦妄喘東坡方三問南禪巳五反老人但目擊侍者方足蠒最後六蟲篇深寄恨語淺明日南禪和詩不到故重賦數珠篇以督之二首未來不可招已過那容遣中間現在心一一風輪轉自從一生二巧厯莫能衍不如袖手坐六用都懷巻風雷生謦欬萬竅自號喘詩人思無邪孟子内自反大珠分一月細綆合兩蠒纍然挂禪牀妙用夫豈淺朝來取飯化乃是維摩遣全鋒雖未露半藏已曾轉説有陋裴頠談無笑王衍㸔經聊爾耳遮眼初不巻三咤故自醒一吷何由喘請歸視故櫝静夜珠當反安居三十年古衲磨山蠒持珠尚黙坐豈是功用淺用前韻再和霍大夫文字先生飲謂劉執中江山清獻游典刑傳父老尊俎繼風流度嶺逢梅雨還家指麥秋自慚鴻鴈侣爭集稻粱洲野濶横雙練城堅聳百樓行㸔鳯尾詔却下虎頭州君意巳呉越我行無去留歸塗應食粥乞米使君舟用前韻再和許朝奉高門元世舊客路晩追逰清絶聞詩語疎通豈法流傳家有衣鉢㫁獄盡春秋邂逅陪車馬尋芳謝朓洲凄涼望鄉國得句仲宣樓恨賦投湘水悲歌祀栁州如何五字律相與一樽畱更約登塵外歸時月滿舟用前韻再和孫志舉人衆者勝天天定亦勝人鄧通豈不富郭解安得貧驚飛賀厦燕走散入幕賔醉眠中山酒夢結南柯姻寵辱能幾何悲歡浩無垠囘視人間世了無一事真洒掃古玉局香火通帝闉我室思無邪我堂徳有隣所至為鄉里事賢友其仁之子富經術蔚如井大春蜿蟺楚南極淑氣生此民唱高和自寡非我誰當親譬彼嶰谷竹剪裁待伶倫俗學吁可鄙紙繒配芻銀聊將調癡鬼亦復爭華新願子事篤實浮言掃譫諄窮通付造物得䘮理本均期子如太倉㑹當發陳陳崔文學甲攜文見過蕭然有出塵之姿問之則孫介夫之甥也故復用前韻賦一篇示志舉象服盛簪珥豈是邢夫人弊衣破冠履可憐范叔貧君㸔崔員外晩就觀國賔當年頗赫赫翁媪爭為姻事見退之贈崔員外詩蹭蹬阻風水横斜挂邊垠青衫映白髪今似梅子眞道存百無害甘守呉市闉自言總角歲慈母為擇隣邦人驚似舅矯矯惡不仁詩文非他師家法乃富春豈非空同秀為國産儁民挺然齊魯生近出姬姜親為文不在多一頌了伯倫清詩要鍛鍊乃得鉛中銀自我遷嶺外七見槐火新著書已絶筆一黙含千諄蕢桴和葦籥天節非人均時時自娯嬉豈為俗子陳畫車詩二首何人畫此隻輪車便是當年欹器圖上易下難須審細左提右挈免疎虞九衢歌舞頌王明誰惻寒泉獨自清賴有千車能散福化為膏雨滿重城䖍州吕倚承奉年八十三讀書作詩不已好收古今帖貧甚至食不足揚雄老無子馮衍終不遇不識孔方兄但有靈照女家藏古今帖墨色照箱筥饑來據空案一字不堪煮枯腸五千巻磊落相撑拄吟為蜩蛩聲時有島可句為語里長者徳齒敬已古如翁有幾人薄少可時助王子直去歳送子由北歸往反百舍今又相逢贛上戲用舊韻作詩留别米盡無人典破裘送行萬里一鄒遊解舟又欲攜君去歸舍聊須與婦謀聞道年來丹伏火不愁老去雪盈頭剩買山田添鶴口廟堂新拜富民侯次韻江晦叔二首人老家何在龍眠雨未驚酒船囘太白穉子候淵明幸與登仙郭同依坐嘯成小樓㸔月上劇飲到參横鐘皷江南岸歸來夢自驚浮雲世事改孤月此心明雨已傾盆落詩仍翻水成二江爭送客木杪㸔橋横次韻江晦叔兼呈器之横空初不跨鵬鼇但覺胡牀步步高器之言嘗夢飛自覺身與所坐床皆起空中一枕晝眠春有夢扁舟夜渡海無濤歸來又見顛茶陸多病仍逢止酒陶笑説南荒㡳處所祇今榕葉下亭皋寒食與器之游南塔寺寂照堂城南鐘鼓鬬清新端為投荒洗瘴塵總是鏡空堂上客誰為寂照境中人紅英掃地風驚曉緑葉成隂雨洗春記取明年作寒食杏花曾與此翁隣器之好談禪不喜㳺山山中笋出戯語器之可同參玉版長老作此詩叢林真百丈法嗣有横枝玉版横枝竹笋也不怕石頭路來參玉版師聊憑柏樹子與問籜龍兒瓦礫猶能説此君那不知永和清都觀謝道士童顔鬒髪問其年生於丙子蓋與予同求此詩鏡湖勅賜老江東未似西歸玉局翁羇枕未容春夢㫁清都宛在黙存中毎逢佳境攜兒去試問流年與我同自笑餘生消底物半篙清漲百灘空予與劉器之同發䖍州江水忽清漲丈餘贛石三百里無一見者至永和器之解舟先去予獨游清都作此詩贈詩僧道通雄豪而妙苦而腴祇有琴聰與蜜殊錢塘僧思聰總角善琴後捨琴而學詩復棄詩而學道其詩似皎然而加雄故安州僧仲殊詩敏捷立成而工妙絶人逺甚殊辟穀常啖蜜語帶烟霞從古少李太白云他人之文如山無烟霞春無草木氣含蔬笋到公無謂無酸饀氣也香林乍喜聞簷蔔古井惟愁㫁轆轤為報韓公莫輕許從今島可是詩奴張競辰永康所居萬巻堂君家四壁如相如巻藏天禄吞石渠豈惟鄴侯三萬軸家有世南行祕書兒童拍手笑何事笑人空腹談經義未許中郎得異書且共揚雄説竒字清江縈出碧玉環下有老龍千古閒知君好事家有酒化為老人夜扣關留侯之孫書滿腹玉函寳方何用讀濠梁空復五車多圯上從來一篇足劉壯輿長官是是堂閒燕言仁義是非安可無非非義之屬是是仁之徒非非近乎訕是是近乎諛當為感麟翁善惡分錙銖抑為阮嗣宗臧否兩含糊劉君有家學三世道益孤陳古以刺今紬史行天誅皎如大明鏡百陋逢一姝鶚立時四顧何由擾羣狐作堂名是是自説行坦途孜孜稱善人不善自逺徂願君置座右此語禹所謨予昔作壺中九華詩其後八年復過湖口則石巳為好事者取去乃和前韻以自解云江邊陣馬走千峰問訊方知冀北空尤物巳隨清夢㫁劉夢得以九華為造物一尤物真形猶在畫圖中道藏有五嶽真形圖歸來晩歲同元亮却掃何人伴敬通賴有銅盆修石供仇池玉色自􅋛瓏家有銅盆貯仇池石正緑色有洞水違背予又嘗以怪石供佛印師作怪石供一篇次韻郭功甫二首蚤知臭腐即神竒海北天南總是歸九萬里風安税駕雲鵬今悔不卑飛可憐倦鳥不知時空羨騎鯨得所歸玉局西南天一角萬人沙苑㸔孤飛次韻法芝舉舊詩春來何處不歸鴻非復羸牛踏舊蹤但願老師真似月誰家甕裏不相逢次韻贈清涼長老過淮入洛地多塵舉扇西風欲汙人但怪雲山不改色豈知江月解分身安心有道年顔好遇物無情句法新送我長蘆舟一葉笑㸔雪浪滿衣巾睡起聞米元章到東園送麥門冬飲子一枕清風直萬錢無人肯買北窻眠開心暖胃門冬飲知是東坡手自煎夢中作寄朱行中舜不作六器誰知貴璵璠哀哉楚狂士抱璞號空山相如起睨柱頭壁相與還何如鄭子産有禮國自閑雖微韓宣子鄙夫亦辭環至今不貪寳凜然照塵寰答徑山琳長老與君皆丙子各已三萬日一日一千偈電往那容詰大患縁有身無身則無疾平生笑羅什神呪真浪出東坡全集巻二十五
