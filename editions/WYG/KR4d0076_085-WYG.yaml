body:
  text: 東坡全集巻八十五宋蘓軾撰尺牘九十五首與范元長八首儋耳某慰疏言不意㐫變先公内翰遽捐館舍聞訃痛絶天之喪予一至於是生意盡矣伏惟至孝承務元長昆仲孝誠深至追慕罔極何辜于天罹此禍酷荼毒如昨奄易寒暑哀毁日深奈何奈何某謫籍所拘莫由往弔永望長號此懐難諭謹奉手疏上慰不次謹疏又流離僵仆九死之餘又聞淳夫先公傾逝痛毒之深不可云諭久欲奉疏不遇便人又舉動艱礙憂畏日深今兹書問亦未必達且畧致區區耳又先公已矣惟望昆仲自立不墜門户千萬留意其逺者大者勿徇一至之哀致無益之毁與先公相照誰復如某者此非相勸勉而已切深體此意餘不敢盡言又先公論往古事著述多矣想一一寳藏此豈復待鄙言耶某當遣人致奠海外窮苦不能如意不敢作奠文想䝉哀恕也歸葬知未得請苦痛之極惟千萬寛中順受此中百事逺不及雷化百憂所集然亦强自遣也又聖善郡君不及拜慰狀侍次乞致區區沉香少許望於内翰靈几焚之表末友一慟之意而已又孫行者至辱書承孝履如宜闔宅皆安感慰之極所諭傳初不待君言心許吾亡友久矣平生不作負心事未死要不食言然今則不可九死之餘憂畏百端想䝉矜察不即副來意臨紙哀噎海外麄聞新政有識感涕靈几儻遂北轅乎未間千萬節哀自重又聖善郡君承起居佳適因侍次致下悃乞為骨肉保愛寛懷以待北歸也子進諸舅曽得安信否又毒暑逺惟孝履如宜海外相聞近事南來諸人恐有北轅之漸而吾友翰林公獨隔幽顯言之痛裂忘生矧昆仲純篤之性感慟摧割如何可言奈何奈何老朽一言非苟以相寛者先公清徳絶識髙文博學非獨今世所無古人亦罕有能兼者豈世間混混生死流轉之人哉其超然世表如千佛之所云必矣况其平生自有表見於無窮者豈必區區較量頃刻之壽否耶此意卓然唯昆弟深自愛得歸亦勿亟遽俟秋稍涼而行為佳某深欲一見左右赴合浦不惜數舍之迂但再三思慮不敢爾必深察臨行必預有書相報熱甚萬萬節哀自重與秦少游某巳封書訖乃得移亷之命故復作此紙治裝十日可辦但須得泉人許九船即牢穏可恃餘蜑舟多不堪而許見在外邑未還須至少留待之約此二十五六間可登舟並海岸行一日至石排相風色過渡一日至逓角塲但相風難刻日爾巳有書託吳君雇二十壯夫來逓角塲相等但請雇下未要發來至渡海前一兩日當别遣人去報若得及見少㳺即大幸也今有一書與唐君内有兒子書託渠轉附去料舍弟巳行矣餘非面莫究與楊子微二首某與尊公濟甫半生濶别彼此髪鬚雪白而相見無期言之悽斷尊公乃令閣下萬里逺來海外訪其生死此乃古人難事聞之感歎不巳辱書具審起居佳安尊公巳下各得安勝至慰之極某七月中必達潁昌矣囬馭少留一須欵見餘况若時自重又某與舍弟流落天涯墳墓免於樵牧者尊公之賜也承示諭感愧不可言聞井水嘗竭而復溢信否見今如何因見細喻與范元長六首北歸到雷獲所留書承車従盤桓此邦以須一見而某滯留不時至遂爾逺别且不獲一慟几筵之前者非愛數舍之勞也以厄困為畏故爾此老繆之罪想矜察比日孝履如宜否方此炎毒萬萬扶護哀苦勞艱如何可言忝親友之末不能匍匐赴救巳矣不復云也獨前所見委文字不敢不留意今託少游議其詳惟節哀自重某不敢拜狀郡君惟千萬俯為存沒寛心自重乞呈此紙又某如聞有移黄之命若果爾當自梧而廣須恵州骨肉到同往計公昆仲扶䕶舟行當過黄又恐公自湖南路行不由江西即不過黄不知某能及公之前到黄乎漂零江海身非巳有未知歸宿之地其敢必㑹見之日耶惟昆仲金石廼心困而不折庶幾先公之風沒而不忘也臨紙哽塞言不盡意又過雷州奉書必達到容南知昆仲皆苦瘴痢又聞尋已痊損不知即日如何扶護哀苦又須勉强開解卑心憂懸書不能盡奉嘱之意唯深察此心哀哉少游痛哉少㳺遂喪此傑耶賴昆仲之力不至狼狽某日夜前去十六七間可到梧若少留一見尤幸某到梧當留以待恵州人至同泝賀江也速遣此人達書不謹千萬恕察又永州人來辱書承孝履粗遣甚慰思望比謂至梧州追及又將相従泝賀巳而水乾無舟遂有番禺之行遂與公隔絶不得一拜先公及少㳺之靈為大恨也同貶先逝者十人聖政日新天下歸仁惟逝者不可返如先公及少㳺真為冀北之空也徒存僕輩何用言之痛隕何及某即度庾嶺欲徑歸許昌與舍弟處必遂一見昆仲未間惟萬萬强食自重又某忽有玉局之除可為歸田之漸矣痛哲人之亡誦殄瘁之章如何可言早收拾事迹編次著譔相見日以授也處素因為多方勉之以不墜門户為急監司無與相知者及毛君亦不識未敢發書前路問人有可宛轉為言者専在意也漂流江湖未能赴救以為慙負有銀五兩與少㳺齋僧乞轉與處素也又承中間郡君服藥疾勢不輕且喜安復侍次致懇千萬寛中保衛為請與孫叔静三首辱手教具審尊體佳勝甚慰馳仰拙疾亦漸平矣明日當出請見燒羊䝉珍恵下逮童孺矣又累嵗濶别不意相逢海上握手一笑豈偶然哉亟辱専使教筆具審起居佳勝感慰兼集玉局之除巳有訓詞似不忘也得免湖外之行餘生厚幸至英當求人至永請告勅遂度嶺過贛歸陽羡或歸潁昌老兄弟相守過此生矣乍逺萬萬為國自重又久留治下辱眷待之厚既過重矣而愛念之意拳拳不巳更勤従者逺至金刹自惟衰朽何以獲此比來數日思渴不巳長至俯邇不克展慶此心南騖矣令子煩逺餞不及别狀惟侍外珍愛與朱行中舎人六首違濶滋久向往徒勤比日履兹寒凝起居佳勝承旌馭至巳即欲走謁謹奉手啓上問區區又某謫居嵗久未嘗冠幘比日又苦小􅂒不能巾裹欲服帽請見先令咨稟如許乃敢前詣幸不深責又真陽一見大慰夙昔怱遽就别悵惘可知行役紛紛且未有便尚稽馳問専使辱書具審下車以來台候康健感慰兼集某䝉被如昨更五六日離韶愈逺左右伏冀為國自重又前䝉借示新詩久矣不見斯作也然世俗識真者少獨唱誰和帳勾謝民師公若不以位貌為間亦庶幾於班斤郢斵也老拙百念灰寂獨一觴一詠亦未能忘陋句數首録寄以為一笑手啓上謝恃知照不深責也又某再拜般家人䝉輟借行計遂辦非眷念特達何以及此言謝不盡悚息而巳又近因還使上問必巳聞達連雨凝隂逺想台候康勝某䝉庇粗遣已達䖍州少留須水渡更半月行也南海静治有足樂者想聞妙唱自南而北也後㑹未期萬萬若時為國自重與歐陽晦夫愁霖終日坐企談晤不審尊候佳否地獄變相巳䟦其後可詳味之似有補於世者并字數紙納去某所苦巳平無憂聞少㳺惡耗兩日為之食不下然來卒說得滅裂未足全信非久唐簿必有書來言旦夕話别次仁人之餽固當捧領但以離海南修人争致贍遺受之則若饕餮然所以一路俱不受若至此獨拜寵賜則見罪者必衆謹令馳納千萬恕察仍寢來耗幸甚幸甚答陳承務二首傾蓋一笑慰喜殊深奉違信宿懷想不巳亟辱手教且喜起居佳勝巳到䝉里承丈丈借差人轎孤旅獲濟感幸不可言愈逺萬萬若時自重又孤拙困踣言無足采足下獨悦之少年敏鋭所存如此實増欽歎然此事以臨利害不變為難也答南華明老三首衰病復還南華深欲一别祖師因見仁者遽辱専使恵手書何慰如之即日履此薄寒法履佳勝旦夕離英但江路方欲寸進不即㑹見企望之極惟萬萬為衆自重又流浪臭濁久矣道眼多可傾蓋如舊清游累日一洗無餘幸甚幸甚専使恵手書具聞别後法體安穏為慰久留贛上待水猶更旬日南望山門馳神杳靄更祈若時為衆保練又某以促裝登舟冗甚作書極草草寵示四韻可謂竒特聊答四句想大笑也石刻已領感感潘生果作墨否如成寄一丸伯固念親懷歸甚矣道話解之答錢濟明二首去嵗海南得所寄異士大彤清中丹一丸即時服之下田休休焉蓋數日後又得迨所賫來手書今又領教誨及清詩數篇髙妙絶俗想見謫居以來探道著書雲升川増可慕可畏可歎可賀也及録示訓詞誨以所不及此曽子所謂愛人以徳者敬遵用不敢忘幸甚幸甚又已到䖍州二月十間方離此此行决往常州居住不知郡中有屋可得以典買者否如無可居即欲往舒州真州皆可如聞常州東門外有裴氏宅出賣䖍士霍子侔大夫言告公令一幹事人與問當若果可居為問其直幾何度力所及即徑往議之俟至金陵當别遣人咨稟也若遂此事與公杖履往還樂此餘年踐哀詞中始願也張嘉父今安在想日益不止塗中見秦少㳺奄忽為天下惜此人物哀痛至今聞魯直無咎輩皆起而公獨為猘子所齧尚棲遲田間聖主天縦幽蔀畢照公豈久廢者惟萬萬寛中自厚又某忽又聞公有閨門之戚悲惋不巳賢淑令人久同憂患乍失内助哀獨何堪然人生此苦十人而九結髪偕老殆無而僅有也惟深照痛遣勿留胸次令子哀疚難堪惟當勉為親庭節減摧慕本欲作慰疏適旅中有少紛擾燈下倦怠不能及也千萬恕察某若住常即自與公相聚若常不可居亦須到潤與程徳孺相見公若枉駕一至金山又幸也答蘇伯固三首人至辱書承别後起居佳勝感慰深矣念親懐舊之心何時可以易此顧未有以為計當且少安之神眀知公心如此當自有感應非久見師是當謀之某留䖍州巳四十日雖得舟猶在贛外更五七日乃乗小舫往即之勞費百端又到此長少臥病幸而皆愈僕卒死者六人可駭住處非舒則常老病唯退為上䇿子由聞巳歸至潁昌矣㑹合何日萬萬保嗇又某凡百如昨但撫視易書論語三書即覺此生不虛過如來書所諭其他何足道三復誨語欽誦不巳寄恵鍾乳及檀香大濟要用乳巳足剰不煩更寄也感愧之至江晦叔已到霍子侔往太和聽命三兒子皆促裝登舟未暇上狀春暉亭記亦以忙未暇作少間當為作也令子疾知減退可喜可喜又住計龍舒為多大盆如命取去為暑中浮𤓰沉李之一快也論語說得暇當録呈源脩二老行當見之并道所諭也到䖍州日往諸刹逰覽始見中原氣象泰然不肉而肥矣何時得與公久聚盡發所藴相分付耶龍舒聞有一官庄可買已託人問之若遂則一生足食杜門矣燈下倦書不盡所懷與錢志仲三首兩日不見渴仰兼懷竊惟起居佳勝昨日水東尋幽訪古頗有所得恐欲知之藥方巳領感感又流落晚塗始獲瞻奉顧遇之重有過平生幸甚幸甚别來伏惟起居佳勝漲水遂失贛險不覺到吉皆徳庇所及其餘未易一一道謝也日逺後㑹未期豈免悵戀又某去此不復滯留至安居處當縷細馳問不敢外輒用手啓恃深眷也烏絲當用寫道書一篇非久納上惡詩不足録也事簡客稀髙堂清風有足樂者想時復見念耶吉州幕栁致與之久故知其吏幹過人不能和衆多獲嫌忌然其實無他也憔悴將老矣念非大度盛徳孰能收而用之試以衆難必有可觀者藥有毒乃能巳疾馬不蹄齧多拙於行惟深念才難勿責全也若公遂成就之此子極有可採必為門下用恃明照僣言死罪死罪與劉器之志仲本以烏絲欄求某録雜詩耳某自出意欲與寫廣成子解篇舟中熱倦遂忘之然此意終在也今豈可食言哉病不能作志仲書乞封此紙去與冦君經宿雨涼起居佳勝昨辱迂顧稍聞餘論退想忠愍之英烈有慨乎中衰病不出無縁上謁少選解去惟萬萬自重與人二首逺枉書教存問甚厚兼審比來起居佳勝慰感兼集寄示石刻仰佩至意何時㑹合少發所懷臨書但有慨歎又某日望歸蜀耳終當過岐雍間徜徉少留以償宿昔之意君自名臣子才美漸著豈復久浮沉里中宜及今為樂異時一為世故所縻求此閒適豈可復得耶偶記舊與彭年一詩讀之蓋淚下也斯人有才而病廢故常多感慨可念可念聊復録此奉呈想亦為之惘然也與宋漢傑二首某初仕即佐先公䝉顧遇之厚何時可忘流落濶逺不聞昆仲息耗每以惋歎辱書累幅話及疇昔良復慨然三十餘年矣如隔晨耳而前人彫喪略盡僕亦僅能生還人世一大夢俛仰百變無足怪者唐輔令兄今復何在未及奉書因信略道區區某只候水來即行矣餘留面盡又前日裁謝草略重煩問訊眷意愈厚感愧不巳仍審起居佳勝寵賜新詩詞格甚美伏讀慰喜但恨衰晚無以當此嘉貺也與胡郎仁脩三首某慰疏言不意變故奄罹艱疚伏惟孝誠深篤追慕痛裂荼毒難堪奈何奈何比日攀號愈逺摧毁何及伏惟順變従禮以全純孝某未獲躬詣靈幃臨書哽噎謹奉慰疏不次又某得彭城書知太夫人捐館聞問哀痛不巳行役無便未果奉疏人至忽辱手書伏審攀慕之餘孝履粗遣至慰至慰某本欲居常得舍弟書促歸許下甚力今巳决計泝汴至陳留陸行歸許矣旦夕到儀真暫留令邁一到常可以欵見矣又小二娘知持服不易且得無恙伯翁一行甚安健得翁翁二月書及三月内許州相識書皆言一宅康安亦得九郎書書字極長進今巳到太平州相次須一到潤州金山寺但無由至常州看小二娘有所幹所闕一一早道來萬萬自愛與外生栁閎展如外生人來得書知奉太夫人康寧新婦外孫各無恙北歸萬里無足言者獨不見我令妹賢妹夫此心如割介夫何負亦早世念之痛不去心數年豈賢雋厄㑹耶相見當一慟以寫之茲不一一與人二首嶺海濶絶不謂生還復得瞻奉慰幸之極比日履此秋涼起居佳福少選到岸即遂伏謁又某疲病加乏使令輒用手啓通問恃公雅度濶略細謹耳然亦皇恐不可言也答䖍人王正彦先生辱教承起居佳勝沐饋遺重増感灼茗布領抺皆珍物巳捧領訖今日與家人輩逰東禪及景徳如相訪就彼亦可與程徳孺運使三首近䝉専使至䖍逺致時服寢衣之餽尋附啟布謝必達比日起居佳勝眷愛各康健某候水過贑今方達南康軍約程四月末間到真州當遣兒子邁往宜興取行李某當泊船𤓰洲以待之不知徳孺可因巡按至常潤相約同逰金山否患難之餘老兄弟復一相聚曠世竒事也可不略喻及餘萬萬自重又某此行本欲居淮浙間近得子由書苦勸來潁昌相聚不忍違之已決従此計泝汴至陳留出陸也今有一狀干漕司一坐船乞早為差下令且在常州岸下候邁到彼乗來切望留意早早得之免滯留為幸懿叔必常得信令子新先輩必巳赴任未及書因家信道區區又告為買杭州程奕筆百枝及越州紙二千幅常使及展手者各半不罪不罪正輔知巳到京非久上狀次乞因信致懇答清涼長老昨辱佳頌見貺足為衰朽之光未縁面謝答錢濟明三首人來領手教及二詩乃信北歸灾退併獲此佳寵幸甚幸甚又知詩人窮而後工然詩語朗練無衰氣如季札者聴亦有以知君之晩節也比日起居佳勝某此去不住滯然風水難必期公閒居難以逺涉須某到真遣人奉約與徳孺同來金山迺幸也所懷未易盡言併俟面陳唯萬萬自重又某得來書乃知廖明略復官參寥落髪張嘉父春秋博士皆一時慶幸獨吾濟明尚未何也想必在旦夕因見參寥復服恨定慧欽老早化然彼視世夢幻安以復為兒子迨道其化於壽州時甚竒特想必聞其詳乃知小人能害其衣服爾至於其不可壞者乃當縁厄而愈勝爾舊有詩八首寄之巳寫付卓契順臨發乃取而燔之盖亦知其必厄於此等也今録呈濟明可為寫放舊居掛劒徐君之墓也欽詩乃極佳尋本末獲有法嗣否當載之其語録中契順又不知安在矣吾濟明刻舟求劍皆可笑也又居常之計本久定矣為子由書來苦勸歸許以此胷中殊未定待面議决之所示孫君宅子甚感其厚意且為多謝上元令姪行見之矣王范二君處皆當力言也劉道人若能同濟眀来㑹深所望未敢奉書且為致此意答廖眀略二首逺去左右俯仰十年相與更此百罹非復人事置之勿汚筆墨可也所幸平安復見天日彼數子者何辜獨先朝露吾儕皆可慶寧復戚戚於既往哉公議皎然榮辱竟安在其餘夢幻去來何啻蚊虻之過目前也矧公才學過人逺甚雖欲忘世而世不我忘晚節功名直恐不免爾老朽欲屏歸田里猶或得見蜂蟻之微尋以變滅終不足道區區仰念有以廣公之意者切欲啟事上答冗迫不能就惟深亮之又衰陋之甚惟有歸田杜門面壁更無餘事示諭極過當讀之悚汗毗陵異政謡頌藹然至今不忘為民除穢以至蠆尾吳越户知之此非特兒子能言也聖主明如日月行遂展慶衆論如此目昏不能多書悚怍不巳答孔毅夫二首久不通問計識其無它北歸所過皆公之舊迹或見清詩以増感歎忽辱手書及子由家訊窮塗一笑豈易得哉比日起居佳安眷聚各康寧仙舟想非久到闕某當老江淮間矣㑹合未期萬萬自重又中間常父傾逝不能一奉慰疏但荒徼一慨而巳慚負至今承諭子由不甚覺老聞公亦蔚然如昔不肖雖皤然亦無苦恙劉器之乃是鐵人但逝者數子百身莫贖奈何江上微雨飲酒薄醉書不能謹答蘇伯固辱書勞問愈厚實増感慨兼審尊體佳勝今日到金山寺下雖極艱澀然尚可寸進則且乗大舟以便幼累必不可前則固不可辭小艇也餘生未知所歸宿且一切信任乗流得坎行止非我也離英州日巳得玉局敕感恩之外實荷餘庇得來示又知少游乃至如此某全軀得還非天幸而何但益痛少游無窮巳也同貶死去大半最可惜者范純父及少游當為天下惜之奈何奈何子由想巳在巴陵得宫觀指揮計便沿流還潁昌某行無縁追及昨在途中風聞公下痢想安復矣答王幼安三首索居八年未嘗一通問每以慚負屢得許下兒姪書云比來親族或㫁往來唯幼安昆仲待遇加厚聞之感激人來辱書累幅陳義慨然如接古人語信王謝風氣傳之有自也老病强答不復成語不罪不罪又某初欲就食宜興今得子由書苦勸歸潁昌巳决意従之矣舟巳至廬山下不久當獲造謁未間冀若時保嗇又䝉示諭過重雖愛念如此然憂患之餘未忘憂畏朋友當思有以保全之者過實之譽願為掩諱之也許暫假大第幸甚幸甚非所敢望也得託庇偏廡謹不敢薫汚稍定居當求數畝荒隙結茅而老焉若未即填溝壑及見伯仲功成而歸為鄉里房舍伏臘相勞問何樂如之餘非面莫究答胡道師再過廬阜俯仰十九年陵谷草木皆失故態栖賢開先之勝殆忘其半幻景虛妄理固當爾獨山中道友契好如昔道在世外良非虛語道師又不逺數百里負笈相従秉燭相對恍若夢寐秋聲宿雲了然在吾目中矣幸甚幸甚乍别逺枉専使手書且審巳還舊隠起居勝常明日解舟愈逺萬萬以時自重與李公擇逆風數日為左右滯留而孤旅䝉幸多矣但以久别得一見風度亦不復以别去為戚也比日伏惟起居佳勝小舟汎汎風浪聲中此懷又費照遣矣古鐵納上餘萬萬善愛與黄師是三首比歸江淮間䝉四遣人墜教且致家信非眷念特深何以及此比日履兹畏暑起居清勝少御之除未滿公論但朝廷正欲君子在内耳行别展慶未間萬萬若時自重又子厚得雷聞之驚歎彌日海康地雖逺無瘴癘舎弟居之一年甚安穏望以此開譬太夫人也又人來兩捧教賜具審起居康勝仲子之戚惟當日逺日忘想痛割腸何所及中年以後出涕能令目闇此最可惜用鄙言慎勿出一滴也兒子之愛雖深比之自愛其目豈不有間幸深念之餘惟萬萬為國自重與子由二首子由弟得黄師是遣人賫來四月二十二日書喜知近日安勝兄在真州與一家亦健行計南北凡幾變矣遭值如此可歎可笑兄已决計従弟之言向居潁昌行有日矣適值程徳孺過金山住㑹之并一二親故皆在坐頗聞北方事有决不可往潁昌近地居者事皆可信人所報大抵相忌安排攻擊者北行漸近决不靜爾今巳决計居常州借得一孫家宅極佳浙人相喜决不失所也更留真十數日便渡江往常逾年行役且此休息恨不得老境兄弟相聚此天也吾其如天何亦不知天果於兄弟終不相聚乎士君子作事但只於省力處行此行不遂相聚非本意甚省力避害也候到定疊一兩月方遣邁去注官迨去般家過則不離左右也葬地弟請一面果决八郎婦可用吾無不可用也更破十緍買地何如留作葬事千萬莫徇俗也林子中病傷寒十餘日便卒所獲幾何遺恨無窮哀哉兄萬有一稍起之命便具所苦疾狀力辭之與迨過閉户治田養性而巳千萬勿相念今託師是致此書又程徳孺言弟令出銀二百星見借兄度手下尚未須如此已辭之矣徳孺兄弟意極佳感他感他數日熱甚舟中揮汗寫此不及作諸姪書且伸意夫人晚年且更慎䕶勿令小有疾副子孫意五郎婦更與照管慰安之便令五郎般挈也八郎續親極好但吾儕難自言可託人與說今師是已除太僕卿恐遂北行兄不能見又恐來省母蘇州若見當令探其意也少留真欲緝房緡令整齊也五娘七娘近皆得書與孫皆安胡郎亦有書來甚安行見之矣與馮祖仁三首昨日奉辭瞻戀殊甚旦來孝履佳否先什輒巳題䟦鶴鹿馬三軸追行不暇題謹同納上祖仁方在疚更不煩逺出昨所云金山之行可罷也乍逺保重又辱囬教及䝉以巖硯法醑嘉蔬珍果等為餉巳捧領訖顧無以當之適苦嗽昏倦裁謝草草又辱牋教累幅文義粲然禮意兼重非老朽所敢當藏之巾笥以為光寵幸甚幸甚比日孝履何如到韶累日疲於人事又苦河魚之疾少留調理乃行益逺愈増瞻繫也嵗莫惟更節哀自重與郭功甫二首昨辱寵臨久不聞語殊出意表蓋所謂得未嘗有也經宿起居佳勝閒居致厚餽拜賜慙感只今上謁次一面足矣幸不置酒又某今日私忌未敢上謁辱詩和呈為一笑青皮一片不以餉公則無與嘗者矣答孔毅父日至陽長仁者履之百順萃止病廢掩闗負暄獨坐醺然自得恨不同此佳味也呵呵誨諭過重乏人修寫迺以手簡為謝悚息答畢先輩適辱従者臨貺書教禮意兼重殆非不肖所堪書詞髙妙伏讀増歎病不能冠帶遂不果見愧悚無地與米元章九首嶺海八年親友曠絶亦未嘗闗念獨念吾元章邁往凌雲之氣清雄絶世之文超妙入神之字何時見之以洗我積嵗瘴毒耶今真見之矣餘無足云者又兩日來疾有増無減雖遷閘外風氣稍清但虚乏不能食口殆不能言也兒子於何處得寳月觀賦琅然誦之老夫卧聴之未半蹶然而起恨二十年相従知元章不盡若此賦當過古人不論今世也天下豈常如我輩瞶瞶耶公不久當自有大名不勞我輩說也若欲與公談則實未能想當更後數日耶又某昨日歸臥遂夜海外久無此熱殆不能堪栁子厚所謂意象非中國人也宗相遂棄世當為天下惜也餘非面莫究又某兩日病不能動口亦不欲言但困臥耳承示太宗草聖及謝帖皆不敢於病中草草題䟦謹具馳納俟小愈也河水汚濁下流薫蒸益病今日當遷往通濟停泊雖不當逺去左右且就快風活水一洗病滯稍健當奉談笑也又昨日詩發一笑耳慎勿刻石太師雄篇巳領夾軸且留下又數日不聞來音謂不我顧復渡江矣辱教即承起居佳勝感慰倍常匆匆布謝又某昨日啖冷過度夜暴下旦復疲甚食黄耆粥甚美臥閱四印竒古失病所在明日㑹食乞且罷需稍健或雨過翛然時也印却納又某食則脹不食則羸甚昨夜通旦不交睫端坐飽蚊子耳不知今夕云何度示及古文幸甚謝帖未敢輕䟦欲書數句了無意思正坐老謬耳眠食皆未佳無縁遂東當續拜簡又某一病幾不相見今日始覺有絲毫之減然未能作書也與錢濟明三首一夜發熱不可言齒間出血如蚯蚓者無數迨曉乃止憊甚細察疾狀専是熱毒根源不淺當専用清涼藥巳令用人參麥門冬茯苓三味煑濃汁渴即少啜之餘藥皆罷也莊生聞在宥天下未聞治天下也如此而不愈則天也非吾過矣楊評事與一來亦佳到此諸親知所餉一無留者獨拜蒸作之餉切望只此而巳又家有黄筌畫龍抜起兩山間隂威凜然舊作郡時以祈雨有應今夕具香燈試禱之濟明雖家居必不廢閔雨意可來燔一炷香否又䝉示諭昨日所得過矣思無邪吾子自有老拙何為者神藥希代之寳理貫幽明未敢輕議少留諦觀俟従者見臨乃面論也妙啜見分幸甚所問巳得其端通緩頰否不倦日烈見顧為望與徑山長老惟琳二首臥病五十日日以増劇巳頽然待盡矣兩日始微有生意亦未可必也適睡覺忽見刺字驚歎久之暑毒如此豈耆年者出山旅次時耶不審比來眠食何如某扶行不過數步亦不能久坐老師能相對臥談少頃即告晚涼更一訪又嶺南萬里不能死而歸宿田野遂有不起之憂豈非命也夫然生死亦細故耳無足道者惟為佛為法為衆生自重東坡全集巻八十五
