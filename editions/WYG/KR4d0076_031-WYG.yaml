body:
  text: 東坡全集巻三十一宋蘇軾撰和陶詩七十八首追和陶淵明詩引子由作東坡先生謫居儋耳寘家羅浮之下獨與㓜子過負擔度海葺茅竹而居之日啗藷芋而華屋玉食之念不存於胸中平生無所嗜好以圖史為園囿文章為鼓吹至是亦皆罷去獨猶喜為詩精深華妙不見老人衰憊之氣是時轍亦遷海康書來告曰古之詩人有擬古之作矣未有追和古人者也追和古人則始於吾吾於詩人無所甚好獨好淵明之詩淵明作詩不多然其詩質而實綺癯而實腴自曹劉鮑謝李杜諸人皆莫及也吾前後和其詩凡一百有九篇至其得意自謂不甚愧淵明今將集而併録之以遺後之君子其為我志之然吾於淵明豈獨好其詩也哉如其為人實有感焉淵明臨終疏告儼等吾少而窮苦每以家弊東西游走性剛才拙與物多忤自量為已必貽俗患黽勉辭世使汝等㓜而饑寒淵明此語蓋實録也吾真有此病而不早自知平生出仕以犯世患此所以深愧淵明欲以晚節師範其萬一也嗟乎淵明不肯為五斗米一束帶見鄉里小児而子瞻出仕三十餘年為獄吏所折困終不能悛以陷大難乃欲以桑榆之末景自托於淵明其誰肯信之雖然子瞻之仕其出處進退猶可考也後之君子其必有以處之矣孔子曰述而不作信而好古竊比於我老彭孟子曰曽子子思同道區區之迹盖未足以論士也轍少而無師子瞻既冠而學成先君命轍師焉子瞻嘗稱轍詩有古人之風自以為不若也然自其斥居東坡其學日進沛然如川之方至其詩比李太白杜子美有餘遂與淵明比轍雖馳驟從之而常出其後其和淵明轍繼之者亦一二焉丁丑十二月海康城南東齋引和時運四首丁丑二月十四日白鶴峯新居成自嘉祐寺遷入詠淵明時運詩云斯晨斯夕言息其廬似為余發也乃次其韻長子邁與余别三年矣挈携諸孫萬里逺至老朽憂患之餘不能無欣然我卜我居居非一朝龜不吾欺食此江郊廢井已塞喬木干霄昔人伊何誰其裔苖下有碧潭可飲可濯江山千里供我遐矚木固無脛瓦豈有足陶匠自至嘯歌相樂我視此邦如洙如沂邦人勸我老矣安歸自我幽獨倚門或揮豈無親友雲散莫追旦朝丁丁誰欵我廬子孫逺至笑語紛如剪髪垂髻一作剪綵垂髫覆此瓠壺三年一夢乃復見余和勸農六首海南多荒田俗以貿香為業所産秔稌不足於食乃以藷芋雜米作粥糜以取飽余既哀之乃和淵明勸農詩以告其有知者咨爾漢黎均是一民鄙夷不訓夫豈其真怨忿刼質尋戈相因欺謾莫訴曲自我人天禍爾土不麥不稷民無用物怪珍是殖播厥薫木腐餘是穯貪夫汚吏鷹鷙狼食豈無良田膴膴平陸獸蹤交締鳥喙諧穆驚麏朝射猛狶夜逐芋羮藷糜以飽耆宿聽我苦言其福永乆利爾鉏耜好爾鄰偶斬艾蓬藋南東其畝父兄搢梃以抶游手天不假易亦不汝匱春無遺勤秋有厚兾雲舉雨決婦姑畢至我良孝愛袒跣何愧逸諺戱侮博奕頑鄙投之生黎俾勿冠履霜降稻實千箱一軌大作爾社一醉醇美和停雲四首自立冬以来風雨無虛日海道斷絶不得子由書乃和淵明停雲詩以寄停雲在空黯其將雨嗟我懐人道脩且阻眷此區區俛仰再撫良辰過鳥逝不我佇􅄓作海渾天水溟濛雲屯九河雪立三江我不出門寤寐北忩念彼海康神馳徃從澟然清癯落其驕榮餽奠化之廓兮忘情萬里遲子晨興宵征逺虎在側以寧先生對奕未終摧然斧柯再游蘭亭黙數永和夢幻去來誰少誰多彈指太息浮雲㡬何和歸田園居六首三月四日游白水山佛迹巖沐浴于湯泉晞髪于懸瀑之下浩歌而歸肩輿却行以與客言不覺至水北荔枝浦上晚日葱曨竹隂蕭然時荔子纍纍如芡實矣有父老年八十五指以告余曰及是可食公能携酒来游乎意忻然許之歸卧既覺聞兒子過誦淵明歸田園居詩六首乃悉次其韻始余在廣陵和淵明飲酒二十首今復為此要當盡和其詩乃已耳今書以寄妙總大士參寥子環州多白水際海皆蒼山以彼無盡景寓我有限年東家著孔丘西家著顔淵市為不二價農為不爭田周公與管蔡恨不茅三間我飽一飯足薇蕨補食前門生餽薪米救我厨無烟斗酒與隻雞酣歌餞華顛禽魚豈知道我適物自閒悠悠未必爾聊樂我所然窮猿既投林疲馬初解鞅心空飽新得境熟夢餘想江鷗漸馴集蜑叟已還徃南池緑錢生北嶺紫笋長提壺豈解飲好語時見廣春江有佳句我醉墮𣺌莽新浴覺身輕新沐感髪稀風乎懸瀑下却行詠而歸仰觀江搖山俯見月在衣歩從父老語有約吾敢違老人八十餘不識城市娯造物偶遺漏同儕盡丘墟平生不渡江水北有幽居手挿荔枝子合抱三百株莫言陳家紫甘冷恐不如君來坐樹下飽食携其餘歸舍遺兒子懐抱不可虛有酒持飲我不問錢有無坐倚朱藤杖行歌紫芝曲不逢商山翁見此野老足願同荔枝社長作雞黍局教我同光塵月固不勝燭霜飈散氛祲廓然似朝旭莊子云月固不勝火郭象曰大而暗不若小而明陋哉斯言也余為更之曰明於大者必晦於小月能燭天地而不能燭毫釐此其所以不勝火也然卒之火勝月勝耶昔我在廣陵悵望柴桑陌長吟飲酒詩頗獲一笑適當時已放浪朝坐夕不夕矧今長閒人一劫展過隙江山互隠見出沒為我役斜川追淵明東臯友王績詩成竟何為六博本無益五月旦日作和戴主簿海南無冬夏安知歳將窮時時小搖落榮瘁俛仰中上天信包荒佳植無由豐鉏耰代肅殺有擇非霜風手栽蘭與菊侑我清宴終擷芳眼已明飲酒腹尚冲草去土自隤井深墻愈隆勿笑一畝園蟻垤齊衡嵩酬劉柴桑紅藷與紫芋逺挿墻四周且放幽蘭春莫爭霜菊秋窮冬出甕盎磊落勝農疇淇上白玉延淇上出山藥一名玉延能復過此不一飽忘故山不思馬少游與殷晋安别和送昌化軍使張中罷官赴闕孤生知永棄末路嗟長勤乆安儋耳陋日與雕題親海國此竒士官居我東鄰卯酒無虛日夜棊有逹晨小甕多自釀一瓢時見分仍將對牀夢伴我五更春暫聚水上萍忽散風中雲恐無再見日笑談來生因空吟清詩送不救歸装貧和王撫軍座送客再送張中胸中有佳處海瘴不能腓三年無所愧十口今同歸汝去莫相憐我生本無依相從大塊中㡬合㡬分違莫作徃來相而生愛見悲悠悠含山日烱烱留清暉懸知冬夜長不恨晨光遲夢中無與别作詩記忘遺和荅龎參軍三送張中留燈坐逹曉要與影晤言下帷對古人何暇復窺園使君本學武少誦十三篇頗能口擊賊戈㦸亦森然才智誰不如功名歎無縁獨來向我說憤懣當奚宣一見勝百聞徃鏖臯蘭山白衣挾三矢趂此征遼年形贈影天地有常運日月無閒時孰居無事中作止推行之細察我與汝相因以成茲忽焉乘物化豈與生滅期夢時我方寂偃然無所思胡為有哀樂輒復隨漣洏我舞汝淩亂相應不少疑還將醉時語荅我夢中辭影荅形丹青寫君容常恐畫師拙我依月燈出相肖兩竒絶姸媸本在君我豈相媚悅君如火上烟火盡君乃别我如鏡中像鏡壞我不滅雖云附隂晴了不受寒熱無心但因物萬變豈有竭醉醒皆夢爾未用議優劣神釋二子本無我其初因物著豈惟老變衰念念不如故知君非金石安足長託附莫從老君言亦莫用佛語仙山與佛國終恐無是處甚欲隨陶翁移家酒中住醉醒要有盡未易逃諸數平生逐兒戱處處餘作具所至人聚觀指目生毁譽如今一弄火好惡都焚去既無負載勞又無冦攘懼仲尼晚乃覺天下何思慮怨詩楚調示龎主簿鄧治中當歡有餘樂在戚亦頽然淵明得此理安處故有年嗟我與先生所賦良竒偏人間少宜適惟有歸耘田我昔墮軒冕毫釐真市㕓困來卧重裀憂愧自不眠如今破茅屋一夕或三遷風雨睡不知黄葉滿枕前寧當出怨句慘慘如孤烟但恨不早悟猶推淵明賢九日閒居明日重九雨甚展轉不能寐起坐索酒和淵明一篇醉熟昏然殆不能佳也九日獨何日欣然愜平生四時靡不佳樂此古所名龍山憶孟子栗里懐淵明鮮鮮霜菊艶溜溜糟牀聲閒居知令節樂事滿餘齡登髙望雲海醉覺三山傾長歌振履商起舞帶索榮坎軻識天意淹留見人情但願飽秔稌年年樂秋成和移居二首余去歳三月自水東嘉祐寺遷居合江樓迨今一年多病寡歡頗懐水東之樂也得歸善縣後隙地數畝父老云古白鶴觀也意欣然欲居之乃和此詩昔我初來時水東有幽宅晨與烏鵲朝暮與牛羊夕誰令遷近市日有造請役歌呼雜閭巷鼔角鳴枕席出門無所詣樂事非宿昔病瘦獨彌年束薪誰與析洄潭轉碕岸我作江郊詩今為一㕓氓此地乃得之葺為無邪齋思我無所思古觀廢已乆白鶴歸何時我豈丁令威千嵗復還兹江山朝福地古人不吾欺嵗暮作和張常侍十二月二十五日酒盡取米欲釀米亦竭時呉逺游陸道士客於余因讀淵明嵗暮和張常侍亦以無酒為歎乃用其韻贈二子我生有天禄𤣥膺流玉泉何事陶彭澤乏酒每形言仙人與道士自養豈在繁但使荆棘除不憂梨棗愆我年六十一頽景薄西山嵗暮似有得稍覺散亡還有如千丈松常苦弱蔓纒養我嵗寒枝㑹有解脫年米盡初不知但怪饑䑕遷二子真我客不醉亦陶然和郭主簿二首清明日聞過誦書聲節閒美感念少時悵然追懐先君宫師之遺意且念淮徳二㓜孫無以自遣乃和淵明二篇隨意所寓無復倫次也今日復何日髙槐布初隂良辰非虛名清和盈我襟孺子巻書坐誦詩如鼔琴却念四十年玉顔如汝今閉戸未嘗出出為鄰里欽家世事酌古百史手自斟當年二老人喜我作此音淮徳入我夢角羈未勝簪孺子笑問我君何念之深雀鷇含淳音竹萌抱静節此兩句先君少時詩失其全首誦我先君詩肝肺為澄澈猶為鳴鶴和未作獲麟絶願因騎鯨李追此御風列丈夫貴出世功名豈人傑家書三萬巻獨取服食訣地行即空飛何必挾日月示周掾祖謝和􅌎城東學舍作聞有古學舍竊懐淵明欣攝衣造兩塾窺戸無一人邦風方杞夷廟貎猶殷因先生饌已缺弟子散莫臻忍饑坐談道嗟我亦晚聞永言百世祀未補平生勤今此復何國豈與陳蔡隣永愧虞仲翔弦歌滄海濵和荅龎參軍六首周循州彦質在郡二年書問無虛日罷歸過惠為余留半月既别和此詩送之我見異人且得異書挾書從人何適不娯羅浮之趾卜我新居而非𤣥徳三顧我廬㫖酒荔蕉絶甘分珍雖云晚接數面自親海隅一笑豈云無人無酒酤我或乞其隣將行復止眷言孜孜茍有于中傾倒出之奕奕千言粲焉陳詩觴行筆落了不容思丱妙侍側兩髦了分歌舞壽我永為歡欣曲終悽然仰視浮雲此曲此聲何時復聞擊鼓其鏜船開艣鳴顧我而言雨泣載零子卿白首當還西京遼東萬里亦歸管寧感子至意託辭西風吾生一塵寓形空中願言謙亨君子有終功名在子何異我躬和連雨獨飲二首吾謫海南盡賣酒器以供衣食獨有一荷葉盃工製美妙留以自娯乃和淵明連雨獨飲平生我與我舉意輒自然豈止磁石鍼雖合猶有間此外一子由出處同偏僊晚景最可惜分飛海南天紏纒一作躔不吾欺寧此憂患先顧影一杯酒誰謂無徃還寄語海北人今日為何年醉裏有獨覺夢中無雜言阿堵不解醉誰歟此頺然誤入無功鄉掉臂嵇阮間飲中八仙人與我俱得仙淵明豈知道醉語忽談天偶見此物真遂超天地先醉醒可還酒此覺無所還清風洗徂暑連雨催豐年牀頭伯雅君此子可與言和贈羊長史得鄭㑹嘉靖老書欲於海舶載書千餘巻見借因讀淵明贈羊長史詩云愚生三季後慨然念黄虞得知千載事上頼古人書次其韻以謝鄭君我非皇甫謐門人如摯虞不持兩鴟酒肯借一車書欲令海外士觀經似鴻都結髪事文史俯仰六十餘老馬不耐放長鳴思服輿故知根塵在未免病藥俱念君千里足歴塊猶踟蹰好學真伯業比肩可相如此書乆已熟救我今荒蕪顧慙桑榆迫豈厭詩酒娯奏賦病未能草𤣥老更踈猶當距楊墨稍欲懲荆舒和乞食莊周昔貸粟猶欲舂脫之魯公亦乞米炊煑尚不辭淵明端乞食亦不避嗟來嗚呼天下士死生寄一杯斗水何所直逺汲苦姜詩幸有餘薪米養此老不才至味乆不壊可為子孫貽和胡西曹示顧賊曹長春如稚女飄搖倚輕颸卯酒暈玉頰紅綃巻生衣低顔香自歛含睇意頗㣲寧當娣黄菊未肯姒戎葵誰言此弱質閲嵗觀盛衰頩然疑薄怒沃盥未可揮瘴雨吹蠻風凋零豈容遲老人不解飲短句餘清悲和游斜川正月五日與兒子過出游作謫居澹無事何異老且休雖過靖節年未失斜川游春江緑未波人卧船自流我本無所適汎汎隨鳴鷗中流遇洑洄捨舟歩曽丘有口可與飲何必逢我儔過子詩似翁我唱而輒酬未知陶彭澤頗有此樂不問㸃爾何如不與聖同憂問翁何所笑不為由與求和已酉歳九月九日十月初吉菊始開乃與客作重九因次韻淵明已酉嵗九月九日一首胡廣飲菊潭水而壽然李固傳賛云其視胡廣趙戒猶糞土也今日我重九誰謂秋冬交黄花與我期草中實後凋香餘白露乾色映青松髙悵望南陽野古潭霏慶霄伯始真糞土平生夏畦勞飲此亦何益内熱中自焦持我萬家春一酹五桞陶夕英幸可掇繼此木蘭朝和癸卯歳始春懐古田舍儋人黎子雲兄弟居城東南躬農圃之勞偶與軍使張中同訪之居臨大池水木幽茂坐客欲為醵錢作屋余亦欣然許之名其屋曰載酒堂用淵明始春懐古田舍韻作二首退居有成言垂老竟未踐何曽淵明歸屢作敬通免休閒等一味妄想生愧靦淵明本用緬字聊取其同音字聊將自知明稍積在家善城東兩黎子室邇人自逺呼我釣其池人魚兩忘返使君亦命駕恨子林塘淺茅茨破不補嗟子乃爾貧菜肥人愈瘦竈閒井常勤我欲致薄少解衣勸坐人臨池作虛堂雨急瓦聲新客來有美載果熟多幽欣丹荔破玉膚黄柑溢芳津借我三畝地結茅為子鄰鴂舌儻可學化為黎母民和飲酒二十首吾飲酒至少常以把杯為樂徃徃頹然坐睡人見其醉而吾中了然蓋莫能名其為醉為醒也在揚州時飲酒過午輒罷客去解衣盤礴終日歡不足而適有餘因和淵明飲酒二十首庶以髣髴其不可名者示舍弟子由晁無咎學士我不如陶生世事纒綿之云何得一適亦有如生時寸田無荆棘佳處正在茲縱心與事徃所遇無復疑偶得酒中趣空杯亦常持二豪詆醉客氣湧胸中山漼然忽氷釋亦復在一言嗇氣實其腹云當享長年少飲得徑醉此祕君勿傳道䘮士失已出語輒不情江左風流人醉中亦求名淵明獨清真談笑得此生身如受風竹掩冉衆葉驚俯仰各有態得酒詩自成蠢蠕食葉蟲仰空慕髙飛一朝傅兩趐乃得粘網悲啁啾厭巢雀沮澤疑可依赴水生兩殻遭閉何時歸二蟲竟誰是一笑百念衰幸此未化間有酒君莫違小舟真一葉下有暗浪喧夜棹醉中發不知枕几偏天明問前路已度千金山嗟我亦何為此道常徃還未來寧早計既徃復何言百年六十化念念竟非是是身如虛空誰受譽與毁得酒未舉杯䘮我固忘爾倒牀自甘寢不擇菅與綺頃者大雪年海波飜玉英有士常痛飲饑寒見真情牀頭有敗榼孤坐時一傾未能平體粟且復澆腸鳴脫衣裹凍酒毎醉念此生我坐華堂上不改麋鹿姿時來蜀岡頭喜見霜松枝心知百尺底已結千歳竒煌煌凌霄花纒繞復何為舉觴酹其根無事莫相羈芙蓉在秋水時節自闔開清風亦何意入我芝蘭懐一隨採折去永與江湖乖斷絲不復續斗水何足栖不如玉井蓮結根天池泥感此每自慰吾事幸不諧醉中有歸路了了初不迷乘流且復逝抵曲吾當迴籃輿兀醉守路轉古城隅酒力如過雨清風消半途前山正可數後騎且勿驅我縁在東南徃寄白髪餘遙知萬松嶺下有三畝居民勞吏無徳嵗美天有道暑雨避麥秋温風送蠶老三咽初有聞一溉未濡槁詔書寛積欠父老顔色好再拜賀吾君獲此不貪寳頹然笑阮籍醉儿書謝表我夢入小學自謂總角時不謂有白髪猶誦論語辭人間本兒戱顛倒略似茲惟有醉時真空洞了無疑墜車終無傷莊叟不吾欺呼兒具紙筆醉語輒録之醉中雖可樂猶是生滅境云何得此身不醉亦不醒癡如景升牛莫保尻與領黠如東郭㕙束縛作毛頴乃知嵇叔夜非坐虎文炳我家小馮君天性頗純至清坐不飲酒而能容我醉歸休要相依謝病當以次豈知山林士骯髒乃爾貴乞身當念早過是恐少味去鄉三十年風雨荒舊宅惟存一束書寄食無定迹每用愧淵明尚取禾三百頎然六男子粗可傳清白於吾豈不多何事復歎惜嘵嘵六男子絃誦各一經復生五丈夫戢戢丁欲成歸田了門戸與國充踐更普兒初學語玉骨開天庭淮老如鶴雛破殻已能鳴舉酒屬千里一歡愧凢情淮海雖故楚無復輕揚風齋厨聖賢雜無事時一中誰言大道逺正頼三杯通使君不夕坐衙門散刀弓何人築東臺一郡坐可得亭亭古浮圖獨立表衆惑蕪城閲興廢雷塘幾開塞明年起華堂置酒弔亡國無令竹西路歌吹久寂黙晁子天麒麟結交及未仕髙才固難及雅志或類已各懐伯業能共有丘明恥歌呼時就君指我醉鄉里呉公門下客賈誼獨見紀請作鵩鳥賦我亦得坎止行樂當及時緑髪不可恃蓋公偶談道齊相獨適真頹然不事事客至先飲醇當時劉項罷四海創痍新三杯洗戰國一斗銷彊秦寂寥千載後陽公嗣前塵醉卧客懐中言笑徒多勤我時閲舊史獨與三人親未暇餐脫粟苦心學平津草書亦何用醉墨淋衣巾一揮三十幅持去聽坐人和止酒丁丑歳余謫海南子由亦貶雷州五月十一日相遇於藤同行至雷六月十一日相别渡海余時病痔呻吟子由亦終夕不寐因誦淵明詩勸余止酒乃和元韻因以贈别庶㡬真止矣時來與物逝路窮非我止與子各意行同落百蠻裏蕭然兩别駕各携一稚子子室有孟光我室惟法喜相逢山谷間一月同卧起茫茫海南北粗亦足生理勸我師淵明力薄且為已㣲痾坐杯勺止酒則瘳矣望道雖未濟隠約見津涘從今東坡室不立杜康祀和還舊居夢歸惠州白鶴山居作痿人常念起夫我豈忘歸不敢夢故山恐興墳墓悲生世本暫寓此身念念非鵞城亦何有偶拾鶴毳遺窮魚守故沼聚沫猶相依大兒當門户時節供丁推夢與鄰翁言憫然憐我衰徃來付造物未用相招麾和始經曲阿虞人非其招欲徃畏簡書穆生責醴酒先見我不如江左古弱國强臣擅天衢淵明墮詩酒遂與功名踈我生值良時朱金義當紆天命適如此幸収廢棄餘獨有愧此翁大名難乆居不思犧牛龜兼取熊掌魚北郊有大賚南冠解囚拘眷言羅浮下白鶴返故廬和庚戌嵗九月中於西田穫早稻蓬頭三獠奴誰謂愿且端晨興洒掃罷飽食不自安願治此圃畦少資主游觀晝功不自覺夜氣乃潜還早韭欲爭春晚菘先破寒人間無正味美好出艱難早知農圃樂豈有非意干尚恨不持鉏未免騂我顔此心苟未降何適不間關休去復歇去菜食何所歎和丙辰嵗八月中於下潠田舍穫聚糞西垣下鑿泉東垣隈勞辱何時休宴安不可懐天公豈相喜雨霽與意諧黄菘養土羔老楮生樹雞未忍便烹煑繞觀日百迴跨海得逺信氷盤鳴玉哀茵陳㸃膾縷照坐如花開一與蜑叟辭蒼顔兩摧頽齒根日浮動自與粱肉乖食菜豈不足一作好呼兒拆雞栖和乙酉嵗三月為建威參軍使都經錢溪和遊城北謝氏廢園作喬木巻蒼藤浩浩崩雲積謝家堂前燕對語悲宿昔仰看桄榔樹𤣥鶴舞長翮新年結荔子主人黄壌隔溪隂宜館我稍省薪水役相如賣車騎五畝亦可易但恐鵩鳥来此生還蕩析誰能挿籬槿䕶此殘竹栢辛丑七月赴假還江陵夜作途中作口號和郊行步月缺月不蚤出長林踏青㝠犬吠主人怒愧此閭里情怪我夜不歸茜袂窺柴荆雲間與地上待我兩友生驚鵲再三起樹端已㣲明白露浄原野始覺丘陵平暗蛩方夜績孤螢亦宵征歸來閉戸坐寸田且黙耕莫赴花月期免為詩酒縈詩人如布榖聒聒常自名東坡全集巻三十一
