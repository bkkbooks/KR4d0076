body:
  text: 東坡全集巻二十七宋蘇軾撰詩六十六首次韻荅荆門張都官維見和恵泉詩楚人少井飲地氣常不洩蓄之為恵泉坌若有所拆泉源本無情豈問濁與澈貪愚彼二水終古恥莫雪只應所處然遂使語異别泉旁地平衍泉上山嵽嵲君子慎所居此義安可闕古人貴言贈敢用况髙節不為冬霜乾肯畏夏日烈泠泠但不已海逺要當徹浰陽早發富貴本先定世人自榮枯囂囂好名心嗟我豈獨無不能便退縮但使進少徐我行念西國巳分田園蕪南來竟何事碌碌隨商車自進苟無補乃是懶且愚人生重意氣出處夫豈徒永懷江陽叟種藕春滿湖夜行觀星天髙夜氣嚴列宿森就位大星光相射小星鬧若沸天人不相干嗟彼本何事世俗强指擿一一立名字南箕與北斗乃是家人器天亦豈有之無乃遂自謂迫觀知何如逺想偶有以茫茫不可曉使我長歎喟漢水捨棹忽逾月沙塵困逺行襄陽逢漢水偶似蜀江清蜀江固浩蕩中有蛟與鯨漢水亦云廣欲涉安敢輕文王化南國遊女儼如卿洲中浣沙子環珮鏘鏘鳴古風隨世變寒水空泠泠過之不敢慢佇立整冠纓萬山西行度連山北出臨漢水漢水蹙成潭旋轉山之趾禪房乆已壞古甃含清泚下有仲宣欄綆刻深容指回頭望西北隱隱龜背起傳云古隆中萬樹桑柘美月烱轉山曲山上見洲尾緑水帶平沙盤盤如抱珥山川近且秀不到懶成恥問之安能詳畫地費簪箠隆中諸葛來西國千年愛未衰今朝遊故里蜀客不勝悲誰言襄陽野生此萬乘師山中有遺貌矯矯龍之姿龍蟠山水秀龍去淵潭移空餘蜿蜒迹使我寒涕垂竹葉酒楚人汲漢水釀酒古宜城春風吹酒熟猶似漢江清耆舊何人在丘墳應巳平惟餘竹葉在留此千古情鯿魚曉日照江水遊魚似玉瓶誰言解縮項貪餌每遭烹杜老當年意臨流憶孟生吾今又悲子輟筯涕縱横望夫臺在忠州南數十里山頭孤石逺亭亭江轉船回石似屛可憐千古長如昨船去船來自不停浩浩長江赴滄海紛紛過客似浮萍誰能坐待山月出照見寒影髙伶俜永安宫今䕫之永安門即宫之遺址千古陵谷變故宫安得存徘徊問耆老惟有永安門遊人雜楚蜀車馬晚喧喧不見重樓好誰知昔日尊吁嗟蜀先主兵敗此亡魂只應法正死使公去遭燔八陣磧平沙何茫茫髣髴見石蕝縱横滿江上嵗歲沙水齧孔明死已乆誰復辨行列神兵非學到自古不留訣至人已心悟後世徒妄說自從漢道衰蜂起盡奸傑英雄不相下禍難乆連結驅民市無烟戰野江流血萬人賭一擲殺盡如沃雪不為乆逺計草草常無法孔明最後起意欲掃羣孽﨑嶇事節制隱忍乆不决志大遂成迂嵗月去如瞥六師紛未整一旦英氣折唯餘八陣圖千古壯䕫峽諸葛鹽井井有十四自山下至山上其十三井常空盛夏水漲則鹽泉迤􅆔遷去常去於江水之所不及五行水本醎安擇江與井如何不相入此意復誰省人心固難足物理偶相逞猶嫌取未多井上無閒綆潁大夫廟人情難强回天性可微感世人争曲直苦語費搖撼大夫言何柔㬥主意自慘荒祠旁孤塜古隧有殘坎千年惟茅焦世亦貴其膽不解此微言脫衣徒勇敢許州西湖西湖小雨晴灧灧春渠長來從古城角夜半傳新響使君欲春遊浚沼役千掌紛紜具畚鍤鬧若蟻運壤夭桃弄春色生意寒猶怏唯有落殘梅標格若矜爽遊人坌已集挈榼三且兩醉客卧道傍扶起尚偃仰池臺信宏麗貴與民同賞但恐城市歡不知田野愴潁川七不登野氣長蒼莽誰知萬里客湖上獨長想江上值雪效歐陽體限不以鹽玉鶴鷺絮蝶飛舞之類為比仍不使皓白潔素等字縮頸夜眠如凍龜雪來唯有客先知江邊曉起浩無際樹杪風多寒更吹青山有似少年子一夕變盡滄浪髭方知陽氣在流水沙上盈尺江無澌隨風顛倒紛不擇下滿坑谷髙陵危江空野闊落不見入户但覺輕絲絲沾裳細看若刻鏤豈有一一天工為霍然一麾遍九野吁此權柄誰執持世間苦樂知有幾今我幸免沾膚肌山夫只見壓樵擔豈知帶酒飄歌兒天王臨軒喜有麥宰相獻壽嘉及時凍吟書生筆欲折夜織貧女寒無幃髙人著履踏冷冽飄拂巾帽真仙姿野僧斫路出門去寒液滿鼻清淋漓洒袍入袖濕靴底亦有執版趨堦墀舟中行客何所愛願得獵騎當風披草中咻咻有寒孤隼下擊千夫馳􅒱冰煑鹿最可樂我雖不飲强倒巵楚人自古好弋獵誰能徃者我欲隨紛紜旋轉從滿面馬上操筆為賦之渚宫渚宫寂寞依古郢楚地荒茫非故基二王臺閣巳鹵莽湘東王髙氏何况逺問縱横時楚王獵罷擊靈鼓猛士操舟張水嬉釣魚不復數魚鼈大鼎千石烹蛟螭當時郢人架宫殿意思絶妙般與倕飛樓百尺照湖水上有燕趙千蛾眉臨風揚揚意自得長使宋玉作楚詞秦兵西來取鐘簴故宫禾黍秋離離千年壯觀不可復今之存者蓋已卑池空野逈樓閣小惟有深竹藏狐狸臺中絳帳誰復見臺下野水一作鴨浮清漪緑牕朱户春晝閉想見深屋彈朱絲腐儒亦解愛聲色何用白首談孔姬沙泉半涸草堂在破窻無紙風颸颸陳公蹤跡最未逺七瑞寥落今何之百年人事知幾變直恐荒廢成空陂誰能為我訪遺迹草中應有湘東碑出峽入峽喜巉嵓出峽愛平曠吾心淡無累遇境即安暢東西徑千里勝處頗屢訪幽尋逺無厭髙絶每先上前詩尚遺略不録乆恐忘憶從巫廟囘中路寒泉漲汲歸真可愛翠碧光滿盎忽驚巫峽尾巖腹有穿壙仰見天蒼蒼石室開南嚮宣尼古廟宇叢木作幃帳鐡楯横半空俯瞰不計丈古人誰架構下有不測浪石竇見天囷瓦棺悲古葬新灘阻風雪村落去携杖亦到龍馬溪茒屋沽村釀玉虚悔不至實為舟人誑聞道石最竒寤寐見怪狀峽山富竒偉得一知幾喪苦恨不知名厯厯但想像今朝脫重險楚水渺平蕩魚多客庖足風順行意王追思偶成篇聊助舟人唱神女廟大江從西來上有千仭山江山自環擁恢詭富神姦深淵鼉鼈横去聲巨壑蛇龍頑旌陽斬長蛟雷雨移蒼灣蜀守降老蹇至今帶連環縱横若無主蕩逸侵人寰上帝降瑤姬來處荆巫間神仙豈在猛玉座幽且閒飄蕭駕風馭弭節朝天闗倐忽巡四方不知道里艱古粧具法服邃殿羅烟鬟百神自奔走雜㳫來趨班雲興靈怪聚雲散鬼神還茫茫夜潭靜皎皎秋月彎還應搖玉珮來聴水潺潺巫山瞿塘迤邐盡巫峽峥嶸起連峯稍可怪石色變蒼翠天工運神巧漸欲作竒偉坱軋勢方深結構意未遂旁觀不暇瞬步步造幽䆳蒼崖忽相逼絶壁凜可悸仰觀八九頂俊爽淩顥氣晃蕩天宇髙崩騰江水沸孤超兀不讓直拔勇無畏攀縁見神宇憇坐就石位巉巉隔江波一一問廟吏遙觀神女石綽約誠有以俯首見斜鬟拖霞弄脩帔人心隨物變逺覺含深意野老笑吾旁少年嘗屢至去隨猿猱上反以繩索試石笋倚孤峰突兀殊不類世人喜神怪論說驚幼稚楚賦亦虚傳神仙安有是次問掃壇竹云此今尚爾翠葉紛下垂婆娑緑鳯尾風來自偃仰若為神物使絶頂有三碑詰曲古篆字老人那解讀偶見不能記窮探到峰背採斫黄楊子黄楊生石上堅瘦紋如綺貪心去不顧澗谷千尋縋山髙虎狼絶深入坦無忌洪濛草樹密䓗蒨雲霞膩石竇有洪泉甘滑如流髓終朝自盥潄冷冽清心胃浣衣掛樹梢磨斧就石鼻徘徊雲日晚歸意念城市不到今十年衰老筋力憊當時伐殘木牙蘖已如臂忽聞老人說終日為嘆喟神仙固有之難在忘勢利貧賤爾何愛棄去如脫屣嗟爾苦無還絶糧應不死觀大水望朝陽巖作朝陽巖前不結廬下眺江水百步餘春泉濺濺出乳竇青莎白石半洿涂不到津頭二三日誰知江水漲天墟遙望横盃不敢濟巖口正有人罾魚滄洲亭懷古湘水悠悠天際來夾江古木抱山回城中人物若可數日晏市散多蒼苔九嶷巉天古雲埋遙想帝子龍車迴心衰目極何可望九歌寂寂令人哀栢家渡栢家渡西日欲落青山上下猿鳥樂欲因新月望呉雲遙看北斗掛南嶽一夢愔愔四十秋古人不死終未休草舍蕭條誰與語香風欲過白蘋洲清逺舟中寄耘老小寒初渡梅花嶺萬壑千巖背人境清逺聊為泛宅行一夢分明墮鄉井覺來滿眼是湖山鴨緑波搖鳯凰影海陵居士無雲梯嵗晚結廬潁水湄山腰自懸蒼玉珮野馬不受黄金羈門前車蓋獵獵走笑倚清流數鬢絲汀洲相見春風起白蘋吹花散烟水萬里飄蓬未得歸目斷滄浪淚如洗北雁南來遺素書苦言大浸沒我廬清齋十日不燃鼎曲突徃徃巢龜魚今年玉粒賤如水青銅欲買囊已虛人生百年如寄爾七十朱顔能有幾有子休論賢與愚倪生枉却帶經鋤天南看取東坡叟可是平生廢讀書書堂嶼蒼山古木書堂嶼北出湘水百餘步誰為徃來虧世界至今人指安禪處豈無驚蛇與飛鳥後來那復知其趣不知我身今是否空記名稱作常住醉睡者有道難行不如醉有口難言不如睡先生醉卧此石間萬古無人知此意戲詠子舟畫兩竹兩鸜鵒風晴日暖搖雙竹竹間對語雙鸜鵒鸜鵒之肉不可食人生不才果為福子舟之筆利如錐千變萬化皆天機未知筆下鸜鵒語何似夢中蝴蝶飛老翁井井中老翁悞年華白沙翠石公之家公來無蹤去無跡井面團圓水生花翁今與世兩何與無事紛紛驚牧豎改顔易服與世同無使世人知有翁贈山谷子黄童三尺世無雙筆頭衮衮懸秋江不憂老子難為父平生崛强今心降我來喜共阿戎語應敵縱横如急雨生子還如孫仲謀豚犬謾多何足數黄家小兒名拾得眉如長松眼如漆只今數嵗已動人老人留眼看他日笑君老蚌生明珠自笑此物吾家無君當置酒我當賀有兒傳業更何須觀子玉郎中草聖柳侯運筆如電閃子雲寒悴羊欣儉百斛明珠便可扛此書非我誰能雙鰒魚行漸臺人散長弓射初噉鰒魚人未識西陵衰老繐帳空肯向北河親饋食兩雄一律盗漢家嗜好亦若肩相差食每對之先太息不因噎嘔縁瘡痂中間霸據闗梁隔一枚何啻千金直百年南北鮭菜通徃徃殘餘飽臧獲東隨海舶號倭螺異方珍寶來更多磨沙瀹瀋成大胾剖􅑕作脯分餘波君不聞蓬莱閣下駞碁島八月邊風備胡獠舶船跋浪黿鼉震長鑱鏟處崖谷倒膳夫善治薦華堂坐令雕俎生輝光肉芝石耳不足數醋芼魚皮真倚墻中都貴人珍此味糟浥油藏能逺致割肥方厭萬錢厨决眥可醒千日醉三韓使者金鼎來方奩饋送煩輿臺遼東太守逺自獻臨菑掾吏誰為材吾生東歸收一斛包苴未肯鑽華屋分送羮材作眼明却取細書防老讀次韻水官詩幷引净因大覺璉師以閻立本畫水官遺編禮公公既報之以詩謂某汝亦作某頓首再拜次韻仍録二詩為一巻以獻水官騎蒼龍龍行欲上天手攀時且住浩若乘風船不知幾何長足尾猶在淵下有二從臣左右乘魚黿矍鑠相顧視風舉衣袂翻女子侍君側白頰垂雙鬟手執雉尾扇容如未開蓮從者八九人非鬼非戎蠻出水未成列先登揚旗旜長刀擁旁牌白羽注强弮雖服甲與裳狀貌猶鯨鱣水獸不得從仰面以手扳空虛走雷霆雨雹晦九川風師黑虎囊面目昏塵烟翼從三神人萬里朝天闗我從大覺師得此詭怪編畫者古閻子于今三百年見者誰不愛予者誠已難在我猶在子此理寧非禪報之以好詞何必畫在前老泉髙人豈學畫用筆乃其天譬如善游人一一能操船閻子本逢掖疇昔慕雲淵丹青偶為戲染指初嘗黿愛之不自已筆勢如風翻傳聞貞觀中左袵解椎鬟南夷羞白雉佛國貢青蓮詔令擬王㑹别殿寫戎蠻熊冠金絡額豹袖擁旛旜傳入應門内俯伏脫劒弮夭姿儼龍鳯雜㳫朝鵬鱣神功與絶跡後世兩莫扳自從李氏亡羣盗竊山川長安三日火至寶隨飛烟尚有脫身者漂流出東闗三官豈容獨得此今已編吁嗟至神物㑹合當有年京城諸權貴欲取百計難贈以玉如意豈能動髙禪信應一篇詩皎若畫在前弔徐徳占幷引余初不識徳占但聞其初為吕恵卿所薦以處士用元豐五年三月偶以事至蘄水徳占聞余在傳舎惠然見訪與之語有過人者是嵗十月聞其遇禍作詩弔之美人種松栢欲使低暎門栽培雖易長流惡病其根哀哉嵗寒姿骯髒誰與倫竟為明所悞不免刀斧痕一遭兒女汚始覺山林尊從來覔棟梁未免傍籬藩南山隔秦嶺千樹龍蛇奔大厦若果傾萬牛何足言不然老巖壑合抱枝生孫死者不可悔吾將遺後昆題李伯時淵明東籬圖彼哉嵇阮曹終以明自膏靖節固昭曠歸來侣蓬蒿新霜著疎栁大風起江濤東籬理黄華意不在芳醪白衣挈壺至徑醉還遊遨悠然見南山意與秋氣髙李白謫仙詩我居青空裏君隱黄埃中聲形不相弔心事難形容欲乘明月光訪君開素懷天盃飲清露展翼登蓬萊佳人持玉尺度君多少才玉尺不可盡君才無時休對面一笑語共躡金鼇頭絳宫樓闕百千仭霞衣誰與雲烟浮數日前夢一僧出二鏡求詩僧以鏡置日中其影甚異其一如芭蕉其一如蓮花夢中與作詩君家有二鏡光景如湛盧或長如芭蕉或圓如芙蕖飛電着子壁明月入我廬月下合三壁日月跳明珠問子是非我我是非文殊飲酒四首我觀人間世無如醉中真虛空為銷殞况乃百憂身惜哉知此晚坐令華髪新聖人驟難得日且致賢人左手持蟹螯舉觴矚雲漢天生此神物為我洗憂患山川同恍惚魚鳥共蕭散客至壺自傾欲去不得閒有客逺方來酌我一甌茗我醉方不啜强啜忽復醒既鑿渾沌氏遂逺華胥境操戈逐儒生舉觴還酩酊雷觴淡於水經年不濡唇爰有擾龍裔為造英靈春英靈韻甚髙蒲萄難與鄰他年血食汝當配杜康神大雪獨留尉氏古驛無人雪滿庭有客冒雪來自北紛紛笠上巳盈寸下馬登堂面蒼黑苦寒有酒不能飲見之何必問相識我酌徐徐不滿觥看客倒盡不留濕千門晝閉行路絶相與笑語不知夕醉中不復問姓名上馬忽去横短策阮籍嘯臺在尉氏阮生古狂達遁世黙無言猶餘胸中氣長嘯獨軒軒髙情遺萬物不與世俗論登臨偶自寫激越蕩乾坤醒為嘯所發飲為醉所昏誰能與之較亂世足自存留别叔通元弼坦夫田三昔同寮向我每傾倒當年或齟齬反覆看愈好冦三我部民孝悌化鄰保有如袁伯業苦學到裒老石生吾邑子勁立風中草宦遊甑生塵菽水媚翁媪我窮交舊絶計拙集枯槁三子尤見存徃復紛紵縞迎我淮水北送我睢陽道願存金石契凜凜貫華皓余歸自道場何山遇大風因憇耘老溪亭命官奴秉燭捧硯寫風竹一枝題詩云更將掀舞勢把燭畫風篠美人為破顔憐此腰肢裊和寄天選長官寓形宇宙間佚我方以老流光安足恃百嵗同過鳥頃子縈網羅文采縁自表自古山林人何曾識機巧但記寒巖翁論心秋月皎黄香十年舊禪學㕘衆妙虚懷養天和肯狥奔走鬧官居職事理晨起何用早桐隂滿西齋叱吏供灑掃眷予東南來野飯煮芹蓼葆光既清尚令尹亦髙蹈相將古寺行軟語頽晚照公家有畸人公有族人隱嵩山虚縁能自保卜築嵩山陽何一作行當從結好中山饒勝景一覽未易飽何時命巾車共陟雲外嶠翻然一作思筋力疲不復追踴跳公詩擬南山雄拔千丈峭形容逼天真邂逅識其要藩籬吾未窺敢議窮閫奥昭陵六馬唐文皇戰馬也琢石象之立昭陵前客有持此石本示予為賦之天將剗隋亂帝遣六龍來森然風雲姿颯爽毛骨開飇馳不及視山川儼莫回長鳴視八表擾擾萬駑駘秦王龍鳯姿魯鳥不足摧腰間大白羽中物如風雷區區數豎子搏取若提孩手持掃天帚六合如塵埃艱難濟大業一一非常才維時六驥足績與英衛陪功成鏘八鸞玉輅行天街荒凉昭陵闕古石埋蒼苔顔闔顔闔古有道躬耕自衣食區區魯小邦不足隱明徳軺軒來我門聘幣繼金璧山門應使者耕稼不謀國但疑誤將命非敢憚行役使者反錫命户庭空履迹薄俗狥世榮截趾履之適所重易所輕隋珠彈飛翼伊人畏照影獨往就隂息鼎俎薦忠賢誰能死燔炙念彼藏皮冠安知獲堯客送朱世昌使蜀七首藹藹青城雲娟娟峨嵋月隨我西北來照我光不滅我在塵土中白雲呼我歸我游江湖上明月濕我衣岷峨天一方雲月在我側謂是山中人相望了不隔夢尋西南路黙數長短亭似聞嘉陵江跳波吹枕屏送君無一物清江飲君馬路穿慈竹林父老拜馬下不用驚去裝使者我友生聴訟如家人細說為汝評若逢山中友問我歸何日為話腰脚輕猶堪弄泉石贈狄崇班季子狄生臂鷹來見客不㑹揖踞床咤得雋借筯數禽入短後掬豹裘猶濺猩血濕指呼索酒嘗快把長鯨吸半酣論刀槊怒髪欲起立北方老猘子狂突尚不縶要須此慓悍氣壓邊烽急夜走追鋒車生斬活離級持歸獻天王封侯穏可拾何為走獵師日使羣毛泣題盧鴻學士堂圖昔為太室花盧巖在東麓直上登封壇一夜蠒生足徑歸不復徃蠻壑空在目安知有千老舒巻不盈軸一處一盧生裘褐䕃喬木方為世外人行止何須録百年入篋笥犬馬同一束嗟予縛世累歸未有茒屋江干百畆田清泉映脩竹尚欲逃世名豈須上圖軸寄周安孺茶大哉天宇内植物知幾族靈品獨標竒逈超凡草木名從姬旦始漸播桐君録賦詠誰最先厥傳惟杜育唐人未知好論著始於陸常李亦清流當年慕髙躅遂使天下士嗜此偶於俗豈但中土珍兼之異邦鬻鹿門有佳士博覽無不矚邂逅天隨翁篇章互賡續開園頥山下屛跡松江曲有興即揮毫燦然存簡牘伊予素寡愛嗜好本不篤粤自少年時低回客京轂雖非曳裾者庇䕃或華屋頗見綺紈中齒牙厭粱肉小龍得屢試糞土視珠玉團鳯與葵花碔砆雜魚目貴人自矜惜捧玩且緘櫝未數日注卑定知雙井辱於兹自研討至味識五六自爾入江湖尋僧訪幽獨髙人固多暇探究亦頗熟聞道早春時擕籯赴初旭驚雷未破蕾采采不盈掬旋洗玉泉蒸芳馨豈停宿須臾布輕縷火候謹盈縮不憚頃間勞經時廢藏蓄髹筒浄無染箬籠勻且複苦畏梅潤侵暖須人氣燠有如剛耿性不受纎芥觸又若㢘夫心難將微穢瀆晴天敞虛府石碾破輕緑永日遇閒賓乳泉發新馥香濃奪蘭露色嫩欺秋菊閩俗競傳誇豐腴面如粥自云葉家白頗勝中山醁好是一杯深午牕春睡足清風擊兩腋去欲凌鴻鵠嗟我樂何深水經亦屢讀子咤中泠泉次乃康王谷䗫培頃曽嘗瓶罌走僮僕如今老且懶細事百不欲美惡兩俱忘誰能强追逐薑鹽拌白土稍稍從吾蜀尚欲外形體安能徇心腹由來薄滋味日飯止脫粟外慕既已矣胡為此羈束昨日散幽步偶上天峰麓山圃正春風䝉茸萬旗簇呼兒為佳客採製聊亦復地僻誰我從包藏置厨簏何嘗較優劣但喜破睡速况此夏日長人間正炎毒幽人無一事午飯飽蔬菽困卧北牕風風㣲動牕竹乳甌十分滿人世真局促意爽飄欲仙頭輕快如沐昔人固多癖我癖良可贖為問劉伯倫胡然枕糟麴余自城中還道中雲氣自山巾來如羣馬奔突以手掇開籠收其中歸家雲盈籠開而放之作攓雲篇物役㑹有時星言從髙駕道逢南山雲歘吸如電過竟誰使令之衮衮從空下龍移相排拶鳯舞或頽亞散為東郊霧凍作枯樹稼或飛入吾車偪仄人肘胯摶取置笥中提擕反茅舍開緘乃放之掣去仍變化雲兮汝歸山無使達官怕游山呈通判承議寫寄參寥師煌煌世胄餘夫子非碌碌由來有詩書所以能絶俗得官本河朔𤓰期未易促扁舟下南來逸駕追鳴鵠遇勝即徜徉風餐兼露宿嗟予偶傾蓋一笑外羈束杖策毎過從相携訪山谷東風披鮮雲繡錯出林麓松門有時盡幽景無斷續崖轉聞鐘聲林疎見華屋銜山餘落景歸迹猶躑躅誰云鄴下歡徃事不可復吾曹二三事取樂亦云足願公寄新詩一一能見録船頭行北歸囊橐有美玉塵埃京洛人亦與洗心目和郭功父韻送芝道人游隱靜觀音妙智力應感隨縁度芝師訪東坡寧辭萬里步道義偶相契十年同去住行窮半世間又欲浮盃渡我願焚囊鉢不作陳俗具㑹取却歸時只是而今路次韻魯直戲贈昨夜試微凉汗衾初退紅我願隨秋風隨身入房櫳君王不好事只作好驚鴻細看巻蠆尾我家真栗蓬夜坐與邁聨句清風來無邊明月翳復吐自松聲滿虚空竹影侵半户小邁暗枝有驚鵲壞壁鳴饑䑕自露葉耿髙梧風螢落空廡邁微凉感團扇古意歌白紵自樂哉今夕游復此陪杖屨薖傳家詩律細已自過宗武短詩膝上成聊以慰懐祖自寄傲軒先生英妙年一掃千禿仕進固有餘不肯踐埸屋通闤何所傲傲名非傲俗定知軒冕中享榮不償辱豈無自安計得失猶轉轂先生獨揚揚憂患莫能瀆得如虎挾乙失若龜藏六茅簷聊寄寓俛仰亦自足東坡無邊春方寸盡藏蓄醉哦傍若無獨侑一樽醁床頭車馬道殘月掛疎木朝客紛擾時先生睡方熟榆我行汴堤上厭見榆隂緑千株不盈畆斬伐同一束及居幽囚中亦復見此木蠧皮溜秋雨病葉埋墻曲誰言霜雪苦生意殊未足坐待春風至飛英覆空屋槐憶我初來時草木向衰歇髙槐雖經秋晚蟬猶抱葉淹留未云幾離離見疎筴栖鴉寒不去哀呌飽啄雪破巢帶空枝疎影掛殘月豈無兩翅羽伴我此愁絶竹今日南風來吹亂庭前竹低昂中音㑹甲刃紛相觸蕭然風雪意可折不可辱風霽竹巳一作亦回猗猗散青玉故山今何有秋雨荒籬菊此君知健否歸掃南軒緑栢故園多珎木翠栢如蒲葦幽囚無與樂百日看不已時來拾流膠一作肪未忍踐落子當年誰所種少長與我齒仰視蒼蒼榦所閱固多矣應見李將軍膽落温御史東坡全集巻二十七
