body:
  text: 東坡全集巻九十六宋蘓軾撰銘五十七首却䑕刀銘野人有刀不愛遺余長不滿尺劒鉞之餘文如連環上下相繆錯之則見或漫如無昔所從得戒以自隨畜之無害暴䑕是除有穴于垣侵堂及室跳牀撼幕終夕窣窣叱訶不去啖囓棗栗掀盃䑛缶去不遺粒不擇道路仰行躡壁家為兩門窘則旁出輕趫捷猾忽不可執吾刀入門是去無跡又有甚者聚為怪妖晝出羣鬬相視睢盱舞于端門與主雜居猫見不噬又乳于家狃于永氏謂世皆然亟磨吾刀槃水致前炊未及熟肅然無蹤物豈有是以為不誠試之彌旬為凛以驚夫猫鷙禽晝巡夜伺拳腰弭耳目不及顧鬚摇于穴走赴如霧碎首屠腸終不能去是獨何為宛然尺刀匣而不用無有爪牙彼孰為畏相率以逃嗚呼嗟夫吾茍有之不言而諭是亦何勞玉堂硯銘并叙文同與可將赴陵州孫洙巨源以玉堂大硯贈之與可屬蘇軾子瞻為之銘曰坡陀彌漫天濶海淺巨源之硯淋漓蕩潏神沒鬼出與可之筆燼南山之松為煤無餘涸陵陽之水維以濡之硯大如四磚許而陵州在高山上至難得水故以戲之鼎硯銘鼎無耳槃有趾鑑幽無見几不倚暘蟲隕羿䘮厥喙羽淵之化帝祝尾不周僨裂東南圮黝然而深維水委誰乎為此昔未始戲銘其臀加幻詭王平甫硯銘玉德金聲而寓於斯中和所熏不水而滋正直所冰不寒而澌平甫之硯而軾銘之鄧公硯銘并序王鞏魏國文正公之孫也得其外祖張鄧公之硯求銘於軾銘曰鄧公之硯魏公之孫允也其物展也其人思我魏公文而厚思我鄧公德而夀三復吾銘以究令名端硯銘千夫挽綆百夫運斤篝火下縋以出斯珍一噓而泫歲乆愈新誰其似之我懷斯人孔毅甫龍尾硯銘澁不留筆滑不拒墨爪膚而縠理金聲而玉德厚而堅足以閱人於古今朴而重不能隨人以南北孔毅甫鳯咮石硯銘昔余得之鳯凰山下龍焙之間今君得之劒浦之上黯黮之灘如樂之和如金之堅如玉之有潤如舌之有泉此其大凡也為然為不然然也雖胡越同名猶可不然徒與此石谿而產何異於九鵬而一鸇鳯咮硯銘并叙北苑龍焙山如翔鳯下飲之狀當其咮有石蒼黑緻如玉熙寧中太原王頥以為硯余名之曰鳯咮然其產不富或以黯黮灘石為之狀酷類而多拒墨時方為易傳銘曰陶土塗鑿山石𤣥之蠧潁之賊涵清泉閟重谷聲如銅色如鐵性滑堅善凝墨棄不取長太息招伏羲揖西伯發秘藏與有力非相待為誰出鳯咮硯銘帝規武夷作茶囿山為孤鳯翔且嗅下集芝田啄瓊玖玉乳金沙發靈竇殘璋斷璧澤而黝治為書硯美無有至珍驚世初莫售黑眉黄眼爭妍陋蘇子一見名鳯咮坐令龍尾羞牛後米黻石鍾山硯銘有盜不禦探奇發瑰攘於彭蠡斲鍾取追有米楚狂惟盜之隱因山作硯其詞如霣黼硯銘并叙龍尾黼硯章聖皇帝所嘗御也乾興升遐以賜外戚劉氏而永年以遺其舅王齊愈臣軾得之以遺臣宗孟且銘之曰黟歙之珍匪斯石也黼形而縠理金聲而玉色也雲蒸露湛祥符之澤也二臣更寶之見者必作也丹石硯銘并叙唐林父遺予丹石硯粲然如芙蕖之出水殺墨而宜筆盡硯之美唐氏譜天下硯而獨不知兹石之所出余盖知之銘曰彤池紫淵出日所浴蒸為赤霓以貫暘谷是生斯珍非石非玉因材制用璧水環復耕予中洲蓺我𤣥粟投種則穫不炊而熟王仲儀硯銘汲鄭蚤聞頗牧晚用諫草風生羽檄雷動人亡器存質小任重施易何常明哲所共端石硯銘并引蘇堅伯固之子庠字養直妙齡而有異才贈以端硯且銘之曰我友三益取溪之石寒松為煤孤竹為筆蓬麻效紙仲泉致滴斬几信鉤以全吾直端硯銘與墨為入玉靈之食與水為出陰鑑之液懿矣兹石君子之側匪以玩物維以觀德黄魯直銅雀硯銘漳濱之埴陶氏我厄受成不化以與真隔人亡臺廢得反天宅遇發丘隴復為麟獲纍然黄子𤣥豈尚白天實命我使與其蹟陳公密子石硯銘并引公密躬自採石巖下獲黄卵剖之得紫硯銘曰孰形無情石亦卵生黄胞白絡孕此黝頳已器不死可候雨晴天畀夫子瑞其家庭龍尾石月硯銘萋萋兮霧縠石宛宛兮黑白月其受水也哉生明而運墨也旁死魄忽𤣥雲之霮䨴觀玉兔之沐浴集幽光於毫端散妙迹於簡册照千古其如在耿此月之不沒邁硯銘邁往德興賮以一硯以此銘之以此進道常若渴以此求道常若驚以此治財常思予以此書獄常思生迨硯銘有盡石無已求生陰壑閟重湫得之艱豈輕投旌苦學畀長頭卵硯銘東坡硯龍尾石開鵠卵見蒼璧與居士同出入更嶮夷無燥濕今何者獨先逸從參寥老空寂唐陸魯望硯銘噫先生隱唐餘甘杞菊老樵漁是器寶實相予為散人出叢書周文炳瓢硯銘以汝為硯罌肖而瓢質以汝為瓢硯剖而腹實飲西江之水吾以汝礪齒懸河之辯其以爾借面不即不離孰曰非道人之應器王定國硯銘二首石出西山之西北山之北戎以發劒予以試墨劒止一夫敵墨以萬世則吾以是知天下之才皆可以納諸聖賢之域又月之從星時則風雨汪洋翰墨將此是似黑雲浮空漫不見天風起雲移星月凜然魯直所惠洮河石硯銘洗之礪發金鐵琢而泓堅密澤郡洮岷至中國棄予劒參筆墨歲丙寅斗南北歸予者黄魯直故人王頥有自然端硯硯之成於片石上稍稍加磨治而已銘曰其色馬肝其聲磬其文水中月真寶石也而其德則正其形天合其於人也畧是故可使而不可役也天石硯銘并叙軾年十二時於所居紗縠行宅隙地中與羣兒鑿地為戲得異石如魚膚温瑩作淺碧色表裏皆細銀星扣之鏗然試以為硯甚發墨無貯水處先君曰是天硯也有硯之德而不足於形耳因以賜軾曰是文字之祥也軾寶而用之且為銘曰一受其成而不可更或主於德或全於形均是二者顧予安取仰唇俯足世固多有元豐二年秋七月予得罪下獄家屬流離書籍散亂明年至黄州求硯不復得以為失之矣七年七月舟行至當塗發書笥忽復見之甚喜以付迨過其匣雖不工先君手刻其受硯處而使工人就成之者不可易也漢鼎銘并引禹鑄九鼎用器也初不以為寶象物以飾之亦非所以使民逺不若也武王遷之洛邑蓋已見笑於伯夷叔齊矣方周之盛也鼎為宗廟之觀美而已及其衰也為周之患有不可勝言者匹夫無罪懷璧其罪周之衰也與匹夫何異嗟夫孰知九鼎之為周之角齒也哉自春秋時楚莊王以問其輕重大小而戰國之際秦與齊楚皆欲之周人惴惴焉視三虎之垂涎而睨已也絶周之祀不足以致冦裂周之地不足以肥國然三國之君未嘗一日而忘周者以寶在焉故也三國爭之周人莫知所適與得鼎者未必能存周而不得者必碎之此九鼎之所以亡也周顯王之四十二年宋太丘社亡而鼎淪沒於泗水此周人毁鼎以緩禍而假之神妖以為之說也秦始皇漢武帝乃始萬方以出鼎此與兒童之見無異善夫吾丘夀王之說也曰汾陰之鼎漢鼎也非周鼎夫周有鼎漢亦有鼎此易所謂正位凝命者豈三趾兩耳之謂哉恨夀王小子方以諛進不能究其義余故作漢鼎銘以遺後世君子其銘曰惟五帝三代及秦漢以來受命之君靡不有兹鼎鼎存而昌鼎亡而亡蓋鼎必先壞而國隨之豈有易姓而猶傳者乎不寶此器而拳拳於一物孺子之智婦人之仁烏乎悲矣石鼎銘并叙張安道以遺子由子由以為軾生日之餽銘曰石在洛書蓋𨽻從革矢砮醫砭皆金之職有堅而忍為釜為鬲居焚不炎允有三德大覺鼎銘樂全先生遺我鼎甗我復以餉大覺老禪在昔宋魯取之以兵書曰郜鼎以器從名樂全東坡予之以義書曰大覺之鼎以名從器挹山之泉烹以其薪為苦為甘咨爾學人文與可琴銘攫之幽然如水赴谷醳之蕭然如葉脫木按之噫然應指而長言者似君置之枵然遺形而不言者似僕與可好作楚辭故有長言似君之句鄒忌論琴云攫之深醳之愉此言為指法之妙耳十二琴銘震陵孤桐震陵孤桐下陽岑音如澗泉響深林二聖元祐歲丁卯器巧名之張益老香林八節河渭之水多土其聲厚以沉江漢之水多石其聲激而清香林八節是謂天地之中山水之陰號鍾薄則播厚則石侈則哆弇則鬱長甬則震無此五疾則鳴而中律是謂號鍾之實玉磬其清越以長者玉也聽萬物之秋者磬也寶如是中藜藿不再食以是樂飢不以告糴松風忽乎青蘋之末而生有極於萬竅號怒而實無夫其蕩枝蟠葉霎而脫其枯風鳴松耶松鳴風耶古媧黄煉石補天之年截匏比竹之音雖不可得見吾知古之猶今木聲犂然當於人心非參寥者孰鈎其深南風聲歌南風舜作則欲報父母天罔極歸鶴琴聲三疊舞胎仙肉飛不到夢所傳白鶴歸來見曾𤣥隴頭松風入朱絃秋風秋風度而草木先驚感秋者絃直而志不平攬變衰之色為可憐之聲不戰者善將傷手者代匠悲莫悲於湘濱樂莫樂於濠上漁桹襏襫大須蕭然於萬物之表槁項黄馘闖然於一葦之杭與鷗鸕而物化發山水之天光驚潛魚而出聽是謂魚桹九州璜釣魚得九州之璜避紂得九州之王湮沉乎射鮒之谷委蛇乎鳯凰之堂其音不爽惟德之常天球天球至意合以人力作者七人傳以華國有蔚者桐僵于下陽之庭奏刀而玉質成器而金聲山川畀之耶其天性之耶楊次公家浮磬銘清而直朴而一雖有鄭衛無自而入以託於君子之室法雲寺鐘銘并叙元豐七年十月有詔大長老圜通禪法師秀住法雲寺寺成而未有鐘大檀越駙馬都尉武勝軍節度觀察留後張敦禮與冀國大長公主唱之從而和者若干人元祐元年四月鐘成萬斤東坡居士蘇軾為之銘曰有鐘誰為撞有撞誰撞之三合而後鳴聞所聞為五闕一不可得汝則安能聞汝聞竟安在耳視目可聽當知所聞者鳴寂寂時鳴大圜空中師獨處高廣座臥士無所著人引非引人二俱無所說而說無說法法法雖無盡問則應曰三汝應如是聞不應如是聽邵伯埭鐘銘并叙邵伯埭之東寺僧子康一作東募千人為千斤銅鐘蜀人蘇軾為之銘曰無量智慧火燒此無明銅戒定以為模鑄成無漏鐘以汝平等手執彼慈悲撞聲從無有出遍滿無邊空徐州蓮花漏銘并叙故龍圖閣直學士禮部侍郎燕公肅以創物之智聞於天下作蓮花漏世服其精凡公所臨必為之今州郡往往而在雖有巧者莫敢損益而徐州獨用瞽人衛朴所造廢法而任意有壺而無箭自以無目而廢天下之視使守者伺其滿則決之而更注人莫不笑之國子博士傅君楊公之外曾孫得其法為詳其通守是邦也實始改作而請銘於軾銘曰人之所信者手足耳目也目識多寡手知重輕然人未有以手量而目計者必付之於度量與權衡豈不自信而信物蓋以為無意無我然後得萬物之情故天地之寒暑日月之晦明昆侖旁薄於三十八萬七千里之外而不能逃於三尺之箭五斗之缾雖疾雷霾風雨雪晝晦而遲速有度不加虧贏使凡為吏者如缾之受水不過其量如水之浮箭不失其平如箭之升降也視時之上下降不為辱升不為榮則民將靡然心服而寄我以死生矣文勛篆銘世人篆字𨽻體不除如浙人語終老帶吳安國用筆意在𨽻前汲冢魯壁周鼓秦山裙靴銘并叙予在黃州時夢神考召入小殿賜宴乃令作宫人裙銘又令作御靴銘百疊漪漪風皺六銖縰縰雲輕獨立含風廣殿微聞環珮來聲寒女之絲銖積寸累天步所臨雲蒸雷起金星洞銘寶山南麓鳯左翅驚雷劃石逋虯起凝陰噓豎出怪瑋是生神草肖蒼虺離離赤志挾脊尾飛流丹石決癕痏金星非實特取似施及山石亦見謂凡名相因皆此比洗玉池銘世忽不踐以用為急秦漢以還龜玉道熄六器僅存五瑞莫輯趙璧婦玩魯璜盜竊䑕亂鄭璞鵲抵晉棘維伯時父弔古啜泣道逢玉人解驂推食劒璏鏚柲錯落其室晚獲拱寶遂空四壁哀此命世乆就淪蟄時節沐浴以幸斯石孰推是心施及王國如伯時父琅然環玦援手之勞終睨莫拾得䘮在我匪玉欣戚仲和父銘之維以詠德菩薩泉銘并叙陶侃為廣州刺史有漁人每夕見神光海上以白侃侃使迹之得金像視其款識阿育王所鑄文殊師利像也初送武昌寒溪寺及侃遷荆州欲以像行人力不能動益以牛車三十乘乃能至船船復没遂以還寺其後惠逺法師迎像歸廬山了無艱礙山中世以二僧守之㑹昌中詔毁天下寺二僧藏像錦繡谷比釋教復興求像不可得而谷中至今有光景往往發見如峩眉五臺所見蓋逺師文集載處士張文逸之文及山中父老所傳如此今寒溪少西數百步别為西山寺有泉出於嵌竇間色白而甘號菩薩泉人莫知其本末建昌李常謂余豈昔像之所在乎且屬余為銘銘曰像在廬阜宵光燭天旦朝視之寥寥空山誰謂寒溪尚有斯泉盍往鑒之文殊了然六一泉銘并叙歐陽文忠公將老自謂六一居士予昔通守錢塘見公於汝陰而南公曰西湖僧惠勤甚文而長於詩吾昔為山中樂三章以贈之子間於民事求人於湖山間而不可得則往從勤乎予到官三日訪勤於孤山之下抵掌而論人物曰公天人也人見其暫寓人間而不知其乘雲馭風歴五嶽而跨滄海也此邦之人以公不一來為恨公麾斤八極何所不至雖江山之勝莫適為主而奇麗秀絶之氣常為能文者用故吾以謂西湖蓋公几案間一物耳勤語雖幻怪而理有實然者明年公薨予哭於勤舍又十八年予為錢塘守則勤亦化去乆矣訪其舊居則弟子二仲在焉畫公與勤之像事之如生舍下舊無泉予未至數月泉出講堂之後孤山之趾汪然溢流甚白而甘即其地鑿巖架石為室二仲謂余師聞公來出泉以相勞苦公可無言乎乃取勤舊語推本其意名之曰六一泉且銘之曰泉之出也去公數千里後公之沒十有八年而名之曰六一不幾於誕乎曰君子之澤豈獨五世而已蓋得其人則可至於百傳嘗試與子登孤山而望吳越歌山中之樂而飲此水則公之遺風餘烈亦或見於斯泉也卓錫泉銘并叙六祖初往曹溪卓錫泉涌清涼滑甘贍足大衆逮今數百年矣或時小竭則衆汲於山下今長老辨公住山四歲泉日涌溢聞知嗟異為作銘曰祖師無心心外無學有來扣者雲涌泉落問何從來初無所從若有從處來則有窮初住南華集衆須水水性融㑹豈有無理引錫指名寒泉自洌衆渴得飲如我說法云何至今有溢有枯泉無溢枯蓋其人乎辨來四年泉水洋洋烹煮濯溉飲及牛羊手不病汲肩不病負匏勺瓦盂莫知其故我不求水水則許我訊於祖師其亦可哉參寥泉銘并叙余謫居黄參寥子不逺數千里從余於東城留期年嘗與同遊武昌之西山夢相與賦詩有寒食清明石泉槐火之句語甚美而不知其所謂其後七年余出守錢塘參寥子在焉明年卜智果精舍居之又明年新居成而余以寒食去郡實來告行舍下舊有泉出石間是月又鑿石得泉加洌參寥子擷新茶鑽火煮泉而瀹之笑曰是見於夢九年衛公之為靈也乆矣坐人皆悵然太息有知命無求之意乃名之參寥泉為之銘曰在天雨露在地江湖皆我四大滋相所濡偉哉參寥彈指八極退守斯泉一謙四益余晚聞道夢幻是身真即是夢夢即是真石泉槐火九年而信夫求何伸實敝汝神東坡全集巻九十六
