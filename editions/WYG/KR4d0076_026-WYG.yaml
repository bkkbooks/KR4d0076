body:
  text: 東坡全集巻二十六宋蘇軾撰詩七十七首靈上訪道人不遇花光紅滿欄草色緑無岸不逢青眼人長歌白石澗送淡公二首燕本氷雪骨越淡蓮花風五言雙寳刀聨響高飛鴻翰苑錢舍人詩韻鏗雷公識本不識淡仰詠嗟無窮清韻生物表朗玉傾壺中常於冷竹坐相語道意沖崧洛興不薄稽江事難同明日若不來我作黄石翁何以兀其心為君學虛空坐重青草公意合滄海濱渺渺獨見水悠悠不聞人鏡浪洗手渌剡花入心春雖然防外觸眼前遶衣新行當譯文字慰此吟慇懃上韓持國韓氏三虎秉樞極中有一虎似偉節端居隱几學無心夙駕入朝常正色犯時獨行太㟪􅕲囘天不忌真藥石輦致歸來荷二聖推排使至有衆力吾儕小人但飽飯不有君子何能國西湖醉卧春水船如何為人作豐年送别鴨頭春水濃如染水面桃花弄春臉衰翁送客水邊行沙襯馬蹄烏帽㸃昻頭問客幾時歸客道秋風落葉飛繫馬緑楊開口笑傍山依約見斜暉琴枕清眸作金徽素齒為玉軫響泉竟何用金帶常苦窘斕斑漬珠淚宛轉堆雲鬒君若安七絃應彈卓氏引黄州南山一尺雪雪盡山蒼然澗谷深自暖梅花應已繁使君厭騎從車馬留山前行歌招野叟共步青林間長松得高䕃盤石堪醉眠祇樂聽山鳥攜琴寫幽泉愛之欲忘返但苦世俗牽歸來始覺逺明月高峰顛常山贈劉鎡劉侯年少日駿馬拊便面援弓鴈自落不待白羽貫古風精神洞元化白日昇高旻俯仰淩倒景龍行逸如神半道過紫府弭節聊逡巡金牀設寳几璀璨明月珍仙者二三子眷然骨肉親飲我霞石盃放盃恍如春遂朝玉虛上冠劍班列真無端拜失儀放棄令自新雲霄難遽返下土多埃塵淮南守天庖嗟我復何人逰杭州山山平村塢迷野寺鐘相答晩隂失林莽一作杪落日猶在塔行招兩社僧共步青山月送客渡石橋迎客出林樾幽尋本真性往事聽徐説錢王方壯年此邦事輕俠鄉人鄙貧賤異類識英傑立石像興王遺址今岌嶪功勲三呉定富貴四海甲歸來父老藏崇高畏傾壓詩人工譏病此欲恣挑抉流傳後世人談笑資口舌是非今已矣興廢何倉卒持歸問禪翁笑指浮漚没逰三游洞遊洞之日有亭吏乞詩旣為留三絶句於洞之石壁明日至峽州吏又至意若未足乃復以此授之一徑遶山翠縈紆去似蛇忽驚溪水急争㸔洞門呀滑磴攀秋蔓飛橋踏古槎三扉迎北吹一穴向西斜歎息煙雲去追思歲月遐唐人昔未到古俗此為家洞暖無風雪山深富鹿猳相逢衣盡草環坐髻應髽竈突依巖黒樽罍就石窪洪荒無傳記想像在犧媧此事今安有遺蹤我獨嗟山翁勸留句强為寫槎牙穆父新涼家居妻兒號出仕猿鶴怨未能逐什一安敢摶九萬常恐樗櫟身坐纒冠蓋蔓受恩如負債粗報乃焚劵但知眠牛衣寧免刺虎圏清風來既雨新稻香可飯紫螯應已肥白酒誰能勸君今崔蔡手政比張趙健三公行可致一語自先獻幸推江湖心適我魚鳥願無題引手攀紅櫻紅櫻落如線仰首㸔紅日紅日走如箭年光與時景頃刻互衰變何當血肉身安得常强健人心苦執迷富貴憂貧賤憂色常在眉歡容不上面吾今頭半白把鏡非不見惟應花下盃更待他人勸十一月三日與幾先自竹西來訪慶老不見獨與君卿供奉蟾知客東閣道話久之惠州追録巻巻長廊走黄葉席簾埀地香烟歇主人待來終不來火紅銷盡灰如雪古意兒曹鞭笞學官府翁憐兒癡旁笑侮翁出坐曹鞭復呵賢於羣兒能幾何兒曹鞭人以為戲公怒鞭人血流地等為戲劇誰能先我笑謂翁兒更賢用定國韻贈二十姪震衡門老苔蘚行柏千兵屯開樽邀落日未對烏鳥言清風舉吹籟散亂書帙翻傳呼一何急人馬從車奔貧居少賓客隣婦窺籬藩牆頭過春酒緑泛田家盆比来伏青蒲坐捉白獸樽王猷修潤色亦有簿領煩朝廷貴二陸屢聞天語温猶能整筆陣媿我非韓孫聞潮陽呉子野出家子昔少年日氣蓋里閭俠自言似劇孟叩門知緩急千金已散盡白首空四壁烈士歎暮年老驥悲伏櫪妻孥真弊屣脱棄何足惜四大猶幻座衣冠矧外物一朝發無上顧老靈山宅世事子如何禪心久空寂世間出世間此道無兩得故應入枯槁習氣要除拂丈夫生豈易趣舍志匪石當為師子吼佛法無南北補唐文宗栁公權聨句并引宋玉對楚王此獨大王之雄風也庶人安得而共之譏楚王知已而不知人也栁公權小子與文宗聨句有美而無箴故為足成其篇云人皆苦炎熱我愛夏日長薫風自南來殿閣生㣲涼一為居所移苦樂永相忘願言均此施清隂分四方食檳榔月照無枝林夜棟立萬礎眇眇雲間扇䕃此九月暑上有垂房子下繞綘刺禦風欺紫鳯卵雨暗蒼龍乳裂包一墮地還以皮自煮北客初未諳勸食俗難阻中虛畏泄氣始嚼或半吐吸津得㣲甘著齒隨亦苦面目太嚴冷滋味絶媚嫵誅彭勲可䇿推轂勇宜賈瘴風作堅頑導利時有補藥儲固可爾果録詎用許先生失膏粱便腹委敗鼓日啖過一粒腸胃為所侮蟄雷殷臍腎藜藿腐亭午書燈㸔膏盡鉦漏歴歴數老眼怕少睡竟使赤眥努渴思梅林嚥饑念黄獨舉奈何農經中收此困羇旅牛舌不餉人一斛肯多與乃知見本偏但可酬惡語古離别送蘇伯固三度别君來此别真遲暮白盡老髭鬚明日淮南去酒罷月隨人淚濕花如霧後夜逐君還夢遶湖邊一作江南路次韻魯直書伯時畫王摩詰前身陶彭澤後身韋蘇州欲覔王右丞還向五字求詩人與畫手蘭菊芳春秋又恐兩皆是分身來入流雷州八首白髪坐鉤黨南遷瀕海州灌園以餬口身自雜蒼頭籬落秋暑中碧花蔓牽牛誰知把鋤人舊日東陵侯茘子無幾何黄柑遽如許遷臣不惜日恣意移寒暑層巢俯雲木信美非吾土草芳自有時鶗鴂何關汝下居近流水小巢依嶺岑終日數椽間但聞鳥遺音爐香入幽夢海月明孤斟鷦鷯一枝足所恨非故林培塿無松柏駕言此焉㳺讀書與意㑹却掃可忘憂尺蠖以時屈其伸亦非求得歸良不惡未歸且淹留粤嶺風俗殊有疾時勿藥束帶趨房祀用史巫紛若絃歌薦繭栗奴至洽觴酌呻吟殊未央更把鷄骨灼粤女市無常所至輒成區一日三四遷處處售鰕魚青裙脚不韈臭味猿與狙孰云風土惡白洲生緑珠海康臘已酉不論冬孟仲殺牛撾鼓祭城郭為傾動雖非堯頒厯自我先人用苦笑荆楚人嘉平臘雲夢舊時日南郡野女出成羣此去尚應遠東風已如雲蚩氓託絲布相就通殷懃可憐秋胡子不遇卓文君妬佳月狂雲妬佳月怒飛千里黒佳月了不嗔曾何汙潔白爰有謫仙人舉酒為三客今夕偶不見汍瀾念風伯毋煩風伯來彼也易滅没支頥少待之寒空浄無迹粲粲黄金盤獨照一天碧玉繩慘無輝玉露洗秋色浩瀚玻璃琖和光入胸臆使我能永延約君為莫逆追和沈遼項贈南華詩善哉彼上人了知明鏡臺歡然不我厭肯致逺公材莞爾無心雲胡為出岫來一堂安寂滅卒歲扄蒼苔夢雪殘盃失春温破被生夜悄開門千山白俯仰同一照雖時出圭角固自絶瑕竅兒童勿驚怪調汝得一笑雪林硯屏率魯直同賦西山無時春巉巖鎻頑隂分明倚天壁㸃綴無風林物固為人出興誰於此深窮竒真自蠧詩句且娯心南屏謙師妙於茶事自云得之於心應之於手非可以言傳學到者十月二十七日聞軾遊夀星寺逺來設茶作此詩贈之道人曉出南屏山來試㸃茶三昧手忽驚午琖兔毫斑打作春甕鵝兒酒天台乳花世不見玉川風腋今安有東坡有意續茶經㑹使老謙名不朽申王畫馬圖天寳諸王愛名馬千金爭致華軒下當時不獨玉花驄飛電流雲絶瀟灑兩坊岐薛寧與申慿陵内廐多清新肉騣汗血盡龍種紫袍玉帶真天人驪山射獵包原隰御前急詔穿圍入揚鞭一蹙破霜蹄萬騎如風不能及雁飛兔走驚弦開翠華按轡從天囘五家錦繡變一作遍山谷百里舄珥遺纎埃青騾蜀棧兩一作西超忽高凖濃蛾散荆棘囘首追風趂日飛一作苜茫連天鳥自飛五陵佳氣春蕭瑟奉和成伯大雨中㑹客解嘲樂事難并真實語坐排用意多乖誤興來取次或成懽瓦鉤却勝黄金注我生禍患久不擇肯為一時風雨阻天公變化豈有常明月行㸔照歸路和公濟飲湖上昨夜醉歸還獨寢曉來宿雨鳴孤枕扁舟小棹截湖來正見青山駮雲錦須知老人興不淺莫學公榮不共飲與君歌鼓樂豐年喚取千夫食陳廩贈僧道人自嫌三世將棄家十年今始壯玉骨猶含富貴餘漆瞳巳照人天上去年相見古長干衆中矯矯如翔鸞今年過我江西寺病瘦已作霜松寒朱顏不辦供歲月風中蒿火湯中雪好問君家面黄翁乞得摩尼照生滅莫學王郎與支遁臂鷹走馬憐神駿還君圗畫君自收不如木人騎土牛周教授索枸杞因以詩贈録呈廣倅蕭大夫鄴侯藏書手不觸嗟我嗜書終日讀短檠照字細如毛怪㡳眼花懸兩目扶衰賴有王母杖名字於今掛仙録荒城古塹草露寒碧葉叢低紅菽粟春根夏苗秋著子盡付天隨恥充腹蘭傷桂折縁有用爾獨何損丹其族贈君慎勿比薏苡採之終日不盈掬外澤中乾非爾儔歛藏更借秋陽曝雞壅桔梗一稱帝堇也雖尊等臣僕時復論功不汝遺異時謹事東籬菊次韻董夷仲茶磨前人初用茗飲時煮之無問葉與骨寖窮厥味臼始用復計其初碾方出計盡功極至於磨信哉智者能創物破槽折杵向牆角亦其遭遇有伸屈歲久講求知處所佳者出自衡山窟巴蜀石工强鐫鑿理疎性軟良可咄予家江陵逺莫致塵土何人為披拂送公為遊淮南負米萬里縁其親運甓無度憂其身讀書莫學流麥士挾䇿莫比亡羊人廼翁辛苦到白首汝今强勉當青春昔時管鮑以君霸此兩士賈寧非貧謝蘇自之惠酒高士例須憐麴蘖此語嘗聞退之説我今有説殆不然麴糵未必高士憐醉者墜車莊生言全酒未若全於天達人本自不虧缺何暇更求全處全景山沈迷阮籍傲畢卓盗竊劉伶顛貪狂嗜怪無足取世俗喜異矜其賢杜陵詩客尤可笑羅列八子參羣仙流涎露頂置不説為問㡳處能逃禪我今不飲非不飲心月皎皎長孤圓有時客至亦為酌琴雖未去聊忘絃吾宗先生有真意百里雙罌逺將寄且言不飲固亦高舉世皆同吾獨異不如同異兩俱㝠得鹿亡羊等嬉戲决須飲此勿復辭何用區區較醒醉西山戲題武昌王居士并引予往在武昌西山九曲亭上有題一句𤣥鴻横號黄槲峴九曲亭即呉王峴山一山皆槲葉其旁即元結陂湖也荷花極盛因為對云皓鶴下浴紅荷湖坐客皆笑同請賦此詩江干高居堅關扄犍耕躬稼角掛經篙竿繫舸菰茭隔笳鼓過軍鷄狗驚解襟顧景各箕踞擊劍賡歌幾舉觥荆笄供膾愧攪聒乾鍋更戛甘𤓰羮戯和正甫一字韻故居劍閣隔錦官柑果薑蕨交荆菅竒孤甘掛汲古綆僥覬敢揭鈎金竿已歸耕稼供藁桔公貴幹蠱高巾冠改更句格各蹇吃姑因狡獪加間關王方平謂麻姑云姑固少年吾老矣不復作此狡獪變化也池上二首小池新鑿㑹天雨一部鼓吹從何來有蟾正碧亂草色時泅出没東南隈井幹跳梁亦足樂洞庭魚龍何有哉能歌徳聲莫入月清池與爾俱忘囘不作太白夢日邊還同樂天賦池上池上新年有荷葉細雨魚兒噞輕浪男兒學易不應舉幽人一友吾得尚此池便可當長江欲榜茅齋來蕩漾贈仲素寺丞致仕歸隱潜山潜山隱君七十四紺瞳緑髪方謝事腹中靈腋變丹砂江上幽居連福地彭城為我駐三日明月滿舟同一醉丹書細字口傳訣顧我沉迷真棄耳年來四十髪蒼蒼始欲求方救憔悴他年若訪潜山居慎勿逃人改名字魯直以詩餽雙井茶次韻為謝江夏無雙種竒茗汝隂六一誇新書磨成不敢付僮僕自㸔湯雪生璣珠列仙之儒瘠不腴只有病渴同相如明年我欲東南去畫舫何妨宿太湖歸田録草茶以雙井為第一畫舫宿太湖北渚貢茶故事揚州以土物寄少游鮮鯽經年秘醽醁團臍紫蟹脂填腹後春蓴茁活如酥先社薑芽肥勝肉鳥子纍纍何足道㸃綴盤餐亦時欲淮南風俗事瓶甖方法相傳竟留蓄且同千里寄鵝毛何用孜孜飲麋鹿贈曇秀白雲出山初無心棲鳥何必戀山林道人偶愛山水故縱步不知湖嶺深空巖已禮百千相曹溪更欲瞻遺像要知水味孰冷暖始信夢時非幻妄袖中忽出貝葉書中有璧月綴星珠人間勝絶略已遍匡廬南嶺并西湖西湖北望三千里大堤冉冉横秋水誦師佳句説南屏瘴雲應逐秋風靡胡為只作十日歡杖䇿復尋歸路難留師筍蕨不足道悵望茘子何時丹再過泗上二首眼明初見淮南樹十客相逢九呉語旅程已付夜帆風客睡不妨背船雨黄柑紫蟹見江海紅稻白魚飽兒女慇懃買酒謝船師千里勞君勤轉櫓繫舟淮北雨折軸繫舟淮南風㫁橋客行有期日月疾歲事欲晚霜雪驕山根浪頭作雷吼縮手敢試舟師篙不用燃犀照幽怪要須㧞劍斬長蛟贈李兕彦威秀才魏王大瓠實五石種成濩落將安適可憐公子持十牛海上三年竟何得先生少負不羈才從軍數到單于臺天山直欲三箭取白衣將軍何人哉夜逢怪石曾飲羽戲中㦸枝何足數誓將馬革裹屍還肯學班超苦兒女封侯衞霍知幾許老矣先生困羇旅酒酣聊復説平生結襪猶堪一再鼔棄書捐劍學萬人紈袴儒冠皆誤身窮途政似不龜手與世羞為西子顰如今惟有談天口雲夢胸中吞八九世間萬事寄黄粱且與先生説烏有次韻謝子高讀淵明傳枯木嵌空㣲黯淡古器雖在無古絃袖中正有南風手誰為聽之誰為傳風流豈落正始後甲子不數義熙前一山黄菊平生事無酒令人意缺然龐公襄陽龐公少檢束白髪不髠亦不俗世所奔趨我獨棄我已有餘彼不足鹿門有月樹下行虎溪無風舟上宿不識當年捕魚客但愛長康畫金粟杜口如今不復言龐公為人不曲局東西有人問老翁為道明燈照華屋五言七言正兒戯三行五行亦偶爾我性不飲只解醉正如春風弄羣卉四十年來同幻事老去何須别愚智古人不住亦不滅我今不作亦不止寄語悠悠世上人浪生浪死一埃塵洗墨無池筆無象聊爾作戯悦吾神送吕行甫司門倅河陽結交不在久傾蓋如平生識子今幾日送别亦有情子生公相家高義久崢嶸天才既超詣世故亦屢更譬如追風驥豈免羈與纓念我山中人久與麋鹿并誤出掛世網舉動俗所驚歸田雖未果已覺去就輕河陽豈云逺出處恐異程便當從此别有酒無徒傾食雉雄雉曳脩尾驚飛向日斜空中紛格鬬綵羽落如花喧呼勇不顧投網復誰嗟百錢得一雙新味時所佳烹煎雜雞鶩爪距漫槎牙誰知化為蜃海上落飛鵶雙鳬觀在葉縣王喬古仙子時出觀人寰常為漢郎吏厭世去無還雙鳬偶為戲聊以驚世頑不然神仙迹羅網安能攀紛紛塵埃中銅印紆青綸安知無隱者竊笑彼愚奸郭綸綸本河西弓箭手屢戰有功不賞自黎州都監官滿貧不能歸今權嘉州監税河西猛士無人識日暮津亭閲過船路人但覺驄馬瘦不知鐡槊大如椽因言西方久不戰截髪願作萬騎先我當慿軾與寓目㸔君飛矢射蠻氊初發嘉州朝發鼓闐闐西風獵畫旃故鄉飄已逺往意浩無邊錦水細不見蠻江清更鮮奔騰過佛脚曠蕩造平川野市有禪客釣臺尋暮烟相期定先到久立水潺潺是日期鄉僧宗一㑹别釣魚臺下犍為王氏書樓樹林幽翠滿山谷樓觀突兀起江濱云是昔人藏書處磊落萬巻今生塵江邊日出紅霧散綺窻畫閣青氛氲山猿悲嘯谷泉響野鳥嘐戛巗花春借問生人今何在被甲逺戍長苦辛先登摶戰事斬級區區何者為三墳書生古亦有戰陣葛巾羽扇揮三軍古人不見悲世俗囘首蒼山空白雲過宜賓見夷中亂山江寒晴不知逺見山上日朦朧含高峰晃蕩射峭壁横雲忽飄散翠樹紛歴歴行人挹孤光飛鳥投逺碧蠻荒誰復愛穠秀安可適豈無避世士高隱鍊精魄誰能從之逰路有豺虎迹夜泊牛口日落江霧生繫舟宿牛口居民偶相聚三四依古栁負薪出深谷見客喜且售煮蔬為夜餐安識肉與酒朔風吹茅屋破壁見星斗兒女自咿嚘亦足樂且久人生本無事苦為世味誘富貴耀吾前貧賤獨難守誰知深山子甘與麋鹿友置身落蠻荒生意不自陋今子獨何者汲汲强奔走牛口見月掩窻寂巳睡月脚埀孤光披衣起周覽飛露洒我裳山川同一色浩若渉大荒幽懷耿不寐四顧獨彷徨忽憶丙申年京邑大雨霶蔡河中夜决横浸國南方車馬無復見紛紛操栰郎新秋忽已晴九陌尚汪洋龍津觀夜市燈火亦煌煌新月皎如晝疎星弄寒芒不知京國喧是謂江湖鄉今來牛口渚見月重淒涼郤思舊遊處滿陌沙塵黄舟中聽大人彈琴彈琴江浦夜漏永歛袵竊聽獨激昂風松瀑布已清絶更愛玉佩聲琅璫自從鄭衞亂雅樂古器殘缺世已忘千年寥落獨琴在有如老仙不死閲興亡世人不容獨反古强以新曲求鏗鏘微音淡弄忽變轉數聲浮脆如笙簧無情枯木今尚爾何況古意墮渺茫江空月出人響絶夜䦨更請彈文王泊南牛口期任遵聖長官到晚不及見復來江上有㣲徑深榛烟雨埋﨑嶇欲取别不見又重來下馬未及語固已慰長懐江湖涉浩𣺌安得與之偕江上㸔山船上㸔山如走馬倐忽過去數百羣前山槎牙忽變態後嶺雜遝如驚奔仰㸔㣲逕斜繚繞上有行人高縹緲舟中舉手欲與言孤㠶南去如飛鳥留題仙都觀山前江水流浩浩山上蒼蒼松栢老舟中行客去紛紛古今換易如秋草空山樓觀何峥嶸真人王逺隂長生飛符御氣朝百靈悟道不復誦黄庭龍車虎駕來下迎去如旋風摶紫清真人厭世不囘顧世間生死如朝暮學仙度世豈無人餐霞絶粒長辛苦安得獨從逍遙君泠然乘風駕浮雲超世無有我獨行屈原塔在忠州原不當有塔於此意者後人追思故為作之楚人悲屈原千歲意未歇精魂飄何處父老空哽咽至今滄江上投飯救饑渴遺風成競渡猿叫楚山裂屈原古壯士就死意甚烈世俗安得知眷眷不忍决南賨舊屬楚山上有遺塔應是奉佛人恐子就淪滅此事雖無慿此意固已切古人誰不死何必較考折名聲實無窮富貴亦暫熱大夫知此理所以持死節西山詩和者三十餘人再次前韻為謝朱顔發過如春醅胸中梨棗初未栽丹砂未易掃白髪赤松却欲參黄梅寒溪本自逺公社白蓮翠竹依崔嵬當時石泉照金像神光夜發如五臺飲泉鑒面得真意坐視萬物皆浮埃欲收暮景返田里逺溯江水窮離堆還朝豈獨羞老病自歎才盡傾空罍諸公渠渠若夏屋吞吐風月清隅隈我如廢井久不食古甃缺落生隂苔數詩往復相感發汲新除舊寒光開遙知二月春江闊雪浪倒巻雲峯摧石中無聲水亦静云何觧轉空山雷欲就諸公評此句一作語要識憂喜何從來願求南宗一勺水往與屈賈湔餘哀新灘扁舟轉山曲未至已先驚白浪横江起槎牙似雪城畨畨從高來一一投澗坑大魚不能上暴鬛一作腮灘下横小魚散復合瀺灂如遭烹鸕鷀不敢下飛過兩翅輕白鷺誇瘦捷揷脚還欹傾區區舟上人薄技安敢呈只應灘頭廟賴此牛酒盈新灘阻風北風吹寒江來自兩山口初聞似搖扇漸覺平沙走飛雲滿嵓谷舞電穿窻牖灘下三日留識盡灘一作山前叟孤舟倦鵶軋短纜困牽揉嘗聞不終朝今此何其久只應留逺人此意固亦厚吾今幸無事閉戸為飲酒昭君村昭君本楚人艷色照江水楚人不敢娶謂是漢妃一作家子誰知去鄉國萬里為胡鬼人言生女作門楣昭君當時憂色衰古來人事盡如此反覆縱横安可知黄牛廟江邊石壁高無路上有黄牛不服箱廟前行客拜且舞擊鼓吹簫屠白羊山下耕牛苦磽确兩角磨崖四蹄濕青芻半束長苦饑仰㸔黄牛安可及蝦蟇培蟇背似覆盂蟇頥如偃月謂是月中蟇開口吐月液根源來甚逺百尺蒼崖裂當時龍破山此水隨龍出入江江水濁猶作深碧色禀受苦潔清獨與凡水隔豈惟煮茶好釀酒應無敵留題峽州甘泉寺姜詩故居輕舟横江來弔古悲純孝逶迤尋逺迹婉孌見遺貌清泉不可挹涸盡空石窖古人飄何之唯有風竹閙行行翫村落户户懸網罩民風坦和平開戸夜無鈔叢林富笋茹平野絶虎豹嗟哉此樂鄉無乃姜子教寄題清溪寺在峽州鬼谷子之故居口舌安足恃韓非死説難自知不可用鬼谷乃真奸遺書今未亡小數不足觀秦儀固新學見利不知患嗟時無桓文使彼二子顛死敗無足怪夫子固使然君㸔巧更窮不若愚自安遺宫若有神頷首然吾言荆門惠泉泉源從高來走下隨石脈紛紛白沫亂隱隱蒼崖坼縈囘成曲沼清澈見肝膈衆瀉為長溪奔駛蕩蛙蟈初開不容椀漸去已如帛傳聞此山中神物懶一作頻遭謫不能致雷雨灔灔吐寒碧遂令山前人千古灌稻麥東坡全集巻二十六
