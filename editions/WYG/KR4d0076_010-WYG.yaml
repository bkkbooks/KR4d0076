body:
  text: 東坡全集巻十宋蘇軾撰詩四十七首九日黄樓作去年重陽不可說南城夜半千漚發水穿城下作雷鳴泥滿城頭飛雨滑黄花白酒無人問日暮歸来洗鞾韈豈知還復有今年把琖對花容一呷莫嫌酒薄紅粉陋終勝泥中事鍬鍤黄樓新成壁未乾清河已落霜初殺朝來白露如細雨南山不見千尋刹樓前便作海茫茫樓下空聞櫓鴉軋薄寒中人老可畏熱酒澆腸氣先壓煙消日出見漁村逺水鱗鱗山齾齾詩人猛士雜龍虎坐客三十餘人多知名之士楚舞吳歌亂鵝鴨一杯相屬君勿辭此境何殊泛清霅太虚以黄樓賦見寄作詩為謝我在黄樓上欲作黄樓詩忽得故人書中有黄樓詞黄樓髙十丈下建五丈旗楚山以為城泗水以為池我詩無傑句萬景驕莫隨夫子獨何妙雨雹散雷椎雄詞雜今古中有屈宋姿南山多磬石清滑如流脂朱蠟為摹刻細妙分毫釐佳處未易識當有來者知九日次韻王鞏我醉欲眠君罷休已教従事到青州鬂霜饒我三千丈詩律輸君一百籌聞道郎君閉東閣且容老子上南樓相逢不用忙歸去明日黄花蝶也愁送頓起客路相逢難為樂常不足臨行挽衫袖更賞折殘菊佳人亦何念淒斷陽闗曲酒䦨不忍去共接一寸燭留君終無窮歸駕不免促岱宗已在一往繼前躅天門四十里夜看扶桑浴回頭望彭城大海浮一粟故人在其下塵土相豗蹴惟有黄樓詩千古配淇澳頓有詩記黄樓本末送孫勉昔年罷東武曽過北海縣白河翻雪浪黄土如烝麫桑麻冠東方一熟天下賤是時累饑饉常苦盗賊變每憐追胥官野宿風裂面君為淮南秀文采照金殿君嘗考中進士第一人胡為事奔走投筆腰羽箭更被髯将軍豪篇來督戰其兄莘老以詩寄之皆言戰事親程三郡士玉石不䏻􅃷欲知君得人失者亦稱善君才無不可要欲經百錬吾詩堪咀嚼聊送别酒嚥李思訓畫長江絶島圗山蒼蒼江茫茫大孤小孤江中央崖崩路絶猿鳥去惟有喬木攙天長客舟何處來棹歌中流聲抑揚沙平風軟望不到孤山久與船低昻峩峩兩煙鬟曉鏡開新粧舟中賈客莫漫狂小孤前年嫁彭郎次韻荅王鞏我有方外客顔如瓊之英十年塵土窟一寸氷雪清朅来従我逰坦率見真情顧我無足戀戀此山水清新詩如彈丸脫手不蹔停昨日放魚回衣襟滿浮萍今日扁舟去白酒載烏程山頭見月出江路聞鼉鳴莫作孺子歌滄浪濯吾纓吾詩自堪唱相子棹歌聲張安道見示近詩人物一衰謝微言難重尋殷勤永嘉末復聞正始音清談未足多感時意殊深少年有竒志欲和南風琴荒林蜩蚻亂廢沼蛙蟈淫遂欲掩兩耳臨文但噫瘖蕭然王郎子來自緱山隂其壻王鞏携來云見浮丘伯吹簫明月岑遺聲落淮泗蛟鼉為悲吟願公正王度祈招繼愔愔次韻王鞏顔復同泛舟沈郎清瘦不勝衣邉老便便帯十圍躞蹀身輕山上走讙呼船重醉中歸舞腰似雪金釵落談辯如雲玉麈揮憶在錢塘正如此回頭四十二年非次韻張十七九日贈子由千戈萬槊擁笓籬九日清樽豈復持是日南都敕使按兵官事無窮何日了菊花有信不吾欺逍遥瓊館真堪羡取次塵纓未可縻迨此暇時須痛飲他年長劒拄君頥次韻王鞏獨眠居士身心如槁木旅館孤眠體生粟誰䏻相思琢白玉服藥千朝償一宿天寒日短銀燈續欲往従之車脫軸何人吹斷參差竹泗水茫茫鴨頭綠次韻王鞏留别去國已八年故人今有誰當時交㳺内未數蔡克兒豈無知我者好爵半已縻爭為東閣吏不顧北山移公子表獨立與世頗異馳不辭千里逺成此一段竒蛾眉亦可憐無奈思餅師無人伴客寢惟有支牀龜君歸與何人文字相娯嬉持此調張子一笑當脫頥登雲龍山醉中走上黄茆岡滿岡亂石如羣羊岡頭醉倒石作牀仰看白雲天茫茫歌聲落谷秋風長路人舉首東南望拍手大笑使君狂次韻僧潛見贈道人胸中水鏡清萬象起滅無逃形獨依古寺種秋菊要伴騷人餐落英人間底處有南北紛紛鴻鴈何曽𠖇閉門坐穴一禪榻頭上嵗月空崢嶸今年偶出為求法欲與慧劍加礱硎雲衲新磨山水出霜髭不翦兒童驚公侯欲識不可得故知倚市無傾城秋風吹夢過淮水想見橘柚垂空庭故人各在天一角相望落落如晨星彭城老守何足顧棗林桑野相邀迎千山不憚荒店逺兩脚欲趂飛猱輕多生綺語磨不盡尚有宛轉詩人情猿吟鶴唳本無意不知下有行人行空堦夜雨自清絶誰使掩抑啼孤惸我欲仙山掇瑶草傾筐坐歎何時盈簿書鞭扑晝填委煑茗燒栗冝宵征乞取摩尼照濁水共看落月金盆傾次韻潛師放魚法師說法臨泗水無數天花隨麈尾勸将淨業種西方莫待夢中呼起起哀哉若魚竟坐口逺愧知幾穆生醴况逢孟簡對盧仝不怕校人欺子美疲民尚作魚尾赤數罟未除吾顙泚法師自有衣中珠不用辛苦沙泥底與舒教授張山人參寥師同逰戲馬臺書西軒壁兼簡顔長道二首古寺長廊院院行此軒偏慰旅人情楚山西斷如迎客汴水南来故遶城路失玉鈎芳草合林亡白鶴古泉清淡㳺何以娯庠老坐聴郊原琢磬聲竹杖芒鞋取次行下臨官道見人情天寒菽粟猶栖畆日莫牛羊自入城沽酒獨教陶令醉題詩誰似皎公清更尋陋巷顔夫子乞取微言繼此聲滕縣時同年西園人皆種榆栁坐待十畆隂我獨種松柏守此一寸心君㸔閭里間盛衰日駸駸種木不種徳聚散如飛禽老時吾不識用意一何深知人得數士重義忘千金西園手所開珍木來千岑養此霜雪根遲彼鸞鳯吟池塘得流水龜魚自浮沉幽桂日夜長白花亂青衿豈獨富草木子孫已成林拱把不知數㑹當出千尋樊侯種梓漆夀張富華簮我作西園詩以為里人箴次韻王廷老和張十七九日見寄霜葉投空雀啅籬上樓筋力強扶持對花把酒未甘老膏面染鬚聊自欺無事亦知君好飲多才終恐世相縻請㸔平日銜杯口㑹有金椎為控頥次韻參寥師寄秦太虚三絶句時秦君舉進士不得秦郎文字固超然漢武慿虚意欲仙底事秋来不得解定中試與問諸天一尾追風抹萬蹄崑崙𤣥圃謂朝隮回㸔世上無伯樂却道鹽車勝月題得䘮秋毫久已𡨕不須聞此氣崢嶸何妨却伴參寥子無數新詩咳唾成與參寥師行園中得黄耳蕈遣化何時取衆香法筵齋鉢久淒凉寒蔬病甲誰䏻採落葉空畦半已荒老楮忽生黄耳菌故人兼致白芽薑蕭然放筯東南去又入春山筍蕨鄉百步洪二首并叙王定國訪余于彭城一日棹小舟與顔長道携盼英卿三子游泗水北上聖女山南下百步洪吹笛飲酒乗月而歸余時以事不得往夜着羽衣佇立於黄樓上相視而笑以為李太白死世間無此樂三百餘年矣定國既去逾月復與參寥師放舟洪下追懷曩㳺已為陳迹喟然而歎故作二詩一以遺參寥一以寄定國且示顔長道舒堯文邀同賦云長洪斗落生跳波輕舟南下如投梭水師絶呌鳬鴈起亂石一線爭磋磨有如兎走鷹隼落駿馬下注千丈坡斷絃離柱箭脫手飛電過隙珠翻荷四山眩轉風掠耳但見流沫生千渦嶮中得樂雖一快何異水伯夸秋河我生乗化日夜逝坐覺一念逾新羅紛紛爭奪醉夢裏豈信荆棘埋銅駝覺来俯仰失千刼回視此水殊委蛇君㸔岸邉蒼石上古來篙眼如蜂窠但應此心無所住造物雖駛如余何回船上馬各歸去多言嘵嘵師所呵佳人未肯回秋波㓜輿欲語防飛梭輕舟弄水買一笑醉中蕩槳肩相磨不似長安閭里侠貂裘夜走燕脂坡獨将詩句擬鮑謝渉江共採秋江荷不知詩中道何語但覺兩頬生微渦我時羽服黄樓上坐見織女初斜河歸來留聲滿山谷明月正照金叵羅奈何捨我入塵土擾擾毛羣欺卧駝不念空齋老病叟退食誰與同委蛇時來洪上㸔遺迹忍見屐齒青苔窠詩成不覺雙淚下悲吟相對惟羊何欲遣佳人寄錦字夜寒手冷無人呵送參寥師上人學苦空百念已灰冷劍頭惟一吷焦榖無新穎胡為逐吾軰文字爭蔚炳新詩如玉雪出語便清警退之論草書萬事未嘗屏憂愁不平氣一寓筆所騁頗怪浮屠人視身如丘井頽然寄淡泊誰與發豪猛細思乃不然真巧非幻影欲令詩語妙無厭空且静静故了羣動空故納萬境閱世走人間觀身卧雲嶺醎酸雜衆好中有至味永詩法不相妨此語當更請夜過舒堯文戯作先生堂前霜月苦弟子讀書喧兩廡推門入室書縦横蠟紙燈籠晃雲母先生骨清少眠卧長夜黙坐數更皷耐寒石硯欲生氷得火銅缾如過雨郎君欲出先自賛坐客斂袵誰敢侮明朝阮籍過阿戎應作羲之羡懐祖十月十五日觀月黄樓席上次韻中秋天氣未應殊不用紅紗照坐隅山下白雲横匹素水中明月卧浮圗未成短棹還三峡已約輕舟泛五湖為問登臨好風景明年還憶使君無荅王定民開緘奕奕滿銀鈎書尾題詩語更遒八法舊聞宗長史五言今復擬蘇州筆蹤好在留䑓寺旗隊遥知到石溝欲寄䑕須并蠒紙請君章草賦黄樓次韻王廷老退居見寄二首浪蘃浮花不辨春歸來方識嵗寒人回頭自笑風波地閉眼聊觀夢幻身北牖已安陶令榻西風還避庾公塵更搔短髪東南望試問今誰裹舊巾接果移花㸔補籬腰鎌手斧不妨持上都新事長先到老圃閒談未易欺釀酒閉門開社甕殺牛留客解耕縻何時得見纎纎玉右手持盃左捧頥次顔長道韻送傅倅兩見黄花掃落英南山山寺遍題名宗成不獨依岑范魯衛終當似弟兄去嵗雲濤浮汴泗與君泥土滿衣纓如今别酒休辭醉試聴雙洪落後聲雲龍山觀燒得雲字丁女真水妃寒山便火耘隕霜知已殺坯户聴初焚束緼方熠燿敲石俄氤氲落㸃甘泉烽横煙楚塞氛窮虵上喬木潛蛟躡浮雲驚飛墮傷鴈狂走迷癡麏谷蟄起蜩鷰山妖竄䕫羵野竹爆哀聲幽桂飄寃芬悲同秋照蠏快若夏燎蚊火牛入燕壘燧象奔呉軍崩騰井陘口萬馬皆朱幩摇曵驪山隂諸姨爛紅裙方隨長風巻忽值絶澗分我本山中人習見非獨聞偶従二三子來訪張隠君君家亦何有物象移朝曛把酒㸔飛燼空庭落繽紛行觀農事起畦壠如纈紋細雨發春穎嚴霜倒秋蕡始知一炬力洗盡狐兎羣和田國博喜雪疇昔月如晝曉來雲暗天玉花飛半夜翠浪舞明年螟螣無遺種流亡稍占田嵗豐君不樂鐘磬㡬時編田有服不樂祈雪霧猪泉出城馬上作贈舒堯文二年走呉越踏遍千里山朝隨白雲去莫與栖鴉還翻如得木狖飛步誰能攀一為符竹累坐老敲榜間此行亦何事聊散腰脚頑浩蕩城西南亂山如玦環山下野人家桑柘雜榛菅嵗晏風日暖人牛相對閒薄雪不蓋土麥苖稀可刪願君發豪句嘲詼破天慳次韻舒堯文祈雪霧猪泉長笑虵醫一寸腹銜氷吐雹何時足蒼鵝無罪亦可憐斬頸横盤不敢哭豈知泉下有猪龍卧枕雷車踏隂軸前年太守為旱請雨㸃隨人如撒菽傅欽之曽禱此泉得雨太守歸國龍歸泉至今人詠淇園綠我今又復罹此旱凛凜疲民在溝瀆却尋舊迹叩神泉坐客仍携王子淵欽之時客惟舒在矣㸔草中和樂職頌新聲妙語慰華顛曉來泉上東風急須上氷珠老蛟泣怪詞欲逼龍飛起嶮韻不量吾所及行㸔積雪厚埋牛誰與春工掀百蟄此時還復借君詩餘力汰輈仍貫笠揮毫落紙勿言疲驚龍再起震失匙石炭并引彭城舊無石炭元豐元年十二月始遣人訪獲於州之西南白土鎮之北以冶鐡作兵犀利勝常云君不見前年雨雪行人斷城中居民風裂骭濕薪半束抱衾裯日莫敲門無處換豈料山中有遺寳磊落如䃜萬車炭流膏迸液無人知陣陣腥風自吹散根苖一發浩無際萬人鼔舞千人㸔投泥潑水愈光明爍玉流金見精悍南山栗林漸可息此山頑鑛何勞鍛為君鑄作百鍊刀要斬長鯨為萬段人日獵城南㑹者十人以身輕一鳥過槍急萬人呼為韻軾得鳥字兒童笑使君憂愠長悄悄誰拈白接䍦令跨金騕褭東風吹濕雪手冷怯清曉忽發兩鳴髇相趂飛蝱小放弓一長嘯目送孤鴻矯吟詩忘鞭轡不語頭自掉歸来仍脫粟鹽豉煑芹蓼何似雷将軍兩眼霜鶻皎黒頭已為将百戰意未了馬上倒銀缾得兎不暇燎少年負竒志蹭蹬百憂繞回首英雄人老死已不少青春還一夢餘年真過鳥莫上呼鷹臺平生笑劉表将官雷勝得過字代作胡騎入雲中急烽連夜過短刀穿虜陣濺血貂裘涴一來輦轂下愁悶惟欲卧今朝従公獵稍覺天宇大一雙鐡絲箭未發手先唾射殺雪毛狐腰間餘一箇臺頭寺步月得人字風吹河漢掃微雲步屧中庭月趂人浥浥爐香初泛夜離離花影欲摇春遙知金闕同清景想見氈車碾暗塵回首舊㳺真是夢一簮華髮岸綸巾臺頭寺送宋希元相従傾盖只今年送别南臺便黯然入夜更歌金縷曲他時莫忘角弓篇是日與宋君同栽松寺中三年不顧東鄰女取宋玉二頃方求負郭田取季子我欲歸休君未可茂先方議斸龍泉種松得徠字其四在懐古堂其六在石經院春風吹榆林亂莢飛作堆荒園一雨過戢戢千萬栽青松種不生百株望一枚一枚已有餘氣壓千畆槐野人易斗粟云自魯徂徠魯人不知貴萬竈飛青煤束縛同一車胡為乎來哉泫然解其縛清泉洗浮埃枝傷葉尚困生意未肯回山僧老無子養䕶如嬰孩坐待走龍􅉬清隂滿南臺孤根裂山石直幹排風雷我今百日客養此千嵗材時去替不百日茯苓無消息雙鬢日夜摧古今一俯仰作詩寄餘哀作書寄王晋卿忽憶前年寒食北城之㳺走筆為此詩北城寒食煙火微落花蝴蝶作團飛王孫出㳺樂忘歸門前驄馬紫金鞿吹笙帳底煙霏霏行人舉頭誰敢睎扣門狂客君不麾更遣傾城出翠幃書生老眼省見稀畫圗但覺周昉肥別来春物已再菲西望不見紅日圍何時東山歌采薇把琖一聴金縷衣往在東武與人往反作粲字韻詩四首今黄魯直亦次韻見寄復和荅之苻堅破荆州止獲一人半中郎老不遇但喜識元歎我今獨何幸文字厭竒玩又得天下才相従百憂散隂求我軰人規作林泉伴寧當待垂老倉卒収一旦不見梁伯鸞空對孟光案才難不其然婦女厠周亂世豈無作者於我如既盥獨喜誦君詩咸韶音節緩夜光一已多矧獲纍纍貫相思君欲瘦不往我真懦吾儕眷微祿寒夜抱寸炭何時定相過徑就我乎館飄然東南去江水清且渙相與訪名山微言師忍粲雪齋杭僧法言作雪山於齋中君不見峨眉山西雪千里北望成都如井底春風百日吹不消五月行人如凍蟻紛紛市人爭奪中誰信言公似賛公人間熱惱無處洗故向西齋作雪峰我夢扁舟適呉越長廊静院燈如月開門不見人與牛惟見空庭滿山雪言有詩見寄云林下閒㸔水牯牛以雙刀遺子由子由有詩次其韻寳刀匣不見但見龍雀鐶何曽斬蛟虵亦未切琅玕胡為穿窬軰見之要領寒吾刀不汝問有愧在其肝念此力自藏包之虎皮斑湛然如古井終嵗不復瀾不憂無所用憂在用者難佩之非其人匣中自長歎我老衆所易屢遭非意干惟有王𤣥通堦庭秀芝蘭知子後必大故擇刀所便屠狗非不用一嵗六七刓欲試百錬剛要須更泥蟠作詩銘其背以待知者㸔㳺桓山㑹者十人以春水滿四澤夏雲多竒峰為韻得澤字東郊欲尋春未見鸎花迹春風在流水鳬鴈先拍拍孤㠶信溶漾弄此半篙碧艤舟桓山下長笑理輕䇿彈琴石室中幽響清磔磔弔彼泉下人野火尖枯腊悟此人間世何者為真宅暮回百步洪散坐洪上石愧我非王襄子淵肯見客臨流吹洞簫水月照連璧謂王氏兄弚也此歡真不朽回首嵗月隔想象斜川㳺作詩繼彭澤戴道士得四字代作少小家江南寄迹方外士偶遇白雲出賣藥彭城市雪霜侵鬢髮塵土汙冠袂賴此三尺桐中有山水意自従夷夏亂七絲久已棄心知鹿鳴三不及胡琴四使君獨慕古嗜好與衆異共弔桓魋宫一灑孟嘗涙歸來鎻塵匣獨對斷絃喟挂名石壁間寂寞千嵗事次韻田國博部夫南京見寄二絶嵗月翩翩下坂輪歸來杏子已生仁深紅落盡東風惡栁絮榆錢不當春火冷餳稀杏粥稠青裙縞袂餉田頭大夫行役家人怨應羡居鄉馬少㳺月夜與客飲酒杏花下杏花飛簾散餘春明月入戸尋幽人褰衣步月踏花影烱如流水涵青蘋花間置酒清香發争挽長條落香雪山城薄酒不堪飲勸君且吸盃中月洞簫聲斷月明中惟憂月落酒杯空明朝巻地春風惡但見綠葉棲殘紅送蜀人張師厚赴殿試二首忘歸不覺鬢毛斑好事鄉人尚往還斷嶺不遮西望眼送君直過楚王山雲龍山下試春衣放鶴亭前送落暉一色杏花紅十里新郎君去馬如飛再次韻荅田國愽部夫還二首西郊黄土沒車輪滿面風埃笑路人已放役夫三萬指従教積雨洗殘春枝上稀疎地上稠忍㸔紅糝落墻頭風流别乗多才思歸趂西園秉燭㳺田國愽見示石炭詩有鑄劍斬佞臣之句次韻荅之楚山鐵炭皆竒物知君欲斫姦邪窟屬鏤無眼不識人楚國何曽斬無極玉川狂直古遺民救月裁詩語最真千里妖蟇一寸鐡地上空愁蟣蝨臣荅郡中同僚賀雨水旱行十年饑疫遍九土竒窮所向惡嵗嵗祈晴雨雖非為已求重情終愧古鬼神亦知我老病入腰膂何曽拜向人此意難不許重雲淒已合微潤先流礎蕭蕭止還作坐聴及三鼓天明将吏集泥土滿靴屨登城望麰麥綠浪風掀舞愧我賢友生雄篇鬬新語君㸔大熟嵗風雨占十五天地夲無功祈禳何足數渡河不入境豈若無蝗虎而况刑白鵞下䇿君勿取罷徐州往南京馬上走筆寄子由五首吏民莫扳援歌管莫悽咽吾生如寄耳寧獨為此别别離隨處有悲惱緣愛結而我本無恩此啼誰為設紛紛等兒戯鞭􅌱遭割截道邉雙石人幾見太守發有知當解笑撫掌冠纓絶父老何自來花枝褭長紅洗琖拜馬前請夀使君公前年無使君魚鼈化兒童舉鞭謝父老正坐使君窮窮人命分惡所向招災㓙水來非吾過去亦非吾功古汴従西來迎我向南京東流入淮泗送我東南行蹔别還復見依然有餘情春雨漲微波一夜到彭城過我黄樓下朱欄照飛甍可憐洪上石誰聴月中聲前年過南京麥老櫻桃熟今年舊㳺處櫻麥半黄綠嵗月如宿夕人事幾反覆青衫老従事坐穏生髀肉聮翩閱三守迎笑如轉轂歸耕何時决田舍我已卜卜田向何許石佛山南路下有爾家川千畦種秔稌山泉宅龍蜃平地走膏乳異時畆一金近欲為逃戸逝将解簮紱賣劍買牛具故山豈不懐廢宅生篙穭便恐桐鄉人長祠仲卿墓次韻曺九章見贈蘧瑗知非我所師流年已似手中蓍正平獨肯従文舉中散何曽靳孝尼賣劒買牛真欲老得錢沽酒更無疑雞豚異日為同社應有千篇唱和詩書泗州孫景山西軒落日明孤塔青山繞病身知君向西望不愧塔中人過淮三首贈景山兼寄子由好在長淮水十年三往來功名真已矣歸計亦悠哉今日風憐客平時浪作堆晩來洪澤口捍索響如雷過淮山漸好松檜亦蒼然藹藹藏孤寺泠泠出細泉故人真吏隠小檻帯巖偏却望臨淮市東風語笑傳回首濉陽幕簿書髙沒人何時桐柏水一洗庾公塵此去漸佳境獨㳺長慘神待君詩百首來冩浙西春舟中夜起微風蕭蕭吹菰蒲開門㸔雨月滿湖舟人水鳥兩同夢大魚驚竄如奔狐夜深人物不相管我獨形影相嬉娱暗潮生渚弔寒蚓落月挂栁㸔懸蛛此生忽忽憂患裏清境過眼䏻須㬰雞鳴鐘動百鳥散舩頭擊鼓還相呼余去金山五年而復至次舊詩韻贈寳覺長老誰䏻斗酒博西涼但愛齋厨法豉香舊事真成一夢過髙談為洗五年忙清風偶與山阿曲明月聊隨屋角方稽首願師憐久客直将歸路指茫茫逰恵山并叙余昔為錢塘倅往來無錫未嘗不至恵山既去五年復為湖州與髙郵秦太虚杭僧參寥同至覽唐處士王武陵竇郡朱宿所賦詩愛其語清簡蕭然有出塵之姿追用其韻各賦三首夢裏五年過覺來雙鬢蒼還将塵土足一歩漪瀾堂俯窺松桂影仰見鴻鶴翔烱然肝肺見已作氷玉光虚明中有色清淨自生香還従世俗去永與世俗忘薄雲不遮山疎雨不濕人蕭蕭松徑滑䇿䇿芒鞋新嘉我二三子皎然無緇磷勝㳺豈殊昔清句仍絶塵弔古泣舊史疾䜛歌小旻哀哉扶風子難與巢許隣謂竇羣敲火發山泉烹茶避林樾明牕傾紫琖色味兩竒絶吾生眠食耳一飽萬想滅頗笑玉川子饑弄三百月豈如山中人睡起山花發一甌誰與共門外無來轍贈恵山僧恵表行遍天涯意未䦨将心到處遣人安山中老宿依然在案上楞嚴已不看欹枕落花餘㡬片閉門新竹自千竿客來茶罷空無有盧橘楊梅尚帯酸贈錢道人書生苦信書世事仍臆度不量力所負輕出千金諾當時一快意事過有餘怍不知幾州鐡鑄此一大錯我生涉憂患常恐長罪惡静觀殊可喜脚淺猶容却而况錢夫子萬事初不作相逢更何言無病亦無藥與秦太虚參寥㑹于松江而闗彦長徐安中適至分韻得風字二首呉越溪山興未窮又扶衰病過垂虹浮天自古東南水送客今朝西北風絶境自忘千里逺勝㳺難復五人同舟師不㑹留連意擬㸔斜陽萬頃紅二子緣詩老更窮人間無處吐長虹平生睡足連江雨盡日舟横擘岸風人笑年來三黜慣天教我軰一樽同知君欲冩長相憶更送銀盤尾鬛紅次韻闗令送魚舉網驚呼得巨魚饞涎不易忍流酥更煩赤脚長鬚老來趂西風十幅蒲東坡全集巻十
