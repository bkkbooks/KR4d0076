body:
  text: 東坡全集巻十二宋蘇軾撰詩八十九首㳺武昌寒溪西山寺連山蟠武昌翠木蔚樊口我來已百日欲濟空搔首坐看鷗鳥没夢逐麏䴥走今朝横江來一葦寄衰朽髙談破巨浪飛屨輕重阜去人曽幾何絶壁寒溪吼風泉兩部樂松竹三益友徐行欣有得芝术在蓬莠西上九曲亭衆山皆培塿却㸔江北路雲水渺何有離離見呉宫莽莽見楚藪空傳孫郎石無復陶公栁爾來風流人惟有漫浪叟買田吾已决乳水况宜酒所須脩竹林深處安井臼相将踏勝絶更裹三日糗武昌銅劒歌并叙供奉官鄭文嘗官於武昌江岸裂出古銅劒文得之以遺余冶鑄精巧非鍜冶所成者雨餘江清風巻沙雷公躡雲捕黄蛇蛇行空中如枉矢電光煜煜燒蛇尾或投以塊鏗有聲雷飛上天蛇入水水上青山如削鐡神物欲出山自裂細看兩脅生碧花猶是西江老蛟血蘇子得之何所為蒯緱彈鋏詠新詩君不見凌煙功臣長九尺腰間玉具髙拄頥定恵顒師為余竹下開嘯軒啼鴂催天明喧喧相詆譙暗蛩泣夜永唧唧自相弔飲風蟬至潔長吟不改調食土矧無腸亦自終夕呌鳶貪聲最鄙鵲喜意可料皆緣不平鳴慟哭等嬉笑阮生已粗率孫子亦未妙道人開此軒清坐黙自照衝風振河海不能號無竅累盡吾何言風來竹自嘯石芝并叙元豐三年五月十一日癸酉夜夢㳺何人家開堂西門有小園古井井上皆蒼石石上生紫藤如龍蛇枝葉如赤箭主人言此石芝也余率爾折食一枝衆皆驚笑其味如雞蘇而甘明日作此詩空堂明月清且新幽人睡息來初勻了然非夢亦非覺有人夜呼祁孔賔披衣相従到何許朱欄碧井開瓊戸忽驚石上堆龍蛇玉芝紫筍生無數鏘然敲折青珊瑚味如蜜藕和雞蘇主人相頋一撫掌滿堂坐客皆盧胡亦知洞府嘲輕脫終勝嵇康羡王烈神仙一合五百年風吹石髓堅如鐵今年正月十四日與子由别於陳州五月子由復至齊安未至以詩迎之驚塵急雪滿貂裘淚洒東風别宛丘又向邯鄲枕中見却來雲夢澤南州暌離動作三年計牽挽當為十日留早晩青山暎黄髪相看萬事一時休栁子厚别劉夢得詩云聖㤙若許歸田去黄髮相㸔萬事休遷居臨皋亭我生天地間一蟻寄大磨區區欲右行不救風輪左雖云走仁義未免違寒餓劒米有危炊鍼氈無穏坐豈無佳山水借眼風雨過歸田不待老勇决凡幾箇幸茲廢棄餘疲馬解鞍䭾全家占江驛絶境天為破饑貧相乗除未見可弔賀澹然無憂樂苦語不成些曉至巴河口迎子由去年御史府舉動觸四壁幽幽百尺井仰天無一席隔墻聞歌呼自恨計之失留詩不忍冩苦淚漬紙筆餘生復何幸樂事有今日江流鏡面净烟雨輕羃羃孤舟如鳬鷖㸃破千頃碧聞君在磁湖欲見隔咫尺朝来好風色旗尾西北擲行當中流見笑臉青光溢此邦疑可老脩竹帯泉石欲買柯氏林兹謀待君必與子由同㳺寒溪西山散人出入無町畦朝㳺湖北暮淮西髙安酒官雖未上兩脚垂欲穿塵泥與君聚散若雲雨共惜此日相提携千摇萬兀到樊口一箭放溜先鳬鷖層層草木暗西嶺瀏瀏霜雪鳴寒溪空山古寺亦何有歸路萬頃青玻瓈我今漂泊等鴻鴈江南江北無常栖幅巾不擬過城市欲踏徑路開新蹊路有直入寒溪不過武昌者却憂别後不忍到見子行迹空餘悽吾儕流落豈天意自坐迂濶非人擠行逢山水輙羞歎此去未免勤鹽虀何當一遇李八百相哀白髮分刀圭李八百宅在筠州次韻荅子由平生弱羽寄衝風此去歸飛識所従好語似珠穿一一妄心如膜退重重山僧有味寧知子瀧吏無言只笑儂尚有讀書清淨業未容春睡敵千鍾和何長官六言次韻作邑君真伯厚去官我豈曼容一㕓願託仁政六字難賡變風五噫已出東洛三復願比南容學道未従潘盎南海謂狂為盎潘近世得道者也草書猶似楊風楊凝式也石渠何須反顧水驛幸足相容長江大欲見庇探支八月凉風清風初號地籟明月自寫天容貧家何以娱客但知抹月批風青山自是絶色無人誰與為容說向市朝公子何殊馬耳東風觀張師正所蓄辰砂将軍結髮戰蠻溪篋有殊珍勝象犀漫說玉牀分箭鏃何曽金鼎識刀圭近聞猛士収丹穴欲助君王鑄褭蹄多少空巖人不見自隨初日吐虹霓五禽言并叙梅聖俞嘗作四禽言余謫黄州寓居定恵院遶舍皆茂林脩竹荒池蒲葦春夏之交鳴鳥百族土人多以其聲之似者名之遂用聖俞體作五禽言使君向蘄州更唱蘄州鬼我不識使君寕知使君死人生作鬼㑹不免使君已老知何晩王元之自黄移蘄州聞啼鳥問其名或對曰此名蘄州鬼元之大惡之果卒於蘄南山昨夜雨西溪不可渡溪邉布穀兒勸我脫破袴不辭脫袴溪水寒水中照見催租瘢土人謂布榖為脫却破袴去年麥不熟挾彈規我肉今年麥上埸處處有殘粟豐年無象何處尋聴取林間快活吟此鳥聲云麥飯熟即快活力作力作蠶絲一百箔壠上麥頭昂林間桑子落願儂一箔千兩絲繅絲得蛹飼爾雛此鳥聲云蠶絲一百箔姑惡姑惡姑不惡妾命薄君不見東海孝婦死作三年乾不如廣漢龎姑去却還姑惡水鳥也俗云婦以姑虐死故其聲云次韻子由病酒肺疾發憶子少年時肺喘疲坐卧喊呀或終日勢若風雨過虚陽作浮漲客冷仍下墮妻孥恐悵望膾炙不登坐終年禁晚食半夜發清餓胃強鬲苦滿肺歛腹輙鼓三彭恣啖齧二竪肯逋播寸田可治生誰勸耕黄稬新法方田謂上腴為黄稬探懐得真藥不待君臣佐初如雪花積漸作櫻珠大隔墻聞三嚥隠隠如轉磨自茲失故疾陽唱隂輒和神仙多歴試中路或坎坷平生不盡器痛飲知無奈舊人眼㸔盡老伴餘幾箇殘年一斗粟待子同舂簸云何不自珍醉病又一挫真源結梨棗世味等糠莝耕耘當待穫願子勤自課相将賦逺逰仙語不用些正月二十日往岐亭郡人潘古郭三人送余於女王城東禪荘院一本作代書寄桃山居士張聖可十日春寒不出門不知江栁已摇村稍聞决决流氷谷盡放青青没燒痕數畆荒園留我住半瓶濁酒待君温去年今日闗山路細雨梅花正斷魂鐵拄杖并叙栁真齡字安期閩人也家寳一鐡拄杖如楖栗木牙節宛轉天成中空有簧行輒微響栁云得之浙中相傳王審知以遺錢鏐鏐以賜一僧栁偶得之以遺余作此詩謝之栁公手中黒虵滑千年老根生乳節忽聞鏗然爪甲聲四座驚顧知是鐵含簧腹中細泉語迸火石上飛星裂公言此物老有神自昔閩王餉呉越不知流落幾人手坐㸔變滅如春雪忽然贈我意安在兩脚未許甘衰歇便尋轍迹訪崆峒徑渡洞庭探禹穴披榛覔藥採芝菌刺虎鏦蛟擉蛇蝎㑹教化作兩錢錐歸來見公未華髮問我鐵君無恙否取出摩挲向公說與潘三失解後飲酒千金弊帚人誰買半額蛾眉世所妍顧我自為都眊矂憐君欲鬬小嬋娟青雲豈易量他日黄菊猶應似去年醉裏未知誰得䘮滿江風月不論錢東坡八首并叙余至黄州二年日以困匱故人馬正卿哀余乏食為於郡中請故營地數十畆使得躬耕其中地既久荒為茨棘瓦礫之塲而嵗又大旱墾闢之勞筋力殆盡釋耒而歎乃作是詩自愍其懃庶幾來嵗之入以忘其勞焉廢壘無人顧頽垣滿蓬蒿誰能捐筋力嵗晚不償勞獨有孤旅人天窮無所逃端來拾瓦礫嵗旱土不膏﨑嶇草棘中欲刮一寸毛喟焉釋耒歎我廪何時髙荒田雖浪莽髙庳各有適下隰種秔稌東原蒔棗栗江南有蜀士桑果已許乞好竹不難栽但恐鞭横逸仍須卜佳處規以安我室家童燒枯草走報暗井出一飽未敢期瓢飲已可必自惜有微泉來従逺嶺背穿城過聚落流惡壮蓬艾去為柯氏陂十畆魚蝦㑹嵗旱泉亦竭枯萍粘破塊昨夜南山雲雨到一犁外泫然尋故瀆知我理荒薈泥芹有宿根一寸嗟獨在雪芽何時動春鳩行可膾蜀人貴芹芽膾雜鳩肉作之種稲清明前樂事我能數毛空暗春澤鍼水聞好語蜀人以細雨為雨毛稲初生時農夫相語稲鍼出矣分秧及初夏漸喜風葉舉月明㸔露上一一珠垂縷秋來霜穂重顛倒相撑拄但聞畦壠間蚱蜢如風雨蜀中稻熟時蚱蜢羣飛田間如小蝗狀而不害稻新舂便入甑玉粒照筐筥我久食官倉紅腐等泥土行當知此味口腹吾巳許良農惜地力幸此十年荒桑柘未及成一麥庶可望投種未逾月覆塊已蒼蒼農夫告我言勿使苖葉昌君欲富餅餌要須縦牛羊再拜謝苦言得飽不敢忘種棗期可剥種松期可斵事在十年外吾計亦已慤十年何足道千載如風雹舊聞李衡奴此䇿疑可學我有同舍郎官居在􅈞岳李公擇也遺我三寸柑照坐光卓犖百栽儻可致當及春冰渥想見竹籬間青黄垂屋角潘子久不調沽酒江南村郭生本将種賣藥西市垣古生亦好事恐是押牙孫家有十畆竹無時客叩門我窮交舊絶三子獨見存従我於東坡勞餉同一餐可憐杜拾遺事與朱阮論吾師卜子夏四海皆弟昆馬生本窮士従我二十年日夜望我貴求分買山錢我今反累生借耕輟兹田刮毛龜背上何時得成氊可憐馬生癡至今誇我賢衆笑終不悔施一當獲千題織錦圗上回文三首春晩落花餘碧草夜凉低月半枯桐人隨逺鴈邉城暮雨映疎簾繡閣空紅手素絲千字錦故人新曲九回腸風吹絮雪愁縈骨淚洒縑書恨見郎羞㸔一首回文錦錦似文君别恨深頭白自吟悲賦客斷腸愁是斷絃琴姪安節逺來夜坐三首南來不覺嵗崢嶸坐撥寒灰聴雨聲遮眼文書元不讀伴人燈火亦多情嗟余潦倒無歸日今汝蹉跎已半生免使韓公悲世事白頭還對短燈檠心衰面改瘦崢嶸相見惟應識舊聲永夜思家在何處殘年知汝逺來情畏人黙坐成癡鈍問舊驚呼半死生夢斷酒醒山雨絶笑㸔饑䑕上燈檠落第汝為中酒味吟詩我作忍饑聲便思絶粒真無䇿苦說歸田似不情腰下牛閒方解佩洲中奴長足為生大弨一弛何緣殻已覺飜飜不受檠冬至日贈安節我生幾冬至少小如昨日當時事父兄上夀拜脫膝十年閱凋謝白髮催衰疾瞻前惟兄三顧後子由一近者隔濤江逺者天一壁今朝復何幸見此萬里妷憶汝總角時啼笑為梨栗今來能慷慨志氣堅鐡石諸孫行復爾世事何時畢詩成却超然老淚不成滴岐亭道上見梅花戯贈季常蕙死蘭枯菊亦摧返魂香入嶺頭梅數枝殘綠風吹盡一㸃芳心雀啅開野店初嘗竹葉酒江雲欲落豆稭灰行當更向釵頭見病起烏雲正作堆樂全先生生日以鐡拄杖為夀二首先生真是地行仙住世因循五百年每向銅人話疇昔故教鐵杖鬬清堅入懐氷雪生秋思倚壁蛟龍䕶晝眠遥想人天㑹方丈衆中驚倒野狐禪三年相伴影隨身踏遍江湖草木春擿石舊痕猶作眼閉門髙節欲生鱗畏塗自衛真無敵捷徑爭先却累人逺寄知公不嫌重筆端猶自斡千鈞杭州故人信至齊安昨夜風月清夢到西湖上朝來聞好語扣户得呉餉輕圎白曬荔脆釅紅螺醤更将西庵茶勸我洗江瘴故人情義重說我必西向一年兩僕夫千里問無恙相期結書社故人相約醵錢雇僕夫一嵗再至黄未怕供詩帳僕頃以詩得罪有司移杭取境内所留詩杭州供數百首謂之詩帳還将夢魂去一夜到江漲江漲杭州橋名送牛尾狸與徐使君時大雪中風捲飛花自入帷一樽遥想破愁眉泥深厭聴雞頭鶻蜀人謂泥滑滑為雞頭鶻酒淺欣嘗牛尾狸通印子魚猶帶骨披綿黄雀漫多脂慇勤送去煩纎手為我磨刀削玉肌四時詞春雲隂隂雪欲落東風和冷驚羅幕漸㸔逺水綠生漪未放小桃紅入蕚佳人瘦盡雪膚肌眉歛春愁知為誰深院無人剪刀響應将白紵作春衣垂栁隂隂日初永蔗漿酪粉金盤冷簾額低垂紫燕忙蜜脾已滿黄蜂靜髙樓睡起翠眉顰枕破斜紅未肯勻玉腕半揎雲碧袖樓前知有斷腸人新愁舊恨眉生綠粉汗餘香在蘄竹象牀素手熨寒衣爍爍風燈動華屋夜香燒罷掩重扄香霧空濛月滿庭抱琴轉軸無人見門外空聞裂帛聲霜葉蕭蕭鳴屋角黄昏斗覺羅衾薄夜風摇動鎮帷犀酒醒夢回聞雪落起來呵手畫雙鴉醉臉輕勻襯眼霞真態香生誰畫得玉奴纎手嗅梅花太守徐君猷通守孟亨之皆不飲酒以詩戱之云孟嘉嗜酒桓温笑徐邈狂言孟徳疑公獨未知其趣爾臣今時復一中之風流自有髙人識通介寧隨薄俗移二子有靈應撫掌吾孫還有獨醒時雪後到乾明寺遂宿門外山光馬亦驚堦前屐齒我先行風花誤入長眷苑雪月長臨不夜城未許牛羊傷至㓗且㸔鴉鵲弄新晴更須携被㽞僧榻待聴摧簷瀉竹聲伯父送先人下第歸蜀詩云人稀野店休安枕路入靈闗穏跨驢安節将去為誦此句因以為韻作小詩十四首送之索漠齊安郡従來着放臣如何風雪裏更送獨歸人瘦骨寒将斷衰髯摘更稀未甘為死别猶恐得生歸日上氣暾江雪晴光眩野記取到家時鋤耰吾正把月明穿破裘霜雪澁孤劒歸來閉戸坐黙數來時店諸兄無可寄一語㑹須酧晩嵗俱黄髮相看萬事休故人如念我為說瘦欒欒尚有身為患巳無心可安吾兄喜酒人今汝亦能飲一杯歸誦此萬事邯鄲枕東阡在何許寒食江頭路哀哉魏城君宿草荒新墓臨分亦泫然不為窮途泣東阡時一到莫遣牛羊入我夢隨汝去東阡松柏青却入西州門永愧北山靈乞墦何足羡負米可忘艱莫為無車馬含羞入劍闗我坐名過實讙譁自招損汝幸無人知莫厭家山穏竹笥與練裙隨時畢婚嫁無時若相思征鞍還一跨萬里却來日一庵仍獨居應笑謀生拙團團如磨驢和王鞏六首並次韻君談陽朔山不作一錢直巖藏兩頭虺瘴落千仞翼雅宜讙兠放頗訝虞舜陟蹔來已可畏覽鏡憂面黒况子三年囚苦霧變飲食吉人終不死仰荷天地徳我來黄岡下欹枕江流碧江南武昌山向我如咫尺春蔬黄土軟凍筍蒼崖拆此行我累君乃反得安宅遥知丹穴近為斸句漏石他年分刀圭名字挂仙籍君許恵桂州丹砂少年帯刀劍但識従軍樂老大服犂鋤解佩付鎔鑠雖無獻捷功㑹賜力田爵敲氷春𢷬紙刈葦秋織箔櫟林斬冬炭竹塢収夏籜四時俯有取一飽天所酢君生紈綺間欲學非其脚左右玉纎纎束薪誰為縛勿令聞此語翠黛頩将惡笑我一間茆婦姑紛六鑿欲結千年實先摧二月花故教窮到骨要使夀無涯久已逃天網何須服日華賔州在何處為子上栖霞樓名鄰里有異趣何妨傾盖新殊方君莫厭數面自成親黙坐無餘事回光照此身他年赤墀下玉立㸔垂紳平生我亦輕餘子晚嵗人誰念此翁巧語屢曽遭薏苡廋詞聊復託芎藭子還可責同元亮妻却差賢勝敬通若問我貧天所賦不因遷謫始囊空君家玉臂貫銅青下客何時見目成勤把鈆黄記宫様莫教絃管作蠻聲薫衣漸歎衙香少擁髻遥憐夜語清記取北歸携過我南江風浪雪山傾君自南江赴任不一過我記夢回文二首并叙十二月二十五日大雪始晴夢人以雪水烹小團茶使美人歌以飲余夢中為作回文詩覺而記其一句云亂㸃餘花唾碧衫意用飛燕唾花故事也乃續之為二絶句云酡顔玉盌捧纎纎亂㸃餘花唾碧衫歌咽水雲凝静院夢驚松雪落空巖空花落盡酒傾缸日出山融雪漲江紅焙淺甌新活火龍團小碾鬭晴忩三朶花并叙房州通判許安世以書遺余言吾州有異人常戴三朶花莫知其姓名郡人因以三朶花名之能作詩皆神仙意又能自寫真人有得之者許欲以一本見恵乃為作此詩學道無成鬢已華不勞千刼漫烝砂歸来且看一宿覺未暇逺尋三朶花兩手欲遮缾裏雀四條深怕井中蛇畫圗要識先生面試問房陵好事家次韻陳四雪中賞梅臘酒詩催熟寒梅雪鬭新杜陵休歎老韋曲已先春獨秀驚凡目遺英卧逸民髙歌對三白遲莫慰安仁正月二十日與潘郭二生出郊尋春忽記去年是日同至女王城作詩乃和前韻東風未肯入東門走馬還尋去嵗村人似秋鴻來有信事如春夢了無痕江城白酒三杯釅野老蒼顔一笑温已約年年為此㑹故人不用賦招魂是日偶至野人汪氏之居有神降於其室自稱天人李全字徳通善篆字用筆竒妙而字不可識云天篆也與予言有所㑹者復作一篇仍用前韻酒渇思茶漫扣門那知竹裏是仙村已聞龜䇿通神語更㸔龍虵落筆痕色瘁形枯應笑屈道存目擊豈非温歸來獨掃空齋卧猶恐微言入夢魂浚井古井没荒萊不食誰為惻缾罌下兩綆蛙蚓飛百尺腥風被泥滓空響聞㸃滴上除青青芹下洗鑿鑿石沾濡愧童僕盃酒暖寒栗白水漸泓渟青天落寒碧云何失舊穢底處來新㓗井在有無中無來亦無失紅梅三首怕愁貪睡獨開遲自恐氷容不入時故作小紅桃杏色尚餘孤瘦雪霜姿寒心未肯隨春態酒暈無端上玉肌詩老不知梅格在更看綠葉與青枝石曼卿紅梅詩云認桃無綠葉辨杏有青枝雪裏開花却是遲何如獨占上春時也知造物含深意故與施朱發妙姿細雨裛殘千顆淚輕寒瘦損一分肌不應便雜夭桃杏半㸃微酸巳著枝幽人自恨探春遲不見檀心未吐時丹鼎奪胎那是寳朱砂紅銀謂之不奪胎色玉人頩頬更多姿抱叢暗蕋初含子落盞穠香已透肌乞與徐熙新畫様竹間璀璨出斜枝和子由寄題孔平仲草庵次韻逢人欲覔安心法到處先為問道庵盧子不須従若士蓋公當自過曹參羡君美玉經三火笑我枯桑困八蠶猶喜大江同一味故應千里共清甘二蟲君不見水馬兒歩歩逆流水大江東流日千里此蟲趯趯長在此君不見鷃濫堆决起隨衝風隨風一去宿何許逆風還落蓬蒿中二蟲愚智俱莫測江邉一笑無人識陳季常見過三首仕宦常畏人退居還喜客君來輒館我未覺雞黍窄東坡有竒事已種十畆麥但得君眼青不辭奴飯白送君四十里只使一帆風江邉千樹栁落我酒盃中此行非逺别此樂固無窮但願長如此來往一生同聞君開龜軒東檻俯喬木人言君畏事欲作龜頭縮我知君不然朝飯仰暘谷餘光幸分我不死安可獨寒食雨二首自我來黄州巳過三寒食年年欲惜春春去不容惜今年又苦雨兩月秋蕭瑟卧聞海棠花泥汙臙脂雪暗中偷負去夜半真有力何殊病少年病起頭已白春江欲入戸雨勢來不已小屋如漁舟濛濛水雲裏空庖煑寒菜破竈燒濕葦那知是寒食但見烏銜紙君門深九重墳墓在萬里也擬哭塗窮死灰吹不起徐使君分新火臨皋亭中一危坐三見清明改新火溝中枯木應笑人鑚斫不然誰似我黄州使君憐久病分我五更紅一朶従來破釜躍江魚只有清詩嘲飯顆起携蠟炬遶空屋欲事烹煎無一可為公分作無盡燈照破十方昏暗鏁次韻荅元素并引余舊有贈元素云天涯同是傷流落元素以為今日之先兆且悲當時六客之存亡六客盖張子野劉孝叔陳令舉李公擇及元素與余也不愁春盡絮隨風但喜丹砂入頬紅流落天涯先有䜟摩挲金狄㑹當同蘧蘧未必都非夢了了方知不落空莫把存亡悲六客已将地獄等天宫東坡全集巻十二
