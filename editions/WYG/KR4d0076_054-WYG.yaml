body:
  text: 東坡全集巻五十四宋蘓軾撰奏議一十八首論擒獲果莊稱賀太速劄子元祐二年八月二十七日翰林學士朝奉郎知制誥兼侍讀蘓軾劄子奏臣竊聞熈河經畧司奏生擒西藩首領果莊宰相欲以明日稱賀臣愚以謂偏師獨克固亦可慶然行於明日臣謂太速如聞本路出兵非一見有一將方指青塘此乃阿里庫巢穴若更待三五日間必續有奏報賀亦未晚今者俘獲勁敵功誠不細賞功勸後固不應輕然朝廷方欲緝治邊防整肅驕慢若捷奏朝至舉朝夕賀則邊臣聞之自謂不世之奇功或恩禮太過則將驕卒惰後無以使臣願朝廷鎮之以靜示之以不可測昔謝安破苻堅書至安與客圍棋不輟曰小兒輩巳遂破賊安亦非矯情葢萬目觀望事體應爾所有明日稱賀乞更詳酌指揮臣受恩至深不敢不盡出位妄言罪當萬死取進止因擒果莊論西羌夏人事宜劄子元祐二年蘇軾奏臣竊見近者熈河路奏生擒果莊百官稱賀中外同慶臣愚無知竊謂安危之機正在今日若應之有道處之有術則安邊息民必自是始不然將驕卒惰以勝為灾亦不足怪故臣區區欲乞陳前後致寇之由次論當今待敵之要雖狂愚無取亦臣子之常分昔先帝用兵累年雖中國靡弊然夏人困折亦幾於亡横山之地沿邊七八百里不敢耕者至二百餘里歳賜既罷和市亦絶彼中匹帛至五十餘千其餘老弱轉徙牛羊墮壊所失葢不可勝數饑羸之餘乃始欵塞當時執政大臣謀之不深因中國厭兵遂納其使每一使賜予貿易無慮得絹五萬餘匹歸鬻之其民匹五六千民大恱一使所獲率不下二十萬緡使五六至而累年所罷歳賜可以坐復既使敵因吾資以徳其民且飽而思奮又使其窺我厭兵欲和之意以為欲戰欲和權皆在我以故輕犯邊陲利則進否則復求和無不可者若當時大臣因彼之請受其詞不納其使且詔邊臣與之徃返商議所獲新疆取舍在我俟其詞意屈服約束堅明然後納之則彼雖背恩反覆亦不至如今日之速也敵雖有易我意然不得西蕃解仇結好亦未敢動夫阿里庫棟戬之賊臣也挾契丹公主以弑其君之二妻棟戬死匿䘮不發逾年衆定乃詐稱嗣子偽書果莊温錫沁等名以請于朝當時執政若且令邊臣審問果莊等以阿里庫當立不立若朝廷従汝請遂授節鉞阿里庫真汝主矣汝能臣之如棟戬乎若此等無詞則是諸羌心服既立之後必能統一都部吾又何求若其不服則釁端自彼爵命未下曲不在吾彼既一國三公則吾分其恩禮各以一近上使額命之果莊等各得所欲宜亦無患當時執政不深慮此專以省事為安因為妄請便授節鉞阿里庫自知不當立而憂果莊之討也故欲借力於西夏以自重於是始有解仇結好之謀而果莊亦不平朝廷之以賊臣君我也故怒而盜邊夏人知諸羌之叛也故起而和之此臣所謂前後致寇之由明主不可以不知者也雖既徃不咎然可以為方来之鑒元昊本懐大志長於用兵亮祚天付凶狂輕用其衆故其為邊患皆歴年而後定今梁氏專國素與人多不協方内自相圖其能以創殘呻吟之餘乆與中國敵乎料其姦謀葢非元昊亮祚之比矣意謂二聖在位恭黙守成仁恕之心著於逺邇必無用武之意可肆無厭之求蘭會諸城鄜延五寨好請不獲勢脅必従猖狂之後求無不獲計不過此耳今者竊聞朝廷降詔諸路敕勵戰守深明逆順曲直之理此固當今之急務而詔書之中亦許夏人之自新臣竊以謂開之太急納之太速曾未一戰而厭兵欲和之意已見乎外此復蹈前日之失矣臣甚惜之今欲聞果荘之捷或漸有欵塞之謀必將為恭狠相半之詞而繼之以無厭之請若朝廷復納其使則是欲戰欲和權皆在彼有求必獲不獲必叛雖媮一時之安必起無窮之釁故臣願明主斷之於中深詔大臣宻勅諸將若夏人欵塞當受其詞而却其使然後明勅邊臣以夏人受恩不貲無故犯順今雖欵塞反覆難保若實改心向化當且與邊臣商議茍詞意未甚屈服約束未甚堅明則且却之以示吾雖不逆其善意亦不汲汲求和也彼若心服而来吾雖未納其使必不於徃返商議之間遽復盜邊若非心服則吾雖蕩然開懐待之如舊能必其不叛乎今歳涇原之入豈吾待之不至邪但使吾兵練士飽斥候精明彼無大獲不過數年必自折困今雖小勞後必堅定此臣所謂當今待敵之要亦明主不可以不知者也今朝廷意在息民不憚屈已而臣獻言乃欲艱難其請不急於和似與聖意異者然古之聖賢欲行其意必有以曲成之未嘗直情而徑行也將欲翕之必固張之將欲取之必固予之夫直情而徑行未有獲其意者也若權其利害究其所至則臣之愚計於安邊息民必乆而固與聖意初無小異然臣竊度朝廷之間似欲以畏事為無事者臣竊以為過矣夫為國不可以生事亦不可以畏事畏事之弊與生事均譬如無病而服藥與有病而不服藥皆可以殺人夫生事者無病而服藥也畏事者有病而不服藥也乃者阿里庫之請人人知其不當予而朝廷予之以求無事然事之起乃至於此不幾於有病而不服藥乎今又欲遽納夏人之使則是病未除而藥先止其與幾何臣於侍従之中受恩至深其於委曲保全與衆獨異故敢出位先事而言不勝恐悚待罪之至取進止乞詔邊吏無進取及論果莊事宜劄子元祐二年九月二十七日翰林學士朝奉郎知制誥兼侍讀蘇軾劄子奏臣聞善用兵者先服其心次屈其力則兵易解而功易成若不服其心惟力是恃則戰勝而寇愈深况不勝乎功成而兵不解况不成乎頃者西方用兵累年先帝之意全在弔伐而貪功生事之臣惟務殺人爭地得尺寸之土不問利害先築城堡置州縣使四夷爭畏中國以謂朝廷專欲得地非盡滅我族類不止是以併力致死莫有服者今雖朝廷好生惡殺不務逺畧而此心未信憎畏未衰心既不服惟有鬬力力屈情見勝負未可知也今日新獲果莊威震中外邊臣賈勇爭欲立功以為河南之地指顧可得正使得之不免築城堡屯兵置吏積粟而守之則中國何時息肩乎乃者王韶取熈河全師獨克使韶有逺慮誅其叛者乃以忠順即用其豪酋而已則今復何事其所以兵連禍結罷弊中國者以郡縣其地故也徃者既不可悔而来者又不以為戒今又欲取講武城曰此要害地不可不取方唐盛時安西都䕶去長安萬里若論要害自此以西無不可取者使諸羌知中國有進取不巳之意則寇愈深而兵不解其禍豈可量哉臣願陛下深詔邊吏叛則討之服則安之自今以徃無取尺寸之地無焚廬舍無殺老弱如此朞年諸羌可傳檄而定然朝廷至意亦自難喻將帥未必従也雖日行文書終恐無益宜驛召陜西轉運使一員赴闕面勅戒之使歸以喻將帥而察其不如詔者臣又竊聞朝論謂果莊犯順罪當誅死然譬之鳥獸不足深責其子孫部族猶足以陸梁於邊全其首領以累其心以為重質庶獲其用此實當今之良䇿然臣竊料果莊凶豪素貴老病垂死必不能甘於困辱為乆生之計自知生存終不得歸徒使其臣子首䑕顧忌不敢復讎必將不食求死以發其衆之怒就使不然老病愁憤自非乆生之道果莊若死則其臣子専意復讎必與阿里庫合而北交於夏人此正胡越同舟遇順風之勢其交必堅而温錫沁介於阿里庫夏人之間地狹力弱其勢必危若見并而吾不能救使二敵合三面以窺熈河則其患未可以一二數也如臣愚計可詔邊臣與果莊約若能使其部族討阿里庫而納趙純忠者當放汝生還質之天地示以必信果莊若従則稍富貴之使其信臣而喻至意焉果莊既有生還之望不為求死之計其衆必従以果莊之衆與温錫沁合而討阿里庫其勢必克既克而納純忠雖放還果莊可以無患此必然之勢也西羌本與夏人世仇而果莊本與阿里庫不協若許以生還其衆必相攻縦未能誅阿里庫亦足以使二人相疑而不合也昔太史慈與孫䇿戰幾殺䇿䇿後得慈釋不誅放還豫章卒立竒功李愬得吳元濟將李祐解縛用之與同卧起卒擒元濟非豪傑名將不能行此度外事也議者或謂果莊之獲兼用近界酋豪力戰而得之仇怨已深若放生還此等必無全理臣以為不然若果莊死於中國其衆讎此等必深若其生還其讎之亦淺此等依中國為援足以自全自古西羌之患惟恐解仇結盟若所在為讎敵正中國之利無可疑者臣出位言事不勝恐悚待罪之至取進止乞約果莊討阿里庫劄子元祐二年十月七日翰林學士朝奉郎知制誥兼侍讀蘇軾劄子奏臣近者竊見劉舜卿賀表具言阿里庫罪狀又竊聞舜卿乞削阿里庫官爵又竊聞阿里庫上章請命議者或欲許其自新以臣愚慮二者之說皆未為得何者阿里庫凶狡反覆必無革面洗心之理今聞其女已嫁梁乞逋之子度其乆逺必須協力致死共為邊患今来上章請命葢是部族新破衆叛親離恐吾乘勝致討力未能支故匿情忍詬以就大事若得休息數年蓄力養銳假吾爵命以威脇諸羌誅不附已者羽翼既成西北相應必為中原之憂非獨一方之病也且夏賊逆天犯順本因輕料朝廷以為必不能討巳今若便従阿里庫之請則其所料良不為過西蕃小醜朝為叛逆暮許通和則夏國之請理無不許二冦滔天自若欲戰欲和無不可者則西方之憂無時而止矣然遂従舜卿之請削奪官爵即須發兵深入致討彼新喪大首領舉國戒懼我師深入茍無他竒恐難以得志臣愚以謂當使邊將發厚幣遣辯士以離其腹心壞其羽翼今聞温錫沁等諸族已為所質勢未能動而森摩凌戬在其肘腋迹同而心異若用臣前計使邊臣與果莊約若能使其部族與温錫沁斂氊等合而討阿里庫納趙純忠即許以生還此政所謂以敵人攻敵人計無出此者若朝廷便許阿里庫通和即須推示赤心待之如舊不可復用計謀以圖此賊數年之後必自飛揚此所謂養虎自遺患者也故臣願朝廷既不納其通和之請又不削奪其官爵存而勿論置之度外隂使邊臣以計圖之似為得䇿臣屢瀆天聴罪當誅死取進止參定葉祖洽廷試䇿狀二首元祐二年十月二十一日翰林學士朝奉郎知制誥兼侍讀蘇軾同蘇轍劉攽狀奏准元祐二年十月十一日尚書省劄子節文臣寮上言近聞兵部郎中葉祖洽改禮部郎中給事中趙君錫封駁以為不當兼論祖洽廷試對䇿有訕及宗廟之語臣愚今詳君錫所駁極未為允臣取祖洽印本試䇿尋究即無譏訕之言不知君錫何以見其譏訕也伏望陛下令君錫條具祖洽譏訕之言下近臣參定以明枉直庶使䇿試之士謀議之臣悉心不回毋悼後害三省同奉聖㫖令翰林學士中書舍人諫議大夫同共參定聞奏者右臣等竊謂先帝親䇿貢士本欲人人盡言無所回忌士之論事必欲究極始末其語或及祖宗事有是非義難隠諱但當考其所言當否以為進退不可一一指為謗訕取到葉祖洽所試䇿巻子看其畧云祖宗以来至于今紀綱法度茍簡因循而不舉者誠不為少又云與忠智豪傑之臣合謀而鼎新之臣等以謂祖宗撥亂反正承平百年紀綱法度最為明備縦使時異事變理合小有損益亦不當謂之因循茍簡便欲朝廷與大臣合謀而鼎新之詳此顯是祖洽學術淺暗議論乖繆若謂之譏訕宗廟則亦不可謹録奏聞伏候勅㫖貼黄臣等准朝㫖與諫議大夫同共參定聞奏今據左諫議大夫孔文仲牒已别狀奏陳更不連書又貼黄葉祖洽及第日臣軾係編排官曾奏乞行黜落今已具事實别狀奏去訖又元祐二年十月二十二日翰林學士朝奉郎知制誥兼侍讀蘇軾狀奏右臣近奉聖㫖參定葉祖洽所試䇿臣已與劉攽等定奪奏聞去訖臣今看詳元降臣寮上言有云凡在朝廷大臣率多當時考試之官信有此語安敢擢在第一臣等今来定奪得葉祖洽顯是學術淺暗議論乖謬縁祖洽及第時臣係編排官據初考官吕惠卿等定祖洽為第三等中合在甲科覆考官宋敏求等定祖洽為第五等中合是黜落臣曾具事由聞奏乞行黜落兼據祖洽元試䇿巻子云祖宗以来至于今紀綱法度因循苟簡而不舉者誠為不少今来祖洽上章自辯却減落上件言語只云祖宗已来至於今紀綱制度比之前古亦有因循未舉之處顯見祖洽心知茍簡之語為不可故行減落謹録奏聞伏候勅㫖大雪乞省試展限兼乞御試不分初覆考劄子元祐三年正月某日翰林學士朝奉郎知制誥兼侍讀蘇軾劄子奏臣竊見近者大雪方數千里道路艱塞四方舉人赴省試者三分中未有二分到闕朝廷雖議展限然迫於三月放榜所展日數不多至時若隔下三五百人趂試不及即恐孤寒舉子轉見失所亦非朝廷急才喜士之意欲乞自今日已徃更展半月方始差官仍令禮部疾速雕印出榜曉示旁近州郡但未試以前到者並許投保引試若慮放榜遲延恐趂三月内不及即乞省試添差小試官十人却促限五七日出榜臣又竊見自来御試差官分為初考覆考編排詳定四處日限既迫考官又少以此多不暇精詳又縁初覆考官不敢候巻子齊足方定等第只是逐旋據謄録所關到巻子三十五十巻便定等第以此前後不相照所定髙下或寄於幸與不幸深為不便不若只依南省條式聚衆考官為一處通用日限候巻子齊足衆人共定其等第不惟精詳寡失又御試放榜亦可以速了臣竊意祖宗之法所以分考官為四處者葢是當時未有封彌謄録故須分别以防弊倖今来既有封彌謄録縦欲循私其勢無由若只依南省條格委無妨礙乞賜詳酌指揮取進止大雪論差役不便劄子元祐三年二月九日翰林學士朝奉郎知制誥兼侍讀蘇軾劄子奏臣伏見陛下發徳音下明詔以大雪過常煖氣不效農夫失業商旅不行引咎在躬渙汗之澤覃及方外而詔下之夕雪作不已臣備位近侍誠竊感憤廢食而歎退伏思念陛下即位以来發政施仁無一不合人心順天意者當獲豐年刑措之報鳳凰景星之瑞而水旱作沴常寒為罰殆無虛日此豈理之當然者哉臣誠愚惷不識忌諱試論其近似者而陛下擇焉臣聞差役之法天下以為未便獨臺諫官數人者主其議以為不可改磨礪四顧以待言者故人畏之而不敢發耳近聞疎逺小臣張行者力言其弊而諫官韓川深詆之至欲重行編竄此等亦無他意方司馬光在時則欲希合光意及其既没則妄意陛下以為主光之言殊不知光至誠盡公本不求人希合而陛下虛心無我亦豈有所主哉使光無恙至今見其法稍弊則更之久矣臣每見吕公著安燾吕大防范純仁皆言差役不便但為已行之令不欲輕變兼恐臺諫分爭卒難調和願陛下問公著等令指陳差雇二法各有若干利害昔日雇役中等人户歳出錢幾何今者差役歳費錢幾何及幾年一次差役皆可以折長補短約見其數以此計筭利害灼然而况農民在官貪利狡胥百端蠶食比之雇人苦樂十倍又五路百姓例皆朴拙差充手分須至轉雇慣習人尤為患苦其費不貲民窮無告監司守令觀望不言若非此一事則何以感傷隂陽之和至于如此雖責躬肆𤯝徹膳禱祠而此事不變終恐無益今侍従之中受恩至深無如小臣臣而不言誰當言者然臣前歳因詳定役法與臺諫異論遂為其徒所疾屢遭口語今来所言若不合聖意即乞便行責降以戒妄言若萬一少有可采即乞留中只作聖意行下庶幾上荅天戒下全小臣不勝恐栗待罪之至取進止貢院劄子四首奏巡鋪鄭永崇舉覺不當乞差曉事使臣交替元祐三年二月某日翰林學士朝奉郎知制誥蘇軾同孫覺孔文仲劄子奏貢院今月三日據巡鋪官鄭永崇領戒到進士王太初王博雅稱是傳義問得舉人各稱被巡鋪官誣執尋令巡鋪官宣徳郎王厚將逐人巻子與衆官㸃對得逐人試巻内有一十九字同即不成片段本院檢准條貫惟經學不許傳義口授者同至於進士須是懐挾代筆方令扶出今來逐人試巻㸃對得只有一十九字偶同别無違礙顯是巡鋪官鄭永崇舉覺不當兼兩日内巡鋪内臣屢將曖昧單詞令本院扶出舉人本院未敢施行見奏取㫖及有巡鋪所手分楊觀作過本院依法區分其巡鋪内臣並来簾前告屬堅要放免本院亦不敢依隨以此挾恨羅織舉人必欲求勝今来進士尚有兩甲諸利尚有一十五場未曽引試若信令巡鋪官内臣挾情羅織即舉人無由存濟欲望聖慈速賜指揮或且勾回石君召鄭永崇兩人却差曉事使臣交替所貴不致非理生事取進止奏劾巡鋪内臣陳慥元祐三年二月某日翰林學士朝奉郎知制誥蘇軾同孫覺孔文仲劄子奏貢院今月三日據巡鋪官捉到懐挾進士共三人依條扶出逐次巡鋪官並令兵士髙聲唱叫至今月十一日扶出進士蔣立時約有兵士三五十人齊聲大叫在院官吏公人無不驚駭在埸舉人亦皆恐悚不安尋取到虎翼節級李及等狀稱是巡鋪内臣陳慥指揮令衆人唱叫竊詳朝廷取士之法動以禮義舉人懐挾自有條法而内臣陳慥乃敢號令衆卒齊聲唱叫務欲摧辱舉人以立威勢傷動士心損壞國體本院無由指約伏望聖慈特賜行遣取進止申明舉人盧君修王燦等元祐三年二月某日翰林學士朝奉郎知制誥蘇軾同孫覺孔文仲劄子奏貢院今月三日據巡鋪官押領到進士盧君修王燦稱是傳義却問得舉人稱是盧君修来就王燦問道不知耿鄧之洪烈為復是洪烈為復是洪勲其王燦别無應對當院看詳若將問字便作傳義未為允當已一面且令逐人就試乞早降指揮合與不合一例考校取進止論特奏名元祐三年二月二十九日翰林學士朝奉郎知制誥蘇軾同孫覺孔文仲劄子奏臣等伏見従来天下之患無過官冗人人能言其弊而不能去其害惟徃年韓琦富弼等獨能裁減任子及展年磨勘發議之初士大夫相顧莫敢以身當之者以為必致謗議而琦等不顧既立成法天下肅然無一人非之者何則私欲不可以勝公議故也流弊之極至於今日一官之闕率四五人守之爭奪紛紜亷恥道盡中材小官闕逺食貧到官之後求取漁利靡所不為而民病矣今日之弊譬如羸病之人負千鈞之重縦未能分減豈忍更添臣等自入貢院四方免解舉人投狀稱今来是龍飛榜乞為敷奏法外推恩者不可勝數臣等一切不行兼不注有經朝省下狀䝉送下本院只是坐條告示近准聖㫖依逐舉體例下第舉人各以舉數特奏名已約計四百五十人今日又准尚書省劄子取前来聖㫖特奏名外各遞減一舉人數若依此數則又添數百人雖未知朝廷作何行遣不當先事建言但恐朝命巳行即論奏不及臣等伏見恩榜得官之人布在州縣例皆垂老别無進望惟務黷貨以為歸計貪冒不職十人而九朝廷所放恩榜幾千人矣何曾見一人能自奮勵有聞於時而殘民敗官者不可勝數以此知其無益有損不言可知今之議者不過謂即位之初宜廣恩澤茍以恱此僥倖無厭數百人者而不知吏部以有限之官待無窮之吏户部以有限之財禄無窮之人而所至州縣舉罹其害乃即位之初有此過舉謂之恩澤非臣所識也伏乞斷自聖意明勅大臣特奏名舉人只依近日聖㫖指揮仍詔殿試考官精加考較量取一二十人委有學問詞理優長者即許出官其餘皆補文學長史之類不理選限免使積弊之極増重不已臣等非不知言出怨生既忝近臣理難緘黙取進止貼黄臣覺見備貟吏部親見其害闕每一出爭者至一二十人雖川廣福建煙瘴之地不問日月逺近惟欲爭先注授臣竊怪之隂以訪問以為授官之後即請雇錢多者至五七十千又既授逺闕許先借料錢逺者許借三月又得四十餘千以貪惏無知之人又以衰老到官之後望其持廉奉法盡公治民不可得也省試放榜後劄子三首乞裁减巡鋪兵士重賞元祐三年三月某日翰林學士朝奉郎知制誥蘇軾同孫覺劄子奏臣等近奉勅權知貢舉竊謂朝廷待士之意本於禮義而輔以文法雖有懐挾傳義之禁然事皆付之主司終不以此多辱士類虧損國體近年縁練亨父為試官非理凌忽舉人遂致喧競因此多差巡鋪兵士南省至一百人訶察嚴細如防盜賊而恩賞至重官貟使臣减年磨勘指射差遣諸色人支錢多至六百貫若非理羅織却無指定深重刑名縁此小人貪功希賞搜探懐袖衆證以成其罪其間不免寃濫近者内臣石君召鄭永崇陳慥非理搜檢臣等已具論奏尋䝉朝廷取問行遣訖欲乞下有司立法裁減重賞及減定巡鋪兵士人數如非理羅織舉人即重行責罰以稱朝廷待士之意取進止乞不分經取士元祐三年三月某日翰林學士朝奉郎知制誥蘇軾同孫覺劄子奏臣等近奉勅權知貢舉竊見自来條貫分經取士既於逐經中紐定分數取人或一經中合格者少即取詞理淺謬卷子以足其數如合格者多則雖優長亦須落下顯是弊法將來兼用詩賦不專經義欲乞今後更不分經專以工拙為去取取進止乞不分差經義詩賦試官元祐三年三月某日翰林學士朝奉郎知制誥蘇軾同孫覺劄子奏臣等近奏為將来科埸既復詩賦乞更不分經取人已奉聖㫖依奏今来却見禮部新立條貫將来科場如差試官三貟者以二貟經義一貟詞賦兩貟者各差一貟臣等竊謂既復詩賦與經義䇿論通考舉人尚不分經而試官乃分而為二甚無謂也凡差試官務在有詞學者而已若得其人則治易及第不害其能問春秋經義入官不害其能考詩賦若不得人雖用本科不免乖錯須自聲律變為經義則詩賦之士便充試官何曽别求經義及第之人然後取士若必用本科各考所試則經義䇿論詩賦四場文理不同亦須各差試官一人而後可此本議者私憂過計而有司不察便為創立此條使一試院中有兩頭項試官自有科場以来無此故事自来試官患在爭競不一又分為兩黨試經義者主虚浮之文考詩賦者主聲病之學紛紜爭競理在不疑舉人聞之必興詞訟為害如此了無所益今来朝廷既復詩賦又立此條深恐天下監司妄意朝廷必欲用詩賦之人為試官不問有無詞學一例差充其間乆離科場之人或已廢學若用虚名差使顯不如經義及第有文之人人之有材何施不可經義詩賦等是文詞而議者便為治經之人不可使考詩賦何其待天下士大夫之薄也欲乞特賜指揮今後差試官不拘曽應經義詩賦舉者專務選擇有詞學人充其禮部近日所立條貫更不施行取進止御試劄子二首奏乞御試放榜館職皆侍殿上元祐三年三月某日翰林學士朝奉郎知制誥蘇軾同孫覺劄子奏臣等近奉勅權知貢舉竊見自来御試放榜日館職皆在殿上祗候乃是祖宗舊法以彰王國多士之美熈寧中因閤門偶失檢舉不令上殿自此遂為定制欲乞檢會治平以前故事施行取進止放榜後論貢舉合行事件元祐三年三月某日翰林學士朝奉郎知制誥蘇軾劄子奏臣近領貢舉侍立殿上祗候放榜伏見舉人程試有犯皇帝舊名者有㫖特許依本等賜第又有犯真宗舊名者執政亦乞依例收録而陛下親發徳音以謂此人犯祖宗廟諱不可不降等已而又有犯僖宗廟諱者有㫖押出在廷之人無不稽首欣服臣與同列退相告語非獨以見聖人卑躬尊祖之意亦足以知陛下嚴於取士之法不好小惠以求虚名臣備位禁近固當推廣聖意將順其美而補其所未備謹具貢舉合行事件畫一如左一伏見祖宗舊制過省舉人一經殿試黜落不少既以慎重取人又以見名器威福專在人主至嘉祐中始盡賜出身然猶不取雜犯而近歳流弊之極雜犯亦或收録遂使過省舉人便同及第縦使紕繆亦玷科舉恩澤既濫名器自輕非祖宗本意也自来過省舉人限年累舉積日持乆方該特奏名恩今来一次過省殿試不合格當年便得進士出身此何義也伏乞下省司立法將来殿試除放合格人外其餘並皆黜落或乞以分數立額取人所貴上無姑息下絶僥倖之心如聞已有去取二分指揮然有法不行與無法同如已有法即乞申明仍告喻天下將来殿試依法去取一自来釋褐舉人惟南省榜首或本場第一人唱名近下者或有㫖升一甲然皆出自聖意初無著令今者南省十人已上及别試第一人國學開封解元武舉第一人經明行修舉人與凡該特奏名人正及第者皆著令升一甲紛然並進士不復以升甲為榮而法在有司恩不歸於人主甚無謂也竊謂累奏舉名已是濫恩而經明行修尤是弊法其間權勢請托無所不有侵奪解額崇奬虚名有何功能復令升甲人主所以礪世磨鈍正在科舉等級升降榮辱之閒今乃輕以與人不復愛惜臣所未喻伏望聖慈更與大臣詳議前件著令乞賜刋削今後殿試唱名除南省逐場第一人臨時取㫖外其餘更不升甲所貴進退之權專在人主其經明行修一科亦乞詳議早行廢罷一臣近在貢院與孫覺孔文仲同入劄子論特奏名人恩澤太濫未䝉施行伏乞檢會前奏降付有司詳議裁减仍乞立法應特奏名人授文學長史之類今後南郊赦書更不許召保出官一伏見近日禮部立法今後科場差試官三人者一人詩賦二人經義差兩人者詩賦經義各一人臣謂此法不可施行凢差試官務在選擇能文之士若得其人則治易及第不害其能問春秋經義入官不害其能考詩賦若不得人正用本科不免錯繆須自聲律變為經義則詩賦之士便充試官何曽别求經義及第之人然後取士若必用本科各考所試則經義詩賦策論四埸文理不同亦須各差試官一人而後可此本言者私憂過計而有司不察便為生出此條自有科場以来無此故事今後每一試院分兩頭項試官問經義者則主虛浮之文考詩賦者則貴聲病之學紛紜爭競理在不疑自此科場日有詞訟為害不小了無所益今来朝廷既復詩賦又立此條深恐天下監司妄意朝廷必欲用作詩賦之人為試官不問有無詞學一例差充其間乆離場屋之人或已廢學若用虛名差使顯不如經義及第有文之人欲乞特賜指揮今後差試官不拘經義詩賦專務選擇有詞學之人其禮部近日所立條貫更不施行右取進止乞罷學士除閒慢差遣劄子元祐三年三月某日翰林學士朝奉郎知制誥兼侍讀蘇軾劄子奏臣近因宣召面奉聖㫖何故屢入文字乞郡臣具以疾病之狀對又䝉宣諭豈以臺諫有言故耶兄弟孤立自来進用皆是皇帝與太皇太后主張不因他人今来但安心勿恤人言不用更入文字求去臣退伏思念頃自登州召還至備貟中書舍人以前初無人言只従參議役法及䝉擢為學士後便為朱光庭王巖叟賈易韓川趙挺之等攻擊不已以至羅織語言巧加醖釀謂之誹謗未入試院先言任意取人雖䝉聖主知臣無罪然臣竊自惟葢縁臣賦性剛拙議論不隨而寵禄過分地勢侵迫故致紛紜亦理之當然也臣只欲堅乞一郡則是孤負聖知上違恩㫖欲黙而不乞則是與臺諫為敵不避其鋒勢必不安伏念臣多難早衰無心進取得歸丘壑以養餘年其甘如薺今既未許請郡臣亦不敢逺去左右只乞解罷學士除臣一京師閒慢差遣如祕書監國子祭酒之類或乞只經筵供職庶免衆人側目可以少安取進止東坡全集卷五十四
