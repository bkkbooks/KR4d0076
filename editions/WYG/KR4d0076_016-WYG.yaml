body:
  text: 東坡全集巻十六宋蘓軾撰詩八十八首送戴䝉赴成都玉局觀將老焉拾遺被酒行歌處野梅官柳西郊路聞道華陽版籍中至今尚有城南杜我欲歸尋萬里橋水花風葉暮蕭蕭芋魁徑尺誰能盡榿木三年巳足燒百嵗風狂定何有羡君今作峩眉叟縱未家生執㦸郎也應世出埋輪守莫欺老病未歸身玉局他年第幾人㑹待子猷清興發還須雪夜去尋君送陳睦知潭州華清縹渺浮髙棟上有纈林藏石甕一杯此地初識君千巖夜上同飛鞚君時年少面如玉一飲百觚嫌未痛白鹿泉頭山月出寒光潑眼如流汞朝元閣上酒醒時卧聽風鸞鳴鐵鳯舊逰空在人何處二十三年真一夢我得生還雪髯滿君亦老嫌金帶重有如社燕與秋鴻相逢未穏還相送洞庭青草渺無際天柱紫蓋森欲動湖南萬古一長嗟付與騷人發嘲弄用前韻荅西掖諸公見和雙猊蟠礎龍纒棟金井轆轤鳴曉甕小殿垂簾白玊鈎大宛立仗青絲鞚風馭賔天雲雨隔孤臣忍淚肝腸痛羡君意氣風生坐落筆縱横盤走汞上樽日日寫黄封賜茗時時開小鳯閉門憐我老太𤣥給札看君賦雲夢金奏不知江海眩木􅏨屢費瓊瑤重豈惟蹇歩困追攀巳覺侍史疲犇送春還官柳腰肢活雨入御溝鱗甲動借君妙語發春容顧我風琴不成弄次韻王覿正言喜雪聖人與天通有詔寛獄市好語夜喧街濕雲朝覆砌紛然退朝後色映宫槐媚欲誇翦刻工故上朱藍袂我方執筆待未敢書上瑞君猶伏閣争髙論亦少慰霏霏止還作盎盎風與氣神龍久潜伏一怒勢必倍行當見三白拜舞讙萬歲歸來飲君家酣詠追既醉和蔣發運夜語飜千偈書來又一言此身真佛祖何處不羲軒船穏江吹坐樓空月入樽遥知思我處醉墨在頽垣送表弟程六知楚州炯炯明珠照雙璧當年三老蘇程石里人下道避鳩杖刺史迎門倒鳬舄我時與子皆兒童狂走從人覔梨栗徤如黄犢不可恃隙過白駒那暇惜醴泉寺古垂橘柚石頭山髙闇松櫟諸孫相逢萬里外一笑未解千憂積子方得郡古山陽老手風生謝刀筆我正含毫紫㣲閣病眼昏花困書檄莫教印綬繫餘年去掃墳墓當有日功成頭白早歸來共藉梨花作寒食和人假山上黨攙天碧玉環絶河千里抱商顔試觀煙雨三峰外都在靈仙一掌間造物何如童子戲寫真聊發使君閒何當挈取征西去畫作圍床六曲山送王伯􅆒守虢華山東麓秦遺民當時依山來避秦至今風俗含古意柔桑渌水招行人行人掉臂不回首爭入崤函土囊口惟有使君千里來欲飲三堂無事酒三堂本來一事無日長睡起聞投壺牀頭硯石開雲月澗底松根斸雪腴山棚盗散人安寢勸買耕牛發陳廪歸來只作水衡卿我欲携壺就君飲道者院池上作下馬逢佳客攜壺傍小池清風亂荷葉細雨出魚兒井好能氷齒茶甘不上眉歸塗更蕭瑟真箇解催詩次韻子由送千之姪江上松楠深復深滿山風雨作龍吟年來老榦都生菌下有孫枝欲出林白髪未成歸隠計青衫儻有濟時心閉門試草三千牘仄席求人少似今書文與可墨竹并叙亡友文與可有四絶詩一楚詞二草書三畫四與可嘗云世無知我者惟子瞻一見識吾妙處既沒七年覩其遺迹而作是詩筆與子皆逝詩今誰為新空遺運斤質却弔斷絃人次韻錢舍人病起牀下龜寒且耐支杯中虵去未應衰殿門明日逢王傅櫑具爭先看不疑坐覺香煙攜䄂少獨愁花影上廊遲何妨一笑千痾散絶勝倉公飲上池次韻和王鞏謫仙竄夜郎子美耕東屯造物豈不惜要令工語言王郎年少日文如缾水翻爭鋒雖剽甚聞鼓或驚犇天欲成就之使觸羝羊藩孤光照㣲陋耿如月在盆歸來千首詩傾瀉五石樽却疑彭澤在頗覺蘇州煩君看騶忌子亷折配春温知音必無人壊壁掛桐孫用王鞏韻送其姪震知蔡州九門挿天開萬馬先朝屯舉鞭紅塵中相見不得言夜走清虛宿扣門驚鵲翻君家汾陽家永巷車雷犇夕郎方不夕列㦸以自藩相逢開月閣畫簷低金盆至今夢中語猶舉燈前樽阿戎脩玉牒未憚筆削煩君歸助獻納坐繼岑與温我客二子間不復尋諸孫子美詩云權門多噂沓且復尋諸孫虢國夫人夜逰圖佳人自鞚玉花驄翩如驚燕踏飛龍金鞭爭道寶釵落何人先入明光宫宫中羯鼓催花柳玉奴絃索花奴手坐中八姨真貴人走馬來看不動塵明眸皓齒誰復見只有丹青餘淚痕人間俯仰成今古吳公臺下雷塘路當時亦笑張麗華不知門外韓擒虎用舊韻送魯元翰知洛州我在東坡下躬耕三畆園君為尚書郎坐擁百吏繁鳴蛙與鼓吹等是俗物喧永謝十年舊老死三家村惟君綈袍信到我雀羅門緬懐故人意欲使薄夫敦新年對宣室白首代堯言相逢問前軰所見多後昆道館雖云樂冷卿當復温還持刺史節却駕朱輪軒黄髪方用事白鬚宜少存嗣聖真生知救民如救燔初囚羽淵魄盡返湘江魂坐憂東郡决老守思王尊北流桑柘没故道塵埃翻知君一寸心可敵千歩垣流亡自栖止老㓜忘崩犇得閒閉閣坐勿使道眼渾聊乘應捨筏直泝無生源歸來成二老夜榻當重論次韻朱光庭初夏朝罷人人識鄭崇直聲如在履聲中卧聞疎響梧桐雨獨詠㣲凉殿閣風諌苑君方續承業醉鄉我欲訪無功陶然一枕誰呼覺牛蟻新除病後聰次韻朱光庭喜雨久苦趙盾日欣逢傅說霖坐知千里足初覺兩河深破屋常持傘無薪欲㸑琴清詩似庭燎雖美未忘箴奉敕祭西太一和韓川韻四首聖主新除祕祝侍臣來乞豐年壽宫神君欲至半夜靈風肅然玉璽親題御筆金章來侍天香禮罷祝融參乘前驅巳過衡湘解劍獨行殘月披衣困卧清風夢蝶猶飛旅枕粥魚巳響枯桐陂水初含曉渌稻花半作秋香皂蓋却迎朝日紅雲正遶宫牆西太一見王荆公舊詩偶次其韻二首秋早川原浄麗雨餘風日清酣從此歸耕劍外何人送我池南但有樽中若下何須墓上征西聞道烏衣巷口而今煙草萋迷次韻子由送陳侗知陜州誰能如鐵牛横身負黄河滔天不能没尺箠未易訶世俗自無常徐公故逶迤别來不可說事與浮雲多當時無限人毁譽即墨阿虛聲了無實夜蟲鳴機梭相逢一笑外奈此白髪何天驥皆籋雲長鳴飽芻禾王庭旅百寶大貝隨弓戈君獨一麾去欲賡五袴歌甘棠古樂國白酒金叵羅知君不久留治行中新科過客足嗔喜東堂記分鵝此外但坐歗後生工揣摩送賈訥倅眉二首當年入蜀歎空囘未見峩眉肯再來童子遥知頌襦袴使君先巳洗樽罍李大夫眉之賢守也鹿頭北望應逢鴈人日東郊尚有梅人日出東郊渡江㳺蟇頥山眉之故事也我老不堪歌樂職後生試覔子淵才老翁山下玉淵回手植青松三萬栽父老得書知我在小軒臨水為君開試看一一龍虵活更聽蕭蕭風雨哀便與甘棠同不翦蒼髯白甲待歸來先君葬於蟇頥山之東二十餘里地名老翁泉君許為一往感歎之深故及送程建用先生本舌耕文字浩千頃空倉付公子坐待發苕頴十年困新說兒女爭捕影鑿垣種蒿蓬嘉穀誰復省空餘南陔意太息北堂冷織屨隨方進採薪教韋逞辛勤守一經菽水賢五鼎今年聞起廢魯史復光景公子亦改官三就繁馬頸歸來一笑粲素髪颯垂領㑹看金花詔湯沐奉朝請天公不吾欺壽與龜鶴永次韻李脩孺留别二首十年流落敢言歸魚鳥江湖只自知豈意青天掃雲霧盡呼黄髪寄安危風流吾子真前輩人物他年記一時我欲折繻留此老緇衣誰作好賢詩此生别袖幾囘麾夢裏黄州空自疑何處青山不堪老當年明月巧相隨窮通等是思家意衰病難堪送客悲好去江魚煮江水劒南歸路有姜詩次韻黄魯直赤目誦詩得非子夏學紬史正作丘明書天公戲人亦薄相略遣幻翳生明珠賴君年來屏鮮腴百千燈光同一如書成自寫蠅頭表端就君王覔鏡湖和周正孺墜馬傷手平生學道巳神完豈復兒童私自憐醉墜何曾傷内守色憂當為念先傳書空漸覺新詩徤把蟹行看樂事全賣却老驄為酒直大呼鄉友作新年戯周正孺二絶折臂三公未可知㑹當千鎰訪權奇勸君鬻駱猶閒事腸斷閨中楊柳枝天廐新頒玉鼻騂故人共敝亦常情相如雖老猶能賦換馬還應繼二生題文與可墨竹并叙故人文與可為道師王執中作墨竹且謂執中勿使他人書字待蘇子瞻來令作詩其側與可既没八年而軾始還朝見之乃賦一首斯人定何人游戲得自在詩鳴草聖餘兼入竹三昧時時出木石荒恠軼象外舉世知珍之賞㑹獨余最知音古難合奄忽不少待誰云死生隔相見如龔隗潘推官母李氏挽詞南浦淒涼老逐臣東坡還往盡幽人杯盤慣作陶家客絃誦常叨孟母隣尚有升堂他日約豈知負土一阡新今年我欲江湖去暮雨連山宰樹春玉堂栽花周正孺有詩次韻故山桃李半荒榛粗報君恩便乞身竹簟暑風招我老玉堂花蕋為誰春纎纎翠蔓詩催發皎皎霜葩髪鬬新只有來禽青李帖他年留與學書人杜介送魚新年巳賜黄封酒舊老仍分赬尾魚陋巷闗門負朝日小園除雪得春蔬病妻起斫銀絲膾稚子讙尋尺素書醉眼矇矓覔歸路松江煙雨晚疎疎送杜介歸揚州再入都門萬事空閒㸔清洛漾東風當年幃幄幾人在回首觚稜一夢中採藥㑹須逢薊子問禪何處識龎翁歸來鄰里應迎笑新長淮南舊桂叢狄詠石屏霏霏㸃輕素眇𦕈開重隂風花亂紫翠雪外有煙林雪近勢方壯林逺意殊深㑹有無事人支頥識此心和黄魯直燒香二首四句燒香偈子隨香遍滿東南不是聞思所及且令鼻觀先參萬巻明牕小字眼花只有斕斑一炷煙消火冷半生身老心閒再和二首來詩言飲酒畫竹石草書置酒未逢休沐便同越北燕南且復歌呼相和隔牆知是曹參丹青巳自前世竹石時窺一斑五字當還靖節數行誰似髙閒武昌西山并叙嘉祐中翰林學士承㫖鄧公聖求為武昌令常逰寒溪西山山中人至今能言之軾謫居黄岡與武昌相望亦常往來溪山間元祐元年十一月二十九日考試館職與聖求㑹宿玉堂偶話舊事聖求嘗作元次山窪樽銘刻之巖石因為此詩請聖求同賦當以遺邑人使刻之銘側春江渌漲蒲萄醅武昌官柳知誰栽憶從樊口載春酒歩上西山尋野梅西山一上十五里風駕兩腋飛崔嵬同逰困卧九曲嶺褰衣獨到吳王臺中原北望在何許但見落日低黄埃歸來解劍亭前路蒼崖半入雲濤堆浪翁醉處今尚在石臼杯飲無樽罍爾來古意誰復嗣公有妙語留山隈至今好事除草棘常恐野火燒蒼苔當時相望不可見玉堂正對金鑾開豈知白首同夜直卧看椽燭髙花摧江邊曉夢忽驚斷銅環玉鎻鳴春雷山人帳空猿鶴怨江湖水生鴻鴈來請公作詩寄父老往和萬壑松風哀再用前韻朱顔發過如春醅胸中梨棗初未栽丹砂未易掃白髪赤松却欲參黄梅寒溪本自逺公社白蓮翠竹依崔嵬當時石泉照金像神光夜發如五臺飲泉鑒面得真意坐視萬物皆浮埃欲收暮景返甲里逺泝江水窮離堆還朝豈獨羞老病自歎才盡傾空罍諸公渠渠若夏屋吞吐風月清隅隈我如廢井久不食古甃缺落生隂苔數詩往復相感發汲新除舊寒光開遥知二月春江闊雪浪倒捲雲峰摧石中無聲水亦静云何觧轉空山雷欲就諸公評此語要識憂喜何從來願求南宗一勺水往與屈賈湔餘哀韋應物詩云水性本云静石中固無聲如何兩相激雷轉空山驚送楊孟容我家峩眉隂與子同一邦相望六十里共飲玻璃江江山不違人遍滿千家窓但苦窓中人寸心不自降子歸治小國洪鐘噎㣲撞我留侍玉坐弱歩欹豐扛後生多髙才名與黄童雙不肯入州府故人餘老龎慇懃與問訊愛惜霜眉庬何以待我歸寒醅發春缸見子由與孔常父唱和詩輒次其韻余昔在館中同舍出入輒相聚飲酒賦詩近嵗不復講故終篇及之庶幾諸公稍復其舊亦太平盛事也君先魯東家門户照千古文章固應爾須鬛餘似處雖非䝉倛狀尚有歴國苦誦書口瀾翻布穀雜杜宇十年困犇走櫛沐飽風雨吾道其非耶野處豈兕虎㶚陵閒老將柏直口尚乳自君兄弟還鼎立知有補蓬山耆舊散故事誰刪去來迎馮翊傳出餞㑹稽組吾猶及前軰詩酒盛冊府願君唱此風揚觶斯杜舉趙令晏崔白大圖幅徑三丈扶桑大蠒如甕盎天女織綃雲漢上往來不遣鳳銜梭誰能鼓臂投三丈人間刀尺不敢裁丹青付與濠梁崔風蒲半折寒鴈起竹間的皪横江梅畫堂粉壁翻雲幕十里江天無處着好卧元龍百尺樓笑看江水拍天流次韻張昌言給事省宿馮顛久巳欹殘雪戎眼何曾眩落暉朔野按行猶雀躍東臺瞑坐覺烏飛道家有鳥飛入兎宫之説漫誇年少容吾在樂天詩云猶有誇張少年處笑呼張文喚殷兄若鬬樽前舉世稀待向崧陽求水竹一犁煙雨伴公歸和三舍人省上三月二十九日作明日駕幸景靈宫紛紛榮瘁何能久雲雨從來翻覆手怳如一夢墮枕中却見三賢起江右曽子開劉貢父孔經父皆江西人嗟君妙質皆瑚璉顧我虛名但箕斗眀朝冠蓋蔚相望共扈翠輦朝宣光武皇巳老白雲鄉正與羣帝驂龍翔獨留杞梓扶明堂送錢承制赴廣南路分都監當年我作表忠碑坐覺江山氣未衰舞鳯尚從天目下收駒時有渥洼姿踞牀到處堪吹笛横槊何人解賦詩知是丹霞破佛手先聲應巳懾羣夷廣西僧寺頃有佛動之異錢君碎而投之江中次韻曽子開從駕二首槐街緑闇雨初勻瑞霧香風滿後塵清廟幸同觀濟濟豐年喜復接陳陳雍容巳饜天庖賜俯伏初嘗貢茗新輦路歸來聞好語共驚堯顙類髙辛入仗魂驚愧草萊一聲清蹕九門開暉暉日傍金輿轉習習風從玉宇來流落生還真一芥周章危立近三槐學士班近執政道傍儻有山中舊問我收身早晩回再和眼花錯莫鬢霜勻病馬羸騶只自塵奉引拾遺叨侍從思歸少傅羡朱陳衰年壯觀空驚目嶮韻清詩苦鬭新最後數篇君莫厭𢷬殘椒桂有餘辛憶觀滄海過東萊日照三山迤邐開桂觀飛樓凌霧起仙幢寶蓋拂天來不聞宫漏催晨箭但覺簷隂轉古槐供奉清班非老處㑹稽何日乞方回時方闕㑹稽守次韻劉貢父省上喜雨宻雲今日破郊西疎雨瀟瀟未作泥要及清閒同笑語行看衰病費扶攜花前白酒傾雲液户外青驄響月題不用臨風苦揮淚君家自與竹林齊貢父詩中有不及與其兄原父同時之歎然其兄子仲馮今為起居舍人再和當年曹守我膠西共厭餔糟與汩泥自古赤丸成習俗因公黄犢免提攜生還各有青山興病起猶能小字題莫怪歌呼數相和曽将獄市寄全齊貢父為曹州盜賊皆奔秦境蓋嘗有詩云從教晉盗稍奔秦送顧子敦奉使河朔我友顧子敦軀膽兩俊偉便便十圍腹不但貯書史容君數百人一笑萬事巳十年卧江海了不見愠喜磨刀向豬羊釃酒㑹鄰里歸來如一夢豐頰愈茂美平生批敕手濃墨寫黄紙㑹當勒燕然廊廟登劒履翻然向河朔坐念東郡水河來屹不去如尊乃勇耳次韻子由送家退翁知懐安軍吾州同年友粲若琴上星當時功名意豈止拾紫青事既喜違願天或不假齡今如圖中鶴俛仰在一庭吾州同年友十三人今存者六人而巳故有琴上星圖中鶴之語西南正春旱廢沼黏枯萍翩然一麾去想見靈雨零我無謫仙句待詔沉香亭空騎内廐馬天仗隨雲駢竟無絲毫補眷焉誰汝令永愧舊山叟慿君寄丁寧諸公餞子敦軾以病不往復次前韻君為江南英面作河朔偉人間一好漢誰似張長史上書苦留君言拙輒報巳置之勿復道出處俱可喜攀輿共六尺食肉飛萬里誰言逺近殊等是朝廷美遥知送别處醉墨爭淋紙我以病杜門商頌空振履後㑹知何日一歡如覆水善保千金軀前言戲之耳和張昌言喜雨二聖憂懃忘寢食百神奔走㑹風雲禁林夜直鳴江瀨清洛朝回起縠紋夢覺酒醒聞好句帳空簟冷發餘薰秋來定有豐年喜剰作新詩凖備君次韻劉貢父西省種竹要知西掖承平事記取劉郎種竹初舊徳終呼名字外後生誰續笑談餘昔李公擇種竹館中戲語同舍後人指此竹必云李文正手植貢父笑曰文正不獨繫筆亦知種竹耶時有筆工李文正成隂障日行當見取筍供庖計巳疎白首林間望天上平安時報故人書李衛公北都童子寺竹寺僧日報平安偶與客飲孔常父見訪方設席延請忽上馬馳去巳而有詩戲用其前韻答之揚雄他文不皆竒獨稱觀缾居井眉酒客法士兩小兒陳遵張竦曾何知主人有酒君獨醉蟹螯何不左手持豈復見吾横氣機遣人追君君絶馳盡力去花君自癡醍醐與酒同一巵請君更問文殊師次韻子由書李伯時所藏韓幹馬潭潭古屋雲幕垂省中文書如亂絲忽見伯時畫天馬朔風胡沙生落錐天馬西來從西極勢與落日爭分馳龍膺豹股頭八尺奮迅不受人間羈元狩虎脊聊可友開元玉花何足竒伯時有道真吏隠飲啄不羡山梁雌丹青弄筆聊爾耳意在萬里誰知之幹惟畫肉不畫骨而况失實空餘皮煩君巧説腹中事妙語欲遣黄泉知君不見韓生自言無所學廐馬萬匹皆吾師次韻劉貢父獨直省中明窓畏日曉先暾髙柳鳴蜩午更喧筆老新詩疑有物心空客疾本無根隔墻我亦眠風榻上馬君先𤨏月軒共喜早歸三伏近解衣盤礴亦君恩軾以去嵗春夏侍立邇英而秋冬之交子由相繼入侍次韻絶句四首各述所懐曈曈日脚曉猶清細細槐花暖自零坐閲諸公半廊廟時看黄色起天庭僕射吕公門下韓公左丞劉公皆自講席大用上尊初破早朝寒茗盌仍沾講舌乾陛楯諸郎空雨立故應慙悔不儒冠兩鶴摧頽病不言年來相繼亦乘軒悞聞九奏聊飛舞可得裴回為啄吞㣲生偶脫風波地晩嵗猶存鐵石心定是香山老居士世縁終淺道根深樂天自江州司馬除忠州刺史旋以主客郎中知制誥遂拜中書舍人軾雖不敢自比然謫居黄州起知文登召為儀曹遂忝侍焉從出處老少大畧相似庶幾復享此翁晚節閒適之樂送宋朝散知彭州迎侍二親東來誰迎使君車知是丈人屋上烏丈人今年二毛初登樓上馬不用扶使君負弩為前驅蜀人不復談相如老㓜化服一事無有鞭不施安用蒲春波如天漲平湖鞓紅照坐香生膚帣韝上壽白玉壺公堂登歌鳯将雛諸孫懽笑爭挽鬚蜀人畫作西湖圖郭熈畫秋山平逺潞公為跋尾王堂晝掩春日閒中有郭熈畫春山鳴鳩乳燕初睡起白波青嶂非人間離離短幅開平逺漠漠疎林寄秋晚恰似江南送容時中流回頭望雲巘伊川佚老鬢如霜卧看秋山思洛陽為君紙尾作行草烱如嵩洛浮秋光我從公逰如一日不覺青山暎黄髪為畫龍門八節灘待向伊川買泉石次韻張昌言喜雨千里黄流失故居年來赤地到青徐遥聞爭誦十行語無異親巡六尺輿精貫天人一言足雲興嶽瀆萬靈趨愛君誰似元和老賀雨詩成即諫書書晁補之所藏與可畫竹三首與可畫竹時見竹不見人豈獨不見人嗒然遺其身其身與竹化無窮出清新莊周世無有誰知此凝神若人今巳無此竹寧復有那將春蚓筆畫作風中柳君看斷崖上瘦節蛟蛇走何時此霜竿復入江湖手晁子拙生事舉家聞食粥朝來又絶倒諛墓得霜竹可憐先生槃朝日照苜蓿吾詩固云爾可使食無肉吾舊詩云可使食無肉不可居無竹戲用晁補之韻昔我嘗陪醉翁醉今君但吟詩老詩清詩咀嚼那得飽瘦竹瀟灑令人饑試問鳯凰饑食竹何如駑馬肥苜蓿知君忍饑空誦詩口頰瀾翻如布榖書皇親畫扇十年江海寄浮沉夢遶江南黄葦林誰謂風流貴公子筆端還有五湖心書李世南所畫秋景野水參差落漲痕疎林欹倒出霜根扁舟一棹歸何處家在江南黄葉村人間斤斧日創夷誰見龍蛇百尺姿不是溪山曽獨往何人解作掛猿枝書鄢陵王主簿所畫折枝二首論畫以形似見與兒童鄰賦詩必此詩定非知詩人詩畫本一律天工與清新邊鸞雀寫生趙昌花傳神何如此兩幅疎澹含精勻誰言一㸃紅觧寄無邊春瘦竹如幽人幽花如處女低昻枝上雀摇蕩花間雨雙翎決將起衆葉紛自舉可憐採花蜂清蜜寄兩股若人富天巧春色入毫楮懸知君能詩寄聲求妙語昨見韓丞相言王定國今日玉堂獨坐有懐其人晝卧玉堂上㣲風舉輕紈銅缾下碧井百尺鳴飛瀾俛仰清夢餘愛此一掬寒似予平生友苦語凉肺肝秀眉玉兩頰矯矯如翔鸞置之江淮交清詩洗江湍紅鱗對白酒信美非所安丞相功業成還家酒盃寛人間有此客折簡呼不難相將扣東閣起舞盡餘歡和張來髙麗松扇可憐堂堂十八公老死不入明光宫萬牛不來難自獻裁作團團手中扇屈身蒙垢君一洗挂名君家詩集裏猶勝漢宫悲婕妤網蟲不見乘鸞子故李承之待制六丈挽詞青青一寸松中有梁棟姿天驥墮地走萬里端可期世無阿房宫可建五丈旗又無穆天子西征燕瑶池才大古難用老死亦其宜丈夫恐不免豈患莫巳知公如松與驥少小稱偉竒俯仰自廊廟笑談無羌夷清朝竟不用白首仍憂時願斬横行將請烹乾沒兒言雖不見省坐折姦雄窺嗟我去公久江湖生白髭歸來耆舊盡零落存者誰比公嵇中散龍性不可羈疑公李北海慷慨多雄詞凄凉五君詠沉痛八哀詩邪正久乃明人今屬公思九原不可傳千古有餘悲次韻孔常父送張天覺河東提刑送君應典鷫鸘裘慿仗千鍾洗别愁脫帽風流餘長史君喜草書而不工故以此為戯埋輪家世本留侯張綱子房七世孫也犍為武陽人墓在今彭山君豈其後耶子河駿馬方争出麟府馬出子河泌昭義疲兵亦少休唐福昭義歩兵蓋澤潞弓箭手定向秋山得嘉句故闗黄葉滿行舟送天覺得山字西登太行嶺北望清凉山晴空浮五髻晻藹卿雲間餘光入巖石神草出茅菅何人相指似稍稍落人寰能令墜指兒虬髯茁氷顔祝君如此草為民巳痌瘝我亦老且病眼花腰脚頑念當勤致此莫作河東慳次韻王定國倅揚州此身江海寄天逰一落紅塵不易收未許相如還蜀道空教何遜在揚州又驚白酒催黄菊尚喜朱顔映黒頭火急著書千古事虞卿應未厭窮愁東坡全集巻十六
