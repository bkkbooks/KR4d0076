body:
  text: 東坡全集巻七十七宋蘓軾撰尺牘六十六首與李方叔四首久不奉書問為愧遞中辱手書勞勉益厚無状何以致足下拳拳之不忘如此比日起居何如今嵗暑毒十倍常年雨晝夜不止病夫氣息而已想足下閉門著述自有樂事間從諸英唱和談論此可羡也何時得㑹合惟萬萬自重不宣又秋試時不審從吉未若可下文字須望鼎甲之捷也暑中既不飲酒無縁作字時有一二輒為人取去無以塞好事之意亦不願足下如此僻好也近獲一銅鏡如漆色光明冷徹背有銘云漢有善銅出白陽取為鏡清如明左龍右虎俌之字體雜篆𨽻真漢時字也白陽不知所在豈南陽白水陽乎如字應作而字使耳左月左日皆未甚曉更閒為考之又頃年於稠人中驟得張秦黄晁及方叔履常意謂天不愛寳其獲盖未艾也比來經渉世故間闗四方更欲求其似邈不可得以此知人决不徒出不有立於先必有覺於後也如方叔飄然布衣亦幾不免淳甫少遊又安所獲罪遂斷棄其命言之何益付之清議而已憂患雖巳過更宜慎口以安晩節又承示諭長安君偶患臂痛不能舉某於錢昌武朝議處傳得一方云其初本施渥寺丞者因寓居京師甜水巷見乞兒兩足拳㮏屐子行渥常以錢物飲食遺之凡期年不衰尋赴任數年而還復僦曩居則乞兒巳不見矣一日見於相國寺前行走如飛渥就問之則曰遇人傳兩藥方服一料已能走耳服之立効其後已傳數人皆神妙但手足上疾皆可服不拘男子婦人秘之秘之其方元只是王氏博濟方中方但人不知耳博濟誤以虎脛為虎腦便請長安君合服必騐朝雲者死於恵州久矣别後學書頗有楷法亦學佛法臨去誦六如偈以絶塟之恵州棲禪寺僧作亭覆之榜曰六如亭最荷夫人垂顧故詳及之與陳公密三首途中喜見令子得聞動止之詳繼領專使手書且審即日尊體清勝感慰無量差借白直兠乘擔索一一仰煩神用孤旅獲濟荷徳之心未易云喻來日晩方達蒙里即如所教出陸至南華南華留半月即造宇下一吐區區預深欣躍又行役艱羈託庇以濟分貺丹劑拯其衰疾此意豈可忘哉其餘言謝莫盡令子昆仲比辱書示未暇修書悚息悚息曹三班亷幹非常逺送愧感二絶句發一笑又窮途棲屑獲見君子開懐抵掌為樂未央公既王事靡寜某亦歸心所薄怱遽就别如何可言别後亟辱恵書詞㫖増重且審起居佳勝感慰深矣某已度嶺巳脱問鵩之憂行有見蝎之喜但逺德惘惘未忘於情新春保練以需驛召與徐仲車昨日既蒙言贈今日又荷心送盎然有得載之而南矣辱手教極甚厚愛孔子所謂忠焉能勿誨乎當書諸紳寝食不忘也與吳秀才某啟相聞久矣獨未得披寫相盡常若有所負罪廢淪落屏迹郊野初不意舟從便道有失脩敬不謂過予衝冒大熱間闗榛莽曲賜臨顧一見灑然遂見平生之懽典刑所鍾既深嘆仰而大篇璀璨徤論抑揚盖自去中州未始得此勝侣也欽佩俯求衰晩何以為對送别堤下恍然如夢覺陳迹具存豈有所遇而然耶留示珠玉正快如九鼎之珍徒咀嚼一臠宛轉而不忍下咽也未知舟從定作幾日計早晩過金陵當得欵奉與彦正判官古琴當與響泉韻磬並為當世之寳而鏗金瑟瑟遂蒙輟恵報賜之間赧汗不巳又不敢逺逆來意謹當傳示子孫永以為好也然某素不觧彈適紀老枉道見過令其侍者快作數曲拂歴鏗然正如若人之語也試以一偈問之若言琴上有琴聲放在匣中何不鳴若言聲在指頭上何不於君指上聽録以奉呈以發千里一笑也寄恵佳紙名荈重煩厚意一一捧領訖感怍不已適有他冗書不周謹與毛澤民推官三首公素人來得書累幅既聞起居之詳又獲新詩一篇及公素寄示雙石記居夷久矣不意復聞韶濩之餘音喜慰之極無以云喻久廢筆硯不敢繼和必識此意㑹合無期臨書惘惘秋暑萬萬以時自厚又寓居粗遣本帶一㓜子來今者長子又授韶州仁化令冬中當挈家至此某巳買得數畆地在白鶴峰上古白鶴觀基也巳令斫木陶瓦作屋三十許間今冬成去七十無幾矧未必能至耶更欲何之以此神氣粗定他更無足為故人念者聖主方設科求宏詞公儻有意乎又新居在大江上風雲百變足娛老人也有一書齋名思無邪閑知之寄示奇茗極精而豐南來未始得也亦時復有山僧逸民可與同賞此外但緘而藏之耳佩荷厚德永以為好秋興之作追配騷人矣不肖何足以窺其粗遇不遇自有定數然非厄窮無聊何以發此奇思以自表於世耶敬佩來貺傳之知音感愧之極數日適苦壅嗽殆不可堪强作報滅裂死罪與陳輔之某啟昨日承訪及病倦不及起見愧仰深矣熱甚起居何如萬里海表不死歸宿田里得疾遂有不起之憂豈非命耶若得少駐復與故人一笑此又望外也力疾書此數字與司馬温公春末景仁丈自洛還復辱賜教副以超然雄篇喜抃累日尋以出京無暇比到官隨分紛紏久稽裁謝悚怍無巳比日不審台候何如某强顔沗竊中所愧於左右者多矣未涯瞻奉惟冀為國自重謹奉啟問某再啟超然之作不惟不肖附託以為寵遂使東方陋州為不朽之盛事然所以奨與則過矣久不見公新文忽領獨樂園記誦味不巳輒不自揆作一詩聊發一笑耳彭城嘉山水魚蟹争訟寂然盜賊衰少聊可藏拙但朋遊濶逺舍弟非久赴任益岑寂矣謫居窮僻如在井底杳不知京洛之耗不審邇日寝食何如某以愚暗獲罪咎自已招無足言者但波及左右為恨殊深雖髙風偉度非此細故所能塵垢然某思之不啻芒背爾寓居去江無十步風濤烟雨曉夕百變江南諸山在几席此幸未始有也雖有窘乏之憂亦布褐藜藿而已瞻晤無期臨書惘然伏乞以時善加調䕶與魯直二首晁君寄騷細看甚奇信其家多異材耶然有少意欲魯直以巳意微箴之凡人文字務使平和至足餘溢為奇怪盖出於不得巳也晁文奇怪似差早然不可直云耳非謂避諱也恐傷其邁往之氣當為朋友講磨之語乃宜不知公謂然否又某啟方恵州遣人致所恵書承中塗相見尊候甚安即日想已達黔中不審起居何似云大率似長沙審爾亦不甚惡也恵州久巳安之矣度黔亦無不可處之道也聞行囊中無一錢塗中頗有好事者能相濟給否某雖未至此然亦凛凛然水到渠成不煩預憂但數日苦痔病百藥不瘳遂斷肉菜五味日食淡麫兩椀胡蔴茯苓麨數盃其戒又嚴於魯直雖未能作文自誓且日戒一日庶幾能終之非特愈痔所得多矣子由得書甚能有益於枯槁也文潜在南極安少游謫居甚自得淳甫亦然皆可喜獨元老淹忽為之流涕病劇久矣想非由逺適也幽絶書問難繼惟倍萬保重不宣有姪婿王郎名庠榮州人文行皆超然筆力有餘出語不凡可収為吾黨也自蜀遣人來恵云魯直在黔决當往見求書為先容嘉其有奇操故為作書然舊聞太夫人多病未易逺去謾為一言眉山有程道晦者亦奇士文益老王郎盖師之此兩人者有致窮之具而與不肖又欲往求魯直其窮殆未易瘳也與陳𫝊道五首某啟久不接奉思仰不可言辱專人以書為貺禮意兼重捧領惕然且審比來起居佳勝某以衰病難於供職故堅乞一閒郡不謂更得繁劇然巳得請不敢更有所擇但有廢曠不治之憂耳而來書乃有遇不遇之説甚非所以安全不肖也某凡百無取入為侍從出為方面此而不遇復以何者為遇乎來使力告囘區區百不盡一乍逺千萬自愛又衰朽何取而傳道昆弟過聽相厚如此數日前履常謁告自徐來宋相别王八子安偕來方同舟不信宿而歸久承傳道亦欲至靈壁以部役沂上不果佩荷此意何時敢忘又承以近詩一冊為賜筆老而思深蘄配古人非求合於世俗者也幸甚幸甚錢塘詩皆率然信筆一一煩収録祗以暴其短耳又某方病市人逐利好刋某拙文欲毁其板矧欲更令人刋邪當俟稍暇盡取舊詩文存其不甚惡者為一集以公過取其言當令録一本奉寄今所示者不惟有脱悞其間亦有他人文也知日課一詩甚善此技雖髙才非甚習不能工也聖俞昔嘗如此某近絶不作詩盖有以非面莫究獨神道碑墓誌數篇耳碑盖被㫖作而誌文以景仁丈世契不得辭欲寫呈文多無暇聞都下巳刋板想即見之也某頃伴虜使頗能誦某文以此知虜中皆有中原文字故為此碑謂富公碑也欲使虜知通好用兵利害之所在也昔年在南京有問僕此事故終之李公文集引得閒當作向所示集古文留子由處有書令檢送也又久不上問愧負深矣忽枉手訊勞來甚勤夙昔之好不替有加兼審比來起居佳勝感慰兼集新舊諸詩幸得敬覽不意餘生復見斯作古人日逺俗學衰陋作者風氣猶存君家伯仲間近見報履常作正字伯仲介特之操處窮益勵時流孰知之者用是占之知公議稍伸耶傳道豈久筦庫者未由面談惟冀厚自愛重而已又來詩欲和數首以速欲發此价故未暇閒居有少述作何日見公昆仲當出相示宫觀之命已過忝矣此外只有歸田為急承見教想識此懐履常未及拜書因家信道區區與龎安常端居静念思五臟皆止一而腎獨二盖萬物之所鍾始生之所出死之所入也故太𤣥罔直蒙酋冥罔為冬直為春蒙為夏酋為秋㝠復為冬則此理也人之四肢九竅凡兩者皆水屬也兩腎兩足兩外腎兩手兩目兩鼻皆水之升降出入也手足外腎舊説固與腎相表裏而鼻與目皆古未之言也豈亦有之而僕觀書少不見耶以理推之此兩者其液皆鹹非水而何僕以為不得此理則内丹不成此又未易以筆墨究也古人作明目方皆先養腎水而以心火暖之以脾固之脾氣盛則水不下泄心氣下則水上行水不下泄而上行目安得不明哉孫思邈用磁石為主而以朱砂神麯佐之豈此理也夫安常博極羣書而善窮物理當為僕思之是否一報某書與王敏仲八首某垂老投荒無復生還之望昨已與長子邁訣巳處置後事矣今到海南首當作棺次便作墓仍留手疏與諸子死即塟於海外庶幾延陵季子嬴博之義父既可施之子子獨不可施之父乎生不挈家死不扶柩此亦東坡之家風也此外燕坐寂照而巳所云途中邂逅意謂不如其巳所欲言者豈有過此者乎故覼縷此紙以代面别又某啟得郡既謝即不敢久留故人事有不周方欲奉啟告别遽辱恵問且審起居佳勝寵喻過實深荷奨借旦夕遂行益逺萬萬以時自重不宣又羅浮山道士鄧守安字道立山野拙訥然道行過人廣恵間敬愛之好為勤身濟物之事嘗與某言廣州一城人好飲鹹苦水春夏疾疫時所損多矣惟官員及有力者得飲劉王山井水貧下何由得惟蒲澗山有滴水岩水所從來髙可引入城盖二十里以下耳若於巖下作大石槽以五管大竹續處以蔴繩漆塗之隨地髙下直入城中又為一大石槽以受之又以五管分引散流城中為小石槽以便汲者不過用大竹萬餘竿及二十里間用葵茆苫蓋大約不過費百千數可成然須於循州置少良田令嵗可得租課五七千者令嵗買大筋竹萬竿作竹栰下廣州以備不住抽換又須於廣州城中置得少房錢可以日掠二百以備抽換之費專差兵匠數人廵覷修葺則一城貧富同飲甘凉其利便不在言也自有廣州以來以此為患若人户知有此作其欣願可知喜捨之心料非復塔廟之比矣然非道士至誠不欺精力勤幹不能成也敏仲見訪及物之事敢以此獻更苦直望仙耳世間貪愛無絲毫也可以無疑從來帥漕諸公亦多請與語某喜公濟物之事故詳以告可否更在熟籌慎勿令人知出於不肖也又某再啟示喻津遣孤孀救藥病厲政無急於此者矣非敏仲莫能行之幸甚廣州商旅所聚疾疫作客先僵仆因薫染居者事與杭相類莫可擘劃一病院要須有嵗入課利供之乃長久之利試留意來喻以此等各仕宦快意目前美哉此言誰肯然者循州周守治状過人議論可聽想蒙顧盼也又某又有少懇見人説舍弟赴容州路自英韶間舟行由端康等州而往公能與監司諸公言輟一舟與之否今有一家書欲告差人齎往嶺上與之罪大罰輕數年行遣不下屢當患禍老矣何以堪此恃公舊眷必能興哀悚恐悚恐又聞遂作管引蒲澗水甚善每竿上須鑚一小眼如菉豆大以小竹針窒之以驗通塞道逺日久無不塞之理若無以騐之則一竿之塞輒累百竿矣仍願公擘畫少錢令嵗入五十餘竿竹不住抽換永不廢僣言必不訝也又富公碑詞甚愧不工公更加粉飾豈至是哉舟中病暑疲倦不謹恕之又某再啟林醫遂蒙補授於旅泊處衰病非小補也又工小兒産科㓜累将至且留調理渠欲往謝未令去也乞不罪治瘴止用姜葱豉三物濃煑熱呷無不効者而土人不知作豉入此州無黒豆聞五羊頗有之便乞為致三石得為作豉散飲病者不罪不罪與鄭靖老二首某啟到雷州見張君俞首獲公手書累幅欣慰之極不可云喻到亷亷守乃云公巳離邕矣方悵然欲求問從者所在少通區區忽得來教釋然又得新詩皆秀傑語幸甚幸甚别來百罹不可勝言置之不足道也志林竟未成但草得書傳十三巻甚賴公兩借書籍檢閲也向不知公所存又不敢帶行封作一籠寄邁處令訪尋歸納如未有便且寄廣州何道士處巳深囑之必不敢墜某留此過中秋或至月末乃行至北流作竹筏下水歴容藤至梧與邁約令般家至梧相㑹中子迨亦至恵矣却顧舟泝賀江而上水陸數節方至永老業可奈何奈何未㑹間以時自重不宣又某見張君俞乃始知公中間亦為小人所捃摭令史以下固不知退之諱辯也而卿貳等亦爾耶進退有命豈此輩所制知公奇偉必不經懐也某鬚髪盡白然體力原不减舊或不即死聖澤汪洋更一赦或許歸農則帶月之鋤可以對秉也本意専欲歸蜀不知能遂此計否蜀若不歸即以杭州為家朱邑有言子孫奉祠我不如桐鄉之民不肖亦云然外物不可必當更臨事隨宜但不即死歸田可必也公欲相從於溪山間想是真誠之願水到渠成亦不須預慮也此生真同露電豈通把玩耶某頓首上韓昭文某啟違逺旌棨忽巳數月改嵗緬想台候勝常邊徼往還從者殊勞目望馬首但迂拙動成罪戾恐不能及見公之還而去耳餘寒伏冀為國自重因李秘校行謹奉啟恭候不宣與李廷評某啟經由特辱枉訪適以卧病數日及連日㑹集殊無少暇治行怱遽不及一謝明日解維遂爾違闊豈勝愧負與黄敷言二首某啟疊辱寵訪感慰兼集晩來起居佳勝承來晨啟行以衰疾畏寒不果往别悚怍深矣衝涉雨霰萬萬保練謹令兒子候違不宣又少事干煩一書與恵州李念四秀才告為到廣州日専遣人達之不罪交代民師且為再三致意某再拜不宣又與陸固朝奉某啟久留屬疾不敢造請負愧巳深兹者啟行又不往别悚怍之至謹奉手啟代違與謝民師推官二首某啟衰病枯槁百念巳忘緇衣之心尚餘此耳蒙不鄙棄贈以瑰瑋藏之巾笥永以為好今日遂行不果走别愧負千萬謹奉手啟代違又某蒙録示近報若果得免湖外之行衰羸之幸可勝言哉此去不住許下則歸陽羡民師還朝受任或相近得再見幸矣兒子輩並沐寵問及覽所賜過詩何以克當然句法有以發小子矣感荷感荷旅次不盡與黄洞秀才二首某啟經過幸一再見人來辱書甚荷存記兼審比來起居佳勝為慰未由欵奉千萬保嗇又寄示石刻感愧雅意求書字固不惜但尋常因事㸃筆隨即為人取去今却於此中相識處覔得三紙付去蓬僊因降致區區之意某再啟與滕達道二十四首某到此時見荆公甚喜時誦詩説佛也公莫略往一見和甫否餘非面莫能盡某近到筠見子由他亦得㫖指射近地差遣想今巳得替矣吳興風物足慰雅懐郡人有賈収耘老者有行義極能詩公擇子厚皆禮異之某尤與之熟願公時顧慰其牢落也近過文肅公樓徘徊懐想風度不能去某至楚泗間欲入一文字乞於常州住若幸得請則扁舟謁公有期矣又某啟别後不意遽聞國故哀號追慕迨今未巳惟公忠孝體國受恩尤異悲苦之懐必萬常人比日起居何如某旦夕過江徑往毗陵相去益近時得上問也為時自重不宣又某再啟承差人送到定國書所報未必是實也都下喜妄傳事而此君又不審乃四月十七日發來邸報至今不説是可疑也一夫進退何足道所喜保馬户導洛堆垜皆罷茶鹽之類亦有的耗矣二聖之德日新可賀可賀令子各安勝未及報状也又某啟耘老至又辱手書及耘老道起居之詳感慰不可言某留家儀真獨來常以河未通致公見思之深又有舊約便當往見而家無壮子弟須却逺般挈定居後一日可到也惟深察近日京口時有差除或云當時亦未是實計當先起老鎬僕或得連茹耶恵貺三十壺攜歸餉婦矣餘耘老能道不宣某頓首又聞張郎巳授得發勾春中赴上安道必與之俱來某若得㫖當與之同舟于南窮困之中一叚樂事古人罕有也不知遂此意否秦太虛言公有意拆却逍遥堂横廊切謂宜且留之想未必爾聊且言之明年見公當館於此公雅度宏偉欲其軒豁卑意又欲其窈窕深密也如何不罪四聲可罷之萬一浮沈反為患也幸深思之不罪又某再啟前者恵建茗甚奇醉中裁謝不及悚愧之極本州見闕不敢久住逺接人到便行㑹合邈未有期不免惆悵舍弟召命盖虛傳耳君實恩禮既異責望又重不易不易某舊有獨樂園詩云兒童誦君實走卒知司馬持此将安歸造物不我捨今日類詩䜟矣見報中憲言玉汝右揆當世見在告必知之京東有幹幸示諭又許為置朱紅累子不知曽令作否若得之攜以北行幸甚如不及巳亦非急務不罪又某干求累子巳蒙佳恵又為别造朱紅尤為奇少物意兩重何以克當捧領訖感愧無量舊者昨寄在常州令子由帶入京俟到不日便持上也又鰒魚三百枚黒金棋子一副天麻煎一部聊為土物不罪浼觸令子思渴冗中不及别啟又某晩生蒙不鄙與名又令與立字似涉僣易願公自命却示及作字説乃寵幸也某頓首又近得安道公及張郎書甚安徤子由想巳過矣青州資深相見極歡今日赴其盛㑹也閒恐要知惟不罪幸幸又屢枉專使感愧無量兼審比來尊體勝常以慰下情某近絶佳徤見教如元素黜罷薄有所悟遂絶此事仍不復念方知中有無量樂囘顧未絶乃無量苦辱公厚念故盡以奉聞也晩景若不打疉此事則大錯雖二十四州鐵打不就矣既欲發一笑且欲少補左右耳不罪不罪又公解印入覲當過岐亭故縣預以書見約輕騎走見極不難慎勿枉道見過想深識此意乍冷萬乞自重又承差人借示李成十幅圖遂得縱觀幸甚幸甚且蹔借留令李明者用公所教法試摹看只恐多累筆耳此本真奇絶月十日後當於徐守處借入齎内令專愛護也又某閒廢無所用心專治經書一二年間欲了却論語書易舍弟亦了却春秋詩雖拙學自謂頗正古今之誤粗有益於世瞑目無憾往往又笑不㑹取快活是措大餘業聞令子手筆甚髙見其寫字想見其人超然者也又某啟知前事尚未巳言既非實終當别白但目前紛紛衆所共悉也然平生學道專以待外物之變非意之來正須理遣耳若縁此得蹔休逸乃公之雅意也黄當江路過往不絶語言之間人情難測不若稱病不見為良計二年不知出此今始行之耳西事得其詳乎雖廢棄未忘為國家慮也此信的可示其畧否書不能盡區區又示喻宜甫夢遇於傳無有某聞見不廣何足以質然冷暖自知殆未可以前人之有無為證也自聞此事而士大夫多異論意謂中途必一見得相參扣竟不果此意衆生流浪火宅纒遶愛賊故為饑火所燒然其間自有燒不着處一念清静便不服食亦理之常無足怪者方其不食不可强使食猶其方食不可强使之不食也此間何必生異論乎願公以食不食為旦暮以仕不仕為寒暑此外黙而識之若以不食為勝解則與異論者相去無幾矣偶蒙下問輒此奉廣而巳不罪又少懇干聞不罪某好攜具野飲欲問公求朱紅累子兩卓二十四隔者極為左右費然遂成藉草之樂為不淺也有便望頒示悚息悚息某感時氣卧疾逾月今已全安但㓜累更卧尚紛紛也措道人名世昌緜竹人多藝然可閒考騐亦足以遣懣也留此幾一年與之稍熟恐要知又某欲面見一言者盖謂吾儕新法之初輒守偏見至有同異之論雖此心耿耿歸於憂國而所言差謬少有中理者今聖德日新衆化大成囘視向之所執益覺疎矣若變志易守以求進取固所不敢若嘵嘵不已則憂患愈深公此行尚深示知非静退意但以老病衰晚舊臣之心欲一望清光而巳如此恐必獲一對公之至意無乃出於此乎輒恃深眷信筆直突千萬恕之死罪安道公殆是一代異人示諭極慰喜慰喜又某再啟近在揚州入一文字乞常州住如向所面議若未有報至南都當再一入也承郡事頗繁齊整想亦期月之勞爾微疾雖無大患然願公無忽之常作猛獸毒藥血盆膿嚢觀乃可勿孤吾黨之望而快羣小之志也情切言盡恕其拙幸甚所有二賦稍晴寫得寄上次只有近寄潘谷求墨一詩録呈可以發笑也衲衣尋得不用更尋累卓感留意悚怍之甚甘子巳拜賜矣北方有幹幸示諭又某屏居如昨舍弟子由得安問此外不煩逺念久不朝覲縁此得望見清光想足慰公至意其他無足云者貴眷令子各計安勝月中前急足逺寄必已収得略示諭又某啟一别十四年流離契濶不謂復得見公執手恍然不覺涕下風俗日惡忠義寂寥見公使人差増氣也别來情懐不佳忽得來教甚解鬱鬱且審起居佳勝為慰某以少事更數日方北去宜興田已問去若得稍佳者當扁舟徑往視之遂一至湖見公固所願然事有可慮者恐未能往也若得請居常則固當至治下攪擾公數月也未間惟萬萬為時自重又某再啟别諭具感知愛之深一一佩刻董田已遣人去問宜興親情若果爾當乗舟徑往成之然公欲某到吳興則恐難為不欲盡談唯深察之到南都欲一状申禮曹凡刋行文字皆先毁板如所教也又有監酒髙侍禁永康者與之外姻聞亦甚謹幹望略照庇如察其可以剪拂又幸也東坡全集巻七十七
