body:
  text: 東坡全集巻九十五宋蘓軾撰贊八十首僧伽贊盲人有眼不自知忽然見日喜而舞非謂日月有在亡實自慶我眼根在泗濱大士誰不見而有熟視不見者彼豈無眼業障故以知見者皆希有若能便作希有見從此成佛如反掌傳摹世間千萬億皆自大士法身出麻田供養東坡贊見者無數悉成佛阿彌陀佛贊蘇軾之妻王氏名閏之字季章年四十六元祐八年八月一日卒于京師臨終之夕遺言捨所受用使其子邁迨過為畫阿彌陀像紹聖元年六月九日像成奉安于金陵清涼寺贊曰佛子在時百憂繞臨行一念何由了口誦南無阿彌陀如日出地萬國曉何況自捨所受用畫此圓明天日表見聞隨喜悉成佛不擇人天與蟲鳥但當常作平等觀本無憂樂與夀夭丈六全身不為大方寸千佛夫豈小此心平處是西方閉眼便到無魔嬈藥師琉璃光佛贊并引佛弟子蘇籥與其妹德孫病乆不愈其父過母范氏供養祈禱藥師琉璃光佛遂獲痊損其大父軾特為造畫尊像敬拜稽首為之贊曰我佛出現時衆生無病惱世界悉琉璃大地皆藥草我今衆穉孺仰佛如翁媪面頥既圓平風末亦除掃弟子籥與德前世衲衣老敬造世尊像夀命仗佛保傅大士贊善慧執板南泉作舞借我門槌為君打鼓應夢觀音贊稽首觀音宴坐寶石忽忽夢中應我空寂觀音不來我亦不往水在盆中月在天上靜安縣君許氏繡觀音贊太岳之裔邑于靜安學道求心妙湛自觀觀觀世音凛不違顏三年之後心法自圓聞思脩王如日現前心識其容口莫能言發于六用以所能傳自手達鍼自鍼達線為鍼幾何巧歴莫算鍼若是佛佛當千萬若其非佛此相曷縁孰融此二為不二門拜手敬贊東坡老人繡佛贊凡作佛事各以所有富者以財壯者以力巧者以技辯者以言若無所有各以其心見聞隨喜禮拜贊歎曾未及彼一鍼之勞而其獲報等無有二若復縁此得度成佛則此繡者乃是導師題王靄畫如來出山相贊頭鬅鬙耳卓朔適從何處來碧色眼有角明星未出萬家閒外道天魔猶奏樂錯不錯安得無上菩提成等正覺東林第一代廣惠禪師真贊忠臣不畏死故能立天下之大事勇士不顧生故能立天下之大名是人於道亦未也特以義重而身輕然猶所立如此而況於出三界了萬法不生不老不病不死應物而無情者乎堂堂總公僧中之龍呼吸為雲噫欠為風且置是事聊觀其一戲蓋將拊掌談笑不起于坐而使廬山之下化為梵釋龍天之宫興國寺浴室院六祖畫贊并叙予嘉祐初舉進士館于興國浴室老僧德香之院浴室之南有古屋東西壁畫六祖像其東刻木為樓閣堂宇以障之不見其全而西壁三師皆神宇靖深中空外夷意非知是道者不能為此書其上曰蜀僧令宗筆予初不聞宗名而家有偽蜀待詔丘文播筆畫相似殆不可辨曰宗豈師播者耶已而問諸蜀父老曰文播漢州人弟曰文曉而令宗其異父弟或曰其表弟也皆善畫山水人物竹石其品在黄筌句龍爽之間而文播之子仁慶尤長於花實羽毛蜀人趙昌所師者予去三十一年而中書舍人彭君器資亦館于是予往見之則院中人無復識予者獨主僧惠汶蓋當時堂上侍者然亦老矣導予觀令宗畫則三祖依然尚在蔭翳間余與器資相顧太息汶曰嘻去是也何有乃徙置所謂樓閣堂宇者北向而出之六師相親如言如笑如以法相授都人聞之觀者日衆汶乃作欄楯以䕶之而器資請予為贊之曰少林傃壁不以為礙彌天同輩不以為㤗稽首六師昔晦今明不去不來何損何增俯仰屈信三十一年我雖日化其孰能遷之觀音贊興國浴室院法真大師慧汶傳寶禪月大師貫休所畫十六大阿羅漢左朝散郎集賢校理歐陽棐為其女為軾子婦者捨所服用裝新之軾亦家藏慶州小孟畫觀世音捨為中尊各作贊一首為亡者追福滅罪衆生墮八難身心俱䘮失惟有一念在能呼觀世音火坑與刀山猛獸諸毒藥衆苦萃一身呼者常不痛呼者若自痛則必不能呼若其了不痛何用呼菩薩當自救痛者不煩觀音力衆生以二故一身受衆苦若能真不二則是觀世音八萬四千人同時俱赴救羅漢贊十六首第一尊者正坐歛眉扼腕立拂問此大士為言為黙黙如雷霆言如墻壁非言非黙百祖是式第二尊者㫋檀非煙火亦無香是從何生俯仰在亡彈指贊歎善思念之是一炷香是天人師第三尊者我觀西方度無量國諸佛陀耶在我掌握右顧曄然汝則皆西隨我所印識道不迷第四尊者袖手不言跏趺終日兩眉雖舉六用皆寂寂不為身動不為人天作時雨山川出雲第五尊者掌中浮圖舍利所宅放大光明照十方刹櫝而藏之了無見聞衆所發心與佛皆存第六尊者手中竹根所指如意云何不動無意可指食已宴坐便腹果然是中空洞以受世間第七尊者梵書旁行俛首注視不知有經而況字義佛子云何飽食晝眠勤苦功用諸佛亦然第八尊者衆生顛倒為物所轉我轉是珠以一貫萬過現不住未則未來舉珠示人孰為轉迴第九尊者柏子庭際正覺妙慧悟最上乗了第一義為大摩尼傳雞足衣示現虛寂端坐俛眉第十尊者半肩磨衲為誰緩頰彼以誠叩此縁問答佛意𤣥微有覺無為肉眼執著捧函捕龜第十一尊者幻體有累法身無著幻法兩忘圓明寥廓以大願力援諸有情見聞悉入真妄一真第十二尊者長江皎潔可鑑毛髪師心水心一般奇絶目寓波中意若擾龍真機掣電微妙元通第十三尊者黙坐無說是名妙說月槃芹獻花開子結寶錫一枝中含真機悟此機者處土泉飛第十四尊者攝衣跏趺觀此煙穗與我定香本無内外貝葉琅函三乘指南胡人捧立云誰啟緘第十五尊者何去何從叩應感通如響答聲聲寂還空訴者誰釁皆有佛性去爾嗔恚隨處清淨第十六尊者一般心眼兩般見解將人我礦烹煉沙汰廓然圓明超悟上乘示現慈悲援諸有情自海南歸過清逺峽寶林寺敬贊禪月所畫十八大阿羅漢第一賓度羅跋囉墮尊者白㲲在膝貝多在巾目視超然忘經與人面顱百皺不受刀籋無心掃除留此殘雪第二迦諾迦代蹉尊者耆年何老粲然復少我知其心佛不妄笑瞋喜雖幻笑則非真施此無憂與無量人第三迦諾迦跋梨隨闇尊者揚眉注目撫膝横拂問此大士為言為黙黙如雷霆言如墻壁非言非黙百祖是式第四蘇頻陀尊者聃耳屬肩綺眉覆顴佛在世時見此耆年開口誦經四十餘齒時聞雷雹出一彈指第五諾矩羅尊者善心為男其室法喜背癢孰爬有木童子高下適當輕重得宜使真童子能如兹乎第六跋陀羅尊者美狠惡婉自昔所聞不圓其輔有圓者存現六極相代衆生報使諸佛子具佛相好第七迦理迦尊者佛子三毛髪眉與鬚既去一作芸其二一則有餘因以示衆物無兩遂既得無生則無生死第八代闇羅弗多尊者兩眼方用兩手自寂用者注經寂者寄膝二法相忘亦不相捐是四句偈在我指端第九戒博迦尊者一刼七日刹那三世何念之勤屈指黙計屈者已徃信者未然孰能住此屈伸之間第十半託迦尊者垂頭没肩俛目注視不知有經而況字義佛子云何飽食晝眠勤苦功用諸佛亦然第十一羅怙羅尊者面門月滿瞳子電爛示和猛容作威喜觀龍象之姿魚鳥所驚以是幻身為護法城第十二那迦犀那尊者以惡轆物轆一作駭如火自􅋹以信入佛如水自濕垂眉捧手為誰䖍恭大一作導師無德水火無功第十三因掲陀尊者捧經持珠杖則倚肩植杖而起經珠乃閒不行不立不坐不卧問師此時經杖何在第十四伐那婆斯尊者六塵既空出入息滅松摧石隕路迷草合逐獸于原得箭一作已忘弓偶然汲水忽然相逢第十五阿氏多尊者勞我者晳休我者黔如晏如岳鮮不僻淫是哀駘它澹臺滅明各妍于心得法眼正第十六注半託迦尊者以口說法法不可說以手示人手去法滅生滅之中自一作了然真常是故我法不離色聲第十七慶友尊者以口誦經以手歎一作數法是二道塲各自起滅孰知毛竅八萬四千皆作佛事說法熾然第十八賔頭盧尊者右手持杖左手拊石為手持杖為杖持手宴坐石上安以杖為無用之用世人莫知羅漢贊左手持經右手引帶為巻為開是義安在已讀則巻未讀則開我無所疑其音如雷水陸法像贊并引蓋聞淨名之缽屬饜萬口寶積之蓋徧覆十方若知法界本造于心則雖凡夫皆具此理昔在梁武皇帝始作水陸道塲以十六名盡三千界用狹而施博事約而理詳後生莫知隨世增廣若使一二而悉數雖至千萬而靡周惟我蜀人頗存古法觀其像設猶有典刑䖍召請於三時分上下者八位但能起一念於慈悲之上自然撫四海於俛仰之間軾敬發願心具嚴繪事而大檀越張侯敦禮樂聞其事共結勝縁請法雲寺法涌禪師善本差擇其徒脩營此㑹永為無礙之施同守不刋之儀軾拜手稽首各為之贊凡十六首上八位一切常住佛陀耶衆謂此為佛是事理障謂此非佛是斷滅相事理既融斷滅亦空佛自現前如日之中一切常住達摩耶衆以意為根是謂法塵以佛為體是謂法身風止浪靜非有别水放為江河匯為沼沚一切常住僧伽耶衆佛既强名法亦非真神而明之存乎其人惟佛法僧非三非一如雲出雨如水現日一切常住大菩薩衆神智無方解脫無礙以何因縁得大自在障盡願滿反于自然無始以來亡者復存一切常住大辟支迦衆現無佛處脩第二乘如日入時膏火為燈我說三乗如應病藥敬禮辟支即大圓覺一切常住大阿羅漢衆大不可知山隨綫移小入無間澡身軍持我雖不能能設此供知一切人具此妙用一切五通神仙衆孰云飛仙高舉違世湛然神凝物不疵癘為同為異本自無同契我無生長生之宗一切䕶法龍神衆外道壞法如刀截風壞者既妄護者亦空偉兹龍神威而不怒示有四友佛之禦侮下八位一切官寮吏從衆至難者君至憂者臣以衆生故現宰官身以難為易以憂為樂樂兼萬人禍倍衆惡一切天衆苦極則脩樂極則流禍福無窮糾纒相求遂超欲色至非非想不如一念真法無上一切阿脩羅衆正念淳想則為飛行毫釐之差遂墮戰爭以此為道宂胷隕首是真作家當師子吼一切人衆地獄天官同一念頃涅槃生死同一法性抱寶號窮鑽穴索空今夕何夕當選大雄一切地獄衆汝一念起業火熾然非人燔汝乃汝自燔觀法界性起滅電速知惟心造是破地獄一切餓鬼衆說食無味涎流妄嚥真食無火中虛妄見美從妄生惡亦幻成知幻即離既飽且寧一切畜生衆欲人不知心則有負此念未成角尾已具集我道塲一洗濯之盡未來刼愧者勿為一切六道外者衆陋劣之極蕩於𦕈㝠胎卵濕化莫從而生聞吾法音飈起雷動如夢覺人不復見夢磨衲贊并序長老佛印大師了元遊京師天子聞其名以高麗所貢磨衲賜之客有見而歎曰嗚呼善哉未曾有也嘗試與子攝其齊衽循其鉤絡舉而振之則東盡嵎夷西及昩谷南放交趾北屬幽都紛然在吾鍼孔綫蹊之中矣佛印听然而笑曰甚矣子言之陋也吾以法眼視之一一鍼孔有無量世界滿中衆生所有毛竅所衣之衣鍼孔綫蹊悉為世界如是展轉經八十反吾佛光明之所照與吾君聖德之所被如以大海注一毛竅如以大地塞一鍼孔曾何嵎夷昩谷交趾幽都之足云乎當知此衲非大非小非短非長非重非輕非薄非厚非色非空一切世間折膠墮指此衲不寒爍石流金此衲不熱五濁流浪此衲不垢刼火洞然此衲不壞云何以有思惟心生下劣想於是蜀人蘇軾聞而贊之曰匣而藏之見衲而不見師衣而不匣見師而不見衲惟師與衲非一非兩𦕈而視之蟣蝨龍象小篆般若心經贊草𨽻用世今千載少而習之手所安如舌於言無揀擇終日應對惟所問忽然使作大小篆如正行走值墻壁縱復學之能粗通操筆欲下仰尋索譬如鸚鵡學人語所習則能否則黙心存形聲與㸃畫何暇復求字外意世人初不離世間而欲學出世間法舉足動念皆塵垢而以俄頃作禪律禪律若可以作得所不作處安得禪善哉李子小篆字其間無篆亦無𨽻心忘其手手忘筆筆自落紙非我使正使匆匆不少暇倐忽千百初無難稽首般若多心經請觀何處非般若金山長老寶覺師真贊望之儼然即之也温是惟寶覺大士之像因是識師是則非師因師識道道亦如是資福白長老真贊是是是是資福白老子身如空我如爾無一事長歡喜東坡有老居士見此真欲擬議未開口落第二有一語畧相似門如市心如水光道人真贊字晏然海口山顴犀顱鸖肩定眼水止秀眉月弦自一而兩至百億千即妄而真是真晏然淨因淨照臻老真贊淨故能照為照故淨亦如是身孰知其正四大是假此反為真從古聖賢所莫能分視彼如此凡賊皆子喜甲怒乙雖子猶賊人方自我物固相物是故東坡即此為實馬祖龎公真贊南岳坐下一馬四蹄踏殺天下馬後復一老龎一口吸盡西江天下是老師脚西江即渠儂口不知誰踏誰殺何縁自吸自受曇秀作六偈述龎公事東坡讀而首肯之為書此贊玉巖隱居陽行先真贊道不二德不孤無人所有有人所無世之所爭者五天嗇其三而畀其二是以日計之不足歲計之有餘也葆光法師真贊嗟乎法師行年四十有四而不知牝牡之欲身居京邑而不營利欲之私體無威容口無文詞頭如蓬蓽性如鹿麋意之所向雖金石莫隔而鬼神莫逆此所以陟降天門睥睨帝所而終莫能疑者耶醴泉觀真靖崇教大師真贊北方有神君出内罔與㝠被髪拊劒馭兩靈國之東南福其庭注然天醪涌其泠汰選妙士守籥扃翛然真靖有典刑眉間三出杳而清何必控鯉浮南溟東莞資福堂老柏再生贊生石首肯奘松肘回是心茍真金石為開堂上栢枯其留復生此栢無我誰為枯榮方其枯時不枯者存一枯一榮皆方便門人皆不聞瓦礫說法今聞此栢熾然常說湜長老真贊道與之貌天與之形雖同乎人而實無情彼真清隠何殊丹青日照月明雷動風行夫孰非幻忽然而成此畫清隠可謁雨晴海月辯公真贊并引錢塘佛者之盛蓋甲天下道德才智之士與夫妄庸巧偽之人雜處其間號為難齊故於僧職正副之外别補都僧正一員簿帳案牒奔走將迎之勞專責正副以下而都師總領要畧實以行解表衆而已然亦通號為僧官故高居逺引山栖絶俗之士不屑為之惟清通端雅外涉世而中遺物者乃任其事蓋亦難矣余通守錢塘時海月大師惠辯者實在此位神宇澄穆不見愠喜而緇素悅服予固喜從之游時東南多事吏治少暇而余方年壯氣盛不安厥官每往見師清坐相對時聞一言則百憂冰解形神俱泰因悟莊周所言東郭順子之為人人貌而天虚縁而葆真清而容物物無道正容以悟之使人之意也消蓋師之謂也歟一日師臥席使人請余入山適有所未暇旬餘乃往則師之化四日矣遺言須余至乃闔棺趺坐如生頂尚温也余在黃州夢至西湖上有大殿榜曰彌勒下生而故人辯才海月之流皆行道其間師没後二十一年余謫居惠州天竺淨惠師屬參寥子以書遺余曰檀越許與海月作真贊乆不償此願何也余矍然而起為說贊曰人皆趨世出世者誰人皆遺世世誰為之爰有大士處此兩間非濁非清非律非禪惟是海月都師之式庶復見之衆縛自脫我夢西湖天宫化城見兩天竺宛如平生雲披月滿遺像在此誰其贊之惟東坡子清都謝道士真贊謝道士生丙子真一存長不死欲識清都面目一江春水東流滔滔直入滄海大至蓬萊頂頭李伯時作老子新沐圖遺道士蹇拱辰趙郡蘇某見而贊之一云子由作老耼新沐晞髪于庭其心淡然若忘其形夫子與回見之而驚入而問之强使自名曰豈有已哉夫人皆然惟役於人而䘮其天其人茍忘其天則全四肢百骸孰為吾纒死生終始孰為吾遷彼赫赫者將為吾温彼肅肅者將為吾寒一温一寒交而萬物生焉物皆賴之而況吾身乎温為吾和寒為吾堅忽乎不知而更千萬年葆光志之夫非養生之根乎辯才大師真贊余頃年嘗聞妙法於辯才老師今見其畫像乃以所聞者贊之即之浮雲無窮去之明月皆同欲知明月所在在汝唾霧之中無名和尚傳贊道無分成佛無滅生如影外光孰在孰亡如井中空孰虛孰盈無名和尚蓋名無名髑髏贊黃沙枯髑髏本是桃李面而今不忍看當時恨不見業風相鼓轉巧色美倩盼無師無眼禪看便成一片東坡全集巻九十五
