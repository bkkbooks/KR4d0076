body:
  text: 東坡全集巻三十三宋蘇軾撰賦十七首延和殿奏新賦成徳之老來奏新樂皇帝踐阼之三載也治道旁達王功告成御延和之髙拱奏元祐之新聲翕然便坐之前初觀擊拊允也徳音之作皆效和平自昔鍾律不調工師失職鄭衛之聲既盛雅頌之音殆息時有作者僅存遺則於魏則大樂令䕫在漢則河間王徳俾後世之有考頼斯人之用力時移事改嗟制作之各殊昔是今非知髙下之孰得爰有耆徳適丁盛時以謂樂之作也臣甞學之顧近世之所用校古人而失宜峴下朴律猶有大髙之弊瑗改照尺不知同失於斯是用稽周官之舊法而均其分寸騐太府之見尺而審其毫釐鑄噐而成庶㡬改數以正度具書以獻孰謂體知而無師時惟帝俞眷茲元老雖退身而安逸未忘心於論討鏗然鐘磬之調適燦然虡業之華好聊即便安之所奏黄鍾而歌大成行詠文明之章薦英祖而享神考爾乃停法部之役而衆工莫與肄太常之業而邇臣必陪天聽聰明而下就時風和協以徐回歌曲既登將歎貫珠之美韶音可合庶觀儀鳳之來斯蓋世格文明俗躋仁壽天地之合既應金石之樂可奏延英旁矚念故老之不來講武前臨消羣慝之交構然則律制既立治功日新號令皆發而中節磬筦無聞於奪倫上以導和氣於宫掖下以胥悅豫於臣隣以清濁任意而相譏何憂工玉謂宫商各諧而自遂無愧音臣嗚呼趙鐸固中於宫商周尺仍分於清濁道欲詳解事資學博儻非䕫曠之徒孰能正一代之樂明君可與為忠言賦明則知逺能順忠告臣不難諌君先自明智既審乎情偽言可竭其忠誠虛已以求覽羣言於止水昌言而告恃至信於平衡君子道大而不回言出而為則事父能孝故可以事君謀身必忠而况於謀國然而言之雖易聽之實難論者雖切聞者多惑苟非開懐用善若轉丸之易從則投人以言有按劒之莫測國有大議人方異詞佞者莫能自直昧者有所不知雖有智者孰令聽之皎如日月之照臨罔有遁形之蔽雖復藥石之瞑眩曽何苦口之疑蓋疑言不聽故確論必行大功可成故衆患自逺上之人聞危言而不忌下之士推赤心而無損豈㣲忠之能致有至明而為本是以伊尹醜有夏而歸亳大賢固擇所從百里愚於虞而智秦一身非故相反噫言悅於目前者不見跬歩之外論難於耳順者有以百年而興茍其聪明蔽於嗜好智慮溺於愛憎因其所喜而為善雖有願忠而孰能心茍無邪既坐瞻於百里人思其效將或錫之十朋彼非謂之賢而欲違知其忠而莫受目有眯則視白為黒心有蔽則以薄為厚遂使諛臣乘隙以彚進智士知㣲而出走仲尼不諫懼將困於婦言叔孫詭辭畏不免於虎口故明王審遜志之非道知拂心之謂忠不求耳目之便毎要社稷之功有漢宣之賢充國得盡破羌之計有魏明之察許允獲伸選吏之公大哉事君之難非忠何報雖曰伸於知巳而無自辱於善道詩不云乎哲人順徳之行可以受話言之告秋陽賦越王之孫有賢公子宅於不土之里而詠無言之詩以告東坡居士曰吾心皎然如秋陽之明吾氣肅然如秋陽之清吾好善而欲成之如秋陽之堅百榖吾惡惡而欲刑之如秋陽之隕羣木夫是以樂而賦之子以為何如居士笑曰公子何自知秋陽哉生於華屋之下而長游於朝廷之上出擁大蓋入侍幃幄暑至於温寒至於凉而已矣何自知秋陽哉若予者乃真知之方夏潦之滛也雲蒸雨泄雷電發越江湖為一后土冒沒舟行城郭魚龍入室菌衣生於用噐蛙蚓行於几席夜違濕而五遷晝燎衣而三易是猶未足病也畊於三呉有田一廛禾已實而生耳稻方秀而泥蟠溝塍交通墻壁頽穿面垢落塈之塗目泫濕薪之煙釜甑其空四隣消然鸛鶴鳴於戸庭婦宵興而永歎計有食其㡬何矧無衣於窮年忽釜星之雜出又燈花之雙懸清風西來鼓鐘其鏜奴婢喜而吿余此雨止之祥也蚤作而占之則長庚澹其不芒矣浴於暘谷升於扶桑曽未轉盼而倒景飛於屋梁矣方是時也如醉而醒如瘖而鳴如痿而起行如還故鄉初見父兄公子亦有此樂乎公子笑曰善哉吾雖不身履而可以意知也居士曰日行於天南北異宜赫然而炎非其虐穆然而温非其慈且今之温者昔之炎者也云何以夏為盾而以冬為衰乎吾儕小人輕愠易喜彼冬夏之畏愛乃羣狙之三四自今知之可以無惑居不墐戸出不仰笠暑不言病以無忘秋陽之徳公子拊掌一笑而作快哉此風賦時與呉彦律舒堯文鄭彦能各賦兩韻子瞻作第一第五韻占風字為韻餘皆不録賢者之樂快哉此風雖庶民之不共眷佳客以攸同穆如其來既偃小人之徳颯然而至豈獨大王之雄若夫鷁退宋都之上雲飛泗水之湄寥寥南郭怒號於萬竅颯颯東海鼔舞於四維固以陋晋人一吷之小笑玉川兩腋之卑野馬相吹摶羽毛於汗漫應龍所處作鱗甲以參差灔澦堆賦并叙世以瞿唐峽口灧澦堆為天下之至險凢覆舟者皆歸咎於此石以余觀之蓋有功於斯人者夫蜀江㑹百水而至於䕫瀰漫浩汗横放於大野而峽之大小曽不及其十一茍先無以齟齬於其間則江之逺來奔騰迅快盡銳於瞿唐之口則其險悍可畏當不啻於今耳因為之賦以待好事者試觀而思之天下之至信者唯水而已江河之大與海之深而可以意揣唯其不自為形而因物以賦形是故千變萬化而有必然之理掀騰勃怒萬夫不敢前兮宛然聽命惟聖人之所使予泊舟乎瞿唐之口而觀乎灧澦之崔嵬然後知其所以開峽而不去者固有以也蜀江逺來兮浩漫漫之平沙行千里而未甞齟齬兮其意驕逞而不可摧忽峽口之逼窄兮納萬頃於一盃方其未知有峽也而戰乎灧澦之下喧豗震掉盡力以與石鬬勃乎若萬騎之西來忽孤城之當道鈎援臨衝畢至於其下兮城堅而不可取矢盡劒折兮迤邐循城而東去於是滔滔汩汩相與入峽安行而不敢怒嗟夫物固有以安而生變兮亦有以用危而求安得吾說而推之兮亦足以知物理之固然屈原廟賦浮扁舟以適楚兮過屈原之遺宫覽江上之重山兮曰惟子之故鄉伊昔放逐兮渡江濤而南遷去家千里兮生無所歸而死無以為墳悲夫人固有一死兮處死之為難徘徊江上欲去而未决兮俯千仞之驚湍賦懐沙以自傷兮嗟子獨何以為心忽終章之慘烈兮逝將去此而沉吟吾豈不能髙舉而逺遊兮又豈不能退黙而深居獨嗷嗷其怨慕兮恐君臣之愈疎生既不能力爭而强諫兮死猶冀其感發而改行茍宗國之顛覆兮吾亦獨何愛於乆生託江神以告寃兮馮夷教之以上訴歴九關而見帝兮帝亦悲傷而不能救懐瑾佩蘭而無所歸兮獨惸惸乎中浦峽山髙兮崔嵬故居廢兮行人哀子孫散兮安在况復見兮髙臺自子之逝今千載兮世愈狹而難存賢者畏譏而改度兮隨俗變化斵方以為圓黽勉於亂世而不能去兮又或為之臣佐變丹青於玉瑩兮彼乃謂子為非智惟髙節之不可以企及兮宜夫人之不與吾違國去俗死而不顧兮豈不足以免於後世嗚呼君子之道豈必全兮全身逺害亦或然兮嗟子區區獨為其難兮雖不適中要以為賢兮夫我何悲子所安兮昆陽城賦淡平野之靄靄忽孤城之如塊風吹沙以蒼莽悵樓櫓之安在横門豁以四達故道宛其未改彼野人之何知方傴僂而畦菜嗟夫昆陽之戰屠百萬於斯須曠千古而一快想尋邑之來陣兀若驅雲而擁海猛士扶輪以䝉茸虎豹雜沓而横潰罄天下於一戰謂此舉之不再方其乞降而未獲固已變色而驚悔忽千騎之獨出犯初鋒於未艾始憑軾而大笑旋棄鼓而投械紛紛籍籍死於溝壑者不知其㡬何人或金章而玉佩彼狂童之僣竊蓋已旋踵而將敗豈豪傑之能得盡市井之無頼貢符獻瑞一朝而成羣兮紛就死之何怪獨悲傷於嚴生懐長才而自凂豈不知其必䘮獨徘徊其安待過故城而一弔増志士之永慨後杞菊賦并叙天隨生自言常食杞菊及夏五月枝葉老硬氣味苦澁猶食不已因作賦以自廣始余甞疑之以為士不遇窮約可也至於饑餓嚼齧草木則過矣而余仕宦十有九年家日益貧衣食之奉殆不如昔者及移守膠西意且一飽而齋厨索然不堪其憂日與通守劉君廷式循古城廢圃求杞菊食之捫腹而笑然後知天隨之言可信不繆作後杞菊賦以自嘲且解之云吁嗟先生誰使汝坐堂上稱太守前賔客之造請後掾屬之趨走朝衙達午夕坐過酉曽杯酒之不設攬草木以誑口對案顰蹙舉箸噎嘔昔隂將軍設麥飯與葱葉井丹推去而不齅怪先生之眷眷豈故山之無有先生听然而笑曰人生一世如屈伸肘何者為貧何者為富何者為美何者為陋或糠覈而瓠肥或粱肉而墨瘦何侯方丈庾郎三九較豐約於夢寐卒同歸於一朽吾方以杞為糧以菊為糗春食苖夏食葉秋食花實而冬食根庶㡬乎西河南陽之壽服胡麻賦并叙始余甞服茯苓久之良有益也夢道士謂余茯苓燥當雜胡麻食之夢中問道士何者為胡麻道士言脂麻是也既而讀本草云胡麻一名狗蝨一名方莖黒者為巨勝其油正可作食則胡麻之為脂麻信矣又云性與茯苓相宜於是始異斯夢方將以其說食之而子由賦茯苓以示余乃作服胡麻賦以荅之世間人聞服脂麻以致神仙必大笑求胡麻而不可得則取山苗野草之實以當之此古所謂道在邇而求諸逺者歟其詞曰我夢羽人頎而長兮惠而告我藥之良兮喬松千尺老不僵兮流膏入土龜蛇藏兮得而食之壽莫量兮於此有草衆所甞兮狀如狗蝨其莖方兮夜炊晝曝乆乃藏兮茯苓為君此其相兮我興發書若合符兮乃瀹乃蒸丼且腴兮補填骨髓流髪膚兮是身如雲我何居兮長生不死道之餘兮神藥如蓬生爾廬兮世人不信空自劬兮搜抉異物出怪迂兮槁死空山固其所兮至陽赫赫發自坤兮至隂肅肅躋於乾兮寂然反照珠在淵兮沃之不滅又不燔兮長虹流電光燭天兮嗟此區區何與於其間兮譬之膏油火之所傳而已耶赤壁賦壬戌之秋七月既望蘇子與客泛舟游於赤壁之下清風徐來水波不興舉酒屬客誦明月之詩歌窈窕之章少焉月出於東山之上徘徊於斗牛之間白露横江水光接天縱一葦之所如凌萬頃之茫然浩浩乎如馮虛御風而不知其所止飄飄乎如遺世獨立羽化而登仙於是飲酒樂甚扣舷而歌之歌曰桂棹兮蘭槳擊空明兮泝流光𣺌𣺌兮予懐望美人兮天一方客有吹洞簫者倚歌而和之其聲烏烏然如怨如慕如泣如訴餘音嫋嫋不絶如縷舞幽壑之潜蛟泣孤舟之嫠婦蘇子愀然正襟危坐而問客曰何為其然也客曰月明星稀烏鵲南飛此非曹孟徳之詩乎西望夏口東望武昌山川相繆鬱乎蒼蒼此非孟徳之困於周郎者乎方其破荆州下江陵順流而東也舳艫千里旌旗蔽空釃酒臨江横槊賦詩固一世之雄也而今安在哉况吾與子漁樵於江渚之上侣魚鰕而友麋鹿駕一葉之扁舟舉匏尊以相屬寄蜉蝣於天地𦕈滄海之一粟哀吾生之須臾羡長江之無窮挾飛仙以遨遊抱明月而長終知不可乎驟得託遺響於悲風蘇子曰客亦知夫水與月乎逝者如斯而未甞徃也盈虛者如彼而卒莫消長也蓋將自其變者而觀之則天地曽不能以一瞬自其不變者而觀之則物與我皆無盡也而又何羡乎且夫天地之間物各有主茍非吾之所有雖一毫而莫取惟江上之清風與山間之明月耳得之而為聲目遇之而成色取之無禁用之不竭是造物者之無盡藏也而吾與子之所共適客喜而笑洗盞更酌肴核既盡杯盤狼籍相與枕藉乎舟中不知東方之既白後赤壁賦是歳十月之望歩自雪堂將歸于臨臯二客從予過黄泥之坂霜露既降木葉盡脫人影在地仰見明月顧而樂之行歌相荅已而歎曰有客無酒有酒無肴月白風清如此良夜何客曰今者薄暮舉網得魚巨口細鱗狀如松江之鱸顧安所得酒乎歸而謀諸婦婦曰我有斗酒藏之乆矣以待子不時之須於是携酒與魚復游於赤壁之下江流有聲斷岸千尺山髙月小水落石出曽日月之㡬何而江山不可復識矣予乃攝衣而上履巉巖披䝉茸踞虎豹登虬龍攀栖鶻之危巢俯馮夷之幽宫蓋二客不能從焉劃然長嘯草木震動山鳴谷應風起水涌予亦悄然而悲肅然而恐凜乎其不可留也反而登舟放乎中流聽其所止而休焉時夜將半四顧寂寥適有孤鶴横江東來翅如車輪𤣥裳縞衣戛然長鳴掠予舟而西也須臾客去予亦就睡夢一道士羽衣翩躚過臨臯之下揖予而言曰赤壁之游樂乎問其姓名俛而不荅嗚呼噫嘻我知之矣疇昔之夜飛鳴而過我者非子也耶道士顧笑予亦驚悟開戸視之不見其處天慶觀乳泉賦隂陽之相化天一為水六者其壯而一者其穉也夫物老死於坤而萌芽於復故水者物之終始也意水之在人寰也如山川之蓄雲草木之含滋漠然無形而為徃來之氣也為氣者水之生而有形者其死也死者鹹而生者甘甘者能徃能來而鹹者一出而不復返此隂陽之理也吾何以知之蓋甞求之於身而得其說凡水之在人者為汗為涕為洟為血為溲為矢為涎為沫此數者皆水之去人而外騖然後肇形於有物皆鹹而不能返故鹹者九而甘者一一者何也唯華池之真液下涌於舌底而上流於牙頰甘而不壞白而不濁宜古之仙者以是為金丹之祖長生不死之藥也今夫水之在天地之間者下則為江湖井泉上則為雨露霜雪皆同一味之甘是以變化徃來有逝而無竭故海洲之泉必甘而海雲之雨不鹹者如涇渭之不相亂河濟之不相渉也若夫四海之水與凡出鹽之泉皆天地之死氣也故能殺而不能生能槁而不能浹也豈不然哉吾謫居儋耳卜築城南隣於司命之宫百井皆鹹而醪醴湩乳獨發於宫中給吾飲食酒茗之用蓋沛然而無窮吾甞中夜而起挈瓶而東有落月之相隨無一人之我同汲者未動夜氣方歸鏘瓊珮之落谷灧玉池之生肥吾三嚥而遄返懼守神之訶譏却五味以謝六塵悟一真而失百非信飛仙之有藥中無主而何依𣺌松喬之安在猶想像於庶㡬某在海南作此賦未嘗示人既渡海親寫二本一以示秦少游一以示劉元忠建中靖國元年三月二十一日洞庭春色賦并引安定郡王以黄柑釀酒名之曰洞庭春色其猶子徳麟得之以餉余戱作賦曰吾聞橘中之樂不減商山豈霜餘之不食而四老人者游戯於其間悟此世之泡幻藏千里於一斑舉棗葉之有餘納芥子其何艱宜賢王之達觀寄逸想於人寰嫋嫋兮春風泛天宇兮清閒吹洞庭之白浪漲北渚之蒼灣携佳人而徃游勒霧鬢與風鬟命黄頭之千奴巻震澤而與俱還糅以二米之禾藉以三脊之菅忽雲蒸而氷解旋珠零而涕澘翠勺銀罌紫絡青綸隨屬車之鴟夷欵木門之銅鐶分帝觴之餘瀝幸公子之破慳我洗盞而起甞散腰足之痺頑盡三江於一吸呑魚龍之神姦醉夢紛紜始如髦蠻鼓巴山之桂楫扣林屋之瓊關卧松風之瑟縮掲春溜之淙潺追范蠡於𣺌茫弔夫差之惸鰥屬此觴於西子洗亡國之愁顔驚羅襪之塵飛失舞袖之弓彎覺而賦之以授公子曰烏乎噫嘻吾言夸矣公子其為我刪之中山松醪賦始余宵濟於衡漳車徒渉而夜號燧松明而識淺散星宿於亭臯鬱風中之香霧若訴予以不遭豈千歳之妙質而死斤斧於鴻毛效區區之寸明曽何異於束蒿爛文章之糾纒驚節解而流膏嗟構厦其已逺尚藥石之可曹収薄用於桑榆製中山之松醪救爾灰燼之中免爾螢爝之勞取通明於盤錯出肪澤於烹熬與黍麥而皆熟沸舂聲之嘈嘈味甘餘而小苦歎幽姿之獨髙知甘酸之易壊笑凉州之蒲萄似玉池之生肥非内府之蒸羔酌以癭藤之紋樽薦以石蟹之霜螯曽日飲之㡬何覺天刑之可逃投拄杖而起行罷兒童之抑搔望西山之咫尺欲褰裳以遊遨跨超峰之奔鹿接挂壁之飛猱遂從此而入海渺飜天之雲濤使夫嵇阮之倫與八仙之羣豪或騎麟而翳鳳爭榼挈而瓢操顛倒白綸巾淋漓宫錦袍追東坡而不可及歸餔歠其醨糟潄松風於齒牙猶足以賦逺遊而續離騷也沉香山子賦子由生日作古者以芸為香以蘭為芬以鬱鬯為祼以脂蕭為焚以椒為塗以蕙為薰杜衡帶屈菖蒲薦文麝多忌而本羶蘇合若薌而實葷嗟吾知之㡬何為六入之所分方根塵之起滅常顛倒其天君每求似於髣髴或鼻勞而妄聞獨沉水為近正可以配薝蔔而並云矧儋崖之異産實超然而不羣既金堅而玉潤亦鶴骨而龍筋惟膏液之内足故把握而兼斤顧占城之枯朽宜㸑釜而燎蚊宛彼小山巉然可欣如太華之倚天象小孤之挿雲徃壽子之生朝以寫我之老懃子方面壁以終日豈亦歸田而自耘幸置此於几席養幽芳於帨帉無一徃之發烈有無窮之氤氲蓋非獨以飲東坡之壽亦所以食黎人之芹也穉酒賦一作酒子賦并引南方釀酒未大熟取其膏液謂之酒子率得十一既熟則反之醅中而潮人王介石泉人許珏乃以是餉余寧其醅之漓以蘄予一醉此意豈可忘哉乃為賦之米為母麴其父蒸羔豚出髓乳憐二子自節口餉滑甘輔衰朽先生醉二子舞歸瀹其糟飲其友先生既醉而醒醒而歌之曰吾觀穉酒之初泫兮若嬰兒之未孩及其溢流而走空兮又若時女之方笄割玉脾於蠭室兮氄雛鵞之毰毸味盎盎其春融兮氣凛冽而秋凄自我皤腹之􅆶罌兮入我凹中之荷杯暾朝霞於霜一作暘谷兮濛夜稻於露一作霜畦吾飲少而輒醉兮與百榼其均齊游物初而神凝兮反實際而形開顧無以酢二子之勤兮出妙語為瓊瑰歸懐璧且握珠兮挾所有以傲厥妻遂諷誦以忘食兮殷空腸之轉雷濁醪有妙理賦神聖功用無㨗於酒酒勿嫌濁人當取醇失憂心於昨夢信妙理之疑神渾盎盎以無聲始從味入杳㝠㝠其似道徑得天真伊人之生以酒為命常因既醉之適方識此心之正稻米無知豈解窮理麴糵有毒安能發性乃知神物之自然蓋與天工而相並得時行道我則師齊相之飲醇逺害全身我則學徐公之中聖湛若秋露穆如春風疑宿雲之解駮漏朝日之暾紅初體粟之失去旋眼花之掃空酷愛孟生知其中之有趣猶嫌白老不頌徳而言功兀爾坐忘浩然天縱如如不動而體無礙了了常知而心不用坐中客滿惟憂百榼之空身後名輕但覺一杯之重今夫明月之珠不可以􅃭夜光之璧不可以餔芻豢飽我而不我覺布帛燠我而不我娯惟此君獨游萬物之表蓋天下不可一日而無在醉常醒孰是狂人之藥得意忘味始知至道之腴又何必一石亦醉罔間州閭五斗解酲不問妻妾結襪庭中觀廷尉之度量脫鞾殿上夸讁仙之敏捷佯醉逿地常陋王式之褊嗚歌仰天每譏楊惲之俠我欲眠而君且去有客何嫌人皆勸而我不聞其誰敢接殊不知人之齊聖匪昏之如古者晤語必旅之於獨醒者汨羅之道也屢舞者髙陽之徒歟惡蔣濟而射木人又何狷淺殺王敦而取金印亦自狂踈故我内全其天外寓於酒濁者以飲吾僕清者以酌吾友吾方畊於𣺌莽之野而汲於清泠之淵以釀此醪然後舉窪樽而属吾口老饕賦庖丁鼓刀易牙烹熬水欲新而釜欲潔火惡陳江右乆不改火火色皆青而薪惡勞九蒸暴而日燥百上下而湯鏖甞項上之一臠嚼霜前之兩螯爛櫻珠之煎蜜滃杏酪之蒸羔蛤半熟而含酒蟹㣲生而帶糟蓋聚物之夭美以養吾之老饕婉彼姫姜顔如李桃彈湘妃之玉瑟鼓帝子之雲璈命仙人之萼緑華舞古曲之鬱輪袍引南海之玻黎酌凉州之蒲萄願先生之耆壽分餘瀝於兩髦候紅潮於玉頰驚煖響於檀槽忽纍珠之妙唱抽獨蠒之長繰閔手倦而少休疑吻燥而當膏倒一缸之雪乳列百柂之瓊艘各眼灧於秋水咸骨醉於春醪美人告去已而雲散先生方兀然而禪逃響松風於蟹眼浮雪花於􅇠毫先生一笑而起𣺌海闊而天髙菜羮賦并叙東坡先生卜居南山之下服食噐用稱家之有無水陸之味貧不能致煑蔓菁蘆菔苦薺而食之其法不用醯醬而有自然之味蓋易而可常享乃為之賦辭曰嗟余生之褊迫如脫兎其何因殷詩腸之轉雷聊禦餓而食陳無芻豢以適口荷鄰蔬之見分汲幽泉以操濯博露葉與瓊根㸑鉶錡以膏油泫融液而流津適湯濛如松風投糝豆而諧匀覆陶甌之穹崇罷攬觸之煩勤屏醯醬之厚味却椒桂之芳辛水耗初而釜治火増壯而力均滃嘈雜而亷清信浄美而甘分登盤盂而薦之具匕筴而晨飱助生肥於玉池與五鼎其齊珍鄙易牙之效技超傅說而榮勳沮彭尸之爽惑調竈鬼之嫌嗔嗟丘嫂其自隘陋樂羊而匪人先生心平而氣和故雖老而體胖忘口腹之為累似不殺而成仁竊比余於誰歟葛天氏之遺民􅄓風賦南越志熈安間多􅄓風􅄓者具四方之氣也常以五六月發未至時雞犬為之不鳴又嶺表録云秋夏間有暈如虹者謂之􅄓母必有飄風仲秋之夕客有叩門指雲物而告余曰海氛甚惡非祲非祥斷霓飲海而北指赤雲夾日而南翔此􅄓之漸也子蓋備之語未卒庭戸肅然槁葉蔌蔌驚鳥疾呼怖獸辟易忽野馬之决驟矯退飛之六鷁襲土囊而暴怒掠衆竅之叱吸余乃入室而坐歛袵變容客曰未也此􅄓風之先驅爾少焉排戸破牖隕瓦擗屋礧擊巨石揉㧞喬木勢翻渤澥響振坤軸疑屏翳之赫怒執陽侯而將戮鼓千尺之清瀾翻百仞之陵谷呑泥沙於一巻落崩崖之再觸列萬馬而並騖潰千車而爭逐虎豹讋駭鯨鯢犇蹙類鉅鹿之戰殷聲呼之動地似昆陽之役舉百萬於一覆余亦為之股慄毛聳索氣側足夜拊榻而九徙晝命龜而三卜蓋三日而後息也父老來唁酒漿羅列勞來僮僕懼定而說理草木之既偃輯軒檻之已折補茅屋之罅漏塞墻垣之隤缺已而山林寂然海波不興動者自止鳴者自停湛天宇之蒼蒼流孤月之熒熒忽悟且歎莫知所營嗚呼小大出於相形憂喜出於相遇昔之飄然者若為巨耶吹萬不同果足怖耶蟻之縁也吹則墜蚋之集也呵則舉夫嘘呵曽不能以振物而施之二蟲則甚懼鵬水擊而三千摶扶搖而九萬彼視吾之惴慄亦爾汝之相筦均大塊之噫氣奚巨細之足辯陋耳目之不廣為外物之所變且夫萬象起滅衆怪耀眩求髣髴於過耳視空中之飛電則向之所謂可懼者實耶虛耶惜吾知之晚也黠䑕賦蘇子夜坐有䑕方齧拊牀而止之既止復作使童子燭之有槖中空嘐嘐聱聱聲在槖中曰噫此䑕之見閉而不得去者也發而視之寂無所有舉燭而索中有死䑕童子驚曰是方齧也而遽死耶向為何聲豈其鬼耶覆而出之墮地乃走雖有敏者莫措其手蘇子歎曰異哉是䑕之黠也閉于槖中槖堅而不可穴也故不齧而齧以聲致人不死而死以形求脫也吾聞有生莫智於人擾龍伐蛟登龜狩麟役萬物而君之卒見使於一䑕墮此蟲之計中驚脫兔於處女烏在其為智也坐而假寐私念其故若有告余者曰汝為多學而識之望道而未見也不一于汝而二于物故一䑕之齧而為之變也人能碎千金之璧而不能無失聲於破釜能摶猛虎不能無變色於蜂蠆此不一之患也言出於汝而忘之耶余俛而笑仰而覺使童子執筆記余之怍復改科賦新天子兮繼體承乾老相國兮更張孰先憫科塲之積弊復詩賦以求賢探經義之淵源是非紛若考辭章之聲律去取昭然原夫詩之作也始於虞舜之朝賦之興也本於兩京之世迤邐陳齊之代綿邈隋唐之裔故遒人狥路為察治之本歴代用之為取士之制近古不易髙風未替祖宗百年而用此號曰得人朝廷一旦而革之不勝其弊謂専門足以造聖域謂變古足以為大儒事吟哦者皆童子為雕篆者非壯夫殊不知採摭英華也蔟之如綿繡較量輕重也等之如錙銖韻韻合璧聨聨貫珠稽諸古其來尚矣考諸舊不亦宜乎特令可畏之後生心潜六義佇見大成之君子名振三都莫不吟詠五字之章鋪陳八韻之㫖字應周天之日兮運而無積句合一歳之月兮終而復始過之者成疣贅之患不及者貽缺折之毁曲盡古人之意乃全天下之美遭逢日月忻歡者諸子百家抖擻歴圖快活者九經三史議夫賦曷可已義何足非彼文辭汛濫也無所統紀此聲律切當也有所指歸巧拙由一字之可見美惡混千人而莫違正方圓者必藉於䋲墨定櫽括者必在於樞機所以不用孔門惜揚雄之未逹其逢漢帝嘉司馬之知㣲噫昔元豐之新經未頒臨川之字說不作止戈為武兮曽試於京國通天為王兮必舒於禁籥孰不能成始成終誰不道或詳或略秋闈較藝終期李廣之雙鵰紫殿唱名果中禰衡之一鶚大凢法既乆而必弊士貽患而益深謂罷於開封則逺方之隘者空自韞玉取諸太學則不肖之富者私於懐金雖負凌雲之志未酧題柱之心三舍既興賄賂公行於庠序一年為限孤寒半老於山林自是憤愧者莫不顰眉公正者為之切齒思罷者而未免欲改之而未止羽翼成商山之父謳歌歸吾君之子諌必行言必聽焉此道飄飄而後起思子臺賦余先君宫師之友史君諱經臣字彦輔眉山人與其弟沆子凝皆竒士博學能文慕李文饒之為人而舉其議論彦輔舉賢良不中第子凝以進士得官止著作佐郎皆早死且無子有文數百篇皆亡之余少時常見彦輔所作思子臺賦上援秦皇下逮晋惠反復哀切有補於世蓋記其意而亡其辭乃命過作補亡之篇庶㡬君子猶得見斯人胸懐髣髴也客有自蜀游梁傃關而東覧河華之形勝兮訪秦漢之遺宫得巋然之頽基兮並湖城之西墉弔漢武之暴怒兮悼戾園之憫凶聞父老之哀歎兮猶有歸來望思之遺恫吁犬臺之纔頰兮實咀毒而銜鋒敗趙國於俛仰兮又將覆劉氏之宗間漢武之多忌兮謂左右之皆戎殺楊石而未厭兮又瘞禍于宫中狃君王之好殺兮視人命猶昆蟲死者㡬何人兮豈問骨肉與王公惑狂傅之淺謀兮不忍忿忿而殺充上曽不鑒余之無聊兮實有豕心負此名而欲亡兮天下其孰吾容茍逭死於泉鳩兮兾稍乆而自理遘大患於倉猝兮懐孤憤於永已念君老而孰圖兮嗟肉食其多鄙獨三老與千秋兮懐愛君之眷眷犯雷霆之方怒兮消積禍於一言既沉寃之無告兮戮讒人其已晚幸曽孫之無恙兮或慰夫九原雖築臺其何救兮固知已矣之不諫魂㷀㷀乎其歸來兮蓋庶㡬於復見也昔秦之亡也禍始於扶蘇眇斯髙之羸豕兮視其君猶乳虎曽纊息之未定兮乃敢探其穴而啗其雛在晉四世有君不惠孽婦晨雊彊王定制惟愍懐之遭離兮實追蹤於漢戾顧孱后之何知兮亦號呼於既逝寫餘哀於江陵兮發故臣之幽契仍築臺以望思兮蓋援武以自例嗚呼噫嘻可弔而不可哂兮亦各其子也彼茂陵之雄傑兮係九戎而鞭百蠻笑堯禹而陋湯武兮蓋將與黄帝俱仙及其失道於㡬㣲兮狐鬼生於左臂如嬰兒之未孩兮易耳目而不知甘泉咫尺而不通兮與式乾其何異既上配於秦皇兮又下比於晉惠君子是以知狂聖之本同而聪明之不可恃也覧觀古初孰哲孰愚皆知指笑乎前人而莫知後之視余方漢武之盛也肯自比於驪山之朽骨而况於金墉之獨夫乎自今觀之三后一律皆以信讒而殺子暱姦而敗國吾築䑓以寄哀信同名而齊實彼昏庸者固不足告也吾將以為明王之龜䇿自建元以來張湯主父偃之流與兩丞相三長史之徒皆以無罪而夷滅一言以就誅曽無興哀於既徃一洗其無辜獨於㨿也悲歌慷慨泣涕躊躇嗚呼哀哉莫有以楚靈王之言告者曰人之愛其子也亦如余乎天道好還以徳為符惟孟徳之鷙忍兮亦嗜殺以為娯彼楊公之愛脩兮豈減吾之蒼舒恨元化之不可作兮然後知䑕軰之果無同舐犢於晚歳兮又何怨於老臞吾將以嗜殺為戒也故於末而并書東坡全集巻三十三
