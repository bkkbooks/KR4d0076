body:
  text: 東坡全集卷九十三宋蘇軾撰書後二十八首書王奧所藏太宗御書後日行於天委照萬物之上光氣所及或流為慶雲結為丹砂初豈有意哉太宗皇帝以武功定禍亂以文德致太平天縱之能溢於筆墨摛藻尺素之上弄翰團扇之中散流人間者幾何矣而三槐王氏得之為多子孫世守之遂為希代之寶文正之孫懿敏之子奧出以示臣軾敬拜手稽首書其後書諸公送周梓州詩後豫自元祐之初備位從官日與正孺遊三年豫既有江海之意而正孺亦慨然有歸歟之歎遂請梓州得之豫時以詩送行有掃棠隂踵畫像之語旋出領杭州二年還朝老病日加方上章請郡曰正孺已及瓜矣盍往代之遂歸老眉山乎或曰不可梓人之安正孺甚矣其去正孺如去父母子其忍奪之乃止不敢乞梓人願復借留正孺數年詔許之而大丞相吕公典領實録見熙寧中正孺為御史時所言事歎曰君子哉斯人也因言於上除正孺直祕閣士大夫以才能論議取合一時可也使人於十年之後徐觀其所為心服而無異議我亦無愧難矣正孺有書來欲刻諸公送行詩於石求豫為跋尾乃記所聞以遺之且使梓人知豫前詩卒章之意未始一日忘也書孟德傳後子由書孟德事見寄余既聞而異之以為虎畏不懼已者其理似可信然世未有見虎而不懼者則斯言之有無終無所試之然曩余聞忠萬雲安多虎有婦人晝日置二小兒沙上而浣衣於水者虎自山上馳來婦人倉皇沈水避之二小兒戲沙上自若虎熟視久之至以首抵觸庶幾其一懼而兒癡竟不知怪虎亦卒去意虎之食人先被之以威而不懼之人威無所從施歟有言虎不食醉人必坐守之以俟其醒俟其懼也有人夜自外歸見有物蹲其門以為豬狗類也以杖擊之即逸去至山下月明處則虎也是人非有以勝虎而氣巳蓋之矣使人之不懼皆如嬰兒醉人與其未及知之時則虎畏之無足怪者故書其末以信子由之説書六一居士傳後蘇子曰居士可謂有道者也或曰居士非有道者也有道者無所挾而安居士之於五物捐世俗之所爭而拾其所棄者也烏得為有道乎蘇子曰不然挾五物而後安者惑也釋五物而後安者又惑也且物未始能纍人也軒裳圭組且不能為纍而况此五物乎物之所以能纍人者以吾有之也吾與物俱不得巳而受形於天地之間其孰能有之而或者以為巳有得之則喜喪之則悲今居士自謂六一是其身均與五物為一也不知其有物耶物有之也居士與物均為不能有其孰能置得喪於其間故曰居士可謂有道者也雖然自一觀五居士猶可見也與五為六居士不可見也居士殆將隱矣書琅琊篆後秦始皇帝二十六年初并天下二十八年親巡東方海上登琅琊臺觀出日樂之忘歸徙黔首三萬家臺下刻石頌秦德焉二世元年復刻詔書其旁今頌詩亡矣其從臣姓名僅有存者而二世詔書具在自始皇帝二十八年嵗在壬午至今熙寧九年丙辰凡千二百九十五年而蜀人蘇軾來守髙密得舊紙本於民間比今所見猶為完好知其存者磨滅無日矣而廬江文勛適以事至密勛好古善篆得李斯用筆意乃摹諸石置之超然臺上夫秦雖無道然所立有絶人者文字之工世亦莫及皆不可廢後有君子得以覽觀焉正月七日甲子記書鮮于子駿楚詞後鮮于子駿作楚詞九誦以示軾軾讀之茫然而思喟然而歎曰嗟乎此聲之不作也久矣雖欲作之而聽者誰乎譬之於樂變亂之極而至於今凡世俗之所用皆夷聲夷器也求所謂鄭衛者且不可得而况於雅音乎學者方欲陳六代之物絃匏三百五篇犂然如戛釜竈撞甕盎未有不坐睡竊笑者也好之而欲學者無其師知之而欲傳者無其徒可不悲哉今子駿獨行吟坐思寤寐於千載之上追古屈原宋玉及其人於冥寞續微學之將墜可謂至矣而覽者不知其貴蓋亦無足怪者彼必嘗從事於此而後知其難且工其不學者以為苟然而巳元豐元年四月九日趙郡蘇軾書書逰湯泉詩後余之所聞湯泉七其五則今三子之所逰與秦君之賦所謂匡廬汝水尉氏驪山其二則余之所見鳳翔之駱谷與渝州之陳氏山居也皆棄於窮山之中山僧野人之所浴麋鹿猿猱之所飲惟驪山當往來之衝華堂玉甃獨為勝絶然坐明皇之纍為楊李祿山所汚使口舌之士援筆唾罵以為亡國之餘辱莫大焉今惠濟之泉獨為三子者咏歎如此豈非所寄僻逺不為當塗者所慁而後得為髙人逸士與世異趣者之所樂乎或曰明皇之纍楊李祿山之汙泉豈知惡之然則幽逺僻陋之歎亦非泉之所病也泉固無知於榮辱特以人意推之可以為抱器適用而不擇所處者之戒書歐陽公黃牛廟詩後右歐陽文忠公為峽州夷陵令日所作黃牛廟詩也軾嘗聞之於公豫昔以西京留守推官為館閣較勘時同年丁寶臣元珍適來京師夢與豫同舟泝江入一廟中拜謁堂下豫班元珍下元珍固辭豫不可方拜時神像為起鞠躬堂下且使人邀豫上耳語久之元珍私念神亦如世俗待館閣乃爾異禮耶既出門見一馬隻耳覺而語豫固莫識也不數日元珍除峽州判官巳而余亦貶夷陵令日與元珍處不復記前夢云一日與元珍泝峽謁黃牛廟入門惘然皆夢中所見豫為縣令固班元珍下而門外鐫石為馬缺一耳相視大驚乃留詩廟中有石馬繫祠門之句蓋私識其事也元豐五年軾謫居黃州宜都令朱君嗣先見過因語峽中山水偶及之朱君請書其事與詩當刻石於廟使人知進退出處皆非人力如石馬一耳何與公事而亦前定况其大者公既為神所禮而猶謂之淫祀以見其直氣不阿如此感其言有味故為録之正月二日眉山蘇軾書書蒲永升畫後古今畫水多作平遠細皺其善者不過能為波頭起伏使人至以手捫之謂有窪隆以為至妙矣然其品格特與印板水紙爭工拙於毫釐間耳唐廣明中處士孫位始出新意畫奔湍巨浪與山石曲折隨物賦形盡水之變號稱神逸其後蜀人黃筌孫知微皆得其筆法始知微欲於大慈寺壽寧院壁作湖灘水石四堵營度經嵗終不肯下筆一日倉皇入寺索筆墨甚急奮袂如風須臾而成作輪瀉跳蹙之勢洶洶欲崩屋也知微既死筆法中絶五十餘年近嵗成都人蒲永升嗜酒放浪性與畫會始作活水得二孫本意自黃居寀兄弟李懷衮之流皆不及也王公富人或以勢力使之永升輒嘻笑捨去遇其欲畫不擇貴賤頃刻而成嘗與余臨壽寧院水作二十四幅每夏日挂之髙堂素壁即隂風襲人毛髮為立永升今老矣畫亦難得而世之識真者亦少如往時董羽近日常州戚氏畫水世或傳寶之如董戚之流可謂死水未可與永升同年而語也元豐三年十二月十八日夜黃州臨臯亭西齋戲書書樂毅論後魏氏春秋云夏侯玄著樂毅張良及本無肉刑論辭旨通逺傳於世然以余觀之燕師之伐齊猶未及桓文之舉也而以為幾湯武豈不過甚矣乎初玄好老莊道德之言與何晏等皆有盛名然卒陷曹爽黨中玄亦不免李豐之禍晏目玄以易之所謂深者而玄目晏以神及其遇禍深與神皆安在乎羣兒妄作名字自相刻畫類皆如此可以發千載之一笑書韓魏公黃州詩後黃州山水清逺土風厚善其民寡求而不爭其士靜而文朴而不陋雖閭巷小民知尊愛賢者曰吾州雖逺小然王元之韓魏公嘗辱居焉以誇於四方之人元之自黃遷蘄州沒於蘄然世之稱元之者必曰黃州而黃人亦曰吾元之也魏公去黃四十餘年而思之不忘至以為詩夫賢人君子天之所以遺斯民天下之所共有而黃人獨私以為寵豈其尊德樂道獨異於他邦也歟抑二公與此州之人有宿昔之契不可知也元之為郡守有德於民民懷之不忘也固宜魏公以家艱從其兄居耳民何自知之詩云有匪君子如金如錫如圭如璧金錫圭璧之所在瓦石草木被其光澤矣何必施於用奉議郎孫賁公素黃人也而客於公公知之深蓋所謂教授書記者也而軾亦公之門人謫居於黃五年治東坡築雪堂蓋將老焉則亦黃人也於是相與募公之詩而刻之石以為黃人無窮之思而吾二人者亦庶幾託此以不忘乎元豐七年十月二十六日汝州團練副使蘇軾記書李伯時山莊圖後或曰龍眠居士作山莊圖使後來入山者信足而行自得道路如見所夢如悟前世見山中泉石草木不問而知其名遇山中漁樵隱逸不名而識其人此豈強記不忘者乎曰非也畫日者常疑餅非忘日也醉中不以鼻飲夢中不以趾捉天機之所合不強而自記也居士之在山也不留於一物故其神與萬物交其智與百工通雖然有道有藝有道而不藝則物雖形於心不形於手吾嘗見居士作華嚴相皆以意造而與佛合佛菩薩言之居士畫之若出一人况自畫其所見者乎書唐氏六家書後永禪師書骨氣深穩體兼衆妙精能之至反造疏淡如觀陶彭澤詩初若散緩不收反覆不巳乃識其竒趣今法帖中有云不具釋智永白者誤收在逸少部中然亦非禪師書也云謹此代申此乃唐末五代流俗之語耳而書亦不工歐陽率更書妍緊拔羣尤工於小楷髙麗遣使購其書髙祖歎曰彼觀其書以為魁梧竒偉人也此非知書者凡書象其為人率更貌寒寢敏悟絶人今觀其書徑嶮刻厲正稱其貌耳褚河南書清逺蕭散微雜𨽻體古之論書者兼論其平生茍非其人雖工不貴也河南固忠臣但有譖殺劉洎一事使人怏怏然余嘗考其實恐劉洎末年褊忿實有伊霍之語非譖也若不然馬周明其無此語太宗獨誅洎而不問周何哉此殆天后朝許李所誣而史官不能辨也張長史草書頽然天放略有點畫處而意態自足號稱神逸今世稱善草書者或不能真行此大妄也真生行行生草真如立行如行草如走未有未能行立而能走者也今長安猶有長史真書郎官石柱記作字簡逺如晉宋間人顔魯公書雄秀獨出一變古法如杜子美詩格力天縱奄有漢魏晉宋以來風流後之作者殆難復措手栁少師書本出於顔而能自出新意一字百金非虛語也其言心正則筆正者非獨諷諫理固然也世之小人書字雖工而其神情終有睢盱側媚之態不知人情隨想而見如韓子所謂竊斧者乎抑真爾也然至使人見其書而猶憎之則其人可知矣余謫居黃州唐林夫自湖口以書遺余云吾家有此六人書子為我略評之而書其後林夫之書過我逺矣而反求於豫何哉此又未可曉也元豐四年五月十一日眉山蘇軾書書篆髓後滎陽鄭惇方字希道作篆髓六卷字義一篇凡古今字説班揚賈許二李二徐之學其精者皆在間有未盡傅以新意然皆有所考本不用意斷曲説其疑者蓋闕焉凡學術之邪正視其為人鄭君信厚君子也其言宜可信余嘗論學者之有説文如醫之有本草雖草木金石各有本性而醫者用之所配不同則寒溫補瀉之效隨用各别而自漢以來學者多以一字考經字同義異皆欲一之雕刻采繪必成其説是以六經不勝異説而學者疑焉孔子曰夫聞也者色取仁而行違居之不疑則聞為小人而詩曰允矣君子展也大成之子于征有聞無聲則聞為君子又曰君子周而不比則比為惡而易曰地上有水比以建萬國親諸侯則比為善有子曰知和而和不以禮節之亦不可行也則所謂和者同而巳矣而孔子曰君子和而不同若此者多矣喪欲速貧死欲速朽此以八字成文然猶不可一曰言各有當也而况欲以一字一之耶余愛鄭君之學簡而通故私附其後書吳道子畫後知者創物能者述焉非一人而成也君子之於學百工之於技自三代歷漢至唐而備矣故詩至於杜子美文至於韓退之書至於顔魯公畫至於吳道子而古今之變天下之能事畢矣道子畫人物如以燈取影逆來順往旁見側出橫斜平直各相乘除得自然之數不差毫末出新意於法度之中寄妙理於豪放之外所謂逰刃餘地運斤成風蓋古今一人而巳余於他畫或不能必其主名至於道子望而知其真偽也然世罕有真者如史全叔所藏平生蓋一二見而巳元豐八年十一月七日書書朱象先畫後松陵人朱君象先能文而不求舉善畫而不求售曰文以達吾心畫以適吾意而巳昔閻立本始以文學進身卒蒙畫師之恥或者以是為君病余以謂不然謝安石欲使王子敬書太極殿榜以韋仲將事諷之子敬曰仲將魏之大臣理必不爾若然者有以知魏德之不長也使立本如子敬之髙其誰敢以畫師使之阮千里善彈琴無貴賤長幼皆為彈神氣沖和不知向人所在內兄潘嶽使彈終日達夜無忤色識者知其不可榮辱也使立本如千里之達其誰能以畫師辱之今朱君無求於世雖王公貴人其何道使之遇其解衣盤礴雖余亦得攫攘其旁也元祐五年九月十八日東坡居士書書楞伽經後楞伽阿跋多羅寶經先佛所説微妙第一真實了義故謂之佛語心品祖師達磨以付二祖曰吾觀震旦所有經教惟楞伽四卷可以印心祖祖相受以為心法如醫之有難經句句皆理字字皆法後世達者神而明之如槃走珠如珠走槃無不可者若出新意而棄舊學以為無用非愚無知則狂而巳近歲學者各宗其師務從簡便得一句一偈自謂了證至使婦人孺子抵掌嬉笑爭談禪悅髙者為名下者為利餘波末流無所不至而佛法微矣譬如俚俗醫師不由經論直授方藥以之療病非不或中至於遇病輒應懸斷死生則與知經學古者不可同日語矣世人徒見其有一至之功或捷於古人因謂難經不學而可豈不誤哉楞伽義趣幽眇文字簡古讀者或不能句而况遺文以得義忘義以了心者乎此其所以寂寥於是幾廢而僅存也太子太保樂全先生張公安道以廣大心得清淨覺慶厯中嘗為滁州至一僧舍偶見此經入手悅然如獲舊物開卷未終夙障冰解細視筆畫手迹宛然悲喜太息從是悟入常以經首四偈發明心要軾遊於公之門三十年矣今年二月過南都見公於私第公時年七十九幻滅都盡惠光渾圜而軾亦老於憂患百念灰冷公以為可教者乃授此經且以錢三十萬使印施於江淮間而金山長老佛印大師了元曰印施有盡若書而刻之則無盡軾乃為書之而元使其侍者曉機走錢塘求善工刻之板遂以為金山常住元豐八年九月日朝奉郎新差知登州軍州兼管內勸農事騎都尉借緋蘇軾書書黃魯直李氏傳後無所厭離何從出世無所欣慕何從入道欣慕之至亡子見父厭離之極燖雞出湯不極不至心地不淨如飯中沙與飯皆熟若不含糊與飯俱咽即須吐出與沙俱棄善哉佛子作清淨飯淘米去沙終不能盡不如即用本所自種元無沙米此米無沙亦不受沙非不受也無受處故書正信和尚塔銘後太安楊氏世出名僧正信表公兄弟三人其一曰仁慶故眉僧正其一曰元俊故極樂院主今太安治平院也皆有髙行而表公行解超然晚以靜覺三人皆與吾先大父職方公吾先君中大夫遊相善也熙寧初軾以服除將入朝表公適卧病入室告别霜髮寸餘目光瞭然骨盡出如畫須菩提像可畏也軾盤桓不忍去表曰行矣何處不相見軾曰公能不逺千里相從乎表笑曰佛言生正信家千里從公無不可者然吾蓋未也巳而果無恙至六年乃寂是嵗軾在錢塘夢表若告别者又十五年其徒法用以其所作偈頌及塔記相示乃書其末書朝無咎所作杜輿子師字説後易曰君子得輿民所載也小人剝廬終不可用也夫君子得輿下完而上未具也小人剝廬上壯而下撓也下完而上未具吾安寢其中民將載之上壯而下撓疾走不顧猶懼壓焉今君學修於身行修於家而祿未及既完其下矣故豫以是名字之與無咎意初無異者而其文約其義近不足以發夫人之志若無咎者可謂富於言而妙於理者也書東臯子傳後豫飲酒終日不過五合天下之不能飲無在豫下者然喜人飲酒見客舉杯徐引則豫胸中為之浩浩焉落落焉酣適之味乃過於客間居未嘗一日無客客至未嘗不置酒天下之好飲亦無在豫上者常以謂人之至樂莫若身無病而心無憂我則無是二者矣然人之有是者接於豫前則豫安得全其樂乎故所至當蓄善藥有求者則與之而尤喜釀酒以飲客或曰子無病而多蓄藥不飲而多釀酒勞己以為人何也豫笑曰病者得藥吾為之體輕飲者困於酒吾為之酣適蓋專以自為也東臯子待詔門下省日給酒三升其弟靜問曰待詔樂乎曰待詔何所樂但美醖三升殊可戀耳今嶺南法不禁酒豫既得自釀月用米一斛得酒六斗而南雄廣惠循梅五太守間復以酒遺豫略計其所獲殆過於東臯子矣然東臯子自謂五斗先生則日給三升救口不暇安能及客乎若豫者乃日有二升五合入野人道士腹中矣東臯子與仲長子光遊好養性服食預刻死日自為墓志豫蓋友其人於千載或庶幾焉書黃子思詩集後豫嘗論書以謂鍾王之迹蕭散簡逺妙在筆畫之外至唐顔栁始集古今筆法而盡發之極書之變天下翕然以為宗師而鍾王之法益微至於詩亦然蘇李之天成曹劉之自得陶謝之超然蓋亦至矣而李太白杜子美以英瑋絶世之姿凌跨百代古今詩人盡廢然魏晉以來髙風絶塵亦少衰矣李杜之後詩人繼作雖間有逺韻而才不逮意獨韋應物栁宗元發纎穠於簡古寄至味於淡泊非餘子所及也唐末司空圖﨑嶇兵亂之間而詩文髙雅猶有承平之遺風其論詩曰梅止於酸鹽止於鹹飲食不可無鹽梅而其美常在鹹酸之外蓋自列其詩之有得於文字之表者二十四韻恨當時不識其妙豫三復其言而悲之閩人黃子思慶厯皇祐間號能文者豫嘗聞前輩誦其詩每得佳句妙語反復數四乃識其所謂信乎表聖之言美在鹹酸之外可以一唱而三歎也豫既與其子幾道其孫師是遊得窺其家集而子思篤行髙志為吏有異材見於墓志詳矣豫不復論獨評其詩如此書栁子厚牛賦後嶺外俗皆恬殺牛而海南為甚客自髙化載牛渡海百尾一舟遇風不順渴飢相倚以死者無數牛登舟皆哀鳴出涕既至海南耕者與屠者常相半病不飲藥但殺牛以禱富者至殺十數牛死者不復云幸而不死即歸德於巫以巫為醫以牛為藥間有飲藥者巫輒云神怒病不可復治親戚皆為却藥禁醫不得入門人牛皆死而後巳地産沈水香香必以牛易之黎黎人得牛皆以祭鬼無脫者中國人以沈水香供佛燎帝求福此皆燒牛肉也何福之能得哀哉豫莫能救故書栁子厚牛賦以遺瓊州僧道贇使以曉喻其鄉人之有知者庶幾其少衰乎庚辰三月十五日記書若逵所書經後楚懷比丘示我若逵所書二經經為幾品品為幾偈偈為幾句句為幾字字為幾畫其數無量而此字畫平等若一無有髙下輕重大小云何能一以忘我故若不忘我一畫之中巳現二相而况多畫如海上沙是誰磋磨自然勻平無有粗細如空中雨是誰揮灑自然蕭散無有疏密咨爾楚逵若能一念了是法門於剎那頃轉八十藏無有忘失一句一偈東坡居士説是法巳復還其經書孫元忠所書華嚴經後余聞世間凡富貴人及諸天龍鬼神具大威力者修無上道難造種種福業易所發菩提心旋發旋忘如飽滿人厭棄飲餐所作福業舉意便成如一滴水流入世間即為江河是故佛説此等真可畏怖一念差失萬劫墮壞一切龍服地行天飛佛在依佛佛成依僧皆以是故維鎮陽平山子龍靈變莫測常依覺實二大比丘有大檀越孫溫靖公實能致龍與相賓友曰雨曰霽惟公所欲公之與此二大比丘及此二龍必同事佛皆受佛記故能於未來世各以願力而作佛事觀公奏疏本欲為龍作廟又恐血食與龍增業故上乞度僧以奉祠宇公之愛龍如愛其身秪令作福不令造業若推此心以及世間待物如我待我如物豫知此人與佛無二覺既圓寂公亦棄世其子元忠為公親書華嚴經八十卷纍萬字無有一點一畫見怠惰相人能攝心一念專靜便有無量應感而元忠此心盡八十卷終始若一豫知諸佛悉巳見聞若以此經置此山中則公與二士若龍在在處處皆當相見共度衆生無有窮盡而元忠與豫亦當與焉書栁子厚大鑒禪師碑後釋迦以文教其譯於中國必託於儒之能言者然後傳逺故大乘諸經至楞嚴則委曲精盡勝妙獨出者以房融筆授故也柳子厚南遷始究佛法作曹溪南嶽諸碑妙絶古今而南華今無刻石者長老重辨師儒釋兼通道學純備以謂自唐至今頌述祖師者多矣未有通亮簡正如子厚者蓋推本其言與孟軻氏合其可不使學者晝見而夜誦之故具石請豫書其文唐史元和中馬總自虔州刺史遷安南都護徙桂管經略觀察使入為刑部侍郎今以碑考之蓋自安南遷南海非桂管也韓退之祭馬公文亦云自交州抗節番禺曹溪諡號決非桂帥所當請以是知唐史之誤當以碑為正紹聖三年六月九日書金光明經後軾之幼子過其母同安郡君王氏諱閏之字季章享年四十有六以元祐八年八月一日卒于京師殯于城西惠濟院過未免喪而從軾遷於惠州日以逺去其母之殯為恨也念將祥除無以申罔極之痛故親書金光明經四卷手自裝治送虔州崇慶禪院新經藏中欲以資其母之往生也泣而言於軾曰書經之勞微矣不足以望豐報要當口誦而心通手書而身履之乃能感通佛祖升濟神明而小子愚冥不知此經皆真實語耶抑寓言也當云何見云何行軾曰善哉問也吾常聞之張文定公安道曰佛乘無大小言亦非虛實顧我所見如何耳萬法一致也我若有見寓言即是實語若無所見實寓皆非故楞嚴經云若一衆生未成佛終不於此取涅槃若諸菩薩急於度人不急於成佛盡三界衆生皆成佛已我乃涅槃若諸菩薩覺知此身無始以來皆衆生相寃親拒受內外障護即卵生相壞彼成此損人益巳即胎生相愛染留連附記有無即濕生相一切勿變為己主宰即化生相此四衆生相者與我流轉不覺不知勤苦修行幻力成就則此四相伏我諸根為涅槃相以此成佛無有是處此二菩薩皆是正見乃知佛語非寓非實今汝若能為流水長者以大願力象取無礙法水以救汝流浪渴涸之魚又能觀諸世間雖甚可愛而虛幻無實終非我有者汝即捨離如薩埵王子捨身雖甚可惡而業所驅迫深可憐憫者汝即布施如薩埵王子施虎行此捨施如飢就食如渴求飲則道可得佛可成母可拔也過再拜稽首願書其末紹聖二年八月一日金剛經跋尾聞昔有人受持諸經攝心專妙常以手指作捉筆狀於虛空中寫諸經法是人去後此寫經處自然嚴淨雨不能濕凡見聞者孰不贊歎此希有事有一比丘獨拊掌言惜此藏經止有半藏乃知此法有一念在即為塵勞而况可以聲求色見今此長者談君文初以念親故示入諸相取黃金屑書金剛經以四句偈悟入本心灌流諸根六塵清淨方此之時不見有經而况其字字不可見何者為金我觀談君孝慈忠信內行純備以是衆善莊嚴此經色相之外炳然煥發諸世間眼不具正見使此經法缺陷不全是故我説應如是見東坡居士説是法巳復還其經書事四首書劉庭式事豫昔為密州殿中丞劉庭式為通判庭式齊人也而子由為齊州掌書記得其鄉閭之言以告豫曰庭式通禮學究未及第時議娶其鄉人之女既約而未納幣也庭式及第其女以疾兩目皆盲女家躬耕貧甚不敢復言或勸納其幼女庭式笑曰吾心巳許之矣雖盲豈負吾初心哉卒娶盲女與之偕老盲女死於密庭式喪之逾年而哀不衰不肯復娶豫偶問之哀生於愛愛生於色子娶盲女與之偕老義也愛從何生哀從何出乎庭式曰吾知喪吾妻而巳有目亦吾妻也無目亦吾妻也吾若緣色而生愛緣愛而生哀色衰愛弛吾哀亦忘則凡揚袂倚市目挑而心招者皆可以為妻也耶豫深感其言曰子功名富貴人也或笑豫言之過豫曰不然昔羊叔子娶夏侯霸女霸叛入蜀親友皆告絶而叔子獨安其室恩禮有加焉君子是以知叔子之貴也其後卒為晉元臣今庭式亦庶幾焉若不貴必且得道時坐客皆憮然不信也昨日有人自廬山來云庭式今在山中監太平觀面目奕奕有紫光步上下峻坂往復六十里如飛絶粒不食巳數年矣此豈無得而然哉聞之喜甚自以吾言之不妄也乃書以寄密人趙杲卿杲卿與庭式善且皆嘗聞余言者庭式字得之今為朝請郎杲卿字明叔鄉貢進士亦有行義元豐六年七月十五日東坡居士書書狄武襄事狄武襄公者本農家子年十六時其兄素與里人失其姓名號鐵羅漢者鬬於水濱至溺救之保伍方縛素公適餉田見之曰殺羅漢者我也人皆釋素而縛公公曰我不逃死然待我救羅漢庶幾復活若決死者縛我未晚也衆從之公默祝曰我若貴羅漢當蘇乃舉其尸出水數斗而活其後人無知者公薨其子咨詠護喪歸葬西河父老為言此元祐元年十二月五日與詠同館北客夜話及之眉山蘇軾記外曾祖程公逸事公諱仁霸眉山人以仁厚信於鄉里蜀平中朝士大夫憚逺宦官闕選土人有行義者攝公攝録參軍眉山尉有得盜蘆蔔根者實竊而所持刃誤中主人尉幸賞以劫聞獄掾受賕掠成之太守將慮囚囚坐廡下泣涕衣盡濕公適過之知其寃咋謂盜曰汝寃盍自言吾為汝直之盜果稱寃移獄公既直其事而尉掾爭不巳復移獄竟殺盜公坐逸囚罷歸不及月尉掾皆暴卒後三十餘年公晝日見盜拜庭下曰尉掾未伏待公而決前此地府欲召公暫對我叩頭爭之曰不可以我故驚公是以至今公壽盡今日我為公荷擔而往暫對即生人天子孫壽祿朱紫滿門矣公具以語家人沐浴衣冠就寢而卒軾幼時聞此語巳而外祖父壽九十舅氏始貴顯壽八十五曾孫皆仕有聲同時為監司者三人玄孫宦學益盛而尉掾之子孫微矣或謂盜德公之深不忍煩公暫對可也而獄久不決豈主者亦因以苦尉掾也歟紹聖二年三月九日軾在惠州讀陶潛所作外祖孟嘉傳云凱風寒泉之思實鍾厥心意悽然悲之乃記公之逸事以遺程氏庶幾淵明之心也南華長老重辨師逸事契嵩禪師常瞋人未嘗見其笑海月慧辨師常喜人未嘗見其怒豫在錢塘親見二人皆趺坐而化嵩既茶毗火不能壞益薪熾火有終不壞者五海月比葬面如生且微笑乃知二人以瞋喜作佛事也世人視身如金玉不旋踵為糞土至人反是豫以是知一切法以愛故壞以捨故常在豈不然哉豫遷嶺南始識南華重辨長老語終日知其有道也豫自海南還則辨巳寂久矣過南華弔其衆問塔墓所在衆曰我師昔作壽塔南華之東數里有不悅師者葬之别墓既七百餘日矣今長老明公獨奮不顧發而歸之壽塔改棺易衣舉體如生衣皆鮮芳衆乃大服東坡居士曰辨視身為何物棄之尸陀林以飼鳥烏何有安以壽塔為明公知辨者特欲以化服同異而巳乃以茗果奠其塔而書其事以遺其上足南華塔主可興師時元符三年十二月十九日東坡全集卷九十三
