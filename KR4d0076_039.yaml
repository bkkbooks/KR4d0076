body:
  text: 東坡全集巻三十九宋蘓軾撰傳十首陳公弼傳公諱希亮字公弼姓陳氏眉之青神人其先京兆人也唐廣明中始遷于眉曾祖延禄祖瓊父顯忠皆不仕公㓜孤好學年十六將從師其兄難之使治息錢三十餘萬公悉召取錢者焚其劵而去學成乃召其兄之子庸諭使學遂與俱中天聖八年進士第里人表其閭曰三儁坊始為長沙縣浮屠有海印國師者交通權貴人肆為姦利人莫敢正視公捕寘諸法一縣大聳去為雩都老吏曾腆侮法粥獄以公少年易之公視事之日首得其重罪腆叩頭出血願自新公戒而捨之㑹公築縣學腆以家財助官悉遣子弟入學卒為善吏而子弟有登進士第者巫覡歳斂民財祭鬼謂之春齋否則有火災民訛言有緋衣三老人行火公禁之民不敢犯火亦不作毁淫祠數百區勒巫爲農者七十餘家及罷去父老送之出境遣去不可皆泣曰公捨我去緋衣老人復出矣以母老乞歸蜀得劒州臨津以母憂去官服除為開封府司錄福勝塔火官欲更造度用錢三萬萬公言陜西方用兵願以此餽軍詔罷之先趙元昊未反青州民趙禹上書論事且言元昊必反宰相以禹為狂言徙建州而元昊果反禹自建州逃還京師上書自理宰相怒下禹開封府獄公言禹可賞不可罪與宰相爭不巳上卒用公言以禹爲徐州推官且欲以公爲御史㑹外戚沈氏子以姦盗殺人事下獄未服公一問得其情驚仆立死沈氏訴之詔御史劾公及諸掾史公曰殺此賊者獨我耳遂自引罪坐廢朞年盜起京西殺守令富丞相薦公可用起知房州州素無兵備民凛凛欲亡去公以牢城卒雜山河户得數百人日夜部勒聲振山南民恃以安盜不敢入境而殿侍雷甲以兵百餘人逐盜至竹山甲不能戢士所至為暴或告有大盜入境且及門公自勒兵阻水拒之身居前行命士持滿無得發士皆植立如偶人甲射之不動乃下馬拜請死曰初不知公官軍也吏士請斬甲以狥公不可獨治爲暴者十餘人勞其餘而遣之使甲以捕盜自贖時劇賊党軍子方張轉運使使供奉官崔徳贇捕之徳贇既失党軍子則以兵圍竹山民賊所嘗舍者曰向氏殺其父子三人梟首南陽市曰此党軍子也公察其寃下徳贇獄未服而党軍子獲於商州詔賜向民帛復其家流徳贇通州或言華隂人張元走夏州為元昊謀臣詔徙其族百餘口於房譏察出入飢寒且死公曰元事虛實不可知使誠有之為國者終不顧家徒堅其爲賊耳此又皆其疎屬無罪乃宻以聞詔釋之老㓜哭庭下曰今當還故鄉然奈何去父母乎至今張氏畫像祠焉代還執政欲以為大理少卿公曰法吏守文非所願願得一郡以自效乃以爲宿州州跨汴為橋水與橋爭率常壊舟公始作飛橋無柱至今㳂汴皆飛橋移滑州奏事殿上仁宗皇帝勞之曰知卿疾惡無懲沈氏子事未行詔提舉河北便糴都轉運使魏瓘劾奏公擅增損物價已而瓘除龍圖閣學士知開封府公乞廷辯既對上直公奪瓘職知越州且欲用公公言臣與轉運使不和不得為無罪力請還滑㑹河溢魚池埽且決公發禁兵捍之廬於所當决吏民涕泣更諫公堅卧不動水亦漸去人比之王尊是歳盗起宛句執濮州通判井淵上以為憂問執政可用者未及對上曰吾得之矣乃以公爲曹州不逾月悉禽其黨淮南饑安撫轉運使皆言夀春守王正民不任職正民坐免詔公乘傳徃代之轉運使調里胥米而蠲其役凡十三萬石謂之折役米米翔貴民益饑公至則除之且表其事旁郡皆得除又言正民無罪職事辦治詔復以正民爲鄂州徙知廬州虎翼軍士屯夀春者以謀反誅而遷其餘不反者數百人於廬士方自疑不安一日有竊入府舍將為不利者公笑曰此必醉耳貸而流之盡以其餘給左右使令且以守倉庫人為公懼公益親信之士皆指心誓為公死提㸃刑獄江東又移河北入爲開封府判官改判三司户部勾院又兼開拆司滎州煑鹽凢十八井歳久漸竭而有司責課如初民破産籍沒者三百一十五家公爲言還其所籍歳蠲三十餘萬斤三司簿書不治其滯留者自天禧以來朱帳六百有四明道以來生事二百一十二萬公日夜課吏凢九月而去其三之二㑹接伴契丹使還自請補外乃以爲京西轉運使石塘河役兵叛其首周元自稱周大王震動汝洛間公聞之即日輕騎出按吏請以兵從公不許賊見公輕出意色閒和不能測則相與列訴道周公徐問其所苦命一老兵押之曰以是付葉縣聴吾命既至令曰汝已自首皆無罪然必有首謀者衆不敢隠乃斬元以狥而流軍校一人其餘悉遣赴役如初遷京東轉運使維州參軍王康赴官道博平博平大猾有號截道虎者毆康及其女幾死吏不敢問博平𨽻河北公移捕甚急卒流之海島而劾吏故縱坐免者數人山東羣盜為是屏息徐州守陳昭素以酷聞民不堪命他使者不敢按公發其事徐人至今徳之移知鳳翔倉粟支十二年主者以腐敗爲憂歳饑公發十二萬石以貸有司憂恐公以身任之是歳大熟以新易陳官民皆便之于闐使者入朝過秦州經畧使以客禮享之使者驕甚留月餘壊傳舍什物無數其徒入市掠飲食人户畫閉公聞之謂其僚曰吾嘗主契丹使得其情其人初不敢暴横皆譯者教之吾痛繩以法譯者懼則自不敢動矣况此小國乎乃使教練使持符告譯者曰入吾境有秋毫不如法吾且斬若取軍令狀以還使者亦素聞公威名至則羅拜庭下公命坐兩廊飲食之䕶出諸境無一人譁者始州郡以酒相餉例皆私有之而法不可公以遺㳺士之貧者既而曰此亦私也以家財償之且上書自劾求去不已坐是分司西京未幾致仕卒享年六十四仕至太常少卿贈工部侍郎娶程氏子四人忱今為度支郎中恪卒於滑州推官恂今為大理寺丞慥未仕公善著書尤長於易有集十巻制器尚象論十二篇辨鉤隠圖五十四篇爲人清勁寡欲長不逾中人面瘦黒目光如冰平生不假人以色自王公貴人皆嚴憚之見義勇發不計禍福必極其志而後已所至姦民猾吏易心改行不改者必誅然實出於仁恕故嚴而不殘以教學養士為急輕財好施篤於恩義少與蜀人宋輔㳺輔卒於京師母老子少公養其母終身而以女妻其孤端平使與諸子㳺學卒與忱同登進士第當䕃補子弟輒先其族人卒不及其子慥公於軾之先君子爲丈人行而軾官於鳳翔實從公二年方是時年少氣盛愚不更事屢與公爭議至形於言色已而悔之竊嘗以爲古之遺直而恨其不甚用無大功名獨當時士大夫能言其所為公没十有四年故人長老日以衰少恐遂就湮没欲私記其行事而恨不能詳得范景仁所爲公墓誌又以所聞見補之爲公傳軾平生不爲行狀墓碑而獨為此文後有君子得以考覽焉賛曰聞之諸公長者陳公弼面目嚴冷語言確訒好面折人士大夫相與燕㳺聞公弼至則語笑寡味飲酒不樂坐人稍稍引去其天資如此然所立有絶人者諫大夫鄭昌有言山有猛獸藜藿為之不採淮南王謀反論公孫丞相若發䝉耳所憚獨汲黯使公弼端委立於朝其威折衝於千里之外矣方山子傳方山子光黄間隠人也少時慕朱家郭解為人閭里之俠皆宗之稍壯折節讀書欲以此馳騁當世然終不遇晩乃遯於光黄間曰岐亭菴居蔬食不與世相聞棄車馬毁冠服徒歩徃來山中人莫識也見其所著帽方聳而髙曰此豈古方山冠之遺像乎因謂之方山子余讁居于黄過岐亭適見焉曰嗚呼此吾故人陳慥季常也何為而在此方山子亦矍然問余所以至此者余告之故俯而不荅仰而笑呼余宿其家環堵蕭然而妻子奴婢皆有自得之意余既聳然異之獨念方山子少時使酒好劒用財如糞土前十有九年余在岐下見方山子從兩騎挾二矢㳺西山鵲起于前使騎逐而射之不獲方山子怒馬獨出一發得之因與余馬上論用兵及古今成敗自謂一世豪士今幾時耳精悍之色猶見於眉間而豈山中之人哉然方山子世有勲閥當得官使從事於其間今已顯聞而其家在洛陽園宅壯麗與公侯等河北有田歳得帛千匹亦足以富樂皆棄不取獨來窮山中此豈無得而然哉余聞光黄間多異人徃徃陽狂垢汙不可得而見方山子儻見之與率子廉傳率子廉衡山農夫也愚朴不遜衆謂之率牛晩𨽻南嶽觀爲道士觀西南七里有紫虛閣故魏夫人壇也道士以荒寂莫肯居者惟子廉樂居之端黙而已人莫見其所爲然頗嗜酒徃徃醉卧山林間雖大風雨至不知虎狼過其前亦莫害也故禮部侍郎王公祜出守長沙奉詔禱南嶽訪魏夫人壇子廉方醉不能起直視公曰村道士愛酒不能常得得輒徑醉官人恕之公察其異載與俱歸居月餘落漠無所言復送還山曰尊師韜光内映老夫所不測也當以詩奉贈既而忘之一日晝寢夢子亷來索詩乃作二絶句書板置閣上衆道士驚曰率牛何以得此太平興國五年六月十七日忽使謂觀中人曰吾將有所適閣不可無人當速遣繼我者衆道士自得王公詩稍異之矣及是驚曰天暑如此率牛安徃狼狽徃視則死矣衆始大異之曰率牛乃知死日耶葬之嶽下未幾有南臺寺僧守澄自京師還見子亷南薰門外神氣清逸守澄問何故出山笑曰閒逰耳寄書與山中人澄歸乃知其死驗其書則死日也發其塜杖屨而已東坡居士曰士中有所挾雖小技不輕出也况至人乎至人固不可得識至人者豈易得哉王公非得道不能知率牛之異也居士嘗作三槐堂記意謂公非獨慶流其子孫庶幾身得道者及見率子亷事益信其然公詩不見全篇書以遺其曾孫鞏使求之家集而補之或刻石置紫虛閣上云僧圓澤傳洛師惠林寺故光禄卿李憕居第禄山䧟東都憕以居守死之子源少時以貴㳺子豪侈善歌聞於時及憕死悲憤自誓不仕不娶不食肉居寺中五十餘年寺有僧圓澤富而知音源與之㳺甚宻促膝交語竟日人莫能測一日相約㳺蜀青城峩眉山源欲自荆州泝峽澤欲取長安斜谷路源不可曰吾已絶世事豈可復道京師哉澤黙然久之曰行止固不由人遂自荆州路舟次南浦見婦人錦襠負甖而汲者澤望而泣曰吾不欲由此者為是也源驚問之澤曰婦人姓王氏吾當為之子孕三歳矣吾不來故不得乳今既見無可逃者公當以符咒助我速生三日浴兒時願公臨我以笑為信後十三年中秋月夜杭州天竺寺外當與公相見源悲悔而爲具沐浴易服至暮澤亡而婦乳三日徃視之兒見源果笑具以語王氏出家財葬澤山下源遂不果行反寺中問其徒則既有治命矣後十三年自洛適呉赴其約至所約聞葛洪川畔有牧童扣牛角而歌之曰三生石上舊精魂賞月吟風不要論慙愧情人逺相訪此身雖異性長存呼問澤公健否荅曰李公真信士然俗緣未盡慎勿相近惟勤脩不墮乃復相見又歌曰身前身後事茫茫欲話因緣恐斷腸呉越山川尋已遍却回煙棹上瞿塘遂去不知所之後二年李徳裕奏源忠臣子篤孝拜諫議大夫不就竟死寺中年八十此出袁郊所作甘澤謡以其天竺故事故書以遺寺僧舊文煩冗頗為刪改杜處士傳杜仲郁里人也天資厚朴而有逺志聞黄環名從之㳺因陳曰願輔子半夏幸仁憫焉使得旋復自古揚㩁環曰子言匪實宜蚤休少從容將訶子矣仲曰人之相仁雖不百合亦自然同况吐新意以前乎吾聞夫子雌黄冠衆故求决明於子今子微銜吾為其非儕乎曰吾如貧者食無餘糧獨活久矣子今屑就何以充蔚子乎苟迹子之素狂若所請亦大激矣試聞子之志也曰敢問士何以益智行何以非亷先王不留行者何事也曰此匪子解也夫得所託者猶之射干臨於層城也居非地者猶之困于蒺藜也今子宛如易之所謂井渫不食也非揚淘之而欲其中空清是坐恒山而望扶桑耳勢不可及已使投垢熟艾以求别當世則與之無名異矣某䝉甚願子白之曰吾自通微預知子髙良故謾矜子以短而欲亂子言子能詳微意知所激刺亦無患子矣雖然澤蘭必馨今王明苟起子為赤車使者且將封子子甘從之乎曰吾大則欲伏神以安息小者吾殊于衆而已矣雖登文石摩螭頭不願也古人有三聘而起松蘿者迫實用也余將杜衡門以居之爲一白頭翁雖五加皮幣於我如水萍耳豈當歸之哉環曰然世有隂險以求石斛之禄者五味子之言可也雖吾亦續隨子矣或斥之曰船破須筎酒成於麴猶君之錄英才也彼貪禄角進者可誚之也若夫躑躅而還鄉甘遂意於丁沉則吾之所謂獨行之民可使君子懐寶烏久居此為哉余愛仲善依人而嘉環能發其心故錄之爲傳萬石君羅文傳羅文歙人也其上世常隠龍尾山未嘗出爲世用自秦棄詩書不用儒學漢興蕭何軰又以刀筆吏取將相天下靡然效之爭以刀筆進雖有竒産不暇推擇也以故羅氏未有顯人及文資質温潤縝宻可喜隠居自晦有終焉之意里人石工獵龍尾山因窟入見文塊然居其間熟視之笑曰此所謂邦之彦也豈得自棄於岩穴耶乃相與定交磨礱成就之使從諸生學因得與士大夫㳺見者咸愛重焉武帝方向學喜文翰得毛頴之後毛純爲中書舍人純一日奏曰臣幸得收錄以備任使然以臣之愚不能獨大用今臣同事皆小器頑滑不足以置左右願得召臣友人羅文以相助詔使隨計吏入貢䝉召見文徳殿上望見異焉因玩弄之曰卿久居荒土得被漏泉之澤涵濡浸漬久矣不自枯槁也上復叩擊之其音鏗鏗可聽上喜曰古所謂玉質而金聲者子真是也使待詔中書久之拜舍人是時墨卿楮先生皆以能文得幸而四人同心相得歡甚時人以爲文苑四貴毎有詔命典䇿皆四人謀之其大約雖出於上意必使文潤色之然後琢磨以墨卿謀畫以毛純成以授楮先生使行之四方逺夷無不逹焉上嘗嘆曰是四人者皆國寶也然重厚堅貞行無瑕玷自二十石至百石吏皆無如文者命尚方以金作室以蜀文錦為薦褥賜之其後于闐進美玉上使以玉作小屏風賜之并賜髙麗所獻銅瓶為飲器親愛日厚如純軰不敢望也上得羣才用之遂内更制度脩律厯講郊祀治刑獄外征伐四夷詔書符檄禮文之事皆文等預焉上思其功制詔丞相御史曰蓋聞議法者常失於太深論功者常失於太薄有功而賞不及雖唐虞不能以相勸中書舍人羅文久典書籍助成文治厥功茂焉其以歙之祁門三百户封文號萬石君世世勿絶文為人有廉隅不可犯然搏擊非其任喜與老成知書者㳺常曰吾與兒軰處每慮有玷缺之患其自愛如此以是小人多輕疾之或讒於上曰文性貪墨無潔白稱上曰吾用文掌書翰取其便事耳雖貪墨吾固知不如是亦何以見其才自是左右不敢復言文體有寒疾每冬月侍書輒面冰不可運筆上時賜之酒然後能書元狩中詔舉賢良方正淮南王安舉端紫以對䇿髙第待詔翰林超拜尚書僕射與文並用事紫雖乏文采而令色尤可喜以故常在左右文浸不用上幸甘泉祠河東廵朔方紫常扈從而文留守長安禁中上還見文塵垢面目頗憐之文因進曰陛下用人誠如汲黯之言後來者居上耳上曰吾非不念爾以爾年老不能無少圓缺故也左右聞之以爲上意不悦因不復顧省文乞骸骨伏地上詔使駙馬都尉金日磾翼起之日磾初不知書素惡文所為因是擠之殿下顛仆而卒上憫之令宦者瘞於南山下子堅嗣堅資性温潤文采縝宻不減文而器局差小起家為文林郎侍書東宫昭帝立以舊恩見寵帝春秋益壯喜寛大博厚者顧堅器小斥不用堅亦以落落難合於世自視與瓦礫同昭帝崩大將軍霍光以帝平生玩好器用後宮美人置之平陵堅自以有舊恩乞守陵拜陵寢郎後死葬平陵自文生時宗族分散四方髙才竒特者王公貴人以金帛聘取為從事舍人其下亦與巫醫書筭之人㳺皆有益於其業或因以致富焉贊曰羅氏之先無所見豈左氏所稱羅國哉考其國邑在江漢之間為楚所滅子孫疑有散居黟歙間者嗚呼國既破亡而後世猶以知書見用至今不絶人豈可以無學術哉江瑤柱傳生姓江名瑤柱字子美其先南海人十四代祖媚川避合浦之亂徙家閩越閩越素多士人聞媚川之來甚喜朝夕相與探討又從而鐫琢之媚川深自晦匿嘗喟然謂其孫子曰匹夫懐寶吾知其罪矣尚子平何人哉遂棄其孥浪迹泥途中潛徳不耀人莫知其所終媚川生二子長曰添丁次曰馬頰始來鄞江今為明州奉化人瑶柱世孫也性温平外慤而内淳稍長去襮纇頎長而白晳圓直如柱無絲髪附麗態父友庖公異之且曰吾閲人多矣昔人夢資質之美有如玉川者是兒亦可謂瑶柱矣因以名之生寡欲然極好滋味合口不論人是非人亦甘心焉獨與峨嵋洞車公清溪遐丘子望湖門章舉先生善出處大畧相似所至一坐盡傾然三人者亦自下之以謂不可及也生亦自養名聲動天下鄉閭尤愛重之凢歳時節序冠婚慶賀合親戚燕朋友必延爲上客一不至則慊然皆云無江生不樂生頗厭苦之間或逃避於寂寞之濵好事者雖解衣求之不憚也至於中朝逹官名人㳺宦東南者徃徃指四明為善地亦屢屬意於江生惟扶風馬太守不甚禮之生浸不恱跳身武林道感溫風得中乾疾為親友强起置酒髙㑹座中有合氏子亦江淮間名士也輒坐生上衆口歎美之曰聞客名舊矣蓋鄉曲之譽不可盡信韓子所謂面目可憎語言無味者非客耶客第歸人且不愛客而棄之海上遇逐臭之夫則客歸矣尚何與合氏子爭乎生不能對大慚而歸語其友人曰吾棄先祖之戒不能深藏海上而薄㳺樽爼間又無馨徳發聞惟腥宜見擯於合氏子而府公貶我固當從吾子㳺於水下苟不得志雖粉身亦何憾吾去子矣已而果然其後族人復盛於四明然聲譽稍減云太史公曰里諺有云果蓏失地則不榮魚龍失水則不神物固且然人亦有之嗟乎瑶柱誠美士乎方其為席上之珍風味藹然雖龍肝鳳髓有不及者一旦出非其時而䘮其真衆人且掩鼻而過之士大夫有識者亦為品藻而置之下士之出處不可不慎也悲夫黄甘陸吉傳黄甘陸吉者楚之二髙士也黄隠於泥山陸隠於蕭山楚王聞其名遣使召之陸吉先至賜爵左庶長封洞庭君尊寵在羣臣右久之黄甘始來一見拜温尹平陽侯班視令尹吉起隠士與甘齊名入朝久尊貴用事一旦甘位居上吉心銜之羣臣皆疑之㑹秦遣蘇軫鍾離意使楚楚召燕章華臺羣臣皆與甘坐上坐吉咈然謂之曰請與子論事甘曰唯唯吉曰齊楚約西擊秦吾引兵踰闗身犯霜露與枳棘最下者同甘苦率家奴千人戰季洲之上拓地至漢南而歸子功孰與甘曰不如也曰神農氏之有天下也吾剥膚剖肝怡顔下氣以固蔕之術獻上上喜之命注記官陶𢎞景狀其方畧以付國史出爲九江守宣上徳澤使童兒亦懐之子才孰與甘曰不如也吉曰是二者皆出吾下而位吾上何也甘徐應之曰君何見之晩也毎歳太守勸駕乘傳入金門上玉堂與虞荔申梠梅福棗嵩之徒列侍上前使數子者口呿舌縮不復上齒牙間當此之時屬之於子乎屬之於我乎吉黙然良久曰屬之於子矣甘曰此吾之所以居子之上也於是羣臣皆服歳終吉以疾免更封甘子為穰侯吉之子爲下邳侯穰侯遂廢不顯下邳以美湯藥官至陳州治平太史公曰田文論相呉起説相如回車廉頗屈姪欲弊衣尹姬悔甘吉亦然傳曰女無好醜入宮見妬士無賢不肖入朝見嫉此之謂也雖美惡之相遼嗜好之不齊亦焉可勝道哉葉嘉傳葉嘉閩人也其先處上谷曾祖茂先養髙不仕好㳺名山至武夷悦之遂家焉嘗曰吾植功種徳不爲時採然遺香後世吾子孫必盛於中土當飲其惠矣茂先𦵏郝源子孫遂為郝源民至嘉少植節操或勸之業武曰吾當爲天下英武之精一槍一旗豈吾事哉因而㳺見陸先生先生竒之爲著其行錄傳於時方漢帝嗜閱經史時建安人爲謁者侍上上讀其行錄而善之曰吾獨不得與此人同時哉曰臣邑人葉嘉風味恬淡清白可愛頗負其名有濟世之才雖羽知猶未詳也上驚勅建安太守召嘉給傳遣詣京師郡守始令採訪嘉所在命齎書示之嘉未就遣使臣督促郡守曰葉先生方閉門制作研味經史志圖挺立必不屑進未可促之親至山中爲之勸駕始行登車遇相者揖之曰先生容質異常矯然有龍鳳之姿後當大貴嘉以皂囊上封事天子見之曰吾久飫卿名但未知其實爾我其試哉因顧謂侍臣曰視嘉容貌如鐵資質剛勁難以遽用必槌提頓挫之乃可遂以言恐嘉曰碪斧在前鼎鑊在後將以烹子子視之如何嘉勃然吐氣曰臣山藪猥士幸惟陛下採擇至此可以利生雖粉身碎骨臣不辭也上笑命以名曹處之又加樞要之務焉因誡小黄門監之有頃報曰嘉之所為猶若粗疎然上曰吾知其才第以獨學未經師耳嘉爲之屑屑就師頃刻就事已精熟矣上乃勅御史歐陽髙金紫光禄大夫鄭當時甘泉侯陳平三人與之同事歐陽疾嘉初進有寵曰吾屬且為之下矣計欲傾之㑹天子御延英促召四人歐但熱中而已當時以足擊嘉而平亦以口侵陵之嘉雖見侮為之起立顔色不變歐陽悔曰陛下以葉嘉見託吾軰亦不可忽之也因同見帝陽稱嘉美而隂以輕浮訿之嘉亦訴於上上爲責歐陽憐嘉視其顔色久之曰葉嘉真清白之士也其氣飄然若浮雲矣遂引而宴之少選間上鼓舌欣然曰始吾見嘉未甚好也久味其言令人愛之朕之精魄不覺洒然而醒書曰啓乃心沃朕心嘉之謂也於是封嘉鉅合侯位尚書曰尚書朕喉舌之任也由是寵愛日加朝廷賔客遇㑹宴享未始不推於嘉上日引對至於再三後因侍宴苑中上飲踰度嘉輒苦諫上不悦曰卿司朕喉舌而以苦辭逆我余豈堪哉遂唾之命左右仆于地嘉正色曰陛下必欲甘辭利口然後愛耶臣雖言苦久則有效陛下亦嘗試之豈不知乎上顧左右曰始吾言嘉剛勁難用今果見矣因含容之然亦以是疎嘉嘉既不得志退去閩中既而曰吾末如之何也已矣上以不見嘉月餘勞於萬幾神薾思困頗思嘉因命召至喜甚以手撫嘉曰吾渴見卿久也遂恩遇如故上方欲南誅兩越東擊朝鮮北逐匃奴西伐大宛以兵革為事而大司農奏計國用不足上深患之以問嘉嘉為進三䇿其一曰㩁天下之利山海之資一切籍於縣官行之一年財用豐贍上大悦兵興有功而還上利其財故㩁法不罷管山海之利自嘉始也居一年嘉告老上曰鉅合侯其忠可謂盡矣遂得爵其子又令郡守擇其宗支之艮者毎歳貢焉嘉子二人長曰摶有父風故以襲爵次子挺抱黄白之術比於摶其志尤淡泊也嘗散其資拯鄉閭之困人皆徳之故鄉人以春伐鼓大㑹山中求之以為常贊曰今葉氏散居天下皆不喜城邑惟樂山居氏于閩中者蓋嘉之苖裔也天下葉氏雖夥然風味徳馨為世所貴皆不及閩閩之居者又多而郝源之族為甲嘉以布衣遇天子爵徹侯位八座可謂榮矣然其正色苦諫竭力許國不為身計蓋有以取之夫先王用於國有節取於民有制至於山林川澤之利一切與民嘉為䇿以㩁之雖救一時之急非先王之舉也君子譏之或云管山海之利始於鹽鐵丞孔僅桑𢎞羊之謀也嘉之䇿未行於時至唐趙賛始舉而用之温陶君傳石中美字信美中牟人也本姓麥氏既破隨母羅氏去其夫而適石氏因冒其姓始中美之生也其父太卜氏以連山筮之遇師之爻是謂師之革曰生乎土成乎水而變乎火坎以輮之坤以布之釡以熟之口以内之腹以藏之美在其中而暢於四支能者樂之以爲大腹不能者傷之以爲心病衆所説也善孰大焉故因以名字之中美㓜輕躁疎散與物不合得其鄉人儲子之意因使從滏水湯先生㳺既熟遂陶而成之爲人白晳而長温厚柔忍在諸石中最有名儲子因秦故司馬錯李斯子由趙髙閻樂並薦於秦王得與圃田蔡甲肥鄉羊奭内黄韓音子俱召見是時王方省覽文書日􅉴未食見之甚喜曰卿等向者安在何相見之晩耶未見君子惄如調飢卿等之謂也由是皆得進見充上心腹賜爵土更上食典御旦夕召對所獻納時或粗疎上未嘗不盡善也秦王以嫪毐事出文信侯而遷太后怒恚數日不食中美賜爵徹侯食温定陶二縣號温陶君中美既被任用凢有造作自丞相以下莫不是之其為人柔和有以塞讒人之口故也他日秦王坐朝日旰意有所思亟召中美將虛以納之中美不熟計以進其説頗剛鯁志不快之者累日有博士單軫説上曰爲其所傷矣宜有以下之即無患因進其弟子已升元華於上上意稍平然自是遂疎中美不得為尚食矣中美曰吾為尚食日夕自謂不素餐兮者今吾與羊生軰皆不得進縱復有用者將誅辱乎昔也得充心腹而今也遽不信是有不善我之心雖使時或思我彼將不盡矣遂稱疾以侯就第其後子孫生郡郭者散居四方自號渾氏扈氏索氏石氏爲四族云東坡全集巻三十九
