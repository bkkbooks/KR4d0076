body:
  text: 東坡全集卷五十六宋蘇軾撰奏議一十首乞賜州學書板狀元祐四年八月某日龍圖閣學士朝奉郎知杭州蘇軾狀奏右臣伏見本州學見管生員二百餘人及入學參假之流日益不已蓋見朝廷尊用儒術更定貢舉條法漸復祖宗之舊人人慕義學者日衆若學糧不繼使至者無歸稍稍引去甚非朝廷樂育之意前知州熊本曽奏乞用廢罷市易務書板賜與州學印賃收錢以助學糧或乞賣與州學限十年還錢今蒙都省指揮只限五年見今轉運司差官重行估價約計一千四百六貫九百八十三文若依限送納即州學歲納二百八十一貫三百九十七文五年之間深為不易學者旦夕闕食而望利於五年之後何補於事而朝廷歲得二百八十一貫三百九十七文如江海之中增損涓滴了無所覺徒使一方士民以謂朝廷既已捐利與民廢罷市易所放欠負動以萬計農商小民銜荷聖澤莫知紀極而獨於此飢寒儒素之士惜毫末之費猶欲於此追收市易之息流傳四方為損不小此乃有司出納之吝非朝廷寬大之政也臣以侍從備位守臣懷有所見不敢不盡伏望聖慈特出宸斷盡以市易書板賜與州學更不估價收錢所貴稍服士心以全國體謹録奏聞伏候敕旨貼黃臣勘會市易務元造書板用錢一千九百五十一貫四百六十九文自今日以前所收淨利已計一千八百八十九貫九百五十七文今若賜與州學除已收淨利外只是實破官本六十一貫五百一十二文伏乞詳酌施行奏為法外刺配罪人待罪狀元祐四年八月某日龍圖閣學士朝奉郎知杭州蘇軾狀奏右臣自入境以來訪聞兩浙諸郡近年民間例織輕疏糊藥紬絹以備送納和買夏稅官吏欲行揀擇而姦猾人户及攬納人遞相扇和不納好絹致使官吏無由揀擇期限既迫不免受納歲歲如此習以成風故京師官吏軍人但請兩浙衣賜皆不堪好上京綱運歲有估剝日以滋多去年估剝至九千餘貫元納專典枷鎖鞭撻典賣竭産有不能償姑息之弊一至於此臣自到郡欲漸革此弊即指揮受納官吏稍行揀擇至七月二十七日有百姓二百餘人於受納場前大叫數聲官吏軍民並皆辟易遂相率入州衙詣臣喧訴臣以理喻遣方稍引去臣知此數百人必非齊同發意當有凶姦之人為首糾率密行葺探當日據受納官仁和縣丞陳皓狀申有人户顔巽男顔章顔益納和買絹五匹並是輕疏糊藥丈尺短少以此揀退其逐人却將専典拑撮及與攬納人等數百人對監官髙聲叫噉奔走前去臣即時差人捉到顔章顔益二人枷送右司理院禁勘只明日人户一時送納好絹更無一人敢行喧閙續據右司理院勘到顔章顔益招為本家有和買紬絹共三十七匹章等為見遞年例只是將輕疏糊藥紬絹納官今年本州為綱運估剝數多以此指揮要納好絹章等既請和買官錢每匹一貫不合將低價收買昌化縣輕疏糊藥短絹納官其顔章又不合與兄顔益商量若或揀退即須拑撮専揀扇搖衆戶叫噉投州嚇脅官吏令只依遞年受納不堪紬絹尋將買到輕疏糊藥短絹五匹付揀子家人翁誠納官尋被翁誠覆本官揀退章等既見衆户亦有似此輕疏短絹多被揀退尋拑撮翁誠叫屈顔益在後用手推翁誠令顔章拑去投州即便走出三門前叫屈二聲跳出欄干將兩手擡起喚衆户扇搖叫噉稱一時投州去來衆户約二百餘人因此亦一時叫噉相隨投州衙喧訴臣尋體訪得顔章顔益係第一等豪户顔巽之子巽先充書手因受贓虛消稅賦刺配本州牢城尋即用幸計構胥吏醫人託患放停又為詐將産業重疊當出官鹽刺配滁州牢城依前託患放停歸鄉父子姦凶衆所畏惡下獄之日閭里稱快謹按顔益顔章以匹夫之微令行於衆舉手一呼數百人從之欲以衆多之勢脅制官吏必欲今後常納惡絹不容臣等大革前弊情理巨蠧實難含忍本州既已依法決訖臣獨判云顔章顔益家傳凶狡氣蓋鄉閭故能奮臂一呼從者數百欲以搖動長吏脅制監官蠧害之深難從常法已刺配本州牢城去訖仍以散行曉示鄉村城郭人户今後更不得織造輕疏糊藥紬絹以備納官庶幾明年全革此弊伏望朝廷詳酌備録臣此狀下本路轉運司遍行約束曉示所貴今後京師及本路官吏軍人皆得堪好衣賜及受納専副不至破家陪填所有臣法外刺配顔章顔益二人亦乞重行朝典謹録奏聞伏候敕旨貼黃勘會本州去年發和買夏稅物帛計一十四綱今來只估剝到四綱已及九千餘貫乞下左藏庫方見估剝數目浩大乞賜度牒修廨宇狀元祐四年九月某日龍圖閣學士朝奉郎知杭州蘇軾狀奏右臣伏見杭州地氣蒸潤當錢氏有國日皆為連樓復閣以藏衣甲物帛及其餘官屋皆珍材巨木號稱雄麗自後百餘年間官司既無力修換又不忍拆為小屋風雨腐壞日就頽毁中間雖有心長吏果於營造如孫沔作中和堂梅摯作有美堂蔡襄作清暑堂之類皆務創新不肯修舊其餘率皆因循支撑以茍歲月而近年監司急於財用尤諱修造自十千以上不許擅支以故官舍日壞使前人遺構鞠為朽壤深可歎惜臣自熙寧中通判本州已見在州屋宇例皆傾邪日有覆壓之懼今又十五六年其壞可知到任之日見使宅樓廡欹仄罅縫但用小木橫斜撑拄每過其下栗然寒心未嘗敢安步徐行及問得通判職官等皆云每遇大風雨不敢安寢正堂之上至於軍資甲仗庫尤為損壞今年六月內使院屋倒壓傷手分書手二人八月內鼓角樓摧壓死鼓角匠一家四口內有孕婦一人因此之後不惟官吏家屬日負憂恐至於吏卒往來無不狼顧臣以此不敢坐觀尋差官檢計到官舍城門樓櫓倉庫二十七處皆係大段隳壞須至修完共計使錢四萬餘貫已具狀聞奏乞支賜度牒二百道及且權依舊數支公使錢五百貫以了明年一年監修官吏供給及下諸州剗刷兵匠應副去訖臣非不知破用錢數浩大朝廷未必信從深欲減節以就約省而上件屋宇皆錢氏所構規摹髙大無由裁樽使為小屋若頓行毁拆改造低小則目前蕭然便成衰陋非惟軍民不恱亦非太平美事竊謂仁聖在上憂愛臣子存恤逺方必不忍使官吏胥徒日以軀命僥幸茍安於腐棟頺墻之下兼恐弊漏之極不即修完三五年間必遂大壞至時改作又非二百道度牒所能辦集伏望聖慈特出宸斷盡賜允從如蒙朝廷體訪得不合如此修完臣伏欺罔之罪謹録奏門伏候敕旨乞詩賦經義各以分數取人將來只許詩賦兼經狀元祐四年十月十八日龍圖閣學士朝奉郎知杭州蘇軾狀奏右臣今月五日據本州進士汪溉等一百四十人詣臣陳狀稱準元祐四年四月十九日敕詩賦經義各五分取人朝廷以謂學者久傳經義一旦添改詩賦習者尚少遂以五分立法是欲優待詩賦勉進詞學之人然天下學者寅夜競習詩賦舉業率皆成就雖降平分取人之法緣業已習熟不願再有改更兼學者亦以朝廷追復祖宗取士故事以詞學為優故士人皆以不能詩賦為恥比來専習經義者十無二三見今本土及州學生員數從詩賦他郡亦然若平分解名委是有虧詩賦進士難使捐已習之詩賦抑令就經義之科或習經義多少各以分數發解乞據狀敷奏者臣曩者備員侍從實見朝廷更用詩賦本末蓋謂經義取人以來學者爭尚浮虛文字止用一律程試之日工拙無辨既去取髙下不厭外論而已得之後所學文詞不施於用以故更用祖宗故事兼取詩賦而橫議之人欲收姑息之譽爭言天下學者不樂詩賦朝廷重失士心故為改法各取五分然臣在都下見太學生習詩賦者十人而七臣本蜀人聞蜀中進士習詩賦者十人而九及出守東南親歷十郡及多見江湖福建士人皆爭作詩賦其間工者已自追繼前人専習經義士以為恥以此知前言天下學者不樂詩賦皆妄也惟河北河東進士初改聲律恐未甚工然其經義文詞亦自比他路為拙非獨詩賦也朝廷於五路進士自許禮部貢院分數取人必無偏遺一路士人之理今臣所據前件進士汪溉等狀不敢不奏亦料諸處似此申明者非一欲乞朝廷參詳衆意特許將來一舉隨詩賦經義人數多少各紐分數發解如經義零分不及一人許併入詩賦額中仍除將來一舉外今後並只許應詩賦進士舉所貴學者不至疑惑専一從學謹録奏聞伏候敕旨貼黃詩賦進士亦自兼經非廢經義也論髙麗進奉狀元祐四年十一月三日龍圖閣學士朝奉郎知杭州蘇軾狀奏臣伏見熙寧以來髙麗人屢入朝貢至元豐之末十六七年間館待賜豫之費不可勝數兩浙淮南京東三路築城造船建立停館調發農工侵漁商賈所在騷然公私告病朝廷無絲毫之益而夷虜獲不資之利使者所至圖畫山川購買書籍議者以為所得賜豫大半歸之契丹雖虛實不可明而契丹之強足以禍福髙麗若不隂相計構則髙麗豈敢公然入朝中國有識之士以為深憂自二聖嗣位髙麗數年不至淮浙京東吏民有息肩之喜唯福建一路多以海商為業其間凶險之人猶敢交通引惹以希厚利臣稍聞其事方欲覺察行遣今月三日準秀州差人押到泉州百姓徐戩擅於海舶內載到髙麗僧統義天手下侍者僧夀介繼常潁流院子金保裴善等五人及齎到本國禮賓省牒云奉本國王旨令夀介等齎義天祭文來祭奠杭州僧源闍黎臣已指揮本州送承天寺安下選差職員二人兵級十人常切照管不許出入接客及選有行止經論僧伴話量行供給不令失所外已具事由畫一奏稟朝旨去訖又據髙麗僧夀介有狀稱臨發日奉國母指揮令齎金塔二所祝延皇帝太皇太后聖夀臣竊觀其意蓋為二聖嗣位數年不敢輕來入貢頓失厚利欲復遣使又未測聖意故以祭奠源闍梨為名因獻金塔欲以嘗試朝廷測知所以待之之意輕重厚薄不然者豈有欲獻金塔為夀而不遣使奉表止因祭奠亡僧遂致國母之意蓋疑中國不受故為此茍簡之禮以卜朝廷若朝廷待之稍重則貪心復啓朝貢紛然必為無窮之患待其已至然後拒之則又傷恩恭惟聖明灼見情狀廟堂之議固有以處之臣忝備侍從出使一路懷有所見不敢不盡以備採擇謹具畫一如左一福建狡商専擅交通髙麗引惹牟利如徐戩者甚衆訪聞徐戩先受髙麗錢物於杭州雕造夾注華嚴經費用浩汗印板既成公然於海舶載去交納却受本國厚賞官私無一人知覺者臣謂此風豈可滋長若馴致其弊敵國姦細何所不至兼今來引致髙麗僧人必是徐戩本謀臣已枷送左司理院根勘即當具案聞奏乞法外重行以戒一路姦民猾商次一髙麗僧夀介有狀稱臨發日國母令齎金塔祝夀臣以謂髙麗因祭奠亡僧遂致國母之意茍簡無禮莫斯為甚若朝廷受而不報或報之輕則夷虜得以為詞若受而厚報之則是以重幣答其茍簡無禮之餽也臣已一面令管勾職員退還其狀云朝廷清嚴守臣不敢専擅奏聞臣料此僧勢不肯已必云本國遣其來獻夀今若不奏歸國得罪不輕臣欲於此僧狀後判云州司不奉朝旨本國又無來文難議投進執狀歸國照會如此處置只是臣一面指揮非朝廷拒絶其獻頗似穩便如以為可乞賜指揮施行一髙麗僧夀介齎到本國禮賓省牒云祭奠源闍黎仍諸處尋師學法臣謂夀介等只是義天手下侍者非國王親屬其來乃致私奠本非國事待之輕重當與義天殊絶欲乞只許致奠之外其餘尋師學法出入遊覽之類並不許仍與限日却差船送至明州令搭附因便海舶歸國更不差人船津送如有買賣許量辨歸裝不得廣作商販右謹件如前若如此處置使無厚利以絶其來意上免朝廷帑廪無益之費下免淮浙京東公私靡弊之患臣不勝區區謹録奏聞伏侯敕旨乞賑濟浙西七州狀元祐四年十一月初四日兩浙西路兵馬鈐轄龍圖閣學士朝奉郎蘇軾狀奏勘會浙西七州軍冬春積水不種早稻及五六月水退方插晚秧又遭乾旱早晚俱損髙下並傷民之艱食無甚今歲見今米斗九十足錢小民方冬已有飢者兩浙水鄉種麥絶少來歲之熟指秋為期而熟不熟又未可知深恐來年春夏之交必有飢饉盜賊之憂本司除已與提轉商量多方擘畫準備外有合申奏事件謹具畫一如左一轉運司來年合發上供額斛及補填舊欠共一百六十餘萬碩本路錢物大抵空匱剗刷變轉不行官吏急於趂辦務在免責催迫賦租督促欠負鉗束私酒漏稅之類必倍於平日飢貧之民無路逃死必將聚為盜賊又緣上供額斛數目至廣都未有備見今逐州廣行收糴指揮嚴緊官吏不免遮攔米穀添價貴糴以此斛斗湧貴小民乏食欲望聖慈愍此一方遭罹熙寧中飢疫人死大半至今城市寂寥少欠官私逋負十人而九若不痛加賑恤則一方餘民必在溝壑今來亦不敢望朝廷别賜錢米但祗寬得轉運司上供年額錢斛則官吏自然不行迫急之政而民自受賜矣乞出自宸斷來年本路上解錢斛且起一半或三分之二其餘候豐熟日分作二年隨年額上供錢物起發所貴公私稍獲通濟又恐官吏為見明年既得寬減僥幸替移更不盡心擘畫收拾以備補填年額乞特賜指揮須管依年分收簇數足若遇移替其所簇到數交割與後政承認不得出違年限一見今逐州和糴常平斛斗及省倉軍糧又糴封樁錢上供米名目不一官吏各務趂辦爭奪相傾以此米價益貴伏望聖慈速賜勘會如在京諸倉不待此米支用即令提轉疾速契勘逐州如省倉不闕軍糧常平糴散有備外更不得收糴所貴米價稍平小民不至失所浙中自來號稱錢荒今者尤甚百姓持銀絹絲綿入市莫有顧者質庫人户往往晝閉若得官錢三二千萬散在民間如水救火欲乞指揮提轉令將合上供錢散在諸州稅户令買金銀紬絹充年額起發一自來浙中姦民結為羣黨興販私鹽急則為盜近來朝廷痛減鹽價最為仁政然結集興販猶未甚衰深恐飢饉之民散流江海之上羣黨愈衆或為深患欲乞朝廷指揮盜賊情理重者及私鹽結聚羣黨皆許申鈐轄司權於法外行遣候豐熟日依舊所貴彈壓姦愚有所畏肅右謹件如前勘會熙寧中兩浙飢饉是時米斗二百人死大半父老至今言之流涕今來米斗已及九十日長炎炎其勢未巳深可憂慮伏望仁聖哀憐早行賑恤今來所奏一一並是詣實伏乞詳酌速賜指揮謹録奏聞伏候敕旨論役法差雇利害起請畫一狀元祐四年十一月十日龍圖閣學士朝奉郎知杭州蘇軾狀奏臣自熙寧以來從事郡縣推行役事及元祐改法臣忝詳定今又出守躬行其法考問吏民備見雇役差役利害不敢不言雇役之法自第二等以上人户歲出役錢至多行之數年錢愈重穀帛愈輕田宅愈賤以至破散化為下等請以熙寧以前第一第二等户逐路逐州都數而較之元豐之末則多少相絶較然可知此雇役之法害上户者一也第四等巳下舊本無役不過差充壯丁無所陪備而雇役法例出役錢雖所取不多而貧下之人無故出三五百錢未辦之間吏卒至門非百錢不能解免官錢未納此費已重故皆化為遊手聚為盜賊當時議者亦欲蠲免此等而户數至廣積少成多役錢待此而足若皆蠲免則所喪大半雇法無由施行此雇役之法害下户者二也今改行差役則二害皆去天下幸甚獨有第三等人户方雇役時每户歲出錢多者不過三四千而今應一役為費少者日不下百錢二年一替當費七十餘千而休間逺者不過六年則是八年之中昔者徐出三十餘千而今者併出七十餘千苦樂可知也而況農民在官貪吏狡胥恣為蠶食其費又不可以一二數此則差役之法害於中等户者一也今之議者或欲専行差役或欲復行雇法皆偏詞過論也臣愚以謂朝廷既取六色錢許用雇役以代中等人户頗除一害以全二利此最良法可久行者但元祐二年十二月二十四日敕合役空間人户不及三畨處許以六色錢雇州手分散從官承符人此法未為允當何者百姓出錢本為免役今乃限以畨次不許盡用留錢在官其名不正又所雇者少未足以紓中等人户之勞法不簡徑使姦吏小人得以伸縮臣到杭州點檢諸縣雇役皆不應法錢唐仁和富實縣分則皆雇人新城昌化將為貧薄反不得雇蓋轉運司特於法外創立式樣今諸縣不得將逐等人户都數通比其貧下縣分第一第二等人户例皆稀少至第三等則户數猥多以此漲起人户皆及三畨然第三等户豈可承當第一等色役則知通計三等乃俗吏之巧薄非朝廷立法之本意也臣方一面改正施行次旋準元祐四年八月十八日敕諸州衙前投名不足處見役年滿鄉差衙前並行替放且依舊條差役更不支錢又諸州役除吏人衙前外依條定差如空間未及三年即以助役錢支募此法既下吏民相顧皆所未曉比於前來三畨之法尤為不通前史稱蕭何為法講若畫一蓋謂簡徑易曉雖山邑小吏窮鄉野人皆能别白遵守然後為不刋之法也臣身為侍從又忝長民不可不言謹具前件條貫不便事狀及臣愚見所欲起請者畫一如左一前件敕節文云看詳衙前自降招募指揮僅及一年諸州路軍尚有招募投名不足去處其應役年滿衙前雖依舊支與支酬勒令在役然非鄉户情願充應若後更無人願募即鄉户衙前卒無替期乃是勒令長者祗應顯於人情未便今欲將諸州衙前投名不足去處見役年滿鄉差衙門並行替放且依舊條差役更不支錢如願投充長名及向去招募到人其雇食支酬錢即全行支給却罷差充仍除鄉差年限未滿人户依條理當本户色役外其投募長名之人並與免本户役錢二十貫文如所納數少不係出納役錢之人即許會六色合納役錢之人依數免放并仰逐處監司相度見役衙前如有虛占窠名可以省併出處裁減人額却將減下錢數添搭入重難支酬施行臣今看詳前件敕條深為未便凡長名衙前所以招募不足者特以支錢虧少故也自元豐前不聞天下有闕額衙前者豈常抑勤差充直以重難月給可以足用故也當時奉使之人如李承之沈括吳雍之類每一使至輒以減刻為功至元豐之末衙前支酬可謂僅足而無餘矣而元祐改法之初又行減削多是不支月給以故招募不行今不反循其本乃欲重困鄉差全不支錢而應募之人盡數支給又放免役錢二十貫欲以誘脅盡令應募然而歲免役錢二十千許計會六色人户放免則是應募自增六色錢日減也若天下投名衙前並免此二十千即六色錢存者無幾若只是闕額招募到人方得免放則均是投名厚薄頓殊其理安在朝廷既許歲免二十千則是明知支酬虧少以此補足何如直添重難月給令招募得行所謂計會六色人户者蓋令衷私商量取錢若遇頑猾人户抵賴不還或將諸物髙價準折訟之於官經涉歲月乃肯備償則衙前所獲無幾何如官支二十千朝請暮獲豈不簡徑易曉故臣愚以謂上件敕條必難久行議者多謂官若添錢招募則姦民觀望未肯投名以待多添錢數今來計會六色人户放免役錢正與添錢無異雖巧作名目其實一般大抵支錢既足萬無招募不行之理自熙寧以來無一人闕額豈有今日頓不應募臣今起請欲乞行下諸路監司守令應闕額長名衙前須管限日招募數足如不足即具元豐以前因何招募得行今來因何不足事由申奏如合添錢雇募即與本路監司商議一面施行訖具委無大破保明聞奏若限滿無故招募不足即行勘干繫官吏施行如此不過半年天下必無闕額長名衙前而所添錢數未必人人歲添二十千兼止用坊埸河渡錢非如今法計會放免侵用六色錢也一前件敕節文云看詳鄉差人户物力厚薄等第髙下丁口進減放不常定恐難限以番次召募不若約空間之年以定差法立役次輕重雇募役人顯見均當兼可以將寬剩役錢裁減無丁及女户所出錢數欲諸州役除吏人衙前外依條定差如空間未及三年即據未及之户以助役錢支募候有户罷支已募之人各依本役年限候滿日差罷今後遇有支遣準此及以一路助役錢除依條量留一分準備外據餘剩錢數却於無丁及女户所出役錢內量行裁減具數奏聞所有先降雇募州役及分畨指揮更不許臣今看詳諸役以二年為一畨向來指揮如空間人户不及三畨則令雇募是聖恩本欲百姓空間六年也今來無故忽減作三年吏民無不愕然以謂中等人户方苦差役正望朝廷别加寬恤而六色錢幸有餘剩正可加添畨數而乃減作三年農民皆紛然相告云向來差役雖甚勞苦然朝廷猶許我輩間了六年今來只許間得三年必是朝廷别要此錢使用方二聖躬行仁厚天下歸心忽有此言布聞逺邇深為可惜雖云量留一分準備外據餘剩數却於無丁及女户所出役錢內量行裁減此乃空言無實止是建議之人假為此名以濟其説臣請為朝廷詰之人户差役年月人人不同本縣有户無户日日不同加以稅産開收丁口進退雖有聖智莫能前知當雇當差臨事乃定如何於一年前預知來年合用錢數見得寬剩便行減放臣知此法必無由施行但空言而已若今來寬剩已行減放來年不足又須却增減紛然簿書淆亂百弊橫生有不可勝言者矣方今中等人户正以應役為苦而六色人户猶以出錢為樂苦者更減三年樂者又行減放其理安在大抵六色錢本役免役理當盡用雇人除量留準備外一文不合樁留然後事簡而法意通名正而人心服惟有一事不得不加周慮蓋逐州逐縣六色錢多少不同若盡用雇人則苦樂不齊錢多之處役户太優與六色人户相形反為不易臣今起請欲乞今後六色錢常樁留一年準備如元祐四年只得用元祐二年錢其二年錢樁留準備用及約度諸般合用錢謂如官吏請雇人錢之類外其餘委自提刑轉運與守令商議將逐州逐縣人户貧富色役多少預行品配以一路六色錢通融分給令州縣盡用雇人以本處色役輕重為先後如此則事簡而易行錢均而無弊雇人稍廣中外漸蘇則差役良法可以久行而不變矣貼黃若行此法今後空間三年人户官吏隱庇不差却行雇募無由點檢縱許人告自非多事好訟之人誰肯告訴若有本等已上間及三年未委専以空間先後為斷為復參用物力髙下定差既無果決條貫今後詞訟必多右謹件如前朝廷改法數年至今民心紛然未定臣在外服目所親見正為此數事耳伏望聖慈與執政大臣早定此法果斷而行之若還付有司則出納之吝必無成議日復一日農民凋弊所憂不小臣干犯天威謹俟斧鉞之誅謹録奏聞伏候敕旨論髙麗進奉第二狀元祐四年十一月十三日龍圖閣學士朝奉郎知杭州蘇軾狀奏右臣近奏為髙麗僧夀介狀稱臨發日奉國母指揮將金塔二所附夀介前來祝延皇帝太皇太后聖夀臣已一面退還其狀仍令本州所差伴話僧思義只作已意體問所獻金塔次第其髙麗僧夀介知臣不為聞奏方始將出僧統義天付身文字以示思義乃是欲將金塔二所捨入杭州惠因院等處祝延聖夀仍云隨身收管不可擅動元封俟續有疏文到日方可施納以此顯見髙麗人將此金塔嘗探中國意度臣既退還其狀將來必是自將此塔捨在惠因等院既是衷私捨施僧院即朝廷難為回賜若受而不報夷虜性貪或生怨望伏望朝廷撿會臣前奏早賜指揮如夀介等將上件金塔捨施亦乞只作臣意度一面答不奉朝旨不敢令僧院收留所貴稍絶後患謹録奏聞伏候敕旨貼黃臣體問得惠因院亡僧淨源本是庸人只因多與往還致商人等於髙麗國中妄有談説是致義天逺來從學因此本院厚獲施利而淮浙官私遍遭擾亂今來又訪聞得還是本院行者姓顔人齎持淨源真影舍利隨舶船過海是致義天復差人祭奠臣見令所司根勘候見詣實奏聞次今來若許惠因院收留金塔乃是庸人姦猾自圖厚利為國生事深為不可乞令髙麗僧從泉州歸國狀元祐四年十二月三日龍圖閣學士朝奉郎知杭州蘇軾狀奏臣近為泉州商客徐戩帶領髙麗國僧統義天手下侍者僧夀介等到來杭州致祭亡僧淨源因便帶到金塔二所遂具畫一事由聞奏已準朝旨許令夀介等致祭亡僧淨源畢差人船送到明州附因便海舶歸國如淨源徒弟願與回贈物色即量度回贈本州已依準指揮許令夀介等致祭淨源了畢其徒弟量將土儀回贈夀介等收受所有帶到金塔二所據夀介等令監伴職員前來告臣云恐帶回本國得罪不輕臣已依元奏詞語判狀付逐僧執歸本國照會及本州即時差撥人船乘載夀介等亦將米麵蠟燭之類隨宜餞送逐僧於十一月三十日起發前去外訪聞明州近日少有因便商客入髙麗國竊恐久滯逐僧在彼不便竊聞泉州多有海舶入髙麗往來買賣除已牒明州契勘如夀介等到來年卒無因便舶船即一面申奏乞發往泉州附船歸國外須至奏聞者右伏乞朝廷特降指揮下明州疾速契勘依此施行所貴不至住滯謹録奏聞伏候敕旨乞降度牒召人入中斛斗出糶濟飢等狀元祐五年二月十四日龍圖閣學士朝奉郎知杭州蘇軾狀奏右臣近指揮本州令在州并倚郭兩縣糶常平米一千石及外七縣大縣日糶百石小縣五十石約計日糶五百餘石自二月至六月終將見管裏外常平米均勻兊撥除本州倚郭略已足用外其餘七縣見闕三萬餘石雖蒙朝廷賜上供米一十萬石於出路出糶已準轉運司牒報於越睦州撥三萬石與杭州然本州年計見闕軍糧六萬餘石越睦州米尚不了兊充軍糧更無緣出賣以此外縣出糶實闕三萬餘石臣已一面指揮諸縣那移般運開埸出糶以平米價庶幾深山窮谷小民不至大段失所然約度見管米數恐只至四五月間必然糶盡若秋穀未登糶埸不繼即民間頓然闕食深可憂慮臣勘會諸州例皆闕米縱使督迫轉運提刑司必是無處擘畫那移應副惟有一䇿恐可濟辦緣臣去歲曽奏乞度牒二百道修完本州廨宇未蒙施行臣於十二月末曽作書與太師文彥博以下執政八人乞早奏陳特許給上件度牒二百道臣欲權將上件度牒召募蘇湖常秀人户令於本州闕米縣分入中斛斗以優價入中減價出賣約可得二萬五千石糶得一萬五千貫訪聞蘇湖常秀雖其災傷富民却薄有蓄積若以度牒召募必肯入中却以此錢修完廨宇庶幾先濟飢殍之民後完久壞屋宇兩事皆濟則吏民荷德無窮臣發此書已四十餘日至今無報不免干冒朝廷上瀆聖聽伏乞聖慈深哀本州外邑溪谷之民將墜溝壑特發宸斷速賜允從臣無任惶恐戰栗待罪之至謹録奏聞伏候敕旨論葉溫叟分擘度牒不公狀元祐五年二月十八日龍圖閣學士左朝奉郎知杭州蘇軾狀奏今月十七日準轉運使葉溫叟牒杭州準尚書禮部符準元祐五年正月二十六日敕勘會兩浙淮南路見係災傷民間穀價湧貴雖已降指揮減撥上供斛斗出糶及依條賑恤外竊慮所用斛斗數多不能周足牒奉敕各出給空名度牒三百道付逐路轉運提刑鈐轄司分擘與災傷州軍召人入納斛斗或見錢糴入官司封樁及諸色斛斗添助賑濟支用者省部今依準敕命指揮出給到空名度牒三百道并封皮須至符送者符當司主者候到一依前項敕命指揮及照會元祐敕令疾速施行仍關提刑鈐轄司及合屬去處不管稍有違誤者當司契勘杭越蘇湖常秀潤衢婺台等州災傷放稅除衢州放稅只及二釐不至災傷更不撥外今將杭越等九州放稅錢數衮紐每州合得道數須至行遣數內杭州三十道者臣看詳上件敕旨為兩浙淮南路災傷各出給空名度牒三百道付逐路轉運提刑鈐轄司分擘與災傷州軍轉運司既受上件敕旨即合與提刑及浙東西兩路鈐轄司商量分擘仍須參州郡大小户口衆寡及災傷分數品配合得道數依公分擘今來轉運使葉溫叟因出巡蘇秀等州在路受得上件敕旨便敢公然違戾更不計會提刑及兩路鈐轄司亦不與轉運判官張璹商議便一面擅行分擘內杭州只得三十道竊緣杭州城內生齒不可勝數約計四五十萬人裏外九縣主客户口共三十餘萬今來檢放水旱雖只計一分六釐又緣杭州自來土産米穀不多全仰蘇湖常秀等州般運斛斗接濟若數州不熟即杭州雖十分豐稔亦不免為飢年自去歲十月以後米價湧長至每斗九十足錢近歲浙中難得見錢每斗九十便比熙寧以前百四五十因糴常平米每日不下五六萬人爭糴方免餓殍今來聖恩優恤一路委自提轉及兩路鈐轄司分擘度牒而溫叟獨出私意只分與杭州三十道內潤州人户比杭州十分才及一二却分得一百道其餘多少任情未易悉數致杭州百姓例皆咨怨將謂聖恩偏厚潤州不及杭州不知自是溫叟公違敕旨任情分擘須至奏陳者右臣先於二月四日奏為杭州諸縣出糶官米自二月至六月終闕三萬餘石乞特賜度牒二百道召人入中米外縣吏民日夜企望朝廷施行雖大旱望雨執熱思濯未喻其急度奏狀未到間已蒙朝廷施行乃是聖明洞照數千里外事有如目覩今乃為轉運使葉溫叟自出私意多少任情以杭州衆大甲於兩路只分與三十道吏民驚駭莫曉其意臣竊原聖意蓋謂提刑專主賑濟鈐轄司專管災傷盜賊故令轉運司與兩司同共相度分擘今溫叟並不計會兩司及轉運判官直自一面任意分擘牒送諸州更不關報鈐轄司臣忝為侍從出使一路溫叟似此凌蔑肆行臣若不言必無人更敢論列况杭州見今裏外一十九處開場糶米糴者如雲雖寄居待闕官員亦行差請杭人素來驕奢本以糴官米為恥若非飢急豈肯來糴此皆溫叟與諸監司所共目覩今來只分三十道深駭物聽竊緣度牒三百道約直錢五萬餘貫所在商賈富民為之奔走洶動而溫叟一面任意分擘更不計會逐司豈得穩便兼臣訪聞去歲諸郡檢放稅賦多有不實不盡只如蘇州積水瀰望衆所共見今來放歲分數反不及潤州蓋是檢放官吏觀望漕司意指及各隨本州長吏用意厚薄未必皆是的實今來溫叟専用放稅分數為斷深為未允縱使檢放得實而州郡大小户口多寡不同亦合參酌品配從逐司公共相度分擘方得允當今來但係溫叟所定賑濟州郡即多得度牒應係别人地分例皆靳惜不與顯見全然不公臣已牒轉運司請細詳上件朝旨計會提刑鈐轄司依公分擘去訖深慮溫叟未肯聽從縱肯聽從不過量添三二十道亦是支用不足伏望聖慈體念杭州元奏闕米三萬石本乞度牒二百道方稍足用今來不敢更望上件數目只乞特賜指揮於三百道內支一百五十道與杭州况其餘州軍元無奏請闕米去處將其餘一百五十道分與亦無闕事伏乞早賜指揮所貴災傷之民均受聖澤不至以一夫私意専制多少謹録奏聞伏候敕旨貼黃杭州元奏闕米三萬石乞度牒二百道今來轉運使只與三十道潤州元不奏闕米顯是常平錢米足用今來却與一百道深駭物聽乞朝廷詳酌諸州元無奏請闕米去處若依臣所奏分與一百五十道已出望外杭州若得一百五十道猶未足用乞自聖旨分劈施行若只下本路其轉運使葉溫叟必是遂非不肯應副東坡全集卷五十六
