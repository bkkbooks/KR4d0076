body:
  text: 東坡全集巻四宋蘓軾撰詩八十八首秋懐二首苦熱念西風常恐來無時及兹遂凄凜又作徂年悲蟋蟀鳴我牀黄葉投我幃牕前有棲鵩夜嘯如狐狸露冷梧葉脱孤眠無安枝熠燿亦求偶髙屋飛相追定知無幾見廹此清霜期物化逝不留我興為嗟咨便當勤秉燭為樂戒暮遲海風東南來吹盡三日雨空階有餘滴似與幽人語念我平生歡寂寞守環堵壺漿慰作勞裹飯救寒苦今年秋應熟過從飽雞黍嗟我獨何求萬里渉江浦居貧豈無食自不安畎畆念此坐逹晨殘燈翳復吐哭歐公孤山僧惠思示小詩次韻故人已為土衰鬢亦驚秋猶喜孤山下相逢說舊逰梵天寺見僧守詮小詩清婉可愛次韻但聞烟外鐘不見烟中寺幽人行未已草露濕芒屨惟應山頭月夜夜照來去和陳述古拒霜花千林掃作一畨黄只有芙蓉獨自芳喚作拒霜知未稱細思却是最宜霜和沈立之留别二首而今父老千行淚一似當時初去時不用鐫碑頌遺愛丈人清德畏人知卧聞鐃鼓送歸艎夢裏怱怱共一觴試問别來愁幾許春江萬斛若為量去時于在江陵次韻孔文仲推官見贈我本麋鹿性諒非伏轅姿君如汗血馬作駒已權竒齊驅大道中並帶鑾鑣馳聞聲自决驟那復受縶維謂君朝發燕秣楚日未欹云何中道止連蹇驢騾隨金鞍冒翠錦玉勒垂青絲旁觀信美矣自揣良厭之均為人所勞何必陋鹽輜君看立仗馬不敢鳴且窺調習困鞭箠僅存骨與皮人生各有志此論我久持他人聞定笑聊與吾子期空齋卧積雨病骨頰撑支秋草上垣墻霜葉鳴堦墀門前自無客敢作揚雄麾候吏報君來弭節江之湄一對髙人談稍忘俗吏卑今朝枉詩句粲如鳯來儀上山絶梯磴墮海迷津涯憐我枯槁質借潤生華滋肯效世俗人洗刮求瘢痍賢明日登用清廟歌緝熈胡不學長卿預作封禪詞湯村開運鹽河雨中督役居官不任事蕭散羡長卿胡不歸去來滯留愧淵明鹽事星火急誰能卹農耕薨薨曉皷動萬指羅溝坑天雨助官政泫然淋衣纓人如鴨與猪投泥相濺驚下馬荒堤上四顧但湖泓線路不容足又與牛羊争歸田雖賤辱豈識泥中行寄語故山友慎毋厭藜羮是日宿水陸寺寄北山清順僧二首草没河堤雨暗村寺藏脩竹不知門拾薪煮藥憐僧病掃地燒香淨客魂農事未休侵小雪佛燈初上報黄昏年來漸識幽居味思與髙人對榻論長嫌鐘鼓聒湖山此境蕭條却自然乞食遶村真為飽無言對客本非禪披榛覔路衝泥入洗足闗門聴雨眠遥想後身窮賈島夜寒應聳作詩肩客位假寐謁入不得去兀坐如枯株豈惟主忘客今我亦忘吾同僚不解事愠色見髯鬚雖無性命憂且復忍須臾鹽官部役戲呈同事兼寄述古新月照水水欲冰夜霜穿屋衣生稜野廬半與牛羊共曉鼓却隨鴉鵲興夜來履破裘穿縫紅頰曲眉應入夢千夫在野口如麻豈不懐歸畏嘲弄我州賢將知人勞已釀白酒買豚羔耐寒努力歸不逺兩脚凍硬公須軟朱壽昌郎中少不知母所在刺血寫經求之五十年去歳得之蜀中以詩賀之嗟君七嵗知念母憐君壯大心愈苦羡君臨老得相逢喜極無言淚如雨不羡白衣作三公不愛白日昇青天愛君五十著綵服兒啼却得償當年烹龍為炙玉為酒鶴髪初生千萬壽金花詔書錦作囊白藤肩輿簾蹙繡感君離合我酸辛此事今無古或聞長陵朅來見大姊仲孺豈意逢將軍開皇苦桃空記面建中天子終不見西河郡守誰復譏潁谷封人羞自薦將之湖州戲贈莘老餘杭自是山水窟仄聞呉興更清絶湖中橘林新著霜溪上苕花正浮雪顧渚茶芽白於齒梅溪木𤓰紅勝頰呉兒鱠縷薄欲飛未去先説饞涎垂亦知謝公到郡久應恠杜牧尋春遲鬢絲只好對禪榻湖亭不用張水嬉鴉種麥行霜林老鴉閒無用畦東拾麥畦西種畦西種得青猗猗畦東巳作牛毛稀明年麥熟芒攢槊農夫未食鴉先啄徐行俛仰若自矜鼓翅跳踉上牛角憶昔舜耕歴山鳥為耘如今老鴉種麥更辛勤農夫羅拜鴉飛起勸農使者來行水鹽官絶句四首南寺千佛閣古邑居民半海濤師來構築便能髙千金用盡身無事坐看香烟遶白毫北寺悟空禪師塔名齊安宣宗微時師知其非凡人已將世界等微塵空裏浮花夢裏身豈為龍顔更分别只應天眼識天人塔前古檜當年雙檜是雙童相對無言老更恭庭雪到腰埋不死如今化作兩蒼龍僧爽白雞養二十餘年常立坐側聽經斷尾雄雞本畏烹年來聴法伴脩行還須却置蓮花漏老怯風霜恐不鳴送張軒民寺丞赴省試龍飛甲子盡豪英嘗喜吾猶及老成人競春蘭笑秋菊天教明月伴長庚傳家各自聞詩禮與子相逢亦弟兄洗眼上林看躍馬賀詩先到古宣城伯父與太平州張侍讀同年此其于六和寺冲師閘山溪為水軒欲放清溪自在流忍教冰雪落沙洲出山定被江潮涴能為山僧更少留和致仕張郎中春晝投紱歸來萬事輕消磨未盡秪風情舊因蓴菜求長假新為楊枝作短行不禱自安縁壽骨苦藏難没是詩名淺斟盃酒紅生頰細琢歌詞稳稱聲蝎殻卜居心自放蠅頭寫字眼能明盛衰閲過君應笑寵辱年來我亦平跪履數從圯下老逸書閒問濟南生東風屈指無多日秪恐先春鶗䳏鳴冬至日獨逰吉祥寺井底微陽囘未囘蕭蕭寒雨濕枯荄何人更似蘇夫子不是花時肯獨來後十餘日復至東君意淺著寒梅千朶深紅未暇裁安得道人殷七七不論時節遣花開戲贈惆悵沙河十里春一畨花老一畨新小樓依舊斜陽裏不見樓中垂手人和人求筆跡麥光鋪几淨無瑕入夜青燈照眼花從此剡藤真可弔半紆春蚓綰秋蛇再用前韻寄莘老君不見夷甫開三窟不如長康號癡絶癡人自得終天年智士死智罪莫雪困窮誰要卿料理舉頭看山笏拄頰野鳬翅重自不飛黄鶴何事兩翼垂泥中相從豈得久今我不徃行恐遲江夏無雙應未去恨無文字相娛嬉黄庭堅莘老婿能文畫魚歌湖州道中作天寒水落魚在泥短鉤畫水如耕犁渚蒲披折藻荇亂此意豈復遺鰍鯢偶然信手皆虚擊本不辭勞幾萬一一魚中刄百魚驚蝦蟹奔忙誤跳擲漁人養魚如養雛插竿冠笠驚鵜鶘豈知白挺鬧如雨攪水覔魚嗟巳疎呉中田婦歎和賈収韻今年粳稻熟苦遲庶見霜風來幾時霜風來時雨如瀉杷頭出菌鎌生衣眼枯淚盡雨不盡忍見黄穗卧青泥茆苫一月壠上宿天晴穫稻隨車歸汗流肩頳載入市價賤乞與如糠粃賣牛納稅拆屋炊慮淺不及明年飢官今要錢不要米西北萬里招羌兒龔黄滿朝人更苦不如却作河伯婦和邵同年戲贈賈收秀才三首傾蓋相歡一笑中從來未省馬牛風卜隣尚可容三徑投社終當作兩翁古意已將蘭緝佩招詞閒詠桂生叢此身自斷天休問白髪年來漸不公朝見新荑出舊槎騷人孤憤苦思家五噫處士太窮約三賦先生多誕誇帳外鶴鳴奩有鏡箇中錢盡案無鮭玉川何日朝金闕白晝闗門守夜叉時賈欲再娶生涯到處似檣烏科第無心摘頷鬚黄㡌刺船忘嵗月白衣擔酒慰鰥孤狙公欺病來分栗水伯知饞為出鱸莫向洞庭歌楚曲烟波𣺌𣺌正愁予逰道埸山何山道塲山頂何山麓上徹雲峰下幽谷我從山水窟中來尚愛此山看不足陂湖行盡白漫漫青山忽作龍蛇盤山髙無風松自響誤認石齒號驚湍山僧不放山泉出屋底清池照瑶席堦前合抱香入雲月裏仙人親手植出山回望翠雲鬟碧瓦朱欄縹緲間白水田頭問行路小溪深處是何山髙人讀書夜逹旦至今山鶴鳴夜半我今廢學不歸山山中對酒空三歎贈莘老七絶嗟余與子久離羣耳冷心灰百不聞若對青山談世事當須舉白便浮君天目山前渌浸裾碧瀾堂下看銜艫作堤捍水非吾事閒送苕溪入太湖夜來雨洗碧㠝岏浪湧雲屯遶郭寒聞有弁山何處是為君四面竟求看夜橋燈火照溪明欲放扁舟取次行蹔借官奴遣吹笛明朝新月到三更三年京國厭藜蒿長羡淮魚壓楚糟今日駱駝橋下泊恣看脩網出銀刀烏程霜稻襲人香醸作春風霅水光時復中之徐邈聖無多酌我次公狂去年臘日訪孤山曽借僧牕半日閒不為思歸對妻子道人有約徑須還莘老葺天慶觀小園有亭北向道士山宗說乞名與詩春風欲動北風微歸鴈亭邊送鴈歸蜀客南逰家最逺呉山寒盡雪先晞扁舟去後花絮亂五馬來時賓從非惟有道人應不忘抱琴無語立斜暉至秀州贈錢端公安道幷寄其弟惠山山人鴛鴦湖邊月如水孤舟夜榜鴛鴦起平湖繫䌫石橋亭慙愧冒寒髯御史結交最晩情獨厚論心無數今有幾寂寞抱闗歎蕭生耆老執㦸哀揚子怪君顔采却秀發無乃遷謫反便美天公欲困無奈何世人共抑真疎矣毗陵髙山錫為骨陸子遺味泉冰齒賢哉仲氏早拂衣占斷此山長洗耳山頭望湖光潑眼山下濯足波生指儻容逸少問金堂記與嵇康留石髓秀州報本禪院鄉僧文長老方丈萬里家山一夢中呉音漸已變兒童毎逢蜀叟談終日便覺峨眉翠掃空師已忘言真有道我除搜句百無功明年采藥天台去更欲題詩滿浙東王復秀才所居雙檜二首呉王池館徧重城竒草幽花不記名青蓋一歸無覔處秖留雙檜待昇平凜然相對敢相欺直幹凌空未要竒根到九泉無曲處世間惟有蟄龍知宋叔逹家聴琵琶數絃已品龍香撥半面猶遮鳯尾槽新曲翻從玉連鎻舊聲終愛鬱輪袍夢回只記歸舟字賦罷雙垂紫錦絛何異烏孫送公主碧天無際鴈行髙元日次韻張先子野見和七夕寄莘老之作得句牛女夕轉頭參尾中青春先入睡白髪不遺窮酒社我為敵詩壇子有功縮頭先夏鼈見玉川子實腹鄙秋蟲莫唱裙垂緑無人臉斷紅舊交懐賀老新進謝終童袍鶻雙雙瑞腰犀一一通小蠻知在否試問囁嚅翁正月九日有美堂飲醉歸徑睡五鼔方醒不復能眠起閱文書得鮮于子駿所寄古意作雜興一首荅之衆人事紛擾志士獨悄悄何異琵琶絃常遭腰鼓鬧三杯忘萬慮醒後還皎皎有如轆轤索已脫重縈繞家人自約敕始慕陳婦孝可憐原巨先放蕩今誰弔平生嗜羊炙識味肯輕飽烹蛇啖蛙蛤頗訝能稍稍憂來自不寐起視天漢𣺌闌干玉繩低耿耿太白曉次韻荅章傳道見贈並生天地宇同閱古今宙視下則有髙無前孰為後逹人千鈞弩一弛難再彀下士沐猴冠已繫猶跳驟欲將駒過隙坐待石穿溜君看漢唐主宫殿悲麥秀而况彼區區何異一醉富爰居非所養俯仰眩金奏髑髏有餘樂不博南面后嗟我昔少年守道貧非疚自從出求仕役物恐見囿馬融既依梁班固亦事竇效顰豈不欲頑質謝鐫鏤仄聞長者言婞直非養壽唾面慎勿拭出跨當俛就居然成懶廢敢復齒豪右子如照海珠網目疎見漏宏材乏近用巧舞困短袖坐令傾國容臨老見邂逅吾衰信久矣書絶十年舊門前可羅雀感子煩屢叩願言歌緇衣子粲還予授法惠寺横翠閣朝見呉山横暮見呉山從吳山故多態轉側為君容幽人起朱閣空洞更無物惟有千歩岡東西作簾額春來故國歸無期人言悲秋春更悲已泛平湖思濯錦更看横翠憶峨眉琱欄能得幾時好不獨慿欄人易老百年興廢更堪哀懸知草莽化池臺逰人尋我舊逰處但覔呉山横處來祥符寺九曲觀燈紗籠擎燭迎門入銀葉燒香見客邀金鼎轉丹光吐夜寶珠穿蟻鬧連朝波翻焰裏元相激魚舞湯中不畏焦明日酒醒空想像清吟半逐夢魂銷上元過祥符寺僧可久房蕭然無燈火門前歌鼓鬬分朋一室清風冷欲冰不把瑠璃閒照佛始知無盡本無燈正月二十一日病後述古邀徃城外尋春屋上山禽苦喚人檻前冰沼忽生鱗老來厭逐紅裙醉病起空驚白髪新卧聴使君鳴鼓角試呼稚子整冠巾曲欄幽榭終寒窘一看郊原浩蕩春有以官法酒見餉者因用前韻求述古為移厨飲湖上喜逢門外白衣人欲膾湖中赤玉鱗逰舫已粧呉榜穏舞衫初試越羅新欲將魚釣追黄帽未要靴刀抹絳巾芳意十分强半在為君先踏水邊春飲湖上初晴後雨二首朝曦迎客艷重岡晩雨留人入醉鄉此意自佳君不㑹一盃當屬水仙王湖上有水仙王廟水光㶑灔晴方好山色空濛雨亦竒欲把西湖比西子淡粧濃抹總相宜徃富陽新城李節推先行三日留風水洞見待春山磔磔鳴春禽此間不可無我吟路長漫漫傍江浦此間不可無君語金鯽池邊不見君追君直過定山村路人皆言君未逺騎馬少年清且婉風巖水穴舊聞名只隔山溪夜不行溪橋曉溜浮梅萼知君繫馬巖花落出城三日尚逶遲妻孥怪罵歸何時世上小兒誇疾走如君相待今安有風水洞二首和李節推風轉鳴空穴泉幽瀉石門虚心聞地籟妄意覔桃源過客詩難好居僧語不繁歸缾得氷雪清冷慰文園山前雨水隔塵凡山上仙風舞檜杉細細龍鱗生亂石團團羊角轉空巖馮夷窟宅非梁棟禦冠車輿謝轡銜世事漸艱吾欲去永隨二子脫譏讒獨逰富陽普照寺富春真古邑此寺亦唐餘鶴老依喬木龍歸䕶賜書連筒春水逺出谷晩鐘疎欲繼江潮韻何人為起予自普照逰二庵長松吟風晩南細東庵半掩西庵閉山行盡日不逢人浥浥野梅香入袂居僧笑我戀清景自厭山深出無計我雖愛山亦自笑獨徃神傷後難繼不如西湖飲美酒紅杏碧桃香覆髻作詩寄謝採薇翁本不避人那避世富陽妙庭觀董雙成故宅發地得丹鼎覆以銅盤承以瑠璃盆盆既破碎丹亦為人爭奪持去今獨盤鼎在耳二首人去山空鶴不歸丹亡鼎在世徒悲可憐九轉功成後却把飛昇乞内芝琉璃擊碎走金丹無復神光發舊壇時有世人來䑛鼎欲隨雞犬事劉安新城道中二首東風知我欲山行吹斷簷間積雨聲嶺上晴雲披絮帽樹頭初日挂銅鉦野桃含笑竹籬短溪栁自搖沙水清西崦人家應最樂煮芹燒筍餉春耕身世悠悠我此行溪邊委轡聴溪聲散材畏見搜林斧疲馬思聞巻斾鉦細雨足時茶戸喜亂山深處長官清人間岐路知多少試向桑田問耦耕山村五絶竹籬茆屋趂溪斜春入山村處處花無象太平還有象孤烟起處是人家烟雨濛濛雞犬聲有生何處不安生但教黄犢無人佩布榖何勞也勸耕老翁七十自腰鎌慙愧春山筍蕨甜豈是聞韶解忘味爾來三月食無鹽杖藜裹飯去怱怱過眼青錢轉手空贏得兒童語音好一年強半在城中竊禄忘歸我自羞豊年底事汝憂愁不須更待飛鳶墮方念平生馬少游湖上夜歸我飲不盡器半酣尤味長籃輿湖上歸春風吹面涼行到孤山西夜色已蒼蒼清吟雜夢寐得句旋已忘尚記梨花村依依聞暗香入城定何時賔客半在亡睡眼忽驚矍繁燈鬧河塘市人拍手笑狀如失林麞始悟山野姿異趣難自强人生安為樂吾策殊未良寒食未明至湖上太守未來兩縣令先在城頭月落尚啼烏烏榜紅舷早滿湖鼓吹未容迎五馬水雲先已颺雙鳬映山黄帽螭頭舫夾道青烟鵲尾爐老病逢春只思睡獨求僧榻寄須臾次韻孫莘老見贈時莘老移廬州因以别之爐鎚一手賦形殊造物無心敢望渠我本疎頑固當爾子猶淪落况其餘龔黄側畔難言政羅趙前頭且眩書莘老見稱政事與書而莘老書至不工惟有陽闗一杯酒慇懃重唱贈離居贈别青鳥銜巾久欲飛黄鸎别主更悲啼慇懃莫忘分擕處湖水東邊鳯嶺西次韻代留别綘蠟燒殘玉斚飛離歌唱徹萬行啼他年一舸䲭夷去應記儂家舊姓西月茶環非環玦非玦中有迷離玉兒一似佳人裙上月月圓還缺缺還圓此月一缺圓何年君不見鬬茶公子不忍鬬小團上有雙銜綬帶雙飛鸞薄命佳人雙頰凝酥髪抹漆眼光入簾珠的皪故將白練作仙衣不許紅膏汙天質吳音嬌軟帶兒癡無限閒愁總未知自古佳人多命薄閉門春盡楊花落吉祥寺花將落而述古不至今嵗東風巧剪裁含情只待使君來對花無信花應恨直恐明年便不開述古聞之明日即來坐上復用前韻同賦仙衣不用剪刀裁國色初酣卯酒來太守問花花有語為君零落為君開李鈐轄坐上分題戴花二八佳人細馬䭾十千美酒渭城歌簾前柳絮驚春晚頭上花枝奈老何露濕醉巾香掩冉月明歸路影婆娑緑珠吹笛何時見欲把斜紅插皂羅於潜令刁同年野翁亭山翁不出山溪翁長在溪前二令作二翁亭不如野翁來徃溪山間上友麋鹿下鳬鷖問翁何所樂三年不去煩推擠翁言此間亦有樂非絲非竹非蛾眉山人醉後鐵冠落溪女笑時銀櫛低我來觀政問風謡皆云吠犬足生氂但恐此翁一旦舎此去長使山人索寞溪女啼天目山唐道士常冠鐵冠於潜婦女皆插大銀櫛長尺許謂之篷沓於潛女青裙縞袂於潛女兩足如霜不穿屨􅡬沙鬢髪絲穿柠蓬沓障前走風雨老濞宫粧傳父祖至今遺民悲故主苕溪楊柳初飛絮照溪畫眉渡溪去逢郎樵歸相媚嫵不信姬姜有齊魯自昌化雙溪館下歩尋溪源至治平寺二首亂山滴翠衣裘重雙澗響空牕戸摇飽食不嫌溪筍瘦穿林閒覔野芎苗却愁縣令知逰寺尚喜漁人爭渡橋正似醴泉山下路桑枝刺眼麥齊腰毎見田園輒自招倦飛不擬控扶摇共疑楊惲非鋤豆誰信劉章解立苗老去尚貪彭澤米夢歸時到錦江橋宦逰莫作無家客舉族長懸似細腰於潜僧緑筠軒可使食無肉不可居無竹無肉令人瘦無竹令人俗人瘦尚可肥士俗不可醫旁人笑此言似髙還似癡若對此君仍大嚼世間那有揚州鶴與臨安令宗人同年劇飲我雖不解飲把琖歡意足試呼白髪感秋人令唱黄雞催曉曲與君登科如隔晨敝袍霜葉空殘緑如今莫問老與少兒子森森如立竹黄雞催曉不須愁老盡世人非我獨寶山晝睡七尺頑軀走世塵十圍便腹貯天真此中空洞渾無物何止容君數百人東坡全集巻四
