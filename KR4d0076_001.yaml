body:
  text: 東坡全集卷一宋蘇軾撰詩四十七首辛丑十一月十九日既與子由别於鄭州西門之外馬上賦詩一篇寄之不飲胡為醉兀兀此心已逐歸鞍發歸人猶自念庭闈今我何以慰寂寞登高回首坡隴隔惟見烏帽出復沒苦寒念爾衣裳薄獨騎瘦馬踏殘月路人行歌居人樂僮僕怪我苦悽惻亦知人生要有别但恐嵗月去飄忽寒燈相對記疇昔夜雨何時聽蕭瑟君知此意不可忘愼勿苦愛高官職嘗有夜雨對牀之言故云爾和子由澠池懷舊人生到處知何似應似飛鴻踏雪泥泥上偶然留指爪鴻飛那復計東西老僧巳死成新塔壞壁無由見舊題往日﨑嶇還記否路長人困蹇驢嘶往嵗馬死於二陵騎驢至澠池次韻和劉京兆石林亭之作石本唐苑中物散流民間劉購得之都城日荒廢往事不可還惟餘故苑石漂散向人間公來始購蓄不憚道里艱盡從塵埃中來對冰雪顔瘦骨拔凜凜蒼根漱潺潺唐人惟竒章好石古莫攀盡令屬牛氏刻鑿紛班班嗟此本何常聚散實循環人失亦人得要不出區寰君看劉李末不能保河關况此百株石鴻毛於泰山但當對石飲萬事付等間壬寅二月有詔令郡史分往屬縣減決囚禁十三日受命出府至寶雞虢郿盩厔四縣既畢事因朝謁太平宫而宿於南溪溪堂遂並南山而西至樓觀大秦寺延生觀仙遊潭十九日乃歸作詩五百言以記凡所經歷者寄子由逺人罹水旱王命釋俘囚分縣傳明詔循山得勝遊蕭條初出郭曠蕩實消憂薄暮來孤鎮登臨憶武侯崢嶸依絶壁蒼茫瞰奔流半夜人呼急橫空火氣浮天遙殊不辨風急巳難收曉入陳倉縣猶餘賣酒樓煙煤巳狼藉吏卒尚呀咻十三日宿武城鎮即俗所謂石鼻寨也云孔明所築是夜二鼓寶雞火作相去三十里而見於武城雞嶺雲霞古龍宫殿宇幽縣有雞爪峯龍宫寺南山連大散歸路走吾州欲往安能遂將還為少留回趨西虢道却渡小河洲聞道磻溪石猶存渭水頭蒼崖雖有迹大釣本無鈎十四日自寶雞行至虢聞太公磻溪石在縣東南十八里猶有投竿跪餌兩膝所著之處東去過郿塢孤城象漢劉誰言董公健竟復伍孚讐白刃俄生肘黃金漫似丘十五日至郿縣縣有董卓城其城象長安俗謂之小長安平生聞太白一見駐行騶鼓角誰能試風雷果致不巖崖巳竒絶冰雪更雕鎪春旱憂無麥山靈喜有湫蛟龍懶方睡瓶罐小容偷是日晚自郿起至青秋鎮宿道過太白山相傳云軍行鳴鼓角過山下輒致雷雨山上有湫甚靈以今歲旱方議取之二曲林泉勝三川氣象侔近山牟麥早臨水竹篁修十六日至盩厔以近山地美氣候殊早縣有官竹園十數里不絶先帝膺符命行宫畫冕旒侍臣簮武辨女樂抱箜篌祕殿開金鎖神人控玉虯黑衣橫巨劒被髮凛雙眸十七日寒食自盩厔東南行二十餘里朝謁太平宫二聖御容此宫乃太宗皇帝時有神降於道士張守真以告受命之符所為立也神封翊聖將軍有殿邂逅逄佳士相將弄綵舟投篙披緑荇濯足亂清溝晚宿南溪上森如水國秋繞湖栽翠密終夜響颼飀是日與監宫張杲之泛舟南溪遂宿於溪堂冒曉窮幽邃操戈畏炳彪十八日循終南而西縣尉以甲卒見送或云近官竹園往往有虎尹生猶有宅老氏舊停輈問道遺蹤在登仙往事悠馭風歸汗漫閲世似蜉蝣羽客知人意瑤琴繫馬鞦不辭山寺逺來作鹿鳴呦帝子傳聞李巖堂髣像緱輕風幃幔卷落日髻鬟愁入谷音浴驚蒙密登坡費挽摟亂峰巉似槊一水淡如油中使何年到金龍自古投千重橫翠石百丈見遊倏最愛泉鳴洞初嘗雪入喉滿瓶雖可致洗耳歎無由是日遊崇聖觀俗所謂樓觀也乃尹喜舊宅山腳有授經臺尚在遂與張杲之同至大秦寺早食而别有太平宫道士趙宗有抱琴見送至寺作鹿鳴之引乃去又西至延生觀觀後上小山有唐玉真公主修道之遺迹下山而西行十數里南入黑水谷谷中有潭名仙遊潭上有寺三倚峻峰面清溪樹林深翠怪石不可勝數潭水以繩縋石數百尺不得其底以瓦礫投之翔揚徐下食頃乃不見其清徹如此遂宿於中興寺寺中有玉女洞洞中有飛泉甚甘明日以泉二瓶歸至郿又明日乃至府忽憶尋蟆培方冬脫鹿裘山川良甚似水石亦堪儔惟有泉旁飲無人自獻酬昔與子由遊蟆培時方冬洞中溫溫如二三月太白山下早行至橫渠鎮書崇壽院壁馬上續殘夢不知朝日升亂山橫翠幛落月淡孤燈奔走煩郵吏安間愧老僧再遊應眷眷聊亦記吾曾留題延生觀後山上小堂溪山愈好意無厭上到巉巉第幾尖深谷野禽毛羽怪上方仙子鬢眉纎不慙弄玉騎丹鳳應逐常娥駕老蟾澗草巖花自無主晚來蝴蝶入疏簾留題仙遊潭中興寺寺東有玉女洞洞南有馬融讀書石室過潭而南山石益竒潭上有橋畏其險不敢渡清潭百丈皎無泥山木隂隂谷鳥啼蜀客曾遊明月峽秦人今在武陵溪獨攀書室窺巖竇還訪仙姝款石閨猶有愛山心未至不將雙腳踏飛梯石鼻城平時戰國今無在陌上征夫自不間北客初來試新險蜀人從此送殘山獨穿暗月朦朧裏愁渡奔河蒼茫間漸入西南風景變道邊修竹水潺潺磻溪石墨突不暇黔孔席未嘗暖安知渭上叟跪石留雙骭一朝嬰世故辛苦平多難亦欲就安眠旅人譏客懶郿塢衣中甲厚行何懼塢裏金多退足憑畢竟英雄誰得似臍脂自照不須燈樓觀秦始皇始立老子廟於觀南晉惠始修此觀門前古碣卧斜陽閲世如流事可傷長有遊人悲晉惠強修遺廟學秦皇丹砂久窖井水赤白术誰燒厨竈香聞道神仙亦相過只疑田叟是庚桑九月二十日微雪懷子由弟二首岐陽九月天微雪已作蕭條嵗暮心短日送寒砧杵急冷官無事屋廬深愁腸别後能消酒白髮秋來已上簮近買貂裘堪出塞忽思乘傳問西琛江上同舟詩滿篋鄭西分馬涕垂膺未成報國慙書劒豈不懷歸畏友朋官舍度秋驚歲晚寺樓見雪與誰登遙知讀易東窗下車馬敲門定不譍病中聞子由得告不赴商州三首病中聞汝免來商旅鴈何時更著行逺别不知官爵好思歸苦覺歲年長著書多暇真良計從宦無功謾去鄉惟有王城最堪隱萬人如海一身藏近從章子聞渠説苦道商人望汝來説客有靈慙直道逋翁久沒厭凡才夷音僅可通名姓癭俗無由辨頸腮答䇿不堪宜落此上書求免亦何哉章子惇也辭官不出意誰知敢向清時怨位卑萬事悠悠付杯酒流年冉冉入霜髭䇿曾忤世人嫌汝易可忘憂家有師此外知心更誰是夢魂相覔苦參差病中大雪數日未嘗起觀虢令趙薦以詩相屬戲用其韻答之經旬卧齋閣終日親劑和不知雪巳深但覺寒無奈飄蕭窗紙鳴堆壓簷板墮關中皆以板為簷風飈助凝冽幃幔困掀簸惟思近醇醲未敢窺璨瑳何時反炎赫却欲躬臼磨誰云座無氊尚有裘充貨西鄰歌吹發促席寒威挫崩騰踏成徑繚繞飛入坐人歡瓦先融飲俊瓶屢卧嗟余獨愁寂空室自困坷欲為後日賞恐被遊塵涴寒更報新霽皎月懸半破有客獨苦吟清夜默自課詩人例窮蹇秀句出寒餓何當暴雪霜庶以躡郊賀歲晚相與餽問為餽歲酒食相邀呼為别歲至除夜達旦不眠為守歲蜀之風俗如是余官岐下嵗暮思歸而不可得故為此三詩寄子由餽歲農功各巳收嵗事得相佐為歡恐無具假物不論貨山川隨出産貧富稱小大置盤巨鯉橫發籠雙兔卧富人事華靡綵繡光翻座貧者愧不能微摯出舂磨官居故人少里巷佳節過亦欲舉鄉風獨倡無人和别歲故人適千里臨别尚遲遲人行猶可復歲行那可追問嵗安所之逺在天一涯已逐東流水赴海歸無時東鄰酒初熟西舍彘亦肥且為一日歡慰此窮年悲勿嗟舊嵗别行與新歲辭去去勿回顧還君老與衰守歲欲知垂盡歲有似赴壑蛇修鱗半巳沒去意誰能遮况欲繫其尾雖勤知奈何兒童強不睡相守夜歡譁晨雞且勿唱更鼓畏添撾坐久燈燼落起看北斗斜明年豈無年心事恐蹉跎努力盡今夕少年猶可誇和子由踏青春風陌上驚微塵遊人初樂歲華新人間正好路旁飲麥短未怕遊車輪城中居人厭城郭喧闐曉出空四鄰歌鼓驚山草木動簞瓢散野烏鳶馴何人聚衆稱道人遮道賣符色怒瞋宜蠶使汝繭如甕宜畜使汝羊如麕路人未必信此語強為買服禳新春道人得錢徑沽酒醉倒自謂吾符神和子由蠶市蜀人衣食常苦艱蜀人遊樂不知還千人耕種萬人食一年辛苦一春間間時尚以蠶為市共忘辛苦逐欣歡去年霜降斫秋荻今年箔積如連山破瓢為輪土為釡爭買不翅金與紈憶昔與子皆童丱年年廢書走市觀市人爭誇鬬巧智野人喑啞遭欺謾詩來使我感舊事不悲去國悲流年和子由苦寒見寄人生不滿百一别費三年三年吾有幾棄擲理無還長恐别離中摧我鬢與顔念昔喜著書别來不成篇細思平時樂乃謂憂所緣吾從天下士莫如與子歡羡子久不出讀書蝨生氊丈夫重出處不退要當前西羌解仇隙猛士憂塞壖廟謀雖不戰虜意久欺天山西良家子錦緣貂裘鮮千金買戰馬百寶粧刀環何時逐汝去與虜試周旋和子由論書吾雖不善書曉書莫如我苟能通其意常謂不學可貌妍容有顰璧美何妨橢端莊雜流麗剛健含婀娜好之每自譏不謂子亦頗書成輒棄去繆被旁人裹體勢本闊略結束入細麼子詩亦見推語重未敢荷邇來又學射力薄愁官笴官箭十二把吾能十一把箭耳多好竟無成不精安用夥何當盡屏去萬事付懶惰吾聞古書法守駿莫如跛世俗筆苦驕衆中強嵬騀鍾張忽已遠此語與時左記所見開元寺吳道子畫佛滅度以答子由西方真人誰所見衣被七寶從雙狻當時修道頗辛苦柏生兩肘烏巢肩初如濛濛隱山玉漸如濯濯出水蓮道成一旦就空滅奔會四海悲人天翔禽哀響動林谷獸鬼躑躅淚迸泉龎眉深目彼誰子繞牀彈指性自圓隱如寒月墮清晝空有孤光留故躔春遊古寺拂塵壁遺像久此霾香煙畫師不復寫名姓皆云道子口所傳從橫固已蔑孫鄧有如巨鰐吞小鮮來詩所誇孰與此安得攜挂其旁觀和子由寒食寒食今年二月晦樹林深翠巳生煙繞城駿馬誰能借到處名園意盡便但挂酒壺那計盞偶題詩句不須編忽聞啼鵙驚羇旅江上何人治廢田和劉長安題薛周逸老亭周最善飲酒未七十而致仕近聞薛公子早退驚常流買園招野鶴鑿井動潛虬自言酒中趣一斗勝涼州翻然拂衣去親愛挽不留隱居亦何樂素志庶可求所亡嗟無幾所得不啻酬青春為君好白日為君悠山鳥奏琴築野花弄間幽雖辭功與名其樂實素侯至今清夜夢尚驚冠壓頭誰能載美酒往以太白浮之子雖不識因公可與遊中隱堂詩并敘岐山宰王君紳其祖故蜀人也避亂來長安而遂家焉其居第園圃有名長安城中號中隱堂者是也豫之長安王君以書戒其子弟邀豫遊且乞詩甚勤因為作此五篇去蜀初逃難遊秦遂不歸園荒喬木老堂在昔人非鑿石清泉激開門野鶴飛退居吾久念長恐此心違徑轉如修蟒坡垂似伏鼇樹從何代有人與此堂高好古嗟生晚偷間厭久勞王孫早歸隱塵土汚君袍二月驚梅晚幽香此地無依依慰逺客皎皎似吳姝不恨故園隔空嗟芳歲徂春深桃杏亂笑汝益羈孤翠石如鸚鵡何年别海壖貢隨南使逺載壓渭舟偏已伴喬松老那知故國遷金人解辭漢汝獨不澘然都城更幾姓到處有殘碑古隧埋蝌蚪崩崖露伏龜安排壯亭榭收拾費金資岣嶁何須到韓公浪自悲鳳翔八觀并敘鳳翔八觀詩記可觀者八也昔司馬子長登會稽探禹穴不逺千里而李太白亦以七澤之觀至荆州二子蓋悲世悼俗自傷不見古人而欲一觀其遺迹故其勤如此鳳翔當秦蜀之交士大夫之所朝夕往來此八觀者又皆跬步可至而好事者有不能遍觀焉故作詩以告欲觀而不知者石鼓冬十二月歲辛丑我初從政見魯叟舊聞石鼓今見之文字鬱律蛟蛇走細觀初以指畫肚欲讀嗟如箝在口韓公好古生已遲我今况又百年後強尋偏旁推點畫時得一二遺八九我車既攻馬亦同其魚維鱮貫之栁其詞云我車既攻我馬既同又云其魚維何維鱮維鯉何以貫之惟楊與栁惟此六句可讀餘多不可通古器縱橫猶識鼎衆星錯落僅名斗糢糊半已似瘢胝詰曲猶能辨跟肘娟娟缺月隱雲霧濯濯嘉禾秀莨莠漂流百戰偶然存獨立千載誰與友上追軒頡相唯諾下揖冰斯同鷇㝅憶昔周宣歌鴻鴈當時籀史變蝌蚪厭亂人方思聖賢中興天為生耆耉東征徐虜闞虓虎北伏犬戎隨指嗾象胥雜沓貢狼鹿方召聨翩賜圭卣遂因鼓鼙思將帥豈為考擊煩矇瞍何人作頌比嵩高萬古斯文齊岣嶁勳勞至大不矜伐文武未逺猶忠厚欲尋年嵗無甲乙豈有名字記誰某自從周衰更七國竟使秦人有九有掃除詩書誦法律投棄爼豆陳鞭杻當年何人佐祖龍上蔡公子牽黃狗登山刻石頌功烈後者無繼前無偶皆云皇帝巡四國烹滅強暴救黔首六經既巳委灰塵此鼓亦當遭擊剖傳聞九鼎淪泗上欲使萬夫沉水取暴君縱欲窮人力神物義不汙秦垢是時石鼓何處避無乃天公令鬼守興亡百變物自間富貴一朝名不朽細思物理坐歎息人生安得如汝壽詛楚文碑獲於開元寺土下今在太守便廳秦穆公葬於雍槖泉祈年觀下今墓在開元寺之東南數十步則寺豈祈年之故基耶淮南王遷於蜀至雍道病卒則雍非長安此乃古雍也崢嶸開元寺髣佛祈年觀舊築掃成空古碑埋不爛詛書雖可讀字法嗟久換詞云秦嗣王敢使祝用瓉先君穆公世與楚約相捍質之於巫咸萬葉期不叛今其後嗣王乃敢搆多難刳胎殺無罪親族遭圉絆計其所稱訴何啻桀紂亂吾聞古秦俗面詐背不汗豈惟公子卭社鬼亦遭謾遼哉千嵗後發我一笑粲王維吳道子畫何處訪吳畫普門與開元開元有東塔摩詰留手痕吾觀畫品中莫如二子尊道子實雄放浩如海波翻當其下手風雨快筆所未到氣巳吞亭亭雙林間彩暈扶桑暾中有至人談寂滅悟者悲涕迷者手自捫蠻君鬼伯千萬萬相排競進頭如黿摩詰本詩老佩芷襲芳蓀今觀此壁畫亦若其詩清且敦祗園弟子盡鶴骨心如死灰不復溫門前兩叢竹雪節貫霜根交柯亂葉動無數一一皆可尋其源吳生雖妙絶猶以畫工論摩詰得之於象外有如仙翮謝籠樊吾觀二子皆神俊又於維也斂袵無間言維摩像唐楊惠之塑在天柱寺昔者子輿病且死其友子祀往問之跰􅓷鑒井自嘆息造物將安以我為今觀古塑維摩像病骨磊嵬如枯龜乃知至人外生死此身變化浮雲隨世人豈不碩且好身雖未病心巳疲此叟神完中有恃談笑可却千熊羆當其在時或問法俯首無言心自知至今遺像兀不語與昔未死無增虧田翁俚婦那肯顧時有野鼠銜其髭見之使人每自失誰能與結無言師東湖吾家蜀江上江水緑如藍爾來走塵土意思殊不堪况當岐山下風物尤可慙有山秃如赭有水濁如泔不謂郡城東數步見湖潭入門便清奧恍如夢西南泉源從高來隨流走涵涵東去觸重阜盡為湖所貪但見蒼石螭開口吐清甘借汝腹中過胡為目耽耽新荷弄晚涼輕棹極幽探飄颻忘逺近偃息遺佩篸深有龜與魚淺有螺與蚶曝晴復戲雨戢戢多於蠶浮沉無停餌倐忽遽滿籃絲緡雖強致瑣細安足戡聞昔周道興翠鳯棲孤嵐飛鳴飲此水照影弄毿毿此古飲鳯池也至今多梧桐合抱如彭􅖫綵羽無復見上有鸇搏䳺嗟豫生雖晚考古意所妉圖書巳漫漶猶復訪僑郯卷阿詩可繼此意久已含扶風古三輔政事豈汝諳聊為湖上飲一縱醉後談門前遠行客劫劫無留驂問胡不回首無乃趁朝參豫今正疏懶官長幸見函不辭日遊再行恐歲滿三暮歸還倒載鐘鼓巳韽韽音諳真興寺閣山川與城郭漠漠同一形市人與鴉鵲浩浩同一聲此閣幾何高何人之所營側身送落日引手攀飛星當年王中令斫木南山頳寫真留閣下鐵面眼有稜身長八九尺與閣兩崢嶸古人雖暴恣作事今世驚登者尚呀喘作者何以勝曷不觀此閣其人勇且英李氏園李茂貞園也今為王氏所有朝遊北城東回首見修竹下有朱門家破墻圍古屋舉鞭叩其户幽響答空谷入門所見夥十步九移目異花兼四方野鳥喧百族其西引溪水活活轉墻曲東注入深林林深窗户緑水光兼竹淨時有獨立鵠林中百尺松歲久蒼鱗蹙豈惟此地少意恐關中獨小橋過南浦夾道多喬木隱如城百雉挺若舟千斛隂隂日光淡黯黯秋氣蓄盡東為方池野鴈雜家鶩紅梨驚合抱映島孤雲馥春光水溶漾雪陳風翻撲其北臨長溪波聲捲平陸北山卧可見蒼翠間磽秃我時來周覽問此誰所築云昔李將軍負嶮乘衰叔抽錢算間口但未𣙜羮粥當時奪民田失業安敢哭誰家美園圃籍沒不容贖此亭破千家鬱鬱城之麓將軍竟何事蟣蝨生刀韣何嘗載美酒來此駐車轂空使後世人聞名頸猶縮俗猶呼皇后園蓋茂貞謂其妻也我今官正間屢至因休沐人生營居止竟為何人卜何當辦一身永與清景逐秦穆公墓橐泉在城東墓在城中無百步乃知昔未有此城秦人以泉識公墓昔公生不誅孟明豈有死之日而忍用其良乃知三子徇公意亦如齊之二子從田橫古人感一飯尚能殺其身今人不復見此等乃以所見疑古人古人不可望今人益可傷和子由聞子瞻將如終南太平宫溪堂讀書役名則巳勤徇身則巳偷我誠愚且拙身名兩無謀始者學書判近亦知問囚但知今當為敢問向所由士方其未得唯以不得憂既得又憂失此心浩難收譬如倦行客中路逄清流塵埃雖未脫暫憩得一漱我欲走南澗春禽始嚶呦鞅掌久不決爾來巳徂秋橋山日月迫府縣煩差抽王事誰敢訴民勞吏宜羞中間罹旱暵欲學喚雨鳩千夫挽一木十步八九休渭水涸無泥災堰旋插修對之食不飽餘事更遑求近日秋雨足公餘試新篘劬勞幸已過朽鈍不任鎪秋風迫吹帽西阜可縱遊聊為一日樂慰此百日愁將往終南和子由見寄人生百年寄鬢鬚富貴何啻葭中莩惟將翰墨留染濡絶勝醉倒蛾眉扶我今廢學如寒竽久不吹之澀欲無歲云暮矣嗟幾餘欲往南溪侣禽魚秋風吹雨涼生膚夜長耿耿添漏壺窮年弄筆衫袖烏古人有之我願如終朝危坐學僧趺閉門不出間履鳬下視官爵如泥淤嗟我何為久踟蹰歲月豈肯為汝居僕夫起餐秣吾駒七月二十四日以久不雨出禱磻溪是日宿虢縣二十五日晚自虢縣渡渭宿於僧舍曾閣閣故曾氏所建也夜久不寐見壁有前縣令趙薦留名有懷其人龕燈明滅欲三更欹枕無人夢自驚深谷留風終夜響亂山銜月半牀明故人漸逺無消息古寺空來有姓名欲向磻溪問薑叟僕夫屢報斗杓傾二十六日五更起行至磻溪未明夜入磻溪如入峽照山炬火落驚猿山頭孤月耿猶在石上寒波曉更喧至人舊隱白雲合神物已化遺蹤蜿安得夢隨霹靂駕馬上傾倒天瓢翻是日自磻溪將往陽平憩於麻田青峰寺之下院翠麓亭不到峰前寺空來渭上村此亭聊可喜修徑豈辭捫谷映朱欄秀山含古木尊路窮驚石斷林缺見河奔馬困嘶青草僧留薦晚飱我來秋日午旱久石牀溫安得雲如蓋能令雨瀉盆共看山下稻涼葉晚翻翻二十七日自陽平至斜谷宿於南山中蟠龍寺橫槎晚渡碧澗口騎馬夜入南山谷音浴谷中暗水響瀧瀧嶺上疏星明煜煜寺藏巖底千萬仞路轉山腰三百曲風生飢虎嘯空林月黑驚麏竄修竹入門突兀見深殿照佛青熒有殘燭愧無酒食待遊人旋斫杉松煮溪蔌板閣獨眠驚旅枕木魚曉動隨僧粥起觀萬瓦鬱參差目亂千巖散紅緑門前商賈負椒荈山後咫尺連巴蜀何時歸耕江上田一夜心逐南飛鵠是日至下馬磧憩於北山僧舍有閣曰懷賢南直斜谷西臨五丈原諸葛孔明所從出師也南望斜谷口三山如犬牙西觀五丈原鬱屈如長蛇有懷諸葛公萬騎出漢巴吏士寂如水蕭蕭聞馬撾公才與曹丕豈止十倍加顧瞻三輔間勢若風捲沙一朝長星墜竟使蜀婦髽山僧豈知此一室老煙霞往事逐雲散故山依渭斜客來空弔古清淚落悲笳東坡全集卷一
