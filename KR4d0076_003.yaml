body:
  text: 東坡全集巻三宋蘓軾撰詩七十六首泗州僧伽塔我昔南行舟繫汴逆風三日沙吹面舟人共勸禱靈塔香火未收旗脚轉回頭頃刻失長橋却到龜山未朝飯至人無心何厚薄我自懐私欣所便耕田欲雨刈欲晴去得順風來者怨若使人人禱輒遂造物應須日千變我今身世兩悠悠去無所逐來無戀得行固願留不惡毎到有求神亦倦退之舊云三百尺澄觀所營今已換不嫌俗士汙丹梯一看雲山遶淮旬龜山我生飄蕩去何求再過龜山歳五周身行萬里半天下僧卧一庵初白頭地隔中原勞北望潮連滄海欲東逰元嘉舊事無人記故壘摧頽今在不宋文帝遣將拒魏太武築城此山發洪澤中塗遇大風復還風浪忽如此吾行欲安歸掛帆却西邁此計未為非洪澤三十里安流去如飛居民見我還勞問亦依依㩦酒就船賣此意厚莫違醒來夜已半岸木聲向微明日淮隂市白魚能許肥我行無南北適意乃所祈何勞弄澎湃終夜摇牕扉妻孥莫憂色更有篋中衣十月十六日記所見風高月暗水雲黄淮隂夜發朝山陽山陽曉霧如細雨炯炯初日寒無光雲收霧巻已亭午有風北來寒欲僵忽驚飛雹穿戸牖迅駛不復容遮防市人顛沛百賈亂疾雷一聲如頽牆使君來呼晩置酒坐定巳復日照廊怳疑所見皆夢寐百種變怪旋消亡共言蛟龍厭舊穴魚鼈隨徙空陂塘愚儒無知守章句論說黒白推何祥惟有主人言可用天寒欲雪飲此觴廣陵㑹三同舎各以其字為韻仍邀同賦劉貢父去年送劉郎醉語已驚衆如今各漂泊筆硯誰能弄我命不在天羿彀未必中作詩聊遣意老大慵譏諷夫子少年時雄辯輕子貢爾來再傷弓戢翼念前痛廣陵三日飲相對怳如夢况逢賢主人白酒潑春甕竹西已揮手灣口猶屢送羡子去安閒吾邦正喧鬨孫巨源三年客京輦憔悴難具論揮汗紅塵中但隨馬蹄翻人情貴徃返不報生禍根坐令平生友終嵗不及門南來實清曠但恨無與言不謂廣陵城得逢劉與孫異趣不兩立譬如王孫猿吾儕久相聚恐見疑排拫我褊類中散子通真巨源絶交固未敢且復東南奔劉萃老江陵昔相遇幕府稱上賔再見明光宫峩冠挹搢紳如今三見子坎坷為逐臣朝逰雲霄間欲分丞相茵莫落江湖上遂與屈子隣了不見喜愠子豈真可人邂逅成一歡醉語出天真士方在田里自比渭與莘出試乃大謬芻狗難重陳嵗晚多霜露歸耕當及辰逰金山寺我家江水初發源宦逰直送江入海聞道潮頭一丈髙天寒尚有沙痕在中泠南畔石盤陁古來出没隨濤波試登絶頂望鄉國江南江北青山多羇愁畏晩尋歸楫山僧苦留看落日㣲風萬頃鞾文細斷霞半空魚尾赤是時江月初生魄二更月落天深黒江心似有炬火明飛焰照山棲鳥驚悵然歸卧心莫識非鬼非人竟何物江山如此不歸山江神見怪驚我頑我謝江神豈得已有田不歸如江水是夜所見如此自金山放船至焦山金山樓觀何耽耽撞鐘擊皷聞淮南焦山何有有修竹採薪汲水僧兩三雲霾浪打人迹絶時有沙戸祈春蠶我來金山更留宿而此不到心懐慙同逰盡返决獨徃賦命窮薄輕江潭清晨無風浪自湧中流歌嘯倚半酣老僧下山驚客至迎笑喜作巴人談自言久客忘鄉井只有彌勒為同龕困眠得就紙帳暖飽食未厭山蔬甘山林飢卧古亦有無田不退寧非貪展禽雖未三見黜叔夜自知七不堪行當投劾謝簮組為我佳處留茆庵呉人謂水中可田者為沙焦山長老中江人也甘露寺江山豈不好獨遊情易闌但有相㩦人何必素所歡我欲訪甘露當途無閒官二子舊不識欣然肯聨鞍古郡山為城層梯轉朱欄樓臺斷崖上地窄天水寛一覽吞數州山長江漫漫却望大明寺惟見烟中竿很石卧庭下穹隆如伏羱緬懐卧龍公挾策事琱鑚一談收猘子再說走老瞞名髙有餘想事徃無留觀蕭翁古鐵鑊相對空團團坡陁受百斛積雨生㣲瀾泗水逸周鼎渭城辭漢盤山川失故態怪此能獨完僧繇六化人霓衣挂氷紈隠見十二疊觀者疑夸謾破板陸生畫青猊戲盤跚上有二天人揮手如翔鸞筆墨雖欲盡典刑垂不刋赫赫贊皇公英姿凛以寒古栢親手種挺然誰敢干枝撐雲峯裂根入石窟蟠薙草得斷碑斬崖出金棺瘞藏豈不牢見伏理可歎四雄皆龍虎遺迹儼未刓方其盛壯時爭奪肯少安廢興屬造物遷逝誰控摶况彼妄庸子而欲事所難古今共一軌後世徒辛酸聊興廣武歎不待雍門彈次韻子由柳湖感物憶昔子美在東屯數間茒屋蒼山根嘲吟草木調蠻獠欲與猿鳥爭啾喧子今憔悴衆所棄驅馬獨出無徃還惟有柳湖萬株柳清隂與子供朝昏胡為譏評不少借生意凌挫難為繁柳雖無言不解愠世俗乍見應憮然嬌姿共愛春濯濯豈問空腹脩蛇蟠朝看濃翠傲炎赫夜愛踈影摇清圓風翻雪陣春絮亂蠧響啄木秋聲堅四時盛衰各有態摇落淒愴驚寒温南山孤松積雪底抱凍不死誰復賢送蔡冠卿知饒州吾觀蔡子與人遊掀豗笑語無不可平時儻蕩不驚俗臨事迂闊乃過我横前坑穽衆所畏布路金珠誰不裹爾來變化驚何速昔號剛強今亦頗憐君獨守廷尉法晩歳却理鄱陽柁莫嗟天驥出羸牛欲試良玉須猛火世事徐觀真夣寐人生不信長轗軻知君决獄有隂功他日老人酬魏顆次韻楊褒早春窮巷淒涼苦未和君家庭院得春多不辭瘦馬騎衝雪來聴佳人唱踏莎破恨徑須煩麴糵増年誰復怨羲娥良辰樂事古難並白髪青衫我亦歌細雨郊園聊種菜冷官門戸可張羅放朝三日君恩重睡美不知身在何初到杭州寄子由二絶眼看時事力難勝貪戀君恩退未能遲鈍終須投劾去使君何日換聾丞聖明寛大許全身衰病摧頽自畏人莫上岡頭苦相望吾方祭竈請比隣次韻柳子玉二首地爐細聲蚯蚓發銀瓶擁褐横眠天未明衰鬢鑷殘欹雪領壯心降盡倒風旌自稱丹竈錙銖火倦聽山城長短更聞道牀頭惟竹几夫人應不解卿卿俗謂竹几為竹夫人紙帳亂文龜殻細相連慣卧青綾恐未便潔似僧巾白㲲布暖於蠻帳紫茸氈錦衾速巻持還客破屋那愁仰見天但恐嬌兒還惡睡夜深踏裂不成眠臘日逰孤山訪惠勤惠思二僧天欲雪雲滿湖樓臺明滅山有無水清石出魚可數林深無人鳥相呼臘日不歸對妻孥名尋道人實自娛道人之居在何許寶雲山前路盤紆孤山孤絶誰肯廬道人有道山不孤紙牕竹屋深自暖擁褐坐睡依團蒲天寒路逺愁僕夫整駕催歸及未晡出山迴望雲木合但見野鶻盤浮圖茲逰淡泊歡有餘到家恍如夢蘧蘧作詩火急追亡逋清景一失後難摹李杞寺丞見和前篇復用元韻答之獸在藪魚在湖一入池檻歸期無誤隨弓旌落塵土坐使鞭箠環呻呼追胥連保罪及孥近屢獲鹽賊皆坐同保徙其家百日愁歎一日娛白雲舊有終老約朱綬豈合山人紆人生何者非蘧廬故山鶴怨秋猿孤何時自駕鹿車去掃除白髪煩菖蒲麻鞋短後隨獵夫射弋狐共朝晡陶潛自作五柳傳潘閬畫入三峰圖吾年凛凛今幾餘知非不去慙衛蘧嵗荒無術歸亡逋鵠則易畫虎難摹再和東望海西望湖山平水逺細欲無野人踈狂逐魚釣刺史寛大容歌呼君恩飽煖及爾孥才者不閒拙者娛穿巖度嶺脚力健未厭山水相縈紆三百六十古精廬出逰無伴籃輿孤作詩雖未造藩閾破悶豈不賢樗蒲君才敏贍兼百夫朝作千篇日未晡朅來湖上得佳句從此不看營丘圖知君篋櫝富有餘莫惜錦繡償菅蘧窮多鬬嶮誰先逋賭取名畫不用摹逰靈隠寺得來詩復用前韻君不見錢塘湖錢王壯觀今巳無屋堆黄金斗量珠運盡不勞折簡呼四方宦遊散其孥宫闕留與閒人娛盛衰哀樂兩須臾何用多憂心鬱紆溪山處處皆可廬最愛靈隠飛來孤喬松百丈蒼髯鬚擾擾下笑柳與蒲髙堂㑹食羅千夫撞鐘擊皷喧朝晡凝香方丈眠氍毹絶勝絮被縫海圖清風時來驚睡餘遂超羲皇傲几蘧歸時棲鴉正畢逋孤烟落日不可摹戲子由宛丘先生長如丘宛丘學舎小如舟常時低頭誦經史忽然欠伸屋打頭斜風吹帷雨注面先生不愧旁人羞任從飽死笑方朔肯為雨立求秦優眼前勃豀何足道處置六鑿須天逰讀書萬巻不讀律致君堯舜知無術勸農冠蓋鬧如雲送老虀鹽甘似蜜門前萬事不掛眼頭雖長低氣不屈餘杭别駕無功勞畫堂五丈容旂旄重樓跨空雨聲逺屋多人少風騷騷平生所慙今不耻坐對疲氓更鞭箠道逢楊虎呼與言心知其非口諾唯居髙忘下真何益氣節消縮今無幾文章小技安足程先生别駕舊齊名如今衰老俱無用付與時人分重輕越州張中舎夀樂堂青山偃蹇如高人常時不肯入官府髙人自與山有素不待招邀滿庭戸卧龍蟠屈半東州萬室鱗鱗枕其股背之不見與無同狐裘反衣無乃魯張君眼力覰天奥能遣荆棘化堂宇持頥宴坐不出門收攬竒秀得十五才多事少厭閒寂卧看雲烟變風雨笋如玉筯椹如簮強飲且為山作主不憂兒軰知此樂但恐造物怪多取春濃睡足午牕明想見新茶如潑乳姚屯田挽詩京口年來耆舊衰髙人淪喪路人悲空聞韋叟一經在不見恬侯萬石時貧病只知為善樂逍遥却恨棄官遲七年一别真如夢猶記蕭然瘦鶴姿送岑著作懶者常似静静豈懶者徒拙則近於直而直豈拙歟夫子静且直雍容時巻舒嗟我復何為相得歡有餘我本不違世而世與我殊拙於林間鳩懶於氷底魚人皆笑其狂子獨憐其愚直者有時信静者不終居而我懶拙病不受砭藥除臨行怪酒薄已與别淚俱後㑹豈無時遂恐出處踈惟應故山夢隨子到吾廬吉祥寺賞牡丹人老簮花不自羞花應羞上老人頭醉歸扶路人應笑十里珠簾半上鈎吉祥寺僧求閣名過眼榮枯電與風久長那得似花紅上人宴坐觀空閣觀色觀空色即空和劉道原見寄敢向清時怨不容直嗟吾道與君東坐談足使淮南懼歸去方知冀北空獨鶴不須驚夜旦羣烏未可辨雌雄廬山自古不到處得與幽人子細窮和劉道原詠史仲尼憂世接輿狂臧榖雖殊竟兩亡呉客漫陳豪士賦桓侯初笑越人方名髙不朽終安用日飲無何計亦良獨掩陳編弔興廢牕前山雨夜浪浪和劉道原寄張師民仁義大㨗徑詩書一旅亭相夸綬若若猶誦麥青青腐鼠何勞嚇髙鴻本自㝠顛狂不用喚酒盡漸須醒送張職方吉甫赴閩漕六和寺中作羡君超然鸞鶴姿江湖欲下還飛去空使呉兒怨不留青山漫漫七閩路門前江水去掀天寺後清池碧玉環君如大江日千里我如此水千山底雨中逰天竺靈感觀音院蠶欲老麥半黄前山後山雨浪浪農夫輟耒女廢筐白衣仙人在高堂和蔡凖郎中見邀逰西湖三首夏潦漲湖深更幽西風落木芙蓉秋飛雪闇天雲拂地新蒲出水柳映洲湖上四時看不足惟有人生飄若浮解顔一笑豈易得主人有酒君應留君不見錢塘逰宦客朝推囚暮决獄不因人喚何時休城市不識江湖幽如與蟪蛄語春秋試令江湖處城市却似麋鹿逰汀洲髙人無心無不可得坎且止乗流浮公卿故舊留不得遇所得意終年留君不見抛官彭澤令琴無絃巾有酒醉欲眠時遣客休田間决水鳴幽幽插秧未遍麥已秋相擕燒筍苦竹寺却下踏藕荷花洲船頭斫鮮細縷縷船尾炊玉香浮浮臨風飽食得甘寢肯使細故胸中留君不見壯士憔悴時飢謀食渴謀飲功名有時無罷休和子由柳湖久涸忽有水開元寺山茶舊無花今歳盛開二首太昊祠東鐵墓西一鐏曽與子同擕回瞻郡閣遥飛檻北望檣竿半隠堤飯豆羮藜思兩鵠飲河噀水賴長蜺如今勝事無人共花下壺盧鳥勸提長明燈下石欄干長共杉松鬬嵗寒葉厚有稜犀甲健花深少態鶴頭丹久陪方丈曼陁雨羞對先生苜蓿盤雪裏盛開知有意明年開後更誰看六月二十七日望湖樓醉書五首黒雲翻墨未遮山白雨跳珠亂入船巻地風來忽吹散望湖樓下水如天放生魚鼈逐人來無主荷花到處開水枕能令山俯仰風船解與月裵回烏菱白芡不論錢亂繫青菰裹緑盤忽憶嘗新㑹靈觀滯留江海得加餐獻花㳺女木蘭橈細雨斜風濕翠翹無限芳洲生杜若呉兒不識楚詞招未成小隠聊中隠可得長閒勝暫閒我本無家更安徃故鄉無此好湖山七月一日出城舟中苦熱涼飇呼不來流汗方被體稀星乍明滅暗水光瀰瀰香風過蓮芡驚枕裂魴鯉欠伸宿酒餘起坐濯清泚火雲勢方壯未受月露洗身微欲安適坐待東方啓宿餘杭法喜寺寺後緑野亭望呉興諸山懐孫莘老學士徙倚秋原上淒涼晚照中水流天不盡人逺思何窮問諜知秦過看山識禹功餘杭始皇所舍舟也西北舟枕山堯時洪水繫舟山上稻涼初吠蛤柳老半書蟲荷背風翻白蓮腮雨退紅追逰慰遲暮覔句效兒童北望苕溪轉遥憐震澤通烹魚得尺素好在紫髯翁宿臨安淨土寺鷄鳴發餘杭到寺已亭午參禪固未暇飽食良先務平生睡不足急掃清風宇閉門羣動息香篆起烟縷覺來烹石泉紫筍發輕乳晩涼沐浴罷衰髪稀可數浩歌出門去暮色入村塢微月半隠山圓荷爭瀉露相擕石橋上夜與故人語明朝入山房石鏡炯當路昔照熊虎姿今為猿鳥顧廢興何足弔萬世一仰俯自淨土歩至功臣寺落日岸葛巾晩風吹羽扇松間野歩穏竹外飛橋轉神功鑿横嶺巖石得巨片直度千人溝下有微流泫岡巒蔚回合金碧爛明絢緬懐異姓王負擔此鄉縣長逢跨下辱屢乞桑間飯誰謂山石頑識此希世彦凛然英氣逼屹起猶聳戰他年萬騎歸父老恣歡宴錦繡被原野金珠散貧賤竇融既入朝呉芮空記面榮華坐銷歇閱世如郵傳惟有長明燈依然照深殿逰徑山衆峰來自天目山勢若駿馬奔平川中塗勒破千里足金鞭玉鐙相回旋人言山住水亦住下有萬古蛟龍淵道人天眼識王氣結茆宴坐荒山巔精誠貫山石為裂天女下試顔如蓮寒牕暖足來朴朔夜鉢呪水降蜿蜒雪眉老人朝扣門願為弟子長參禪爾來廢興三百載奔走呉㑹輸金錢飛樓湧殿壓山谷朝鐘暮皷驚龍眠晴空偶見浮海蜃落日下數投村鳶有生共處覆載内擾擾膏火同烹煎近來愈覺世路隘每到寛處差安便嗟余老矣百事廢却尋舊學心茫然問龍乞水歸洗眼欲看細字銷殘年龍井水洗病眼有效自徑山回得吕察推詩用其韻招之宿湖上多君貴公子愛山如愛色心隨葉舟去夢遶千山碧新詩到中路令我喜折屐古來軒冕徒操捨兩悲慄數朝辭簮笏兩脚得暫赤歸來不入府却走湖上宅寵辱吾久忘寧畏官長詰飄然便欲去誰在子思側君能從我逰出郭及未黒宿望湖樓再和新月如佳人出海初弄色娟娟到湖上㶑㶑摇空碧夜涼人未寢山静聞響屐騷人故多感悲秋更憀慄君胡不相就朱墨紛黝赤我行得所嗜十日忘家宅但恨無友生詩病莫訶詰君來試吟咏定作鶴頭側改罷心愈疑滿紙蛟虵黒夜泛西湖五絶新月生魄迹未安纔破五六漸盤桓今夜吐艶如半璧逰人得向三更看三更向闌月漸垂欲落未落景特竒明朝人事誰料得看到蒼龍西没時蒼龍已沒牛斗横東方芒角昇長庚漁人收筒及未曉船過惟有菰蒲聲湖上禁漁皆盜釣者也菰蒲無邊水茫茫荷花夜開風露香漸見燈明出逺寺更待月黒看湖光湖光非鬼亦非仙風恬浪静光滿川須臾兩兩入寺去就視不見空茫然焦千之求惠山泉詩兹山定空中乳水滿其腹遇隙則發見臭味實一族淺深各有值方圓隨所蓄或為雲洶涌或作綫斷續或鳴空洞中雜佩間琴筑或流蒼石縫宛轉龍鸞蹙缾罌走四海真偽半相瀆貴人髙宴罷醉眼亂紅緑赤泥開方印紫餅截圓玉傾甌共歎賞竊語笑僮僕豈如泉上僧盥灑自挹掬故人憐我病蒻籠寄新馥欠伸北牕下晝睡美方熟精品厭凡泉願子致一斛答任師中次韻來詩勸以詩酒自娛閒裏有深趣常憂兒軰知已成歸蜀計誰惜買山貲世事久已謝故人猶見思平生不飲酒對子敢論詩沈諫議召逰湖不赴明日得雙蓮於北山下作一絶持獻沈旣見和又别作一首因用其韻湖上棠隂手自栽問公更得幾回來水仙亦恐公歸去故遣雙蓮一夜開詔書行捧縷金牋樂府應歌相府蓮莫忘今年花發處西湖西畔北山前和歐陽少師㑹老堂次韻一時冠蓋盡嚴終舊德年來豈易逢聞道堂中延蓋叟定應牀下拜梁松蠧魚自晒閒箱篋科斗長收古鼎鐘我欲棄官重問道寸莛何以得舂容和歐陽少師寄趙少師次韻朱門有遺啄千里來燕雀公家冷如氷百呼無一諾平生親友半遷逝公雖不怪旁人愕世事如今臘酒濃交情自古春雲薄二公凜凜和非同疇昔心親豈貌從白頭相暎松間鶴清句更酬雪裏鴻何日揚雄一㕓足却追范蠡五湖中監試呈諸試官我本山中人寒苦盜寸廩文詞雖少作勉强非天稟既得旋廢忘懶惰今十稔麻衣如再著墨水真可飲毎聞科詔下白汗如流瀋此邦東南㑹多士敢題品芻蕘盡蘭蓀香不數葵荏貧家見珠貝眩晃自難審緬懐嘉祐初文格變已甚千金碎全璧百衲收寸錦調和椒桂釅咀嚼沙礫磣廣眉成半額學歩歸踔踸維時老宗伯氣壓羣兒凜蛟龍不世出魚鮪初驚淰至音久乃信知味猶食椹至今天下士微管幾左衽謂當千載後石室祠髙朕爾來又一變此學初誰諗權衡破舊法芻豢笑凡飪髙言追衛樂篆刻鄙曹沈先生周孔出弟子淵騫寢却顧老鈍軀頑樸謝鐫鋟諸君況才傑容我懶且噤聊欲廢書眠秋濤諠午枕望海樓晚景五絶海上濤頭一線來樓前相顧雪成堆從今潮上君須上更看銀山二十回横風吹雨入樓斜壯觀應須好句誇雨過潮平江海碧電光時掣紫金虵青山斷處塔層層隔岸人家喚欲譍江上秋風晩來急為傳鐘皷到西興樓下誰家燒夜香玉笙哀怨弄初涼臨風有客吟秋扇拜月無人見晚粧沙河燈火照山紅歌鼓喧喧語笑中為問少年心在否角巾欹倒鬢如蓬試院煎茶蟹眼已過魚眼生颼颼欲作松風鳴䝉茸出磨細珠落眩轉遶甌飛雪輕銀瓶瀉湯誇第二未識古人煎水意古語云煎水不煎茶君不見昔時李生好客手自煎貴從活火發新泉又不見今時潞公煎茶學西蜀定州花瓷琢紅玉我今貧病長苦飢分無玉盌捧蛾眉且學公家作茗飲塼爐石銚行相隨不用撐腸拄腹文字五千巻但願一甌常及睡足日髙時孫莘老求墨妙亭詩蘭亭蠒紙入昭陵世間遺迹猶龍騰顔公變法出新意細筋入骨如秋鷹徐家父子亦秀絶字外出力中藏稜嶧山傳刻典刑在千載筆法留陽冰杜陵評書貴瘦硬此論未公吾不慿短長肥瘠各有態玉環飛燕誰敢憎呉興太守真好古購買斷缺揮縑繒龜跌入坐螭隠壁空齋晝静聞登登竒蹤散出走呉越勝事傳說誇友朋書來乞詩要自寫為把栗尾書谿藤後來視今猶視昔過眼百世如風燈他年劉郎憶賀監還道同時須服膺李公擇求黄鶴樓詩因記舊所聞於馮當世者黄鶴樓前月滿川抱闗老卒飢不眠夜聞三人笑語言羽衣着屐響空山非鬼非人意其仙石扉三叩聲清圓洞中鏗鈜落門闗縹緲入石如飛烟雞鳴月落風馭還迎拜稽首願執鞭汝非其人骨腥羶黄金乞得重莫肩持歸包裹弊席氊夜穿茅屋光射天里閭來觀已變遷似石非石鉛非鉛或取而有衆忿喧訟歸有司今幾年無功暴得喜欲顛神人戲汝真可憐願君為考然不然此語可信馮公傳八月十日夜看月有懐子由并崔度賢良宛丘先生自不飽更笑老崔窮百巧一更相過三更歸古柏隂中看參昴去年舉君苜蓿盤夜傾閩酒赤如丹今年還看去年月露冷遥知范叔寒典衣自種一頃豆那知積雨生科斗歸來四壁草蟲鳴不如王江長飲酒王江陳州道人催試官考較戲作八月十五夜月色隨處好不擇茆簷與市樓况我官居似蓬島鳯咮堂前野橘香劔潭橋畔秋荷老八月十八潮壯觀天下無鯤鵬水擊三千里組練長驅十萬夫紅旗青蓋互明滅黒沙白浪相吞屠人生㑹合古難必此景此行那兩得願君聞此添䗶燭門外白袍如立鵠八月十七復登望海樓自和前篇是日牓出余與試官兩人復留五首樓上烟雲怪不來樓前飛紙落成堆非闗文字須重看却被江山未放回眼昏燭暗細行斜考閲精強外已誇明日失杯君莫怪早知安足不成虵亂山遮曉擁千層睡美初涼撼不譍昨夜酒行君屢歎定知歸夢到呉興天台桂子為誰香倦聴空階夜㸃涼賴有明朝看潮在萬人空巷鬬新粧秋花不見眼花紅身在孤舟兀兀中細雨作寒知有意未教金菊出蒿蓬東坡全集巻三
