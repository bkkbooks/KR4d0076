body:
  text: 東坡全集巻四十八宋蘓軾撰䇿斷三首䇿斷上二邊為中國患至深逺也天下謀臣猛將豪傑之士欲有所逞於西北者久矣聞之兵法曰先為不可勝以待敵之可勝嚮者臣愚以為西北雖有可勝之形而中國未有不可勝之備故竊嘗以為可特設一官使獨任其責而執政之臣得以專治内事苟天下之弊莫不盡去紀綱修明食足而兵強百姓樂業知愛其君卓然有不可勝之備如此則臣固將備論而極言之夫天下將興其積必有源天下將亡其發必有門聖人者唯知其門而塞之古之亡天下者四而天子無道不與焉葢有以諸侯強偪而至於亡者周唐是也有以匹夫横行而至於亡者秦是也有以大臣執權而至於亡者漢魏是也有以蠻夷内侵而至於亡者二晉是也司馬氏石氏使此七代之君皆能逆知其所由亡之門而塞之則至於今可以不廢惟其諱亡而不為之備或備之而不得其門故禍發而不救夫天子之勢蟠於天下而結於民心者甚厚故其亡也必有大隙焉而日潰之其窺之甚難其取之甚宻曠日持久然後可得而間蓋非有一日卒然不救之患也是故聖人必於其全安甚盛之時而塞所由亡之門蓋臣以為當今之患外之可畏者西北二邊而内之可畏者天子之民也西北二邊不足以為中國大憂而其動也有以召内之禍内之民實執存亡之權而不能獨起其發也必將待外之變先之以邊患而繼之以吾民臣之所謂可畏者在此而巳昔者敵國之患起於多求而不供供者有倦而求者無厭以有倦供無厭而能乆安於無事者天下未嘗有也故夫二邊之患特有逺近耳而要以必至於戰敢問今之所以戰者何也其無乃出於倉卒而備於一時乎且夫兵不素定而出於一時當其危疑擾攘之間而吾不能自必則權在敵國權在敵國則吾欲戰不能欲休不可進不能戰而退不能休則其計將出於求和求和而自我則其所以為媾者必重軍旅之後而繼之以重媾則國用不足國用不足則加賦於民加賦而不巳則凡暴取豪奪之法不得不施於今之世矣天下一動變生無方國之大憂將必在此葢嘗聞之用兵有權權之所在其國乃勝是故國無小大兵無強弱有小國弱兵而見畏於天下者權在焉耳千鈞之牛制於三尺之童弭耳而下之曾不如狙猿之奮擲於山林此其故何也權在人也我欲則戰不欲則守戰則天下莫能支守則天下莫能窺昔者秦嘗用此矣開闗出兵以攻諸侯則諸侯莫不願割地而求和諸侯割地而求和於秦秦人未嘗急於割地之利若不得已而後應故諸侯常欲和而秦常欲戰如此則權固在秦矣且秦非能強於天下之諸侯秦惟能自必而諸侯不能是以天下百變而卒歸於秦諸侯之利固在從也朝聞陳軫之説而合為從暮聞張儀之計而散為横秦則不然横人之欲為横從人之欲為從皆使其自擇而審處之諸侯相顧而終莫能自必則權之在秦不亦宜乎嚮者寶元慶厯之間河西之役可以見矣其始也不得已而後戰其終也逆探其意而與之和又從而厚餽之惟恐其一日復戰也如此則敵常欲戰而我常欲和敵非能常戰也特持其欲戰之形以乘吾欲和之勢敵屢用而屢得志是以中國之大而權不在焉欲天下之安則莫若使權在中國欲權之在中國則莫若先發而後罷示之以不憚形之以好戰而後天下之權有所歸矣今夫庸人之論則曰勿為禍始古之英雄之君豈其樂禍而好殺唐太宗既平天下而又歳歳出師以從事於邊徼蓋晩而不倦暴露於千里之外親擊髙麗者再焉凡此者皆所以爭先而處强也當時羣臣不能深明其意以為敵國無釁而我則發之夫為國者使人備已則權在我而使已備人則權在人當太宗之時四夷狼顧以備中國故中國之權重苟不先之則彼或以執其權矣而我又鰓鰓焉惡戰而樂罷使敵國知吾之所忌而以是取必於吾如此則雖有天下吾安得而為之唐之衰也惟其厭兵而畏戰一有敗衂則兢兢焉縮首而去之是故姦臣執其權以要天子及至憲宗奮而不顧雖小挫而不為之沮當此之時天下之權在於朝廷伐之則足以為威舎之則足以為恩臣故曰先發而後罷則權在我矣䇿斷中臣聞用兵有可以逆為數十年之計者有朝不可以謀夕者攻守之方戰鬬之術一日百變猶以為拙若此者朝不可以謀夕者也古之欲謀人之國者必有一定之計勾踐之取吳秦之取諸侯髙祖之取項籍皆得其至計而固執之是故有利有不利有進有退百變而不同而其一定之計未始易也勾踐之取呉是驕之而巳秦之取諸侯是散其從而已髙祖之取項籍是間疎其君臣而已此其至計不可易者雖百年可知也今天下晏然未有用兵之形而臣以為必至於戰則其攻守之方戰鬬之術固未可以豫論而臆斷也然至於用兵之大計所以固執而不變者臣請得以豫言之夫西北二邊皆為中國之患而西邊之患小北邊之患大此天下之所明知也管仲曰攻堅則瑕者堅攻瑕則堅者瑕故二者皆所以為憂而臣以為兵之所加宜先於西故先論所以制御西戎之大略今夫鄒與魯戰則天下莫不以為魯勝大小之勢異也然而勢有所激則大者失其所以為小而大者忘其所以為小故有以鄒勝魯者矣夫大有所短小有所長地廣而備多備多而力分小國聚而大國分則強弱之勢將有所反大國之人譬如千金之子自重而多疑小國之人計窮而無所恃則致死而不顧是以小國常勇而大國常怯恃大而不戒則輕戰而屢敗知小而自畏則深謀而必克此又其理然也夫民之所以守戰至死而不去者以其君臣上下懽欣相得之際也國大則君尊而上下不交將軍貴而吏士不親法令繁而民無所措其手足若夫小國之民截然其若一家也有憂則相䘏有急則相赴凡此數者是小國之所長而大國之所短也大國而不用其所長使小國常出於其所短雖百戰而百屈豈足怪哉且夫大國則固有所長矣長於戰而不長於守夫守者出於不足而已譬之於物大而不用則易以腐敗故凡擊搏進取所以用大也孫武之法十則圍之五則攻之倍則分之敵則能戰之少則能逃之不若則能避之自敵以上者未嘗有不戰也自敵以上而不戰則是以有餘而用不足之計固已失其所長矣凡大國之所恃吾能分兵而彼不能分吾能數出而彼不能應譬如千金之家日出其財以罔市利而販夫小民終莫能與之競者非智不若其財少也是故販夫小民雖有桀黠之才過人之智而其勢不得不折而入於千金之家何則其所長者不可以與較也西戎之於中國可謂小國矣嚮者惟不用其所長是以聚兵連年而終莫能服今欲用吾之所長則莫若數出數出莫若分兵臣之所謂分兵者非分屯之謂也分其居者與行者而已今河西之戍卒惟患其多而莫之適用故其便莫若分兵使其十一而行則一歳可以十出十二而行則一歳可以五出十一而十出十二而五出則是一人而歳一出也吾一歳而一出彼一歳而十被兵焉則衆寡之不侔勞逸之不敵亦已明矣夫用兵必出於敵人之所不能我大而敵小是故我能分而彼不能此呉之所以肄楚而隋之所以狃陳歟夫禦戎之術不可以逆知其詳而其大略臣未見有過此者矣䇿斷下其次請論北方之勢古者匈奴之衆不過漢一大縣然所以能敵之者其國無君臣上下朝覲㑹同之節其民無榖米絲麻耕作織絍之勞其法令以言語為約故無文書符傳之繁其居處以逐水草為常故無城郭邑居聚落守望之助其旃裘肉酪足以為養生送死之具故戰則人人自鬬敗則驅牛羊逺徙不可得而破蓋非獨古聖人法度之所不加亦天性之所安者猶狙猿之不可使冠帶虎豹之不可被以羈紲也故中行説教單於無愛漢物所得繒絮皆以馳草棘中使衣袴弊裂以示不如旃裘之堅善也得漢食物皆去之以示不如湩酪之便美也由此觀之中國以法勝而匈奴以無法勝聖人知其然是故精修其法而謹守之築為城郭塹為溝池大倉廩實府庫明烽燧逺斥堠使民知金鼔進退坐作之節勝不相先敗不相後此其所以謹守其法而不敢失也一失其法則不如無法之為便也故夫各輔其性而安其生則南人北人本不能相犯惟其不然是故皆有以相制匈奴之不可從中國之法猶中國之不可從匈奴之無法也今夫佩玉服韍冕而垂旒者此宗廟之服所以登降揖讓折旋俯仰為容者也而不可以騎射今夫蠻夷而用中國之法豈能盡如中國哉苟不能盡如中國而雜用其法則是佩玉服韍冕垂旒而欲騎射也昔吳之先斷髪文身與魚鼈龍蛇居者數十世而諸侯不敢窺也其後楚申公巫臣始教以乘車射御使出兵侵楚而闔廬夫差又逞其無厭之求闕溝通水遂與齊晉爭強黄池之㑹強自冠帶吳人不勝其弊卒臣於越夫呉之所以強者乃其所以亡也何者以蠻夷之資而貪中國之美宜其可得而圖之哉西晉之亡也匈奴鮮卑氐羌之類紛紜中國而其豪傑間起為之君長如劉元海苻堅石勒慕容雋之儔皆以絶異之姿驅駕一時之賢俊其強者至有天下大半然終於覆亡相繼逺者不過一傳再傳而滅何也其心固安於無法也而束縛於中國之法中國之人固安於法也而苦其無法君臣相戾上下相厭是以雖建都邑立宗廟而其心岌岌然常若寄居於其間而安能乆乎且人而棄其所得於天之分未有不亡者也契丹自五代南侵乘石晉之亂奄至京邑覩中原之富麗廟社宫闕之壯而悦之知不可以留也故歸而竊習焉山前諸郡既為所并則中國士大夫有立其朝者矣故其朝廷之儀百官之號文武選舉之法都邑郡縣之制以至於衣服飲食皆雜取中國之象然其父子聚居貴壯而賤老貪得而忘失勝不相讓敗不相救者猶在也其中未能革其本來自適之性而外牽於華人之法此其所以自投於䧟穽網羅之中而中國之人猶曰今之匈奴非古也其措置規畫皆不復蠻夷之心以為不可得而圖之亦過計矣且夫天下固有沈謀隂計之士也昔先王欲圖大事立竒功則非斯人莫足與共秦之尉繚漢之陳平皆以樽俎之間而制敵國之命此亦王者之心期以紓天下之患而已彼契丹者有可乘之勢三而中國未之思焉則亦足惜矣臣觀其朝廷百官之衆而中國士大夫交錯於其間固亦有賢俊慷慨不屈之士而詬辱及於公卿鞭扑行於殿陛貴為將相而不免囚徒之恥宜其有惋憤鬱結而思變者特未有路耳凡此皆可以致其心雖不為吾用亦以間疎其君臣此由余之所以入秦也幽燕之地自古號多雄傑名於圖史者往往而是自宋之興所在賢俊雲合響應無有逺邇皆欲洗濯磨淬以觀上國之光而此一方獨陷於域外昔太宗皇帝親征幽州未克而班師聞之諜者曰幽州士民謀欲執其帥以城降者聞鑾輿之還無不泣下且在彼以為諸郡之民非其族類故厚歛而虐使之則其思内附之心豈待深計哉此又足為之謀也使其上下相猜君民相疑然後可攻也語有之曰䑕不容穴銜窶薮也彼僣立四都分置守宰倉廩府庫莫不備具有一旦之急適足以自累守之不能棄之不忍南北雜居易以生變如此則中國之長足以有所施矣然非特如此而已也中國不能謹守其法彼慕中國之法而不能純用是以勝負相持而未有决也夫蠻夷者以力攻以力守以力戰顧力不能則逃中國則不然其守以形其攻以勢其戰以氣故百戰而力有餘形者有所不守而敵人莫不忌也勢者有所不攻而敵人莫不備也氣者有所不戰而敵人莫不懾也苟去此三者而角之於力則中國固不敵矣尚何云乎惟國家留意其大者而為之計其小者臣未敢言焉雜䇿五首禹之所以通水之法自禹而下至於秦千有餘年濱河之民班白而不識濡足之患自漢而下至於今數千年河之為患緜緜而不絶豈聖人之功烈至漢而熄哉方戰國之用兵國於河之壖者三晉為多而魏文侯時白圭治水最為有功而孟子譏其以鄰國為壑自是之後或决以攻或溝以守新防交興而故道旋失然聖人之跡尚可以訪之於耆老秦不亟治而遺患於漢漢之法又不足守夫禹之時四瀆唯河最難治以難治之水而用不足守之法故歴數千年而莫能以止也聖人哀憐生民謀諸廊廟之上左右輔弼之臣又訪諸布衣之間苟有所懐孰敢不盡蓋陸人不能舟而沒人未嘗見舟而便操之親被其患知之宜詳當今莫若訪之海濱之老民而興天下之水學古者將有决塞之事必使通知經術之臣計其利害又使水工行視地勢不得其工不可以濟也故夫三十餘年之間而無一人能興水利者其學亡也禹貢之説非其詳矣然而髙下之勢先後之次水之大小與其蓄洩之宜而致力之多少亦可以槩見大抵先其髙而後低下始於北之冀州而東至於青徐南至於荆揚而西訖於梁雍之間江河淮泗既平而衡漳洚水伊洛瀍澗之屬亦從而治濬畎澮導九州瀦大野陂九澤而蓄洩之勢便兖州作十三載而嵎夷既略故其用力各有多少之宜此其凡也孟子曰禹之治水也水由地中行此禹之所以通其法也愚竊以為治河之要宜推其理而酌之以人情河水湍悍雖其性然非堤防激而作之其勢不至如此古者河之側無居民棄其地以為水委今也堤之而廬民其上所謂愛尺寸而忘千里也故曰堤防省而水患衰其理然也修廢官舉逸民古者民羣而歸君君擇臣而教其民其初蓋甚簡也唐虞以来頗可見矣歴夏啇至周法令日滋而官亦隨益故其數三百六十蓋亦有不得已也書曰唐虞稽古建官惟百又曰夏商官倍亦克用乂言其官雖多於古而天下亦以治也周之衰也宣王振之號為中興而重黎之後失其守而為司馬氏陵遲至孔子之時周公之典蓋壊矣卿世卿大夫世大夫而賢者無以進孔子慨然而歎欲修廢官舉逸民以歸天下之心行四方之政而春秋亦譏世禄之臣葢傷時之至也自秦更三代之制官秩一變漢循其舊往往増置歴世沿襲以至於今遂為大備愚恐冗局之耗民而未知廢官之可舉也然古之官其名存其實亡者多矣司農卿不責以金榖之虛贏尚書令不問以百官之殿最此豈非事體之重歟國家自天聖中詔天下以經術古文為事自是博學之君子莫不羣進於有司然所以待之之禮未盡故潔㢘難合之士尚未盡出今優其禮而天下之逸民至矣且夫山巖林谷之士雖有豪傑之才固未知有簿書吏事也而剛毅訐直不識諱忌故先王置之拾遺補闕之間此其屬任之方也噫自孔子沒世之君子安其富貴而不復思念天下有廢而不修之官逸而不舉之民今明䇿丁寧而求之以發孔子千載之長憂此天下之幸也天子六軍之制周禮之言田賦夫家車徒之數聖王之制也其言五等之君封國之大小非聖人之制也戰國所増之文也何以言之按鄭氏説武王之時周地狹小故諸侯之封及百里而止周公征伐不服斥大中國故大封諸侯而諸公之地至五百里不知武王之時何國不服而周公之所征伐者誰也東征之役見於詩書豈其廓地千里而史不載耶此甚可疑也周之初諸侯八百春秋之世存者無數十鄭子産有言古者大國百里今晉楚千乘若無侵小何以至此子産之博物其言宜可信先儒或以周禮為戰國隂謀之書亦有以也王制公侯百里伯七十里子男五十里而孟子之説亦如此此三代之通法魯之車千乘僣也春秋大蒐大閲皆以譏書言其車之多徒之衆非魯之所宜有故曰大也夫周之制四丘為甸甸出長轂一乘魯之無千甸之封亦明矣然公車千乘之見於詩何也孟子曰説詩者不以文害辭不以辭害意天子之馬止於十二閑而詩有騋牝三千美其富不譏其僣不害其為詩也夫千乘之積雖為七萬五千人而有羡卒處其半焉故三萬者公徒而已魯襄公之十一年初作三軍僖公之世未至於三萬愚又疑夫詩人張而大之也休兵久矣而國益困中國之有邊警之患猶人之有手足之疾也不忍藥石之苦針砭之傷一旦流而入於骨體則愚恐其苦之不止於藥石而傷之不止於針砭也中國以二邊之不靖故每歳啖以厚利使就羈紲聖人之愛中國而不欲殘民之心古未嘗有矣然貪惏無厭漸不可啓日富日驕久亦難制故自寶元以來賦歛日繁雖休兵十有餘年而民適以困者潜削而不知也昔先皇帝振怒舉大兵問罪邊庭師不踰時而塞下就盟西夏之役邊臣治兵振旅不及數年旋亦解甲彼其時之費與今無已之賂不可以同日而語矣天子㳟儉過於文景百官奉法無敢踰僣而二邊者實殘吾民此天下雄俊英偉之士所以搤腕而太息也且夫舉天下之大而誅數縣之衆故上下交足而内外莫不驩欣棄有限之財而塞無厭之心故取於民者愈多而藏於國者愈急此天下之所明知而易達之理惟上之人實圖之闗隴游民私鑄錢與江淮漕卒為盜之由三代之所以養民者備矣農力耕而食工作器而用商賈資焉而通之於天下其食無不義之食也其器無不養之器也商賈通之而不以不義資之也夫以飲食器用之利而皆以義得焉使民之所以要利者非義無由也後之世賦取無度貨幣無法義窮而詐勝夫三代之民非誠好義也使天下之利皆出於義而民莫不好也後之所以使民要利非詐無由也是故法令日滋而弊益煩刑禁甚嚴而姦不可止嗚呼久矣其如此也治其本朝令而夕從救其末百世不改也私鑄之弊始於錢輕使錢之直若金之直雖賞之不為也今秦蜀之中又裂紙以為幣符信一加化土芥以為金玉奈何其使民不奔而效之也夫樂生而惡死者天下之至情也我且以死拘之然猶相繼而赴於市者飢寒驅其中而無以自生也曰等死耳而或免焉漕卒之愆生於窮乏而無告家乎舟楫之上長子孫乎江淮之間布褐不完藜藿不給大冬積雪水之至涸而龜手爛足者累歳不得代不為盜賊無所逞志若稍優其給而代其勞宜亦衰息耳夫見利而不動者伯夷叔齊之事也窮困而不為不義者顔淵之事也以伯夷叔齊顔淵之事而求之無知之民亦已過矣故夫廷尉大農之所患者非民之罪也非兵之罪也上之人之過也東坡全集巻四十八
