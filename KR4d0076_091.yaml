body:
  text: 東坡全集卷九十一宋蘇軾撰祭文四十一首祭歐陽文忠公文嗚呼哀哉公之生於世六十有六年民有父母國有蓍龜斯文有傳學者有師君子有所恃而不恐小人有所畏而不為譬如大川喬嶽不見其運動而功利之及於物者蓋不可以數計而周知今公之沒也赤子無所仰芘朝廷無所稽疑斯文化為異端而學者至於用夷君子以為無為為善而小人沛然自以為得時譬如深淵大澤龍亡而虎逝則變怪雜出舞鰌鱓而號狐狸昔其未用也天下以為病而其既用也則又以為遲及其釋位而去也莫不冀其復用至其請老而歸也莫不惆悵失望而猶庶幾於萬一者幸公之未衰孰謂公無復有意於斯世也奄一去而莫豫遺豈厭世溷濁潔身而逝乎將民之無祿而天莫之遺昔我先君懷寶遁世非公則莫能致而不肖無狀因緣出入受教於門下者十有六年於兹聞公之喪義當匍匐往救而懷祿不去愧古人以忸怩緘詞千里以寓一哀而已矣蓋上以為天下慟而下以哭其私嗚呼哀哉尚饗祭魏國韓令公文天生元聖必作之配有神司之不約而㑹既生堯舜禹稷自至仁宗龍飛公舉進士妙齡秀發秉筆入侍公於是時仲舒賈誼方將登庸盜起西夏四方騷然帝用不赦授公鈇鉞往督西旅公于是時方叔召虎入贊兵政出殿大邦恩威並行春雨秋霜兵練民安四夷屈降公於是時臨淮汾陽帝在明堂欲行王政羣后奏功罔底于成召自北方付之樞衡公於是時蕭曹魏邴二帝山陵天下悸惱呼吸之間有雷有風有存有亡有兵有戎公於是時伊尹周公功成而退三鎮偃息天下嗷然曷日而復畢公在外心在王室房公且死征遼是恤嗚呼哀哉六月甲寅人之無祿喪我宗臣我有黎民誰與教之我有子孫誰與保之巍巍堂堂寧復有之公之云亡我無日矣慟哭涕流何嗟及矣昔我先子沒于東京公為二詩以祖其行文追典誥論極皇王公言一出孰敢改評施及不肖待以國士非我自知公實見謂父子昆弟並出公門公不責報我豈懷恩惟此涕泣實哀斯人有肉在俎有酒在樽公歸在天寧聞我言嗚呼哀哉尚饗祭栁子玉文猗歟子玉南國之秀甚敏而文聲發自幼從橫武庫炳蔚文囿獨以詩鳴天錫雄咮元輕白俗郊寒島瘦嘹然一吟衆作卑陋凡今卿相伊昔朋舊平視青雲可到寧驟孰云坎軻白髮垂脰才髙絶俗性疏來詬謫居窮山遂侣猩狖夜衾不絮朝甑絶餾慨然懷歸投棄纓綬潜山之麓往事神后道味自飴世芬莫嗅凡世所欲有避無就謂當乘除併畀之壽云何不淑命也誰咎頃在錢塘惠然我覯相從半歲日飲醇酎朝遊南屏莫宿靈鷲雪窗飢坐清闋間奏沙河夜歸霜月如晝綸巾鶴氅驚笑吳婦㑹合之難如次組繡翻然失去覆水何救維子耆老名德俱茂嗟我後來匪友惟媾子有令子將大子後頎然二孫則謂我舅念子永歸涕如懸霤歌此奠詩一樽往侑尚饗祭單君貺文嗚呼維君篤孝自天展如閔子人莫間言內齊于家外敏於官民謂父兄吏莫容姦信于朋友人得其歡博學工詩數術精研人涉其一君有其全壽考富貴人誰不然君獨何辜所向竒偏志不一遂悵莫歸怨念我孤甥生逢百艱既嬪于君謂永百年云何不弔銜痛重泉何以慰君千里一樽人生如夢何促何延厄窮何陋宦達何妍命也奈何追配牛顔嗚呼哀哉尚饗祭胡執中郎中文胡君執中之靈君少在蜀從先府君凡蜀之士事賢友仁我之知君固不待見從事於岐始識君靣相從之歡傾蓋百年見其孺子駒駿雛鵷非罪失官君則先去我徂華州見君逆旅淫雨彌旬道淖沒車他人為泣君樂有餘其後七年君掾計省雖獲一笑歡不逾頃又復七年我守北徐君從其子徐獄是書雛鶱而翔駒亦千里惟我與君宛其老矣老人無徒相見益親凡昔在岐今存幾人謂君仁人雖疾當壽云何而然命也難究嗚呼執中人誰不死如君之賢不云止此百鍊之剛日膾千牛匣而不用非我之羞孺子肖君世有令問送君一觴永歸無恨尚饗祭任鈐轄文嗟君結髮從事於兵四十餘年公侯干城更嘗世故練達物情佐我治軍既嚴且平吏士肅然時靡有爭汴泗橫流郛堞圮傾風埃霧露奔走經營輿疾而歸猶莫敢寧奄忽不救聞者歎驚子孫如林布褐藜羮生知其勤死知其清酹觴告訣與涕俱零尚饗祭歐陽仲純父文仲純父之靈曰嗚呼哀哉文忠公之盛德子孫千億與宋無極人惟曰不足仲純父之賢壽考百年一歲九遷人惟曰當然奈何官止於一命壽不登四十誰其尸之百不償一嗚呼哀哉此不足云也仲純父之生也不以進退得喪有望於人豈其死也乃以死生壽夭有責於神人徒知其文章之世其家操行之稱其門而不知其志氣之豪健議論之剛果使之臨大事立大節不難於殺身以成仁則夫造物者之挾其死生之權也豈能病君也哉雖然往者見君於潁水之上去嵗君來見我於國門之東攜被夜語達旦不窮凡所以謀道憂世而教我以保身逺禍者凜乎其有似於文忠今也奄兮忽焉而不復見也能不長號而屢慟乎道之難行蓋難其人豈無其人利害易之如仲純父不畏不慕獨立不懼則死及之嗚呼哀哉尚饗祭王君錫丈人文公之皇祖孝著閭里逮兹百年世濟其美少相弟長老相慈誨肅雍無間施及娣姒頎然四人厥德罔二軾始婚媾公之猶子允有令德夭閼莫遂惟公幼女嗣執罍篚恩厚義重宜有以報云何不淑契闊生死斂不拊棺葬不親襚豈不懷歸眷此微仕緘詞望哭以致奠餽惟此哀誠一念千里尚饗祭文與可文從表弟蘇軾致祭于故湖州文府君與可學士兄之靈曰嗚呼哀哉與可能復飲此酒也夫能復賦詩以自樂鼓琴以自侑也夫嗚呼哀哉余尚忍言之氣噎悒而填胸淚疾下而淋衣忽收淚以自問非夫人之為慟而誰為乎道之不行哀我無徒豈無友朋逝莫告余惟余與可匪亟匪徐招之不來麾之不去不可得而親其可得而疏之耶嗚呼哀哉孰能惇德秉義如與可之和而正乎孰能養民厚俗如與可之寬而明乎孰能為詩與楚詞如與可之婉而清乎孰能齊寵辱忘得喪如與可之安而輕乎嗚呼哀哉余聞訃之三日夜不眠而坐喟夢相從而驚覺滿茵席之濡淚念有生之歸盡雖百年其必至惟有文為不朽與有子為不死雖富貴壽考之人未必皆有此二者也然余嘗聞與可之言是身如浮雲無去無來無亡無存則夫所謂不朽與不死者亦何足云乎嗚呼哀哉尚饗祭刁景純墓文嗟我少君四十二嵗君不我少謂我昆弟今我巳老鬢鬚蒼然君之永歸不為無年我獨何憾過期而哭人之云亡哀此風俗涉江而東宛其山川顧瞻萬松蔚乎蒼芊尚想松下幅巾杖屨迎我於門抵掌笑語豈其忽焉斂兹一墳俯仰空山草木再春平生故人幾半天下紛然日中掉臂莫夜我非至人心有往來斗酒隻雞聊寫我哀尚饗祭張子野文子野郎中張丈之靈曰仕而忘歸人所共蔽有志不果日月其逝惟余子野歸及強鋭優遊故鄉若復一世遇人坦率真古愷悌厖然老成又敏且藝清詩絶俗甚典而麗搜研物情刮發幽翳微詞宛轉蓋詩之裔坐此而窮鹽米不繼嘯歌自得有酒輒詣我官于杭始獲擁篲歡欣忘年脫略苛細送我北歸屈指默計死生一訣流涕挽袂我來故國實五周歲不我少須一病遽蛻堂有遺像室無留嬖人亡琴廢帳空鶴淚酹觴再拜淚溢兩眥尚饗祭陳令舉文嗚呼哀哉天之生令舉初若有意厚其學術而多其才能蓋巳兼百人之器既發之以科舉又輔之以令名使取重於天下者若將畀之以位而令舉亦能因天之所豫而日新之慨然將以身任天下之事夫豈獨其自任將世之士大夫識與不識莫不望其如是是何一奮而不顧以至於斥一斥而不復以至於死嗚呼哀哉天之所付為偶然而無意耶將亦有意而人之所以周旋委曲輔成其天者不至耶將天既生之以畀斯人而人不用故天復奪之而自使耶不然令舉之賢何為而不立何立而不遂使少見其毫末而出其餘棄必有驚世而絶類者矣豫與令舉别二年而令舉沒既沒三年而豫乃始一哭其殯而弔其子也嗚呼哀哉尚饗祭任師中文年月日眉陽陳慥蘇軾犍為王齊愈弟齊萬黃州進士潘丙古耕道致祭于故瀘州太守任大夫師中之靈曰允義大夫維蜀之珍詩之老成易之丈人去我十年其德日新庶一見之遽沒元身惟慥與軾匪友則親自丙以降昔惟州民旅哭于庭惻焉酸辛禍福之來孰知其因自壽自夭自屈自信天莫為之矧凡鬼神生榮死哀自昔所難持此令名歸於九原尚饗祭堂兄子正文弟軾謹以家饌昭告于故子正中舍大兄之靈昔我先伯父內行飾修閭里之師不剛不柔允武且文喜愠莫窺歷官十一民到于今涕泣懷思遇其所立仁者之勇雷霆不移篤生我兄和優而毅甚似不衰與人之周肅雍謹潔喜見於眉人各有心酸醎異嗜丹素相訾穆穆我兄尊賢容衆無適不宜天若不僣富貴壽考捨兄畀誰云何不淑而止於是命也可疑我遷於南老與病㑹歸耕無期斂不撫棺葬不執紼永恨何追寤寐東山兩塋相望拱木參差諸父父子平生之好相從歲時兄死而同我生而異斯言孔悲千里一樽兄實臨我尚釂勿辭嗚呼哀哉尚饗黃州再祭文與可文從表弟蘇軾昭告於亡友湖州府君與可學士文兄之靈嗚呼哀哉我官於岐實始識君甚口秀眉忠信而文志氣方剛談詞如雲一别五年君譽日聞道德為膏以自濯薰藝學之多蔚如秋蕡脫口成章粲莫可耘馳騁百家錯落紛紜使我羞歎筆硯為焚再見京師默無所云杳兮清深落其華芬昔藝我黍今熟其饙啜漓歌呼得淳而醺天力自然不施膠筋坐了萬事氣回三軍笑我皇皇獨違垢紛俯仰三州眷戀桑枌仁施草木信及䴥麇昻然來歸獨立無羣俯焉復去初無戚欣大哉死生悽愴蒿焄君沒談笑大鈞徒勤喪之西歸我竄江濵何以薦君採江之芹相彼日月有朝必曛我在茫茫凡幾合分盡此一觴歸安於墳嗚呼哀哉尚饗祭徐君猷文徐公君猷之靈惟公早厭綺紈富以三冬之學晚分符竹藹然兩郡之聲家世名臣始終循吏追繼襄陽之耆舊綽有建安之風流無鬼髙談常傾滿坐有功陰德何止一人軾以蠢愚自貽放逐妻孥之所竊笑親友幾於絶交爭席滿前無復十漿而五餽中流獲濟實賴一壺之千金曽報德之未皇巳興哀於永訣平生髣佛尚陳中聖之觴厚夜渺茫徒挂初心之劒拊棺一慟嗚呼哀哉尚饗祭陳君式文故致政大夫君式之靈猗歟大夫匪直也人矯然不隨以屈莫信大夫安之有命在天十年躬耕以娛其親親亡泣血幾以喪明免喪復仕哀哉為貧從政于黃急吏緩民食黃之薇飲其水泉我以重罪竄于江濵親舊擯疏我亦自憎君獨願交日造我門我不自愛恐子垢紛君笑絶纓陋哉斯言憂患之至期與子均示我數詩蕭然絶塵去黃而歸即安丘園淡然無求抱潔沒身猗歟大夫有死有生如影之隨如環之循富貴貧賤忽如浮雲孰皆有子如二子賢千里一觴侑以斯文尚饗祭蔡景繁文嗚呼哀哉子之為人清厲孤峻經以仁義緯以忠信才兼百夫斂以靜順子之事君悃款傾盡挺然不倚視退如進持其本心不負堯舜子之從政果藝清慎緩民急吏不肅而震紛紜滿前理解迎刃子之為文秀整明潤工於造語恥就餘餕詩尤所長鏘然玉振壽以配德天亦何吝有如子賢五十而盡我遷於黃衆所逺擯惟子之故不我籍轔孰云此來乃拊其櫬萬生擾擾寄此一瞬富貴無能俯仰埃盡子有賢子汗血之駿幼亦頎然頴發齠齔天哀子窮以是餽贐我困於旅愧莫子賑歌此奠詩以和虞殯嗚呼哀哉祭歐陽伯和父文嗚呼哀哉文忠之子譬之孔門則其髙弟其材不同而皆有得公之一體惟伯和父得公之學甚敏且藝罔羅幽荒掎托遺逸馳騁百世有求則應取之左右不擇巨細如漢伯喈如晉茂先餘子莫繼公薨一紀門人凋喪我老又廢退而講論放失舊聞日月其逝欲操簡牘從伯和父解發疑蔽今其亡矣誰助我者投筆掩袂斯文日化躡風系景安所止戾子獨確然求之度數斷以凡例抱其孤學將以安適鑿不謀枘歸從文忠與仲純父孰曰非計而我何為寓詞千里繼以泣涕嗚呼哀哉祭石幼安文嗟我去蜀十有八年夢還故鄉親愛滿前覺而無有淚下迸泉竄流江湖隻影自憐聞人蜀音回首粲然矧如夫子又戚且賢憂樂同之義不我捐我行過宿子病巳纒顧我而笑自謂少痊念子仁人壽骨隱顴攜手同歸相視華顛孰云此來拊膺號天同驅並馳俯仰而遷行即此路皇分後先哀哉若人令德世傳才子文孫森然比肩天不吾欺後將蟬聯永歸無憾舉我一籩嗚呼哀哉祭司馬君實文左僕射贈太師溫公之靈嗚呼百世一人千載一時惟時與人鮮偶常竒公事仁宗百未一施獨發大議惟天我知厚陵之初先事而親帝欲得民一尊無私母子之間莫如孝慈人所難言我則易之神宗知公敬如蓍龜專談仁義輔以書詩枉尺直尋願公少卑公曰天子舜禹之姿我若言利非天誰欺退居於洛四海是儀化及豚魚名聞乳兒二聖見公曰豫得師付以衡石惟公所為公亦何為視民所宜有莠則鋤有疾則醫問疾所生師老民疲和戎上䇿决用無疑此計一定太平可基譬如農夫既闢既菑投種未粒矧穫而炊賔客滿門公以疾辭不見十日入哭其帷天為雨泣路人垂洟畫像于家飲食必祠矧我衆僚左右疇咨共載一舟喪其楫維終天之訣寧復來思歌此奠章以侑一巵嗚呼哀哉尚饗祭王宜甫文故比部郎中贈光祿大夫王公宜甫親家翁之靈嗚呼宜父篤厚寬中德世其家而位莫充非不能充知有天命直己而行不充何病三公之子所乏非財風雨散之如振浮埃百年夢幻其究何獲不與偕亡令名令德公雖耆舊我尚同時不識其人想見其姿婚姻之好義貫黃壤有愧古人不祖其往往謂趙人子孫其昌蒔其墓檟我言不忘嗚呼哀哉祭范蜀公文嗚呼仁宗在位四十二年畦而種之有得皆賢既歷三世悉為名臣今如晨星存者幾人孰如我公碩大光明導日而升燦焉長庚死生契闊公獨壽考天實耆之以殿諸老二聖嗣位仁義是施公昔所言略行無遺維樂未和公寢不寧樂成而薨公往則瞑凡百君子願公無極胡不萬年以重王國責難之忠愛莫助之嗟我後來誰復似之吾先君子秉德不耀與公弟兄一日之少窮達不齊歡則無間豈以閭里忠義則然先君之終公時在陳宵夢告行晨起訃聞先友盡矣我亦白髮聞公之喪方食哽噎堂堂我公豈其云亡望公凜然猶舉我觴祭黃幾道文幾道大夫年兄之靈嗚呼幾道孝友蒸蒸人無間言如閔與曾天若成之付以百能超然驥德風騖雲騰入為御史以直自繩身為玉雪不汙青蠅出按百城不緩不絙姦民惰吏實畏靡憎帝亦知之因事屢稱謀之左右有問莫應君聞不悛與道降升吾豈羽毛為人所鷹抱默以老終然不矜環堵蕭然大布疏繒妻子脫粟玉食友朋我遷淮南秋穀五登坐閲百吏錐刀相仍有斐君子傳車是乘穆如春風解此陰凌尚有典刑紫髯垂膺魯無君子斯人安承納幣請昏義均股肱别我而東衣袂僅勝一卧永已我將安憑壽夭在天雖聖莫增君趙魏老老於薛滕天亦愧之其世必興舉我一觴歸安丘陵祭歐陽文忠公夫人文嗚呼文忠之薨十有八年士無所歸散而自賢我是用懼日登師門既友諸子入拜夫人望之愀然有穆其言簡肅之肅文忠之文雖無老成典刑則存何以嗣之使世不忘諸子惟逮好學而剛夫人實使兄弟吾孫徼福文忠及我先君出守東南往違其顔病不能見卒以訃聞自斂及葬餽奠莫親匪愧於今有靦昔人寓詞千里侑此一樽尚饗祭大覺禪師文維年月日具位蘇軾謹以香茶蔬果致奠故大覺禪師器之之靈於穆仁祖威神在天山陵之成二十九年當時遺老存者幾人矧如禪師方外之臣頌詩往來月璧星珠昭回之光下燭海隅昔本無生今亦無滅人懷昭陵涕泗哽噎我在壯歲屢親法筵餽奠示别豈免悽然尚饗祭歐陽文忠公夫人文潁州維元祐六年歲次辛未九月丙戌朔從表姪具位蘇軾謹以清酌肴果之奠昭告於故太師兖國文忠公安康郡夫人之靈嗚呼軾自齠齔以學為嬉童子何知謂公我師晝誦其文夜夢見之十有五年乃克見公公為拊掌歡笑改容此我輩人餘子莫羣我老將休付子斯文再拜稽首過矣公言雖知其過不敢不勉契闊艱難見公汝陰多士方譁而我獨南公曰子來實獲我心我所謂文必與道俱見利而遷則非我徒又拜稽首有死無易公雖云亡言如皎日元祐之初起自南遷叔季在朝如見公顔入拜夫人羅列諸孫敢以中子請婚叔氏夫人曰然師友之義凡二十年再升公堂深衣廟門垂涕失聲白髮蒼顔復見潁人潁人思公曰此門生雖無以報不辱其門清潁洋洋東注於淮我懷先生豈有涯哉尚饗祭張文定公文三首維元祐六年嵗次辛未十二月乙卯朔八月壬戌門生龍圖閣學士左朝奉郎知潁州軍州事兼管內勸農使輕車都尉賜紫金魚袋蘇軾謹以清酌庶羞之奠昭告於故太子太保樂全先生張公之靈嗚呼道大如天見存乎人小智自私莫識其真公生而悟得其全淳久乃妙物凜然凝神初如龍鳳不可擾馴游于帝郊尚以其仁可望可見而不可親師心而行自屈自信八十五年以沒元身我先大夫古之天民被褐懷寶陸沈峩岷公曰惜哉王國之珍此太史公筆回千鈞獨置一榻不延餘賔時我兄弟尚未冠紳得交於公先子是因我晚聞道困於垢塵每從公談棄故服新頃獨怪公倒廩傾囷盡發其祕有懷畢陳曰再見子恐無復辰出戶遲遲默焉銜辛穆穆昭陵二三元臣惟公終始髙節邁倫一慟永巳山摧川堙公視富貴如賤與貧公視生死如夕與晨老不惰偷疾不嚬呻有化非亡有隱非淪我獨何為涕流於巾嗚呼哀哉尚饗軾於天下未嘗志墓獨銘五人皆盛德故偉歟我公實浮於聲知公者天寧俟此銘今公永歸我留淮海寓辭千里濡袂有漼尚饗我遊門下三十八年如俯仰中十五年間六過南都而五見公升堂入室問道學禮靡求不供有契於心如水傾海如槖鼓風風水之合豈特無異將初無同孰云此來慟哭不聞髙堂莫空斂不拊棺葬不執紼我愧于胸公知我深我豈不知公之所從生不求人沒不求天自與天通天不吾欺壽考之餘報施亦豐一子四孫鸞鵠在庭以華其終自我先子逮今三世為好無窮以我此心與此一觴達于幽宫尚饗祭龍井辨才文嗚呼孔老異門儒釋分宫又於其間禪律相攻我見大海西北南東江河雖殊其至則同維大法師自戒定通律無持破垢淨皆空講無辨訥事理皆融如不動山如常撞鐘如一月水如萬竅風八十一年生雖有終遇物而應施則無窮我初適吳尚見五公講有辨臻禪有璉嵩後二十年獨餘此翁今又往矣後生誰宗道俗欷歔山澤改容誰持一杯往弔井龍我去杭時白叟黃童要我復來巳許于中山無此老去將安從噫參寥子往奠必躬豈無他人莫寫我胸祭亡妻同安郡君文維元祐八年嵗次癸酉八月丙午朔初二日丁未具位蘇軾謹以家饌酒果致奠于亡妻同安郡君王氏二十七娘之靈嗚呼昔通義君沒不待年嗣為兄弟莫如君賢婦職既修母儀甚敦三子如一愛出于天我從南行菽水欣然湯沐兩郡喜不見顔我曰歸哉行返丘園曽不少須棄我而先孰迎我門孰餽我田巳矣奈何淚盡目乾旅殯國門我實少恩惟有同穴尚蹈此言嗚呼哀哉尚饗祭韓忠獻公文維元祐八年歲次癸酉十一月初一日乙亥端明殿學士兼翰林侍讀學士左朝奉郎定州路安撫使兼馬步軍都總管知定州軍州事上輕車都尉賜紫金魚袋蘇軾謹以清酌庶羞之奠昭告於魏國忠獻公之靈嗚呼我生雖晚尚及昔人堂堂魏公河嶽之神四十餘年其德日新鐘鼎有盡竹帛莫陳惟其大節蔽以一言忠以事君允也上臣我與弟轍來自峨岷公罔羅之若獲鳳麟契闊艱難手書見存勿以大匠笑彼汗顔援手拯溺期我於仁豈知無用既老益頑意廣才疏將歸丘園上未忍棄畀之中山公治此邦沒食其民我獨何幸敬踐後塵公惟人傑而不自賢堂名閲古以古律身况我小生罕見寡聞敢不師公治民與軍雖無以報不辱其門尚饗大行太皇太后靈駕發引文定州因山告成同軌畢至玉衣永閟風馭莫追萬國山河尚憑於坤載四方老稚遽失於母慈欲強名言難形德化積此九年之澤輔成百世之安乃眷中山控臨朔野華戎異服涕慕同聲目斷東朝永絶簾帷之望神馳西洛想聞笳鼓之音臣等各守邉垂莫親饋奠徒因僚吏以致攀號尚饗祭滕大夫母楊夫人文維元祐九年嵗次甲戌三月壬申朔端明殿學士兼翰林侍讀學士左朝奉郎知定州軍州事蘇軾謹以清酌庶羞之奠昭告於近故長安縣太君楊氏之靈嗚呼士盛慶厯如漢武宣用兵西方故西多賢惟時滕公實顯於西文武殿邦尹范是齊功名不終有命有義我時童子知為公喟四十餘年墓木十圍乃識其子傾蓋不疑忠厚且文前人是似秉心平反慈訓則爾仰止德人如岡如陵升堂而拜我愧未能豈其微疾一慟永巳胡不百年以慰其子壽祿在天考終非亡鵲巢之應子孫其昌尚饗惠州祭枯骨文爾等暴骨於野莫知何年非兵則民皆吾赤子恭惟朝廷法令有掩骼之文監司舉行無吝財之意是用一新此宅永安厥居所恨犬豕傷殘螻蟻穿穴但為藂冢罕致全軀幸雜居而靡爭義同兄弟或解脫而無戀超生人天祭亡妹德化縣君文嗚呼宫傅之孫十有六人契闊死生四人僅存維我令妹慈孝溫文事姑如母敬夫如賔玉立二甥實華我門一秀不實何辜于神謂當百年觀此騰振云何俯仰一嚬再呻救藥靡及奄為空雲萬里海涯百日訃聞拊棺何在夢淚濡茵長號北風寓此一樽祭栁仲逺文二首嗚呼哀哉我生多故愈老愈艱親朋幾人日化日遷逝者如風訃來逾年一慟海徼摧胸破肝痛我令妹天獨與賢德如召南壽甫見孫矧我仲逺孝友恭溫天若成之從致有聞富以學術又昌以言久而不試理豈其然﨑嶇有求凡以為親雖不負米實勞且勤知止於此不如歸閒哀我孤甥孝如閔顔銜痛逺訴誰撫誰存逝者巳矣存者何寃慎勿致毁以全汝門以慰我仲遠永歸之魂嗚呼哀哉尚饗我厄於南天降罪疾方之古人百死有溢天不我亡亡其朋戚如栁氏妹夫婦連璧云何兩逝不憗遺一我歸自南宿草再易哭墮其目泉壤咫尺閎也有立氣貫金石我窮且老似舅何益易其墓側可置萬室天定勝人此語其必尚饗祭吳子野文嗚呼子野道與世違寂默自求闔門垂幃兀爾坐忘有似子微或似壺子杜氣發機遍交公卿靡所求希志人緩己忘其渴飢道路為家惟義是歸卒老於行終不自非送我北還中道弊衣有疾不藥但却甘肥問以後事一笑而麾飄然脫去雲散露晞我獨何為感歎歔欷一酬告訣逝舟東飛尚饗徐州祭枯骨文嗟爾亡者昔惟何人兵耶氓耶誰其子孫雖不可知孰非吾民暴骨纍纍見之酸辛為卜廣宅陶穴寬溫相從歸安各反其真尚饗哀詞六首李仲䝉哀詞河南李君仲䝉以司封郎直史館為記室岐王府熙寧二年七月丙戌終於京師家貧喪不時舉其僚相與賻之既斂而歸十月丙申葬於緱氏柏岯山西其孤籲使來告軾曰嗚呼吾先友人也哭之其可無詞昔吾先君始仕於太常君以博士朝夕往來相好先君於人少所與獨稱君為長者君為人敦朴愷悌學博而通長於毛氏詩司馬氏史善與人交雖見犯不報嘗有與君為姻者無故决去聞者為之不平君恬不以為意先君以是稱其難始舉進士甲科為亳潤邠三郡職官後為應天府録曹勤力趨事長吏有不喜者欲以事困之而不能既為博士議禮據正不屈晚入政府以經術輔導篤實不阿其言多驗於後君諱育其先河內人自髙祖徙於緱氏沒時年五十辭曰中心樂易氣淑均兮內外絶一言可信兮無怨無惡善友人兮學詩達禮敏而文兮翶翔王藩仕弗振兮宜壽黃耉隕中身兮兩不一獲歸怨神兮我懷先君涕酸辛兮顧嗟衆人誕失真兮矯矯犖犖自貴珍兮欺世幻俗內弗安兮久而不堪厭則遁兮惑者冰解明者哂兮嗟卒不悟惟彼賢兮渾朴簡易棄弗申兮往者不還我思君兮錢君倚哀詞大江之南兮震澤之北吾行四方而無歸兮逝將此焉止息豈其土之不足食兮將其人之難偶非有食無人之為病兮吾何適而不可獨裴回而不去兮眷此邦之多君子有美一人兮瞭然而清頎然而瘦亮直多聞兮古之益友帶規矩而蹈繩墨兮佩芝蘭而服明月載而之世之人兮世捍堅而不答雖不答其何喪兮超方揚而自得吾將觀子之進退以自卜兮相行止以效清濁子奄忽而不返兮世混混吾焉則升空堂而挹遺像兮弔凝塵於几席苟律我者之信亡兮吾居此其何益行倣徨而無徒兮悼捨此而奚嚮豈存者之舉無其人兮遼遼如晨星之相望吾比年而三哭兮堂堂皆國之英苟處世之恃友兮幾如是而吾不亡臨大江而長嘆兮吾不濟其有命傷春詞并序去歲十二月虞部郎吕君文甫喪其妻安氏二月以書遺余曰安氏甚美而有賢行念之不忘思有以為不朽之託者願求一言以弔之余悲其意乃為作傷春詞云佳人與嵗皆逝兮嵗既復而不返付新春於居者兮獨安適而愈逺晝昏昏其如醉兮夜耿耿而不眠居兀兀不自覺兮紛過前之物變雪霜盡而鳥鳴兮陂塘泫其流暖步荒園而訪遺跡兮蓊百草之生滿風泛泛而微度兮日遲遲而愈妍眇飛絮之無窮兮爛夭桃之欲然燕嘵嘵而稚嬌兮鳩穀穀其老怨蝶羣飛而相值兮蜂抱蘂而更歡善萬物之得時兮痛伊人之罹此寃衆族出而侣遊兮獨向壁而永歎淚熒熒而棲睫兮花搖月而增眩晝出門而不敢歸兮畏空室之漫漫忽入門而欲語兮嗟猶意其今存役魂魄於宵夢兮追髣佛而無緣訪臨邛之道士兮從稠桑之老人縱可得而復見兮恐荒忽而非真求余文以寫哀兮余亦愴恨而不能言夫既其身之不顧兮尚安用於斯文蘇世美哀詞有美一人長而髯兮廞欹歷落進趨檐兮達於從政敏而廉兮如求與由藝果兼兮魁然丈夫色悍嚴兮奮須抵几走羣纎兮聞名見像巳癘痁兮敬事友生小心謙兮誨養貧弱語和甜兮剛柔適中畏愛僉兮孤直無依衆枉嫌兮何辜于神壽復殱兮死無儋石突不黔兮孰為故人孰視怗兮我竄于黃嵗將淹兮於後八年夢復覘兮曰吾子鈞甘虀鹽兮冬月負薪衣不縑兮覺而長吁涕流沾兮永言告鈞守窮潜兮苦心危腸自磨磏兮天不吾欺有速淹兮豈若人子老閭閻兮生歡死忘我言砭兮王大年哀詞嘉祐末豫從事岐下而太原王君諱彭字大年監府諸軍居相鄰日相從也時太守陳公弼馭下嚴甚威震旁郡僚吏不敢仰視君獨侃侃自若未嘗降色詞公弼亦敬焉豫始異之問於知君者皆曰此故武寧軍節度使諱全斌之曽孫而武勝軍節度觀察留後諱凱之子也少時從父討賊甘陵搏戰城下所部斬七十餘級手射殺二人而奏功不賞或勸君自言君笑曰吾為君父戰豈為賞哉豫聞而賢之始與論交君博學精練書無所不通尤喜豫文每為出一篇輒拊掌歡然終日豫始未知佛法君為言大略皆推見至隱以自證耳使人不疑豫尤喜佛書蓋自君發之其後君為將日有聞乞自試於邉而韓魏公文潞公皆以為可用先帝方欲盡其才而君以病卒其子讜以文學議論有聞於世亦從豫遊豫既悲君之不遇而喜其有子於其葬也作相挽之詩以餞之其詞曰君之為將允武且仁甚似其父而輔以文君之為士涵詠書詩議論慨然其子似之奔走四方豪傑是友沒而無聞朋友之咎驥墮地走虎生而斑視其父子以考我言鍾子翼哀詞并引軾年始十二先君宫師歸自江南曰吾南遊至䖍有隱君子鍾君與其弟槩從吾遊同登馬祖巖入天竺寺觀樂天墨迹吾不飲酒君嘗置醴焉方是時先君未為時所知旅游萬里舍者常爭席而君獨知敬異之其後五十有五年軾自海南還過贑上訪先君遺迹而故老皆無在者君之沒蓋三十有一年矣見其子志仁志行志逺相持而泣念無以致其哀者乃追作此詞君諱棐字子翼博學篤行為江南之秀歐陽永叔尹師魯余安道曽子固皆知之然卒不遇以沒儂智髙叛嶺南聲搖江西䖍守曹觀欲籍民財為戰守備謀之於君君曰智髙必不能過嶺無事而籍民民懼且走觀曰如緩急何君曰同舟遇風胡越可使為左右手况吾民乎不幸而至於急則官與民為一家夫孰非吾財者何以籍為觀悟而止䖍人以安其詞曰崆峒摩天章貢激石致兩確髙深相臨悍堅相排洶嶽嶽是故其民勇而尚氣巧礱斫而其君子抗志礪節敏於學矯矯鍾君泳于德淵自澡濯貧不怨天困不求人老愈慤嘉言一發排難解紛巳殘剝吾先君子南游萬里道阻邈如金未鎔木未繩墨玉未琢君於衆中一見定交陳禮樂曰子不飲我醪甚甘釃此濁覽觀江山扣歷泉石步犖確先君北歸君老于䖍望南朔我來易世池臺既平墓木握三子有立移書問道過我數我亦白首感傷薰心隕涕渥是身虛空俯仰變滅過電雹何以寓哀追頌德人詔後覺東坡全集卷九十一
