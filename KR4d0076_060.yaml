body:
  text: 東坡全集巻六十宋蘓軾撰奏議一十三首辭免撰趙瞻神道碑狀元祐六年七月日翰林學士承㫖左朝奉郎知制誥兼侍讀蘇軾狀奏准勅差撰故中散大夫同知樞宻院趙瞻神道碑并書者右臣平生不為人撰行狀埋銘墓碑士大夫所共知近日撰司馬光行狀葢為光曾為亡母程氏撰埋銘又為范鎮撰墓誌葢為鎮與先臣洵平生交契至深不可不撰及奉詔撰司馬光富弼等墓碑不敢固辭然終非本意況臣危病廢學文辭鄙陋不稱人子所以欲顯揚其親之意伏望聖慈别擇能者特許辭免謹錄奏聞伏候勅㫖再乞郡劄子元祐六年七月六日翰林學士承㫖左朝奉郎知制誥兼侍讀蘇軾劄子奏臣聞朝廷以安静為福人臣以和睦為忠若喜怒愛憎互相攻撃則其初為朋黨之患而其末乃治亂之機甚可懼也臣自被命入覲屢以血懇頻干一郡非獨顧衰命為保全之計實深為朝廷求安静之理而事有難盡言者臣與賈易本無嫌怨只因臣素疾程頥之姦形於言色此臣剛褊之罪也而賈易頤之死黨專欲與頤報怨因頤教誘孔文仲令以其私意論事為文仲所奏頤既得罪易亦坐去而易乃於謝表中誣臣弟轍漏泄宻命緣此再貶知廣徳軍故怨臣兄弟最深臣多難早衰無心進取豈復有意記憶小怨而易志在必報未嘗一日忘臣其後召為臺官又論臣不合刺配杭州凶人顔章等以此見易於臣不報不巳今既擢貳風憲付以雄權升沉進退在其口吻臣之綿劣豈勞排撃觀其意趣不久必須言臣并及弟轍轍既備位執政進退之間事關國體則易必須扇結黨與再三論奏煩瀆聖聴朝廷無由安静皆臣愚惷不早迴避所致若不早賜施行使臣終不免被人言而去則臣雖自顧無罪中無所愧而於二聖眷待奬與之意則似不終竊惟天地父母之愛亦必悔之伏乞檢㑹前奏速除一郡此疏即乞留中庶以保全臣子取進止貼黄臣前在南京所奏乞留中一狀亦乞更賜詳覽施行又貼黄臣從來進用不緣他人中外明知獨受聖眷乞賜保全令得以理進退若不早與一郡使臣不免被人言而出天下必謂臣因䝉聖知故遭破壊所損不細矣又貼黄臣未請杭州以前言官數人造作謗議皆言屢有章疏言臣二聖曲庇不肯降出臣尋有奏狀乞賜施行遂䝉付外考其所言皆是羅織以無為有只如經筵進朱雲故事云是離間大臣之類中外傳笑以為聖世乃有此風今臣若更少留必須捃拾似此等事雖聖明洞照有無如黨與既衆執奏不巳則朝廷終亦難違其意縱未責降亦須出臣勢必如此何如今日因臣親嫌之請便與一郡以全二聖始終之恩若聖慈於臣眷眷不巳不行其言則必須騰謗以謂二聖私臣曲行庇葢臣既未能補報萬一而使浮議上及聖明死有餘罪矣伏乞痛賜閔察早除一郡乞將上供封樁斛㪷應副浙西諸郡接續糶米劄子元祐六年七月十二日翰林學士承㫖左朝奉郎知制誥兼侍讀蘇軾劄子奏臣伏見浙西諸郡二年災傷而今嵗大水蘇湖常三郡水通為一農民栖於丘墓舟栰行於市井父老皆言耳目未曽聞見流殍之勢甚於熙寧臣聞熙寧中杭州死者五十餘萬蘇州三十餘萬未數他郡今既秋田不種正使來嵗豐稔亦須七月方見新穀其間饑饉變故未易度量呉人雖號柔弱不為大盜而宣歙之民勇悍者多以販鹽為業百十為羣往來浙中以兵杖䕶送私鹽官司以其不為他盜故略而不問今人既無食不暇販鹽則此等失業聚而為盜或得豪猾為之首帥則非復巡檢縣尉所能辨也恭惟二聖視民如子茍有可救無所吝惜凡守臣監司所乞一一應副可謂仁聖勤恤之至矣然臣在浙中二年親行荒政只用出糶常平米一事更不施行餘䇿而米價不踊卒免流殍葢緣官物有限饑民無窮若兼行借貸俵散則力必不及中路闕絶大悞饑民不免拱手而視億萬之死也不如併力一意專務糶米若糶不絶則市價平和人人受賜縱有貧民無錢可糴不免流殍葢亦有限量矣臣昨日得杭州監稅蘇堅書報臣云杭州日糶三千石過七月無米可糶人情汹汹朝不謀夕但官埸一旦米盡則市價倍踊死者不可勝數變故之生恐不可復以常理度矣欲乞聖慈速降指揮令兩浙運司限一兩日内約度浙西諸郡合糶米斛酌中數目直至來年七月終除見在外合用若干石入急逓奏聞候到即指揮發運司官吏於轄下諸路封樁及年計上供錢斛内擘畫應副須管接續起發赴浙西諸郡糶賣不管少有闕絶仍只依地頭元價及量添水脚錢出賣及賣到米脚錢並用收買金銀還充上供及封樁錢物所貴錢貨流通不至錢荒所有借貸俵散之類候出糶有餘方得施行似此計置雖是數日浩瀚然止於糶賣不失官本似易應副但令浙西官埸糶米不絶直至來年七月終則雖天災流行亦不能盡害陛下赤子也如䝉施行即乞先降手詔令監司出榜曉諭軍民令一路曉然知朝廷巳有指揮令發運司將上供封樁斛㪷應副浙西諸郡糶米直至明年七月中不惟安慰人心破姦雄之謀亦使蓄積之家知不久官米大至自然趂時出賣所濟不少惟望聖明深愍一方危急早賜施行取進止貼黄臣去嵗奏乞下發運司於豐熟近便州軍糴米五十萬石䝉聖慈依奏施行仍賜封樁錢一百萬貫令糴米而發運司以本路米貴為詞不肯收糴去年若用貴價收糴不過每㪷七十足錢盡數收糴猶可得百餘萬石則今年出糶所濟不少其發運司官吏不切遵禀之罪朝廷未嘗責問習玩號令事無由集今來若行臣言即乞嚴切指揮發運司稍有闕悞必行重責所貴一方之民得被實惠所下號令不為空言乞擢用程遵彦狀元祐六年七月日翰林學士承㫖左朝奉郎知制誥兼侍讀蘇軾狀奏右臣竊謂朝廷用人以行實為先以才用為急二者難兼故常不免偏取而端静之士雖有過人之行應務之才又皆藏器待時恥於自獻朝廷莫得而知之如臣等輩固當各舉所聞以助樂育之意伏見左朝散郎前僉書杭州節度判官㕔公事程遵彦吏事周敏學問該洽文詞雅麗三者皆有可觀而事母孝謹有絶人者母性甚嚴遵彦甚宜其妻而母不恱遵彦出之妻既被出孝愛不衰嵗時伏臘所以事姑者如未出而母卒不恱遵彦亦不再娶十五年矣身為僕妾之役以事其母雖前史所傳孝友之士殆不能過臣與之同僚二年備得其實今替還都下未有差遣碌碌衆中未嘗求人臣竊惜之伏望聖慈特賜採察量材錄用非獨廣搜賢之路亦以敦厲孝悌激揚風俗若後不如所舉臣甘伏朝典謹錄奏聞伏候勅㫖乞外補迴避賈易劄子元祐六年七月二十八日翰林學士承㫖左朝奉郎知制誥兼侍讀蘇軾劄子奏臣自杭州召還以來七上封章乞除一郡又曾兩具劄子乞留中省覽傾􅅹肝膽不為不至而天聴髙逺不䝉回照退伏思念不寒而慄然臣計之巳熟若干忤天威得罪分明不避權要獲譴曖昧臣今來甘被分明之罪不願受曖昧之譴臣聞賈易購求臣罪未有所獲只有法外刺配顔章顔益一事必欲收拾砌累以成臣罪易前者乞放顔益巳䝉施行今又乞放顔章以此見易之心未嘗一日不在傾臣只如浙西水災臣在杭州及替還中路并到闕以來累次奏論詞意懇切尋䝉聖慈採納施行而易扇揺臺官安鼎楊畏并入文字以謂回邪之人眩惑朝廷乞加考驗治其尤者宰相以下心知其非然畏易之狠不敢不行賴給事中封駮諫官論奏方持其議易等但務快其私忿茍可以傾臣即不顧一方生靈墜其溝壑若非給事中范祖禹諫官鄭雍姚勔偶非其黨猶肯為陛下腹心耳目依公論奏則行下其言浙中官吏承望風㫖更不敢以實奏災傷則億萬性命流亡冦賊意外之患何所不至陛下指揮執政擘劃救濟非不丁寧而易等方欲行遣官吏言災傷者與聖意大異而執政相顧不言僶俛行下顯是威勢巳成上下懾服寧違二聖指揮莫違賈易意㫖臣是何人敢不迴避若不早去不過數日必為易等所傾一身不足顧惜但恐傾臣之後朋黨益衆羽翼成就非細故也不如今日令臣以親嫌善去中外觀望於朝廷事體未有所害臣之大意止是乞出若前來早賜施行臣本不敢盡言只為累章不允計窮事迫須至盡述本心不敢有隱毫末伏望聖明察其至誠止是欲得外補即非無故論說是非特賜留中省覽以保全臣子不勝幸甚取進止辨賈易彈奏待罪劄子元祐六年八月初四日翰林學士承㫖左朝奉郎知制誥兼侍讀蘇軾劄子奏臣今月三日見弟尚書右丞轍為臣言御史中丞趙君錫言秦觀來見君錫稱被賈易言觀私事及臣令親情王遹往見君錫言臺諫等互論兩浙災傷及賈易言秦觀事乞賜推究臣愚惷無狀常不自揆竊懐憂國愛民之意自為小官即好僭議朝政屢以此獲罪然受性於天不能盡改臣與趙君錫以道義交游每相見論天下事初無疑間近日臣召赴闕見君錫崇政殿門即與臣言老繆非才當此言責切望朋友教誨臣自後兩次見君錫凡所與言皆憂國愛民之事乞問君錫若有一句及私臣為㒺上君錫尋有手簡謝臣其略云車騎臨過獲聞誨益諄諄開誘莫非師保之訓銘鏤肝肺何日忘之臣既見君錫從來傾心以忠義相許故敢以士君子朋友之義盡言無隱又秦觀自少年從臣學文詞采絢發議論鋒起臣實愛重其人與之宻熟近於七月末間因弟轍與臣言賈易等論浙西災傷乞考驗虚實行遣其尤甚者意令本處官吏觀望風㫖必不敢實奏行下却為給事中封駮諫官論奏臣因問弟轍云汝既備位執政因何行此文字轍云此事衆人心知其非然臺官文字自來不敢不行若不行即須羣起力争喧瀆聖聴又弟轍因言秦觀言趙君錫薦舉得正字今又為賈易所言臣緣新自兩浙來親見水災實狀及到京後得交代林希提刑馬瑊及屬吏蘇堅等書皆極言災傷之狀甚於臣所自見臣以此數次奏論雖䝉聖恩極力拯救猶恐去熟日逺物力不足未免必致流殍若更行下賈易等所言則官吏畏懼臺官更不敢以實言災傷致朝廷不復盡力救濟則億萬生齒便有溝壑之憂適㑹秦觀訪臣遂因議論及之又實告以賈易所言觀私事欲其力辭恩命以全進退即不知秦觀往見君錫更言何事又是日王遹亦來見臣云有少事謁中丞臣知遹與君錫親自來宻熟因令傳語君錫大略云臺諫給事中互論災傷公為中丞坐視一方生靈陷於溝壑略無一言乎臣又語遹說與君錫公所舉秦觀巳為賈易言了此人文學議論過人宜為朝廷惜之臣所令王遹與趙君錫言事及與秦觀所言止於此矣二人具在可覆按也臣本為見上件事皆非國家機宻不過行出數日無人不知故因宻熟相知議論及之又欲以忠告君錫欲其一言以救兩浙億萬生齒不為觸忤君錫遂致於此此外別無情理者右臣既備位從官弟轍以臣是親兄又忝論思之地不免時時語及國事臣不合輒與人言至煩彈奏見巳家居待罪乞賜重行朝典取進止辨題詩劄子元祐六年八月初八日翰林學士承㫖左朝奉郎知制誥兼侍讀蘇軾劄子奏臣今月七日見臣弟轍與臣言趙君錫賈易言臣於元豐八年五月一日題詩揚州僧寺有欣幸先帝上仙之意臣今省憶此詩自有因依合具陳述臣於是嵗三月六日在南京聞先帝遺詔舉哀掛服了當迤邐往常州是時新經大變臣子之心孰不憂懼至五月初間因往揚州竹西寺見百姓父老十數人相與道旁語笑其間一人以兩手加額云見說好個少年官家其言雖鄙俗不典然臣實喜聞百姓謳歌吾君之子出於至誠又是時臣初得請歸耕常州葢將老焉而淮浙間所在豐熟因作詩云此生巳覺都無事今嵗仍逢大有年山寺歸來聞好語野花啼鳥亦欣然葢喜聞此語故竊記之於詩書之當途僧舍壁上臣若稍有不善之意豈敢復書壁上以示人乎又其時去先帝上仙巳及兩月決非山寺歸來始聞之語事理明白無人不知而君錫等輒敢挾情公然誣罔伏乞付外施行稍正國法所貴今後臣子不為仇人無故加以惡逆之罪取進止奏狀元祐六年八月八日翰林學士承㫖左朝奉郎知制誥兼侍讀蘇軾狀奏准尚書省劄子蘇軾元豐八年五月一日於揚州僧寺留題詩一首八月八日三省同奉聖㫖令蘇軾具留題因依實封聞奏右臣所有前件詩留題因依臣已於今日早具劄子奏聞訖乞檢㑹降付三省施行謹錄奏聞伏候勅㫖申省論八丈溝利害二首元祐六年九月日龍圖閣學士左朝奉郎知潁州蘇軾狀申右軾今看詳前件李義修所陳劃一事中内三件係欲開太康縣枯河及開陳州明河並不涉潁州地分無由相度可否利害外有一件欲乞自下蔡縣界以東江陂鎮以西地頗卑下之處難為開淘者平地築㟁如汴河例不納衆流免致溝中滿溢横出之患所是田間横貫溝港兩下自有歸頭去處間或於要㑹處如次河口之類可置㪷門遇田間有積水臨時啟閉甚無妨也軾今看詳八丈溝首尾有横貫大小溝瀆極多並係自來地勢南傾流入潁河別無兩下歸頭去處遇夏秋漲溢雖至小者亦有無窮之水雖下愚人亦知其不可塞今義修乃欲築㟁如汴河不納衆流顯是大段狂妄又一見云八丈溝首尾三百餘里當往來道路豈能盡致橋梁欲乞於合該縣鎮濟要去處創立津渡小立課額積久少助堤㟁之費軾今看詳議者欲興大役勞力費國公私洶洶未見其可而義修先欲置津渡立課額以網小利所見猥下無足觀採其餘議論雖多並只是羅提刑李宻學意度更加枝蔓粉飾扶㑹其說而巳別無可考論其八丈溝利害軾見子細相驗打量地勢具的確事件申奏次謹具申尚書省謹狀又元祐六年九月日龍圖閣學士左朝奉郎知潁州蘇軾狀申右軾體訪得萬夀汝隂潁上三縣惟有古陂塘頃畆不少見今皆為民田或巳起移為永業或租佃耕種動皆五六十年以上與産業無異若一旦收取盡為陂塘則三縣之民失業者衆人情騷動為害不小看詳陳州水患本緣羅朝散於府界疏道積水所致今來進士皇維清既知修復陂塘可以弭横流之患何不乞於府界元有積水久來不堪耕種之地多作陂塘不惟所占田地元係積水占壓之處人户別無詞說兼亦陂塘既修之後陳州水患自然衰減更不消糜弊公私開三百五十四里溝渠今來維清既欲依羅朝散擘畫起夫十八萬人用錢米三十七萬貫石開溝之後又別奪萬夀等三縣農民産業不知凡㡬千百頃又別破人夫錢米以興陂塘是附㑹羅朝散議論有害無利必難施行軾自承領得上件省司文字訪聞得民間巳稍驚疑若更行下逐縣勘㑹古陂頃畆及起稅請佃年月則三縣農民必大驚擾其事既決難施行所以更不敢行下勘㑹其李宻學羅朝散等所欲㑹議利害軾見行相驗別具利害申奏次謹具申尚書省謹狀奏論八丈溝不可開狀元祐六年十月日龍圖閣學士左朝奉郎知潁州蘇軾狀奏臣先奉朝㫖令知陳州李承之府界提刑羅適都水監所差官及本路提刑轉運同至潁州與臣㑹議開八丈溝利害臣以到任之初未知利害之詳難以㑹議尋申尚書省乞指揮逐官未得前來候到任見得的確利害別具申省方可指揮逐官前來㑹議進呈奉聖㫖依所乞臣今來到任巳兩月體問得潁州境内諸水但遇淮水漲溢潁河下口壅遏不行則皆横流為害下冒田廬上逼城郭厯旬彌月不減尺寸但淮水朝落則潁河暮退數日之間千溝百港一時收縮以此驗之若淮水不漲則一潁河泄之足矣若淮不免漲則雖復旁開百溝亦須下入于淮淮水一漲百溝皆壅無益於事而況一八丈溝乎貼黄據崔公度狀稱取到夀州浮橋司狀照驗得昨來五六月間陳潁州大水之時淮水比當年大小顯見自是諸河泛漲積水為害並不干淮水之事看詳崔公度所言顯是只將是年淮水偶然不大便為永逺利害未委崔公度如何保得今後淮水與諸河水永不一時皆漲乎又臣問得淮潁間農民父老若淮水小則陳潁諸河永無漲溢之理公度所言必非實事且陳之積水非陳之舊也乃是羅適創引府界積水以為陳患今又欲移之於潁縱使朝廷䘏陳而不䘏潁欲使潁人代陳受患則彼此均是王民臣亦不敢深訴但恐潁州巳被淮水逆流之患而陳州但受府界下流之災若上下水併在潁州則潁之受患必倍於陳田廬城郭官私皆被其害恐非朝廷之本意也又況潁州北高南下今潁河行於南八丈溝行於北逺者數百里近者五七十里皆自北瀉下貫八丈溝而南其勢皆可以奪併溝水入于潁河其間二水最大一名次河一名江陂水道深濶勢若建瓴南傾入潁河而羅適欲以八丈溝奪併而東此猶欲用五丈河奪汴河雖至愚知其不可而羅適與臣書乃云若疑之只塞次河江陂勿令南流可也何足為慮雖兒童之見不至於此縱使臣愚暗全不曉事與適相附㑹以興大役雖復起夫百萬糜費錢米至巨萬億亦無由成而況十八萬人與三十七萬貫石乎臣厯觀數年以來諸人議論胡宗愈羅適崔公度李承之以為可開曾肇陸佃朱勃以為不可開然皆不曾差壕寨用水平打量見地形的實髙下丈尺是致臆度利害口争勝負久而不決臣巳選差教練使史昱等令管押壕寨自蔡口至淮上計㑹本州逐縣官吏子細打量每二十五步立一竿每竿用水平量見髙下尺寸凡五千八百一十一竿然後地面髙下溝身深淺淮之漲水髙低溝之下口有無壅遏可得而見也并取到逐縣官吏保明文狀訖所有逐竿細帳見在本州使案收管更不敢上瀆聖聴只具史昱等相驗到逐節事狀繳連申奏并略具下項要切利害一臣到任之初便取問得汝隂萬夀潁上三縣官吏文狀稱羅適崔公度當初相度八丈溝時只是經馬行過不曽差壕寨用水平打量地面髙下是實切詳適等建議起夫一十八萬人用錢米三十七萬貫石元不知地面髙下未委如何見得利害可否及如何計料得夫功錢糧數目顯是全然疎謬貼黄羅適計料八丈溝要開深一丈而汝隂縣官吏只計料八丈適亦不知據數申上其疎謬例皆如此兼看詳羅適所上文字稱八丈溝上口㟁至水面直深二丈五尺至黄堆口與淮水面約至深十丈有畸即是陳州水面下比夀州淮河水面髙七丈五尺又云淮水面約濶二十餘里又云淮水大漲不過四丈適只以此便定八丈溝下口必無壅遏臣竊詳適若曾用水平打量見的實丈尺必不謂之約量顯是臆度髙下難為慿信今據史昱等打量自蔡口至黄堆口至淮上溜分丈尺及驗得每年淮水漲痕髙下將溜分折除外尚有漲水八尺五寸折除不盡其勢必須從八丈溝内逆流而上行三百里與地面平而後止顯見將來八丈溝遇淮水漲大時臨到淮三百里内壅遏不行二水相值横流於數百里間但五七日不退則潁州苗稼無遺類矣羅適云淮水面濶二十餘里今量濶處不過三里適又云淮水漲不過四丈今驗得漲痕五丈三尺適又云黄堆口至淮面直深十丈有畸今量得四丈五尺三事皆虚乃是適意欲淮面之濶與溜分之多則以意增之欲漲水之小則以意減之此皆有實狀不可移易適猶以意増損其他利害不見於目前者適固不肯以實言也一江陂次河深濶髙下丈尺其勢必奪八丈溝水南入潁河及其餘溝水如泥溝瓦溝之類皆可以回奪八丈溝不令東流實狀巳具史昱等狀内臣體驗得每年潁河漲溢水痕直至州城門脚下公私危懼若八丈溝不能東流却為次河江陂等水所奪南入潁河則是潁河於常年分外更受陳州一帶積水稍加數尺必為州城深患而羅適胡宗愈等皆云自天地有水巳來萬折必東必無回奪之理既云萬折必東則是水有時而行於西南北但卒歸於東耳非謂不折而常東也水之就下兒童知之適等不必其就下而必其常東此豈足信哉適又云方水漲時潁河亦自漲滿不能受水則次河江陂安能奪八丈溝而南臣謂八丈溝比潁河大小不相侔八丈溝必常先潁河而漲後潁河而落方潁河之不受水也則八丈溝巳先漲矣安能奪諸溝而東及八丈溝稍落而能行水則潁河巳先落矣安得不奪八丈溝而南此必然之理也一據史昱等打量到羅適回易八丈溝利開六處計取民田二十七頃八畆合給還價錢或係官田地雖數目不多而羅適未曾計入錢糧數内又看驗得地性疎惡合用稍樁土薄水淺地脉沮洳開未及元料丈尺間必有水泉又難為倒填車水興功並地形髙下不等而溝底須合取令慢平溝身既深溝面隨濶則適所計料全未是實數其一十八萬人夫及三十七萬貫石錢米必是使用不足右八丈溝利害大略具上件三事其餘更有不便事節未易悉數兼巳略見於本路轉運判官朱勃申省狀内及考之前史鄧艾本為陳潁間田良水少而開八丈溝正與今日厭水患多之意不同勃巳論之詳矣伏望聖慈指揮將朱勃申狀與臣所奏一處看詳即見八丈溝不可開事理實狀了然明白乞早賜果决不開指揮以安潁夀之間百姓驚疑之心不勝區區謹錄奏聞伏候勅㫖貼黄胡宗愈羅適等皆言八丈溝成恐商賈舟船不復過潁州故州城裏居民豪户妄生異議今勘㑹蔡河水漲每年中無一兩月其餘月分皆係水小據羅適圖序云八丈溝上口㟁去蔡河水面二丈五尺而八丈溝止於地面上開深八尺除大水漲時溝口方與蔡河相通至水落時溝口去蔡河水面乃髙一丈七尺潁人何緣過憂舟船不入城下顯是巧說厚誣潁人以伸其私意奏淮南閉糴狀二首元祐六年十一月日龍圖閣學士左朝奉郎知潁州蘇軾狀奏據汝隂縣百姓朱憲狀伏為今年旱傷稻苗全無往淮南糴得晩稻一十六石於九月二十八日到固始縣朱臯鎮有望河欄頭所由等欄住憲稻種不肯放過河來當時寄在陳二郎舖内當來牓内只說欄截糴埸粳米不得過淮河並不曾聲說欄截稻種今來不甘被望河欄頭所由等欄截稻種有悞向春布種申乞施行臣尋備錄來憲狀及檢坐敕條牒淮南路監司及光州固始縣并朱臯鎮等處請依條放行斛㪷不得欄截至今未有施行回報兼體問得本州今年係秋田災傷檢放稅賦百姓例闕穀種見今在市絶少斛㪷米價翔貴本州見闕軍糧亦是貴價收糴不行尋勾到斛㪷行人楊佶等取問在市少米因依其楊佶等供狀稱問得船車客旅等稱說是淮南官埸收糴出立賞錢不得津般粳米過淮南界是致在市少米須至奏乞指揮者右檢㑹編敕諸興販斛㪷雖遇災傷官司不得禁止又條諸興販斛㪷及以柴炭草木博糴糧食者並免納力勝稅錢注云舊收稅處依舊即災傷地分雖有舊例亦免臣頃在杭州親見秀州等處為官糴上供粳米違條禁止販賣及災傷地分並不依條免納力勝稅錢於官並無所益依舊收糴不行徒使百姓驚疑各務藏蓄斛㪷不肯出糴致餓損人户為害不少今來淮南官吏又襲此流弊違條立賞行閉糴之政致本州城市闕米農民闕種若非朝廷嚴賜指揮即人户必致失所伏乞備錄臣奏及開坐敕條指揮淮西轉運提刑司行下逐州縣不得更似日前違條禁止興販斛㪷過淮并勘㑹轄下如係災傷地分不得違條收納米穀力勝稅錢所貴逐路官司稍獲均濟仍乞速賜行下使災傷農民早行耕種謹錄奏聞伏候敕㫖又元祐六年十一月日龍圖閣學士左朝奉郎知潁州蘇軾狀奏臣近為光州固始縣朱臯鎮官吏違條禁止本州汝隂縣百姓朱憲收糴稻種不令過淮及取到行人楊佶等狀稱是淮南官埸糴米立賞禁止米斛過淮致本州收糴軍糧不行及農民闕種城市闕食巳具事由奏聞乞嚴賜指揮淮南監司不得違條禁止販賣米斛仍乞勘㑹如係災傷地分不得違條收五穀力勝去訖仍巳令本州一面移牒淮南提轉及光州固始縣朱臯鎮等處放行斛㪷其提轉州縣並不回報依應施行惟朱臯鎮官吏坐到本州縣牒所准淮南西路提刑司指揮出榜云如有細民過度回運米斛不滿一碩即勒白日任便渡載外有一碩以上滿一席者並仰地分捉拽赴官依法施行犯人備賞錢一貫每一席加賞錢一貫若或夜間過渡一碩以下犯人出賞錢一貫每一席加一貫其所捉到米數却勾欄前來於本縣元糴處出糶若係他人捉到其經厯地方勾當人並勾追勘斷以此致本鎮不敢放過米斛又於今月十五日據汝隂縣百姓楊懐狀為本庄不熟遂典田土得錢於淮南收糴到納稅及供家喫用米四碩被朱臯鎮立賞勾欄不令過淮臣又親自體問得本州寄居官户皆言有田在光州界内今年為潁州米貴各令人於本庄取米納稅供家並被本處官司立賞禁止不放前來切詳逐州縣鎮若非監司公然違背朝廷敕條明出牓示禁絶隣路餱糧即逐處官吏亦未敢似此肆行乖戾之政須至再奏乞賜指揮者右臣竊見近年諸路監司每遇米貴多是違條立賞閉糴驚動人户激成災傷之勢熙寧中張能沈起首行此事致浙中餓死百餘萬人臣任杭州日累乞朝廷指揮亦䝉施行今來淮西提刑既欲收糴官米自合依市直立定優價則人户豈有不赴官中賣之理今乃明出牓示嚴刑重賞令人提拽勾欄收糴顯是强買人物為國歛怨無甚如此況提刑司明知編勅雖遇災傷不得禁止販賣斛㪷乃敢公出牓示立賞禁絶淮南京西均是王民而獨絶其餱糧禁其布種以至官户本家庄課亦不得般取喫用違法害物未之前聞其逐州縣鎮官吏亦明知有上條及臣巳坐條關牒並不施行寧違朝廷編敕條貫不敢違監司乖戾指揮伏望聖慈詳酌早賜取問施行少免官吏恣行農民無告謹錄奏聞伏候敕㫖東坡全集巻六十
