body:
  text: 東坡全集卷五十七宋蘇軾撰奏議六首杭州乞度牒開西湖狀元祐五年四月二十九日龍圖閣學士左朝奉郎知杭州蘇軾狀奏右臣聞天下所在陂湖河渠之利廢興成毁皆若有數惟聖人在上則興利除害易成而難廢昔西漢之末翟方進為丞相始決壞汝南鴻隙陂父老怨之歌曰壞陂誰翟子威飯我豆食羮芋魁反乎覆陂當復誰言者兩黃鵠蓋民心之所欲而託之天以為有神下告我也孫皓時吳郡上言臨平湖自漢末草穢壅塞今忽開通長老相傳此湖開天下平皓以為已瑞已而晉武帝平吳由此觀之陂湖河渠之類久廢復開事關興運雖天道難知而民心所欲天必從之杭州之有西湖如人之有眉目蓋不可廢也唐長慶中白居易為刺史方是時湖溉田千餘頃及錢氏有國置撩湖兵士千人日夜開浚自國初以來稍廢不治水涸草生漸成葑田熙寧中臣通判本州則湖之葑合蓋十二三耳至今才十六七年之間遂堙塞其半父老皆言十年以來水淺葑合如雲翳空倐忽便滿更二十年無西湖矣使杭州而無西湖如人去其眉目豈復為人乎臣愚無知竊謂西湖有不可廢者五天禧中故相王欽若始奏以西湖為放生池禁捕魚鳥為人主祈福自是以來每歲四月八日郡人數萬㑹于湖上所活羽毛鱗介以百萬數皆西北向稽首仰祝千萬嵗夀若一旦堙塞使蛟龍魚鱉同為涸轍之鮒臣子坐觀亦何心哉此西湖之不可廢者一也杭之為州本江海故地水泉鹹苦居民零落自唐李泌始引湖水作六井然後民足於水井邑日富百萬生聚待此而後食今湖狹水淺六井漸壞若二十年之後盡為葑田則舉城之人復飲鹹苦其勢必自耗散此西湖之不可廢者二也白居易作西湖石函記云放水溉田每減一寸可溉十五頃每一伏時可溉五十頃若蓄泄及時則瀕河千頃可無凶歲今歲不及千頃而下湖數十里間茭菱穀米所獲不資此西湖之不可廢者三也西湖深濶則運河可以取足於湖水若湖水不足則必取足於江潮潮之所過泥沙渾濁一石五斗不出三歲輒調兵夫十餘萬工開浚而河行市井中蓋十餘里吏卒搔擾泥水狼藉為居民莫大之患此西湖之不可廢者四也天下酒稅之盛未有如杭者也歲課二十餘萬緍而水泉之用仰給於湖若湖漸淺狹水不應溝則當勞人逺取山泉歲不下二十萬工此西湖之不可廢者五也臣以侍從出膺寵寄日覩西湖有必廢之漸有五不可廢之憂豈得苟安歲月不任其責輒已差官打量湖上葑田計二十五萬餘文度用夫二十餘萬工近者伏䝉皇帝陛下太皇太后陛下以本路饑饉特寬轉運司上供額斛五十餘萬石出糶常平米亦數十萬石約敕諸路不取五穀力勝稅錢東南之民所活不可勝計今又特賜本路度牒三百而杭獨得百道臣謹以聖意增價召入中米減價出賣以濟饑民而增減耗折之餘尚得錢米約共一萬餘貫石臣輒以此錢米募民開湖度可得十萬工自今月二十八日興工農民父老縱觀太息以謂二聖既捐利與民活此一方而又以其餘棄興久廢無窮之利使數千人得食其力以度此凶歲蓋有泣下者臣伏見民情如此而錢米有限所募未廣葑合之地尚存大半若來者不嗣則前功復棄深可痛惜若更得度牒百道則一舉募民除去淨盡不復遺患矣伏望皇帝陛下太皇太后陛下少賜詳覽察臣所論西湖五不可廢之狀利害較然特出聖斷别賜臣度牒五十道仍敕轉運提刑司於前來所賜諸州度牒二百道內契勘賑濟支用不盡者更撥五十道價錢與臣通成一百道使臣得盡力畢志半年之間目見西湖復唐之舊環三十里際山為岸則農民父老與羽毛鱗介同泳聖澤無有窮巳臣不勝大願謹録奏聞伏候敕㫖貼黃目下浙中梅雨葑根浮動易為除去及六七月大雨時行利以殺草芟夷藴崇使不復滋蔓又浙中農民皆言八月斷葑根則死不復生伏乞聖慈早賜開允及此良時興工不勝幸甚又貼黃本州自去年至今開浚運河引西湖水灌注其中今來開除葑田逐一利害臣不敢一一煩瀆天聽别具狀申三省去訖申三省起請開湖六條狀元祐五年五月初五日龍圖閣學士左朝奉郎知杭州蘇軾狀申軾於熙寧中通判杭州訪問民間疾苦父老皆云惟苦運河淤塞逺則五年近則三年率常一開後不獨勞役兵民而運河自州前至北郭穿闤闠中蓋十四五里每將興工市肆汹動公私騷然自胥吏壕寨兵級等皆能恐喝人户或云當於某處置土某處過泥水則居者皆有失業之憂既得重賂又轉而之他及工役既畢則房廊邸店作踐狼藉園囿隙地例成丘阜積雨蕩濯復入河中居民患厭未易悉數若三五年失開則公私壅滯以尺寸水欲行數百斛舟人牛力盡跬步千里雖監司使命有數日不能出郭者其餘艱阻固不待言問其所以頻開屢塞之由皆云龍山浙江兩閘日納潮水泥沙渾濁一汛一淤積日稍久便及四五尺其勢當然不足怪也軾又問言潮水淤塞非獨近歲若自唐以來如此則城中皆為丘阜無復平田今驗所在堆疊泥沙不過三五十年所積耳其故何也父老皆言錢氏有國時郡城之東有小堰門既云小堰則容有大者昔人以大小二堰隔截江水不放入城則城中諸河専用西湖水水既清徹無由淤塞而餘杭門外地名半道洪者亦有堰名為清河意似愛惜湖水不令走下自天禧中故相王欽若知杭州始壞此堰以快目下舟楫往來今七十餘年矣以意度之必自此後湖水不足於用而取足於江潮又況今者西湖日就堙塞昔之水面半為葑田霖潦之際無所潴畜流溢害田而旱乾之月湖自減涸不能復及運河謹按唐長慶中刺史白居易浚治西湖作石函記其略曰自錢塘至鹽官界應溉夾河田者皆放湖入河自河入田每減一寸可溉十五頃每一伏時可溉五十頃若堤防如法蓄泄及時則瀕湖千頃無凶年矣由此觀之西湖之水尚能自運河入田以溉千頃則運河足用可知也軾於是時雖知此利害而講求其方未得要便今者䝉恩出典此州自去年七月到任首見運河乾淺使客出入艱苦萬狀穀米薪芻亦緣此暴貴尋剗刷捍江兵士及諸色廂軍得千餘人自十月興工至今年四月終開浚茆山鹽橋二河各十餘里皆有水八尺以上見今公私舟船通利父老皆言自三十年以來開河未有若此深快者也然潮水日至淤填如舊則三五年間前功復棄軾方講問其䇿而臨濮縣主簿監在城商稅蘇堅建議曰江潮灌注城中諸河歲月己久若遽用錢氏故事以堰閘却之令自城外轉過不惟事體稍大而湖面葑合積水不多雖引入城未可全恃宜參酌古今且用中䇿今城中運河有二其一曰茆山河南抵龍山浙江閘口而北出天宗門其一曰鹽橋河南至州前碧波亭下東合茆山河而北出餘杭門餘杭天宗二門東西相望不及三百步二河合於門外以北抵長河堰下今宜於鈐轄司前創置一閘每遇潮上則暫閉此閘令龍山浙江潮水徑從茆山河出天宗門候一兩時辰潮平水清然後開閘則鹽橋一河過闤闠中者永無潮水淤塞開淘搔擾之患而茆山河縱復淤填乃在人户稀少村落相半之中雖不免開淘而泥土有可堆積不為人患潮水自茆山河行十餘里至梅家橋下始與鹽橋河相通潮已行逺泥沙澄墜雖入鹽橋河亦不淤填自來潮水入茆山鹽橋二河只淤填十里自十里以外不曽開淘此已然之明效也茆山河既日受潮水無緣涸竭而鹽橋河底低茆山河底四尺梅家橋下量得水深四尺而碧波亭前水深八尺則鹽橋河亦無涸竭之理然猶當過慮以備乏水今西湖水貫城以入于清湖河者大小凡五道一暗門外㪷門一所一湧金門外水閘一所一集賢亭前水筧一所一集賢亭後水閘一所一菩提寺前㪷門一所皆自清湖河而下以北出餘杭門不復與城中運河相灌輸此最可惜宜於湧金門內小河中置一小堰使暗門湧金門二道所引湖水皆入法慧寺東溝中南行九十一丈則鑿為新溝二十六丈以東逹于承天寺東之溝又南行九十丈復鑿為新溝一百有七丈以東入于猫兒橋河口自猫兒橋河口入新水門以入于鹽橋河則咫尺之近矣此河下流則江潮清水之所入上流則西湖活水之所注永無乏絶之憂矣而湖水所過皆闤闠曲折之間頗作石匱貯水使民得汲用浣濯且以備火災其利甚博此所謂參酌古今而用中䇿也軾尋以堅之言使通直郎知仁和縣事黃僎相度可否及率僚吏躬親驗視一一皆如堅言可成無疑也謹以四月二十日興工開導及作堰閘且以餘力修完六井杭州城中多鹵地無甘井唐刺史李泌始作六井皆引湖水注其中歲久不治熙寧中知州陳襄與軾同擘畫修完而功不堅至今復廢壞軾今改作瓦筒又以磚石培甃固護可以堅久皆不過數月可以成就而本州父老農民覩此利便相率詣軾陳狀凡一百一十五人皆言西湖之利上自運河下及民田億萬生聚飲食所資非止為游觀之美而近年以來堙塞幾半水面日減茭葑日滋更二十年無西湖矣勸軾因此盡力開之軾既深愧其言而患兵工寡少費用之資無所從出父老皆言竊聞朝廷近賜度牒一百道每道一百七十貫為錢一萬七千貫本州既髙估米價召人入中減價出糶以濟饑民消折之餘尚有米錢約共一萬貫石若支用此亦足以集事矣適㑹錢塘縣尉許敦仁建言西湖可開狀其略曰議者欲開西湖久矣自太守鄭公戩以來茍有志於民者莫不以此為急然皆用工滅裂又無以善其後蓋西湖水淺茭葑壯猛雖盡力開撩而三二年間人工不繼則隨手葑合與不開同竊見吳人種菱每歲之春芟除潦漉寸草不遺然後下種若將葑田變為菱蕩永無茭草堙塞之患今乞用上件錢米雇人開湖候開成湖面即給與人户量出課利作菱蕩租佃獲利既厚歲歲加工若稍不除治微生茭葑即許人剗賃但使人户常憂剗奪自然盡力永無後患今有錢米一萬貫石度所雇得十萬工每工約開葑一丈亦可添得十萬丈水面不為小補若量破錢米召暮飢民興役必不濟事若每日破米三升錢五十五文足雇一强壯人夫然後可使雖云强壯然艱食之歲使數千人得食其力以度凶年亦歸於賑濟也軾尋以敦厚之䇿參考衆議皆謂允當已一面牒本州依敦仁擘畫支上件錢米雇人仍差捍江船務樓店務兵士共五百人般載葑草於四月二十八日興工去訖今來有合行起請事件謹具畫一如左一今來所創置鈐轄司前一閘雖每遇潮上閉閘一兩時辰而公私舟船欲出入閘者自須先期出入必不肯端坐以待閉閘兼更有茅山一河自可通行以此實無阻滯之患而能隔截江潮徑自茅山河出天宗門至鹽橋一河永無堙塞開淘搔擾之患為利不小恐來者不知本末以阻滯為言輕有變改積以歲月舊患復作今來起請新置鈐轄司前一閘遇潮上閉訖方得開龍山浙江閘候潮平水清方得却開鈐轄司前閘一鹽橋運河岸上有治平四年提刑元積中所立石刻為人户屋舍侵占牽路巳行除拆外具載闊狹丈尺今方二十餘年而兩岸人户復侵占牽路蓋屋數千間却於屋外别作牽路以致河道日就淺窄準此據理並合拆除本州方行相度而人户相率經州乞遽逐人家後丈尺各作木岸以護河堤仍據所侵占地量出賃錢官為樁管準備修補木岸乞免拆除屋舍本州已依狀施行去訖今來起請應占牽路人户所出賃錢並送通判㕔收管準備修補河岸不得别將支用如違並科違制一自來西湖水面不許人租佃惟茭葑之地方許請賃種植今來既將葑田開成水面須至給與人户請佃種菱深慮歲久人户日漸侵占舊來水面種植官司無由覺察巳指揮本州候開湖了日於今來新開界上立小石塔三五所相望為界亦須至立條約束今來起請應石塔以內水面不得請射及侵占種植如違許人告每丈支賞錢五貫文省以犯人家財充一湖上種菱人户自來臠割葑地如田塍狀以為疆界緣此即漸葑合不可不禁今來起請應種菱人户只得標插竹木為四至不得以臠葑為界如違亦許人剗賃一本州公使庫自來收西湖菱草蕩課利錢四百五十四貫充公使今來既開草葑盡變為菱蕩給與人户租佃即今後課利亦必稍增若撥入公使庫未為穩便今來起請欲乞應西湖上新舊菱蕩課利並委自本州量立課額今後永不得增添如人戶不切除治致少有草葑即許人剗賃其到賃人特與權免三年課利所有新舊菱蕩課利錢盡送錢塘縣尉司收管謂之開湖司公使庫更不得支用以備逐年雇人開葑撩淺如敢别將支用並科違制一錢塘縣尉廨宇在西湖上今來起請今後差錢塘縣尉銜位內帶管勾開湖司公事常切㸃檢才有茭葑即依法施行或支開湖司錢物雇人開撩替日委後政㸃檢交割如有茭葑不切除治即申所屬㸃檢申吏部理為違制以上六條並刻石置知州及錢塘縣尉上常㕔切㸃檢右謹件如前勘㑹西湖葑田共二十五萬餘丈合用人夫二十餘萬工上件錢米約可雇十萬工只開得一半軾已具狀奏聞乞别賜度牒五十道通成一百道充開湖費用外所有逐一子細利害不敢一一紊煩天聽伏乞僕射相公門下侍郎中書侍郎尚書左丞尚書右丞特賜詳覽前件所陳利害及起請六事逐一敷奏立為本州條貫早賜降下依稟施行兼畫成地圖一面隨狀納上謹具狀申三省謹狀奏户部拘收度牒狀元祐五年五月二十七日龍圖閣學士左朝奉郎知杭州蘇軾狀奏右臣近者伏見二聖遇災而懼憂勞四方所以拯救饑民者可謂至矣兩浙淮南䝉賜度牒六百道而杭揚二州各得百道吏民鼓舞歌詠聖澤曽未數日而淮西提刑申户部本路常平斛㪷足用不須上件度牒兩浙轉運提刑亦申本路今年豐熟别無流民是致户部申都省却乞拘收度牒錢斛以備别時支用都省更不奏禀聖㫖便行下本路提刑司依户部所申施行臣勘㑹自來聖恩以災傷特賜錢物賑濟即無似此中變却自都省行下追收體例深駭物聽淮浙兩路去歲災傷之甚行路備知便使今年秋穀大稔猶恐未補瘡痍而况春夏之交稻秧未了未委逐路提轉如何見得今年秋熟便申豐稔顯是小臣無意恤民専務獻諂而户部都省樂聞其言即時施行追寢二聖已行之澤百姓聞之皆謂朝廷不惜飢民而惜此數百紙度牒中路翻悔為惠不終臣忝備禁從受恩至深不忍小臣惑誤執政屯膏反汗虧汙聖德惜毫毛之費致丘山之損是以冒昧獻言伏望聖慈察臣孤忠留中省覽更不降出只作聖意訪聞戒飭執政令速降指揮更不得拘收一依前降聖㫖盡用賑濟所貴艱食之民始終被惠亦免二聖已行恩命反覆追收失信天下臣不勝區區謹録奏聞伏候敕㫖貼黃臣近有狀奏乞更賜度牒五十道用開西湖葑田仍以一面指揮本州將前來度牒變轉賑濟外所餘錢米召募艱食之民興工開淘今來才及一月漸以見功吏民踊躍從事農工父老無不感恱忽䝉都省拘收錢米自指揮到日更不敢支動吏民失望前功併棄深可痛惜伏乞出自聖意指揮三省檢㑹前奏早賜施行臣自以受恩深重每有所見不敢不盡今者上忤執政下忤户部臨司伏望聖慈愍臣孤忠不避仇怨特乞留中不出以全臣子應詔論四事狀元祐五年六月初九日龍圖閣學士左朝奉郎知杭州蘇軾狀奏臣近者伏覩邸報以諸路旱災內出手詔兩道其略曰豈政治失當事之害物者尚多上下厄塞情之不通者非一刑或不稱其罪用或不當其人又曰意者政令寬弛吏或為害而莫知賦役失當民病於事而莫察忠言有壅而未逹賢材有抑而未用臣伏讀至此感憤涕泣而言曰嗚呼陛下即位改元于今五年三出此言矣雖禹湯之聖不惜罪已而臣子之心誠不忍聞思有以少補聖政助成應天之實使堯舜之仁名言皆行心迹相應庶幾天人感通災沴不作免使君父數出此言不勝拳拳孤忠而志慮短淺又以出守外服不能盡知朝政得失獨以目所親見民之疾苦州縣官吏日夜奉行殘傷其肌體離散其父子破壞其生業為國斂怨而了無絲毫上助國用者四事昧死獻言謹具條件如左一伏見元祐四年八月十九日敕節文應見缺市易人户籍納拘收産業自來所收課利及估賣到諸般物色錢已及官本别無失陷除巳有人承買交業外並特給還未足者許貼納收贖仍不限年四方聞之莫不鼓舞歌詠以謂聖恩深厚燭知民隱誠三王推本人情之政也尋契勘杭州共有一百一十二户合該上項敕條方且次第施行次忽准尚書户部符據蘇州申明如何謂之折納如何謂之籍納本部已依條估覆供認伏定入官折還缺錢謂之折納己經估覆三估不伏定即以所估髙價籍定者謂之籍納惟籍納産業方許給還用此契勘遂無一户可以應得指揮至有已給再追者於是百姓歡然出訴于庭以謂某等自失業已來父母妻子離散轉在溝壑久無所歸伏幸仁聖在上昭恤如此命下之初如䝉更生今者有司沿文生意又復壅隔雖有惠澤蓋與無同臣即看詳元初立法本為興置市易已來凡異時民間生財自養之道一切收之公上小民既無他業不免與官中首尾膠固以至供通物産召保立限增價出息賒貸轉變以苟趨目前之急及至限滿不能填償又理一重息罰歲月益久逋缺愈多科決監錮以逮妻孥市易官吏方且計較功賞巧為文詞致許人户願以屋業及田土折納還官各以差官檢估取伏定文狀了日理作季限放免息罰召人添價收買方人户在係纍之時州縣督責嚴急如有産業田土豈復自能為主檢估伏認勢須在官雖名情願實只空文唯是頑狡之人或能抵拒以至三估未肯供狀及其既納皆是折還缺錢並籍在官有何不同聖恩寬大特為立法以救前日之弊所稱籍納只是臨時立文出於偶爾而有司執閡妄意分别若果如申明即是善良畏事之人不䝉優恤元初恃頑狡獪與官為競之民却被惠澤事理如此豈不倒置不惟元條無此明文實恐非朝廷綏養窮困之意及檢㑹元祐四年三月二十六日敕人户缺市易官錢將樓店屋産折納在官並將所收房課充折别無少缺亦許給還亦不曽分别折納籍納以此推考顯無可疑自是蘇州官吏巧薄以刻為忠曲有申明而户部吝於出納以害仁政伏乞特加詳察不以折納籍納並依元條施行所貴失業之人均被聖恩一伏見元祐元年九月八日敕尚書户部狀據提㸃兩浙刑獄公事喬執中奏熙寧四年以後至元豐三年以前新法積缺鹽錢及有均攤等人陪填見今貧乏無可送納已纍經赦恩比類市易等錢只令送納産鹽埸監官本價錢其餘並乞除放等事本部勘當欲並依喬執中所奏前項事理施行仍連狀奉聖㫖依及準提刑司備坐元奏積缺鹽錢前後官司催納僅及六年催到貫萬不少今來所缺並是下等貧困之人無可送納已纍經赦恩及逐節事理遂具狀申奏今准省符前項指揮請詳朝㫖施行本州契勘上件年分計有四百四十五户自承朝㫖已來逮今首尾五年才放得二十三户臣竊怪之以為東南鹽法久為民患原其造端蓋自兩浙流衍散漫遂及江南福建流弊之末人不堪命故詔令之下如救水火今者五年之久民之疾苦依然尚在朝廷德澤十不行一何也推考其故蓋提舉鹽事司執文害意謂非貧乏不在此數而州縣吏人因緣為姦以市賄賂故久而不決竊詳元奏之意本謂積缺歲久前後官司催納到貫萬不少今來所缺並是貧困之人既以纍經赦恩比類市易只乞與納官本價錢本部勘當以此並乞依奏仍連狀奉聖㫖施行即是執中所奏缺户自是貧困之人皆當釋放矣省部行下務從文省止是節略元奏為其已涉六年見今貧乏無可送納非為更行勘㑹須得委是貧乏方可施行至元祐二年本州再以元豐四年已後至八年登極大赦以前積缺鹽户奏乞除放省部看詳方始立文如委是貧乏即依元祐元年九月十八日已降朝㫖施行以顯執中當時所奏並謂見今貧乏無可送納合行一例除放及節次本州與轉運司各曽申明省符與元奏詞語不同省部亦巳開析緣元係連狀並依前項所奏施行事理甚明而主事堅執至今疑惑至使州縣吏人户户行遣一一較量計構官司買囑鄰里尚復多方指擲以肆規求待其充欲然後保明遂致其間一百四十九户巳放而復行勘㑹一百六十五户申省見勘㑹而未圓二十五户巳圓而申禀監司及有一户二户旋申省部如此反復多方留難即五年之久未足為怪也伏惟仁聖在上憂民疾苦寤寐不忘惠澤之下宜如置郵傳命今乃中道廢格以開奸吏乞取之路反使朝廷之恩獨與奪於州縣庸人之手省部既不鈎察官吏亦恬不為慮甚非所以仰稱仁聖焦勞愛民之意也伏乞昭示德音申飭有司更不勘㑹是與不是貧乏無俾奸吏執文害意以壅隔朝廷大惠不然或斷以第三等以下並依上件朝㫖施行則法令易簡一言自足矣蓋等第素定貧富較然朝行夕至奸吏無所措意也所有元豐四年以後及至八年大赦以前所缺鹽户亦乞依此施行貼黃契勘熙寧四年以後止元豐八年登極大赦以前人户積缺共計五萬三百餘貫若謂非貧乏有可送納即自元祐元年至今並不曽納到分文顯見有司空留帳籍虛數以害朝廷實惠一伏見熙寧中天下以新法從事凡利源所在皆歸之常平使者而轉運司歲入之計惟田賦與酒稅而已方是時民財窘亟酒稅例皆減耗諸路既已經費不足上下督責益急故酒務官吏至有與庸保雜作州縣受官視事去處亦或為小民喧譁羣飲之肆又不能售往往茍逃罪戾巧為文致誘導無知之民以陷缺負破蕩之禍如許人供通自已或借他人産業當酒是也臣近契勘杭州自承上件指揮以來以産當酒者計一千四百三十三户計錢一十四萬二千九百餘貫前後官司催督監錮繼以鞭笞拘當在官使之離業又自收其租利中間以至係纍犴獄公與私皆擾人與産俱亡十餘年間除已催到一十二萬九千四百餘貫計千二十九户外尚有餘缺一萬三千四百餘貫計四百四户歲月既久終不能填償豈非並是困窮無有之人乎尋檢㑹元豐四年五月二十一日敕酒務留當産業依鹽錢例拘收以其鹽與酒事同體一故也今者鹽錢缺户已准元祐元年九月十六日及二年九月十八日朝㫖許納場監地頭官本價錢餘並除放獨酒缺至今未䝉如此施行豈容事同體一拘收則同而除放則異此無他蓋有司不能推廣朝廷德意故也臣愚欲乞將元豐八年登極大赦以前酒缺人户並依所缺鹽錢已得朝㫖并今來前項申明更不勘㑹貧乏或斷自第三等以下事理施行不惟海隅細民並䝉休澤實亦無偏無黨皇極之道也一伏見元豐四年杭州合發和買絹二十三萬一千匹准朝㫖撥轉運司錢於餘杭等縣委官置埸一十一處收買尋以數內揀下不堪上供五萬七千八百九十匹計錢五萬五千餘貫却勒逐場變轉是時錢重物輕一日併出既聲言行濫不受於官又須元價以兾償足捐之市中莫有顧者於是官吏惶駭莫知所為不免一切賖貸及假借官勢抑配在民往往其間浮浪小人與無賴子弟詭冒姓名朋欺上下元買官吏茍得虛數還之有司以緩目前之禍其後督責嚴急必於取償奏立近期専委强吏十餘年間如捕寇盜除催到四萬六千餘貫外餘缺八千二百餘貫共二百八十二户並是貧民下户無所從出與詭冒逃移不知頭主及干繫均納之人連延至今終不能足惟有簿書以資奸吏追擾遺害未已今者伏准元祐五年四月初九日敕諸處見缺蠶鹽和預買青苗錢物元是冒名無可催理或全家逃移鄰里抱認或元無頭主均及干繫人以此積年未能了絶雖係元請官本况內有已該元豐八年登極大赦者依聖㫖並特放歡聲播傳和氣充塞臣於此時仰知聖德廣大正使堯湯水旱亦不足慮也然政有體事有數體雖備而數不能悉言雖不及而意在是者蓋非俗吏所能知也臣輒不避僣妄竊詳和買之法以錢與民而收絹是猶補助耕斂之意公私兩有之利元豐官吏以絹與民而收錢又皆行濫棄捐之餘取償倍稱不實之直賒貸抑配以茍免一時失陷之責即是利専自為害専在民也事理人情輕重可見聖恩矜恤宜在所先臣愚以謂元豐四年退賣物帛既同是和買之名又有非法病民之實自合依今年四月九日朝㫖施行外伏望朝廷深念前項弊害止是出於一時官吏私意非如蠶鹽和預買青苗天下公共之法更賜加察告示矜寬不以有無頭主是與不是冒名及鄰里抱認與均及干繫人並特與除放是亦稱物平施天之道也右所有四事伏望聖慈特察臣孤忠志在愛君别無情弊更賜清問左右大臣如無異論便乞出敕施行若後稍有一事一件不如所言臣甘伏罔上誤朝之罪若復行下有司反復勘㑹必是巧為駁難無由施行臣緣此得罪萬死無悔但恨仁聖之心本不如此天降甘雨為物所隔終不到地可為痛惜而况前件四事錢物數目雖多皆是空文必難催索徒使胥吏小人緣而為奸威福平民故臣敢謂放之則損虛名而收實惠不放則存虛數而受實禍利害較然伏望聖明特出宸斷天下幸甚臣愚蠢少慮言語粗疏干犯天威伏俟斧鑕謹録奏聞伏候敕㫖貼黃臣伏見四方百姓皆知二聖恤民之心無異父母但臣子不能推行致澤不下流日近以蘇州官吏妄有申明折納籍納一事户部從而立法致已給還産業却行追收人户詣臣哀訴皆云黃紙放了白紙却收有泣下者臣竊深悲之自二聖嗣位已來恩貸指揮多被有司巧為艱閡故四方皆有黃紙放而白紙收之語雖民知其實止怨有司然陛下亦未嘗峻發德音戒敕大臣令盡理推行則亦非獨有司之過也况臣所論四事錢物雖多皆是虛數必難催理除是復用小人如吳居厚盧秉之類假以事權濟其威虐則五七年間或能索及三五分若官吏只循常法何緣索得三五年後人户竭産伍保散亡勢窮理盡不得不放當此之時亦不謂之聖恩矣伏見坤成節在近天下臣子皆以放生為忠度僧為福臣愚無知不識大體輒敢以此四事為獻望留神省覽指揮執政便與施行導迎天休以益聖算其賢於放生度僧亦逺矣若陛下不少留神執政只作常程文字行下一落胥吏庸人之手則茫然如墮海中民復何望矣臣言狂意切必遭衆怒伏乞聖慈只行出前件奏狀留此貼黃一紙更不降出以全孤危庶使愚臣今後每有所聞得盡論列以報二聖知遇之恩萬分之一也臣不勝大願奏浙西災傷第一狀元祐五年七月十五日龍圖閣學士左朝奉郎知杭州蘇軾狀奏右臣聞事豫則立不豫則廢此古今不刋之語也至於救災恤患尤當在早若災傷之民救之於未饑則用物約而所及廣不過寬減上供糶賣常平官無大失而人人受賜今歲之事是也若救之於已饑則用物博而所及微至於耗散省倉虧損課利官為一困而己饑之民終於死亡熙寧之事是也熙寧之災傷本緣天旱米貴而沈起張靚之流不先事奏聞但務立賞閉糶富民皆爭藏穀小民無所得食流殍既作然後朝廷知之始敕運江西及截本路上供米一百二十三萬石濟之巡門俵米攔街散粥終不能救饑饉既成繼之以疾疫本路死者五十餘萬人城郭蕭條田野丘墟兩稅課利皆失其舊勘㑹熙寧八年本路放稅米一百三十萬石酒課虧減六十七萬餘貫略計所失共計三百二十餘萬貫石其餘耗散不可悉數至今轉運司貧乏不能舉手此無它不先事處置之過也去年浙西數郡先水後旱災傷不減熙寧然二聖仁智聰明於去年十一月中首發德音截撥本路上供斛㪷二十萬石賑濟又於十二月中寬減轉運司元祐四年上供額斛三分之一為米五十餘萬斛盡用其錢買銀絹上供了無一毫虧損縣官而命下之日所在歡呼官既住糴米價自落又自正月開倉糶常平米仍免數路稅務所收五穀力勝錢且賜度牒三百道以助賑濟本路帖然遂無一人餓殍者此無它先事處置之力也由此觀之事豫則立不豫則廢其禍福相絶如此恭惟二聖天地父母之心見民疾苦匐匍救之本不計較費用多少而臣愚魯無識但知權利害之輕重計得喪之大小以謂譬如民庶之家置莊田招佃客本望租課非行仁義然猶至水旱之歲必須放免缺負借貸種糧者其心誠恐客散而田荒後日之失必倍於今故也而况有天下子萬姓而不計其後乎臣自去歲以來區區獻言屢瀆天聽者實恐陛下客散而田荒也去歲杭州米價每㪷至八九十自今歲正月以來日漸減落至五六月間浙西數郡大雨不止太湖泛溢所在害稼六月初閒米價復長至七月初㪷及百錢足陌見今新米已出而常平官米不敢住糶災傷之勢恐甚於去年何者去年之災如人初病今歲之災如病再發病狀雖同氣力衰耗恐難支持又緣春夏之交雨水調勻浙人喜於豐歲家家典賣舉債出息以事田作車水築墟髙下殆遍計本已重指日待熟而淫雨風濤一舉害之民之窮苦實倍去歲近者將官劉季孫往蘇州按教臣密令季孫沿路體訪季孫還為臣言此數州不獨淫雨為害又多大風駕起潮浪堤堰墟垾率皆破損湖州水入城中民家皆尺餘此去歲所無有也而轉運判官張璹自常潤還所言略同云親見吳江平望八尺聞有舉家田苗沒在深水底父子聚哭以船筏撈摝云半米猶堪炒喫青穟且以喂牛正使自今雨止已非豐歲而况止不止又未可知則來嵗之憂非復今年之比矣何以言之去年杭州管常平米二十三萬石今年已糶過十五萬石雖餘八萬石而糶賣未已又緣去年災傷放稅及和糴不行省倉闕數所有上件常平米八萬石只了兊撥充軍糧更無見在惟有糶常平米錢近八萬貫而錢非救饑之物若來年米益貴錢益輕雖積錢如山終無所用熙寧中兩浙市易出錢百萬緡民無貧富皆得取用而米不可得故曳羅䊵帶金玉橫尸道上者不可勝計今來浙東西大抵皆糶過常平米見在絶數少熙寧之憂凛凜在人眼中矣臣材力短淺加之衰病而一路生齒憂責在臣受恩既深不敢别乞閒郡日夜思慮求來年救饑之術别無長䇿惟有秋冬之間不惜髙價多糶常平米以備來年出糶今來浙西數州米既不熟而轉運司又管上供年額斛斗一百五十餘萬石若兩司爭糴米必大貴饑饉愈迫和糴不行來年青黃不交之際常平有錢無米官吏拱手坐視人死而山海之間接連甌閩盜賊結集或生意外之患則誅殛臣等何補於敗以此須至具實聞奏伏望聖慈備録臣奏行下户部及本路轉運提刑兩路鈐轄司疾早相度來年合與不合准備常平斛㪷出糶救饑如合准備即具逐州合用數目臣已約度杭州合用二十萬石仍委逐司擘畫合如何措置令米價不至大段翔湧收糴得足如逐司以謂不須准備出糶救濟即令各具保明來年委得不至饑殍流亡結罪聞奏緣今來巳是入秋去和糴月日無幾比及相度往復取㫖深慮不及於事伏乞詳察速賜指揮臣屢犯天威無任戰栗待罪之至謹録奏聞伏候敕㫖貼黃臣聞之道路閩中災傷尤甚盜賊頗衆或云邵武軍有强賊人數不少恐是廖思餘黨轉運司見令衢州官吏就近體訪雖未知虛實然恐萬一有之不可不豫慮也又貼黃臣謹按唐史憲宗謂宰臣曰卿等纍言吳越去年水旱昨有御史自江淮按察回言不至為災此事信否李絳對曰臣見淮南浙江東西道狀皆云水旱且方隅授任皆朝廷信重之臣茍非事實豈敢上陳此固非虛說也御史官卑選擇非其人奏報之間或容希媚况推誠之道君人大本苟一方不稔當即日救濟其饑貧况可疑之耶帝曰向者不思而有此問朕言過矣絳等稽首再拜帝曰今後諸道被荒之處速宜蠲貸之又按本朝㑹要太宗嘗語宰臣曰國家儲蓄最是急務蓋以備凶年救人命昨者江南數州微有災旱朕聞之急遣使往彼分路賑貸果聞不至流亡兼無饑殍亦無盜賊之患茍無積粟何以拯救饑民臣近者每觀邸報諸路監司多是於三四月間先奏雨水勻調苗稼豐茂及至災傷須待餓殍流亡然後奏知此有司之常態古今之通患也豐熟不須先知人人爭奏災傷正合豫備相顧不言若非朝廷廣加採察則逺方之民何所告奏浙西災傷第二狀元祐五年七月二十五日龍圖閣學士左朝奉郎知杭州蘇軾狀奏右臣近奏為浙西數郡淫雨風濤為害恐災傷之勢甚於去年而常平斛㪷例皆出糶見在數少恐來年民間闕食無可賑濟乞備録臣奏下户部及本路提轉鈐轄司相度合如何擘畫收糴準備出糶未䝉施行今月二十一日二十二日二十三日皆連晝夜大風雨二十四日雨稍止至夜復大雨竊料蘇湖等州風濤所損必加於前若不早作擘畫廣行收糴常平斛㪷準備則來歲必有流殍之憂伏惟聖慈早賜愍救檢㑹前奏速賜施行臣别無材術惟知屢奏喧瀆聖聽罪當萬死謹録奏聞伏候敕㫖東坡全集卷五十七
