body:
  text: 東坡全集卷五十九宋蘇軾撰奏議六首乞相度開石門河狀元符六年三月日龍圗閣學士左朝奉郎知杭州蘇軾狀奏右臣謹按史記秦始皇三十七年東遊至錢塘臨浙江水波惡乃西百二十里從狹中渡始皇帝以天下之力徇其意意之所欲出赭山橋海無難而獨畏浙江水波惡不敢徑渡以此知錢塘江天下之嶮無出其右者臣昔通守此邦今又沗郡寄二十年間親見覆溺無數自溫台明越往來者皆由西興徑渡不涉浮山之嶮時有覆舟然尚希少自衢睦處婺宣歙饒信及福建路八州往來者皆出入龍山沿泝此江江水灘淺必乘潮而行潮自海門東來勢若雷霆而浮山峙於江中與魚浦諸山相望犬牙錯入以亂潮水洄洑激射其怒自倍沙磧轉移狀如鬼神往往於淵潭中湧出陵阜十數里旦夕之間又復失去雖舟師沒人不能前知其深淺以故公私坐視覆溺無如之何老弱叫號求救於湍沙之間聲未及終已為潮水卷去行路為之流涕而已縱有勇悍敢往之人又多是盜賊利其財物或因而擠之能自全者百無一二性命之外公私亡失不知一嵗凡幾千萬而衢睦等州人衆地狹所産五穀不足於食嵗常漕蘇秀米至桐廬散入諸郡錢塘億萬生齒待上江薪炭而活以浮山之嶮覆溺留礙之故此數州薪米常貴又衢婺睦歙等州及杭之富陽新城二邑公私所食鹽取足於杭秀諸場以浮山之嶮覆溺留礙之故官給腳錢甚厚其所亡失與依託風水以侵盜者不可勝數此最其大者其餘公私利害未可以一二遽數臣伏見宣德郎前權知信州軍州事侯臨因葬所生母於杭州之南蕩往來江濵相視地形訪聞父老參之舟人反復講求具得其實建議自浙江上流地名石門並山而東或因斥鹵棄地鑿為運河貼黃石門新河若出定山之南則地皆斥鹵不壞民田又自新河以北潮水不到灌以河水皆可化為良田然近江土薄萬一數十年後江水轉移河不堅久若自石門並山而東出定山之北則地堅土厚久逺無虞然度壞民田五六千畝又失所謂良田之利體問民田之良者不過畝二千以錢償之亦萬餘緡而已此二者更乞令監司及所差官詳議其利害引浙江及溪谷諸水凡二十二里有奇以達于江又並江為岸度潮水所向則用石所不向則用竹大凡八里有奇以達于龍山之大慈浦自大慈浦北折抵小嶺下鑿嶺六十五丈以達于嶺東之古河因古河稍加浚治東南行四里有奇以達于今龍山之運河以避浮山之嶮度用錢十五萬貫用捍江兵及諸郡廂軍三千人二年而成臣與前轉運使葉溫叟轉運判官張璹躬往按視皆如臨言凡福建兩浙士民聞臣與臨欲奏開此河萬口同聲以為莫大無窮之利臣縱欲不言巳為衆論所迫勢不得默巳臣聞之父老章獻皇后臨朝日以江水有皇天蕩之嶮內出錢數十萬貫築長蘆起僧舍以拯溺者又見先帝以長淮之嶮賜錢十萬貫米十萬石起夫九萬二千人以開龜山河今浮山之嶮非特長蘆龜山之比而二聖仁慈視民如傷必將捐十五萬緡以平此積嶮也謹昧死上臨所陳開石門河利害事狀一本及臣所差觀察推官董華用臨之説約度功料貼黃董華所料只是約度大數若蒙朝廷相度可以施行更乞別差官入細計料及合用錢物料狀一本并地圗一面伏乞降付三省看詳或召臨赴省面加質問仍乞下本路監司或更特差官同共相視若臣與臨言不妄乞自朝廷擘畫支賜錢物施行臣觀古今之事非知之難言之亦易難在成之而已臨之才幹衆所共知臣謂此河非臨不成伏望聖慈特賜訪問左右近臣必有知臨者乞專差臨監督此役不惟救活無窮之性命完惜不資之財物又使數州薪米流通田野市井詠歌聖澤子孫不忘臣不勝大願謹録奏聞伏候敕旨貼黃今建此議不知者必有二難其一不過謂浙江浮山之嶮經厯古今賢哲多矣若可平治必不至今日如此乃巷議臆度不足取信只如龜山新河易長淮為安流近日吕梁之嶮竊聞亦已平治豈可謂古人偶未經意便謂今人不可復作其二不過謂並江作岸為潮水所衝齧必不能經久今浙江石岸亦有成規自古本用木岸轉運使張夏始易以石自龍山以東江水溢深石岸立於漲沙之上又潮頭為西陵石磯所射正戰於岸下而四五十年隱然不動雖時有缺壞隨即修完人不告勞官無所費今自大慈浦以西江水皆露出石腳而潮頭自龍山轉向西南則岸之易成而難壞非張夏所建東堤之比也再乞發運司應副浙西米狀元祐六年三月二十三日龍圗閣學士左朝奉郎前知杭州蘇軾狀奏右臣近蒙恩詔召赴闕庭竊以浙西二年水災蘇湖為甚雖訪聞已詳而百聞不如一見故自下塘路由湖入蘇目覩積水未退下田固已沒于深水今嵗必恐無望而中上田亦自渺漫婦女老弱日夜車救而淫雨不止退寸進尺見今春晚並未下種鄉村闕食者衆至以糟粳雜芹蒪食之又為積水占壓薪芻難得食糟飲冷多至脹死並是臣親見即非傳聞春夏之間流殍疾疫必起逐州去年所糴常平米雖粗有備見今州縣出賣米價不甚翔踊但鄉村逺處飢羸之民不能赴城市收糴官吏欲差船載米下鄉散糶即所須數目浩瀚恐不能足用夏秋之間必大乏絶又自今已往若得淫雨稍止即農民須趂初夏秧種車水耕耘之勞十倍常嵗全藉糧米接濟見今已自闕食至時必難施功縱使天假之年亦無所望公私狼狽理在必然臣去嵗奏乞下發運司於江東淮南豐熟近便處糴米五十萬石凖備浙西災傷州軍般運兊撥出糶賑濟尋蒙聖恩行下云巳降指揮令發運司兊撥合起上供并封樁等錢一百萬貫趂時糴買斛斗封樁凖偹移用送户部依巳得指揮餘依浙西鈐轄司所奏施行聖旨既下本路具聞農民欣戴始有生意而發運司官吏全不上體仁聖恤民之意奏稱淮南江東米價髙貴不肯收糴勘會浙西去嵗米價例皆髙貴杭州亦是七十足錢收糴一斗雖是貴糴猶勝於無米坐視民死今來發運司官吏親被聖旨全不依應施行只以米貴為詞更不收糴使聖主已行之命頓成空言飢民待哺之心中途失望却使指凖前年朝旨所撥上供米二十萬石與本路內出糶不盡米一十六萬七千石有零充填今來五十萬石數目外只乞於上供米內更截撥二十萬石與本路相兼出糶切緣上件出糶不盡米一十六萬七千餘石久巳樁在本路臣元奏乞於發運司糴五十萬石之時已是指凖上件米數支用外合更要五十萬石今來運司却將前件聖恩折充今年所賜吏民聞之何由心服臣已纍具執奏未奉朝旨今來親見數州水災如此飢殍之勢極可憂畏既沗近侍理合奏聞豈敢為已去官遺患後人更不任責伏望聖慈察臣微誠垂愍一方特賜指揮發運司依元降指揮除已截撥二十萬石外更兊撥三十萬石與浙西諸州充出糶借貸如發運司去年元不收糴無可兑撥即乞一面截留上供米充滿五十萬石數目却令發運司將封樁一百萬貫錢候今年秋熟日收糴填還若朝廷不以臣言為然待飢饉疾疫大作方行賑濟即恐須於别路運致錢米雖纍百萬亦恐不及於事謹録奏聞伏候敕旨貼黃發運司奏云淮南宿亳等州災傷米價高處七十七文江東米價髙處七十文切緣臣元奏乞於豐熟近便處收糴訪聞楊楚之間穀熟米賤今來發運司却引宿亳等州米價最高處以拒塞朝旨顯非仁聖勤恤及臣元奏乞本意又貼黃若依發運司所奏將出糶不盡一十六萬七千有餘石充數外猶合撥三十四萬石方滿五十萬數今來只撥二十萬石顯虧元降聖旨一十四萬石而况上件出糶不盡米已係前年聖恩所賜發運司不合指凖充數顯虧三十萬石又貼黃如蒙施行乞下轉運司多撥數目與蘇湖州如合賑濟更不拘去年放稅分數施行又貼黃若行下有司反覆往滯必不及事只乞斷自聖心速降指揮杭州召還乞郡狀元祐六年五月十九日龍圗閣學士左朝奉郎前知杭州蘇軾狀奏右臣近奉詔書及聖旨劄子不允臣辭免翰林學士承旨恩命及乞郡事臣已第三次奏乞除臣揚越陳蔡一郡去訖竊慮區區之誠未能遽回天意須至盡露本心重干聖聽惶恐死罪惶恐死罪臣昔於治平中自鳳翔職官得替入朝首被英宗皇帝知遇欲驟用臣當時宰相韓琦以臣年少資淺未經試用故且與館職亦會臣丁父憂去官及服闋入覲便蒙神宗皇帝召對面賜奬激許臣職外言事自惟羇旅之臣未應得此豈非以英宗皇帝知臣有素故耶是時王安石新得政變易法度臣若少加附會進用可必自惟逺人蒙二帝非常之知不忍欺天負心欲具論安石所為不可施行狀以裨萬一然未測聖意待臣深淺因上元有旨買燈四千碗有司無狀虧減市價臣即上書論奏先帝大喜即時施行臣以此卜知先帝聖明能受盡言上疏六千餘言極論新法不便後復因考試進士擬對御試䇿進上并言安石不知人不可大用先帝雖未聽從然亦嘉臣愚直初不譴問而安石大怒其黨無不切齒爭欲傾臣御史知雜謝景溫首出死力彈奏臣丁憂歸鄉日舟中曽販私鹽遂下諸路體量追捕當時梢工篙手等考掠取證但以實無其事故鍛鍊不成而止臣緣此懼禍乞出連三任外補而先帝眷臣不衰時因賀謝表章即對左右稱道黨人疑臣復用而李定何正臣舒亶三人構造飛語醖釀百端必欲致臣於死先帝初亦不聽而此三人執奏不巳故臣得罪下獄定等選差悍吏皇遵將帶吏卒就湖州追攝如捕寇賊臣即與妻子訣别留書與弟轍處置後事自期必死過揚子江便欲自投江中而吏卒監守不果到獄即欲不食求死而先帝遣使就獄有所約敕故獄吏不敢别加非橫臣亦覺知先帝無意殺臣故復留殘喘得至今日及竄責黃州每有表疏先帝復對左右稱道哀憐奬激意欲復用而左右固爭以為不可臣雖在逺亦具聞之古人有言聚蚊成雷積羽沉舟言寡不勝衆也以先帝知臣特達如此而臣終不免於患難者以左右疾臣者衆也及陛下即位起臣於貶所不及一年備位禁林遭遇之異古今無比臣每自惟昆蟲草木之微無以仰報天地生成之德惟有獨立不倚知無不言可以少報萬一始論衙前差顧利害與孫永傅堯俞韓維爭議因亦與司馬光異論光初不以此怒臣而臺諫諸人逆探光意遂與臣為仇臣又素疾程頥之姦未嘗假以色詞故頥之黨人無不側目自朝廷廢黜大姦數人而其餘黨猶在要近陰為之地特未敢發爾小臣周穜乃敢上疏乞用王安石配享以嘗試朝廷臣竊料穜草芥之微敢建此議必有陰主其事者是以上書逆折其姦鋒乞重賜行遣以破小人之謀因此黨人尤加忿疾其後又於經筵極論黃河不可回奪利害且上疏爭之遂大失執政意積此數事恐别致禍患又緣臂痛目昏所以纍章力求補外竊伏思念自沗禁近三年之間臺諫言臣者數四只因發䇿草麻羅織語言以為謗訕本無疑似白加誣執其間曖昧譛訴陛下察其無實而不降出者又不知其幾何矣若非二聖仁明洞照肝膈則臣為黨人所傾首領不保豈敢望如先帝之赦臣乎自出知杭州二年粗免人言中間法外刺配顔章顔益二人蓋攻積弊事不獲巳陛下亦已赦臣而言者不赦論奏不巳其意豈為顏章等哉以此知黨人之意未嘗一日不在傾臣洗垢求瑕止得此事今者忽蒙聖恩召還擢用又除臣弟轍為執政此二事皆非大臣本意竊計黨人必大猜忌磨厲以須勢必如此聞命悸恐以福為災即日上章辭免乞郡行至中路果聞弟轍為臺諫所攻般出廨宇待罪又蒙陛下委曲照見情狀方獲保全臣之剛𥚹衆所共知黨人嫌忌甚於弟轍豈敢以衰病之餘復犯其鋒雖自知無罪可言而今之言者豈問是非曲直竊謂人主之待臣子不過公道以相知黨人之報怨嫌必為巧發而陰中臣豈敢恃二聖公道之知而傲黨人陰中之禍所以不避煩瀆自陳入仕以來進退本末欲陛下知臣危言危行獨立不回以犯衆怒者所從來逺矣又欲陛下知臣平生冒涉患難危嶮如此今餘年無幾不免有逺禍全身之意再三辭遜實非矯飾栁下惠有言直道而事人焉往而不三黜臣若貪得患失隨世俯仰改其常度則陛下亦安所用臣若守其初心始終不變則羣小側目必無安理雖蒙二聖深知亦恐終不勝衆所以反覆計慮莫若求去非不懷戀天地父母之恩而衰老之餘恥復與羣小計較短長曲直為世間髙人長者所笑伏望聖慈察臣至誠特賜指揮執政檢會纍奏只作親嫌回避早除一郡所有今來奏狀乞留中不出以保全臣子臣不勝大願若朝廷不以臣不才猶欲驅使或除一重難邊郡臣不敢辭避報國之心死而後已惟不願在禁近使黨人猜疑别加陰中也干犯天威謹俟斧鑕臣不任祈天請命戰恐隕越之至謹録奏聞伏候敕旨貼黃臣受聖知最深故敢披露肝肺盡言無隱必致當途怨怒愈為身災君臣不密周易所戒故親書奏狀眼昏字大又涉不恭進退惟谷伏望聖慈寬赦臣不勝戰恐之至撰上清儲祥宫碑奏請狀元祐六年六月二十六日翰林學士承旨左朝奉郎知制誥兼侍讀蘇軾狀奏近準敕修蓋上清儲祥宫將欲了畢合用修宫記差臣撰文并書石今有下項事合奏請者一竊見上清宫元係太宗皇帝創建於慶厯中遺火焚蕩今欲見元建及遺火年月乞下史院檢會降下一今來上清儲祥宫係神宗皇帝賜名方議修蓋至元祐中蒙內出錢物修蓋成就今欲見先朝所賜錢物并今來內出錢物數目及係是何庫錢支撥或係太皇太后皇帝本殿錢物並乞檢會降下一今欲見神宗皇帝賜名修宫因依及二聖賜錢修蓋成就意指乞賜頒示一臣竊見朝廷自來修建寺觀多是立碑仍有銘文於體為宜若只作記即更無銘未委今來為碑為記乞降指揮一準敕差臣書石合書篆額人銜位姓名乞檢會降下右謹録奏聞伏候敕旨進單鍔吳中水利書狀元祐六年七月二日翰林學士承旨左朝奉郎知制誥兼侍讀蘇軾狀奏右臣竊聞議者多謂吳中本江海大湖故地魚龍之宅而居民與水爭尺寸以故常被水患蓋理之當然不可復以人力疏治是殆不然臣到吳中二年雖為多雨亦未至過甚而蘇湖常三州皆大水害稼至十七八今年雖為淫雨過常三州之水遂合為一太湖松江與海渺然無辨者蓋因二年不退之水非今年積雨所能獨致也父老皆言此患所從來未逺不過四五十年耳而近嵗特甚蓋人事不修之積非特天時之罪也三吳之水瀦為太湖太湖之水溢為松江以入海海水日兩潮潮濁而江清潮水常欲淤塞江路而江水清駛隨輒滌去海口常通故吳中少水患昔蘇州以東官私船舫皆以篙行無陸挽者古人非不知為挽路以松江入海太湖之咽喉不敢鯁塞故也自慶厯以來松江始大築挽路建長橋植千柱水中宜不甚礙而夏秋漲水之時橋上水常高尺餘况數十里積石壅土築為挽路乎自長橋挽路之成公私漕運便之日葺不巳而松江始艱噎不快江水不快軟緩而無力則海之泥沙隨潮而上日積不巳故海口湮滅而吳中多水患近日議者但欲發民浚治海口而不知江水艱噎雖暫通快不過嵗餘泥沙復積水患如故今欲治其本長橋挽路固不可去惟有鑿挽路于舊橋外别為千橋橋谼各二丈千橋之積為二千丈水道松江宜加迅駛然後官私出力以浚海口海口既浚而江水有力則泥沙不復積水患可以少衰臣之所聞大略如此而未得其詳舊聞常州宜興縣進士單鍔有水學故召問之出所著吳中水利書一卷且口陳其曲折則臣言止得十二三耳臣與知水者考論其書疑可施用謹繕寫一本繳連進上伏望聖慈深念兩浙之富國用所恃嵗漕都下米百五十萬石其他財賦供餽不可悉數而十年九潦公私凋弊深可愍惜乞下臣言與鍔書委本路監司躬親按行或差強幹知水官吏考實其言圗上利害臣不勝區區謹録奏聞伏候敕旨録單鍔吳中水利書切觀三州之水為患滋久較舊賦之入十常減其五六以日月指之則水為害於三州逾五十年矣所謂三州者蘇常湖也朝廷屢責監司監司每督州縣又間出使者尋按舊迹使講明利害之原然而西州之官求東州之利目未嘗厯覽地形之髙下耳未嘗講聞湍流之所從來州縣憚其經營百姓厭其出力鈞曰水之患天數也按行者駕輕舟於汪洋之陂視之茫然猶擲埴索途以為不可治也間有忠於國志於民深求而力究之然有知其一而不知其二知其末而不知其本詳於此而略於彼故有曰三州之水咸注之震澤震澤之水東入于松江由松江以至於海自慶厯以來吳江築長堤橫截江流由是震澤之水常溢而不泄以至壅灌三州之田此知其一偏者也或又曰由宜興而西溧陽縣之上有五堰者古所以節宣歙金陵九陽江之衆水由分水銀林二堰直趨太平州蕪湖後之商人由宣歙販賣􅑉木東入二浙以五堰為艱阻因相為之謀罔紿官中以廢去五堰五堰既廢則宣歙金陵九陽江之水或遇五六月山水暴漲則皆入於宜興之荆溪由荆溪而入震澤蓋上三州之水東灌蘇常湖也此又知其一偏者耳或又曰宜興之有百瀆古之所以泄荆溪之水東入二震澤也今已堙塞而所存者四十九條疏此百瀆則宜興之水自然無患此亦知其一偏者也三者之論未嘗參究得之既不詳攻之則易破以鍔視其迹自西五堰東至吳江岸猶之一身也五堰則首也荆溪則咽喉也百瀆則心也震澤則腹也傍通太湖衆瀆則絡脈衆竅也吳江則足也今上廢五堰之固而宣歙池九陽江之水不入蕪湖反東注震澤下又有吳江岸之阻而震澤之水積而不泄是猶有人焉桎其手縛其足塞其衆竅以水沃其口沃而不已腹滿而氣絶視者恬然猶不謂之已死今不治吳江岸不疏諸瀆以泄震澤之水是猶沃水於人不去其手桎不解其足縛不除其竅塞恬然安視而已誠何心哉然而百瀆非不可治五堰非不可復吳江岸非不可去蓋治之有先後且未築吳江岸已前五堰其廢已久然而三州之田尚十年之間熟有五六五堰猶未為大患自吳江築岸巳後十年之間熟無一二欲具驗之閲三州嵗賦所入之數則可見矣且以宜興百瀆言之古者所以泄西來衆水入震澤而終歸于海蓋震澤吐納衆水今納而不吐鍔竊視熙寧八年時雖大旱然連百瀆之田皆魚逰鱉處之地低汙之甚也其田去百瀆無多逺而田之苗是時亦皆旱死何哉蓋百瀆及傍穿小港瀆厯年不遇旱皆為泥沙堙塞與平地無異矣雖去震澤甚邇民力難以私舉時官又無留意疏導者苗卒歸乎稿死自熙寧八年迄今十四載其田即未有可耕之日嵗嵗訴潦民益憔悴昔嘉祐中邑尉阮洪深明宜興水利方是時吳中水洪屢上書監司乞開通百瀆監司允其請遂鳩工於食利之民疏導四十九條是年大熟此百瀆之驗嵗水旱皆不可不開也宜興所利非止百瀆而已東則有蠡河橫亘荆溪東北透湛瀆東南接罨畫溪昔范蠡所鑿與宜興之西蠡運河皆以昔賢名呼其蠡河遇大旱則淺澱中旱則通流又有孟涇泄滆湖之水入震澤其他溝瀆澱塞其名不可縷舉夫吳江岸界於吳松江震澤之間岸東則江岸西則震澤江之東則大海也百川莫不趨海自西五堰之上衆川由荆溪入震澤注于江由江歸于海地傾東南其勢然也自慶厯二年欲便糧運遂築北隄橫截江流五六十里遂致震澤之水常溢而不泄浸灌三州之田每至五六月之間湍流峻急之時視之則吳江岸之東水常低岸西之水不下一二尺此隄岸阻水之迹自可覽也又覩岸東江尾與海相接之處汙澱茭蘆叢生沙泥漲塞而又江岸之東自築岸以來沙漲成一村昔為湍流奔湧之地今為民居民田桑棗場圃吳江縣由是嵗增舊賦不少雖然增一邑之賦反損三州之賦不知幾百倍耶夫江尾昔無茭蘆壅障流水今何致此蓋未築岸之前源流東下峻急築岸之後水勢遲緩無以滌蕩泥沙以至增積而茭蘆生茭蘆生則水道狹水道狹則流泄不快雖欲震澤之水不積其可得耶今欲泄震澤之水莫若先開江尾茭蘆之地遷沙村之民運其所漲之泥然後以吳江岸鑿其土為木橋千所以通糧運每橋用耐水土木棒二條各長二丈五尺橫梁三條各長六尺柱六條各長二丈除首尾占閣外可得二丈餘谼道每一里計三百六十步一里為橋十所計除占閣外可開水面二十三丈每三十步一橋也一千條橋共開水面二千丈計一十一里四十步也隨橋谼開茭蘆為港走水仍於下流開白蜆安亭二江使太湖水由華亭青龍入海則一州水患必大衰減常州運河之北偏乃江陰縣也其地勢自河而漸低上自丹陽下至無錫運河之北偏古有泄水入江瀆一十四條曰孟瀆曰黃汀堰瀆曰東函港曰北戚氏港曰五卸堰港曰梨溶港曰蔣瀆曰歐瀆曰魏瀆涇曰支子港曰蠡瀆曰牌一曰碑涇皆以古人名或以姓稱之昔皆以泄衆水入運河立斗門又北泄下江陰之江今名存而實亡今存者無幾二浙之糧船不過五百石運河止可常存五六尺之水足可以勝五百石之舟以其一十四處立為石碶斗門每瀆於岸北先築隄岸則制水入江若無隄防則水泛溢而不制將見灌浸江陰之民田民居矣昔熙寧中有提舉沈披者輒去五卸堰走運河之水北下江中遂害江陰之民田為百姓所訟即罷提舉亦嘗被罪始欲以為利而適足以害之此未達古人之智以至敗事也切見近日錢塘進士余默兩進三州水利徒能備陳功力瑣細之事殊不知本末惟有言得常州運河晉陵至無錫一十四處置斗門泄水北下江陰大江雖三尺童子亦知如此可以為利然余默雖能言斗門一事合鍔鄙䇿奈何無法度以制入江之水行之則又豈止為一沈披耶又覩主簿張實進狀言吳江岸為阻水之患涇函不通其言然則然矣雖言吳江岸而不言措置水之術蓋古之所創涇函在運河之下用長梓木為之中用銅輪力水衝之則草可刈也置在運河底下暗走水入江今常州有東西二函地名者乃此也昔治平中提刑元積中開運河嘗開見函管但函管之中皆泥沙以謂功力甚大非可易復遂已今先開鑿江湖海故道堙塞之處泄得積水他日治函管則可若未能開故道而先治函管是知末而不知本也切見常州運河之北偏皆江陰低下之田常患積水難以耕植今河上為斗門河下築堤防以管水入江百姓由是緣此河隄可以作田圍此泄水利田之兩端也宜興縣西有夾苧干瀆在金壇宜興武進三縣之界東至滆湖及武進縣界西南至宜興北至金壇通接長塘湖西接五堰茅山薛步山水直入宜興之荆溪其夾苧干蓋古之人亦所以泄長塘湖東入滆湖泄滆湖之水入大吳瀆塘口瀆白魚灣髙梅瀆四瀆及白鶴溪而北入常州之運河由運河而入一十四條之港北入大江今一十四條之港皆名存而實亡纍有知利便者獻議朝廷欲依古開通北入運河以注大江自滆湖長塘湖兩首各開三分之二為彼田户皆豪民不知利便惟恐開鑿巳田隂搆胥吏皆泥而不行元豐之間金壇令曾長官奏請乞開朝廷又降指揮委江東及兩浙兩路監司相度及近縣官員相視又為彼豪民計搆不行儻開夾苧干通流則由來他州入震澤之水可以殺其勢深利於三州之田也鍔熙寧八年嵗遇大旱切觀震澤水退數里清泉鄉湖乾數里而其地皆有昔日丘墓街井枯木之根在數里之間信知昔為民田今為太湖也太湖即震澤也以是推之太湖寬廣逾於昔時昔云有三萬六千頃自築吳江岸及諸港瀆堙塞積水不泄又不知其愈廣幾多頃也鍔又嘗見低下之田昔人爭售之今人爭棄之蓋積年之水十無一熟積空頭之稅或遇頻年不收則飢餓丐殍鬻妻子以償王租或置其田捨其廬而逋至於酒坊處在水鄉沽賣不行以致敗闕者比年尤甚皆緣水傷下田不收故也鍔又嘗逰下鄉切見陂啽之間亦多丘墓皆為魚鱉之宅且古之葬者不即髙山則於平原陸野之間豈即水穴以危亡魂耶嘗得唐埋銘於水穴之中今猶存焉信夫昔為髙原今為汙澤今之水不泄如古也昨熙寧間撿正張諤命屬吏殿丞劉慤相視蘇秀二州海口諸浦瀆為沙泥壅塞將欲疏鑿以快流水慤相視回申以謂若開海口諸浦則東風駕海水倒注反灌民田諤謂慤曰地傾東南百川歸海古人聞諸海浦所以通百川也若反灌民田古人何為置諸浦耶百川東流則有常西流則有時因東風雖致西流風息則其流亦復歸於海其勢然也凡江湖諸浦港勢亦一同慤雖信其如此然猶有説蓋以昔視諸浦無倒注之患而今乃有之蓋昔無吳江岸之阻諸浦雖暫有泥沙之壅然百川湍流浩急泥沙自然滌蕩隨流以下今吳江岸阻絶百川湍流緩慢緩慢則其勢難以蕩滌沙泥設使今日開之明日復合又聞秀州青龍鎮入海諸浦古有七十二會蓋古之人以為七十二會曲折宛轉者蓋有深意以謂水隨地勢東傾入海雖曲折宛轉無害東流也若遇東風駕起海潮洶湧倒注則於曲折之間有所回激而泥沙不深入也後人不明古人之意而一皆直之故或遇東風海潮倒注則泥沙隨流直上不復有阻凡臨江湖海諸港浦勢皆如此所謂今日開之明日復合者此也今海浦昔日曲折宛轉之勢不可不復也夫利害挂于眉睫之間而人有所不知今欲泄三州之水先開江尾去其泥沙茭蘆遷沙上之民次疏吳江岸為千橋次置常州運河一十四處之斗門石碶隄防管水入江次開導臨江湖海諸縣一切港瀆及開通茜涇水既泄矣方誘民以築田圍昨郟亶嘗欲使民就深水之中疉成圍岸夫水行於地中未能泄積水而先成田圍以狹水道當春夏滿流浩急之時則水當湧行于田圍之上非止壞田圍且淹浸廬舍矣此不智之甚也欲乞朝廷指揮下兩浙轉運司擇智力了幹官員分布諸縣則不越數月其工可畢所有創橋疏通河港置斗門利便制度不在規規而言也今所畫三州江湖溪海圖一本但可觀其大略港瀆之名亦布其一二耳欲見其詳莫若下蘇常湖諸縣各畫溪河溝港圗一本各言某河某瀆通某縣某處俟其悉上合而為一圗則纎悉若視於指掌之間也鍔又覩秀州青龍鎮有安亭江一條自吳江東至青龍由青龍泄水入海昔因監司相視恐走透商稅遂塞此一江其江通華亭及青龍夫籠截商稅利國能有幾耶堰塞湍流其害實大又况措置商稅不為難事竊聞近日華亭青龍人户相率陳狀情願出錢乞開安亭江見有狀在本縣官吏未與施行近又訪得宜興西滆湖有二瀆一名白魚灣一名大吳瀆泄滆湖之水入運河由運河入一十四處斗門下江其二瀆在塘口瀆之南又有一瀆名髙梅瀆亦泄滆湖之水入運河由運河入斗門在吳瀆之南近聞知蘇州王覿奏請開海口諸浦鍔切謂海口諸浦不可開今開之不逾日或遇東風則泥沙又合矣嘗觀考工記曰善溝者水囓之善防者水淫之蓋謂上水湍流峻急則自然下水泥沙囓去矣今若俟開江尾及疏吳江岸為橋與海口諸浦同時興功則自然上流東下囓去諸浦沙泥矣凡欲疏通必自下而上先治下則上之水無不流若先治上則水皆趨下漫滅下道而不可施功力其理勢然也故今治三州之水必先自江尾海口諸浦疏鑿吳江岸及置常州一十四處之斗門築堤制水入江比與吳江兩處分泄積水最為先務也然鍔觀合開三州諸溝瀆不必全藉官錢蓋三州之民憔悴之久人人樂開故半可以資食利户之力也今略舉其一二若開江尾疏吳江岸為橋遷吳江岸東一村之民開地復為昔日之江置一十四處之斗門并築一十四條堤制水入江開夾苧干白鶴溪白魚灣大吳瀆塘口瀆宜興東蠡河已上非官錢不可開也若宜興之橫塘百瀆蘇州之海口諸浦安亭江江陰之季子港春申港下港黃田港利港宜興之塘頭瀆及諸縣凡有自古泄水諸溝港濵瀆盡可資食利戶之力也莫若先下三州及諸縣抄録諸道江湖海一切諸港瀆溝濵自古有名者及供上丈尺料之工力之費或係官錢或係食利私力期之以施工日月同日開鑿同日疏放若或放水有先後則上水奔湧東下衝損在下開未畢溝港以故須同日決放也或者有謂昔人創望亭吕城奔牛三堰蓋為丹陽下至無錫蘇州地形東傾古人創三堰所以慮運河之水東下不制是以創堰以節之以通漕運自熙寧治平間廢去望亭吕城二堰然亦不放綱運何耶鍔曰昔之太湖及西來衆水無吳江岸之阻又一切通江湖海故道未嘗堙塞故運河之水嘗慮走泄入於江湖之間是以置堰以節之今自慶厯以來築置吳江岸及諸港浦一切堙塞是以三州之水常溢而不泄二堰雖廢水亦常溢去堰若無害今若泄江湖之水則二堰尤宜先復不復則運河將見涸而糧運不可行此灼然之利害也又若宜興創市橋去西津堰蓋嘉祐中邑尉阮洪上言監司就長橋東市邑中創一橋使運河南通荆溪初開鑿市街乃見昔日橋柱尚存泥中咸謂古為橋於此也又運河之西口有古西津堰今已廢去久矣且古之廢橋置堰以防走透運河之水今也置橋廢堰以通荆溪則溪水常倒注入運河之內今之與古何利害之相反耶鍔以謂古無吳江岸衆水不積運河髙於荆溪是以塞橋置堰以防泄運河之水也今因吳江岸之阻衆水積而常溢倒注運河之內是以創橋廢堰見利而不見害也今若治吳江岸泄衆水則運河之水再防走泄當於北門之外創一堰可也其利害蓋如此也或又曰切觀諸縣髙原陸野之鄉皆有塘墟或三百畝或五百畝為一墟蓋古之人停滀水以灌溉民田以今視之其塘之外皆水塘之中未嘗滀水又未嘗植苗徒牧養牛羊畜放鳬鴈而已塘之所創有何益耶鍔曰塘之為塘是猶堰之為堰也昔日置塘滀水以防旱嵗今自三州之水久溢而不泄則置而為無用之地若決吳江岸泄三州之水則塘亦不可不開以滀諸水猶堰之不可不復也此亦灼然之利害矣茍堰與塘為無益則古人奚為之耶蓋古之賢人君子大智經營莫不除害興利出於人之未到後人之淺謀管見不達古人之大智顛倒穿鑿徒見其害而莫見其利也若吳江岸止知欲便糧道而不知遏三州之水反以為害又若廢青龍安亭江徒知不漏商旅之稅又不知反狹水道以遏百川今之人所以不如古者凡如此也鍔切觀無錫縣城內運河之南偏有小橋由橋而南下則有小瀆瀆南透梁溪瀆有小堰名曰單將軍堰自橋至梁溪其瀆不越百步堰雖有亦不渡船筏梁溪即接太湖昔所以為此堰者恐泄運河之水昔熙寧八年是嵗大旱運河皆旱涸不通舟楫是時鍔自武林過無錫固見將軍堰既不渡船筏而開是瀆者古人豈無意乎因語與邑宰焦千之曰今運河不通舟楫切覩將軍堰接運河去梁溪無百步之逺古人置此堰瀆意欲取梁溪之水以灌運河千之始則以鍔言為狂終則然之遂率民車四十二管車梁溪之水以灌運河五日河水通流舟楫往來信夫古人經營利害凡一溝瀆皆有微意而今人昧之也嘗見蘇州之茜涇昔范仲淹命工開導以泄積水以入于海當時諫官不知蘇州患在積水不泄咸上疏言仲淹走泄姑蘇之水蓋不知其利而反以為害今茜涇自仲淹之後未復開鑿亦久堙塞鍔存心三州水利凡三十年矣每覩一溝一瀆未嘗不明古人之微意其間曲折宛轉皆非徒然也鍔今日之議未始增廣一溝一瀆其言與圗符合若非觀地之勢明水之性則無以見古人之意今并圗以獻惟執事者上之朝廷則庶幾三州憔悴之民有望於今日也貼黃其圗畫得草略未敢進上乞下有司計會單鍔别畫一先開吳江縣江尾茭蘆地一先遷吳江沙上居民及開白蜆江通青龍鎮又開青龍鎮安亭江通海一先去吳江土為千橋一先置常州運河斗門一十四所用石碶并築堤管水入江一次開夾苧干白鶴溪白魚灣塘口瀆大吳瀆令長塘湖滆湖相連走泄西水入運河下斗門入江一次開宜興百瀆見今只有四十九條東入太湖一次開蘇州茜涇白茅七鴉福山梅里諸浦及茜涇一次開江陰下港黃田春申季子竈子諸港一次開宜興東西蠡河一次根究諸臨江湖海諸縣凡泄水諸港瀆並皆疏鑿伍堰水利昔錢舍人公輔為守金陵常究伍堰之利雖知伍堰之利而不知伍堰以東三州之利害鍔知三州之水利而未究伍堰以西之利害一日錢公輔以世之所為伍堰之利害與鍔參究方知始末利害之議完也公輔以為伍堰者自春秋時吳王闔閭用伍子胥之謀伐楚始創此河以為漕運春冬載二百石舟而東則通太湖西則入長江自後相傳未始有廢至李氏時亦常通運而置牛於堰上挽拽船筏於固城湖之側又嘗設監官置廨宇以收往來之稅自是河道澱塞堰埭低狹虛務添置者十有一堰往來舟筏莫能通行而水勢遂不復西及遇春夏大水江湖泛漲則園頭王母龍潭三澗合為一道而奔衝東來河之不治愈可見也今若開深故道而存留銀林分水二堰則諸堰盡可去矣所欲存二堰者蓋本處地勢自銀林堰以西地形從東迤邐西下自分水堰以東地形從西迤邐東下而其河自西壩至東壩十六里有餘開淘之際須隨逐處地形之髙下以濬之然後江東兩浙可以無大水之患然銀林堰南則通建平廣德北則通溧水江寧又當增修髙廣以俟商旅舟船往還之多可以置官收稅如前之利此五堰所以不可不復也今莫若治五堰使上之水不入於荆溪而由分水銀林二堰直歸太平之蕪湖下治吳江之岸為千橋使太湖之水東入于海中治百瀆之故道與夫蘇常湖三州之有故道旁穿於太湖者雖不可縷舉而概可以迹究也難者曰雖復五堰奈何五堰之側山水東下乎復堰無益也鍔答曰由五堰而東注太湖則有宣歙池廣德溧水之水茍復堰使上之水不入於荆溪自餘山澗之水寧有幾耶北之未復十須殺其六七耳難者乃服東坡全集卷五十九
