body:
  text: 東坡全集卷八宋蘇軾撰詩七十二首和朝同年九日見寄仰看鸞鵠刺天飛富貴功名老不思病馬巳無千里志騷人長負一秋悲古來重九皆如此别後西湖付與誰遣子窮愁天有意吳中山水要清詩送喬施州恨無負郭田二頃空有載行書五車江上青山橫絶壁雲間細路躡飛蛇雞號黑暗通蠻貨胡人謂犀為黑暗蜂鬧黃連採蜜花共怪河南門下客不應萬里向長沙喬受知於吳丞相而施州風土大類長沙雪夜獨宿柏仙菴晚雨纎纎變玉霙小菴髙卧有餘清夢驚匆有穿窗片夜靜惟聞瀉竹聲稍壓冬溫聊得健未濡秋旱若為耕天公用意真難㑹又作春風爛漫晴和孔郎中荆林馬上見寄秋禾不滿眼宿麥種亦稀永愧此邦人芒刺在膚肌平生五千卷一字不救饑方將怨無襦忽復歌緇衣堂堂孔北海直氣凛羣兒朱輪未及郊清風巳先馳何以纍君子十萬貧與羸滔滔滿四方我行竟安之何時劔關路春山聞子規留别雩泉舉酒屬雩泉白髮日夜新何時泉中天復照泉上人二年飲泉水魚鳥亦相親還將弄泉手遮日向西秦留别釋迦院牡丹呈趙倅春風小院却來時壁間惟見使君詩應問使君何處去慿花說與春風知年年歲歲何窮巳花似今年人老矣去年崔護若重來前度劉郎在千里董儲郎中嘗知眉州與先人逰過安丘訪其故居見其子希甫留詩屋壁白髮郎潛舊使君至今人道最能文隻雞敢忘橋公語下馬來尋董相墳冬月負薪雖得免鄰人吹笛不堪聞死生契濶君休問灑淚西南向白雲劉貢父見余歌詞數首以詩見戲聊次其韻十載漂然未可期那堪重作看花詩門前惡語誰傳去醉後狂歌自不知刺舌君今猶未戒灸眉我亦更何辭相從痛飲無餘事正是春容最好時除夜大雪留濰州元日早晴遂行中塗雪復作除夜雪相留元日晴相送東風吹宿酒瘦馬兀殘夢葱曨曉光開旋轉餘花弄下馬成野酌佳哉誰與共須㬰晚雲合亂灑無缺空鵝毛垂馬騣自怪騎白鳳三年東方旱逃户連欹棟老農釋耒歎淚入饑腸痛春雪雖云晚春麥猶可種敢怨行役勞助爾歌飯罋大雪青州道上有懷東武園亭寄交代孔周翰超然臺上雪城郭山川兩竒絶海風吹碎碧琉璃時見三山白銀闕蓋公堂前雪緑窗朱户相明滅堂中美人雪爭妍粲然一笑玉齒頰就中山堂雪更竒青松怪石亂瓊絲惟有使君逰不歸五更上馬愁斂眉君不見淮西李侍中夜入蔡州縳取吳元濟又不見襄陽孟浩然長安道上騎驢吟雪詩何當閉門飲美酒無人毁譽河東守至濟南李公擇以詩相迎次其韻二首弊裘羸馬古河濱野濶天低糝玉塵自笑餐氊典屬國來看換酒謫仙人宦逰到處身如寄農事何時手自親剩作新詩與君和莫因風雨廢鳴晨夜擁笙歌霅水濱回頭樂事總成塵今年送汝作太守到處逢君是主人聚散細思都是夢身名漸覺兩非親相從繼燭何須問蝙蝠飛時日正晨和孔君亮郎中見贈偶對先生盡一樽醉看萬物洶崩奔優逰共我聊卒歲骯髒如君合倚門只恐掉頭難久住應須傾蓋便深論固知嚴勝風流在又見長身十世孫戣字君嚴戡字君勝退之志其墓云孔子世三十八吾見其孫白面長身今君亮四十八世矣送范景仁逰洛中小人真暗事閒退豈公難道大吾何病言深聽者寒憂時雖早白住世有還丹得酒相逢樂無心所遇安去年行萬里蜀路走千盤投老身彌健登山意未䦨西逰為櫻筍東道盡鵷鸞杖履携兒去園亭借客看折花斑竹寺弄水石樓灘鬻馬衰憐白驚雷怯笑韓蘚書標洞府歐陽永叔嘗逰嵩山日莫於絶壁上見苔蘚成文云神清之洞明日復尋不見松蓋偃天壇試與劉夫子重尋靖長官劉几云曽見人嵩山幽絶處眼光如猫意其為靖長官也次韻景仁留别公老我亦衰相見恨不數臨行一杯酒此意重山嶽歌詞白紵清琴弄黃鍾濁詩新眇難和飲少僅可學欲參兵部選有力誰如犖且作東諸侯山城雄鼓角南逰許過我不憚千里邈㑹當聞公來倒屣髮一握書韓幹牧馬圖南山之下汧渭之間想見開元天寶年八坊分屯隘秦川四十萬匹如雲烟騅駓駰駱驪騮騵白魚赤騂皇䮧龍顱鳳頸獰且妍竒姿逸德隱駑頑碧眼胡兒手足鮮歲時翦刷供帝間柘袍臨池侍三千紅粧照日光流淵樓下玉螭吐清寒往來蹙踏生飛湍衆工䑛筆和朱鉛先生曹霸弟子韓廏馬多肉尻脽圓肉中畫骨誇尤難金羈玉勒繡羅鞍鞭箠刻烙傷天全不如此圖近自然平沙細草荒芉綿驚鴻脫爭後先王良挾䇿飛上天何必俯首服短轅送魯元翰少卿知衛州冗士無處著寄身范公園桃花忽成隂薺麥秀巳繁閉門春晝永惟有黃蜂喧誰人肯携酒共醉榆栁村髯卿獨何者一月三到門我不往拜之髯來意彌敦堂堂元老後亹亹仁人言憶在錢塘歲情好均弟昆時於氷雪中笑語作春溫欲飲徑相覔夜開叢竹軒搜尋到篋笥鮓醢無復存每愧煙火中玉腕親炮燔别來今幾何相對如夢魂告我當北渡新詩侑清樽坡陀太行麓洶涌黃河翻仕宦非不遇王畿西北垣斯民如魚耳見網則驚奔皎皎千丈清不如尺水渾刑政雖首務念當養其源一聞襦袴音盜賊安足論次韻子由送蔣䕫赴代州學官功利爭先變法初典刑獨守老成餘窮人未信詩能爾倚市懸知繡不如代北諸生漸狂簡牀頭雜說為爬梳歸來問雁吾何敢疾世王符解著書和李邦直沂山祈雨有應髙田生黃埃下田生蒼耳蒼耳亦巳無更問麥有幾蛟龍睡足亦解慚二麥枯時雨如洗不知雨從何處來但聞吕梁百步聲如雷試上城南望城北際天菽粟青成堆饑火燒腸作牛吼不知待得秋成否半年不雨坐龍慵共怨天公不怨龍今朝一雨聊自贖龍神社鬼各言功無功日盜太倉穀嗟我與龍同此責勸農使者不汝容因君作詩先自劾宿州次韻劉涇我欲歸休瑟漸希舞雩何日著春衣多情白髮三千丈無用蒼皮四十圍晚覺文章真小技早知富貴有危機為君垂涕君知否千古華亭鶴自飛涇之兄汴亦有文死矣和孔密州五絶見邸家園留題大斾傳聞載酒過小詩未忍著磚磨陽關三叠君須祕除却膠西不解歌來詩有渭城之句春步西園見寄歲歲開園成故事年年行樂不辜春今年太守尤難繼慈愛聰明惠利人東欄梨花梨花淡白柳深青栁絮飛時花滿城惆悵東欄二株雪人生看得幾清明和流杯石上草書小詩蜂腰鶴膝嘲希逸春蚓秋蛇病子雲醉裏自書醒自笑如今二絶更逢君堂後白牡丹城西千葉豈不好笑舞春風醉臉丹何似後堂氷玉潔逰蜂非意不相干孔頗有聲伎而客無見者和趙郎中見戲趙以徐伎不如東武詩中見戲云只有當時燕子樓燕子人亡三百秋卷簾那復似揚州西行未必能勝此空唱崔徽上白樓又我擊藤牀君唱歌明年六十奈君何醉顛只要裝風景莫向人前自洗磨趙每醉歌畢輒曰明年六十矣和子由與顔長道同逰百步洪相地築亭種栁平明坐衙不暖席歸來閉閣閒終日卧聞客至到屣迎兩眼蒙籠餘睡色城東泗水步可到路轉河洪翻雪白安得青絲絡駿馬蹙踏飛波栁隂下奮身三丈兩蹄間振鬛長鳴身自乾少年狂興久巳謝但憶嘉陵繞劔關劔關大道車方軌君自不去歸何難山中故人應大笑築室種栁何時還次韻李邦直感舊騶騎傳呼出跨坊簿書填委入充堂誰教按部如何武只許清樽對孟光婉娩有時來入夢溫柔何日聽還鄉酸寒病守尤堪笑千步空餘僕射場與梁先舒煥泛舟得臨釀字二首彭城古戰國孤客倦登臨汴泗交流處清潭百丈深故人輕千里足繭來相尋何以娛佳客潭水洗君心老守厭簿書先生罷函丈風流魏晉間談笑羲皇上河洪忽巳過水色緑可釀君毋輕此樂此樂清且放次韻答邦直子由四首簿書顛倒夢魂間知我踈慵肯見原閒作閉門僧舍冷病聞吹枕海濤喧忘懷杯酒逢人共引睡文書信手翻欲吐狂言喙三尺怕君瞋我却須吞邦直屢以此見戒城南短李好交逰箕踞狂歌總自由尊主庇民君有道樂天知命我無憂醉呼妙舞留連夜閒作清詩斷送秋瀟灑使君殊不俗樽前容我攬須不邦直家中舞者甚多老弟東來殊寂寞故人留飲慰酸寒草荒城角開新徑雨入河洪失舊灘車馬追陪迹未掃唱酬往復字應漫此詩更欲慿君改待與江南子布看君雖為我此遲留别後凄涼我巳憂不見便同千里逺退歸終作十年逰恨無揚子一區宅懶卧元龍百尺樓聞道鵷鴻滿臺閣網羅應不到沙鷗司馬君實獨樂園青山在屋上流水在屋下中有五畝園花竹秀而野花香襲杖履竹色浸盞斚樽酒樂餘春棊局消長夏洛陽古多士風俗猶爾雅先生卧不出冠蓋傾洛社雖云與衆樂中有獨樂者才全德不形所貴知我寡先生獨何事四海望陶冶兒童誦君實走卒知司馬持此欲安歸造物不我捨名聲逐吾輩此病天所赭撫掌笑先生年來效喑啞送顔復兼寄王鞏彭城官居冷如水誰從我逰顔氏子我衰且病君亦窮衰窮相守正其理胡為一朝捨我去輕衫觸熱行千里問君無乃求之歟答我不然聊爾耳京師萬事日日新故人如故今有幾君知牛行相君宅扣門但覔王居士清詩草聖俱入妙别後寄我書連紙苦恨相思不相見約我重陽嗅霜蘂君歸可喚與俱來未應指目妨進擬太一老仙閒不出張安道為太一官使踵門問道今時矣因行過我路幾何願君推挽加鞭箠吾儕一醉豈易得買羊釀酒從今始蠍虎黃雞啄蠍如啄黍窗間守宫稱蠍虎暗中繳尾伺飛蟲巧捷功夫在腰膂跂跂脉脉善緣壁陋質從來誰比數今年歲旱號蜥蜴狂走兒童鬧歌舞能銜渠水作氷雹便向蛟龍覔雲雨守宫努力搏蒼蠅明年嵗旱當求汝轍幼從子瞻兄讀書未嘗一日相舍既壯將逰宦四方讀韋蘇州詩有云那知風雨夜復此對牀眠惻然感之乃相約早退為閒居之樂故子瞻始為鳳翔幕官留詩與轍曰夜雨何時聽蕭瑟其後子瞻通守餘杭復移守膠西而轍滯留於淮陽濟南不見者七年熙寧十年二月始復㑹於澶濮之間相從彭城留百餘日時宿於逍遙堂追感前約作二小詩逍遙堂後千尋木長送中宵風雨聲悮喜對牀尋舊約不知漂泊在彭城秋來東閣涼如水客至山公醉似泥困卧北窗呼不醒風吹松竹雨凄凄子由將赴南都與余㑹宿於逍遙堂作兩絶句讀之殆不可為懷因和其詩以自解余觀子由自少曠達天資近道又得至人養生長年之訣而余亦竊聞其一二以為今者宦逰相别之日淺而異時退休相從之日長既以自解且以慰子由云别期漸近不堪聞風雨蕭蕭巳斷魂猶勝相逢不相識形容變盡語音存但令朱雀長金花此别還同一轉車五百年間誰復在㑹看銅狄兩咨嗟留題石經院三首葱蒨門前路行穿翠密中却來堂上看巖谷意無窮夭矯庭中檜枯枝鵲踏消瘦皮纒鶴骨髙頂轉龍腰窈窕山頭井潛通伏澗清欲知深幾許聽放轆轤聲過雲龍山人張天驥郊原雨初足風日清且好病守亦欣然肩輿白門道荒田咽蛩蚓村巷懸梨棗下有幽人居閉門空雀噪西風髙正厲落葉紛可掃孤僮卧斜日病馬放秋草墟里通有無垣牆任摧倒君家本冠蓋絲竹鬧鄰保脫身聲利中道德自濯澡躬耕抱羸疾奉養百歲老詩書膏吻頰菽水媚翁媪饑寒天隨子杞菊自擷芼慈孝董邵南雞狗相乳抱吾生如寄耳歸計失不早故山豈敢忘但恐迫華皓從君學種秫斗酒時相勞贈王仲素寺丞名景純養氣如養兒棄官如棄泥人皆笑子拙事定竟誰迷歸耕獨患貧問子何所齎尺宅足自庇寸田有餘畦明珠照短褐陋室生虹霓雖無孔方兄顧有法喜妻彈琴一長嘯不答阮與嵇曹南劉夫子名與子政齊家有鴻寶書不鑄金裊蹄促膝問道要遂䝉分刀圭不忍獨不死尺書肯見梯我生本强鄙少以氣自擠孤舟倒江河赤手攬象犀年來稍自笑留氣下暖臍苦恨聞道晚意象颯巳凄空見孫思邈區區賦病梨陽關詞三首受降城下紫髯郎戲馬臺南古戰場恨君不取契丹首金甲牙旗歸故鄉右贈張繼願濟南春好雪初晴行到龍山馬足輕使君莫忘霅溪女時作陽關腸斷聲右答李公擇暮雲收盡溢清寒銀漢無聲轉玉盤此生此夜不長好明月明年何處看右中秋月和孔周翰二絶再觀邸園留題小園香霧曉䝉籠醉手狂詞未必工魯叟録詩應有取曲收彤管邶鄘風觀淨觀堂效韋蘇州詩弱羽巢林在一枝幽人蝸舍兩相宜樂天長短三千首却愛韋郎五字詩京師哭任遵聖十年不還鄉兒女日夜長豈惟催老大漸復成凋喪每聞耆舊亡涕泫聲輒放老任況竒逸先子推輩行文章小得譽詩語尤清壯吏能復所長談笑萬夫上自喜作劇縣偏工破豪黨奮髯走猾吏嚼齒對姦將哀哉命不偶每以才得謗竟使落窮山青衫就黃壤宦逰久不樂江海永相望退耕本就君時節相勞餉此懷今不遂歸見纍纍葬望哭國西門落日銜千嶂平生惟一子抱負珠在掌見之齠齔中巳有食牛量他年如入洛生死一相訪惟有王濬冲心知中散狀答任師中家漢公先君昔未仕杜門皇祐初道德無貧賤風采照鄉閭何嘗踈小人小人自濶踈出門無所詣老史在郊墟門前萬竿竹堂上四庫書髙樹紅消梨小池白芙蕖常呼赤腳婢雨中擷園蔬矯矯任夫子罷官還舊廬是時里中兒始識長者車烹雞酌白酒相對歡有餘有如龎德公往還葛與徐妻子走堂下主人竟誰歟我時年尚幼作賦慕相如侍立看君談精悍實起豫歲月曽幾何耆老逝不居史侯最先沒孤墳拱桑樗我亦涉萬里清血滿襟袪漂流二十年始悟萬緣虛獨喜任夫子老佩刺史魚威行烏白蠻解辮請冠裾方當入奏事清廟陳璠璵胡為厭軒冕歸意不少紓上蔡有良田黃沙走清渠罷亞百頃稻雍容十年儲閒隨李丞相搏射鹿與猪蒼鷹十斤重猛犬如黃驢豈比陶淵明窮苦自把鋤我今四十二衰髮不滿梳彭城古名郡乏人偶見除頭顱巳可知幾何不樵漁㑹當相從去芒鞋老菑畬念子瘴江邊懷抱向誰攄賴我同年友相歡出同輿氷盤薦文鮪鮪鮥也戎瀘常有玉斚傾浮蛆醉中忽思我清詩綴瓊琚知我少詼諧教我時卷舒世事日反覆翩如風中旟雀羅弔廷尉秋扇悲婕妤升沉一何速喜怒紛衆狙作詩謝二子我師寧與蘧初别子由我少知子由天資和而清好學老益堅表裏漸融明豈獨為吾弟要是賢友生不見六七年微言誰與賡常恐坦率性放縱不自程㑹合亦何事無言對空枰使人之意消不善無由萌森然有六女包裹布與荆無憂賴賢婦藜藿䒭大烹使子得行意青衫陋公卿明日無晨炊倒牀作雷鳴秋眠我東閣夜聽風雨聲懸知不久别妙理重細評昨日忽出門孤舟轉西城歸來北堂上古屋空崢嶸退食悮相從入門中自驚南都信繁㑹人事水火爭念當閉閣坐頽然寄聾盲妻子亦細事文章固虛名㑹須掃白髮不復用黃精次韻吕梁仲屯田雨葉風花日夜稀一杯相屬竟何時空虛豈敢酬瓊玉枯朽猶能出菌芝門外吕梁從迅急胸中雲夢自逶遲待君筆力追靈運莫負南臺九日期章質夫寄惠崔徽真玉叉半脫雲垂耳亭亭芙蓉在秋水當時薄命一酸辛千古華堂奉君子水邊何處無麗人近前試看丞相嗔不如丹青不解語世間言語元非真知君被惱更愁絶卷贈老夫驚老拙為君援筆賦梅花未害廣平心似鐵王鞏屢約重九見訪既而不至以詩送將官梁交且見寄次韻答之交頗文雅不類武人家有侍者甚惠麗知君月下見傾城破恨懸知酒有兵老守無何惟日飲將軍競病自詩鳴花枝不共秋欹帽筆陳空來夜斫營愛惜微官將底用他年只好寫銘旌臺頭寺雨中送李邦直赴史館分韻得憶字人字兼寄孫巨源二首霜林日夜西風急老送君歸百憂集清歌窈眇入行雲雲為不行天為泣紅葉黃花秋正亂白魚紫蟹君須憶慿君說向髯將軍衰鬢相逢應不識珥筆西歸近紫宸太平典冊不緣麟付君此事寧論晉載我當時舊過秦門外想無千斛米墓中知有百年人看君兩眼明如鏡休把春秋坐素臣代書答梁先此身與世真悠悠蒼顔華髮誰汝留强名太守古徐州忘歸不如楚沐猴魯人豈獨不知丘蹸藉夫子無罪尤異哉梁子清而修不逺千里從我遊瞭然正色懸雙眸世之所馳子獨不一經通明傳節侯小楷精絶規摹歐梁生學歐陽公書我衰廢學懶且偷畏見問事賈長頭别來紅葉黃花秋夜夢見之起坐愁遺我駮石盆與甌黑質白章聲琳球謂言山石生澗溝追琢尚可王公羞感子佳意能無酬反將木瓜報珍投學如富賈在博收仰取俯拾無遺籌道大如天不可求修其可見致其幽願子篤實慎勿浮發憤忘食樂忘憂九日邀仲屯田為大水所隔以詩見寄次其韻無復龍山對孟嘉西來河伯意雄夸霜風可使吹黃帽舟人黃帽土勝水也尊酒那能泛浪花謾遣鯉魚傳尺素却將燕石報瓊華何時得見悲秋老醉裏題詩字半斜河復并叙熙寧十年秋河決澶淵注巨野入淮泗自澶魏以北皆絶流而濟楚大被其害彭門城下水二丈八尺七十餘日不退吏民疲於守禦十月十三日澶州大風終日既止而河流一枝巳復故道聞之喜甚庶幾可塞乎乃作河復詩歌之道路以致民願而迎神休蓋守土者之志也君不見西漢元光元封間河決瓠子二十年巨野東傾淮泗滿楚人恣食黃河鱣萬里沙回封禪罷初遣越巫沉白馬河公未許人力窮薪芻萬計隨流下吾君仁聖如帝堯百神受職河神驕帝遣風師下約束北流夜起澶州橋東風吹凍收微渌神功不用淇園竹楚人種麥滿河淤仰看浮槎棲古木韓幹馬十四匹二馬並驅攢八蹄二馬宛頸騣尾齊一馬任前雙舉後一馬却避長鳴嘶老髯奚官騎且顧前身作馬通馬語後有八匹飲且行微流赴吻若有聲前者既濟出林鶴後者欲涉鶴俯啄最後一匹馬中龍不嘶不動尾搖風韓生畫馬真是馬蘇子作詩如見畫世無伯樂亦無韓此詩此畫誰當看有言郡東北荆山下可以溝畎積水因與吳正字王户曹同往相視以地多亂石不果還逰聖女山山有石室如墓而無棺椁或云宋司馬桓魋墓二子有詩次其韻二首側手區區未易遮奔流一瞬卷千家共疑智伯初圍趙猶有張湯欲漕斜巳坐迂踈來此地分將勞苦送生涯使君下䇿真堪笑隱隱驚雷響踏車茫茫清泗繞孤岑歸路相將得暫臨試著芒鞋穿犖確更然松炬照幽深縱令司馬能鑱石奈有中郎解摸金强寫蒼崖留歲月他年誰識此時心贈寫御容妙善師憶昔射䇿干先皇珠簾翠幄分兩廂紫衣中使下傳詔跪捧再拜聞天香仰觀眩晃目生暈但見曉色開扶桑迎陽晚出步就坐綘紗玉斧光照廊野人不識日月角髣佛尚記重瞳光三年歸來真一夢橋山松檜凄風霜天容玉色誰敢畫老師古寺晝閉房夢中神授心有得覺來信手筆巳忘幅巾常服儼不動孤臣入門涕自滂元老侑坐須眉古虎臣立侍冠劔長平生慣寫龍鳳質肯顧草間猿與麞都人踏破鐵門限黃金白璧空堆牀爾來摹寫亦到我謂是先帝白髮郎不須覽鏡坐自了明年乞身歸故鄉哭刁景純讀書想前輩每恨生不早紛紛少年場猶得見此老此老如松柏不受霜雪槁直從毫末中自養到合抱宏材乏近用千歲自枯倒文章餘正始風節貫華皓平生為人耳自為薄如縞是非雖難齊反覆看愈好前年旅吳越把酒慶夀考扣門無晨夜百過迹未掃但知從德公未省厭丘嫂别時公八十後㑹知難保昨日故人書連年喪翁媪景純妻先亡傷心范橋水漾漾舞寒藻華堂不見人瘦馬空戀皂我欲江東去匏樽酌行潦鏡湖無賀監慟哭稽山道忍見萬松岡荒池沒秋草答吕梁仲屯田亂山合沓圍彭門官居獨在懸水村吕梁地名居民蕭條雜麋鹿小市冷落無雞豚黃河西來初不覺但訝清泗流奔渾夜聞沙岸鳴甕盎曉看雪浪浮鵬鯤吕梁自古喉吻地萬頃一抹何由吞坐觀入市卷閭井吏民走盡餘王尊計窮路斷欲安適吟詩破屋愁鳶蹲歲寒霜重水歸壑但見屋瓦留沙痕入城相對如夢寐我亦僅免為魚黿旋呼歌舞雜詼笑不惜飲釂空瓶盆念君官舍氷雪冷新詩美酒聊相溫人生如寄何不樂任使絳蠟燒黃昏宣房未築淮泗滿故道堙滅瘡痍存明年勞苦應更甚我當畚鍤先黥髠付君萬指伐頑石千鎚雷動蒼山根髙城如鐵洪口決談笑却掃看崩奔農夫掉臂免狼顧秋穀布野如雲屯還須更置軟腳酒為君擊鼓行金樽張寺丞益齊張子作齊舍而以益為名吾聞之夫子求益非速成譬如逺逰客日夜事征行今年適燕薊明年走蠻荆東觀盡滄海西涉渭與涇歸來閉户坐八方在軒庭又如學醫人識病由飽更風雨晦明淫跛躄瘖聾盲虛實在其脉靜躁在其情榮枯在其色夀夭在其形茍能閲千人望見知死生為學務日益此言當自程為道貴日損此理在既盈願君書此詩以為益齊銘答孔周翰求書與詩身閒曷不長閉口天寒正好深藏手吟詩寫字有底忙未脫多生宿塵垢不蒙譏訶子厚疾反更刻畫無鹽醜征西自有家雞肥太白應驚飯山瘦與君相從知幾日東風待得花開否撥棄萬事勿復談百觚之後那辭酒送李公恕赴闕君才有如切玉刀見之凛凛寒生毛願隨壯士斬蛟蜃不願腰間纒錦絛用違其才志不展坐與胥吏同疲勞忽然眉上有黃氣吾君漸欲收英髦立談左右俱動色一語徑破千言牢我頃分符在東武脫略萬事惟嬉遨盡壞屏障通內外仍呼騎曹為馬曹君為使者見不問反更對飲持雙螯酒酣箕坐語驚衆雜以嘲諷窮詩騷世上小兒多忌諱獨能容我真賢豪為我買田臨汶水逝將歸去誅蓬蒿安能終老塵土下俯仰隨人如桔橰東坡全集卷八
