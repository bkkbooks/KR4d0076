body:
  text: 東坡全集卷一百一宋蘇軾撰志林五十五條記游余自海康適合浦連日大雨橋梁大壞水無津涯自興廉村淨行院下乘小舟至官寨聞自此西皆漲水無復船或勸乘蛋並海即白石是日六月晦無月碇宿大海中天水相接星河滿天起坐四顧太息吾何數乘此險也己濟徐聞復厄於此乎稚子過在旁鼾睡呼不應所撰書易論語皆以自隨而世未有别本撫之而歎曰天未欲使從是也吾輩必濟已而果然七月四日合浦記時元符三年也到杭州一遊龍井謁辨才遺像仍持密雲團為獻龍井孤山下有石室室前有六一泉白而甘當往一酌湖上壽院竹極偉其傍智果院有參寥泉及新泉皆甘冷異常當時往一酌仍尋參寥子妙總師之遺迹見頴沙彌亦當致意靈隱寺後髙峰塔一上五里上有僧不下三十餘年矣不知今在否亦可一往元豐六年十月十二日夜解衣欲睡月色入戶欣然起行念無與樂者遂至承天寺尋張懷民亦未寢相與步於中庭庭下如積水空明水中藻荇交橫蓋竹柏影也何夜無月何處無竹但少閒人如吾兩人耳黃州東南三十里為沙湖亦曰螺師店豫買田其間因往相田得疾聞麻橋人龎安嘗善醫而聾遂往求療安常雖聾而頴悟絶人以紙畫字書不數字輒深了人意余戲之曰余以手為口君以眼為耳皆一時異人也疾愈與之同遊清泉寺寺在蘄水郭門外二里許有王逸少洗筆泉水極甘下臨蘭溪溪水西流余作歌云山下蘭芽短浸溪松間沙路淨無泥蕭蕭暮雨子規啼誰道人生無再少君看流水尚能西休將白髮唱黃雞是日劇飲而歸吾昔自杭移髙密與楊元素同舟而陳令舉張子野皆從余過李公擇於湖遂與劉孝叔俱至松江夜半月出置酒垂虹亭上子野年八十五以歌詞聞於天下作定風波令其略云見說賢人聚吳分試問也應傍有老人星坐客歡甚有醉倒者此樂未嘗忘也今七年耳子野孝叔令舉皆為異物而松江橋亭今歲七月九日海風架潮平地丈餘蕩盡無復孑遺矣追思曩時真一夢耳元豐四年十二月十二日黃州臨臯亭夜坐書紹聖元年十月十二日與幼子過遊白水佛迹院浴於湯池熱甚其源殆可熟物循山而東少北有懸水百仞山八九折處輒為潭深者磓石五丈不得其所止雪濺雷怒可喜可畏水崖有巨人迹數十所謂佛迹也暮歸倒行觀山燒火甚俯仰度數谷至江山月出擊汰中流掬弄珠璧到家二鼓復與過飲酒食餘甘煮菜顧影頺然不復甚寐書以付過東坡翁僕初入廬山山谷竒秀平生所未見殆應接不暇遂發意不欲作詩已而見山中僧俗皆云蘇子瞻來矣不覺作一絶云芒鞋青竹杖自挂百錢遊可怪深山裏人人識故侯既自哂前言之謬又復作兩絶云青山若無素偃蹇不相親要識廬山面他年是故人又云自昔憶清賞初遊杳靄間如今不是夢真箇是廬山是日有以陳令舉廬山記見寄者且行且讀見其中云徐凝李白之詩不覺失笑旋入門先寺主僧求詩因作一絶云帝遣銀河一𣲖垂古來惟有謫仙辭飛流濺沫知多少不與徐洗惡詩往來山南地十餘日以為勝絶不可勝談擇其尤者莫如漱玉亭三峽橋故作此二詩最後與總老同遊西林又作一絶云橫看成嶺側成峰到處看山了不同不識廬山真面目只緣身在此山中僕廬山詩盡於此矣余嘗寓居惠州嘉祐寺縱步松風亭下足力疲乏思欲就林止息望亭宇尚在木末意謂是如何得到良久忽曰此間有甚麼歇不得處由是如挂鈎之魚忽得解脫若人悟此雖兵陳相接鼓聲如雷霆進則死敵退則死法當甚麼時也不妨熟歇已卯上元余在儋耳有老書生數人來過曰良月佳夜先生能一出乎豫欣然從之步城西入僧舍歷小巷民夷雜揉屠酤紛然歸舍已三鼓矣舍中掩關熟寢已再鼾矣放杖而笑孰為得失問先生何笑蓋自笑也然亦笑韓退之釣魚無得更欲逺去不知釣者未必得大魚也僕在徐州王子立子敏皆館於官舍而蜀人張師厚來過二王方年少吹洞簫飲酒杏花下明年余謫黃州對月獨飲嘗有詩云去年花落在徐州對月酣歌美清夜今日黃州見花發小院閉門風露下蓋憶與二王飲時也張師厚久已死今年子立復為古人哀哉吾故人黎錞字希聲治春秋有家法歐陽文忠公喜之然為人質木遲緩劉貢父戲之為黎􅰧子以謂指其德不知果木中真有是也一日聮騎出聞市人有唱是果鬻之者大笑幾落馬今吾謫海南所居有此霜實纍纍然二君皆入鬼録坐念故友之風味豈復可見劉固不泯於世者黎亦能文守道不茍隨者也昔為鳯翔幕過長安見劉原父留吾劇飲數日酒酣謂吾曰昔陳季弼告陳元龍曰聞逺近之論謂明府驕而自矜元龍曰夫閨門雍穆有德有行吾敬陳元方兄弟淵清玉潔有禮有法吾敬華子魚清修疾惡有識有義吾敬趙元逹博聞强記竒逸卓犖吾敬孔文舉雄姿傑出有王霸之略吾敬劉𤣥德所敬如此何驕之有餘子瑣瑣亦安足録哉因仰天太息此亦原父之雅趣也吾後在黃州作詩云平生我亦輕餘子晚歲誰人念此翁蓋記原父語也原父既沒久矣尚有貢父在每與語今復死矣何時復見此俊傑人乎悲夫懷古昔先友史經臣彥輔謂余阮籍登廣武而歎曰時無英雄使豎子成其名豈謂沛公豎子乎余曰非也傷時無劉項也豎子指魏晋間人耳其後余遊潤州甘露寺有孔明孫權梁武李德裕之遺迹余感之賦詩其略曰四雄皆龍虎遺跡儼未刓方其盛壯時爭奪肯少安廢興屬造化遷逝誰控摶況彼妄庸子而欲事所難聊興廣武歎不得雍門彈則猶此意也今日讀李太白登古戰場詩云沈湎呼豎子狂言非至公乃知太白亦誤認嗣宗語與先友之意無異也嗣宗雖放蕩本有意於世以魏晋間多故故一放於酒何至以沛公為豎子乎王彭嘗云塗巷中小兒薄劣其家所厭苦輒與錢令聚坐聽說古話至說三國事聞劉𤣥德敗顰蹙有出涕者聞曹操敗即喜唱快以是知君子小人之澤百世不斬彭愷之子辜式吏頗知文章余嘗為作哀辭字大年修養已飢方食未飽先止散步逍遙務令腹空當腹空時即便入室不拘晝夜坐卧自便惟在攝身使如木偶常自念言今我此身若少動搖如毛髮許便墮地獄如商君法如孫武令事在必行有犯無恕又用佛語及老聃語視鼻端白數出入息綿綿若存用之不勤數至數百此心寂然此身兀然與虛空等不煩禁制自然不動數至數千或不能數則有一法其名曰隨與息俱出復與俱入或覺此息從毛竅中八萬四千雲蒸霧散無始以來諸病自除諸障漸滅自然明悟譬如肓人忽然有眼此時何用求人指路是故老人言盡於此時雨降多置器廣庭中所得甘滑不可名以潑茶煮藥皆美而有益正爾食之不輟可以長生其次井泉甘冷者皆良藥也乾以九二化坤之六二為坎故天一為水吾聞之道士人能服井花水其熱與石硫黃鍾乳等非其人而服之亦能發背腦為疽蓋嘗觀之又分至日取井水儲之有方後七日輒生物如雲母狀道士謂水中金可養煉為丹此固常見之者此至淺近世獨不能為況所謂𤣥者乎任性逍遙隨緣放曠但盡凡心别無勝解以我觀之凡心盡處勝解卓然但此勝解不屬有無不通言語故祖師教人到此便住如眼翳盡眼自有明醫師只有除翳藥何曾有求明樂明若可求即還是翳固不可於翳中求明即不可言翳外無明而世之昧者便將頺然無知認作佛地若如此是佛猫兒狗兒得飽熟睡腹搖鼻息與土木同當恁麼時可謂無一毫思念豈謂猫狗已入佛地故凡學者觀妄除愛自粗及細念念不忘㑹作一日得無所住弟所教我者是如此否因見二偈警䇿孔君不覺聳然更以聞之書至此墻外有悍婦與夫相毆詈聲飛灰火如猪嘶狗嘷因念他一㸃圓明正在猪嘶狗嘷裏靣譬如江河鑒物之性長在飛砂走石之中尋常靜中推求常患不見今日閙裏忽捉得些子元豐六年三月二十五日導引家云心不離田手不離宅此語極有理又云真人之心如珠在淵衆人之心如泡在水此善譬喻者趙貧子謂人曰子神不全其人不服曰吾僚友萬乘螻蟻三軍糠粃富貴而晝夜生死何謂神不全乎貧子笑曰是血氣所扶名義所激非神之功也明日問其人曰子父母在乎曰亡久矣嘗夢見乎曰多矣夢中知其亡乎抑以為存也曰皆有之貧子曰父母之存亡不待計議而知者也晝日問子則不思而對夜夢見之則以亡為存死生之於夢覺有間矣物之眩子而難知者甚於父母之存亡子自以神全而不學可憂也哉豫嘗與其語故録之昨日太守楊君采通判張公規邀余出遊安國寺坐中論調氣養生之事余云皆不足道難在去欲張云蘇子卿齧雪啖氊縮背出血無一語少屈可謂了生死之際矣然不免為胡婦生子窮居海上而況洞房綺縠之下乎乃知此事不易消除衆客皆大笑余愛其語有理故為記之冬至後齊居常吸鼻液潄錬令甘乃咽下丹田以三十瓷器皆有蓋溺其中己隨手蓋之書識其上自一至三十置淨室選謹朴者守之滿三十日開視其上當結細砂如浮蟻狀或黃或赤密絹帕濾取新汲水淨淘澄無度以穢氣淨為度淨瓷瓶合貯之夏至後取細研棗肉丸如梧桐子大空心酒吞下不限丸數三五日後服盡夏至後仍依前法采取却冬至後服此名陽卉隂煉須清淨絶欲若不絶欲其砂不結取首生男子之乳父母皆無疾恙者并養其子善飲食之日取其乳一升只半升己來亦可以硃砂銀作鼎與匙如無硃砂銀山澤銀亦得慢火熬煉不住手攪如淡金色可丸即丸如桐子大空心酒吞下亦不限丸數此名隂丹陽煉世人亦知服秋石然皆非清淨所結又此陽物也須復經火經火之餘皆其糟粕與燒鹽無異也世人亦知服乳乳隂物不經火煉則冷滑而漏精氣也此陽丹隂煉隂丹陽煉蓋道士靈智妙用沉機捷法非其人不可輕泄慎之慎之樂天作廬山草堂蓋亦燒丹也欲成而爐鼎敗來日忠州刺史除書到乃知世間出世間事不兩立也僕有此志久矣而終無成者亦以世間事未敗故也今日真敗矣書曰民之所欲天必從也信而有徴張君持此紙求僕書且欲發藥君當以何品吾聞戰國中有一方吾服之有效故以奉傳其藥四味而已一曰無事以當貴二曰早寢以當富三曰安步以當車四曰晚食以當肉夫已飢而食蔬食有過於八珍而既飽之餘雖芻豢滿前惟恐其不持去也若此可謂善處窮者矣然而於道則未也安步自佚晚食為美安以當車與肉為哉車與肉猶存於胸中是以有此言也東坡居士自今日已往不過一爵一肉有尊客盛饌則三之可損不可增有召我者預以此先之主人不從而過是者乃止一曰安分以養福二曰寬胃以養氣三曰省費以養財元符三年八月公昔遺余以暖肚餅其直萬錢我今報公亦以暖肚餅其價不可言中空而無眼故不漏上直而無耳故不懸以活潑潑為內非湯非水以赤歷歷為外非銅非鉛以念念不忘為項不解不縛以了了常知為腹不方不圓到希領取如不肯承當却以見還謝魯元翰洛下有洞穴深不可測有人墮其中不能出飢甚見龜蛇無數每旦輒引首東望吸初日光咽之其人亦隨其所向效之不已遂不復飢身輕力强後卒還家不食不知其所終此晋武帝時事辟榖之法以百數此為上法法止於此能服玉泉使鉛汞具體去仙不逺矣此法甚易知易行天下莫能知知者莫能行何則虛一而靜者世無有也元符二年儋耳米貴吾方有絶糧之憂欲與過子共行此法故書以授之四月十九日記醫官張君𫝊服絹方真神仙上藥也然絹本以禦寒今乃以充服食至寒時當蓋稻草席耳世言著衣喫飯今乃喫衣著飯耶元符三年歲次庚辰正月朔戊辰是日辰時則丙辰也三辰一戊四土㑹焉而加丙與庚丙土母而庚其子也土之富未有過於斯時也吾當以斯時肇養黃中之氣過此又欲以時取薤薑蜜作粥以啖吾終日默坐以守黃中非謫居海外安得此慶耶東坡居士記疾病余患赤目或言不可食膾余欲聽之而口不可曰我與子為口彼與子為眼彼何厚我何薄以彼患而廢我食不可子瞻不能决口謂眼曰他日我痁汝視物吾不禁也管仲有言畏威如疾民之上也從懷如流民之下也又曰燕安鴆毒不可懷也禮曰君子莊敬日强安肆日偷此語乃當書諸紳故余以畏威如疾為私記云前日與歐陽叔弼朝無咎張文潜同在戒壇余病目昏將以熱水洗之文潜曰目忌㸃洗目有病當存之齒有病當勞之不可同也又記魯直語云眼惡剔决齒便漱潔治目當如治民治齒當如治軍治民當如曹參之治齊治軍當如商鞅之治秦頗有理故追録之夢寐昨夜夢參寥師携一軸詩見過覺而記其飲茶詩兩句云寒食清明都過了石泉槐火一時新夢中問火固新矣泉何故新答曰俗以清明淘井當續成詩以記其事軾初自蜀應舉京師道過華清宫夢明皇令賦太真妃裙帶詞覺而記之今書贈何山潘大臨邠老云百疊漪漪水皺六銖縱縱雲輕植立含風廣殿微聞環佩搖聲元豐五年十月七日元豐八年正月旦日子由夢李士寧草草為具夢中贈一絶句云先生惠然肯見客旋買雞豚旋烹炙人間飲酒未須嫌歸去蓬萊卻無喫明年閏二月六日為豫道之書以遺過子明日兄之生日昨夜夢與弟同自眉入京行利州峽路見二僧其一僧鬚髮皆深青與同行問其向去災福答云向去甚好無災問其京師所需要好硃砂五六錢又手擎一小卯塔云中有舍利兄接得卯塔自開其中舍利燦然如花兄與弟請吞之僧遂分為三分僧先吞兄弟繼吞之各一兩細大不等皆明瑩而白亦有飛迸空中者僧言本欲起塔却喫了弟云吾三人肩上各置一小塔便了兄言吾等三人便是三所無縫塔僧笑遂覺覺後胸中噎噎然微似含物夢中甚明故閒報為笑耳書遺子由元豐六年十二月二十七日天欲明夢數吏人持紙一幅其上題云請祭春牛文豫取筆疾書其上云三陽既至庶草將興爰出土牛以戒農事衣被丹青之好本出泥塗成毁須臾之間誰為喜愠吏微笑曰此兩句復當有怒者旁一吏云不妨此是喚醒他元祐六年十一月十九日五更夢數人論左傳云祈招之詩固善諷然未見所以感切穆王之心已其車轍馬迹之意者有答者曰以民力從王事當如飲酒適於飢飽之度而已若過於醉飽則民不堪命王不獲沒矣覺而念其言似有理故録之軾倅武林日夢神宗召入禁中宫女圍侍一紅衣女童捧紅靴一隻命軾銘之覺而記其一聯云寒女之絲銖積寸纍天步所臨雲蒸雷起既畢進御上極歎其敏使宫女送出睇視裙帶間有六言詩一首云百疊漪漪風皺六銖縱縱雲輕植立含風廣殿微聞環珮搖聲豫嘗夢客有携詩相過者覺而記其一詩云道惡賊其身忠先愛厥親誰知畏九折亦自是忠臣文有數句若銘贊者云道之所以成不害其耕德之所以修不賊其牛豫在黃州夢至西湖上夢中亦知其為夢也湖上有大殿三重其東一殿題其額云彌勒下生夢中云是僕昔年所書衆僧往來行道大半相識辨才海月皆在相見驚異僕散衫䇿杖謝諸人曰夢中來遊不及冠帶既覺忘之明日得芝上人信乃復理前夢因書以寄之宣德郎廣陵郡王完大小學教授眉山任伯雨德公喪其母吕夫人六十四日號踊稍間欲從事於佛或勸誦金光明經具言世所傳本多誤惟咸平六年刋行者最為善本又備載張居道再生事德公欲訪此本而不可得方苫卧柩前而外甥進士師續假寐於側忽驚覺曰吾夢至相國寺東門有鬻薑者云有此經夢中問曰非咸平六年本乎曰然有居道傳乎曰然此大非夢也德公大驚即使續以夢求之而獲覩鬻薑者之狀則夢中所見也德公舟行扶柩歸葬於蜀余方貶嶺外遇弔德公楚泗間乃為之記昨日夢有人告我云如真饗佛壽識妄喫天厨豫甚領其意或曰真即饗佛壽不妄喫天厨豫曰真即是佛不妄即是天何但饗而喫之乎其人甚可豫言元祐八年八月十一日將朝尚早假寐夢歸榖行宅遍歷蔬圃中己而坐於南軒見莊客數人方運土塞小池土中得兩蘆蔔根客喜食之豫取筆作一篇文有數句云坐於南軒對修竹數百野鳥數千既覺惘然思之南軒先君名之曰來風者也有二措大相與言志一云我平生不足惟飯與睡耳他日得志當飽喫飯了便睡睡了又喫飯一云我則異於是當喫了又喫何暇復睡耶吾來廬山聞馬道士嗜睡於睡中得妙然吾觀之終不如彼措大得喫飯三昧也南嶽李巖老好睡衆人食飽下碁巖老輒就枕閲數局乃一展轉云一本云字下曰我始一局君幾局矣東坡曰巖老常用四腳碁盤只著一色黑子昔與邊韶敵手今被陳摶饒先著時自有輸嬴著了並無一物歐陽公詩云夜凉吹笛千山月路暗迷人百種花碁罷不知人換世酒䦨無奈客思家殆是類也學問頃歲孫莘老識歐陽文忠公嘗乘間以文字問之云無他術惟勤讀書而多為之自工世人患作文字少又懶讀書每一篇出即求過人如此少有至者疵病不必待人指摘多作自能見之此公以其嘗試者告人故尤有味命分退之詩云我生之辰月宿直斗乃知退之磨蝎為身宫而僕乃以磨蝎為命平生多得謗譽殆是同病也馬夢得與僕同歲月生少僕八日是歲生者無富貴人而僕與夢得為窮之冠即吾二人而觀之當推夢得為首吾無求於世矣所須二頃田以足饘粥耳而所至訪問終不可得豈吾道方艱難無適而可耶抑人生自有定分雖一飽亦如功名富貴不可輕得也送别子開將往河北相度河寧以冬至前一日被㫖過節遂行僕以節日來賀且别之留飲數盞頽然竟醉案上有此佳紙故為作草露書數紙遲其北還則又春矣當為我置酒蟹山藥桃杏是時當復從公飲也曇秀來惠州見豫將去豫曰山中見公還必求一物何以與之秀曰鵝城清風鶴嶺明月人人送與只恐他無著處豫曰不如將幾紙字去每人與一紙但向道此是言法華書裏頭有災福紹聖元年十月三日始至惠州寓於嘉祐寺松風亭杖履所及雞犬相識明年遷於合江之行館得江樓豁徹之觀忘幽谷窈窕之趣未見其所休戚嶠南江北何以異也䖍州鶴田處士王原子直不逺千里訪豫于此留七十日而去東坡居士書石塔别東坡豫云經過草草恨不一見石塔塔起立云遮著是磚浮圖耶豫云有縫塔塔云若無縫何以容世間螻蟻豫首肯之元符己卯閏九月瓊本姜君來儋耳日與豫相從庚辰三月乃歸無以贈行書柳子厚飲酒讀書二詩以見别意子歸吾無以遣日獨此二事日相與往還耳二十一日書僕以元豐三年二月一日至黃州時家在南都獨與兒子邁來郡中無一人舊識者時時䇿杖在江上望雲濤渺然亦不知有文甫兄弟在江南也居十餘日有長髯者惠然見過乃文甫之弟子辨留語半日云迫寒食且歸東湖僕送之江上微風細雨葉舟橫江而去僕登夏燠尾髙丘以望之髣佛見舟及武昌步乃還爾後遂相往來及今四周歲相過殆百數遂欲買田而老焉然竟不遂近忽量移臨汝念將復去而後期未可必感物悽然有不勝懷浮屠不三宿桑下者有以也哉七年三月九日東坡全集卷一百一
