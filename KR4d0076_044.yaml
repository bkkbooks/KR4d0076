body:
  text: 東坡全集卷四十四宋蘇軾撰論十一首思治論嘉祐八年作方今天下何病哉其始不立其卒不成惟其不成是以厭之而愈不立也凡人之情一舉而無功則疑再則倦三則去之矣今世之士所以相顧而莫肻為者非其無有忠義慷慨之志也又非其才術謨慮不若人也患在苦其難成而不復立不知其所以不成者罪在於不立也今立而成矣今世有三患而終莫能去其所從起者則五六十年矣自宫室禱祠之役興錢幣茶鹽之法壞加之以師旅而天下常患無財五六十年之間下之所以游談聚議而上之所以變政易令以求豐財者不可勝數矣而財終不可豐自澶淵之役北邊雖求和而終不得其要領其後重之以西羌之變而邊陲不寧二國益驕以戰則不勝以守則不固而天下常患無兵五六十年之間下之所以游談聚議而上之所以變政易令以求强兵者不可勝數矣而兵終不可强自選舉之格嚴而吏拘於法不志於功名考功課吏之法壞而賢者無所勸不肖者無所懼而天下常患無吏五六十年之間下之所以游談聚議而上之所以變政易令以求擇吏者不可勝數矣而吏終不可擇財之不可豐兵之不可强吏之不可擇是豈真不可邪故曰其始不立其卒不成惟其不成是以厭之而愈不立也夫所貴於立者以其規摹先定也古之君子先定其規摹而後從事故其應也有候而其成也有形衆人以為是汗漫不可知而君子以為理之必然如炊之無不熟種之無不生也是故其用力省而成功速昔者子太叔問政於子産子産曰政如農功日夜以思之思其始而圖其終朝夕而行之行無越思如農之有畔子産以為不思而行與凡行而出於思之外者如農之無畔也其始雖勤而終必棄之今夫富人之營宫室也必先料其資財之豐約以制宫室之大小既內決於心然後擇工之良者而用一人焉必告之曰吾將為屋若干度用材幾何役夫幾人幾日而成土石材葦吾於何取之其工之良者必告之曰某所有木某所有石用材役夫若干某日而成主人率以聽焉及期而成既成而不失富則規摹之先定也今治天下則不然百官有司不知上之所欲為也而人各有心好大者欲王好權者欲霸而偷者欲休息文吏之所至則治刑獄而聚斂之臣則以貨財為急民不知其所適從也及其發一政則曰姑試行之而已其濟與否固未可知也前之政未見其利害而後之政復發矣凡今之所謂新政者聽其始之論議豈不甚美而可樂哉然而布出於天下而卒不知其所終何則其規摹不先定也用捨係於好惡而廢興決於衆寡故萬全之利以小不便而廢者有之矣百世之患以小利而不顧者有之矣所用之人無常責而所發之政無成效此猶適千里不齎糧而假丐於塗人治病不知其所當用之藥而百藥皆試以僥幸於一物之中欲三患之去不可得也昔者太公治齊周公治魯至於數十世之後子孫之强弱風俗之好惡皆可得而逆知之何者其所施専一則其勢固有以使之也管仲相桓公自始為政而至於霸其所施設皆有方法及其成功皆知其所以然至今可覆也咎犯之在晉范蠡之在越文公勾踐嘗欲用其民而二臣皆以為未可及其以為可用也則破楚滅吳如寄諸其鄰而取之此無他見之明而䇿之熟也夫今之世亦與明者熟䇿之而已士爭言曰如是而財可豐如是而兵可强如是而吏可擇吾從其可行者而規摹之發之以勇守之以専達之以强日夜以求合於其所規摹之內而無務出於其所規摹之外其人専其政一然而不成者未之有也財之不豐兵之不强吏之不擇此三者存亡之所從出而天下之大事也夫以天下之大事而有一人焉獨擅而兼言之則其所以治此三者之術其得失固未可知也雖不可知而此三者決不可不治者可知也是故不可以無術其術非難知而難聽非難聽而難行非難行而難收孔子曰好謀而成使好謀而不成不如無謀蓋世有好劒者聚天下之良金鑄之三年而成以為吾劒天下莫敵也劒成而狼戾缺折不可用何者是知鑄而不知收也今世之舉事者雖其甚小而欲成之者常不過數人欲壞之者常不可勝數可成之功常難形若不可成之狀常先見上之人方且眩瞀而不自信又何暇及於收哉古之人有犯其至難而圖其至逺者彼獨何術也且非特聖人而已商君之變秦法也攖萬人之怒排舉國之說勢如此其逆也蘇秦之為從也合天下之異以為同聯六姓之踈以為親計如此其迂也淮隂侯請於髙帝求三萬人願以北舉燕趙東擊齊南絶楚之糧道而西㑹於滎陽耿弇亦言於世祖欲先定漁陽取涿郡還收富平而東下齊世祖以為落落難合此皆越人之都邑而謀人國功如此其踈也然而四子者行之若易然出於其口成於其手以為既已許吾君則親挈而還之今吾以自有之天下而行吾所得為之事其事又非有所拂逆於天下之意也非有所待於人而後具也如有財而自用之有子而自教之耳然而政出於天下有出而無成者五六十年於此矣是何也意者知出而不知收歟非不知收意者汗漫而無所收歟故為之說曰先定其規摹而後從事先定者可以謀人不先定者自謀常不給而况於謀人乎且今之世俗則有所可患者士大夫所以信服於朝廷者不篤而皆好議論以務非其上使人眩於是非而不知其所從從之則事舉無可為者不從則其所行者常多故而易敗夫所以多故而易敗者人各持其私意以賊之議論勝於下而幸其無功者衆也富人之謀利也常獲世以為福非也彼富人者信於人素深而服於人素厚所為而莫或害之所欲而莫或非之事未成而衆已先成之矣夫事之行也有勢其成也有氣富人者乘其勢而襲其氣也欲事之易成則先治其所以信服天下者天下之士不可以力勝力不可勝則莫若從衆從衆者非從衆多之口而從其所不言而同然者是真從衆也衆多之口非果衆也特聞於吾耳而接於吾前未有非其私說者也於吾為衆於天下為寡彼衆之所不言而同然者衆多之口舉不樂也以衆多之口所不樂而棄衆之所不言而同然則樂者寡而不樂者衆矣古之人常以從衆得天下之心而世之君子常以從衆失之不知夫古之人其所從者非從其口而從其所同然也何以明之世之所謂逆衆斂怨而不可行者莫若減任子然不顧而行之者五六年矣而天下未嘗有一言何則彼其口之所不樂而心之所同然也從其所同然而行之若猶有言者則可以勿恤矣故為之說曰發之以勇守之以専達之以强苟知此三者非獨為吾國而已雖北取契丹可也正統論三首至和二年作總論一正統者何邪名邪實邪正統之說曰正者所以正天下之不正也統者所以合天下之不一也不幸有天子之實而無其位有天子之名而無其德是二人者立於天下天下何正何一而正統之論決矣正統之為言猶曰有天下云爾人之得此名而又有此實也夫何議天下固有無其實而得其名者聖人於此不得已焉而不以實傷名而名卒不能傷實故名輕而實重不以實傷名故天下不爭名輕而實重故天下趨於實天下有不肖而曰吾賢者矣未有賤而曰吾貴者也天下之爭自賢不肖始聖人憂焉不敢以亂貴賤故天下知賢之不能奪貴天下之貴者聖人莫不貴之恃有賢不肖存焉輕以與人貴而重以與人賢天下然後知貴之不如賢知賢之不能奪貴故不爭知貴之不如賢故趨於實使天下不爭而趨於實是亦足矣正統者名之所在焉而已名之所在而不能有益乎其人而後名輕名輕而後實重吾欲重天下之實於是乎名輕正統聽其自得者十曰堯舜夏商周秦漢晉隋唐豫其可得者六以存教曰魏梁後唐晉漢周使夫堯舜三代之所以為賢於後世之君者皆不在乎正統故後世之君不以其道而得者亦無以為堯舜三代之比於是乎實重辨論二正統之論起於歐陽子而霸統之說起於章子二子之論吾與歐陽子故不得不與章子辨以全歐陽子歐陽子之說全而吾之說又因以明章子之說曰進晉梁失而未善也進魏非也是章子未知夫名實之所在也夫所謂正統者猶曰有天下云爾名耳正統者果名也又焉實之知視天下之所同君而加之又焉知其他章子以為魏不能一天下不當與之統夫魏雖不能一天下而天下亦無有如魏之强者吳雖存非兩立之勢奈何不與之統章子之不絶五代也亦徒以為天下無有與之敵者而已今也絶魏魏安得無辭哉正統者惡夫天下之無君而作也故天下雖不合於一而未至乎兩立者則君子不忍絶之於無君且夫德同而力均不臣焉可也今以天下不幸而不合於一德既無以相過而弱者又不肻臣乎强於是焉而不與之統亦見其重天下之不幸而助夫不臣者也章子曰鄉人且恥與盜者偶聖人豈得與篡君同名哉吾將曰是鄉人與是為盜者民則皆民也士則皆士也大夫則皆大夫也則亦與之皆坐乎苟其勢不得不與之皆坐則鄉人何恥邪聖人得天下篡君亦得天下顧其勢不得不與之同名聖人何恥邪吾將以聖人恥夫篡君而篡君又焉能恥聖人哉章子曰君子大居正而以不正人居之是正不正之相去未能相逺也且章子之所謂正者何也以一身之正為正邪以天下有君為正邪一身之正是天下之私正也天下有君是天下之公正也吾無取乎私正也天下無君篡君出而制天下湯武既沒吾安所取正哉故篡君者亦當時之正而已章子曰祖與孫雖百歲而子五十則子不得為壽漢與晉雖得天下而魏不能一則魏不得為有統吾將曰其兄四十而死則其弟五十為壽弟為壽乎其兄魏為有統乎當時而已章子比之婦謂舅嬖妾為姑吾將曰舅則以為妻而婦獨奈何不以為姑乎以妾為妻者舅之過也婦謂之姑蓋非婦罪也舉天下而受之魏晉是亦漢魏之過而已矣與之統者獨何罪乎雖然歐陽子之論猶有異乎吾說者歐陽子之所與者吾之所與也歐陽子之所以與之非吾所以與之也歐陽子重與之而吾輕與之且其言曰秦漢而下正統屢絶而得之者少以其得之者少故其為名甚尊而重也嗚呼吾不善夫少也幸而得之者少故有以尊重其名不幸而皆得歐陽子其敢有所不與邪且其重之則其施於篡君也誠若過然故章子有以啓其說夫以文王而終身不得以魏晉梁而得之果其為重也則文王將有愧於魏晉梁焉必也使夫正統者不得為聖人之盛節則得之為無益得之為無益故雖舉而加之篡君而不為過使夫文王之所不得而魏晉梁之所得者皆吾之所輕者也然後魏晉梁無以愧文王而文王亦無所愧於魏晉梁焉辨論三始終得其正天下合於一是二者必以其道得之邪亦或不以其道得之邪病乎或者之不以其道得之也於是乎舉而歸之名歐陽子曰皆正統是以名言者也章子曰正統又曰霸統是以實言者也歐陽子以名言而純乎名章子以實言而不盡乎實章子之意以霸統重其實而不知實之輕自霸統始使天下之名皆不得過乎實者固章子意也天下之名果不過乎實也則吾以章子為過乎聖人聖人不得已則不能以實傷名而章子則能之且吾豈不知居得其正之為正如魏受之於漢晉受之於魏不如至公大義之為正也哉蓋亦有不得已焉耳如章子之說吾將求其備堯舜以德三代以德與功漢唐以功秦隋後唐晉漢周以力晉梁以弒不言魏者因章子之說而與之辨以實言之則德與功不如德功不如德與功力不如功弒不如力是堯舜而下得統者凡更四不如而後至於晉梁焉而章子以為天下之實盡於其正統霸統之間矣歐陽子純乎名故不知實之所止章子雜乎實故雖晉梁弒君之罪天下所不容之惡而其實反不過乎霸彼其初得正統之虛名而不測其實罪之所至也章子則告之曰爾霸者也夫以弒君得天下而不失為霸則章子之說固便乎篡者也夫章子豈曰弒君者其實止乎霸也哉蓋已舉其實而著之名雖欲復加之罪而不可得也夫王者沒而霸者有功於天下吾以為在漢唐為宜必不得已而秦隋後唐晉漢周得之吾猶有憾焉奈何其舉而加之弒君之人乎嗚呼吾不惜乎名而惜乎實也霸之於王也猶兄之於父也聞天下之父嘗有曰堯者而曰必堯而後父少不若堯而降為兄則瞽鯀懼至僕妾焉天下將有降父而至於僕妾者無怪也從章子之說者其弊固至乎此也故曰莫若純乎名純乎名故晉梁之得天下其名曰正統而其弒君之實惟天下後世之所加而吾不為之齊量焉於是乎晉梁之惡不勝誅於天下實於此反不重乎章子曰堯舜曰帝三代曰王夏曰氏商周曰人古之人輕重其君有是也以為其霸統之說夫執聖人之一端以藉其口夫何說而不可吾亦將曰孔子刪書而虞夏商周皆曰書湯武王伯禽秦穆公皆曰誓以為吾皆曰正統之說其誰曰不可聖人之於實也不傷其名而後從之帝亦天子也王亦天子也氏亦人也人亦氏也夫何名之傷若章子之所謂霸統也傷乎名而喪乎實者也大臣論上以義正君而無害於國可謂大臣矣天下不幸而無明君使小人執其權當此之時天下之忠臣義士莫不欲奮臂而擊之夫小人者必先得於其君而自固於天下是故法不可擊擊之而不勝身死其禍止於一身擊之而勝君臣不相安天下必亡是以春秋之法不待君命而誅其側之惡人謂之叛晉趙鞅入于晉陽以叛是也世之君子將有志於天下欲扶其衰而救其危者必先計其後而為可居之功其濟不濟則命也是故成功而天下安之今夫小人君不誅而吾誅之則是侵君之權而不可居之功也夫既以侵君之權而能北面就人臣之位使君不吾疑者天下未嘗有也國之有小人猶人之有癭人之癭必生於頸而附於咽是以不可去有賤丈夫者不勝其忿而決去之夫是以去疾而得死漢之亡唐之滅由此之故也自桓靈之後至於獻帝天下之權歸於內豎賢人君子進不容於朝退不容於野天下之怒可謂極矣當此之時議者以為天下之患獨在宦官宦官去則天下無事然竇武何進之徒擊之不勝止於身死袁紹擊之而勝漢遂以亡唐之衰也其迹亦大類此自輔國元振之後天子之廢立聽於宦官當此之時士大夫之論亦惟宦官之為去也然而李訓鄭注元載之徒擊之不勝止於身死至於崔昌遐擊之而勝唐亦以亡方其未去也是纍然者癭而已矣及其既去則潰裂四出而繼之以死何者此侵君之權而不可居之功也且為人臣而不顧其君捐其身於一決以快天下之望亦已危矣故其成則為袁為崔敗則為何竇為訓注然則忠臣義士亦奚取於此哉夫竇武何進之亡天下悲之以為不幸然亦幸而不成使其成也二子者將何以居之故曰以義正君而無害於國可謂大臣矣大臣論下天下之權在於小人君子之欲擊之也不亡其身則亡其君然則是小人者終不可去乎聞之曰迫人者其智淺迫於人者其智深非才有不同所居之勢然也古之為兵者圍師勿遏窮寇勿追誠恐其知死而致力則雖有衆無所用之故曰同舟而遇風則胡越可使相救如左右手小人之心自知其負天下之怨而君子之莫吾赦也則將日夜為計以備一旦卒然不可測之患今君子又從而疾惡之是以其謀不得不深其交不得不合交合而謀深則其致毒也忿戾而不可解故凡天下之患起於小人而成於君子之速之也小人在內君子在外君子為客小人為主主未發而客先焉則小人之詞直而君子之勢近於不順直則可以欺衆而不順則難以令其下故昔之舉事者常以中道而衆散以至於敗則其理豈不甚明哉若夫智者則不然內以自固其君子之交而厚集其勢外以陽浮而不逆於小人之意以待其間寬之使不吾疾狃之使不吾慮啖之以利以昏其智順適其意以殺其怒然後待其發而乘其隙推其墜而挽其絶故其用力也約而無後患莫敢為之先故君不怒而勢不逼如此者功成而天下安之今夫小人急之則合寬之則散是從古以然也見利不能不爭見患不能不避無信不能不相詐無禮不能不相瀆是故其交易間其黨易破也而君子不務寬之以待其變而急之以合其交亦已過矣君子小人雜居而未決為君子之計者莫若深交而無為苟不能深交而無為則小人倒持其柄而乘吾隙昔漢髙之亡以天下屬平勃及髙后臨朝擅王諸吕廢黜劉氏平日縱酒無一言及用陸賈計以千金交歡絳侯卒以此誅諸吕定劉氏使此二人者而不相能則是將相相攻之不暇而何暇及於劉吕之存亡哉故其說曰將相和調則士豫附士豫附則天下雖有變而權不分嗚呼知此其足以為大臣矣夫續歐陽子朋黨論歐陽子曰小人欲空人之國必進朋黨之說嗚呼國之將亡此其徵歟禍莫大於權之移人而君莫危於國之有黨有黨則必爭爭則小人者必勝而權之所歸也君安得不危哉何以言之君子以道事君人主必敬之而踈小人唯豫言而莫豫違人主必狎之而親踈者易間而親者難暌也而君子不得志則奉身而退樂道不仕小人者不得志則徼幸復用唯怨之報此其所以必勝也蓋嘗論之君子如嘉禾也封殖之甚難而去之甚易小人如惡草也不種而生去之復蕃世未有小人不除而治者也然去之為最難斥其一則援之者衆盡其類則衆之致怨也深小者復用而肆威大者得志而竊國善人為之掃地世主為之屏息譬斷蛇不死刺虎不斃其傷人則愈多矣齊田氏魯季孫是已齊魯之執事莫非田季之黨也歷數君不忘其誅而卒之簡公弒昭哀失國小人之黨其不可除也如此而漢黨錮之獄唐白馬之禍忠義之士斥死無餘君子之黨其易盡也如此使世主知易盡者之可戒而不可除者之可懼則有瘳矣且夫君子者世無若是之多也小人者亦無若是之衆也凡才智之士鋭於功名而嗜於進取者隨所用耳孔子曰仁者安仁智者利仁未必皆君子也冉有從夫子則為門人之選從季氏則為聚斂之臣唐柳宗元劉禹錫使不陷叔文之黨其髙才絶學亦足以為唐名臣矣昔欒懷子得罪於晉其黨皆出奔樂王鮒謂范宣子曰盍反州綽邢蒯勇士也宣子曰彼欒氏之勇也余何獲焉王鮒曰子為彼欒氏乃子之勇也嗚呼宣子蚤從王鮒之言豈獨獲二子之勇且安有曲沃之變哉愚以謂治道去太甚耳苟黜其首惡而貸其餘使才者不失富貴不才者無所致憾將為吾用之不暇又何怨之報乎人之所以為盜者衣食不足耳農夫市人焉保其不為盜而衣食既足盜豈有不能返農夫市人也哉故善除盜者開其衣食之門使復其業善除小人者誘以富貴之道使隳其黨以力取威勝者蓋未嘗不反為所噬也曹參之治齊曰慎無擾獄市獄市姦人之所容也知此亦庶幾於善治矣姦固不可長而亦不可不容也若姦無所容君子豈久安之道哉牛李之黨遍天下而李德裕以一夫之力欲窮其類而致之必死此其所以不旋踵罹仇人之禍也姦臣復熾忠義益衰以力取威勝者果不可耶愚是以續歐陽子之說而為君子小人之戒屈到嗜芰論屈到嗜芰有疾召其宗老而屬之曰祭我必以芰及祥宗老將薦芰屈建命去之君子曰不違而道唐柳宗元非之曰屈子以禮之末忍絶其父將死之言且禮有齊之日思其所樂思其所嗜子木去芰安得為道甚矣柳子之陋也子木楚卿之賢者也夫豈不知為人子之道事死如事生况於將死丁寧之言棄而不用人情之所忍乎是必有大不忍於此者而奪其情也夫死生之際聖人嚴之薨於路寢不死於婦人之手至於結冠纓啓手足之末不敢不勉其於死生之變亦重矣父子平日之言可以恩掩義至於死生至嚴之際豈容以私害公乎曾子有疾稱君子之所貴乎道者三孟僖子卒使其子學禮於仲尼管仲病勸桓公去三豎夫數君子之言或主社稷或勤於道德或訓其子孫雖所趣不同然皆篤於大義不私其躬也如此今赫赫楚國若敖氏之賢聞於諸侯身為正卿死不在民而口腹是憂其為陋亦甚矣使子木行之國人誦之太史書之天下後世不知夫子之賢而唯陋是聞子木其忍為此乎故曰是必有大不忍者而奪其情也然禮之所謂思其所樂思其所嗜此言人子追思之道也曾晳嗜羊棗而曽子不忍食父沒而不能讀父之書母沒而不能執母之器皆人子之情自然也豈待父母之命耶今薦芰之事若出於子則可自其父母則為陋耳豈可以飲食之故而成父莫大之陋乎曾子寢疾曾元難於易簀曾子曰君子之愛人也以德細人之愛人也以姑息若以柳子之言為然是曽元為孝子而曽子顧禮之末易簀於病革之中為不仁之甚也中行偃死視不可含范宣子盟而撫之曰事吳敢不如事主猶視欒懷子曰主苟終所不嗣事於齊者有如河乃瞑嗚呼范宣子知事吳為忠於主而不知報齊以成夫子憂國之美其為忠則大矣古人以愛惡比之美疢藥石曰石猶生我疢之美者其毒滋多由是觀之柳子之愛屈到是疢之美子木之違父命藥石也哉龍虎鉛汞論人之所以生死未有不自坎離者坎離交則生分則死必然之道也離為心坎為腎心之所然未有不正雖桀跖亦然其所以為桀跖者以內輕而外重故常行其所不然者爾腎强而溢則有欲念雖堯顔亦然其所以為堯顔者以內重而外輕故常行其所然者爾由是觀之心之性法而正腎之性淫而邪水火之德固如是也子産曰火烈人望而畏之水弱人狎而玩之達者未有不知此者也龍水汞也精也血也出於腎而肝藏之坎之物也虎火者鉛也氣也力也出於心而肺主之離之物也心動則氣隨之而作腎溢則精血隨之而流如火之之有煙熖未有復反於薪者也世之不學道者其龍常出於水故龍飛而汞輕其虎常出於火故虎走而鉛枯此生人之常理也順此者死逆此者仙故真人之言曰順行則為人逆行則為道又曰五行顛倒術龍從火裏出五行不順行虎向水中生有隱者教余曰人能正坐瞑目調息握固心定息微則徐閉之達磨胎息法亦須閉若如佛經待其自止恐卒不能到也雖無所念而卓然精明毅然剛烈如火之不可犯息極則小通之微則復閉之方其通時亦復一息一息歸之下丹田中也為之推數以多為賢以久為功不過十日則丹田濕而水上行愈久愈溫幾至如烹上行之水蓊然如雲蒸於泥丸蓋離者麗也著物而見火之性也吾目引於色耳引於聲口引於味鼻引於香火輒隨而麗之今吾寂然無所引於外火無所麗則將安往水者其所妃也勢必從之坎者陷也物至則受水之性也而况其配乎水火合則火不炎而水自上則所謂龍從火裏出也龍出於火則龍不飛而汞不乾旬日之外腦滿而腰足輕方閉息時常卷舌而上以䑛懸癕雖不能到而意到焉久則能也如是不已則汞下入口方調息時則潄而烹之須滿口而後咽若未滿且留口中候後次仍以空氣送至丹田常以意養之久則化而為鉛此所謂虎向水中生也此論竒而通妙而簡決為可信者然吾有大患平生發此志願百十回矣皆謬悠無成意此道非捐軀以赴之刳心以受之盡命以守之不能成也吾今年已六十名位破敗兄弟隔絶父子離散身居蠻夷北歸無日區區世味亦可知矣若復謬悠於此真不如人矣故數日來别發誓願譬如古人避難窮山或使絶域齧草啖雪彼何人哉已令造一禪榻兩大案明忩之下日専欲治此并已作乾蒸餅百枚自二月一日為首盡絶人事飢則食此餅不飲湯水不啖他物細嚼以致津液或飲少酒而已午後略睡一更卧三更乃起坐以達旦有日采日有月采月餘時非數息煉隂則行今所論龍虎訣爾如此百日或有所成不讀書不著文且一時束起以待異日不遊山水除見道人外不接客不㑹飲皆無益也深恐易流之性不能終踐此言故先作書以報庶幾他日有慙於弟而不敢變也此事大難不知其果能不慙否此書既以自堅又欲以及弟也卷舌以砥懸癕近得此法初甚祕惜云此禪家所得向上一路千金不傳人之所見如此雖可笑然極有驗也但行之數日間舌下筋微急痛當以漸馴致若舌尖果能及懸癕則致華池之水莫捷於此也又言此法名洪爐上一㸃雪宜且祕之上張安道養生訣論近來頗留意養生讀書延納方士多矣其法數百擇其簡而易行者間或為之輒驗今此法特竒妙乃知神仙長生不死非虛語也其效初亦不甚覺但積纍百餘日功用不可量比之服藥其力百倍久欲獻之左右其妙處非言語文字所能形容然可道其大略若信而行之必有大益其狀如左每夜以子後三更三四㸃至五更以來披衣起只牀上擁被坐亦可面東若南盤足叩齒三十六通握固以兩拇指握第三或第四指握拇指兩手拄腰腹間閉息閉息最是道家要妙處先須閉息却慮掃滅座相使心澄湛諸念不起自覺出入息調勻即閉定口鼻也內觀五臟肺白肝青脾黃心赤腎黑常求五臟圖挂壁上使心中熟識五臟六腑之形狀次想心為炎火光明洞徹下入丹田中待腹滿氣極即徐出氣不得令耳聞惟出入均調即以舌接脣齒內外漱鍊精液若有鼻液亦須漱使不嫌其鹹煉久自然甘美此是真氣不可棄之也未得咽復前法閉息內觀納心丹田調息漱津皆依前法如此者三津液滿口即低頭咽下以氣送入丹田須用意精猛令津與氣谷谷然有聲徑入丹田又依前法為之凡九閉息三咽津而止然後以左右手熱摩兩腳心此湧泉穴上徹頂門氣訣之妙及臍下腰脊間皆令熱徹徐徐摩之使微汗出不妨不可喘促爾次以兩手摩尉眼面耳項皆令極熱仍案捉鼻梁左右五七下梳頭百餘梳而卧熟寢至明右其法至簡易在常久不廢而有深功且試行一二十日精神自已不同覺臍下實熱腰腳輕快久而不已去仙不逺但當習閉息使漸能持久以脉候之五至為一息近來閉得漸久每閉百二十至而開蓋已閉得二十餘息也又不可强閉多時使氣錯亂或奔突而出反為之害慎之慎之又須常節晚食令腹中寬虛氣得回轉晝日無事亦時時閉目內觀潄鍊津液咽之摩尉耳目以助真氣蓋清淨専一即易見功矣神仙至術有不可學者一忿躁二隂險三貪欲公雅量清德無此三疾竊謂可學故獻其區區篤信力行他日相見復陳其妙者文章書口訣多枝辭隱語卒不見下手徑路今且直指精要可謂至言不煩長生之根本也幸深加寶祕勿使庸妄窺之以泄至道也續養生論鄭子産曰火烈人望而畏之水弱人狎而玩之翼奉論六情十二律其論水火也曰北方之情好也好行貪狠南方之情惡也惡行亷貞亷貞故為君子貪狠故為小人豫參二人之學而為之說曰火烈而水弱烈生正弱生邪火為心水為腎故五藏之性心正而腎邪腎無不邪者雖上智之腎亦邪然上智常不淫者心之官正而腎聽命也心無不正者雖下愚之心亦正然下愚常淫者心不官而腎為政也知此則知鉛汞龍虎之說矣何謂鉛凡氣之謂鉛或趨或蹶或呼或吸或執或擊凡動者皆鉛也肺實出納之肺為金為白虎故曰鉛又曰虎何謂汞凡水之謂汞唾涕濃血精汗便利凡濕者皆汞也肝實宿藏之肝為木為青龍故曰汞又曰龍古之真人論內丹者曰五行顛倒術龍從火裏出五行不順行虎向水中生世未有知其說者也方五行之順行也則龍出於水虎出於火皆死之道也心不官而腎為政聲色外誘邪淫內發壬癸之英下流為人或為腐壞是汞龍之出於水者也喜怒哀樂皆出於心者也喜則攫拏隨之怒則毆擊隨之哀則劈踊隨之樂則抃舞隨之心動於內而氣應於外是鉛虎之出於火者也汞龍之出於水鉛虎之出於火有能出而復返者乎故曰皆死之道也真人教之以逆行曰龍當使從火出虎當使從水生也其說若何孔子曰思無邪凡有思皆邪也而無思則土木也孰能使有思而非邪無思而非土木乎蓋必有無思之思焉夫無思之思端正莊栗如臨君師未嘗一念放逸然卒無所思如龜毛兔角非作故無本性無故是之謂戒戒生定定則出入息自住出入息住則心火不復炎上火在易為離離麗也必有所麗未嘗獨立而水其妃也既不炎上則從其妃矣水火合則壬癸之英上流於腦而益於𤣥膺若鼻液而不鹹非腎出故也此汞龍之自火出者也長生之藥內丹之萌無過此者矣隂陽之始交天一為水凡人之始造形皆水也故五行一曰水得暖氣而後生故二曰火生而後有骨故三曰木故生而日堅凡物之堅壯者皆金氣也故四曰金骨堅而後肉生焉土為肉故五曰土人之在母也母呼亦呼母吸亦吸口鼻皆閉而以臍達故臍者生之根也汞龍之出於火流於腦溢於𤣥膺必歸於根心火不炎上必從其妃是火常在根也故壬癸之英得火而日堅達於四支浹於肌膚而日壯究其極則金剛之體也此鉛虎之自水生者也龍虎生而內丹成矣故曰順行則為人逆行則為道道則未也亦可謂長生不死之術矣東坡全集卷四十四
