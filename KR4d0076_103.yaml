body:
  text: 東坡全集卷一百三宋蘇軾撰志林四十二條異事芝上人言近有節度判官朱炎學禪久之忽於楞嚴經若有所得者問講僧義江曰此身死後此心何住江云此身未死此心何住炎良久以偈答曰四大不須先後覺六根還向用時空難將語默呈師也只在尋常語默中師可之炎後竟坐化真廟時人也契嵩禪師常瞋人未嘗見其笑海月慧辨師常喜人未嘗見其怒豫在錢塘親見二人皆趺坐而化嵩既茶毗火不能壞益薪熾火有終不壞者五海月比葬面如生且微笑乃知二人以瞋喜作佛事也世人視身如金玉不旋踵為糞土至人反是豫以是知一切法以愛故壞以捨故常在豈不然哉豫遷嶺南始識南華重辨長老語終日知其有道也豫自嶺南還則辨己寂久矣過南華弔其衆問塔墓所在衆曰我師昔作夀塔南華之東數里有不悅師者葬之别墓既七百餘日矣今長老朗公獨奮不顧發而歸之壽塔改棺易衣舉體如生衣皆鮮芳衆乃大服東坡居士曰辨視身為何物棄之尸陀林以飼烏鳶何有安以壽塔為朗公知辨者特欲以化服同異而已乃以茗果奠其塔而書其事以遺其上足南華塔主可興師時元符三年十一月十九日富彥國在青社河北大饑民爭歸之有夫婦襁負一子未幾迫於饑困不能皆全棄之道左空冢中而去歲定歸鄉過此冢欲收其骨則兒尚活肥健愈於未棄時見父母匍匐來就視冢中空無有惟有一竅滑易如蛇鼠出入有大蟾蜍如車輪氣咻咻然出穴中意兒在冢中常呼吸此氣故能不食而健自爾遂不食年六七歲肌膚如玉其父抱兒來京師以示小兒醫張荆筐張曰物之有氣者能蟄燕蛇蝦之類是也能蟄則能不食不食則壽此千歲蝦蟆也決不當與藥若聽其不食不娶長必得道父喜携去今不知所在張與余言蓋嘉祐六年也石普好殺人以殺為娛未嘗知暫悔也醉中縛一奴使其指使投之汴河指使哀而縱之既醒而悔指使畏其暴不敢以實告居久之普病見奴為祟自以必死指使呼奴示之祟不復出普亦愈今年三月有書吏陳昱者暴死三日而蘇云初見壁有孔有人自孔擲一物至地化為人乃其亡姊也携其手自孔中出曰冥吏追汝使我先見吏在旁昏黑如夜極望有明處空有橋榜曰㑹明人皆用泥錢橋極髙有行橋上者姊曰此生天也昱行橋下然猶有在橋下者或為鳥鵲所啄姊曰此網捕者也又見一橋曰陽明人皆用紙錢有吏坐曹十餘人以狀及紙久至者吏輒刻除之如抽貫然已而見冥官則陳襄述古也問昱何故殺乳母昱曰無之呼乳母至血被面抱嬰兒熟視昱曰非此人也乃門下吏陳周官遂放昱還曰路逺當給竹馬又使諸曹檢已籍曹示之年六十九官左班殿直曰以平生不燒香故不甚壽又曰吾輩更此一報即不同矣意謂當超之昱還道見追陳周往既蘇周果死有道士講經茅山聽者數百人中講有自外入者長大肥黑大罵曰道士奴天正熱聚衆造妖何為道士起謝曰居山養徒資用乏不得不爾罵者怒少解曰須錢不難何至作此乃取釜竈杵臼之類得百餘斤以少藥鍛之皆為銀乃去後數年道士復見此人從一老道士鬚髮如雪騎白驢此人腰插一驢鞭從其後道士遙望叩頭欲從之此人指老道士且搖手作驚畏狀去如飛少頃即不見眉州青神縣道側有一小佛屋俗謂之猪母佛云百年前有牝猪伏於此化為泉有二鯉魚在泉中云蓋猪龍也蜀人謂牝猪為母而立佛堂其上故以名之泉出石上深不及二尺大旱不竭而二鯉莫有見者余一日偶見之以告妻兄王願願深疑意余之誕也余亦不平其見疑因與願禱於泉上曰余若不誕者魚當復見已而二鯉復出願大驚再拜謝罪而去此地應為靈異青神文及者以父病求醫夜過其側有髽而負琴者邀至室及辭以父病不可留而其人苦留之欲曉乃遣去行未數里見道旁有劫賊所殺人赫然未冷也否則及亦未免耳泉在石佛鎮南五里許青神二十五里黃州岐亭有王翊者家富而好善夢於水邊見一人為人所歐傷幾死見翊而號翊救之得免明日偶至水邊見一鹿為獵人所得己中幾鎗翊發悟以數千贖之鹿隨翊起居未嘗一步捨翊又翊所居後有茂林果木一日有村婦林中見一桃過熟而絶大獨在木杪乃取而食之翊適見大驚婦人食已棄其核翊取而剖之得雄黃一塊如桃仁及見而吞之甚甘美自是斷薰肉齊居一食不復殺生亦可謂異事也翊一作詡東海徐則隱居天台絶粒養性太極真人徐君降之曰汝年出八十當為王者師然後得道晋王廣聞其名往召之則謂門人曰吾年八十來召我徐君之言信矣遂詣揚州王請受道法辭以時日不利後數日而死支體如生道路皆見其徒步歸云得放還山至舊居取經書分遺弟子乃去既而喪至以為徐生髙世之人義不為煬帝所汚故辭不肯傳其道而死徐君之言豈聊以避禍豈所謂危行言遜者耶不然煬帝之行鬼所唾也而太極真人肯置之齒牙哉昔吾先君夫人僦宅於眉為紗縠行一日二婢子懸帛足陷於地視之深數尺有大甕覆以烏木板先夫人急命以土塞之甕有物如人咳聲凡一年乃已人以為此有宿藏物欲出也夫人之姪之問者聞之欲發焉㑹吾遷居之問遂僦此宅掘丈餘不見甕所在其後某官於岐下所居大柳下雪方尺不積雪晴地墳起數寸軾疑是古人藏丹藥處欲發之亡妻崇德君曰使吾先姑在必不發也軾愧而止吾昔為扶風從事歲大旱問父老境內可禱者云太白山至靈自昔有禱無不應近歲向傳師少師為守奏封山神為濟民侯自此禱不驗亦莫測其故吾方思之偶取唐㑹要看云天寶十四年方士上言太白山金星洞有寶符靈藥遣使取之而獲詔封山為靈應公吾然後知神之所以不悅者即告太守遣使禱之若應當奏乞復公爵且以瓶取水歸郡水未至風霧相纒旗幡飛舞髣佛若有所見遂大雨三日歲大熟吾作奏檢具言其狀詔封明應公吾復為文記之且修其廟祀之日有白鼠長尺餘歷酒饌上嗅而不食父老云龍也是歲嘉祐七年李方叔言范蜀公將薨數日鬚髮皆變蒼郁然如畫也公平生虛心養氣數盡神往而血氣不衰故發於外耶然范氏多四乳固與人異公又立德如此其化也必不與萬物同盡蓋有不可知者也元符四年四月五日黃州故縣張憨子行止如狂人見人輒罵云放火賊稍知書見紙輒書鄭谷雪詩人使力作終日不辭時從人乞豫之錢不受冬夏一布褐三十年不易然近之不覺有垢穢氣其實如此至於土人所言則其甚異者固不可知也豫頃在都下有傳太白詩者其略曰朝披夢澤雲又云笠澤清茫茫此非世人語也蓋有見太白在肆中而得此詩者神仙之道真不可以意度紹聖元年九月過廣州訪崇道大師何德順有神仙降於其室自言女仙也賦詩立成有超逸絶塵語或以其託於箕帚如世所謂紫姑神者疑之然味其言非紫姑所能至人有入獄鬼羣鳥獸者託於箕帚豈足怪哉崇道好事喜客多與賢士大夫為游其必有以致之也哉眉州人任逹為余言少時見人家蓄數百魚深池中沿池磚甃四周皆屋舍環繞方丈間凡三十餘年日加長一日天清無雷池中忽發大聲如風雨魚皆踊起羊角而上不知所往逹云舊說不以神守則為蛟龍所取此殆是爾余以為蛟龍必因風雨疑此魚圈局三十餘年日有騰拔之念精神不衰久而自逹理自然爾眉之彭山進士有宋籌者與故參知政事孫抃夢得同赴舉至華隂大雪天未明過華山下有牌堠云毛女峰者見一老姥坐堠下鬢如雪而無寒色時道上未有行者不知其所從來雪中亦無足跡孫與宋相去數百步宋相過之亦怪其異而莫之顧孫獨留連與語有數百錢挂鞍盡與之既追及宋道其事宋悔復還求之已無所見是歲孫第三人及第而宋老死無成此事蜀人多知之者子由言有一人死而復生問冥官如何修身可以免罪答曰子冝置一卷厯晝日之所為暮夜必記之但不記者是不可言不可作也無事靜坐便覺一日似兩日若能處置此生常似今日得至七十便是百四十歲人世間何藥可能有此效既無反惡又省藥錢此方人人收得但苦無好湯水多咽不下朝無咎言司馬溫公有言吾無過人者但平生所為未嘗有不可對人言者耳豫亦記前輩有詩曰怕人知事莫萌心皆至言可終身守之技術近世醫官仇鼎療癰腫為當時第一鼎死未有繼者今張君宜所能殆不減鼎然鼎性行不甚純淑世或畏之今張君用心和平專以救人為事治過於鼎逺矣元豐七年四月七日男子之生也覆女之生也仰其死於水也亦然男子內陽而外隂女子反是故易曰坤至柔而動也剛書曰沈潛剛克世之逹者蓋如此也秦醫和曰天有六氣淫為六疾陽淫熱疾隂淫寒疾風淫末疾雨淫腹疾晦淫惑疾明淫心疾夫女陽物而晦時故淫則為內熱蠱惑之疾女為蠱惑世之知者衆其為陽物而內熱雖良醫未之言也五勞七傷皆熱中而蒸晦淫者不為蠱則中風皆熱之所生也醫和之語吾當表而出之讀左氏書此歐陽文忠公嘗言有患疾者醫問其得疾之由曰乘船遇風驚而得之醫取多年柂牙為柂工手汗所漬處刮末雜丹砂伏神之流飲之而愈今本草注别藥性論云止汗用麻黃根節及故竹扇為末服之文忠因言醫以意用藥多此比初以兒戲然或有驗殆未易致詰也豫因謂公以筆墨燒灰飲學者當治昏惰耶推此而廣之則飲伯夷之盟水可以療貪食比干之餕餘可以已佞䑛樊噲之盾可以治怯臭西子之珥可以療惡疾矣公遂大笑元祐三年閏八月十七日舟行入潁州界坐念二十年前見文忠公於此偶記一時談笑之語聊復識之龎安常為醫不志於利得善書古畫喜輒不自勝九江胡道士頗得其術與豫用藥無以酬之為作行草數紙而已且告之曰此安常故事不可廢也參寥子病求醫於胡自度無錢且不善書畫求豫甚急豫戲之曰子粲可皎徹之徒何不下轉語作兩首詩乎龎胡二君與吾輩遊不日索我於枯魚之肆矣王斿元龍言錢子飛有治大風方極驗常以施人一日夢人自云天使已以此病人君違天怒若施不已君當得此病藥不能愈子飛懼遂不施僕以為天之所病不可療耶則藥不應服有效藥有效者則是天不能病當是病之祟畏是藥而假天以禁人耳晉侯之病為二豎子李子豫赤丸亦先見於夢蓋有或使之者子飛不察為鬼所脅若余則不然苟病者得愈願代受其苦家有一方能下腹中穢惡在黃州試之病良已今後當常以施人自省事以來聞世所謂道人有延年之術者如趙抱一徐登張元夢皆近百歲然竟死與常人無異及來黃州聞浮光有朱元經尤異公卿尊師之者甚衆然卒亦病死時中風搐搦但實能黃白有餘藥金皆入官不知世果無異人耶抑有而人不見此等舉非耶不知古所記人虛實無乃與此等不大相逺而好事者緣飾之耶蜀人單驤者舉進士不第顧以醫聞其術雖本於難經素問而别出新意往往巧發竒中然未能十全也仁宗皇帝不豫詔孫兆與驤入侍有間賞賚不資已而大漸二子皆坐誅賴皇太后仁聖察其非罪坐廢數年今驤為朝官而兆已死矣豫來黃州鄰邑人龎安常者亦以醫聞其術大類驤而加之以針術絶妙然患聾自不能愈而愈人之病如神此古人所以過人也元豐五年三月豫偶患左手腫安常一針而愈聊為記之歐陽文忠公嘗語少時有僧相我耳白於面名滿天下唇不著齒無事得謗其言頗驗耳白於面則衆所共見唇不著齒余亦不敢問公不知其何故也沖妙先生季君思聰所製觀妙法象居士以憂患之餘稽首洗心歸命真寂自惟塵緣深重恐此志未遂敢以籖卜得吳真君第三籖云平生常無患見善其何樂執心既堅固見善勤修學敬再拜受教書莊子養生一篇致自厲之意不敢廢墜真聖驗之紹聖元年八月二十一日東坡居士南遷過䖍與王巖翁同謁祥符宫拜九天使者堂下觀之妙象實同此言東坡居士遷於海南憂患之餘戊寅九月晦遊天慶觀謁北極真聖探靈簽以決餘生之禍福吉凶其辭曰道以信為合法以智為先二者不離析壽命乃得延覽之竦然若有所得書而藏之以無忘信道法智二者不相離之意軾恭書古之真人未有不以信入者子思則曰自誠明謂之性此之謂也孟子曰執中無權猶執一也法而不智則天下之死法也道不患不知患不凝法不患不立患不活以信合道則道凝以智先法則法活道凝而法活雖度世可也況延夀乎戊寅十月五日以久不得子由書憂不去心以周易筮之遇渙之三爻初六變中孚其繇曰用拯馬壯吉中孚之九二變為益其繇曰鳴鶴在隂其子和之我有好爵吾與爾靡之益之初六變為家人其繇曰益之用凶事無咎有孚中行告公用圭家人之繇曰家人利女貞象曰風自火出家人君子以言有物而行有恆也吾考此卦極精詳口以授過又書而藏之至和二年成都人有費孝先者始來眉山云近遊青城山訪老人村壞其一竹牀孝先謝不敏且欲償其直老人笑曰子視其下字云此牀以某年月日某造至某年月日為費孝先所壞成壞自有數子何以償為孝先知其異乃留師事之老人授以易軌革卦之術前此未知有此學者後五六年孝先以致富今死矣然四方治其學者所在而有皆自託於孝先真僞不可知也聊復記之使後人知卦影之所自也王君善書符行天心正法為里人療疾驅邪僕嘗傳此咒法當以傳王君其辭曰汝是已死我我是未死汝汝若不吾祟吾亦不汝苦天上失星崔浩乃云當出東井已而果然所謂億則屢中者耶漢十月五星聚東井金水嘗附日不逺而十月日在箕尾此浩所以疑其妄以余度之十月為正蓋十月乃今之八月爾八月而得七月節則日猶在翼軫間則金水聚於井亦不甚逺方是時沛公未得天下甘石何意諂之浩之說未足信也四民俗傳書生入官庫見錢不識或怪而問之生曰固知其為錢但怪其不在紙裹中耳豫偶讀淵明歸去來詞云幼稚盈室瓶無儲粟乃知俗傳信而有徴使瓶有儲粟亦甚微矣此翁平生只於瓶中見粟也耶馬后夫人見大練以為異物晋惠帝問飢民何不食肉糜細思之皆一理也聊為好事者一笑永叔常言孟郊詩鬢邊雖有絲不堪織寒衣縱使堪織能得多少梁民有賈于南者七年而後返茹杏實海藻呼吸山川之秀飲泉之香食土之潔泠泠風氣如在其左右朔易强化磨去風瘤望之蝤蠐然蓋項領也倦游以歸顧視形影日有德色徜徉舊都躊躇顧乎四鄰意都之人與鄰之人十九莫已若也入其閨登其堂視其妻反驚以走是何怪耶妻勞之則曰何關於汝饋之漿則憤不飲舉案而飼之則憤不食與之語則向墻而欷歔披巾櫛而視之則唾而不顧謂其妻曰若何足以當我亟去之妻俯而怍仰而歎曰聞之居富貴者不易糟糠有姬姜者不棄憔悴子以無癭歸我以有癭逐嗚呼癭耶非妾婦之罪也妻竟出於是賈歸家三年鄉之人憎其行不與婚而土地風氣蒸變其毛脉啜菽飲水動搖其肌膚前之醜稍稍復故於是還其室敬相待如初君子謂是行也知賈之薄於禮義多矣居士曰貧易主貴易交不常其所守兹名教之罪人而不知學術者蹈而不知恥也交戰乎利害之場而相勝於是非之境往往以忠臣為敵國孝子為格虜前後紛紜何獨梁賈哉梁工治丹竈有日矣或有自三峰來持淮南王書欲授枕中竒祕坎離生養之法隂陽九六之數子女南北之位或黃或白生生而不窮以是强兵以是緒餘以博施濟衆而其始也密室為埸空地為爐外燼山木之上煮天一壞父鼎母養以既濟風火絪緼而瓦鑠化生方士未畢其說工悅之然以為盡之矣退試其術逾月破竈而黃金已芽矣於是謝方士方士曰子得豫之方未得究其良知其一不知其二余弗邀利於子後日不成不以相仇則子之惠也工重謝之曰若之術殫於是矣豫固知之矣豈若愚我者哉遂歌驪駒以遣送之束書在於腰長揖而去工日治其訣更增益劑量其貪婪無厭童東山之木汲西江之水夜火屬月魄晝火屬日光操之彌勤而其術愈疏為之不已而其費滋甚馬牛銷於鉛汞室廬盡於鉗鎚劵土田質妻子蕭條􅀈縷而其效不進至老以死終不悟君子曰術之不慎學之不至者然也非師之罪也居士曰杇墻畫墁天下之賤工而莫不有師問之不下思之不熟與無師同其師之不至杇墻畫墁之不若也不至則欺其中亦以欺其外欺其中者已窮欺外者人窮如梁工蓋自窮亦安能窮人哉女妾晋武帝欲為太子娶婦衛瓘曰賈氏有五不可青黑短妬而無子竟為羣臣所譽娶之竟以亡晋婦人黑白美惡人人知之而愛其子欲為娶婦且使多子者人人同也然至其惑於衆口則顛倒錯繆如此俚語曰證龜成鱉此未足怪也以此觀之當云證龜成蛇小人之移人也使龜蛇易位而況邪正之在其心利害之在歲月後者耶溫成皇后乳母賈氏宫中謂之賈婆婆賈昌朝連結之謂之姑姑臺諌論其姦吳春卿欲得其實而不可近侍有進對者曰近日臺諫言事虛實相半如賈姑姑事豈有是哉上默然久之曰賈氏實曾薦昌朝非吾仁宗盛德豈肯以實語臣下耶王敦至石崇家如厠脫故著新意色不怍厠中婢曰此客必能作賊也此婢能知人而崇乃令執事厠中殆是無所知也賊盜幸思順金陵老儒也皇祐中沽酒江州人無賢愚皆喜之時劫江賊方熾有一官人艤舟酒壚下偶與思順往來相善思順以酒十壺餉之己而被劫於蘄黃間羣盜飲此酒驚曰此幸秀才酒耶官人識其意即紿曰僕與幸秀才親舊賊相顧歎曰吾儔何為劫幸老所親耶斂所劫還之且戒曰見幸慎勿言思順年七十二日行二百里盛夏曝日中不渴蓋嘗啖物而不飲水云幸一作辜近日頗多賊兩夜皆來入吾室吾近護魏王葬得數千緡略已散去此梁上君子當是不知耳外域天聖中曹瑋以節鎮定州王唆口鬲為三司副使疏决河北囚徒至定州瑋謂唆口鬲曰君相甚貴當為樞密使然吾昔為秦州聞德明歲使人以羊馬貨易於邊課所獲多少為賞罰時將以此殺人其子元昊年十三諫曰吾本以羊馬為國今反以資中原所得皆茶綵輕浮之物適足以驕惰吾民今又欲以此戮人茶綵日增羊馬日减吾國其削乎乃止不戮吾聞而異之使人圖其形信竒偉若德明死此子必為中國患其當君之為樞密時乎盍自今學兵講邊事唆口鬲雖受教蓋亦未必信也其後唆口鬲與張觀陳執中在樞府元昊反楊義上書論土兵事上問三人皆不知遂皆罷之唆口鬲之孫為子由壻故知之昨日見泗倅陳敦固道言􅀈猻作人狀折旋俯仰中度細觀之其相侮慢也甚矣人言弄􅀈猻不知為􅀈猻所弄其言頗有理故為記之又見淮東提舉黃實言見奉使髙麗人言所致贈作有假金銀錠夷人皆坼壞使露胎素使者甚不樂夷云非敢慢也恐契丹有覘者以為真爾由此觀之髙麗所得吾賜物契丹皆分之矣而或者不察謂契丹不知髙麗朝我或以為異時可使牽制契丹豈不誤哉今日又見三佛齊朝貢者過泗州官吏妓樂紛然郊外而椎髻獸面睢盱船中遂記􅀈猻弄人語良有理故并記之元祐五年二月十七日見王伯虎炳之言昔為樞密院禮房檢詳文字見髙麗公案殆因張誠一使契丹於彼帳中見髙麗人私語本國主向慕中國之意歸而奏之先帝始有招徠之意樞密使李公弼因而迎合親書劄子乞招致遂命發運使崔極遣商人招之天下知非極而不知罪公弼如誠一蓋不足道也東坡全集卷一百三
