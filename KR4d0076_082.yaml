body:
  text: 東坡全集巻八十二宋蘓軾撰尺牘九十八首荅楊元素赴登州專人至辱長箋為貺禮意兩過契故不淺乃爾見疎悚息悚息比日起居何如登州謝章未上不敢致啟事近所傳葢非實也未由合并千萬順時保愛人還適在𤓰州道中裁謝不如禮與楊康公兩日大風孤舟掀舞雪浪中但闔户擁衾瞑目塊坐耳楊次公惠法醖一器小酌徑醉醉中與公作得醉道士石詩托楚守寄去一笑某有三兒其次者十六嵗矣頗知作詩今日忽吟淮口遇風一篇粗有可觀戲為和之并以奉呈子由過彼可出示之令一笑也答姚秀才三首過蘇首辱垂訪到官又枉教字皆未克陳謝又煩專使惠問勤厚如此可量感愧比日起居何如寄示詩編石刻良為珍玩以見好事之深篤也溽暑未解萬萬以時保練又近專人還奉書必達入秋差涼體中佳否咫尺披奉無由尚冀保練慰此想念又昨惠及千字荷雅意之厚法書固人所共好而某方欲省緣除長物舊有者猶欲去之又况復收耶謹附封納不訝荅王慶源二首登州還朝近辱書并寄新詩伏讀感慰不已屬多事未及繼和不審比來尊體何如貴眷各均安某凡百如昨夢想歸路如痿人之不忘起也溽暑向隆萬乞以時保重又令子兩先輩必大富學術非久騰踔矣五五哥五七哥及十六郎臨行冗迫不果拜書因見道意登州下臨瘴海枕簟之下天水相連蓬萊三山彷彿可見春夏間常見海市状如煙雲為樓觀人物之象數日前偶見之有一詩録呈為笑也史三儒長老近䝉書冗中未及荅因見乞道區區海市詩可轉呈也京師有幹乞示下荅潘彦明二首行役無定久不奉書至登州領所惠書承起居佳勝甚慰思企到郡席不暖復䝉詔追勉強奔走愧歎不已緬懐舊逰殆不勝情承太夫人尊候如昨昌言令兄亦䝉惠書冗甚未及荅且申意毅甫興宗公頥各為致區區餘萬萬自重又少事奉聞呉待制謫居於彼想不免牢落望諸君一徃見之諸事與照管某向者流落非諸君相伴何以度日雪堂如要偃息且與打揲相伴使忘遷謫之意亦諸君風義也不罪不罪與子安兄二首拜違十八年終未有省侍之期嵗行盡但有懐仰即日履兹寒凝尊體康勝姪男女各長成東塋毎煩照管感涕不可言某到不旬日又有起居舍人之命方力辭免年嵗間當請一鄉郡歸去漸謀退省耳未即瞻奉萬乞以時自重又子由亦有司諫之命想不久到京東塋芟松甚煩照管如更合芟間告兄與楊五哥略徃覰當分明數㸃根槎交付佃户免致輒便偷斫也不然與出榜立賞召人告偷斫者亦佳一切告留意相度阿膠半斤真阿井水煎者青州貢棗五斤充信而已京師有幹乞示及與鄉人某去鄉十八年老人半去後生皆不識面墳墓手種木已徑尺矣此心豈甞一日忘歸哉久放山澤乍入朝市張皇失次觸目非所好也但久與子由别乍得一處不為喜幸然此郎君乃作諫官豈敢望久留者相知之深故詳及一二與楊元素三首奉别忽将二載未甞定居到闕以來人事衮衮不皇上問愧仰深矣比日切想起居佳勝近聞小人輒黷左右此何品類也乃敢如此信知困中無種不有想以道眼觀之何啻蚊蝱一笑可也知故舊皆已還朝坐念老兄獨在江湖未免慨歎也更冀順時為國自重冗迫不及詳又忝命過分皆出素奨碌碌無補日憂愧耳舍弟適患赤目未能上狀又適有鄉信堂兄承議名不疑䘮亡悲痛中不能盡區區恕之恕之都下有幹示及又陳僉主簿聞公已薦之感戴之懐如親受賜也幸為始終成之此人實無他腸可保信也不罪與陳季常某局事雖清簡而京輦之下豈有閒人不覺刼劫過日勞而無補顔髮蒼然見必笑也子由同省日夕相對此為厚幸公小疾雖平不可忽善言不離口善藥不離手此乃古人之要言可書之座右也藥物有彼中難得須此幹置者千萬不外如聞公有意入京不知幾時可來如得一㑹何幸如之栁一已在此一訪值出未見也僦居在蒲池寺去此稍逺數日頗有新事左揆已出陳州君實代之蹇老知和州授之廬簽餘不能盡報去劉莘老中丞旦夕授也黄安中龍直知越州静菴不管閒事最妙最妙與潘彦明四首辱書喜承起居佳勝眷聚各佳某老病還朝不為久計已乞郡矣何時扁舟還鄉一過舊棲溷亂故人旬日而去言之悵然大熱千萬保愛又久不聞問方増渴仰忽領手字方知丈丈傾逝聞之悲怛不可言比日追慕之餘孝履且支持否某衰病懐歸夢想江上又聞耆舊凋䘮可勝悽惋未由徃慰惟冀節哀自重以畢後事又東坡甚煩葺治乳媪墳亦䝉留意感戴不可言令子各計安寶兒想見頎然矣郭興宗舊疾必全平愈酒坊果如意否韓氏園亭曽與葺乎若果有亭榭佳者可以小圖示及當為作名寫牌然非華事者則不足名也張醫博計安勝一塲灾患且喜無事風顛不少減否何親必安竹園復増葺否以上諸人各為再三申意僕暫出茍禄耳終不久客塵間東坡不可令荒茀終當作主與諸君遊如昔日也願遍致此意又近附黄兵書必達比日孝履何如劉全父來頗聞動止殊慰想念京塵衮衮無佳想緬懐昔遊悵惘而已昌言及諸故人皆未及書必察其少暇伸意伸意乍暄千萬節哀自重與王慶源二首久不奉狀愧仰増積即日逺想起居佳勝叔丈脫屣縉紳放懐田里絶人逺矣某罪廢流落今復強顔周行有愧而已若聖恩憐其老鈍年嵗間乞與一鄉郡歸陪杖屨復講昔日江上攜壺藉草之樂只是不得拽脚相送先發遣酒壺歸瑞草橋於義儉矣記得否呵呵何幸如之未間惟望厚自頥養以享無疆之壽又逺沐寄示老手髙風詠歎不已甚欲和謝公私紛紛少暇竟未果悚悚七八兩秀才各計安為學想日益早奮埸屋慰親意也知宅醖甚竒日與蔡子華陽君素聚㑹毎念此即致仕之興愈濃也示諭要畫酒後信手豈能復佳寄一扇一小軸去作笑耳答佛印禪師經年不聞法音經術荒澁無與鋤治忽致手教累幅稍覺洒然仍審比來起居佳勝行役二年水陸萬里近方弛擔老病不復徃日而都下人事十倍於外吁可畏也復欲如去年相對溪上聞八萬四千偈豈可得哉南望山門臨書悽斷苦寒為衆自重與王文甫多時不奉書思仰不去心比日履兹酷暑體中佳勝數日以伏暑下府初安乏力而潘二丈速行略奉此數字殊不盡意西山詩一冊當今能文之士多在其間并拙詩親冩與鄧聖求詩同納上或能為入石安溪亦佳不然寫放壁中可也與運判應之多日不接奉渴仰殊深大熱伏想起居佳勝承旦夕啓行無緣徃别鄉里何幸被䝉豈弟之政但賢者逺去有識所歎也衝犯酷暑千萬自愛與范子功二首違濶嵗月書問不繼自咎之深殆無所容伏惟盛徳雅度有以容之比日切計鎮撫之暇台候萬福某䝉庇粗遣驟遷過分備員無補惟雅眷有以教督之乃幸毒熱伏冀順時為國自重又久疎上問愧仰増劇承軒斾将至起居佳勝欣慰不已暫還舊席即膺柄用輿議所屬小子得少託餘庇尤為厚幸區區即遂面究與知縣十首紛冗久疎上問辱書感愧比日履兹春温起居何如末由展奉徒深渴仰尚冀保練以慰區區又近屢辱書數裁謝但苦冗中不盡意耳比日起居何如惠笋已拜賜新竒之味逺能分惠感愧無已又頻示誨感服勤眷乍暄伏計尊體佳勝前去當入府果爾否又近者叠辱臨訪紛冗中不盡所懐枉手教具審起居佳勝感慰兼集何日復入城得少款聚未間萬萬自重又近辱回教感慰深矣比日履兹伏暑起居清勝咫尺莫由㑹遇引領來塵庶幾少盡區區未間萬萬自重又人來辱手教承比日起居佳勝思企髙義未緣款奉臨書悵惘示諭書醉公石固佳但目昏罷倦毎書過百十字輒意闌恐旦夕少暇耳毒熱萬萬以時自重又近日雖獲一再見終不盡區區辱書告别又不即裁答可量愧悚宿昔稍涼起居勝常景物漸嘉邑事多暇想有以為樂此外萬萬自重又叠辱手教感慰兼集邑事清簡起居勝常小兒䝉不鄙外荷徳殊深矣未由接奉千萬以時自重又兒子遂獲託庇知幸魯鈍多不及事惟痛與督勵也切祝切祝晉卿相見殿門外惘然如夢中人也人世何者非夢耶亦不足多談但喜其容貌蔚然如故非有過人能如是耶又昨日辱示佳篇詞韻髙絶非此句無以發揚醉公也雨冷起居佳否二碑納上與人二首辱教伏承尊體康勝某以拘文不克造請初不知微恙今聞已安愈甚慰馳仰然猶當倍加保愛也又違濶忽復周嵗思仰日深衝涉薄冷起居清勝即獲瞻奉下情欣躍區區併遂面盡與張正巳特承訪别愧企良深晴寒起居佳勝寶月書信并念二姪一書煩從者附行不訝不訝正寒衝冐千萬加愛答李方叔翰林承示新文如子駿行状丰容雋狀甚可貴也有文如此何憂不達相知之久當與朋友共之至於富貴則有命矣非綿力所能必致姑務安貧守道使志業益充自當有獲鄙言拙直久乃信耳幸照察答毛滂再辱示手教伏審酷熱起居清勝見諭某何敢當徐思之當不爾非足下相期之逺某安得聞此言感愧深矣體中微不佳奉答草草與王慶源三首久不上状愧仰増積即日退居多暇尊體勝常某進職北扉皆出奨庇自頃流落江湖日欲還鄉追陪杖屨為江路藉草之遊夢想見之今日國恩深重憂責殊大報塞愈難退居何日西望惋悵殆不勝懐想叔丈與丈人及諸姪嵗時相遇樂不可名雖清貧難堪然熬波之餘必及鴒原應不甚寂寞也嵗晚苦寒伏乞保重又近奉慰疏必達比日尊體何如某與幼弱凡百粗遣人生悲樂過眼如夢幻不足追惟以時自娛為上䇿也某名位過分日負憂責惟得幅巾還鄉平生之願足矣幸公千萬保愛得為江邊攜壺藉草之遊樂如之何又向要紅帶今寄一條去却是小兒子輩聞翁要此頗盡功勾當釘造不知稱尊意否拙詩一首并黄秦二君皆當今以詩文名世者各賦一首寫作黄素經一巻並託孫子發宣徳寄上京師有所須但請示及答劉貢父某江湖之人久留輦下如在樊籠豈復佳思也人情責重百端而衰病不能應副動是罪戾故人知我想復見憐耶後會未可期臨書悵惘禪理氣術比來加進否世間關身事特有此耳願更着鞭區區之禱也與范蜀公六首日望旌斾之至不敢復上問不謂髙懐超然不屑世故堅卧莫致有識悵惘然孤風凜然足以下激頺靡雖非赫赫可指之功其於二聖忠厚之治所補多矣比日履兹寒凝台候何如未由瞻奉伏冀萬萬為國自重又某碌碌無補久竊非據又舍弟繼進皆以疎愚處必争之地公議未厭豈可久安非逺當乞一郡以自効或得過謁少聞誨語大幸也始者竊意丈夫絶意軒冕然猶當強到闕一見嗣聖今乃確然如此殊乖素望然士大夫甚髙此舉也冗中不盡區區又伏承歸政得請恩禮優異伏惟慶慰公孤風亮節久信天下而有識今日尤復歸心勉強蹔起以慰二聖大望幡然復退以安無窮之福出處之間雍容自得真可為後世法矣官守所縻不獲躬詣謹奉手啟區區萬一又今晩忽得報承子豐承事遽至大故聞之悲痛殆不可言美才懿行期之逺到今乃止此士友所共痛惜而况姻戚之厚悲惋可量丈丈髙年罹此苦毒有識憂懸伏惟髙明痛以理遣割難忍之愛上為朝廷下為子孫親友自重不勝縷縷又近者子豐攜長子承務見過見其風骨秀整聞向下二子甚竒死生壽夭皆常事惟有後可以少慰丈丈意幸以此自遣又子功淳父皆欲謁告省覲某恨不同徃曉解左右臨書悽愴與楊元素二首向馳賀緘及因李教授行附問各巳達否比日履兹微涼台候何似某䝉庇粗遣如聞公欲一謁元老果否不若遂遊廬阜况職當按行他日世事一復奉諉欲為此行豈可得哉餘惟萬萬為人自重又某近數章請郡未允數日來杜門待命期於必得耳公必聞其畧葢為臺諫所不容也昔之君子惟荆是師今之君子惟温是隨所隨不同其為隨一也老弟與温相知至深始終無間然多不隨耳致此煩言葢始於此然進退得䘮齊之久矣皆不足道老兄相知之深恐願聞之不須為人言也令子必得信計安與張太保安道某以不善俯仰屢致紛紛想已聞其詳近者凡四請郡杜門待命幾二十日文母英聖深照情偽徳音琅然中外聳服幾至有所行遣而諸公燮和之數日有㫖與言者數君皆促供職明日皆當見葢不敢兼卧嫌若復伸前請爾䝉知愛之深不敢不盡幸為察之褊淺多忤有愧教誨之素臨書悒悒與李端伯寳文三首自附啟河朔爾後紛紛不獲繼問左右比日伏審鎮撫之暇台候萬福蜀中本易治而或者擾之公既深得民情而民亦素服公政切想下車以來笑談無事行春之樂無由託後乘陪賔客之末但深想望舍弟鎖宿殿廬未及奉狀又張君房助教陵井人本治儒術巳而為醫有過人者識病通變而性極厚恐欲知之某寵禄過分碌碌無補久以為愧近屢請郡未獲若得歸掃墳墓遂得望見豈勝厚幸但恐政成促召在旦暮爾冗中不盡區區又邑子每來稔聞豈弟之政西南泰然不肖與受賜多矣幸甚幸甚小姪千之初官得在麾下想䝉教誨成就也曽拜聞眉士程遵誨者文詞氣節皆有可取不知曽請見否答吕元鈞三首適辱教值局中不即答悚息悚息熱甚尊體佳安隆暑衝冐何不少待秋涼必亮此意非面莫盡香不欲附去恐損其人之髙節紛紛之議未聞其詳可否示諭餘俟朝中可既又中間承進職雖少慰人望然公當在廟堂此豈足賀也此間語言紛紛比來尤甚士大夫相顧避罪而已何暇及中外利害大計乎示諭但閔然而已非久季常人行當盡區區又屢與令子語欽愛才美但尚屈太官未厭公論耳季常近得書亦見黄州人言體氣頗安壯但口眼微動耳來求藥物已寄去餘具令子口白答史彦明主簿二首别後冗懶相因不果上問愧企増劇逺辱書教感服深矣比日起居何如衰病懐歸請郡未獲何時展奉少道宛結嵗晚厚愛少慰區區又新寧想未赴上前所欲發書至時可示諭也程懿叔去後旅思牢落聞已到郡矣寄惠秋石極感留意新春龍鶴菜根有味舉箸想復見憶耶與千之姪獨立不懼者惟司馬君實與叔兄弟耳萬事委命直道而行縱以此竄逐所獲多矣因風寄書此外勤學自愛近來史學凋廢去嵗作試官問史傳中事無一兩人詳者可讀史書為益不少也與楊君素二首奉别忽二十年思仰日深書問不繼每日以為愧比日動止何似子姪十九兄弟逺來得聞尊體康健異常不勝慶慰知騎驢出入步履如飛能登木自採茘枝此希世竒事也雖壽考自天亦是身心空閒自然得道也某衰倦早白日夜懐歸會見之期想亦不逺更望順時自重少慰區區因孫宣徳歸附手啟上問又某去鄉二十一年里中尊宿零落殆盡惟公龜鶴不老松柏益茂此大慶也無以表意輒送暖脚銅缶一枚每夜熱湯注滿密塞其口仍以布單褁之可以達旦不冷也道氣想不假此聊致區區之意而已令子三七秀才及外甥十一郎各計安與黄州故人某寵禄過分憂責自重顔衰鬢秃不復江上形容也屢乞郡未得但懐想曩遊發於夢想也洗眼揩牙藥得之幸甚切望掛意覆盆子必已採得望多寄也都下有幹示及十二十三兩先輩各致區區忙甚未及書艾清臣亦然京師冗迫殊不款曲也答龎安常二首久不為問思企日深過辱存記逺枉書教具聞起居佳勝感慰兼集惠示傷寒論真得古聖賢救人之意豈獨為傳世不朽之資葢已義貫幽明矣謹當為作題首一篇寄去方苦多事故未能便付去人然亦不久作也老倦甚矣秋初決當求去未知何日㑹見臨書惘惘惟萬萬以時自愛又人生浮脆何者為可恃如君能著書傳後有幾念此便當為作數百字仍欲送杭州開板也知之答程懿叔人來辱書喜知起居佳勝眷愛各萬福郡政清暇稍有樂事處以無心強梗自服甚善甚善所望於吾弟也某凡百如昨但碎累各病醫人不離門勞費百端日有外補之興行先尚未到亦不聞逺近之耗未緣㑹合新春保練别膺殊渥答李方叔三首叠辱手教愧荷不已雪寒起居佳勝示諭固識孝心深至然某從來不獨不作不書銘誌但緣子孫欲追述祖考而作者皆未甞措手也近日與温公作行狀書墓誌者獨以公甞為先妣墓銘不可不報耳其他決不為所辭者衆矣不可獨應命想必獲罪左右然公度某無他意意盡於此矣悚息悚息又承遂舉三十䘮哀勞極矣此古人事復見於今恨不能兼助耳不易不易阡表與墓誌異名而同實固難如教不罪不罪某暮歸困甚來人又立行不復覼縷又某以虛名過實士大夫不察責望逾涯朽鈍不能副其求復致紛紛欲自致省静寡過之地以餞餘年不知果得此願否故人見愛以徳不應更虛華粉餙以重其不幸承示諭但有愧汗耳與王定國數日卧病在告不審起居佳否知今日㑹兩壻清虛隂森正好劇飲坐無狂客冰玉相對得無少澹否扶病暫起見與子由簡大罵書尺徃還正是擾人可憎之物公乃以此為喜怒乎仙人王逺云得此書當復劇口大罵之固應爾然而不可以徒罵也知公澹甚徃發一笑張十七必在坐幸仰意與李端叔辱書并示伯時所畫地藏某本無此學安能知其所得於古者為誰何但知其為軼妙而造神能於道子之外探顧陸古意耳公與伯時想皆期我於度數之表故特相示耶有近評呉畫百十字輒封呈并畫納上與李伯時辱手示及惠新醖感愧殊深即日起居佳勝洗玉池銘更寫得小字一本比之大字者稍精請用陳伯修之說更刻於石柱上為家人還奉謝與范純父三辱示諭鄙意不移公休之餽人子之心也不肖之辭夙昔之分也某已領其意而辭其物物有齊量意豈有窮哉昔人已聘還圭璋庶幾此義與辯才禪師三首久不奉書愧仰増深比日切惟法履佳休某忝冐過分碌碌無補日望東南一小郡庶幾臨老復聞法音尚冀以時為衆自愛又某尚與兒子竺僧名迨於觀音前剃落權寄緇褐去嵗明堂恩已奏授承務郎謹與買得度牒一道以贖此子今附趙君齎納取老師意剃度一人仍吿於觀音前略祝願過悚息悚息又某有少㣲願須至仰煩切料慈照必不見罪某與舍弟某捨絹一百疋奉為先君霸州文安縣主簿累贈中大夫先妣武昌郡太君程氏造地藏菩薩一尊并座及侍者二人菩薩身之大小如中形人所費盡以此絹而巳若錢少即省縷刻之工可也乞為指揮選匠便造造成示及專求便船迎取欲京師寺中供養也煩勞神用愧悚不已與浴室用公去鄉久不復相聞知得來示及退翁書乃審公正信法子而吾先友史彦輔十三丈之甥也又承寄示正信偈頌塔銘感歎不可言比日法體勝常知長講起信自講入禪把攬放船甚善甚善輒題數句塔銘後以補闕逸未即相見千萬為法自重大雪後手凍不復成字與張元明二首數日起居佳否有一詮秘大師者與之久故患痢後腸滑甚困欲煩一徃視療之可否在興國寺戒壇院此一髙行僧也便同作福田呵呵又數日起居佳勝適在院中得王郎簡帖如此今封呈切告輟忙一徃他必不敢苛留且請周念副此人友愛急難之心切望切望與家復禮前日辱訪别悵戀不巳隂寒起居佳否送行詩别寫得一本都勝前日書者復納去逺道萬萬自重答劉元忠三首杭州專人辱書承昆仲逺寄詩文讀之喜慰殆不可言喜諫議公之有子也比日雪寒起居佳否詩文皆大佳然法曹君所製尤佳也為之不已何所不至輒出一詩為謝取笑取笑未由披奉千萬節哀自重又聞愛弟傾逝手足之痛如何可言奈何奈何盛徳之後何乃止此壽夭黙定非追悼所及千萬寛中自愛而已無由面慰臨紙哽塞又先公傳久欲作以官事衮衮未暇成當即寄去也所要白雲居士字不知足下自謂耶抑為他人求也既不識其人不欲便寫若乃是自謂則未願足下為此名號也必亮此言黄素却寫一絶句納去不訝答王慶源久不奉書愧仰兼極令姪元直逺訪首出教字感慰之懐未易盡陳比日履兹春和尊體何如某為郡粗遣衰病懐歸日欲致仕既忝侍從理難驟去須自藩鎮乞小郡自小郡乞宫觀然後可得也自數年日夜營此近已乞越雖未可知而經營不已會當得之致仕有期則拜見不逺矣惟望倍加保嗇庶歸鄉日猶能陪侍杖屨上下山谷間也楮冠玳簮聊表逺意玳簮已七八十年物閱數名公矣幸服用之與引伴髙麗練承議三首辱回教感服不已數日極寒徒御良苦切惟起居佳勝早潮不知應否想不出今晚必渡引望飢渴專人候問又來日若晚渡酒五行已夜矣本州舊例雖夜已深人使猶秉燭復謁當夜下書請次日大排不知如何又二十日正是國忌若待二十一日大排又過三日勅限不知可打散不坐否乞一一示諭得以預備也又中使已到三十里若髙麗使只今來辭酒罷却可迎中使老業未盡有此蒼忙望公慈造一言得只今上馬為幸與潘彦明二首久不奉書切惟起居佳勝老拙凡百如舊出守舊治頗得湖山之樂但嵗災傷拯救勞弊無復齊安放懐自得之娯也彦明與故人諸公頗見念否何時㑹合臨紙惘惘新春萬萬自重又兩兒子新婦各為老乳母任氏作燒化衣服幾件敢煩長者丁囑一幹人令剰買紙錢數束仍厚鋪新芻於墳前一酹而燒之勿觸動為佳恃眷念之深必不罪干凂悚息悚息與程懿叔二首稍不聞問思企増劇比日起居何如貴眷各安勝廣東近亦得書甚安子由使虜亦還矣某近忽苦腰痛在假數日今雖強出視事尚未全健已乞宣城或宫觀去此雖暫病亦欲漸為退休之計耳吾弟治績逺聞當即召用少慰公議又承拜命移漕巴峡薄慰衆望方欲奉書使至辱教字且審起居清勝懿叔才地治狀當召還清近此何足道得一省墳墓仍見親知為可賀耳衰病疲厭何時北趨歸路仰羨而已知在江上咫尺莫緣一見臨紙惘惘答聞復上人辱書并詩誦味不釋手感慰之極比日起居何如示諭欲以髙丈發明儒釋固所望於左右也某數日病在告今日頗快來旦欲出視事然尚少力粗和得來詩未能盡意花瓷不難得但去人已負重後信當致也詩中似欲之故及未相見間萬萬自愛與趙徳麟二首候吏來特承書教禮意兼重感怍不已比日起居何如養痾便郡得親宗彦幸甚行役迫遽裁謝草略想䝉恕察又明守一書託為致之育王大覺禪師仁廟舊所禮遇甞見御筆賜偈頌其略云伏覩大覺禪師其敬之如此今聞其困於小人之言幾不安其居可歎可歎太守聰明老成必能安全之願公因語欵曲一言正使凡僧猶當以仁廟之故加禮而况其人道徳文采雅重一時乎此老今年八十二若不安全當使何往恐朝廷聞之亦未必喜也某方與撰宸奎閣記旦夕附去公若見此老當為致意東坡全集巻八十二
