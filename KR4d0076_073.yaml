body:
  text: 東坡全集巻七十三宋蘓軾撰書十首上韓丞相論災傷手實書史館相公執事軾到郡二十餘日矣民物椎魯過客稀少真愚拙所宜乆處也然災傷之餘民既病矣自入境見民以蒿蔓裹蝗蟲而瘞之道左纍纍相望者二百餘里捕殺之數聞于官者幾三萬斛然吏皆言蝗不為災甚者或言為民除草使蝗果為民除草民將祝而來之豈忍殺乎軾近在錢塘見飛蝗自西北來聲亂浙江之濤上翳日月下掩草木遇其所落彌望蕭然此京東餘波及淮浙者耳而京東獨言蝗不為災將以誰欺乎郡已上章詳論之矣願公少信其言特與量蠲秋税或與倚閣青苖錢疎逺小臣腰領不足以薦鈇鉞豈敢以非災之蝗上罔朝廷乎若必不信方且重復檢按則饑羸之民索之於溝壑間矣且民非獨病旱蝗也方田均税之患行道之人舉知之税之不均也乆矣然而民安其舊無所歸怨今乃用一切之法成於朞月之間奪甲與乙其不均又甚於昔者而民之怨始有所歸矣今又行手實之法雖其條目委曲不一然大抵恃告訐耳昔之為天下者惡告訐之亂俗也故有不干巳之法非盗及强姦不得捕告其後稍稍失前人之意漸開告訐之門而今之法掲賞以求人過者十常八九夫告訐之人未有非凶姦無良者異時州縣所共疾惡多方去之然後良民乃得而安今乃以厚賞招而用之豈吾君敦化相公行道之本意歟凡為此者欲以均出役錢耳免役之法其經乆利病軾所不敢言也朝廷必欲推而行之尚可擇其簡易為害不深者軾以為定簿便當即用五等古法惟第四等五等分上中下昔之定簿者為役役未至雖有不當民不爭也役至而後訴耳故簿不可用今之定簿者為錢民知當戸出錢也則不容有大繆矣其名次細别或未盡其詳然至於等第蓋已略得其實軾以為如是足矣但當先定役錢所須幾何預為至少之數以賦其下五等下五等謂第四等上中下第五等上中也此五等舊役至輕須令出錢至少乃可第五等下更不當出分文其餘委自令佐度三等以上民力之所任者而分與之夫三等以上錢物之數雖其親戚不能周知至於物力之厚薄則令佐之稍有才者可以意度也借如某縣第一等凡若干戸度其力共可以出錢若干則悉召之庭以其數予之不戸别也令民自相差擇以次分占盡數而已第二等則逐鄉分之凡某鄉之第二等若干戸度其力可以共出錢若干召而分之如第一等第三等亦如之彼其族居相望貧富相悉利害相形不容獨有僥倖者也相推相詰不一二日自定矣若析戸則均分役錢典賣則著所割役錢於契要使其子孫與買者各以其名附舊戸供官至三年造簿則不復用舉從其新如此而朝廷又何求乎所謂浮財者决不能知其數凡告者亦意之而已意之而中其賞不貲不中杖六十至八十極矣小人何畏而不為乎近者軍器監須牛皮亦用告賞農民䘮牛甚於䘮子老弱婦女之家報官稍緩則撻而責之錢數十千以與浮浪之人其歸為牛皮而已何至是乎軾在錢塘毎執筆斷犯鹽者未嘗不流涕也自到京東見官不賣鹽獄中無鹽囚道上無遷鄉配流之民私竊喜幸近者復得漕檄令相度所謂王伯瑜者欲變京東河北鹽法置市易鹽務利害不覺慨然太息也宻州之鹽嵗收税錢二千八百餘萬為鹽一百九十餘萬秤此特一郡之數耳所謂市易鹽務者度能盡買此乎茍不能盡民肯捨而不煎煎而不私賣乎頃者兩浙之民以鹽得罪者嵗萬七千人終不能禁京東之民悍於兩浙逺甚恐非獨萬七千人而已縱使官能盡買又須盡賣而後可茍不能盡其存者與糞土何異其害又未可以一二言也願公救之於未行若已行其孰能已之軾不敢論事乆矣今者守郡民之利病其勢有以見及又聞自京師來者舉言公深有拯救斯民為社稷長計逺慮之意故不自揆復發其狂言可則行之否則置之願無聞於人使孤危衰廢之蹤重得罪於世也干冐威重不勝戰慄上文侍中論强盜賞錢書軾再拜軾備員偏州民事甚簡但風俗武悍特好强刼加以比嵗荐饑椎剽之姦殆無虛日自軾至此明立購賞隨獲隨給人用競勸盜亦斂迹凖法獲强盜一人至死者給五十千流以下半之近有㫖災傷之嵗皆降一等既降一等則當復减半自流以下得十二千五百而已凡獲一賊告與捕者率常不下四五人不勝則為盜所害幸而勝則凡為盜者舉讐之其難如此而使四五人者分十二千五百以損其軀命可乎朝廷所以深惡强盜者為其志不善張而不已可以馴致勝廣之資也由此言之五十千豈足道哉夫災傷之嵗尤宜急於盜賊今嵗之民上戸皆闕食冬春之交恐必有流亡之憂若又蹤盜而不捕則郡縣之憂非不肖所能任也欲具以聞上而人微言輕恐不見省向見報明公所言無不立從東武之民雖非所部明公以天下為度必不間也故敢以告比來士大夫好輕議舊法皆未習事之人知其一不知其二者也常竊怪司農寺所行文書措置郡縣事多出於本寺官吏一時之意遂與制勅並行近者令諸郡守根䆒衙前重難應縁此毁棄官文書者皆科違制且不用赦降原免考其前後初不被㫖謹按律文毁棄官文書重害者徒一年今科違制即是増損舊律令也不用赦降原免即是衝改新制書也豈有増損舊律令衝改新制書而天子不知三公不與有司得專之者今監司郡縣皆恬然受而行之莫敢辨此軾之所深不識也昔袁紹不肯迎天子以謂若迎天子以自近則每事表聞從之則權輕不從則拒命非計之善也夫不請而行袁紹之所難也而况守職奉上者乎今聖人在上朝廷清明雖萬無此虞司農所行意其出於偶然或已嘗被㫖而失於開坐皆不可知但不請而行其漸不可開耳軾愚惷無狀孤危之跡自以岌岌夙䝉明公奬與過分竊懐憂國之心聊復一發於左右猶幸明公宻之無重其罪戾也上文侍中論𣙜鹽書留守侍中執事當今天下勲徳俱高為主上所倚信華實兼隆為士民所責望受恩三世宜與社稷同憂皆無如明公者今雖在外事有關於安危而非職之所憂者猶當盡力爭之而况其事關本職而憂及生民者乎竊意明公必已言之而人不知若猶未也則願效其愚頃者三司使章惇建言乞𣙜河北京東鹽朝廷遣使案視召周革入覲已有成議矣惇之言曰河北與陜西皆為邊防而河北獨不𣙜鹽此祖宗一時之誤恩也軾以為陜西之鹽與京東河北不同觧池廣袤不過數十里既不可捐以予民而官亦易以籠取青鹽至自敵中有可禁止之道然猶法存而實不行城門之外公食青鹽今東北循海皆鹽也其欲籠而取之正與淮南兩浙無異軾在餘杭時見兩浙之民以犯鹽得罪者一嵗至萬七千人而莫能止姦民以兵仗䕶送吏士不敢近者常以數百人為輩特不為他盜故上下通知而不以聞耳東北之人悍於淮浙逺甚平居椎剽之姦常甲於他路一旦𣙜鹽則其禍未易以一二數也由此觀之祖宗以來獨不𣙜河北鹽者正事之適宜耳何名為誤哉且𣙜鹽雖有故事然要以為非王政也陜西淮浙既未能罷又欲使京東河北隨之此猶患風痺人曰吾左臂既病矣右臂何為獨完則以酒色伐之可乎今議者曰吾之法與淮浙不同淮浙之民所以不免於私販而竈戸所以不免於私賣者以官之買價賤而賣價貴耳今吾賤買而賤賣借如每斤官以三錢得之則以四錢出之鹽商私買於竈戸利其賤耳賤不能減三錢竈戸均為得三錢也寜以予官乎將以予私商而犯法乎此必不犯之道也此無異於兒童之見東海皆鹽也茍民力之所及未有捨而不煎煎而不賣者也而近嵗官錢常若窘廹遇其急時百用横生以有限之錢買無窮之鹽竈戸有朝夕薪米之憂而官錢在朞月之後則其利必歸於私販無疑也食之於鹽非若饑之於五糓也五糓之乏至於節口并日而况鹽乎故私販法重而官鹽貴則民之貧而懦者或不食鹽往在浙中見山谷之人有數月食無鹽者今將𣙜之東北之俗必不如往日之嗜鹹也而望官課之不虧疎矣且淮浙官鹽本輕而利重雖有積滯官未病也今以三錢為本一錢為利自禄吏購賞修築厫庾之外所獲無幾矣一有積滯不行官之所䘮可勝計哉失民而得財明者不為况民財兩失者乎且禍莫大於作始作俑之漸至於用人今兩路未有鹽禁也故變之難遣使㑹議經年而未果自古作事欲速而不取衆議未有如今日者也然猶遲乆如此以明作始之難也今既已𣙜之矣則他日國用不足添價貴賣有司以為熟事行半紙文書而决矣且明公能必其不添乎非獨明公不能也今之執政能自必乎茍不可必則兩路之祸自今日始夫東北之蠶衣被天下蠶不可無鹽而議者輕欲奪之是病天下也明公可不深哀而速救之歟或者以為朝廷既有成議矣雖爭之必不從竊以為不然乃者手實造簿方赫然行法之際軾甞論其不可以告今太原韓公公時在政府莫之行也而手實卒罷民賴以少安凡今執政所欲必行者青苖助役市易保甲而已其他猶可以庶幾萬一或者又以為明公將老矣若猶有所爭則其請老也難此又軾之所不識也使明公之言幸而聽屈已少留以全兩路之民何所不可不幸而不聽是議不中意其於退也尤易矣願少留意軾一郡守也猶以為職之所當憂而冐聞於左右明公其得已乎干瀆威重俯伏待罪而已答舒煥書軾頓首軾天資懶慢自少年筋力有餘時已不喜應接人事其於酬酢往反蓋嘗和矣而未嘗敢倡也近日加之衰病向所謂和者又不能給雖知其勢必為人所怪怒但弛廢之心不能自克聞足下之賢乆矣又知守官不甚相逺加之往來者具道足下雖未相識而相與之意甚厚亦欲作一書相聞然操筆復止者數矣因與賈君飲出足下送行一絶句其語有見及者醉中率爾和答醒後不復記憶其中道何等語也忽辱手示乃知有公沙之語惘然如夢中事愧赧不已足下文章之美固已超軼世俗而追配古人矣豈僕荒唐無實横得聲名者所得眩乎何其稱述之過也其詞則信美矣豈效鄒衍相如髙談馳騖不顧其實茍欲託僕以發其宏麗新語耶歐陽公天人也恐未易過非獨不肖所不敢當也天之生斯人意其甚難非且使之休息千百年恐未能復生斯人也世人或自以為似之或至以為過之非狂則愚而已何縁㑹面一笑為樂朱支使行怱遽裁謝草草答黄魯直書軾頓首再拜魯直教授長官足下軾始見足下詩文於孫莘老之坐上聳然異之以為非今世之人也莘老言此人人知之者尚少子可為稱揚其名軾笑曰此人如精金美玉不即人而人即之將逃名而不可得何以我稱揚為然觀其文以求其為人必輕外物而自重者今之君子莫能用也其後過李公擇於濟南則見足下之詩文愈多而得其為人益詳意其超逸絶塵獨立萬物之表馭風騎氣以與造物者逰非獨今世之君子所不能用雖如軾之放浪自棄與世闊疎者亦莫得而友也今者辱書詞累幅執禮恭甚如見所畏者何哉軾方以此求交於足下而懼其不可得豈意得此於足下乎喜愧之懐殆不可勝然自入夏以來家人輩更卧病怱怱至今裁答甚緩想未深訝也古風二首託物引類真得古詩人之風而軾非其人也聊復次韻以為一笑秋暑不審起居何如未由㑹見萬萬以時自重答宋寺丞書軾自假守彭城即欲為一書以問左右乆苦多事竟為足下所先慚悚不可言也來書稱道過當皆非無狀所能髣髴自少小為學不過以記誦篆刻追世俗之好真所謂淺見寡聞者也年大以來雖所謂寡淺者亦復廢忘至於吏道法令民事簿書期㑹尤非所長素又不喜從事於此以不喜之心强其所不長其荒唐謬悠可知也而彭城自漢以來號為重地朝廷過采其虚名不知其實無有也而輕以畀之自到郡以來夏旱秋潦繼之以横流之災札瘥之餘百役毛起公私騷然未巳也計其不治之聲聞於左右者多矣仁人君子不指其過教其所不迨而更譽之何也孔子曰居是邦也事其大夫之賢者友其士之仁者自今與足下往來相聞知不徒為好而已當有以告我者不勝大願適㑹夫役起無頃刻閒暇書不能盡意惟深察之黄州上文潞公書軾再拜孟夏漸熱恭惟留守太尉執事台候萬福承以元功正位兵府備物典冊首冠三公雖曾孫之遇絶口不言而金縢之書因事自顯真古今之異事聖朝之光華也有自京師來轉示所賜書教一通行草爛然使破甑敝帚復増九鼎之重軾始得罪倉皇出獄死生未分六親不相保然私心所念不暇及他但顧平生所存名義至重不知今日所犯為已見絶於聖賢不得復為君子乎抑雖有罪不可赦而猶可改也伏念五六日至于旬時終莫能决輒復强顔忍耻飾鄙陋之詞道疇昔之眷以卜於左右遽辱還答恩禮有加豈非察其無他而恕其不及亦如聖天子所以貸而不殺之意乎伏讀洒然知其不肖之軀未死之間猶可以洗濯磨治復入於道徳之塲追申徒而謝子産也軾始就逮赴獄有一子稍長徒歩相隨其餘守舎皆婦女幼稚至宿州御史符下就家取文書州郡望風遣吏發卒圍船搜取老幼幾怖死既去婦女恚罵曰是好著書書成何所得而怖我如此悉取燒之比事定重復尋理十亡其七八矣到黄州無所用心輒復覃思於易論語端居深念若有所得遂因先子之學作易傳九巻又自以意作論語説五巻窮苦多難壽命不可期恐此書一旦復淪没不傳意欲寫數本留人間念新以文字得罪人必以為凶衰不祥之書莫肯收藏又自非一代偉人不足託以必傳者莫若獻之明公而易傳文多未有力裝寫獨致論語説五巻公退閒暇一為讀之就使無取亦足見其窮不忘道老而能學也軾在徐州時見諸郡盜賊為患而察其人多凶俠不遜因之以饑饉恐其憂不止於竊攘剽殺也輒草具其事上之㑹有㫖移湖州而止家所藏書既多亡軼而此書本以為故紙糊籠篋獨得不燒籠破見之不覺惘然如夢中事輒録其本以獻軾廢逐至此豈敢復言天下事但惜此事粗有益於世既不復施行猶欲公知之此則宿昔之心掃除未盡者也公一讀訖即燒之而已黄州食物賤風土稍可安既未得去去亦無所歸必老於此拜見無期臨紙於邑惟冀以時為國自重謝張太保撰先人墓碣書軾頓首再拜伏䝉再示先人墓表特載辨姦一篇恭覽涕泗不知所云竊惟先人早嵗汩没晚乃有聞雖當時學者知師尊之然於其言語文章猶不能盡而况其中之不可形者乎所謂知之盡而信其然者舉世惟公一人雖若不幸然知我者希正老氏之所貴辨姦之始作也自軾與舎弟皆有嘻其甚矣之諫不論他人獨明公一見以為與我意合公固已論之先朝載之史冊今雖容有不知後世决不可没而先人之言非公表而出之則人未必信信不信何足深計然使斯人用區區小數以欺天下天下莫覺莫知恐後世必有秦無人之嘆此墓表之所以作而軾之所以流涕再拜而謝也黄叔度澹然無作郭林宗一言至今以為顔子林宗於人材小大畢取所賢非一人而叔度之賢無一見於外者而後世猶信徒以林宗之重也今公之重不減林宗所賢惟先人而其心迹粗若可見其信於後世必矣多言何足為謝聊發一二與章子厚書子厚參政諫議執事春初辱書尋逓中裁謝不審得達否比日機務之暇起居萬福軾䝉恩如昨顧以罪廢之餘人所鄙惡雖公不見棄亦不欲頻通姓名今兹復陳區區誠義有不可已者軾在徐州日聞沂州丞縣界有賊何九郎者謀欲刼利國監又有闞温秦平者皆猾賊往來沂兖間欲使人緝捕無可使者聞沂州葛墟村有程棐者家富有心膽其弟岳坐與李逢往還配桂州牢城棐雖小人而篤於兄弟常欲為岳洗雪而無由竊意其人可使因令本州支使孟易呼至郡喻使自效以刷門戸垢汙茍有成績當為奏乞放免其弟棐願盡力因出帖付與不逾月軾移湖州棐相送出境云公更留兩月棐必有以自效今已去奈何軾語棐但盡力不可以軾去而廢也茍有所獲當速以相報不以逺近所在仍為奏乞如前約也是嵗七月二十七日棐使人至湖州見報云已告捕獲妖賊郭先生等及得徐州孔目官以下狀申告捕妖賊事如棐言不謬軾方欲具始末奏陳棐所以盡力者為其弟也乞勘㑹其弟岳所犯如只是與李逢往還本不與其謀者乞賜放免以勸有功草具未上而軾就逮赴詔獄遂不果發今者棐又遣人至黄州見報云郭先生等皆已鞫治得實行法乆矣䝉恩授殿直且録其告捕始末以相示原棐之意所以孜孜於軾者凡為其弟以曩言見望也軾固不可以復有言矣然獨念愚夫小人以一言感發猶能奮身不顧以遂其言而軾乃以罪廢之故不為一言以負其初心獨不愧乎且其弟岳亦豪健絶人者也徐沂間人鷙勇如棐岳類甚衆若不收拾驅使令捕賊即作賊耳謂宜因事勸奬使皆歆艶捕告之利懲創為盜之禍庶幾少變其俗今棐必在京師參班公可自以意召問其始末特為一言放免其弟岳或與一名目牙校鎮將之類付京東監司驅使緝捕其才用當復過於棐也此事至微末公執政大臣豈復治此但棐於軾本非所部吏民而能自效者以軾為不食言也今既不可言於朝廷又不一言於公是終不言矣以此愧於心不能自已可否在公獨願秘其事毋使軾重得罪也徐州南北襟要自昔用武之地而利國監去州七十里土豪百餘家金帛山積三十六冶器械所産而兵衛㣲寡不幸有猾賊十許人一呼其間吏兵皆棄而走耳散其金帛以嘯召無賴烏合之衆可一日得也軾在郡時常令三十六冶每戸㸃集冶夫數十人持却刃槍每月兩衙於知監之庭以示有備而已此地蓋常為京東豪猾之所擬公所宜知因程棐事輒復及之秋冷伏冀為國自重答李端叔書一首軾頓首再拜聞足下名乆矣又於相識處往往見所作詩文雖不多亦足以髣髴其為人矣尋常不通書問怠慢之罪猶可闊畧及足下斬然在疚亦不能以一字奉慰舎弟子由至先䝉惠書又復懶不即答頑鈍廢禮一至於此而足下終不棄絶逓中再辱手書待遇益隆覽之面熱汗下也足下才高識明不應輕許與人得非用黄魯直秦太虚輩語真以為然耶不肖為人所憎而二子獨喜見譽如人嗜昌歜羊棗未易詰其所以然者以二子為妄則不可遂欲以移之衆口又大不可也軾少年時讀書作文專為應舉而已既及進士第貪得不已又舉制䇿其實何所有而其科號為直言極諫故每紛然誦説古今考論是非以應其名耳人苦不自知既以此得因以為實能之故譊譊至今坐此得罪幾死所謂齊虜以口舌得官真可笑也然世人遂以軾為欲立異同則過矣妄論利害攙説得失此正制科人習氣譬之候蟲時鳥自鳴自已何足為損益軾每怪時人待軾過重而足下又復稱説如此愈非其實得罪以來深自閉塞扁舟草履放浪山水間與樵漁雜處往往為醉人所推罵輒自喜漸不為人識平生親友無一字見及有書與之亦不答自幸庶幾免矣足下又復創相推與甚非所望木有癭石有暈犀有通以取妍於人皆物之病也讁居無事黙自觀省回視三十年以來所為多其病者足下所見皆故我非今我也無乃聞其聲不考其情取其華而遺其實乎抑將又有取於此也此事非相見不能盡自得罪後不敢作文字此書雖非文然信筆書意不覺累幅亦不須示人必喻此意嵗行盡寒苦惟萬萬節哀强食不次東坡全集巻七十三
