body:
  text: 東坡全集巻十九宋蘇軾撰詩六十四首次韻劉景文西湖席上二老長身屹兩峰常撞大吕應黄鍾將辭鄴下劉公幹却見雲間陸士龍白髪憐君畧相似青山許我定相從吾今官已六百石慙愧當年邴曼容次前韻荅馬忠玉坡陀巨麓起連峯積累當年慶自鍾靈運子孫俱得鳳慈明兄弟孰非龍河梁㑹作㸔雲别詩社何妨載酒從祇有西湖似西子故應宛轉為君容予去杭十六年而復來留二年而去平生自覺出處老少粗似樂天雖才名相逺而安分寡求亦庶幾焉三月六日來别南北山諸道人而下天竺惠淨師以醜石贈行作三絶句當年衫鬢兩青青強説重臨慰别情衰髪祇今無可白故應相對話來生出處依稀似樂天敢將衰朽較前賢便從洛社休官去猶有閒居二十年在郡依前六百日山中不記幾回來還將天竺一峯去欲把雲根到處栽次韻答黄安中兼簡林子中老去心灰不復然一麾江海意方堅那堪黄散付子度空羨蘇杭養樂天病肺一春難白酒别腸三夜遶朱絃羣仙政欲吾歸去共把清風借玉川留别蹇道士拱辰黑月在濁水何曾不清明寸田滿荆棘梨棗無從生何時反吾真嵗月今崢嶸屢接方外士早知俗縁輕庚桑託雞鵠未肯化南榮晚識此道師似有宿世情笑指北山雲訶我不歸耕仙人漢陰馬㣲服方地行咫尺不往見煩子通姓名願持空手去獨控横江鯨次韻子由書王晉卿畫山水二首老去君空見畫夣中我亦曾逰桃花縱落誰見水到人間伏流山人昔與雲俱出俗駕今隨水不回賴我胸中有佳處一樽時對畫圖開又書王晉卿畫四首山隂陳迹當年不識此清真強把先生擬季倫等是人間一陳迹聚蚊金谷本何人雪谿乗興谿山雪月兩佳哉賓主談鋒夜轉雷猶言不見戴安道為問適從何處來四明狂客毫端偶集一微塵何處谿山非此身狂客思歸便歸去更求敕賜枉天真西塞風雨斜風細雨到來時我本無家何處歸仰㸔雲天真篛笠旋收江海入蓑衣破琴詩并引舊説房琯開元中嘗宰盧氏與道士邢和璞出㳺過夏口村入廢佛寺坐古松下和璞使人鑿地得罋中所藏婁師徳與永禪師書笑謂琯曰頗憶此耶琯因悵然悟前生之為永師也故人柳子玉寶此畫云是唐本宋復古所臨者元祐六年三月十九日予自杭州還朝宿呉淞江夣長老仲殊挾琴過予彈之有異聲就視琴頗損而有十三絃予方歎惜不已殊曰雖損尚可修曰奈十三絃何殊不荅誦詩云度數形名本偶然破琴今有十三絃此生若遇邢和璞方信秦筝是響泉予夣中了然識其所謂既覺而忘之明日晝寢復夣殊來理前語再誦其詩方驚覺而殊適至意其非夢也問之殊蓋不知是嵗六月見子玉之子子文于京師求得其畫乃作詩并書所夢其上子玉名瑾善作詩及行草書復古名迪畫山水草木蓋妙絶一時仲殊本書生棄家學佛通脱無所着皆竒士也破琴雖未修中有琴意足誰云十三絃音節如佩玉新琴空髙張絃聲不附木宛然七絃筝動與世好逐陋矣房次律因循墮流俗懸知董庭蘭不識無絃曲題王晉卿畫後醜石半蹲山下虎長松倒卧水中龍試君眼力㸔多少數到雲峯第幾重聽武道士彈賀若清風終日自開簾涼月今宵肯挂簷琴裏若能知賀若詩中定合愛陶潜元祐六年六月自杭州召還汶公館我於東堂閲舊詩巻次諸公韻三首半熟黄粱日未斜玉堂陰合手栽花却尋三十年前味未飯鐘時已飯茶夢覺還驚屧響廊故人來炷影前香鬢鬚白盡成何事一帖空存老遂良法帖中有褚遂良書云即日遂良鬚髪盡白尺一東來喚我歸衰年已迫故山期文章曹植今堪笑却巻波瀾入小詩次韻子由書王晉卿畫山水一首而晉卿和二首誤㸃故教同子敬雜篇真欲擬湯休壠雲寄我山中信雪月追君溪上舟㑹㸔飛仙虎頭篋却來顛倒拾遺裘子美詩云天吳及紫鳯顛倒在短褐王孫辦作𤣥真子細雨斜風不濕鷗此境眼前聊妄想幾人林下是真休我今心似一潭月君已身如萬斛舟㸔畫題詩雙鶴鬢歸田送老一羊裘明年兼與士龍去萬頃蒼波没兩鷗感舊詩并引嘉祐中予與子由同舉制筞寓居懷逺驛時年二十六而子由二十三耳一日秋風起雨作中夜翛然始有感慨離合之意自爾宦㳺四方不相見者十常七八每夏秋之交風雨作木落草衰輒悽然有此感蓋三十年矣元豐中謫居黄岡而子由亦貶筠州嘗作詩以記其事元祐六年予自杭州召還寓居子由東府數月復出領汝陰時予年五十六矣乃作詩留别子由而去牀頭枕馳道雙闕夜未央車轂鳴枕中客夢安得長新秋入梧葉風雨驚洞房獨行慚月影悵焉感初凉筮仕記懷逺謫居念黄岡一往三十年此懷未始忘扣門呼阿同子由一字同叔安寢已太康青山映華髪歸計三月糧我欲自汝陰徑上潼江章想見氷槃中石蜜與柿霜予欲請東川而歸二物皆東川所出憐子遇明主憂患已再嘗報國何時畢我心久已降西湖秋涸東池魚窘甚因㑹客呼網師遷之西池為一笑之樂夜歸被酒不能寐戲作放魚一首東池浮萍半粘塊裂碧跳青出魚背西池秋水尚涵空舞闊摇深吹荇帶吾僚有意為遷居老守縱饞那忍膾縱横爭看銀刀出瀺灂初驚玉花碎但愁數罟損鱗鬛未信長堤隔濤瀨濊濊發發須㬰間圉圉洋洋尋丈外安知中無蛟龍種尚恐或有風雲㑹明年春水漲西湖好去相忘渺淮海復次放魚前韻荅趙承議陳教授擾擾萬生同大塊搶榆不羨培風背青丘已吞雲夢芥黄河復繚天門帶長譏韓子隘且陋一飽鯨魚何足膾東坡也是可憐人披抉泥沙收細碎逝將歸休八節灘又欲往釣七里瀨正似此魚逃網中未與造物逰數外且將新句調二子湖上秋髙風月㑹為君更喚木腸兒脚扣兩舷歌小海九月十五日觀月聽琴西湖一首示坐客白露下衆草碧空巻㣲雲孤光為誰來似為我與君水天浮四坐河漢落酒樽使我氷雪腸不受麴蘖醺尚恨琴有絃出魚亂湖紋哀彈本舊曲妙耳非昔聞良時失俯仰此見寧朝昏懸知一生中道眼無由渾復次前韻謝趙景貺陳履常見和兼簡歐叔弼兄弟能詩李長吉識字揚子雲端能居此府坐歗獲兩君逝將江湖去浮我五石樽眷焉復少留尚為世所醺或勸莫作詩兒軰工織紋朱絃寄三歎未害俗耳聞共尋兩歐陽伐薪照黄昏是家有甘井汲多終不渾送歐陽主簿赴官韋城四首鳳雛驥子日相髙白髪蒼顔笑我曹讀遍牙籖三萬軸却來小邑試牛刀出處年來恨不齊一樽臨水記分携江湖咫尺吾將老汝潁東流子却西白馬津頭春水來白魚猶喜似江淮使君已復氷堂酒更勸重新畫舫齋道傍垂白定沾巾正似當年緑髪新故國依然喬木在典刑復見老成人泛潁我性喜臨水得潁意甚竒到官十日來九日河之湄吏民笑相語使君老而癡使君實不癡流水有令姿遶郡十餘里不駛亦不遲上流直而清下流曲而漪畫船俯明鏡笑問汝為誰忽然生鱗甲亂我鬚與睂㪚為百東坡頃刻復在兹此豈水薄相與我相娛嬉聲色與臭味顛倒眩小兒等是兒戲物水中少磷淄趙陳兩歐陽同㕘天人師觀妙各有得共賦泛潁詩六觀堂老人草書詩物生有象象乃滋夣幻無根成斯須方其夣時了非無泡影一失俯仰殊清露未晞電已徂此滅滅盡乃真吾云如死灰實不枯逢塲作戲三昧俱化身為醫忘其軀草書非學聊自娛落筆已喚周越奴蒼䑕奮髯飲松腴剡藤玉板開雪膚逰龍天飛萬人呼莫作羞澁羊氏姝六觀取金剛經夢幻等六物也老人僧了性精於醫而善草書下筆有逺韻而人莫知貴故作此詩次韻劉景文見寄淮上東來雙鯉魚巧將書信渡江湖細㸔落墨皆松瘦想見掀髯正鶴孤烈士家風安用此書生習氣未能無莫因老驥思千里醉後哀歌缺唾壺次韻趙景貺督兩歐陽詩破陳酒戒商也哀未㪚嵗月忽已秋祥琴雖未調餘悲不敢留矧此乃韻語未入金石流羲之生五之總角出銀鈎吾家有二許下筆兩不休君言不能詩此語人信不千鍾斯為堯百榼斯為丘陋矣陶士衡當以大白浮酒中那有失醉則不驚鷗明當罰二子已洗兩玉舟叔弼云履常不飲故不作詩勸履常飲我本畏酒人臨觴未嘗訴平生坐詩窮得句忍不吐吐酒茹好詩肝胃生滓汙用此較得䘮天豈不足付吾儕非二物嵗月誰與度悄焉得長愁為計已大誤二歐非無詩恨子不飲故強為釂一酌將非作愁具成言如皦日援筆當自賦他年五君詠山王一時數臂痛謁告作三絶句示四君子公退清閒如致仕酒餘歡適似還鄉不妨更有安心病卧㸔縈簾一炷香心有何求遣病安年來古井不生瀾祇愁戲瓦閒童子却作泠泠一水看小閣低窓卧晏温了然非黙亦非言維摩示病吾真病誰識東坡不二門到潁未幾公帑已竭齋廚索然戲作數句我昔在東武吏方謹新書齋空不知春客至先愁予采杞聊自誑食菊不敢餘嵗月今幾何齒髪日向踈幸此一郡老依然十年初夢飲本來空真飽竟亦虛尚有赤脚婢能烹頳尾魚心知皆夢耳慎勿歌歸歟景貺履常屢有詩督叔弼季黙唱和已許諾矣復以此句挑之君家文律冠西京旋築詩壇按酒兵袖手莫輕真將種致師須得老門生明朝鄭伯降誰受昨夜條侯壁已驚從此醉翁天下樂還應一舉百觴傾文忠公贈蘇梅詩云我亦願助勇鼓旗譟其旁快哉天下樂一釂宜百觴贈月長老天形倚一笠地水轉兩輪五覇之所運毫端栖一塵功名半幅紙兒女浪苦辛子有折足鐺中容五合陳十年此中過却是英特人延我地爐坐語軟意甚真白灰如積雪中有紅麒麟勿觸紅麒麟作灰維那瞋拱手但黙坐墻壁方諄諄今宵恨客多汙子白㲲巾後夜當獨來不煩主與賔蒲團坐紙帳自要觀我身次韻荅錢穆父以軾得汝陰用杭越唱酧韻作詩見寄大耿疲勞已離羣小馮慈愛且當門軾本以舍弟親嫌請郡玉堂不著扶犁手霜鬢偏宜畫鹿轓豪傑雖無兩王繼子直深父風流猶有二歐存叔弼季黙清詩已入新歌舞要使邦人識雅言韓退之孟郊墓銘云以昌其詩舉此問王定國當昌其身耶昌其詩也來詩下語未契作此荅之昌身如飽腹飽盡還復饑昌詩如膏面為人作容姿不如昌其氣鬱鬱老不衰雖云老不衰劫壞安所之不如昌其志志一氣自隨養之塞天地孟軻不吾欺人言魏勃勇股栗向小兒何如魯連子談笑却秦師慎勿怨謗䜛乃我得道資淤泥生蓮華糞壤出菌芝賴此善知識使我枯生荑吾言豈須多冷暖子自知送歐陽推官赴華州監酒我觀文忠公四子皆超越仲也珠徑寸照夜光如月好詩真脱兎下筆先落鶻知音如周郎議論亦英發文章乃餘事學道探𤣥窟死為長白主名字書絳闕熙寧之末仲純父見僕於京城之東曰吾夣道士持告身授吾曰上帝命汝為長白山主此何祥也明年仲純父没傷心清潁尾已伴白鷗没喜見三少年俱有千里骨千里不難到莫遣歴塊蹶臨分出苦語願子書之笏十月十四日以病在告獨酌翠柏不知秋空庭失摇落幽人得嘉蔭露坐方獨酌月華稍澄穆霧氣尤清薄小兒亦何知相語翁正樂銅爐燒柏子石鼎煑山藥一盃賞月露萬象紛醻酢此生獨何幸風纜欣初泊逝逃顔蹠網行赴松喬約莫嫌風有待漫欲戲寥廓泠然心境空髣髴來笙鶴獨酌試藥玉酒琖有懷諸君子明日望夜月庭佳景不可失作詩招之鎔鈆煑白石作玉真自欺琢削為酒盃規摹定州瓷荷心雖淺狹鏡面良渺瀰持此夀佳客到手不容辭曹侯天下平定國豈其師一飲至數石温克頗似之風流越王孫詩酒屢出竒喜我有此客玉盃不徒施請君詰歐陳問疾來何遲呼兒掃月榭扶病及良時歐季黙以油煙墨二丸見餉各長寸許戲作小詩書窓拾輕煤佛帳掃餘馥辛勤破千夜收此一寸玉癡人畏老死腐朽同草木欲將東山松湼盡南山竹墨堅人苦脆未用歎不足且當注蟲魚莫草三千牘明日復以大魚為餽重二十觔且求詩故復戲之漢庭九尺人誰似老方朔那將一寸金令足三冬學餉魚欲自洗鱗尾光卓犖我是騎鯨手聊堪充鹿角和趙景貺栽檜汝陰多老檜處處屯蒼雲地連丹砂井物化青牛君時有再生枝潁之靈壇觀亦有再生檜還作左紐紋王孫有古意書室延青芬應憐四孺子不墮凡木羣體備松柏姿氣含芝术薰初扶鶴立骨未出龍纒筋巢根白蟻亂網葉秋蟲紛乃知蔽芾初甚要封植勤他年皮三寸狐䑕了不聞葉待制求先墳永慕亭詩靈區有異産化國無潜珍承平百年間簮纓半齊民建溪富竒偉葉氏初隱淪森然見喬木其下維徳人佳哉鬱葱葱氣若鳳與麟聯翩出儒將豈惟十朱輪新松無鹿觸舊柏有烏馴待公歸上冢淚葉乃肯春與趙陳同過歐陽叔弼新治小齋戲作江湖渺故國風雨傾舊廬東來三十年愧此一束書尺椽亦何有而我常客居羨君開此室容膝真有餘拊牀琴動摇弄筆忩明虛後夜龍作雨天明雪填渠時方禱雨龍祠作此句時星斗燦然四更風雨大至明日乃雪夣回聞剥啄誰乎趙陳予添丁走沽酒通徳起挽蔬主孟當啗我玉鱗金尾魚一醉忘其家此身自蘧蒢聚星堂雪并敘元祐六年十一月一日禱雨張龍公得小雪與客㑹飲聚星堂忽憶歐陽文忠公作守時雪中約客賦詩禁體物語於艱難中特出竒麗爾來四十餘年莫有繼者僕以老門生繼公後雖不足追配先生而賔客之美殆不減當時公之二子又適在郡故輒舉前令各賦一篇以為汝南故事云窓前暗響鳴枯葉龍公試手行初雪暎空先集疑有無作態斜飛正愁絶衆賔起舞風竹亂老守先醉霜松折恨無翠袖㸃横斜祇有㣲燈照明滅歸來尚喜更鼓永晨起不待鈴索掣未嫌長夜作衣稜却怕初陽生眼纈欲浮大白追餘賞幸有回颷驚落屑模糊檜頂獨多時歴亂瓦溝裁一瞥汝南先賢有故事醉翁詩話誰續説當時號令君聽取白戰不許持寸鐵歐陽叔弼見訪誦陶淵明事歎其絶識叔弼既去感慨不已而賦此詩淵明求縣令本縁食不足束帶向督郵小屈未為辱翻然賦歸去豈不念窮獨重以五斗米折腰營口腹云何元相國萬鍾不滿欲胡椒銖兩多安用八百斛以此殺其身何趐抵鵲玉往者不可悔吾其反自燭喜劉景文至天明小兒更傳呼髯劉已到城南隅尺書真是髯手迹起坐熨眼知有無今人不作古人事今世有此古丈夫我聞其來喜欲舞病自能起不用扶江淮旱久塵土惡朝來清雨濯鬢鬚相㸔握手了無事千里一笑無乃迂平生所樂在吳㑹老死欲葬杭與蘇過江西來二百日冷落山水愁吳姝新堤舊井各無恙參寥六一豈念吾别後新詩巧摹寫袖中知有錢塘湖禱雨龍公既應劉景文有詩次韻張公晚為龍抑自龍中來伊昔風雲㑹咄嗟潭洞開精誠茍可貫賔主真相陪洞簫振羽舞白酒浮雲罍言從闗洲妃逺去焦氏臺倒傾瓶中雨一洗麥上埃破旱不論功乘雲却空回嗟龍與我軰用意豈逺哉使君今子義英風冠東萊笑説龍為友幽明莫相猜劉景文家藏樂天身心問荅三首戲書一絶其後淵明形神自我樂天身心相物而今月下三人他日當成幾佛西湖戲作一士千金未易償我從陳趙兩歐陽舉鞭拍手笑山簡祇有并兒一葛強送歐陽季黙赴闕先生豈止一懷祖郎君不減王文度膝上幾日今白鬚令我眼中見此父汝南相從三晦朔君去苦早我來暮霜風淒𦂳正脱木潁水清淺可立鷺莫辭白酒瀉香泉已覺扁舟掠新渡坐看士衡執别手更遣夣得出竒句郎君可是筦庫人乃使驥騄隨蹇步置之行矣無足道賢愚豈在遇不遇用前韻作雪詩留景文萬松嶺上横千葉載酒年年踏松雪劉郎去後誰復來花下有人心斷絶東齋夜坐搜雪句兩手龜拆霜須折無情豈亦畏嘲弄穿簾入戸吹燈滅紛紛兒女爭所似碧海長鯨君未掣朝來雲漢接天流顧我小詩如㸃纈歐陽趙陳在戸外急掃中庭鋪木屑交逰雖似雪柏堅聚散行作風花瞥晴光融作一尺泥歸有何事真無説泥乾路穏放君去莫倚馬蹄如踣鐵和劉景文見贈元龍本志陋曹吳豪氣崢嶸老不除失路今為噲等伍作詩猶似建安初西來為我風黧面獨卧無人雪縞廬留子非為十日飲要令安世誦亡書和劉景文雪占雨又得雪龜寧欺我哉似知吾軰喜故及醉中來童子愁氷硯佳人苦膠盃那堪李常侍入蔡夜銜枚次前韻送劉景文白雲在天不可呼明月豈肯留庭隅怪君西行八百里清坐十日一事無路人不識呼尚書但見凛凛雄千夫君一馬兩僕率然相訪逆旅多呼尚書意謂君都頭也豈知入骨愛詩酒醉倒正欲蛾睂扶一篇向人寫肝肺四海知我霜鬢鬚君前有詩見寄云四海共知霜鬢滿重陽曾挿菊花無歐陽趙陳皆我有豈謂夫子駕復迂邇來又見三黜柳共此暖熱餐氊蘇酒殽酸薄紅粉暗祇有潁水清而姝一朝寂寞風雨散對影誰念月與吾郡中日與歐陽叔弼趙景貺陳履常相從而景文復至不數日柳戒之亦見過賔客之盛頃所未有然不數日叔弼景文戒之皆去矣何時歸㠶泝江水春酒一變丼棠湖景文近卜居九江近丼棠湖以屏山贈歐陽叔弼漫郎天骨清生與世俗異學道新有得為貧聊復仕每於紅塵中常起青霞志屏山輟贈子莫遣汙簮珥寓目紫翠間安眠本非睡夣中化為鶴飛入長松寺新渡寺席上次趙景貺陳履常韻送歐陽叔弼比來諸君唱和叔弼但袖手旁睨而已臨别忽出一篇頗有淵明風製坐皆驚歎神屠不目全妙額惟粧半更刀乃族庖倚市必醜悍平生魏公籌忽斵郢人墁詩書亦何用適道須此館多言雖數窮㣲中或排難子詩如清風翏翏發將旦胡為久閉匿綺語真自患許時笑我癡隔屋相咏歎竟識彦道否絶呌呼百萬清朝固多士人門子皆冠莫言清潁水從此隔河漢異時我獨來得魚楊柳貫持歸不忍食尺素解悽斷中有清圓句銅丸飛柘彈春愁結凌澌正待一笑泮百篇儻寄我呻吟鄭人緩東坡全集巻十九
