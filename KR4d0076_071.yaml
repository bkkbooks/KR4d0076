body:
  text: 東坡全集巻七十一宋蘓軾撰啓六十四首謝制科啓軾以薄材親承大問論議羣起予奪相乘不意聖恩之曲加猶獲從吏之殊寵伏讀告命重積震惶嘉其愛君之心期以克終之譽辭不獲命媿無以堪某生於逺方性有愚直幼承父兄之餘訓教以强已而力行雖為朝廷之直臣常欲挺身而許國位卑力薄自許過深言發譴生事勢宜爾追尋䇿問之㣲意實皆安危之大端自謂不及則曰志勤道逺開其不諱則曰無悼後害竊以制䇿之及此又念科目之謂何罄其平時之所懐猶懼不足以仰對言多迂闊罪豈容誅伏以國家取人之科惟是剛柔適中之士太剛則惡其猖狂不審太柔則畏其選懦不勝將求二者之中屬之以事固非一介之賤所或能當某之不才過乃由此然而訐切憤悱為知士之所不許因循鹵莽又有國之所樂聞使舉世將以從容而自居則天下誰當以奮發而為意此蓋某官羽翼盛時冠冕多士思盡芻蕘之議以明寛厚之風羇危之所恃以為無憂紛紜之所恃以為定論顧惟無似尚辱甄收感恩至深求報無所昔者西漢之盛莫如文景孝武之賢制䇿所興世稱晁董公孫之對然而數子者頌詠徳美而不及其譏刺故三帝者好愛文字而無聞於寛容豈其時君不可為之深言抑其羣臣亦將有所不悦某才雖不逮時或見容非懐爵禄之榮竊喜幸㑹之至答杭州交代林待制啓伏審知府鈐轄待制新易節旄光臨督府舊政已孚於千里先聲坐振於七州軾偶以庸虛適相前後愧無毫髪之善可紀斯民惟有凋瘵之餘以遺君子即諧瞻奉尤切詠思答館職啓伏審奉詔明廷陞華冊府國有得賢之慶士知稽古之榮虎觀石渠極諸儒之妙選鼇宫金闕笑方士之逺求自喜衰年獲觀盛事某官學本自得道惟造深温故為君子之儒多聞推益者之友竒字可學知子雲之苦心亡書復存賴安世之黙識不試而用知賢則深軾方此賜環遽承枉駕沐誨音之已厚愧馳謁之未遑與潁州運使劉昱啓衰病倦遊乆懐歸意聖神寛假特乞守符條教闊疎溪湖清逺但坐糜於廩禄顧難繼於賢豪所幸仁明曲垂存撫特先䝉於顧盼使増重於吏民伏惟運使郎中才簡上心名高省闥暫屈外臺之寄一蘇右輔之民日望車塵按臨封部少奉誨言之末足為衰朽之光感佩之私筆舌難既揚州到任謝執政啓擇地而來本非臣子之逹節有求必獲足見廟堂之兼容釋汝潁之清閒當江淮之衝要舊㳺所樂習俗相諳巳見吏民具述朝廷之意不為條教自然獄市之清此蓋伏遇某官師保斯民蓍龜當代折衝禦侮巳獲萬人之英補隙輔疎更收一木之用軾敢不益求民瘼勉盡鄙才但未歸田之須臾猶思報國之萬一答晁發運及諸郡啟衰病交攻巳安僻壤寵光荐及復付名邦雖見吏民敢違條教尚縁大庇使獲少安此蓋伏遇某官忠厚有容髙明畢照樂善忘勢稍霽外臺之威講舊論心曲敦同牓之好餘人某官忠厚有容通明畢照朝髙雅望流風采之聳聞士誦徳言借光華於枯朽致兹疎拙粗免曠瘝愧展奉之未皇但緘藏之無斁賀彭發運啟伏審拜詔十行觀風六路允符公論克振先聲恭承曩契之隆得與屬城之末瞻依有素感慰居多伏惟發運吏部年兄士聳英風時推舊徳用久淹而未盡才厯試而愈髙船滿潭中行奏韋堅之課錢流地上佇觀劉晏之能喜抃之深力占難盡答杜侍郎啟伏審荐膺天寵榮貳卿曹士友喜於彚征朝廷為之増重伏惟兵部侍郎温文亮達宏逺清通直道不回貫今昔而無愧處躬自厚蹈世俗之所難事愈練而益明用雖晚而必濟自聞休命實起懦衷遽承問訊之先益佩謙光之過謝本路監司啓多病早衰屢有江湖之請誤恩過聽遂分疆埸之憂才無取於折衝愧已深於卧鎮敢縁厚徳尚許兼容伏惟某官名重縉紳望隆中外承宣帝澤民忘流殍之災肅振臺風吏若親臨之畏顧惟朽鈍得奉教條但交欣悚之懐莫罄瞻依之頌上監司謝禮啓燕南趙北昔為百戰之塲地利人和今乃四夷之守觀累朝之命帥皆一代之名臣豈謂寵榮曲加疲陋顧吏民之易治幸衰拙之少安此蓋伏遇某官碩徳庇民宏才緯世餘膏所燭常分無盡之光䝉霧而行坐獲不知之潤眷言朽鈍未遂顛擠勉加䇿勵之勤少答吹揚之賜賀鄰帥及監司冬至啓月臨天統首冠於三正氣兆黄宫復來於七日候㣲陽之協應知君子之彚征伏惟某官碩徳庇民傑才經世踐揚中外之寄益推望實之隆既醉太平實具周詩之福大有上吉允符羲易之占軾限以守邊未遑稱慶徒云善頌莫罄鄙懐賀隣帥及監司正旦啓新厯既頒蓋履端歸餘之嵗羣情交泰正賛陽出滯之辰恭惟某官厚徳鎮浮高名華國非獨疇咨之用已簡上心更膺難老之祥以符民望官守所限展慶無由欣頌之深敷陳罔既答丁連州朝奉啓七年逺謫不知骨肉之存亡萬里生還自笑音容之改易乆恬颶霧稍習蛙蛇自疑本儋崖之人難復見魯衛之士而况清時雅望令徳高標固已聞名而自慙蓋欲通書而未敢豈謂知郡朝奉仁無擇物義有逢時每憐遷客之無歸獨振孤風而愈厲固無心於集菀而有力於嘘枯逺移一紙之書何啻百朋之錫過情之譽雖知無其實而愧于中起廢之文猶欲借此言以華其老窮途易感永好難忘答陳提刑啓乆竄島夷偶未書於鬼録逃歸空谷固喜聞於足音况清廟瑚璉之姿為明堂杞梓之用欲聞名而未敢豈流問之或先恭惟提刑刑部才高一時望重多士魯諸儒之徳業縁飾政刑漢循吏之風流本源經術暫屈雲霄之歩來蘇嶺嶠之民憐遷客之無歸墜尺書而起廢助其羽翼借以齒牙但憂枯朽之餘難副吹嘘之力既感且怍不知所云答彭賀州啓竄流海國脱身羈鬼之林洒掃真祠拜賜散人之號喜歸田之有漸悼報國之無期方自愧於心顔敢聞名於左右豈謂某官曲敦雅好深軫窮途賜以尺書借之餘論温詞曲盡賢於十部之見臨陋質増華果已五漿之先餽但慙衰朽虛辱品題敬佩至言永以為好答臨江軍知軍王承議啓泮水受成繆膺桑梓之敬海邦畫諾又觀枳棘之栖多難百罹流年半世怳如昨夢復見故人伏惟知郡承議居以才稱進由徳選淵源師友舊仰鄭公之高歌詠風流近傳邵父之繼不忘疇昔曲賜拊存豈獨憐衰朽而借餘光蓋將敦風義以勵流俗感佩之至筆舌難周答王幼安宣徳啓俯仰十年忽焉如昨間關百罹何所不有頃者海外澹乎蓋將終焉偶然生還置之勿復道也方將求田問舎為三百指之養杜門靣壁觀六十年之非豈獨江湖之相忘蓋已寂寥而䘮我不謂某官講修舊好收録陳人粲然雲漢之章被此枯朽之質欲其洗濯宿負激昂晚節粗行平生之志少慰朋友之望此意厚矣我心悠哉如焦榖芽如伏櫪馬非吹嘘之所及縱鞭䇿以何加藏之不忘永以為好求婚啓結褵早嵗已聨昆弟之姻親垂白南荒尚念子孫之嫁娶敢憑良妁徃欵高閎軾長子某之第二子符天質下中生有蓬麻之陋祖風綿邈庶幾弓冶之餘伏承故令弟子立先輩之愛女第十四小娘子稟粹徳門教成家廟中郎墳典之付豈在他人太真姑舅之婚復見今日仰縁夙契祗聽俞音定州到狀得請近藩假塗治境即諧披奉預切忻愉謝交代趙祠部啓近審新命屈領此邦名實所加吏民交慶夫何駑蹇之歩偶兹糠粃之先雖甚内慙實為大幸恭惟某官清名肅物雅望在人以博學而濟雄文以高才而行直道乆試蕭生於馮翊猶煩長孺於淮陽眷此東原幾為大澤尚呻吟之未復豈罷陋之所堪望公之來以日為嵗祝頌之素寫述難周賀孫樞宻啓伏審對揚綸綍進領樞機道不虛行必賴股肱之力人惟求舊允符夷夏之瞻恭惟某官徳充山甫之將明氣備孟軻之剛大聲華傾於衆望功業見乎有為擁節常山逺過長城之備剸繁京兆遂令鳴鼓之稀公議益崇貴名愈白用致非常之命以圖保大之勲惟時運籌既壯王猷之塞佇觀秉軸更増帝載之熈某限以郡符阻趣墻仞欣抃之至徒切下懐回列郡守倅啓祗奉詔恩出臨邊寄愧非才之難强託餘庇以少安豈謂仁私過形存問感佩之至宣寫莫周賀列郡知通賀冬啓日旋南極氣兆黄宫竊惟視履之祥宜擁自天之祐未遑馳問先辱惠音感佩之誠敷述罔既回列郡守倅賀年啓新厯既頒羣情交泰過䝉流問祗服寵光永惟嗣嵗之興必享宜民之禄徒深頌咏莫罄敷陳謝監司啓二首近審下車輒嘗進記徒欲聞名於將命未遑盡意以占詞不圖謙光遽錫褒寵感銘既切愧惕并深恭惟某官以舊徳之賢當聖朝之選恩足以濟法義足以理財先聲所臨公議同慶凡繄屬部實有賴於庇庥惟是孤蹤更曲䝉於優借此為過幸豈復勝言又伏念傾蓋若故雖自慰於宿心盡言非書故未紓於誠意即膺寵復實佩謙光退屬紛縈遂疎上記遽叨榮問徒益厚顔恭惟某官造道惟深養氣以直理財不愆於義行法不失其恩竊聆下風倍仰厚徳不圖幸㑹遽𨽻屬封吏畏民懐既仰安於明哲心勞政拙庶粗免於譴訶喜抃至深敷陳莫罄煩歊尚熾参對未期伏兾精頥别即迅召賀高陽王待制啓伏審顯奉恩綸榮更帥閫鎮武垣之衝要聨内閣之高華公議交俞貴名愈白恭惟某官膺天大任於時有為發揮才謀更厯事任道能濟而不過事雖難而不辭簡在聖心遂益柄任峻登祕近之直重易關防之雄有恩有威方結東人之愛允文允武更紆北顧之憂即觀成功進陟近輔賀青州陳龍圖啓伏審光奉詔書往司留憲漢恩予告暫優三最之勤商夢懐人方徯巨川之濟於公自計為喜可量伏惟某官文武憲邦忠嘉致主衆謂老成之託孰逾舊學之賢而乃力謀退安示有疾病揮金故里雖榮疏傅之歸雅意本朝日望蕭公之入無由追餞徒切瞻依謝惠生日詩啓伏䝉某官以某生辰特貽佳什允也風人之作燦然華衮之榮自省庸虚惟知愧汗雖大人占斯干之夢喜獲嘉言而弟子廢蓼莪之篇難忘永慕感佩之素敷染莫周謝求婚啓敢議婚姻蓋恃鄉閭之末遂忘門閥亦縁聲氣之同龜筮既從祖考咸喜伏承令子弟二小娘子慶闈擢秀豈獨衛公之五長而某第二子某駑質少文庶幾南容之三復恭馳不腆之幣永結無窮之歡悚抃於懐敷述罔既賀正啓伏以物壯則老肅役所以成嵗功否終必傾反復然後知天意凡在含生之類休有向榮之心恭惟某官履信體仁秉徳直義才無施而不可道得時而愈隆方當彚征元吉之辰宜享既醉太平之福某限居官守阻候門墻瞻頌之深敷宣罔既賀冬啓伏以候緹室之清宫瞽告以日卜臺觀之黄祲史書有年共安消長之來以待隂陽之定恭惟某官才猷傑異道徳深醇靖共正直之休順獲天人之助某恪守官次阻稱壽觴坐馳傾向之心莫罄安榮之遇賀正啓伏以葦桃在尸磔攘以餞餘寒椒柏稱觴燔烈以興嗣嵗在時為泰與物咸新恭惟某官徳治斯民才高當世迹難淹於外補望已隆於本朝慶此朋來之辰必有彚征之福某官守所繫展謁無階頌咏之深敷寫難盡謝孫舎人啓拜命中宸代言西掖聳聞中外交慶士夫竊惟二聖之心蓋以多士為急滅烽仆鼓而以將帥為籓垣抵璧捐金而以公卿為帑廩蓋樽爼有折衝之恃則藜藿無見採之憂某官瑚璉之才杞梓其用學不專於為已才已效於臨民穆如清風草木皆靡炳然白日霰雪自消兹為收拾之儲豈特絲綸之任不遺衰朽過辱緘封永敦為好之懐深負難酬之作謝吕學士啓文學之選人才所難邇無世禄之嫌逺絶茅衡之棄矧此國家養賢之地豈為儒者竊禄之私某官學古入官修身以道志本為已行浮於名直諒多聞固可追於益友文史足用曾不愧於古人果膺選掄益登清要未遑馳問先辱惠音答新蘇州黄龍圖啓伏審光膺詔函移牧吳㑹先聲所被惠政已孚自顧妄庸敢論疇昔既聮法從之末又竊鄰光之餘金華玉堂帝左右之高選武林茂苑江東南之要籓雖才分闊絶於賢愚而歩武差池於先後其為喜幸宜倍等流伏惟某官文秀士林才任國器學已試而可用望乆養而益隆偃息均勞叔度莫窺於萬頃治行稱首次公行踐於三槐潤澤所加迂愚有託辱移書之周厚實借寵於衰遲銘感之深筆舌難喻賀提刑馬宣徳啓奉命按刑捧節入境吏民相慶已戴二天之仁衰病自私獨先一日之雅恭承榮問有激懦衷伏惟某官才映士林望高朝論治行聳聞於中外家聲洋溢於縉紳眷三吳之疲民困連年之積潦疇咨明哲宣布厚恩匪惟凋瘵之獲蘇抑亦庸虚之知勉其為喜幸豈易名言答曾舎人啓伏審顯膺制命榮進掖垣風聲所加中外同慶伏以取才之道自昔為難惟君子之所為固衆人之莫識奢儉異俗不害徐公之有常用舎皆天孰知令尹之無喜某官異材秀出博學名家世以文鳴逺繼父兄之業早縁徳進簡在裕陵之心今乃援而進之論者惜其晚矣訓詞一出皆丹青潤色之文老拙自降有糠粃在前之歎過䝉寵顧辱示華牋恨無酬徳之言徒有得賢之慶感忭之素寫述難周答秀州胡朝奉啓伏審初見吏民首行條教鄰封甚邇欣謡頌之藹然緘牘先䝉愧勞謙之過矣某官望推朝論才映士林用已試於盤根所居見紀政方觀於餘地不令而行某待罪江湖茍安衰病眷言一郡幸擊柝之相聞矜式百為知伐柯之不逺其為欣詠難盡名言上虢州太守啓伏審光奉宸恩寵分郡寄惟此山河之勝宜膺師帥之權凡在庇庥莫不欣抃切以𢎞農故地虢國舊邦周分同姓之親唐以本支為尹富庶雅高於二陜鶯花不謝於三川韓公三十一篇風光咸在賈島五十六字景色如初有洪淄灌溉之饒被女郎雲雨之施四時無旱百物常豐寳産金銅充仞諸邑良材松栢贍給中都至於事簡訟稀瀟灑有道山之况魚肥鶴浴依稀同澤國之風自匪巨賢不輕假守故來者未嘗淹乆而優恩已見遷除非總一路之轉輸則入六曹而侍從前人可考新命何疑伏惟御府某官學造淵源道升堂奥精祲盡天人之藴高明窮性命之㣲中外屢更功名茂著銅虎暫淹於百里朱轓聊寄於三堂仰望旌麾俯臨民社共徯星言而夙駕思承道化乎其民某仕版寒蹤賔僚俗吏乆仰圭璋之望素欽星斗之名豈謂此時獲依巨庇惟良作牧已興來暮之歌謡有隕自天惟恐别膺於綸綍無任丹懇倍切馳情賀年啓二首效五物以觀雲咸知嵗美備八能而合樂益驗人和伏惟某官進徳及時宜民受禄肇履三陽之應求膺百順之歸未遂披承徒増欣詠又三陽應律萬寳向榮永惟視履之祥宜獲自天之祐未遑展慶徒切頌言高麗大使逺迎啓伏審觀光魏闕自忘浮海之勤授館吳都將有披雲之幸過承謙徳先枉華緘感荷之深誦言莫既副使啓伏審祇率邦常來修方貢適此海隅之守得瞻使節之華首辱緘縢過形謙抑其為感怍難盡名言謝大使土物啓伏審揚舲造朝弭節就舎歸時事於宰旅方勞逺勤發私幣於公卿亦䝉見及莫遑辭避但切感銘謝管設大使啓鳴鹿食野方主禮之粗陳驪駒在門歎賔歡之莫盡遽辱移書之重益慙為具之疎即遂願言徒増銘佩副使啓伏審舎館初定徒馭少休粗接賔歡方愧餼牽之陋曲敦私好特班琛貢之餘感佩於懐愧怍無量謝副使啓伏以裴回弭節必忘靡盬之勤笑語飛觴深懐不腆之愧過承榮問益荷謙勤感佩於衷筆舌難盡罷登州謝杜宿州啓桑榆晚景忽䝉收録之恩山海名邦得竊須臾之樂自非明哲少借餘光内自顧其空踈必難逃於曠敗某官高風肅物雅望應時既愷悌以宜民亦儒雅而飾吏每假齒牙之論曲成羽翼之私感佩良深敷述奚既杭州到狀得請支郡備員屬城幸兹衰病之餘託在庇庥之末即諧瞻奉預切欣愉賀王發運啓伏審榮膺制檢總領漕權惨舒六路之民表裏大農之政風聲所暨忻悚交并恭惟某官學術過人忠嘉許國暫屈分符之寄已膺側席之思乃眷東南欲少蘇於疲瘵無心内外當益罄於謀維凡在庇庥豈勝歡慰賀新運使張大夫啓一本作賀葉運使伏承抗旌入境揆日臨民方一節之風馳已列城之雲靡矧惟雅故尤激懽悰伏惟某官早以異材著聞美績議法造令乆禆於廟謀宣化承流益試之民事自聞新命實慰輿情再惟衰朽之餘得荷寛明之庇其為厚幸未易䆒陳著聞美績下四句一本作望高郎選粲列星之經躔華使周爰凜外臺之風采答喬舎人啓某聞人才以智術為後而以識度為先文章以華采為末而以體用為本國之將興也貴其本而賤其末道之將廢也取其後而棄其先用舎之間安危攸寄故議論慨慷則東漢多徇義之夫學術夸浮則西晉無可用之士興言及此太息隨之元祐以來真人在位並興多士以出異材眷惟淮海之英乆屈江湖之上迨兹顯擢實慰輿情伏惟某官名重儒林才為國器深厚爾雅非近世之時文直諒多聞葢古人之益友代言未幾華國著稱豈惟臺省之光抑亦邦家之慶過䝉疏示深服撝謙顧慙衰病之餘莫究欣承之意謝右史啓比者誤被聖恩軫及棄物起於貶所付以名藩牧養疲民曽未施於薄效躋攀近侍已再被於寵光禄既多則功不可㣲職既崇而責猶當重顧懇辭之莫獲念圖報之未能方以為憂敢辱見慶此蓋某官徳惟樂善志務達人重縁姻好之私賁以文詞之美捧讀數四退増愧慙屬春候之向和宜福禄之益固未遂披奉但切傾懐賀時宰啓伏審光膺考慎峻陟宰司孚號揚廷士識上心之所尚置郵傳命人知聖澤之將流靡不欣愉至於鼓舞恭以某官直方以大廣博而良進以正而正邦異乎求以求政貫六經百子之學煥三代兩漢之詞昴稟自殊偉蕭侯之八尺斗南莫競凜梁公之一人加以絶識見微曠度舉逺清心省事則法可使復結繩之約强本節用則貨可使若流泉之長材無不可範而成也譬泥之在鈞俗無不可易而善也猶風之靡草是皆還至而有效安見為事而無功蓋神考貽謀已完具而可按故成王纉要宜纎悉以勿加此大雅兼持而不移矧清衷圖任之愈篤豈繄疎逖所獨詠歌惟民罔知合語則聖凡有詔令率先惠慈固已遐邇爭傳室家胥慶顧此民逢此日之何幸謂吾相勸吾君以愛人歡聲格於九天乖氣消於萬彚在昔小國如彼景公損已一言退星三舎又况以禹湯大信之誥有䕫契同寅之言蠢爾憑生猶知助順赫然在上豈不降康某愚有赤心老無佞舌輒忘犯分顧欲輸誠然有難言是在精智蓋無交則莫與茍好謀則必成不惡而嚴匪怒伊教終成大賴豈曰自私伏念某遭時休明賦命衰薄蚤粗䝉於遴選比乆幸於退藏天雨何私笑流行之木偶滄溟不改嘆自蕩之波臣重以傾嵗周旋竊嘗撰屨末塗流落無復掃門豈賴補息劓黥彫杇糞朽出蔀見日去盆望天悵末力之將殫愧明恩之莫報乃利用安身之何有儻奉法循理之可為民社非輕猶承宣而惴惴天淵靡外亦戾躍以欣欣某限以在外不獲躬詣省庭預百執事賀鈞屏下情無任下財啓夙縁契好獲講婚姻顧門閥之雖㣲恃臭味之不逺敬陳納幣之禮以行奠鴈之儀庶徼福於前人永交歡於二姓答求親啓藐爾諸孤雖本軒裳之後閔然衰緒莫閒纂組之功伏承某人儒術飭修鄉評茂著許敦兄弟之好永結琴瑟之歡瞻望高門獲接登龍之峻恪勤中饋庶幾數馬之恭與邁求親啓里閈之㳺篤於早嵗交朋之分重以世姻某長子邁天資朴魯近憑遊藝之師傳賢小娘子姆訓夙成逺有萬石之家法聊申不腆之幣願結無窮之歡徐州謝鄰郡陳彦升啓受代膠西甫違仁庇分符泗上復託恩私祗見吏民布宣條教郡有溪山之樂庭無爭訟之煩曽何妄庸獲此僥倖此蓋某官紀綱千里儀表一方議論信於中朝予奪公於多士衰罷無術既常荷於兼容勉厲自將或無忝於知遇感懼之素敷染難宣湖州上監司先狀弭棹江郊聳聞風采馳神徳守若奉誨音欣抃之深敷宣莫究東坡全集巻七十一
