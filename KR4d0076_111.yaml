祗服恩私班荆館賜大遼賀正旦人使到闕御筵口宣元祐二年十一月四日有勑卿等夙抗使旌少休郊館乃眷川途之邈載惟驂馭之勞特賜燕私以旌懃瘁班荆館賜大遼賀興龍節人使酒果口宣元祐二年十一月九日有勑卿等逺乘使傳方造都門屬此寒凝乆於衝渉宜膺就賜之禮以示勞來之恩班荆館賜大遼賀興龍節人使御筵口宣元祐二年十一月十一日有勑卿等逺犯苦寒來修舊好載喜使華之近特申郊勞之儀服我恩私少留燕衎相州賜大遼賀正旦人使御筵口宣元祐二年十一月十六日有勑卿等篤修舊好少憇近邦屬氷雪之嚴凝念車徒之勤勩往加燕勞式示眷懐賜皇伯祖髙密郡王宗晟已下罷散興龍節道場香酒果口宣元祐二年十二月一日有勑卿等以義重宗藩志存忠愛先期誕月歸命佛乘逮兹法㑹之成宜有匪頒之寵宗暉以下同賜知樞密院事安燾已下罷散興龍節道塲酒果口宣元祐二年十二月一日有􅎁誕彌之慶綿宇所同矧我臣工方兹燕喜宜有柔嘉之賜以成豈弟之驩賜濟陽郡王曹佾罷散興龍節道塲酒果口宣元祐二年十二月一日有勑卿位重戚藩望隆耆徳歸誠覺苑増祝夀山宜有寵頒以昭厚眷賜殿前都指揮使燕達已下罷散興龍節道塲香酒果口宣元祐二年十二月一日有勑卿等志在愛君忠於衛上屬誕彌之紀慶修淨供以祈年宜有頒寵以旌勤意步軍副都指揮使苗授以下同賜知樞密院事安燾巳下罷散興龍節道塲香酒果口宣元祐二年十二月一日有勑彌月之祥敷天同慶協股肱之畢力延釋梵以祈年申以寵頒助其愷樂賜太師文彦博已下罷散興龍節酒果口宣元祐二年十二月二日有勑卿等以弼亮之重勤勞王家因誕慶之辰修崇法㑹宜頒芳㫖以示眷存賜大遼賀興龍節前一日内中酒果口宣元祐二年十二月二日有勑卿等抗旌就館已觀車騎之華奉幣造朝復歎威儀之美就加寵錫以示眷懃賜大遼賀興龍節十日内中酒果口宣元祐二年十二月二日有勑卿等奉幣講歡造廷稱夀嘉禮儀之閑習宜寵錫之便蕃受此珍甘以旌眷遇賜大遼賀興龍節朝辭訖歸驛御筵口宣元祐二年十二月二日有勑卿等使事既終陛辭而復少休賔館將整歸驂特示至懐更頒嘉燕賜大遼賀興龍節瀛洲回程御筵口宣元祐二年十二月二日有勑卿等已修舊好復改北轅雖候館之少休眷歸途之尚邈往頒燕俎以示至懐相州賜大遼賀興龍節使赴御筵口宣元祐二年十二月四日有勑卿等犯寒逺道弭節近邦少休夙駕之勞式示加籩之恵服我寵數以増使華相州賜大遼賀興龍節使副却回御筵口宣元祐二年十二月四日有勑卿等聘事告成還車言邁改轅北道弭節近邦眷言行役之勞宜有燕私之寵賜大遼賀興龍節人使射弓例物口宣元祐二年十二月六日有􅎁卿等懐四方之志挾五善之能終日射侯於是觀禮冝申寵錫以佐賔歡班荆館賜大遼賀興龍節人使回程御筵口宣元祐二年十二月六日有敕卿等已事言旋改轅兹始冐寒逺渉軫念良深少憇近郊復陳燕豆賜諸路臣寮春季銀鞋兼撫問口宣元祐二年十二月八日有勑卿等各竭乃心乆勞于外屬此寒凝之候永惟綏馭之懃式示眷存往加勞問撫問知大名府馮京口宣有勑卿以元老卧䕶北門寛我顧憂想勞綏御屬兹寒沍益務保頥賜大遼賀興龍節人使朝辭歸驛酒果口宣元祐二年十二月八日有勑卿等巳事言旋指期夙駕嵗寒逺道良用軫懐宜有寵頒以旌勤瘁賜大遼賀興龍節人使班荆館却回酒果口宣元祐二年十二月十日有􅎁卿等聘事已成征驂言邁往餞於館以華其歸仍有寵頒式昭厚眷班荆館賜大遼賀正旦人使到闕酒果口宣元祐二年十二月十日有勑卿等逺修鄰好來㑹嵗元乆涉氷塗少休郊館宜頒芳㫖以勞驂騑就驛賜大遼賀興龍節人使宴口宣元祐二年十二月十二日有勑佳辰紀慶聘事告成申勑臣鄰往就舍館同兹衎樂服我恵慈就驛使大遼賀興龍節人使宴花酒果口宣元祐二年十二月十一日有勑卿等逺勤使傳來慶誕辰臨遣重臣往頒燕俎仍加寵錫以示至懐賜大遼賀正旦使副銀䤬鑼等口宣元祐二年十二月十一日有勑卿等通兩國之懽不逺千里驅一乘之傳來慶三朝宜有寵頒以昭異眷相州賜大遼賀正旦人使却回御筵口宣元祐二年十二月十四日有勑卿等復理歸鞍少休輔郡念北轅之首路犯西陸之餘寒往致恩勤宜留燕衎賜大遼賀正旦人使却回雄州御筵口宣元祐二年十二月十四日有勑卿等逺勤郵傳冐渉氷霜眷言往復之勞巳次封圻之上冝頒嘉燕以示至懐賜大遼賀興龍節使副䤬鑼等口宣元祐二年十二月十八日有勑卿等解驂授館方講於鄰歡遣使勞來宜敦於主禮往加優錫以示眷懐賜大遼正旦人使生餼口宣元祐二年十二月二十四日有勑卿等郵傳逺勤舍館既定宜敦主禮以犒馭徒往錫餼牽少紓勞瘁送伴正旦使副沿路與賀北朝生辰并正旦使副相逢傳宣撫問口宣元祐二年十二月二十五日有勑卿等䘖命出使徂冬渉春適寒苦之倍常知勤勞之加舊勉驅郵傳來造㑹朝賜大遼賀正旦入賀畢使副就驛酒果口宣元祐二年十二月二十六日有勑卿等既勤闕庭少安館舍宜行慶賜以樂春朝往致甘芳式華觴豆賜大遼賀正旦入賀畢使副就驛御筵口宣元祐二年十二月二十六日有勑卿等逺抗使旃來陳慶幣眷東風之協應嘉上日之同歡宜就驛亭往頒燕豆賜大遼賀正旦使副前一日内中酒果口宣元祐二年十二月二十七日有勑方興嗣嵗既餞餘寒嘉鄰好之篤修念使華之少駐式頒珍異以示眷懐賜大遼賀正旦却回班荆館御筵口宣元祐二年十二月二十七日有勑卿等聘事既成歸途方啟言念改轅之始少留帳飲之歡往推恩懃下及徒馭賜大遼賀正旦朝辭訖歸驛御筵口宣元祐二年十二月二十七日有勑卿等寓館乆勤趨事告去不假壺觴之樂曷為徒馭之華服我恩私少留宴衎賜大遼賀正旦朝辭訖歸驛御筵酒果口宣元祐二年十二月二十八日有勑卿等聘事告成歸車夙駕屬此寒凝之末眷言往返之勤錫此珍芳以將寵遇東坡全集巻一百十一
