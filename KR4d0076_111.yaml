body:
  text: 東坡全集巻一百十一宋蘓軾撰内制口宣一百四十一首雄州撫問大遼國賀興龍節使副口宣元祐元年十月六日有勑卿等逺犯風埃久勤軺傳入疆兹始授館少安申命撫存式昭眷奬趙州賜大遼賀興龍節人使茶藥口宣元祐元年十月六日有勑卿等逺訪使軺來陳慶幣川途甚阻風霧可虞特示至恩往頒名劑賜正議大夫同知樞密院事安燾乞退不允批答口宣元祐元年十月十日有勑卿被遇先帝勤勞有年逮于眇躬倚注彌重宜安厥位毋重力詞賜宰臣吕公著生日禮物口宣元祐元年十月十六日有勑朕之元老生以兹辰實為邦國之華豈獨閨門之慶故命爾息往宣余懐仍分廐庫之良以助子孫之夀相州賜大遼國賀興龍節使副御筵口宣元祐元年十月十八日有勑卿等逺馳信幣來慶誕辰眷言四牡之勞宜享加籩之禮式頒寵數以示至恩趙州賜大遼國賀太皇太后正旦使副茶藥口宣元祐元年十月二十八日有勑卿等奉將邦幣馳㑹嵗元眷言夙駕之勤方次中塗之館宜頒靈劑以喻至懐趙州賜大遼國賀皇帝正旦使副茶藥口宣元祐元年十月二十八日有勑卿等逖修鄰好方次州封言念沍寒想勒跋履特頒名劑以示眷懐雄州白溝驛賜大遼賀正旦人使御筵口宣元祐元年十一月有勑卿等逺馳使節來慶春朝屬嵗律之凝嚴渉道塗之修阻宜頒宴衎以勞勤劬賜鎮江軍節度使判大名府韓絳詔書湯藥口宣元祐元年十一月九日有勑卿徳望之隆中外所屬誠請雖極輿論未安毋復懐歸以勤北顧特頌良劑以輔至和賜鎮江軍節度使判大名府韓絳詔書湯藥口宣元祐元年十一月十日有勑方面重寄無逾老成丘園歸休難遂雅意特頒珍劑以示至懐方此沍寒益加調養賜新除依前中大夫守中書侍郎吕大防辭免恩命不允斷來章批答口宣元祐元年十一月十一日有勑大政所闗西臺為重朕難其選無以易卿宜即欽承毋煩退避賜新除中大夫守尚書右丞劉摯辭恩命不允斷來章批答口宣元祐元年十一月十五日有勑卿嘉猷屢告清議所歸授受之間臣主無愧速起視事副朕所期賜正議大夫同知樞密院事安燾乞外郡不允斷來章批答口宣元祐元年十一月十六日有勑卿職在樞要表儀百官進當以禮退當以義今兹求退其義安在亟還視事毋復固辭班荆館賜大遼國興龍節人使赴闕口宣元祐元年十一月二十一日有勑卿等抗旌逺道弭節近郊乃眷勤勞良深軫念特頒燕衎以示恵慈班荆館賜大遼賀興龍節人使到闕酒果口宣元祐元年十二月初二日有勑卿等肅將信幣來慶誕辰眷言行李之勞宜有燕休之賜受兹芳㫖體我眷懐雄州賜大遼賀正旦人使迴程御筵口宣元祐元年十二月六日有勑卿等出疆繼好巳事言還跋履氷霜憇休館舍宜有燕私之寵以旌来往之勤賜河東路諸軍来年春季銀鞓兼傳宣撫問臣寮將校口宣元祐元年十二月七日有勑卿等從事邊陲服勤師律方踐更於春令諒率履於天和特有匪頒以昭眷遇送伴正旦使副㳂路與賀北朝生辰并正旦使副相見傳宣撫問口宣元祐元年十二月九日有勑卿等方冬出使涉春在塗逺犯風埃想勤跋履勉加鞭䇿即造㑹朝賜大遼賀正旦人使正月一日入賀畢就驛御筵口宣元祐元年十二月十一日有勑卿等逺飭使軺來修舊好屬此方春之旦宜均既醉之歡爰命燕胥以昭眷寵就驛賜大遼賀正旦人使銀䤬鑼唾盂盂子錦被褥等口宣元祐元年十二月十六日有勑卿等逺持信幣來慶春朝眷言行李之勞方兹舍館之定宜加頒賚用示寵嘉班荆館賜大遼賀正旦人使却囘御筵口宣元祐元年十二月十九日有勑卿等逺達使辭載嚴歸駟方改轅於北道暫弭節於都門益重眷懐往伸燕餞相州賜大遼賀正旦人使却囘御筵口宣元祐元年十二月二十二日有勑卿等嵗首奉觴禮成復命改轅之道弭節近藩宜錫宴私以彰眷寵就驛賜大遼賀興龍節人使迴程酒菓口宣元祐元年十二月二十四日有勑卿等抗旌旋復弭節少留風埃浩然徒馭徒止宜有珍芳之賜以昭眷寵之殊賜大遼賀正旦人使朝辭訖就驛御筵口宣元祐元年十二月二十五日有勑卿等來修舊好克備多儀既陛見以告辭將駕言而反命載嘉勤勩宜錫燕私班荆館賜大遼賀正旦人使迴程酒果口宣元祐元年十一月二十八日有勑卿等逺㑹春朝恪修鄰好既卒聘事豈無燕私宜就錫於加籩蓋式昭於異數撫問熈河蘭㑹路臣寮口宣元祐二年正月二十五日有勑卿等服勤疆埸賦政兵民言念劬勞實分憂顧特加存問以示眷懐撫問資政殿學士知楊州王安禮口宣元祐二年正月二十七日有勑卿久去廊廟出臨江淮綏懐流亡肅遏冦盜逺惟勤瘁特示撫存賜皇叔祖保信軍節度使安康郡王宗隠生日禮物口宣元祐二年正月四日有勑卿屬尊望重徳厚慶隆方誕育之令辰有匪頒之故事克膺夀祉永服寵光賜皇叔祖昭信軍節度使漢東郡王宗瑗生日禮物口宣元祐二年二月二日有勑卿爵齒既隆徳望斯稱載更誕日胥慶家庭式侑燕私以資夀祉寒節就驛賜于闐國進奉人御筵口宣元祐二年二月二日有勑汝等觀光上國述職遐方屬兹改火之辰想有懐歸之念宜頒燕衎以示恩私賜皇叔祖寧國軍節度使華原郡王宗愈生日禮物口宣元祐二年二月二十七日有勑卿望重宗盟徳隆藩服載協誕彌之旦光膺積慶之餘特示寵頒永綏夀祉賜新除保寧軍節度使馮京告勑詔書茶藥口宣元祐二年三月二十八日有勑全魏之寄舊徳為宜勉即征途以答民望往頒珍劑昭示眷懐賜鎮江軍節度使充集禧觀使韓絳詔書茶藥口宣元祐二年三月二十八日有勑卿徳齒俱髙誠請彌確重以民事久勞元臣既飭還車宜頒珍劑尚加調養以副眷懐賜太師文彦博乞致仕不允批答口宣元祐二年三月二十九日有勑卿徳望冠於累世風采聞於四夷方兹仰成倚以為重退老之請所未欲聞賜宰相吕公著乞退不允批答口宣元祐二年三月二十九日有勑卿柱石本朝蓍龜當代方兹注意實所仰成宜體朕心姑安其位賜交州進奉人朝見訖就驛御筵口宣元祐二年四月五日有勑汝等恭持方物來欵塞垣冐渉修途觀光上國宜頒燕勞以示恩私白溝驛賜大遼賀坤成節人使御筵兼傳宣撫問口宣元祐二年四月十七日有勑卿等肅將慶幣逺渉修塗風埃浩然徒馭勤止宜頒燕衎以示眷懐賜尚書左丞李清臣乞退不允批答口宣元祐二年四月二十七日有勑卿綜轄樞機雍容廊廟義當體國謀豈先身往喻至懐少安舊服賜集禧觀使鎮江軍節度使開府儀同三司韓絳到闕生餼口宣元祐二年五月十二日有勑卿力辭繁劇歸即燕安想見老成渇聞嘉話特頒牢醴以勞驂騑班荆館賜大遼國賀坤成節人使到闕御筵口宣元祐二年六月二日有勑卿等肅將慶幣垂及都門逺渉暑塗想懃行李式頒燕衎以示恩私賜護國軍節度使檢校太師濟陽郡王曹佾生日禮物口宣元祐二年六月九日有勑卿世濟勲勞徳隆藩戚屬此誕彌之日豈無燕喜之私膺我寵頒永増夀祉賜皇弟山南東道節度使開府儀同三司佖生日禮物口宣元祐二年六月十八日有勑卿以棣華之親襲瓜瓞之慶載臨誕日宜厚寵頒服我異恩永膺介福就驛賜大遼賀坤成節使副銀䤬鑼錦被褥等口宣元祐二年六月二十八日有勑卿等還持慶幣來講鄰歡徒馭少休舍館既定首膺寵錫當體眷懐賜皇伯祖彰化軍節度使髙密郡王宗晟生日禮物口宣元祐二年七月一日有勑卿徳茂宗枝望隆公袠推本流長之慶有嘉震肅之辰宜是寵頒以綏夀祉賜知樞密院事安燾巳下罷散坤成節御筵口宣有等卿等忠存體國義切戴君結妙果於三乘祝慈闈之萬夀宜膺寵錫以示眷存玉津園賜大遼賀坤成節人使射弓例物口宣元祐三年七月八日有勑卿等致命寳鄰出㳺禁籞爰敦射事以佐賔歡宜旌審固之能式厚珍良之賜賜大遼賀坤成節人使生餼口宣元祐二年七月八日有勑卿等逺涉修塗來陳慶幣舍館初定徒馭實勞宜錫餼牽以昭寵數相州賜大遼賀坤成節人使却迴御筵口宣元祐二年七月八日有勑卿等逺渉歸途再離秋暑駕言近郡少憇旋車宜示眷懷往頒燕俎瀛州賜大遼賀坤成節人使回程御筵口宣元祐二年七月十日有勑卿等抗旌來聘巳事言還方次邊城少休候館宜頒燕俎以勞歸驂賜大遼賀坤成節人使内中酒果口宣元祐二年七月十一日有勑卿等逺馳使傳申講鄰歡既執贄以造廷亦展幣而成禮宜加寵錫以示眷存賜太師文彦博巳下罷散坤成節道埸香酒果口宣元祐二年七月十一日有勑卿翊賛大猷倡先多士方慈闈之獻夀嚴法㑹以薦誠宜有寵頒以昭殊眷賜知樞密院事安燾已下罷散坤成節道場香酒果口宣元祐二年七月十一日有勑卿等同協忠嘉助成孝治方慈闈之獻夀嚴法㑹以薦誠宜有寵頒以昭殊眷坤成節就驛賜于闐國進奉人御筵口宣元祐二年七月十一日有勑汝等款塞觀光趨庭效貢屬誕彌之稱慶均燕衎以示慈祗服寵嘉式旌忠恪賜殿前都指揮使燕達已下罷散坤成節道場香酒果口宣元祐二年七月十一日有勑卿等同罄純忠力修勝果用祈慈夀既徹梵筵宜有寵頒以昭眷遇賜皇伯祖鎮南軍節度使開府儀同三司宗暉已下罷散坤成節道埸香酒果口宣元祐二年七月十二日有勑卿表率宗垣助成孝治祝延慈夀仰叩佛乘既畢梵筵宜加寵賚賜平海軍節度使駙馬都尉李瑋已下罷散坤成節道場香酒果口宣元祐二年七月十二日有勑卿等乃心王室同輸欲報之誠稽首佛乘共祝無疆之夀既成法㑹宜示寵頒賜皇叔楊王荆王醴泉觀罷散坤成節道場香酒果口宣元祐二年七月十二日有勑卿等徳冠邦家義兼臣子修勝縁於西竺祈夀嘏於南山宜有寵頒以成法㑹雄州撫問大遼使副賀坤成節口宣元祐二年七月十二日有勑卿等抗旃修好馳傳及疆逺涉暑途實勞驂馭特加存撫式示寵頒班荆館賜大遼賀坤成節人使回程酒果口宣元祐二年七月十六日有勑卿等繗成聘禮歸次都門復此少留逝將言邁宜頒餞斚以寵行驂賜皇叔楊王顥生日禮物口宣元祐二年七月十九日有勑卿屬尊魯衛徳重間平每臨載育之辰永錫無窮之慶宜膺寵數以介夀祺賜安燾辭免恩命不允斷來章批答口宣元祐二年八月五日有勑卿以舊徳簡在朕心成命既孚僉言咸穆宜即祗受毋煩固辭賜熈河秦鳳路帥臣并沿邊知州軍臣寮茶銀合兼傳宣撫問口宣元祐二年八月十日有勅卿等夙分邊寄深識敵情屬此盛秋勞於警備宜加寵賚以示眷懐賜熈河秦鳳路提刑轉運茶銀合兼傳宣撫問口宣元祐二年八月十日有勑卿持節宣風乆分憂寄調兵足食想極賢勞宜有寵頒以彰眷遇賜觀文殿大學士光祿大夫知永興軍韓縝茶銀合兼傳宣撫問口宣元祐二年八月十日有勑卿釋政廟堂均勞方靣兵民之重綏御實勞往諭至懐仍加寵賚賜皇弟武成軍節度使祁國公偲生日禮物口宣元祐二年八月十六日有勑卿棣華襲慶桐葉分封載臨震肅之辰特致夀康之祝其膺寵錫以介神休賜皇叔成徳荆南等軍節度使守太尉開府儀同三司荆王頵生日禮物口宣元祐二年八月二十日有勑卿以名世之傑居叔父之親乃眷良辰實鍾餘慶宜膺異數之禮永錫無疆之休賜宰相吕公著乞外任不允批答口宣元祐二年八月二十三日有勑全徳之老朕所仰成大義未安卿當畏去純忠所激微疾自除賜宰相吕公著乞罷相位不允斷來章批答口宣元祐二年八月二十八日有􅎁卿之在位為徳與民朕意不移徒煩屢請速起視事毋復固辭賜皇弟定武軍節度