body:
  text: 東坡全集卷一百四宋蘇軾撰志林四十六條古迹余舊過陳州留七十餘日近城可遊觀者無不至栁湖旁有丘俗謂之鐵墓云陳胡公墓也城濠水往嚙其址見有鐵錮之又有寺曰厄臺云孔子厄於陳蔡所居者其説荒唐在不可信或曰東漢陳思王寵教弩臺以控黃巾者此説為近之昨日讀隋書地理志黃州乃永安郡今黃州東十五里許有永安城而俗謂之女王城其説甚鄙野而圖經以為春申君故城亦非是春申君所都乃故吳國今無錫惠山上有春申廟庶幾是乎漢時講堂今猶在畫固儼然丹青之古無復前比自余所居臨臯亭下亂流而西泊於樊山為樊口或曰燔山歲旱燔之起龍致雨或曰樊氏居之不知孰是其上為盧洲孫仲謀泛江遇大風柂師請所之仲謀欲往盧洲其僕谷利以刀擬柂師使泊樊口遂自樊口鑿山通路歸武昌今猶謂之吳王峴有洞穴土紫色可以磨鏡循山而南至寒溪寺上有曲山山頂即位壇九曲亭皆孫氏遺迹西山寺泉水白而甘名菩薩泉泉所出石如人垂手也山下有陶母廟陶公治武昌既病登舟而死於樊口尋繹故迹使人悽然仲謀獵於樊口得一豹見老母曰何不逮其尾忽然不見今山中有聖母廟豫十五年前過之見彼板倣佛有得一豹三字今亡矣黃州守居之數百步為赤壁或言即周瑜破曹公處不知果是否斷崖壁立江水深碧二鶻巢其上有二蛇或見之遇風浪靜輒乘小舟至其下捨舟登岸入徐公洞非有洞穴也但山崦深邃耳圖經云是徐邈不知何時人非魏之徐邈也岸多細石往往有溫瑩如玉者深淺紅黃之色或細紋如人手指螺紋也既數遊得二百七十枚大者如棗栗小者如芡實又得一古銅盆盛之注水粲然有一枚如虎豹首有口鼻眼處以為羣石之長玉石今世真玉甚少雖金鐵不可近須沙碾而後成者世以為真玉矣然猶未也特珉之精者真玉須定州磁芒所不能傷者乃是云問後苑老玉工亦莫知其信否唐彥猷以青州紅絲石為甲或云惟堪作骰盆蓋亦不見佳者今觀雪庵所藏乃知前人不妄許爾井河蜀去海逺取鹽於井陵州井最古淯井富順監亦久矣惟卭州蒲江縣井乃祥符中民王鸞所開利入至厚自慶厯皇祐以來蜀始創筒井用圜刀鑿如碗大深者數十丈以巨竹去節牝牡相銜為井以隔橫入淡水則醎泉自上又以竹之差小者出入井中為桶無底而竅其上懸熟皮數寸出入水中氣自呼吸而啓閉之一筒致水數斗凡筒井皆同機械利之所在人無不知後漢書有水鞴此法惟蜀中鐵冶用之大略似鹽井取水筒太子賢不識妄以意解非也數年前朝廷作汴河斗門以淤田識者皆以為不可竟為之然卒亦無功方樊山水盛時放斗門則河田墳墓廬舍皆被害及秋深水退而放則淤不能厚謂之蒸餅淤朝廷亦厭之而罷偶讀白居易甲乙判有云得轉運使以汴河水淺不通運請築塞兩河斗門節度使以當管營田悉在河次若斗門築塞無以供軍乃知唐時汴河兩岸皆有營田斗門若運水不乏即可沃灌古有之而今不能何也當更問知者卜居栁仲舉自共城來摶大官米作飯食我且言百泉之奇勝勸我卜鄰此心飄然已在太行之麓矣元祐三年九月七日東坡居士書范蜀公呼我卜鄰許下許下多公卿而我蓑衣篛笠放蕩於東坡之上豈復能事公卿哉若人久放浪不覺有病或然持養百病皆作如州縣久不治因循苟簡亦曰無事忽遇能吏百弊紛然非數月不能清淨也要且堅忍不退所謂一勞永逸也合江樓下秋碧浮空光搖几席之上而有茅店廬屋七八間橫斜砌下今歲大水再至居人散避不暇豈無寸土可遷而乃眷眷不去常為人眼中沙乎元豐三年冬至過山陽登西閣時景繁出巡未歸軾方乞歸常州得請春中方當復過此故有閣欲名思之未有佳者蔡廓謨之子也晉宋間第一流輒以似公家不知可否亭堂臨臯亭下八十數步便是大江其半是峨嵋雪水吾飲食沐浴皆取焉何必歸鄉哉江山風月本無常主間者便是主人聞范子豐新第園池與此孰勝所以不如君子上無兩稅及助役錢爾陶靖節云倚南窗以寄傲審容膝之易安故常欲作小軒以容安名之慈湖陳氏草堂瀑流出兩山間落於堂後如懸布崩雪如風中絮如羣鶴舞參寥子問主人乞此地養老主人許之東坡居士投名作供養主龍丘子欲作庫頭參寥不納云待汝一口吸盡此水令汝作蘇子得廢園于東坡之脅築而垣之作堂焉號其正曰雪堂堂以大雪中為因繪雪於四壁之間無容隙也起居偃仰環顧睥睨無非雪者蘇子居之真得其所居者也蘇子隱几而晝瞑栩栩然若有所適而方興也未覺為物觸而寤其適未厭也若有失焉以掌抵目以足就履曳於堂下客有至而問者曰子世之散人耶拘人耶散人也而未能拘人也而嗜欲深今似繫馬止也有得乎而有失乎蘇子心若省而口未嘗言徐思其應揖而進之堂上客曰嘻是矣子之欲為散人而未得者也子今告子以散人之道夫禹之行水庖丁之投刀避衆礙而散其智者也是故以至柔馳至剛故石有時以泐以至剛遇至柔故未嘗見全牛也豫能散也物固不能縛不能散也物固不能釋子有惠矣用之於內可也今也如蝟之在囊而時動其脊脅見於外者不特一毛二毛而巳風不可摶影不可捕童子知之名之於人猶風之與影也子獨留之故愚者視而驚智者起而軋吾固怪子為今日之晚也子之遇我幸矣吾今邀子為籓外之遊可乎蘇子曰豫之於此自以為籓外久矣子又將安之乎客曰甚矣子之難曉也夫勢利不足以為籓也名譽不足以為籓也隂陽不足以為籓也人道不足以為籓也所以籓豫者特智也爾智存諸內發而為言則言有謂也形而為行則行有謂也使子欲默不欲默欲息不欲息如醉者之恚言如狂者之妄行雖掩其口執其臂猶且喑嗚局蹙之不巳則籓之於人抑又固矣人之為患以有身身之為患以有心是圃之構堂將以佚子之身也是堂之繪雪將以佚子之心也身待堂而安則形固不能釋心以雪而警則神固不能凝子之和既焚而燼矣燼又復然則是堂之作也非徒無益而又重子蔽蒙也子見雪之白乎則恍然而目眩子見雪之寒乎則竦然而毛起五官之為害惟目為甚故聖人不為雪乎雪乎吾見子知為目也子其殆矣客又舉杖而指諸壁曰此凹也此凸也方雪之雜下也均矣厲風過焉則凹者留而凸者散天豈私於凹凸哉勢使然也勢之所在天且不能違而況於人乎子之居此雖逺人也而圃有是堂堂有是名實礙人耳不猶雪之在凹者乎蘇子曰豫之所為適然而巳豈有心哉殆也奈何客曰子之適然也適有雨則將繪以雨乎適有風則將繪以風乎雨不可繪也觀雲氣之洶湧則使子有怒心風不可繪也見草木之披靡則使子有懼意覩是雪也子之內亦不能無動矣苟有動焉丹青之有靡麗氷雪之有水石一也德有心心有眼物之所襲豈有異哉蘇子曰子之所言是也敢不聞命然未盡也豫不能默此正如與人訟者其理雖已屈猶未能絶辭者也子以為登春臺與入雪堂有以異乎以雪觀春則雪為靜以臺觀堂則堂為靜靜則得動則失黃帝古之神也遊乎赤水之北登乎崑崙之丘南望而還遺其玄珠焉遊以適意也望以寓情也意適於遊情寓於望則意暢情出而忘其本矣雖有良貴豈得而寶哉是以不免有遺珠之失也雖然意不久留情不再至必復其初而巳矣是又驚其遺而索之也余之此堂追其逺者近之收其近者內之求之眉睫之間是有八荒之趣人而有知也升是堂者將見其不遡而僾不寒而栗凄凜其肌膚洗滌其煩鬱既無炙手之譏又免飲氷之疾彼其趦趄利害之徒猖狂憂患之域者何異探湯執熱之俟濯乎子之所言者上也余之所言者下也我將能為子之所為而子不能為我之為矣譬之厭膏粱者與之糟粳則必有忿詞衣文繡者被之以皮辨則必有愧色子之於道膏粱文繡之謂也得其上者耳我以子為師子以我為資猶人之於衣食缺一不可將其與子遊今日之事姑置之以待後論豫且為子作歌以道之歌曰雪堂之前後兮春草齊雪堂之左右兮斜徑微雪堂之上兮有碩人之頎頎考槃於此兮芒鞋而葛衣挹清泉兮抱甕而忘其機負頃筐兮行歌而采薇吾不知五十九年之非而今日之是又不知五十九年之是而今日之非吾不知天地之大也寒暑之變悟昔日之癯而今日之肥感子之言兮始也抑吾之縱而鞭吾之口終也釋吾之縛而脫吾之鞿是堂之作也吾非取雪之勢而取雪之意吾非逃世之事而逃世之機吾不知雪之為可觀賞吾不知世之為可依違性之便意之適不在於他在於羣息巳動大明既升吾方輾轉一觀曉隙之塵飛子不棄兮我其子歸客欣然而笑唯然而出蘇子隨之客顧而頷之曰有若人哉人物夫學者載籍極博猶信於六藝詩書雖闕然虞夏之文可知也堯將遜位讓於虞舜舜禹之間嶽牧咸薦乃試之於位典職數十年功用既興然後授政示天下重器王者大統傳天下若斯之難也而説者曰堯讓天下於許由由不受恥之逃隱及夏之時有卞隨務光者此何以稱焉東坡先生曰士有以簞食豆羮見於色者自吾觀之亦不信也髙祖微時嘗避事時時與賓客過其丘嫂食嫂厭叔與客來陽為羮盡轉釜客以故去巳而視其釡中有羮由是怨嫂及立齊代王而伯子獨不侯太上皇以為言髙祖曰非敢忘之也為其母不長者封其子信為羮頡侯髙祖號為大度不記人過者然不置轉釜之怨獨不畏太上皇緣此記分杯之語乎轉釜一作轑漢武帝無道無足觀者惟踞厠見衛青不冠不見汲長孺為可佳耳若青奴才雅宜舐痔踞厠見之正其宜也楚孝王囂疾成帝詔云夫子所痛蔑之命矣夫東平王不得於太后元帝詔曰諸侯在位不驕然後富貴離其身而社稷可保皆與今論語孝經小異離附離也今作不離於身疑為俗儒所增也三十餘年家國數千里地山河幾曽慣干戈一旦歸為臣虜沈腰潘鬢消磨最是倉惶辭廟日教坊猶奏别離歌揮淚對宮娥後主既為樊若水所賣舉國與人故當慟哭於九廟之外謝其民而後行顧乃揮淚宮娥聽教坊離曲跋陳後主詞真宗時或薦梅詢可用者上曰李沆嘗言其非君子時沆之沒蓋二十餘年矣歐陽文忠公嘗問蘇子容曰宰相沒二十年能使人主追信其言以何道子容言獨以無心故爾軾因贊其語且言陳執中俗吏耳持至公猶能取信主上況如李公之才識而濟之以無心耶時元祐三年興龍節賜宴尚書省論此是日又見王鞏云其父仲儀言陳執中罷相仁宗問誰可代卿者執中舉吳育上即召赴闕會乾元節侍宴偶醉坐睡忽驚顧拊牀呼其從者上愕然即除西京留臺以此觀之執中雖俗吏亦可賢也育之不相命矣夫然晚節有心疾亦難大用仁宗非棄材之主也孔子為魯司冦七日而誅少正卯或以為太速此叟蓋自知其頭方命薄必不久在相位故汲汲及其未去發之使更遲疑兩三日巳為少正卯所圖矣顏回簞食瓢飲其為造物者廢亦省矣然且不免於夭折使回更喫得兩簞食半瓢飲當更不活得二十九歲然造物者輒支盜跖兩日祿料足為回七十年糧矣但恐回不要耳荀卿云青出於藍而青於藍氷生於水而寒於水世之言弟子勝師者輒以此為口實此無異夢中語青即藍也氷即水也釀米為酒殺羊豕以為膳羞曰酒甘於米膳羞美於羊雖兒童必笑之而荀卿以是為辨信其醉夢顛倒之言以至論人之性皆此類也顏蠋與齊王遊食必太牢出必乘車妻子衣服麗都蠋辭去曰玉生於山制則破焉非不寶貴也然而太璞不完士生於鄙野推選則祿焉非不尊遂也然而形神不全蠋願得歸晚食以當肉安步以當車無罪以當貴清靜貞正以自娛嗟乎戰國之士未有如魯連顏蠋之賢者也然而未聞道也晚食以當肉安步以當車是猶有意於肉與車也晚食自美安步自適取其美與適足矣何以當肉與車為哉雖然蠋可謂巧於居貧者也未飢而食雖八珍猶草木也使草木如八珍惟晚食為然蠋固巧矣然非我之久於貧不能知蠋之巧也張儀欺楚王以商於之地六百里既而曰臣有奉邑六里此與兒戲無異天下無不疾張子之詐而笑楚王之愚也夫六百里豈足道哉而張又非楚之臣為秦謀耳何足深過若後世之臣欺其君者曰行吾言天下舉安四夷畢服禮樂興而刑罰措其君之所欲得者非特六百里也而卒無絲毫之獲豈特無所獲喪已不勝言矣則其所以事君者乃不如張儀之事楚因讀朝錯論書此方與公謂周昌之吏趙堯年雖少奇士君必異之且代君昌笑曰堯刀筆吏耳何至是居頃之堯説髙祖為趙王貴強相獨周昌為可髙祖用其策堯竟代昌為御史大夫吕后殺趙王昌亦無能為特謝病不朝耳由此觀之堯特為此計代昌耳安能為髙祖謀哉吕后怨堯為此計亦抵堯罪堯非特不能為髙祖謀其自為謀亦不善矣昌謂之刀筆吏豈誣也哉吾先君友人史經臣彥輔豪偉人也嘗言黃霸本尚教化庶幾於富而教之者乃復用烏攫小數陋哉潁川鳯皇蓋可疑也霸以鶡為神爵不知潁川之鳯以何物為之雖近於戲亦有理也漢仍秦法至重髙惠固非虐主然習所見以為常不知其重也至孝文始罷肉刑與參夷之誅景帝復孥戮朝錯武帝暴戾有增無損宣帝治尚嚴因武之舊至王嘉為相始輕減法律遂至東京因而不改班固不記其事事見梁統傳固可謂疏略矣嘉賢相也輕刑又其盛德之事可不記乎統乃言髙惠文景以重法興哀平以輕法衰因上書乞增重法律賴當時不從其議比如人年少時不節酒色而安老後雖節而病見此便謂酒可以延年可乎統亦東京名臣一出此言遂獲罪於天其子松竦皆以非命而死冀卒滅族嗚呼悲夫戒哉疏而不漏可不懼乎李邦直言周瑜二十四經略中原今吾四十但多睡善飯賢愚相逺如此安上言吾子似快活未知孰賢與否與朱勃遜之會議於潁或言洛人善接花嵗出新枝而菊品尤多遜之曰菊當以黃為正餘可鄙也昔叔向聞鬷蔑一言得其為人豫於遜之亦云然劉聰聞當為須遮國王則不復懼死人之愛富貴有甚於生者月犯少微吳中髙士求死不得人之好名有甚於生者郗超雖為桓溫腹心以其父愔忠於王室不令知之將死出一箱付門生曰本欲焚之恐公年尊必以相傷為斃我死後公若大損眠食可呈此箱不爾便燒之愔後果哀悼成疾門生依指呈之則悉與溫往反密計愔大怒曰小子死晚矣更不復哭矣若方回者可謂忠臣矣當與石碏比然超謂之不孝可乎使超知君子之孝則不從溫矣東坡先生曰超小人之孝也司馬懿討曹爽桓範往奔之懿謂蔣濟曰智囊往矣濟曰範則智矣駑馬戀棧豆必不能用也範説爽移車駕幸許昌招外兵爽不從範曰所憂在兵食而大司農印在吾許爽不能用陳宫吕布既擒曹操謂宫曰公臺平生自謂智有餘今日何如宫曰此子不用宫言不然未可知也僕嘗論此二人吕布曹爽何人也而為之用尚何言知臧武仲曰抑君似鼠此之謂智元祐三年九月十八日書溫嶠問郭文曰人皆有六親相容先生棄之何樂文曰李行學道不謂遭世亂欲歸無路耳又曰飢思食壯思室自然之理先生獨無情乎曰情由憶生不憶故無情又問先生獨處窮山死為烏鳶所食奈何曰埋藏者食於螻蟻復何異又問猛虎害人先生獨不畏耶曰人無害獸心則獸亦不害人又問世不寧則身不安先生不出濟世乎曰非野人之所知也豫嘗監錢塘郡遊餘杭九鎮山訪大滌洞天即郭生之舊隱洞大有巨壑深不可測蓋嘗有敕使投龍簡云戊寅九月七日書李行一作季行劉伯倫常以鍤自隨曰死即埋我蘇子曰伯倫非達者也棺槨衣衾不害為達茍為不然死則巳矣何必更埋房次律敗於陳濤斜殺四萬人悲哉世之言兵者或取通典通典雖杜佑所集然其源出於劉秩陳濤之敗秩有力焉次律云曳洛河雖多安能當我劉秩區區之辨以待曳洛河疏矣阮籍見張華鷦鷯賦歎曰此王佐才也觀其意獨欲自全於禍福之間耳何足為王佐乎華不從劉卞言竟與賈氏之禍畏八王之難而不免倫秀之虐此正求全之過失鷦鷯之本義王濟以人乳蒸豚王愷使妓吹笛小失聲韻便殺之使美人飲酒客飲不盡亦殺之時武帝在也而貴戚敢如此知晉室之亂也久矣王夷甫既降石勒自解無罪且勸僭號其女惠風為愍懷太子妃劉曜陷洛以惠風賜其將髙屬將妻之惠風仗劍大罵而死乃知王夷甫之死非獨慙見晉公卿乃當羞見其女也晉惠帝為太子衛瓘欲陳啓廢之策而未敢發會燕凌雲臺瓘托醉跪帝前曰臣欲有所啓欲言之而止者三因拊牀曰此坐可惜帝意乃悟曰公真大醉賈后由是怨之此何等語乃於衆中言之豈所謂不密失身者耶以瓘之智不宜暗此殆鄧艾之寃天奪其魄爾魄或作識晉武帝探策豈亦如籖也耶惠帝不肖得一蓋神以實告裴頠諂對士君子恥之而史以為美談鄙哉惠懷愍皆不終牛繫馬後豈及二王乎梁史劉凝之為人認所著履即與之此人後得所失履送還不肯復取又沈麟士亦為鄰人認所著履麟士笑曰是卿履耶即與之鄰人得所失履送還麟士曰非卿履耶笑而受之此雖小事然處事當如麟士不當如凝之也桞宗元敢為誕妄居之不疑呂溫為道州衡州及死二州之人哭之逾月客舟之過于此者必呱呱然雖子産不至此溫何以得之其稱溫之弟恭亦賢豪絶人者又云恭之妻裴延齡之女也孰有士君子肯為裴延齡壻者乎栁宗元與伾叔文之交蓋亦不羞與延齡姻也恭為延齡壻不見于史宜表而出之見宗元文集恭墓志云東坡全集卷一百四
