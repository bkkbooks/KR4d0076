body:
  text: 東坡全集卷六十九宋蘇軾撰表狀四十二首揚州謝到任表二首臣軾言伏䝉聖恩除臣知揚州臣已於今月二十六日到任訖者支郡養疴裁能免咎通都移牧自愧何功屢玷恩榮實深慙汗臣某中謝伏念臣早緣竊祿稍習治民在先帝日已歷三朝近八年間復忝四郡平生所願滿足無餘志大才踈信天命而自遂人微地重恃聖眷以少安恭惟太皇太后陛下子惠萬民器使多士以謂朝廷之德澤付於郡縣與監司乃眷江淮之間久罹水旱之苦鄰封二浙饑疫相薰積缺十年豐凶皆病臣敢不上推仁聖之意下盡疲駑之心庶復流亡少寬憂軫臣無任又一麾出守方愧偷安十國為連復膺寵寄恩榮既溢慙汗靡寧臣某中謝伏念臣本以鯫生冒居禁從頃緣多病力求潁尾之行曾未半年復有廣陵之請蓋以魚鳥之質老於江湖之間習與性成樂居其舊天從民欲許擇所安恭惟皇帝陛下欽明文思剛健純粹天功默運灼知萬化之情人材並收各取一長之用如臣衰朽尚未遐遺命至蹇而祿已盈每懷憂懼志雖大而才不副莫報恩私臣無任謝賜恤刑詔書表二首臣軾言伏䝉聖恩賜臣欽恤刑獄詔書一道者時令舉行雖云故事天心惻怛本出至誠德既洽於好生民雖死而無憾臣某誠惶誠懼頓首頓首伏以刻木畫地志士不居鑠石流金平人猶病宜軫聖神之念實為哀敬之先訓誥丁寧吏民感動恭惟皇帝陛下禹湯罪已堯舜性仁以不忍人之心行若稽古之政豈止緩獄實期無刑臣敢不推廣上恩厚風俗於無犯申嚴法意消盜賊於未萌少假歲時庶空囹圄臣無任又暑雨其咨既軫小民之病麥秋已至復虞輕繫之淹祗服訓詞灼知天意臣某中謝伏以仁聖之德哀矜為先常內恕以及人故深居而念逺齊戒處掩則知暴露之勤紾絺袢延不忘纍紲之苦吏既罔懈民知無寃恭惟太皇太后陛下事法祖宗德參天地凱風養物散為扇暍之涼靈雨應時同沾執熱之濯臣敢不盡其哀敬濟以寬明奉漢律之嚴毋令瘐死推慈母之意務在平反庶竭愚忠少行德意臣無任賀立皇后表二首臣軾言伏覩制書今月十六日皇后受冊禮成者纘女維莘俔天之妹事關廟社喜溢人神中賀臣聞三代之興皆有內助二南之化實本人倫維關雎正始之風具既醉太平之福民有所恃邦其永昌恭惟皇帝陛下自誠而明惟睿作聖輯寧夷夏德既茂於治朝輔順隂陽政兼修於內職既膺大慶益廣至仁下逮海隅夫婦無有愁歎上符天造日月為之光明受祿無疆與民同樂臣無任又吉日既涓柔儀允正穀圭往聘象服來朝中賀臣聞周姜任姒之賢位非皆極漢隂馬鄧之貴德或有慙盛哉六禮之陳襲此三宫之慶恭惟太皇太后陛下任付託之重躬保佑之勞公天下不私其親配宸極必先以德徽音不墜嗣成慈孝之風仁壽無疆坐享雲來之養臣限以官守不獲躬詣闕庭臣無任賀坤成節表臣軾言歲復六壬襲嘉祥於太史火流七月紀令節於詩人盡海宇之含生舉欣榮於兹日臣某中賀臣聞君以民為心體天用民為聰明未有心胖而體不紓民悅而天不應故好生惡殺是為仁壽之基捐利與民斯獲豐年之慶恭惟太皇太后陛下恭儉一德勤勞百為推天覆地載之心阜成民物盡父教母憐之道誨養臣鄰共知難報之恩必享無疆之福臣以出守淮海無由躬詣闕庭臣無任謝除兵部尚書賜對衣金帶馬狀二首䝉恩賜臣衣一對金帶一條并魚袋金鍍銀鞍轡馬一匹者盛服在躬無復曳婁之歎名駒出廏遂忘奔走之勞施重丘山身輕毫末伏念臣少賤而鄙性椎少文衣敝緼袍未嘗有恥乘欵段馬自以為安豈意晚年屢膺此寵此蓋伏遇皇帝陛下紹隆景命總攬羣英無競維人勢已加於九鼎惟德其物恩有重於千金臣敢不上體眷懷勉思報稱贈繞朝之䇿愧不能謀振屈原之衣期於自潔臣無任又伏以在笥之珍本出於民力脫驂之賜以結於士心顧臣何人屢膺此寵伏念臣學本為已材不適時乘伯厚之車雖云疾惡束公西之帶愧不能言而二年之間三拜是賜此蓋伏遇太皇太后陛下心存社稷德協天人以長䇿駕馭四方以盛德藩飾多士故令衰朽猶玷光華豈曰無衣蓋獨求於安吉慨然攬轡敢有志於澄清臣無任謝兼侍讀表二首伏奉制書除臣守兵部尚書兼侍讀者重地隆名不擇所付清資厚祿以養不才中謝伏念臣以草木之微當天地之澤七典名郡再入翰林兩除尚書三忝侍讀雖當世之豪傑猶未易居矧如臣之孤危其何能副恭惟皇帝陛下聖神格物文武憲邦重離繼明何煩爝火之助大厦既構尚求一木之支而臣白首復來丹心已折望西清之帷幄久立倣徨聞長樂之鼓鐘恍如夢寐莫報丘山之施猶貪頃刻之榮臣無任又流汗恩榮再辭莫獲强顔衰朽一節以趨臣軾中謝恭惟先帝復六卿之名本欲後人識三代之舊古今殊制閒劇異宜武選𨽻於天官兵政總於樞輔故司馬之職獨省文書而師氏之官職在論說命臣兼領聖意可知恭惟太皇太后陛下約已裕民忘家憂國知先王之兵必本於道德故以儒臣為七兵知人主之學必通於民情故目郡守為五學而臣迂踈不可强合早緣衰病難以久居終當自效於所長之間或可報恩於未死之日臣無任進郊祀慶成詩表伏覩今月十四日郊祀禮成者親奠璧琮始見天地兼陳祖宗六廟之典參用漢唐三代之文夷夏來同人神允答臣某中賀恭惟皇帝陛下聿追來孝對越在天外修神考之文章內服文母之慈儉四方觀禮百辟宅心雪止風恬驗神祗之來饗雲黃歲美知豐凶之在天臣以藝文入侍帷幄考事而知天意陳詩以達民言雖無足觀亦各其志臣無任瞻天望聖慚懼屏營之至所撰郊祀慶成詩一首謹繕寫陳表上進以聞謝除兩職守禮部尚書表伏䝉聖恩除臣端明殿學士兼翰林侍讀學士守禮部尚書者衰年自引久抱此心異數併加實為非意辭不獲命愧何以堪臣軾中謝竊惟以殿命官本緣麟趾之舊因時修廢近正金華之名厯代所榮於今為甚自元豐之末官制以來若非身兼數器之人未有名冠兩職之重而况秩宗之任邦禮是司豈臣迂愚所當兼領此蓋伏遇太皇太后陛下憂深社稷慮極安危求忠臣於愚直之中論治道於文字之外知臣難進而易退或非患失之鄙夫故授以禮樂清閒之司使専於論說琢磨之事此恩難報願輪歲月之勤度己所宜終遂江湖之請臣無任又備貟西學已愧空疏易職東班尤驚忝冒遂領宗卿之事併為儒者之榮臣軾中謝始臣之學也以適用為本而恥空言故其仕也以及民為心而慙尸祿乃者屢請治郡兼乞守邊欲及殘年少施實效而有志莫遂負愧何言今乃以文字為官常語言為職業下無所見其能否上無所考其幽明循省初心有靦面目故於拜恩之日少陳有益之言孔子曰一言可以興邦而孟子亦曰一正君而天下定昔漢文帝悅張釋之長者之言則以德化民輔成刑措之功而孝景帝入朝錯數術之語則以智馭物馴致七國之禍乃知為國安危之本祗在聽言得失之間恭惟皇帝陛下即位以來學如不及問道八年寒暑不廢講讀之官談王而不談霸言義而不言利八年之間指陳文理何啻千萬雖所論不同然其要不出六事一曰慈二曰儉三曰勤四曰慎五曰誠六曰明慈者謂好生惡殺不喜兵刑儉者謂約已省費不傷民財勤者謂躬親庶政不邇聲色慎者謂畏天法祖不輕人言誠者謂推心待下不用智數明者謂専信君子不雜小人此六者皆先王之陳迹老生之常談言無新竒人所忽易譬之飲膳則為穀米羊豕雖非異味而有益於人譬之藥石則為耆术參苓雖無近效而有益於命若陛下信受此言如御飲膳如服藥石則天人自應福祿難量而臣等所學先王之道亦不為無補於世若陛下聽而不受受而不信信而不行如聞春禽之聲秋蟲之鳴過耳而已則臣等雖三尺之喙日誦五車之書反不如醫卜執技之流簿書奔走之吏其為尸素死有餘誅伏望陛下一覽臣言少留聖意天下幸甚謝賜對衣金帶馬狀二首䝉恩賜衣一對金帶一條并魚袋金鍍銀鞍轡馬一匹服官奠篚響動佩章圉士效牽光生韀䇿伏以三賜之重莫隆於車馬五采之貴兼施於衣裳汝必有功服之無斁而臣衰年弱幹固難强於馳驅枯木朽株本不願於文繡寵加意外愧溢顔間此蓋伏遇皇帝陛下因能任官稱物平施操名器以勵士上有誠心正銜勒以馭人下無遺力臣敢不思稱其服益勵厥躬雖愧立朝乏能言之近用猶希辨道輸老智於暮年臣無任又䝉恩賜衣一對金帶一條并魚袋金鍍銀鞍轡馬一匹服章在笥賁及衰殘銜勒過庭喜先徒御伏以物生有待天施無窮草木何知冒慶雲之渥采魚蝦至陋借滄海之榮光雖若可觀終非其有妻孥相顧驚屢致於匪頒道路竊窺或反增於指目此蓋伏遇太皇太后陛下聰明齊聖陳錫載周含垢匿瑕而察於求賢卑宫菲食而侈於養士士豈輕於千里念非其人言有重於兼金當思所報臣無任笏記二首榮兼兩職寵與六卿豈伊衰朽之餘有此遭逢之異此蓋伏遇太皇太后陛下坤元利正天造無私靡求備於一人將曲成於萬物文章小技縱有效於涓埃草木微生終難酬於雨露又升榮祕殿列職西清併此光華付之衰朽此蓋伏遇皇帝陛下剛健純粹緝熙光明曲搜已棄之材將建無窮之業顧慙淺陋將何補於聖明惟有朴忠誓不回於生死臣無任定州謝到任表兵民重寄本禦侮以折衝疆埸久安但坐嘯而畫諾才微祿厚恩重命輕臣軾中謝伏念臣一去闕庭三換符竹坐席未暖召節已行筋力疲於往來日月逝於道路未經周歲復典兩曹朝廷非不用臣愚蠢自不安位所宜竄逐更冒寵榮此蓋伏遇皇帝陛下離明正中乾健獨運追述東朝之遺意收此散材眷言西學之舊臣付之善地致此衰朽尚未棄捐臣敢不勤恤民勞密修邊備茍無大過以及朞年漸還魚鳥之鄉以畢桑榆之景臣無任慰正旦表嗣歲將興雖有作新之慶舊穀既沒共深追逺之思凡在照臨舉增懷慕臣軾中謝恭惟皇帝陛下道躋堯禹行比騫參方受圖於二朝明發不寐念御簾於雙日孝思奈何幸寬罔極之哀少副有生之望臣限以官守不獲躬詣闕庭臣無任謝賜厯日表夙頒溫詔寵拜新書吏得承宣民知早晚臣軾中謝臣聞言天道者有數故閏以正時訓農事者在人則王無罪歲豈獨典常之舊必存忠利之心恭惟皇帝陛下輔相財成聰明時憲居德刑於冬夏意與天同暨聲教於朔南責在臣等敢不時使薄斂思患預防勤恤鰥孤幸流亡之盡復兼明威惠庶戎夏以皆安臣無任慰宣仁聖烈皇后山陵禮畢表恭聞今月七日大行宣仁聖烈太皇太后山陵禮畢者日月有時義當即逺雨露既降思則無窮遙知穆穆之光尚起皇皇之望臣軾中謝恭惟皇帝陛下道循祖德德契天心大哉孔子之仁泫然流涕至矣顯宗之孝夢若平生願寬舜慕之心少副堯封之祝臣限以官守不獲躬詣闕庭無任瞻天望聖激切屏營之至慰宣仁聖烈皇后祔廟禮畢表恭聞今月十七日宣仁聖烈皇后升祔禮畢者反寢而虞既盡飾終之典宅神於廟益隆追逺之思凡在照臨舉增悲慕臣軾中謝竊以六朝繼聖並傳家法之餘三后御簾髙出古人之右逮此登配廓然永懷恭惟皇帝陛下奉順母慈表章坤德四諡哀榮之詔簡䇿有光數詩挽餞之音道塗垂涕日月云遂典禮告成願寬無益之悲少副有生之望臣限以官守不獲躬詣闕庭無任瞻天望聖激切屏營之至謝賜衣襖表十一月九日翰林醫官王宗古至伏䝉聖慈傳宣存問賜臣等敕及初冬衣襖者齊官三服已寬卒歲之憂漢札十行更佩先春之暖恩均吏士聲動華夷臣軾中謝伏以禮著始裘詩歌無褐邊陲更戍本為臣子之常朔易早寒特軫聖神之念惟德其物豈曰無衣恭惟皇帝陛下廣運聰明力行恭儉威風旁振方戰栗於天驕溫詔下融遂流澌於河凍既無功而坐食實有愧於解衣敢不推廣朝廷之仁益收凍餒申嚴祖宗之法少肅惰偷庶收汗馬之勞以解濡鵜之誚臣無任到惠州謝表先奉告命落兩職追一官以承義郎知英州軍州事續奉告命責授臣寧逺軍節度副使惠州安置已於今月二日到惠州公參訖者仁聖曲全本欲畀之民社羣言交擊必將致之死亡尚荷寬恩止投荒服臣軾中謝伏念臣性資褊淺學術荒唐但信不移之愚遂成難赦之咎迹其狂妄久合誅夷方尚口乃窮之時蓋擢髮莫數其罪豈謂天幸得存此生此蓋伏遇皇帝陛下以大有為之資行不忍人之政湯網開其三面舜干舞于兩階念臣奉事有年少加憐愍知臣老死無日不足誅鋤明降德音許全餘息故使豗尵之馬猶獲蓋帷觳觫之牛得違刀几臣敢不服膺嚴訓託命至仁洗心自新沒齒無怨但以瘴癘之地魑魅為鄰衰疾交攻無復首丘之望精誠未泯空餘結草之忠臣無任到昌化軍謝表今年四月十七日奉被告命責授臣瓊州别駕昌化軍安置臣尋於當月十九日起離惠州至七月二日已至昌化軍訖者並鬼門而東騖浮瘴海以南遷生無還期死有餘責臣軾中謝伏念臣頃緣際㑹偶竊寵榮曽無毫髮之能而有丘山之罪宜三黜而未已跨萬里以獨來恩重命輕咎深責淺此蓋伏遇皇帝陛下堯文炳煥湯德寬仁赫日月之照臨廓天地之覆育譬之蠕動稍賜矜憐俾就窮途以安餘命而臣孤老無託瘴癘交攻子孫慟哭於江邊已為死别魑魅逢迎於海上寧許生還念報德之何時悼此心之永已俯伏流涕不知所云臣無任提舉玉局觀謝表臣先自昌化軍貶所奉敕移亷州安置又自亷州奉敕授臣舒州團練副使永州居住今行至英州又奉敕授臣朝奉郎提舉成都府玉局觀在外州軍任便居住者七年逺謫不自意全萬里生還適有天幸驟從縲紲復齒縉紳臣軾中謝伏念臣才不逮人性多忤物剛褊自用可謂小忠猖狂妄行乃蹈大難皆臣自取不敢怨尤㑹真人之勃興與萬物而更始而臣獨在幽逺最為冥頑逮兹起廢之初倍費生成之力終䝉記録不遂棄捐此蓋伏遇皇帝陛下正位龍飛對時虎變神武不殺豈非受命之符清淨無為坐獲消兵之福聰明不作邪正自分使臣得同草木之微共霑雷雨之解臣敢不益堅素守深念往愆沒齒何求不厭飯蔬之陋蓋棺未已猶懷結草之忠臣無任慰皇太后上仙表伏覩正月十四日大行皇太后遺誥者慟發六宫悲纒九土奉諱哀殞不知所云臣軾中謝大行皇太后德冠三朝化行四海獨決大䇿措天下於泰山之安退避東朝復明辟為萬世之法奄終壽祿莫曉天心恭惟皇帝陛下仁孝自天哀傷過禮惟聖達節豈復行曾閔之難以民為心則當法舜禹之大願少寬於追慕庶下答於臣民臣以外郡居住不獲奔赴闕庭無任哀痛隕越之至代普寧王賀冬表七日來復陽既進而歲功成八風不姦樂已調而君道得惟聖在御與天合符恭惟皇帝陛下嗣守洪基丕承先志法小毖以求助期既醉之太平淵默臨朝順陽道之消長清淨為治俾物類以昭蘇受福無疆成功不宰臣猥以暗弱仰荷誨憐敢先百辟之朝以祝萬年之壽謝御膳表臣伏䝉聖恩特賜寬假將理今月七日又再䝉中使臨賜御膳問其治療之增損督以朝參之日辰臣下履淵冰上負芒刺蹄涔雖小能延兩耀之光寸草何知莫報三春之澤正使豚魚幽陋木石堅頑亦將激勵忘軀奔走赴職而臣尚有無厭之請敢守不移之愚在法當誅原情可憫實以負薪之疾積有歲時勿藥之祥恐非旦夕終願江淮之一郡以安犬馬之餘生尚兾此身未填溝壑期於異日别效涓涘代滕達道景靈宫奉安表衣冠出遊巍乎宫闕之盛祖考來格燦然日月之明新禮光前彌文範後繼以作解之雷雨仍收繪像之子孫聳觀華夷淪浹枯朽竊以祀無豐踈祭不欲昵自仁率親故同宫而合享惟聖作則實考古而便今庶民子來五福交應蔚山河之增氣紛嶽瀆以來朝仙木蟠根五聖既聯於龍衮靈芝擢秀九莖復出於齊房皇帝陛下舜孝格天堯文冠古損益漢唐之典故潤色祖宗之規摹壽考萬年永作人神之主本支百世共承宗廟之休臣出守逺方阻觀盛禮㑹祠壇下莫覩燁然之光留滯周南竊興命也之嘆代滕達道湖州謝上表郡壓五湖城交二水既先世舊居之地亦年少初仕之邦父老縱觀不謂微臣之尚在吏民感涕共知洪造之難酬中謝臣聞忠臣可使死封疆而不能受無根之謗議志士本不求富貴而不能安有道之賤貧况臣早䝉希世之恩常有捐軀之意豈容曖昧略不辨明然疑似之難知實古今之通患漢文帝賢君也而不能信賈生之屈尹吉甫慈父也而不能雪伯竒之寃此小人譛夫所以得志而欺天忠臣孝子所以抱恨而入地况臣結纍朝之深怨無半面之先容而訴章朝聞恩詔夕下歷數千載唯臣一人此蓋伏遇皇帝陛下妙物言神睿思作聖謂天蓋逺以窮呼而必聞如日之明雖浸潤而不受念兹七年之厄收之九死之餘臣敢不更勵初心馴圖後效老當益壯未甘結草之幽途死且不辭尚欲據鞍于前殿同天節功德疏表伏以纍聖儲休上天垂祐乃逢純乾之月肇興出震之祥恭惟皇帝陛下以堯舜生知之資承祖宗積治之慶大有上吉天人之助已明既醉太平聖賢之福誠備至於臣子之私願是為草木之微情幸同海表之民共罄封人之祝上皇帝賀正表東方發律氣迎萬物之新南面受圖禮勤三朝之始惟聖時憲自天降康恭惟皇帝陛下文武生知聖神天縱舊邦新命既光啓於前人大德小心以昭事於上帝臣久塵從槖外領藩符敢傾葵藿之心仰獻松椿之壽杭州賀冬表二首月臨天統首冠於三正氣應黃鍾復來於七日君道浸長陽德光亨恭惟皇帝陛下清明在躬仁孝遍物垂衣南面天何言而四時成問孝西清日將旦而羣隂伏蠻夷奔走年穀順成豈惟四海之歡心自識三靈之隂贊臣祗膺詔命恪守郡符身雖在於江湖顔不忘於咫尺敢同率土惟祝後天又消長有時候微陽之來復賢愚同慶知君子之彚征德化所加神人並應恭惟太皇太后陛下睿明天縱慈儉身先振海嶽以不傾地無私載順隂陽之自化天且不違成功已陋於漢唐論德蓋髙於任姒黃雲可望共沾至治之祥彤史何知莫贊無為之德臣備貟法從祗役海隅東閣拜章阻陪於百辟南山獻壽徒頌於萬年上皇帝賀冬表易稱來復蓋知天地之心禮戒無為以待隂陽之定恭惟皇帝陛下堯仁冠古舜孝通神種德兆民躬行文景之儉遊心六藝灼知周孔之情人既和而歲自豐天不違而壽無極臣久緣衰病待罪江湖莫瞻北極之光但罄南山之祝上太皇太后賀正表堯厯授時夏正建統氣迎交泰之㑹祥應重明之朝恭惟太皇太后陛下道無能名德博而化天人所助本羲易之益謙慈儉不居得老氏之三寶時逢吉旦福集清宫臣職守江湖心馳象魏天威咫尺想聞清蹕之音眉壽萬年逺奉稱觴之慶舉黃庭堅自代狀䝉恩除臣翰林學士伏見某官黃某孝友之行追配古人瑰瑋之文妙絶當世舉以自代實允公議英州謝上表罪盈義絶誅九族以猶輕威震怒行置一州而大幸驚魂方散感涕徒零伏念臣草芥賤儒岷峨冷族襲先人之素業借一第以竊名雖幼歲勤勞實學聖人之大道而終身窮薄常為天下之罪人先帝念臣於衆怒必死之中陛下起臣於散官永棄之地恩深報蔑每憂天地之難欺福眇禍多是亦古今之罕有自悲棄物猶欲籲天惟上聖纂宗廟之圖方太母聽簾帷之政招延俊乂登進老成何期章句之謏才使掌絲綸之要職凡一時黜陟進退之衆皆兩宫威禍賞福之公既在代言敢思逃責茍不能敷揚上意尊朝廷於日月之明則何以聳動四方鼓號令於雷霆之震固當昭陳功罰直喻正邪豈臣愚敢有於私心蓋王言不可以匿㫖當昔之天奪其魄但謂守官今日之臣肆其言期於必戮賴父母之深憫免子弟之偕誅罪雖駭於聽聞怒終歸於寬宥不獨再生於東市猶令尸祿於南州纍歲寵榮固已太過此時竄責誠所宜然瘴癘炎陬去若清凉之地蒼顔素髮誰憐衰暮之年恩重丘山感藏骨髓此蓋伏遇皇帝陛下知惟天錫行自生知巍巍繼大聖之神休孜孜盡二宫之孝養深原心迹曲示哀矜臣實何人恩常異衆在先朝偶脫其誅戮故此日復煩於典刑頑戾如斯生存何面臣敢不噬臍悔過吞舌知非革再三不改之愆庶萬一善終之望殺身莫喻敢懷窮困之憂守土非輕尚畀遐荒之俗儻沐先朝之化永惟結草之忠臣無任移亷州謝上表使命逺臨初聞喪膽詔詞溫厚亟返驚魂拜望闕庭喜溢顔面否極泰遇雖物理之常然昔棄今收豈罪餘之敢望伏膺知幸揮涕無從中謝伏念臣傾以狂愚遽遭譴責荷先帝之厚德寬蕭律之重誅投彼遐荒幸逃鼎鑊風波萬里歎衰病以何堪煙瘴五年賴喘息之猶在憐之者謂之己甚嫉之者恨其太輕考圖經止曰海隅其風土疑非人世食有併日衣無禦冬凄凉百端顛躓萬狀恍若醉夢已無意於生還豈謂優容許承恩而近徙雖云僥幸實有夤緣此蓋伏遇皇帝陛下道本生知性由天縱舊勞于外爰及小人之依堪家多艱鍳于先帝之德奉聖母之慈訓擇正人而與居凡有嘉謀出於睿斷憫臣以孤忠援寡察臣以衆忌獲愆許以更新庶使改過天地有造化之大不能使人之再生父母有鞠育之恩不能全身於必死報期碎首言豈渝心濯於淤泥已有遭逢之便擴開雲日復觀於變之時此生敢更求榮處世但知緘默臣無任謝復賜看墳寺表名書罪籍慚負明時思念私塋特還舊剎九泉受賜荒隴生光伏念臣早以空疏叨居近密始終無補愚不自量恩禮誤加驟及既往一被黨人之目上遺先臣之憂舊恩已移沒齒何覬豈謂詔書一出舊物復還山隴絶芻牧之虞松檟變焦枯之色骨肉感涕里巷咨嗟伏遇皇帝陛下性仁無私聖孝不匱覽二帝初潜之地動一夫失所之懷號令所加存殁咸賴臣衰病已久報國之日不長子孫在前教忠之心未替東坡全集卷六十九
