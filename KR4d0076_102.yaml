body:
  text: 東坡全集卷一百二宋蘇軾撰志林五十七條祭祀八蠟三代之戲禮也歲終聚戲此人情之所不免也因附以禮義亦曰不徒戲而已矣祭必有尸無尸曰奠始死之奠與釋奠是也今蠟謂之祭蓋有尸也猫虎之尸誰當為之置鹿與女誰當為之非倡優而誰葛帶榛杖以喪老物黃冠草笠以尊野服皆戲之道也子貢觀蠟而不悅孔子譬之曰一張一弛文武之道蓋為是也紹聖二年五月望日敬造真一法酒成請羅浮道士鄧守安拜奠北斗真君將奠雨作已而清風肅然雲氣解駮月星皆見魁標皆爽徹奠隂雨如初謹拜手稽首而記其事兵略胸奴圍漢平城羣臣上言胡者全兵請令强弩傅兩矢外鄉徐行出圍李竒注全兵云惟弓矛無雜仗也此說非是使胡有雜仗則傅矢外鄉之䇿不得行歟且竒何以知胸奴無雜仗也胸奴特無弩耳全兵者言胸奴自戰其地不致死不得與我行此危事也諸葛亮造八陳圖於魚復平沙之上壘石為八行相去二丈桓溫征譙縱見之曰此常山蛇勢也文武皆莫識吾嘗過之自山上俯視百餘丈凡八行為六十四蕝蕝正圜不見凹凸處如日中蓋影豫就視皆卵石漫漫不可辨甚可怪也時事儋耳進士黎子雲言城北十五里許有唐村莊民之老曰允從者年七十餘問子雲言宰相何苦以青苖錢困我於官有益乎子雲言官患民貧富不均富者逐什一益富貧者取倍稱至鬻田質口不能償故為是法以均之允從笑曰貧富之不齊自古已然雖天公不能齊也子欲齊之乎民之有貧富由器用之有厚薄也子欲磨其厚等其薄厚者未動而薄者先穴矣元符三年子雲過豫言此負薪能談王道正謂允從輩耶元豐初白馬縣民有被殺者畏賊不敢告投匿名書於縣弓手甲得之而不識字以示門子乙乙為讀之甲以其言捕獲賊而乙爭其功吏以為法禁匿名書而賊以此發不敢處之死而投匿名者當流為情輕法重皆當奏蘇子容為開封尹方廢滑州白馬為畿邑上殿論奏賊可減死而投匿名者可免罪上曰此情雖極輕而告訐之風不可長乃杖而撫之子容以為賊不干已者告捕而變主匿名本不足深過然先帝猶恐長告訐之風此所謂忠厚之至然熙寧元豐之間每立一法如手實禁鹽牛皮之類皆立重賞以勸告訐者皆當時小人所為非先帝本意時范祖禹在坐曰當書之實録官職祕書監侍講傅堯俞始召赴資善堂對邇英閣堯俞致謝上遣人宣召答曰卿以博學參預經筵宜尊所聞以輔不逮堯俞講畢曲謝上復遣人宣諭卿講義淵博多所發揮良嘉深歎是日上讀三朝寶訓至天禧中有二人犯罪法當死真宗皇帝惻然憐之曰此等安知法殺之則不忍捨之無以勵衆乃使人持去笞而遣之以斬訖奏又祀汾隂日見一羊自擲道左怪問之曰今日尚食殺其羔真宗慘然不樂自是不殺羊羔資政殿學士韓維讀畢因奏言此特真宗皇帝小善耳然推其心以及天下則仁不可勝用也真宗自澶淵之役却敵之後十九年不言兵而天下富其源蓋出於此昔孟子論齊王不忍殺觳觫之牛以為是心足以王今恩足以及禽獸而功不及於百姓豈不能哉蓋不為耳外人皆云皇帝陛下仁孝發於天性每行見昆蟲螻蟻違而過之且敕左右勿踐履此亦仁術也臣願陛下推此心以及百姓則天下幸甚軾時為右史奏曰臣今月十五日侍邇英閣竊見資政殿學士韓維因讀三朝寶訓至真宗皇帝好生惡殺因論皇帝陛下在宫中不忍踐履蟲蟻其言深切可以推明聖德益增福夀臣沗備位右史謹書其事於册又録一本上進意望陛下采覽無忘此心以廣好生之德臣不勝大願元祐元年余為中書舍人時執政患本省事多漏泄欲於舍人㕔後作露籬禁同省往來余曰諸公應須簡要清通何必栽籬插棘諸公笑而止明年竟作之暇日讀樂天集有云西省北院新構小亭種竹開窗東通騎省與李常侍窗下飲酒作詩乃知唐時得西掖作窗以通東省而今日本省不得往來可歎也盛度錢氏壻而不喜惟演蓋邪正不相入也惟演建言二后並配御史中丞范諷發其姦落平章事以節度使知隨州時度幾七十為知制誥責詞云三星之媾多戚里之家百兩所迎皆權要之女蓋惟演之姑嫁劉氏而其子娶於丁謂也人怪度老而筆力不衰或曰度作此詞久矣元祐三年十二月二十一日講筵上未出立延和殿中時軾方論周穜擅議宗廟蘇子容因道此樂天行張平叔戶部侍郎判度支制誥云吾坐而決事丞相以下不過四五而主計之臣在焉以此知唐制主計蓋坐而論事也不知四五者悉何人平叔議鹽法至為割剝事見退之集今樂天制誥亦云計能析秋毫吏畏如夏日其人必小人也致仕今年吾當請廣陵暫與子由相别至廣陵逾月遂往南郡自南郡詣梓州泝流歸鄉盡載家書而行迤邐致仕築室種果於眉以須子由之歸而老焉不知此願遂否言之悵然也浮玉老師元公欲為吾買田京口要與浮玉之田相近者此意殆不可忘吾昔有詩云江山如此不歸山山神見怪驚我頑我謝江神豈得已有田不歸如江水今有田矣不歸無乃食言於神也耶賀下不賀上此天下通語士人歷官一任得外無官謗中無所愧於心釋肩而去如大熱逺行雖未到家得清凉館舍一解衣潄濯已足樂矣況於致仕而歸脫冠珮訪林泉顧平生一無可恨者其樂豈可勝言哉余出入文忠門最久故見其欲釋位歸田可謂切矣他人或苟以藉口公發於至情如飢者之念食也顧勢有未可者耳觀與仲儀書論可退之節三至欲以得罪病而去君子之欲退其難如此可以為進者之戒隱逸昔年過洛見李公簡言真宗既東封訪天下隱者得把人楊朴能詩及召對自言不能上問臨行有人作詩送卿否朴曰惟臣妻有一首云更休落魄鴆杯酒且莫猖狂愛詠詩今日捉將官裏去這回斷送老頭皮上大笑放還山余在湖州坐作詩追赴詔獄妻子送余出門皆哭無以語之顧語妻曰獨不能如楊子雲處士妻作詩送我乎妻子不覺失笑余乃出張愈西蜀隱君子也與豫先君游居岷山下白雲溪自號白雲居士本有經世志特以自重難合故老死草野非槁項黃馘盜名者也偶至西湖靜軒見其遺句懷仰其人命寺僧刻之石釋道近讀六祖壇經指說法報化三身使人心開目明然尚少一喻試以眼喻見是法身能見是報身所見是化身何謂見是法身眼之見性非有非無無眼之人不免見黑眼枯睛亡見性不滅故云見是法身何謂能見是報身見性雖存眼根不具則不能見若能安養其根不為物障常使光明洞徹見性乃全故云能見是報身何謂所見是化身根性既全一彈指頃所見千萬縱橫變化俱是妙用故云所見是化身此喻既立三身愈明如此是否觀音經云呪咀諸毒藥所欲害身者念彼觀音力還著於本人東坡居士曰觀音慈悲者也今人遭呪咀念觀音之力而使還著於本人則豈觀音之心哉今改之曰呪咀諸毒藥所欲害身者念彼觀音力兩家總沒事東坡食肉誦經或云不誦坡取水漱口或云一碗水如何漱得坡云慚愧闍黎㑹得蔣仲甫聞之孫景修近歲有人鑿山取銀礦至深處聞有人誦經聲發之得一人云吾亦取礦者以窟壞不能出居此不知幾年平生誦金剛經自隨每有飢渴之念即若有人自腋下以餅餌遺之殆此經變現也道家言守一若飢一與之糧若渴一與之漿此人於經中豈所謂得一者乎泗洲大聖僧伽傳云和尚何國人也又世云莫知其所從來云不知何國人也近讀隋史西域傳乃有何國余在惠州忽被命責儋耳太守方子容自携告身來且弔余曰此固前定可無恨吾妻沈素事僧伽謹甚一夕夢和尚告别沈問所往答曰當與蘇子瞻同行後七十二日當有命今適七十二日矣豈非前定乎余以謂事之前定者不待夢而知然余何人也而和尚辱與同行得非夙世有少緣契乎袁宏漢紀曰浮屠佛也西域天竺國有佛道焉佛者漢言覺也將以覺悟羣生也其教也以修善慈心為主不殺生專務清淨其精者為沙門沙門漢言息也蓋息意去欲歸於無為又以為人死精神不滅隨復受形生時善惡皆有報應故貴行修善道以煉精神以至無生而得為佛也東坡居士曰此殆中國始知有佛時語也雖淺近大略具足矣野人得鹿正爾煮食之耳其後賣與市人遂入公庖中饌之百方然鹿之所以美未有絲毫加於煮食時也耳如芭蕉心如蓮花百節疏通萬竅玲瓏來時一去時八萬四千此義出楞嚴世未有知之者也元符三年九月二十一日書贈都嶠邵道士晋方技傳有幸靈者父母使守稻牛食之靈見而不驅牛去乃埋其殘亂者父母怒之靈曰物各欲食牛方食奈何驅之父母愈怒曰即如此何用理亂者為靈曰此稻又欲得生此言有理靈固有道者耶吕猗母足得痿痺病十餘年靈療之去須數步坐瞑目寂然有頃曰扶起夫人坐猗曰夫人得疾十年豈可倉卒令起耶靈曰且試扶起兩人夾扶而立少頃去夾者遂能行學道養氣者至足之餘能以氣與人都下道士李若之能之謂之布氣吾中子逮少羸多疾若之相對坐為布氣逮聞腹中如初日所照溫溫也蓋若之曾遇得道異人於華嶽下云元符三年八月余在合浦有老人蘇佛兒來訪年八十二不飲酒食肉兩目爛然蓋童子也自言十二歲齊居修行無妻子有兄弟三人皆持戒念道長者九十二次者九十與論生死事頗有所知居州城東南六七里佛兒嘗賣菜之東坡見老人言即心是佛不在斷肉余言勿作此念衆人難感易流老人大喜曰如是如是紹聖二年五月九日都下有道人坐相國寺賣諸禁方緘題其一曰賣賭錢不輸方少年有博者以千金得之歸發視其方曰但止乞頭道人亦鬻術矣戲語得千金然亦未嘗欺少年也陸道士惟忠字子厚眉山人好丹藥通術數能詩蕭然有出塵之姿久客江南無知之者豫昔在齊安蓋相從遊因是謁子由髙安子由大賞其詩會吳逺之過彼遂與俱來惠州出此詩朱氏子出家少名照僧少喪父與其母尹皆願出家照僧師守素乃參寥子弟子也照僧九歲舉止如成人誦赤壁賦鏗然鸞鶴聲也不出十年名聞四方此參寥子之法孫東坡之門僧也錢塘夀禪師本北郭稅務專知官每見魚蝦輒買而放以是破家後遂盜官錢為放生之用事發坐死領赴市矣吳越錢王使人視之若悲懼如常人即殺之否則捨之禪師淡然無異色乃舍之遂出家得法眼淨禪師應以市曹得度故菩薩乃現市曹以度之學出生死法得向死地走之一遭抵三十年修行吾竄逐海上去死地稍近當於此證阿羅漢果杜牧集有燉煌郡僧正兼州學博士僧慧苑除臨壇大德制詞蓋宣宗復河湟時事也蕃僧最貴中國紫衣師號种世衡知青澗城無以使此等輒出牒補授君子豫其權不責其專也蘇臺定惠院淨人卓契順不逺數千里陟嶺渡海候無恙於東坡東坡問將甚麼土物來順展兩手坡云可惜許數千里空手來順作荷擔勢信步而去僧謂酒為般若湯謂魚為水梭花雞為鑽籬菜竟無所益但欺而已世常笑之人有為不義而文之以美名者與此何異哉稷下之盛胎驪山之禍太學三萬人噓枯吹生亦兆黨錮之寃今吾聞本秀二僧皆以口耳區區奔走王公洶洶都邑安得而不敗殆非浮屠氏之福也妙總師參寥子豫友二十餘年矣世所獨知其詩文所不知者蓋過於詩文也獨好面折人過失然人知其無心如虛舟之觸物蓋未嘗有怒者徑山長老維琳行峻而通文麗而清始徑山祖師有約後世止以甲乙住持豫謂以適事之宜而廢祖師之約當於山門選用有德乃以琳嗣事衆初有不悅其人然終不能勝悅者之多且公也今則大定矣杭州圓照律師志行苦卓教法通洽晝夜行道二十餘年矣無一念頃有作相自辨才歸寂道俗皆宗之秀州本覺寺一長老少蓋有名進士自文字言語悟入至今以筆研作佛事所與游皆一時文人淨慈楚明長老自越州來始有㫖召小本禪師住法雲寺杭人憂之曰本去則淨慈衆散矣余乃以明嗣事衆不散加多益千餘人蘇州仲殊師利和尚能文善詩及歌詞皆操筆立成不㸃竄一字豫曰此僧胸中無一毫髮事故與之遊蘇州定慧長老守欽豫初不識比至惠州欽使侍者卓契順來問豫安否且寄十詩豫題其後曰此僧清逸絶俗語有璨忍之通而詩無島可之寒豫往來吳中久矣而不識此僧何也下天竺淨慧禪師思義學行甚高諳練世事高麗非時遣僧來豫方請其事於朝使義館之義日與講佛法詞辨蜂起夷僧莫能測又具得其情以告蓋其才有過人者孤山思聰聞復師作詩清逺如畫工而雅逸愛放而不流其為人稱其詩祥符寺可久垂雲清順三闍黎皆豫監郡日所與往還詩友也清介貧甚食僅足而久幾於不足也然未嘗有憂色老矣不知尚健否法頴沙彌參寥子之法孫也七八嵗事師如成人上元夜豫作樂滅慧頴坐一夫肩上顧之豫謂曰出家兒亦看燈耶頴愀然變色若無所容啼呼求去自爾不復出嬉游今六七年矣後當嗣參寥者豫在惠州有永嘉羅漢院僧惠戒來謂曰明日當還浙東問所欲幹者豫無以答之獨念吳越多名僧與豫善者常十九偶録此數人以授惠戒使歸見之致豫意且謂道豫居此起居飲食狀以解其念也信筆書紙語無倫次又當尚有漏落者方醉不能詳也紹聖二年東坡居士書異事王烈入山得石髓懷之以餉嵇叔夜叔夜視之則堅為石矣當時若杵碎或錯落食之豈不賢於雲母鍾乳輩哉然神仙要有定分不可力求退之有言我能詰曲自世間安能從汝巢神仙如退之性氣雖出世間人亦不能容叔夜婞直又甚於退之也道人徐問真自言濰州人嗜酒狂肆能啖生葱鮮魚以指為針以土為藥治病良有驗歐陽文忠公為青州問真來從公遊久之乃求去聞公致仕復來汝南公常館之使伯和父兄弟為之主公常有足疾狀少異醫莫能喻問真教公汲引氣血自踵至頂公用其言病輒己忽一日求去甚力公留之不可曰我有罪我與公卿游我不復留公使人送之果有冠鐵冠丈夫長八尺許立道周俟之問真出城顧村童使持藥笥行數里童告之求去問真於髻中出小瓢如棗大再三覆之掌中得酒滿掬者二以飲童子良酒也自爾不復知其存亡而童子徑發狂亦莫知其所終軾過汝隂公具言如此其後貶黃州而黃岡縣令周孝孫暴得重膇疾軾試以問真口訣授之七日而愈元祐六年十一月二日與叔弼父季默父夜坐話其事事復有甚異者不欲盡書然問真要為異人也山不甚髙而夜見日此可異也山有二樓今延祥寺在南樓下朱明洞在冲虛觀後云是蓬萊第一洞天唐永樂道士侯道華以食鄧天師棗仙去永樂有無核棗人不可得道華得之余在岐下亦得食一枚云唐僧契虛遇人導游稚川仙府真人問曰汝絶三彭之仇乎虛不能答冲虛觀後有米真人朝斗壇近於壇上獲銅龍六銅魚一唐有夢銘云紫陽真人山𤣥卿撰又有蔡少霞者夢遣書牌題云五雲閣吏蔡少霞書記羅浮山有官吏自羅浮都虛觀游長壽中路覩見道室數十間有道士據檻坐見吏不起吏大怒使人詰之至則人室皆亡矣乃知羅浮凡聖雜處似此等異境平生修行人有不得見者吏何人乃獨見之正使一凡道士見已不起何足怒吏無狀如此得見此者必前緣也吾昔謫黃州曾子固居憂臨川死焉人有妄傳吾與子固同日化去且云如李長吉時事以上帝召他時先帝亦聞其語以問蜀人蒲宗孟且有歎息語今謫海南又有傳吾得道乘小舟入海不復返者京師皆云兒子書來言之今日有從黃州來者云太守何述言吾在儋耳一日忽失所在獨道服在耳蓋上賔也吾平生遭口語無數蓋生時與韓退之相似吾命在斗間而身宫在焉故其詩曰我生之辰月宿斗直且曰無善聲以聞無惡聲以揚今謗我者或云死或云仙退之之言良非虛爾䖍州布衣賴仙芝言連州有黃損僕射者五代時人僕射蓋仕南漢也未老退歸一日忽遁去莫知其所存亡子孫畫像事之凡三十二年復歸坐阼階上呼家人其子適不在孫出見之索筆書壁云一别人間歲月多歸來人事已消磨惟有門前鑑池水春風不改舊時波投筆竟去不可留子歸問其狀貌孫云甚似影堂老人也連人相傳如此其後頗有祿仕者章察字隱之本閩人遷於成都數世矣善屬文不仕晚用太守王素薦賜號冲退處士一日夢有人寄書召之者云東嶽道士書也明日與李士寧游青城濯足水中察謂士寧曰腳踏西溪流去水士寧答曰手持東嶽寄來書察大驚不知其所自來也未幾察果死其子祀亦以逸民舉仕一命乃死士寧蓬州人也語默不常或以為得道者百歲乃死嘗見余成都曰子甚貴當䇿舉首已而果然司馬相如諂事武帝開西南夷之隙及病且死猶草封禪書此所謂死而不已者耶列仙之隱居山澤間形容甚臞此殆四果人也而相如鄙之作大人賦不過欲以侈言廣武帝意耳夫所謂大人者相如孺子何足以知之若賈生鵩鳥賦真大人者也庚辰八月二十二日東坡書秦太虛言寶應民有以嫁娶㑹客者酒半客一人竟起出門主人追之客若醉甚將赴水者主人急持之客曰婦人以詩招我其辭云長橋直下有蘭舟破月衝煙任意游金玉滿堂何所用爭如年少去來休倉黃就之不知其為水也然客竟亦無他夜㑹說鬼參寥舉此聊為之記戊寅十一月余在儋耳聞城西民李氏處子病卒兩日復生余與進士何旻同往見其父問死生狀云初昏若有人引去至官府幕下有言此誤追庭下一吏云可且寄禁又一吏云此無罪當放還見獄在地窟中隧而出入繫者皆儋人僧居十六七有一嫗身皆黃毛如驢馬械而坐處子識之蓋儋僧之室也曰吾坐用檀越錢物己三易毛矣又一僧亦處子鄰里死已二年矣其家方大祥有人持盤餐及錢數千云付某僧僧得錢分數百遺門者乃持飯入門去繫者皆爭取其飯僧飯所食無幾又一僧至見者擎跪作禮僧曰此女可差人速送還送者以手擘墻壁使過復見一河有舟使登之送者以手推舟舟躍處子驚而寤是僧豈所謂地藏菩薩耶書此為世戒吾八歲入小學以道士張易簡為師童子幾百人師獨稱吾與陳太初者太初眉山市井人子也余稍長學日益遂第進士制䇿而太初乃為郡小吏其後余謫居黃州有眉山道士陸惟忠自蜀來云太初已尸解矣蜀人吳師道為漢州太守太初往客焉正歲旦見師道求衣食錢物且告别持所得盡與市人貧者反坐於㦸門下遂卒師道使卒舁往野外焚之卒罵曰何物道士使吾正旦舁死人太初微笑開目曰不復煩汝步自㦸門至金鴈橋下趺坐而逝焚之舉城人見烟熖上眇眇焉有一陳道人也世有附語者多婢妾賤人否則衰病不久當死者也其聲音舉止皆類死者又能知人密事然皆非也意有竒鬼能為是耶昔人有逺行者欲觀其妻於已厚薄取金叉藏之壁中忘以語之既行而病且死以告其僕既而不死忽聞空中有聲真其夫也曰吾已死以為不信金叉在某處妻取得之遂喪其後夫歸妻乃反以為鬼也嘗有三老人相遇或問之年一人曰吾年不可記但憶少年時與盤古有舊一人曰海水變桑田時吾輒下一籌爾來吾籌己滿十間屋一人曰吾所食蟠桃棄其核於崑崙山下今已與崑崙齊矣以余觀之三子者與蜉蝣朝菌何以異哉世人有見古德見桃花悟道者爭頌桃花便將桃花作飯五十年轉沒交涉正如張長史見擔夫與公主爭路而得草書之氣欲學長史書便日就擔夫求之豈可得哉爾朱道士晚客於眉山故蜀人多記其事自言受記於師云汝後遇白石浮當飛仙去爾朱雖以此語人亦莫識所謂後去眉山乃客於涪州愛其所産丹砂雖鎖細而皆矢鏃狀瑩徹不雜土石遂止錬丹數年竟於涪州白石仙去乃知師所言不謬者聞長老道其事甚多然不記其名字可恨也本草言丹砂出符陵谷陶隱居云符陵是涪州今無復採者吾聞熟於涪者云採藥者時復得之但時方貴辰錦砂故此不甚採爾讀本草偶記之也東坡全集卷一百二
