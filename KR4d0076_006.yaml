body:
  text: 東坡全集卷六宋蘇軾撰詩九十九首虎丘寺入門無平田石路穿細嶺隂風生澗壑古木翳潭井湛盧誰復見秋水光耿耿鐵花秀巖壁殺氣噤蛙黽幽幽生公堂左右立頑礦當年或未信異類服精猛胡為百歲後仙鬼互馳騁窈然留新詩讀者為悲哽東軒有佳致雲水麗千頃熙熙覽生物春意破凄冷我來屬無事暖日相與永喜鵲翻初旦愁鳶蹲落景坐見漁樵還新月溪上影悟彼良自咍歸田行可請常潤道中有懷錢塘寄述古五首從來直道不辜身得向西湖兩過春沂上巳成曽點服泮宫初采魯侯芹休驚歲歲年年貌且對朝朝莫莫人細雨晴時一百六畫船鼉鼓莫違民草長江南鶯亂飛年來事事與心違花開後院還空落燕入華堂怪未歸世上功名何日是樽前點檢幾人非去年栁絮飛時節記得金籠放雪衣杭人以放鴿為太守夀浮玉山頭日日風即金山也湧金門外巳春融二年魚鳥渾相識三月鶯花付與公剩看新翻眉倒暈未應泣别臉消紅何人織得相思字寄與江邊北向鴻國豔天饒酒半酣去年同賞寄僧簷但知撲撲晴香軟誰見森森曉態嚴穀雨共驚無幾日蜜蜂未許輒先甜應須火急回征棹一片辭枝可得黏惠山泉下土如濡陽羡溪頭米勝珠賣劔買牛吾欲老殺雞為黍子來無地偏不信容髙蓋俗儉真堪著腐儒莫怪江南苦留滯經營身計一生迂刁景純賞瑞香花憶先朝侍宴次韻上苑夭桃自作行劉郎去後幾回芳厭從年少追新賞間對宫花識舊香欲贈佳人非泛洧好紉幽佩弔沉湘鶴林神女無消息為問何年返帝鄉同栁子玉逰鶴林招隱醉歸呈景純花時臘酒照人光歸路春風灑面涼劉氏宅邊霜竹老戴公山下野桃香巖頭匹練兼天靜泉底真珠濺客忙安得道人携笛去一聲吹裂翠崖岡景純見和復次韻贈之二首解組歸來道益光坐看百物自炎涼卷簾堂上檀槽鬧送客林間樺燭香淺量巳愁當酒怯非才尤覺和詩忙何人貪佩黃金印干柱耽耽鎖北岡人間膏火正爭光每到藏春得暫涼多事始知田舍好凶年偏覺野蔬香溪山勝畫徒能説來往如梭為底忙老去此身無處著為翁栽插萬松岡柳子玉亦見和因以送之兼寄其兄子璋道人不羡腰金照地光暫時假面弄西涼晴窗咽日肝腸暖古殿朝真屨袖香説靜故知猶有動無間底處更求忙先生官罷乘風去何用區區賦陟岡子玉家宴用前韻見寄復答之自酌金樽勸孟光更教長笛奏伊涼子玉家有笛妓牽衣男女繞太白扇枕郎君煩阿香詩病逢春轉深痼愁魔得酒暫奔忙醒時情味吾能説日在西南白草岡景純復以二篇一言其亡兄與伯父同年之契一言今者唱酬之意仍次其韻靈夀扶來似孔光感時懷舊一悲涼蟾枝不獨同攀桂雞舌還應共賜香亦同為郎等是浮休無得喪粗分憂樂有間忙年來世事如波浪鬱鬱誰知柏在岡屢把鉛刀齒步光更遭華衮照厖涼蘇門山上莫長嘯薝蔔林中無别香燭燼巳殘中夜刻槐花還似昔年忙背城借一吾何敢慎莫樽前替戾岡金山寺與栁子玉飲大醉卧寶覺禪榻夜分方醒書其壁惡酒如惡人相攻劇刀箭頽然一榻上勝之以不戰詩翁氣雄拔禪老語清軟我醉都不知但覺紅緑眩醒時江月墮摵摵風響變惟有一龕燈二豪俱不見大風留金山兩日塔上一鈴獨自語明日顛風當斷渡朝來白浪打蒼崖倒射軒窗作飛雨龍驤萬斛不敢過漁艇一葉從掀舞細思城市有底忙却笑蛟龍為誰怒無事久留童僕怪此風聊得妻孥忤灊山道人獨何事半夜不眠聽粥鼓監洞霄宫俞康直郎中所居四詠退圃百丈休牽上瀨船一鈎歸釣縮頭鯿園中草木春無數只有黃楊厄閏年俗説黃楊歲長一寸遇閏退三寸逸堂新第誰來作並鄰舊官寧復憶星辰請君置酒吾當賀知向江湖拜散人遁軒冠蓋相望起隱淪先生那得老江村古來真遁何曽遁笑殺逾垣與閉門逺棲西山煙雨卷疏簾北户星河落短簷不獨江天解空濶地偏心逺似陶潛逰鶴林招隱二首郊原雨初霽春物有餘妍古寺滿修竹深林聞杜鵑睡餘栁花墮目眩山櫻然西窗有病客危坐看香煙行歌白雲嶺坐咏修竹林風輕花自落日薄山半隂澗草誰復識聞香杳難尋時見城市人幽居惜未深書普慈長老壁志誠普慈寺後千竿竹醉裏曽看碧玉椽倦客再逰行老矣髙僧一笑故依然久參白足知禪味苦厭黃公鳥名聒晝眠惟有兩株紅杏葉晚來猶得向人妍書焦山綸長老壁法師住焦山而實未嘗住我來輒問法法師了無語法師非無語不知所答故君看頭與足本自安冠屨譬如長鬛人不以長為苦一旦或人問每睡安所措歸來被上下一夜著無處展轉遂達晨意欲盡鑷去此言雖鄙淺故自有深趣持此問法師法師一笑許刁景純席上和謝生二首悮入仙人碧玉壺一歡那復間親踈杯盤狼藉吾何敢車騎雍容子甚都此夜新聲聞北里他年故事紀南徐欲窮風月三千界願化人天百億軀縱飲誰能問挈壺不知門外曉星踈綺羅勝事齊三閣賓主談鋒敵兩都榻畔煙花常歎杜海中童丱尚追徐毋多酌我公須聽醉後粗狂膽滿軀留别金山寶覺圓通二長老沐罷巾冠快晚涼睡餘齒頰帶茶香艤舟北岸何時渡晞髮東軒未肯忙康濟此身殊有道醫治外物本無方風流二老長還往顧我歸期尚渺茫無錫道中賦水車翻翻聫聫銜尾鴉犖犖確確蛻骨蛇分畦翠浪走雲陳刺水緑針抽稻芽洞庭五月欲飛沙鼉鳴窟中如打衙天公不見老農泣喚取阿香推雷車杭州牡丹開時僕猶在常潤周令作詩見寄次其韻復次一首送赴闕羞歸應為負花期巳是成隂結子時與物寡情憐我老遣春無恨賴君詩玉臺不見朝酣酒金縷猶歌空折枝從此年年定相見欲師老圃問樊遲莫負黃花九日期人生窮達可無時十年且就三都賦萬户終輕千首詩天靜傷鴻猶戢翼月明驚鵲未安枝君看六月河無水萬斛龍驤到自遲蘇州閭丘江君二家雨中飲酒二首小圃隂隂遍灑塵方塘瀲瀲欲生紋巳煩仙袂來行雨莫遣歌聲便駐雲肯對綺羅辭白酒試將文字惱紅裙今宵記取醒時節點滴空階獨自聞五紀歸來鬢未霜十眉環列坐生光喚船渡口迎秋女駐馬橋邊問泰娘曽把四絃娛白傅敢將百草鬭吳王從今却笑風流守畫戟空凝宴寢香次韻沈長官三首家山何在兩忘歸杯酒相逢慎勿違不獨飯山嘲我瘦也應粳核怪君肥男婚巳畢女將歸纍盡身輕志莫違誰道山中食無肉玉池清水自生肥造物知吾久念歸似憐衰病不相違風來震澤帆初飽雨入松江水漸肥戲書吳江三賢畫像三首誰將射御教吳兒長笑申公為夏姬却遣姑蘇有麋鹿更憐夫子得西施范蠡浮世功勞食與眠季鷹真得水中仙不須更説知機早直為鱸魚也自賢張翰千首文章二頃田囊中未有一錢看却因養得能言鴨驚破王孫金彈丸陸龜蒙和劉孝叔會虎丘時王規甫齋素祈雨不至二首白簡威猶凜青山興巳穠鶴間雲作氅駝卧草埋峰跪履若可教卜鄰應見容因公問回老何處定相逢太常齋未解不肯對纎穠只遣三千履來逰十二峰林空答清唱潭淨寫衰容歸去瑶臺路還應月下逢過永樂文長老巳卒初驚鶴瘦不可識旋覺雲歸無處尋三過門間老病死一彈指頃去來今存亡慣見渾無淚鄉井難忘尚有心欲向錢塘訪圓澤葛洪川畔待秋深贈張刁二老兩邦山水未凄涼二老風流總健強共成一百七十歲各飲三萬六千場藏春塢裏鶯花鬧仁夀橋邊日月長惟有詩人被磨折金叉零落不成行去年秋偶逰寶山上方入一小院闃然無人有僧隱几低頭讀書與之語漠然不甚對問其鄰之僧曰此雲闍黎也不出十五年矣今年六月自常潤還復至其室則死葬數月矣作詩題其壁雲師來寶山一住十五秋讀書常閉户客至不舉頭去年造其室清坐忘百憂我初無言説師亦無對酬今來復扣門空房但颼飀云巳滅無餘薪盡火不留却疑此室中常有斯人不所遇孰非夢事過吾何求聽僧昭素琴至和無攫醳至平無按抑不知微妙聲究竟何從出散我不平氣洗我不和心此心知有在尚復此微吟僧惠勤初罷僧職軒軒青田鶴鬱鬱在樊籠既為物所縻遂與吾輩同今來始謝去萬事一笑空新詩如洗出不受外垢蒙清風入齒牙出語如風松霜髭茁病骨飢坐聽午鐘非詩能窮人窮者詩乃工此語信不妄吾聞諸醉翁逰靈隱髙峰塔言逰髙峰塔蓐食治野裝火雲秋未衰及此初旦涼霧霏巖谷暗日出草木香嘉我同來人久便雲水鄉相勸小舉足前路髙且長古松攀龍蛇怪石坐牛羊漸聞鐘磬音飛鳥皆下翔入門空有無雲海浩茫茫惟見聾道人老病時絶糧問年笑不答但指穴藜牀心知不復來欲歸更傍徨贈别留匹布今歲天早霜八月十七日天竺山送桂花分贈元素月缺霜濃細蘃乾此花元屬桂堂仙鷲峰子落驚前夜蟾窟枝空記昔年破裓山僧憐耿介練裙溪女鬬清妍願公採擷紉幽佩莫遣孤芳老澗邊捕蝗至浮雲嶺山行疲苦有懷子由弟二首西來煙陳塞空虛灑遍秋田雨不如新法清平那有此老身窮苦自招渠無人可訴烏銜肉憶弟難慿犬寄書自笑迂踈皆此類區區猶欲理蝗餘霜風漸欲作重陽熠熠溪邊野菊黃久廢山行疲犖確尚能村醉舞淋浪獨眠林下夢魂好回首人間憂患長殺馬毁車從此逝子來何處問行藏青牛嶺髙絶處有小寺人迹罕到暮歸走馬沙河塘爐煙裊裊十里香朝行曳杖青牛嶺崖泉咽咽千山靜君勿笑老僧耳聾喚不聞百年俱是可憐人明朝且復城中去白雲却在題詩處新城陳氏園次朝補之韻荒涼廢圃秋寂歷幽花晚山城巳窮僻况與城相逺我來亦何事徙倚望雲巘不見苦吟人清樽為誰滿梅聖俞詩集中有毛長官者今於潛令國華也聖俞沒十五年而君猶為令捕蝗至其邑作詩戲之詩翁憔悴老一官厭見苜蓿堆青盤歸來羞澀對妻子自比鮎魚緣竹竿今君滯留生二毛飽聽衙鼓眠黃紬更將嘲笑調朋友人道獼猴騎土牛願君恰似髙常侍暫為小邑仍刺史不願君為孟浩然却遭明主放還山宦逰逢此歲年惡飛蝗來時半天黑羡君封境稻如雲蝗自識人人不識與毛令方尉逰西菩提寺二首推擠不去巳三年魚鳥依然笑我頑人未放歸江北路天教看盡浙西山尚書清節衣冠後處士風流水石間一笑相逢那易得數詩狂語不須刪路轉山腰足未移水清石瘦便能竒白雲自占東西嶺明月誰分上下池黑黍黃粱初熟後朱柑緑橘半甜時人生此樂須天賦莫遣兒曹取次知聽賢師琴大絃春溫和且平小絃亷折亮以清平生未識官與角但聞牛鳴盎中雉登木門前剝啄誰扣門山僧未間君勿瞋歸家且覔千斛水淨洗從前筝笛耳贈寫真何充秀才君不見潞州别駕眼如電左手挂弓橫撚箭又不見雪中騎驢孟浩然皺眉吟詩肩聳山飢寒富貴兩安在空有遺像留人間此身常擬同外物浮雲變化無蹤迹問君何苦寫我真君言好之聊自適黃冠野服山家容意欲置我山巖中勳名將相今何限往寫褒公與鄂公回先生過湖州東林沈氏飲醉以石榴皮書其家東老庵之壁云西鄰巳富憂不足東老雖貧樂有餘白酒釀來因好客黃金散盡為收書西蜀和仲聞而次其韻三首東老沈氏之老自謂也湖人因以名之其子偕作詩有可觀者世俗何知貧是病神仙可學道之餘但知白酒留佳客不問黃公覔素書符離道士晨興際華嶽先生尸解餘忽見黃庭丹篆句猶傳青紙小朱書凄涼雨露三年後髣佛塵埃數字餘至用榴皮緣底事中書君豈不中書李行中秀才醉眠亭巳向間中作地仙更於酒裏得天全從教世路風波惡賀監偏工水底眠君且歸休我欲眠人言此語出天然醉中對客眠何害須信陶潛未若賢孝先風味也堪憐肯為周公晝日眠枕麴先生猶笑汝枉將空腹貯遺編甘露寺彈筝多景樓上彈神曲欲斷哀絃再三促江妃出聽霧雨愁白浪翻空動浮玉金山名喚取吾家雙鳳槽遣作三峽孤猿號與君合奏芳春調啄木飛來霜樹杪單同年求德興俞氏聚逺樓詩三首雲山煙水苦難親野草幽花各自春賴有髙樓能聚逺一時收拾與間人無限青山散不收雲奔浪卷入簾鈎直將眼力為疆界何啻人間萬户侯聞説樓居似地仙不知門外有塵寰幽人隱几寂無語心在飛鴻滅沒間平山堂次王居卿祠部韻髙會日陪山簡醉狂言屢發次公醒酒如人面天然白山向吾曹分外青江上飛雲來北固檻前修竹憶南屏六朝興廢餘丘壠空使姦雄笑寧馨次韻陳海州書懷鬱鬱蒼梧海上山東海鬱洲山云自蒼梧浮來蓬萊方丈有無間舊聞草木皆仙藥欲棄妻孥守市闤雅志未成空自歎故人相對若為顔酒醒却憶兒童事長恨雙鳬去莫攀陳曽令鄉邑次韻陳海州乘槎亭人事無涯生有涯逝將歸釣漢江槎乘桴我欲從安石遁世誰能識子嗟日上紅波浮碧巘潮來白浪卷青沙清談美景雙竒絶不覺歸鞍帶月華次韻孫職方蒼梧山蒼梧竒事豈虛傳荒怪還須問子年逺托鼇頭轉滄海來依鵬背負青天或云靈境歸賢者又恐神功亦偶然聞道新春恣逰覽羡君平地作飛仙次韻孫巨源寄漣水李盛二著作并以見寄五絶南嶽諸劉豈易逢相望無復馬牛風山公雖見無多子社燕何由戀塞鴻昔與巨源劉貢父劉莘老相遇於山陽自爾契濶惟巨源近者復相見於京口髙才晚歲終難進勇退當年正急流不獨二疏為可慕他時當有景孫樓巨源近離東海郡有景疏樓漱石先生難可意謂巨源齧氊校尉久無朋自謂應知客路愁無奈故遣吟詩調李陵謂李君也雲雨休排神女車忠州老病畏人誇詩豪正值安仁在空看河陽滿縣花盛為邑宰膠西未到吾能説桑柘禾麻不見春不羡京塵騎馬客羡他淮月弄舟人王莽漢家殊未識經綸入手功名事事新百尺穿成連夜井千金購得解飛人董卓公業平時勸用儒諸公何事起相圖只言天下無健者豈信車中有布乎虎兒舊聞老蚌生明珠未省老生於菟老自謂月中物不騎快馬騎蟾蜍蟾蜍爬沙不肯行坐令青衫垂白鬚於莵駿猛不類渠指揮黃熊駕黑貙丹砂紫麝不用塗眼光百步走妖狐妖狐莫誇智有餘不勞搖牙咀爾徒除夜病中贈段屯田龍鍾三十九勞生已強半歲暮日斜時還為昔人歎樂天詩云行年三十九歲暮日斜時今年一線在那復堪把玩欲起強持酒故交雲雨散惟有病相尋空齋為老伴蕭條燈火冷寒夜何時旦倦僕觸屏風飢鼯嗅空案數朝閉閣卧霜髮秋蓬亂傳聞使者來策杖就梳盥書來苦安慰不怪造請緩大夫忠烈後髙義金石貫要當擊權豪未肯覷衰懦此生何所似暗盡灰中炭歸田計巳決此邦聊假館三徑粗成資一枝有餘暖願君留信宿庶奉一笑粲喬太博見和復次韻答之百年三萬日老病常居半其間互憂樂歌笑雜悲歎顛倒不自知直為神所玩須臾便堪笑萬事風雨散自從識此理久謝少年伴逝將逰無何豈暇讀城旦非才更多病二事可并案愧煩賢使者弭節整紛亂喬侯瑚璉質清廟嘗薦盥奮髯百吏走坐變齊俗緩未遭甘鷁退並進恥魚貫每聞議論餘凛凛激貪懦莫邪當自躍豈復煩爐炭便應朝秣越未暮刷燕館胡為守故丘眷戀桑榆暖為君扣牛角一咏南山粲二人再和亦再答之寒雞知將晨飢鶴知夜半亦如老病客遇節常感歎光隂等敲石過眼不容玩親友如摶沙放手還復散羈孤每自笑寂寞誰肯伴元達號神君晉循吏喬智明字元達髙論森月旦紀明本賢將段釋之本將家汩沒事堆案欣然肯相顧夜閣燈火亂盤空愧不飽酒薄僅堪盥雍容許著帽不怪安石緩雖無窈窕人清唱弄珠貫幸有從橫舌説劔起慵懦二豪沉下位暗火埋濕炭豈似草玄人默默老儒館行看富貴逼炙手借餘暖應念苦思歸登樓賦王粲雪後書北臺壁二首黃昏猶作雨纎纎夜靜無風勢轉嚴但覺衾裯如潑水不知庭院巳堆鹽五更曉色來書幌半夜寒聲落畫簷試掃北臺看馬耳未隨埋沒有雙尖城頭初日始翻鴉陌上晴泥巳沒車凍合玉樓寒起粟光搖銀海眩生花遺蝗入地應千尺宿麥連雲有幾家老病自嗟詩力退空吟氷柱憶劉叉謝人見和前篇二首已分酒杯欺淺懦敢將詩律鬭深嚴漁蓑句好應須畫柳絮才髙不道鹽敗履尚存東郭足飛花又舞謫仙簷書生事業真堪笑忍凍孤吟茟退尖九陌凄風戰齒牙銀杯逐馬帶隨車也知不作堅牢玉無奈能開頃刻花得酒強歡愁底事閉門髙卧定誰家臺前日暖君須愛氷下寒魚漸可叉鐵溝行贈喬太博城東坡壠何所似風吹海濤低復起城中病守無所為走馬來尋鐵溝水鐵溝水淺不容輈恰似當年韓與侯有魚無魚何足道駕言聊復寫我憂荒村野店亦何有欲發狂言須斗酒山頭落日側金盆倒著接㒿搔白首忽憶從軍年少時輕裘細馬百不知臂弓腰箭南山下追逐長楊射獵兒老去同君兩憔悴犯夜醉歸人不避今年定起故將軍未肯先誅霸陵尉出城送客不及步至溪上二首送客客巳去尋花花未開未能城裏去且復水邊來父老借問我使君安在哉今年好風雪會見麥千堆春來六十日笑口幾回開會作堂堂去何妨得得來倦遊行老矣舊隱賦歸哉東望峨眉小盧山翠作堆郡東盧山絶類峩眉而小蘇州姚氏三瑞堂姚氏世以孝稱君不見董邵南隱居行義孝且慈天公亦恐無人知故令雞狗相哺兒又令韓老為作詩爾來三百年名與淮水東南馳此人世不乏此事亦時有楓橋三瑞皆目見天意宛在虞鰥後惟有此詩非昔人君更往求無價手莫笑銀杯小答喬太博陶潛一縣令獨飲仍獨醒猶將公田二頃五十畝種秫作酒不種粳我今號為二千石歲釀百石何以醉賓客請君莫笑銀杯小爾來歲旱東海窄會當拂衣歸故丘作書貸粟監河侯萬斛船中著美酒與君一生長拍浮送段屯田分得于字勸農使者古丈夫不惜春衫踐泥塗王事靡盬君甚劬奉常客卿虬兩須東武縣令天馬駒泮宫先生非俗儒相與野飲四子俱樂哉此樂城中無溪邊䇿杖自携壺腰笏不煩何易于膠西病守老且迂空齋愁坐紛墨朱四十豈不知頭顱畏人不出何其愚和段屯田荆林館南山有佳色無人空自竒清詩為題品草木變芬菲謝女得秀句留待中郎歸便當勒鞭䇿僕倦馬亦飢段有姪女在密贈上天竺辨才師南北一山門上下兩天竺中有老法師瘦長如鸛鵠不知修何行碧眼照山谷見之自清涼洗盡煩惱毒坐令一都會男女禮白足我有長頭兒角頰峙犀玉四嵗不知行抱負煩背腹師來為摩頂起走趁奔鹿乃知戒律中妙用謝羈束何必言法華佯狂啖魚肉逰盧山次韻章傳道塵容巳似服轅駒野性猶同縱壑魚出入巖巒千仭表較量筋力十年初雖無窈窕驅前馬還有鴟夷挂後車莫笑吟詩淡生活當令阿買為君書盧山五咏盧敖洞圖經云敖秦博士避難此山遂得道上界足官府飛升亦何益還在此山中相逢不相識飲酒臺博士雅好飲空山誰與娛莫向驪山去君王不喜儒聖燈巖石室有金丹山神不知祕何必露光芒夜半驚童稚三泉皎皎巖下泉無人還自潔不用比三星清光同一月障日峰其狀類峩眉但小耳長安自不逺蜀客苦思歸莫教名障日喚作小峩眉東坡全集卷六
