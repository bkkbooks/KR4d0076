body:
  text: 東坡全集卷六十一宋蘇軾撰奏議五首乞賜度牒糴斛斗準備賑濟淮浙流民狀元祐六年十二月二十五日龍圖閣學士左朝奉郎知潁州蘇軾狀奏臣近因出城市中時有挾挈襁褓如流民者問之皆云自夀州來尋取問得城門守把者亦云時有此色人見淮西提刑司出榜立賞不許米斛過淮北因此體問得士人南來者皆云今秋廬濠夀等州皆飢見今農民已煎榆皮及用粳麩雜馬齒莧煮食兼夀州盜賊已漸昌熾安豐縣木埸鎮打劫施助教家霍邱縣善鄉鎮打劫謝解元家六安縣故鎮打劫魏家賊徒皆十餘人或云二三十人頗有騎馬者器仗甚備每處贓皆數千貫申報官司多不盡實亦有不申報者兼潁州界亦有惡賊尹遇陳興子鄭饒李松等數人皆老姦逋寇私立名號與官吏鬬敵方欲結集規相應和近日雖已敗獲深恐淮南羣盜不止流入潁河界縱不能為大害但飢民附之徒黨稍衆如王沖管三之流便不易捕獲臣又聞淮南自秋至今雨雪不足麥熟不熟蓋未可知若麥不熟必大有飢民浙西江東既非豐熟地分勢必流徙北來則潁州首被其患若流民至潁而官無以濟之則橫尸布路盜賊羣起必然之勢也所以須至先事奏乞若至時元無此事臣不敢避張皇過當之罪若隱而不言倉卒無備别成意外之虞其罪大矣臣日夜計慮勢不可緩謹具條件如左一勘會本州常平斛斗見管粳米三萬四千餘石通紐元糴價每斗計一百一十八文有畸菉豆一萬三千餘石通紐元糴價每斗計七十二文有畸小麥二萬五千餘石通紐元糴價每斗計五十四文有畸上件三色並係元糴髙價縱依條量減出糴亦未能大段平減市價兼流民轉徙失所必無錢收買官米雖依條許借貸人戶又緣流民既非土著將來無緣催索又條許常平斛斗召募飢民工役及許依乞丐人給米斛不得過所限之數兩倍臣今相度不惟飢民羸弱聚散不常難為工役又緣常平斛斗本法元只用糶糴以準平市價若將召募工役及依乞丐人例給與則是有出無收今後常平本錢日耗不已有時而盡臣知杭州日為見浙西飢饉全賴常平糶米所救活不可勝數以此知常平官本只可令增不可令耗屢曽奏乞立法常平錢米只許糶糴外不得支用雖蒙施行所有本州見管常平斛斗臣終不敢以流民之故輒乞費用留以準備來春斛斗翔貴時出糴以濟本州百姓貼黃若蒙行下戶部不過檢坐常平條貫量減價出糶及召募飢民工役並依乞丐人給米之數行下皆是空文無益實事乞自朝廷詳酌特賜裁處又貼黃元豐以前常用常平錢米召募飢民工役雖有減耗却將官剩息錢補填今來常平官本有出無收若不立法禁止雜支則數日而盡深為可惜乞檢會臣前奏施行一勘會本州見管封椿陜西軍兵請受又禁軍闕額粳米三千七百餘石估定每斗八十文小麥三萬三千餘石估定每斗六十文菉豆二千一百餘石估定每斗五十五文粟米三百餘石估定每豆九十文豌豆五千一百餘石估定每斗六十文淮條許估定價例出糶除勘會本州軍糧粳米年計不足今將轉運司錢兊糴上件封椿粳米充軍糧外其餘小麥菉豆粟米豌豆可以奏請擘畫錢物盡數兊糴準備賑流流民貼黃所有逐色估定價例並是在市實直如蒙施行乞依今來估定價例兊買右臣伏望聖慈愍念淮浙纍嵗災傷來年春夏必有流民而潁州正當南北孔道萬一扶老擕幼坌集境內理難斥遣若飢斃道路臭穢薰蒸民同被災疫之害弱者既轉溝壑則強者必聚為寇盜欲乞特賜度牒一百道委臣出賣將錢兊買前件小麥粟米菉豆豌豆四色封椿斛斗候有流民到州逐放支給賑濟如至時却無流民自當封椿度牒價錢别聼朝廷指揮謹録奏聞伏候敕旨貼黃臣若不預作擘畫陳乞則倉卒之間必難應辦若不密切奏論至此聲先馳則恐引惹飢民並來本州官物有限中路闕絶則死者必衆反為深害所以今來親書奏狀貴免泄漏臣以目昏書寫不謹伏乞恕罪如蒙施行乞作不下司文字付臣措置又貼黃臣所奏濠夀等州災傷盜賊次第問得皆有本末非是風傳道路之言深慮本路及逐州各有檢放賦稅元未奏陳致朝廷不信臣言臣在杭州日親見監司州縣例皆諱言災傷只如今年蘇湖水災可為至甚而臺官賈易等猶欲根究其事行遣言者蘇州積水未退尚土城門而知州黃履已奏秋種有望似此蒙蔽習以成風伏望聖慈試採臣言過作準備則一方幸甚乞將合轉一官與李直方酬奬狀元祐七年正月日龍圖閣學士左朝奉郎知潁州蘇軾狀奏臣自到任以來訪聞得本州舊出惡賊自元祐二三年間管三等嘯聚為寇已而又有陳欽鄒立尹榮尹遇等亦是羣黨劫殺纍至以捕盜官吏鬬敵是時朝廷訪聞以名捕此等數人尋以捉獲凌遲處斬惟尹遇一名漏網得脫不改前非結集陳欽之弟陳興鄭饒李松等數人不住驚劫人戶尹遇自稱大大王陳興稱二大王鄭饒稱僥三李松稱管四鄉村畏攝不敢言及縱被劫殺不敢申報以致被殺之家父母妻子不敢聲張舉哀百姓蔡貴莫諲董安三人只因偶然言及遇等即時被殺內董安仍更用尖刀割斷腳筋其餘割取頭髮及殺傷者不可勝數每次打劫皆用金貼紙甲其餘兵仗弓弩並全纍次與捕盜官吏鬬敵內一次射殺弓手兼近日夀州界內強賊甚多打劫魏家謝解元施助教等家皆一二十人白晝騎馬於鎮市中劫人其尹遇等聞之即欲商量應和居民憂懼臣度事勢迫切即差職員監勒捕盜官吏責限收捕其汝陰縣尉李直方素有才幹自出家財募人告緝知得逐賊窟穴去處內陳興鄭饒李松等見住夀州霍邱縣開順埸尹遇一名在夀州霍邱縣成家步比陳興等去處更逺二百里直方以謂衆賊之中唯尹遇最為桀黠難捕又其窟穴離州界最逺遂分布弓手捕捉衆賊而直方親領弓手五人徑往成家步捉殺尹遇直方母年九十六只有直方一子臨去之時母子泣别往返五百餘里騎殺一馬直方步行百餘里裝作販牛小客既至地頭衆皆畏懼不前獨弓手節級程玉等二人與直方持鎗大呼排戶而入尹遇驚起彀弓駕箭欲發直方徑前親手刺倒衆弓手皆入方始就擒直方本與弓手分頭捕捉衆賊內陳典鄭饒李松三人以地近故先九日獲獨尹遇一名以地逺難捕直方親行故後九日獲既獲之後逺近喜快有城廓鄉村人戶六百一十七人詣臣陳狀備説逐賊凶惡多年為害人不敢言若不盡法根勘萬一減死刺配即須走回嘯聚為害轉甚以此知逐賊桀黠之甚衆所憂畏若不以時捕獲因之以飢饉必為王沖管三之流而直方以進士及第母子二人相須為命而能以忠義奮激親手擊刺以除一方之患比之尋常捕盜官偶然掩獲十數飢寒之民號為劫賊者不可同日而語矣彼皆坐該賞典而直方不蒙旌異則忠義膽決方略之臣無所勸激矣須至奏陳者右檢準編敇節文諸官員躬親帥衆獲盜一半以上能分遣人於三十日內獲餘黨者通計人數同躬親法今來李直方為見衆賊之中唯尹遇最為宿姦老寇窟穴深逺衆不敢近須至躬親出界捕捉是致後獲既是尹遇須至躬行則陳典等三人須至差人無由躬親若使直方先為身謀即須躬親先往近處捕陳興等三人然後多遣弓手續於三十日內捕尹遇一名即却應得上條同躬親法只緣直方忠義激發以除惡為先務而不暇計較恩賞故躬親出界專捕尹遇一名以致所差弓手却先獲陳興等三人遂與上條不應於賞格有礙考之法意顯是該説不盡伏望朝廷詳酌只緣直方先公後私致得先後捕獲之數不盡應法欲乞比附上條通計人數許同躬親法為第三等若下刑部定奪則有司須至執文計析毫釐直方無由該得第三等恩賞惟望聖恩體念尹遇等若不以時捕獲必為嘯聚羣寇而直方儒者能捐軀奮命忠義可嘉特賜指揮臣又慮朝廷惜此恩例恐今後妄有攀援勘會臣見今如法合轉朝散郎情願乞不改轉將此恩例與直方循資酬奬緣直方母年九十餘只有一子因臣督迫泣别而行若萬一為賊所害使其老母失所臣豈不愧見僚吏以此將臣合轉一官與直方充賞不惟少酬其勞亦使臣今後有以使人不為空言無實者於臣亦為莫大之幸且免後人援例庶朝廷易為施行臣不勝大願謹録奏聞伏候敕旨貼黃臣所論奏皆有實狀可以覆按本合候尹遇等結案了奏聞又恐朝廷未盡以臣言為信更當行下監司體問逐賊凶惡之實與直方捐軀奮激之狀故及逐賊未死聞奏庶可以覆按施行僥三是管三火中有名強賊人管四是管三弟此二賊欲得逺近畏服故詐稱二人姓名又貼黃奏為汝陰縣尉李直方捕獲強惡賊人乞依編敇第三等酬賞候敇旨乞賜光梵寺額狀元祐七年二月日龍圖閣學士左朝奉郎知潁州蘇軾狀奏臣伏見本州潁上縣白馬村有梵僧佛陀波利真身塔院舍約四五十間元無敇額父老相傳佛陀波利本西域僧唐儀鳳中逰五臺禮文殊師利見老人令復還西域取佛頂尊勝陀羅尼經佛陀波利用其言往返數萬里以永淳中取經而還至今流布而佛陀波利於潁上亡沒里俗相與漆塑其身造塔供養時有光景頗著靈驗不敢具述臣於諸處見唐人所立尊勝石幢刋記本末與所聞父老之言頗合今年正月大雪過度農民凍餒無所祈禱境內諸廟未應聞父老以佛陀波利為言臣即遣人齎香禱請登時開霽人情翕然歸向詣臣陳狀願乞敷奏乞一敕額庶幾永逺不致廢壞須至奏乞者右謹具如前欲望聖慈曲從民欲特賜本院一敕額如蒙開允以光梵為額謹録奏聞伏候敕旨薦宗室令畤狀元祐七年五月初五日龍圖閣學士左朝奉郎知潁州蘇軾狀奏右臣聞之詩曰懷德為寧宗子維城宗室之有人邦家之光社稷之衛也周之盛時其卿士皆周召毛原非王之伯叔父則其子弟也逮至兩漢河間東平之德歆向之文天下以為口實而唐之宗室武略如道宗孝恭文章如白與賀者不可以一二數而以功名至宰相者有九人焉自建隆以來纍聖執謙不私其親幹國治民不及宗子雖有文武異才終身不試神宗皇帝實始慨然欲出其英髦與天下共之故增立教養選舉之法行之二十年出入中外漸就器使而未見有卓然顯聞稱先帝意者夫豈無人蓋朝廷未有以大聳勸之耳臣伏見承議郎僉書潁州節度判官廳公事令畤事親篤孝內行純備博學經史手不釋卷吏事通敏文采俊麗志節端亮議論英發體兼衆器無適不宜臣嘗見其所著述筆力雅健博貫子史蓋清廟之瑚璉明堂之杞梓也使其生於幽逺猶當擢用而況近託肺腑已蒙試用者乎伏望聖慈特賜考察召致館閣養其髙才而遂其逺業以風動宗室勸示海內成先帝之意不以臣人微言輕而廢其請也若後不如所舉臣甘伏朝典謹録奏聞伏候敕旨論積欠六事并乞檢會應詔四事一處行下狀元祐七年五月十六日龍圖閣學士左朝奉郎知揚州蘇軾狀奏臣聞之孔子曰善人教民七年亦可以即戎矣夫民既富而教然後可以即戎古之所謂善人者其不及聖人逺甚今二聖臨御八年於兹仁孝慈儉可謂至矣而帑廩日益困農民日益貧商賈不行水旱相繼以上聖之資而無善人之效臣竊痛之所至訪問耆老有識之士陰求其所以皆曰方今民荷寬政無它疾苦但為積欠所壓如負千鈞而行免於僵仆則幸矣何暇舉首奮臂以營求於一飽之外哉今大姓富家昔日號為無比戶者皆為市易所破十無一二矣其餘自小民已上大率皆有積欠監司督守令守令督吏卒文符日至其門鞭笞日加其身雖有白圭猗頓亦化為篳門圭竇矣自祖宗已來每有赦令必曰凡欠官物無侵欺盜用及雖有侵盜而本家及伍保人無家業者並與除放祖宗亦不知官物失陷姦民幸免之弊特以民既乏竭無以為生雖加鞭撻終無所得緩之則為姦吏之所蠶食急之則為盜賊之所憑藉故舉而放之則天下恱服雖有水旱盜賊民不思亂此為捐虛名而收實利也自二聖臨御以來每以施捨已責為先務登極赦令每次郊赦或隨事指揮皆從寬厚凡今所催欠負十有六七皆聖恩所貸矣而官吏刻薄與聖意異舞文巧詆使不該放監司以催欠為職業守令上為監司之所迫下為胥吏之所使大率縣有監催千百家則縣中胥徒舉欣欣然當日有所得而一旦除放則此等皆寂寥無獲矣自非有力之家納賂請賕誰肯舉行恩貸而積欠之人皆鄰於寒餓何賂之有其間貧困掃地無可蠶食者則縣胥教令通指平人或云𠂻私擅買抵當物業或雖非𠂻私而云買不當價似此之類蔓延追擾自甲及乙自乙及丙無有窮已每限皆空身到官或三五限得一二百錢謂之破限官之所得至微而胥徒所取蓋無虛日俗謂此等為縣胥食邑戶嗟乎聖人在上使民不得為陛下赤子而皆為姦吏食邑戶此何道也商賈販賣例無現錢若用現錢則無利息須今年索去年所賣明年索今年所賖然後計算得行彼此通濟今富戶先已殘破中民又有積欠誰敢賖賣物貨則商賈自然不行此酒稅課利所以日虧城市房廊所以日空也諸路連年水旱上下共知而轉運司窘於財用例不肯放稅縱放亦不盡實雖無明文指揮而以喜怒風曉官吏孰敢違者所以逐縣例皆拖欠兩稅較其所欠與依實檢放無異於官了無所益而民有追擾鞭撻之苦近日詔旨凡積欠皆分為十料催納通計五年而足聖恩隆厚何以加此而有司以謂有旨倚閣者方得依十料指揮餘皆併催縱使盡依十料吏卒乞覔必不肯分料少取人戶既未納足則追擾常在縱分百料與一料同臣頃知杭州又知潁州今知揚州親見兩浙京西淮南三路之民皆為積欠所壓日就窮蹙死亡過半而欠籍不除以至虧欠兩稅走陷課利農末皆病公私並困以此推之天下大率皆然矣臣自潁移揚州過濠夀楚泗等州所至麻麥如雲臣每屏去吏卒親入村落訪問父老皆有憂色云豐年不如凶年天災流行民雖乏食縮衣節口猶可以生若豐年舉催積欠胥徒在門枷棒在身則人戶求死不得言訖淚下臣亦不覺流涕又所至城邑多有流民官吏皆云以夏麥既熟舉催積欠故流民不敢歸鄉臣聞之孔子曰苛政猛於虎昔常不信其言以今觀之殆有甚者水旱殺人百倍於虎而人畏催欠乃甚於水旱臣竊度之每州催欠吏卒不下五百人以天下言之是常有二十餘萬虎狼散在民間百姓何由安生朝廷仁政何由得成乎臣自到任以來日以檢察本州積欠為事內已有條貫除放而官吏不肯舉行者臣即指揮本州一面除放去訖其於理合放而於條未有明文者即且令本州權住催理聼候指揮其於理合放而於條有礙者臣亦未敢住催各具利害奏取聖旨謹件如左一準元祐五年五月十四日敕節文應實封投狀承買埸務第五界已後見欠未納淨利過日錢亦許比第四界以前三界內一界小數催促上件條貫止為過界有人承買埸務可以分界見得最小一界錢數豁除見欠其間界滿無人承買埸務只勒見開沽人認納過日錢數者即無由分界得見小數所以不該上條除放朝廷為見無人承買埸務比之有人承買者尤為敗闕不易送納反不該上條除放於理不均故於元祐六年春頒條貫內别立一條諸埸務界滿未交割者且令依舊認納課例及過日錢若委因事敗闕或一年無人投狀承買經縣自陳申州本州差官限二十日體量減定淨利錢數令承認送納仍具減定錢數出榜限一季召人承買無人投狀本州再差官減定出榜限滿又無人投狀依前再減出榜若減及五分以上無人投狀申提刑司差官與本州縣官同共相度再減節次依前出榜如減八分以上無人投狀承買委是難以出納淨利錢即所差官與本州縣保明申提刑司審察保明權倚閣訖奏自界滿後至倚閣日見開沽人只依減定淨利錢數送納臣今看詳朝廷立此兩條聖恩寬厚敇語詳備應有人無人承買埸務皆合依條就小送納無可疑惑只緣官吏多以刻薄聚斂為心又不細詳條貫所以請處元只施行逐界通比就小催納指揮其界滿無人承買只依減定淨利錢數送納條貫多不施行臣細詳上條既云自界滿至停閉日見開沽人只依減定淨利錢數送納即是分明指定合依臨停閉日減定最小錢數送納雖逐次減定錢數不同緣皆未有人承買不免更減終非定數既已見得臨停閉日所減定數豈可却更追用逐次虛數為定臣已指揮本州行下屬縣應界滿敗闕無人承買埸務係是開沽人承認送納者並依上條只將臨停閉日所定最小錢數為額催納內未停閉已前有人承買即依上條各以當限所減定錢數為額催納以上如有欠負即將已前剩納過錢數豁除如已納過無欠負者即給還所剩本州已依應施行訖深慮諸路亦有似此施行未盡處乞聖旨備録行下一準元祐五年四月九日朝旨應大赦以前見欠蠶鹽和買青苗錢物元是冒名無可催理或全家逃移鄰里抱認或元無頭主均及干繫人者並特與除放今勘會江都縣人戶積欠青苖錢斛二萬四千九百二十貫石內四十九貫石係大赦已前欠負逃移臣已指揮本州依上件朝旨除放去訖一千五百二十五貫石雖係大赦前欠負却係大赦後逃移未有明文除放見今無處催理不免逐時行下鄉村勘會虛有搔擾臣已指揮本州更不行下欲乞聖旨指揮應大赦前欠負蠶鹽和買青苖錢但見今逃移無處催理者本縣官吏保明並與除放貼黃勘會上件朝旨經隔二年不為除放臣今來方始施行深慮諸州軍亦有似此大赦前欠蠶鹽和買青苗錢逃移人戶合依聖旨除放而官吏不為施行者乞更賜行下免罪改正一檢準熙寧編敕諸主持倉庫欠折官物買撲埸務少欠課利元無欺弊者其産業雖已估計陪納入官許以所收子利紐計還元欠官錢數足即給還或貼納所欠錢數相兼收贖如過十年不贖依填欠田宅條施行係十保干係人産業雖欠人有欺弊亦準此此乃祖宗令典雖熙寧新法亦許準折欠數數足便還只因元豐四年十二月內兩浙轉運司奏買撲之人多是作弊拖欠合納課利須至官司催逼緊急却便乞依條將産業在官拘收子例折還係元抵田産物業逐年所出花利微細卒填所欠官錢不足看詳買撲埸務並係人戶情願實封投狀抱認句當其課利依條自合逐月送納即與公人主持倉庫欠折官物陪填事體不同今相度欲乞於編敕內刪去買撲埸務少欠課利八字因此立法諸主持官物欠折無欺弊者其産業估納入官以所收子利準折欠數候足給還或貼納錢收贖如過十年不贖依填欠田宅法係十保干係人産業雖元欠有欺弊仍以所估納抵産子利準折欠數通計賞足給還抵産其以前欠負並準此內剩納過錢數仍給還所剩一準元豐三年九月二十八日明堂赦書節文開封府界及諸路人戶見欠元豐元年以前夏秋租稅并沿納不以分數及二年以前誤支雇食水利罰夫買撲埸務出限罰錢并免役及常平息錢並特與除放是時轉運司申中書稱見欠丁口鹽錢及鹽博絹米及和預買紬絹并係人戶以請官本不合一例除放中書批狀云勘會赦書內即無見欠丁口鹽錢并鹽博絹米及和預買紬絹已請官本除放之文因此州縣却行催理至元豐八年登極赦書亦是除放兩稅沿納錢物後來尚書戶部仍舉行元豐四年中書批狀指揮逐年蠶鹽錢絹和預買納絹等係已請官本並不除放臣今看詳內蠶鹽錢絹一事鹽本至輕所折錢絹至重只如江都縣每支鹽六兩折絹一尺鹽六兩元價錢一十文五分足絹一尺價錢二十八文一分足其支鹽納錢者每鹽五斤五兩納錢三百三十一文八分足北元價買鹽每斤二十八文足已多一百八十三文足又將錢折麥所估麥價至低又有倉省加耗及腳乘之類一文至納四五文今來既不除放即須催納絹麥折色所以人戶愈覺困苦臣今看詳丁口鹽錢絹既為有官本難議除放即合據所支鹽斤兩實直價錢催納豈可將折色絹麥上增起錢數盡作官本顯是於理合放於條未有明文臣已指揮本州應登極赦前見欠丁口鹽錢及鹽博絹米之類只據當時所支官物實直為官本催納其因折色增起錢數並權住催理聼候朝旨伏望聖慈特賜指揮依此除放一準元祐元年九月六日明堂赦書應內外欠市易錢人戶見欠錢二百貫以下並特與除放續準元祐二年二月七日都省批狀知鄭州張璪劄子奏臣伏覩明堂赦書節文諸路人戶見欠市易錢二百貫以下並特與除放臣自到州契勘得本州舊係開封府界管城縣日本縣市易抵當所於元豐二年五月以後節次準市易上界牒準太府寺牒支降到匹帛散茶令搭息出賣其本州自合依條許人戶用物貨等抵請及見錢變易本所却賖賣與人戶仍不曽結保致有二百九十八戶除納外共拖欠下官錢計一千九百餘貫文雖契勘得逐戶名下見欠各只是二百貫以下本州為是元管句官司違法賖散不依太府寺搭息出賣指揮致人戶亦不曽用物貨抵請即與市易舊法許人結保賖請金銀物帛見欠官本事體不同以此未敢引用赦敕除放係上件人戶所欠物帛價錢本因官吏違法賖過其人戶元不知有此違礙伏望聖慈矜恤特許依赦除放庶使貧民均被聖澤戶部看詳住罷賖請後來違法賖散過錢物并府界縣分人戶抵當虧本糯米各與未罷已前依條賖請事體不同今勘當難以依赦除放都省批狀依戶部所申文續準元祐三年十月二十七日敕勘會內外見欠市易非違法賖請人戶已降指揮二百貫文已下除放其外路係違法者即不該除放切緣本因官司違法賖賣今來人戶若不量與蠲放顯見獨不霑恩須議指揮十月二十五日奉聖旨令戶部指揮諸路契勘官私違法除放人戶許將息罰充折外見欠錢二十貫文已下者並與除放又續準元祐四年正月初十日轉運司牒準尚書戶部符據淮南轉運司狀契勘本路市易欠錢除依條賖借并元係經官司違法賖欠已依上項赦敇朝旨施行外緣有未承元豐四年五月十九日朝旨住罷賖借以前并以後有人戶於市易務差出計置變易句當人等頭下賖借錢物見欠不及二百貫及二十貫以下今詳所降元祐元年九月六日明堂赦敕止言市易欠錢人戶見欠二百貫文以下除放并元祐三年十月二十七日朝旨亦止言官司違法賖借見欠二十貫文以下險放今來前項人戶從初徑於市易差出句當人等頭下賖欠本司疑慮未敢一例除放申部者本部看詳明堂赦云內外欠市易錢人戶見欠二百貫以下除放及近降朝旨亦止云官私違法私放人戶許將息罰充折外見欠二十貫以下除放即無似此窠名明文今據所申符本司主者詳此一依前後所降朝旨施行無至違誤臣今看詳元祐元年九月六日明堂赦書止言應內外欠市易務錢二百貫以下並與除放赦文簡易明白元不分别人戶於官司請領或徑於句當人名下分請亦不拘限官司依條賖賣或違法俵散及有無抵當結保搭息不搭息之類但係欠市易務錢二百貫以下者便合依赦除放更無疑慮切原聖意蓋為市易務錢本緣姦臣貪功希賞設法陷民赤子無知為利所罔故於即位改元躬祀明堂始見上帝之日親發德音特與除放皇天后土實聞此言當時有識已恨所放不寬既知小民為官法所陷何惜不與盡放更立二百貫之限然是時欠負窮民無不鼓舞涕泣銜荷恩德曽未半年已有刻薄臣寮強生支節析文破敕妄作申請致有上項續降聖旨及都省批狀指揮應官司違法賖借者止放二十貫以下其於差出句當人名下賖請者並不除放一文使宗祀赦文反為虛語非獨失信於民亦為失信於上帝矣所繫至大而俗吏小人曽不為朝廷惜此但知計析錐刀之末實可痛愍臣竊仰料二聖至仁至明己發德音除放二百貫以下豈有却詐刻薄臣寮出意阻難追改不行之理必是當時議者以為欠錢之人詐立私下賖買人姓名分破錢數令不滿二百貫僥幸除放以此更煩朝省别立上項條約以防情弊一時指揮不為無理今來嵗月已久人戶各蒙監催枷錮鞭撻困苦理極若非本身實欠豈肯七年被監不求訴免以此觀之凡今日欠戶並是實欠必非私相計會為人分減之人明矣伏望聖慈特與舉行元祐元年九月六日赦書應內外欠市易錢人戶見欠錢二百貫以下不以官私違法不違法及人戶於官司請領或徑於句當人名下分請者並與除放所貴復收窮困垂死之民稍實宗祀赦書之語以答天人之意一準元祐六年五月二十六日聖旨將府界諸路人戶應見欠諸般欠負以十分為率每年隨夏秋料各帶納一分所有前後纍降催納欠負分料展閣指揮更不施行臣今看詳上項指揮明言應見欠諸般欠負並分十料催納元不曽分别係與不係因災傷分料展閣之數聖恩寬大詔語分明但係欠負無不該者只因戶部出納之吝别生支節謂之申明其略云本部看詳人戶見催逐年拖欠下夏秋租稅贓賞課利省房沒官等錢物若不係因災傷許分料展閣理納之數自不該上條致尚書省八月三日批狀指揮依所申施行即不曽别取聖旨臣嘗謂二聖即位已來所行寬大之政多被有司巧説事理務為艱閡使已出之令不盡施行屯膏反汗皆此類也兼檢會元祐敇節文諸災傷倚閣租稅至豐熟日分作二年四料送納若納未足而又遇災傷者權住催理今來元祐六年五月二十五日聖旨指揮雖分為十料比舊稍寬又却闕衝改前後分料展閣指揮即雖遇災傷亦須催納水旱之民當年租賦尚不能輸豈能更納舊欠顯是緣此指揮反更不易欲望特降聖旨應諸般欠負並只依元祐五年五月二十六日聖旨指揮分十料施行仍遇災傷依元祐敇權住催理內人戶拖欠兩稅不係災傷倚閣者亦分二年作四料送納未足而遇災傷者亦許權住催理所有戶部申明都省批狀指揮乞不施行貼黃議者必謂若如此施行今後百姓皆不肯依限送納兩稅僥幸分料臣以謂不然編敇明有催稅末限不足分數官吏等第責罰令佐至衝替録事司戶與小處差遣典押勒停孔目管押官降資條貫至重誰敢違慢若非災傷之嵗檢放不盡實者何緣過有拖欠若朝廷不恤須得併催則人戶惟有逃移必無納足之理一臣先知杭州日於元祐五年九月奏臣先曽具奏朝廷至仁寬貸宿逋已行之命為有司所格沮使王澤不得下流者四事其一曰見欠市易籍納産業聖恩並許給還或貼納收贖而有司妄出新意創為籍納折納之法使十有八九不該給贖其二曰積欠鹽錢聖旨已許止納産鹽埸監官本價錢其餘並與除放而提舉鹽事司執文害意謂非貧乏不在此數其三曰登極犬赦以前人戶以産當酒見欠者亦合依鹽當錢法只納官本其四曰元豐四年杭州揀下不堪上供和買絹五萬八千二百九十匹並抑勒配賣與民不住鞭笞催納至今尚欠八千二百餘貫並合依今年四月九日聖旨除放然臣具此論奏經今一百八日不蒙回降指揮乞檢會前奏四事早賜行下尚書省取會到諸處稱不曽承受到上件奏狀十二月八日三省同奉聖旨令蘇軾别具聞奏臣已於元祐六年正月九日備録元狀乞檢會前奏一處行下右謹件如前今所陳六事及前所陳四事止是楊州杭州所見竊計天下之大如此六事四事者多矣若今日不治數年之後百姓愈困愈急流亡盜賊之患有不可勝言者伏望特留聖意深詔左右大臣早賜果決行下臣伏見所在轉運提刑皆以催欠為先務不復以恤民為意蓋函矢異業所居使然臣愚欲乞備録今狀及元祐六年正月九日所奏四事行下逐路安撫鈐轄司委自逐司選差轄下官僚一兩人不妨本職置司取索逐州見催諸般欠負利名戶眼及元欠因依限一月內具委無漏落保明供申仍備録應係見行欠負敇條出榜曉示如州縣不與依條除放許詣逐司自陳限逐司於一季內看詳了絶內依條合放而州縣有失舉行者與免罪改正訖奏其於理合放而未有明條或於條有礙者並權住催理奏取敇裁仍乞朝廷差官三五人置局看詳立限結絶如此則期年之間疲民尚有生望富室完復商賈漸通酒稅增羡公私寬泰必自此始也臣身逺言深罪當萬死感恩徇義不能默已謹録奏聞伏候敕旨貼黃本州近準轉運司牒坐準戶部符臣寮上言去嵗災傷人戶農事初興生意稍還正當惠養助之蘇息伏望聖慈許將去年檢放不盡秋稅元只收三二分已下者係本戶已是七八分災傷今來若納錢尚有欠必是送納不前乞特與除放其餘納錢見欠人戶亦乞特與減免三分外若猶有欠并上二等户如不可一例減放則並乞特與展限候今年秋熟隨秋料送納其言至切尋蒙聖恩送下户部本部却只檢坐元祐三年七月二十四日敇節文災傷帶納欠負條貫應破詔旨其臣寮所乞放免寬減事件元不相度可否顯是聖慈欲行其言而戶部不欲雖蒙行下與不行下同臣今來所論若非朝廷特賜指揮即戶部必無施行之理又貼黃臣今所言六事及舊所言四事並係民心邦本事關安危兼其間逐節利害甚多伏望聖慈少輟清間之頃特賜詳覽又貼黃準條檢放災傷稅租只是本州差官計會令佐同檢即無轉運司更别差官覆按指揮臣在潁州見逐州檢放之後轉運司更隔州差官覆按虛實顯是於法外施行使官吏畏憚不敢盡實檢放近日淮南轉運司為見所在流民倍多而所放災傷多不及五分支破貧糧有限恐人情未安故奏乞法外支給若使盡實檢放流民不應如此之多與其法外拯濟於既流之後曷若依法檢放於未流之前此道路共知事之不可欺者也臣忝侍從不敢不具實聞奏又貼黃京司所置局因今看詳畿內欠負東坡全集卷六十一
