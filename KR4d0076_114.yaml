body:
  text: 東坡全集卷一百十四宋蘇軾撰內制表本一十七首皇帝為冬節奏告永裕陵神宗皇帝表本伏以厯紀天正史書日至感舒長於測景增怵惕於履霜恭惟諡號皇帝德邁堯仁功恢禹迹遊衣冠於原廟徒仰威神望松柏於橋山永懷悲慕皇太后殿夫人為冬節往永裕陵酌獻神宗皇帝表本伏以一陽來復萬物懷生空臨觀祲之辰無復稱觴之慶恭惟諡號皇帝道齊覆載德冒華夷從南狩於蒼梧神遊已邈望西陵於銅雀涕慕空深皇帝為十一月一日奏告永裕陵神宗皇帝旦表本伏以始餞餘寒復興嗣歲望寢園而增慕悼日月之不留恭惟諡號皇帝道貫百王澤涵萬宇永瞻帝所之樂坐起堯牆之悲饋奠莫由馳誠罔極皇太后殿夫人為年節往永裕陵酌獻神宗皇帝表本伏以葦桃在户徒講三朝之儀椒柏稱觴無復萬年之壽恭惟諡號皇帝功施無外德洽有生隨鼓漏於寢園莫親饋奠望衣冠於原廟空極涕流皇帝為三月一日奏告神宗皇帝旦表本伏以既成春服時方禊洛之初祗謁寢園古有薦鮪之禮恭惟諡號皇帝配天立極如日載陽仰餘一作隂澤之旁流致羣生之遂茂光靈愈逺涕慕空深皇帝為神宗皇帝大祥往永裕陵奏告表本伏以寢廟告成永動廓然之感柏城森列遽興拱矣之悲恭惟諡號皇帝澤浸函生慶垂後裔配天無極奉謨訓以長存示民有終悵神遊之安在恭修祥奠莫訴哀誠皇帝為神宗皇帝大祥內中奏告表本伏以追號罔極實抱終身之憂祥禫有期蓋迫先王之禮恭惟諡號皇帝睿明照世神智自天雖清廟肅雍瞻之莫見而威顔咫尺凛然常存悲慕之深華夷所共皇太后殿夫人為神宗皇帝大祥往永裕陵酌獻表本伏以飇馭上賔日以逺矣隙駒遄邁祥而廓然恭惟諡號皇帝道如家邦化形夷夏天地之運固代謝於隂陽草木何知徒興悲於霜露莫親饋奠惟極哀誠十月朔本殿夫人往永裕陵酌獻神宗皇帝表本雨霜隕籜感閉塞於天時收潦滌場思艱難於王業恭惟尊諡皇帝禹功紀地堯則惟天威加四夷尚餘肅物之凛仁及萬彚永同挾纊之溫省奉無期瞻懷靡極永安永昌永熙永裕陵忌辰奏告宣祖太祖太宗神宗皇帝表本伏以卜年之永恩浹於華夷諱日之臨感深於臣子恭惟諡號皇帝文武經世威靈在天每更不樂之辰尚有遺弓之慕山陵永望雨露增懷永安永昌永熙陵忌辰奏告昭憲孝惠孝明孝章淑德懿德明德元德章懷章穆章懿章惠章獻明肅皇后表本伏以周南之化刑恭儉於多方渭北之遊極望思於原廟恭惟諡號皇后道應圖史德參聖神顧明發之永懷仰徽音之如在載瞻園寢想見衣冠皇太后殿內人為神宗皇帝忌辰朝永裕陵表本伏以百年之思化被於無疆終身之憂感深於不樂恭惟諡號皇帝德齊堯禹功陋漢唐道蓋始於正家謀方貽於燕翼追攀罔極慨慕徒深永裕陵正月旦表本伏以賔出日於暘谷堯厯方頒朝計吏於原陵漢儀具舉恭惟諡號皇帝功恢禹迹德邁湯仁雖歲月之屢遷想威神而如在載瞻園寢空極望思永裕陵二月旦表本伏以時方啓蟄禮及獻羔感清衎之協風怵懷思於濡露恭惟諡號皇帝文武緯世聖靈在天岱嶽泥金永講升中之禮荆山鑄鼎遽成脫屣之遊永望寢園徒增感慕永裕陵四月旦表本伏以日躔昴畢卦直乾離物蒙長養之仁世載文明之化恭惟諡號皇帝功成不宰德範無窮執炎帝之衡莫追往躅秩南郊之政空守成規祗望寢園惟增感慕永裕陵十月旦表本伏以戒寒墐户倐及於秦正前晦行陵祗循於漢禮恭惟諡號皇帝懿文緯世厚德載時休老勞農追述養民之政厲兵講武敢忘經國之謀永望寢園益增感慕永裕陵十二月旦表本伏以商正紀厯大吕旋宫論時令以待來歲之宜獻民力以共宗廟之祀恭惟諡號皇帝至仁無外全德難名文物聲明但覩乘時之迹昆蟲草木孰知成歲之功急景易遷永懷何極內制國書一十八首皇帝逹太皇太后賀大遼正旦書元祐元年十月肇易歲元發新榮於萬物仰遵慈誨修舊好於兩朝逺飭使軺肅將禮幣庶迎壽祉式副願言皇帝賀大遼皇帝正旦書元祐元年十月獻歲發春共講三朝之慶寶鄰繼好茂膺五福之祥申飭使車往陳信幣永言欣頌曷罄諭陳皇帝達太皇太后回大遼皇帝賀正旦書元祐二年正月五日百年之好既講於春朝萬歲之儀兼陳於幄殿恭因省侍具述來音感懌之懷言宣莫罄皇帝回大遼皇帝賀正旦書元祐二年正月五日東風協應感徂歲之更新逺使交馳導歡言而如舊粲然禮幣申以書詞欣懌之深敷陳罔究皇帝達太皇太后回大遼皇帝賀坤成節書元祐二年七月嘉月令辰篤生壽母珍函重幣交慶寶鄰已恭致於德音復欽傳於慈旨其為感懌未易名言皇帝回大遼皇帝問候書元祐二年七月四牡載馳逺勤於使介尺書為問申講於鄰歡方履素秋克膺純福益祈保護式副願言皇帝達太皇太后賀大遼皇帝生辰書元祐二年寒律既周誕辰載紀恭被慈闈之誨俾修慶幣之儀永介壽康式符頌禱更祈調衛以副願言皇帝賀大遼皇帝生辰書元祐二年太吕還宫攝提正丑載協誕彌之慶永膺壽考之祥臨遣使軺往陳信幣其為欣禱莫盡名言皇帝達太皇太后賀大遼皇帝正旦書元祐二年歲聿肇新鄰歡載講恭被慈闈之誨逺通慶幣之誠益冀保頤永綏壽嘏皇帝賀大遼皇帝正旦書三陽朋來慶二儀之交泰兩朝繼好納萬民於阜昌申敕使車肅將禮幣願符善禱永介純釐皇帝回大遼皇帝賀興龍節書元祐二年十月誕日載臨鄰歡歲講封疆雖逺晷刻不踰惟信睦之交修識情文之兩至益深雅好良極欣悰皇帝達太皇太后回大遼皇帝問候書元祐二年十月嘉平紀月震夙惟時屬兹慶使之來重以慈闈之問尋因省侍悉致誠言欣感之深敷陳罔究皇帝回大遼皇帝賀正旦書元祐三年獻歲發春方祝永年之慶睦鄰敦好益修奕世之歡信幣精華書詞溫縟再維雅契良極欣悰皇帝達太皇太后回大遼皇帝賀正旦書元祐三年正歲履端逺勤於華使慈闈申慶重領於珍函省侍之餘誠言已達永惟欣感莫究言宣皇帝回大遼皇帝賀興龍節書世睦寶鄰申以無窮之好歲馳華使及兹載夙之辰閲詞幣之兼隆識情文之備至願言欣感難悉究陳皇帝達太皇太后回大遼皇帝問候書遣使為壽既欣鄰好之修因書見誠兼致慈闈之問侍言有次來意畢陳感懌之深敷陳罔既皇帝達太皇太后回大遼皇帝賀坤成節書元祐四年七月星火西流慶慈闈之誕日皇華比至講鄰國之誠言既達來音俾修報禮感銘之素敷述難周皇帝回大遼皇帝問候書元祐四年七月軺車重幣已修交慶之儀尺素好音復講久要之信屬臨素節允迪純禧益冀保頤式符企詠內制朱表三首景靈宫宣光殿奉安神宗皇帝御容罷散朱表元祐二年二月十四日馭風雲闕既參日月之光弭節琳宫尚答神民之望爰開法會庶款真庭願推往聖之心永錫函生之福集禧觀洪福殿罷散謝雨道場朱表旱暵為災禱求屢瀆賴神之賜霈澤以時蓋至道之無私豈不德之能致載陳謝懇少答靈休中太一宫真室殿為太皇太后消災集福罷散天皇九曜道場朱表元祐三年仁者必夀信惟天地之心孝無不通宜從臣子之欲虔遵道範仰扣真廷庶同海宇之誠上集慈闈之福天威咫尺求聰明於我民聖夀萬年定子孫于下地更推博施普及函生內制疏文十一首集禧觀開啓祈雪道場疏文元祐元年二月六日伏以麥將覆塊雪未掩塵嗣嵗之憂下民安訴嚴嚴法會祇款閟宫仰冀同雲溥滋新臘景靈宫宣光殿奉安神宗皇帝御容日開啓道場疏文元祐二年三月十四日伏以天鑒不逺誠感則通方寶構之肇新宜神遊之降格具嚴法席髙咏靈篇內安清淨之居外錫蒸黎之福集禧觀開啓祈雨道疏文元祐二年三月二十五日洞淵龍王水府聖衆飢饉之患民流者期年吁嗟之求詞窮於是日乃眷隂靈之宅實為雲雨之師涵濡之功指顧而辦罔吝天澤以答民瞻集禧觀洪福殿等處罷散謝雨道場疏文德有愧於動天敢辭屢請道無私而應物豈間微誠霈一雨以咸周起三農於既病仰承靈貺莫報深仁太皇太后皇太后皇太妃受册奏告景靈宫等處疏文元祐二年七月十九日伏以祗事親闈庶幾孝治配德祖考既務極於推崇篤生眇沖亦敢忘於褒顯將奉寶册率循舊章徼福于神先期以告神宗皇帝御容進發前一日奏告諸宫觀等處疏文元祐二年九月二十五日嵩洛之間山陵所在嚴道釋之淨宇奉衣冠之别祠恭擇良辰啓行仙馭敢徼福於羣聖庶流祉於含生仰叩真靈冀垂昭鑒隆祐宫設慶宫醮疏文元祐二年伏以長樂告成光動紫宫之象清都下照誠通絳闕之仙祇設多儀肅陳菲薦永惟慈孝之本克享天人之心介萬夀之無疆錫五福之純備西嶽廟開啓祈雨道場疏文元祐三年七月十三日伏以二華之尊作鎮於西極兆人所急望嵗於秋成榖既日滋雨不時霈敢以病告于我有神閔兹將稿之苗賜以崇朝之澤惟神之德非我敢忘中太一宫真室殿開啓天皇九曜消災集福道場疏文臣以沖眇嗣承列聖之休濟於艱難實賴文母之德臨蒞四載勤勞百為畏天之威未嘗終日而豫怠視民如子惟恐一夫之困窮伏願上帝降祥衆真垂佑消禳災沴永底夀康恭陳寶籙之科仰扣神遊之館敢祈昭鑒下察孝心皇太妃宫閣慶落成開啓道場疏文伏以良辰襲吉華構一新仰荷褒崇之私得伸鞠育之報落成告備法會有嚴請命上穹馳神真聖庶精誠之必達錫夀祉於無窮景靈宫罷散奉安神宗皇帝御容道場功德疏文元祐二年四月七日伏以肇新寶構祇奉晬容修妙供於珠庭結勝緣於淨衆真遊永奠法會告成普冀含生悉蒙餘祉內制齋文十七首冬至福寧殿作水陸道場資薦神宗皇帝齋文伏以聖神陟降釋梵後先適更來復之辰茂薦往生之福虔修淨供仰導真遊正旦於福寧殿作水陸道場資薦神宗皇帝齋文伏以棄黃屋以上賔莫追風馭抱烏號而永慕再歷春朝敢仗勝緣式開淨供仰頌羲堯之德永追梵釋之遊在京諸宫觀開啓神宗皇帝大祥道場齋文伏以密音如昨新榖再升望仙馭於帝鄉陳法筵於淨宇人天來會共修最勝之緣梵釋同遊永錫無疆之慶垂拱殿開啓神宗皇帝大祥道場齋文伏以喪期有數方歎於壑舟法海無邊聊資於岸筏有嚴祕殿恭啓淨筵時御六龍徘徊宫闕永同千佛陟降人天內中福寧殿下寒節為神宗皇帝作水陸道場齋文伏以甚雨疾風感春律之將變鑽燧改火悼喪期之不留爰啓淨筵以資𡨕福願登大覺永濟函生景寧宫宣光殿奉安神宗皇帝御容日開啓道場齋文伏以祠宫夙啓真室告成仗勝會於佛僧導靈遊於梵釋更推餘祉旁及含生大相國寺開啓祈雨道場齋文伏以旱暵既久麥禾將空仰惟天人之師宜專雲雨之施庶幾慈愍寬我憂危鄭州超化寺祈雨齋文伏以常暘為災歷時愈熾秋榖未藝夏苗將空天意未回佛慈所愍願以不思議智力大解脫神通時興法雲普賜甘澤鄭州超化寺謝雨齋文等慈應物不倦於禱求神智無方何難於膏澤旱沴既弭農民其康仰惟不宰之功豈特有為之報爰修淨供少達純誠十月一日永裕陵下宫開啓資薦神宗皇帝道場齋文橋山永望莫瞻弓劍之餘陽月載臨徒增霜露之感招延淨衆崇建梵筵庶集勝因仰資真馭西京會聖宫應天禪院奉安神宗皇帝御容禮畢開啓道場齋文原廟告成神遊既奠雖聖靈之無礙對越在天從世法之有為歸依於佛普願幽明之域悉登淨妙之庭集此勝因以資仙馭後苑瑤津亭開啓祈雨道場齋文六月徂夏方金火之爭三農望秋乏雷雨之施嗟人何罪逢歲之艱自非妙覺之等慈孰極疲民於重困有嚴禁苑祗建淨筵念我憂勞錫之膏澤非獨起枯焦於田野抑將掃疾疫於里閭嘉與含生永均介福後苑瑤津亭開啓祈雨道場齋文伏以常暘之沴歷月於兹近自都畿逺及關輔豈獨西成之害將為宿麥之憂仰止覺慈必垂善救普集山川之守來登梵釋之筵罔吝膏濡以興焦稿後苑瑤津亭開啓謝雨道場齋文伏以祗畏之心格人天於影響覺慈之力反水旱於屈伸周澤載濡農田告足既解藴隆之患庶無流潦之虞仰冀能仁曲垂昭鑒顯聖寺壽聖禪院開啓太皇太后消災集福粉壇道場齋文伏以躬儉節用本嚴房闥之風遺大投艱猥當廟社之寄常恐德之弗類以召災于厥身敢即仁祠肆陳淨供恭延梵釋普施人天俾壽而康非獨輔安於寡昧與民同利固將燕及於華夷仰冀能仁曲垂照鑒景靈宫宣光殿開啓神宗皇帝忌辰道場齋文伏以至德難名已立配天之極孝思永慕蓋有終身之憂惟是佛乘庶資冥福屬弓劍上賔之日就衣冠出遊之庭虔設淨筵俾嚴勝果庶超真覺永庇含生奉宸庫翻修聖字等庫了畢安慰土地道場齋文伏以貨幣所藏有壞必葺聰直之鑒既成乃安爰仗佛慈以綏神守庶期昭格永底純熙內制祝文三十三首奏告天地社稷宗廟宫觀寺院等處祈雨雪祝文伏以期年以來水旱作沴逮兹徂歲復苦常暘疾疫將興農末俱病方齋居而默禱庶精意之登聞敢祈春臘之交沛然雨雪之賜願均介福敷錫羣生五嶽四瀆等處祈雪祝文伏以歷冬不雪兩歲之憂疾癘將興麥牟就稿分命守土告於有神下民其咨天聽不逺母愛同雲之澤以成盈尺之祥茍利于民敢忘其報內中添蓋諸帝后神御殿告遷御容權奉安於慈氏殿祝文於皇神考肇啓閟祠方增築之未寧懼格思之有瀆别嚴淨宇祗奉晬容式燕聖靈永綏慈嘏內中慈氏殿告遷神御於新添修殿奉安祝文伏以增築告成閟嚴有奐儼衣冠之來復愾歎息之疑聞昭格穆清永綏燕翼景靈宫奉安神宗皇帝御容祝文伏以恭承仙馭奄宅殊庭罄海宇以駿奔儼人天之景從願回日月之照少答神民之心乃眷新宫永垂餘慶天章閣權奉安神宗皇帝御容祝文伏以唐虞稽古雖絶名言文武重光已新崇構下慰華夷之望仰摹天日之容將往宅於靈宫永懷攀慕願少安於祕殿無盡瞻依內中神御殿張挂奉安神宗皇帝御容祝文伏以祥祭告終聖靈改御僾如在位威不違顔雖天日之光固難形似而神人之奉永有瞻依悲慕愈深照臨無極神宗皇帝大祥祭訖徹饌除靈座時皇帝躬親扶神御别設一祭祝文伏以俯就終喪禮當即逺永瞻陵廟將徹几筵攀慕若疑追懷罔極景靈宫宣光殿奉安神宗皇帝御容畢皇太后親詣行禮祝文伏以奕奕祠宫巍巍天像聖靈雖逺哲命維新仰瞻如在之威永錫無疆之慶敢祈昭鑒下燭微誠天地社稷宗廟神廟等處祈雨祝文惟德弗類致常暘之災斯民何辜有薦飢之懼旬浹不雨麥禾皆空循省再三夙夜祗栗引領雲霓之望援手溝壑之餘既窮之詞其忍弗聽五嶽四瀆等處祈雨祝文期年以來水旱作沴振廪同食冠蓋相望已責勸分公私並竭惟待一熟之麥以蘇垂死之民而冬不雨以徂春苗將秀而不實顧惟沖昧有失政刑感傷隂陽延及鰥寡既非下民之罪亦豈上帝之心惟神聰明毋愛膏澤則民有息肩之漸神無乏祀之憂五嶽四瀆等處祈雨祝文天人之交應若影響雨暘不順咎在貌言失之户庭害及寰宇求治雖切不當天意之中聽言雖多未聞民病之實刑罰有過賦役未平一人之愆百姓何罪避坐徹膳猶當許其自修悔禍轉災庶或救之將墜於神蓋反掌之易而民免擠壑之憂仰瞻雲霓待命旦夕五嶽四瀆等處謝雨祝文乃者常暘為災歷時愈熾念咎責已寧丁我躬求哀籲天並走羣望果蒙膏澤之賜一拯流亡之餘我愧于民敢廢無災之懼神終其賜願必有年之祥神宗皇帝禫祭太皇太后親行祝文寒暑之變忽焉再期練祥之餘復將三月勉從即吉之典莫遂無窮之哀神宗皇帝禫祭皇帝親行祝文既祥之餘徙月而吉迫於先王之禮徒有終身之憂瞻仰聖靈伏深感慕神宗皇帝禫祭皇太后親行祝文喪期有數禫月告終哀雖未忘禮弗敢過追慕之至中外所同永裕陵修移角堠門户柏窠奏告神宗皇帝祝文園寢之奉巡行以時增植所宜卜云其吉先事而告亦禮之常永裕陵修移角堠門户柏窠祭告土地祝文寢園之奉栽植以時惟爾有神實嚴所守敢祈昭鑒永底平寧景靈宫天興殿開淘井眼祭告里域真官祝文神遊之庭井泥不食日辰之吉浚治以時諗爾明靈庶無悔咎太皇太后皇太后皇太妃受册奏告太廟并諸陵祝文伏以祗事親闈庶幾孝治配德祖考既務極於推崇篤生眇沖亦敢忘於褒顯將奉寶册率循舊章涓日甚良先期以告西京應天禪院會聖宫修神御帳座畢功告遷諸神御祝文頃詔有司恭修幄座暫安别殿以作庶工既匠事之告成宜真遊之來復願垂昭鑒及此良辰西京應天禪院會聖宫修神御帳座畢工奉安諸神御祝文幄座告成允協歲時之吉靈遊永奠復瞻天日之光庶俾後人仰蒙餘慶西京會聖宫應天禪院奉安神宗皇帝御容前一日奏告永裕陵祝文國家推本漢儀立郡國之廟參用唐制就佛老之祠乃眷洛都載瞻園寢並興靈宇以奉神嬉閔惟沖人恭蹈成憲謹擇良日臨遣近臣庶回日月之光少答人天之望神宗皇帝御容至會聖宫并應天禪院前一日奏告諸帝祝文三靈眷命六聖在天嵩洛之間仙釋所館惟兹吉禘之始當祔出遊之庭念彼元臣昔皆侑食一新惟肖之像永陪如在之神敢冀威靈曲垂鑒照神宗皇帝御容進發前一日奏告天地社稷宗廟等處祝文祗畏天明率循祖武進衣冠之原廟鎮嵩洛之靈祠恭擇良辰啓行仙馭分遣執事並告有神生擒西番果莊奏告永裕陵祝文大獮獲禽必有指蹤之自豐年高廩孰知耘耔之勞憬彼西戎古稱右臂自嘉祐末木征擾邊至熙寧中董氊方命於赫聖考恭行天誅非貪尺寸之疆蓋為民除蟊賊遂建長久之策不以賊遺子孫而西番大首領果莊首犯南川北連拓拔申命諸將擇利而行旋聞偏師無往不克吏士用命爭酬未報之恩聖靈在天難逃不漏之網已於八月戊戌生獲果莊頡利成擒初無渭水之恥郅支授首聊報谷吉之寃謹當推本聖心益修戎略務在服近而來逺期於偃革以息民仰冀威神曲垂昭鑒西京會聖宫應天禪院奉安神宗皇帝御容奏告諸帝祝文於穆神考陟配在天有嚴祠宫從祀我祖時日協吉聖靈其安寵綏後人永錫純嘏西京應天禪院會聖宫奉安神宗皇帝神御祝文於皇在天丕冒下土矧此山陵之近顧瞻兩都宅於嵩洛之間上聫五聖有嚴淨宇會聖宫改為真觀祗奉晬顔願追梵釋之遊會聖宫改為仙聖之遊永答人天之望太皇太后皇太后皇太妃受册禮畢奏謝天地社稷宗廟諸宫觀并諸陵祝文至哉坤元政必先於治內養以天下孝莫大於尊親昔首正於號名今復嚴於典册禮樂既具神人允諧分命邇臣恭致成事仰祈昭鑒永錫鴻休諸神廟分命邇臣句改分命有司東太一宫翻修殿宇奏告十神太一真君祝文於穆祠宫有嚴春祀吏以時而按視工揆日以修完庶就潔新永綏靈御仰祈昭鑒大庇含生西路闕雨於濟瀆河瀆淮瀆廟祈雨祝文伏以水旱之事山川所司農服穡以有秋天密雲而不雨愧我不德瀆於有神願為三日之霖大慰一方之望國有常報我其敢忘永定院修蓋舍屋奏告諸帝后祝文具嚴淨宇祗奉寢園眷惟焚燎之餘少緩增修之役仰祈昭鑒永底燕寧永定院修蓋舍屋祭告土地祝文伏以向因遺燼延及淨祠爰擇良辰以興衆役宜兹遣使詔示有神內制祭文一十四首太皇太后祭奠故夏國主祭文乃眷外臣嗣守西服襲纍世之忠順荷先朝之寵光惟天難忱錫命不永訃音遽至閔悼良深特遣使車往陳奠幣庶此恩禮貫於幽明故皇叔祖昭信軍節度使檢校司空開府儀同三司漢東郡王宗瑗堂祭文惟王之生令德孝恭云何不淑罹此閔凶無復會朝載惻豫哀往奠其寢維以飾終故皇叔祖昭信軍節度使檢校司空開府儀同三司漢東郡王宗瑗下事祭文嗚呼死生之變賢愚莫逃日月有時義當即逺哀榮之極禮以告終來舉奠觴往安窀穸皇叔故魏王啓殯祭文惟靈襲纍朝之餘慶兼天下之達尊祖送之儀哀榮斯極永惟宅兆之卜未逢歲月之良參酌時宜遷神郊館啓殯之始寓哀斯文皇叔故魏王外殯前一夕夜祭文惟王之生孝友仁慈既歿元身舉國懷思矧豫沖眇義兼父師天不我遺日月如馳出次近郊寓此仁祠親奠莫及寧知我悲皇叔故魏王下事祭文惟靈出就外邸二年于兹一日不見企豫望思矧此告終月逝日逺雖云近郊寧復旋返築室祠宫既固既完雖非永歸亦可少安嗚呼哀哉故贈太師追封溫國公司馬光安葬祭文嗚呼元豐之末天步惟艱社稷之衛中外所屬惟是一老屏豫一人名高當世行滿天下措國於泰山之安下令於流水之源歲月未周綱紀略定天若相之又復奪之殄瘁不哀古今所共知之者神考用之者聖母馴致其道太平可期長為宗臣以表後世往奠其葬庶知豫懷故渭州防禦使宗孺出殯一夕祭文惟靈飭躬寡過秉德不回莫克永年遂即長夜哀榮之典國有故常死喪之戚豫惟惻愴故渭州防禦使宗孺下事祭文嗚呼宗枝之秀罹此降災日月有時禮當即逺奄臨窀穸肆設几筵往致豫哀來歆此奠故聽宣劉氏堂祭文奉侍有年肅雍靡懈今其亡矣良用惻然沒而有知來舉兹奠故聽宣劉氏墳所祭文盡瘁內職歸全近郊既掩諸幽往致斯奠賁其窀穸極爾哀榮故尚宫吳氏墳所祭文惟爾之生服勤乃事逢日之吉歸全於郊式榮其終往致斯奠故尚服劉氏堂祭文惟靈選備禁廷服勤內職逮兹淪謝良用愍傷饋奠之儀哀榮兼至故尚服劉氏墳所祭文惟靈服勤有年罹命不淑窀穸之事日月有時念爾永歸歆豫一奠內制導引歌辭二首奉安神宗皇帝御容赴景靈宫導引歌詞帝城父老三歲望堯心天逺玉樓深龍顔髣佛笙簫逺腸斷屬車音離宫春色瑣瑤林雲闕海沉沉遺民猶唱當時曲秋雁起汾隂迎奉神宗皇帝御容赴西京會聖宫應天禪院奉安導引歌詞經文緯武十有九年中遺烈震羌戎渭橋夾道千君長猶是建元功西瞻溫洛與神嵩蓮宇照瓊宫人間俯仰成今古流澤自無窮東坡全集卷一百十四
