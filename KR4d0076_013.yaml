body:
  text: 東坡全集卷十三宋蘇軾撰詩八十一首蜜酒歌西蜀道士楊世昌善作蜜酒絶醇釅余既得其方作此歌遺之真珠為漿玉為醴六月田夫汗流泚不如春甕自生香蜂為耕耘花作米一日小沸魚吐沫二日眩轉清光活三日開罋香滿城快㵼銀瓶不須撥百錢一斗濃無聲甘露微濁醍醐清君不見南園採花蜂似雨天教釀酒醉先生先生年來窮到骨問人乞米何曽得世間萬事真悠悠蜜蜂大勝監河侯又一首答二猶子與王郎見和脯青苔炙青蒲爛蒸鵝鴨乃瓠壺煮豆作乳脂為酥髙燒油燭斟蜜酒貧家百物初何有古來百巧出窮人搜羅假合亂天真詩書與我為麴蘖醖釀老夫成搢紳質非文是終難久脫冠還作扶犂叟不如蜜酒無燠寒冬不加甜夏不酸老夫作詩殊少味愛此三篇如酒美封胡羯末巳可憐不知更有王郎子謝陳季常惠一掩巾夫子胸中萬斛寬此巾何事小團團半升僅漉淵明酒二寸才容子夏冠好帶黃金雙得勝可憐白紵一生酸臂弓腰箭何時去直上隂山取可汗贈黃山人靣頰照人元自赤眉毛覆眼見來烏倦逰不擬談𤣥牝示病何妨出白鬚絶學巳生真定惠說禪長笑老浮屠東坡若肯三年住親與先生看藥爐問大冶長老乞桃花茶栽東坡周詩記苦荼茗飲出近世初緣厭粱肉假此雪昏滯嗟我五畝園桑麥苦䝉翳不令寸地閒更乞茶子藝饑寒未知免已作太飽計庶將通有無農末不相戾春來凍地裂紫笋森已鋭牛羊煩訶叱筐筥未敢睨江南老道人齒髮日夜逝他年雪堂品空記桃花裔魚蠻子江淮水為田舟楫為室居魚蝦以為糧不耕自有餘異哉魚蠻子本非左袵徒連排入江住竹瓦三尺廬於焉長子孫戚施且侏儒擘水取魴鯉易如拾諸途破釜不著鹽雪鱗芼青蔬一飽便甘寢何異獺與狙人間行路難踏地出賦租不如魚蠻子駕浪浮空虛空虛未可知㑹當算舟車蠻子叩頭泣勿語桑大夫弔李臺卿并叙李臺卿字明仲廬州人貌陋甚性介不羣而博學強記罕見其比好左氏有史學考正同異多所發明知天文律厯千載之日可坐數也軾謫居黃州臺卿為麻城主簿始識之既罷居於廬而曹光州演甫以書報其亡臺卿光州之妻黨也我初未識君人以君為笑垂頭若病鶴煙雨霾匕竅弊衣來過我危坐若持釣禇裒半面新鬷蔑一語妙徐徐涉其瀾極望不得徼却觀元嫵媚士固難輕料看書眼如月鏬隙靡不照我老多遺忘得君如再少從橫通雜藝甚博且知要所恨言無文至老幽不耀其生世莫識已死誰復弔作詩遺故人庶解俗子譙曹既見和復次其韻造物本兒戲風噫雷電笑誰令妄驚怪失匕號萬竅人人走江湖一一操網釣偶然連六鼇便謂此手妙空令任公子三嵗蹲海徼長貧固不辭一死實未料難將蓍草算除用佛眼照何人嗣家學恨子兒尚少嗟我與曺君衰老世不要空言今無救竒志後必耀吟公五字詩義重千金弔收藏慎勿出免使羣兒譙次韻孔毅甫集古人句見贈五首羡君戲集他人詩指呼市人如使兒天邉鴻鵠不易得便令作對隨家雞退之驚笑子美泣問君久假何時歸世間好句世人共明月自滿千家墀紫駝之峯人莫識雜以雞豚真可惜今君坐致五侯鯖盡是猩脣與熊白路旁拾得半段槍何必開爐鑄矛㦸用之如何在我耳入手當令君喪魄天下幾人學杜甫誰得其皮與其骨劃如太華當我前跛牂欲上驚崷崒名章俊語紛交衡無人巧㑹當時情前生子美只君是信手拈得俱天成詩人雕刻閒草木搜抉肝腎神應哭不如默誦千萬首左抽右取談笑足夜吟石鼎聲悲秋可憐好事劉與侯何當一醉百不問我欲眠矣君歸休膏明蘭臭俱自焚象牙翠羽戕其身多言自古為數窮微中有時堪解紛癡人但數羊羔兒不知何者是左慈千章萬句卒非我急走捉君應巳遲六年正月二十日復出東門仍用前韻亂山環合水侵門身在淮南盡處村五畝漸成終老計九重新掃舊巢痕豈惟見慣沙鷗熟已覺來多釣石溫長與東風約今日暗香先返玉梅魂食柑一雙羅帕未分珍林下先嘗愧逐臣露葉霜枝剪寒碧金盤玉指破芳辛清泉蔌蔌先流齒香霧霏霏欲噀人坐客殷勤為收子千奴一掬奈吾貧大寒步至東坡贈巢三春雨如暗塵春風吹倒人東坡數間屋巢子與誰鄰空牀斂敗絮破竈鬱生薪相對不言寒哀哉知我貧我有一瓢酒獨飲良不仁未能赬我頰聊復濡子唇故人千鍾祿馭吏醉吐茵那知我與子坐作寒蛩呻努力莫怨天我爾皆天民行看花栁動共享無邉春元修菜并叙菜之美者有吾鄉之巢故人巢元修嗜之余亦嗜之元修云使孔北海見當復云吾家菜邪因謂之元修菜余去鄉十有五年思而不可得元修適自蜀來見余於黃乃作是詩使歸致其子而種之東坡之下云彼美君家菜鋪田緑茸茸豆莢圎且小槐芽細而豐種之秋雨餘擢秀繁霜中欲花而未蕚一一如青蟲是時青裙女採擷何匆匆蒸之復湘之香色蔚其饛㸃酒下鹽豉縷橙芼薑葱那知雞與豚但恐放箸空春盡苖葉老耕翻烟雨叢潤隨甘澤化暖作青泥融始終不我負力與糞壤同我老忘家舍楚音變兒童此物獨嫵媚終年繫余胸君歸致其子囊盛勿函封張騫移苜蓿適用如葵菘馬援載薏苡羅生等蒿蓬懸知東坡下塉鹵化千鍾長使齊安人指此說兩翁二月三日㸃燈㑹客江上東風浪接天苦寒無賴破春妍試開雲夢羔兒酒快㵼錢塘藥玊船蠶市光隂非故國馬行燈火記當年冷烟濕雪梅花在留得新春作上元上已日與二三子携酒出遊隨所見輒作數句明日集之為詩故詞無倫次薄雲霏霏不成雨杖藜曉入千花塢柯丘海棠吾有詩獨笑深林誰敢侮三杯卯酒人徑醉一枕春睡日亭午竹間老人不讀書留我閉門誰教汝出簷藂枳十圍大寫真素壁千蛟舞東坡作塘今幾尺携酒一勞農工苦却尋流水出東門壞垣古塹花無主卧開桃李為誰妍對立鵁鶄相媚嫵開瓶藉草勸行路不惜春衫汙泥土褰裳共過春草亭扣門却入韓家圃轆轤繩斷井深碧鞦韆索挂人何所映簾空復小桃枝乞漿不見譍門女南山古臺臨斷岸雪陳翻空迷仰俯故人餽我玉葉羹火冷烟消誰為煮﨑嶇束藴下荒徑婭姹隔花聞好語更隨落景盡餘樽却傍孤城得僧宇主人勸我洗足眠倒床不復聞鐘鼓明朝門外泥一尺始悟三更雨如許平生所向無一遂兹逰何事天不阻固知我友不終窮豈弟君子神所豫日日出東門日日出東門步尋東城逰城門抱關卒笑我此何求我亦無所求駕言寫我憂意適忽忘返路窮乃歸休懸知百嵗後父老說故侯古來賢逹人此路誰不由百年寓華屋千載歸山丘何事羊公子不肯過西州南堂五首江上西山半隱堤此邦臺館一時西南堂獨有西南向卧看千帆落淺溪莫年眼力嗟猶在多病顛毛却未華故作明忩書小字更開幽室養丹砂他年雨夜困移牀坐厭愁聲㸃客腸一聽南堂新瓦響似聞東塢小荷香山家為割千房蜜稚子新畦五畝蔬更有南堂堪著客不憂門外故人車掃地焚香閉閣眠簟紋如水帳如烟客來夢覺知何處挂起西忩浪接天次韻子由種杉竹吏散空庭雀噪簷閉門獨宿夜厭厭似聞梨棗同時種應與杉篁刻日添糟麴有神薰不醉雪霜誇健巧相沾先生坐待清隂滿空使人人歎滯淹孔毅甫妻挽詞結褵記初歡同穴期晚嵗擇夫得溫嶠生子勝王濟髙風相賔友古義仍兄弟從君吏隱中窮達初不計云何抱沉疾俯仰便一世幽隂淒房櫳芳澤在巾袂百年縱得滿此路行亦逝那將有限身長㵼無益涕君文照今古不比山石脆當觀千字誄寧用百金瘞次韻孔毅甫久旱已而甚雨三首饑人忽夢飯甑溢夢中一飽百憂失只知夢飽本來空未悟真饑定何物我生無田食破硯爾來硯枯磨不出去年太嵗空在酉傍舍壺漿不容乞今年旱勢復如此嵗晚何以黔吾突青天蕩蕩呼不聞况欲稽首號泥佛甕中蜥蜴尤可笑跂跂脉脉何等秩隂陽有時雨有數民是天民天自恤我雖窮苦不如人要亦自是民之一形容雖似喪家狗未肯弭耳爭投骨倒冠落幘謝朋友獨與蚊雷共圭蓽故人嗔我不開門君視我門誰肯屈可憐明月如潑水夜半清光翻我室風從南來非雨候且為疲人洗蒸鬱褰裳一和快哉謡未暇饑寒念明日去年東坡拾瓦礫自種黃桑三百尺今年刈草蓋雪堂日炙風吹面如墨平生懶惰今始悔老大勤農天所直沛然例賜三尺雨造化無心恍難測四方上下同一雲甘霔不為龍所隔俗有分龍日蓬蒿下濕迎曉來燈火新凉催夜織老夫作罷得甘寢卧聽墻東人響屐奔流未已坑谷平折葦枯荷恣漂溺腐儒粗糲支百年力耕不受衆目憐破陂漏水不耐旱人力未至求天全㑹當作塘徑千步橫斷西北遮山泉四鄰相率助舉杵人人知我囊無錢明年共看决渠雨饑飽在我寧關天誰能伴我田間飲醉倒惟有支頭甎天公號令不再出十日愁霖併為一君家有田水冒田我家無田憂入室不如西州楊道士萬里隨身惟兩膝㳂流不惡泝亦佳一葉扁舟任漂突山芎麥麴都不用泥行露宿終無疾夜來饑腸如轉雷旅愁非酒不可開楊生自言識音律洞簫入手清且哀不須更待秋井塌見人白骨方䘖杯初秋寄子由百川日夜逝物我相隨去惟有宿昔心依然守故處憶在懷逺驛閉門秋暑中藜羮對書史揮汗與子同西風忽凄厲萬葉穿户牖子起尋夾衣感歎執我手朱顔不可恃此語君勿疑别離恐不免功名定難期當時已凄斷况此兩衰老失塗既難追學道恨不早買田秋已議築室春堂成雪堂風雨夜已作對牀聲和黃魯直食筍次韻飽食有殘肉饑食無餘菜紛然生喜怒似被狙公賣爾來誰獨覺凛凛白下宰太和古白下一飯在家僧至樂甘不壞多生味蠧簡食筍乃餘債蕭然映樽爼未肯雜菘芥君看霜雪姿童稚已耿介胡為遭暴橫三嗅不忍嘬朝來忽解籜勢迫風雷噫尚可餉三閭飯筒纒五采聞子由為郡僚所捃恐當去官少學不為身宿志固有在雖然敢自必用舍置度外天初若相我發迹造𢎞大豈敢負所付捐軀欲投㑹寧知事大謬舉步得狼狽我已無可言墮甑難追悔子雖僅自免雞肋安足賴低回畏罪罟黽俯敢言退若人疑或使為子得微罪時哉歸去來共抱東坡耒次韻王鞏南遷初歸二首問君謫南賔野葛食幾尺逢人瘴髮黃入市胡眼碧三年不易過坐睨倚天壁歸來貌如故妙語仍破鏑那能廢詩酒亦未妨禪寂願為尚書郎還賜上方舄江家舊池臺修竹圍一尺歸來萬事非惟見秦淮碧平生痛飲處遺墨鴉棲壁西來故父客金印雜鳴鏑三槐老更茂花絮春寂寂中微未可料家廟藏赤舄孔毅甫以詩戒飲酒問買田且乞墨竹次其韻酒中真復有何好孟生雖賢未聞道醉時萬慮一掃空醒後紛紛如宿草十年揩洗見真妄石女無兒焦榖槁此身何異貯酒瓶滿輒豫人空自倒武昌痛飲豈吾意性不違人遭客惱君家長松十畝隂借我一庵聊洗心我田方寸耕不盡何用百頃糜千金枕書睡熟呼不起好學憐君工雜擬且將墨竹換新詩潤色何須待東里任師中挽詞大任剛烈世無有疾惡如風朱伯厚小任溫毅老更文聰明慈愛小馮君兩任才行不須說疇昔並友吾先人相看半作晨星沒可憐太白與殘月大任先去冡未乾小任相繼呼不還強寄一樽生死别樽中有淚酒應酸貴賤賢愚同盡耳君家不盡緣賢子人間得喪了無憑只有天公終可倚子由作二頌頌石臺長老同公手寫蓮經字如黑蟻且誦萬遍脅不至席二十餘年豫亦作二首眼前擾擾黑蚍蜉口角霏霏白唾珠要識吾師無礙處試將燒却看嗔無眼睛心地兩虛圎脅不霑牀二十年誰信吾師非不睡睡蛇巳死得安眠鄧忠臣母周挽詞微生真草木無處謝天力慈顔如春風不見桃李實古今抱此恨有志俯仰失公子豈先知戰戰常惜日吾君日月照委曲到肝膈哀哉人子心吾何愛一邑家庭拜前後粲然發笑色豈比黃壤下焚瘞千金璧若人道德人視此亦戲劇聊償曽閔意遽與仙佛寂孤纍卧江渚永望墳墓隔作詩相楚挽感慟淚載滴徐君猷挽詞一舸南逰遂不歸清江赤壁照人悲請看行路無從涕盡是當年不忍欺雪後獨來栽栁處竹間行復採茶時山城散盡樽前客舊恨新愁只自知和蔡景繁海州石室芙蓉仙人石曼卿也舊逰處蒼藤翠壁初無路戲將桃核裹黃泥石間散擲如風雨坐令空山出錦繡倚天照海花無數花間石室可容車流蘇寶蓋窺靈宇何年霹靂起神物玉棺飛出王喬墓當時醉卧動千日至今石縫餘糟醑仙人一去五十年花老室空誰作主手植數松今偃蓋蒼髯白甲低瓊户我來取酒酹先生後車仍載胡琴女一聲氷鐡散巖谷海為瀾翻松為舞爾來心賞復何人持節中郎醉無伍獨臨斷岸呼出日紅波碧巘相吞吐徑尋我語覔餘聲拄杖彭鏗叩銅鼓長篇小字逺相寄一唱三歎神凄楚江風海雨入牙頰似聽石室胡琴語我今老病不出門海山巖洞知何許門外桃花自開落牀頭酒甕生塵土前年開閣放栁枝今年洗心參佛祖夢中舊事時一笑坐覺俯仰成今古願君不用刻此詩東海桑田真旦暮和秦太虛梅花西湖處士骨應槁只有此詩君壓倒東坡先生心已灰為愛君詩被花惱多情立馬待黃昏殘雪消遲月出早江頭千樹春欲暗竹外一枝斜更好孤山山下醉眠處㸃綴裙腰紛不掃萬里春隨逐客來十年花送佳人老去年花開我已病今年對花還草草不如風雨卷春歸收拾餘香還畀昊再和潜師化工未議蘇羣槁先向寒梅一傾倒江南無雪春瘴生為散氷花除熱惱風清月落無人見洗粧自趂霜鐘早惟有飛來雙白鷺玉羽瓊林鬬清好吳山道人心似水眼淨塵空無可掃故將妙語寄多情橫機欲試東坡老東坡習氣除未盡時復長篇書小草且撼長條餐落英忍饑未擬窮呼昊橄欖紛紛青子落紅鹽正味森森苦且嚴待得微甘回齒頰已輸崖蜜十分甜海棠東風嫋嫋泛崇光香霧霏霏月轉廊只恐夜深花睡去更燒髙燭照紅粧東坡雨洗東坡月色清市人行盡野人行莫嫌犖確坡頭路自愛鏗然曵杖聲生日王郎以詩見慶次其韻并寄茶二十一片折楊新曲萬人趨獨和先生于蒍于但信櫝藏終自售豈知碗脫本無橅朅從氷叟來遊宦肯伴臞仙亦號儒棠棣並為天下士芙蓉曽到海邉郛不嫌霧谷霾松柏終恐虹梁荷棟桴髙論無窮如鋸屑小詩有味似連珠感君生日遙稱夀祝我餘年老不枯未辦報君青玉案建溪新餅截雲腴别黃州病瘡老馬不任鞿猶向君王得敝帷桑下豈無三宿戀樽前聊與一身歸長腰尚載撑腸米闊領先裁蓋癭衣投老江湖終不失來時莫遣故人非過江夜行武昌山聞黃州鼓角清風弄水月銜山幽人夜渡吳王峴黃州鼓角亦多情送我南來不辭逺江南又聞出塞曲半雜江聲作悲健誰言萬方聲一槩鼉憤龍愁為余變我記江邉枯栁樹未死相逢真識面他年一葉泝江來還吹此曲相迎餞自興國往筠宿石田驛南二十五里野人舍溪上青山三百疊快馬輕衫來一抹倚山修竹有人家橫道清泉知我渴芒鞋竹杖自輕軟蒲薦松牀亦香滑夜深風露滿中庭惟見孤螢自開闔將至筠先寄遲適逺三猶子露宿風餐六百里明朝飲馬南江水未見豐盈犀角兒先逢玊雪王郎子時道逢王郎於建昌方北行也對牀欲作連夜語念汝還須戴星起夜來夢見小於莵逺小名虎兒猶是髧髦垂兩耳憶過濟南春未動三子出迎殘雪裏我時移守古河東酒肉淋漓渾舍喜而今憔悴一羸馬逆旅擔夫相汝爾出城見我定驚嗟身健窮愁不須耻我為乃翁留十日掣電一歡何足恃惟當火急作新詩一醉兩翁勝酒美端午遊真如遲適逺從子由在酒局一與子由别却數七端午身隨綵絲繫心與昌歜苦今年匹馬來佳節日夜數兒童喜我至典衣具雞黍水餅既懷鄉飯筒仍愍楚謂言必一醉快作西川語寧知是官身糟麴困熏煮獨携三子出古剎訪禪祖髙談付梁羅詩律到阿虎歸來一調笑慰此長齟齬梁羅遲適小名别子由三首兼別遲知君念我欲别難我今此别非他日風裏楊花雖未定雨中荷葉終不濕三年磨我費百書一見何止得雙璧願君亦莫歎留滯六十小劫風雨疾先君昔愛洛城居我今亦過嵩山麓水南卜宅吾豈敢試向伊川買修竹又聞緱山好泉眼傍市穿林㵼氷玉遙想茆軒照水開兩翁相對清如鵠兩翁歸隱非難事惟要傳家好兒子憶昔汝翁如汝長筆頭一落三千字世人聞此皆大笑慎勿生兒兩翁似不知樗櫟薦明堂何似鹽車壓千里初别子由至奉新作雙鵲先我來飛上東軒背書隨好夢到人與佳節㑹一歡難把玩回首了無在却渡來時溪斷橋號淺瀨茫茫暑天闊藹藹孤城背青山眊矂中落日淒涼外盛衰豈吾意離合非所礙何以解我憂粗了一事大同年程筠德林求先墳二詩思成堂宰樹連山谷祠堂照路隅養松無觸鹿助祭有馴烏歸夢先寒食兒啼到白鬚遙知鄰里化醉叟道爭扶歸真亭舊笑桓司馬今師鄭大夫不知徂嵗月空覺老楸梧祭禮傳家法阡名載版圗㑹看千字誄木杪見龜趺過建昌李野夫公擇故居彭蠡東北源廬阜西南麓何人修水上種此一雙玉思之不可見破宅餘修竹四鄰戒莫犯十畝森似束我來仲夏初解籜呈新緑幽鳥向我鳴野人留我宿裴回不忍去微月挂喬木遙想他年歸解組巾一幅對牀老兄弟夜雨鳴竹屋卧聽鄰寺鐘書忩耿殘燭初入廬山三首青山若無素偃蹇不相親要識廬山靣他年是故人自昔懷清賞神遊杳藹間如今不是夢真箇在廬山芒鞋青竹杖自挂百錢遊可怪深山裏人人識故侯圓通禪院先君舊遊也四月二十四日晚至宿焉明日忌日也乃手寫寶積獻蓋頌佛一偈以贈長老仙公仙拊掌笑曰昨夜夢寶蓋飛下著處輒出火豈此祥乎乃作是詩院有蜀僧宣逮事訥長老識先君云石耳峯頭路接天梵音堂下月臨泉此生初飲廬山水他日徒參雪竇禪袖裏寶書猶未出夢中飛蓋巳先傳何人更識嵇中散野鶴昻藏未是仙子由在筠作東軒記或戲之為東軒長老其壻曹煥往筠余作一絶句送曹以戲子由曹過廬山出以示圎通慎長老慎欣然亦作一絶送客出門歸入室趺坐化去子由聞之乃作二絶一以答豫一以答慎明年余過圎通始得其詩乃追次慎韻君到髙安幾日回一時斗藪舊塵埃贈君一籠牢收取盛取東軒長老來余送曹詩東軒長老未相逢已見黃州一信通何必揚眉資目擊須知千里事同風愼老和余韻東軒只似虛空樣何處人家籠解盛縱使盛來無處著雪堂自有老師兄子由答豫詩擔頭挑得黃州籠行過圎通一笑開却到山前人已寂亦無一物可擔回子由答慎詩大士何曽有生死小儒底處覔窮通偶留一吷千山上散作人間萬竅風余和慎詩余過溫泉壁上有詩云直待衆生總無垢我方清冷混常流問人云長老可遵作遵已退居圎通亦作一絶石龍有口口無根自在流泉誰吐吞若信衆生本無垢此泉何處覔寒溫世傳徐凝瀑布詩云一條界破青山色至為塵陋又僞作樂天詩稱美此句有賽不得之語樂天雖涉淺易然豈至是哉乃戲作一絶帝遣銀河一派垂古來惟有謫仙詞飛流濺沫知多少不與徐凝洗惡詩書李公擇白石山房偶尋流水上崔嵬五老蒼顔一笑開若見謫仙煩寄語匡山頭白早歸來贈東林總長老溪聲便是廣長舌山色豈非清淨身夜來八萬四千偈他日如何舉似人題西林壁橫看成嶺側成峯逺近髙低無一同不識廬山真面目只緣身在此山中廬山二勝并叙余遊廬山南北得十五六竒勝殆不可勝紀而懶不作詩獨擇其尤者作二首開先漱玉亭髙巖下赤日深谷來悲風擘開青玉峽飛出兩白龍亂沫散霜雪古潭搖清空餘流滑無聲快寫雙石谼我來不忍去月出飛橋東蕩蕩白銀闕沉沉水精宫願隨琴髙生腳踏赤鯶公手持白芙蕖跳下清泠中栖賢三峽橋吾聞太山石積日穿線溜況此百雷霆萬世與石鬭深行九地底嶮出三峽右長輸不盡溪欲滿無底竇跳波翻潛魚震響落飛狖清寒入山骨草木盡堅瘦空濛烟靄間澒洞金石奏彎彎飛橋出㶑㶑半月彀玉淵神龍近雨雹亂晴晝垂瓶得清甘可咽不可漱陶驥子駿佚老堂二首文舉與元禮尚得稱世舊淵明吾所師夫子乃其後挂冠不待年亦豈為五斗我歌歸來引余增損淵明歸去來以就聲律謂之歸來引千載信尚友相逢黃卷中何似一杯酒君醉我且歸明朝許來否我從廬山來目送孤飛雲路逢陸道士知是千嵗人試問當時友虎溪已埃塵似聞佚老堂知是幾世孫能為五字詩仍戴漉酒巾人呼小靖節自號葛天民和李太白并叙李太白有潯陽紫極宫感秋詩紫極宫今天慶觀也道士胡洞微以石本示余蓋其師卓玘之所刻玘有道術節義過人今亡矣太白詩云四十九年非一往不可復今豫亦四十九感之次其韻玉芝一名瓊田草洞微種之七八年矣云更數年可食許以遺余故并記之何處聞秋聲翛翛北忩竹回薄萬古心攬之不盈掬靜坐觀衆妙浩然媚幽獨白雲南山來就我簷下宿懶從唐生决羞訪季主卜四十九年非一往不可復野情轉蕭散世道有翻覆陶令歸去來田家酒應熟寄卧虛寂堂月明浸踈竹泠然洗我心欲飲不可掬流光發永歎自昔非豫獨行年四十九還此北忩宿緬懷卓道人白首寓醫卜謫仙固逺矣此士亦難復世道如奕棋變化不容覆惟應玉芝老待得蟠桃熟次韻道潛留别為聞廬嶽多真隱故就髙人斷宿攀已喜禪心無别語尚嫌剃髮有詩斑異同更莫疑三語物我終當付八還到後與君開北戶舉頭三十六青山東坡全集卷十三
