body:
  text: 東坡全集卷二十九宋蘇軾撰詩一百一十六首觀湖二首乘槎逺引神仙客萬里清風上海濤回首不知沙界小飄衣猶覺色塵髙須彌有頂低垂日兜率無根下戴鼇釋梵茫然齊劫火飛雲不覺醉陶陶朝陽照水紅光開玉濤銀浪相徘徊山分宿霧儘寬逺雲駕髙風馳送來升霞影色欹殘火及物氣焰明纎埃可憐極大不知已浮生野馬悠悠哉寄髙令滿地春風掃落花幾畨曽醉長官衙詩成錦繡開胸臆論極冰霜繞齒牙别後與誰同把酒客中無日不思家田園知有兒孫委早晚扁舟到海涯獄中寄子由二首聖主如天萬物春小臣愚暗自忘身百年未滿先償債十口無歸更纍人是處青山可埋骨他年夜雨獨傷神與君世世為兄弟更結人間未了因柏臺霜氣夜凄凄風動琅璫月向低夢繞雲山心似鹿魂飛湯火命如雞眼中犀角真吾子身後牛衣愧老妻百嵗神遊定何處桐鄉知葬浙江西獄中聞湖杭民為余作解厄齊經月所以有此句也朱邑葬桐鄉犀角杜琮事出獄次前韻二首百日歸期恰及春殘生樂事最關身出門便旋風吹面走馬聨翩鵲啅人却對酒杯渾是夢試拈詩筆已如神此災何必深追咎竊祿從來豈有因平生文字為吾纍此去聲名不厭低塞上縱歸他日馬城中不鬬少年雞休官彭澤貧無酒隱几維摩病有妻堪笑睢陽老從事為余投檄向江西子由聞余下獄乞以官爵贖罪貶筠州監酒寄子由厭暑多應一向慵銀鈎秀句益疏通也知堆案文書滿未暇開軒硯墨中湖面新荷空照水城頭髙栁謾搖風吏曹不是尊賢事誰把前言語化工詩送交代仲達少卿此身無用且東來賴有江山慰不才舊尹未嫌衰廢久清尊猶許再三開滿城遺愛知誰繼極目扁舟挽不回歸去青雲還記否交遊勝絶古城隈次韻馬元賓流落江湖萬里歸相逢自慰巳差池初聞好句驚人倒悔過東庭識面遲握手寧知無賀監結交誰復許袁絲塞鴻正欲摩天去垂老追攀豈可期第五橋白露凄風洗瘴烟夢回相對兩凄然雀羅廷尉非當日鳩杖先生愈少年世事飽諳思縮手主恩未報恥歸田誰憐第五橋東水獨照台州老鄭䖍次韻完夫再贈之什某巳卜居毗陵與完夫有廬里之約云栁絮飛時笋籜斑風流二老對開關雪芽為我求陽羡乳水君應餉惠山竹簟水風眠晝永玉堂制草落人間應容緩急煩閭里桑柘聊同十畝閒和林子中待制兩翁留滯各皤然人笑迂疏老更堅共把鵝兒一作鴟夷一樽酒相逢卵色五湖天江邊遺愛啼斑白海上先聲入管絃早晚淵明賦歸去浩歌長笑老斜川九日袁公濟有詩次其韻古來靜治得清閒我愧真常也一班舉酒東榮挹江海回樽落日勸湖山平生傾蓋悲歡裏早晚抽身簿領間笑指西南是歸路倦飛弱羽久知還和吳安持使者迎駕小雪疏烟雜瑞光清波寒引御溝長曈曈日色籠丹禁杳杳鞭聲出建章鵷鷺偶叨陪下列天閽聊啓望中央歸來喜氣傾新句滿座疑聞錦繡香鹿鳴宴連騎匆匆畫鼓喧喜君新奪錦標還金罍浮菊催開宴紅蕊將春待入關他日曽陪探禹穴白頭重見賦南山何時共樂升平事風月笙簫一夜間次韻張甥棠美晝眠炎歊五月北窗凉更覺甘如飯稻粱宰我糞墻譏敢避孝先經笥謔兼忘憂虞心謝知時雁安穩身同挂角羊要識熙熙不爭競華胥别是一仙鄉真興寺閣禱雨太守親從千騎禱神翁逺借一杯清雲隂黯黯將噓遍雨意昏昏欲醖成已覺微風吹袂冷不堪殘日傍山明今年秋熟君知否應向江南飽食粳惠州近城數小山類蜀道春與進士許毅野步㑹意處飲之且醉作詩以記適參寥專使欲歸使持此以示西湖之上諸友庶使知余未嘗一日忘湖山也夕陽飛絮亂平蕪萬里春前一酒壺鐡化雙魚沉逺素劔分二嶺隔中區花曽識面香仍好鳥不知名聲自呼夢想平生消未盡滿林烟月到西湖送蜀僧去塵十年讀易費膏火盡日吟詩愁肺肝不解丹青追世好欲將芹芷薦君盤誰為善相寧嫌瘦復有知音可廢彈拄杖挂經須倍道故鄉春蕨已闌干曽元恕遊龍山吕穆仲不至青春不覺老朱顔强半銷磨簿領間愁客倦吟花以酒佳人休唱日銜山共知寒食明朝過且赴僧窗半日閒命駕吕安邀不至浴沂曽㸃暮方還黃河活活何人見混茫崑崙氣脈本來黃濁流若解汚清濟驚浪應須動太行帝假一源神禹跡世流三患梗堯鄉靈槎果有仙家事試問青天路短長壬寅重九不預㑹獨遊普門寺僧閣有懷子由花開酒美盍不歸來看南山冷翠微憶弟淚如雲不散望鄉心與雁南飛明年縱健人應老昨日追歡意正違不問秋風强吹帽秦人不笑楚人譏小飲公瑾舟中青泥赤日午相烘走訪一作扣船窗柳影中輟我東坡無限睡賞君南浦不資風坐觀邸報談迂叟閒說滁山憶醉翁此去澄江三萬頃只應明月照還空鄧滁人也是日坐中觀邸報云叟已押入門下省和子由次王鞏韻如囊之句可為一噱平生未省為人忙貧賤安閒氣味長粗免趨時頭似葆稍能忍事腹如囊簡書見迫身今老樽酒聞呼首一昂欲挹天河聊自洗塵埃滿面鬢眉黃儋耳霹靂收威莫雨開獨憑欄檻倚崔嵬垂天雌霓雲端下快意雄風海上來野老已歌豐嵗語除書欲放逐臣回殘年飽飯東坡老一壑能專萬事灰答李端叔若人如馬亦如班笑履壺頭出玉關已入西羌度沙磧又來東海看濤山識君小異千人裏慰我長思十載間西省憐君一作鄰居時邂逅相逢有味是偷閒立春日病中邀安國仍請率禹功同來僕雖不能飲當請成伯主㑹某當杖策倚几於其間觀諸公醉笑以撥滯悶也孤燈照影夜漫漫拈得花枝不忍看白髮欹簪羞彩勝黃耆煮粥薦春盤東方烹狗陽初動南陌爭牛卧作團老子從來興不淺向隅誰有滿堂歡齊居卧病禁烟前辜負名花已一年此日使君不强喜新春風物為誰姸青衫公子家千里白首先生杖百錢曷不相將來問病巳教呼取散花天和參寥見寄黃樓南畔馬臺宫雲月娟娟正㸃空欲共幽人洗筆硯要傳流水入絲桐且隨侍者尋西谷莫學山僧老祝融待我西湖借君去一杯湯餅潑油䓗東園岑寂東園可散愁膠膠擾擾夢神州萬竿苦竹旌旗卷一部鳴蛙鼓吹收雨後月前天欲冷身閒心逺地偏幽杜門謝客恐生謗且作人間鵬鷃遊奉和陳賢良不學孫吳與六韜敢將駑馬並英豪望窮海表天還逺傾盡葵心日愈髙身外浮名休瑣瑣夢中歸思已滔滔三山舊是神仙地引手東來一釣鼇秋興三首野鳥游魚信往還此身同寄水雲間誰家晚吹殘紅葉一夜歸心滿舊山可慰摧頽仍健食此生通脫屢酡顔年華豈是催人老雙鬢無端只自斑故里依然一夢前相携重上釣魚船嘗陪大幕今陳迹謬忝承明愧昔年報國無成空白首退耕何處有名田黃雞白酒雲山約此計當時已浩然浴鳯池邊星斗光宴餘香滿上書囊樓前夜月低韋曲雲裏車聲出未央去國何年雙鬢雪黃花重見一枝霜傷心無限厭厭夢長似秋宵一倍長夜直祕閣呈王敏甫蓬瀛宫闕隔埃氛帝樂天香似許聞瓦弄寒蟾鴛卧月樓生晴靄鳯盤雲共誰交臂論今古只有閒心對此君大隱本來無境界北山猿鶴謾移文題永叔㑹老堂三朝出處共雍容嵗晚交情見二公乘興不辭千里逺放懷還喜一樽同嘉謀定國垂青史盛事傳家有素風自顧纓塵猶未濯九霄終日羡冥鴻次韻參寥寄少游巖棲木石已皤然交舊何人慰眼前素與晝公心印合每思秦子意珠圓當年步月來幽谷拄杖穿雲冒夕烟臺閣山林本無異故應文字不離禪謝曹子方惠新茶陳植文華斗石髙景公詩句復稱豪數竒不得封龍額祿仕何妨有馬曹囊簡久藏科斗字銛鋒新瑩鸊鵜膏南州山水能為助更有英辭勝廣騷題潭州徐氏春暉亭曈曨曉日上三竿客向東風竟倚欄穿竹鳥聲驚步武入簷花影落杯盤勿嫌步月臨𤣥圃冷笑乘槎向海灘勝槩直應吟不盡憑君寄與畫圗看贈仲勉子文雨昏南浦曽相對雪滿荆州喜再逢有子才如不羈馬知君心似後凋松閒看書冊應多味老傍人門想更慵何日晴軒觀筆硯一杯相屬更從容講武臺南有感山城九月冒朝寒講武臺南路屈盤騶子雨中乘馬去村童烟外倚墻看鴉啼冡木秋風急鷺立漁船夜水乾花似去年堪折贈插花人去淚闌干題寶雞縣斯飛閣西南歸路逺蕭條倚檻魂飛不可招野闊牛羊同雁鶩天長草樹接雲霄昏昏水氣浮山麓泛泛春風弄麥苖誰使愛官輕去國此身無計老漁樵重遊終南子由以詩見寄次韻去年新栁報春回今日殘花覆緑苔溪上有堂還獨宿誰人無事肯重來古琴彈罷風吹座山閣醒時月照杯懶不作詩君錯料舊逋應許過時陪次韻和子由欲得驪山沉泥硯舉世爭稱鄴瓦堅一枚不換百金頒豈知好事王夫子自採臨潼繡領山經火尚含泉脈暖弔秦應有淚痕澘封題寄去吾無用近日從戎擬學班次韻子由彈琴琴上遺聲久不彈琴中古意本長存苦心欲記常逃舊信指如歸自著痕應有仙人依樹聽空教瘦鶴舞風騫誰知千里溪堂夜時引驚猿撼竹軒和朝美叔反觀皆自直相詆競誰諛事過始堪笑夢中今了無珍材尚空谷疲馬正長途未識造化意茫然同一爐再次前韻係織錦圖上回文春機滿織回文錦粉淚揮殘露井桐人逺寄情書字小栁絲低目晚庭空紅箋短寫空深恨錦句新翻欲斷腸風葉落殘驚夢蝶戍邊回雁寄情郎羞雲斂慘傷春暮細縷詩成織意深頭伴枕屛山掩恨日昏塵暗玉窗琴和人回文五首紅窗小泣低聲怨永夕春寒斗帳空中酒落花飛絮亂曉鶯啼破夢匆匆同誰更倚閒窗繡落日紅扉小院深東復西流分水嶺恨無愁續斷絃琴寒信風飄霜葉黃冷燈殘月照空牀看君寄意傳文錦字字縈愁寫斷腸前堂畫燭夜凝淚半夜清香荔惹衾烟鎖竹枝寒宿鳥水沉天色霽橫參蛾翠斂時聞燕語淚珠彈處見鴻歸多情妾似風花亂薄幸郎如露草晞次韻參寥詠雪朝來處處白氊鋪樓閣山川盡一如總是爛銀並白玉不知竒貨有誰居嵇紹似康并引王凌謂賈充曰汝非賈梁道之子耶乃欲以國與人由此觀之梁道之忠於魏也久矣司馬景王既執凌而歸過梁道廟凌大呼曰我大魏之忠臣也及司馬景王病見凌與梁道守而殺之二人者可謂忠義之至精貫於幽明矣然梁道之靈獨不能已其子充之姦至使首發成濟之事此又理之不可曉者也故余嘗戲作小詩云嵇紹似康為有子郗超叛鑒似無孫如今更恨賈梁道不殺公閭殺子元移合浦郭功甫見寄君恩浩蕩似陽春合浦何如在海濱莫趂明珠㺯明月夜深無數採珠人過太行自過太行至聞潮陽吳子野出家共十九篇始余赴中山連日風埃未嘗了了見太行也意頗以為恨今將適嶺表過臨城道中天氣肅然西山草木皆可數忽悟笑曰余南遷其必返乎此退之衡山之祥也乃作小詩逐客何人著眼看太行千里送征鞍未應愚谷能留栁可獨衡山解識韓惠州一絶羅浮山下四時春盧橘楊梅次第新日啖荔枝三百顆不妨長作嶺南人送佛面杖與羅浮長老十方三界世尊面都在東坡掌握中送與羅浮德長老携歸萬竅總號風過子忽出新意以山芋作玉糝羮色香味皆竒絶天上酥陀則不可知人間决無此味也香似龍涎仍釅白味如牛乳更全清莫將北海金虀鱠輕比東坡玉糝羮次韻功父觀余畫雪鵲有感二首早知臭腐即神竒海北天南總是歸九萬里風安稅駕雲鵬今悔不卑飛可憐倦鳥不知時空羡騎鯨得所歸玉局西南天一角萬人沙苑看孤飛追憶郭功父觀余舊畫雪鵲復作二韻寄之時在惠州平生才力信瑰竒今在窮荒豈易歸正似雪林樓上畫羽翰雖好不能飛復官北歸再次前韻秋霜春雨不同時萬里今從海外歸巳出網羅毛羽在却尋雲跡帖天飛蜀僧明操思歸龍丘子書壁更厭勞生能幾日莫將歸思擾衰年片雲㑹得無心否南北東西只一天武昌酌菩薩泉送王子立送行無酒亦無錢勸爾一杯菩薩泉何處低頭不見我四方同此水中天舉舊詩次今韻呈曇秀春風何處不歸鴻非復羸牛踏舊蹤但願老師真似月誰家瓮裏不相逢答海上翁山翁不復見新詩疑是河南石壁曦海水豈容鯨飲盡然犀何處覔瓊枝占山亭二首尚父提封海岱間南征惟到穆陵關誰知海上詩狂客占得膠西一半山我是膠西舊使君此山仍占與君分故應竊比山中相時作新詩寄白雲題懷素草帖人人送酒不曽沽終日松間掛一壺草聖無成狂飲發真堪畫作醉僧圗雨中明慶賞牡丹霏霏雨露作清妍爍爍明燈照欲然明日春隂花未老故應未忍著酥煎與王郎夜飲井水吳興六月水泉溫千頃荷花聚暗蚊此井獨能深一丈源龍如故亦如君贈僧思誼㵼湯舊得茶三昧覔句近窺詩一斑清夜漫漫困披覽一作搜攪齊腸那得許慳頑子玉以詩見邀同刁丈遊金山君年甲子未相逢難向君前說老翁更有方瞳八十一奮衣矍鑠走山中次韻致逺長笑右軍稱草聖不如東野以詩鳴樂天自欲吟淮月懷祖無勞聽角聲次韻景文山堂聽筝三首忽憶韓公二妙姝琵琶筝韻落空無猶勝江左狂靈運空鬬東昏百草鬚馬上胡琴塞上姝鄭中丞後有人無詩成畫燭飄金燼八尺英公欲燎鬚荻花楓葉憶秦姝切切么絃細欲無莫把胡琴挑醉客回看霜㦸褚公鬚成伯家宴造坐無由輒欲效顰而酒已盡入夜不欲煩擾戲作小詩求數酌而巳道士令嚴難繼和僧伽帽小却空回隔籬不喚鄰翁飲抱瓮須防吏部來道士令恱神樂中所謂離而復合者杜詩云肯與鄰翁相對飲隔籬呼取盡餘杯成伯席上贈所出妓川人楊姐坐來真箇好相宜深注脣兒淺畫眉須信楊家佳麗種洛川自有浴妃池又答氊帳卧病經旬减帶圍清樽忘却故人期莫嫌雪裏閒氊帳作事由來未合時往年宿瓜步夢中得小詩録示民師吳塞蒹葭空碧海隋宫楊栁只金堤春風自恨無情水吹得東流竟日西送范德孺漸覺東風料峭寒青蒿黃韭試春盤遙想慶州千嶂裏暮雲衰草雪漫漫陸蓮庵何妨紅粉唱迎仙來伴山僧到處禪陸地生花安足怪而今更有火中蓮僕年三十九在潤州道上過除夜作此詩又二十年在惠州録之以付過寺官官小未朝參紅日半窗春睡酣為報鄰雞莫驚覺更容殘夢到江南釣艇歸時菖葉雨繅車鳴處楝花風長江昔日經遊地盡在如今夢寐中壽陽岸下街東街西翠幄成池南池北緑錢生幽人獨來帶殘酒一作雨偶聽一作聞得黃鸝第一聲戲答王都尉傳柑侍史傳柑玉座傍人間草木盡天漿寄與維摩三十顆不知薝蔔是餘香舉輕明重維摩猶三十枚萬州太守髙公宿約遊岑公洞而夜雨連明戲贈二小詩肩輿欲到岑公洞正怯衝泥傍險行定是岑公閟清境春江一夜雨連明蓬窗髙枕雨如繩恰似糟牀壓酒聲今日岑公不能飲吾儕猶健可頻傾遊中峯杯泉石眼杯泉舉世無要知杯度是凡夫可憐狡獪維摩老戲取江湖入鉢盂憩寂圗東坡雖是湖州派竹石風流各一時前世畫師今姓李不妨還作輞川詩送栁宜歸折腳鐺邊煨淡粥曲枝桑下飲離杯書生不是南遷客魑魅驚人須早回寒具乃捻頭出劉禹錫佳語纎手搓來玉數尋碧油輕蘸嫩黃深夜來春睡濃於酒壓褊佳人纒臂金參寥惠楊梅新居未換一根椽只有楊梅不直錢莫共金家鬬甘苦參寥不是老婆禪雨夜宿淨行院芒鞋不踏利名埸一葉輕一作虛舟寄渺茫林下對牀聽夜雨靜無燈火照凄凉送惠州監押一聲鳴一作鴻雁破江雲萬葉梧桐卷露銀我自飄零是羇旅更堪秋晚送行人過黎君郊居半園荒草沒佳蔬煮得占禾半是薯萬事思量都是錯不如還叩仲尼居贈王覯何人生得寧馨子今夜初逢掣筆郎莫怪圍碁忘瓜葛已能作賦繼靈光太夫人以無咎生日置酒書壁一絶夀樽餘瀝到朋簪要與郎君夜語深敢問阿婆開後閣井中車轄任浮沉余舊在錢塘伯固開西湖今方請越戲謂固可復來開鏡湖伯固有詩因次韻已分江湖送此生㑹稽行復得岑成鏡湖席卷八百里坐嘯因君又得名召伯梵行寺山茶山茶相對阿一作本誰栽細雨無人我獨來說似與君君不㑹一作見爛紅如火雪中開奉和成伯兼戲禹功金錢石竹道傍秋翠帶紅裙馬上謳無限小兒齊拍手山公又作習池遊洗兒人皆養子望聰明我被聰明誤一生惟願孩兒愚且魯無災無難到公卿病後醉中病為兀兀安身物酒作蓬蓬入腦聲堪笑錢塘十萬户官家付與老書生劉監倉家煎米粉作餅子余云為甚酥潘邠老家造逡巡酒余飲之莫作醋錯著水來否後數日余携家飲郊外因作小試戲劉公求之二首一杯連坐兩髯棋數片深紅入座飛十分㶑灧君休訴且看桃花好面皮唐詩云未有桃花面皮先作杏子眼孔野飲花間百物無杖頭惟挂一葫蘆已傾潘子錯著水更覔君家為甚酥夢中絶句楸樹髙花欲插天暖風遲日共茫然落英滿地君方見惆悵春光又一年元翰少卿寵惠谷簾水一器龍團二枚仍以新詩為貺歎味不已次韻奉和巖垂匹練千絲落雷起雙龍萬物春此水此茶俱第一共成三絶景中人藏春塢三首退之身外無窮事子美生前有盡花更有多情君未識不隨栁絮落人家莫尋羣玉峯頭路莫看𤣥都觀裏花但解閉門留我住主人休問是誰家朱閣前頭露井多碧桃枝下美人過寒泉未必能如此奈有銀牀素綆何東坡全集卷二十九
