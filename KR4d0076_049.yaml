body:
  text: 東坡全集巻四十九宋蘓軾撰䇿問二十三首私試䇿問八首問人主莫不欲安存而惡危亡然而其國常至於不可救者何也所憂者非其所以亂與亡而其所以亂與亡者常出於其所不憂也請借漢以言之昔者髙帝之世天下既平矣當時之所憂者韓彭英盧而已此四王者皆不能終髙帝之世相繼仆滅而不復續及至吕氏之禍則猶異姓也吕氏既已滅矣而吳楚之憂幾至於亡國方韓彭吕氏之禍惟恐同姓之不蕃熾昌大也然至其為變則又過於異姓逺矣文景之世以為諸侯分裂破弱則漢可以百世而無憂至於武帝諸侯之艱少衰而匈奴之患方熾則又以為天下之憂止於此矣及昭宣元成之世諸侯王既已無足憂者而匈奴又破滅臣事於漢然其所以卒至於中絶而不救則其所不慮之王氏也世祖既立上懲韓彭之難中鑒七國之變而下悼王氏之禍於是盡侯諸將而不任以事裁減同姓之封而黜三公之權以為前世之弊盡去矣及其衰也宦官之權盛而黨錮之難起士大夫相與搤腕而遊談者以為天子一日誅宦官而解黨錮則天下猶可以無事於是外召諸將而内脅其君宦官既誅無遺類而董卓曹操之徒亦因以亡漢漢之所憂者凡六變而其亂與亡輒出於其所不憂而終不可備由此觀之治亂存亡之勢其皆有以取之歟抑將不可推如江河之徙移其勢自有以相激而不自知歟其亦可以理推力救而莫之為也今將使事至而應之患至而為之謀則天下之患不可以勝防而政化不可以勝變矣則亦將朝文而莫質忽寛而驟猛歟意者亦有可以長守而不變雖有小患而不足䘏者歟願因論漢而極言其所以然問昔三代之際公卿有生而為之者士有至老而不遷者官有常人而人有常心故為周之公卿者非周召毛原則王之子弟也發於畎畆起於匹夫而至於公相則蓋亦有幾人而已士之勤苦終身於學講肄道藝而脩其廉隅以邀鄉里之名者不過以望鄉大夫賢能之書其選舉而上不過以為一命之士其傑異者至於大夫極矣夫周之世諸侯為政之卿皆其世臣之子孫則夫布衣之士其進蓋亦有所止也當是之時士皆安其習而樂其分不倦於小官而樂為之故其民事脩而世務舉及其後世不然使天下旅進而更為之雖布衣之賢得以驟進於朝廷而士始有無厭之心矣官事之不脩民事之不緝非其不能不屑為之也先王之用人欲其人人自喜終老而不倦是以能盡其才今以凡人之才而又加之以既倦之意其為弊可勝言乎今夫州縣之吏有故而不得改官者盤桓於州縣而不能去久者不過以為職官令録仕而逹者自縣宰為郡之通守自郡之通守以至郡守為郡守而無他才能則盤桓於太守而不得去由此觀之是職官令録與郡守四者為國家棄材之委而仕不逹者之所盤桓而無聊也夫以太守之重職官令録之近於民而用棄材焉使不逹者盤桓於其職此豈先王所以使人不倦之意歟嗟夫盖亦有不得已也居今之世何以使天下之士各安其分而無輕於小官何以使此四者流徙不倦而無不自聊賴之意其悉書於篇問古者師出受成於學兵固學者之所宜知也今關中之事又諸君之所親履而目見者昔者六國之世秦盡有今關中之地地不加廣也而東備齊南備楚近則備韓魏逺則備燕趙有敵國之憂而無中原之助然而當是時也攘却西戎至千餘里今也天下為一獨以關中之地西備羌戎三方無敵國之憂而又内引百郡以為助惴惴焉自固之不暇以百倍之勢而無昔人分毫之功此不可不論也古之為兵者戍其地則用其地之民戰其野則食其野之粟守其國則乘其國之馬是以外被兵而内不知此所以百戰而不殆也今則不然戍邊用東北之人糴糧用郡之錢騎戰用西羌之馬是以一郡用兵而百郡騷然此又不可不論也昔者衛為狄所滅齊桓公以車三十乘封文公於楚丘及其末年至三百乘故其詩曰匪直也人秉心塞淵騋牝三千以為資之四夷則衛之所近者莫若狄當是時也狄與衛為仇讎其勢必不以馬與衛然則衛獨以何術而能致馬如此之多邪今欲使被兵之郡自用其民自食其粟自乘其馬而不得其術故願聞其詳問三代之祭禮其存者幾希矣其全固不可以一日而復然今天下郡縣通祀社稷孔子風伯雨師與凡山川古聖賢之廟此其禮尤急而不可闕者也武王伐商師渡盟津有宗廟有將舟將舟社主在焉則是社稷有主也古者師行載遷廟之主無遷廟則以幣玉為廟不可一日虚主也一日虚主猶不可若無主而為廟可乎是凡廟皆當有主也今郡縣所祭未嘗有主而皆有土木之像夫像安出哉古者祭莫不有尸詩有靈星之尸則祭無所不用尸也祭而不用尸者是始死之奠也不然則是祭殤也今也舉不用尸則如勿祭而已矣儒者治禮至其變尤謹嚴而詳今之變主為像與祭而無尸者果誰始也古者坐於席故籩豆之長短簠簋之髙下適與人均今土木之像既已巍然於上而列器皿於地使鬼神不享則不可知若其享之則是俯伏匍匐而就也鬼神不能諄諄與人接也故使尸嘏主人今也無尸而受胙於虚位不亦鄙野可笑矣夫今欲使廟皆有主祭皆有尸不知何道而可願從諸君講求其遺制合於古而便於今者問易之為書要以不可為必然可指之論也其始有畫而無文後世聖人始為之辭蓋亦微見其端而其或為仁或為義或小或大則付之後世學者之分然世益久逺則學者或入於邪説故凡孔子之所為賛易者特以防閑其邪説使之從横旁午要不失正而非以為必然可指之論也是故其用意廣而其辭約竊嘗深觀之孔子蓋有因爻辭而申言之若無所損益於其辭之義者甚衆比之初六有孚比之无咎有孚盈缶終來有它吉象曰比之初六有它吉也小畜之初九復自道何其咎吉象曰復自道其義吉也損之六四損其疾使遄有喜象曰損其疾亦可喜也大有之上九自天祐之吉無不利象曰大有上吉自天祐也夫既已言之矣而孔子又申言之使無所損益於其辭之義則孔子固多言也乃孔子則有不勝言者故願與諸君論之問古之為爵賞所以待有功也以為有功而後爵天下必有遺善是故無功而爵者六德六行以興賢人是也古之為刑罰所以待有罪也以為有罪而後罰則天下必有遺惡是故有無罪而罰者行偽而堅言偽而辨學非而博順非而澤以疑衆殺是也夫人之難知自堯舜病之惟幸其有功故有以為賞之之名惟因其有罪故有以為罰之之狀而天下不爭今使無功之人名之以某德而爵之無罪之人狀之以某惡而誅之則天下不知其所從而上亦將眊亂而䘮其所守然則古之人將何以處此歟方今法令眀具政若畫一然猶有冒昧以僥倖巧詆以出入者又况無功而賞無罪而罰歟古之人必將有以處此也問聖人之言各有方也苟為不達執其一方而輒以為常則天下之惑者不可以勝原矣昔者孔子以為䘮欲速貧死欲速朽而有子以為非君子之言乃孔子則有所由發也善乎有子之知孔子也語曰禘自既灌而往者吾不欲觀之易曰觀盥而不薦語曰吾豈匏𤓰也哉安能繫而不食易曰以杞匏𤓰有隕自天是二者其言則同而其所以言者可得為同歟王弼之於易可以為深矣然因其言之適同遂以為訓使學者不得不惑亦不可不辨問古之作者苟非聖人皆有所偏狥其偏則已流廢其長則已苛二者皆非所謂善學也君子以其身之正知人之不正以人之不正知其身之有所未正也既以正人又反以正已此所以寡過而成名也昔者韓子論荀揚之疵而韓子之疵有甚於荀揚荀卿譏六子之蔽而荀卿之蔽不下於六子班固之論子長也以為是非謬於聖人而范曄之論班固也以為目見毫毛而不見睫自今而觀之不知范氏之書其果逃於目睫之論也歟其未也而莫或正之故願聞數子之得失非務以相髙而求勝蓋亦樂夫儒者之以道相正也永興軍秋試舉人䇿問問昔漢受天下於秦因秦之制而不害為漢唐受天下於隋因隋之制而不害為唐漢之與秦唐之與隋其治亂安危至相逺也然而卒無所改易又况於積安久治其道固不事變也世之君子以為善人為邦百年可以勝殘去殺病其説之不效急於有功而歸咎於法制是以頻年遣使冠盖相望於道以求民之所患苦罷去茶禁歸之於民不以刑獄委任武吏至於考功取士皆有所損益行之數年卒未見其成而紛紜之議爭以為不便嗟乎此特其小者耳事之可變將復有大於此者今欲盡易天下之驕卒以為府兵盡驅天下之異教以為齊民盡覈天下之惰吏以為考課盡率天下之游士以為農桑其為拂世厲俗非特如今之所行也行其小者且不能辦則其大者又安敢議然則是終不可變歟將變之不得其術歟將已得其術而紛紜之議不足䘏歟無乃其道可變而不在其迹歟所謂勝殘去殺者其卒無效歟願條其説國學秋試䇿問二首問所貴乎學士大夫者以其通古今而考成敗也昔之人嘗有以是成者我必襲之嘗有以是敗者我必反之如是其可乎昔之為人君者患不能勤然而或勤以治亦或以亂文王之日昃漢宣之厲精始皇之程書隋文之傳餐其為勤一也昔之為人君者患不能斷然而或斷以興亦或以衰晉武之平吳憲宗之征蔡苻堅之南伐宋文之北侵其為斷一也昔之為人君者患不信其臣然而或信以安亦或以危秦穆之於孟明漢昭之於霍光燕噲之於子之徳宗之於盧杞其為信一也此三者皆人君之所難有志之士所嘗咨嗟慕望曠世而不獲者也然考此數君者治亂興衰安危之效相反如此豈可不求其故歟夫貪慕其成功而為之與懲其敗而不為此二者皆過也學者將何取焉按其已然之迹而詆之也易推其未然之理而辨之也難是以未及見其成功則文王之勤無以異於始皇而方其未敗也苻堅之斷與晉武何辨請舉此數君者得失之源所以相反之故將詳觀焉問古者以民之多寡為國之貧富故管仲以隂謀傾魯梁之民而商鞅亦招三晉之人以并諸侯當周之盛時其民物之數登於王府者盖拜而受之自漢以來丁口之蕃息與倉廪府庫之盛莫如隋其貢賦輸籍之法必有可觀者然學者以其得天下不以道乂不過再世而亡是以鄙之而無傳焉孔子曰不以人廢言而况可以廢一代之良法乎文帝之初有戸三百六十餘萬平陳所得又五十萬至大業之始不及二十年而増至八百九十餘萬者何也方是時布帛之積至於無所容資儲之在天下者至不可勝數及其敗亡塗地而洛口諸倉猶足以致百萬之衆其法豈可少哉國家承平百年戸口之衆有過於隋然以今之法觀之特便於徭役而巳國之貧富何與焉非徒無益於富又且以多為患生之者寡食之者衆是以公私枵然而百弊並生夫立法創制將以逺迹三代而曽隋氏之不及此豈可不論其故哉試館職䇿題三首問傳曰秦失之强周失之弱昔周公治魯親親而尊尊至其後世有寖㣲之憂太公治齊舉賢而上功歴代之所共也而齊魯行之皆不免於衰亂其故何哉國家承平百年六聖相授為治不同同歸於仁今朝廷欲師仁祖之忠厚而患百官有司不舉其職或至於媮欲法神考之勵精而恐監司守令不識其意流入於刻夫使忠厚而不媮勵精而不刻亦必有道矣昔漢文寛仁長者至於朝廷之間恥言人過而不聞其有怠廢不舉之病宣帝綜核名實至於文理之士咸精其能而不聞其有督責過甚之失何修何營可以及此願深明所以然之故而條具所當行之事悉著于篇以備採擇問古之君子見禮而知俗聞樂而知政於以論興亡之先後考古以證今蓋學士大夫之職而人主與羣臣之所欲聞也請借漢而論之西漢十二世而有道之君六雖成哀失德禍不及民宜其立國之勢强固不拔而王莽以斗筲穿窬之才談笑而取之東漢自安順以降日趨於衰亂而桓靈之虐甚於三季其勢宜易動而董吕二袁皆以絶人之姿欲取而不敢曹操功蓋天下其才百倍王莽盡其智力終身莫能得夫治亂相絶而安危之效相反如此願考其政察其俗悉陳其所以然者問國家及閒暇無事時闢三館以儲士既命丞弼之臣各舉其所知又詔有司發策而訪焉非獨以觀子大夫之能抑欲聞天下之要務決當今之滯論也官冗之弊久矣而近歳尤甚文武之吏待次於都下者幾數千人坐視而不救歟則下有食貧失職之歎裁損入流減削任子以救之歟則上有傷恩失士之憂河朔之民不安其居久矣一遇水旱則扶老携幼轉徙而南下令而禁之歟則民違死而趨生令必不行聽其南而不禁歟則河朔漸空而流民聚於南方有足憂者河自近歳屢決而西聽其西而不塞歟則汎濫千里農民失業塞而歸之故道歟則水未必聽或至於齧壊都邑此三者皆安危之所係利害相持而未決者也子大夫講之熟矣願聞其説省試策問三首問孟子曰君仁莫不仁君義莫不義君正莫不正一正君而國定君子之至於斯也亦可謂用力省而成功博矣陛下嗣位于今四年未言而民信之無為而天助之雖羣臣有司不足以識知盛德之所在然竊意其萬一殆專以仁孝禮義好生納諫治天下也子大夫生於此時而又以德行道藝賔興于庭將必有意於孟子之言正君而國定願聞所謂一言而興邦脩身而天下服者夫堯舜尚矣學者無所復議自漢以來道德純備未有如文帝者也今考其行事而可疑者三上林令吏之不才而虎圈嗇夫才之過人者也才者見而不録不才者置而不問則事之不廢壊者有幾然則兵偃刑措何從而致之南越不臣寵以使者吳王不朝賜以几杖此與唐之陵夷藩鎮自立以邀旄鉞者何異不幾於姑息苟簡之政歟傳曰三王臣主俱賢五霸不及其臣文帝不見賈生自以為過之既見不如也文帝豈霸者歟帝自以為不如而魏文帝乃以為過之此又何也抑過之為賢歟將自謂不如為賢歟漢文之所以為文殆以是三者而可疑如此故願與子大夫論之以待上問而發焉問易曰神而明之存乎其人詩曰無競惟人四方其訓之文武之功未有不以得人而成者也仲尼旅人也而門人可使南面重耳亡公子也而從者足以相國漢之得人盛於武宣皆拔之芻牧之中而表之公卿之上世主不以為疑士大夫不以為嫌者風俗厚而論議正也宋蔡廓為吏部尚書黄散以下皆得自用而廓以為薄已今自宰相不得專選舉一命以上皆付之定法此何道也昔常衮當國雖盡公守法而賢愚同滯天下譏之及崔貽孫相不及一年除吏八百多其親舊號稱得人故建中之政幾同貞觀夫使宰相守法如常衮則不免於賢愚同滯之譏用人如貽孫則必有威福下移之謗欲望得人於微陋之中而成功於繩墨之外豈不難哉子大夫學優而求用者也當何施於今而免於斯二者願極言之問歴觀前世天下初定民始休息下既厭亂而思靜上亦虚心而無作是以公私富溢刑罰清省及其久安無變則夸者喜名智者貪功生事以為樂無病而自灸則天下騷然財屈力殫而民始病矣自漢以來鮮不由此漢初置郡不過六十而文景之化幾致刑措及唐中葉列三百州為千四百縣而政益荒是時宿兵八十餘萬民去為商賈度為佛老雜入科役率常十五天下常以勞苦之人三奉坐待衣食之人七流弊之極至元和中乃命段平仲韋貫之許孟容李絳一切蠲減凡省冗官八百員吏千四百員民以少紓而上下相安無刻核之怨今朝廷無事百有餘年雖六聖相授求治如不及而吏惰民勞蓋不勝弊今者驕兵冗官之費宗室貴戚之奉邊鄙將吏之給蓋十倍於往日矣安視而不䘏歟則有民窮無告之憂以義而裁之歟則有拂逆人情之患夫元和之世彼四子者何獨能之子大夫雖未仕其詳有所不知而救此之道當講其要願悉著於篇省試宗室策問問昔周之盛時其卿士皆周召毛原非王之伯叔父則其子弟也至兩漢問若歆向世不乏人而唐之宗室最近而易考武略如道宗孝恭文章如白與賀者不可以一二數而以宰相進者有九人焉嗚呼何其盛也建隆以來不以吏事責宗子雖有文武異才終身不試先帝獨見逺覧恩義並用増修教養之法肇開選舉之路蓋十有餘年矣罷朝請而走郡縣釋膏粱而治簿書者固不為少然名字暴著可以追配古人者蓋未之見焉意者謙畏慎黙而不自獻歟將教養選舉之法有所缺而未明歟其悉著于篇以俟採擇策問三首昔人有言鄒魯守經學齊楚多辨智韓魏時有竒節自漢以來豪傑之士多出山東山西國家承平有年文武並用所以輔成人才者可謂至矣而五路學者尚未逮古豈山川氣俗有今昔之殊將教養課試之法未得其要各以所習之經聞于師者著于篇古者有勸農之官力田之科與孝弟同而自漢以來率用戸口登耗黜陟守宰今民去南畝而游市井者官不禁載耒耜而適四方者關不譏也戸口盈縮無復賞罰此豈治世所當然耶今欲依古義為農桑之政計户口而為考課之法而議者或以為毋益有擾有司惑焉當何施而可古者禮刑相為表裏禮之所去刑之所取詩曰淑問如臯陶在泮獻囚而漢之盛時儒者皆以春秋㫁獄今世因人以立事因事以立法事無窮而法日新則唐之律令有失於本矣而况禮與春秋儒者之論乎夫欲追世俗而忘返則教化日微泥經術而為㫁則人情不安願聞所以折衷於斯二者私試策問問任人而不任法則法簡而人重任法而不任人則法繁而人輕法簡而人重其弊也請謁公行而威勢下移法繁而人輕其弊也人得苟免而賢不肖均此古今之通患也夫欲人法並用輕重相持當安所折衷使近古而宜今有益而無損乎今舉於禮部者皆用糊名易書之法選於吏部者皆用長守不易之格六卿之長不得一用其意而胥吏姦人皆出没其間此豈治世之法哉如使有司皆若唐以前得自以其意進退天下士大夫官吏恣擅流言紛紜之害將何以止之夫古之人何修而免於此夫豈無術不講故也願聞其詳擬殿試策問皇帝若曰嗚呼維天佑民實相乃后錫以多士咸造在廷顧朕不德何以致此永惟子大夫釋畎畝之安輕千里之逺而從朕遊者夫豈為利禄哉聞之於師而欲獻之於君修之於家而欲刑之於國者子大夫之本意也朕願聞之朕即位改元于今三年縱未及孔子之有成猶當庶幾於子路之言有勇且知方者而風俗未厚刑政未清隂陽未和厥咎安在朕虚心忘已以來衆言而朝廷闕失之政斯民利害之實有所未聞含垢藏疾以待四夷而邊庭未叙兵不得觧施舍己責捐利與民而農民未安商旅不行此三者朕之所疑日夜以思而未獲者也其悉言之無有所隱朕將親覽焉東坡全集巻四十九
