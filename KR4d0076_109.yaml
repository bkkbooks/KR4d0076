body:
  text: 東坡全集巻一百九宋蘓軾撰内制赦文三首明堂赦文元祐元年九月六日門下聖人之徳無以加孝帝王之典莫大承天朕以𦕈𦕈之身㷀㷀在疚永惟置器之重惕若臨淵之深承明繼成思有以迪先王之烈紹志述事未足以慰天下之心仰繫母慈總攬政體緝熈百度和樂四方頼帝貺臨海㝢寧乂三垂之兵靡警萬邦之年屢豐庶幾大同光嗣成美深惟六聖之制必躬三嵗之祠維兹肇禋屬予訪落喪有以權而從變祭無以卑而廢尊顧言總章古重宗祀以教諸侯之孝以得萬國之心我享維天下武式文王之典大孝嚴父孔子謂周公其人追維前猷嘗講兹禮包舉儒術咨諏縉紳刺六經放逸之文斥衆言淆亂之蔽嘉與四海靈承一天革顯慶之兼尊隆永徽之專配成於獨斷畀予沖人遵遺教於前著成法於後涓選吉日裒輯上儀奉罍琳宫奠玉路寢神之弔矣燕及皇天誰其配之既右烈考於時夙齋輅之駕被衮冕之章備庶物之㣲追三牲之養靈㳺而風馬下孝奏而日月光惕然履霜詎勝悽愴之意僾然出戸如聞歎息之聲秩祜賚我思成侍臣助予惻楚既迄成於熈事敢專饗於閎休宜布洪恩以暨諸夏云云於戯漢庭祀帝著於即阼之踰年唐室施仁固以御門之吉日葢禮盛者文縟澤大者流長尚頼文武之英屏翰之雋恊恭致治以輔邦家西京奉安神宗皇帝御容禮畢西京徳音赦文元祐二年十月十四日門下朕以寡昧仰繼聖神顧瞻山林未忘弓劍之慕益廣宗廟以奉衣冠之㳺祗遣輔臣往嚴像設敞鳳臺之仙宇粲龜洛之仁祠睟表一臨陪京増重山川改色方貢祥而効珎父老縱觀或太息而流涕宜施雷雨之澤以答神人之心云云於戯好生育物既推文母之慈崇徳措刑終成神考之志資爾有衆宜體朕懐徳音赦文元祐三年六月門下朕以眇躬獲御大器仰聖后之慈訓荷先烈之永圖四載于兹渉道尚淺凛然祗惕若履淵氷思所以慰安人心奉若天道常慮一夫之失所以傷萬物之太和蠲苛去煩夙夜願治迺自去冬連月降雪異常今春已來乆隂不霽農民失職商賈不通比屋之間凍餒彌甚常寒之罰咎在朕躬惟日兢兢以圖消復潔精致禱神眷未孚克已自持協氣無應切慮四方獄犴寃滯尚多工役煩興人咨胥怨鬱成繆盭之變以干隂陽之和宜均渙恩以召善氣云云於戯遇災祗戒聿修信順之誠正事布和庶獲天人之助咨爾中外咸體朕懐内制詔敕九十七首集官詳議親祠北郊詔敕門下國家郊廟時祀祖宗以來命官攝事惟三嵗一親郊則先饗清廟冬至合祭天地于圓丘元豐間有司援周制以合祭不應古義先帝乃詔定親祠北郊之禮未及施行是嵗郊不設皇地袛位而宗廟之饗率如舊制朕以寡昧嗣承六聖休徳鴻緒今兹禋禮奠幣上帝祼鬯廟室而地祗天神乆未親祀矧朕方修郊見天地之始其冬至日南郊宜依熈寧十年故事設皇地祗位以答並貺之報仍令有司擇日遣官奏告施行厥後躬行方澤之祀則修元豐六年五月之制俟郊祀畢依前降指揮集官詳議親祠北郊事及郊祀之嵗廟饗典禮聞奏故兹詔示想宜知悉太皇太后賜門下手詔元祐三年七月八日敕門下皇帝嗣位于兹四年華夷來同天地並應而皇太妃以恭儉之徳鞠育之恩雖典冊以時奉行而情文疑有未稱皇帝以祖考之奉尊無二上而吾惟春秋之義母以子貴其推天下之養以慰人子之心宜下禮部太常寺討尋如於典故有褒崇未盡事件令子細開具聞奏太皇太后賜門下手詔元祐三年閠十二月十四日敕門下官冗之患所從來尚矣流弊之極實萃于今以闕計員至相倍蓰上有乆間失職之吏則下有受害無告之民故命大臣考求其本茍非裁損入流之數無以澄清取士之源吾今自以𦕈身率先天下永惟臨御之始嘗敕有司䕃補私親舊無定限自惟薄徳敢配前人已詔家庭之恩止從母后之比今當又損以示必行夫以先帝顧託之深天下責望之重茍有利於社稷吾無愛於髮膚矧此恩私實同毫末忠義之士當識此誠各忘内顧之心共成節約之制今後每遇聖節大禮生辰合得親屬恩澤並四分減一皇太后皇太妃准此趙州賜大遼賀興龍節大使茶藥詔元祐元年十月六日敕卿肅將慶幣逺渉川途風埃浩然徒馭勤止宜加寵錫以示眷懐趙州賜大遼賀興龍節副使茶藥詔元祐元年十月六日敕卿將命夙興犯寒逺渉駕言未息軫念殊深特致恩頒以嘉勤瘁賜皇叔祖建雄軍節度觀察留後同知太宗正事宗景上表辭恩命不允詔元祐元年十月九日敕宗景朕初執珪幣祗見上帝嘉與百辟徼福文考大賚四海始于親賢皆神之休義不當避國有常典爾無固辭賜皇叔祖宗景上表辭恩命不許詔元祐元年十月九日敕宗景覽所上表辭免恩命事具悉國家有大祭祀必均慶賞邦甸侯衛煇炮翟閽無有逺邇畢䝉恵澤矧我懿親實維顯相祗率舊典毋煩固辭賜新除檢校太保依前河西軍節度使阿里庫加恩制告詔元祐元年十月十五日敕阿里庫朕涓選靈辰奉承宗祀肆均介福徧暨多方卿世撫侯封夙䖍朝命特加寵渥用奬忠嘉太皇太后賜故夏國主嗣子乾順詔元祐元年十一月十六日惟我列聖眷爾有邦非徒極其寵榮葢亦同其憂患念爾哀疚惻然顧懐臨遣行人往喻至意且致奠賻之禮以為存沒之光趙州賜大遼賀正旦副使茶藥詔元祐元年十月十九日敕卿抗旌出境夙駕在塗眷言䟦渉之勞宜適興居之節式頒良劑以輔至和趙州賜大使茶藥詔元祐元年十月十九日敕卿逺飭使軺講修隣好䝉犯風霧䟦履山川宜頒錫於珍芳庶輔安於寢食趙州賜大遼國賀太皇太后正旦太使茶藥詔元祐元年十月十九日敕卿恭講隣歡逺勤軺馭言念驅馳之乆適丁寒沍之辰宜錫珍良式昭眷寵趙州賜副使茶藥詔元祐元年十月十九日敕卿逺持使節來慶春朝方此沍寒良勤啓處宜示眷懐之異式頒劑和之良賜鎮江軍節度使檢校太傅開府儀同三司上柱國康國公判大名府韓絳上表乞致仕不許詔元祐元年十月二十日敕韓絳覽所上表陳乞致仕事具悉卿四世元老國之長城端笏垂紳不動聲氣風采所及自然折衝軒冕丘園其實何異矧今艱難之際自有氷淵之虞黄髪在廷未敢言病豈宜獨善遽欲即安尚分北顧之憂勿起退歸之念强食自輔體我至懐賜韓絳上表乞致仕不允詔元祐元年十月二十日敕韓絳省所上表陳乞致仕事具悉功成身退人臣之常夀考康强有不得謝卿出入將相垂三十年豈一小郡尚勤元老徒得君重卧䕶一方使吏民瞻師尹之儀刑蠻夷識漢相之風采丘園之請朕未欲聞其省思慮時寢食親近藥餌以副中外之望賜金紫光禄大夫守尚書右僕射兼中書侍郎吕公著生日詔元祐元年十月二十七日敕公著卿將相三世輔翼兩朝方斯干獻夢之辰有既醉太平之福宜膺慶賚永錫夀康賜新除依前中大夫守中書侍郎吕大防辭恩命不允詔元祐元年十一月四日敕大防卿敦大直方任重道逺擢貳西省蔽自朕心雖與聞政事為日未乆而厯試中外勤勞百為葢有年矣徳位惟允人無間言亟服新命毋煩朕訓賜新除御史大夫傅堯俞辭免恩命不允詔元祐元年十一月六日敕堯俞詩云剛亦不吐柔亦不茹朕以卿有樊仲之風是以擢卿為中執法才華之歎古今共之豈以小嫌而廢大任與其拘文以自疑不若直已而行義亟服乃事無煩固辭賜正議大夫同知樞宻院事安燾乞退不允詔元祐元年十一月十三日敕安燾卿才當其位義不辭勞内之樞機之謀外之疆埸之議既當身任其責難以家事為詞而況並奉君親兩全忠孝進無不得退以何名卿之所求固非矯激朕之不許亦豈空文亟還厥官無煩朕命賜韓絳上第二表乞致仕不允詔元祐元年十一月十四日敕韓絳朕以𦕈躬求助諸老皆以艱難之際不辭中外之勞胡為累章確守歸意豈朕不善西伯之養而無人子思之側乎三復喟然未喻厥指朕意不易卿其少安賜韓絳上第三表乞致仕不許斷來章詔元祐元年十一月十四日敕韓絳君臣之義憂樂同之茍皆懐歸誰任其事卿之髙識雅度輕軒冕而樂丘園天下所共知也獨不念先帝託付之重乎勉狥大義勿復以言賜韓絳上第三表乞致仕不允斷來章詔敕韓絳功成身退人臣之常禮至於非常之遇則必有無窮之報朕待卿於形器之表而卿自處於繩墨之内未為得也朕意不易卿無復辭賜新除依前光禄大夫刑部尚書蘇頌辭恩命不允詔元祐元年十月十七日敕蘇頌卿篤於仁心深於經術用心司㓂期於無刑朕惟孝處之深三年不奪其志又推才難之故千里以待其來卿而不能誰當能者亟服乃事毋煩力辭賜新除落致仕依前光禄大夫范鎮赴闕詔元祐元年十月二十日敕范鎮夫有徳君子以精神折衝譬之麟鳳能服猛鷙朕虛懐前席以致諸老非敢必以事諉也茍得黄髪之叟皤然在位則朝廷尊嚴奸冗消伏卿雖篤老乃心王室毋憚數舍之勞以赴中外之望皇帝賜故夏國主嗣子乾順進奉賀正馬駞回詔元􅀈元年十二月二十四日詔故夏國主嗣子乾順逺奉王正來歸時事惟此充庭之實率皆任士之宜乃眷忠勤良深嘉歎太皇太后賜故夏國主嗣子乾順進奉賀正馬駞回詔元祐元年十二月二十四日詔故夏國主嗣子乾順述職春朝歸誠宰旅修此效牽之視致其乘服之良再閲來章式嘉忠節賜觀文殿大學士知潁昌府韓縝上表辭免恩命不允詔元祐元年十二月二十五日敕韓縝朕躬祀總章始行嚴配推廣帝親之澤覃及中外之臣惟我老成逮受顧命均此介福非不敢私國之故常毋煩謙避賜鎮江軍節度使判大名府韓絳上第二表乞致仕不許詔元祐元年十二月二十九日敕韓絳為國無强於得人用人莫先於求舊雖已挂冠而謝事尚俾安車而造朝豈有體力未衰蕃宣所寄亟圖自便遂欲言歸矧卿徳望並隆神人所相焉有滿盈之懼夫何倚伏之虞尚體至懐少安厥位賜觀文殿學士正議大夫知河南府孫固乞致仕不許詔元祐二年正月一日敕孫固視國如家忠臣可以忘老視民如子君子可以忘勞卿被遇三朝出入二府徳望並隆中外所服故起之詞館付以留籥使士有矜式民有依怙屬任之意豈輕也哉釋位謀安引年求避此踈逺小臣之事非所望於卿也尚體至意勿亟懐歸賜觀文殿學士正議大夫知河南府孫固乞致仕不允詔元祐二年正月一日敕孫固卿英祖所擢以遺神考乃養舊學用之西樞宻院位二年未見君子毎惟圖任舊人之意當有越在外服之歎矧欲辭位而去遂安丘園哉三川重鎮務舉大體簿書期㑹則有司存優㳺卒嵗可以忘老賜觀文殿學士正議大夫知河南府孫固再乞致仕不允詔元祐二年正月二十五日敕孫固廊廟之舊厯事三朝名徳並隆如卿者有幾無故釋位其謂朝廷何卿既自為謀亦為乃后謀之勉遵前詔以慰中外之望賜觀文殿學士正議大夫知河南府孫固再乞致仕不允詔元祐二年正月二十五日敕孫固朕永懐三宗追用其人所以尊禮慰藉其意者自以為無失矣而卿浩然懐歸若不可復留何哉勉狥大義毋違朕志賜新除樞宻直學士知定州韓忠彦乞改一偏州不允詔元祐二年二月敕忠彦朕嘗覽閲古之圖觀宗臣之文俯仰今昔有槩於心㑹中山闕守差擇循良卿庶幾焉勉副朕意何以辭為賜樞宻直學士守兵部尚書王存乞知陳州不允詔敕王存卿出入四朝更渉夷嶮金石之節終始惟一六卿之長所以倡九牧而厚風俗也豈以職事煩簡為輕重哉君子出處朝廷之大事而風雨寒暑膚理之微疾也姑安厥位以稱朕意賜尚書左丞李清臣生日詔元祐三年二月二十四日敕清臣春之方中月復幾望篤生王國之彦蔚為廊廟之華神既聽於靖恭民亦宜於愷悌膺我慶賜永綏夀祺賜朝散大夫試御史中丞傅堯俞乞外郡不允詔元祐二年三月十三日敕堯俞負中外之望居得言之地朕方虛已樂聞嘉猷乃者水旱連嵗民流未止賊盗將熾財力靡敝卿既欲圖實效以酬恩朕亦將考所言以責實偃息藩郡豈所望哉賜鎮江軍節度使充集禧觀使韓絳茶藥詔元祐二年三月敕韓絳春夏之交寒燠相沴起居之節調適為難眷予元臣乆勞于外宜加存問且錫珍良勉蹈至和以符眷倚賜保寧軍節度使馮京告敕茶藥詔元祐二年三月二十一日敕馮京卿以篤老乆勤外服留籥之重擁髦而東䝉犯氛埃徒御良苦宜省思慮近藥物勉遵時令以副眷懐賜鎮江軍節度使充集禧觀使韓絳赴闕詔元祐二年三月二十七日敕韓絳卿擢自祖宗輔翼先帝徳望之重天下聳聞與其置之一方勞以民事不若歸安闕下式瞻儀刑請老閒居固非所望嘉猷入告夫豈不能遲卿言還及此初夏賜鎮江軍節度使充集禧觀使韓絳赴闕詔元祐二月三月二十七日敕韓絳為天下計則賢者常勞為人臣謀則老者當逸今朝廷待卿之意酌處其中奉朝請於琳官所以系民望釋負荷於留籥所以慰雅懐勉及清和亟還朝著賜尚書刑部侍郎范百禄乞外任不允詔元祐二年三月二十九日敕百禄成王命君陳商民在辟予曰辟爾惟勿辟予曰宥爾惟勿宥惟厥中古之有司與天子相可否葢如此而況公卿之間議有異同而不盡其説哉例在中書與在有司固宜審處歸于至當而卿遽欲以此去位非古之道也其益修厥官以稱朕意賜龍圖閣直學士新差知秦州吕公孺乞改授宫觀小郡差遣不允詔元祐二年四月三日敕公孺朕顧懐西方思得賢守使邉有備而民無擾以卿耆老練達徳宇淵静秦又舊治吏士服習卧䕶諸將無以易卿賜彰化軍節度使開府儀同三司判大宗正事宗晟上表乞還職事不允詔元祐二年四月十五日敕宗晟書云孝乎惟孝友于兄弟施於有政是亦為政卿以膝下之養為宗人之法古之為政孰大於此而欲以親辭職耶其益修厥官以稱吾意賜彰化軍節度使開府儀同大司判大宗正事宗晟上表乞還職事不允詔元祐二年四月十五日敕宗晟古者庻子之官設而邦國有倫所治雖簡而所寄甚重卿為宗室祭酒徳度之美刑于中外朕方慶𤓰瓞之茂而欲觀麟趾之應益勵厥職無棄爾成賜故夏國主嗣子乾順進奉謝恩馬駞回詔詔故夏國主嗣子乾順臨弔之重以寵世臣思報之深復承來价載閲充庭之實備形述職之心乃眷忠勤不忘嘉歎賜故夏國主嗣子乾順進奉謝恩馬駞回詔元祐二年四月十七日詔故夏國主嗣子乾順向遣行人往賻襄事繼陳方物來奉謝章惟忠可以附民惟禮可以定國勉終誠節以副眷懐賜新除尚書左丞劉摯辭免恩命不允詔敕劉摯朕昔聞卿言今任以政已試之效見于事功廊廟闕人以次遷用宜其右不宜其左能於昔不能於今豈有是哉賜新除中大夫守尚書右丞王存辭免恩命不允詔元祐二年五月二十六日敕王存朕厯選百辟試之以事惇厚而文剛毅而和更渉變故守徳不移無逾卿者夫享天下之利者任天下之患居天下之樂者同天下之憂朕非以是富貴卿也其何以辭賜集禧觀使鎮江軍節度使開府儀同三司韓絳乞致仕不允詔元祐二年六月四日敇韓絳向以宏才卧䕶北道凡斯民之利病葢一方之安危朕方虛懐以待元老冀疾病之有間得雍容而造朝時聞嘉言以輔不逮告老之請殊非朕心賜韓絳乞致仕不允詔元祐二年六月四日敕韓絳元老在位邦之榮華徒以精神折衝非以筋力為禮㳺神道館擁節家庭於卿圖告老之安而國有貪賢之美勉自輔養期於少留賜新除試吏部侍郎范百禄辭免恩命不允詔元祐二年六月十二日敕百禄夫以天官之貳治夏卿之選簿書繁重條格紛委茍非其人則士之失職而無告者多矣朕難其材不以輕授卿有應務之敏而行之以勤有守官之亮而濟以通往行其志何以辭為賜新除吏部侍郎傅堯俞辭免恩命乞知陳州不允詔元祐二年六月十三日敕堯俞連蹇三黜栖遲十年士無賢愚為國太息知珠玉之在泥土麟鳳之在網羅朕所以㧞卿於乆廢之中用卿於期年之内天下拭目欲觀所為而乃引㣲疾以自言指便郡而求去豈獨於卿有報國未遂之歎亦將使朕獲用賢不終之譏勉復舊曹以全大節賜同知樞宻院事范純仁生日詔元祐二年六月十八日敕純仁卿天資文武世濟勲勞載嘉誕日之臨豈獨私門之喜宜膺慶賜以介夀期賜新除知樞宻院安燾辭免恩命不允詔元祐二年六月二十四日敕安燾人才之難從古所歎圖任以舊為國之常卿以瓌異之資荷艱難之寄懃勞靡懈望實愈隆雖云超陞不改疇昔徒以任之既乆則責之宜専知無不為乃所望於卿者卑以自牧亦何補於國哉賜朝議大夫試戸部尚書李常乞除㳂邉一州不允詔元祐二年八月二十二日敕李常在泮獻馘亦儒者之常挺劒疾鬬葢孔門之事雖然義有輕重禮有後先與其自請捍邉已癬疥之疾曷若盡瘁事國幹心膂之憂茍推是心何往非報雖願受長纓而往者卿之本心然自以尺箠而鞭之吾有餘力尚體此意姑安厥官賜太師平章軍國重事文彦博宰相吕公著自今後入朝凡有拜禮宜並特與免拜詔元祐二年八月二十五日敕彦博朕聞几杖以優賢著之典禮耋老無下拜書於春秋魏太傅鍾繇以足疾乘車就坐自爾三公有疾以為故事而唐司徒馬燧亦以老病自力對於延英詔使毋拜今吾耆老大臣四朝之舊徳隆而望重任大而憂深者惟卿與公著而已吕公著詔即改云惟彦博與卿而已方資其蓍龜之告豈責以筋力之禮今後入朝凡有拜禮宜並特免卿其專有為之報畧無益之儀毋或固辭以稱朕意賜新除兼侍讀依前光禄大夫吏部尚書蘇頌辭免恩命不允詔元祐二年八月二十七日敕蘇頌朕惟左右正人之求甚難其選以為直諒多聞之益宜莫如卿方虛懐於至言豈曲從於遜避亟服乃事毋煩固辭賜守司空開府儀同三司致仕韓絳乞受冊禮畢隨班稱賀免赴詔元祐二年八月二十七日敕韓絳卿脱屣軒冕頥神丘園不為絶俗之髙愈篤愛君之意喜聞冊號請覲内廷在臣子之誠心卿為盡節顧筋骸之末禮吾所未安賜宰相吕公著乞罷免相位不允詔元祐二年八月二十八日敕公著宰相之責綏靖四方羌人既俘士氣益振長轡逺馭方資老謀卿不强起孰卒吾事近以二老之故削亟拜之禮而彦博執謙不回朕既從其請矣卿起就位復何疑哉賜前兩府并侍制已上知州初冬衣襖詔元祐二年九月七日敕元發嵗將墐戸工告始裘宜頒在笥之珍以示維藩之寵服之安燠體我眷懐賜太師文彦博乞致仕不允詔元祐二年九月十日敕彦博卿求退之意著於士民執謙之心信於天地勉當委重之託初無懐禄之嫌大義茍安細故可畧朕命不再卿其少安賜太師文彦博乞致仕不許詔敕彦博論道則忘年卿不可以年既髙而為請稱徳則鄙力卿不可以力不足而為詞斷之於中義有不易豈以屢請之故而為將成之功體君至懐以慰公議賜龍圖閣直學士尚書工部侍郎蔡延慶乞知應天府不允詔元祐二年九月十六日敕延慶入侍禁近出殿藩服已試之效藹然有聲今若予工宜有餘力夫㳺刃肯綮尚不辭難退食委蛇豈當告病膚理㣲疾行當自痊勉安厥官以稱朕意賜尚書左丞劉摯生日詔元祐二年九月二十二日敕劉摯律協應鍾辰集析木實生俊輔休有令名應裁寵章以介眉夀趙州賜大遼皇帝賀興龍節大使茶藥詔元祐二年九月二十七日敕卿隣歡載講使節甚華永言郵傳之勤適此風霜之候宜加寵賚以示眷存趙州賜大遼皇帝賀興龍節副使茶藥詔元祐二年九月二十七日敕卿載馳逺道良苦祈寒豈無藥物之嘉以輔寢興之節宜膺寵錫尚體至懐賜太師文彦博生日詔元祐二年九月二十九日敕彦博陽月載臨剛辰恊吉篤生元老弼亮四朝允為廊廟之華豈獨閨門之慶往膺寵數永錫夀祺賜資政殿學士大中大夫新知成都府王安禮乞知陳潁等一郡不允詔元祐二年十月一日敕安禮朕惟西蜀地狹而賦重人懦而吏肆徭役新定農民在官馭之無方將不勝弊惟朕左右信臣明而不苛寛而有斷必能肅遏慢吏扶養小弱卿雖㣲疾强為朕行時近藥石勉事道路稱朕意焉㳂路賜奉安神宗御容禮儀使吕大防銀合茶藥詔元祐二年十月七日敕大防於赫神考如日在天雖光明無所不臨而躔次必有所舍肆予命爾祗奉此行禮既告成勤亦良至感慕之外嘉歎不忘賜資政殿學士大中大夫新差知成都府王安禮銀合茶藥詔元祐二年十月八日敕安禮朕求治如不及用人惟恐失之矧余良臣擢自神考出入中外厥聲藹然朕豈欲其逺去哉特以全蜀之寄甚難其選知卿篤於忠義當不以逺近為意也勉事道路慎疾自愛往安吾民以稱朕意趙州賜大遼賀太皇太后正旦大使茶詔元祐二年十月十七日敕卿乆勤軺傳逺犯風埃眷言行邁之勞良極軫懐之意往頒珍劑以輔至和趙州賜大遼賀太皇太后正旦副使茶詔元祐二年十月十七日敕卿乆乘使傳來講鄰懽屬此沍寒尚懃行役往知問勞式示眷懐趙州賜大遼賀皇帝正旦大使茶藥詔元祐二年十月十七日敕卿逺慶春朝篤修隣好永惟使事之重遂忘行役之勞既極歎嘉宜申問勞趙州賜大遼賀皇帝正旦副使茶藥詔元祐二年十月十七日敕徂嵗向晩修途苦寒方趨造於㑹朝未即安於舍館往加恩錫増重使華賜宰相吕公著生日詔元祐二年十月十八日敕公著卿三世將相四朝耆老賚我良弼實惟兹辰茂膺維嶽之靈永錫如陵之夀宜頒寵數以示眷懐賜新除龍圖閣直學士李之純辭恩命不允詔元祐二年十二月四日敕之純祖宗之文章與典謨訓誥並寳於世典領其事非有徳君子雖積勞乆次不以輕授蜀逺而人懦窮困抑塞至無所訴朕專欲以徳安之故内閣之命非獨以寵卿抑將使蜀人知朕用卿葢以徳選也其深識此意勿復固辭賜太師文彦博乞致仕不許詔元祐二年十二月二十五日敕彦博卿自去嵗以來數苦小疾尚能勉留以輔不逮近者神明所相體力自康視聽不衰歩趨加健乃欲求去耶今御戎之策未有定議京東西河朔荐饑公私枵然方與二三臣圖之卿未可以即安也賜文彦博乞致仕不允詔元祐二年十二月二十五日敕彦博卿厯相三宗名聞四夷位極一品書考四十自載籍以來未之聞也固當以國為家以天下為身以安社稷為悦而不當以居丘園為樂也朕方待卿而為政請老之言所未欲聞賜外任臣寮進賀太皇太后受冊馬詔敕元祐二年十二月二十六日敕禮以正名國之舊典載閲充庭之實式將戴后之心朕眷忠勤良深嘉歎賜外任臣寮進奉賀皇太后皇太妃受冊馬詔敕元祐二年十二月二十六日敕典冊告成宫闈之慶事君盡禮因物見誠乃眷忠勤不忘嘉歎賜保寧軍節度使知大名府馮京進奉賀端午節馬詔元祐二年十二月二十六日敕馮京受鉞將壇剖符畿甸効充庭之駿足慶中火之良辰乃眷勤誠不忘嘉歎賜資政殿學士知鄧州韓維進奉謝恩馬詔元祐二年十二月二十六日敕韓維廟堂均逸逺不忘君駔駿在庭儀多於物載惟忠藎良極歎咨賜檢校司空左武衛上將軍郭逵進奉謝恩馬詔元祐二年十二月二十六日敕郭逵惟卿耆老漸就退閒不忘戴主之誠逺效充庭之駿載嘉忠藎良極歎咨賜中大夫守尚書右丞王存生日詔元祐三年正月四日敕王存卿以宏才與聞大政誕日之慶豈惟閨庭寵錫之隆庶延夀嘏賜試戸部侍郎趙瞻陳乞便郡不允詔元祐三年正月十三日敕趙瞻朕褒顯耆舊取其宿望養育俊乂待其成材庶前後相繼朝不乏人則堂陛自隆國有所恃方今在廷之士孰非華髪之良而卿以康强之年為逺引之計於義未可葢難曲從賜皇伯祖宗晟辭免起復恩命不許詔元祐三年二月十五日敕宗晟卿哀廹之至言不及文覽之惻然欲從所請而宗子之衆才性各殊位不期驕禄不期侈非卿允蹈忠信力行禮義以身先之葢未易齊也少屈爾私以成吾志不亦可乎賜皇伯祖宗晟辭免起復恩命不允詔元祐三年二月十五日敕宗晟卿以强起就位為未便安而朕以狥私忘公為未盡美書云孝乎惟孝友于兄弟施於有政是亦為政夫聖人以孝弟為從政而卿以從政為非孝非所聞也勉從朕命勿復固辭賜皇伯祖宗晟辭免起復恩命不許詔元祐三年二月十五日敕宗晟卿致孝罔極守禮不回以魯衛之親而行曽閔之事吾深欲成人之美遂卿之私顧以宗臣治親有國先務教以道藝時其冠昏奬察其賢能而訓讁其驕惰非吾宗室之老孰當父兄之任其深明吾意往服厥官賜皇伯祖宗晟辭免起復恩命不允詔元祐三年二月二十二日敕宗晟君子之於禮雖先王未之有可以義起而況漢唐之舊故事具存如翟方進房喬之流皆以儒術致身不免於釋哀而謀國近嵗夏竦晁宗慤亦以近臣奪喪君子不以為過今宗正之事止於治親譬猶父兄訓敕子弟豈以衰麻之故而廢閨門之政乎卿其勿疑亟服乃事賜保寧軍節度使知大名府馮京進奉興龍節并冬至正旦馬詔元祐三年二月二十五日敕馮京震夙之祥旅庭稱慶嵗時之㑹因物効誠乃眷元臣實勤典禮多儀克舉屢歎不忘賜外任臣寮進奉謝恩馬詔敕元祐三年二月二十六日敕衘恩思報因物致誠效兹乘服之良示有驅馳之志永言忠藎良極歎咨賜外任臣寮進奉興龍節功徳疏詔敕元祐三年二月二十六日敕誕彌之慶中外所同畢輸衛上之誠來獻後天之祝永言忠藎良極歎嘉賜新除守司空同平章軍國事吕公著辭免恩命不允詔元祐三年四月六日敕公著委重元老朕之本心歸安丘園卿之素志今於二者酌處其中使卿獲居勞逸之間而朕不失仰成之託於義兩得夫復何辭賜新除大中大夫守尚書左僕射兼門下侍郎吕大防辭免恩命不允詔元祐三年四月六日敕大防端揆黄門之任虛之乆矣以卿徳望兼重才術有餘故授之不疑渙號已行僉言惟允務稱朕命何以辭為賜新除大中大夫守尚書右僕射兼中書侍郎范純仁辭免恩命不允詔元祐三年四月六日敕純仁國之安危寄於宰輔朕豈茍然而輕授也哉試之以事而不移斷之於心而不貳成命已出豈容復回往修厥官以稱朕意賜觀文殿大學士光禄大夫知永興軍韓縝三上表乞致仕不許斷來章詔元祐三年四月七日敕韓縝夫任天下之責者無自營之私䝉國士之知者有非常之報矧卿徳望兼重體力猶强方資禦侮之壯猷焉用引年之常禮宜安厥位毋復言歸東坡全集巻一百九
