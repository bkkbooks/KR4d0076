body:
  text: 東坡全集巻三十八宋蘓軾撰記十九首衆妙堂記眉山道士張易簡教小學常百人予㓜時亦與焉居天慶觀北極院予蓋從之三年謫居海南一日夢至其處見張道士如平昔汛治庭宇若有所待者曰老先生且至其徒有誦老子者曰𤣥之又𤣥衆妙之門予曰妙一而已容有衆乎道士笑曰一已陋矣何妙之有若審妙也雖衆可也因指灑水薙艸者曰是各一妙也予復視之則二人者手若風雨而歩中規矩蓋煥然霧除霍然雲消予驚歎曰妙蓋至此乎庖丁之理解郢人之鼻斵信矣二人者釋技而上曰子未覩真妙庖郢非其人也是技與道相半習與空相㑹非無挾而徑造者也子亦見夫蜩與雞乎夫蜩登木而號不知止也夫雞俯首而啄不知仰也其固也如此然至蛻與伏也則無視無聴無飢無渇黙化於荒忽之中候伺於毫髪之間雖聖知不及也是豈技與習之助乎二人者出道士曰子少安須老先生至而問焉二人者顧曰老先生未必知也子徃見蜩與雞而問之可以養生可以長年廣州道士崇道大師何徳順學道而至於妙者也故榜其堂曰衆妙書來海南求文以記之因以夢中語爲記紹聖六年三月十五日蜀人蘇某書遺愛亭記代巢元脩何武所至無赫赫名去而人思之此之謂遺愛夫君子循理而動理窮而止應物而作物去而復夫何赫赫名之有哉東海徐君猷以朝散郎為黄州未嘗怒也而民不犯未嘗察也而吏不欺終日無事嘯詠而已毎歳之春與睂陽子瞻游於安國寺飲酒於竹間亭擷亭下之茶烹而食之公既去郡寺僧繼連請名子瞻名之曰遺愛時糓自蜀來客於子瞻因子瞻以見公公命糓記之糓愚樸羈旅人也何足以知公採道路之言質之於子瞻以爲之記南華長老題名記學者以成佛爲難乎累土畫沙童子戲也皆足以成佛以爲易乎受記得道如菩薩大弟子皆不任問疾是義安在方其迷亂顛倒流浪苦海之中一念正真萬法皆具及其勤苦功用爲山九仞之後毫釐差失千刼不復嗚呼道固如是也豈獨佛乎子思子曰夫婦之不肖可以能行焉及其至也雖聖人亦有所不能焉孟子則以爲聖人之道始於不爲穿窬而穿窬之惡成於言不言人未有欲爲穿窬者雖穿窬亦不欲也自其不欲爲之心而求之則穿窬足以爲聖人可以言而不言不可以言而言雖賢人君子有不能免也因其不能免之過而遂之則賢人君子有時而爲盗是二法者相反而相爲用儒與釋皆然南華長老明公其始蓋學於子思孟子者其後棄家爲浮屠氏不知者以爲逃儒歸佛不知其猶儒也南華自六祖大鑒示滅其傳法得眼者散而之四方故南華爲律寺至吾宋天僖三年始有詔以智度禪師普遂住持至今明公盖十一世矣明公告東坡居士曰宰官行世間法沙門行出世間法世間即出世間等無有二今宰官傳授皆有題名壁記而沙門獨無有矧吾道塲實補佛祖處其可不嚴其傳子爲我記之居士曰諾乃爲論儒釋不謀而同者以爲記建中靖國元年正月一日記瓊州惠通井記禹貢濟水入於河溢爲滎河南曰滎陽河北曰滎澤沱潜本梁州二水亦見於荆州水行地中出沒數千里外雖河海不能絶也唐相李文饒好飲惠山泉置驛以取水有僧言長安昊天觀井水與恵山泉通雜以他水十餘缶試之僧獨指其一曰此惠山泉也文饒爲罷水驛瓊州之東五十里曰三山菴菴下有泉味類恵山東坡居士過瓊菴僧惟徳以水餉焉而求爲之名名之曰惠通元符三年六月十七日記傳神記傳神之難在目顧虎頭云傳形寫影都在阿堵中其次在顴頰吾嘗於燈下顧自見頰影使人就壁模之不作眉目見者皆失笑知其爲吾也目與顴頰似餘無不似者眉與鼻口可以增減取似也傳神與相一道欲得其人之天法當於衆中隂察之今乃使人具衣冠坐注視一物彼方斂容自持豈復見其天乎凡人意思各有所在或在眉目或在鼻口虎頭云頰上加三毛覺精采殊勝則此人意思盖在須頰間也優孟學孫叔敖抵掌談笑至使人欲死者復生此豈舉體皆似亦得其意思所在而已使畫者悟此理則人人可以爲顧陸吾嘗見僧惟真畫曾魯公初不甚似一日徃見公歸而喜甚曰吾得之矣乃於眉後加三紋隠約可見作俛首仰視眉揚而頞蹙者遂大似南都程懐立衆稱其能於傳吾神大得其全懐立舉止如諸生蕭然有意於筆墨之外者也故以吾所聞助發云順濟王廟新獲石砮記建中靖國元年四月甲午某自儋耳北歸艤舟呉城山順濟龍王祠下既進謁而還逍遥江上得古箭鏃槊鋒而劒脊其廉可劌而其質則石也曰異哉此孔子所謂楛矢石砮肅慎氏之物也何爲而至此哉傳觀左右失手墜於江中乃禱於神願復得之當藏之廟中爲徃來者駭心動目詭異之觀既禱則使沒人求之一探而獲謹按禹貢荆州貢礪砥砮丹惟箘簵楛梁州貢璆鐵銀鏤砮磬則楛矢石砮自禹以來貢之矣然至春秋時隼集於陳廷楛矢貫之石砮長尺有咫時人莫能知而問於孔子孔子不近取之荆梁而逺取之肅慎則荆梁之不貢此久矣顔師古曰楛木堪爲笴今豳以北皆用之以此考之用楛爲矢至唐猶然而用石爲砮則自春秋以來莫識矣可不謂異物乎兌之戈和之弓垂之竹矢陳於路寢孔子履藏於武庫皆以古見寳此矢獨非寳乎順濟王之威靈南放于洞庭北被于淮泗乃特爲出此寳某不敢私有而留之廟中與好古博雅君子共之以昭示王之神聖英烈不可不敬者如此熈寜手詔記楊繪累奏罷諫職兼求外補及乞明加黜責盖繪未深究朕意繪疎迹逺人立朝寡識不畏强禦知無不爲始一見之便知其忠直可信故翌日即擢置言職知任亦甚篤矣今日降命盖謂難與曾公亮兩立於輕重之間故當且避之卿可喻朕此意令早承命或示朕此札亦不妨熈寜元年故翰林學士楊繪以知制誥知諫院上疏論故相曾公亮事先帝直其言然未欲遽行也故除公兼侍讀公力辭不已乃以手詔賜今龍圖閣學士滕公元發使以手詔賜公公卒不受命而詔遂藏于家是歳四月復除公知諫院以毋憂去官其後二十年公沒於杭州䘮過京師其子久中以手詔相示且請記之謹按先帝臨御之初公與滕公皆䝉國士之知凡所以開心見誠相期於度外者類皆如此未究其用為小人所誣故困於外十有餘年先帝謹於用法故未即起公然知之未少衰也使先帝尚在公豈流落而不用終身者哉悲夫應夢羅漢記元豐四年正月二十一日予將徃岐亭宿於團封夢一僧破面流血若有所訴明日至岐亭過一廟中有阿羅漢像左龍右虎儀制甚古而面爲人所壊顧之惘然庶幾疇昔所見乎遂載以歸完新而龕之設于安國寺四月八日先妣武陽君忌日飯僧于寺乃記之責授黄州團練使眉山蘇某記觀妙堂記不憂道人謂歡喜子曰來我所居室汝知之乎沉寂湛然無有喧爭嗒然其中死灰槁木以異而同我既名爲觀妙矣汝其爲我記之歡喜子曰是室云何而求我况乎妙事了無可觀既無可觀亦無可説欲求少分可以觀者如石女兒世終無有欲求多分可以説者如虛空花究竟非實不説不觀了逹無礙超出三界入智慧門雖然如是置之不可執偏强生分别以一味語斷之無疑譬用筌蹄以得魚兎及施燈燭以照丘坑獲魚兎矣筌蹄了忘知丘坑處燈燭何施今此居室孰爲妙與蕭然是非行住坐卧飲食語黙具足衆妙無不現前覽之不有都之不無倐知覺知要妙如此當持是言普示來者入此室時作如是觀法雲寺禮拜石記夫供養之具最爲佛事先其法不一他山之石平不容垢横展如席願為一座具之用晨夕禮佛以此皈依當敬禮無所觀時運心廣博無所不在天上人間以至地下悉觸智光聞我佛修道時芻尼巢頂霑佛氣分後皆受報則禮佛也其心實重有徳者至是禮也願一拜一起無過父母乘此願力不墮三塗佛力不可盡石不可盡願力不可盡三者既不可盡二親獲福生生世世亦不可盡今對佛宣白惟佛實臨之元祐八年七月中旬内殿崇班馬惟寛捨醉鄉記醉鄉去中國不知其幾千里也其土曠然無涯無丘陵阪險其氣和平一揆無晦明寒暑其俗大同無邑居聚落其人甚精無愛憎喜怒吸風飲露不食五糓其寢于于其行徐徐鳥獸魚鼈雜居不知有舟車器械之用昔者黄帝氏嘗獲遊其都歸而窅然䘮其天下以爲結繩之政已薄矣降及堯舜作爲千鍾百榼之獻因姑射神人以假道蓋至其邉鄙終身太平禹湯立法禮繁樂雜數十代與醉鄉隔其臣羲和棄甲子而逃冀臻其鄉失路而道夭故天下遂不寜至乎末孫桀紂怒而升其糟丘階級迂伊南嚮而望不見醉鄉武王氏得志于世乃命周公旦立酒人氏之職典司五齊拓土五千里僅與醉鄉逹焉三十年刑措不用下逮幽厲迄于秦漢中國喪亂遂與醉鄉絶而臣下之受道者徃徃而至焉阮嗣宗陶淵明等數十人並遊醉鄉没身不返死塟其壤中國以爲酒仙嗟乎醉鄉氏之俗豈古華胥氏之國乎何其淳寂也如是予將遊焉故爲之記睡鄉記睡鄉之境盖與齊州接而齊州之民無知者其政甚淳其俗甚均其土平夷廣大無東西南北其人安恬舒適無疾痛札癘昏然不生七情茫然不交萬事蕩然不知天地日月不絲不糓佚卧而自足不舟不車極意而逺遊冬而絺夏而纊不知其有寒暑得而悲失而喜不知其有利害以謂凡其所目見者皆妄也昔黄帝聞而樂之閒居齋心服形三月弗獲其治疲而睡蓋至其鄉既寢厭其國之多事也召二臣而告之凡二十有八年而天下大治似睡鄉焉降及堯舜無爲世以爲睡鄉之俗也禹湯股無胈脛無毛剪爪爲牲以救天災不暇與睡鄉徃來武王克商還周日夜不寢曰吾未定大業周公夜以繼日坐以待旦爲王作禮樂伐鼓扣鐘雞人號于右則睡鄉之邉徼屢警矣其孫穆王慕黄帝之事因西方化人而神遊焉騰虛空乘雲霧卒莫覩所謂睡鄉也至孔子時有宰予者亦棄其學而遊焉不得其塗大迷謬而返戰國秦漢之君悲愁傷生内窮於長夜之飲外累於攻戰之具於是睡鄉始丘墟矣而䝉漆園吏莊周者始過之化爲蝴蝶翩翩其間䝉人弗覺也其後山人處士之慕道者猶徃徃而至至則囂然樂而忘歸從以爲之徒云嗟夫予也㓜而勤行長而競時卒不能至豈不迂哉因夫斯人之問津也故記靜常齋記虛而一直而正萬物之生芸芸此獨漠然而自定吾其命之曰靜泛而出渺而藏萬物之逝滔滔此獨介然而不忘吾其命之曰常無古無今無生無死無終無始無後無先無我無人無能無否無離無著無證無修即是以觀非愚則癡舍是以求非病則狂昏昏黙黙了不可得混混沌沌茫不可論雖有至人亦不可聞聞爲真聞亦不可知知爲真知是猶在聞知之域而不足以髣髴况緣迹逐響以希其至不亦難哉既以是爲吾號又以是爲吾室則有名之累吾何所逃然亦趨寂之指南而求道之鞭影乎趙先生舍利記趙先生棠本蜀人孟氏節度使廷隠之後今爲南海人仕至幕職官南海有潘冕者陽狂不測人謂之潘盎南海俚人謂心風爲盎盎嘗與京師言法華偈頌徃來言云盎日光佛也先生棄官從盎遊盎以謂盡得我道盎既隠去不知其所終而先生亦坐化焚其衣得舍利數升我與先生之子昶遊故得此舍利四十八粒盎與先生異迹極多張安道作先生墓誌具載其事昶今爲大理寺丞知藤州元豐三年十一月十五日以舍利授寳月大師之孫悟清使持歸本院供養巴郡蘇某記北海十二石記登州下臨大海目力所及沙門鼉磯車牛大竹小竹凡五島惟沙門最近兀然焦枯其餘皆紫翠巉絶出沒濤中真神仙所宅也上生石芝草木皆竒瑋多不識名者又多美石五采斑斕或作金色熈寜已酉歳李天章為登守呉子野徃從之游時解貳卿致政退居于登使人入諸島取石得十二株皆秀色粲然適有舶在岸下將轉海至潮子野請於解公盡得十二石以歸置所居歳寒堂下近世好事能致石者多矣未有取北海而置南海者也元祐八年八月十五日東坡居士蘇某記紫姑神記元豐三年正月朔日予始去京師來黄州二月朔至郡至之明年進士潘丙謂予曰異哉公之始受命黄人未知也有神降于州之僑人郭氏之第與人言如響且善賦詩曰蘇公將至而吾不及見也已而公以是日至而神以是日去其明年正月丙又曰神復降于郭氏予徃觀之則衣草木為婦人而寘筯手中二小童子扶焉以筯畫字曰妾夀陽人也姓何氏名媚字麗卿自㓜知讀書屬文為伶人婦唐垂拱中夀陽刺史害妾夫納妾爲侍妾而其妻妬悍甚見殺於厠妾雖死不敢訴也而天使見之爲直其寃且使有所識於人間蓋世所謂子姑神者其類甚衆然未有如妾之卓然者也公少留兒爲賦詩且舞以娯公詩數十篇敏㨗立成皆有妙思雜以嘲笑問神仙鬼佛變化之理其荅皆出於人意外坐客撫掌作道調梁州神起舞中節曲終再拜以請曰公文名於天下何惜方寸之紙不使世人知有妾乎予觀何氏之生見掠于酷吏而遇害於悍妻其怨深矣而終不指言刺史之姓名似有禮者客至逆知其平生而終不言人之隂私與休咎可謂知矣又知好文字而恥無聞於世皆可賢者粗為錄之荅其意焉天篆記江淮間俗尚鬼歳正月必衣服箕箒為子姑神或能數數畫字黄州郭氏神最異予去歳作何氏録以記之今年黄人汪若谷家神尤竒以箸爲口置筆口中與人問答如響曰吾天人也名全字徳通姓李氏以若谷再世爲人吾是以降焉著篆字筆勢竒妙而字不可識曰此天篆也與予篆三十字云是天蓬呪使以𨽻字釋之不可見黄之進士張炳曰久濶無恙炳問安所識荅曰子獨不記劉苞乎吾即苞也因道炳昔與苞起居語言狀甚詳炳大驚告予曰昔嘗識苞京師青巾布裘文身而嗜酒自言齊州人今不知其所在豈真天人乎或曰天人豈肯附箕箒為子姑神從汪若谷遊哉予亦以爲不然全爲鬼爲仙固不可知然未可以其所托之陋疑之也彼誠有道視王宫豕牢一也其字雖不可識而意趣簡古非虛落間竊食愚鬼所能爲者昔長陵女子以乳死見神於先後宛若民多徃祠其後漢武帝亦祠之謂之神君震動天下若疑其所托又陋於全矣世人所見常少所不見常多奚必於區區耳目之所及度量世外事乎姑藏其書以待知者大悲閣記成都府大悲者觀世音之變也觀世音由聞而覺始於聞而能無所聞始於無所聞而能無所不聞能無所聞雖無身可也能無所不聞雖千萬億身可也而况於手與目乎雖然非無身無以舉千萬億身之衆非千萬億身無以示無身之至故散而爲千萬億身聚而為八萬四千母陁羅臂八萬四千清淨寳目其道一爾昔吾嘗觀於此吾頭髪不可勝數而身毛孔亦不可勝數牽一髪而頭爲之動拔一毛而身為之變然則髪皆吾頭而毛孔皆吾身也彼皆吾頭而不能為頭之用彼皆吾身而不能具身之智則物有以亂之矣吾將使世人左手運斤而右手執削目數飛鴈而耳節鳴皷首肯傍人而足識梯級雖有智者有所不暇矣而况千手異執而千目各視乎及吾燕坐寂然心念凝黙湛然如大明鏡人鬼鳥獸雜陳乎吾前色聲香味交遘乎吾體心雖不起而物無不接接必有道即千手之出千目之運雖未可得見而理則具矣彼佛菩薩亦然雖一身不成二佛而一佛能遍河沙諸國非有它也觸而不亂至而能應理有必至而何獨疑於大悲乎成都西南大都㑹也佛事最勝而大悲之像未覩其傑有法師敏行者能讀内外教博通其義欲以如幻三昧爲一方首乃以大旃檀作菩薩像端嚴妙麗具慈愍性手臂錯出開合捧執指彈摩拊千態具備手各有目無妄舉者復作大閣以覆菩薩雄偉壯峙工與像稱都人作禮因敬生悟余遊於四方二十餘年矣雖未得歸而想見其處敏行使其徒法震乞文爲道其所以然者且頌之曰吾觀世間人兩目兩手臂物至不能應狂惑失所措其有欲應者顛倒作思慮思慮非真實無異無手目菩薩千手目與一手目同物至心亦至曾不作思慮隨其所當應無不得其當引弓挾白羽劒盾諸械器經巻及香華盂水青楊枝珊瑚大寳炬白拂朱藤杖所遇無不執所執無有疑緣何得無疑以我無心故若猶有心者千手當千心一人而千心内自相攫攘何暇能應物千手無一心手手得其處稽首大悲尊願度一切衆皆證無心法皆具千手目廣州東莞縣資福禪寺羅漢閣記衆生以愛故入生死由於愛境有逆有順而生喜怒造種種業展轉六趣至千萬刼本所從來唯有一愛更無餘病佛大醫王對病爲藥唯有一捨更無餘藥常以此藥而治此病如水救火應手當滅云何衆生不滅此病是導師過非衆生咎何以故衆生所愛無過身體父母有疾割肉刺血初無難色若復鄰人從其求乞一爪一髪終不可得有二導師其一清淨不入諸相能知衆生生死之本能使衆生了然見知不生不滅出輪囘處是處安樂堪永依怙無異父母支體可捨而况財物其一導師以有為心行有為法縱不求利即自求名譬如鄰人求乞爪髪終不可得而况肌肉以此觀之愛吝不捨是導師過設如有人無故取米投坑穽中見者皆恨若以此米施諸鳥雀見者皆喜鳥雀無知受我此施何異坑穽而人自然有喜有愠如使導師有心有為則此施者與棄無異以此觀之愛吝不捨非衆生咎四方之民皆以勤苦而得衣食所得毫末其苦無量獨此南越嶺海之民貿遷重寳坐獲富樂得之也易享之也愧是故其人以愧故捨海道幽險死生之間曾不容髪而况飄墯羅刹鬼國呼號神天佛菩薩僧以脱須臾當此之時身非已有而况財物實同糞土是故其人以懼故捨愧懼二法助發善心是故越人輕施樂捨甲於四方東莞古邑資福禪寺有老比丘祖堂其名未嘗戒也而律自嚴未嘗求也而人自施人之施堂如物在衡損益銖黍了然覺知堂之受施如水涵影雖千萬過無一留者堂以是故創作五百大阿羅漢嚴淨寶閣涌地千柱浮空三成壯麗之極實冠南越東坡居士見聞隨喜而説偈言五百大士栖此城南珠大貝皆東傾衆心囘春栢再榮鐵林東來閣乃成寶骨未到先通靈赤蛇白璧珠夜明三卜襲吉誰敢爭層簷飛空俯日星海波不摇颶無聲天風徐來韻流鈴一洗瘴霧氷雪清人無南北夀且寜東坡全集巻三十八
