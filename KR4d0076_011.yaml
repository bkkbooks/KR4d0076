body:
  text: 東坡全集卷十一宋蘇軾撰詩七十二首次韻秦太虛見戲耳聾君不見詩人借車無可載留得一錢何足賴晚年更似杜陵翁右臂雖存耳先聵人將蟻動作牛鬬我覺風雷真一噫聞塵掃盡根性空不須更枕清流派太朴初散失混沌六鑿相攘更勝敗眼花亂墜酒生風口業不停詩有債君知五藴皆是賊人生一病今先差但恐此心終未了不見不聞還是礙今君疑我特佯聾故作嘲詩窮嶮怪須防額癢出三耳莫放筆端風雨快端午遍逰諸寺得禪字肩輿任所適遇勝輒留連焚香引幽步酌茗開靜筵微雨止還作小忩幽更妍盆山不見日草木自蒼然忽登最髙塔眼界窮大千卞峰照城郭震澤浮雲天深沉既可喜曠蕩亦所便幽尋未云畢墟落生晚煙歸來記所歷耿耿清不眠道人亦未寢孤燈同夜禪送劉寺丞赴餘姚中和堂後石楠樹與君對牀聽夜雨玉笙哀怨不逢人但見香煙橫碧縷謳吟思歸出無計坐想蟋蟀空房語明朝開鎖放觀潮豪氣正與潮爭怒銀山動地君不看獨愛清香生雪霧别來聚散如宿昔城郭空存鶴飛去我老人間萬事休君亦洗心從佛祖手香新寫法界觀眼淨不覷登伽女餘姚古縣亦何有龍井白泉甘勝乳千金買斷顧渚春似與越人降日注李公擇過髙郵見施大夫與孫莘老賞花詩憶與僕去嵗會于彭門折花餽筍故事作詩二十四韻見戲依韻奉答亦以一戲公擇云爾汝陽真天人絹帽著紅槿纒頭三伯萬不買一微哂共誇青山峯曲盡花不隕當時謫仙人逸韻謝封畛詩成天一笑萬象解寒窘驚開小桃杏不待雷發軫餘波尚涓滴乞與居易稹爾來誰復見前輩風流盡寂寞兩詩人殘紅對櫻筍飢腸得一醉妙語傳不泯君來恨不與更復相牽引我老心巳灰空煩扇餘燼天逰照六鑿虛空掃充牣懸知色竟空那復嗜烏吻蕭然一方丈居士老龎藴散花從滿祴不答天女問故人猶故日怨句寫餘恨疑我此心在遮防費欄楯應虞已斃蛇折尾時一蠢仄聞孟光賢未學處仲忍開閣放出事見本傳寄招應已足左右侍雲鬒何時花月夜羊酒謝不敏此生如幻耳戲語君勿愠應同亡是公一對子虛聽王鞏清虛堂清虛堂裏王居士閉眼觀身如止水水中照見萬象空敢問堂中誰隱几吳興太守老且病堆案滿前長渴睡願君勿笑反自觀夢幻去來殊未已長疑安石恐不免未信犀首終無事勿將一念住清虛居士與我蓋同耳和孫同年卞山龍洞禱晴吳興連月雨釜甑生魚蛙往問卞山龍曷不安厥家梯空上巉絶俯視驚谽谺神井湧雲蓋隂崖垂蘚花交流百道泉赴谷走羣蛇不知落何處隱隱如繅車我來叩石戶飛鼠翻白鴉寄語洞中龍睡味豈不嘉雨師少弭節雷師亦停撾積水得反壑稻苖出泥沙農夫免菜色龍亦飽豚豭看君擁黃紬髙卧放晚衙乘舟過賈收水閣收不在見其子三首愛酒陶元亮能詩張志和青山來水檻白雨滿漁蓑淚垢添丁面貧低舉案蛾不知何所樂竟夕獨酣歌嫋嫋風蒲亂猗猗水荇長小舟浮鴨緑大杓寫鵝黃得意詩酒社終身魚稻鄉樂哉無一事何處不清涼曳杖青苔岸繫船枯栁根德公方上冡季路獨留言已占蒲魚港更開松菊園從兹來往數兒女自譍門次韻孫祕丞見贈感槩清哀似變風老於詩句耳偏聰迂疏自笑成何事冷淡誰能用許功不怕飛蚊如立豹肯隨白鳥過垂虹吟哦相對忘三伏擬泛氷溪入雪宫湖州多蚊豹腳尤毒垂虹吳江亭名與客逰道場何山得鳥字清溪到山盡飛路盤空小紅亭與白塔隱見喬木杪中休得小庵孤絶寄雲表洞庭在北戶雲水天渺渺庵僧俗緣盡淨業洗未了十年畫鵲竹益以詩自繞髙堂儼像設禪室各深窈奔泉何處來華屋過溪沼何山隔幽谷去路清且悄長松度翠蔓絶壁挂啼鳥我友自杭來尚歎所歷少歸塗風雨作一洗紅日燎俄驚萬竅號黑霧卷蓬蓼舟人紛變色坐羡輕鷗矯我獨喚酒杯醉死勝流殍書生例強很造物空煩擾更將掀舞勢把燭畫風篠美人為破顔正似腰支嫋明朝更陳迹清景墮空杳作詩記餘歡萬古一昏曉僕去杭五年吳中仍嵗大飢疫故人往往逝去聞湖上僧舍不復往日繁麗獨淨慈本長老學者益盛作此詩寄之來往三吳一夢間故人半作冡纍然獨依舊社傳真法要與遺民度厄年趙叟近聞還印綬竺翁先巳返林泉何時杖䇿相隨去任性逍遙不學禪舶趠風并引吳中梅雨既過颯然清風彌旬嵗嵗如此湖人謂之舶趠風是時海舶初回云此風自海上與舶俱至云爾三旬已過梅黃雨萬里初來舶趠風幾處縈回度山曲一時清駛滿江東驚飄簌簌先秋葉喚醒昏昏嗜睡翁欲作蘭臺快哉賦却嫌分别問雌雄丁公默送蝤蛑溪邉石蟹小如錢喜見輪囷赤玉盤半殼含黃宜點酒兩螯斫雪勸加餐蠻珍海錯聞名久怪雨腥風入座寒堪笑吳興饞太守一詩換得兩尖團送孫著作赴考城兼寄錢醇老李邦直二君於孫處有書見及使君間如雲欲出誰肯伴清風獨無事一嘯亦可喚來從白蘋洲吹我明月觀門前逺行客青衫流白汗問子何匆匆王事不可緩故人錢與李清廟兩圭瓉蔚為萬乘器尚記溝中斷子亦東南珍價重不可算别情何以慰酒盡對空案惟持一榻涼勸子巾少岸此風那復有塵土飛灰炭欲寄二大夫發發不可絆泛舟城南會者五人分韻賦詩得人皆苦炎字四首城中樓閣似魚鱗不見清風起白蘋試選苕溪最深處仍呼我輩不羈人窺船野鶴何曽下見燭飛蟲空自馴繞郭荷花一千頃誰知六月下塘春苦熱誠知處處皆何當危坐學心齋海螯要共詩人把溪月行遭霧雨霾鄉國飄零斷書信弟兄流落隔江淮便應築室苕溪上荷葉遮門水浸階紫蟹鱸魚賤如土得錢相付何曽數碧筒時作象鼻灣白酒微帶荷心苦運肘風生看斫膾隨刀雪落驚飛縷不將醉語作新詩飽食應慙腹如鼓橋上遊人夜未厭共依水檻立風簷樓中煮酒初嘗芡月下新粧半出簾南郭清遊繼顔謝北忩髙卧等羲炎人間寒熱無窮事自笑疏頑不受痁次韻李公擇梅花詩人固長貧日午飢未動偶然得一飽萬象困嘲弄尋花不論命愛雪長忍凍天公非不憐聽飽即喧閧君為三郡守所至滿賔從江湖常在眼詩酒事豪縱奉使今折磨清比於陵仲永懷茶山下携妓修春貢更憶檻泉亭插花雲髻重蕭然卧灊麓愁聽春禽哢忽見早梅花不飲但孤諷詩成獨寄我字字愈頭痛嗟君本侍臣筆槖從上雍脫鞾吟芍藥給札賦雲夢何人慰流落嘉花天為種杯傾笛中吟帽拂果下鞚感時念羈旅此意吾儕共故山亦何有桐花集么鳯君亦憶匡廬歸掃藏書洞何當種此花各抱漢隂甕送淵師歸徑山我昔嘗為徑山客至今詩筆餘山色師住此山三十年妙語應須得山骨溪成六月水雲蒸飛蚊猛捷如花鷹羡師方丈氷雪冷蘭膏不動長明燈山中故人知我至爭來問訊今何似為言百事不如人兩眼猶能書細字徑山夏無蚊余舊詩云問龍乞水歸洗眼欲看細字銷殘年送表忠觀錢道士歸杭先生舊德在民心著令稱忠上意深墮淚行看會祠下挂名爭欲刻碑隂凄涼破屋塵凝座憔悴雲孫雪滿簮未信諸豪容郭解却從他縣施千金次韻周開祖長官見寄俯仰東西閲數州老於岐路豈伶優初聞父老推謝令旋見兒童迎細侯政拙年年祈水旱民勞處處避嘲謳河吞巨野那容塞盜入蒙山不易搜仕道固應慙孔孟扶顛未可責由求漸謀田舍猶懷祿未脫風濤且傍洲罔罔可憐真喪狗時時相觸是虛舟朅來震澤都如夢只有苕溪可倚樓齋釀酸甜如蜜水樂工零落似風甌逺思顔栁並諸謝近憶張子野陳令舉與老劉風定軒窗飛豹腳雨餘欄檻上蝸牛舊逰到處皆蒼蘚同甲惟君尚黑頭憶昔湖山共尋勝相逢杯酒兩忘憂醉看梅雪清香過夜棹風船駭汗流百首共成山上集三人俱作月中逰海南未起垂天翼澗底仍依徑寸庥已許秋風歸過我預憂詩筆老難酬此生嵗月行飄忽晚節功名亦繆悠犀首正緣無事飲馮歡應為有魚留從今便踏青州麴薄酒知君笑督郵林子中以詩寄文與可及余與可既歿追和其韻斯人所甚厭投畀每不受欲其少須臾奪去惟恐後云誰尸此職無乃亦假守賦才有巨細無異斛與斗胡不安其分但聽物所誘時來各飛動意合無妍醜坐令雞栖車長載朱伯厚平生無一旅既死吒萬口自聞與可亡胸臆生堆阜懸知臨絶意要我一執手相望五百里安得自其牖遺文付來哲後事待諸友伶俜嵇紹孤老病孟光偶世人賤目見爭笑千金帚君詩與楚詞識者當有取但知愛墨竹此歎吾已久故人多厚祿能復哀君否不見林與蘇飢寒自奔走與王郎昆仲及兒子邁繞城觀荷花登峴山亭晚入飛英寺分韻得月明星稀四首昨夜雨鳴渠曉來風襲月蕭然欲秋意溪水清可啜環城三十里處處皆佳絶蒲蓮浩如海時見舟一葉此間真避世青蒻低白髮相逢欲相問已逐驚鷗沒清風定何物可愛不可名所至如君子草木有嘉聲我行本無事孤舟任斜橫中流自偃仰適與風相迎舉杯屬浩渺樂此兩無情歸來兩溪間雲水夜自明苕水如漢水鱗鱗鴨頭青吳興勝襄陽萬瓦浮青冥我非羊叔子愧此峴山亭悲傷意則同嵗月如流星從我兩王子髙鴻插修翎湛輩何足道當以德自銘吏民憐我懶鬬訟日已稀能為無事飲可作不夜歸復尋飛英遊盡此一寸暉撞鐘履聲集顛倒雲山衣我來無時節杖屨自推扉莫作使君看外似中已非城南縣尉水亭得長字兩尉鬱相望東南百步場揮旗蒲栁市伐鼓水雲鄉已作觀魚檻仍開射鴨堂全家依畫舫極目亂紅粧瀲瀲波頭細疏疏雨腳長我來間濯足溪漲欲浮牀澤國山圍裏孤城水影傍欲知歸路處葦外記風檣與胡祠部逰法華山波湖欲盡山為界始見寒泉落髙派道人未放泉出山曲折虛堂㵼清快使君年老尚兒戲緑棹紅船舞澎湃一笑翻杯水濺裙餘歡濯足波生隘長松攙天龍起立蒼藤倒谷雲崩壞仰穿蒙密得清曠一覽震澤吁可怪誰云四萬八千頃渺渺東盡日所曬歸塗十里盡風荷清唱一聲聞露薤是日樂工有作此聲者嗟余少小慕真隱白髮青衫天所械忽逢佳士與名山何異枯楊便馬疥君猶鸞鶴偶飄墮六翮如雲豈長鎩不將新句紀茲逰恐負山中清淨債又次前韻贈賈耘老具區吞滅三州界浩浩蕩蕩納千派從來不著萬斛船一葦漁舟恣奔快仙壇古洞不可到空聽餘瀾鳴湃湃今朝偶上法華嶺縱觀始覺人寰隘山頭卧碣弔孤冡下有至人僵不壞空餘白棘網秋蟲無復青蓮出幽怪事見本院碑我來徙倚長松下欲掘茯苓親洗晒聞道山中富竒藥往往靈芝雜葵薤詩人空腹待黃精生事只看長柄械杜子美詩云長鑱短鑱白木柄我生託子以為命今年大熟期一飽食葉微蟲真癬疥今嵗有小蟲食葉不甚為害白花半落紫穟香攘臂欲助磨鎌鎩安得山泉變春酒與子一洗尋常債趙閲道髙齋見公奔走謂公勞聞公隱退云公髙公心底處有髙下夢幻去來隨所遭不知髙齋竟何義此名之設緣吾曹公年四十已得道俗緣未盡餘伊臯功名富貴俱逆旅黃金知繫何人袍超然已了一大事挂冠而去真秋毫坐看猿猱落罝罔兩手未肯置所操乃知賢逹與愚陋豈直相去九牛毛長松百尺不自覺企而羡者蓬與蒿我欲贏糧往問道未應舉臂辭盧敖送俞節推尚之子尚字退翁吳興有君子淡如朱絲琴一唱三太息至今有遺音嗟余與夫子相避如辰參退翁官于蜀余在京師余歸而退翁去及余官于吳興則退翁亡矣猶喜見諸郎窈然清且深異時多良士末路喪初心我生不有命其肯枉尺尋次韻答孫侔十年身不到朝廷欲伴騷人賦落英但得低頭拜東野不辭中路伺淵明艤舟苕霅人安在卜築江淮計已成千里論交一言足與君蓋亦不須傾重寄一首凛然髙節照時人不信微官解凂君蔣濟謂能來阮藉薛宣直欲吏朱雲好詩衝口誰能擇俗子疑人未遣聞乞取千篇看俊逸不將輕比鮑參軍次韻和劉貢甫登黃樓見寄并寄子由二首清派連淮上黃樓冠海禺此詩尤偉麗夫子計魁梧劉為人短小世俗輕瑚璉巾箱襲武夫坐令乘傳遽奔走為儲須邂逅我已失登臨誰與俱貧貪倉氏粟身聽冶家橅會合難前定歸休試後圗腴田未可買窮鬼却須呼本欲買田於泗上近己不遂矣二水何年到雙洪不受艫至今清夜夢飛轡䇿天吳此詩寄劉與子皆去國十年天一禺數竒逢惡嵗計拙集枯梧好士餘劉表窮交憶灌夫不矜持漢節猶計攬桓須清句金絲合髙樓雪月俱吟哦出新意指畫想前橅子由初赴南京送之出東門登城上覽山川之勝云此地可作樓觀於是始有改築之意自寫千言賦新裁六幅圗近以絹自寫子由黃樓賦為六幅圖甚妙傳看一坐聳勸著尺書呼莫使騷人怨東遊不到吳此詩寄子由陳州與文郎逸民飲别携手河堤上作此詩白酒無聲滑㵼油醉行堤上散吾愁春風料峭羊角轉河水渺綿瓜蔓流君已思歸夢巴峽我能未到説黃州此生聚散何窮已未忍悲歌學楚囚子由自南都來陳三日而别夫子自逐客尚能哀楚囚奔馳二百里徑來寬我憂相逢知有得道眼清不流别來未一年落盡驕氣浮嗟我晚聞道欵啓如孫休至言雖久服放心不自收悟彼善知識妙藥應所投納之憂患場磨以百日愁冥頑雖難化鐫發亦已周平時種種心次第去莫留但餘無所還永與夫子逰此别何足道大江東西州畏蛇不下榻睡足吾無求便為齊安民何必歸故丘正月十八日蔡州道上遇雪次子由韻二首蘭菊有生意微陽回寸根方憂集莫雪復喜迎朝暾憶我故居室浮光動南軒松竹半傾㵼未數葵與萱三徑瑶草合一瓶井花溫至今行吟處尚餘履舄痕一朝出從仕永愧李仲元晚嵗益可羞犯雪方南奔山城買廢圃稿葉手自掀長使齊安人指説故侯園鉛膏染髭鬚旋露霜雪根不如閉目坐丹府夜自暾誰知憂患中方寸寓羲軒大雪從壓屋我非兒女萱平生學踵息坐覺兩鐙溫下馬作雪詩滿地鞭箠痕佇立望原野悲歌為黎元道逢射獵子遙指狐兔奔蹤迹尚可尋窟穴何足掀寄謝李丞相吾將反丘園過新息留示鄉人任師中任時知瀘州亦坐事對獄昔年嘗羡任夫子卜居新息臨淮水怪君便爾忘故鄉稻熟魚肥信清美竹陂鴈起天為黑小竹陂在縣北桐柏煙橫山半紫桐柏廟在縣南知君坐受兒女困悔不先歸弄清泚塵埃我亦失收身此行蹭蹬尤可鄙寄食方將依白足附書未免煩黃耳往雖不及來有年詔恩倘許歸田里却下關山入蔡州為買烏犍三百尾黃州出水牛過淮朝離新息縣初亂一水碧莫宿淮南村已渡千山赤麏鼯號古戍霧雨暗破驛回頭梁楚郊永與中原隔黃州在何許想像雲夢澤吾生如寄耳初不擇所適但有魚與稻生理已自畢獨喜小兒子少小事安佚相從艱難中肝肺如鐵石便應與晤語何止寄衰疾時家在子由處獨與兒子邁南來書黁公詩後并敘過加祿鎮南二十五里大許店休焉于逆旅祁宗祥家見壁上有幅紙題詩云滿院秋光濃欲滴老僧倚杖青松側只怪髙聲問不譍瞋余踏破蒼苔色其後題云滏水僧寶黁宗祥謂余此光黃間狂僧也年百三十死於熙寧十年既死人有見之者宗祥言其異事甚多作是詩以識之黁公本名清戒俗謂之戒和尚云黁公昔未化來往淮山曲夀逾兩甲子氣壓諸尊宿但嗟濁惡世不受龍象蹴我來不及見悵望空遺躅霜顱隱白毫鎖骨埋青玉皆云似逹磨隻履還天竺壁間餘清詩字勢頗拔俗為吟五字偈一洗凡眼肉遊淨居寺并敘寺在光山縣南四十里大蘇山之南小蘇山之北寺僧居仁為余言齊天保中僧思惠過此見父老問其姓曰蘇氏又得二山名乃歎曰吾師告我遇三蘇則住遂留結庵而父老竟無有蓋山神也其後僧智顗見思於此山而得法焉則世所謂思大和尚智者大師是也唐神龍中道岸禪師始建寺於其地廣明庚子之亂寺廢於兵火至乾興中乃復而賜名曰梵天云十載遊名山自製山中衣願言畢婚嫁携手老翠微不悟俗緣在失身蹈危機刑名非夙學陷穽損積威遂恐死生隔永與雲山違今日復何日芒鞋自輕飛稽首兩足尊舉頭雙涕揮靈山會未散八部猶光輝願從二聖往一洗千劫非裴回竹溪月空翠搖煙霏鐘聲自送客出谷猶依依回首吾家山嵗晚將焉歸梅花二首春來幽谷水潺潺的皪梅花草棘間一夜東風吹石裂半隨飛雪渡關山何人把酒慰深幽開自無聊落更愁幸有清溪三百曲不辭相送到黃州戲作種松我昔少年日種松滿東岡初移一寸根瑣細如插秧二年黃茅下一一攢麥芒三年出蓬艾滿山散牛羊不見十餘年想作龍蛇長夜風波浪碎朝露珠璣香我欲食其膏巳伐百本桑煮松脂法用桑柴灰水人事多乖忤神藥竟渺茫朅來齊安野夾路鬚髯蒼會開龜蛇窟不惜斤斧創縱未得伏苓且當拾流肪釜盎百出入皎然散飛霜稿死三彭仇澡換五谷腸青骨凝緑髓丹田發幽光白髮何足道要使雙瞳方却後五百年騎鶴還故鄉萬松亭并敘麻城縣令張毅植萬松於道周以芘行者且以名其亭去未十年而松之存者十不及三四傷來者之不嗣其意也故作是詩十年栽種百年規好德無人助我儀古語云一年之計樹之以榖十年之計樹之以木百年之計樹之以德縣令若同倉庾氏亭松應長子孫枝天公不救斧斤厄野火解憐氷雪姿為問幾株能合抱殷勤記取角弓詩張先生并敘先生不知其名黃州故縣人本姓盧為張氏所養陽狂垢汚寒暑不能侵常獨行市中夜或不知其所止往來者欲見之多不能致余試使人召之欣然而來既至立而不言與之言不應使之坐不可但俯仰熟視傳舍堂中久之而去夫孰非傳舍者是中竟何有乎然余以有思惟心追躡其意蓋未得也熟視空堂竟不言故應知我未天全肯來傳舍人皆説能致先生豫亦賢脫屣不妨眠糞屋流澌爭看浴冰川士廉豈識桃椎妙妄意稱量未必然陳季常所畜朱陳村嫁娶圗何年顧陸丹青手畫作朱陳嫁娶圗聞道一村惟兩姓不將門戶買崔盧我是朱陳舊使君勸耕曽入杏花村而今風物那堪畫縣吏催錢夜打門朱陳村在徐州蕭縣少年時嘗過一村院見壁上有詩云夜涼疑有雨院靜似無僧不知何人詩也宿黃州禪智寺寺僧皆不在夜半雨作偶記此詩故作一絶佛燈漸暗飢鼠出山雨欲來修竹鳴知是何人舊詩句已應知我此時情初到黃州自笑平生為口忙老來事業轉荒唐長江繞郭知魚美好竹連山覺筍香逐客不妨貟外置詩人例作水曹郎只慙無補絲毫事尚費官家壓酒囊檢校官例折支多得退酒袋定惠院寓居月夜偶出幽人無事不出門偶逐東風轉良夜參差玉宇飛木末繚繞香煙來月下江雲有態清自媚竹露無聲浩如㵼已驚弱栁萬絲垂尚有殘梅一枝亞清詩獨吟還自和白酒已盡誰能借不辭青春忽忽過但恐歡意年年謝自知醉耳愛松風會揀霜林結茅舍浮浮大甑長炊玉溜溜小槽如壓蔗飲中真味老更濃醉裏狂言醒可怕但當謝客對妻子倒冠落佩從嘲罵次韻前篇去年花落在徐州對月酣歌美清夜去年徐州花下對月與張君厚王子中兄弟飲酒作蘋字韻詩今年黃州見花發小院閉門風露下萬事如花不可期餘年似酒那禁㵼憶昔還鄉泝巴峽落帆樊口在黃州南岸髙桅亞長江衮衮空自流白髮紛紛寧少借竟無五畝繼沮溺空有千篇凌鮑謝至今歸計負雲山未免孤衾眠客舍少年辛苦真食蓼老景清間如啖蔗飢寒未至且安居憂患已空猶夢怕穿花踏月飲村酒免使醉歸官長罵安國寺浴老來百事懶身垢猶念浴衰髮不到耳尚煩月一沐山城足薪炭煙霧濛湯谷塵垢能幾何翛然脫羈梏披衣坐小閣散髮臨修竹心困萬緣空身安一牀足豈惟忘淨穢兼以洗榮辱默歸無多談此理觀要熟安國寺尋春卧聞百舌呼春風起尋花栁村村同城南古寺修竹合小房曲檻欹深紅看花歎老憶年少對酒思家愁老翁病眼不羞雲母亂鬢絲強理茶煙中遙知二月王城外玉仙洪福花如海薄羅雲霧蓋新粧快馬爭風鳴雜珮玉川先生真可憐一生耽酒終無錢病過春風九十日獨抱添丁看花發寓居定惠院之東雜花滿山有海棠一株土人不知貴也江城地瘴蕃草木只有名花苦幽獨嫣然一笑竹籬間桃李漫山總粗俗也知造物有深意故遣佳人在空谷自然富貴出天姿不待金盤薦華屋朱唇得酒暈生臉翠袖卷紗紅映肉林深霧暗曉光遲日暖風輕春睡足雨中有淚亦淒愴月下無人更清淑先生食飽無一事散步逍遙自捫腹不問人家與僧舍拄杖敲門看修竹忽逢絶艷照衰朽歎息無言揩病目陋邦何處得此花無乃好事移西蜀寸根千里不易到銜子飛來定鴻鵠天涯流落俱可念為飲一樽歌此曲明朝酒醒還獨來雪落紛紛那忍觸次韻樂著作野步老來幾不辨西東秋後霜林且強紅眼暈見花真是病耳虛聞蟻定非聰酒醒不覺春強半睡起常驚日過中植杖偶逢為黍客披衣間詠舞雩風仰看落蕊收松粉俯見新芽摘杞叢楚雨還昏雲夢澤吳潮不到武昌宫黃州對岸武昌縣有孫權故宫廢興古郡詩無數寂寞間忩易粗通解組歸來成二老風流他日與君同二月二十六日雨中熟睡至晚強起出門還作此詩意思殊昏昏也卯酒困三杯午餐便一肉雨聲來不斷睡味清且熟昏昏覺還卧展轉無由足強起出門行孤夢猶可續泥深竹雞語村暗鳩婦哭明朝看此詩睡語應難讀雨晴後步至四望亭下魚池上遂自乾明寺前東岡上歸二首雨過浮萍合蛙聲滿四鄰海棠真一夢梅子欲嘗新拄杖間挑菜鞦韆不見人殷勤木芍藥獨自殿餘春髙亭廢已久下有種魚塘暮色千山入春風百草香市橋人寂寂古寺竹蒼蒼鸛鶴來何處號鳴滿夕陽雨中看牡丹三首霧雨不成點映空疑有無時於花上見的皪走明珠秀色洗紅粉暗香生雪膚黃昏更蕭瑟頭重欲相扶明日雨當止晨光在松枝清寒入花骨肅肅初自持午景發穠麗一笑當及時依然暮還斂亦自惜幽姿幽姿不可惜後日東風起酒醒何所見金粉抱青子千花與百草共盡無妍鄙未忍汙泥沙牛酥煎落蘃次韻樂著作送酒少年多病怯杯觴老去方知此味長萬斛羈愁都似雪一壺春酒若為湯次韻樂著作天慶觀醮濁世紛紛肯下臨夢尋飛步五雲深無因上到通明殿只許微聞玉佩音王齊萬秀才寓居武昌縣劉郎洑正與伍洲相對伍子胥奔吳所從渡江也君家稻田冠西蜀搗玉揚珠三萬斛塞江流泲起書樓碧瓦朱欄照山谷傾家取樂不論命散盡黃金如轉燭惟餘舊書一百車方舟載入荆江曲江上青山亦何有伍洲遙望劉郎藪明朝寒食當過君請殺耕牛壓私酒與君飲酒細論文酒酣訪古江之濆仲謀公瑾不須弔一酹波神英烈君杭州伍子胥廟封英烈王杜沂逰武昌以酴醿花菩薩泉見餉二首酴醿不爭春寂寞開最晚青蛟走玉骨羽蓋蒙珠幰不粧艷已絶無風香自逺凄涼吳宫闕紅粉埋故苑至今微月夜笙簫來絶巘餘妍入此花千載尚清婉怪君呼不歸定為花所挽昨宵雷雨惡花盡君應返君言西山頂自古流白泉上為千牛乳下有萬石鉛不愧惠山味但無陸子賢願君揚其名庶託文字傳寒泉比吉士清濁在其源不食我心惻於泉非所患嗟我本何有虛名空自纒不見子栁子餘愚汙溪山陳季常自岐亭見訪郡中及舊州諸豪爭欲邀致之戲作陳孟公詩一首孟公好飲寧論斗醉後關門防客走不妨間過左阿君百謫終為賢太守老居閭里自浮沉笑問伯松何苦心忽然載酒從陋巷為愛揚雄作酒針長安富兒求一過千金夀君君笑唾汝家安得客孟公從來只識陳驚座東坡全集卷十一
