body:
  text: 東坡全集巻八十七宋蘇軾撰碑二首富鄭公神道碑宋興百三十年四方無虞人物嵗滋盖自秦漢以來未有若此之盛者雖所以致之非一道而其要在於兵不用用不久常使智者謀之而仁者守之雖至於無窮可也契丹自晉天福以來踐有幽薊北鄙之警畧無寧嵗凡六十有九年至景徳元年舉國來冦攻定武圍髙陽不克遂陷徳清以犯天雄真宗皇帝用宰相冦凖計决策親征既次澶淵諸道兵大㑹行在敵既震動兵始接射殺其驍將順國王達蘭敵懼遂請和時諸將皆請以兵㑹畧河上邀其歸徐以精甲躡其後殱之敵懼求哀於上上曰契丹幽薊皆吾民也何多以殺為遂詔諸将按兵勿伐縱契丹歸國敵自是通好守約不復盗邊者三十有九年及趙元昊叛西方轉戰連年兵久不决契丹之臣有貪而喜功者以我為怯且厭兵遂教其主設詞以動我欲得晉髙祖所與闗南十縣慶厯二年聚重兵境上遣其臣蕭英劉六符來聘兵既壓境而使來非時中外忿之仁宗皇帝曰契丹吾兄弟之國未可棄也其有以大鎮撫之命宰相擇報聘者時敵情不可測羣臣皆莫敢行宰相舉右正言知制誥富公公即入對便殿叩頭曰主憂臣辱臣不敢愛其死上為動色乃以公為接伴英等入境上遣中使勞之英託足疾不拜公曰吾嘗使北病卧車中聞命輒起拜今中使至而公不起此何禮也英矍然起拜公開懷與語不以外臣待之英等見公傾盡亦不復隠其情遂去左右宻以其主所欲得者告公且曰可從從之不可從更以一事塞之公具以聞上命御史中丞賈昌朝館伴不許割地而許増嵗幣且命公報聘既至六符館之徃反十數皆論割地必不可狀及見敵主問故敵主曰南朝違約塞鴈門増塘水治城隍籍民兵此何意也羣臣請舉兵而南寡人以謂不若遣使求地求而不獲舉兵未晩也公曰北朝忘章聖皇帝之大徳乎澶淵之役若從諸將言北兵無得脱者凡北朝與中國通好則人主專其利而臣下無所獲若用兵則利歸臣下而人主任其旤故北朝諸臣争勸用兵者此皆其身謀非國計也北主驚曰何謂也公曰晉髙祖欺天叛君而求助於北末帝昬亂神人棄之是時中國狹小上下離叛故契丹全師獨克雖多獲金幣充牣諸臣之家而壯士徤馬物故太半此誰任其旤者今中國提封萬里所在精兵以百萬計法令修明上下一心北朝欲用兵能保其必勝乎曰不能公曰勝負未可知就使其勝所亡士馬羣臣當之歟抑人主當之歟若通好不絶嵗幣盡歸人主臣下所得止奉使者嵗一二人耳羣臣何利焉北主大悟首肯者久之公又曰塞鴈門者以備元昊也塘水始於何承矩事在通好前地卑水聚勢不得不増城隍皆修舊民兵亦舊籍特補其缺耳非違約也晉髙祖以盧龍一道賂契丹周世宗復伐取闗南皆異代事宋興已九十年若各欲求異代故地豈北朝之利也哉本朝皇帝之命使臣則有詞矣曰朕為祖宗守國必不敢以其地與人北朝所欲不過利其租賦耳朕不欲以地故多殺兩朝赤子故屈巳増幣以代賦入若北朝必欲得地是志在敗盟假此為詞耳朕亦安得獨避用兵乎澶淵之盟天地鬼神實臨之今北朝首發兵端過不在朕天地鬼神豈可欺也哉敵大感悟遂欲求婚公曰婚姻易以生隙人命修短不可知不若嵗幣之堅久也本朝長公主出降齎送不過十萬緡豈若嵗幣無窮之獲哉北主曰卿且歸矣再來當擇一授之卿其遂以誓書來公歸復命再聘受書及口傳之詞于政府既行次樂壽謂其副曰吾為使者而不見國書萬一書詞與口傳者異則吾事敗矣發書視之果不同乃馳還都以晡入見宿學士院一夕易書而行既至北不復求婚專欲増幣曰南朝遺我書當曰獻否則曰納公争不可北主曰南朝既懼我矣何惜此二字若我擁兵而南得無悔乎公曰本朝皇帝兼愛南北之民不忍使蹈鋒鏑故屈已増幣何名為懼哉若不得已而至於用兵則南北敵國當以曲直為勝負非使臣之所憂也北主曰卿勿固執自古亦有之公曰惟唐髙祖借兵於突厥故臣事之當時所遺或稱獻納則不可知其後頡利為太宗所擒豈復有此禮哉公聲色俱厲敵知不可奪曰吾當自遣人議之於是留所許増幣誓書復使耶律仁先及六符以其國誓書來且求為獻納公奏曰臣既以死拒之敵氣折矣可勿復許敵無能為也上從之増幣二十萬而契丹平北方無事蓋又四十八年矣契丹君臣至今誦其語守其約不忍敗者以其心曉然知通好用兵利害之所在也故臣嘗竊論之百餘年間兵不大用者真宗仁宗之徳而冦凖與公之功也公諱弼字彦國河南人曽大父内黄今諱處謙大父商州馬歩使諱令荀考尚書都官員外郎諱言皆以公貴贈太師中書令尚書令封鄧韓秦三國公曽祖母劉氏祖母趙氏母韓氏封魯韓秦三國太夫人公㓜篤學有大度范仲淹見而識之曰此王佐才也懷其文以示王曽晏殊殊即以女妻之仁宗復制科仲淹謂公子當以是進天聖八年公以茂材異等中第授將作監丞知河南府長水縣用李迪辟簽書河陽節度判官事丁秦國公憂服除㑹郭后廢范仲淹争之貶知睦州公上言朝廷一舉而獲二過縱不能復后宜還仲淹以來忠言通判綘州景祐四年召試館職遷太子中允直集賢院從王曽辟通判鄆州寳元初趙元昊反公上疏陳八事且言元昊遣使求割地邀金帛使者部從儀物如契丹而詞甚倨此必元昊腹心謀臣自請行者宜出其不意斬之都市又言夏守贇庸人也平時猶不當用而况艱難之際可為樞宻乎議者以為有宰相氣召還為開封府推官擢知諫院康定元年日食正旦公言請罷燕徹樂雖北使在館亦冝就賜飲食而已執政以為不可公曰萬一北朝行之為朝廷羞後使北還者云北朝罷燕如公言仁宗深悔之初宰相惡聞忠言下令禁越職言事公因論日食以謂應天變莫若通下情遂除其禁元昊冦鄜延殺二萬人破金明擒李士斌延帥范雍鈐轄盧守懃閉門不救中貴人黄徳和引兵先走劉平石元孫戰死而雍守懃歸罪於通判計章用都監李康伯皆竄嶺南徳和誣奏平䧏賊詔以兵圍守其家公言平自環慶引兵來援以姦臣不救故敗竟罵賊不食而死宜卹其家守懃徳和皆中官怙勢誣人冀以自免宜竟其獄樞宻院奏方用兵獄不可遂公言大臣附下罔上獄不可不竟時守懃男昭序為御藥公奏乞罷之徳和竟坐腰斬延州民二十人詣闕告急上召問具得諸將敗亡狀執政惡之命邉郡禁民擅赴闕者公言此非陛下意宰相惡上知四方有敗耳民有急不得訴之朝則西走元昊北走契丹矣夏守贇為陜西都總管又以入内都知王守忠為都鈐轄公言用守贇既為天下笑而守忠鈐轄乃與唐中官監軍無異將吏必怨懼盧守懃黄徳和覆車之轍可復蹈乎詔罷守忠時又用觀察使魏昭昞為同州鄭守忠為殿前都指揮使髙化為歩軍都指揮使公言昭昞乳臭兒必敗事守忠與化故親事官皆奴才小人不可用詔遣侍御史陳洎徃陜西督修城且城潼關公言天子守在四夷今城潼闗自闗以西為棄之耶語皆侵執政自用兵以來吏民上書者甚衆初不省用公言知制誥本中書屬官可選二人置局中書考其所言可用用之宰相以付學士公言此宰相偷安欲以天下是非盡付他人乞與廷辯又言邉事系國安危不當專委樞宻院用宰相魏仁浦兼樞宻使國初范質王溥亦以宰相參知樞宻院事今兵興宜使宰相以故事兼領仁宗曰軍國之務當盡歸中書樞宻非古官然未欲遽廢内䧏令中書同議樞宻院事且書其檢宰相以内䧏納上前曰恐樞宻院謂臣奪權公曰此宰相避事耳非畏奪權也時西夏首領吹同乞砂吹同乞山各稱偽將相來䧏補借奉職羈置荆湖公言二人之䧏其家已族矣當厚賞以勸來者上命以所言送中書公見宰相論之宰相初不知也公嘆曰此豈小事而宰相不知耶更極論之上從公言以宰相兼樞宻使除鹽鐵判官遷太常丞史館修撰奉使契丹二年改右正言知制誥糾察在京刑獄時有用偽牒為僧者事覺乃堂吏為之開封按餘人而不及吏公白執政請以吏付獄執政指其坐曰公即居此無為近名公正色不受其言曰必得吏乃止執政滋不恱故薦公使契丹欲因事罪之歐陽修上書引顔真卿使李希烈事留公不報使還除吏部郎中樞宻直學士懇辭不受始受命聞一女卒再受命聞一男生皆不顧而行得家書不發而焚之曰徒亂人意尋遷翰林學士公見上力辭曰増嵗幣非臣本志也特以朝廷方討元昊未暇與北角故不敢以死争其敢受乎慶歴三年三月遂命公為樞宻副使辭之愈力改授資政殿學士兼翰林侍讀學士七月復除樞宻副使公言北既通好議者便謂無事邉備漸弛北萬一敗盟臣死且有罪非獨臣不敢受亦願陛下思強敵輕侮中原之耻坐薪嘗膽不忘修政因以告納上前而罷逾月復除前命時元昊使辭羣臣班紫宸殿門上俟公綴樞宻院班乃坐且使宰相章徳象諭公曰此朝廷特用非以使北故也公不得已乃受時晏殊為相范仲淹為參知政事杜衍為樞宻使韓琦與公副之歐陽修余靖王素蔡襄為諫官皆天下之望魯人石介作慶歴聖徳詩歴頌羣臣皆得其實曰維仲淹弼一䕫一契天下不以為過公既以社稷自任而仁宗責成於公與仲淹望太平於朞月之間數以手詔督公等條具其事又開天章閣召公等坐且給筆札使書其所欲為者遣中使二人更徃督之且命仲淹主西事公主北事公遂與仲淹各上當世之務十餘條又自上河北安邉十三策大畧以進賢退不肖止僥倖去宿弊為本欲漸易諸路監司之不才者使澄汰所部吏於是小人始不恱矣元昊遣使以書來稱男而不臣公言契丹臣元昊而我不臣則契丹為無敵於天下不可許乃却其使卒臣之四年七月契丹來告舉兵討元昊十二月詔冊元昊為夏國主使將行而止之以俟北使公曰若北使未至而行則事自我出既至則恩歸契丹矣從之是嵗契丹受禮雲中且發兵㑹元昊伐呆兒族於河東為近上問公曰北得無與元昊襲我乎公曰北自得幽薊不復由河東入冦者以河北平易富饒而河東嶮瘠且虞我出鎮定擣燕薊之虚也今兵出無名契丹大國决不為此就使妄動當出我不意不應先言受禮雲中也元昊本與契丹約相左右以困中國今契丹背約結好於我獨獲重幣元昊有怨言故北築威塞州以備之呆兒屢殺威塞人北疑元昊使之故為是役安能合而冦我哉或請調發為備公曰北雖不來猶欲以虚聲困我若調發正墮其計臣請任之北若入冦臣為罔上且誤國上乃止北卒不動公謂契丹異日作難必於河朔既上十三策又請守一郡行其事小人怨公不已而大臣亦有以飛語讒公者上雖不信公懼因保州賊平求為河北宣撫使以避之使將還除資政殿學士知鄆州兼京東西路安撫使讒者不已罷安撫使嵗餘讒不驗加給事中移知青州兼京東東路安撫使河朔大水民流京東公擇所部豐稔者五州勸民出粟得十五萬斛益以官廪隨所在貯之得公私廬舍十餘萬區散處其人以便薪水官吏自前資待闕寄居者皆給其禄使即民所聚選老弱病瘠者廩之山林河泊之利有可取以為生者聽流民取之其主不得禁官吏皆書其勞約為奏請使他日得以次受賞於朝率五日輒遣人以酒肉糗飯勞之出於至誠人人為盡力流民死者為大冡葬之謂之叢冡自為文祭之明年麥大熟流民各以逺近受糧而歸凡活五十餘萬人募而為兵者又萬餘人上聞之遣使勞公即拜禮部侍郎公曰救災守臣職也辭不受前此救災者皆聚民城郭中煑粥食之饑民聚為疾疫及相蹈籍死或待次數日不食得粥皆僵仆名為救之而實殺之自公立法簡便周至天下傳以為法至于今不知所活者幾千萬人矣王則據貝州叛齊州禁兵馬逹張青與姦民張握等得劒印于妖師欲以其衆叛將屠城以應則握之壻楊俊詣公告之齊非公所部恐事泄變生時中貴人張從訓銜命至青公度從訓可使即以事付從訓使馳至郡發吏卒取之無得脱者且自劾擅遣中使罪仁宗嘉之再除禮部侍郎公又懇詞不受遷資政殿大學士以明堂恩除禮部侍郎徙知鄭州又徙蔡州加觀文殿學士知河陽遷戸部侍郎除宣徽南院使判并州兼河東經畧安撫使至和二年召拜同中書門下平章事集賢殿大學士與文彦博並命宣制之日士大夫相慶於朝仁宗宻覘知之歐陽修奏事殿上上具以語修且曰古之求相者或得於夢卜今朕用二相人情如此豈不賢於夢卜也哉修頓首稱賀仁宗弗豫大臣不得見中外憂恐文彦博與公等直入問疾内侍止之不可因以監視禳禱為名乞留宿内殿事皆闗白而後行禁中肅然嘉祐三年加禮部尚書昭文館大學士監修國史公之為相守格法行故事而附以公議無心於其間故百官任職天下無事以所在民力困弊賦役不均遣使分道相視裁減謂之寛卹民力又弛茶禁以通商賈省刑獄天下便之六年丁秦國太夫人憂詔為罷春燕故事執政遇䘮皆起復公以謂金革變禮不可用於平世仁宗待公而為政五遣使起之卒不從命天下稱焉英宗即位拜樞宻使同中書門下平章事遷戸部尚書逾年以足疾求解機務章二十上拜鎮海軍節度使同中書門下平章事判河陽封祈國公公五上章辭使相且言真宗以前不輕以此授人仁宗即位之初執政欲自為地故開此例終仁宗之世宰相樞宻使罷者皆除使相有不稱職有罪者亦然天下非之今陛下初即位願立法自臣始不從神宗即位改鎮武寧軍進封鄭國公公又乞罷使相乃以為尚書左僕射觀文殿大學士集禧觀使召赴闕公以足疾固辭復判河陽熈寧元年移汝州且詔入覲以公足疾許肩輿至殿門上特為御内東門小殿見之令男紹隆入扶且命無拜坐語從容至日昃賜紹隆五品服再對上欲留公為集禧觀使力辭赴郡明年二月除司空兼侍中昭文館大學士賜甲第一區皆辭不受復拜左僕射門下侍郎同中書門下平章事公既至未見有於上前言災異皆天數非人事得失所致者公聞之歎曰人君所畏惟天若不畏天何事不可為者去亂亡無幾矣此必姦臣欲進邪說故先導上以無所畏使輔拂諫諍之臣無所復施其力此治亂之機也吾不可以不速救即上書數千言雜引春秋洪範及古今傳記人情物理以明其决不然者羣臣請上尊號及作樂上以久旱不許羣臣固請作樂公又言故事有災變皆徹樂恐上以同天節北使當上壽故未斷其請臣以為此盛徳事正當以示強敵乞并罷上壽從之即日而雨公又上疏願益畏天戒逺姦佞近忠良上親書答詔曰義忠言親理正文直苟非意在愛君志存王室何以臻此敢不置之枕席銘諸肺腑終老是戒更願公不替今日之志則天災不難弭太平可立俟也公既上疏謝復申戒不已願陛下待羣臣不以同異為喜怒不以喜怒為用捨公始見上上問邉事公曰陛下即位之始當布徳行惠願二十年口不言兵因以九事為戒八月以疾辭位拜武寧軍節度使同中書門下平章事判河南復以老請改毫州時方行青苗息錢法公以謂此法行則財聚於上人散於下且富民不願請願請者皆貧民後不可復得故持之不行而提舉常平倉趙濟劾公以大臣格新法行當自貴近者始若置而不問無以令天下乃除左僕射判汝州公言新法臣所不曉不可以復治郡願歸洛養疾許之尋請老拜司空復武寧節度及平章事進封韓國公致仕公雖居家而朝廷有大利害知無不言交趾叛詔郭逵等討之公言海嶠嶮逺不可以責其必進願詔逵等擇利進退以全王師契丹來争河東地界上手詔問公公言熈河諸郡皆不足守而河東地界决不可許元豐三年官制行改授開府儀同三司是嵗故參知政事王堯臣之子同老上言至和三年仁宗弗豫其父堯臣嘗與文彦愽劉沆及公同决大策乞立諸嗣仁宗許之㑹翊日有瘳故緩其事人無復知者以其父堯臣所撰詔草上之上以問彦博彦博言與同老合上嘉公等勲績如此而終不自言下詔以公為司徒且以其子紹京為閣門祇侯六年閏六月丙申薨于洛陽私第之正寢享年八十手封遺表使其子上之世莫知其所言者上聞訃震悼為輟視朝内出祭文遣使致奠所以賻卹其家者甚厚贈太尉謚曰文忠十一月庚申葬于河南府河南縣金谷鄉南張里公之配曰周國夫人晏氏後公四年卒子男三人曰紹庭朝奉郎曰紹京供備庫副使後公十月卒曰紹隆光禄寺丞早卒女四人長適保寧軍節度使北京留守馮京卒又以其次繼室封安化郡夫人次適承議郎范大琮次適宣徳郎范大珪孫男三人定方承事郎直清承奉郎直亮假承務郎公性至孝恭儉好禮與人言雖㓜賤必盡敬氣色穆然終身不見喜愠然以單車入不測之虜廷詰其君臣折其口而服其心無一語少屈所謂大勇者乎其好善疾惡葢出於天資常言君子小人如氷炭决不可以同器若兼收並用則小人必勝薫蕕雜處終必為臭其為宰相及判河陽最後請老家居凡三上章皆言天子無職事惟辨君子小人而進退之此天子之職也君子與小人並處其勢必不勝君子不勝則奉身而退樂道無悶小人不勝則交結構扇千跂萬轍必勝而後已小人復勝必遂肆毒於善良無所不為求天下不亂不可得也其為文章辯而不華質而不俚有文集八十巻天聖應詔集十一巻諫垣集三巻制草五巻奏議十三巻表章三十巻河北安邉策一巻奉使録四巻青州振濟策三巻平生所薦甚衆尤知名者十餘人如王質與其弟素余靖張瓌石介孫復吳奎韓維陳襄王鼎張昷之杜杞陳希亮之流皆有聞於世世以為知人元祐元年六月有詔以公配享神宗皇帝廟廷明年以明堂恩加贈太師紹庭請于朝曰先臣墓碑未立願有以寵綏之上為親篆其首曰顯忠尚徳之碑且命臣軾撰次其事謹拜手稽首而獻言曰世未嘗無賢也自堯舜三代以至于今有是君則有是臣故仁宗英宗至于神考咸有一徳克享天心則天畀以人光明偉傑有如公者觀公之行事而味其平生則三宗之盛徳可不問而知也古之人臣功髙則身危名重則謗生故命世之士罕能以功名終始者臣觀三宗所以待公全其功名而保其終始葢可謂至矣方契丹求割地上命宰相歴問近臣孰能為朕使北者皆以事辭免公獨慨然請行使事既畢上欲用公公逡廵退避不敢居而向之辭免者自耻其不行則惟公之怨比而讒公無所不至及石介為慶歴聖徳詩天下傳誦則大臣疾公如仇構以飛語必欲致之死地仁宗徐而察之盡辨其誣卒以公為相及英宗神宗之世公已老矣勲在史官徳在生民天子虚已聼公外服人民視公進退以為中國輕重然一趙濟敢摇之惟神宗日月之明知公愈深公雖請老有大政事必手詔訪問又追論定策之勲以告天下寵及其子孫然後小人不敢復議雍容進退卒為宗臣古人有言曰為君難為臣不易豈不然哉公既配食清廟宜有頌詩以昭示來世其詞曰五代八姓十有二君四十四年如絲之棼以人為嬉以殺為儇兵交兩河腥聞于天上帝憎之命我祖宗畀爾鑪錘徃銷其鋒孰謂民逺我聞其呻寧爾小忍無殘我民六聖受命惟一其心敇其後人帝命是承勿劓刵人矧敢好兵百三十年諱兵與刑惟彼北敵謂帝我驕帝聞其言折其萌芽篤生萊公尺箠笞之既服既馴則擾綏之堂堂韓公與萊相望再聘于燕北方以寧景徳元禩始盟契丹公生是嵗天命則然公之在母秦國寤驚旌旗鶴鴈降充其庭云有天赦已而生公天欲赦民公啓其𠂻北至燕然南至于河億萬維生公手撫摩水潦荐饑散流而東五十萬人仰哺于公公之在内自泉流瀕其在四方自葉流根百官維人百度惟貞相我三宗重華恊明帝謂公來隕星其堂有墳其􅉌公豈是藏維嶽降神今歸不留臣軾作頌以配崧髙趙康靖公神道碑代張文定公作宋有天下百二十有五年六聖相師專用一道曰仁不雜他術刑以不殺為能兵以不用為功財以不聚為富人以不作聰明為賢雖有絶人之材而徳不至終不大用六聖一心守之不移故自建隆以來至于今卿相大臣號多長者記人之功忘人之過含垢匿瑕犯而不校以為常徳是以四方乂安兵革不試民之戴宋有死無二自漢以來未有如今日之盛者此六聖之徳而衆長者之助也易曰師貞丈人吉詩曰雖無老成人尚有典刑書曰如有一介臣斷斷猗無他技其心休休焉其如有容人之有技若已有之人之彦聖其心好之不啻若自其口出是能容之以保我子孫黎民故太子少師趙公服事三朝四十餘年其徳合於易之所謂丈人詩之所謂老成書之所謂一介臣者公諱槩字叔平其先河朔人也徙於宋之虞城七世矣曽祖著後唐國子毛詩博士贈太師中書令妣劉氏楚國太夫人祖惠宋州楚􅉌令贈太師中書令兼尚書令韓國公妣李氏燕國太夫人父幹尚書駕部員外郎贈太師中書令兼尚書令魯國公妣張氏魯國太夫人髙氏唐國太夫人公七嵗而孤篤學自力年十七舉進士當時聞人劉筠戚綸黄宗旦皆稱其文詞必顯於時而其器識宏逺則皆自以為不及當赴禮部試楚守胡令儀醵黄金以贈之公不受天聖五年擢進士第三人授將作監丞通判海州歸見父老故人幅巾徒歩人人至其家召試學士院除著作郎集賢校理出知漣水軍公為進士時鄧餘慶守漣水館公於官舍以教其子餘慶所為多不法公謝去數月餘慶以贓敗及公為守將至或榜其所館曰豹隠堂賦者三十餘人嵗饑公勸誘冨民得米萬石所活不可勝數漣水有魚池利入公帑嵗殺魚十餘萬公始罷之作放生碑池上移守通州入為開封府推官奏事殿中賜五品服且欲以為直集賢院宰相以例不可出知洪州屬吏有鄭陶饒奭者挾持郡事肆為不法前守莫能制州有歸化兵皆故盗賊配流巳而選充者奭與郡人胡順之共造飛語以動公曰歸化兵得廪米陳惡有怨言不更給善米且有變公笑不答㑹歸化卒有自容州戍所逃還犯夜者公即斬以狥收陶下獄得其姦贓且奏徒奭歙州一郡股栗城西南隅當大江之衝水嵗為民患公建為石堤髙丈五尺長二百丈用石九千叚取之有方民不以為勞明年夏堤成而水大至度與城平恃堤以全至于今頼之遷刑部員外郎同知宗正寺出知青州改直集賢院賦稅未入中限敇縣不得輒催科是嵗夏稅先一月辦坐失舉張誥奪官罷歸起監宻州酒徙楚州糧料院以郊赦還官職知滁州山東大賊李小二過境上告人曰我東人也公嘗為青州東人愛之如父母我不忍犯遂冦廬壽犬牙不入境召修起居注朝廷欲用修玉牒久之除歐陽修起居注朝廷欲驟用修而難於躐公公聞之乃請郡自便以為天章閣待制賜三品服紏察在京刑獄遷兵部員外郎遂知制誥勾當三班院㑹郊禮當進階封且任一子京官乞以母封郡太君宰相謂公學士擬封不久矣公曰母年八十二朝夕不可期願及今以為榮許之後遂以為例改知審官院判祕閣與髙若訥同判流内銓若訥言徃嘗知貢舉聞母病不得出幾不能生公矍然即請郡以便親宰相謂公曰旦夕為學士可少待也公不聽遂除蘇州明年丁母憂服除召入翰林為學士知貢舉館伴契丹泛使遂報聘焉㑹獵于興雲山之西請公賦詩詩成契丹主親酌玉盃以勸公且以素扇授其近臣劉六符寫公詩置之懷䄂使還加侍讀學士歴右司郎中中書舍人提舉在京諸司庫務姦人冷清詐稱皇子遷之江南公曰清言不妄不可遷若詐亦不可不誅詔公與包拯雜治之得其實乃誅清李叅為河北轉運使職事辦治進秩二等且官其一子郭申錫為諫官争之曰參職事所當辦無功不可賞上怒欲罪申錫公言陛下始面諭申錫毋面從吾過今黜之何以示天下乃止以龍圖閣學士禮部侍郎知鄆州徙南京留守拜御史中丞中官鄧保吉引剰員董士燒銀禁中公力言其不可遂出之又言張茂實不宜典兵衛未行㑹公拜樞宻副使復言之乃出茂實知曹州拜參知政事方是時皇嗣未立天下以為憂仁宗始命英宗領宗正公言宗正未足為重遂與執政建言宜立為皇太子從之英宗即位遷戸部侍郎又遷吏部熈寧初遷左丞公年七十矣求去位不許章數上乃以為觀文殿學士吏部尚書知徐州遂請老不巳以太子少師致仕居睢陽十五年猶以讀書著文憂國愛君為事集古今諫争為諌林一百二十巻奏之上甚喜賜詔曰士大夫請老而去者皆以聲問不至朝廷為髙得卿所奏書知有志愛君之士雖退休山林未嘗一日忘也當置坐右以時省閱上祠南郊明堂率嘗召公陪祀毎辭以老疾間嘗一至都下亦以足疾辭不入見詔中貴人撫問二府就所館宴勞之累階至特進勲上柱國封天水郡開國公賜號推忠保徳翊戴功臣元豐初省功臣號三年官制改解特進六年正月十五日薨于永安坊里第享年八十八輟視朝一日贈太師謚康靖前作遺範以戒子孫纎悉必具以某年月日葬于宋城縣天廵鄉地與日皆公所自卜也娶李氏封汝隂郡夫人先公二十五年卒于鄆州子榮緒殿中丞郭緒將作監主簿皆早亡元緒宣徳郎公緒校書郎女二人長適光禄寺丞王力臣㓜適朝奉大夫程嗣恭孫男四人嗣徽通直郎嗣真宣徳郎嗣賢試校書郎嗣光未命曽孫男六人韡太廟齋郎餘未名公為人樂易深中恢然偉人也平生與人實無所怨怒非特不形於色而已專務掩惡揚善以徳報怨出於至誠非勉强者天下稱之庶幾漢劉寛唐婁師徳之徒云始歐陽修躐公為知制誥人意公不能平及修坐累對詔獄人莫敢為言公獨抗章言修無罪為仇人所中傷陛下不可以天下法為仇人報怨上感悟修以故得全公既老修亦退居汝南公自睢陽徃從之㳺樂飲旬日蘇舜欽為進奏院以羣飲得罪公言與㑹者皆一時名人若舉而棄之失士大夫望非朝廷福張誥以贓敗竄海上公坐貶累年而憐誥終不衰間使人至海上勞問賙給之代馮浩為鄆州吏舉按浩侵用公使錢三十萬當以浩職田租償官公曰浩吾同年也且知其貧不可以已俸償之公所為大畧如此至於敦尚義舊葬死養孤葢不可勝數余於公為里人少相善也退而老於鄉日從公㳺葢知之詳矣元緒以墓碑為請義不可以辭銘曰維古仁人仁義是圖仁近於弱義近於迂課其功利嵗計有餘在漢孝文發政之初欲以利口登進嗇夫有臣釋之實矢厥謨世謂長者綘侯相如皆訥於言有口若無豈效此子喋喋巧諛帝用感悟老成是親清浄無為鑒于暴秦歴祀四百世載其仁赫赫我宋以聖繼神於穆仁宗如嵗之春招延朴忠屏逺佞人豈獨左右刑于庶民維時趙公含徳不發如圭如璧如金如錫置之不愠用之不懌帝識其心長者之傑遂授以政歴佐三葉濟于艱難不㚄不䟦公在朝廷靖恭寡言不忮不求孰知其賢望其容貌有耻而悛薄夫以敦鄙夫以寛今其亡矣吾誰與存作此銘詩以詔後昆東坡全集巻八十七
