body:
  text: 東坡全集卷六十五宋蘇軾撰奏議一十七首乞減價糶常平米賑濟狀紹聖元年正月日端明殿學士兼翰林侍讀學士左朝奉郎知定州蘇軾狀奏勘會元祐八年河北諸路並係災傷內定州一路雖只是雨水為害然其實亦及五分以上只緣有司出納之吝不與盡實檢放秋稅內定州只放二分自臣到任後纍有人户披訴乞倚閣又緣巳過條限致難施行今體問得春夏之交人户委是闕食既非河水災傷即每事只依編敕指揮欲坐觀不救恐非朝廷仁聖本意臣欲便將常平斛斗借貸雖巳有成法不煩奏請又體問得河北沿邊人户為見朝廷昔年遣使賑濟不問人戶髙下願與不願借請一例散貸後來節次倚閣放免以此愚民生心僥幸每有借貸例不肯及時還納多是拖欠指望倚閣放免既煩鞭撻追呼使吏卒因緣為姦畢竟不免失陷官物兼約度得本州自第四等以下每户貸兩石官破十萬石不過濟得五萬戶人戶請納耗費房店宿食不過得一石五斗入口未必能濟活一家而五萬户之外人戶更不沾惠鞭撻驅催若得健吏亦不過收得十七其失陷三萬石可必也又欲抄劄飢貧奏乞法外賑濟不惟所費浩大有出無收而此聲一布飢貧雲集盜賊疾疫客主俱斃又況準條邊郡不得聚集飢民以上二事既皆不便只有依條將常平斛斗依價出糶即官司簡便不勞抄劄勘會給納煩費但得數萬石斛斗在市自然壓下物價境內百姓人人受賜古今之法莫良於此但以本州見管常平米二十七萬餘石每斗衮紐到元本一百四文比在市實直尚多二十二文以此無人收糴若不别作奏請專守本條不與減價出糶深恐今年春夏新陳不接之際必致大段流殍伏望聖慈愍念比之本州將十萬石常平米依條借貸必須失陷三萬餘石非惟所給不廣而給納驅催之弊亦多特許將本路諸州軍見管常平米契勘在市實直知委是價髙出糶不行即許每斗於衮紐價錢上減錢出糶不得減過十分之二仍給與貧民厯頭令每日零買不得令近上人戶頓買興販仍限不得糶過本州縣見管常平數目三分之一約度定州合糶得九萬石若每斗各減錢十分之二即本州紐計虧元本官錢一萬八千七十二貫文比之借貸失陷猶為省費而本州裏外出九萬石米在市則一境生靈皆荷聖恩全活又却得錢凖備將來豐熟物賤却行收糴兼利農未為惠不小者右伏乞朝廷詳酌早賜施行如以為便即乞行下本司約束覺察轄下官吏所貴人沾實惠謹録奏聞伏候敕旨貼黃契勘在市米價日長正是二月間合行出糶伏乞速賜指揮入急遞行下乞將損弱米貸與上戶令賑濟佃客狀紹聖元年二月日端明殿學士兼翰林侍讀學士左朝奉郎知定州蘇軾狀奏右臣契勘本路州軍災傷闕食人户雖巳奏準朝旨於法外減價出糶常平白米賑濟訪聞民間闕乏少得見錢糴買尚有飢困之人今點檢得定州省倉有專副杲榮趙升界熙寧八年糴到軍糧白米及專副梁儉劉受界元豐三年米皆為年深夾雜損弱不堪就整充廂軍人糧支遣每月只充廂軍次米帶支今契勘得逐次止帶支五百石比至支絶更須三五年間顯見轉至陳惡兼聞本州管下村坊客戶見今實闕餱糧其上等人户雖各有田業緣值災傷亦甚闕食難以賑濟況客戶乃主戶之本若客户闕食流散主户亦須荒廢田土矣今相度欲望朝廷詳酌特降指揮下定州將兩界見在陳損白米二萬餘石分給借貸與鄉村第一等第二等主户喫用令上件兩等人户據客户人數不限石斗依此保借候向去豐熟日依元糴例並令送納十分好白米入官不惟乘此飢年人户闕食優加賑濟又使官中却得新好白米充軍糧支遣及免年深轉至損壞盡為土壤如以為便即乞速賜指揮行下謹録奏聞伏候敕旨貼黃今來巳是春深正當春夏青黃不交之際可以發脫上件陳米斛斗公私俱便若失此時則人户必不願請不免守支積年化為糞壤乞斷自朝廷早賜指揮入急遞行下更不下有司往復勘會今來所乞借貸皆是臣與官吏體問上戶願得此米以濟佃戶將來必無失陷與尋常賑貸一例支與貧下戶人催納費力事體不同乞早賜行下乞降度牒修北嶽廟狀紹聖元年三月日端明殿學士兼翰林侍讀學士左朝奉郎知定州蘇軾狀奏右臣伏見定州曲陽縣北嶽安天元聖帝廟建造年深屋宇頽弊自熙寧間因守臣薛向奏請止曾完葺正殿自餘諸殿及廊廡門宇墻垣久巳疏漏破損前後纍有守臣監司奏陳乞給賜錢或降度牒修完皆準省符止令依條以施利錢物充用緣近嵗民間屢值災歉施利微薄只了得遞年逐旋些小修補後來劉奉世又乞依薛向例於安撫司回易息錢內支錢三千貫助修嶽廟亦不蒙朝廷允許深慮摧壞日多為費滋大今據定州申檢計到合用工料價錢三千三百餘貫乞降空名度牒一十五道賣錢支用如朝廷不許降度牒即本廟有銀器一千三百餘兩别無使用欲乞依令出賣收買材植臣契勘上件銀器元係朝廷給賜以備供神之物若行出賣恐於事體有損況所費錢數不多欲望聖慈特依定州所乞數目給降度牒付本州出賣應副修造庶得廟宇稍完不致破壞仍令本州通判兩員更互到彼提舉催促務要早令了畢上副朝廷崇奉之意謹録奏聞伏候敕旨貼黃臣伏以朝廷崇奉五嶽禮極嚴備凡有祈禱多獲感應今北嶽廟見弊陋理當完葺蓋所用度牒道數至少伏望特賜指揮施行庶稱朝廷尊事嶽廟之意上皇帝書臣軾謹昧死再拜皇帝陛下臣伏以今月初五日南至文武百僚入賀所以賀一陽來復也謹按易復卦雷在地中復先王以至日閉關商旅不行后不省方説易者曰乾六陽之氣也為十一月為十二月為正月為二月為三月為四月而乾之陽復矣陽極則隂生隂生則夏至矣坤六隂之氣也為五月為六月為七月為八月為九月為十月而坤之隂極矣隂極則陽生陽生則冬至矣自太極分為二儀二儀分為四象四象分為十二月十二月分為三百六十五日五日為一候分為七十二候三候為一氣分為二十四氣上為日月星辰下為山川草木鳥獸蟲魚不出此隂陽之氣升降而已惟人也全天地十干之氣十月而成形故能天能地能人一消一息一呼一吸晝夜與天地相通差舛毫忽則邪沴之氣干之矣故於冬至一陽之生也五隂在上五陽在伏而一陽初生於伏之下其氣至微其兆絪緼可以靜而不動可以嗇養而不可以發宣故乾之初九爻曰濳龍勿用孔子曰陽在下也言陽氣方濳於下未可以用也先王於是日閉關商旅不行后不省方關者門戶所由以闔闢也商旅者動以利心也后者凡居人上者謂之羣后所以治事者也方者事也門户不開則微陽閉而不出也利心不動則外物感而不應也方事不省則視聽收而不發也先王奉若天道如此之密用之於國則安靜而不勞用之於身則沖和而不竭昔者伏羲神農黃帝堯舜皆得此道臣敢因至日以獻伏乞聖慈留神省覽實社稷無強之福任兵部尚書乞外郡劄子臣向在揚州蒙恩除臣今任臣於本州及沿路附遞入文字辭免準聖旨劄子指揮為已差充鹵簿使大禮日迫不許遷延臣以此不敢堅辭尋於南京附遞奏乞候過南郊依前除臣一郡今來已過郊禮伏乞檢會纍次奏狀除臣知越州一次取進止辭兩職并乞郡劄子臣近奏乞越州伏蒙聖恩降詔不允續準閣門告報已除臣端明殿學士兼翰林侍讀學士守禮部尚書聞命悸恐不知所措臣本以寵祿過分衰病有加故求外補實欲自便而榮名驟進兩職薦加不獨於臣有非據之羞亦恐朝廷無以待有勞之士豈徒內愧必致人言伏望聖慈特賜追寢仍乞檢會前奏除臣一郡若越州無闕乞自朝廷除授取進止第二劄子臣近奏乞辭免端明殿學士兼翰林侍讀學士守禮部尚書恩命仍乞檢會前奏除臣一郡蒙降詔不允聖恩隆厚天旨丁寧顧臣何人敢守微意但本緣請外更蒙升擢兼帶兩職近嵗所無有何勞能被此光寵欲乞追寢新命令臣且依舊供職則臣更不敢請郡若朝廷必欲臣受此職名即乞除臣一重難邊郡令臣盡力報稱猶可少安臣非敢自謂知兵若朝廷有開邊伐國之謀求深入敢戰之帥則非臣所能辦若欲保境安民宣布威信使吏士用命無所失亡則承乏之際猶可備數伏望朝廷於此二者擇一以處臣非獨在臣分義當然亦朝廷名器不為虛授取進止辭免兼侍讀劄子臣近準閣門告報已降告命除臣兼侍讀者臣以迂愚本無學術出從吏役益復空疏竊位禁林巳難久處而況天縱之學已集大成非臣孱微所可仰望伏望聖慈追寢成命以授能者所有告命未敢祗受取進止赴英州乞舟行狀臣軾言近準誥命落兩職追一官謫守嶺南小郡臣尋火急治裝星夜上道今已行次濠州而自聞命已來憂悸成疾兩目昏障僅分道路左手不仁右臂緩弱六十之年頭童齒豁疾病如此理不久長而所負罪名至重上孤恩義下愧平生悸傷血氣憂隔飲食所以疾病有加無瘳加以素來不善治生祿賜所得隨手耗盡道路之費囊槖巳空臣本作陸行日夜奔馳速於赴任而疾病若此資用不繼英州接人卒未能至定州送人不肯前去雇人買馬之資無所從出道盡塗窮譬如中流失舟抱一浮木恃此為命而木將沉臣之哀危亦云極矣竊伏思念得罪以來三改謫命聖恩保全終付一郡豈期聖主至仁至明尚念八年經筵之舊臣意欲全其性命乎臣若強衰病之餘生犯三伏之毒暑陸走災荒四千餘里則僵仆中途死於逆旅之下理在不疑雖罪纍之重不足多惜而死非其道則非仁聖不殺全育之意也輒已分散骨肉令長子帶往近地躬耕就食臣只帶家屬數人前去汴泗之間乘舟泛江倍道而行至南康軍出陵赴任所貴醫藥粥食不至大段失所臣竊揣自身多病早衰氣息僅屬必無生還之道然尚延晷刻於舟中畢餘生於治所雖以瘴癘死於嶺表亦所甘心比之陸行斃於中道藁葬路隅常為羈鬼則猶有間矣恭惟聖主之德下及昆蟲以臣曾經親近任使必不欲置之死地所以輒為舟行之計敢望天慈少加憫惻臣無任乞越州劄子臣自去嵗蒙恩召還即時奏乞越州蓋為臣從仕以來三任浙中粗知土俗所宜易於為政又以老病日加切於歸休舊有薄田在常州宜興縣久荒不治欲因赴任到彼少加完葺以為歸計越雖僻陋在臣安便及近者蒙恩知定州雖寵眷隆異而自早衰多難心力疲耗實非所堪但以求州得州若便辭免是有揀擇所以勉強拜命今復念定雖重鎮了無邊警事權雄重祿賜優厚若辭定乞越於義無嫌伏望聖慈察臣至情特賜改差臣越州一次則公私皆便臣不勝幸甚取進止再薦趙德麟狀任兵部尚書日右臣昨知潁州曾薦僉書本州節度判官廳公事趙令畤乞置之館閣至今未蒙施行其人近已替罷旦夕赴闕朝見計其所養必不肯同衆人奔走干謁恐政府大臣無緣得知其所學今繕寫趙某平日與臣詩文三軸進呈伏望聖慈清宴之暇一賜觀覽必有可取然後付之三省近臣考其人才亦足以副神考教養宗子之意謹具奏聞論浙西閉糴狀本路今嵗不熟初水後旱早晚俱傷髙下並損巳具事由聞奏去訖勘會本路唯蘇湖常秀等州出米浩瀚常飽數路漕輸京師自杭睦以東衢婺等州謂之上鄉所産微薄不了本土所食里諺云上鄉熟不抵下鄉一鍋粥蓋全仰蘇秀等州商旅販運以足官私之用今來雖一例災傷而蘇秀等州所産終是滂沛訪聞逐州例皆閉糴嚴立賞罰不許米斛出境是致杭州常平省倉糴買不行民亦闕食見今粳米已至八九十足錢尋具牒蘇秀等州不得閉糴訪問逐州雖承受本司指揮依舊閉糴尋差識字公人陳宥往秀州抄録到所出榜示二本其大略云如有諸色人擡價買米販往别州許人告提立定賞多者至五十貫兼取問得杭州米行人狀稱因逐州見今立賞告捉私販全無米船到州認是逐州官吏堅意閉糴本司無緣止絶若商旅不行米貴不已公私窘乏賊盜之類何所不有以此合係本司知管除已牒轉運提刑司外須至奏聞者右本司訪聞得浙中父老皆言熙寧七八年兩浙災傷人死太半當時雖係天時不熟亦是本路監司郡守如張靚沈起之流處置乖方助成災變既無方略賑濟惟務所在閉糴蘇秀等州米斛既不到杭杭州又禁米不得過浙東是致人心驚危有停塌之家亦皆深藏固惜不肯出糶民有衣被羅紈戴佩珠金而米不可得斃於道路不可勝數流殍之變古今罕聞伏望仁聖痛加哀憐曲賜過慮體念今來浙中雖未是大段凶年只恐官吏有失措置漸成災患所憂不小若商旅不行米貴不巳農夫闕食春夏之交無力種則明年災傷公私並竭不知何以待之伏望聖慈深以熙寧之事為鑑嚴賜指揮本路監司多方擘畫安之於未動救之於未危仍乞指揮速行止絶逐州閉糴所貴杭睦衢婺等州不至全然乏食謹録奏聞伏候敕旨再論閉糴狀本路災傷本司巳兩次奏聞竊見比年以來京東河北淮南等處災傷並蒙朝廷支賜錢米或於他路截撥斛斗賑救數目至廣今來本路災傷不敢便望支賜截撥只乞稍寬轉運司年額上供使得轉換擘畫多方救恤巳於十一月十日奏乞至今未奉指揮數內一事蘇湖常秀等州見今米商全不通行不唯逐州立賞閉糶亦為逐處稅務承例違條收米斛力勝稅錢是致商旅算計腳錢本重無由興販檢會元祐編敕諸興販斛斗及以柴炭草木博糧食者並免納力勝稅錢注云舊收稅處依舊例即災傷地分雖有舊例亦免本司看詳本路見今災傷正合施行上條巳牒諸州施行仍散榜轄下城郭鄉村外深慮逐處稅務自來收米斛力勝處指為課額今來雖係災傷合依上條放免至年終比較日轉運司不容如此分説有虧欠例遭責罰須至奏請者右伏望聖慈愍念本路災傷及前件放免力勝條貫係今來合行事件特賜指揮轉運司將來年終比較日除米斛力勝一項稅額權免比較科罰候將來豐熟日依舊所貴商旅通行埸務亦免罪責謹録奏聞伏候敕旨乞允文彥博等辭避免拜劄子臣近奉聖旨撰賜文彥博吕公著今後入朝免拜詔書今又準內降指揮撰不允彥博辭避免拜批答臣謹按禮經八十拜君命一坐再至所謂拜君命者傳命而拜非朝見也然且不免周天子賜齊桓公胙曰伯父耋老無下拜公曰天威不違顔咫尺下拜登受所謂無下拜者拜於堂上非不拜也然且不敢鍾繇以足疾乘車就坐疑若不拜然亦無明文君前乘車豈足為法而馬燧延英不拜蓋是臨時優禮無今後遂不復拜之文祖宗舊例如吕端之流以老病進對亦止於臨時傳宣不拜今來彥博公著今後免拜指揮自是朝廷優賢貴老度越古今無可議者但臣是有司合守典禮兼恐彥博公著終不敢當以臣愚見不若允其所請若聖恩優閔老臣眷眷不已遇其朝見間或傳宣不拜足以為非常之恩臣忝備侍從懷有所見不敢不盡所有不允批答臣未敢撰取進止御寶批依奏修撰允所請批答進入乞允安燾辭免轉官劄子臣今月八日凖內批安燾辭免轉右光祿大夫劄子降詔不許臣竊謂人主之馭羣臣專以禮義廉恥若使受無名之寵則為待臣子之輕今朝廷豈以執政六人五人進用故加遷秩以慰其心燾位冠西樞委寄至重豈肯見人擢用即以介懷既無授受之名僅似姑息之政縱有先朝故事亦是一時誤恩今燾力辭正為知義臣欲奉命草詔不知所以為詞伏望聖慈從其所請若除受别有緣故即乞明降指揮茍於義稍安敢不撰進取進止御寶批可且用一意度作不許辭免詔書進入乞允宗晟辭免起復恩命劄子臣今日凖中書省批送到宗晟辭免起復恩命劄子奉聖旨送學士院降詔不允謹按宗晟飭行有素持喪中禮所辭恩命已四不允而宗晟確然固守其辭愈哀且曰念臣執喪報親之日短致命徇國之日長出于至誠可謂純孝臣謂宗晟未經祥練之變且無金革之虞孝治之朝宜聽所守因以風厲宗室庶皆守禮篤親顧不美哉若以宗正之任恐難其人亦當差官權攝須其從吉復以命之臣忝備禁從不敢不言所有不允詔書臣未敢撰取進止乞致仕表臣軾先自端明殿學士兼翰林侍讀學士朝奉郎定州路安撫使蒙恩落職降授承議郎知英州遂貶寧逺軍節度副使惠州安置經涉四年蒙恩責授瓊州别駕昌化軍安置又三年半該陛下登極大赦量移亷州安置又經皇子赦恩移舒州團練使永州居住臣以老病久伏瘴毒頓仆道塗未至永州特蒙聖恩復授臣朝奉郎提舉成都府玉局觀外州軍任便居住臣素有薄田在常州宜興縣粗了饘粥所以﨑嶇萬里奔歸常州以盡餘年而臣人微罪重骨寒命薄難以受陛下再生之賜於五月間行至真州瘴毒大作乘船至潤州昏不知人者纍日今已至常州百病橫生四肢腫滿渴痟唾血全不能食者二十餘日矣自料必死臣今行年六十有六死亦何恨但草木昆蟲貪生之意尚復留戀聖世以辭此寵祿或可茍延嵗月欲望朝廷哀憐特許臣守本官致仕臣無任東坡全集卷六十五
