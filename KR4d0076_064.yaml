body:
  text: 東坡全集卷六十四宋蘇軾撰奏議一十首奏馬徹不當屏出學狀元祐八年四月日端明殿學士兼翰林侍讀學士左朝奉郎守禮部尚書蘇軾狀奏準太學條三學生凡有進獻文字及書啓贄有位並先經長二看詳可否違者出學右本部看詳諸色人茍有所見公私利害皆得進狀許直於所屬官司投下即無更令官吏看詳可否方得投進之文所以達聰明防壅蔽古今不易之道也本因國子監生員獨緣本監起請遂立上條曲生防禁至於投獻書啓文字求知公卿此正舉人常事今乃使本監長二先行看詳違者皆屏出學若論列朝政得失使其言當理固人主所欲聞也若不當理亦人主所當容也今乃先令有司看詳去取甚非子産不毁鄉校魏相去副封之意也去年九月內太學內舍生馬徹進狀論禮部韻略有疏略未盡事件蒙朝廷送下本部謹按徹所論文指雅馴考驗經史皆有援據此乃內舍生員之優者教養之官所當愛惜而其所論亦當下有司詳議增損施行本部尋下本監勘當準回申巳於十二月內檢舉上條其馬徹已屏出學以此顯見上條無益有害欲乞朝廷詳酌特與刪除不行仍乞依舊令馬徹充內舍生其所進狀乞行下有司看詳如有可采乞賜施行謹録奏聞伏候敕旨乞校正陸贄奏議上進劄子元祐八年五月七日端明殿學士兼翰林侍讀學士左朝奉郎守禮部尚書蘇軾同吕希哲吳安詩豐稷趙彥若范祖禹顧臨劄子奏臣等猥以空疏備員講讀聖明天縱學問日新臣等才有限而道無窮心欲言而口不逮以此自愧莫知所為竊謂人臣之納忠譬如醫者之用藥藥雖進於醫手方多傳於古人若已經效於世間不必皆從於巳出伏見唐宰相陸贄才本王佐學為帝師論深切於事情言不離於道德智如子房而文則過辨如賈誼而術不疏上以格君心之非下以通天下之志三代以還一人而巳但其不幸仕不遇時德宗以苛刻為能而贄諫之以忠厚德宗以猜疑為術而贄勸之以推誠德宗好用兵而贄以消兵為先德宗好聚財而贄以散財為急至於用人聽言之法治邊馭將之方罪巳以收人心改過以應天道去小人以除民患惜名器以待有功如此之流未易悉數可謂進苦口之藥石針害身之膏肓使德宗盡用其言則貞觀可得而復臣等每退自西閣即私相告言以陛下聖明必喜贄議論但使聖賢之相契即如臣主之同時昔馮唐論頗牧之賢則漢文為之太息魏相條鼂董之對則孝宣以致中興若陛下能自得師莫若近取諸贄夫六經三史諸子百家非無可觀皆足為治但聖言幽逺末學支離譬如山海之崇深難以一二而推擇如贄之論開卷了然聚古今之精英實治亂之龜鑑臣等欲取其奏議稍加校正繕寫進呈願陛下置之坐隅如見贄面反覆熟讀如與贄言必能發聖性之髙明成治功於嵗月臣等不勝區區之意取進止辨黃慶基彈劾劄子元祐八年五月十九日端明殿學士兼翰林侍讀學士左朝奉郎守禮部尚書蘇軾劄子奏臣自少年從仕以來以剛褊疾惡盡言孤立為纍朝人主所知然亦以此見疾於羣小其來久矣自熙寧元豐間為李定舒亶輩所讒及元祐以來朱光庭趙挺之賈易之流皆以誹謗之罪誣臣前後相傳專用此術朝廷上下所共明知然小人非此無以深入臣罪故其計須至出此今者又聞臺官黃慶基復祖述李定朱光庭賈易等舊説亦以此誣臣并言臣有妄用潁州官錢失入尹真死罪及強買姓曹人田等雖知朝廷巳察其姦罷黜其人矣然其間有關臣子之大節者於義不可不辨謹具畫一如左一臣先任中書舍人日適值朝廷竄逐大姦數人所行告詞皆是元降詞頭所述罪狀非臣私意所敢增損內吕惠卿自前執政責授散官安置誅罰至重當時蒙朝旨節録臺諫所言惠卿罪惡降下既是詞頭所有則臣安敢減落然臣子之意以為事涉先朝不無所忌故特於告詞內分别解説令天下曉然知是惠卿之姦而非先朝盛德之纍至於竄逐之意則巳見於先朝其略曰先皇帝求賢若不及從善如轉圜始以帝堯之心姑試伯鯀終然孔子之聖不信宰豫發其宿姦謫之輔郡尚疑改過稍畀重權復陳罔上之言繼有碭山之貶反覆教戒惡心不悛躁輕矯誣德音猶在臣之愚意以謂古今如鯀為堯之大臣而不害堯之仁宰豫為孔子髙弟而不害孔子之聖又況再加貶黜深惡其人皆先朝本意則臣區區之忠蓋自謂無負矣今慶基乃反指以為誹謗指斥不亦矯誣之甚乎其餘所言李之純蘇頌劉誼唐義問等告詞皆是慶基文致附會以成臣罪只如其間有勞來安集四字便云是厲王之亂若一一似此羅織人言則天下之人更不敢開口動筆矣孔子作孝經曰如臨深淵如履薄氷此幽王之詩也不知孔子誹謗指斥何人乎此風萌於朱光庭盛於趙挺之而極於賈易今慶基復宗師之臣恐隂中之害漸不可長非獨為臣而言也一慶基所言臣行陸師閔告詞云侵漁百端怨讟四作亦謂之謗訕指斥此詞元不是臣行中書案底必自有主名可以覆驗顯是當時掌誥之臣凡有竄逐之人皆似此罪狀其事非獨臣也所謂侵漁怨讟者意亦指言師閔而巳何名為謗訕指斥乎慶基以他人之詞移為臣罪其欺罔類皆如此一慶基所言臣妄用潁州官錢此事見蒙尚書省勘會次然所用皆是法外支賞令人告捕強惡賊人及逐急將還前知州任內公使庫所少貧下行人錢物情理如此皆可覆驗一慶基所言臣強買常州宜興縣姓曹人田地八年州縣方與斷還此事元係臣任團練副使日罪廢之中託親識投狀依條買得姓曹人一契田地後來姓曹人却來臣處昏賴爭奪臣即時牒本路轉運司令依公盡理根勘仍便具狀申尚書省後來轉運司差官勘得姓曹人招服非理昏賴依法決訖其田依舊合是臣為主牒臣照會臣愍見小民無知意在得財臣既備位侍從不欲與之計較曲直故於招服斷遣之後却許姓曹人將元價收贖仍亦申尚書省及牒本路施行今慶基乃言是本縣斷還本人顯是誣罔今來公案見在户部可以取索案驗一慶基所言臣在潁州失入尹真死罪此事巳經刑部定奪不是失入却是提刑蔣之翰妄有按舉公案具在刑部可以覆驗右臣竊料慶基所以誣臣者非一臣既不能盡知又今來朝廷巳知其姦妄而罷黜其人臣不當一一辨論但人臣之義以名節為重須至上煩天聽取進止謝宣諭劄子元祐八年五月二十四日端明殿學士兼翰林院侍讀學士左朝奉郎守禮部尚書蘇軾劄子奏臣伏準今月二十二日弟門下侍郎轍奉宣聖旨緣近來衆人正相捃拾令臣且須省事者天慈深厚如訓子孫委曲保全如愛肢體感恩之涕不覺自零伏念臣才短數竒性疏少慮半生犯患垂老困讒非二聖之深知雖百死而何贖伏見東漢孔融才疏意廣負氣不屈是以遭路粹之寃西晉嵇康才多識寡好善暗人是以遇鍾會之禍當時為之扼腕千古為之流涕臣本無二子之長而兼有昔人之短若非陛下至公而行之以恕至仁而照之以明察消長之往來辨利害於疑似則臣已下從二子遊久矣豈復有今日哉謹當奉以周旋不敢失墜便須刻骨豈獨書紳庶全螻蟻之軀以報丘山之德臣無任感天荷聖激切屏營之至謹奏奏乞增廣貢舉出題劄子元祐八年五月二十六日端明殿學士兼翰林侍讀學士左朝奉郎守禮部尚書蘇軾劄子奏臣伏見元祐貢舉敕諸詩賦論題於子史書出唯不得於老莊子出如於經書出而不犯見試舉人所治之經者亦聽謂如引試治詩書舉人即聽於易春秋經傳出詩賦論題引試治易春秋舉人即聽於周禮禮記出詩賦論題之類臣竊謂自來詩賦論題雜出於九經孝經論語注中文字浩博有可選擇久而不窮今詳上條止得於子史書出所取者狹雖聽於經書出又須不犯見試舉人所治之經如是在京試院分經引試可以就别經出題至如外州軍只作一埸引試即須回避只如子史中出恐非經久之法臣今相度欲乞詩賦論題許於九經孝經論語子史并九經論語注中雜出更不避見試舉人所治之經但須於所給印紙題目下備録上下全文并注疏不得漏落則本經與非本經舉人所記均一更無可避兼足以稱朝廷待士之意本只以工拙為去取不以不全之文掩其所不知以為進退於忠厚之風不為無補取進止申省議讀漢唐正史狀元祐八年八月十九日端明殿學士兼翰林侍讀學士左朝奉郎守禮部尚書蘇軾同顧臨趙彥若狀申昨準內降宰臣吕大防劄子奏臣每旬獲侍經筵竊見進讀五朝寶訓將欲了畢自來多用前代正史進讀竊謂其間有不足上煩聖覽者欲乞指揮講讀官同將漢唐正史內可以進讀事迹鈔節成篇遇讀日進呈敷演庶裨聖治取進止奉御寶批依奏右軾等今巳鈔節繕寫稍成卷秩於將來開講日進讀即未審與五朝寶訓並進為復間日一讀謹具申尚書省伏候指揮朝辭赴定州論事狀元祐八年九月二十六日端明殿學士兼翰林侍讀學士左朝奉郎新知定州蘇軾狀奏右臣聞天下治亂出於下情之通塞至治之極至於小民皆能自通大亂之極至於近臣不能自達易曰天地交泰其詞曰上下交而其志同又曰天地不交否其詞曰上下不交而天下無邦夫無邦者亡國之謂也上下不交則雖有朝廷君臣而亡國之形巳具矣可不畏哉臣不敢復引衰世昏主之事只如唐明皇中興刑措之君也而天寶之末小人在位下情不通則鮮于仲通以二十萬人全軍陷沒於瀘南明皇不知馴致其事至安祿山反兵巳過河而明皇猶以為忠臣此無他下情不通耳目壅蔽則其漸至於此也臣在經筵數論此事陛下為政九年除執政臺諫外未嘗與羣臣接然天下不以為非者以謂垂簾之際不得不爾也今者祥除之後聽政之初當以通下情除壅蔽為急務臣雖不肖蒙陛下擢為河北西路安撫使沿邊重地此為首冠臣當悉心論奏陛下亦當垂意聽納祖宗之法邊帥當上殿面辭而陛下獨以本任闕官迎接人衆為詞降旨拒臣不令上殿此何義也臣若伺侯上殿不過更留十日本任闕官自有轉運使權攝無所闕事迎接人衆不過更支十日糧有何不可而使聽政之初將帥不得一面天顔而去有識之士皆謂陛下厭聞人言意輕邊事其兆見於此矣臣備位講讀日侍帷幄前後五年可謂親近方當戍邊不得一見而行況疏逺小臣欲求自通亦難矣易曰天行健君子以自強不息又曰帝出乎震相見乎離夫聖人作而萬物覩今陛下聽政之初不行乘乾出震見離之道廢祖宗臨遣將帥故事而襲行垂簾不得巳之政此朝廷有識所以驚疑而憂慮也臣不得上殿於臣之私别無利害而於聽政之始天下屬目之際所損聖德不小臣巳於今月二十七日出門非敢求登對然臣始者本俟上殿欲少效愚忠今來不敢以不得對之故便廢此言惟陛下察臣誠心少加採納古之聖人將有為也必先處晦而觀光處靜而觀動則萬物之情畢陳于前不過數年自然知利害之真識邪正之實然後應物而作故作無不成臣敢以小事譬之夫操舟者常患不見水道之曲折而水濱之立觀者常見之何則操舟者身寄於動而立觀者常靜故也奕碁者勝負之形雖國工有所不盡而袖手旁觀者常盡之何則奕者有意於爭而旁觀者無心故也若人主常靜而無心天下其孰能欺之漢景帝即位之初首用鼂錯更易法令黜削諸侯遂成七國之變景帝往來兩宫間寒心者數月終身不敢復言兵武帝即位未幾遂欲用兵鞭撻四夷兵連禍結三十餘年然後下哀痛詔封宰相為富民侯臣以此知古者英睿之君勇於立事未有不悔者也景帝之悔速故變而復安武帝之悔遲故幾至於亂雖遲速安危小異然比之常靜無心終始不悔如孝文帝者不可同年而語矣今陛下聖智絶人春秋鼎盛臣願虛心循理一切未有所為默觀庶事之利害與羣臣之邪正以三年為期俟得利害之真邪正之實然後應物而作使既作之後天下無恨陛下亦無悔上下同享太平之利則雖盡南山之竹不足以紀聖功兼三宗之壽不足以報聖德由此觀之陛下之有為惟憂太早不患稍遲亦已明矣臣又聞為政如用藥方今天下雖未大治實無大病古人云有病不治常得中醫雖未能盡除小疾然賢於誤服惡藥覬萬一之利而得不救之禍者逺矣臣恐急進好利之臣輒勸陛下輕有改變故輒進此説敢望陛下深信古語且守中醫安穩萬全之䇿勿為惡藥所誤實社稷宗廟之利天下幸甚臣不勝忘身憂國之心冒死進言謹録奏聞伏候敕旨乞降度牒修定州禁軍營房狀元祐八年十月日端明殿學士兼翰林侍讀學士左朝奉郎知定州蘇軾狀奏臣伏見定州近嵗軍政不嚴邊備小弛事不可悉數請舉一二如甲仗庫子軍人張全一年之間持仗入庫前後盜銅鑼十二面監官明知並不申舉又有帳設什物庫子軍人田平等二年之間盜帳設什物八百餘件銀二百五十餘兩恣意典賣軍城寨人户採斫禁山開耕為田公然起稅住坐者一百八十餘家城中有開匱坊人百餘户明出牌榜召軍民賭博若此之類未易悉數是致法令不行禁軍日有逃亡聚為盜賊民不安居臣到任以來備見其事然不欲驟行峻治但因事行法無所貸捨其上件張全田平等皆以付獄按治侵斫禁山人逐次舉覺依法勘斷張德等九人其多年侵耕巳成永業者别作擘劃處置申樞密院次開匱坊人出榜召人告捉有王京等四十家陳首改業其餘並走出州界軍民自此稍知有朝廷法令逃軍衰少賊盜亦稀臣近令所辟幕官李之儀孫敏行遍往諸營點檢據逐官回申營房大段損壞不庇風雨非惟久不修葺蓋是元初創造材植怯弱人工因循多是兩椽小屋偷地蓋造椽柱腐爛大半無瓦一牀一竈之外轉動不得之儀等又點檢得諸營軍號例皆暗敝妻子凍餒十有五六臣尋體問得蓋是將校不法乞取斂掠坐放債負身既不正難以戢下是致諸軍公然飲博踰濫三事不禁雖上禁軍無不貧困輕生犯法靡所不至若不按發其太甚者無以警衆革弊巳體量得雲翼指揮使孫貴到營四箇月前後斂掠一十一度計入巳贓九十八貫八百文巳送司理院枷項限勘去訖臣既目覩偷弊理合葺治犯法之人絲毫無貸即須恤其有無同其苦樂豈可身居大厦而使士卒終年處於偷地破屋之中上漏下濕不安其家輒巳差將官李巽錢春卿劉世孫將帶人匠遍詣諸營逐一檢計合修去處具合用材料人工估見的確錢數仍差本司凖備勾當供奉官石異躬親再行覆檢到除與逐將所檢合修營房間架材木等並同外又據本官檢料到更合修蓋營房一十六間謹具畫一奏聞如後一河北第一將檢計到本將下所管定州住營馬步禁軍八指揮合行修蓋營房共四千一百一十七間據合用材植物料紐估到計使價錢一萬七千六百九貫六百八十文省一河北第二將檢計到本將下所管定州住營馬步禁軍八指揮合行修蓋營房共三千七百二十間據合用材植物料紐估到計使價錢一萬五千五貫二百八十一文省一檢計到不𨽻將下所管定州營步軍振武第四十五指揮合行修蓋營房一百一十八間并合添井眼據合用材植物料紐估到計使價錢五百五十八貫一百六十七文省一本司準備勾當供奉官石異檢料更合修蓋第一第二將下諸軍營房共一十六間據合用材植物料紐估到計使價錢七十四貫六百一十二文省右謹件如前臣竊謂上件合用錢數雖當破係省錢又緣河北轉運司近年財賦窘迫必難支破伏望聖慈深念河朔為諸路要重而定武控扼強鄰又為河北屏捍所屯兵馬理當加意葺治其上件營房不可不於今年秋冬便行修蓋欲乞特出聖斷支賜空名度牒一百七十一道委本司召人出賣一面置埸和買材料燒造磚瓦和雇人匠節次不住修蓋施行所有逐將及本司準備勾當官石異檢計到諸軍合蓋營房間架材植物料等細數文狀四本繳進在前謹録奏聞伏候敕旨貼黃勘會度牒一百七十一道係將前項檢計到的確物料錢數契勘合用道數外計剩錢五十二貫二百五十八文欲乞就整支降乞增修弓箭社條約狀二首元祐八年十一月十一日端明殿學士兼翰林院侍讀學士左朝奉郎知定州蘇軾狀奏臣竊見契丹久和河朔無事沿邊諸郡軍政少弛將驕卒惰緩急恐不可用武藝軍裝皆不逮陜西河東逺甚雖據即目邊防事勢三五年間必無警急然居安慮危有國之常備事不素講難以應猝今者河朔沿邊諸軍未嘗出征終年坐食理合富強臣近遣所辟幕官李之儀孫敏行親入諸營按視曲折審知禁軍大率貧窘妻子赤露飢寒十有六七屋舍大壞不庇風雨體問其故蓋是將校不肅斂掠乞取坐放債負習以成風將校既先違法不公則軍政無緣修舉所以軍人例皆飲博踰濫三事不止雖是禁軍不免寒餓既輕犯法動輒逃亡此豈久安之道貼黃所謂軍政不修皆有實狀不敢一一奏聞臣自到任漸次申嚴軍法逃軍盜賊已覺衰少年嵗之間庶革此風然臣竊謂沿邊禁軍緩急終不可用何也驕惰既久膽力耗憊雖近戍短使輒與妻孥泣别被甲持兵行數十里即便喘汗臣若嚴加訓練晝夜勤習馳驟坐作使耐辛苦則此聲先馳契丹疑畏或致生事臣觀祖宗以來沿邊要害屯聚重兵止以壯國威而消敵謀蓋所謂先聲後實形格勢禁之道耳若進取深入交鋒兩陳猶當雜用禁旅至於平日保境備禦小事即須專用極邊土人此古今不易之論也鼂錯與漢文帝畫備邊䇿不過二事其一曰徙逺方以實廣虛其二曰制邊縣以備敵寶元慶厯中趙元昊反屯兵四十餘萬招刺宣毅保捷二十五萬人皆不得其用卒無成功范仲淹劉滬种世衡等專務整緝蕃漢熟户弓箭手所以封殖其家砥礪其人者非一道藩籬既成賊來無所得故元昊復臣今河朔西路被邊州軍自澶淵講和以來百姓自相團結為弓箭社不論家業髙下户出一人又自相推擇家資武藝衆所服者為社頭社副録事謂之頭目帶弓而鋤佩劍而樵出入山坂飲食長技與契丹同私立賞罰嚴於官府分畨巡邏鋪屋相望若透漏北人及本土強盜不獲其當畨人皆有重罰遇有緊急擊鼓集衆頃刻可致千人器甲鞍馬常若有警蓋親戚墳墓所在人自為戰敵甚畏之體問得元豐二年北界羣賊一火約二十餘人在兩界首不住打劫為患久不敗獲有北平軍大悲村本社頭目冉萬冉升及長行冉捷等部領社人與北賊鬬敵趕趂捉殺直至北界地名北當山峪內被冉萬射中賊頭徐德冉捷趕上斫獲首級并冉升亦斫到第二賊頭賈貴本路保明申奏朝廷並巳於班行內安排以此知弓箭社人户驍勇敢戰緩急可用先朝名臣帥定州者如韓琦龎籍皆加意拊循其人以為爪牙耳目之用而籍又增損其約束賞罰奏得仁宗皇帝聖旨見今具存貼黃所有龎籍奏得聖旨已具録繳連在前昨於熙寧六年行保甲法凖當年十二月四日聖旨強壯弓箭社並行廢罷又至熙寧七年再準正月十九日中書劄子聖旨應兩地供輸人戶除元有弓箭社強壯義勇之類並依舊存留外更不編排保甲看詳上件兩次聖旨除兩地供輸村分方許依舊置弓箭社其餘並合廢罷雖有上件指揮公私相承元不廢罷只是令弓箭社兩丁以上人户兼充保甲以致逐捕本界及化外盜賊並皆驅使弓箭社人戶向前用命捉殺貼黃前項所奏元豐二年冉萬等捉殺北賊係熙寧六年朝旨廢罷後兼冉萬等不係兩地供輸是合行廢罷地分人户見今州縣委實全藉此等寅夜防把顯見弓箭社實為邊防要用其勢決不可廢但以兼充保甲之故召集追呼勞費失業今雖名目具存責其實用不逮往日臣竊謂陜西河東弓箭手官給良田以備甲馬今河朔沿邊弓箭社皆是人户祖業田産官無絲毫之給而捐軀捍邊器甲鞍馬與陜西河東無異苦樂相遼未盡其用近日霸州文安縣及真定府北寨皆有北人驚劫人户捕盜官吏拱手相視無如之何以驗禁軍弓手皆不得力向使州縣逐處皆有弓箭社人戶致命盡力則北人豈敢輕犯邊塞如入無人之境臣巳戒飭本路將吏申嚴賞罰加意拊循其人去訖輒復拾用龎籍舊奏約束稍加增損别立條目欲乞朝廷立法少賜優異明設賞罰以示懲勸今巳密切取會到本路極邊定保兩州安肅廣信順安三軍邊面七縣一寨內管自來團結弓箭社五百八十八村六百五十一火共計三萬一千四百一十一人若朝廷以為可行立法之後更敕將吏常加拊循使三萬餘人分畨晝夜巡邏盜邊小冦來即擒獲不至忸怵以生戎心而事皆循舊無所改作敵不疑畏無由生事有利無害較然可見謹具所乞立法事件畫一如左一看詳嘉祐四年龎籍起請巳獲朝旨事件除見可施行外有當時事體與今來稍有不同須至少有增損今參詳到下項弓箭社人戶但係久來團結地分並依見今巳行體例不拘物産髙下丁口衆寡並每戶選擇強壯一丁充弓箭手貼黃髙強人戶與下等各出一丁雖似不均緣行之巳久下等人戶無詞乞具一切仍舊若上戶添差人數即恐行法之初人心不安又緣保甲法雖上户亦止一丁所以今來不敢增損每社置社長社副社録事各一名為頭目並選有物力或好人材事藝衆所推服者方得差補農事餘暇委頭目常切提舉閲習武藝務令精熟齊整如無盜賊非時不得勾集每社及百人以上選少壯者三人不滿百人者選二人不滿五十人者選一人充急腳子並輪畨一月一替專令探報盜賊如探報不實及稽留後時有誤捕捉者並申官乞行嚴斷逐社各置鼓一面如有事故及盜賊並須聲鼓勾集若尋常社內聲鼓不到者每次罰錢一百如社內一兩村共為一火地理稍逺不聞鼓聲去處即火急差急腳子勾喚若強盜入村聲鼓勾喚不到及到而不入賊者並罰錢三貫如三經罰錢一百一經罰錢三貫而各再犯者並送所屬嚴斷如能捉獲強盜一名除依條支賞外更支錢二十貫如兩次捉獲依前支賞外仍與免户下一年差徭如三次以上更免一年無差徭可免者各更支錢十貫折充如獲竊盜一名除依條支賞外更支錢二貫以上錢用社內罰錢充如不足並社衆拘備逐社各人置弓一張箭三十隻刀一口內單丁及貧不及辦者許置鎗及桿棒一條內一件不足者罰錢五百弓箭不堪施放器械雖有而不精並罰錢二百若全然不置者即申送所屬乞行勘斷逐社每夜輪差一十人於地分內往來巡覻仍本縣每季給厯一道委本社頭目抄上當巡人姓名有不到者罰錢二百如本地分失賊其當巡人委本社監勒依條限捕捉限滿不獲送官量事行遣其所給厯除每季納換及知佐下鄉因便點檢外不得非時取索弓箭社人户遇出入經宿以上須告報本社頭目及鄰近同保之人違者罰錢三百文社內遇捉殺賊盜因鬬致死除依條官給絹外更給錢一十貫付其家被傷重者減半並以係省錢充社內所納罰錢令社長等同共封記主管須遇社會合行酬賞者方得對衆支給破使即不得衷私别作支用社內遇豐熟年只得春秋二社聚會因便點集器械非時不得亂有糾集搔擾已上並是龎籍起請已獲朝旨事件自熙寧六年聖旨廢罷後來民間依舊衷私施行今參詳增損修定一弓箭社人户為與契丹為鄰各自守護骨肉墳墓曉夜不住巡邏探伺以此巡檢縣尉全藉此人為耳目肘臂之用每遇冬教內有本社弓箭人户見係保甲人數者即須勾上一月教閲其稱捕盜官司不敢放心以至化外賊盜既知逐社人勾上村堡空虛即皆生心窺伺公私憂恐又人户勾集彌月諸般費用不少深為患苦臣竊謂保甲人户每年冬教本為恐其因循武藝生疏緩急難用今來弓箭社人户既處邊塞與北人氣俗相似以戰鬭為生寢食起居不釋弓馬出入守望常帶器械其勢無由生疏欲乞應弓箭人户今後更不充保甲仍免冬教貼黃保甲法須是主户兩丁以上方始差充其弓箭社一丁以上並差即無巳充保甲而不充弓箭社人户者今來所乞本社內人户更不充保甲只是減罷重疊虛名即非幸免顯無妨礙而使人户稍免無益之費專心守禦又免教集之月村堡空虛以生戎心公私安枕為利不淺其減罷保正長並却令充本社守闕頭目一弓箭社人户既任透漏失賊之責動輒罰錢科罪及均出賞錢顯見與其餘人戶苦樂不同理合稍加優異欲乞應弓箭社人戶並免兩稅折變科配今已取會到本路州軍所免折科錢物數目比之和買價例每嵗剩費錢七千九百九十八貫五十六文所獲精鋭可用民兵三萬餘人費小利大可行無疑一弓箭社頭目並是鄉村有物力心膽之人責以齊衆保境亦須别加旌勸欲乞立定年限每勾當及三年如無透漏及私罪情重者委本縣令佐及捕盜官保明申安撫司給與公據公罪杖以下聽贖又及三年無上件過犯仍與保明給公據與免本户差徭內别有功勞者委自安撫司相度如委是卓然顯效雖未及上件年限亦與比類施行若更有大段勞績難以常格論賞者即委自本司奏乞録用一弓箭社地分本係人戶私下情願自相團結皆是緣邊之人衆共相約要害防把之處行之已久契丹不疑所以龎籍奏請並是因舊略加約束今來不可更有移易地分及增添團結去處永逺只以今來所管五百八十八村為定所貴事事循舊不至張皇生事如本地分內人戶分煙析生即各據户眼定差或外來人户典買到本社田地亦許收入差充弓箭社戶若兩處有田産者不得緣此帶免别處折變委所屬官司常切覺察貼黃弓箭社五百八十八村內有八十九村係兩地供輸人户勘會上件人户元是有些小虛名稅賦自來北界差人過來計會本縣收衆戶抱腳供輸其人戶並是一心捍邊可信之人切慮朝廷欲知其實一今來既立法整齊弓箭社人户及免冬教即須委自安撫司逐時差官按視內有武藝膽力出衆之人即須與例物激賞不惟使人户競勸亦所以致朝廷及將帥恩意緩急易為驅使今取會到轄下兩州三軍弓箭社人户兼充保甲者每年冬教按賞合用錢一千五百八十二貫七百八十八文今來既免冬教即保甲司却合出備上件錢數與安撫司為上件激賞之用但人數既多上件錢數微少支用不足欲乞每年破五千貫除上件錢數外其餘並以本路回易庫見在錢貼支右謹件如前臣竊見西山之下定保之間山開川平無陂塘之險澶淵之役敵自是深入見今本路只有戰兵二萬五千九百餘人分屯八州軍若有警急尚不足於守而況戰乎論者或以保甲之衆緩急可恃臣竊謂保甲皆齊民也集教止是一月武藝無緣精熟又平時無絲毫之利有得於官每嵗所獲按賞例物不償集教一月之費一旦驅之於戰守死地恐未可保惟弓箭社人户所處皆必爭之地世世相傳結髮與敵戰若朝廷許依臣所乞少有以優異其人既免折科間復贖罪免役嵗以五十緡賞其尤異者深致朝廷將帥恩意則此三萬餘人真久逺可恃者也今録白到嘉祐四年龎籍奏獲聖旨事件兼取會到本路兩州三軍弓箭社火人數及免折科每年和買費用錢數并免冬教所省按賞例物數目繳連在前仍畫到地圖一面帖出接連邊面及逐社住坐去處隨狀進呈伏望聖慈詳酌施行謹録奏聞伏候敕旨貼黃所乞免折科却行和買剩費錢七千九百九十八貫五十六文所乞以回易庫錢貼支保甲按賞錢為五千貫令安撫司支用計費錢三千四百一十七貫二百一十二文共計錢一萬一千四百一十五貫二百六十八文所乞至微恐不贍於用未足以起士氣但臣不敢多乞耳若朝廷深念北邊事大此三萬餘人久逺必大段得力更賜擘畫錢物應副成就或於近裏州軍趲那寬剩免役六色錢與本路被邊州軍添雇諸色役人其弓箭社人戶並與免役則人情翕然歸戴願效死而不可得矣更乞朝廷詳酌又今來所乞事件先巳密切下本路近地州軍官吏相度利害尋皆供到有利無害經久可行保明文狀在本司訖又元祐八年十一月日端明殿學士兼翰林侍讀學士左朝奉郎知定州蘇軾狀奏右臣近奏乞修完極邊弓箭社條約已詳具利害於今月十一日入遞去訖臣自到任以來不住令主管衙前引到北人訪問事宜雖虛實難明然前後參驗亦可見其略大抵契丹近嵗多為小國塔坦珠保之類所叛破軍殺將非一近據北人契丹四格探報北界為差發兵馬及人戶家丁往招州以來收殺珠保等國及為近年不熟是致朔易武州皆有強賊兼燕京東北白浮圖碇東惡山內有強賊一火約百五十人不住打劫及又據北平軍申據勾當事人李堅等體探得北界昨差往西北路去者兵士并百姓等近有逃背落草四十餘人馬二十匹見在狼山西頭君市等村乞食竊慮來南界别作過犯雖未見的實然去嵗之冬霸州文安縣被北軍殺人劫物朝廷已知其詳及真定府北寨於去年八月今年二月兩次被北軍羣衆打劫近又訪聞代州胡谷寨莎泉堡有北軍六七十人劫掠本堡居人財物殺傷弓箭手及婦女七八人及至捕盜官會賊已去矣臨去説與鋪兵我只在你地分裏待更來打赤岸村貼黃本路副總管王光祖有男見任胡谷寨主家書報光祖臣所以備知其詳以此數事參驗顯見契丹見今兵困於小國調發頻併民不堪命聚為盜賊雖鄰境多故實中國之利必無渝盟之憂然盜賊充斥彼自不能制其餘波末流必延及吾境若邊臣坐觀不先事設備則邊民無由安居亦恐更生意外之患若督迫捕盜官吏帶領兵甲曉夜出入巡邏則賊未必獲而居民先受其擾又或緣此引惹生事臣再三思慮惟有整葺弓箭社一事名不張皇其實可用若早獲朝旨施行令臣更加意拊循激勵其人決可使外賊望風知畏不敢於地分內作過伏乞聖明特賜詳酌檢會前奏早降指揮謹録奏聞伏候敕旨東坡全集卷六十四
