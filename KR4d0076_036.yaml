body:
  text: 東坡全集卷三十六宋蘇軾撰記十四首超然臺記凡物皆有可觀苟有可觀皆有可樂非必怪竒瑋麗者也餔糟啜漓皆可以醉果蔬草木皆可以飽推此類也吾安往而不樂夫所為求福而辭禍者以福可喜而禍可悲也人之所欲無窮而物之可以足吾欲者有盡美惡之辨戰乎中而去取之擇交乎前則可樂者常少而可悲者常多是謂求禍而辭福夫求禍而辭福豈人之情也哉物有以蓋之矣彼逰於物之內而不逰於物之外物非有大小也自其內而觀之未有不髙且大者也彼挾其髙大以臨我則我常眩亂反覆如隙中之觀鬬又烏知勝負之所在是以美惡橫生而憂樂出焉可不大哀乎余自錢塘移守膠西釋舟楫之安而服車馬之勞去雕墻之美而庇采椽之居背湖山之觀而行桑麻之野始至之日歲比不登盜賊滿野獄訟充斥而齊厨索然日食杞菊人固疑余之不樂也處之朞年而貌加豐髮之白者日以反黑余既樂其風俗之淳而其吏民亦安豫之拙也於是治其園圃潔其庭宇伐安丘髙密之木以修補破敗為苟完之計而園之北因城以為臺者舊矣稍葺而新之時相與登覽放意肆志焉南望馬耳常山出沒隱見若近若逺庶幾有隱君子乎而其東則盧山秦人盧敖之所從遁也西望穆陵隱然如城郭師尚父齊桓公之遺烈猶有存者北俯濰水慨然太息思淮隂之功而弔其不終臺髙而安深而明夏凉而冬溫雨雪之朝風月之夕余未嘗不在客未嘗不從擷園蔬取池魚釀秫酒㵸脫粟而食之曰樂哉遊乎方是時余弟子由適在濟南聞而賦之且名其臺曰超然以見余之無所往而不樂者蓋逰於物之外也雩泉記常山在東武郡治之南二十里不甚髙大而下臨城中如在山下雉堞樓觀髣佛可數自城中望之如在城上起居寢食無往而不見山者其神食於斯民固宜也東武濵海多風而溝瀆不留故率常苦旱禱於兹山未嘗不應民以其可信而恃蓋有常德者故謂之常山熙寧八年春夏旱軾再禱焉皆應如響乃新其廟廟門之西南十五步有泉汪洋折旋如車輪清凉滑甘冬夏若一餘流溢去逹于山下兹山之所以能常其德出雲為雨以信於斯民者意其在此而號稱不立除治不嚴農民易之乃琢石為井其深七尺廣三之二作亭於其上而名之曰雩泉古者謂吁嗟而求雨曰雩今民吁嗟其所不獲而呻吟其所疾痛亦多矣吏有能聞而哀之答其所求如常山雩泉之可信而恃者乎軾以是愧於神乃作吁嗟之詩以遺東武之民使歌以祀神而勉吏云吁嗟常山東武之望匪石巖巖惟德之常吁嗟雩泉維山之滋維水作聰我民所噫我歌雲漢于泉之側誰其尸之涌溢赴節堂堂在位有號不聞我愧于中何以籲神神尸其昧我職其著各率爾職神不汝棄酌山之泉言採其蔬跪以薦神神其吐之醉白堂記故魏國忠獻韓公作堂於私第之池上名之曰醉白取樂天池上之詩以為醉白堂之歌意若有羡於樂天而不及者天下之士聞而疑之以為公既已無愧於伊周矣而猶有羡於樂天何哉軾聞而笑曰公豈獨有羡於樂天而巳乎方且願為尋常無聞之人而不可得者天之生是人也將使任天下之重則寒者求衣飢者求食凡不獲者求得苟有以與之將不勝其求是以終身處乎憂患之域而行乎利害之塗豈其所欲哉夫忠獻公既已相三帝安天下矣浩然將歸老於家而天下共挽而留之莫釋也當是時其有羡於樂天無足怪者然以樂天之平生而求之於公較其所得之厚薄淺深孰有孰無則後世之論有不可欺者矣文致太平武定亂略謀安宗廟而不自以為功急賢才輕爵祿而士不知其恩殺伐果敢而六軍安之四夷八蠻想聞其風采而天下以其身為安危此公之所有而樂天之所無也乞身於强健之時退居十有五年日與其朋友賦詩飲酒盡山水園池之樂府有餘帛廪有餘粟而家有聲伎之奉此樂天之所有而公之所無也忠言嘉謀效於當時而文采表於後世死生窮逹不易其操而道德髙於古人此公與樂天之所同也公既不以其所有自多亦不以其所無自少將推其同者而自託焉方其寓形於一醉也齊得喪忘禍福混貴賤等賢愚同乎萬物而與造物者逰非獨自比於樂天而已古之君子其處已也厚其取名也亷是以實浮於名而世誦其美不厭以孔子之聖而自比於老彭自同於丘明自以為不如顔淵後之君子實則不至而皆有侈心焉臧武仲自以為聖白圭自以為禹司馬長卿自以為相如揚雄自以為孟軻崔浩自以為子房然世終莫之許也由此觀之忠獻公之賢於人也逺矣昔公嘗告其子忠彥將求文於軾以為記而未果既葬忠彥以告軾以為義不得辭也乃泣而書之蓋公堂記始吾居鄉有病寒而咳者問諸醫醫以為蠱不治且殺人取其百金而治之飲以蠱藥攻伐其腎腸燒灼其體膚禁切其飲食之美者朞月而百疾作內熱惡寒而咳不已纍然真蠱者也又求於醫醫以為熱授之以寒藥旦朝吐之暮夜下之於是始不能食懼而反之則鍾乳烏啄雜然並進而瘭疽癰疥眩瞀之狀無所不至三易醫而疾愈甚里老父教之曰是醫之罪藥之過也子何疾之有人之生也以氣為主食為輔今子終日藥不釋口臭味亂于外而百毒戰于內勞其主隔其輔是以病也子退而休之謝醫却藥而進所嗜氣完而食美矣則夫藥之良者可以一飲而效從之朞月而病良已昔之為國者亦然吾觀夫秦自孝公以來至于始皇立法更制以鐫磨鍛鍊其民可謂極矣蕭何曹參親見其斫喪之禍而收其民於百戰之餘知其厭苦憔悴無聊而不可與有為也是以一切與之休息而天下安始參為齊相召長老請先生問所以安集百姓而齊故諸儒以百數言人人殊參未知所定聞膠西有蓋公善治黃老言使人請之蓋公為言治道貴清淨而民自定推此類具言之參於是避正堂以舍蓋公用其言而齊大治其後以其所以治齊者治天下天下至今稱賢焉吾為膠西守知公之為邦人也求其墳墓子孫而不可得慨然懷之師其言想見其為人庶幾復見如公者治新寢於黃堂之北易其弊陋逹其壅蔽重門洞開盡城之南北相望如引繩名之曰蓋公堂時從賓客僚吏逰息其間而不敢居以待如公者焉夫曹參為漢宗臣而蓋公為之師可謂盛矣而史不記其所終豈非古之至人得道而不死者歟膠西東並海南放于九仙北屬之牢山其中多隱君子可聞而不可見可見而不可致安知蓋公不往來其間乎吾何足以見之李氏山房藏書記象犀珠玉怪珍之物有悅於人之耳目而不適於用金石草木絲麻五穀六材有適於用而用之則弊取之則竭恱於人之耳目而適於用用之而不弊取之而不竭賢不肖之所得各因其才仁智之所見各隨其分才分不同而求無不獲者惟書乎自孔子聖人其學必始於觀書當是時惟周之柱下史聃為多書韓宣子適魯然後見易象與魯春秋季札聘於上國然後得聞詩之風雅頌而楚獨有左史倚相能讀三墳五典八索九丘士之生於是時得見六經者蓋無幾其學可謂難矣而皆習於禮樂深於道德非後世君子所及自秦漢以來作者益衆紙與字畫日趨於簡便而書益多世莫不有然學者益以苟簡何哉余猶及見老儒先生自言其少時欲求史記漢書而不可得幸而得之皆手自書日夜誦讀惟恐不及近歲市人轉相摹刻諸子百家之書日傳萬紙學者之於書多且易致如此其文詞學術當倍蓰於昔人而後生科舉之士皆束書不觀逰談無根此又何也余友李公擇少時讀書於廬山五老峯下白石庵之僧舍公擇既去而山中之人思之指其所居為李氏山房藏書凡九千餘卷公擇既已涉其流探其源採剝其華實而咀嚼其膏味以為巳有發於文詞見於行事以聞名於當世矣而書固自如也未嘗少損將以遺來者供其無窮之求而各足其才分之所當得是以不藏於家而藏於其所故居之僧舍此仁者之心也余既衰且病無所用於世惟得數年之間盡讀其所未見之書而廬山固所願逰而不得者蓋將老焉盡發公擇之藏拾其餘棄以自補庶有益乎而公擇求余文以為記乃為一言使來者知昔之君子見書之難而今之學者有書而不讀為可惜也寶繪堂記君子可以寓意於物而不可以留意於物寓意於物雖微物足以為樂雖尤物不足以為病留意於物雖微物足以為病雖尤物不足以為樂老子曰五色令人目盲五音令人耳聾五味令人口爽馳騁田獵令人心發狂然聖人未嘗廢此四者亦聊以寓意焉耳劉備之雄才也而好結氂嵇康之逹也而好鍛鍊阮孚之放也而好蠟屐此豈有聲色臭味也哉而樂之終身不厭凡物之可喜足以悅人而不足以移人者莫若書與畫然至其留意而不釋則其禍有不可勝言者鍾繇至以此嘔血發塜宋孝武王僧䖍至以此相忌桓𤣥之走舸王涯之復壁皆以兒戲害其國凶其身此留意之禍也始吾少時嘗好此二者家之所有惟恐其失之人之所有惟恐其不吾豫也既而自笑曰吾薄富貴而厚於書輕死生而重畫豈不顛倒錯繆失其本心也哉自是不復好見可喜者雖時復蓄之然為人取去亦不復惜也譬之煙雲之過眼百鳥之感耳豈不欣然接之去而不復念也於是乎二物者常為吾樂而不能為吾病駙馬都尉王君晉卿雖在戚里而其被服禮義學問詩書常與寒士角平居攘去膏梁屏逺聲色而從事於書畫作寶繪堂於私第之東以蓄其所有而求文以為記恐其不幸而類吾少時之所好故以是告之庶幾全其樂而逺其病也熙寧十年七月二十二日記眉州逺景樓記吾州之俗有近古者三其士大夫貴經術而重氏族其民尊吏而畏法其農夫合耦以相助蓋有三代漢唐之遺風而他郡之所莫及也始朝廷以聲律取士而天聖以前學者猶襲五代文弊獨吾州之士通經學古以西漢文詞為宗師方是時四方指以為迂闊至於郡縣胥史皆挾經載筆應對進退有足觀者而大家顯人以門族相上推次甲乙皆有定品謂之江鄉非此族也雖貴且富不通婚姻其民事太守縣令如古君臣既去輒畫像事之而其賢者則記録其行事以為口實至四五十年不忘富商小民常儲善物而别異之以待官吏之求家藏律令往往通念而不以為非雖薄刑小罪終身有不敢犯者歲二月農事始作四月初吉穀稚而草壯耘者畢出數十百人為曹立表下漏鳴鼓以致衆擇其徒為衆所畏信者二人一人掌鼓一人掌漏進退作止惟二人之聽鼓之而不至至而不力皆有罰量田計功終事而㑹之田多而丁少則出錢以償衆七月既望榖艾而草衰則仆鼓決漏取罰金與償衆之錢買羊豕酒醴以祀田祖作樂飲食醉飽而去歲以為常其風俗蓋如此故其民皆聰明才智務本而力作易治而難服守令始至視其言語動作輒了其為人其明且能者不復以事試終日寂然苟不以其道則陳義秉法以譏切之故不知者以為難治今太守黎侯希聲軾先君子之友人也簡而文剛而仁明而不苛衆以為易事既滿將代不忍其去相率而留之上不奪其請既留三年民益信遂以無事因守居之北墉而增築之作逺景樓日與賔客僚吏遊處其上軾方為徐州吾州之人以書相往來未嘗不道黎侯之善而求文以為記嗟夫軾之去鄉久矣所謂逺景樓者雖想見其處而不能道其詳矣然州人之所以樂斯樓之成而欲記焉者豈非上有易事之長而下有易治之俗也哉孔子曰吾猶及史之闕文也有馬者借人乘之今亡巳夫是二者於道未有大損益也然且録之今吾州近古之俗獨能纍世而不遷蓋耆老昔人豈弟之澤而賢守令撫循教誨不倦之力也可不録乎若夫登臨覽觀之樂山川風物之美軾將歸老於故丘布衣幅巾從邦君於其上酒酣樂作援筆而賦之以頌黎侯之遺愛尚未晚也元豐元年七月十五日記滕縣公堂記君子之仕也以其才易天下之養也才有大小故養有厚薄苟有益於人雖厲民以自養不為泰是故飲食必豐車服必安宫室必壯使令之人必給則人輕去其家而重去其國如使衣食菲惡不如吾私宮室弊陋不如吾廬使令之人朴野不足不如吾僮奴雖君子安之無不可者然人之情所以去父母捐墳墓而逺遊者豈厭安逸而思勞苦也哉至於宫室蓋有所從受而傳之無窮非獨以自養也今日不治後日之費必倍而比年以來所在務為儉陋尤諱土木營造之功欹仄腐壞轉以相付不敢擅易一椽此何義也滕古邑也在宋魯之間號為難治庭宇陋甚莫有葺者非惟不敢亦不暇自天聖元年縣令太常博士張君太素實始改作凡五十有二年而贊善大夫范君純粹自公府掾謫為令復一新之公堂吏舍凡百一十有六間髙明碩大稱子男邦君之居而寢室未治范君非嫌於奉已也曰吾力有所未暇而已昔毛孝先崔季圭用事士皆變易車服以求名而徐公不改其常故天下以為泰其後世俗日以奢靡而徐公固自若也故天下以為嗇君子之度一也時自二耳元豐元年七月二十二日尚書祠部員外郎直史館權知徐州軍事蘇軾記莊子祠堂記莊子䝉人也嘗為䝉漆園吏沒千餘歲而䝉未有祀之者縣令祕書丞王兢始作祠堂求文以為記謹按史記莊子與梁惠王齊宣王同時其學無所不窺然要本歸於老子之言故其著書十餘萬言大抵率寓言也作漁父盜跖胠篋以詆訾孔子之徒以明老子之術此知莊子之粗者余以為莊子蓋助孔子者要不可以為法耳楚公子微服出亡而門者難之其僕操箠而罵曰𨽻也不力門者出之事固有倒行而逆施者以僕為不愛公子則不可以為事公子之法亦不可故莊子之言皆實豫而文不豫陽擠而隂助之其正言蓋無幾至於詆訾孔子未嘗不微見其意其論天下道術自墨翟禽滑釐彭䝉慎到田駢關尹老聃之徒以至於其身皆以為一家而孔子不與其尊之也至矣然余嘗疑盜跖漁父則若真詆孔子者至於讓王說劒皆淺陋不入於道反復觀之得其寓言之意終曰陽子居西逰於秦遇老子老子曰而睢睢而盱盱而誰與居太白若辱盛德若不足陽子居蹴然變容其往也舍者將迎其家公執席妻執巾櫛舍者避席煬者避竈其反也舍者與之爭席矣去其讓王說劔漁父盜跖四篇以合於列禦寇之篇曰列禦寇之齊中道而反曰吾驚焉吾食於十漿而五漿先餽然後悟而笑曰是固一章也莊子之言未終而昧者勦之以入其言余不可以不辨凡分章名篇皆出於世俗非莊子本意元豐元年十一月十九日記放鶴亭記熙寧十年秋彭城大水雲龍山人張君之草堂水及其半扉明年春水落遷於故居之東東山之麓升髙而望得異境焉作亭於其上彭城之山岡嶺四合隱然如大環獨缺其西南面而山人之亭適當其缺春夏之交草木際天秋冬雪月千里一色風雨晦明之間俯仰百變山人有二鶴甚馴而善飛旦則望西山之缺而放焉縱其所如或立於陂田或翔於雲表莫則傃東山而歸故名之曰放鶴亭郡守蘇軾時從賔客僚吏往見山人飲酒於斯亭而樂之揖山人而告之曰子知隱居之樂乎雖南面之君未可與易也易曰鳴鶴在隂其子和之詩曰鶴鳴于九臯聲聞于天蓋其為物清逺閒放超然于塵垢之外故易詩人以比賢人君子隱德之士狎而玩之宜若有益而無損者然衛懿公好鶴則亡其國周公作酒誥衛武公作抑戒以為荒惑敗亂無若酒者而劉伶阮籍之徒以此全其真而名後世嗟夫南面之君雖清逺閒放如鶴者猶不得好好之則亡其國而山林遁世之士雖荒惑敗亂如酒者猶不能為害而况於鶴乎由此觀之其為樂未可以同日而語也山人欣然而笑曰有是哉乃作放鶴招鶴之歌曰鶴飛去兮西山之缺髙翔而下覽兮擇所適翻然斂翼婉將集兮忽何所見矯然而復擊獨終日於澗谷之間兮琢蒼苔而履白石鶴歸來兮東山之隂其下有人兮黃冠草履葛衣而鼓琴躬耕而食兮其餘以汝飽歸來歸來兮西山不可以久留元豐元年十一月初八日記思堂記建安章質夫築室於公堂之西名之曰思曰吾將朝夕於是凡吾之所為必思而後行子為我記之嗟夫余天下之無思慮者也遇事則發不暇思也未發而思之則未至已發而思之則無及以此終身不知所思言發於心而衝余口吐之則逆人茹之則逆余以為寧逆人也故卒吐之君子之於善也如好好色其於不善也如惡惡臭豈復臨事而後思計議其美惡而避就之哉是故臨義而思利則義必不果臨戰而思生則戰必不力若夫窮逹得喪死生禍福則吾有命矣少時遇隱者曰孺子近道少思寡欲曰思與欲若是均乎曰甚於欲庭有二盎以畜水隱者指之曰是有蟻漏是日取一升而棄之孰先竭曰必蟻漏者思慮之賊人也微而無間隱者之言有㑹於余心余行之且夫不思之樂不可名也虛而明一而通安而不懈不處而靜不飲酒而醉不閉目而睡將以是記思堂不亦繆乎雖然言各有當也萬物並育而不相害道並行而不相悖以質夫之賢其所謂思者豈世俗之營營於思慮者乎易曰無思也無為也我願學焉詩曰思無邪質夫以之元豐元年正月二十四日記遊桓山記元豐二年正月已亥晦春服既成從二三子遊於泗之上登桓山入石室使道士戴日祥鼓雷氏之琴操履霜之遺音曰噫嘻悲夫此宋司馬桓魋之墓也或曰鼓琴於墓禮歟曰禮也季武子之喪曾㸃倚其門而歌仲尼日月也而魋以為可得而害也且死為石椁三年不成古之愚人也余將弔其藏而其骨毛爪齒既已化為飛塵蕩為冷風矣而况於椁乎况於從死之臣妾飯含之貝玉乎使魋而無知也余雖鼓琴而歌可也使魋而有知也聞余鼓琴而歌知哀樂之不可常物化之無日也其愚豈不少瘳乎二三子喟然而嘆乃歌曰桓山之上維石嵯峨兮司馬之惡與石不磨兮桓山之下維水瀰瀰兮司馬之藏與水皆逝兮歌闋而去從遊者八人畢仲孫舒煥寇昌朝王適王遹王肄軾之子邁煥之子彥舉靈壁張氏園亭記道京師而東水浮濁流陸走黃塵陂田蒼莽行者倦厭凡八百里始得靈壁張氏之園於汴之陽其外修竹森然以髙喬木蓊然以深其中因汴之餘浸以為陂池取山之怪石以為巖阜蒲葦蓮芡有江湖之思椅桐檜柏有山林之氣竒花美草有京洛之態華堂厦屋有吳蜀之巧其深可以隱其富可以養果蔬可以飽鄰里魚鱉筍茹可以餽四方之賔客余自彭城移守吳興由宋登舟三宿而至其下肩輿叩門見張氏之子碩碩求余文以記之維張氏世有顯人自其伯父殿中君與其先人通判府君始家靈壁而為此園作蘭臯之亭以養其親其後出仕於朝名聞一時推其餘力日增治之於今五十餘年矣其木皆十圍岸谷隱然凡園之百物無一不可人意者信其用力之多且久也古之君子不必仕不必不仕必仕則忘其身必不仕則忘其君譬之飲食適於飢飽而已然士罕能蹈其義赴其節處者安於故而難出出者狃於利而忘返於是有違親絶俗之譏懷祿苟安之弊今張氏之先君所以為其子孫之計慮者逺且周是故築室藝園於汴泗之間舟車冠蓋之衝凡朝夕之奉燕逰之樂不求而足使其子孫開門而出仕則跬步市朝之上閉門而歸隱則俯仰山林之下於以養生治性行義求志無適而不可故其子孫仕者皆有循吏良能之稱處者皆有節士亷退之行蓋其先君子之澤也余為彭城二年樂其土風將去不忍而彭城之父老亦莫余厭也將買田於泗水之上而老焉南望靈壁雞犬之聲相聞幅巾杖屨歲時往來於張氏之園以與其子孫逰將必有日矣元豐二年三月二十七日記文與可畫篔簹谷偃竹記竹之始生一寸之萌耳而節葉具焉自蜩腹蛇蚹以至于劍拔十尋者生而有之也今畫者乃節節而為之葉葉而纍之豈復有竹乎故畫竹必先得成竹於胸中執筆熟視乃見其所欲畫者急起從之振筆直遂以追其所見如兔起鶻落少縱則逝矣與可之教豫如此豫不能然也而心識其所以然夫既心識其所以然而不能然者內外不一心手不相應不學之過也故凡有見於中而操之不熟者平居自視了然而臨事忽焉喪之豈獨竹乎子由為墨竹賦以遺與可曰庖丁解牛者也而養生者取之輪扁斫輪者也而讀書者與之今夫夫子之託於斯竹也而豫以為有道者則非耶子由未嘗畫也故得其意而已若豫者豈獨得其意并得其法與可畫竹初不自貴重四方之人持縑素而請者足相躡於其門與可厭之投諸地而罵曰吾將以為襪士大夫傳之以為口實及與可自洋州還而余為徐州與可以書遺余曰近語士大夫吾墨竹一派近在彭城可往求之襪材當萃於子矣書尾復寫一詩其略曰擬將一段鵝溪絹掃取寒稍萬尺長豫謂與可竹長萬尺當用絹二百五十匹知公倦於筆硯願得此絹而已與可無以答則曰吾言妄矣世豈有萬尺竹哉余因而實之答其詩曰世間亦有千尋竹月落庭空影許長與可笑曰蘇子辨則辨矣然二百五十匹吾將買田而歸老焉因以所畫篔簹谷偃竹遺豫曰此竹數尺耳而有萬尺之勢篔簹谷在洋州與可嘗令豫作洋州三十詠篔簹谷其一也豫詩云漢川修竹賤如蓬斤斧何曾赦籜龍料得清貧饞太守渭濱千畝在胸中與可是日與其妻遊谷中燒筍晚食發函得詩失笑噴飯滿案元豐二年正月二十日與可沒於陳州是歲七月七日豫在湖州曝書畫見此竹廢卷而哭失聲昔曹孟德祭橋公文有車過腹痛之語而豫亦載與可疇昔戲笑之言者以見與可於豫親厚無間如此也東坡全集卷三十六
