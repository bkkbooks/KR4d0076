body:
  text: 東坡全集巻九宋蘓軾撰詩六十七首春菜蔓菁宿根巳生葉韮牙戴土拳如蕨爛烝香薺白魚肥碎㸃青蒿凉餅滑宿酒初消春睡起細履幽畦掇芳辣茵陳甘菊不負渠繪縷堆盤纎手抹北方苦寒今未巳雪底波稜如鐵甲豈如吾蜀富冬蔬霜葉露芽寒更茁久抛菘葛猶細事苦筍江豚那忍説明年投劾徑須歸莫待齒摇并髮脱送鄭户曹㳺遍錢塘湖上山歸來文字帶芳鮮羸僮瘦馬從吾飲陋巷何人似子賢公業有田常乏食廣文好客竟無氈東歸不趁花時節開盡春風誰與妍䖍州八境圖八首坐看奔湍遶石樓使君髙㑹百無憂三犀竊鄙秦太守八詠聊同沈隠侯濤頭寂寞打城還章貢臺前莫靄寒勌客登臨無限思孤雲落日是長安白鵲樓前翠作堆縈雲嶺路若為開故人應在千山外不寄梅花逺信來朱樓深處日微明皂蓋歸時酒半醒薄暮漁樵人去盡碧溪青嶂遶螺亭使君那暇日參禪一望叢林一悵然成佛莫教靈運後着鞭從使祖生先却從塵外望塵中無限樓臺煙雨濛山水照人迷向背只尋孤塔認西東煙雲縹𦕈鬱孤臺積翠浮空雨半開想見之罘觀海市絳宫明滅是蓬萊回峰亂嶂鬱參差雲外髙人世得知誰向空山弄明月山中木客解吟詩讀孟郊詩二首夜讀孟郊詩細字如牛毛寒燈照昏花佳處時一遭孤芳擢荒穢苦語餘詩騷水清石鑿鑿湍激不受篙初如食小魚所得不償勞又似煮彭􅒹竟日嚼空螯要當鬬僧清未足當韓豪人生如朝露日夜火消膏何苦將兩耳聽此寒蟲號不如且置之飲我玉巵醪我憎孟郊詩復作孟郊語饑腸自鳴喚空壁轉饑鼠詩從肺腑出出輒愁肺腑有如黄河魚出膏以自煮尚愛銅斗歌鄙俚頗近古桃弓射鴨罷獨速短蓑舞不憂踏船翻踏浪不踏土吴姬霜雪白赤脚浣白紵嫁與踏浪兒不識離别苦歌君江湖曲感我長羈旅訪張山人得山中字二首魚龍随水落猿鶴喜君還舊隠丘墟外新堂紫翠間野麋馴杖屨幽桂出榛菅灑掃門前路山公亦愛山張故居為大水所壊新卜此室故居之東萬木鎖雲龍山名天留與戴公路迷山向背人在瀼西東薺麥餘春雪櫻桃落晩風入城都不記歸路醉眠中送孔郎中赴陜郊驚風擊面黄沙走西出崤函脱塵垢使君來自古徐州聲振河潼殷闗右十里長亭聞鼔角一川秀色明花栁北臨飛檻巻黄流南望青山如峴首東風吹開錦繡谷淥水飜動蒲萄酒訟庭生草數開樽過客如雲牢閉口與梁左藏㑹飲傅國博家將軍破賊自草檄論詩説劔俱第一彭城老守本虚名識字劣能欺項籍風流别駕貴公子欲把笙歌暖鋒鏑紅斾朝開猛士噪翠帷暮巻佳人出東堂醉卧呼不起啼鳥落花春寂寂試敎長笛傍耳根一聲吹裂堦前石寒食日荅公擇三絶次韻從來蘇李得名雙只恐全齊笑陋邦詩似懸河供不辦故欺張籍隴頭瀧簿書鼛鼔不知春佳句相呼賴故人寒食得公方上冢歸來誰主復誰賓巡城巳困塵埃眯執朴仍遭蟣蝨緣欲脱布衫擕素手試開病眼㸃黄連來詩謂僕布衫督役約公擇飲是日大風先生生長匡廬山山中讀書三十年舊聞飲水師顔淵不知治劇乃所便偷兒夜探赤白丸奮髯忽逢朱子元半年羣盜誅七百誰信家書藏九千春風無事秋月閒紅粧執樂豪且妍紫衫玉帶兩部全琵琶一抹四十絃客來留飲不計錢齊人愛公如子産兒啼卧路呼不還我慚山郡空留連牙兵部吏笑我寒邀公飲酒公無難約束官奴買花鈿薫衣理鬢夜不眠曉來顛風塵暗天我思其由豈坐慳作詩愧謝公笑讙歸來瑟縮愈不安要當啖公八百里豪氣一洗儒生酸座上賦戴花得天字清明初過酒闌珊折得竒葩晚更妍春色豈闗吾軰事老狂聊作座中先醉吟不耐欹紗帽起舞從教落酒船結習漸消留不住却須還與散花天夜飲次韻畢推官簿書叢裏過春風酒聖時時且復中紅燭照庭嘶騕褭黄雞催曉唱玲瓏老來漸減金釵興醉後空驚玉筯工月未上時應早散免教壑谷問吾公續麗人行李仲謀家有周昉畫背面欠伸内人極精戯作此詩深宫無人春日長沉香亭北百花香美人睡起薄梳洗燕舞鸎啼空斷腸畫工欲畫無窮意背立東風初破睡若教回首却嫣然陽城下蔡俱風靡杜陵饑客眼長寒蹇驢破帽随金鞍隔花臨水時一見只許腰支背後看心醉歸來茅屋底方信人間有西子君不見孟光舉案與齊眉何曽背面傷春啼聞李公擇飲傅國博家大醉二首兒童拍手鬧黄昏應笑山公醉習園縱使先生能一石主人未肯獨留髠不肯惺惺騎馬迴玉山知為玉人頽紫雲有語君知否莫喚分司御史來起伏龍行并叙徐州城東二十里有石潭父老云與泗水通増損清濁相應不差時有河魚出焉元豐元年春旱或云置虎頭潭中可以致雷雨用其説作起伏龍行一首何年白竹千鈞弩射殺南山雪毛虎至今顱骨帶霜牙尚作四海毛蟲祖東方久旱千里赤三月行人口生土碧潭近在古城東神物所蟠誰敢侮上欹蒼石擁巖竇下應清河通水府眼光作電走金蛇鼻息為雲擢煙縷當年負圖傳帝命左右羲軒詔神禹爾來懐寳但貪眠滿腹雷霆瘖不吐赤龍白虎戰明日是月丙辰明日庚寅倒巻黄河作飛雨嗟吾豈樂鬬兩雄有事徑須煩一怒聞公擇過雲龍張山人輒往從之公擇有詩戯用其韻我生固多憂肉食常苦墨軒然就一笑猶得好飲力聞君過雲龍對酒兩静黙急擕清歌女出郭及未昃一歡難力致邂逅有勝特喧蜂集晚花亂雀啅叢棘山人樂此耳寂寞誰侍側何當求好人聊使治要襋使君自孤憤此理誰相直不如學養生一氣服千息送李公擇嗟余寡兄弟四海一子由故人雖云多出處不我謀弓車無停招逝去勢莫留僅存今㡬人各在天一陬有如長庚月到曉爛不收宜我與夫子相好手足侔比年兩見之賓主更獻酬樂哉十日飲衎衎和不流論事到深夜僵仆鈴與騶頗嘗見使君有客如此不欲别不忍言慘慘集百憂念我野夫兄知名三十秋巳得其為人不待風馬牛他年林下見傾蓋如白頭送筍芍藥與公擇二首久客厭虜饌蜀人謂東北人虜子枵然思南烹故人知我意千里寄竹萌駢頭玉嬰兒一一脱錦䙀庖人應未識旅人眼先明我家拙厨膳彘肉芼蕪菁送與江南客燒煮配香粳今日忽不樂折盡園中花園中亦何有芍藥裊殘葩久旱復遭雨紛披亂泥沙不折亦安用折去還可嗟棄擲亮未能送與謫仙家還將一枝春插向兩髻丫和孫莘老次韻去國光隂春雪消還家蹤迹野雲飄功名正自妨行樂迎送纔堪博早朝雖去友朋親吏卒却辭讒謗得風謡明年我亦江東去不問繁華與寂寥㳺張山人園壁間一軸煙蘿子盆裏千枝錦被堆慣與先生為酒伴不嫌刺史亦顔開纎纎入麥黄花亂颯颯催詩白雨來聞道君家好井水歸軒乞得滿瓶回杜介熙熙堂﨑嶇世路最先回窈窕華堂手自開咄咄何曽書怪事熙熙長覺似春臺白砂碧玉味方永黄紙紅旗心巳灰遥想閉門投轄飲鵾絃鐵撥響如雷次韻荅劉涇吟詩莫作秋蟲聲天公怪汝鈎物情使汝未老華髮生芝蘭得雨蔚青青何用自燔以出馨細書千紙雜真行新音百變口如鸎異議蜂起弟子争舌翻濤瀾巻齊城萬巻堆胸兀相撑以病為樂子未驚我有至味非煎烹是中之樂吁難名綠槐如山闇廣庭飛蟲繞耳細而清敗席展轉卧看經亦自不嫌翠織成意行信足無溝坑不識五郎呼作卿吏民哀我老不明相戒毋復煩鞭刑時臨泗水照星星微風不起鏡面平安得一舟如葉輕卧聞郵籖報水程蓴羮羊酪不須評一飽且救饑腸鳴擕妓樂㳺張山人園大杏金黄小麥熟墮巢乳鵲拳新竹故將俗物惱幽人細馬紅粧滿山谷提壺勸酒意雖重杜鵑催歸聲更速酒䦨人散却闗門寂歴斜陽挂疎木種徳亭并叙處士王復家於錢塘為人多技能而醫尤精期於活人而巳不志於利築室候潮門外治園圃作亭榭以與賢士大夫㳺惟恐不及然終無所求人徒知其接花藝果之勤而不知其所種者徳也乃以名其亭而作詩以遺之小圃旁城郭閉門芝术香名随市人隠徳與佳木長元化善養性倉公多禁方所活不可數相逢旋相忘但喜賓客來置酒花滿堂我欲東南去再觀雙檜蒼山茶想出屋湖橘應過牆木老徳亦熟吾言豈荒唐文與可有詩見寄云待將一段鵝溪絹掃取寒稍萬尺長次韻荅之為愛鵝溪白蠒光掃殘雞距紫毫鋩世間那有千尋竹月落庭空影許長聞辯才法師復歸上天竺以詩戯問道人出山去山色如死灰白雲不解笑青松有餘哀忽聞道人歸鳥語山容開神光出寳髻法雨洗浮埃想見南北山花發前後臺寄聲問道人借禪以為詼何所聞而去何所見而回道人笑不荅此意安在哉昔年本不住今者亦無來此語竟非是且食白楊梅和子由送將官梁左藏仲通雨足誰言春麥短城堅不怕秋濤巻日長惟有睡相宜半脱紗巾落紈扇芳草不鋤當户長珍禽獨下無人見覺來身世都是夢坐久枕痕猶著面城西忽報故人來急掃風軒炊麥飯徐州所出伏波論兵初矍鑠中散談仙更清逺南都從事亦學道不䘏腸空誇腦滿問羊他日到金華應許相將游閬苑黄初平之兄尋其弟於金華山次韻秦觀秀才見贈秦與孫莘老李公擇甚熟將入京應舉夜光明月非所投逢年遇合百無憂將軍百戰竟不侯伯郎一斗得凉州翹闗負重君無力十年不入紛華域故人坐上見君文謂是古人吁莫測新詩説盡萬物情硬黄小字臨黄庭故人巳去君未到空吟河畔草青青誰謂他鄉各異縣天遣君來破吾願一聞君語識君心短李髯孫眼中見江湖放浪久全真忽然一鳴驚倒人從横所值無不可知君不怕新書新千金弊帚那堪換我亦淹留豈長筭山中既未決同歸我聊爾耳君其漫僕曩於長安陳漢卿家見吴道子畫佛碎爛可惜其後十餘年復見之於鮮于子駿家則巳装背完好子駿以見遺作詩謝之貴人金多身復閒争買書畫不計錢巳將鐵石充逸少殷鐵石梁武帝時人今法帖大王書中有鐵石字更補朱繇為道𤣥世所收吴畫多朱繇筆也煙熏屋漏裝玉軸鹿皮蒼璧知誰賢吴生畫佛本神授夢中化作飛空仙覺來落筆不經意神妙獨到秋毫顛我昔長安見此畫歎惜至寳空澘然素絲斷續不忍看巳作胡蝶飛聨翩君能收拾為補綴體質散落嗟神全誌公髣髴見刀尺修羅天女猶雄妍如觀老杜飛鳥句脱字欲補知無緣問君乞得良有意欲將俗眼為洗湔貴人一見定羞怍錦囊千紙何足捐不須更用博麻縷付與一炬随飛煙雨中過舒教授疎疎簾外竹瀏瀏竹間雨窓扉静無塵几硯寒生霧美人樂幽獨有得緣無慕坐依蒲褐禪起聽風甌語客來淡無有灑掃凉冠屨濃茗洗積昏妙香净浮慮歸來北堂闇一一微螢度此生憂患中一餉安閒處飛鳶悔前笑黄犬悲晚悟自非陶靖節誰識此間趣次韻舒教授寄李公擇草書妙絶吾所兄真書小低猶抗行論文作詩俱不敵看君談笑收降旌去年逾月方出晝予去年留齊月餘為君劇飲㡬濡首今年過我雖少留寂寞陶潛方止酒此行公擇病酒夕不飲别時流涕攬君鬚懸知此歡墮空虚松下從横餘屐齒門前轣轆想君車怪君一身都是徳近之清潤淪肌骨細思還有可恨時不許藍橋見傾國公擇有婢名雲英屢欲出不果送鄭户曹水遶彭城樓山圍戯馬臺古來豪傑地千嵗有餘哀隆凖飛上天重瞳亦成灰白門下吕布大星隕臨淮尚想劉徳輿置酒此徘徊爾來苦寂寞廢圃多蒼苔河從百步響山到九里回山水自相激夜聲轉風雷蕩蕩清河壖黄樓我所開秋月墮城角春風摇酒杯遲君為坐客新詩出瓊瑰樓成君巳去人事固多乖他年君倦㳺白首賦歸來登樓一長嘯使君安在哉次韻黄魯直見贈古風二首佳榖卧風雨莨莠登我場陳前漫方丈玉食慘無光大哉天宇間美惡更臭香君看五六月飛蚊殷回廊兹時不少暇俛仰霜葉黄期君蟠桃枝千嵗終一嘗顧我如苦李全生依路傍紛紛不足愠悄悄徒自傷空山學仙子妄意笙簫聲千金得竒藥開視皆狶苓不知市人中自有安期生今君巳度世坐閲霜中蔕摩挲古銅人歲月不可計閬風安在哉要君相指似次韻荅舒教授觀余所藏墨異時長笑王㑹稽野鶩膻腥汙刀几莫年却得庾安西自厭家雞題六紙二子風流冠當代顧與兒童争愠喜秦王十八巳龍飛嗜好晚將虵蚓比我生百事不挂眼時人繆説云工此世間有癖念誰無傾身障簏尤堪鄙一生當著㡬兩屐定心肯為微物起此墨足支三十年但恐風霜侵髮齒非人磨墨墨磨人瓶應未罄罍先恥逝將振衣歸故國數畝荒園自鋤理作書寄君君莫笑但覔來禽與青李一螺㸃漆便有餘萬竈燒松何處使君不見永寧第中𢷬龍麝列屋閒居清且美倒暈連眉秀嶺浮雙鴉畫鬢香雲委時聞五斛賜蛾綠不惜千金求獺髓聞君此詩當大笑寒窓冷硯氷生水送鄭户曹賦席上果得榧子彼美玉山果粲為金盤實瘴霧脱蠻溪清樽奉佳客客行何以贈一語當加璧祝君如此果徳膏以自澤驅攘三彭仇巳我心腹疾願君如此木凛凛傲霜雪斵為君倚几滑净不容削物微興不淺此贈毋輕擲送胡掾亂葉和凄雨投空如散絲流年一如此㳺子去何之節義古所重艱危方自茲他時著清徳仍復畏人知荅仲屯田次韻秋來不見渼陂岑千里詩盟忽重尋大木百圍生逺籟朱絃三歎有遺音清風巻地收殘暑素月流天掃積隂欲遣何人賡絶唱滿堦桐葉候蟲吟密州宋國博以詩見紀在郡雜詠次韻荅之吾觀二宋文字字照縑素淵源皆有考竒嶮或難句後來邈無繼嗣子其殆庶胡為尚流落用舎真有數當時茍悦可慎勿笑杕杜斵窓誰赴救袖手良優裕山城辱吾繼缺短煩遮䕶昔年繆陳詩無人聊瓦注于今賡絶唱外重中巳懼何當附家集擊壤追咸濩荅范祖禹吾州下邑生劉季誰數區區張與李來詩有張僕射李臨淮之句重瞳遺迹巳塵埃惟有黄樓臨泗水郡有㕔事俗謂之霸王㕔相傳不可坐僕拆之以盖黄樓而今太守老且寒俠氣不洗儒生酸猶勝白門窮吕布欲將鞍馬事曹瞞次韻荅王定國每得君詩如得書宣心寫妙書不如眼前百種無不有知君一以詩驅除傳聞都下十日雨青泥沒馬街生魚舊雨來人今不來油然獨酌卧清虚堂名我雖作郡古云樂山川信美非吾廬願君不廢重九約念此衰冷勤呵嘘芙蓉城并叙世傳王逈字子髙與仙人周瑶英㳺芙蓉城元豐元年三月余始識子髙問之信然乃作此詩極其情而歸之正亦變風止乎禮義之意也芙蓉城中花㝠㝠誰其主者石與丁珠簾玉樓翡翠屏雲舒霞巻千俜停中有一人長眉青炯如微雲淡疎星往來三世空鍊形竟坐誤讀黄庭經天門夜開飛爽靈無復白日乗雲軿俗縁千刼磨不盡翠被冷落凄餘馨因過緱山朝帝廷夜聞笙簫弭節聽飄然而來誰使令皎如明月入窓櫺忽然而去不可執寒衾虚幌風泠泠仙宫洞房本不扄夢中同躡鳳凰翎徑渡萬里如奔霆玉樓浮空聳亭亭天書雲篆誰所銘遶樓飛歩髙竛竮仙風鏘然韻流鈴蘧蘧形開如酒惺芳卿寄謝空丁寧一朝覆水不返瓶羅巾别淚空熒熒春風花開秋葉零世間羅綺紛膻腥此生流浪随滄溟偶然相值兩浮萍願君收視觀三庭勿與嘉榖生蝗螟從渠一念三千齡下作人間尹與邢和鮮于子駿鄆州新堂月夜二首前次韻後不次去歲㳺新堂春風雪消後池中半篙水池上千尺栁佳人如桃李胡蝶入衫袖山川今何許疆野巳分宿歲月不可思駛若船放溜繁華真一夢寂寞兩榮朽惟有當時月依然照杯酒應憐船上人坐穏不知漏明月入華池反照池上堂堂中隠几人心與水月凉風螢巳無迹露草時有光起觀河漢流步屧響長廊名都信繁㑹千指調絲簧先生病不飲童子為燒香獨作五字詩清絶如韋郎詩成月漸側皎皎兩相望送將官梁左藏赴莫州燕南垂趙北際其間不合大如礪至今父老哀公孫烝土為城鐵作門城中積穀三百萬猛士如雲驕不戰一朝皷角鳴地中帳下美人空掩面豈如千騎平時來笑談謦欬生風雷葛巾羽扇紅塵静投壺雅歌清燕開東方徤兒虓虎様泣涕懐思亷恥將彭城老守亦凄然不見君家雪兒唱次韻子由送趙㞦歸覲錢塘遂赴永嘉歸舟轉河曲稍見楚山蒼候吏來迎客吴音巳帶鄉言從謝康樂先獻魯靈光巳擊三千里何須四十强風流半刺史清絶校書郎到郡詩成集尋溪水濺裳芒鞋随採藥蠒紙記流觴海静蛟鼉出山空草木長宦㳺無逺近民事要更嘗願子傳家法他年請尚方中秋月三首殷勤去年月瀲灔古城東憔悴去年人卧病破窓中徘徊巧相覔窈窕穿房櫳月豈知我病但見歌樓空撫枕三歎息扶杖起相從天風不相哀吹我落瓊宫白露入肝肺夜吟如秋蟲坐令太白豪化為東野窮餘年知㡬何佳月豈屢逢寒魚亦不睡竟夕相噞喁六年逢此月五年照離别中秋有月凢六年矣惟去歲與子由㑹於此歌君别時曲滿坐為凄咽留都信繁麗此㑹豈輕擲鎔銀百頃湖挂鏡千尋闕三更歌吹罷人影亂清樾歸來北堂下寒光翻露葉喚酒與婦飲念我向兒説豈知衰病後空盞對梨栗但見古河東􅘹麥如鋪雪欲和去年曲復恐心斷絶舒子在汶上閉門相對清舒煥試舉人鄆州鄭子向河朔鄭僅赴北京戸曹孤舟連夜行頓子雖咫尺兀如在牢扄頓起來徐試舉人趙子寄書來水調有餘聲今日得趙杲卿書猶記余在東武中秋所作水調歌頭悠哉四子心共此千里明明月不解老良辰難合并回顧坐上人聚散如流萍嘗聞此宵月萬里同隂晴故人史生為余言甞見海賈云中秋有月則是嵗珠多而圓賈人常以此候之雖相去萬里他日㑹合相問隂晴無不同者天公自著意此㑹那可輕明年各相望俯仰今古情中秋見月寄子瞻西風吹暑天益髙明月耿耿分秋毫彭城閉門青嶂合坐聽百歩鳴飛濤使君携客登燕子月色著人如著水筵前不設鼓與鐘處處笛聲相應起浮雲巻盡流金丸戲馬臺西山鬱蟠杯中淥酒一時盡衣上白露三更寒扁舟明日浮古汴回首逡巡陵谷變河吞巨野入長淮城沒黄流只三板明年築城城似山伐木為堤堤更堅黄樓未成河巳退空有遺迹令人看城頭看月應更好河流深處今生草子孫免被魚鼈食歌舞聊寛使君老南都從事老更貧羞見青天月照人飛鶴投籠不能出曽是彭城坐中客和子由中秋見月明月未出羣山髙瑞光千丈生白毫一杯未盡銀闕涌亂雲脱壊如崩濤誰為天公洗眸子應費明河千斛水遂令冷看世間人照我湛然心不起西南火星如彈丸角尾奕奕蒼龍蟠今宵注眼看不見更許螢火争清寒何人艤舟臨古汴千燈夜作魚龍變曲折無心逐浪花低昻赴節隨歌板是夜賈客舟中放水燈青熒滅沒轉前山浪颭風迴豈復堅明月易低人易散歸來呼酒更重看堂前月色愈清好咽咽寒螿鳴露草巻簾推户寂無人窓下咿啞惟楚老近有一孫名楚老南都從事莫羞貧對月題詩有㡬人明朝人事隨日出怳然一夢瑶臺客荅王鞏鞏将見過有詩自謂惡客戯之汴泗遶吾城城堅如削鐵中有李臨淮號令肝膽裂古來彭城守未省怕惡客惡客云是誰祥符相公孫是家豪逸生有種千金一擲頗黎盆連車載酒來不飲外酒嫌其村子有千瓶酒我有萬株菊任子滿頭插團團見花不見目醉中插花歸花重壓折軸問客何所須客言我愛山青山自遶郭不要買山錢此外有黄樓樓下一河水美哉洋洋乎可以療饑并洗耳彭城之逰樂復樂客惡何如主人惡次韻王定國馬上見寄昨夜霜風入裌衣曉來病骨更支離疎狂似我人誰顧坎軻憐君志未移但恨不携桃葉女尚能來趁菊花時南臺二謝無人繼直恐君詩勝義熙二謝從宋武帝九日燕戯馬臺與頓起孫勉泛舟探韻得未字窓前堆梧桐牀下鳴絡緯佳人尺書到客子中夜喟朝來一樽酒晤語聊自慰秋蠅巳無聲霜蠏初有味當為壯士飲眦裂須磔蝟勿作兒女懐坐念蠨蛸畏山城亦何有一笑瀉肝胃泛舟以娱君魚鼈多可餼縦為十日飲未遽主人費吾儕俱老矣耿耿知自貴寧能傍門户啼笑雜猩狒要將百篇詩一吐千丈氣蕭條歲行莫迨此霜雪未明朝出城南遺迹觀楚魏西風迫吹帽金菊亂如沸願君勿言歸輕别吾所諱次韻荅頓起二首挽袖推腰踏破紳舊聞携手上天門相逢應覺聲容似欲話先驚歲月奔新學巳皆從許子諸生猶自畏何蕃殿廬直宿真如夢猶記憂時䇿萬言頓君及第時余為殿試編排官見其荅䇿語頗直其後與子由試舉人西京既罷同登嵩山絶頂甞見其唱酬詩十餘首頓詩中及之十二東秦比漢京去年古寺共題名去歲見之於青州早衰怪我遽如許苦學憐君太瘦生茆屋擬歸田二頃金丹終掃雪千莖何人更似蘓司業和遍新詩滿洛城東坡全集巻九
