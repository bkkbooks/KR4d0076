body:
  text: 東坡全集卷九十宋蘇軾撰行狀二首司馬溫公行狀曽祖政贈太子太保曽祖母薛氏贈溫國太夫人祖炫試祕書省校書郎知耀州富平縣事贈太子太傅祖母皇甫氏贈溫國太夫人父池尚書吏部郎中充天章閣待制贈太師追封溫國公母聶氏贈溫國太夫人公諱光字君實其先河內人晉安平獻王孚之後王之裔孫征東大將軍陽始葬今陜州夏縣涑水鄉子孫因家焉自高祖曽祖皆以五代衰亂不仕富平府君始舉進士沒於縣令皆以氣節聞於鄉里而天章公以文學行義事真宗仁宗為轉運使御史知雜事三司副使歷知鳳翔河中同杭虢晉六州以清直仁厚聞於天下號稱一時名臣公自兒童凛然如成人七嵗聞講左氏春秋大愛之退為家人講即了其大義自是手不釋書至不知飢渴寒暑年十五書無所不通文辭醇深有西漢風天章公當任子次及公公推與二從兄然後受補郊社齊郎再奏將作監主簿年二十舉進士甲科改奉禮郎以天章公在杭辭所遷官求僉書蘇州判官事以便親許之未上丁太夫人憂未除丁天章公憂執喪纍年毁瘠如禮服除僉書武成軍判官事改大理評事為國子直講遷本寺丞故相龎籍名知人始與天章公遊見公而竒之及是為樞密使薦公召試館閣校勘同知太常禮院中官麥允言死詔以允言有軍功特給鹵簿公言孔子不以名器假人繁纓以朝且猶不可允言近習之臣非有元勳大勞而贈以三公之官給以一品鹵簿其為繁纓不亦大乎故相夏竦卒詔賜諡文正公言諡之美者極於文正竦何人可以當此書再上改諡文莊遷殿中丞除史館檢討修日厯改集賢校理龎籍為鄆州徙并州皆辟公通判州事公感籍知已為盡力時趙元昊始臣河東貧甚官苦貴糴而民疲於逺輸麟州窟野河西多良田皆故漢地公私雜耕天聖中始禁田河西者敵乃得稍蠶食其地俯窺麟州為河東憂籍請公按視公為畫五䇿宜因州中舊兵益禁兵三千箱兵五百築二堡河西可使堡外三十里敵不敢田則州西六十里無虞矣募民有能耕麟州閒田者復其稅役十五年能耕窟野河西者長復之耕者必衆官雖無所得而糴自賤可以漸紓河東之民籍移麟州如公言而官兵郭恩勇且狂夜開城門引千餘人渡河載酒食不為戰備遇敵死之議者歸罪於籍罷節度使知青州公守闕三上書乞獨坐其事不報籍初不以此望公而公深以自咎籍既沒升堂拜其妻如母撫其子如昆弟時人兩賢之改太常博士祠部員外郎直祕閣判吏部南曹遷開封府推官賜五品服交趾貢異獸謂之麟公言真僞不可知使其真非自然而至不足為瑞若僞為逺夷笑願厚賜其使而還其獸因奏賦以諷遷度支員外郎判句院擢修起居注五辭而後受判禮部有司奏六月朔日當食公言故事食不滿分或京師不見皆賀臣以為日食四方見京師不見天意人君為隂邪所蔽天下皆知而朝廷獨不知其為災當益甚皆不當賀詔從之後遂以為常遷起居舍人同知諫院蘇轍舉直言䇿入第四等而考官以為不當收公言轍於同科四人中言最切直有愛君憂國之心不可不收時宰相亦以為當黜仁宗不許曰求直言以直棄之天下其謂朕何公遂與諫官王陶同上疏願為宗廟社稷自重卻罷燕飲安養神氣後宫嬪御進見有度左右小臣賜豫有節厚味臘毒無益奉養者皆不宜數御上嘉納之初至和三年仁宗始不豫國嗣未立天下寒心而不敢言惟諫官范鎮首發其議公時為并州通判聞而繼之上疏言禮大宗無子則小宗為之後者為之子也願陛下擇宗室賢者使攝儲二以待皇嗣之生退居藩服不然則典宿衛尹京邑亦足以係天下之望疏三上其一留中其二付中書公又與鎮書此大事不言則巳言一出豈可復反願公以死爭之於是鎮言之益力及公為諫官復上疏且面言臣昔為并州通判所上三章願陛下果斷而力行之時仁宗簡默不言雖執政奏事首肯而已聞公言沈思久之曰得非欲選宗室為繼嗣者乎此忠臣之言但人不敢及耳公曰臣言此自謂必死不意陛下開納上曰此何害古今皆有之因令公以所言付中書公曰不可願陛下自以意喻宰相是日公復言江淮鹽事詣中書白之宰相韓琦問公今日復何所言公默計此大事不可不使琦知思所以廣上意者即曰所言宗廟社稷大計也琦喻意不復言後十餘日有㫖令公與御史裏行陳洙同詳定行戶利害洙與公屏語曰日者大饗明堂韓公攝太尉洙為監祭公從容謂洙聞君與司馬君實善君實近建言立嗣事恨不以所言送中書欲發此議無自發之行戶利害非所以煩公也欲洙見公達此意耳時嘉祐六年閏八月也至九月公復上疏面言臣向者進說陛下欣然無難意謂即行矣今寂無所聞此必有小人言陛下春秋鼎盛子孫當千億何遽為此不祥之事小人無逺慮特欲倉猝之際援立其所厚善者耳唐自文宗以後立嗣皆出於左右之意至有稱定䇿國老門生天子者此禍豈可勝言哉上大感悟曰送中書公至中書見琦等曰諸公不及今定議異日夜半禁中出寸紙以某人為嗣則天下莫敢違琦等皆唯唯曰敢不盡力後月餘詔英宗判宗正寺固辭不就職明年遂立為皇太子稱疾不入公復上疏言凡人爭絲毫之利至相爭奪今皇子辭不資之富至三百餘日不受命其賢於人逺矣有識聞之足以知陛下之聖能為天下得人然臣聞父召無諾君命召不俟駕而禮使者受命不受辭皇子不當辭避使者不當徒反凡召皇子內臣皆乞責降且以臣子大義責皇子宜必入英宗遂受命兖國公主下嫁李瑋以驕恣聞公上疏言太宗時姚坦為兖王翊善有過必諫左右教王詐疾踰月太宗召王乳母入問起居狀母曰王無疾以姚坦故鬱鬱成疾耳太宗怒曰王年少不知為此汝輩教之杖乳母數十召坦慰勉之齊國獻穆大長公主太宗之子真宗之妹陛下之姑而謙恭率禮天下稱其賢願陛下教子以太宗為法公主事夫以獻穆為法巳而公主不安於李氏詔瑋出知衛州公主入居禁中而瑋母楊歸其兄璋散遣其家人公言陛下追念章懿皇后故使瑋尚主今乃母子離析家事流落陛下獨無雨露之感悽惻之心乎瑋既責降公主亦不得無罪上感悟詔公主降封沂國待李氏恩禮不衰判檢院權判國子監除知制誥力辭至八九改授天章閣待制兼侍講賜三品服仍知諫院上疏言經略安撫使以便宜從事出於兵興權制非永世法及將相大臣典州者多以貴倨自恃凌忽轉運使使不得舉職朝廷務省事専行姑息之政至於胥吏歡譁而逐御史中丞輦官悖慢而退宰相衛士凶逆而獄不窮姦澤加於舊軍人詈三司使而法官以為非犯階級於用法疑其餘有一夫流言於道路而為之變法推恩者多矣皆陵遲之漸不可以不正充媛董氏薨追贈婉儀又贈淑妃輟朝成服百官奉慰定諡行册禮葬給鹵簿公言董氏秩本微病革之日方拜充媛古者婦人無諡近制惟皇后有之鹵簿本以賞軍功未嘗施於婦人惟唐平陽公主有舉兵佐髙祖定天下之功乃得給至韋庶人始令妃主葬日皆給鼓吹非令典不足法時有司新定後宫封贈法皇后與妃皆贈三代公言别嫌明微妃不當與后同袁盎引却慎夫人坐正為此耳天聖親郊太妃止贈二代而况妃乎知嘉祐八年貢舉仁宗崩英宗以哀毁致疾慈聖光獻太后同聽政公首上疏言章獻明肅太后保佑先帝進賢退姦有大功於趙氏特以親用外戚小人故負謗天下今太后初攝大政大臣忠厚如王曽清純如張知白剛正如魯宗道質直如薛奎者當信用之鄙猥如馬季良讒諂如羅崇勳者當疏逺之則天下服又上疏英宗言漢宣帝為昭帝後終不追尊衛太子史皇孫光武起布衣得天下自以為後元帝亦不追尊巨鹿都尉南頓君惟哀安桓靈皆自旁親入繼大統追尊其父祖天下非之願以為戒時公所得仁宗遺賜珠金直百餘萬率同列三上章言國有大憂中外窘乏不可專用乾興故事若遺賜不可辭則宜許侍從以上進金錢佐山陵費不許公乃以所得珠為諫院公使錢金以遺其舅氏義不藏於家英宗疾既平皇太后還政公上疏言治身莫先於孝治國莫先於公其言切至皆母子間人所難言者時有司立法皇太后有所取用有司奏覆得御寶乃供公極論以為不可當直下合同司移所屬立供如上所取巳乃具數奏太后以防矯僞曹佾除使相兩府皆遷公言佾無功而得使相陛下以慰母心耳今兩府皆遷無名若以還政為功則宿衛將帥內侍小臣必有覬望巳而都知任守忠等皆遷公復爭之因論守忠大姦陛下為皇子非守忠意沮壞大䇿離間百端賴先帝不聽及陛下嗣位反覆革面交構兩宫國之大賊人之巨蠧乞斬於都市以謝天下詔以守忠為節度副使蘄州安置天下快之時有詔陜西刺民兵號義勇公上疏極論其害云康定慶厯間籍陜西民為鄉弓手巳而刺為保捷指揮民被其毒兵終不可用遇敵先北正兵隨之每致崩潰縣官知其坐食無用汰遣歸農而惰游之人不能復反南畝彊者為盜弱者轉死父老至今流涕也今義勇何以異此章六上不從乞罷諫官不許王廣淵除直集賢院公言廣淵姦邪不可近昔漢景帝為太子召上左右飲衛綰獨稱疾不行及即位待綰有加周世宗鎮澶淵張美為三司吏掌州之錢穀世宗私有求假美悉力應之及即位薄其為人不用今廣淵當仁宗之世私自結於陛下豈忠臣哉願黜之以厲天下執政建言濮安懿王德盛位隆宜有尊禮詔太常禮院與兩制議翰林學士王圭等相顧不敢先公獨奮筆立議曰為之後者為之子不敢復顧其私親今日所以崇奉濮安懿王典禮宜一準先朝封贈期親尊屬故事髙官大爵極其尊榮議成圭即敕吏以公手藁為案至今存焉時中外訩訩御史吕誨傅堯俞范純仁吕大防趙鼎趙瞻等皆爭之相繼降黜公上疏乞留之不可則乞與之皆貶初西戎遣使致祭而延州指使髙宜押伴傲其使者侮其國主使者訴於朝公與吕誨乞加宜罪不從明年西戎犯邉殺略吏士趙滋為雄州專以猛悍治邉公亦論其不可至是契丹之民有捕魚界河伐柳白溝之南者朝廷以知雄州李中祐為不材選將代之公言國家當外國附順時好與之計較末節及其桀驁又從而姑息之近者西戎之禍生於髙宜北邊之隙起於趙滋朝廷方賢此二人故邊臣皆以生事為能今若選將代中祐則來者必以滋為法而以中祐為戒漸不可長宜敕邊吏疆場細故徐以文檄往反若輕以矢刃相加者坐之京師大水公上疏論三事皆盡言無所隱諱除龍圖閣直學士判流內銓改右諫議大夫知治平四年貢舉神宗即位首擢公為翰林學士公力辭不許上面諭公古之君子或學而不文或文而不學惟董仲舒揚雄兼之卿有文學何辭為公曰臣不能為四六上曰如兩漢制詔可也公曰本朝故事不可上曰卿能舉進士取髙等而云不能四六何也公趨出上遣內臣至閣門強公受告拜而不受趣公入謝曰上坐以待公公入至廷中以告置公懷中不得巳乃受遂為御史中丞初中丞王陶論宰相不押常朝班為不臣宰相不從陶爭之力遂罷公既繼之言宰相不押班細故也陶言之過然愛禮存羊則不可巳自頃宰相權重今陶復以言宰相罷則中丞不可復為臣願候宰相押班然後就職上曰可陶既出知陳州謝章詆宰相不巳執政議再貶陶公言陶誠可罪然陛下欲廣言路屈己受陶而宰相獨不能容乎乃巳公上疏論修心之要三曰仁曰明曰武治國之要三曰官人曰信賞曰必罰其說甚備且曰臣昔為諫官即以此六言獻仁宗其後以獻英宗今以獻陛下平生力學所得盡在是矣公在英宗時與吕誨同論祖宗之制勾當御藥院常用供奉官以下至內殿崇班則出近歲居此位者皆暗理官資食其廩給非祖宗大意又故事年未五十不得為內侍省押班今除張茂則止四十八不可至是又言之因論髙居簡姦邪乞加逺竄章五上上為盡罷寄資內臣居簡亦補外未幾復留陳承禮劉有方二人公復爭之又言近者王中正往陜西知涇州劉渙等諂事中正而鄜延鈐轄吳舜臣違失其意巳而渙等進擢舜臣降黜權歸中正謗歸陛下是去一居簡得一居簡上手詔問公所從知公曰臣得之賓客非一人言事之有無惟陛下知之若無臣不敢避妄言之罪萬一有之不可不察詔用宫邸直省官郭昭選等四人為閣門祗候公言國初草創天步尚艱故即位之始必以左右舊人為腹心耳目謂之隨龍非平日法也閣門祗候在文臣為館職豈可使厮役為之英宗山陵公為儀仗使賜金五十兩銀合三百兩三上章辭從之邉吏上言西戎部將嵬名山欲以橫山之衆取諒祚以降詔邉臣招納其衆公上疏極論以為名山之衆未必能制諒祚幸而勝之滅一諒祚生一諒祚何利之有若其不勝必引衆歸我不知何以待之臣恐朝廷不獨失信於諒祚又將失信於名山矣若名山餘衆尚多還北不可入南不受窮無所歸必將突據邉城以救其命陛下獨不見侯景之事乎上不聽遣將种諤發兵迎之取綏州費六十萬萬西方用兵蓋自是始矣兼翰林侍讀學士登州有不成婚婦謀殺其夫傷而不死者吏疑問即承知州事許遵讞之有司當婦絞而詔貸之遵上議準律因犯殺傷而自首者得免所因之罪婦當減二等不當絞詔公與王安石議之安石是遵議公言謀殺猶故殺也皆一事不可分為二若謀為所因與殺為二則故與殺亦可為二邪自宰相文彥博以下皆附公議然卒用安石言至今天下非之權知審官院百官上尊號公當答詔上疏言先帝親郊不受尊號天下莫不稱頌末年有建言者國家與契丹有往來書信彼有尊號而我獨無以為深恥於是羣臣復以非時上尊號昔漢文帝時單于自稱天地所生日月所置胸奴大單于不聞文帝復為大名以加之也願陛下追用先帝本意不受此名上大悅手詔答公非卿朕不聞此言善為答詞使中外曉然知朕至誠非欺衆邀名者遂終身不復受尊號執政以河朔災傷國用不足乞今歲親郊兩府不賜金帛送學士院取㫖公言兩府所賜以匹兩計止二萬未足以救災宜自文臣兩省武臣宗室刺吏以上皆減半公與學士王圭王安石同對公言救災節用宜自貴近始可聽兩府辭賜安石曰常衮辭賜饌時議以為衮自知不能當辭位不當辭祿且國用不足非當今之急務也公曰衮辭祿猶賢於持祿固位者國用不足真急務安石言非是安石曰不足者以未得善理財者故也公曰善理財者不過頭㑹箕斂以盡民財民窮為盜非國之福安石曰不然善理財者不加賦而上用足公曰天下安有此理天地所生財貨百物止有此數不在民則在官譬如雨澤夏潦則秋旱不加賦而上用足不過設法陰奪民利其害甚於加賦此乃桑羊欺漢武帝之言太史公書之以見武帝不明耳至其末年盜賊蜂起幾至於亂若武帝不悔禍昭帝不變法則漢幾亡爭議不巳王圭進曰救災節用宜自貴近始司馬光言是也然所費無幾恐傷國體王安石言亦是惟明主裁擇上曰朕意與光同然姑以不允答之㑹安石當制遂引常衮事責兩府兩府亦不復辭兼史館修撰上問公可為諫官者公薦吕誨誨以天章閣待制知諫院詔公與張茂則同相視二股河及生堤利害公用都水監丞宋昌言䇿乞於二股之西置上約約水東流若東流日深北流自淺薪芻漸備乃塞其北放出御河胡盧河下流以紓恩冀深瀛以西之患時議者多不同公於上前反覆論難甚苦卒從之後皆如公言賜詔奬諭王安石始為政創立制置三司條例司建為青苗助役水利均輸之政置提舉官四十餘員行其法於天下謂之新法公上疏逆陳其利害日後當如是行之十餘年無一不如公言者天下傳誦以公為真宰相雖田父野老皆號公司馬相公而婦人孺子知其為君實也邇英進讀至蕭何曹參事公曰參不變何法得守成之道故孝惠髙后時天下晏然衣食滋殖上曰漢守蕭何之法不變可乎公曰何獨漢也使三代之君常守禹湯文武之法雖至今存可也武王克商曰乃反商政政由舊然則雖周亦用商政也書曰無作聰明亂舊章漢武帝用張湯言取髙帝法紛更之盜賊半天下元帝改宣帝之政而漢始衰由此言之祖宗之法不可變也後數日吕惠卿進講因言先王之法有一年而變者正月始和布法象魏是也有五年一變者巡狩考制度是也有三十年一變者刑罰世輕世重是也有百年不變者父慈子孝兄友弟恭是也前日光言非是其意以諷朝廷且譏臣為條例司官耳上問公惠卿言何如公曰布法象魏布舊法也何名為變若四孟月朔屬民讀法為時變月變耶諸侯有變禮易樂者王巡狩則誅之王不自變也刑新國用輕典亂國用重典平國用中典是為世輕世重非變也且治天下譬如居室敝則修之非大壞不更造也大壞而更造非得良匠美材不成今二者皆無有臣恐風雨之不庇也公卿侍從皆在此願陛下問之三司使掌天下財不才而黜可也不可使兩府侵其事今為制置三司條例司何也宰相以道佐人主安用例苟用例則胥吏足矣今為看詳中書條例司何也惠卿不能對則詆公曰光為侍從何不言言而不從何不去公作而答曰是臣之罪也上曰相與論是非耳何至是講畢賜坐戶外將出上命徙坐戶內左右皆避去上曰朝廷每更一事舉朝訩訩何也王圭曰臣疏賤在闕門之外朝廷之事不能盡知借使聞之道路又不知其虛實也上曰聞則言之公曰青苗出息平民為之尚能以蠶食下戶至飢寒流離况縣官法令之威乎惠卿曰青苗法願取則與之不願不強也公曰愚民知取債之利不知還債之害非獨縣官不強富民亦不強也臣聞作法於涼其弊猶貪作法於貪弊將若之何昔太宗平河東立和糴法時米㪷十餘草束八錢民樂與官為市其後物貴而和糴不解遂為河東世世患臣恐異日之青苗猶河東之和糴也上曰陜西行之久矣民不以為病公曰臣陜西人也見其病不見其利朝廷初不許也而有司尚能以病民况立法許之乎上曰坐倉糴米何如坐者皆起曰不便上巳罷之幸甚上曰未罷也公曰京師有七年之儲而錢常乏若坐倉錢益乏米益陳奈何惠卿曰坐倉得米百萬斛則省東南百萬之漕以其錢供京師何患無錢公曰東南錢荒而米狼戾今不糴米而漕錢棄其有餘取其所無農末皆病矣侍講吳申起曰光言至論也公曰此皆細事不足煩人主但當擇人而任之有功則賞有罪則罰此則陛下職也上曰然文王罔攸兼於庶言庶獄庶慎惟有司之牧夫公趨出上曰卿得無以惠卿之言不樂乎公曰不敢韓琦上疏論青苗之害上感悟欲罷其法安石稱疾求去㑹拜公樞密副使公上章力辭至六七曰上誠能罷制置條例司追還提舉官不行青苗助役等法雖不用臣臣受賜多矣不然終不敢受命上遣人謂公樞密兵事也官各有職不當以他事為詞公言臣未受命則猶侍從也於事無不可言者安石起視事青苗法卒不罷公亦卒不受命則以書喻安石三往反開喻苦至猶幸安石之聽而改也且曰巧言令色鮮矣仁彼忠信之士於公當路時雖齟齬可憎後必徐得其力諂諛之人於今誠有順適之快一旦失勢必有賣公以自售者意謂吕惠卿對賔客輒指言之曰覆王氏者必惠卿也小人本以利合勢傾利移何所不至其後六年而惠卿叛安石上書告其罪苟可以覆王氏者靡不為也由是天下服公先知公求補外上猶欲用公公不可以端明殿學士出知永興軍朝辭進對猶乞免本路青苗助役宣撫使下令分義勇四番欲以更戍邉選諸軍驍勇募閭里惡少為竒兵調民為乾糧麨飯雖內郡不被邉皆修城池樓櫓如邉郡且遣兵就糧長安河中邠三輔騷然公上疏極言方凶歲公私困弊不可舉事而永興一路城池樓櫓皆不急乾糧麨飯昔嘗造後無用腐棄之宣撫司令臣皆未敢從若乏軍興臣坐之於是一路獨得免頃之詔移之許州不赴遂乞判西京留司御史臺以歸自是絶口不論事以祀明堂恩加上柱國至熙寧七年上以天下旱蝗詔求直言公讀詔泣下欲默不忍乃復陳六事一青苗二免役三市易四邉事五保甲六水利此尤病民者宜先罷又以書責宰相吳充天子仁聖如此而公不言何也元豐五年公忽得語澀疾自疑當中風乃豫作遺表大略如六事加詳盡感慨親書緘封置卧內且死當以授所善范純仁范祖禹使上之凡居洛十五年再任留司御史臺四任提舉崇福宫官制行改太中大夫加資政殿學士神宗崩公赴闕臨衛士見公入皆以手加額曰此司馬相公也民遮道呼曰公無歸洛留相天子活百姓所在數千人聚觀之公懼㑹放辭謝遂徑歸洛太皇太后聞之詰問主者遣使勞公問所當先者公言近歲士大夫以言為諱閭閻愁苦於下而上不知明主憂勤於上而下無所訴此罪在羣臣而愚民無知歸怨先帝宜下詔首開言路從之下詔榜朝堂而當時有不欲者於詔語中設六事以禁切言者曰若陰有所懷犯非其分或扇搖機事之重或迎合巳行之令上以觀望朝廷之意以僥幸希進下以眩惑流俗之情以干取虛譽若此者必罰無赦太皇太后封詔草以問公公曰此非求諫乃拒諫也人臣惟不言言則入六事矣時太府少卿宋彭年水部員外郎王諤皆應詔言事有欲借此二人以懲天下言者皆以非職而言贖銅三十斤公具論其情且請改賜詔書行之天下從之於是四方吏民言新法不便者數千人公方草具所當行者而太皇太后巳有㫖散遣修京城役夫罷減皇城內覘者止御前工作出近侍之無狀者三十餘人戒敕中外無敢苛刻暴斂廢導洛司物貨場及民所養戶馬寬保馬限皆從中出大臣不與公上疏謝當今急務陛下略巳行之矣小臣稽慢罪當萬死詔除公知陳州且過闕入見使者勞問相望於道至則拜門下侍郎公力辭不許數賜手詔先帝新棄天下天子沖幼此何時而君辭位耶公不敢復辭以覃恩遷通議大夫初神宗皇帝以英偉絶人之資勵精求治凜凜乎漢宣帝唐太宗之上矣而宰相王安石用心過當急於功利小人得乘間而入吕惠卿之流以此得志後者慕之爭先相髙而天下病矣先帝明聖獨見其非出安石金陵天下欣然意法必變雖安石亦自悔恨其去而復用也欲稍自改而惠卿之流恐法變身危持之不肯改然先帝終疑之遂退安石八年不復召而惠卿亦再逐不用元豐之末天下多故及二聖嗣位民日夜引領以觀新政而進說者以為三年無改於父之道欲稍損其甚者毛舉數事以塞人言公慨然爭之曰先帝之法其善者雖百世不可變也若安石惠卿等所建為天下害非先帝本意者改之當如救焚拯溺猶恐不及昔漢文帝除肉刑斬右趾者棄市笞五百者多死景帝元年即改之武帝作鹽鐵𣙜酤均輸等法昭帝罷之唐代宗縱宦官公求賂遺置客省拘滯四方之人德宗立未三月罷之德宗晚年為官市五坊小兒暴橫鹽鐵使月進羡餘順宗即位罷之當時悅服後世稱頌未有或非之者也况太皇太后以母改子非子改父衆議乃定公以為治亂之機在於用人邪正一分則消長之勢自定每論事必以人物為先凡所進退皆天下所謂當然者然後朝廷清明人主始得聞天下利害之實遂罷保甲團教依義勇法歲一閲保馬不復買見在者還監牧給諸軍廢市易法所儲物皆鬻之不取息而民所缺錢皆除其息京東鑄鐵錢河北江西福建湖南鹽及福建茶法皆復其舊獨川陜茶以邉用未即罷遣使相視去其甚者户部左右曹錢穀皆領之尚書凡昔之三司使事有散𨽻五曹及寺監者皆歸戶部使尚書周知其數量入以為出於是天下釋然曰此先帝本意也非吾君之子不能行吾君之意時獨免役青苗將官之法猶在而西戎之議未决也山陵畢遷公正議大夫公自以不與顧命不敢當詔不許元祐元年正月公始得疾詔公與尚書左丞吕公著朝㑹與執政異班再拜而已不舞蹈公疾益甚歎曰四患未除吾死不瞑目矣乃力疾上疏論免役五害乞直降敕罷之率用熙寧以前法有未便州縣監司節級以聞為一路一州一縣法詔即日行之又論西戎大略以和戎為便用兵為非時異議者甚衆公持之益堅其後太師文彥博議與公合衆不能奪又論將官之害詔諸將兵皆𨽻州縣軍政委守令通决之又乞廢提舉常平司以其事歸之轉運使及提㸃刑獄公謂監司多新進少年務為刻急天下病之乞自太中大夫待制以上於郡守中舉轉運使提㸃刑獄於通判中舉轉運判官又以文學德行吏事武略等為十科以求天下遺才命文臣升朝以上歲舉經明行修一人以為進士髙選皆從之拜左僕射疾稍間將起視事詔免朝覲許以肩輿三日一入都堂或門下尚書省公不敢當曰不見君不可以視事詔公肩輿至內東門子康扶入對小殿且曰毋拜公惶恐入對延和殿再拜遂罷青苗錢專行常平糶糴法以歲上中下熟為三等穀賤及下等則增價糴貴及上等則減價糶惟中等則否及下等而不糴及上等而不糶皆坐之時二聖恭儉慈孝視民如傷虛已以聽公公知無不為以身任天下之責數月復病以九月丙辰朔薨於西府享年六十八太皇太后聞之慟上亦感涕不巳時方躬祀明堂禮成不賀二聖皆臨其喪哭之哀甚輟視朝三日贈太師溫國公襚以一品禮服賻銀三千兩絹四千匹賜龍腦水銀以斂命戶部侍郎趙瞻入內內侍省押班馮宗道護其喪歸葬夏縣官其親族十人公忠信孝友恭儉正直出於天性自少及老語未嘗妄其好學如飢之嗜食於財利紛華如惡惡臭誠心自然天下信之退居於洛往來陜郊陜洛間皆化其德師其學法其儉有不善曰君實得無知之乎博學無所不通音樂律厯天文書數皆極其妙晚節尤好禮為冠婚喪祭法適古今之宜不喜釋老曰其微言不能出吾書其誕吾不信不事生産買第洛中僅庇風雨有田三頃喪其夫人質田以葬惡衣菲食以終其身自以遭遇聖明言聽計從欲以身徇天下躬親庶務不舍晝夜賔客見其體羸曰諸葛孔明二十罰以上皆親之以此致疾公不可以不戒公曰死生命也為之益力病革諄諄不復自覺如夢中語然皆朝廷天下事也既沒其家得遺奏八紙上之皆手札論當世要務京師民畫其像刻印鬻之家置一本飲食必祝焉四方皆遣人購之京師時畫工有致富者有文集八十卷資治通鑑三百二十四卷考異三十卷歷年圖七卷通厯八十卷稽古録二十卷本朝百官公卿表六卷翰林詞草三卷注古文孝經一卷易說三卷注繫辭二卷注老子道德經二卷集注太𤣥經八卷大學中庸義一卷集注揚子十三卷文中子傳一卷河外咨目三卷書儀八卷家範四卷續詩話一卷遊山行記十二卷醫問七篇其文如金玉穀帛藥石也必有適於用無益之文未嘗一語及之初公患歷代史繁重學者不能綜况於人主遂約戰國至秦二世如左氏體為通志八卷以進英宗悅之命公續其書置局祕閣以其素所賢者劉攽劉恕范祖禹為屬官凡十九年而成起周威烈王訖五代上下一千三百六十二載其是非疑似之間皆有辨論一事而數說者必考合異同而歸之一作考異以志之神宗尤重其書以為賢於荀悅親為製叙賜名資治通鑑詔邇英讀其書賜潁邸舊書二千四百二卷書成拜資政殿學士賜金帛甚厚娶張氏禮部尚書存之女封清河郡君先公卒追封溫國夫人子三人童唐皆早亡康今為祕書省校書郎孫二人植桓皆承務郎公歷事四朝皆為人主所敬然神宗知公最深公思有以報之常摘孟子之言曰責難於君謂之恭陳善閉邪謂之敬吾君不能謂之賊故雖議論違忤而神宗識其意待之愈厚及拜資政殿學士蓋有意復用公也夫復用公者豈徒然哉將必行其所言公亦識其意故為政之日自信而不疑嗚呼若先帝可謂知人矣其知之也深公可謂不負所知矣其報之也大軾從公逰二十年知公平生為詳故録其大者為行狀其餘非天下所以治亂安危者皆不載謹狀蘇廷評行狀公諱序字仲先眉州眉山人其先蓋趙郡闕城人也曽祖諱釿祖諱祐父諱果三世不仕皆有隱德自皇考行義好施始有聞於鄉里至公而益著然皆自以為不及其父祖矣皇祖生於唐末而卒於周顯德是時王氏孟氏相繼王蜀皇祖終不肯仕嘗以事遊成都有道士見之屏語曰少年有純德非我莫知子我能以藥變化百物世方亂可以此自全因以麵為蠟皇祖笑曰吾不願學也道士曰吾行天下未嘗以此語人自以為至矣子又不能學其過我逺甚遂去不復見公幼疏達不羈讀書略知其大義即棄去謙而好施急於患難甚於為己衣食稍有餘輒費用或以豫人立盡以此窮困厄於飢寒者數矣然終不悔旋復有餘則曰吾固知此不能果困人也益不復愛惜凶年鬻其田以濟飢者既豐人將償之公曰吾固自有以鬻之非爾故也人不問知與不知徑與歡笑造極輸發府藏小人或欺侮之公卒不懲人亦莫能測也李順反攻圍眉州公年二十有二日操兵乘城㑹皇考病沒而賊圍愈急居人相視涕泣無復生意而公獨治喪執禮盡哀如平日太夫人憂甚公強施施解之曰朝廷終不棄蜀賊行破矣慶厯中始有詔州郡立學士歡言朝廷且以此取人爭願效職學中公笑曰此好事卿相以為美觀耳戒子孫無與人爭入學郡吏素暴苛緣是大擾公作詩并譏之以子渙登朝授大理評事慶厯七年五月十一日終於家享年七十有五以八年二月某日葬於眉山縣修文鄉安道里先塋之側纍贈職方員外郎娶史氏夫人先公十五年而卒追封蓬萊縣太君生三子長曰淡不仕亦先公卒次曰渙以進士得官所至有美稱及去人常思之或以比漢循吏終於都官郎中利州路提㸃刑獄季則軾之先人諱洵終於霸州文安縣主簿渙嘗為䦘州公往視其規畫措置良善為留數日見其父老賢士大夫閬人亦喜之晚好為詩能自道敏捷立成不求甚工有所欲言一發於詩比沒得數千首女二人長適杜垂裕幼適石揚言孫七人位份不欺不疑不危軾轍聞之自五代崩亂蜀之學者衰少又皆懷慕親戚鄉黨不肯出仕公始命其子渙就學所以勸導成就者無所不至及渙以進士得官西歸父老縱觀以為榮教其子孫者皆法蘇氏自是眉之學者日益至千餘人然軾之先人少時獨不學巳壯猶不知書公未嘗問或以為言公不答久之曰吾兒當憂其不學邪既而果自憤發力學卒顯於世公之精識逺量施於家聞於鄉閭者如此使少獲從事於世者其功名豈少哉不幸汩沒老死無聞於時然古之賢人君子亦有無功名而傳者特以世有知之者耳公之無傳非獨其僻逺自放終身亦其子孫不以告人之過也故條録其始終行事大略以告當世之君子謹狀東坡全集卷九十
