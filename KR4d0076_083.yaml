body:
  text: 東坡全集巻八十三宋蘓軾撰尺牘一百十一首與大覺禪師璉公二首杭州奉别二十五年幾一世矣㑹見無時此懐可知到此日欲奉書因循至今辱書具審起居安穩南方耆舊彫落惟明有老師杭有辯才道俗所共依仰葢一時盛事比來時得從辯才遊老病昏塞頗有所警發恨不得一見老師更與鑚磨也嵗暮山中寒苦千萬為衆自重又要作宸奎閣碑謹以撰成衰朽廢學不知堪上石否見參寥説禪師出京日英廟賜手詔其畧云任性住持者不知果有否如有竊請録示全文欲添入此一節竊望仔細録到即便添入仍大字寫一本付侍者齎歸上石也惟速為妙碑上别作一碑首如唐以前制度刻字額十五字仍刻二龍夾之碑身上更不冩題自古制如此最後方寫年月撰人銜位姓名更不用著立石人及在任人名銜此乃近世俗氣極不典也下為龜趺承之請令知事僧依此與大别才老三首專人來辱書伏承法體清勝甚慰想望山門虛寂長夏安隠燕坐湛然得無所得無緣面話惟萬萬自重又昨日辱訪冗迫未遑詣謝領手教具審法履勝常為慰語録䝉借開發䝉鄙為惠甚厚又衰疾無狀衆所鄙逺禪師超然絶俗乃肯惠顧此意之厚如何可忘還山以來道體何如相見杳未有期日深馳仰寒凝為衆自重與承天明老五首近辱臨訪紛冗不遂欵接愧企無量比日道體何如法湧赴闕道俗一意皆欲公嗣此道塲緣契已定想便屈臨副此誠仰餘非面莫究又人還辱書䝉峻拒不識道眼有何採擇深所未諭也衆意堅甚計雖百却不已幸早戒途比日起居何如即見不復覼縷又衆詣漕臺敦請已許為行下相次新太守過此當力求之想亦必勸行吾師豈能盡違之耶至時不免來此不如今日赴衰病之請却非世情也又法涌始者甚不欲赴法雲而張都尉之請既堅遂不能違亦云契緣在彼非力辭可免法涌既不得免則吾師今者亦必無緣辭避幸便副衆心毋煩再三也欽企欽企又適辱書知不違衆願即當西渡喜慰之至比日法履康勝某雖被㫖去郡猶能少留及見升堂聞第一義也與佛印禪師三首治行草草不復上問忽奉手筆曠若發䝉且審比日戒體輕安又承退席雲卧尤仰髙風也未緣展晤引跂尤劇又久不奉書忽辱惠教具審徂暑戒體輕安承有金山之召應便領徒東來叢林法席得公臨之與長蘆對峙名壓淮右豈不盛哉渴聞至論當復咨叩惟早趣装途中善愛又塵勞衮衮忽得來書讀之如蓬蒿藜藋之逕而聞謦欬之音可勝慰恱且審即日法履輕安又重以慰也某䝉恩擢寘詞林進陪經幄是為儒者之極榮實出禪師之善禱也餘熱千萬自重與孫正孺二首數日前因來人奉書必達比日伏想履兹餘熱起居佳勝某已八上章乞郡旦夕必有指麾且輟忙為公作得送行詩跋尾以先祖諱故不欲作冠篇也未由㑹合千萬保愛又某頑健稍勝昔日老兄眠食不衰否濶逺無他囑惟倍萬保嗇而已勿将作汎汎常語過耳也千萬千萬入石時莫用邊花欄界之類古碑惟石上有書字耳少着花草欄界便俗狀也不罪不罪偶與子由飲半盞酒便大醉不成字與王元直别久思詠春深不審起居佳否眷愛各康勝某與二十七娘甚安小添寄叔並無恙新珠必甚長成諸親各安旅宦寡悰思歸末由豈勝恨恨某為權倖所疾久矣然捃摭無獲徒勞掀攪取笑四方耳不煩逺憂未緣㑹聚惟冀以時珍衛答王聖美昨日庭中望見喜慰久渴辱教伏承尊體佳勝無緣造門尚冀邂逅復少須臾人還布謝草草答青州張秘校承攜長箋下訪不克迎奉為愧經宿伏惟尊履佳勝示諭乃宰物者之事非不肖所能致也幸賜亮與王慶源之子某自去嵗聞宣義叔丈傾逝尋逓中奉慰疏必已聞達爾後紛冗少暇繼以行役不定久闕書問愧悚不已叔丈平昔以文行著稱鄉閭於塲屋晩乃少遂終不振顯惟望昆仲力學砥礪以顯揚不墜為心乃未戚區區之望也因信惠一二字與王正夫朝奉三首逓中辱書人至復枉手示併増感慰即日起居如宜襄事薄遽哀苦至矣無由助執紼臨紙惋歎尚冀寛中毋毁以就逺業又大年哀詞恨拙訥不盡盛徳聊塞孝心萬一何日西行傾想之極曹子方因㑹致區區又惠示誌文伏讀感歎拙詞何足刻石媿媿子方見過聞動止為慰餘非面莫究答楊禮先三首新嵗日欲徃見紛紛未由辱簡承尊體已安復感慰兼集厚貺狨皮石硯蠟燭物意兩重不敢違命但有媿灼又話别草草惘然不已信宿起居佳勝明日果成行否拙詩聊發一笑又久濶違聚喜慰不可言但苦都下紛紛不盡欵意别來思仰増劇亟辱手教承已到郡起居康福眷愛各無恙寄示石刻暴揚鄙拙極為悚怍衰病懐歸又復嵗暮牢落可知切想坐潁之餘日與知舊徃還此樂可羨也與潮守王朝請滌二首承寄示士民所投牒及韓公廟圖此古之賢守留意於教化者所為非簿書俗吏之所及也顧不肖何足以記此公意既爾衆復過聴亦不敢固辭但迫行冗甚未暇成之願稍寛假逓中附徃也子野誠有過人公能禮之甚善向䝉寵惠髙文欽味不已但老懶廢學無以塞盛意悚怍而已又承諭欲撰韓公廟碑萬里逺意不敢復以淺陋為詞謹以撰成付來价其一已先遁矣巻中者乃某手書碑様止令書史録去請依碑様止摹刻手書碑首既有大書十字碑中不用再冩題目及碑中既有太守姓名碑後更不用冩諸官銜位此古碑制度不須狥流俗之意也但一切依此様仍不用周回及碑首花草攔界之類只於浄石上模字不着一物為佳也若公已替即告封此簡與呉道人勾當也與呉子野文公廟碑近已寄去潮州自文公未到則已有文行之士如趙徳者葢風俗之美久矣先伯父與陳文惠公相知公在政府未甞一日忘潮也云潮人雖小民亦知禮義信如子野言也碑中已具論矣然謂瓦屋始於文公者則恐不然甞見文惠公與伯父書云嶺外瓦屋始于宋廣平自爾延及支郡而潮尤盛魚鱗鳥翼信如張燕公之言也以文惠書考之則文公前已有瓦屋矣傳莫若實故碑中不欲書此也察之荅龜山長老四首忽辱書感慰無量此日法履佳否名為實賔學者之意師何用此重煩示諭過當未緣展晤千萬為衆自重又張君予都尉聞是舊檀越為奏海照之號今託林承議附納勑牒請作一書致君予貴知到也本欲為書海照堂大字作牌納去屢冩皆不佳不可用非久待告文安國為作篆字也又奉别忽半年思仰無窮比日履兹餘寒法體何如側聞居山漸久道俗嚮服新命既下想慰衆意未瞻奉間千萬以時自重又前者過謁雖不欵留然開慰巳多矣辱書審聞别後法履清勝山門久隳經始為勞然龍象所在淮山巳自改觀矣未期㑹集幸為衆自愛與佛印禪師二首阻濶忽復嵗暮忽枉教翰具審法履佳勝久不至京只衰疾倦於遊從無有㑹晤之日惟冀良食自愛煩置白掛甚愧厚意賜茶五角聊以将意餘冀倍萬保練又人至承誨示知俶装取道㑹見不逺豈勝欣慰向冷跋涉自愛答王定國二首潁州辱書感慰謗焰已熄端居委命甚善然所云百念灰滅萬事懶作則亦過矣丈夫功名在晚節者甚多定國豈愧古人哉某未甞求事但事來即不以大小為之在杭所施亦何足道但無愧怍而已過䝉示諭慙汗若使定國居此所為當更驚人亦豈特止此而已本州職官董華宻人能具道政事歎服不已但恨公命未通爾静以待之勿令中途齟齬自然獲濟如國手棊不須大段用意終局便須贏也又張公卧病不勝憂懸急要文集不敢不附去在任二年到京數月無頃刻暇時公屬我文集當有所刪潤雖不肖豈敢知此然公知我之深舉世無比安敢復有形迹實願傾副公萬一故不敢草草編録到潁方有少暇正欲編次而遽索之且乞定國一言檢閱仍以相付幸也與趙徳麟二首數日不接思渴之至衝冒風雪起居何如端居者知愧矣佛陁波利之虐一至此耶乃知退之排斥不為無理也呵呵酒二壺迎勞惟加鞭又昨日幸接笑語今日知舉掛聞之後時不及徃慰悚息悚息三日臂痛今日幸減録舊詩一篇奉呈聞公亦欲借示詩藁幸付去人上清宫成而有徳音意謂守臣當有賀表如何如何謀之於公幸略垂示與辯才禪師别來思仰日深比日道體何如某幸於閙中抽頭得此閒郡雖未能超然逺引亦退老之漸也思企呉越諸道友及江山之勝不去心或更送老請㑹稽一次老師必能為此一郡道俗少留山中勿便歸安養不肖更得少接清游何幸如之惟千萬保愛答參寥二首兩得手書具審法體佳勝辯才遂化去雖來去本無而情鍾我輩不免悽愴也今有奠文一首并銀二兩託為致茶果一奠之潁師得書且喜進道紙尾待得閒冩去餘惟萬萬自重又某在潁一味適其自得也承惠家園新茗珍感之至紫衣脚色已付錢今冬必得已託王晉卿取附逓至智果也四公子亭他輩非吝但近日人言尤可畏薄惡之甚故未可也必深悉此潁上人道業必進託為傳語聰公病懶不冩書不訝不訝邁已赴河間來書續附去次少游近致一塲閙皆羣小忌其超拔也今且無事閒知之與汪道濟二首專使至辱書感服存記且審比來起居佳勝甚慰馳仰未卜㑹見惟祈保練又某見報移汶上而勅未下老病不堪寄任方欲力辭未知得免否令子日夕相見甚安知之與范純父侍郎二首到潁半年始此上問懶慢之罪踧踖無地中間辱書及承拜命貳卿亦深慶慰然公議望公在禁林想即有此拜也春暖起居何如某移廣陵甚幸舍弟欲某一到都下乞見而行路既稍近而老病務省事且自潁入淮矣不克一别臨書惘惘又某衰病日侵而使客旁午髙麗復至公私勞弊殆不能堪但以連嵗灾傷不敢别乞小郡然來年闕食之憂未知攸濟日俟罪譴而已李唐夫一宅甚安沉酣江山旬日忘歸非久赴任也與明父權府提刑到官半嵗依庇徳宇獲遂解去感服深矣臨行寵餞再三益愧眷厚别後切想起居佳勝某已達泗上迎送人等謹遣還府今日留一飰晩遂發去逾逺左右回望悵然尚冀保練以須顯拜與孔毅父二首到揚吏事清暇而人事十倍於杭甚非老拙所堪也熟觀所厯數路民皆積欠為大患仁聖撫養八年而民未蘇者正坐此事耳方欲出力理會誰肯少助我者乎此間去公咫尺耳而過往妄造言語者或云公欲括田而招兵近問得皆虛想出於欲邀功賞而不願公來者乎事之濟否皆天也君子盡心而已無由面見臨紙惘惘又到此得所賜書即於逓中上謝豈不達耶續䝉示諭王景尋文集某猶及從其人游當依所教然近日士大夫以某不作銘誌故變文為集引耳已屢辭之今恐未可遽作也不罪不罪前日得舍弟書報志公婢偶傷火湯初甚驚惋連得書巳全安無痕矣恐要知在京數日見其慧利長進無病後母撫之如己出也除夜紛紛奉啟不謹與范純夫四首别後不一奉書懶慢之罪未有以解然别時亦先自陳矣比日履兹初冬起居佳勝切聞屢進拜喜抃無量與子功同侍邇英此最縉紳之所榮慕又聞有㫖許講罷奏事想日有補正也未緣㑹合千萬自重又奉書不數愧仰可知辱手教且審起居佳勝為慰某凡百粗遣聞天官之除老病有加那復堪此即當力辭乞閒郡爾側聆大用以快羣望未間千萬以時自重不宣又忠文公碑固所願託附但平生本不為此中間數公葢不得已不欲卒負初心自出都後更不作不冩已辭數家矣如大觀其一也今不可復冩千萬亮察魯直日㑹且致區區兩辱書皆未答直懶爾别無說然魯直不容我誰復能容我者又前日見報知新拜即欲奉書為賀又恐草草念行役間迫猝未能便如禮故不免發數字想不深訝不寐之喜豈獨以樂正好善之故耶更不必盡談公議所屬想公有以處之矣私意但望公不力辭若又力辭乃似辭難矣餘亦見子由書中乍熱起居何如乍逺千萬為道自愛答趙徳麟二首人來辱書伏審履兹畏暑起居佳勝為慰見念之深正如懐仰之意不肖獨賴晁無咎在此方憂其去若果得徳麟為代真天假老拙也既未欲來此寄居常令為於髙郵尋安下處續當馳報也未間萬萬自重又别後思仰不可言竊計起居佳勝得舍弟書奉太夫人久服藥近已康復伏惟懽慶到郡兩月公私勞冗有稽上問想未深責㑹合未期惟冀侍奉外千萬保重與人三首欽服下風為日久矣遲暮相從傾葢如故非氣類自然抑宿昔緣契也人來辱手教得聞起居勝常堂上康福感慰深矣某凡百如故又得無咎切磨知幸又久别思詠日深衰疾多故人事弛廢過䝉手書存録益用愧負比日起居佳勝如聞已有召命想即超用以慰公論未間萬萬為國自重又出守幸獲相聚每得見翛然忘歸為益多矣别來起居何如到揚人事紛紛坐想清游可復得哉乍熱千萬保重與范子功四首見舍弟說知得雍信幼孫夭逝聞之怛然便欲往見從者已𣪚去竊想慈念之深不能無動然竟亦何益惟千萬以理照遣旦夕面究又辱教承晚來起居佳勝團茶及匣子香藥夾等已領珍感珍感栗子之求不太亷乎便不得更送一箇笓籬耶呵呵又宿來起居佳勝巳馳簡邀伯揚來日會啟聖公能枉轡甚幸子由明日奠酹後便徃啟聖公可到彼早食也某畧到押賜處便徃又廣嚴之會謹如教計必請陳四也分惠佳茒感感獨飲一杯遂醉書不成字答李方叔六首别後音問缺然忽承惠教愧仰何勝秋暑未過起居何如未由會面萬萬順時珍重又專人辱啟事長書及手簡累幅意貺甚厚非所敢當又䝉教以不逮非君子直亮期人之逺何以及此然衰病之餘豈任此責愧悚之極比日起居佳勝惠示狨皮等物皆所不敢當禮曹之傳葢妄也信􅤮元不發却付來人葢近日親知所寄示一切辭之非獨於左右也千萬恕察知非久入京見訪幸甚未間千萬珍重不宣又前日所貺髙文極為竒麗但過相粉飾深非所望殆是益其疾耳無由徃謝悚汗不已又近日雖獲屢見迫於多故不盡區區别來辱書且喜體中佳勝某方杜門請郡章四上未允方更請耳會見未可期千萬順時自愛至禱又前日辱訪客衆不及欵話兩三日又無緣接奉思企不可言手教為貺慙感無量苦寒諸况何如常日不獨以禁令不得瞻奉又以差館伴紛紛殊不暇也衰病疲曳欲脫而不可得可勝歎耶人還不一又連日殿門祇候不果致問辱簡承起居佳勝來日行香罷又須一弔康公晚乃歸方叔能枉訪夜話為别甚幸餘留面話荅潘彦明辱書感慰無量比日起居何如别來不覺九年衰病有加歸休何日徃來紛紛徒有愧歎知東坡甚葺治故人仍復徃還其間否㑹合無期臨紙悵惘與鞠持正二首兩日薄有秋氣伏想起居佳勝蜀人蒲永昇臨孫知㣲水圖四面頗為雄爽杜子美所謂白波吹素壁者願掛公齋中真可以一洗殘暑也近晚上謁次又知腹疾㣲作想即平愈文登雖稍逺百事可樂島中出一藥名白石芝者香味初若嚼茶久之甚美聞甚益人不可不白公知也白石芝狀如石耳而有香味惟此為辨秘之秘之答趙徳麟三首還朝累辱手教感慰無量比日起居佳勝大禮日近隨分冗迫未得即見賢者深増悵惘也乍寒萬萬以時自重又紛紛尚未暇徃見思企之極隂寒起居佳勝否甘釀佳貺輒踐前言作賦可轉呈安定否無事見臨幸甚又辱教承台候佳勝拙疾猶未退尚潮熱惡寒也來日必赴盛會未得後日猶恐當謁告也辱意甚寵適㑹如此非所願幸千萬加恕子由固當馳赴也穆公且喜漸安卧病書此不謹與人三首吏役徃還得見風采為幸已多重承存録延顧極厚感佩無量自别來一向冗迫不即裁謝慙負可知令子齋郎至領手教且審起居佳勝乍此暌隔翹想日深尚冀珍調少慰鄙願又辱示長箋詞㫖過重適少冗迫來使不敢久稽未及占詞為答想知照未甚訝也惶恐惶恐叠䝉惠長松以扶老病感佩不可言天覺臨别時亦許寄來因到彼可為督之藥名品方狀精詳之極非故人留意之深何以及此未有以答厚意但積悲感都下委示及餘面究又叠辱臨訪欲少欵奉多事因循繼以卧病負愧深矣知明日啟行無緣面别尚冀保練與王賢良近辱臨訪連日紛冗不及欵奉竊惟起居佳勝寵示新作感服至意答楊濟甫久以私撓不作書累䝉惠問且審起居佳勝為慰衰年責咎移殃家室此月一日以疾不起痛悼之深非老人所堪奈何奈何又以受命出帥定武累辭不獲須至勉強北行家事寥落懐抱可知因見青神王十六秀才亦為道此會合何時臨書凄斷惟千萬順時自愛與子安兄四首十九郎兄弟逺至特䝉手誨恭審比來尊體佳勝甚慰繫望骨肉久别乍聚問訊親舊但有感歎知兄杜門守道為鄉里推愛弟久客倦遊情懐常不佳日望歸掃墳墓陪侍左右耳方暑敢冀以時自重又徃䝉示先伯父事迹但有感涕專在卑懐重承誨諭惶悚之至正冗迫中不敢久留來使未暇冩諸親知書乞為致意非久徧發也又墓表又於行狀外尋訪得好事皆參驗的實石上除字外幸不用花草及欄界之類才著欄界便不古花草尤俗狀也唐以前碑文皆無告照管模刻仔細為佳不罪不罪又毎聞鄉人言四九五九兩姪為學勤謹事舉業尤有功審如此吾兄不亡矣惟深念負荷之重益自修飭乃是顔閔之孝賢於毁頓逺矣此間五郎六郎乍失母毁痛難堪亦以此戒之矣吾兄清貧遭此固不易處某亦為一年兩喪困於醫藥殯斂未有以相助且只令楊濟甫送二千為一奠餘俟少暇也與聖用弟三首聖用小二秀才弟别後冗迫不即奉書想未訝也比日體中佳安今日榜出且喜小十捷解喜慰之極此郎君為學勤至文詞成就來春必殊等也前賀無疑向聞弟當復入來想必成行也小十甚安健日夕相見不用憂未相㑹間千萬保愛子由為朝陵去未及奉書又十郎司理不及别作書初官但事事遵禀小二叔教誨官事勿茍簡公勤静恕勿急求舉主曹事辦集上官必不汝遺劉漕行父叔與之契舊因見但道此意俟到定州欵曲作書也餘惟侍奉外多愛夜中目昏不成字勿訝勿訝又方叔兄未及拜書且為致意子安三哥近有書未及再上狀因見亦為致懇與子由赴定州某為迫行事冗不及作孫子發書乞為致意近者奏辟吏部胥子初妄執言本官係合入逺人礙辟舉條及反覆詰之廼始伏云若今年九月二十七日本官成資後别無遺闕即不該入逺可以奉辟某尋有公文申部乞㑹問本州即見得成資已前有無遺闕凡争數日乃肯據狀㑹同請與孫子發言略說與本州官員言早與果决分明回一成資無遺闕文字來免為猾胥妄生枝節或更孫宣徳與一願就及本州官員及所填替非有服親一狀尤佳京師大扺官不事事而吏横也與參寥吳子野至出潁沙彌行草書瀟然有塵外意决知不日脫頴而出不可復没矣可喜可喜近逓中附吕丞相所奏妙總師號牒去必已披受訖即日起居何如某來日出城赴定州南北當又暌隔然請㑹稽之意終未已也當更俟年嵗間耳未會間千萬善愛荅范純父所示連日入問聖候極是極是見說執政逐日入問宗室亦逐日問候也已將簡報錢尹令府中差人徧報諸公矣與孫子發二首專人來辱書承近日尊體佳勝䝉許就辟慰浣深矣奏撿附呈已發訖某行期不過九月半間會見不逺更祈順時自重又貴眷各計安勝公宇已令粗葺什物粗陋然亦粗足更有幹示喻塗中幸不滯留早到慰勤遲幸也與錢濟明二首别後至今遂不上問想察其家私憂患也逺辱專使手書且審侍奉起居康勝感慰兼極老妻奄忽今巳半年衰病豈復以此自纒但晚景牢落亦人情之不免重煩慰諭銘佩至意然公亦自有愛女之戚初不知奉疏後時慙負不已出守中山謂有緩帶之樂而邊政頽壊不堪開眼頗費鋤治近日逃軍衰止盜賊皆出疆矣幕客得李端叔極有助聞兩浙連熟呻吟瘡痍遂一洗耳何時會合臨書惘惘又寄惠洞庭珍苞塞上所不識分餉將吏並戴嘉貺也無以為報親書松醪一賦為信想發一笑也近得單季隠書云公有一癎藥方極神竒某長孫有此病多年不差可見傳否如許幸逓中示及與孫子發二首南遷人還辱教具審别後起居佳勝貴眷各康寧至慰至慰某到邢甚健忝鄉且親平時不為不知公因此行觀公舉措方恨前此知公未盡勉進此道為朋友光寵餘惟萬萬以時自愛又子發以古人自期信道深篤雖窮達在天未可前定然必有聞於時而傳於後也幸益自愛重以究逺業臨行不盡區區與開元明師二首辱簡并惠扇碑及借示木石等皆佳妙但去長物為陸行計無所置之謹留筆一束以領雅意餘回納不訝不訝又辱書具審法履佳勝且知從者甞至符離見待久之感愧深矣借示跋尾石刻足見存誠篤至却附來人納上元本未㑹集間千萬珍重與任徳翁半月不面思企深劇辱書承孝履如宜金陵雖久駐奉伺不至知亦留滯如此某在磁湖夾阻風已累日今日風亦不苦順且寸進前去恐亦未能逺也不知徳翁今晚能到此否傾渴之至與張元明二首前日承追餞南都又送子由至筠風義之厚以増感慨比日具審起居佳勝萬里之别後㑹杳未有期伏乞善加保練又逺辱專人惠書輔以藥物極濟所乏衰疾有賴矣感刻感刻不知何時還蜀中自此音問遂隔曷勝惘惘與黄元翁某垂老投荒衆所鄙逺見孫提㸃言獨有存恤孤旅之意感激不已到治下當作陸行必留數日欵見也答劉無言此行但有感恩知罪省分絶欲守此四言行之終身庶保餘年得還田畝但未知有無後命爾與孫子發二首别來思企不可言比日尊體何如某䝉庇粗遣旦夕離南都如聞言者尚紛紛英州之命未保無改也凡百委順而已幸不深慮愈逺萬萬以時自重又郡中諸公未能一一奉狀因見各為致意過真定見楊采朝議此人有實學隠徳河朔似此者以一二數矣其子廸簡亦善吏某已舉之矣欲告提刑大夫來年一京削敢煩子發為道此懇或持此簡呈憲使又幸一起寫書十六七封不能復謹勿罪勿罪與程徳孺在定辱書未裁荅間倉猝南來遂以至今比日竊惟起居佳勝老兄罪大責薄未塞公議再有此命兄弟俱竄家屬流離汙辱親舊然業已如此但隨緣委命而已任徳翁同行月餘其見老兄處憂患次第可具問更不詳書也懿叔赴闕今何在因書道區區後㑹無期臨書惘惘餘熱萬萬以時珍重答錢濟明三首惠州專人逺辱書存問加厚感悚無已比日郡事餘暇起居何如某到貶所闔門省愆之外無一事也瘴鄉風土不問可知少年或可久居老者殊畏之惟絶嗜欲節飲食可以不死此言已書諸紳矣餘則信命而已近來親友書問已絶理勢應爾濟明獨加厚於舊髙義凜然固出天資但愧不肖何以得此會合無期臨紙愴恨又近在呉子野處領手教尚稽答謝愧悚之至逺䝉差人固佩荷契義而卓契順者又可竒也無以答其意與寫數紙公可取一閱也寄惠白术極所欲得也牋格甚髙想見風裁回信惟有紫團參一枚疑可以奉親故不可以微鮮為愧也兩兒子曽拜見否凡百想有以訓之幼子過相隨甚幹事且不廢學䝉令子惠書回答簡率一一封納必不罪也又嶺南家家造酒近得一桂酒法釀成不減王晉卿家碧香亦謫居一喜事也有一頌親作小字録成切勿示人千萬千萬答張嘉父久不奉書過辱下遺逺枉教尺具審起居佳勝感慰交集著述想日益富示諭治春秋學此學者本務又何疑焉此書自有妙用學者罕能理㑹若求之繩約中乃近法家者流苛細繳繞竟益何用惟丘明識其妙用然不肯盡談微見端兆欲使學者自見之故僕以為難葢甞悔少作矣未敢輕論也凡人為文至老多有所悔僕甞悔其少矣然著成一家之言則不容有所悔當且博觀而約取如富人之築大第儲其材用既足而後成之然後為得也愚意如此是否夜寒筆凍眼昏不罪不罪荅徐得之二首張君來辱書存問周至感激不已即日哀慕之餘孝履如宜某到惠已半年凡百粗遣既習其水土風氣絶欲息念之外浩然無疑殊覺安健也兒子過頗了事寝食之餘百不知管過亦頗力學長進也子由頻得書甚安一家今作四處住惠筠許常也然皆無恙得之見愛之深故詳及之不須語人也瞻企邈然臨書惘惘乍熱惟萬萬節哀順變自重又詹使君仁厚君子也極䝉他照管仍不輟攜具來相就極與君猷相善每言及相對悽然君猷諸子得耗否十四郎後來修學如何荅呉秀才人來領書且喜尊體佳勝并示歸鳳賦興寄逺妙詞亦清麗玩味爽然然僕方杜門念咎不願相知過有粉飾以重其罪此賦自别有所寄則善不肖決不敢當幸察之察之東坡全集巻八十三
