body:
  text: 東坡全集巻八十九宋蘇軾撰墓誌銘十二首故龍圖閣學士滕公墓誌銘代張文定公作神宗英文烈武聖孝皇帝初臨海内厲精為治旁求天下以出異人得英偉大度之士滕公元發始見知于英祖而未及用書其姓名藏于禁中帝以是知之既見公姿度雄爽問天下所以治亂不思而對曰治亂之道如黒白東西所以變色易位者朋黨亂之也帝曰卿知君子小人之黨乎公曰君子無黨譬之草木綢繆相附者必蔓草非松栢也朝廷無朋黨雖中主可以濟不然雖上聖不治帝太息曰天下名言也遂以右正言知制誥諫院開封府拜御史中丞翰林學士且大用矣而公性疎達不疑在帝前論事如家人父子言無文飾洞見肝鬲帝知其誠盡事無鉅細人無親疎輒以問公或中夜降手詔使者旁午公隨事解答不自嫌外而執政方立新法天下洶洶恐公有言而帝信之故相與造事謗公帝雖不疑然亦出公于外以翰林侍讀學士知鄆州移定與青留守南都徙齊鄧二州用公之意蓋未衰也而公之妻黨有犯法至大不道者小人因是出力擠公必欲殺之帝知其無罪落職知池州徙蔡未行改安州既罷入朝未對而左右不恱者又中以飛語復貶筠州士大夫為公危慄或以為且有後命公談笑自若曰天知吾直上知吾忠吾何憂哉乃上書自明帝覽之釋然即以為湖州方且復用而帝升遐公讀遺詔僵仆頓絶乆之乃蘇曰巳矣吾無所自盡矣今上即位徒公為蘇揚二州除公龍圖閣直學士復以為鄆州徙真定河東治邉凛然威行西北號稱名將而宦官為走馬者誣公病不任職詔徙許州御史論公守邉竒偉之狀且言其不病詔復留河東而公已老葢年七十有一矣即力求淮南上不得已乃以龍圖閣學士知揚州未至而薨葢元祐五年十月二十四日也方平歴事三宗逮與天聖景祐間賢公卿游公雖為晚進而開濟之資邁徃之氣葢有前人風度以先帝神武英斷知公如此而終不大用毎進小人輙讒之公嘗上章自訟有曰樂羊無功謗書滿篋即墨何罪毁言日聞天下聞而悲之嗚呼命也夫公諱甫字元發其後避髙魯王諱以字為名而字逹道東陽人也滕氏出周文王之子錯封於滕所謂滕叔繡者十一代祖令琮為唐國子司業令琮生太常博士翼翼生贈戸部侍郎伉伉生贈禮部侍郎葢葢生戸部侍郎贈右僕射珦珦生太中大夫睦州刺使邁邁生越州觀察推官􅀈􅀈生祠部郎中文規文規生公之曽祖諱仁俊為温州永嘉令祖諱鑒不仕皇考諱髙贈中大夫曽祖母祖母皆范氏繼祖母陳氏皇妣王氏追封太原郡君生公之夕夢虎行月中而墮其室九嵗能賦敏捷過人范希文皇考舅也見公而竒之教以為文希文為蘇州而安定胡先生瑗居于蘇公徃從之門人以千數第其文公常為首嘗舉進士試于庭宋子京竒其文擢為第三人而以聲韻不中法罷之其後八年復中第第三授大理評事通判湖州時孫元規守錢塘一見公曰名臣也後當為賢將授以治劇守邉之要召試學士院充集賢校理判吏部南曹除開封府推官三司鹽鐵戸部判官同修起居注判戸部勾院公在館閣未嘗就第見執政故宰相不恱不遷者十年既遇知神宗為諫官知無不言然御史中丞王陶論宰相不押班為䟦扈上以問公公曰宰相固有罪然以為䟦扈則臣為欺天䧟人矣為開封府三獄皆滿公視事之日理出數百人决遣殆盡京師翕然稱之為御史中丞中書宻院議邉事多不合趙明與西人戰中書賞功而宻院䧏約束郭逵修堡樞宻院方詰之而中書已下褒詔矣公言戰守大事也安危所寄今中書欲戰宻院欲守何以令天下願敇大臣凡戰守除帥議同而後下上善之諫官楊繪言宰相不當以其子判鼓院上曰繪不習朝廷事鼓院傳達而巳何與於事公曰人有訴宰相者使其子傳達之可乎且天下見宰相子在是豈敢復訴事上悟為罷之种諤擅築綏州且與薛向發諸路兵環慶保安皆出剽掠西人復誘殺將官楊定公上疏極言亮祚巳納欵不當失信邉隙一開兵連民疲必為内憂京師郡國地震公三上疏指陳致災之由大臣不恱出公知秦州上面謂曰秦州非朕意也留不遣詔館伴契丹使前此館伴非其人使者議神塔子事徃復紛然是嵗契丹遣蕭林牙揚興公來聘朝廷憂之公見興公開懷與語問其家世父祖事委曲詳盡興公驚且喜不復論去嵗事將去與公馬上泣別林牙謂興公曰君與滕公善豈將留此乎上聞之大喜因公奏事殿中歎曰朕欲擢卿執政卿逾月不對而大臣力薦用唐介矣公曰臣恨未有死所報陛下知遇豈愛官職者唐淑問孫覺言公短上不信悉以其言示公所以慰勞公者甚厚公頓首曰陛下無所疑臣無所愧足矣河朔地大震涌沙出水壞城池廬舍命公為安撫使官吏皆幄寢居民恐懼棄家而苃舍公獨卧屋下曰民恃吾以生屋摧民死吾當以身同之民始歸安其室乃命葬死者食饑者除田稅察惰吏修堤防繕甲兵督盗賊河朔遂安使還大臣將除公并州上復留公開封府民有王潁者為鄰婦隠其金閱數尹不能辨潁憤悶至病傴杖而訴於公公呼鄰婦一問得其情取金還潁􅳠奮身仰謝失傴所在投杖而出一府大駭除翰林學士夏國王秉常被簒公言繼遷死時李氏幾不立矣當時大臣不能分建諸豪乃以全地王之至今為患今秉常失位諸將争權天以此遺陛下若再失此時悔將無及請擇一賢將假以重權使經營分裂之可不勞而定百年之計也上竒其策然不果用欲以公為三司使力辭已而除公瀛州安撫使公入頓首曰臣知事陛下而已不能事黨人願陛下少回昔日之眷無使臣為黨人所快則天下皆知事君為得而事黨人為無益矣上為改容公以皇考諱辭髙陽開乃除鄆州治盗有方不獨用威猛時有所縱捨盗為屛息移定州許入覲力言新法之害曰臣始以意度其不可耳今為郡守親見其害民者具道所以然之狀至定州以上已宴郊外有報契丹入冦邉民來逃者將吏大駭請起治兵公笑曰非爾所知也益置酒作樂遣人諭逃者曰吾在此虜不敢動使各歸業明日問之果妄諸將以是服公韓忠彦使契丹楊興公迎勞問公所在且曰滕公可謂開口見心矣忠彦歸奏上喜進公禮部侍郎使再任詔曰寛嚴有體邉人安焉公因作堂以安邉名之公去國既久而心在王室著書五篇一曰尊主勢二曰本聖心三曰校人品四曰破朋黨五曰賛治道上之其畧曰陛下聖神文武自足以斡運六合譬之青天白日不必㸃綴自然清明識者韙其言天下大旱詔求直言公上疏曰新法害民者陛下既知之矣但下一手詔應熈寧二年以來所行新法有不便者悉罷則民氣和而天意解矣富彦國之守青州也嘗置教閱馬歩軍九指揮彦國既去軍稍缺不補公至青復完之至溢額數千其後朝廷屢發諸路兵或䘮失不還惟青州兵至今為盛其謫守池安皆以静治聞飲酒賦詩未嘗有遷謫意侍郎韓丕旅􅀈于安五十年矣學士鄭獬安人也既没十年貧不克葬公皆葬之著作佐郎木炎居䘮以毁卒公既助其葬又為買田賙之敇使謝諲市物于安因縁為姦民被其毒公宻疏姦狀上為罷黜諲自安定先生之亡公常割俸以賙其子及為湖州祭其墓哭之慟東南之士歸心焉自揚徒鄆嵗方饑乞淮南米二十萬石為備鄆有劇賊數人公悉知其所舍遣吏掩捕皆獲吏民不知所出郡學生食不給民有争公田二十年不决者公曰學無食而以良田飽頑民乎乃請以為學田遂絶其訟學者作新田詩以美之時淮南京東皆大饑公獨有所乞米為備召城中富民與約曰流民且至無以處之則疾疫起并及汝矣吾得城外廢營地欲為席屋以待之民曰諾為屋二千五百間一夕而成流民至以次授地井竈器用皆具以兵法部勒少者炊壯者樵婦女汲老者休民至如歸上遣工部郎中王古按視之廬舍道巷引繩棋布肅然如營陣古大驚圖上其事有詔褒美葢活五萬人云徙真定乞以便宜除盗許之然訖公之去無一人死法外者秋大熟積饑之民方頼以生而有司争糴榖貴公奏邉廪有餘請罷糴二年從之徙知太原府河東兵勞民貧而土豪將吏皆利於有警故喜作邉事民不堪命公始至蕃族來賀令曰謹斥侯無開邉隙有冦而失備與無冦而生事者皆斬自軍司馬㳂邉安撫以下皆勒以軍法西人獵境上河外請益兵公曰冦來則死之吾不出一兵也河東十二將其四以備北其八以備西八將更休為上下畨是嵗八月邉郡稱有警請八將皆上謂之防秋公曰賊若并兵犯我雖八將不敵也若其不來四將足矣卒遣更休而將吏懼甚扣閤争之公指其頸曰吾已捨此矣頸可斷兵不可出卒無冦省芻粟十五萬河東之所患者鹽與和糴也公稍更其法明著稅額而通鹽商配率粮草視物力髙下而不以占田多少為差民以為便陽曲縣舊治城西汾決徙城中縣廢為荒田公奏還之使縣治堤防如黄河民復成市諸將駐列城者長吏或不悦捃誣以事有至死者公奏立法將有罪徙他郡訊驗諸將聞之喜曰公保吾生當報以死西夏請復故地詔賜以四寨而葭蘆𨽻河東公曰取城易棄城難昔棄囉凡西人襲我不備䘮金帛不貲且為夷狄笑乃命部將訾虎蕭士元以兵䕶遷號令嚴整冦不敢近無一瓦之失將賜寨公請先畫界而後棄不從西人已得地則請凡畫界以綏徳城為法從之公曰若法綏徳以二十里為界則吳堡去葭蘆百二十里為失百里矣兵家以進退尺寸為强弱今一舉而失百里不可力争之巳而諜者得西人之謀曰吾將出勁兵於義吳二寨之間刼漢使不得出兵則二寨亦棄矣公遂復前議章九上至數萬言議者謂近世名將無及公者公為文與詩英發妙麗毎出一篇學者争誦之篤於行義事父母撫諸弟以孝友聞臨大事决大議毅然不計死生至於已私則小心莊栗惟恐有過其事上及與人交馭將吏待妻子奴婢一以至誠仕自大理評事至右光禄大夫職至龍圖閣學士勲至上柱國爵至南陽郡開國侯食邑至一千六百戸實封至八百戸贈銀青光禄大夫有文集二十巻娶李氏唐御史大夫栖筠之後晉卿之女累封建安郡君先公卒贈永寧郡君子三人祐祁皆承奉郎裕尚㓜女五人長適朝請郎知楚州何洵直次適宣徳郎袐書省正字王炳早卒次適宣徳郎太學慱士王渙之次復適王炳季適方平之子朝散郎南京通判恕孫男六人將以元祐七年八月二十二日癸酉葬于蘇州長洲縣彭華鄉陽山之栗塢銘曰天之降材千夫一人人之逢時千載一君生之既難得之豈易而彼讒人曽不少置昔在帝堯甚畏巧言讒説震驚雖堯亦然偉哉滕公廊廟之具帝欲用公將起輙仆賴帝之明雖仆復興小試于邉戎狄是膺日月逝矣嵗不我與老成云亡吾誰與處若古有訓無競維人公之治邉折衝精神猛虎在山藜藿茂遂及其既亡樵牧所易公官三品以壽考終我銘之悲夫豈為公王子立墓誌銘子立諱適趙郡臨城人也始予為徐州子立為州學生知其賢而有文喜怒不見得䘮若一曰是有類子由者故以其子妻之與其弟遹子敏皆從余於吳興學道日進東南之士稱之余得罪於吳興親戚故人皆驚散獨兩王子不去送余出郊曰死生禍福天也公其如天何返取余家致之南都而子立又從子由謫於髙安績溪同其有無賦詩絃歌講道著書於席門茅屋之下者五年未嘗有愠色余與子由有六男子皆以童子從子立遊學文有師法人人自重不敢嬉宕子立實使然元祐四年冬自京師將適濟南未至卒于奉髙之傳舍葢十月二十五日也享年三十五曽祖諱璘贈中書令妣田氏楚國夫人祖鬷工部侍郎知樞宻院贈太尉諡忠穆妣宋氏仁壽郡夫人考諱正路比部郎中知濮州贈光禄大夫妣李氏夀安縣君一女初伏有遺腹子裔文集十五巻其學長於禮服子由謂其文朱絃疏越一唱而三歎者也七年十一月五日其兄蘧子開葬于臨城龍門鄉兩口村先瑩之側銘曰知性以為存不壽非其怨也知義以為榮不貴非其羡也而未能忘於文則猶有意於傳也嗚呼百世之後其姓名與我皆隱顯也寳月大師塔銘寳月大師惟簡字宗古姓蘇氏眉之眉山人於余為無服兄九嵗事成都中和勝相院慧悟大師十九得度二十九賜紫三十六賜號其同門友文雅大師惟慶為成都僧統所治萬餘人鞭笞不用中外肅伏慶博學通古今善為詩至於持律總衆酬酢事物則師宻相之也凡三十餘年人莫知其出於師者師清亮敏達綜練萬事端身以律物勞已以裕人人皆髙其才服其心凡所欲為趨成之更新其精舍之在成都與郫者凡一百七十三間經藏一盧舍那阿彌陀彌勒大悲像四塼橋二十七皆談笑而成其堅緻可支一世師於佛事雖若有為譬之農夫畦而種之待其自成不數數然也故余嘗以為修三摩鉢提者蜀守與使者皆一時名公卿人人與師善然師常罕見寡言務自却逺葢不可得而親疎者喜施藥所活不可勝數少時瘠黒如𣑽僧既老而晳若復少者或曰是有隂徳發於面夀未可涯也紹聖二年六月九日始得微疾即以書告於往來者勑其子孫皆佛法大事無一語私其身至二十二日集其徒問日蚤莫及辰曰吾行矣遂化年八十四是月二十六日歸骨于城東智福院之夀塔弟子三人海慧大師士瑜先亡次士隆次紹賢為成都副僧統孫十四人悟遷悟清悟文悟真悟縁悟深悟微悟開悟通悟誠悟益悟權悟緘曽孫三人法舟法榮法原以家法嚴故多有聞者師少與蜀人張隠君少愚善吾先君宫師亦深知之曰此子才用不減澄觀若事當有立於世為僧亦無出其右者已而果然余謫居惠州舟實來請銘銘曰大師寳月古字簡名出趙郡蘇東坡之兄自少潔齊老而彌剛領袖萬僧名聞四方夀八十四臘六十五瑩然摩尼歸真于土錦城之東松栢森然子孫如林蔽芾其隂陸道士墓誌銘道士陸惟忠字子厚眉山人家世為黄冠師子厚獨狷潔精苦不容於其徒去之逺游始見余黄州出所作詩論内外丹指畧葢自以為決不死者然余嘗吿之曰子神清而骨寒其清可以仙其寒亦足以死其後十五年復來見余惠州則得瘦疾骨見衣表然詩益工論内外丹益精曰吾真坐寒而死矣每從事於養生輒有以敗之類物有害吾生者余曰然子若死必復為道士以究此志余時適得美石如黒玉曰當以是志子墓子厚笑曰幸甚乆之子厚去余之河源開元觀客於縣令馮祖仁而余亦謫海南是嵗五月十九日竟以疾卒年五十祖仁葬之觀後葢紹聖四年也銘曰嗚呼多藝此黄冠詩棊醫卜内外丹無求於世宜堅完龜飢鶴瘦終難安哀哉六巧坐一寒祝子復來少宏寛毋復清詩助痟酸龍虎尤成無或奸往駕赤螭驂青鸞惠州官葬暴骨銘有宋紹聖二年官葬暴骨于是是豈無主仁人君子斯其主矣東坡居士銘其藏曰人耶天耶隨念而徂有未能然宅此枯顱後有君子無廢此心陵谷變壞復棺衾之李太師墓誌李氏之先世有徳人使皆好學忠信而文則其成材五季得之﨑嶇兵間亦何所為世養于䝉以待承平允文太師發跡于經人知誦之公蹈用之其言皆經其行中之仁致麟鳯自不覆巢使公逢時鳯鳴其郊公為獄官遇囚如子視囚出入如已生死以徳報怨世有或然任其不叛仁人所難是心惟㣲實聞于帝無疆之休以來本世篤生三子其㓜益隆如誼仲舒烏陽是逢始葬于魏物不稱徳河流墓改襚以冕服公之令聞追配太丘子孫公卿有進無羞安安之原太行之麓有或兆之匪筮匪卜朱亥墓誌崔嵬髙丘其下為誰惟魏烈士朱亥是依時惟布衣不震不驚晉鄙在師孔嚴不孤進承其頥視如豚猳昔其在屠誰養其威鼓刀市人誰者畏之世之勇夫殺人如蒿及其所難或失其刀惟是貧賤無以自豪是謂真勇士之布衣其亦在養有或不養臨事而恐惟是屠者其養可取劉夫人墓誌銘代韓持國作夫人姓劉氏開封人曽大父處士諱巖大父大理寺丞諱惟吉考贈右金吾衛將軍諱達夫人年十七歸于武功蘇才翁翁諱舜元參知政亊諱易簡之孫贈工部侍郎諱耆之子也少與弟子美聖闢皆有盛名蘇氏既大家而姑王夫人太尉文正公之息女也嚴重有識素賢其子自為擇婦甚難之乆乃得夫人夫人事其姑能委曲順其意嘗侍疾不解衣累月凡姑所欲不求而獲所不欲無一至前者既愈謂家人曰微是婦吾不起矣命諸女拜之而弗答也子美聖闢皆早世夫人待二姒撫諸孤恩禮甚厚子美正獻杜公婿也杜公聞而喜之曰可以為女師夫人既老二子㳙澥更守壽春已而㳙守襄陽澥復按本道刑獄夫人皆就養焉及㳙徙平陽道京師子注為尚書郎拜覲門外士大夫榮之㳙侍夫人至管城以疾不起注逆以歸京師夫人悼㳙不已後㳙四十五日元豐八年十月五日以疾卒於私第享年八十一夫人孝友慈儉薄於奉身而厚於施人嚴於教子而寛於御下姻族中有悍妬者見之輙慙而化性不蓄財浣衣菲食以終其身㳙自蜀還以重錦二十兩以獻夫人夫人喜曰可以適吾意之所欲與者命刀尺以親疎散之一日而盡好誦佛書受五戒預為送終具甚備至疾革怡然不亂始封隆徳縣君後為彭城縣太君改仁夀縣太君才翁既顯於世矣而位不充其志仕至尚書郎贈光禄大夫而子男七人皆以才顯㳙朝奉大夫知潞州澥朝請郎京西提㸃刑獄注朝散郎尚書司勲郎中洞右賛善大夫將作監丞洪洎汶皆舉進士女二人長適進士虞大䝉次適承議郎郭逢原孫男十三人之顔無為軍判官之閔早卒之冉汝州梁縣尉之孟之偃之友之恂之悌之邵之楊之南之烈之㸃孫女十三人曽孫男七人開憲潔商若赤仕曽孫女五人澥將以元豐八年十二月二十四日葬夫人於潤州丹徒縣五老山下才翁之塋使求乞銘才翁於余為從母子而余娶於蘇氏故知夫人為詳銘曰孝友慈儉行為女師篤於教也輕財樂施屬纊不亂幾於道也夀考康寧子孫多賢不虚報也我銘孔約無有愧辭以信告也亡妻王氏墓誌銘治平二年五月丁亥趙郡蘇軾之妻王氏卒於京師六月甲午殯于京城之西其明年六月壬午葬於眉之東北彭山縣安鎮鄉可龍里先君先夫人墓之西北八歩軾銘其墓曰君諱弗眉之青神人鄉貢進士方之女生十有六年而歸于軾有子邁君之未嫁事父母既嫁事吾先君先夫人皆以謹肅聞其始未嘗自言其知書也見軾讀書則終日不去亦不知其能通也其後軾有所忘君輙能記之問其他書則皆畧知之由是始知其敏而静也從軾官于鳯翔軾有所為於外君未嘗不問知其詳曰子去親逺不可以不慎日以先君之所以戒軾者相語也軾與客言於外君立屏間聽之退必反覆其言曰某人也言輙持兩端惟子意之所嚮子何用與是人言有來求與軾親厚甚者君曰恐不能乆其與人銳其去人必速已而果然將死之嵗其言多可聽類有識者其死也葢年二十有七而已始死先君命軾曰婦從汝于艱難不可忘也他日汝必葬諸其姑之側未期年而先君没軾謹以遺令葬之銘曰君得從先夫人于九原余不能嗚呼哀哉余永無所依怙君雖没其有與為婦何傷乎嗚呼哀哉乳母任氏墓誌銘趙郡蘓軾子瞻之乳母任氏名採蓮眉之眉山人父遂母李氏事先夫人三十有五年工巧勤儉至老不衰乳亡姊八娘與軾養視軾之子邁迨過皆有恩勞從軾官于杭宻徐湖謫于黄元豐三年八月壬寅卒於黄之臨臯亭享年七十有二十月壬午葬于黄之東阜黄岡縣之北銘曰生有以養之不必其子也死有以葬之不必其里也我祭其從與享之其魂氣無不之也保母楊氏墓誌銘先夫人之妾楊氏名金蟬眉山人年三十始𨽻蘇氏頽然順善也為弟轍子由保母年六十八熈寧十年六月已丑卒於徐州屬纊不亂子由官於宋載其柩殯於開元寺後八年軾自黄遷汝過宋葬之於宋東南三里廣夀院之西實元豐八年二月壬午也銘曰百世之後陵谷易位知其為蘇子之保母尚勿毁也朝雲墓誌銘東坡先生侍妾曰朝雲字子霞姓王氏錢塘人敏而好義事先生二十有三年忠敬若一紹聖三年七月壬辰卒于惠州年三十四八月庚申葬之豐湖之上棲禪山寺之東南生子遯未期而夭葢常從比丘尼義冲學佛法亦粗識大意且死誦金剛經四句偈以絶銘曰浮屠是瞻伽藍是依如汝宿心惟佛之歸東坡全集巻八十九
