body:
  text: 東坡全集卷二十一宋蘇軾撰詩六十六首軾近以月石硯屏獻子功中書公復以涵星硯獻純父侍講子功有詩純父未也復以月石風林屏贈之謹和子功詩并求純父數句紫潭出玄雲翳我潭中星獨有潭上月倒挂紫翠屏我老不看書默坐養此昏花睛時時一開眼見此雲月眼自明久知世界如泡影大小真偽何足評笑彼三子歐蘇梅無事自作雪羽爭事見三人詩集故將屏硯送兩范要使珠璧栖窗櫺大范忽長謡語出月脅令人驚皇甫湜曰穿天心出月脅意外驚人語非尋常小范當繼之説破星心如雞鳴孟郊聞雞詩云似聞孤月口能説落星心牀頭復一月下有風林橫急送小范家護此涵星泓願從少陵博一句山水盡與洪濤傾次韻范純父涵星硯月石風林屏詩月次于房歷三星斗牛不神箕獨靈簸搖桑榆盡西靡影落蘇子硯與屏天工與我兩厭事孰居無事為此形與君持槖侍帷幄同到溫室觀堯蓂自憐太史牛馬走技等卜祝均倡伶欲留衣冠挂神武便擊雲水歸南溟陶泓不稱管城沐醉石可助平泉醒故持二物與夫子欲使妙質留天庭但令滋液到枯稿勿遣光景生晦冥上書挂名豈待我獨立自可當雷霆我時醉眠風林下夜與漁火同青熒撫物懷人應獨歎作詩寄子誰當聽次韻錢穆父會飲彈冠恨不早挂冠常苦遲盛服每假寐角闕時伏思東門未祖道西山空拄頤逝將江海去安此麋鹿姿要當謀三徑何暇擇一枝與君幾合散得酒志淳漓君談似落屑我飲如奕棋世有作詩如奕棋奕棋如飲酒飲酒也乃天戒之語僕於棋酒二事皆不能居官不任事造物真見私主人獨賢勞金榖方流馳行人亦結束杕杜乃歸期公卿雖少安河流正東釃我得會稽去方回良不癡次韻穆父尚書侍祠郊丘瞻望天光退而相慶引滿醉吟千章杞梓蔭雲天樗散誰收老鄭虔喜氣到君浮白裏豐年及我挂冠前令嚴鐘鼓三更月野宿貔貅萬竈煙太息何人知帝力歸來金帛看赬肩郊祀慶成詩帝出乘昌運天心豫太平文章三代繼制作七年成大祀乾坤合剛辰日月明泰壇朝掃地魄寶夜垂精仰御圓蒼蓋環觀海嶽城北流吞朔易西極落攙搶升燎靈光答回鑾瑞霧迎需雲遍枯稿解雨達勾萌可頌非天德因針亦下情民言知有酌帝謂本無聲富國由崇儉祈年在好生無心斯格物克已自消兵化國安新政孤臣反舊耕還將清廟什留與野人賡次韻奉和錢穆父蔣潁叔王仲至詩四首見和西湖月下聽琴謖謖松下風藹藹壠上雲聊將竊比我不堪持寄君半生寓軒冕一笑當琴尊良辰飲文字晤語無由醺我有鳳鳴枝背作蛇蚹紋月明委靜照心清得竒聞當呼玉澗手一洗羯鼓昏請歌南風曲猶作虞書渾家有雷琴甚竒古玉澗道人崔間妙於雅聲當呼使彈見和仇池上窮非想亦非非下與風輪共一癡翠羽若知牛有角空瓶何必井之睂還朝暫接鵷鸞翼謝病行收麋鹿姿記取和詩三益友他年弭節過仇池玉津園承平苑囿雜耕桑六聖勤民計慮長碧水東流還舊派玉津分蔡河上流復合于下紫壇南峙表連岡不逢遲日鶯花亂空想踈林雪月光千畝何時躬帝藉斜陽寂歷瑣雲莊藉田竊脂方紀瑞布穀未催耕魚沫依蘋渚蝸涎上綵楹江湖來夢寐蓑笠負平生琴裏思歸曲因君一再行頃年楊康功使髙麗還奏乞立海神廟於板橋僕嫌其地湫隘移書使遷之文登因古廟而新之楊竟不從不知定國何從見此書作詩稱道不已僕不復記其云何也次韻答之退之仙人也遊戲於斯文談笑出偉竒鼓舞南海神頃年三韓使幾為鮫鰐吞歸來築祠宇要使百賈奔板橋商賈所聚我欲遷其廟下數浮空羣謂登州海市移書竟不從信非磊落人公胡為拳拳繫此空中雲作詩頌其美何異刻劍痕我今已括囊象在六四坤沐浴啓聖僧舍與趙德麟邂逅南山北闕兩非真東潁西湖迹已陳季子來歸初可喜老𣆀新沐定非人酒清不醉休休暖睡穩如禪息息勻自笑塵勞餘一念明年同泛越溪春次韻王仲至喜雪御筵三軍喜氣鑠飛花睡起空驚月在沙未集驊騮金騕裊故殘鳷鵲玉橫斜偶還仗內身如寄尚憶江南酒可賖宣勸不多心自醉強扶衰白拜君嘉僕所藏仇池石希代之寶也王晉卿以小詩借觀意在於奪僕不敢不借然以此詩先之海石來珠宫秀色如蛾緑坡陀尺寸間宛轉陵巒足連娟二華頂空洞三茅腹初疑仇池化又恐瀛洲蹙殷勤嶠南使餽餉淮東牧僕在揚州程德孺由嶺南解官以此石見遺得之喜無寐與汝交不瀆盛以髙麗盆藉以文登玉僕以髙麗所鑄大銅盆貯之又以登州海石如碎玉者附其足幽光先五夜冷氣壓三伏老人生如寄衡茅久未卜一夫幸可致千里還相逐風流貴公子竄謫武當谷見山應已厭何事奪所欲欲留嗟趙弱寧許負秦曲傳觀慎勿許間道歸應速次天字韻答岑巖起一聲清蹕霧開天百辟心莊豈貌虔回顧驚君珠玉側同升愧我粃粳前裴回月色留壇影縹眇松香泛蠟煙近制以椽燭松明易籸盆莫歎郎潛生白髮聖朝求舊鄙鳶肩石塔寺并引世傳王播飯後鐘詩蓋揚州石塔寺事也相傳如此戲作此詩飢眼眩東西詩腸忘蚤晏雖知燈是火不悟鐘非飯山僧異漂母但可供一莞胡為三百年記憶作此訕齋廚養若人無益祇遺患乃知飯後鐘闍梨蓋具眼次韻蔣潁叔二首扈從景靈宫道人幽夢曉初還已覺笙簫下月壇風伯前驅清宿霧祝融驂乘破朝寒英姿連璧從多士妙句鏘金和八鑾已向詞臣得頗牧時潁叔新除熙河帥路人莫作老儒看凝祥池似知金馬客時夢碧雞坊氷雪消殘臘煙波寫故鄉鳴鑾自容與立馬久回翔乞與三韓使新圖到樂浪時髙麗使在都下每至勝境輒圗畫以歸和叔盎畫馬次韻天驥德力備馬外龍麟中皇天不遣言兀與圖畫同駑駘飽官粟未受一洗空十駕均一至何事籋雲風王晉卿示詩欲奪海石錢穆父王仲至蔣潁叔皆次韻穆至二公以為不可許獨潁叔不然今日潁叔見訪親覩此石之妙遂悔前語軾以謂晉卿豈可終閉不豫者若能以韓幹二散馬易之者蓋可許也復次前韻相如有家山縹眇在睂緑誰云千里逺寄此一顰足平生錦繡腸蚤嵗藜莧腹從教四壁空未遣兩峰蹙吾今况衰病義不忘樵牧逝將仇池石歸泝岷山瀆守子不貪寶完我無瑕玉故人詩相戒妙語豫所伏一篇獨異論三占從兩卜君家畫可數天驥紛相逐風騣掠原野電尾梢澗谷君如許相易是亦我所欲今朝安西守來聽陽關曲勸我留此峰他日來不速軾欲以石易畫晉卿難之穆父欲兼取二物潁叔欲焚畫碎石乃復次前韻并解二詩之意春氷無真堅霜葉失故緑鷃疑鵬萬里蚿笑夔一足二豪爭攘袂先生一捧腹明鏡既無臺淨瓶何用蹙古蹴蹙通盆山不可隱畫馬無由牧聊將置庭宇何必棄溝瀆焚寶真愛寶碎玉未忘玉久知公子賢出語耆年伏欲觀博物妙故以求馬卜維摩既復捨天女還相逐授之無盡燈照此久幽谷定心無一物法樂勝五欲三峨吾鄉井萬里君部曲卧雲行歸休破賊見神速晉卿將種常有此志生日蒙劉景文以古畫松鶴為夀且貺嘉篇次韻為謝問豫一室間寧有千里廓塵心洗長松逺意發孤鶴生朝得此夀死籍疑可落微言在參同妙契藏九籥故人有竒趣逸想寄幽壑霜枝謝寒暑雲翮無前却何須構明堂未羡巢阿閣緬懷别時語復作數日惡詩腴固堪餐字瘦還可愕髙標忽在眼清夢了如昨君今噲等伍志與湛輩各豈待相顧言方為不朽託子雲老執戟長孺終主爵吾當追喬松子亦鄙衛霍程德孺惠海中柏石兼辱佳篇輒復和謝嵐薰瘴染却敷腴笑飲貪泉獨繼吳未欲連車收薏苡肯教沉網取珊瑚不知庾嶺三年别收得曹溪一滴無但指庭前雙柏石要豫臨老識方壺次秦少遊韻贈姚安世帝城如海欲尋難肯捨漁舟到杏壇剝啄扣君容膝戶巍峩笑我切雲冠問羊獨怪初平在牧豕應同德曜看肯把參同較同異小窗相對為研丹次丹元姚先生韻浮生知幾何僅熟一釡羮那於俯仰間用此委曲情自憐無他腸偶亦得此生懸知當去客中有不亡存但恐宿緣重每為習氣昏似聞梅子真近在吳市門未能肩拍洪但欲目擊溫不敢扣門呼恐作踰垣奔且令紹介先徐以方便論不學劉更生黃金鑄尚方不學房次律身事問潁陽王烈亦何人叔夜未可量獨見神山開遽餐石髓香至道尚聽瑩粗材終蹶張先生喜而笑幅巾登我堂苦誓指黃壤要言刻青琅蓬萊在何許弱水空相望且當從嵇阮聊復數山王達人友四海曲士守一疆慎勿使形諜兒童驚夜光次韻秦少遊王仲至元日立春三首省事天公厭兩回新年春日併相催殷勤更下山陰雪要與梅花作伴來已卯嘉辰夀阿同願渠無過亦無功明年春日江湖上回首觚稜一夢中子由一字同叔元日已卯渠本命也詞鋒雖作楚騷寒德意還同漢詔寬好遣秦郎供帖子盡驅春色入毫端立春日翰林學士供詩帖子上元侍飲樓上三首呈同列淡月踈星繞建章仙風吹下御爐香侍臣鵠立通明觀一朵紅雲捧玉皇薄雪初消野未耕賣薪買酒看升平吾君勤儉倡優拙自是豐年有笑聲老病行穿萬馬羣九衢人散月紛紛歸來一點殘燈在猶有傳柑遺細君侍飲樓上則貴戚爭以黃柑遺近臣謂之傳柑蓋尚矣送蔣潁叔帥熙河并引潁叔出使臨洮軾與穆父仲至同餞之各賦詩一篇以今我來思為韻致遄歸之意軾得我字西方猶宿師論將不及我茍無深入計緩帶我亦可承明正須君文字粲藻火自薦雖云數留行終不果正坐喜論兵臨老付邊瑣新詩出談笑僚友困掀簸我欲歌杕杜楊柳方婀娜邊風事首虜所得蓋么麼願為魯連書一射聊城笴陰功在不殺結草酬魏顆再送蔣潁叔帥熙河二首使君九萬擊鵬鵾肯為陽關一斷魂不用寬心九千里安西都護國西門餘刃西屠橫海鯤應豫詩讖是逰魂歸來趂别陶𢎞景看挂衣冠神武門次韻潁叔觀燈安西老守是禪僧到處應然無盡燈永夜出逰從萬騎諸羌入看擁千層便因行樂令投甲不用防秋更打氷振旅歸來還侍燕十分宣勸恐難勝次韻王晉卿奉詔押髙麗燕射北苑傳呼陛楯郎東夷初識令君香天山自可三箭取海國何勞一葦航宣勸不辭金碗側醉歸爭看玉鞭長錦囊詩草勤收拾莫遣雞林得夜光次韻錢穆父王仲至同賞田曹梅花寒廳不知春獨立耿玉雪閉門愁永夜置酒及明發忽驚庭戶曉未受煙雨沒浮光風宛轉照影水方折鬢霜未易掃睂斧真自伐惟當此花前醉卧黃昏月送襄陽從事李友諒歸錢塘居杭積五嵗自意本杭人故山歸無家欲卜西湖鄰良田不難買靜士誰當親髯張既超然老潛亦絶倫李子氷玉姿文行兩清淳歸從三人遊便足了此身公堤不改作姥嶺行開新幽夢隨子去松花落衣巾次韻吳傳正枯木歌天公水墨自竒絶瘦竹枯松寫殘月夢回踈影在東窗驚怪霜枝連夜發生成變壞一彈指乃知造物初無物古來畫師非俗士妙想實與詩同出龍眠居士本詩人能使龍池飛霹靂君雖不作丹青手詩眼亦自工識拔龍眠胸中有千駟不獨畫肉兼畫骨但當與作少陵詩或自與君拈秃筆東南山水相招呼萬象入我摩尼珠盡將書畫散朋友獨與長鋏歸來乎送黃師是赴兩浙憲世久無此士我晚得王孫寧非叔度家豈出次公門白首沈下吏緑衣有公言哀哉吳越人久為江湖吞官自倒帑廪飽不及黎元近聞海上港漸出水底村願君五袴手招此半菽魂一見刺史天稍忘獄吏尊會稽入吾手鏡湖小於盆比我東來時無復瘡痍存送范中濟經略侍郎分韻賦詩軾得先字且贈以魚枕杯四馬箠一梁李久樂禍自焚豈非天兩鼠鬬穴中一勝亦偶然謀初要百慮善後乃萬全廟堂選世將范氏真多賢仁風被宿麥緑浪搖秦川號令聳毛羽先聲落虛弦我家天一方去路城西偏投竿困障日賣劒行歸田贈君荆魚杯副以蜀馬鞭一醉可以起毋令祖生先書朝説之考牧圖後我昔在田間但知羊與牛川平牛背穩如駕百斛舟舟行無人岸自移我卧讀書牛不知前有百尾羊聽我鞭聲如鼓鼙我鞭不妄發視其後者而鞭之澤中草木長草長病牛羊尋山跨坑谷騰趠筋骨強煙蓑雨笠長林下老去而今空見畫世間馬耳射東風悔不長作多牛翁吕與叔學士挽詞言中謀猷行中經關西人物數清英欲過叔度留終日未識魯山空此生論議凋零三益友功名分付二難兄老來尚有憂時歎此涕無從何處傾丹元子示詩飄飄然有謫仙風氣吳傳正繼作復次其韻飛仙亦偶然脫命瞬息中惟詩不可擬如寫天日容夢中哦七言玉丹已入懷一語遭綽虐失身墮蓬萊蓬萊至今空護短不養才上界足官府謫仙應退休可憐吳與蘇骯髒雪滿頭雪滿頭終當却與丹元子笑指東海乘桴浮次王定國韻書丹元子寧極齋仙人與吾輩寓迹同一塵何曾五漿餽但有爭席人寧極無常居此齋自隨身人那識郗鑒天不留封倫誤落世網中俗物愁我神先生忽扣戶夜呼祁孔賔便欲隨子去著書未絶麟願挂神武冠往卜飲馬鄰王郎濯紈綺意與陋巷親南遊苦不蚤儻及蓴鱸新王仲至侍郎見惠稚栝種之禮曹北垣下今百餘日矣蔚然有生意喜而作詩翠栝東南美近生神嶽隂惜哉不可致霜根絡雲岑仙風振髙標香實隕平林偶隨樗櫟生不為樵牧侵忽驚黃茅嶺稍出青玉針好事雖力取王城少知音豈無換鵝手但知覔來禽髙懷獨夫子一見捐槖金得之喜不寐贈我意殊深公堂開後閣凡木愧華簮栽培一寸根寄子百年心常恐樊籠中摧我鸞鶴襟誰知積雨後寒芒曉森森恨我迫歸老不見汝十尋蒼皮護玉骨旦莫視古今何人風雨夜卧聽飢龍吟次韻錢穆父馬上寄蔣潁叔二首玉關不用一丸泥自有長城鳥鼠西剩與故人尋土物臘糟紅麴寄駝蹄多買黃封作洗泥使君來自隴山西髙才得兔人人羡爭欲尋蹤覔舊蹄表弟程德孺生日仗下千官散紫庭時聞小語説蘇程長身自昔傳甥舅夀骨遙知是弟兄豫與君皆夀骨貫耳班列中多指豫二人不問而知其為中表也曽活萬人寧望報君在楚州豫在杭州皆遇飢嵗活數萬人祇求五畝却歸耕四朝遺老凋零盡鶴髮他年幾箇迎七年九月自廣陵召還復館于浴室東堂八年六月乞會稽將去汶公乞詩乃復用前韻三首乞郡三章字半斜廟堂傳笑眼昏花上人問我遲留意待賜頭綱八餅茶尚書學士得賜頭綱龍茶一斤八餅今年綱到最遲夢繞吳山却月廊白梅盧橘覺猶香杭州梵天寺有月廊數百間寺中多白楊梅盧橘會稽且作須臾意從此歸田策最良東南此去幾時歸倦鳥孤飛豈有期斷送一生消底物三年光景六篇詩吳子野將出家贈以扇山枕屏峩峩扇中山絶壁信天剖誰施大圓鏡衡霍入戶牖得之老月師畫者一醉叟常疑若人胸自有雲夢藪千巖在掌握用捨彈指久低昻不自知恨寄兒女手短屏雖曲折髙枕謝奔走出家非今日法水洗無垢浮遊雲釋嶠燕坐柳生肘忘懷紫翠間相與到白首東府雨中别子由庭下梧桐樹三年三見汝前年適汝陰見汝鳴秋雨去年秋雨時我自廣陵歸今年中山去白首歸無期客去莫歎息主人亦是客對牀定悠悠夜雨空蕭瑟起折梧桐枝贈㳊千里行重來知健否莫忘此時情謝仲適坐上送王敏仲北使衝風振河朔飛霧失太行相逢不相識下馬須睂黃洗眼忽驚笑見此玉節郎喜有賢主人共此殘燭光聚散一夢中人北鴈南翔吾生如寄耳送老天一方幸子遇明主陳經入西廂歸期不可緩倚相宜在傍書丹元子所示李太白真天人幾何同一漚謫仙非謫乃其遊麾斥八極隘九州化為兩鳥鳴相酬一鳴一止三千秋開元有道為少留縻之不可矧肯求西望太白橫峨岷眼髙四海空無人大兒汾陽中令君小兒天台坐忘真生年不知髙將軍手汙吾足乃敢瞋作詩一笑君應聞次韻曾仲錫承議食蜜漬生荔支代北寒虀搗韭萍竒苞零落似晨星逢鹽久已成枯臘得蜜猶應是薄刑欲就左慈求拄杖便隨李白跨滄溟攀條與立新名字兒女稱呼恐不經俗有十八娘荔支大行太皇太后挽詞二首至矣吾三后功髙漢已還復推元祐冠蓋得永昭全臣嘗於經筵論奏仁宗皇帝諡曰明孝若明而不仁則民畏而不愛仁而不明則民愛而不畏今大行太皇太后亦兼此二德故天下思慕庶幾於仁宗也有作猶非聖無私乃是天侍臣談要道家法信家傳宰相以下嘗於經筵論奏祖宗以來家法十餘事書於記注却狄安諸夏先王社稷臣固應祠百世何止活千人定䇿天知我忘家帝念親萬方何以報得疾為勤民再和曽仲錫荔支柳花著水萬浮萍荔實周天兩嵗星柳至易成飛絮落水中經宿即為浮萍荔支至難長二十四五年乃實本自玉肌非鵠浴至今丹殼似猩刑侍郎賦詠窮三峽妃子煙塵動四溟莫遣詩人説功過且隨香草附騷經次韻滕大夫三首雪浪石太行西來萬馬屯勢與岱嶽爭雄尊飛狐上黨天下脊半掩落日先黃昏削成山東二百郡氣壓代北三家村千峯右卷矗牙帳崩崖鑿斷開土門朅來城下作飛石一炮驚落天驕魂承平百年烽燧冷此物僵卧枯榆根畫師爭摹雪浪勢天工不見雷斧痕離堆四而繞江水坐無蜀士誰與論老翁兒戲作飛雨把酒坐看珠跳盆此身自幻孰非夢故園山水聊心存同前我頃三章乞越州欲尋萬壑看交流且慿造物開山骨已見天吳出浪頭石中似有海獸形狀履道鑿池雖可致玉川卷地若為收洛陽泉石今誰主莫學癡人李與牛沉香石壁立孤峰倚硯長共疑沉水得頑蒼欲隨楚客紉蘭佩誰信吳兒是木腸山下曾逢化松石玉中還有辟邪香早知百和俱灰燼未信人言弱勝強石芝詩并引豫昔夢食石芝作詩記之今乃真得石芝於海上子由和前詩見寄豫頃在京師有鑿井得如小兒手以獻者臂指皆具膚理若生豫聞之隱者曰此肉芝也與子由烹而食之追記其事復次前韻土中一掌嬰兒新爪指良是肌骨勻見之怖走誰敢食天賜我爾不及賔旌陽逺遊同一許長史玉斧皆門戶我家韋布三百年祗有陰功不知數跪陳八簋加六瑚化人視之真塊蘇肉芝烹熟石芝老笑唾熊掌嚬雕胡老蠶作繭何時脫夢想至人空激烈古來大藥不可求真契當如磁石鐵鶴歎園中有鶴馴可呼我欲呼之立坐隅鶴有難色側睨豫豈欲臆對如鵩乎我生如寄良畸孤三尺長脛閣瘦軀俯啄少許便有餘何至以身為子娛驅之上堂立斯須投以餅餌視若無戛然長鳴乃下趨難進易退我不如送曾仲錫通判如京師邊城嵗暮多風雪強壓春醪與君别玉帳夜談霜月苦鐵騎曉出氷河裂斷蓬飛葉卷黃沙祗有千林䰒鬆花應為王孫朝上國珠幢玉節與排衙左援公孝右孟博我居其間嘯且諾僕夫為我催歸來要與北海春水爭先回和錢穆父送别并求頓遞酒次韻聮鑣接武兩長身鵷鷺行中語笑親九子羡君門戶壯八州憐我往來頻佇聞東府開賔閣便乞西湖洗塞塵更向青齊覓消息要知從事是何人東坡全集卷二十一
