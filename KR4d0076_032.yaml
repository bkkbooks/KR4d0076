body:
  text: 東坡全集卷三十二宋蘇軾撰和陶詩五十七首和咏二疏二疏事漢時迹寓心已去許侯何足道寧識此髙趣可憐魏丞相免冠謝陋舉中興多名臣有道獨兩傅世途方轂擊誰肯行此路是身如委蛻未蛻何所顧已蛻則兩忘身後誰毁譽所以遺子孫買田豈先務我嘗遊東海所歷若有素神交久從君屢夢今乃悟淵明作詩意妙想非俗慮庶幾二大夫見微而知著和詠三良此生太山重忽作鴻毛遺三子死一言所死良已微賢哉晏平仲事君不以私我豈犬馬哉從君求蓋帷殺身固有道大節要不虧君為社稷死我則同其歸顧命有治亂臣子得從違魏顆真孝愛三良安足希仕宦豈不榮有時纒憂悲所以靖節翁服此黔婁衣和詠荆軻秦如馬後牛吕氏非復嬴天欲厚其毒假手李客卿功成志自滿積惡如陵京滅身㑹有時徐觀可安行沙丘一狼狽笑落冠與纓太子不少忍顧非萬人英魏韓裂智伯肘足本無聲胡為棄成謀託國此狂生荆軻不足說田子老可驚燕趙多竒士惜哉亦虛名殺父囚其母此豈容天庭亡秦只三戶况我數十城漸離雖不傷陛㦸加周營至今天下人愍燕欲其成廢書一太息可見千古情和讀山海經十三首陶淵明讀山海經十三首其七首皆仙語余讀抱朴子有所感用其韻賦之今日天始霜衆木斂以踈幽人掩關卧明景翻空廬開心無良友寓眼得竒書建德有遺民道逺我無車無糧食自足豈謂榖與蔬愧此稚川翁千載與我俱畫我與淵明可作三士圖學道雖恨晚賦詩豈不如稚川雖獨善愛物均孔顔欲使蟪蛄流知有龜鶴年辛勤破封蟄苦語劇移山博哉無窮利千載食此言淵明雖中壽雅志仍丹丘逺矣無懷民超然邈無儔竒文出纊息豈復生死流我欲作九原異世為三游子政信竒逸妙算窮隂陽淮南枕中訣養練歲月長豈伊臭濁中爭此頃刻光安知青藜火丈人非中黃亂離棄弱女破冡割恩憐寧知效龜息三歲號窮山長生定可學當信仲弓言支牀竟不死抱一無窮年三山在咫尺靈藥非草木𤣥芝生太元黃精出長谷仙都浩如海豈不供一浴何當從山火束緼分寸燭蜀士李八百穴居吳山隂默坐但形語從者紛如林其後有李寬雞鵠非同音口耳固多僞識真要在心黃華冒甘谷靈根固深長葛井窖丹砂紅泉湧尋常二女戲口耳一作鼻松膏以為糧聞此不能寐起坐夜未央談道鄙俗儒逺自太史走仲尼實不死於聖亦何負紫文出吳宫丹雀本無有遼哉廣桑君獨顯三季後金丹不可成安期渺雲海誰謂黃門妻至道乃近在尸解竟不傳化去空餘悔丹成亦安用御氣本無待鄭君故多方𤣥翁所親指竒文二百篇了未出生死素書在黃石豈敢辭跪履萬法等成壞金丹差可恃古强本妄庸蔡誕亦夸士曼都斥仙人謁帝輕舉止學道未有得自欺誰不爾稚川亦隘人疏録此庸子東坡信畸人涉世真散材仇池有歸路羅浮豈徒來踐蛇及茹蠱心空了無猜携手葛與陶歸哉復歸哉和雜詩十一首斜日照孤隙始知空有塵微風動衆竅誰信我忘身一笑問兒子與汝定何親從我來海南幽絶無四鄰耿耿如缺月獨與長庚晨此道固應爾不當怨尤人故山不可到飛夢隔五嶺真遊有黃庭閉目寓兩景室空無可照火滅膏自冷披衣起視夜海闊河漢永西忩半明月散亂梧楸影良辰不可繫逝水無由騁我苖期後枯持此一念靜真人有妙觀俗子多妄量區區勸粒食此豈知子房我非徒跣相終老懷未央兔死縛淮隂狗功指平陽哀哉亦可羞世路皆羊腸相如偶一官嗤鄙蜀父老不記犢鼻時滌器混傭保著書曽幾許渴肺灰土燥琴臺有遺魄笑我歸不早作書遺故人皎皎我懷抱餘生幸無愧可與君平道孟德黠老狐姦言嗾鴻豫哀哉喪亂世梟鸞各騰翥逝者知幾人文舉獨不去天方斫漢室豈計一郗慮昆蟲正相齧乃比藺相如我知公所坐大名難久住細德方險微豈有容公處既往不可悔庶為來者懼博大古真人老𥅆關尹喜獨立萬物表長生乃餘事稚川差可近儻有接物意我頃登羅浮物色恐相值徘徊朱明洞沙水自清駛滿把菖蒲根歎息復棄置藍橋近得道常苦世褊迫西游王屋山不踐長安陌爾來寧復見鳥道度太白昔與吳逺游同藏一瓢窄潮陽隔雲海晚歲儻見客代薪供養火看作栖鳳宅南榮晚聞道未肯化庚桑陶頑鑄强獷枉費塵與糠越子古成之韓生教休糧參同得靈鑰九鎖啓伯陽鵝城見諸孫貧苦我為傷空餘焦先室不傳元化方遺像似李白一奠臨江觴餘齡難把玩妙解寄筆端常恐抱永歎不及丘明遷親友復勸我放心餞華顛虛名非我有至味知誰餐思我無所思安能觀諸緣已矣復何歎舊說易兩篇申韓本自聖陋古不復稽巨君縱獨欲借經作巖崖遂令青襟子珠璧人人懷鑿齒井蛙耳信謂天可彌大道久分裂破碎日愈離我如終不言誰悟角與羇吾琴豈得已昭氏有成虧我昔登朐山出日觀滄涼欲濟東海縣恨無石橋梁今茲黎母國何異于公鄉蠔浦既黏山暑路亦飛霜所欣非自罔不怨道里長和擬古九首有客叩我門繫馬門前桞庭空鳥雀散門閉客立久主人枕書卧夢我平生友忽聞剝啄聲驚散一杯酒倒裳起謝客夢覺兩愧負坐談雜今古不答顔愈厚問我何處來我來無何有酒盡君可起我歌已三終由來竹林人不數濤與戎有酒從孟公慎勿從揚雄﨑嶇頌沙麓塵埃汙西風昔我未嘗逹今者亦安窮窮逹不到處我在阿堵中客去室幽幽鵩鳥來坐隅引吭伸兩翮太息意不舒吾生如寄耳何者為我廬去此復何之少安與汝居夜中聞長嘯月露荒榛蕪無問亦無答吉凶兩何如少年好逺遊蕩志隘八荒九夷為藩籬四海環我堂盧生與若士何足期渺茫稍喜海南州自古無戰埸竒峯望黎母何異嵩與邙飛泉瀉萬仞舞鶴雙低昻分㳅未入海膏澤彌此方芋魁儻可飽無肉亦奚傷馮洗古烈婦翁媪國于茲策勳梁武後開府隋文時三世更險易一心無磷緇錦繖平積亂犀渠破餘疑廟貌空復存碑板漫無辭我欲作銘志慰此父老思遺民不可問僂句莫余欺犦牲菌雞卜我當一訪之銅鼓壺盧笙歌此迎送詩沉香作庭燎甲煎紛相和豈若注微火縈烟嫋清歌貪人無饑飽胡椒亦求多朱劉兩狂子隕隊如風荷本欲竭澤漁奈此明年何朱初平劉誼欲冠帶黎人以取水沉耳雞窠養鶴髮及與唐人游來孫亦垂白頗識李崖州再逢盧與丁閲世真東流斯人今在亡未遽掩一丘我師吳季子守節到晚周一見春秋末渺焉不可求城南有荒池瑣細誰復採幽姿小芙蕖香色獨未改欲為中州信浩蕩絶雲海遙知玉井蓮落蕊不相待攀躋及少壯已矣那容悔矣一作失黎山有幽子形槁神獨完負薪入城市笑我儒衣冠生不聞詩書豈知有孔顔翛然獨往來榮辱未易關日暮鳥獸散家在孤雲端問答了不通歎息指屢彈似言君貴人草莽栖龍鸞遺我吉貝布海風今歲寒和東方有一士瓶居本近危甑墜知不完夢求亡楚弓笑解適越冠忽然反自照識我本來顔歸路在腳底殽潼失重關屢從淵明游雲山出毫端借君無絃物寓我非指彈豈惟舞獨鶴便可躡飛鸞還將嶺茅瘴一洗月闕寒此東方一士正淵明也不知從之游者誰乎若了得此一段我即淵明淵明即我也集歸去來詩十首命駕欲何向欣欣春木榮世人無往復鄉老有逢迎雲外流泉逺風前飛鳥輕相携就衡宇酌酒話交情涉世恨形役告休成老夫良欣就歸路不復向迷途去去徑有一作猶菊行行田欲蕪情親有還往清酒引樽壺與世不相入膝琴聊自一作盡歡風光歸笑傲雲物寄游觀言話審無倦心懷良獨安東臯清有趣植杖日盤桓世事非吾事駕言歸路尋向時迷有命今日悟無心庭內菊歸酒忩前風入琴寓形知已老猶未倦登臨雲岫不知逺巾車行復前僕夫尋老木童子引清泉矯首獨傲世委心還樂天農夫告春事扶老向良田富貴良非願鄉關歸去休携琴已尋壑載酒復經丘翳翳景將入涓涓泉欲流農夫人不樂我獨與之游觴酒命童僕言歸無復留輕車尋絶壑孤棹入清流乘化欲一作亦安命息交還絶游琴書樂三徑老矣亦何求歸去復歸去帝鄉安可期鳥還知已倦雲出欲何之入室還携幼臨流亦賦詩春風吹獨立不是傲親知役役倦人事來歸車載奔征夫問前路稚子候衡門入息亦詩䇿出游常酒樽交親書已絶雲壑自相存寄傲疑今是求榮感昨非聊欣樽有酒不恨室無衣丘壑世情逺田園生事微柯庭還獨盼時有鳥歸飛和貧士七首余遷惠州一年衣食漸窘重九將近樽爼蕭然乃和淵明貧士詩七首以寄許下髙安宜興諸子姪并令過同作長庚與殘月耿耿如相依以我旦暮心惜此須臾暉青天無今古誰知織烏飛我欲作九原獨與淵明歸俗子不自悼顧憂斯人饑堂堂誰有此千駟良可悲夷齊耻周粟髙歌誦虞軒産祿彼何人能致綺與園古來避世士死灰或餘煙末路益可羞朱墨手自研淵明初亦仕絃歌本誠言不樂乃徑歸視世差獨賢誰謂淵明貧尚有一素琴心閒手自適寄此無窮音佳辰愛重九芳菊起自尋踈巾歎虛漉塵爵笑空斟忽餉二萬錢顔生良足欽急送酒家保勿違故人心人皆有耳目夫子曠與婁弱毫寫萬象水鏡無停酬閒居惜重九感此歲月周端如孔北海只有尊空憂二子不並世髙風兩無儔我後五百年清夢未易求芙蓉雜金菊枝葉長䦨干遙憐退朝人糕酒出太官豈知江海上落英亦可餐典衣作重九徂歲慘將寒無衣粟一作寒我膚無酒顰我顔貧居真可歎二事長相關老詹亦白髮惠州太守詹範字器之相對垂霜蓬賦詩殊有味涉世非所工杖藜山谷間狀類渤海龔半道要我飲意與王𢎞同有酒我自至不須遣龎通門生與兒子杖屨聊相從我家六兒子流落三四州辛苦更不識今與農圃儔買田帶修竹築室依清流未能遣一力分汝薪水憂坐念北歸日此勞未易酬我獨遺以安鹿門有前修和桃花源詩世傳桃源事多過其實考淵明所記止言先世避秦亂來此則漁人所見似是其子孫非秦人不死者也又云殺雞作食豈有仙而殺者乎舊說南陽有菊水水甘而芳民居三十餘家飲其水皆壽或至百二三十歲蜀青城山老人村有見五世孫者道極險逺生不識鹽醯而溪中多枸杞根如龍蛇飲其水故壽近歲道稍通漸能致五味而壽亦益衰桃源蓋此比也歟使武陵太守得而至焉則已化為爭奪之場久矣嘗思天壤之間若此者甚衆不獨桃源余在潁州夢至一官府人物與俗間無異而山川清逺有足樂者顧視堂上榜曰仇池覺而念之仇池武都氐故地楊難當所保余何為居之明日以問客客有趙令畤德麟者曰公何為問此此乃福地小有洞天之附庸也杜子美蓋云萬古仇池穴潜通小有天神魚人不見福地語真傳近接西南境長懷十九泉何時一茅屋送老白雲邊他日工部侍郎王欽臣仲至謂余曰吾嘗奉使過仇池有九十九泉萬山環之可以避世如桃源也凡聖無異居清濁共此世心閒偶自見念起忽已逝欲知真一處要使六用廢桃源信不逺藜杖可小憩躬耕任地力絶學抱天藝臂雞有時鳴尻駕無可稅苓龜亦晨吸杞狗或夜吠耘樵得甘芳齕齧謝炮製子驥雖形隔淵明已心詣髙山不難越淺水何足厲不知我仇池髙舉復幾歲從來一生死近又算癡慧蒲澗安期境在廣川羅浮稚川界夢往從之游神交發吾蔽桃花滿庭下流水在户外却笑逃秦人有畏非真契和歸去來兮辭子瞻謫居昌化追和淵明歸去來辭蓋以無何有之鄉為家雖在海外未嘗不歸云爾歸去來兮吾方南遷安得歸卧江海之澒洞弔鼓角之悽悲迹泥蟠而愈深時電往而莫追懷西南之歸路夢良是而覺非悟此生之何常猶寒暑之異衣豈襲裘而念葛蓋得粗而喪微我歸甚易匪馳匪奔俯仰還家下車闔門藩垣雖闕堂室故存挹我天醴注之窪樽飲月露以洗心餐朝霞而眩顔混客主以為一俾婦姑之相安知盜竊之何有乃掊門而折關廓圜鏡以外照納萬象而中觀治廢井以晨汲滃百泉之夜還守靜極以自作時爵躍而鯢桓歸去來兮請終老於斯游我先人之弊廬復舍此而焉求均海南與漠北挈往來而無憂畸人告余以一言非八卦與九疇方饑須糧已濟無舟忽人牛之皆喪但喬木與髙丘驚六用之無成自一根之反流望故家而求息曷中道而三休已矣乎吾生有命歸有時我初無行亦無留駕言隨子聽所之豈以師南華而廢從安期謂湯稼之終枯遂不溉而不耔師淵明之雅放和百篇之新詩賦歸來之清引我其後身蓋無疑和劉柴桑萬劫互起滅百年一踟躇漂流四十年今乃言卜居且喜天壤間一席亦吾廬稍理蘭桂藂盡平狐兔墟黃櫞出舊枿紫茗抽新畬我本早衰人不謂老更劬邦君助畚鍤鄰里通有無竹屋從低深山忩自明踈一飽便終日髙眠忘百須自笑四壁空無妻老相如詞九首太白詞五首并叙岐下頻年大旱禱於太白山輒應故作迎送神詞一篇五章雲闐闐山晝晦風振野神將駕載雲罕從玉虯旱既甚蹶往救道阻修兮旌旗翻疑有無日慘變神在塗飛赤篆訴閶闔走隂符行羽檄萬靈集兮風為幄雲為蓋滿堂爛神既至紛醉飽錫以雨百川溢施溝渠歌且舞兮騎裔裔車班班鼓簫悲神欲還轟振凱隱林谷執妖厲歸獻馘千里肅兮神之來悵何晚山重復路幽逺神之去飄莫追德未報民之思永萬祀兮上清辭以宫名名篇君胡為乎山之幽顧宫殿兮久淹留又曷為一朝去此而不顧兮悲此空山之人也來不可得而知兮去固不可得而訊也君之來兮天門空從千騎兮駕飛龍𨽻辰星兮役太歲儼晝降兮雷隆隆朝發軫兮帝庭夕弭節兮山宫懭有妖兮虐下土精為星兮氣為虹愛流血之滂沛兮又嗜瘧癘與螟蟲嘯盲風而涕淫雨兮時又吐旱火之爞融銜帝命以下討兮建千仞之修鋒乘飛霆而追逸景兮歙砉掃滅而無蹤忽崩播其來㑹兮走海嶽之神公龍車獸鬼不知其數兮旗纛暗靄而冥䝉漸俯傴以旅進兮鏘劒佩之相礱司殺生之必信兮知上帝之不汝容既約束以反職兮退戰栗而愈恭澤充塞於四海兮獨淡然其無功君之職兮天門開欵閶闔兮朝玉臺羣仙迎兮塞雲漢儼前導兮紛後陪歷玉階兮帝迎勞君良苦兮馬豗頽閔人世兮迫隘陳下土兮帝所哀返瓊宫之嵯峨兮役萬靈之喧豗默清靜以無為兮時節狩於斗魁詣通明而獻黜陟兮詄蕩蕩其無回忽表裏之煥霍兮光下燭於九陔時游目以下覽兮五嶽為豆四溟為杯俯故宫之千柱兮若毫端之集埃來非以為樂兮去非以為悲謂神君之既返兮曽顔咫尺之不違升祕殿以內悸兮魂凛凛而上馳忽寤寐以有得兮敢沐浴而獻辭是邪非邪臣不可得而知也歸來引送王子立歸筠州歸去來兮世不汝求胡不歸洶北望之橫流兮渺西顧之塵霏紛野馬之决驟兮幸余首之未鞿出彭城而南騖兮眷丘壠而增欷亂清淮而俯鑒兮驚昔容之是非念東坡之遺老兮輕千里而欵余扉共雪堂之清夜兮攬明月之餘輝曽雞黍之未熟兮歎空室之蛜蝛我挽袖而莫留兮僕夫在門歌式微歸去來兮路渺渺其何極將稅駕於何許兮北江之南南江之北於此有人兮儼峩峩其豐碩孰居約而爾肥兮非糠核其何食久抱一而不試兮愈溫溫而自克吾居世之荒浪兮視昏昏而聽默默非子之莫振吾過兮久不見恐自賊吾欲往而道無由兮子何畏而不即將以彼為玉人兮以子為之璞也黃泥坂辭出臨臯而東騖兮並藂祠而北轉走雪堂之坡陀兮歷黃泥之長坂大江洶以左繚兮渺雲濤之舒卷草木層纍而右附兮蔚柯丘之葱蒨余旦往而夕還兮步徙倚而盤桓雖信美不可居兮茍娛余於一盼余幼好此竒服兮襲前人之詭幻老更變而自哂兮悟驚俗之來患釋寶璐而被繒絮兮雜市人而無辨路悠悠其莫往來兮守一席而窮年時游步而逺覽兮路窮盡而旋反朝嬉黃泥之白雲兮莫宿雪堂之青煙喜魚鳥之莫余驚兮幸樵蘇之我嫚初被酒以行歌兮忽放杖而醉偃草為茵而塊為枕兮穆華堂之清晏紛墜露之濕衣兮升素月之團團感父老之呼覺兮恐牛羊之豫踐於是蹶然而起起而歌曰月明兮星稀迎余往兮餞余歸歲既晏兮草木腓歸來歸來兮黃泥不可以久嬉清溪辭大江南兮九華西泛秋浦兮亂清溪水渺渺兮山無蹊路重復兮居者迷爛青紅兮粲髙低松十里兮稻千畦山無人兮雲朝挂藹濛濛兮淹凄凄嘯林谷兮號水泥走鼪鼯兮下鳬鷖忽孤壘兮隱重堤杳冥茫兮聞犬雞鬱萬瓦兮鳥翼齊浮軒楹兮飛栱枅鴈南歸兮寒蜩嘶弄秋水兮挹玻瓈朝市合兮雜耄齯挾單瓢兮佩鋤犂鳥獸散兮相扶携隱驚雷兮騖長霓望翠微兮古招提躋木杪兮翔雲梯若有人兮悵幽栖石為門兮雲為閨塊虛堂兮法喜妻呼猿狙兮子鹿麛我欲往兮奉杖藜獨長嘯兮謝阮嵇琴操一首醉翁引并引琅邪幽谷山水竒麗泉鳴空澗若中音㑹醉翁喜之把酒臨聽輒欣然忘歸既去十餘年而好竒之士沈遵聞之往游以琴寫其聲曰醉翁操節奏踈宕而音指華暢知琴者以為絶倫然有其聲而無其辭翁雖為作歌而與琴聲不合又依楚辭作醉翁引好事者亦倚其辭以製曲雖粗合均度而琴聲為辭所繩約非天成也後三十餘年翁既捐館舍而遵亦沒久矣有廬山玉澗道人崔間特妙於琴恨此曲之無辭乃譜其聲而請於東坡居士以補之云琅然清圜誰彈響空山無言惟翁醉中知其天月明風露娟娟人未眠荷蕢過山前曰有心也哉此賢醉翁嘯詠聲和流泉醉翁去後空有朝吟夜怨山有時而童巔水有時而回川思翁無歲年翁今為飛仙此意在人間試聽徽外三兩絃東坡全集卷三十二
