body:
  text: 東坡全集卷九十四宋蘇軾撰贊三十七首延州來季子贊并引魯襄公十二年吳子夀夢卒延州來季子其少子也以讓國聞於諸侯則非童子矣至哀公十年冬楚令尹子期伐陳季子救陳謂子期曰二君不務德而力爭諸侯民何罪焉我請退以為子名務德而安民乃還時去夀夢卒蓋七十七年矣而能千里將兵季子何其夀而康也然其卒不書於春秋哀公之元年吳王夫差敗越於夫椒句踐使大夫種因太宰嚭以行成於吳吳王許之子胥諫不聽則吳之亡形成矣季子觀樂於魯知列國之廢興於百年之前方其救陳也去吳之亡十三年耳而謂季子不知可乎闔廬之自立也曰季子雖至不吾廢也是季子德信於吳人而言行於其國也且帥師救陳不戰而去之以為敵國名則季子之於吳蓋亦少專矣救陳之明年而子胥死季子知國之必亡而終無一言於夫差知言之無益也夫子胥以闔廬霸而夫差殺之如皂𨽻豈獨難於季子乎烏乎悲夫吾是以知夫差之不道至於使季子不敢言也蘇子曰延州來季子張子房皆不死者也江左諸人好談子房季札之賢有以也夫此可與知者論難與俗人言也作延州來季子贊曰泰伯之德鍾於先生棄國如遺委蛻而行坐閲春秋幾五之二古之真人有化無死孔北海贊并敘文舉以英偉冠世之資師表海內意所豫奪天下從之此人中龍也而曹操陰賊險狠特鬼蜮之雄者爾其勢決不兩立非公誅操則操害公此理之常而前史乃謂公負其高氣志在靖難而才疏意廣訖無成功此蓋當時奴婢小人論公之語公之無成天也使天未欲亡漢公誅操如殺狐兔何足道哉世之稱人豪者才氣各有高卑然皆以臨難不懼談笑就死為雄操以病亡子孫滿前而咿嚶涕泣留連妾婦分香賣履區處衣物平生姦偽死見真性世以成敗論人物故操得在英雄之列而公見謂才疏意廣豈不悲哉操平生畏劉備而備以公知天下有已為喜天若祚漢公使備誅操無難也豫讀公所作楊四公贊歎曰方操害公復有魯國一男子慨然爭之公庶幾不死乃作孔北海贊曰晉有羯奴盜賊之靡欺孤如操又羯所恥我書春秋與齊豹齒文舉在天雖亡不死我宗若人尚友千祀祀公如龍視操如鬼王元之畫像贊并敘傳曰不有君子其能國乎余嘗三復斯言未嘗不流涕太息也如漢汲黯蕭望之李固吳張昭唐魏鄭公狄仁傑皆以身徇義招之不來麾之不去正色而立于朝則豺狼狐狸自相吞噬故能消禍於未形救危於將亡使皆如公孫丞相張禹胡廣雖纍千百緩急豈可望哉故翰林王公元之以雄文直道獨立當世足以追配此六君子者方是時朝廷清明無大姦慝然公猶不容於中耿然如秋霜夏日不可狎玩至於三黜以死有如不幸而處於衆邪之間安危之際則公之所為必將驚世絶俗使斗筲穿窬之流心破膽裂豈特如此而已乎始余過蘇州虎丘寺見公之畫像想其遺風餘烈願為執鞭而不可得其後為徐州而公之曾孫汾為兗州以公墓碑示余乃追為之贊以附其家傳云維昔聖賢患莫已知公遇太宗允也其時帝欲用公公不少貶三黜窮山之死靡憾咸平以來獨為名臣一時之屈萬世之信紛紛鄙夫亦拜公像何以占之有泚其顙公能泚之不能已之茫茫九原愛莫起之王仲儀真贊并敘孟子曰所謂故國者非謂有喬木之謂也有世臣之謂也又曰為政不難不得罪於巨室巨室之所慕一國慕之一國之所慕天下慕之夫所謂世臣者豈特世祿之人而巨室者豈特侈富之家也哉蓋功烈已著於時德望已信於人譬之喬木封殖愛養自拱把以至於合抱者非一日之故也平居無事商功利課殿最誠不如新進之士至於緩急之際決大策安大衆呼之則來揮之則散者惟世臣巨室為能余嘉祐中始識懿敏王公於成都其後從事於岐而公自許州移鎮平涼方是時虜大舉犯邊轉運使攝帥事與副總管議不合軍無紀律邊人大恐聲搖三輔及聞公來吏士踴躍傳呼旗斾精明鼓角歡亮虜即日解去公至燕勞將佐而已余然後知老臣宿將其功用蓋如此使新進之士當之雖有韓白之勇良平之奇豈能坐勝默成如此之捷乎熙寧四年秋余將往錢塘見公於私第佚老堂飲酒至暮論及當世事曰吾老矣恐不復見子厚自愛無忘吾言既去二年而公薨又六年乃作公之真贊以遺其子鞏詞曰堂堂魏公配命召祖顯允懿敏維周之虎魏公在朝百度維正懿敏在外有聞無聲高明廣大宜公宜相如木百圍宜宫宜堂天既厚之又貴富之如山如河維安有之彼窶人子既陋且寒終勞永憂莫知其賢曷不觀此佩玉劒履晉公之孫魏公之子王定國真贊溫然而澤者道人之腴也凛然而清者詩人之臞也雍容委蛇者貴介之公子而短小精悍者遊俠之徒也人何足以知之此皆其膚也若人者泰不驕困不撓而老不枯也秦少遊真贊以君為將仕也其服野其行方以君為將隱也其言文其神昌置而不求君不即即而求之君不藏以為將仕將隱者皆不知君者也蓋將挈所有而乘所遇以遊於世而卒反於其鄉者乎參寥子真贊東坡居士曰維參寥子身寒而道富辨於文而訥於口外尫柔而中健武與人無競而好刺譏朋友之過枯形灰心而喜為感時玩物不能忘情之語此余所謂參寥子有不可曉者五也徐大正真贊賢哉徐子溫文而毅儒不亂法俠不犯忌求之古人尚論其世登唐滅漢三國之士我非北海安識子義願觀伯符攬戟為戲文與可畫墨竹屏風贊與可之文其德之糟粕與可之詩其文之毫末詩不能盡溢而為書變而為畫皆詩之餘其詩與文好者益寡有好其德如好其畫者乎悲夫戒壇院文與可畫墨竹贊風梢雨籜上傲冰雹霜根雪節下貫金鐵誰為此君與可姓文惟其有之是以好之石室先生畫竹贊并敘與可文翁之後也蜀人猶以石室名其家而與可自謂笑笑先生蓋可謂與道皆逝不留於物者也顧嘗好畫竹客有贊之者曰先生間居獨笑不已問安所笑笑我非爾物之相物我爾一也先生又笑笑所笑者笑笑之餘以竹發妙竹亦得風天然而笑文與可飛白贊嗚呼哀哉與可豈其多好好奇也歟抑其不試故藝也始余見其詩與文又得見其行草篆𨽻也以為止此矣既沒不可得而復見其飛白美哉多乎其盡萬物之態也霏霏乎其若輕雲之蔽月翻翻乎其若長風之卷斾也猗猗乎其若遊絲之縈栁絮裊裊乎其若流水之舞荇帶也離離乎其逺而相屬縮縮乎其近而不隘也其工至於如此而余乃今知之則余之知與可者固無幾而其所不知者蓋不可勝計也鳴呼哀哉郭忠恕畫贊并敘右張夢得所藏郭忠恕畫山水屋木一幅忠恕字恕先以字行洛陽人少善屬文及史書小學通九經七歲舉童子漢湘陰公辟從事與記室董裔爭事謝去周祖召為周易博士國初與監察御史符昭文爭忿朝堂貶乾州司戶秩滿遂不仕放曠岐雍陜洛間逢人無貴賤口稱貓遇佳山水輒留旬日或絶粒不食盛夏暴日中無汗大寒鑿冰而浴尤善畫妙於山水屋木有求者必怒而去意欲畫即自為之郭從義鎮岐下延止山亭設絹素粉墨於坐經數月忽乘醉就圖之一角作逺山數峯而已郭氏亦寶之岐有富人子喜畫日給淳酒待之甚厚久乃以情言且致匹素恕先為畫小童持線車放風鳶引線數丈滿之富家子大怒遂絶時與役夫小民入市肆飲食曰吾所與遊皆子類也太宗聞其名召赴闕館于內侍省押班竇神興舍恕先長髯而美忽盡去之神興驚問其故曰聊以效顰神興大怒除國子監主簿出館于太學益縱酒肆言時政頗有謗讟語聞決杖配流登州至齊州臨清謂部送吏曰我逝矣因掊地為穴度可容面俯窺焉而卒藁葬道左後數月故人欲改葬但衣衾存焉蓋尸解也贊曰長松攙天蒼壁插水憑欄飛觀縹眇誰子空蒙寂歷煙雨滅沒恕先在焉呼之或出黃庭經贊并敘余既書黃庭內景以贈葆光道師而龍眠居士復為作經相其前而畫余二人像其後筆勢俊妙遂為希世之寶嗟歎不足故復贊之曰太上虛皇出靈篇黃庭真人舞胎仙髯耆兩卿相後前丱妙夾侍清且妍十有二神服鋭堅巍巍堂堂人中天問我何修果此緣是心朝空夕了然恐非其人世莫傳殿以二士蒼鵠鶱南隨道師歷山淵山人迎笑喜我還問誰遣化老龍眠韓幹畫馬贊韓幹之馬四其一在陸驤首奮鬛若有所望頓足而長鳴其一欲涉凥高首下擇所由濟局踳而未成其二在水前者反顧若以鼻語後者不應欲飲而留行以為廄馬也則前無羈絡後無箠策以為野馬也則隅目聳耳豐臆細尾皆中度程蕭然如賢大夫貴公子相與解帶脫帽臨水而濯纓遂欲高舉逺引友麋鹿而終天年則不可得矣蓋優哉遊哉聊以卒歲而無營膠西蓋公堂照壁畫贊并引陸探微畫師子在潤州甘露寺李衛公鎮浙西所留者筆法竒古絶不類近世豫為甘露寺詩有云破板陸生畫青猊戲盤跚上有二天人揮手如翔鸞筆墨雖欲盡典刑垂不刋者也熙寧九年十一月十五日命工摹置膠西蓋公堂中且贊之云高其目仰其鼻奮髯吐舌威見齒舞其足前其耳左顧右盼喜見尾雖猛而和蓋其戲置之高堂護燕几啼呼顛沛走百鬼嗟乎妙哉古陸子石菖蒲贊并敘本草菖蒲味辛溫無毒開心補五臟通九竅明耳目久服輕身不忘延年益心智高志不老注云生石磧上九節者良生下濕地大根者乃是昌陽不可服韓退之進學解云訾醫師以昌陽引年欲進其豨苓不知退之即以昌陽為菖蒲耶抑謂其似是而非不可以引年也凡草木之生石上者必須微土以附其根如石韋石斛之類雖不待土然去其本處輒稿死惟石菖蒲并石取之濯去泥土漬以清水置盆中可數十年不枯雖不甚茂而節葉堅瘦根須連絡蒼然於几案間久而益可喜也其輕身延年之功既非昌陽之所能及至於忍寒苦安淡泊與清泉白石為伍不待泥土而生者亦豈昌陽之所能髣佛哉余遊慈湖山中得數本以石盆養之置舟中間以文石石英璀璨芬郁意甚愛焉顧恐陸行不能致也乃以遺九江道士胡洞微使善視之余復過此將問其安否贊曰清且泚惟石與水託於一器養非其地瘠而不死夫孰知其理不如此何以輔五藏而堅髮齒九馬圖贊并引長安薛君紹彭家藏曹將軍九馬圖杜子美所為作詩者也拳毛師子二駿在焉作九馬贊牧者萬歲繪者惟霸甫為作誦偉哉九馬姚宋廟堂李郭治兵帝下毛龍以馭羣英我思開元今為幾日筋骨應圖至三萬匹云何寂寥跬步山川負鹽挽磨淚濕九泉牝牡驪黃自以為至駮其一毛棄我千里蹄齧是乘脂蠟其鞭道阻且長喟其永歎顧愷之畫黃初平牧羊圖贊先生養生如牧羊放之無何有之鄉止者自止行者行先生超然坐其旁挾策讀書羊不亡化而為石起復僵流涎磨牙笑虎狼先生指呼羊服箱號稱雨工行四方莫隨上林芒屩郎嗅門舐地尋鹽湯二疏圖贊惟天為健而不干時沈潛剛克以燮和之於赫漢高以智力王凛然君臣師友道喪孝宣中興以法馭人殺蓋韓楊蓋三良臣先生憐之振袂脫屣使知區區不足驕士此意莫陳千載于今我觀畫圖涕下沾襟偃松屏贊并引余為中山守始食北嶽松膏為天下冠其木理堅密瘠而不瘁信植物之英烈也謫居羅浮山下地暖多松而不識霜雪如高才勝人生綺紈家與孤臣孽子有間矣士踐憂患安知非福幼子過從我南來畫寒松偃蓋為護首小屏為之贊曰燕南趙北大茂之麓天僵雪峰地裂冰谷凛然孤清不能無生生此偉奇北方之精蒼皮玉骨磽磽齾齾方春不知沍寒秀發孺子介剛從我炎荒霜中之英以洗我瘴三馬圖贊并引元祐初上方閉玉門關謝遣諸將太師文彥博宰相吕大防范純仁建遣諸生遊師雄行邊敇武備師雄至熙河蕃官包順請以所部熟戶除邊患師雄許之遂擒猾羌大首領果莊青宜結以獻百官皆賀旦遣使告永裕陵時西域貢馬首高八尺龍顱而鳯膺虎脊而豹章出東華門入天駟監振鬛長鳴萬馬皆瘖父老縱觀以為未始見也然上方恭默思道八駿在廷未嘗一顧其後圉人起居不以時馬有斃者上亦不問明年羌溫錫沁有良馬不敢進請於邊吏願以餽太師潞國公詔許之蔣之奇為熙河帥西蕃有貢駿馬汗血者有司以非入貢歲月留其使與馬於邊之奇為請乞不以時入事下禮部軾時為宗伯判其狀云朝廷方却走馬以糞正復汗血亦何所用事遂寢于時兵革不用海內小康馬則不遇矣而人少安軾嘗私請於承議郎李公麟畫當時三駿馬之狀而使果莊青宜結校之藏於家紹聖四年三月十四日軾在惠州謫居無事閲舊書畫追思一時之事而歎三馬之神駿乃為之贊曰吁果莊世悍驕奔二師走嫖姚今在廷服虎貂效天驥立內朝八尺龍神超遙若將西燕昆瑤帝念民乃下招籋歸雲逝房妖李潭六馬圖贊六馬異態以似為妍畫師何從得所以然相彼癢者舉脣見咽方其癢時稿木萬錢絡以金玉非馬所便烏乎各適其適以全吾天乎李伯時畫李端叔真贊龍眠居士畫李端叔東坡老人贊之曰須髮之拳然眉宇之淵然披胸腹之掀然以為可得而見歟則漠乎其無言以為不可得而見歟則已見畫于龍眠矣嗚呼將為既琢之玉以役其天乎其將為不雨之雲以抱其全乎抑將遊戲此世而時出於兩者之間也三笑圖贊彼三士者得意忘言盧胡一笑其樂也天嗟此小童麋鹿狙猿爾各何知亦復粲然萬生紛綸何鄙何妍各笑其笑未知孰賢李西平畫贊以吾觀西平王提孤軍自北方赴行在走懷光斬朱泚如反掌及其後帥鳯翔與隴右瞰河湟兵益振謀既臧終不能取尋常墮賊計困平涼卒罷兵仆三將誰之咎在廟堂斬馬劒誅延賞為葅醢不足償覽遺像涕泗滂醉吟先生畫贊黃金斗碧玉壺足踏東流水目送西飛鳬擁髻顧影者真子干之侍妾奮髯直視者非列仙之臞儒夢作司馬相如求畫贊并敘夜夢嚴君平司馬相如揚子雲合席而坐子雲曰長卿久欲求公作畫贊余辭以罪戾之餘久廢筆硯子雲懇祈不獲已為之既成子雲戲余曰三賦果足以重趙乎余曰三賦足以重趙則子之太玄果足以重趙乎為之一笑而散長卿有意慕藺之勇言還故鄉閭里是聳景星鳯凰以見為寵煌煌三賦可使趙重題三國名臣贊西漢之士多智謀薄於名義東京之士尚風節短於權略兼之者三國名臣也而孔明巍然三代王者之佐未易以世論忠懿王贊文武忠懿堂堂如春中有樗里不以示人雷行八區震驚聽聞提十五州共為帝民送君者自崖而返以安樂其子孫九萬里則風斯在下矣眇大物而成仁李伯時所畫沐猴馬贊吾觀沐猴以馬為戲至使此馬竊銜詭轡沐猴宜馬真虛言爾文與可枯木贊怪木在廷枯柯北走窮猿投壁驚雀入牖居者蒲氏畫者文叟贊者蘇子觀者如流救月圖贊癡蟇臠肉睥睨天目偉哉黑龍見此蛇服蟇死月明龍反其族乘雲遊天雨我百穀捕魚圖贊荇秀水暖龜魚出戲怒一作獨蛙無朋寂寞鼓吹孰謂魚樂強羸相屠去是哆口以完長須思無邪齋贊飲食之精草木之華集我丹田我丹所家我丹伊何鉛汞丹砂客主相守如巢養鴉培以戊已耕以赤蛇化以丙丁滋以河車乃根乃株乃實乃華晝煉于日赫然丹霞夜浴于月皓然素葩金丹自成曰思無邪此贊信筆直書不加點定殆是天成非以意造也紹聖元年十月二十日六觀堂贊我觀衆生念念為人晝不見心夜不見身佛言如夢非想非因夢中常覺孰為形神我觀衆生終日疑怖土偶不然無罣礙故佛言如幻永離愛惡飢餐畫餅無有是處我觀衆生起滅不停以是為故乃有死生佛言如泡泡本無成能壞能成雖佛不能我觀衆生顛倒已久以光為無以影為有佛言光影我亦舉手從此永斷日中狂走我觀衆生同遊露中對面不見衣沾眼蒙佛言如露一照而通蒙者既滅照者亦空我觀衆生神通自在於電光中建立世界佛言如電言發意會佛與衆生了無雜壞垂慈老人嘗作是觀自一至六六生千萬生故無窮一故不亂東坡無口孰為此贊元華子真贊方口而髯秀眉覆顴示我其華我識其元我來從之目擊道存我有陋室茅茨采椽灑掃庭戶窗牖廓然虛空無人願受豫言東坡全集卷九十四
