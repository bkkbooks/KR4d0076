body:
  text: 東坡全集卷九十二宋蘇軾撰解一首易解十八變而成四營為一變三變而一爻六爻為十八變也三變之餘四數之得九為老陽得六為老隂得七為少陽得八為少隂故乾之䇿二百一十有六坤之䇿百四十有四取老而言也凡九六為老七八為少其説未之聞也或曰陽極於九其次則七也極者為老其次為少則當老於十而少於八也曰隂不可加於陽故十不用十不用猶當老於八而少於六也則又曰陽順而上其成數極於九隂逆而下其成數極於六自下而上陰陽均也稚於子午而壯於已亥始於復垢而終於乾坤者陰猶陽也曷嘗有進陽而退陰與逆順之别乎且夫自然而然者天地且不能知而聖人豈得與於其間而制其豫奪哉惟唐一行之學則不然以為易固言之矣十有八變而成卦八卦而小成則十八變之間有八卦焉人莫之思也變之初有多少其一變也不五則九其二與三也不四則八八與九為多五與四為少多少者竒耦之象也三變皆少則乾之象也乾所以為老陽而四數其餘得九故以九名之三變皆多則坤之象也坤所以為老陰而四數其餘得六故以六名之三變而少者一則震坎艮之象也震坎艮所以為少陽而四數其餘得七故以七名之三變而多者一則巽離兌之象也巽離兑所以為少隂而四數其餘得八故以八名之故七八九六者因餘數以名隂陽而陰陽之所以為老少者不在是而在乎三變之間八卦之象也此唐一行之學也説七首仁説孟子曰仁者如射發而不中反求諸身吾嘗學射矣始也常志於中目存乎鵠手往從之十發而九失其一中者幸也有善射者教吾反求諸身手持權衡足蹈規矩四肢百體皆有法焉一法不修一病隨之病盡而法完則心不期中目不存鵠十發十中矣四肢百體一不如法差於此者在毫釐之內而失於彼者在尋丈之外矣故曰孟子之所謂仁者如射則孔子之所謂克己復禮也君子之於仁盡力而求之有不獲焉退而求之身莫若自克自克而反於禮一日足矣何也凡害于仁者盡也害於仁者盡而仁不可勝用故曰非禮勿視非禮勿聽非禮勿言非禮勿動一不如禮在我者甚微而民有不得其死者矣非禮之害甚于殺不辜不仁之禍無大於此故也剛説孔子曰剛毅木訥近仁又曰巧言令色鮮矣仁所好夫剛者非好其剛也好其仁也所惡夫佞者非惡其佞也惡其不仁也吾平生多難常以身試之凡免我於厄者皆平日可畏人也擠我於嶮者皆異時可喜人也吾是以知剛者之必仁佞者之必不仁也建中靖國之初吾歸自海南見故人問存沒追論平生所見剛者或不幸死矣若孫君介夫諱立節者真可謂剛者也始吾弟子由為條例司屬官以議不合引去王荆公謂君曰吾條例司當得開敏如子者君笑曰公過矣當求勝我者若我輩人則亦不肯為條例司矣公不答徑起入戶君亦趨出君為鎮江軍書記吾時通守錢塘往來常潤間見君京口方新法之初監司皆新進少年馭吏如束濕不復以禮遇士大夫而獨敬憚君曰是抗丞相不肯為條例司者謝麟經制溪洞事宜州守王竒與蠻戰死君為桂州節度判官被旨鞠吏士有罪者麟因收大小使臣十二人付君并按且盡斬之君持不可麟以語侵君君曰獄當論情吏當守法逗撓不進諸將罪也既伏其辜矣餘人可盡戮乎若必欲以非法斬人則經制司自為之我何與焉麟奏君抗拒君亦奏麟侵獄事刑部定如君言十二人皆不死或以遷官吾以是益知剛者之必仁也不仁而能以一言活十二人於必死乎方孔子時可謂多君子而曰未見剛者以明其難得如此而世乃曰太剛則折士患不剛耳長養成就猶恐不足當憂其太剛而懼之以折耶折不折天也非剛之罪為此論者鄙夫患失者也君平生可紀者甚多獨書此二事遺其子協勴明剛者之必仁以信孔子之説稼説送張琥盍嘗觀於富人之稼乎其田美而多其食足而有餘其田美而多則可以更休而地力得完其食足而有餘則種之常不後時而斂之常及其熟故富人之稼常美少秕而多實久藏而不腐今吾十口之家而共百畝之田寸寸而取之日夜而望之鋤耰銍艾相尋於其上者如魚鱗而地力竭矣種之常不及時而斂之常不待其熟此豈能復有美稼哉古之人其才非有以大過今之人也其平居所以自養而不敢輕用以待其成者閔閔焉如嬰兒之望長也弱者養之以至於剛虛者養之以至於充三十而後仕五十而後爵信於久屈之中而用於至足之後流於既溢之餘而發於持滿之末此古之人所以大過人而今之君子所以不及也吾少也有志於學不幸而早得與吾子同年吾子之得亦不可謂不早也吾今雖欲自以為不足而衆且妄推之矣嗚呼吾子其去此而務學也哉博觀而約取厚積而薄發吾告子止於此矣子歸過京師而問焉有曰轍子由者吾弟也其亦以是語之文與可字説鄉人皆好之何如曰未可也鄉人皆惡之何如曰未可也不如鄉人之善者好之其不善者惡之善者好之不善者惡之足以為君子乎曰未也孔子為問者言也以為賢於所問者而巳君子之居鄉也善者以勸不善者以恥夫何惡之有君子不惡人亦不惡於人子夏之於人也可者與之其不可者拒之子張曰君子尊賢而容衆嘉善而矜不能我之大賢歟於人何所不容我之不賢歟人將拒我如之何其拒人也子張之意豈不曰與其可者而不可者自逺乎使不可者而果逺也則其為拒也甚矣而子張何惡於拒也曰惡其有意於拒也夫苟有意於拒則天下相率而去之吾誰與居然則孔子之於孺悲也非拒歟曰孔子以不屑教誨者也非拒也夫苟無意於拒則可者與之雖孔子子張皆然吾友文君名同字與可或曰為子夏者歟曰非也取其與不取其拒為子張者也與可之為人也守道而忘勢行義而忘利修德而忘名與為不義雖祿之千乘不顧也雖然未嘗有惡於人人亦莫之惡也故曰與可為子張者也楊薦字説楊君以其所名薦請字於余余字之尊己而告之曰古之君子佩玉而服韍戴冕而垂旒一獻之禮賓主百拜俯僂而後食夫所為飲食者為飽也所為衣服者為暖也若直曰飽暖而巳則夫古之君子其無乃為紛紛而無益迂闊而過當邪蓋君子小人之分生於足與不足之間若是足以巳矣而必為之節文故其所以養其身者甚周而其所以自居者甚髙而可畏凜乎其若處女之在閨也兢兢乎其若懷千金之璧而行也夫是以不仁者不敢至於其牆不義者不敢過其門惟其所為者止於足以巳矣之間則人亦狎之而輕加之以不義由此觀之凡世之所謂紛紛而無益迂闊而過當者皆君子之所以自尊也易曰藉用白茅無咎孔子曰苟錯諸地而可矣藉之用茅何咎之有地非不足錯也而必茅之為藉是君子之過以自尊也豫欲楊君之過以自尊故因其名薦而取諸易以為之字楊君有俊才聰明果敢有過於人而余獨憂其所以自愛重者不至而巳矣張厚之忠甫字説張厚之忠甫樂全先生子也美才而好學信道而篤志先生名之曰恕而其客蘇軾子瞻和仲推先生之意字之曰厚之又曰忠甫且告之曰事有近而用逺言有約而義博者渴必飲飢必食食必五穀飲必水此夫婦之愚所共知而聖人之智所不能易也一言而可以終身行之者恕也仁者得之而後仁知者得之而後智施於君臣父子夫婦朋友之間無所適而不可是飢渴飲食之道也故曾子曰夫子之道忠恕而巳矣而孔子亦曰如有周公之才之美使驕且吝其餘不足觀也巳夫驕且吝豈非不恕而巳乎人而能恕也雖孔子可庶幾人而不能恕雖周公不足觀也先生之所以遺子者至矣吾不能加毫末於此矣然而曾子謂之忠恕詩人謂之忠厚以吾觀之忠與恕與厚是三言者聖人之所謂一道也或謂之穀或謂之米或謂之飯此豈二物也哉然謂穀米謂米飯則不可故吾願子貫三言而并佩之將有為也將有言也必反而求之曰吾未恕乎未厚乎未忠乎自反而恕矣厚矣忠矣然後從之此孔子曾子詩人之意也先生之意也趙德麟字説宋有天下百餘年所與分天工治民事者皆取之疏逺側微而不私其親故宗室之賢未有以勳名聞者神宗皇帝實始慨然欲出其英才與天下共之增立教養選舉之法所以封植而琢磨之者甚備行之二十年而文武之器彬彬稍見焉元祐六年豫自禁林出守汝南始與越王之孫華原公之子僉書君令畤遊得其為人博學而文篤行而剛信於為道而敏於為政豫以為有杞梓之用瑚璉之貴將必顯聞於天下非特佳公子而巳昔漢武帝幸雍祠五畤獲白麟以薦上帝作白麟之歌而司馬遷班固書曰獲一角獸蓋麟云蓋之為言疑之也夫獸而一角固麟矣二子何疑焉豈求之武帝而未見所以致麟者歟漢有一汲黯而武帝不能用乃以白麟赤鴈為祥二子非疑之蓋陋之也今先帝立法以出宗室之賢而主上虛已盡下求人如不及四方之符瑞皆抑而不聞此真獲麟者也麟固不求獲不幸而有是德與是形此麟之所病也今君學道觀妙淡泊自守以富貴為浮雲而文章議論載其令名而馳之既有麟之病矣又可得逃乎敬字君德麟而為之説評史四十六首堯不誅四凶史記本紀舜歸而言於帝請流共工於幽陵以變北狄放歡兜於崇山以變南蠻遷三苗於三危以變西戎殛鯀於羽山以變東夷太史公多見先秦古書故其言時有可考以正自漢以來儒者失之四族者若皆窮姦極惡則必見誅於堯之世不待舜而後誅明矣屈原有云鯀婞直以亡身則鯀蓋剛而犯上者耳若四族者誠皆小人也則安能用之以變四夷之俗哉由此觀之則四族之誅皆非誅死亦不廢棄但遷之逺方為要荒之君耳如左氏之所言皆後世流傳之過若堯之世有大姦在朝而不能去則堯不足為堯矣伊尹五就桀聖人之所能有絶人者不可以常情疑其有無孔子為魯司寇墮郈墮費三桓不疑其害己非孔子能之乎伊尹去亳適夏既醜有夏復歸于亳伊尹為政于商既二於夏矣以桀之暴戾處其執政而不疑往來兩國之間而商人父師之非聖人能如是乎是以廢太甲太甲不怨復其位太甲不疑皆不可以常情斷其有無也後世惟諸葛亮近之玄德將死之言乃真實語也使孔明據劉禪位蜀人豈有異辭哉讀栁宗元五就桀贊終篇皆言伊尹往來兩國之間豈其有意教誨桀而全其國耶不然湯之當王也久矣伊尹何疑焉桀能改過而免於誅可庶幾也能用伊尹而得志於天下雖至愚知其不然矣宗元意欲以此自解其從王叔文之罪也曾參曰唯孔子曰參乎吾道一以貫之曾子曰唯子出門人問曰何謂也曰夫子之道忠恕而巳矣師弟子答問未嘗不唯而曾子之唯獨記於論語一唯之外口耳俱喪而門人方欲問其所謂此繫風捕影之流何足實告哉宰我不叛李斯上書諫二世其略曰田常為簡公臣布惠施德下得百姓上得羣臣隂取齊國殺宰豫於庭是宰豫不從田常亂而滅其族太史公載宰我為臨淄大夫與田常作亂以夷其族孔子恥之李斯事荀卿去孔子不逺宜知其實弟子傳妄也豫病太史公言宰我與田常作亂夷其族使吾先師之門乃有叛臣焉天下通祀者容叛臣其間豈非千載不蠲之惑也耶近令兒子邁考閲舊書究其所因則宰我不叛其驗甚明太史公因陋承疑使宰我負寃千載而吾師與蒙其詬自兹一洗亦古今之一快也管仲分君謗宋君奪民時以為臺而民非之無忠臣以掩其過也子罕釋相而為司空民非子罕而善其君齊桓公宫中七市女閭七百國人非之管仲故為三歸之家以掩公此戰國䇿之言也蘇子曰管仲仁人也戰國䇿之言庶幾是乎然世未有以為然者也雖然管仲之愛其君亦陋矣不諫其過而務分謗焉或曰管仲不可諫也蘇子曰用之則行舍之則藏諫而不聽不用而巳矣故孔子曰管仲之器小哉管仲無後左氏云管仲之世祀也宜哉謂其有禮也而管子之後不復見於齊者豫讀其書大抵以魚鹽富齊耳然後知管子所以無後於齊者孔子曰管仲相桓公九合諸侯一匡天下微管仲吾其被髮左袵矣又曰桓公九合諸侯不以兵車管仲之力也如其仁如其仁夫以孔子稱其仁丘明稱其有禮然不救其無後利之不可與民爭也如此桑𢎞羊滅族韋堅王鉷楊慎矜王涯之徒皆不免於禍孔循誅死有以也夫楚子玉以兵多敗蒍賈論子玉過三百乘必敗而郤克自謂不如先大夫請八百乘將以用寡為勝抑以將多為賢也如淮隂侯言多多益辦是用衆亦不易古人以兵多敗者不可勝數如王尋苻堅哥舒翰者多矣子玉剛而無禮少與之兵或能戒懼而不敗耶司馬穰苴史記司馬穰苴齊景公時人也其事至偉而左氏不載豫嘗疑之戰國䇿司馬穰苴為政者也閔王殺之大臣不親則其去景公也逺矣太史公取戰國䇿作史記當以戰國䇿為信凡史記所書大事而左氏無有者皆可疑如程嬰杵臼之類是也穰苴之事不可誣抑不在春秋之世當更徐考之商君功罪商君之法使民務本力農勇於公戰怯於私鬬食足兵強以成帝業然其民見刑而不見德知利而不知義卒以此亡故帝秦者商君也亡秦者亦商君也其生有南面之福既足以報其帝秦之功矣而死有車裂之禍蓋僅足以償其亡秦之罰理勢自然無足怪者後之君子有商君之罪而無商君之功饗商君之福而未受其禍者吾為之懼矣元豐三年九月十五日讀戰國䇿書王翦用兵善用兵者破敵國當如小兒毁齒以漸搖撼而後取之雖小痛而能堪也若不以漸一拔而得齒則取齒適足以殺兒王翦以六十萬人取荆此一拔取齒之道也秦亦憊矣二世而敗坐此也夫孟嘗君賓禮狗盜孟嘗君所賓禮者至於狗盜皆以客禮食之其取士亦陋矣然微此二人幾不脫於死當是時雖道德禮義之士無所用之然道德禮義之士當救之於未危亦無用此士也田單火牛田單使人食必祭以致烏鳶又設為神師皆近兒戲無益於事蓋先以疑似置齊人心中則夜見火牛龍文足以駭動取一時之勝此其本意也歷代世變秦以暴虐焚詩書而亡漢興鑒其弊必尚寬德崇經術之士故儒者多雖未知聖人然學宗經師有識義理者衆故王莽之亂多守節之士世祖繼起不得不廢經術褒尚名節之士故東漢之士多名節知名節而不能節之以禮遂至於苦節苦節之士有視死如歸者苦節既極故晉魏之士變而為曠蕩尚浮虛而亡禮法禮法既亡與夷狄同故五胡亂華夷狄之亂巳甚必有英雄出而平之故隋唐混天下隋不可謂一天下第能驅除爾唐有天下如貞觀開元間雖號治平然亦有夷狄之風三綱不正無父子君臣夫婦其原始於太宗也故其後世子孫皆不可使玄宗才使肅宗便叛肅宗才使永王璘便反君不君臣不臣故藩鎮不賓權臣跋扈陵夷有五代之亂漢之治過於唐漢有綱紀因問十世可知遂推此數論秦穆公漢武帝杞子自鄭使告於秦曰鄭人使我掌其北門之管若潛師以來國可得也穆公訪諸蹇叔蹇叔曰勞師以襲逺非所聞也師勞力竭逺主備之勤而無所必有悖心且行千里其誰不知公辭焉召孟明西乞白乙使出師於東門之外蹇叔哭之曰孟子吾見師之出而不見其入也公使謂之曰爾何知中壽爾墓之木拱矣蹇叔之子與師哭而遣之曰晉人禦師必於殽殽有二陵焉其南陵夏后臯之墓也其北陵文王之所避風雨也必死是間吾收爾骨焉漢武帝違安國而用王恢然卒殺恢是有秦穆公違蹇叔之罪而無用孟明之德也漢武帝巫蠱事漢武帝諱巫蠱之事疾如仇讐蓋夫婦君臣父子之間嗷嗷然不聊生矣然史記封禪書云丁夫人雒陽虞初等以方祠詛胸奴大宛已且為巫蠱之魁何以責其下此最可笑云穆生去楚王戊楚元王敬禮穆生每置酒常為穆生設醴及王戊即位常設後忘設焉穆生退曰可以逝矣醴酒不設王之意怠楚人將鉗我於市稱疾卧申公與白生強起之曰獨不念先王之德歟今王一旦失小禮何足至此穆生曰君子見幾而作不俟終日先王所以禮吾三人者為道之存故也今而忽之是亡道也亡道之人胡可與久處豈為區區之禮哉遂謝病去申公白生獨留王戊稍淫暴與吳通謀二人諫不聽衣之赭衣使杵臼舂於市申公愧之歸魯教授不出門已而趙綰王臧言於武帝復以安車蒲輪召卒坐臧事病免穆生逺引於未萌之前而申公眷戀於既悔之後謂禍福皆天不可避就者未必然也可書之座右為士君子終身之戒酈寄幸免班固有言當孝文時天下以酈寄為賣友夫賣友者謂見利而忘義也若寄父為功臣而又執劫摧吕祿以安社稷義存君親可也豫曰當是時寄不得不賣友也罪在於寄以功臣子而與國賊遊且相厚善也石碏之子厚與州吁遊碏禁之不從卒殺之君子無所譏曰大義滅親酈商之賢不及石碏故寄得免於死古之幸人也而固又為洗賣友之穢固之於義陋矣司馬相如創開西南夷路司馬長卿始以汚行不齒於蜀人既而以賦得幸天子未能有所建明立絲毫之善以自贖也而創開西南夷逢君之惡以患苦其父母之邦乃復矜其車服節旄之美使邦君負弩先驅豈詩人致恭桑梓萬石君父子下里門之義乎卓王孫暴富遷虜也故眩而喜耳魯多君子何喜之有司馬相如之諂死而不巳司馬相如歸臨邛令王吉謬為恭敬日往朝相如相如稱病使使謝吉及卓氏為具相如又稱病不往吉自往迎相如觀吉意欲與相如為率錢之會耳而相如遂竊妻以逃大可笑其諭蜀父老云以諷天子以今觀之不獨不能諷幾殆於勸矣諂諛之意死而不巳猶作封禪書相如真可謂小人也哉司馬相如諂事漢武開西南夷之隙及病且死猶草封禪書此可謂死而不巳者耶列仙之儒居山澤間形容甚臞此殆得道人也而相如鄙之作大人賦不過欲以侈言漢武帝意也夫所謂大人者相如孺子何足以知之若賈生鵩賦真知大人者也庚辰八月二十日竇嬰田蚡竇嬰田蚡俱好儒雅推轂趙綰王臧迎魯申公欲設明堂令列侯就國除關以禮為服制欲以興太平會太后不悅綰臧下吏嬰蚡皆罷觀嬰蚡所為其名亦善矣然嬰既沾沾自喜蚡又專為姦利太平豈可以文致力成哉申公始不能用穆生言為楚人所辱亦可以少懲矣晚乃為嬰蚡起又可以一笑鳳凰翔于千仞烏鳶彈射不去誠非虛語也王韓論兵王恢與韓安國論擊胸奴上前至三乃復安國初持不可擊甚堅後乃云意者有他謬巧可以擒之則臣不可知也安國揣知上意所向故自屈其議以信恢爾不然安國所論殆天下所以存亡者豈計於謬巧哉安國少貶其論兵連禍結至漢幾亡可以為後世君子之戒霍光疏昌邑王之罪觀昌邑王與張敞語真風狂不慧者爾烏能為惡廢則巳矣何至誅其從官二百餘人以吾觀之其中從官必有謀光者光知之故立廢賀非專以淫亂故也二百人方誅號呼於市曰當斷不斷反受其亂此其有謀明矣特其事祕密無緣得之著此者亦欲後人微見其意也武王數紂之罪孔子猶且疑之光等疏賀之惡可盡信耶趙充國用心可重始豫觀充國䇿先零胸奴情偽曰何其明也又觀遣雕車行羌中告諭阻辛武賢先攻罕开守便宜不出師畫屯田十二利專務以恩信積穀招降以謂此從容以義用兵與夫逞詐諼疲人於一戰者絶殊最末觀其語將校曰諸君皆便文自營爾非為公家忠計也語中郎曰是何言之不忠也吾固以死爭之語浩星賜曰吾老矣豈嫌伐一時事以欺明主哉老臣不以餘命為陛下言之卒死誰當復言之卒以其意白上云嗚呼使有位君子皆用其心如充國則古今天下豈有不治者哉嘗觀於內公卿士大夫之議曰法當然奈何觀於外將之議曰詔如是不當違詔也凡在我一入一出未有止障也脫有能言一事其言不用則矜語於人曰某事吾嘗言之上不我用也我則無負終不更犯顔色往復論也况於以死守而不欺豈復有哉而以餘命受祿位者併肩立也豈特才不及充國忠又不如可歎也夫充國之用心人臣常道爾然與充國同時在漢廷人未聞皆然而充國獨然故可重也噫今之人不及往時逺矣則充國益可重也豫既觀充國而感今之人又觀宣帝與之上下議而格排羣疑用之遂無勞兵下羌寇不知其能功名亦遇主然也噫宣帝充國可重也况三代君臣間哉下其肯有欺上上其容有間然乎而觀揚子雲贊不及此區區論功爾功古今豈無大者哉不若原其心以勵事君也班固又不出語山東氣俗故著云爾直不疑買金償亡曾子曰自吾母而不用吾情吾安所用其情故不情者君子之所甚惡也雖若孝弟者猶所不與以德報怨行之美者也然孔子不取者以其不情也直不疑買金償亡不辨盜嫂亦士之髙行矣然非人情其所以蒙垢受誣非不求名也求名之至者也太史公窺見之故其贊曰塞侯微巧周仁處諂君子譏之為其近於佞也不疑蒙垢以求名周仁穢迹以求利均以為佞佞之為言知也太史公之論後世莫曉者吾是以疏解之揚雄言許由巢由不受堯禪堯舜不害為至德夷齊不食周粟湯武不害為至仁故孔子不廢是説曰武盡美矣未盡善也揚雄者獨何人乃敢廢此曰允哲堯禪舜之重則不輕於由矣陋哉斯言使夷齊不經孔子雄亦且廢之矣世主誠知揖遜之水尚汙牛腹則干戈之粟豈可溷夷齊之口哉於此知聖人以位為械以天下為牢庶乎其不驕士矣西漢風俗諂媚西漢風俗諂媚不為流俗所移唯汲長儒耳司馬遷至伉簡然作衛青傳不名青但謂之大將軍賈誼何等人也而云愛幸於河南太守吳公此等語甚可鄙而遷不知習俗使然也本朝太宗時士大夫亦有此風至今未衰吾嘗發䇿學士院問兩漢所以亡者難易相反意在此也而答者不能盡吾亦嘗於上前論之兩漢用刑輕重不同漢仍秦法至重髙祖固非虐主然習所見以為常不知其重也至孝文始罷肉刑參夷之誅景帝復孥戮鼂錯武帝罪戾有增無損宣帝治尚嚴因武之舊至王嘉為相始輕減法律遂至東京因而不改班固不記其事事見梁統傳固可謂疏略矣嘉賢相也輕刑又其盛德之事可不記乎統乃言髙惠文景以重法興哀平以輕法衰因上書乞增重律法賴當時不從其議此如人年少時不節酒色而安老後雖節而病見此便謂酒色可以延年可乎統亦東京名臣一出此言遂獲罪於天其子松竦皆死非命冀卒滅族嗚呼悲夫戒哉疏而不漏可不懼乎邳彤漢之元臣王郎反河北獨巨鹿信都為世祖堅守世祖既得二郡議者以謂可因二郡兵自送還長安惟邳彤不可以為若行此䇿豈徒空失河北必更驚動三輔公若無復征戰之意則雖信都之兵猶難會也何者公既西則邯鄲之兵不肯捐父母背城主而千里送公其離散逃亡可必也世祖感其言而止蘇子曰此東漢興亡之決邳彤可謂漢之元臣也景德契丹之役羣臣皆欲避敵江南西蜀萊公不可武臣中獨髙瓊與萊公意同耳公既爭之力上曰卿文臣豈能盡用兵之利萊公曰請召髙瓊瓊至乃言避敵為便公大驚以瓊為悔也巳而徐言避敵固為安全但恐扈駕之士中路逃亡無與俱西南者耳上乃大驚始決北征瓊之言大略似邳彤皆一代之雄傑也朱暉非張林均輸東漢肅宗時穀貴經用不足尚書張林請以布帛為租官自煮鹽且行均輸獨朱暉文季以為不可事既寢陳事者復以為可行帝頗然之暉復獨奏曰王制天子不言有無諸侯不言多寡食祿之家不與百姓爭利今均輸之法與賈販無異鹽利歸官則下人窮怨布帛為租則吏多姦盜皆非明主所當行帝方以林言為然發怒切責諸尚書暉等繫獄三日詔出之曰國家樂聞駮議黃髮無愆詔書過也何故自繫暉等因稱病篤尚書令以下惶怖謂暉曰今林得譴奈何稱病其禍不細暉曰行年八十蒙恩得在機密當以死報若心知不可而順指雷同負臣子之義今耳目無所聞見伏待死命遂閉口不復言諸尚書不知所為乃共劾奏暉帝意解寢其事後數日詔使直事郎問暉起居狀太醫視疾太官賜食暉乃起元祐七年七月二十一日偶讀後漢書朱文季傳感歎不巳肅宗號稱長者詔書既巳引罪而謝文季矣諸尚書何怖之甚也文季於此時強立不足多貴而諸尚書為可笑也云其禍不細不知以何等為禍蓋以帝不悅後不甚進用為莫大之禍也悲夫曹袁興亡魏武帝既勝烏桓曰吾所以勝者幸也前諫我者萬全之計也乃賞諫者曰後勿難言袁紹既敗於官渡曰諸人聞吾敗必相哀惟田别駕不然幸其言之中也乃殺豐為明主謀而不忠不惟無罪乃有賞為庸主謀而忠賞固不可得而禍隨之今吾知孟德本初所以興亡者周瑜雅量曹公聞周瑜年少有美才謂可遊説動也乃密下楊州遣九江蔣幹往見瑜幹有儀容以才辨見稱獨步江淮之間乃布衣褐巾自託私行詣瑜瑜出迎之立謂幹曰子翼良苦逺涉江湖為曹公作説客也幹曰吾與足下州里中間隔别遙聞芳烈故來敘濶並觀雅規而云説客無乃逆詐矣乎瑜曰吾雖不及夔曠聞絃賞音足知雅曲後三日瑜請幹同觀營中行視倉庫軍資器仗訖還飲燕示之侍者服飾珍玩之物因謂幹曰丈夫處世遇知已之主外託君臣之義內結骨肉之恩言行計從禍福共之假使蘇張更生酈叟復出猶將撫其背而折其辭豈足下小生所能移乎幹笑而不言遂稱瑜雅量髙致非言辭所間中州之士以此多之蘇子曰曹孟德所用皆為人役者也以子房待文若然終不免殺之豈能用公瑾之流度外之士哉管幼安賢於荀孔曹操既得志士人靡然歸之荀文若盛名猶為之經營謀慮一旦小異便為謀殺程昱郭嘉之流不足數也孔文舉竒逸博聞志大而才疏每所論建輒中操意况肯為用然終亦不免桓溫謂孟嘉曰人不可以無勢我能駕馭卿夫溫之才百倍於嘉所以云爾者自知其陰賊險狠不為髙人勝士所比數耳管幼安懷寶遁世就間海表其視曹操父子真穿窬斗筲而巳終身不屈即不得而殺豫以謂賢於文若文舉逺矣唐彬唐彬與王濬伐吳為先驅所至皆下度孫皓必降未至建鄴二百里許稱疾不行巳而先到者爭財後到者爭功當時有識者莫不髙彬此舉豫讀晉書至此未嘗不廢卷太息也然本傳云武帝欲以彬及楊宗為監軍以問文立立云彬多財欲而宗嗜酒帝曰財欲可足酒不可改遂用彬此言進退無據豈有人如唐彬而貪財者使誠貪財乃逺不如嗜酒何可用也文立者獨何人斯安知非蔽賢者耶阮籍世之所謂君子者惟法是修惟禮是克手執圭璧足履繩墨行欲為目前檢言欲為無窮則少稱鄉黨長聞鄰國上欲圖三公下不失九州牧獨不見夫羣虱之處褌中乎逃乎深縫匿乎敗絮自以為吉宅也行不敢離縫際動不敢出褌襠自以為得繩墨也然炎丘火流焦邑滅都羣虱處於褌中不能出也君子之處域內何異夫虱之處褌中乎此阮籍之胸懷本趣也籍未嘗臧否人物口不及世事然禮法之士疾之如仇讎獨賴司馬景王保持之爾其去死無幾以此論之亦虱之出入往來於衣褌中間者也安能笑褌中之藏乎吾故書之為將來君子一笑戊寅冬至日孟嘉與謝安石相若晉士浮虛無實用然其間亦有不然者如孟嘉平生無一事然桓溫謂嘉曰人不可以無勢我乃能駕馭卿桓溫平生輕殷浩豈妄許人者哉乃知孟嘉若遇當作謝安謝安不遇不過如孟嘉也庾亮不從孔坦陶回言庾亮召蘇峻孔坦與陶回共説王導及峻未至宜急斷阜陵之界守江西當利諸口彼少我衆一戰決矣若峻未來可往逼其城今不先往峻必先入有奪人之心導然之亮以為峻若徑來是襲朝廷虛也不從及峻將至回又説亮峻知石頭有重戍不敢直下必向小丹陽南道步來若以伏兵邀之可一戰而擒亮又不從事見二人傳峻果由小丹陽經秣陵迷失道逢郡人執以為向導夜行無部分亮聞之深悔吾以為召峻固失計然若從二人言猶不至覆國幾於滅亡也朝錯削七國大類此亞夫猶速馳行入梁楚之郊故漢不敗吾嘗謂朝錯能容忍七國待事發而發固上䇿若不能忍決欲發者自可召王濞入朝仍發大兵隨之吳若不朝便可進討則疾雷不及掩耳吳破則諸侯服矣又當獨罪狀吳而不及餘國如李文饒輔車之詔或分遣使者發其兵諸國雖疑亦不能一旦合從俱反也錯知吳必反不先未削為反備既備反而後調兵食此真兒戲也又一旦而削七國以合諸侯之交此妄庸人也郤方回郤嘉賓父子事郤嘉賓既死留其所與桓溫密謀之書一篋屬其門生曰若吾家君眠食大減即出此書方回見之曰是兒死巳晚矣乃不復念豫讀而悲之曰士之所甚好者名也而愛莫加于父子今嘉賓以父之故而暴其惡名方回以君之故而不念其子嘉賓可謂孝子方回可謂忠臣也悲夫或曰嘉賓與桓溫謀叛而子以孝子稱之可乎曰采葑采菲無以下體嘉賓之不忠不待誅絶而明者其孝可廢乎王述之子坦之欲以女與桓溫述怒排坦之曰汝真癡也乃欲以女與兵坦之是以不與桓溫之禍使郤氏父子能如此吾無間然者矣晉宋之君與臣下爭善人君不得與臣下爭善同列爭善猶以為妬可以君父而妬臣子乎晉宋間人主率與臣下爭作詩寫字故鮑昭多纍句王僧虔用拙筆以避禍悲夫一至於此哉漢文帝言久不見賈生自以為過之今乃不及非獨無損於文帝乃所以為文帝之盛德也而魏明乃不能堪遂作漢文勝賈生之論此非獨求勝其臣乃與異代之臣爭善豈惟無人君之度正如妬婦不獨禁其夫乃妬人之妾也齊髙帝欲等金土之價齊髙帝云吾當使金土同價意則善矣然物豈有此理者哉孟子曰物之不齊物之情也巨屨小屨同價人豈為之哉而孟子亦自忘其言為菽粟如水火之論金之不可使賤如土猶土之不可使貴如金也堯之民比屋可封桀之民比屋可誅信此説則堯時諸侯滿天下桀時大辟遍四海也王景文宋明帝詔答王景文其略曰有心於避禍不若無心於任運千仞之木既摧於斧斤一寸之草亦悴於踐踏晉將畢萬七戰皆獲死于牖下蜀將費褘從容坐談斃於刺客故甘心於履危未必逢禍從意於處安未必全福此言近於達者然明帝竟殺景文哀哉哀哉景文之死也詔言朕不謂卿有罪然吾不能獨死請子先之詔至景文正與客棊竟斂子納奩中徐謂客曰有詔見賜以死酒至未飲門生焦度在側傾酒抵地曰丈夫安能坐受死州中文武可以一奮景文曰知卿至心若見念者為我百口計乃謂客曰此酒不可相勸乃仰飲之蘇子曰死生亦大矣而景文安之豈貪權竊國者乎明帝可謂不知人者矣唐太宗借隋吏以殺兄弟唐髙祖起兵汾晉間時子建成元吉楚哀王智雲皆留河東護家髙祖起兵乃密召之隋購之急建成元吉能間道赴太原智雲幼不能逃為吏所誅髙祖以父子之故不能少緩義師數日以須建成等至乎以此知為秦王所逼髙祖逼於裴寂亂宫之事不暇復為三子性命計矣太宗本謀於是時借隋吏以殺兄弟其意甚明新舊史皆曲為太宗潤飾殺兄弟事然難以欺後世矣建成元吉之惡亦孔子所謂下愚之歸也歟褚遂良以飛雉入宫為祥唐太宗時飛雉數集宫中上以問褚遂良良曰昔秦文公時童子化為雉雌鳴陳倉雄鳴南陽童子曰得雄者王得雌者霸文公得其雌遂雄諸侯光武得其雄起南陽有四海陛下本封秦故雌雄並見以告明德上悅曰人不可以無學遂良所謂多識君子哉豫以謂秦雉陳寶也豈常雉乎今見雉即謂之寶猶得白魚便自比武王此諂佞之甚愚瞽其君者而太宗喜之史不譏焉野鳥無故數入宫中此正災異使魏徵在必以髙宗鼎耳之祥諌也遂良非不知此捨鼎耳而取陳寶非忠臣也李靖李績為唐腹心之病昔袁盎論絳侯功臣非社稷臣此固有為而言也然功臣社稷之辨不可不察也漢之稱社稷臣者如周勃汲黯蕭望之之流三人者非有長才也勃以重厚安劉氏黯以忠義弭淮南之謀望之確然不奪於恭顯孔子所謂大臣以道事君者耶僕嘗謂社稷之臣如腹心功臣如手足人有斷一指與一足未及於死也腹心之病則為膏肓不可為也李靖李績可謂功臣終始為唐之元勳也然其所為止衛霍韓彭之流爾疆埸之事夷狄內侮能以少擊衆使敵人望而畏之此固任之有餘矣若社稷之寄存亡之幾此兩人者蓋懵不知焉太宗欲伐髙麗靖已老矣而自請將兵以堅太宗黷武之志幾成不戢自焚之禍髙宗立武后績以陛下家事無問外人武氏之禍戮及襁褓唐室不絶如線則二人者為腹心之病大矣張釋之戒嗇夫之辨使文帝終身為長者魏元成折封倫之論使太宗不失行仁義孔子所謂有一言而可以興邦一言而可以喪邦者不其然乎白樂天不欲伐淮蔡吳元濟以蔡叛犯許汝以驚東都此豈可不討者也當時議者欲置之固為非䇿然不得武裴二傑士事亦未易辦也白樂天豈庸人哉然其議論亦似欲置之者其詩有海圖屏風者可見其意且注云時方討淮蔡叛吾以是知仁人君子之於兵蓋不忍輕用如此淮蔡且欲以德懷况欲弊所恃以勤無用乎悲夫此未易與俗士談也韓愈優於揚雄韓愈亦近世豪傑之士如原道中言語雖有疵病然自孟子之後能將許大見識尋求古人亦自難得觀其斷曰孟子醇乎醇荀揚擇焉而不精語焉而不詳若不是他有見識豈千餘年後便斷得如此分明如揚雄謂老子之言道德則有取焉爾至於捶提仁義絶滅禮樂為無取若以老子剖斗折衡而民不爭聖人不起為救時反本之言為無取尚可恕如老子言失道而後德失德而後仁失仁而後義失義而後禮則不識道巳不成言語却言其言道德則有取揚子亦自不見此其與韓愈相去逺矣劉禹錫文過不悛劉禹錫既敗為書自解言王叔文實工言治道能以口辨移人既得用所施為人不以為當太上久疾宰相及用事者不得對宫掖事祕建桓立順功歸貴臣由是及貶後漢宦者傳論云孫程定立順之功曹騰參建桓之䇿騰與梁冀比捨清河而立蠡吾此漢之所以亡也與廣陵王監國事豈可同日而語哉禹錫乃敢以為比如小人為姦雖巳敗猶不悛也其可覆置之要地乎因讀禹錫傳有所感書此評文選四首文選去取失當舟中讀文選恨其編次無法去取失當齊梁文章衰陋而蕭統尤為卑弱文選引斯可見矣如李陵書蘇武五言皆偽而不能辨今觀淵明集可喜者甚多而獨取數首以知其餘人忽遺者多矣淵明作間情賦所謂國風好色而不淫正使不及周南與屈宋所陳何異而統大譏之此乃小兒強作解事者劉子玄辨文選劉子玄辨文選所載李陵與蘇武書非西漢文蓋齊梁間文士擬作者也吾因悟陵與蘇武贈答五言亦後人所擬今日讀列女傳蔡琰二詩其詞明白感慨頗類世所傳木蘭花詩東京無此格也建安七子猶含養圭角不盡發見况伯喈女乎又琰之流離為在父沒之後董卓既誅伯喈乃遇禍今此詩乃云為董卓所驅虜入胡尤知其非真也蓋擬作者疏略而范曄荒淺遂載之本傳可以一笑也李善注文選李善注文選本末詳備極可喜所謂五臣者真俚儒之荒陋者也而世以為勝善亦謬矣謝瞻張子房詩云苛慝暴三殤此禮所謂上中下殤言暴秦無道戮及孥稚也而乃引苛政猛於暴虎吾父吾子吾夫皆死於是謂夫與父為殤此豈非俚儒之荒陋者乎諸如此類甚多不足言故不言五臣注文選五臣注文選蓋荒陋愚儒也今日偶讀嵇中散琴賦云間遼故音痺絃長故微鳴所謂痺者猶今俗云㪇聲也㪇音鮮出羯鼓録兩絃之間逺則有㪇故曰間遼微鳴云者今之所謂泛聲也絃虛而不接乃可按故云絃長而微鳴也五臣皆不曉妄注又云廣陵止息東武大山飛龍鹿鳴鵾雞遊絃中散作廣陵散一名止息此特一曲爾而注云八曲其他淺妄可笑者極多以其不足道故略之聊舉此使後之學者勿憑此愚儒也五臣既陋甚至於蕭統亦其流爾宋玉髙唐神女賦自王曰唯唯以前皆賦也而統謂之序大可笑也相如賦首有子虛烏有亡是三人論難豈亦序耶其餘謬陋不一亦聊舉其一爾東坡全集卷九十二
