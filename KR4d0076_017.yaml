body:
  text: 東坡全集巻十七宋蘓軾撰詩八十八首贈李道士并叙駕部員外郎李君宗固景祐中良吏也守漢州有道士尹可元精練善畫以遺火得罪當死君緩其獄㑹赦獲免時可元年八十一自誓且死必為李氏子以報可元既死二十餘年而君子世昌之婦夢可元入其室生子曰得柔小名蜀孫㓜而善畫既長讀荘老喜之遂為道士賜號妙應事母以孝謹聞其寫真蓋妙絶一時云世人只數曹将軍誰知虎頭非癡人腰間大羽何足道頰上三毛自有神平生狎侮諸公子戲著㓜輿巖石裏故教世世作黄冠布襪青鞋弄雲水千年鼻祖守闗門一念還為李耳孫香火舊縁何日盡丹青餘習至今存五十之年初過二衰顔記我今如此他時要指集賢人知是香山老居士樂天為翰林學士奉詔寫真集賢院次韻張舜民自御史出倅虢州留别玉堂給札氣如雲初喜湘纍復佩銀樊口凄凉已陳迹昔與張同逰武昌樊口來詩中及之班心突兀見長身臺史謂御史立處為班心江湖前日真成夢鄠杜他年恐卜隣此去若容陪坐嘯故應客主盡詩人次韻米黻二王書跋尾二首三館曝書防蠧毁得見來禽與青李秋虵春蚓久相雜野鶩家雞定誰美玉函金籥天上來紫衣敕使親臨啟紛綸過眼未易識磊落挂壁空雲委歸來妙意獨追求坐想蓬山二十秋怪君何處得此本上有桓𤣥寒具油巧偷豪奪古來有一笑誰似癡虎頭君不見長安永寧里王家破垣誰復修元章作書日千紙平生自苦誰與美畫地為餅未必似要令癡兒出饞水錦囊玉軸來無趾粲然奪真疑聖智忍饑看書淚如洗至今魯公餘乞米次韻宋肇惠澄心紙二首詩老囊空一不留百畨曽作百金收永叔以澄心百幅遺聖俞聖俞有詩知君也厭雕肝腎分我江南數斛愁君家家學陋相如宜與諸儒論石渠古紙無多更分我自應給札奏新書郭熈秋山平逺二首目盡孤鴻落照邊遥知風雨不同川此間有句無人見送與襄陽孟浩然木落騷人已怨秋不堪平逺發詩愁要看萬壑争流處他日終煩顧虎頭送歐陽辯監澶州酒汗血駕皷車何從致千里紛紛糟麴間欲試賢公子君家江南英濯足滄浪水卻渡舊黄河漲沙埋馬耳由來付造物倚伏何窮已當念楚子文三仕無愠喜九月十五日邇英講論語終篇賜執政講讀史官燕于東宫又遣中使就賜御書詩各一首臣軾得紫薇花絶句其詞云絲綸閣下文書静鐘皷樓中刻漏長獨坐黄昏誰是伴紫薇花對紫薇郎翌日各以表謝又進詩一篇臣軾詩云繡裳畫衮雲垂地不作成王翦桐戲日髙黄繖下西清風動槐龍舞交翠邇英閣前有雙槐樛然屬地如龍形壁中蠧簡今千年漆書蝌蚪光射天諸儒不復憂吻燥東宫賜酒如流泉酒酣復拜千金賜一紙驚鸞回鳯字蒼顔白髪便生光袖有驪珠三十四臣所賜詩并題目及臣姓名凢三十四字歸來車馬已喧闐争看銀鉤墨色鮮人間一日傳萬口喜見雲章第一篇上前此未嘗以御書賜羣臣玉堂畫掩文書静鈴索不摇鐘漏永莫言㺯筆數行書湏信時平由主聖犬羊散盡沙漠空捷烽夜到甘泉宫似聞指麾築上郡已覺談笑無西戎時熈河新獲鬼章是日涇原復奏夏賊數十萬人皆遁去文思天子師文母終閉玉關辭馬武小臣願對紫薇花試草尺書招賛普謹按唐制翰林學士帶知制誥許綴中書舎人班今臣以知制誥待罪禁林故得以紫薇為故事和王晉卿并叙駙馬都尉王詵晉卿功臣全彬之後也元豐二年予得罪貶黄岡而晉卿亦坐累逺讁不相聞者七年予既召用晉卿亦還朝相見殿門外感歎之餘作詩相屬託物悲慨阨窮而不怨㤗而不驕憐其貴公子有志如此故次其韻先生飲東坡獨舞無所屬當時挹明月對影三人足醉眠草棘間蟲虺莫予毒醒來送歸鴈一寄千里目悵焉懐公子旅食久不玉欲書加餐字逺託西飛鵠謂言相濡沫未足救溝瀆吾生如寄耳何者為禍福不如兩相忘昨夢那可逐上書得自便歸老湖山曲躬耕二頃田自種十年木豈知垂老眼却對金蓮燭公子亦生還仍分刺史竹賢愚有定分尊爼守尸祝文章何足云執技等醫卜朝廷方西顧羌虜驕未伏遥知重陽酒白羽落黄菊羡君真将家浮面氣可掬袁天罡語竇軌君語則人赤氣浮靣為将勿多殺何當請長纓一戰河湟復謝王澤州寄長松兼簡張天覺二首莫道長松浪得名能教覆額兩眉青便将徑寸同千尺知有竒功似茯苓憑君説與埋輪使速寄長松作解嘲送張天覺詩有埋輪及河東慳之語無復青黏和漆葉枉将鍾乳敵仙茅次韻劉貢父所和韓康公憶持國二首夢覺真同鹿覆蕉相君脱屣自參寥顔紅底事髪先白室邇何妨人自遥狂似次公應未怪醉推東閣不湏招援毫欲作衣冠表盛事終當繼八蕭唐蕭氏自瑀及遘八宰相閉户端居念獨深小軒朱檻憶同臨燎須誰識英公意英公為其姊作粥燎須曰吾與姊皆老矣能幾進粥黄髪聊知子建心子建與楚王彪別詩云王其愛玉體共享黄髪期己託西風傳絶唱且邀明月伴孤斟他時内集應呼我下客先判醉墮簮次韻劉貢父叔姪扈駕玉堂孤坐不勝清長羡枚鄒接長卿只許隔墻聞置酒時因議事得聮名機雲似我多遺俗廣受如君不治生共託屬車塵土後鈞天一餉夢中榮次韻韓康公置酒見留庭下黄花一醉同重來雪巘己穹窿不應屢費譏安石但使毋多酌次公鍾乳金釵人似玉鵾絃鐡撥坐生風少卿尚有車茵在頗覺寛容勝弱翁次韻王都尉偶得耳疾君知六鑿皆為贅我有一言能决疣病客巧聞牀下蟻癡人强覰棘端猴聰明不在根塵裏藥餌空為婢僕憂但試周郎看聾否曲音小誤已回頭送喬仝寄賀君六首并叙舊聞靖長官賀水部皆唐末五代人得道不死章聖皇帝東封有謁於道左者其謁云晉水部員外郎賀亢再拜而去上不知也已而閲謁見之大驚物色求之不可得天聖初又使其弟子喻澄者詣闕進佛道像直數千萬張公安道與澄逰具得其事又有喬仝者少得大風疾幾死賀使學道今年八十益壮盛人無復見賀者而仝數見之元祐二年十二月仝來京師十許日予留之不可曰賀以上元期我於䝉山又曰吾師嘗遊宻州識君於常山道上意若喜君者作是詩以送之且作五絶句以寄賀君年二十美且都初得惡疾墮眉鬚紅顔白髪驚妻孥覽鏡自嫌欲棄軀結茅窮山啖松腴路逢逃秦博士盧方瞳照野清而臞再拜未起煩一呼覺知此身了非吾烱然蓮花出泥塗隨師東逰渡濰邞濰邞密州二水名山頭見我兩輪朱豈知仙人混屠沽爾來八十胸垂胡上山如飛嗔人扶東歸有約不敢渝新年當參老仙儒秋風西來下雙鳬得棗如𤓰分我無生長兵間早脱身晚為元祐太平人不驚渤澥桑田變來看龜䝉漏澤春曽謁東封玊輅塵幅巾短褐亦逡巡行宫夜奏空名姓悵望雲霞縹緲人垂老區區豈為身㣲言一發重千鈞始知不見髙皇帝正似商山四老人舊聞父老晉郎官已作飛騰變化看聞道東䝉有居處願供薪水看燒丹千古風流賀季真最憐嗜酒謫仙人狂吟醉舞知無益粟飯藜羮問養神送家安國教授歸成都别君二十載坐失兩鬢青吾道雖艱難斯文終典刑屢作退飛鷁羞看乾死螢一落戎馬間五見霜葉零夜談空説劒春夢猶横經新科復舊貫童子方乞靈湏煩凌雲手去作入蜀星蒼苔髙朕室古栢文翁庭初聞編簡香始覺鋒鏑腥岷峨有雛鳯梧竹養脩翎嗚呼應嶰律飛舞集虞廷吾儕便歸老亦足慰餘齡和子由除夜元日省宿致齋三首江淮流落豈闗天禁省相望亦偶然等是新年未相見此身應坐不歸田白髪蒼顔五十三家人强遣試春衫朝回兩袖天香滿頭上銀幡笑阿咸當年踏月走東風坐看春闈鎻醉翁白髪門生幾人在却将新句調兒童次韻荅張天覺二首車輕馬穏轡銜堅但有蚊蟲喜撲縁截斷口前君莫怪人間差樂勝巢仙馭風騎氣我何勞且要長松作土毛亦如訶佛丹霞老却向清涼禮白毫次韻黄魯直畫馬試院中作少年鞍馬勤逺行卧聞齕草風雨聲見此忽思短䇿横十年髀肉磨欲透那更陪君作詩瘦不如芉魁歸飯豆門前欲嘶御史驄詔恩三日休老翁羡君懐中雙橘紅黄有老母余與李廌方叔相知久矣領貢舉事而李不得第愧甚作詩送之與君相從非一日筆勢翩翩疑可識平時謾說古戰塲過眼終迷日五色我慙不出君大笑行止皆天子何責青袍白紵五千人知子無怨亦無徳買羊沽酒謝玉川為我醉倒春風前歸家但草凌雲賦我相夫子非癯仙和王晉卿送梅花次韻東坡先生未歸時自種來禽與青李五年不踏江頭路夢逐東風泛蘋芷江梅山杏為誰容獨笑依依臨野水此間風物君未識花浪翻天雪相激明年我復在江湖知君對花三嘆息和宋肇逰西池次韻漢皇慈儉不開邊尚教千艘下瀬船貪看艨艟飛鬬艦不知贔屓舞鈞天故山西望三千里徃事回思二十年自笑區區足官府不如公子散神仙書艾宣畫四首竹鶴此君何處不相宜况有能言老令威誰識長身古君子猶将緇布縁深衣黄精鹿太華西南第幾峯落花流水自重重幽人只採黄精去不見春山鹿養茸杏花白鷴天工翦刻為誰妍抱蕋㳺蜂自作團把酒惜春都是夢不如閒客此閒看蓮龜半脱蓮房露壓欹緑荷深處有㳺龜只應翡翠蘭苕上獨見𤣥夫曝日時僕領貢舉未出錢穆父雪中作詩見及三月二十日同逰金明池始見其詩次韻為荅雪知我出已全消花待君來未敢飄行避門生時小飲忽逄騎吏有嘉招魚龍絶技來千里斑白遺民數四朝知有黄公酒壚在蒼顔華髪自相遥次韻子由五月一日同轉對跪奉新書笏在腰談王正欲伴耕樵晉陽豈為一門事髙祖謂温大雅兄弟云我起義晉陽止為卿一門耳宣政聊同五月朝正元中詔自今後五月一日御宣政殿與文武百僚相見憂患半生聨出處歸休上䇿早招要後生可畏吾衰矣刀筆從來錯料堯韓康公挽詞三首故國非喬木興王有世臣嗟予後死者猶及老成人徳業經文武風流表縉紳空餘行樂地處處泣遺民再世忠清徳三朝翼賛勲功成不歸國就訪敢忘君舊學嚴詩律餘威靖塞氛何當繼韓奕故吏總能文西第開東閤初筵㸃後塵笙歌邀白髪燈火樂青春扶路三更罷回頭一夢新賦詩猶墨濕把巻獨沾巾栢石圖詩并叙陳公弼家藏栢石圖其子慥季常傳寳之東坡居士作詩以為之銘栢生兩石間天命本如此雖云生之艱與石相終始韓子俯仰人但愛平地美土膏雜糞壤成壊幾何耳君㸔化槎牙豈有可移理蒼龍轉玉骨黒虎抱金柅畫師亦可人使我毛髪起當年落筆意正欲譏韓子慶源宣義王丈以累舉得官為洪雅主簿雅州戸掾遇吏民如家人人安樂之既謝事居眉之青神瑞草橋放懐自得有書來求紅帶既以遺之且作詩為戲請黄魯直學士秦少㳺賢良各為賦一首為老人光華青衫半作霜葉枯遇民如兒吏如奴吏民莫作官長看我是識字耕田夫妻啼兒號刺史怒時有野人來挽鬚拂衣自注下下考芋魁飯豆吾豈無歸來瑞草橋邊路獨㳺還佩平生壺慈母巖前自喚渡布衣江上人争扶今年蠶市數州集中有遺民懐袴襦邑中之黔相指似白髯紅帶老不癯我欲西歸卜隣舍隔墻拊掌容歌呼不學山王乘駟馬囘頭空指黄公壚次許冲元韻送成都髙士敦鈐轄栘中老監本虛名懶作燕山萬里行余與髙君奉使契丹辭免不行坐看飛鴻迎使節歸來駿馬換傾城髙才本不縁勲閥餘力還思治蜀兵西望雪山烽火盡不妨樽酒寄平生次前韻送程六表弟君家兄弟真連璧門十朱輪家萬石竹使猶分刺史符尚方行賜尚書舄前年持節發倉廩到處賣刀收蠒栗歸來閉口不論功却走渡江誰復惜君才不用如澗松我老得全猶社櫟青衫莫厭百僚底白首上有千薪積憶昔江湖一釣舟無數雲山供㸃筆未應便障西風扇只恐先移北山檄憑君寄謝江南叟念我空見長安日浮江泝蜀有成言江水在此吾不食和王晉卿題李伯時畫馬督郵有良馬不為君所竒顧收紙上影駿骨何由歸一朝見縈䇿蟻封驚肉飛豈惟馬不遇人已半生癡送錢穆父出守越州絶句二首簿書常苦百憂集樽酒今應一笑開京兆從教思廣漢㑹稽聊喜得方回若耶溪水雲門寺賀監荷花空自開我恨今猶在泥滓勸君莫棹酒船回戲書李伯時畫御馬好頭赤山西戰馬饑無肉夜嚼長稭如嚼竹蹄間三丈是徐行不信天山有坑谷豈如廐馬好頭赤立仗歸來卧斜日莫教優孟卜塟地厚衣薪槱入銅歴送程七表弟知泗州江湖不在眼塵土坐滿顔繫舟清洛尾初見淮南山淮山相媚好曉鏡開煙鬟持此娛使君一笑簿領間使君如天馬朝燕暮荆蠻時無王良手空老十二閑聊當出毫末化服狡與頑勿謂無人知古佛臨濤灣赤子視萬類流萍閲人寰但使此可人餘事真茆菅送曹輔赴閩漕曹子本儒俠筆勢翻濤瀾徃來戎馬間邊風裂儒冠詩成横槊裏楯墨何曽乾一旦事逺逰紅塵隔巖灘平生羊炙口並海搜鹹酸一從荔枝飲豈念苜蓿槃我亦江海人市朝非所安常恐青霞志坐隨白髪闌淵明賦歸去談笑便解官今我何為者索身良獨難憑君問清淮秋水今幾竿我舟何時發霜露日已寒次韻王郎子立風雨有感百年一俯仰寒暑相主客稍増裘褐氣已覺團扇厄不湏計榮辱此䘮彼有獲我琴終不敗無攫故無醳後生不自牧呻吟空挾䇿揠苖不待長賣菜苦求益此郎獨静退門外無行迹但恐陶淵明毎為饑所迫凄風㺯衣結小雪穿門席願君付一笑造物亦戲劇朝來賦雲夢筆落風雨疾為君裁春衫髙㑹開桂籍次韻黄魯直嘲小徳小徳魯直子其母㣲故其詩云解著潜夫論不妨無外家進饌客爭起小兒那可涯莫欺東方星三五自横斜名駒已汗血老蚌空泥沙但使伯仁長還興絡秀家書林次中所得李伯時歸去來陽闗二圖後二首不見何戡唱渭城舊人空數米嘉榮龍眠獨識慇懃處畫出陽闗意外聲兩本新圖寳墨香樽前獨唱小秦王為君翻作歸來引不學陽闗空斷腸送蹇道士歸廬山物之有知蓋恃息孰居無事使出入心無天逰室不空六鑿相攘婦爭席法師逃人入廬山山中無人自徃還徃者一空還者失此身正在無還間緜緜不絶㣲風裏内外丹成一彈指人間俯仰三千秋騎鶴歸來與子遊卧病逾月請郡不許復直玉堂十一月一日鏁院是日苦寒詔賜官燭法酒書呈同院㣲霰疎疎㸃玉堂詞頭夜下攬衣忙分光御燭星辰爛拜賜宮壺雨露香醉眼有花書字大老人無睡漏聲長何時却逐桑榆暖社酒寒燈樂未央送周朝議守漢州茶為西南病岷俗記二李杞與稷也何人折其鋒矯矯六君子思道與姪正孺張永徽呉醇翁吕元鈞宋文輔也君家尤出力流落初坐此謂當收桑榆華髮看劒履胡為犯風雪嵗晚行未已念歸誠得計顧自為謀耳吾聞江漢間瘡痏有未起莫輕龔遂老君王付尺箠召還當有詔挽袖謝隣里猶堪作水衡供帳園林美木山并叙吾先君子嘗蓄木山三峯且為之記與詩詩人梅二丈聖俞見而賦之今三十年矣而猶子千乘又得五峯益竒因次聖俞韻使并刻之其側聖俞詩空山枯楠大蔽牛霹靂夜落魚鳬洲魚鳬水射幾千秋蠧肌爛髓沙蕩流惟存堅骨蛟龍鎪形侔三山中雄酋左右兩峯相挾翼尊奉君長無慢尤蘇夫子見之驚且喜買於谿叟憑貂裘因嗟大不為梁棟又歎殘不為薪槱雨侵蘚澀得石瘦宜與夫子歸隠丘次韻木生不願回萬牛願終天年仆沙洲時來幸逄河伯秋掀然見怪推不流蓬婆雪領巧雕鎪蟄蟲行蟻為豪酋阿咸大膽忽持去河伯好事不汝尤城中古沼浸坤軸一林瘦竹吾菟裘二頃良田不難買三年榿木行可槱㑹将白髪對蒼巘魯人不厭東家丘送千乘千能兩姪還鄉治生不求富讀書不求官譬如飲不醉陶然有餘歡君看龎徳公白首終泥蟠豈無子孫念顧獨遺以安鹿門上冡回牀下拜龍鸞躬耕竟不起耆舊節獨完念汝少多難氷雪落綺紈五子如一人奉養真色難烹雞獨餽母自饗苜蓿槃口腹恐累人寧我食無肝西來四千里敝袍不言寒秀眉似我兄亦復心閒寛忽然捨我去嵗晚留餘酸我豈軒冕人青雲意先闌汝歸蒔松菊環以青琅玕榿隂三年成可以挂我冠清江入城郭小圃生㣲瀾相從結茆舍曝背談金鑾送周正孺知東川得郡書生榮還家昔人重而况東西川千騎許上冡里門下車入父老自驚聳端如何武賢不事長卿寵清時養材傑杞梓方培擁未應遺合抱取用及把拱如君尚出麾顧我宜耕壟告歸謝先手求去悔不勇豈云慕廉退實自知衰冗為君掃棠隂畫像或相踵蜀中太守無不畫像者題李伯時畫趙景仁琴鶴圖二首清獻先生無一錢故應琴鶴是家傳誰知黙皷無絃曲時向珠宫舞幻仙醜石寒松未易親聊将短曲調長人乘軒故自非明眼終日僛僛舞㸑薪次前韻再送周正孺東川得望郎坐與西爭重髙風傾石室舊學鄙文冡蜀人安使君所至野不聳竹馬迎細侯大錢送劉寵遥知句谿路老穉相扶擁看畫古叢祠百怪朝幽拱牛頭與兠率雲木蔚堆壠醉鄉追舊㳺筆陣賈餘勇聊将詩酒樂一掃簿書冗西風吹好句珠玉本無踵劉蜕文冡銘在梓州書王定國所藏煙江疊嶂圖王晉卿畫江上愁心千疊山浮空積翠如雲煙山耶雲耶逺莫知煙空雲散山依然但見兩崖蒼蒼暗絶谷中有百道飛來泉縈林絡石隠復見下赴谷口為奔川川平山開林麓斷小橋野店依山前行人稍度喬木外漁舟一葉江吞天使君何從得此本㸃綴毫末分清妍不知人間何處有此境徑欲徃置二頃田君不見武昌樊口幽絶處東坡先生留五年春風摇江天漠漠暮雲巻雨山姢姢丹楓翻鴉伴水宿長松落雪驚醉眠桃花流水在人世武陵豈必皆神仙江上清空我塵土雖有去路尋無縁還君此畫三歎息山中故人應有招我歸來篇次韻王定國㑹飲清虛堂何遜揚州又幾年官梅詩興故依然何人可復間季孟與子不妨中聖賢卜築君方淮上郡歸心我已劒南川此身正似蠶将老更盡春光一再眠興龍節侍宴前一日㣲雪與子由同訪王定國小飲清虛堂定國出數詩皆佳而五言尤竒子由又言昔與孫巨源同過定國感念存沒悲歎久之夜歸稍醒各賦一篇明日朝中以示定國也天風淅淅飛玉沙詔恩裏沐休早衙遥知清虛堂裏雪正似薝蔔林中花出門自笑無所詣呼酒持勸惟君家踏冰凌兢戰疲馬扣門剥啄驚寒鴉羡君五字入詩律欲與六出爭天葩頭風已倩檄手愈背癢恰得仙爪爬銀缾瀉油浮蟻酒紫盌鋪粟盤龍茶幅巾起作鸜鵒舞疊鼓誰摻漁陽撾九衢燈火雜夢寐十年聚散空咨嗟明朝握手殿門外共看銀闕暾晨霞王晉卿所藏著色山二首縹緲營丘水墨仙浮空出沒有無間爾來一變風流盡誰見将軍著色山犖确何人似退之意行無路欲從誰宿雲解駮晨光漏獨見山紅澗碧時次韻黄魯直效進士作嵗寒知松栢詩龍蟄雖髙卧雞鳴不廢時炎涼徒自變茂悦兩相知已負棟梁質肯為兒女姿那憂霜貿貿未喜日遲遲難與夏蟲語永無秋實悲誰知此植物亦解秉天彛王晉卿作煙江疊嶂圖僕賦詩十四韻晉卿和之語特竒麗因復次韻不獨紀其詩畫之美亦為道其出處契闊之故而終之以不忘在莒之戒亦朋友忠愛之義也山中舉頭望日邊長安不見空雲煙歸來長安望山上時移事改應澘然管絃去盡賔客散惟有馬埒編金泉渥洼故自千里足要飽風雪輕山川屈居華屋啗棗脯十年俯仰龍旗前却因病瘦出竒骨鹽車之厄寧非天風流文采磨不盡水墨自與詩爭妍畫山何必山中人田歌自古非知田鄭䖍三絶君有二筆勢挽回三百年欲将巖谷亂窈窕眉峯脩嫮誇連娟人間何有春一夢此身将老蠶三眠山中幽絶不可久要作平地家居仙能令水石長在眼非君好我當誰縁願君終不忘在莒樂時更賦囚山篇柳子厚有囚山賦夜直玉堂擕李之儀端叔詩百餘首讀至夜半書其後玉堂清冷不成眠伴直難呼孟浩然暫借好詩消永夜每逢佳處輒參禪愁侵硯滴初含凍喜入燈花欲鬬妍寄語君家小兒子他時此句一時編景仁和賜酒燭詩復次韻謝之時公方進新樂笙磬分均上下堂舊說堂上之樂皆受笙均堂下之樂皆受磬均㳺魚舞獸自奔忙朱絃初識孤桐韻舊樂金石聲髙而絲聲㣲今樂金石與絲聲皆著玉琯猶聞秬黍香舊法以尺生律今以黍定律以律生尺萬事今方咨伯始一斑我亦愧真長此生㑹見三雍就無復寥寥歎未央次韻劉貢父春日賜幡勝寛詔隨春出内朝三軍喜氣挾狐貂鏤銀錯落翻斜月剪綵繽紛舞慶霄臘雪强飛纔到地前一日㣲雪曉風偷轉不驚條脱冠徑醉應歸卧便腹從人笑老韶是日幕次賜酒再和與君流落偶還朝過眼紛綸七葉貂莫笑華顛飄彩勝幾人黄壤隔青霄行吟未許窮騷雅坐嘯猶能出教條記取明年江上郡五更春枕夢春韶葉公秉王仲至見和次韻荅之袗絺方暑亦堪朝嵗晚凄風憶皁貂共喜鵷鸞歸禁籞心知日月在重霄君如老驥初遭絡我似枯桑不受條强鑷霜鬚簮彩勝蒼顔得酒尚能韶再和衰遲何幸得同朝温勁如君合珥貂誰惜異材䝉徑寸自慙枯枿借凌霄光風泛泛初浮水紅糝離離欲綴條後日一樽何處共奉常端冕作咸韶次韻王晉卿惠花栽栽所寓張退傅第中一首坐來念念失前人共向空中寓一塵若問此花誰是主天教閒客管青春次韻王晉卿上元侍燕端門月上九門開星河繞露臺君方枕中夢我亦化人來光動仙毬縋香餘歩輦回相從穿萬馬衰病若為陪王鄭州挽詞克臣羡君華髪起琳宫右輔初還鼓角雄千里農桑歌子産一時冠蓋慕蕭嵩那知聚散舂糧外便有悲歡過隙中京兆同僚幾人在猶思對案筆生風予為開封幕與子難同㕔書王定國所藏王晉卿畫著色山二首白髪四老人何曽在商顔煩君紙上影照我胸中山山中亦何有木老土石頑正賴天日光澗谷紛斕斑我心空無物斯文定何閒君看古井水萬象自徃還君歸嶺北初逢雪我亦江南五見春寄語風流王武子三人俱是識山人送吕昌朝知嘉州不羡三刀夢蜀都聊将八詠繼東呉卧看古佛凌雲閣勑賜詩人明月湖得句㑹應縁竹鶴思歸寧復為蓴鱸横空好在脩眉色頭白猶堪乞左符次韻黄魯直寄題郭明父府推潁州西齋二首樹頭啄木常疑客客去而瞋定不然脱轄已應生井沫解衣聊復起庖煙平生詩酒真相汙此去文書恐獨賢早晚西湖映華髪小舟翻動水中天寂寞東京月旦州徳星無復綴珠旒莫嗟平輿空神物尚有西齋接勝流春夢屢尋湖十頃家書新報橘千頭雪堂亦有思歸曲為謝平生馬少㳺輿音預東坡全集巻十七
