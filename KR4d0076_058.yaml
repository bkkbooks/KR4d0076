body:
  text: 東坡全集卷五十八宋蘇軾撰奏議一十二首乞禁商旅過外國狀元祐五年八月十五日龍圗閣學士左朝奉郎知杭州蘇軾狀奏檢會杭州去年十一月二十三日奏泉州百姓徐戩公案為徐戩不合專擅為高麗國雕造經板二千九百餘片公然載往彼國却受酬答銀三千兩公私並不知覺因此搆合密熟遂專擅受載彼國僧壽介前來以祭奠亡僧淨源為名欲獻金塔及欲住此尋師學法顯是徐戩不畏公法冒求厚利以致招來本僧搔擾州郡况髙麗臣屬契丹情僞難測其徐戩公然交通略無畏忌乞法外重行以警閩浙之民杜絶姦細奉聖㫖徐戩特送千里外州軍編管至今年七月十七日杭州市舶司准密州關報據臨海軍狀申准髙麗國禮賓院牒據泉州綱首徐成狀稱有商客王應升等冒請往髙麗國公慿却發船入大遼國買賣尋捉到王應升等二十人及船中行貨並是大遼國南挺銀絲錢物并有過海祈平安將入大遼國願子二道本司看詳顯見閩浙商賈因往髙麗遂通契丹嵗久跡熟必為莫大之患方欲具事由聞奏乞禁止近又于今月初十日據轉運司牒准明州申報髙麗人使李資義等二百六十九人相次到州仍是客人李球於去年六月內請杭州市舶司公慿往髙麗國經紀因此與高麗國先帶到實封文字一角及寄搭松子四十餘布袋前來本司看詳顯是客人李球因往彼國交搆密熟為之鄉導以希厚利正與去年所奏徐戩情理一同見今兩浙淮南公私騷然文符交錯官吏疲於應答須索假借行市為之憂恐而自明及潤七州舊例約費二萬四千六百餘貫未論淮南京東兩路及京師館待賜豫之費度不下十餘萬貫若以此錢賑濟浙西饑民不知全活幾萬人矣不惟公私勞費深可痛惜而交通契丹之患其漸可憂皆由閩浙姦民因緣商販為國生事除已具處置畫一利害聞奏外勘會熙寧以前編敕客旅商販不得往高麗新羅及登萊州界違者並徒二年船物皆沒入官竊原祖宗立法之意正為深防姦細因緣與契丹交通自熙寧四年發運使羅拯始遣人招來髙麗一生厲階至今為梗熙寧編勑稍稍改更慶厯嘉祐之法至元豐八年九月十七日勑惟禁往大遼及登萊州其餘皆不禁又許諸蕃願附船入貢或商販者聽元祐編敕亦只禁往新羅所以奸民猾商爭請公慿往來如織公然乘載外國人使附搭入貢搔擾所在若不特降指揮將前後條貫看詳别加刪定嚴立約束則奸民猾商往來無窮必為意外之患謹具前後條貫畫一如左一慶厯編敕客旅於海路商販者不得往髙麗新羅及登萊州界若往餘州並須於發地州軍先經官司投狀開坐所載行貨名件欲往某州軍出賣許召本土有物力居民三名結罪保明委不夾帶違禁及堪造軍器物色不至過越所禁地分官司即為出給公慿如有違條約及海船無公慿許諸色人告捉船物並沒官仍估物價錢支一半與告人充賞犯人科違制之罪一嘉祐編敕客旅於海道商販者不得往髙麗新羅及至登萊州界若往餘州並須於發地州軍先經官司投狀開坐所載行貨名件欲往某州軍出賣許召本土有物力居民三名結罪保明委不夾帶違禁及堪造軍器物色不至越過所禁地分官司即為出給公慿如有違條約及海船無公慿許諸色人告捉船物並沒官仍估納物價錢支一半與告人充賞犯人以違制論一熙寧編敕諸客旅於海道商販於起發州投狀開坐所載行貨名件往某處出賣召本土有物力户三人結罪保明委不夾帶禁物亦不過越所禁地分官司即為出給公慿仍備録船貨先牒所往地頭候到日㸃檢批鑿公慿訖却報元發牒州即乘船自海道入界河及往北界髙麗新羅并登萊界商販者各徒二年一元豐三年八月二十三日中書劄子節文諸非廣州市船司輒發過南蕃綱舶船非明州市舶司而發過日本髙麗者以違制論不以赦降去官原減其發髙麗船仍依别條一元豐八年九月十七日敕節文諸非杭明廣州而輒發海商舶船者以違制論不以去官赦降原減諸商賈由海道販諸蕃惟不得至大遼國及登萊州即諸蕃願附船入貢或商販者聽一元祐編敕諸商賈許由海道往外蕃興販並具人船物貨名數所詣去處申所在州仍召本土有物力户三人委保物貨內不夾帶兵器若違禁以堪造軍器物并不越過所禁地分州為驗實牒送願發舶州置簿抄上仍給公據方聽候回日許於合發舶州住舶公據納市舶司即不請公據而擅行或乘船自海道入界河及往新羅登萊州界者徒二年五百里編管右謹件如前勘會元豐八年九月十七日指揮最為害事將祖宗以來禁人往髙麗新羅條貫一時削去又許商賈得擅帶諸蕃附船入貢因此致前件商人徐戬王應升李球之流得行其姦今來不可不改乞三省密院相度裁定一依慶厯嘉祐編敕施行不惟免使髙麗因緣猾商時來朝貢搔擾中國實免中國奸細因往髙麗遂通契丹之患謹録奏聞伏候敕㫖申明户部符節略賑濟狀元祐五年八月二十五日龍圗閣學士左朝奉郎知杭州蘇軾狀奏臣近以今年浙西數郡大雨不止太湖泛溢所在害稼尋實七月十五日具狀奏聞乞下户部及本路轉運提刑兩路鈐轄司疾早相度來年合與不合凖備常平斛㪷出糶救饑如合準備即具諸州合用數目臣巳約度杭州合用二十萬石仍委逐司擘畫合如何措置令米價不至大段翔湧收糴得足如逐司以謂不須凖備出糶救濟即令各具保明來年委得不至饑殍流亡結罪聞奏今准尚書户部符本路轉運提刑鈐轄司准都省批送下八月四日敕中書省知杭州充兩浙西路兵馬鈐轄蘇軾奏勘會今年五六月間浙西數郡大雨不止太湖泛溢所在害稼災傷之勢恐甚於去年伏望下户部及本路轉運提刑及兩路鈐轄司相度來年合如何凖備救濟候敕㫖八月四日三省同奉聖㫖依奏奉敕如右牒到奉行都省批八月五日辰時送户部施行內相度仍限半月者右臣竊詳户部符內止是節略行下既奉聖㫖依奏即未審元初並依臣所奏係有司節略為復只依今來户部符下一節事理切緣臣前奏所乞如逐司以謂不須準備出糶救濟即令各具保明來年委得不至饑殍流亡結罪聞奏之意蓋欲逐司官吏依實相度不敢滅裂須至再具申明伏乞朝廷檢㑹臣前奏逐節事理特賜明降指揮施行謹録奏聞伏候敕㫖相度準備賑濟第一狀元祐五年九月七日龍圖閣學士左朝奉郎知杭州蘇軾狀奏准尚書户部符准敕知杭州兩浙西路兵馬鈐轄蘇軾奏勘㑹今年五六月浙西數郡大雨不止太湖泛溢所在害稼災傷之勢恐甚於去年伏望下户部及本路轉運提刑兩路鈐轄司相度來年合如何凖備救濟奉聖㫖依奏都省批內相度限半月本司今相度到準備救濟事件如左一本司勘㑹去年八九月間杭州在市米價每㪷六十足至十一月足長至九十五足其勢方踊貴間因朝㫖寬減轉運司上供額斛三分之一即時米價減落及本州正月內便行出糶常平米至七月終共糶一十八萬餘石以此米價無由增長人免流殍今來在市米見今巳是七十五文足至冬間轉運司收糴上供額斛及檢放秋稅軍糧恐有闕少亦須和糴取足又本州須糴常平米二十餘萬石諸州亦各收買似此爭糴必須踊貴縱使大破官錢收糴得足亦恐來年闕食小民必不辦髙價收買官米至時若米貴人饑本司必須奏乞減價出賣竊料仁聖在上必不忍坐視人饑不許減價約度浙西諸郡今年必須和糴常平米五十餘萬石凖備來年出糶若價髙本重至時每㪷只減十文亦須坐失五萬餘貫而况饑饉已成流殍不巳則朝廷所以救恤之者其費豈止五萬貫而巳哉欲乞聖慈特許寬減轉運司今來上供額斛一半仍依去年例令折價錢置場收買金銀紬絹上供則朝廷無所耗失而浙中米價稍平常平收糴得足來年不至大段減價出賣耗折常平本錢一路之人得免流殍為惠不小勘㑹去年本司亦乞寬減上供額斛一半准敕只許寬減三分之一今來災傷及檢放秋稅次第皆甚于去年又緣連年災傷民力愈耗合倍加存恤所以須奏乞寬減一半伏望聖慈憐愍一方特依所乞盡數寬減一勘㑹熙寧八年兩浙饑饉朝㫖截撥江西及本路上供斛㪷一百二十五萬石賜本路賑濟只緣本路奏乞後時不及於事卒死五十萬人去嵗十一月二十九日聖㫖令發運司撥上供斛㪷二十萬石賜本路減價出糶所費只及熙寧六分之一然及時濟用倉廩有備米不騰踊人免流殍本司今來勘會蘇湖常秀等州頻年災傷人户披訴巳倍去嵗檢放苗米亦必加倍不惟人户闕食亦恐軍糧不足欲乞檢㑹去年體例更賜加數特與截撥本路或發運司上供斛㪷三十萬石令本路減價出糶或用補軍糧之闕伏望聖慈愍念一路軍民特與盡數應副右謹件如前本司巳具上項事件關牒本路轉運提刑司照會相度施行去訖深慮轉運司官吏職在供餽所有寬減額斛難於自言伏望聖明以一方生靈為心非為茍寬官吏之責特賜過慮及早施行又况所乞數目雖廣如所耗損錢數不多若待饑饉巳成然後垂救則所費十倍無及於事伏乞決自聖意指揮三省更不下有司往復勘當施行謹録奏聞伏候敕㫖相度凖備賑濟第二狀元祐五年九月十七日龍圗閣學士左朝奉郎知杭州蘇軾狀奏近准朝㫖令本司及轉運司提刑司相度凖備來年被災闕食人户本司巳具二事聞奏乞寬減轉運司上供額斛一半截撥上供米三十萬石凖備及補軍糧之闕未䝉回降指揮本司再相度來年凖備大計全在廣糴常平斛㪷於正月以後便行出糶平凖在市管價以免流殍之災此外更無長䇿今來選差官吏開倉和糴優估米價戒約專㪷不得乞覓非不嚴切然經今一月並無一人赴倉入中體問得蓋是蘇湖常秀大假災傷兼自八月半間至今隂雨不止災傷之餘所收無幾又少遇晴乾已熟者不得刈已刈者不得舂有穀無米日就腐壞見今訪聞蘇秀州在市米價已是九十五文足添長之勢炎炎未已本司欲便令杭州添價收糴不惟助長米價為小民目下之患又官本既貴來年難為出糶若不添錢又恐終是收糴不行來年春夏間闕米出糶必有流殍之憂竊料至時難以諱言災傷官吏亦須略具事實聞奏仁聖在上理無不救必須多方於鄰路擘畫斛㪷賑濟若不預為之防則恐鄰路無備臨時擘畫不行須至先事奏乞者右本司勘㑹去嵗朝㫖寬減轉運司上供額斛三分之一却令將折斛錢買銀絹上供又今年本司亦奏乞寬減額斛一半如蒙施行即轉運司折斛錢萬數不少又勘會提刑司今年諸州糶常平米至多所管常平司官錢萬數不少但有錢無米坐視饑殍為憂不細欲乞聖慈過為防慮特敕發運司相度擘畫錢本於江淮近便豐熟州軍差官置場和糴白米五十萬石嚴賜指揮須管數足仍搬運至真揚州樁管若令來春本路闕常平米出糶即令發運司撥發於逐州下卸仍以本路常平錢充還若至時本路常平米有備不須搬運上件米出糶即就撥充本路轉運司上供額斛却以寬減折斛錢充還如此即於朝省錢物無所耗損而於本路生靈億萬性命稍免溝壑之憂謹録奏聞伏候敕㫖貼黃今年災傷實倍去年但官吏上下皆不樂檢放諱言災傷只如近日秀州嘉興縣因不受訴災傷詞狀致踏死四十餘人大率所在官吏皆同此意但此一處以踏死人多獨彰露耳若朝廷只據逐處申奏及檢放秋稅分數即無由盡見災傷之實又臣軾切見轉運提刑司所奏災傷皆無迫切􅈤至之語朝論必以臣為過當然臣實見連年災傷父老皆言事勢不減熙寧民間有錢尚困無米餓死四十萬人况今民間絶無見錢若又無米則流殍之災未易度量伏望聖慈深為防慮若來年人户元不闕食不須如此擘畫則臣不合過當張皇之罪所不敢辭縱被誅譴終賢於有災無備坐視人死而不能救也乞檢㑹應詔所論四事行下狀元祐五年九月二十七日龍圖閣學士左朝奉郎知杭州蘇軾狀奏右臣今年六月九日輒具朝廷至仁寬貸宿逋已行之命為有司所格沮使王澤不得下流者四事其一曰見缺市易籍納産業聖恩並許給還或貼納收贖而有司妄出新意創為籍納折納之法使十有八九不該給贖其二曰積缺鹽錢聖恩巳許只納産場鹽監官本價錢其餘並與除放而提舉鹽事司執文害意謂非貧乏不在此數其三曰登極大赦以前人户以産當酒見缺者亦合依鹽當錢法只納官本其四曰元豐四年杭州揀下不堪上供和買絹五萬七千八百九十匹並抑勒配賣與民不住鞭笞催納至今尚缺八千二百餘貫並合依今年四月九日聖㫖除放然臣具此奏論經今一百八日不䝉回降指揮及檢會前奏四事早賜行下謹録奏聞伏候敕㫖尚書省取會到諸處稱不曾承受到上件奏狀仍連元狀十二月十八日三省同奉聖㫖令蘇軾别具聞奏仍仰户部指揮根究前奏申尚書省進何去非備論狀元祐五年十月十八日龍圖閣學士左朝奉郎知杭州蘇軾狀奏右臣自揣虛薄叨塵侍從常求勝巳以為報國恭惟先皇帝道配周孔言成典謨雲漢之章藻飾萬物而臣子莫副其意蓋嘗當食不御有才難之歎伏見承奉郎徐州州學教授何去非文章議論實有過人筆勢雄健得秦漢間風力元豐五年以纍舉免解答䇿廷中極論用兵利害先帝覽而異之特授右班殿直使教授武學不久遂為博士臣竊揆聖意必將長育成就以待其用豈特以一博士期去非而巳哉而去非立志强毅不苟合於當時公卿故莫為一言推轂成就之者臣任翰林學士日嘗具以此奏聞乞換文資置之太學雖䝉恩換承奉郎而今者乃出為徐州教授比於博士乃似左遷非獨臣人微言輕不足取信亦恐朝廷不見其文章議論無以較量其人謹繕寫去非所著備論二十八篇附遞進上乞降付三省執政考覽如臣言不繆乞除一館職非獨以收羅逸才風曉士類亦以彰先帝知人之明一經題品决無虛士書之史冊足為光華若不如所舉甘伏朝典謹録奏聞伏候敕㫖相度凖備賑濟第三狀元祐五年十月二十一日龍圗閣學士左朝奉郎知杭州蘇軾狀奏右臣近奉朝㫖相度凖備來年賑濟闕食人户尋具畫一事件聞奏內多糴常平以備來年出糶平凖市價一事最為要切見今浙西諸郡米價雖貴然亦不過七十足竊度來年青黃不交之際米價必無一百以下至時若依元價出糶猶可以平壓翔踊之患終勝於官無斛㪷坐視流殍而提刑司専務靳惜兩三錢遍行文字减勒官估臣巳指麾杭州不得减價依舊作七十收糴見今亦不過糴得三萬餘石其餘諸郡不敢有違訪聞蘇秀最係出米地分見今不過糴得二三萬石而湖州一處災傷為甚提刑司已指麾本州住糴却令蘇州撥常平米五萬石與湖州又令秀州撥十萬石與杭州若湖得五萬石猶恐未足于用而蘇秀撥十五萬石深慮逐州不免妨闕若新糴不多即是兩頭闕事而般運水腳兵稍有偷盜耗失之費亦與所减兩三錢不爭若使來年官米數少不䏸平壓市價致有流殍更煩朝廷截撥斛㪷散與饑民則為十倍之費乃是所减毫毛而所捐丘山大為非䇿訪聞諸郡富民皆知來年必是米貴各欲廣行收糴以規厚利若官估稍優則農民米貨盡歸於官此等無由乘時射利吞併貧弱故造作言語以搖官吏皆言多破官錢深為可惜若便為减價住糴正墮其計况今來巳是十月下旬不過更一二十日即無收糴縱却添價亦不及事恐有誤來年出糶大事所以須至别作擘畫仰訴朝廷緣臣先於九月十七日曽奏乞下發運司於豐熟近便州軍和糴五十萬石以備常平米不足般取出糶却以本路常平錢還發運司若常平米足用即充本路轉運司上供米仍以額斛錢撥還兼勘㑹淮南大熟揚州髙郵軍米價甚平若行此策顯無妨害伏望聖慈檢㑹前奏速賜施行與此一方連年被災之民廣作凖備謹録奏聞伏候敕㫖相度凖備賑濟第四狀元祐五年十一月二十一日龍圖閣學士左朝奉郎知杭州蘇軾狀奏右臣勘㑹今年本路風水之災倍於去年本司纍具合行救濟事件聞奏伏料仁聖在上必已矜察見今蘇湖杭秀等州米價日長杭州所糴粗米以備出糶每㪷不下六十七至七十足錢猶自收糴不行恐須至更添錢招買方稍足用竊計開春米價必是翔踊若依條不虧元價出糶則官本已重小民艱于收糴無以救濟貧下平凖市價若奏乞减價出糶又恐耗失常平官本亦非長䇿須至奏聞又勘㑹杭州裏外見管義倉米四萬餘石凖條災傷之年並許俵散賑濟本州相度若待饑饉巳成方將上件義倉盡行俵散亦未能盡濟饑民惟是開春巳後才見在市米價增長即便將義倉常平米賤價出糶但市價不長則一郡之民人人受賜今來起請欲乞將常平米除係三年以上依條合减價外其餘並每㪷减五文足內係今年貴價收糴者每㪷减二十文足出糶仍將義倉米隨色額估定賤價一處出糶所收錢並用填還常平所虧官本錢如填還足外尚有剩數亦許撥填本路别州常平米所虧官本錢仍下浙西諸郡依此體例施行所貴本路明年饑民普得賤米喫用全活億萬性命其利至博而其實止於耗却義倉元不破官本米貨十餘萬石况自有條災傷之嵗許將義倉米俵散但俵散之所及者狹不如出糶之利所及者廣伏望聖慈特出宸斷早賜施行謹録奏聞伏候敕㫖貼黃常平錢米豐凶之際平凖物價以救民命所繫利害至重本司已纍次奏乞指揮諸路專行糴糶不得别有他用如召募饑民興土工水利之類有出無入即漸耗散伏乞留意今來啓請只是權宜一時施行别不衝改前後條貫又貼黃本司相度來年艱食之勢深可憂畏若候饑饉已成疾疫已作仁聖在上必須廣作擘畫錢米救濟其費必相倍蓰若行本司所奏開春便行出糶則米價不長億萬生聚自然䝉賜所費不多今來巳是十一月末乞速賜施行所貴正月內便得開倉出糶乞擢用劉季孫狀元祐五年十一月日龍圗閣學士左朝奉郎知杭州蘇軾狀奏右臣自少聞趙元昊寇延州危急環慶將官劉平以孤軍來援奸臣不救平遂戰沒竟罵賊不食而死平有數子皆才用絶人不幸早世今臣所與同僚西京左藏庫副使劉季孫則平之少子篤志力學博通史傳工詩䏻文輕利重義雖文臣亦未易得而其練達武經講習邊政乃其家學至於奮不顧身臨難守節以臣度之必不減平今平諸子獨有季孫在而年巳五十有八雖備位將領未盡其用伏望朝廷特賜採察權置邊庭要害之地觀其設施别加升進不獨為忠義之勸亦以廣文武之用如䝉朝廷擢用後犯入已贓及不如所舉臣甘伏朝典謹録奏聞伏候敕㫖乞子圭師號狀元祐五年十二月日龍圗閣學士左朝奉郎知杭州蘇軾狀奏勘㑹杭州平陸本江海故地惟附山乃有甘泉其餘井皆鹹苦唐刺史李泌始引西湖水作六井其後白居易亦治湖浚井以足民用嘉祐中知州沈遘增置一大井在美俗坊今謂之沈公井最得要地四逺取汲而創始滅裂水嘗不應至熙寧中六井與沈公井例皆廢壞知州陳襄選差僧仲文子圭如正思坦四人董治其事修完既畢嵗適大旱民足於水為利甚博臣為通判親見其事經今十八年沈公井復壞終嵗枯涸居民去水逺者率以七八錢買水一斛而軍營尤以為苦臣尋訪求熙寧中修井四僧而三人巳亡獨子圭在年已七十精力不衰問沈公井復壞之由子圭云熙寧中雖巳修完然不免以竹為管易致廢壞遂擘畫用瓦筒盛以石槽底蓋堅厚錮捍周密水既足用永無壞理又於六井中控引餘波至仁和門外及威果雄節等指揮五營之間創為二井皆自來去井最逺難得水處西湖甘水殆遍一城軍民相慶若非子圭心力才幹無緣成就緣子圭先已䝉恩賜紫欲乞特賜一師號以旌其能者右臣體問得靈石多福院僧子圭委有戒行自熙寧中及今兩次選差修井營幹勞苦不避風雨顯有成效如䝉聖恩賜一師號即乞以惠遷為號取易所謂井居其所而遷之義謹録奏聞伏候敕㫖繳進應詔所論四事狀前連元祐五年六月奏狀元祐六年正月九日龍圗閣學士左朝奉郎知杭州蘇軾狀奏右臣去年六月具狀奏聞乞申明給還市易折納産業及除放積缺鹽錢并人户缺買退絹錢四事未䝉回降指揮今月五日准元祐五年十二月十九日尚書省劄子㑹到諸處稱不曽承受到上件奏狀十二月十八日三省同奉聖㫖令臣别具聞奏者今重具到元奏狀繳連在前謹録奏聞伏候敕㫖貼黃臣竊見浙中州縣市井人煙比二十年前不及四五所在酒稅課利虧缺只如杭州酒務課利昔年三十餘萬貫今來只及二十餘萬貫其他大率類此朝廷力行仁政不為不久而公私凋耗終不少蘇蓋是商賈物貨元未通行故也自來民間買賣例少見錢惟藉所在有富實人户可倚信者賒買而去嵗嵗往來常買新貨却索舊錢以此行商坐賈兩獲其利今浙中州縣所理私債大半係缺官錢人户官錢尚不䏸足私債更無由催以此商旅不行公私受害若行此四事則官之所失止是虛數而人户一蘇三二年間商旅必復通行酒稅課利漸可復舊所補不小乞樁管錢氏地利房錢修表忠觀及墳廟狀元祐六年二月二十八日龍圗閣學士左朝奉郎知杭州蘇軾狀奏檢准熙寧十年十月十一日中書劄子節文資政殿大學士右諫議大夫知杭州趙抃奏伏見故吳越國王錢氏有墳廟在本州界欲乞兩縣應管錢氏諸墳廟每縣選委僧道一名專切主管內錢塘縣界文穆王元瓘等二十六處墳廟勘會當州天慶觀道正通教大師錢自然本錢氏直下子孫欲令錢自然永逺住持並臨安縣界武肅王鏐等墳廟一十一處今召到本縣淨土寺賜紫僧道微乞依錢自然例主管又勘會得文穆王元瓘墳廟並忠獻王仁佐墳並在龍山界其側有香火妙因院本錢氏建造見是道正錢自然權令徒弟道士在彼看守欲望改賜觀額令錢自然巳下徒弟永逺住持漸次修葺兼得就便照管墳廟不致荒廢奉敕依奏其錢塘妙因院特改賜表忠觀為額并臨安淨土寺令尚書祠部每遇同天節各特與披剃童行一名又准元豐五年三月十八日中書劄子節文皇城使慶州防禦使錢暉等奏臣等先臣祠廟在杭越二州者五所墳壠在錢塘臨安兩縣者六十餘處獨臨安有田園房廊嵗收一千三百四十貫有竒太平興國已後寄納本縣至大中祥符間本處申明䝉朝㫖令杭州樓店務於軍資庫作臣家錢寄納日後不曽請領近嵗先臣祠廟例皆摧塌私家無力修葺前項寄納錢數雖多切緣年嵗深逺不敢更乞支給今只乞降指揮下杭州許將臨安縣舊田園房廊撥還臣家庶收嵗課漸次完補墳廟謹録奏聞伏候敕㫖右奉聖㫖宜令杭州每年特支錢五百貫與表忠觀置簿拘管只得修葺墳廟不得别將支用劄付杭州准此者臣檢會熙寧十年七月二十六日據管內道正錢自然狀乞將臨安縣祖先置到産業每年收掠賃錢一千三百五十四貫修葺諸處墳廟此時差官檢計到錢塘臨安縣所管錢氏墳廟委是造來年深木植朽損共合用工料價錢一萬二千八百九十貫九百九十九文及臨安縣勘會到管內錢氏歸官房廊田産等賃錢年納一千三百五十四貫三百四十文省送納軍資庫尋係本州申奏乞將臨安縣管催上件賃錢支撥修葺約計九年方得完備直至元豐五年內因皇城使錢暉等奏乞方准當年三月十八日中書劄子奉聖㫖每年特支錢五百貫與表忠觀修葺墳廟不得别將支用自後至元祐五年雖支得四千五百貫省蓋為廟宇舊屋間架元造廣大一百餘年不曾修治例皆損塌須得一起修葺稍可完補若每年只支得五百貫雖逐旋修得大段倒損去處又為連接屋宇數多隨手損塌自熙寧十年檢計止今又及一十四年尋於去年再差官重行檢計到兩縣墳廟巳修再損未及修屋宇神像等共合用工料價錢內臨安縣四千三百五十八貫一百四十四文省錢塘縣一萬二千五百二十貫五百九十一文省兩縣共合用工料價錢計一萬六千八百七十八貫七百三十五文省須至奏陳者右臣竊惟錢氏之忠著于甲令朝野共知不待臣言而墳廟荒毁行路嗟傷就使朝廷特賜錢物為之修完猶不為過而况本家自有地利房錢可以支用豈忍利此毫末歸之有司恭惟神宗皇帝深念錢氏之忠特改妙因院賜名表忠觀仍使其裔孫道士錢自然住持而有司不能推明聖意奏乞盡數撥還地利房錢以助修完經今十四年表忠觀既未成就而諸處墳廟依前荒毁使先帝表顯忠臣之意徒為空言臣愚欲望聖慈特許每年臨安縣所收地利房錢一千三百五十四貫三百四十文省令表忠觀每遇修本觀及杭越州諸墳廟即具所修名件及合用錢數赴州請領仍候修造了差官檢計具委無大破保明申州所貴事體稍正毋使小民竊議謹録奏聞伏候敕㫖貼黃如䝉朝廷依奏即乞指揮本州將逐年所收到上件地利房錢令須樁管只得充修造表忠觀及錢氏墳廟使用官私不得别行支借使用東坡全集卷五十八
