body:
  text: 東坡全集卷四十三宋蘇軾撰論十一首孟軻論昔者仲尼自衛反魯網羅三代之舊聞蓋經禮三百曲禮三千終年不能究其說夫子謂子貢曰賜爾以吾為多學而識之者歟非也豫一以貫之天下苦其難而莫之能用也不知夫子之有以貫之也是故堯舜禹湯文武周公之法度禮樂刑政與當世之賢人君子百氏之書百工之技藝九州之內四海之外九夷八蠻之事荒忽誕謾而不可考者雜然皆列乎胸中而有卓然不可亂者此固有以一之也是以博學而不亂深思而不惑非天下之至精其孰能與於此蓋嘗求之於六經至於詩與春秋之際而後知聖人之道始終本末各有條理夫王化之本始於天下之易行天下固知有父子也父子不相賊而足以為孝矣天下固知有兄弟也兄弟不相奪而足以為悌矣孝悌足而王道備此固非有深逺而難見勤苦而難行者也故詩之為教也使人歌舞佚樂無所不至要在於不失正焉而已矣雖然聖人固有所甚畏也一失容者禮之所由廢也一失言者義之所由亡也君臣之相攘上下之相殘天下大亂未嘗不始於此道是故春秋力爭於毫釐之間而深明乎疑似之際截然其有所必不可為也不觀於詩無以見王道之易不觀於春秋無以知王政之難自孔子沒諸子各以所聞著書而皆不得其源流故其言無有統要若孟子可謂深於詩而長於春秋者矣其道始於至粗而極於至精充乎天地放乎四海而毫釐有所必計至寬而不可犯至密而可樂者三字一作不可察此其中必有所守而後世或未之見也且孟子嘗有言矣人能充其無欲害人之心而仁不可勝用也人能充其無欲為穿窬之心而義不可勝用也士未可以言而言是以言餂之也可以言而不言是以不言餂之也是皆穿窬之類也唯其不為穿窬也而義至於不可勝用唯其未可以言而言可以言而不言也而其罪遂至於穿窬故曰其道始於至粗而極於至精充乎天地放乎四海而毫釐有所必計嗚呼此其所以為孟子歟後之觀孟子者無觀之他亦觀諸此而已矣樂毅論自知其可以王而王者三王也自知其不可以王而霸者五霸也或者之論曰圖王不成其弊猶可以霸嗚呼使齊桓晉文而行湯武之事將求亡之不暇雖欲霸可得乎夫王道者不可以小用也大用則王小用則亡昔者徐偃王宋襄公嘗行仁義矣然終以亡其身喪其國者何哉其所施者未足以充其所求也故夫有可以得天下之道而無取天下之心乃可與言王矣范蠡留侯雖非湯武之佐然亦可謂剛毅果敢卓然不惑而能有所必為者也觀吳王困於姑蘇之上而求哀請命於勾踐勾踐欲赦之彼范蠡者獨以為不可援桴進兵卒刎其頸項籍之解而東髙帝亦欲罷兵歸國留侯諫曰此天亡也急擊勿失此二人者以為區區之仁義不足以易吾之大計也嗟夫樂毅戰國之雄未知大道而竊嘗聞之則足以亡其身而已矣論者以為燕惠王不肖用反間以騎劫代將卒走樂生此其所以無成者出於不幸而非用兵之罪然當時使昭王尚在反間不得行樂毅終亦必敗何者燕之并齊非秦楚三晉之利今以百萬之師攻兩城之殘寇而數歲不决師老於外此必有乘其虛者矣諸侯乘之於內齊擊之於外當此時雖太公穰苴不能無敗然樂毅以百倍之衆數歲而不能下兩城者非其智力不足蓋欲以仁義服齊之民故不忍急攻而至於此也夫以齊人苦湣王之彊暴樂毅苟退而休兵治其政令寬其賦役反其田里安其老幼使齊人無復鬭志則田單者獨誰與戰哉奈何以百萬之師相持而不决此固所以使齊人得徐而為之謀也當戰國時兵彊相吞者豈獨在我以燕齊之衆壓其城而急攻之可滅此而後食其誰曰不可嗚呼欲王則王不王則審所處無使兩失焉而為天下笑也荀卿論嘗讀孔子世家觀其言語文章循循莫不有規矩不敢放言髙論言必稱先王然後知聖人憂天下之深也茫乎不知其畔岸而非逺也浩乎不知其津涯而非深也其所言者匹夫匹婦之所共知而所行者聖人有所不能盡也嗚呼是亦足矣使後世有能盡吾說者雖為聖人無難而不能者不失為寡過而已矣子路之勇子貢之辨冉有之智此三者皆天下之所謂難能而可貴者也然三子者每不為夫子之所恱顔淵默然不見其所能若無以異於衆人者而夫子亟稱之且夫學聖人者豈必其言之云爾哉亦觀其意之所嚮而已夫子以為後世必有不能行其說者矣必有竊其說而為不義者矣是故其言平易正直而不敢為非常可喜之論要在於不可易也昔者常怪李斯事荀卿既而焚滅其書大變古先聖王之法於其師之道不啻若寇讐及今觀荀卿之書然後知李斯之所以事秦者皆出於荀卿而不足怪也荀卿者喜為異說而不讓敢為髙論而不顧者也其言愚人之所驚小人之所喜也子思孟軻世之所謂賢人君子也荀卿獨曰亂天下者子思孟軻也天下之人如此其衆也仁人義士如此其多也荀卿獨曰人性惡桀紂性也堯舜僞也由是觀之意其為人必也剛愎不遜而自許太過彼李斯者又特甚者耳今夫小人之為不善猶必有所顧忌是以夏商之亡桀紂之殘暴而先王之法度禮樂刑政猶未至於絶滅而不可考者是桀紂猶有所存而不敢盡廢也彼李斯者獨能奮而不顧焚燒夫子之六經烹滅三代之諸侯破壞周公之井田此亦必有所恃者矣彼見其師歷詆天下之賢人自是其愚以為古先聖王皆無足法者不知荀卿特以快一時之論而荀卿亦不知其禍之至於此也其父殺人報仇其子必且行劫荀卿明王道述禮樂而李斯以其學亂天下其髙談異論有以激之也孔孟之論未嘗異也而天下卒無有及者苟天下果無有及者則尚安以求異為哉韓非論聖人之所為惡夫異端盡力而排之者非異端之能亂天下而天下之亂所由出也昔周之衰有老聃莊周列禦寇之徒更為虛無淡泊之言而治其猖狂浮游之說紛紜顛倒而卒歸於無有由其道者蕩然莫得其當是以忘乎富貴之樂而齊乎死生之分此不得志於天下髙世逺舉之人所以放心而無憂雖非聖人之道而其用意固亦無惡於天下自老聃之死百餘年有商鞅韓非著書言治天下無若刑名之賢及秦用之終於勝廣之亂教化不足而法有餘秦以不祀而天下被其毒後世之學者知申韓之罪而不知老聃莊周之使然何者仁義之道起於夫婦父子兄弟相愛之間而禮法刑政之原出於君臣上下相忌之際相愛則有所不忍相忌則有所不敢夫不敢與不忍之心合而後聖人之道得存乎其中今老聃莊周論君臣父子之間泛泛乎若萍浮於江湖而適相值也夫是以父不足愛而君不足忌不忌其君不愛其父則仁不足以懷義不足以勸禮樂不足以化此四者皆不足用而欲置天下於無有夫無有豈誠足以治天下哉商鞅韓非求為其說而不得得其所以輕天下而齊萬物之術是以敢為殘忍而無疑今夫不忍殺人而不足以為仁而仁亦不足以治民則是殺人不足以為不仁而不仁亦不足以亂天下如此則舉天下唯吾之所為刀鋸斧鉞何施而不可昔者夫子未嘗一日敢易其言雖天下之小物亦莫不有所畏今其視天下眇然若不足為者此其所以輕殺人歟太史遷曰申子卑卑施於名實韓子引繩墨切事情明是非其極慘核少恩皆原於道德之意嘗讀而思之事固有不相謀而相感者莊老之後其禍為申韓由三代之衰至於今凡所以亂聖人之道者其弊固已多矣而未知其所終奈何其不為之所也留侯論古之所謂豪傑之士者必有過人之節人情有所不能忍者匹夫見辱拔劒而起挺身而鬬此不足為勇也天下有大勇者卒然臨之而不驚無故加之而不怒此其所挾持者甚大而其志甚逺也夫子房受書於圯上之老人也其事甚怪然亦安知其非秦之世有隱君子者出而試之觀其所以微見其意者皆聖賢相與警戒之意而世不察以為鬼物亦已過矣且其意不在書當韓之亡秦之方盛也以刀鋸鼎鑊待天下之士其平居無罪夷滅者不可勝數雖有賁育無所復施夫持法太急者其鋒不可犯而其勢未可乘子房不忍忿忿之心以匹夫之力而逞於一擊之間當此之時子房之不死者其間不能容髮蓋亦已危矣千金之子不死於盜賊何者其身之可愛而盜賊之不足以死也子房以蓋世之才不為伊尹太公之謀而特出於荆軻聶政之計以僥幸於不死此圯上之老人所為深惜者也是故倨傲鮮腆而深折之彼其能有所忍也然後可以就大事故曰孺子可教也楚莊王伐鄭鄭伯肉袒牽羊以逆莊王曰其君能下人必能信用其民矣遂捨之勾踐之困於㑹稽而歸臣妾於吳者三年而不倦且夫有報人之志而不能下人者是匹夫之剛也夫老人者以為子房才有餘而憂其度量之不足故深折其少年剛鋭之氣使之忍小忿而就大謀何則非有生平之素卒然相遇於草野之間而命以僕妾之役油然而不怪者此固秦皇之所不能驚而項籍之所不能怒也觀夫髙祖之所以勝而項籍之所以敗者在能忍與不能忍之間而已矣項籍唯不能忍是以百戰百勝而輕用其鋒髙祖忍之養其全鋒而待其斃此子房教之也當淮隂破齊而欲自王髙祖發怒見於詞色由此觀之猶有剛强不忍之氣非子房其誰全之太史公疑子房以為魁梧竒偉而其狀貌乃如婦人女子不稱其志氣嗚呼此其所以為子房歟賈誼論非才之難所以自用者實難惜乎賈生王者之佐而不能自用其才也夫君子之所取者逺則必有所待所就者大則必有所忍古之賢人皆有可致之才而卒不能行其萬一者未必皆其時君之罪或者其自取也愚觀賈生之論如其所言雖三代何以逺過得君如漢文猶且以不用死然則是天下無堯舜終不可以有所為耶仲尼聖人歷試於天下苟非大無道之國皆欲勉强扶持庶幾一日得行其道將之荆先之以子夏申之以冉有君子之欲得其君如此其勤也孟子去齊三宿而後出晝猶曰王其庶幾召我君子之不忍棄其君如此其厚也公孫丑問曰夫子何為不豫孟子曰方今天下捨我其誰哉而吾何為不豫君子之愛其身如此其至也夫如此而不用然後知天下之果不足與有為而可以無憾矣若賈生者非漢文之不用生生之不能用漢文也夫絳侯親握天子璽而授之文帝灌嬰連兵數十萬以决劉吕之雄雌又皆髙帝之舊將此其君臣相得之分豈特父子骨肉手足哉賈生洛陽之少年欲使其一朝之間盡棄其舊而謀其新亦已難矣為賈生者上得其君下得其大臣如絳灌之屬優游浸漬而深交之使天子不疑大臣不忌然後舉天下而唯吾之所欲為不過十年可以得志安有立談之間而遽為人痛哭哉觀其過湘為賦以弔屈原紆鬱憤悶躍然有逺舉之志其後卒以自傷哭泣至於夭絶是亦不善處窮者也夫謀之一不見用安知終不復用也不知默默以待其變而自殘至此嗚呼賈生志大而量小才有餘而識不足也古之人有髙世之才必有遺俗之纍是故非聰明睿哲不惑之主則不能全其用古今稱苻堅得王猛於草茅之中一朝盡斥去其舊臣而與之謀彼其匹夫略有天下之半以此哉愚深悲賈生之志故備論之亦使人君得如賈誼之臣則知其有狷介之操一不見用則憂傷病沮不能復振而為賈生者亦慎其所發哉鼂錯論天下之患最不可為者名為治平無事而其實有不測之憂坐觀其變而不為之所則恐至於不可救起而强為之則天下狃於治平之安而不吾信唯仁人君子豪傑之士為能出身為天下犯大難以求成大功此固非勉强期月之間而苟以求名者之所能也天下治平無故而發大難之端吾發之吾能收之然後能免難於天下事至而循循焉欲去之使他人任其責則天下之禍必集於我昔者鼂錯盡忠為漢謀弱山東之諸侯諸侯竝起以誅錯為名而天子不察以錯為說天下悲錯之以忠而受禍而不知錯之有以取之也古之立大事者不唯有超世之才亦必有堅忍不拔之志昔禹之治水鑿龍門决大河而放之海方其功之未成也蓋亦有潰冒衝突可畏之患唯能前知其當然事至不懼而徐為之所是以得至於成功夫以七國之彊而驟削之其為變豈足怪哉錯不於此時捐其身為天下當大難之衝而制吳楚之命乃為自全之計欲使天子自將而已居守且夫發七國之難者誰乎已欲求其名安所逃其患以自將之至危與居守之至安已為難首擇其至安而遺天子以其至危此忠臣義士所以憤惋而不平者也當此之時雖無袁盎錯亦不免於禍何者已欲居守而使人主自將以情而言天子固已難之矣而重違其議是以袁盎之說得行於其間使吳楚反錯以身任其危日夜淬礪東向而待之使不至於纍其君則天子將恃之以為無恐雖有百袁盎可得而間哉嗟夫世之君子欲求非常之功則無務為自全之計使錯自將而擊吳楚未必無功唯其欲自固其身而天子不悅姦臣得以乘其隙錯之所以自全者乃其所以自禍歟霍光論古之人惟漢武帝號知人蓋其平生所用文武將帥郡國邊鄙之臣左右侍從隂陽律厯博學之士以至錢穀小吏治刑獄使絶域者莫不獲盡其才而各當其處然猶有所試其功效著見天下之所共知而信者至於霍光先無尺寸之功而才氣數術又非有以大過於羣臣而武帝擢之於稠人之中付以天下後世之事而霍光又能忘身一心以輔幼主處於廢立之際其舉措甚閒而不亂此其故何也夫欲有所立於天下擊搏進取以求非常之功者則必有卓然可見之才而後可以有望於其成至於捍社稷託幼子此其難者不在乎才而在乎節不在乎節而在乎氣天下固有能辦其事者矣然才髙而位重則有僥幸之心以一時之功而易萬世之患故曰不在乎才而在乎節古之人有失之者司馬仲逹是也天下亦有忠義之士可託以死生之間而不忍負者矣然狷介亷潔不為不義則輕死而無謀能殺其身而不能全其國故曰不在乎節而在乎氣古之人有失之者晉荀息是也夫霍光者才不足而氣節有餘此武帝之所為取也書曰如有一介臣斷斷猗無他技其心休休焉其如有容人之有技若已有之人之彥聖其心好之不啻如自其口出是能容之以保我子孫黎民嗟夫此霍光之謂歟使霍光而有他技則其心安能休休焉容天下之才而樂天下之彥聖不忌不克若自已出哉才者爭之端也夫惟聖人在上驅天下之人各走其職而爭用其所長苟以人臣之勢而居於廊廟之上以捍衛幼冲之君而以其區區之才與天下爭能則姦臣小人有以乘其隙而奪其權矣霍光以匹夫之微而操生殺之柄威蓋人主而貴震於天下其所以歷事三主而終其身天下莫與爭者以其無他技而武帝亦以此取之歟揚雄論昔之為性論者多矣而不能定于一始孟子以為善而荀子以為惡揚子以為善惡混而韓愈者又取夫三子之說而折之以孔子之論離性以為三品曰中人可以上下而上智與下愚不移以為三子者皆出乎其中而遺其上下而天下之所是者於愈之說多焉嗟夫是未知乎所謂性者而以夫才者言之夫性與才相近而不同其别不啻若白黑之異也聖人之所與小人共之而皆不能逃焉是真所謂性也而其才固將有所不同今夫木得土而後生雨露風氣之所養暢然而遂茂者木之所同也性也而至於堅者為轂柔者為輪大者為楹小者為桷桷之不可以為楹輪之不可以為轂是豈其性之罪邪天下之言性者皆雜乎才而言之是以紛紛而不能一也孔子所謂中人可以上下而上智與下愚不移者是論其才也而至於言性則未嘗斷其善惡曰性相近也習相逺也而已韓愈之說則又有甚者離性以為情而合才以為性是故其論終莫能通彼以為性者果泊然而無為耶則不當復有善惡之說苟性而有善惡也則夫所謂情者乃吾所謂性也人生而莫不有飢寒之患牝牡之欲今告乎人曰飢而食渴而飲男女之欲不出於人之性也可乎是天下知其不可也聖人無是無由以為聖而小人無是無由以為惡聖人以其喜怒哀懼愛惡欲七者御之而之乎善小人以是七者御之而之乎惡由此觀之則夫善惡者性之所能之而非性之所能有也且夫言性者安以其善惡為哉雖然揚雄之論則固已近之曰人之性善惡混修其善則為善人修其惡則為惡人此其所以為異者唯其不知性之不能以有夫善惡而以為善惡之皆出乎性也而已夫太古之初本非有善惡之論唯天下之所同安者聖人指以為善而一人之所獨樂者則名以為惡天下之人固將即其所樂而行之孰知夫聖人唯其一人之獨樂不能勝天下之所同安是以有善惡之辨而諸子之意將以善惡為聖人之私說不已踈乎而韓愈又欲以書傳之所聞昔人之事迹而折夫三子之論區區乎以后稷之岐嶷文王之不勤瞽鯀管蔡之迹而明之聖人之論性也將以盡萬物之理與衆人之所共知者以折天下之疑而韓愈欲以一人之才定天下之性且其言曰今之言性者皆雜乎佛老愈之說以為性之無與乎情而喜怒哀樂皆非性者是愈流入於佛老而不自知也諸葛亮論取之以仁義守之以仁義者周也取之以詐力守之以詐力者秦也以秦之所以取取之以周之所以守守之者漢也仁義詐力雜用以取天下者此孔明之所以失也曹操因衰乘危得逞其姦孔明恥之欲信大義於天下當此時曹公威震四海東據許兖南收荆豫孔明之恃以勝之者獨以其區區之忠信有以激天下之心耳夫天下亷隅節槩慷慨死義之士固非心服曹氏也特以威劫而彊臣之聞孔明之風宜其千里之外有響應者如此則雖無措足之地而天下固為之用矣且夫殺一不義而得天下有所不為而後天下忠臣義士樂為之死劉表之喪先主在荆州孔明欲襲殺其孤先主不忍也其後劉璋以好逆之至蜀不數月扼其吭拊其背而奪之國此其與曹操異者幾希矣曹劉之不敵天下之所知也言兵不若曹操之多言地不若曹操之廣言戰不若曹操之能而有以一勝之者區區之忠信也孔明遷劉璋既已失天下義士之望乃始治兵振旅為仁義之師東嚮長驅而欲天下嚮應蓋亦難矣曹操既死子丕代立當此之時可以計破也何者操之臨終召丕而屬之植未嘗不以談尚為戒也而丕與植終於相殘如此此其父子兄弟且為寇讐而况能以得天下英雄之心哉此可間之勢不過捐數十萬金使其大臣骨肉內自相殘然後舉兵而伐之此髙祖所以滅項籍也孔明既不能全其信義以服天下之心又不能奮其智謀以絶曹氏之手足宜其屢戰而屢却哉故夫敵有可間之勢而不間者湯武行之為大義非湯武而行之為失機此仁人君子之大患也吕溫以為孔明承桓靈之後不可彊民以思漢欲其播告天下之民且曰曹氏利汝吾事之害汝吾誅之不知蜀之與魏果有以大過之乎苟無以大過之而又決不能事魏則天下安肯以空言竦動哉嗚呼此書生之論可言而不可用也韓愈論聖人之道有趨其名而好之者有安其實而樂之者珠璣犀象天下莫不好奔走悉力爭鬬奪取其好之不可謂不至也然不知其所以好之之實至於粟米蔬肉桑麻布帛天下之人內之於口而知其所以為美被之於身而知其所以為安此非有所役乎其名也韓愈之於聖人之道蓋亦知好其名矣而未能樂其實何者其為論甚髙其待孔子孟軻甚尊而拒楊墨佛老甚嚴此其用力亦不可謂不至也然其論至於理而不精支離蕩佚往往自叛其說而不知昔者宰我子貢有若更稱其師以為生民以來未有如夫子之盛雖堯舜之賢亦所不及其尊道好學亦已至矣然而君子不以為貴曰宰我子貢有若智足以知聖人之汙而已矣若夫顔淵豈亦云爾哉蓋亦曰夫子循循焉善誘人由此觀之聖人之道果不在於張而大之也韓愈者知好其名而未能樂其實者也愈之原人曰天者日月星辰之主也地者山川草木之主也人者夷狄禽獸之主也主而暴之不得其為主之道矣是故聖人一視而同仁篤近而舉逺夫聖人之所為異乎墨者以其有别焉耳今愈之言曰一視而同仁則是以待人之道待夷狄待夷狄之道待禽獸也而可乎教之使有能化之使有知是待人之仁也薄其禮而致其情不責其去而厚其來是待夷狄之仁也殺之以時而用之有節是待禽獸之仁也若之何其一之儒墨之相戾不啻若胡越而其疑似之間相去不能以髮宜乎愈之以為一也孔子曰泛愛衆而親仁仁者之為親則是孔子不兼愛也祭如在祭神如神在神不可知而祭者之心以為如其存焉則是孔子不明鬼也儒者之患患在於論性以為喜怒哀樂皆出於情而非性之所有夫有喜有怒而後有仁義有哀有樂而後有禮樂以為仁義禮樂皆出於情而非性則是相率而叛聖人之教也老子曰能嬰兒乎喜怒哀樂苟不出乎性而出乎情則是相率而為老子之嬰兒也儒者或曰老易夫易豈老子之徒歟而儒者至有以老子說易則是離性以為情者其弊固至此也嗟夫君子之為學知其人之所長而不知其蔽豈可謂善學邪東坡全集卷四十三
