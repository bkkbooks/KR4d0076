body:
  text: 東坡全集巻五十三宋蘓軾撰奏議二十七首繳詞頭奏狀六首范子淵元祐元年二月八日朝奉郎試中書舍人蘇軾狀奏今月八日准吏房送到詞頭一道司農少卿范子淵知兖州者右臣謹按子淵見為殿中侍御史吕陶彈奏為修堤開河糜費巨萬及䕶堤壓埽之人溺死無數自元豐六年興役七年而功用不成其罪甚於吳居厚蹇周輔乞行廢放今來差知兖州臣欲作責詞又縁吕陶奏狀已進呈訖别無行遣其兖州又是節鎮自來係監司以上差遣即非責降有罪去處臣欲不為責詞又縁子淵無故罷司農少卿出領外郡似縁上件彈奏有此疑惑乞明降指揮合與不合作責詞謹録奏聞伏候勅㫖吳荀元祐元年三月十六日朝奉郎試中書舍人蘇軾狀奏今月十六日准吏房送到詞頭一道朝散郎吳荀可廣東運判者右臣聞孟子曰觀逺臣以其所主近日朝廷進監司全用舉主如吳荀者名迹無聞而舉主三人乃吕恵卿楊汲黄履履之為人朝論不以正人待之如恵卿汲窮姦積惡不待臣言而知今乃擢其所舉使臨按一道臣實未曉其説所有告詞臣未敢撰謹録奏聞伏候勅㫖沈起元祐元年三月二十二日朝奉郎試中書舍人蘇軾狀奏今月二十二日准刑房送到詞頭一道三省同奉聖㫖沈起與叙朝散郎監嶽廟者右臣伏見熈寧以來王安石用事始求邊功構隙四夷王韶以熈河進章惇以五溪用熊本以瀘夷奮沈起劉彞聞而效之結怨交蠻兵連禍結死者數十萬人蘇緘一家坐受屠滅至今二廣創痍未復先帝始欲戮此二人以謝天下而王安石等曲加庇䕶得全首領巳為至幸元豐六年三月二十四日聖㫖沈起所犯深重永不叙用天下傳誦以為至當此乃先帝不刋之語非今日以即位之恩所得赦也沈起與彞各負天下生靈數十萬性命雖廢錮終身猶未塞責近者只因稍用劉彞起不自量輒敢披訴妄以罪釁併歸於彞攀援把持期於必得臣謂安南之役起實造端而彞繼之法有首從而彞吏幹學術猶有可取如起人材猥下素行憸嶮慶州兵叛起守永興流言始聞披甲乗城驚動三輔㡬致大變所至治狀人以為笑知杭州日措置為乖方致災傷之民死倍他郡與張靚等違法燕飲交私靡所不至朝廷用彞既不允公議而况於起萬無可赦之理今以一朝散郎監嶽廟誠不足計較竊哀先帝至明至當不刋之語輕就改易誠不忍下筆草詞遂使四方羣小隂相慶幸吕恵卿沈括之流亦有可起之漸為害不細伏望聖明深念先帝永不叙用之詔未可改易而數十萬人性命之寃亦未可忽忘明詔有司今後有敢為起等輩乞叙用者坐之所有告詞臣未敢撰謹録奏聞伏候勅㫖陳繹元祐元年四月二十三日朝奉郎試中書舍人蘇軾同朝請大夫試中書舍人范百禄狀奏今月二十二日准吏房送到詞頭内知建昌軍陳繹奉聖㫖差知兖州者右臣等勘㑹陳繹知廣州日私自取索用市舶庫乳香斤兩至多本犯極重以元勘不盡至薄其罪外買生羊寄屠行令供肉計虧價錢三十七貫有餘州宅元供養檀木觀音一尊繹别造杪木胎者貨易入巳計虧官錢二貫文係自盗贓一匹二丈合准例除名縱男役將下禁軍織造坐褥不令赴教縱男與道士何徳順游從繹曲庇何徳順弟何迪偷税金四百兩事不㫁抽罰不覺察公使庫破男并隨行助教供給食錢以公使榖養白鷴係竊盗自守不盡贓罪杖其餘罪犯難以悉陳奉勅陳繹落職降官知建昌軍其詞畧曰蔽罪至於除名論贓至於自盗臣等謹按繹資性傾險士行鄙惡當時所犯自合除名建昌之命已犯公議豈宜收録復典大邦非惟必致人言亦恐奸邪復用其漸可畏所有誥命不敢依撰詞謹録奏聞伏候勅㫖貼黄再詳陳繹元犯若依法㫁自盗除名雖後來累該需恩登極大赦其叙法止於散官即與其他贓犯不同既以貸其除名今復與之大郡將使貪墨無恥復蠧兖民非朝廷為民設官慎選守長之意張誠一元祐元年五月十八日朝奉郎試中書舍人蘇軾同范百禄狀奏今月十八日准本省刑房送到詞頭一道奉聖㫖張誠一邪險害政有虧孝行追觀察使遥郡防禦團練使刺史依舊客省使提舉江州太平觀發赴本任者右臣等看詳張誠一無故多年不𦵏親母既非身任逺官又非事力不及冒寵忘親清議所棄猶獲提舉宫觀已駭物聴况諫官本言誠一開父棺槨掠取財物使誠有之雖肆諸市朝猶不為過使誠無之亦當為誠一辨明縁事係惡逆不道非同尋常罪犯可以不盡根究今既體量未見歸著即合置司推鞠盡理施行所有告命臣等未敢撰詞謹録奏聞伏候勅㫖貼黄據京西提刑司體量文字稱誠一取父排方犀腰帶縁𦵏埋嵗乆須令工匠重行裝釘是時誠一任宻院副都承㫖當直人從皆可考驗及慮棺柩内更有賊人盗不盡物為誠一等私竊收藏其族人當有知者臣等欲乞詳酌依上件事理根究施行李定元祐元年五月十八日朝奉郎試中書舍人蘇軾同范百禄狀奏今月十八日准本省刑房送到詞頭一道奉聖㫖李定備位侍從終不言母為誰氏强顔匿志冒榮自欺落龍圖閣直學士守本官分司南京許於揚州居住者右臣等看詳李定所犯若初無人言即止是身負大惡今既言者如此朝廷勘㑹得實而使無毋不孝之人猶得以通議大夫分司南京即是朝廷亦許如此等類得據髙位傷敗風教為害不淺兼勘㑹定乞侍養時父年八十九嵗於禮自不當從定若不乞必致人言獲罪不輕豈可便將侍養折當心喪考之禮法須合勒令追服所有告命臣等未敢撰詞謹録奏聞伏候勅㫖貼黄准律諸父母喪匿不舉哀者流二千里今定所犯非獨匿而不舉又因人言遂不認其所生若舉輕明重即定所坐難議於流二千里已下定㫁乞罷詳定役法劄子元祐元年五月二十五日朝奉郎試中書舍人蘇軾劄子奏臣近奏為論招差衙前利害所見偏執乞罷詳定役法尋奉聖㫖依所乞今來給事中胡宗愈却封還上件聖㫖切縁聖㫖本縁臣自知偏執乞罷即非朝廷以臣異議罷臣胡宗愈不知悞有論奏重念臣前來議論委是踈濶又况衙前招之與差所係利害至重非止是役法中一事臣既不同决難隨衆簽書伏乞依前降指揮早賜罷免取進止申省乞罷詳定役法狀元祐元年五月某日朝奉郎試中書舍人蘇軾狀申右軾近奏言招差衙門利害葢縁所見偏執是致所議不同理當黜責若朝廷察其愚忠非是固立異議即乞早賜罷免詳定役法差遣所貴議論歸一謹具申三省伏候指揮薦朱長文劄子元祐元年六月二十五日朝奉郎試中書舍人蘇軾同鄧温伯胡宗愈孫覺范百禄等劄子奏臣等伏見前許州司戸㕘軍蘇州居住朱長文經明行脩嘉祐四年乙科登第墮馬傷足隠居不仕今三十年不以勢利動其心不以窮約易其介安貧樂道闔門著書孝友之誠風動閭里亷髙之行著於東南本路監司本州長吏前後累奏稱其士行經術乞朝廷旌擢差充蘇州州學教授未䝉施行近奉詔中外臣僚自監察御史已上並舉堪充内外學官二人此實朝廷博求人方廣育士類之意如長文者誠不可多得其人行年五十餘昔苦足疾今亦能履臣等欲望聖慈褒難進之節收乆廢之材量能而使之特賜就差充蘇州州學教授非惟禄餼賙養一鄉之善士實使道義模範彼州之秀民取進止貼黄伏乞特賜檢㑹新除楚州州學教授徐積體例施行論樁管坊場役錢劄子元祐元年六月某日朝奉郎試中書舍人蘇軾白劄子應坊場河渡錢及方郭人户鄉村單丁女户官户寺觀所出役錢及量添酒錢並作一處樁管通謂之坊場等錢並用支酬衙前召募綱運官吏接送雇人及應縁衙役人諸般支使如本州不足即申本路於别州移用如本路不足即申户部於别路移用如府縣即縣申提㸃司提㸃司申戸部其有餘去處不得為見有餘分外支破其不足去處亦不得為見不足將合召募人却行差撥乞詳酌指揮論諸處色役輕重不同劄子元祐元年六月某日朝奉郎試中書舍人蘇軾白劄子勘㑹逐處色役各隨本處土俗事宜輕重不同借如盗賊多處以弓手耆長為重賦税難催處以户長為重士人不閑書算處以曹司為重難以限定等第一槩立法今來若是衙前召募得足即須將以次重役於第一等户内差撥欲乞立下項條貫諸處色役委本路監司與逐處官吏同共相度立本處色役輕重髙下次第將最重役從上差撥乞詳酌指揮議富弼配享狀元祐元年六月某日朝奉郎試中書舍人蘇軾同孫永李常韓忠彦王存鄧温伯劉摰陸佃傅堯俞趙瞻趙彦若崔合符王克臣謝景温胡宗愈孫覺范百禄鮮于侁梁燾顧臨何洵直孔文仲范祖禹辛公祐吕希純周秩顔復江公著狀奏近准勅節文中書省尚書省送禮部狀本部勘㑹英宗配享所有神宗皇帝廟後降勅以韓琦曾公亮配享所有神宗皇帝神主祔廟所議配享功臣今乞待制以上及秘書省長貳著作與禮部郎官并太常寺博士以上同議奉聖㫖依右臣等謹按商書茲予大享于先王爾祖其從與享之周官凢有功者名書於王之太常祭于大烝司勲詔之國朝祖宗以來皆以名臣侑食清廟歴選勲徳實難其人神宗皇帝以上聖之資恢累聖之業尊禮故老共圖大治輔相之臣有若司徒贈太尉諡文忠富弼秉心直諒操術閎逺歴事三世計安宗社熈寧訪落眷遇特隆匪躬正色進退以道愛君之志雖没不忘以配享神宗皇帝廟廷實為宜稱謹録奏聞伏候勅㫖再乞罷詳定役法狀元祐元年七月二日朝奉郎試中書舍人蘇軾狀奏右臣先曾奏論衙前一役只當招募不當定差執政不以為然臣等奏乞罷免臣詳定役法奉聖㫖不許經今月餘前所論奏並不䝉施行而臣愚惷終執所見近又竊見吏部尚書孫永奏駁臣所論葢是臣愚闇無狀上與執政不同下與本局異議若不罷免即執政亦欲立法無縁得成况今來季限已滿諸路立法文字節次到局全藉通曉協同之人共力裁定如臣乖異必害成法乞早賜指揮罷免所有臣固違聖㫖之罪亦乞施行謹録奏聞伏候勅㫖申省乞不定奪役法議狀元祐元年七月某日朝奉郎中書舍人蘇軾狀申軾近奏乞罷詳定役法已奉聖㫖依奏竊見孫給事奏繳前件聖㫖乞取孫尚書及軾所議付臺諫給舍郎官定其是否然後罷其不可者須至申乞指揮右軾前後所論役法事軾已自知疎繆决難施行所有是否更無可定奪只乞依前降指揮行下軾自今月已後更不敢赴詳定所簽書公事伏乞早賜施行謹具申中書省伏候指揮乞留劉攽狀元祐元年七月二十三日朝奉郎試中書舍人蘇軾同胡宗愈孫覺范百禄等狀奏右臣等伏見朝議大夫直龍圖閣劉攽近自襄陽召還祕省旋以病乞出守蔡州自受命以來日就痊損假以數月必復康强謹按攽名聞一時身兼數器文章爾雅博學强記政事之美如古循吏流離困躓守道不囘此皆朝廷之所知不待臣等區區誦説但以人才之難古今所病舊臣日已衰老而新進長育未成如攽成材反在外服此有志之士所宜為朝廷惜也欲望聖慈留攽京師更賜數月之告稍加任使必有過人臣等備員侍從懷不能已冒昧陳論伏候誅譴謹録奏聞伏候勅㫖繳楚建中户部侍郎詞頭狀元祐元年七月十九日朝奉郎試中書舍人蘇軾等狀奏今月二十八日准中書吏房送到詞頭一道正議大夫充天章閣待制致仕楚建中可户部侍郎者右臣竊惟七十致政古今通義非獨人臣有始終進退之分亦在朝廷為禮義亷恥之風若起之於既謝之年待之以不次之任即須國家有非常之政而其人有絶俗之資才望既隆中外自服近者起文彦博天下屬目四夷革心豈有凢才之流亦塵盛徳之舉如建中軰决非其人竊料除目一傳必致羣言交上幸其未布可以追囘所有前件告詞臣未敢撰謹録奏聞伏候勅㫖乞不給青苗錢斛狀元祐元年八月四日朝奉郎試中書舍人蘇軾狀奏准中書録黄先朝初散青苗本為利民故當時指揮並取人户情願不得抑配自後因提舉官速要見功務求多散諷脅州縣廢格詔書名為情愿其實抑配或舉縣勾集或排門抄劄亦有無頼子弟謾昧尊長錢不入家亦有他人冒名詐請莫知為誰及至追催皆歸本户朝廷深知其弊故悉罷提舉官不復立額考校訪聞人情安便昨於四月二十六日有勅令給常平錢斛限二月或正月只為人戸欲借請者及時得用又令半留倉庫半出給者只為所給不得輒過此數至於取人户情愿亦不得抑配一遵先朝本意慮恐州縣不曉朝廷本意將為朝廷復欲多散青苖錢榖廣收利息勾集抑配督責嚴急一如向日置提舉官時八月二日三省同奉聖㫖令諸路提㸃刑獄司告示州縣並須候人户自執狀結保赴縣乞請常平錢榖之時方得勘㑹依條支給不得依前勾集抄劄强行抑配仍仰提㸃刑獄常切覺察如有官吏似此違法騷擾者即時取勘施行若提㸃刑獄不切覺察委轉運安撫司覺察聞奏仍先次施行者右臣伏見熈寧以來行青苗免役二法至今二十餘年法日益弊民日益貧刑日益煩盗日益熾田日益賤榖帛日益輕細數其害有不可勝言者今廊廟大臣皆異時痛心疾首流涕太息欲巳其法而不可得者况二聖恭已惟善是從免役之法已盡革去而青苗一事乃獨因舊稍加損益欲行紾臂徐徐月攘一雞之道如人服藥病日益增體日益羸飲食益减而終不言此藥之不可服但損其分劑變其湯使而服之可乎熈寧之法本不許抑配而其害至此今雖復禁其抑配其害故在也農民之家量入為出縮衣節口雖貧亦足若令分外得錢則費用自廣何所不至况子弟欺謾父兄人户冒名詐請如詔書所云以此之類本非抑勒所致昔者州縣並行倉法而給納之際十費二三今既罷倉法不免乞取則十費五六必然之勢也又官吏無狀於給散之際必令酒務設鼔樂倡優或闗撲賣酒牌子農民至有徒手而歸者但毎散青苗即酒課暴增此臣所親見而為流涕者也二十年間因欠青苗至賣田宅雇妻女投水自縊者不可勝數朝廷復忍行之歟臣謂四月二十六日指揮以散及一半為額與熈寧之法初無小異而今月二日指揮猶許人户情願請領未勉於設法綱民使快一時非理之用而不慮後日催納之患二者皆非良法相去無㡬也今者已行常平糶糴之法恵民之外官亦稍利如此足矣何用二分之息以賈無窮之怨或云議者以為帑廪不足欲假此法以贍邊用臣不知此言虚實若果有之乃是小人之邪説不可不察昔漢宣帝世西羌反議者欲使民入榖邊郡以免罪蕭望之以為古者藏於民不足則取有餘則與西邊之役雖户賦口斂以瞻其乏古之通義民不以為非豈可遂開利路以傷既成之化仁宗之世西師不解葢十餘年不行青苗有何妨闕况二聖恭儉清心省事不求邊功數年之後帑廩自溢有何危急而以萬乗君父之尊負放債取利之謗錐刀之末所得㡬何臣雖至愚深為朝廷惜之欲乞特降指揮青苗錢斛今後更不給散所有已請過錢斛候豐熟日分作五年十料隨二税送納或乞聖慈念其累嵗出息巳多自第四等以下人户並與放免庶使農民自此息肩亦免後世有所譏議兼近日謫降吕恵卿告示云首建青苗力行助役若不盡去其法必致奸臣有詞流傳四方所損不細所有上件録黄臣未敢書名行下謹録奏聞伏候勅㫖論毎事降詔約束狀元祐元年九月某日翰林學士朝奉郎知制詔蘇軾狀奏右臣聞之孔子曰天何言哉四時行焉百物生焉天何言哉天子法天恭已正南面守法度信賞罰而天下治三代令王莫不由此若天下大事安危所係心之精微法令有不能盡則天子乃言在三代為訓誥誓命自漢以下為制詔皆所以鼔舞天下不輕用也若毎行事立法之外必以王言隨而丁寧之則是朝廷自輕其法以為不丁寧則未必行也言既屢出雖復丁寧人亦不信今者十科之舉乃朝廷政令之一耳況已立法或不如所舉舉主從貢舉非其人律犯正入已贓舉主减三等坐之若受賄徇私罪名重者自從重雖見為執政亦降官示罰臣謂立法不為不重若以為未足又從而降詔不勝降矣臣請畧舉今年朝廷所行薦舉之法舉之法凢有七事舉轉運提刑一也舉館職二也舉通判三也舉學官四也舉重法縣令五也舉經明行脩六也與十科為七七事輕重畧等若十科當降詔則六事不可不降今後一事一詔則䙝慢王言莫甚於此若但取諌官之意或降或否則其義安在臣願戒勅執政但守法度信賞罰重惜王言以待大事而發則天下聳然敢不敬應所有前件降詔臣不敢撰謹録奏聞伏候勅㫖乞加張方平恩禮劄子元祐元年十月某日翰林學士朝奉郎知制誥蘇軾劄子奏臣伏見太子太保致仕張方平以髙才絶識博學雄文出入中外四十餘年號稱名臣仁宗皇帝眷遇至重特以受性剛簡論髙寡合故齟齬於世然趙元昊反西方用兵累嵗不解公私疲極方平首建和戎之策仁宗從之民以息肩書之國史又於熈寧之初首論王安石不可用及新法之行方平皆逆陳其害大節如此其餘政事文學有補於世未易悉數神宗皇帝知人之明擢為執政㑹丁憂服除為安石等不悦而方平亦不為少屈故不復用今已退老南都以患眼不出灰心槁行與世相忘臣竊以為國之元老歴事四朝耄期稱道為天下所服者獨文彦博與方平范鎮三人而已今彦博在廷鎮亦復用方平雖老杜門難以召致猶當加恩勞問表異其人以示二聖貴老尊賢之義今獨置而不問有識共疑以為闕典願因大禮之後以向者召陪祠不至特出聖意少加恩禮或遣使就問國事覩其所論必有過人臣忝備禁近不敢自外冒昧陳列戰越待罪取進止論冗官劄子元祐元年十月二十三日翰林學士朝奉郎知制誥蘇軾劄子奏臣伏見近日言者以吏部員多闕少欲清入仕之源救官冗之弊裁减任子及進士累舉之恩流外入官之數巳有㫖下吏部禮部與給舍詳議臣竊謂此數者行之則人情不悦不行則積弊不去要當求其分義務適厥中使國有去弊之實人無失職之歎然後為得也欲乞應任子及進士累舉免解恩例並一切如舊只行下項一奏䕃文官人毎遇科場依進士法試大義策論如係武官即試弓馬或試法並三人中解一人仍年及二十五已上方得出官内已舉進士得解者免試如三試不中年及二十五已上亦許出官應試大義策論及試法者在京隨進士赴國學在外赴轉運司試弓馬者在京隨武舉人赴武學在外轉運司差官一進士累舉免解合推恩者並約嘉祐以前内中數目立為定額如所試優長係額内人數即等第推恩並許出官如係額外即並與一不出官名銜一流外入官人除近已有㫖裁减三省恩例外其餘六曹寺監等處及州郡監司人吏出職者並委官取索文字看詳有無僥倖定奪酌中恩例右若行此數者則任子雖有三試滯留之艱而無終身絶望之歎亦使人人務學文臣知經術時務武臣閑弓馬法律皆有益於事而進士累舉有詞學人自得出官若無所能得虛名一官免為白丁亦無所恨如有可採乞降下與前文字一處詳議取進止辯試館職策問劄子二首元祐元年十二月十八日翰林學士朝奉郎知制誥蘇軾劄子奏臣竊聞諫官言臣近所撰試館職人策問有涉諷議先朝之語臣退伏思念其畧曰今朝廷欲師仁祖之忠厚而患百官有司不舉其職或至於媮欲法神考之勵精而恐監司守令不識其意流入於刻臣之所謂媮與刻者専指今之百官有司及監司守令不能奉行恐致此病於二帝何與焉至於前論周公太公後論文帝宣帝皆是為文引證之常亦無比擬二帝之意况此策問第一第二首邵伯温之詞末篇乃臣所撰三首皆臣親書進入䝉御筆㸃用第三首臣之愚意豈逃聖鑒若有毫髮諷議先朝則臣死有餘罪伏願少回天日之照使臣孤忠不為衆口所鑠臣無任伏地待罪戰恐之至取進止又元祐二年正月十七日翰林學士朝奉郎知制誥蘇軾劄子奏臣近以試館職策問為臺諌所言臣初不敢深辯葢以自辯而求去是不欲去也今者竊聞明詔已察其實而臣四上章四不允臣子之義身非已有詞窮理盡不敢求去是以區區復一自言臣所撰䇿問首引周公太公之治齊魯後世皆不免衰亂者以明子孫不能奉行則雖大聖大賢之法不免於有弊也後引文帝宣帝仁厚而事不廢核實而政不苛者以明臣子若奉行得其理無觀望希合之心則雖文帝宣帝足以無弊也中間又言六聖相受為治不同同歸於仁其所謂媮與刻者専謂今之百官有司及監司守令不識朝廷所以師法先帝之本意或至於此也文理甚明粲若黑白何甞有毫髪疑似議及先帝非獨朝廷知臣無罪可放臣亦自知無罪可謝也然臣聞之古人曰人之至信者心目也相親者母子也不惑者聖賢也然至於竊斧而知心目之可亂於投杼而知母子之可疑於拾煤而知聖賢之可惑今言臣者不止三人交章累上不啻數十而聖㫁確然深明其無罪則是過於心目之相信母子之相親聖賢之相知逺矣徳音一出天下頌之史冊書之自耳目所聞見明智特達洞照情偽未有如陛下者非獨微臣區區欲以一死上報凢天下之為臣子者聞之莫不欲碎首糜軀効忠義於陛下也不然者亦非獨臣受曖昧之謗凢天下之為臣子者聞之莫不以臣為戒崇尚忌諱畏避形迹觀望雷同以求茍免豈朝廷之福哉臣自聞命以來一食三歎一夕九興身口相謀未知死所然臣所撰䇿問實亦有罪若不盡言是欺陛下也臣聞聖人之治天下也寛猛相資君臣之間可否相濟若上之所可不問其是非下亦可之上之所否不問其曲直下亦否之則是晏子所謂以水濟水誰能食之孔子所謂惟予言而莫子違足以喪邦者也臣昔於仁宗朝舉制科所進策論及所答聖問大抵皆勸仁宗勵精庶政督察百官果㫁而力行也及事神宗䝉召對訪問退而上書數萬言大抵皆勸神宗忠恕仁厚含垢納汙屈已以裕人也臣之區區不自量度常欲希慕古賢可否相濟葢如此也伏觀二聖臨御已來聖政日新一出忠厚大率多行仁宗故事天下翕然銜戴恩徳固無可議者然臣私憂過計常恐百官有司矯枉過直或至於媮而神宗勵精核實之政漸致惰壞深慮數年之後馭吏之法漸寛理財之政漸疎備邊之計漸弛則意外之憂有不可勝言者雖陛下廣開言路無所諱忌而臺諫所擊不過先朝之臣所非不過先朝之法正是以水濟水臣竊憂之故輒用此意撰上件策問實以譏諷今之朝廷及宰相臺諫之流欲陛下覽之有以感動聖意庶㡬兼行二帝忠厚勵精之政也臺諫若以此言臣朝廷若以此罪臣則斧鉞之誅其甘如薺今乃以為譏諷先朝則亦疎而不近矣且非獨此䇿問而已今者不避煩凟盡陳本末臣前嵗自登州召還始見故相司馬光光即與臣論當今要務條其所欲行者臣即答言公所欲行者諸事皆上合天心下合人望無可疑者惟役法一事未可輕議何則差役免役各有利害免役之害掊斂民財十室九空錢聚於上而下有錢荒之患差役之害民常在官不得専力於農而貪吏猾胥得縁為奸此二害輕重葢畧相等今以彼易此民未必樂光聞之愕然曰若如君言計將安出臣即答言法相因則事易成事有漸則民不驚昔三代之法兵農為一至秦始分為二及唐中葉盡變府兵為長征之卒自爾以來民不知兵兵不知農農出榖帛以養兵兵出性命以衛農天下便之雖聖人復起不能易也今免役之法實大類此公欲驟罷免役而行差役正如罷長征而復民兵葢未易也先帝本意使民戸率出錢專力於農雖有貪吏滑胥無所施其虐坊場河渡官自出賣而以其錢雇募衙前民不知有倉庫綱運破家之禍此萬世之利也决不可變獨有二弊多以供他用實封取寛剰役錢争買坊埸河渡以長不實之價此乃王安石吕恵卿之隂謀非先帝本意也公若盡去二弊而不變其法則民悦而事易成今寛剰錢名為十分取二通計天下乃及十五而其實一錢無用公若盡去此五分又使民得從其便以布帛榖米折納役錢而官亦以為雇直則錢荒之弊亦可盡去如此而天下便之則公又何求若其未也徐更議之亦未晩也光聞臣言大以為不然臣又與光言熈寧中常行給田募役法其法以係官田及以寛剰役錢買民田以募役人大畧如邊郡弓箭手臣時知宻州推行其法先募弓手民甚便之此本先帝聖意所建推行未㡬為左右異議而罷今畧計天下寛剰錢斛約三千萬貫石兵興支用僅耗其半此本民力當復為民用今内帑山積公若力言於上索還此錢復完三千萬貫石而推行先帝買田募役法於河北河東陜西三路數年之後三路役人可减大半優裕民力以待邊鄙緩急之用此萬世之利社稷之福也光尤以為不可此三事臣自别有畫一利害文字甚詳今此不敢備言及去年二月六日勅下始行光言復差役法時臣弟轍為諫官上疏具論乞將見在寛剰役錢雇募役人以一年為期令中外詳議然後立法又言衙前一役可即用舊人仍一依舊數支月給重難錢以坊場河渡錢總計諸路通融支給皆不䝉施行及䝉差臣詳定役法臣因得伸弟轍前議先與本局官吏孫永傅堯俞之流論難反復次於西府及政事堂中與執政商議皆不見從遂上疏極言衙前可雇不可差先帝此法可守不可變之意因乞罷詳定役法當此之時臺諫相視皆無一言决其是非今者差役利害未易一二遽言而弓手不許雇人天下之所同患也朝廷知之已變法許雇天下皆以為便而臺諫猶累疏力争由此觀之是其意専欲變熈寧之法不復校量利害參用所長也臣為中書舍人刑部大理寺列上熈寧已來不該赦降去官法凢數十條盡欲刪去臣與執政屢争之以謂先帝於此葢有深意不可盡改因此得存留者甚多臣毎行監司守令告詞皆以奉守先帝約束毋敢弛廢為戒文案具在皆可復按由此觀之臣豈謗議先朝者哉所以一一屢陳者非獨以自明誠見士大夫好同惡異冺然成俗深恐陛下深居法宫之中不得盡聞天下利害之實也願因臣此言警策在位救其所偏損所有餘補所不足天下幸甚若以其狂妄不識忌諱雖賜誅戮死且不朽臣無任感恩思報激切戰恐之至取進止繳進給田募役議劄子前連元豐八年十二月奏狀元祐二年二月一日翰林學士朝奉郎知制誥蘇軾劄子奏臣前年十二月自登州召還草此奏狀而未果上近因論事巳具奏聞其畧竊謂今日尚可推行輒備録前狀繳進申奏臣前年過鄆州本與京東轉運使范純粹同建此議純粹令臣發之已當繼之已而聞執政議不合故不復言然純粹講此事尤為精詳臣所不及若朝廷看詳此狀可以施行即乞更下純粹令具利害條奏取進止論改定受冊手詔乞罷劄子元祐二年二月七日翰林學士朝奉郎知制誥蘇軾劄子奏臣近被㫖撰太皇太后將來只於崇政殿受冊手詔臣愚亦恐有是今非昔之嫌故其畧云朝廷損益之文各從宜稱所以推廣聖明謙抑退托之意言此文徳受冊之禮於今為過於昔為稱也不悟文詞鄙淺未盡聖意致煩改定謹按故事凢詞命有所改易為不稱職皆當罷去伏望聖慈察其衰病廢學特賜解職以安微分臣無任待罪之至取進止乞録用鄭俠王斿狀元祐二年三月日翰林學士朝奉郎知制誥蘇軾狀奏右臣聞國之興衰繋於習俗若風節不競則朝廷自卑故古之賢君必勵士氣當務求難合自重之士以養成禮義亷恥之風臣等伏見英州别駕鄭俠向以小官觸犯權要冒死不顧以獻直言而祕閣校理王安國以布衣為先皇帝所知擢至館閣召對便殿而兄安石為相若少加附㑹可立至富貴而安國挺然不屈不獨納忠於先帝亦嘗以苦言至計規戒其兄竟坐與俠遊從同時被罪吕惠卿首興大獄鄧綰舒亶之徒構成其罪必欲置此人于死頼先帝仁聖止加竄逐曾未數年逐惠卿而起安國今來朝廷赦俠之罪復其舊官經今踰年而俠終不赴吏部參選考其始終出處之大節合於古之君子殺身成仁難進易退之義朝廷若不少加優異則臣等恐俠浩然江湖往而不返若溘先朝露則有識必為朝廷興失士之歎至於安國不幸短命尤為忠臣義士之所哀惜臣等甞識其少子斿敏而篤學直而好義頗有安國之風養成其才必有可用欲望聖慈召俠赴闕及考察斿行實與俠並賜録用不獨旌直臣於九泉之下亦所以作士氣於當代也謹録奏聞伏候勅㫖薦布衣陳師道狀元祐二年四月十九日翰林學士朝奉郎知制誥蘇軾同傅堯俞孫覺狀奏右臣等伏見徐州布衣陳師道文詞髙古度越流輩安貧守道若將終身茍非其人義不往見過壯未仕實為遺才欲望聖慈特賜録用以奬士類兼臣軾臣堯俞皆曾以十科薦師道伏乞檢㑹前奏一處施行謹録奏聞伏候勅㫖乞留顧臨狀元祐二年四月二十日翰林學士朝奉郎知制誥蘇軾同李常王存邵伯温孫覺胡宗愈狀奏右臣等竊見給事中顧臨資性方正學有根本慷慨中立無所阿撓自供職以來封駁議論凛然有古人之風僥倖之流側目畏憚近聞除天章閣待制充河北都轉運使逺去朝廷衆所嗟惜方今二聖臨御肅正紀綱如臨等輩正當置之左右以輔闕遺或者謂縁黄河輟臨幹治臨之所學實有大於治河治河之才固有出臨之上者欲望朝廷别選深知河事者以使河北且留臨在朝廷以盡忠亮補益之節臣等備位侍從懷有所見不敢不盡謹録奏聞伏候勅㫖東坡全集巻五十三
