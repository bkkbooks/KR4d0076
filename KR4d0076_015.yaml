body:
  text: 東坡全集卷十五宋蘇軾撰詩七十二首寄蘄簞與蒲傳正蘭溪美箭不成笛離離玉筯排霜脊千溝萬縷自生風入手未開先慘栗公家列屋閒蛾眉珠簾不動花隂移霧帳銀牀初破睡牙籖玉局坐彈棊東坡病叟長羈旅凍卧饑吟似饑鼠倚賴春風洗破衾一夜雪寒披故絮火冷燈青誰復知孤舟兒女自嚘咿皇天何時反炎燠愧此八尺黃琉璃願公淨掃清香閣卧聽風漪聲滿榻習習還從兩腋生請公乘此朝閶闔寄怪石石斛與魯元翰山骨裁方斛江珍拾淺灘清池上几案碎月落杯盤老去懷三友平生困一簞堅姿聊自警秀色亦堪餐好去髯卿舍慿將道眼看東坡最後供霜雪照人寒漁父四首漁父飲誰家去魚蟹一時分付酒無多少醉為期彼此不論錢數漁父醉蓑衣舞醉裏却尋歸路輕舟短棹任斜橫醒後不知何去漁父醒春江午夢斷落花飛絮酒醒還醉醉還醒一笑人間今古漁父笑輕鷗舉漠漠一江風雨江邊騎馬是官人借我孤舟南渡李憲仲哀詞并叙同年友李君諱惇字憲仲賢而有文不幸早世軾不及與之游也而識其子豸有年矣豸自陽翟見余於南京泣曰吾祖母邊母馬前母張與君之喪皆未葬貧不敢以饑寒為戚顧四喪未舉死不瞑目矣適㑹故人梁先吉老聞余當歸耕陽羡以絹十匹絲百兩為贐辭之不可乃以遺豸曰此亦仁人之餽也既又作詩以告知君與豸者庶幾皆有以助之豸年二十五其文蔚然氣節不凡此豈終窮者哉大夢行當覺百年特未滿遑哀巳逝人長眠寄孤館念我同年生意長日月短鹽車困騏驥烈火廢圭瓉後生有竒骨出語巳精悍蕭然野鶴姿誰復識中散有生寓大塊死者誰不窽嗟君獨久客不識黃土暖推衣助孝子一溉滋湯旱誰能脫左驂大事不可緩贈眼醫王生彥若針頭如麥芒氣出如車軸間關絡脉中性命寄毛粟而况清淨眼內景含天燭琉璃貯沆瀣輕脆不任觸而子於其間來往施鋒鏃笑談紛自若觀者頸為縮運針如運斤去翳如拆屋常疑子善幻他技雜符祝子言吾有道此理君未矚形骸一塵垢貴賤兩草木世人方重外妄見瓦與玉而我初不知刺眼如刺肉君看目與翳是翳要非目目翳苟二物易分如麥菽寧聞老農夫去草更傷榖鼻端有餘地肝膽分楚蜀吾於五輪間蕩蕩見空曲如行九軌道並驅無擊轂空花誰開落明月自朏朒請問樂全堂忘年老尊宿彥若樂全先生門下醫也與歐育等六人飲酒忽驚春色二分空且看樽前半丈紅苦戰知君便白羽倦逰憐我憶黃封年來齒髮老未老此去江淮東復東記取六人相㑹處引杯看劍坐生風觀杭州鈐轄歐育刀劒戰袍青綾納衫暖襯甲紅線勒巾光繞脅秃襟小袖鵰鶻盤大刀長劒龍蛇插兩軍鼓噪屋瓦墜紅塵白羽紛相戛將軍恩重此身輕笑履鋒鋩如一搯書生只肯坐帷幄談笑毫端弄生殺呌呼擊鼓催上竿猛士應憐小兒黠試問黃河夜偷渡掠面驚沙寒霎霎何如大艦日髙眠一枕清風過苕霅王伯敡所藏趙昌畫四首梅花南行渡關山沙水清練練行人巳愁絶日暮集微霰殷勤小梅花髣佛吳姬面暗香隨我去回首驚千片至今開畫圖老眼淒欲泫幽懷不可寫歸夢君家倩黃葵弱質困夏永奇姿蘇曉凉低昂黃金杯照耀初日光檀心自成暈翠葉森有芒古來寫生人妙絶誰似昌晨粧與午醉真態含隂陽君看此花枝中有風露香芙蓉清飇巳拂林積水漸收潦溪邊野芙蓉花水相媚好坐看池蓮盡獨伴霜菊槁幽姿强一笑暮景迫摧倒淒涼似貧女嫁晚驚衰早誰寫少年容樵人劒南老山茶蕭蕭南山松黃葉隕徑風誰憐兒女花散火冰雪中能傳嵗寒姿古來惟丘翁趙叟得其妙一洗膠粉空掌中調丹砂染此鶴頂紅何須誇落墨獨賞江南工寄吳德仁兼簡陳季常東坡先生無一錢十年家火燒凡鉛黃金可成河可塞只有霜鬢無由𤣥龍丘居士亦可憐談空說有夜不眠忽聞河東獅子吼拄杖落手心茫然誰似濮陽公子賢飲酒食肉自得仙平生寓物不留物在家學得忘家禪門前罷亞十頃田清溪繞屋花連天溪堂醉卧呼不醒落花如雪春風顛我逰蘭溪訪清泉巳辦布襪青行纒稽山不是無賀老我自興盡回酒船恨君不識顔平原恨我不識元魯山銅駝陌上㑹相見握手一笑三千年題王逸少帖顛張醉素兩秃翁追逐世好稱書工何曽夢見王與鍾妄自粉飾欺盲聾有如市倡抹青紅妖歌嫚舞眩兒童謝家夫人淡丰容蕭然自有林下風天門蕩蕩驚跳龍出林飛鳥一掃空為君草書續其終待我他日不匆匆書林逋詩後吳儂生長湖山曲呼吸湖光飲山渌不論世外隱君子傭兒販婦皆氷玉先生可是絶俗人神清骨冷無由俗我不識君曾夢見瞳子瞭然光可燭遺篇妙字處處有步繞西湖看不足詩如東野不言寒書似西臺差少肉平生髙節巳難繼將死微言猶可録自言不作封禪書更肯悲吟白頭曲逋臨終詩云茂陵異日求遺草猶喜初無封禪書我笑吳人不好事好作祠堂傍修竹不然配食水仙王一盞寒泉薦秋菊和仲伯逹歸山嵗月苦無多尚有丹砂奈老何繡谷只應花自染鏡潭長與月相磨君方傍海看初日我巳橫江擊素波人不我知斯我貴不須雷雨起龍梭春日鳴鳩乳燕寂無聲日射西窗潑眼眀午醉醒來無一事只將春睡賞春晴贈袁陟是身如虛空萬物皆我儲胡為强分别百金買田廬不見袁夫子神馬載凥輿游於無何有一飯不願餘官湖為我池學舍為我居何以遺子孫此身自蘧蒢薰風暗楊柳秋水淨芙蕖應觀我知子不怪子知魚蘇子容母陳夫人挽詞蘇陳甥舅真氷玉正始風流起頽俗夫人髙節稱其家凛凛寒松映修竹雞鳴為善日日新八十三年如一晨豈惟家室宜壽母實與朝廷生異人忘軀狥國乃吾子三仕何曾知愠喜不煩擁笏强垂魚我視去來皆夢耳誦詩相挽真區區墓碑千字多遺餘他年太史取家傳知有班昭續漢書歸宜興留題竹西寺十年歸夢寄西風此去真為田舍翁剩覔蜀岡新井水要携鄉味過江東道人勸飲雞蘇水童子能煎鶯粟湯暫借藤牀與瓦枕莫教孤負竹風凉此生巳覺都無事今嵗仍逢大有年山寺歸來聞好語野花啼鳥亦欣然與孟震同逰常州僧舍年來轉覺此生浮又作三吳浪漫逰忽見東平孟君子夢中相對說黃州湛湛清池五月寒小山無數碧㠝岏稚杉戢戢三千本且作凌雲合抱看知君此去便歸耕笑指孤舟一葉輕待向三茆乞靈雨半篙流水送君行贈常州報恩長老碧玉碗盛紅碼瑙井花水養石菖蒲也知法供無窮盡試問禪師得飽無薦福老懷真巧便淨慈兩本更尖新慿師為作鐵門限凖備人間請話人次韻答賈耘老五年一夢南司州饑寒疾病為子憂東來六月井無水仰看古堰橫奔牛平生管鮑我知子今日陳蔡誰從丘夜航爭渡泥水澀牽挽直欲來瓜州自言嗜酒得風痺故鄉不敢居溫柔空將泛愛救溝壑衰病不復從前樂今年太守真卧龍笑語炎天出氷雹時低九尺蒼鬚髯我過三間小池閣故人改觀爭來賀小兒不信猶疑錯為君置酒飲且哦草間秋蟲亦能歌可憐老驥真老矣無心更秣天山禾墨花并叙世多以墨畫山水竹石人物者未有以畫花者也汴人尹白能之為賦一首造物本無物忽然非所難花心起墨暈春色散毫端縹眇形才具扶踈態自完蓮風盡傾倒杏雨半披殘獨有狂居士求為黑牡丹兼書平子賦歸向雪堂看送竹几與謝秀才平生長物擾天真老去歸田只此身留我同行木上坐贈君無語竹夫人但隨秋扇年年在莫鬭瓊枝夜夜新堪笑荒唐玉川子暮年家口若為親溪隂堂白水滿時雙鷺下緑槐髙處一蟬吟酒醒門外三竿日卧看溪南十畝隂次韻許遵蒜山渡口挽歸艎朱雀橋邊看道裝供帳巳應煩百兩擊鮮無久溷諸郎問禪時到長干寺載酒閒過緑野堂此味只憂兒輩覺逢人休道北窗凉贈章默并叙章默居士字志明生公侯家才性髙爽棄家求道不蓄妻子與世無纍而父母與兄之喪貧不能舉以是眷眷世間不能無求於人余深哀其志既有以少助之又取其言為詩以贈其行庶幾有哀之者章子親未葬餘生抱羸疾朝吟噎鄰里夜淚腐茵席前年黑花生今嵗白髮出身隨日月逝恨與天地畢願求不毛田親築長夜室難從王孫祼未忍夏后堲五陵多豪士百萬付一擲心知義財難甘就貧友乞不辭毛粟施行自丘山積此志苟朝遂夕死真不戚誓求無生理不踐有為迹棄身尸陀林烏鳥任狼籍送穆越州江海相忘十五年羡君松柏蔚蒼顔四朝耆舊氷霜後兩郡風流水石間舊政猶傳蜀父老先聲巳振越溪山樽前俱是蓬萊守莫放髙樓雪月閒贈葛葦竹椽茆屋半摧傾肯向蜂窠寄此生長恐波頭卷室去欲將船尾載君行小詩試擬孟東野大草閒臨張伯英消遣百年須底物故應憐我不歸耕贈王寂與君暫别不須嗟俯仰歸來鬢未華記取江南煙雨裏青山斷處是君家南都妙峰亭千尋挂雲闕十頃含風灣開門弄清泚照見雙銅鐶池臺半禾黍桃李餘榛菅無人肯回首日暮車班班史君非世人心與古佛閒時邀聲利客來洗塵埃顔新亭在東阜飛宇臨通闤古甃磨翠壁霜林散煙鬟孤雲抱商丘芳草連杏山俯仰盡法界逍遙寄人寰亭亭妙髙峯了了蓬艾間五老壓彭蠡三峰照潼關均為拳石小配此一掬慳煩公為標指免使勤躋攀神宗皇帝挽詞三首文武固天縱欽明又日新化民何止聖妙物獨稱神政巳三王上言皆六籍醇巍巍本無象刻畫愧孤臣未易名堯德何須數舜功小心仍致孝餘事及平戎典禮從周舊官儀與漢隆誰知本無作千古自承風接統真千嵗膺期止一章周南稍留滯宣室遂凄凉病馬空嘶櫪枯葵巳泫霜餘生卧江海歸夢泣嵩邙金山妙髙臺我欲乘飛車東訪赤松子蓬萊不可到弱水三萬里不如金山去清風半帆耳中有妙髙臺雲峰自孤起仰觀初無路誰信平如砥臺中老比丘碧眼照窗几巉巉玉為骨凜凜霜入齒機鋒不可觸千偈如翻水何須尋德雲即此比丘是長生未暇學請學長不死贈杜介并叙元豐八年七月二十五日杜幾先自浙東還與余相遇於金山話天台之異以詩贈之我夢逰天台橫空石橋小松風吹菌露翠濕香嫋嫋應真飛錫過絶澗度雲鳥舉意欲從之翛然巳松杪微言粲珠玊未說意先了覺來如墮空耿耿窗户曉羣生陷迷網獨逹從古少杜叟子何人長嘯萬物表妻孥空四壁振䇿念輕矯遂為赤城遊飛步凌縹眇問禪不歸舍屢為瓠壺繞何人識此志佛眼自照瞭我夢君見之卓爾非魔嬈仙葩發茗碗翦刻分葵蓼從今更不出閉户閒騕裊時從佛頂巖馳下雙蓮沼次韻孫莘老斗野亭寄子由在邵伯堰落帆謝公渚日腳東西平孤亭得小憩暮景含餘清坐待斗與牛錯落挂南甍老僧如夙昔一笑意巳傾新詩出故人舊事疑前生吾生七往來送老海上城逢人輒自哂得魚不忍烹似聞績溪老復作東都行小詩如秋菊艷艷霜中明過此感我言長篇發春榮送楊傑并叙無為子嘗奉使登太山絶頂雞一鳴見日出又嘗以事過華山重九日飲酒蓮花峯上今乃奉詔與髙麗僧統逰錢塘皆以王事而從方外之樂善哉未曾有也作是詩以送之天門夜上賔出日萬里紅波半天赤歸來平地看跳丸一㸃黃金鑄秋橘太華峰頭作重九天風吹灔黃花酒浩歌馳下腰帶鞓醉舞崩崖一揮手神逰八極萬緣虛下視蚊雷隱汙渠大千一息八十返笑厲東海騎鯨魚三韓王子西求法鑿齒彌天兩勍敵過江風急浪如山寄與舟人好看客次韻送徐大正嘗與余約卜鄰江淮間將赴登州同舟至山陽以詩見送留别别時酒盞照燈花知我歸期漸有涯去嵗渡江萍似斗今年並海棗如瓜多情明月邀君共無價青山為我賖千首新詩一竿竹不應空釣漢江槎楊康功有石狀如醉道士為賦此詩楚山固多猿青者黠而壽化為狂道士山谷恣騰蹂誤入華陽洞竊飲茆君酒君命囚巖間巖石為械杻松根絡其足藤蔓縳其肘蒼苔眯其目叢棘哽其口三年化為石堅瘦敵瓊玖無復號雲聲空餘舞杯手樵夫見之笑抱賣易升斗楊公海中仙世俗那得友海邊逢姑射一笑微俯首胡不載之歸用此頑且醜求詩紀其異本末得細剖吾言豈妄云得之亡是叟逮作淮口遇風詩戲用其韻我詩如病驥悲鳴向衰草有兒真驥子一噴羣馬倒養氣勿吟哦聲名忌太早風濤借筆力勢逐孤雲掃何如陶家兒繞舍覔梨棗君看押强韻巳勝郊與島次韻徐積殺雞未肯邀季路裹飯先須問子來但見中年隱槐市豈知平日賦蘭臺海山入夢方東去風雨留人得暫陪若說峨眉眼前是故鄉何處不堪回元豐七年有詔京東淮南築髙麗亭館密海二州騷然有逃亡者明年軾過之歎其壯麗留一絶云簷楹飛舞垣墻外桑柘蕭條斤斧餘盡賜昆耶作奴婢不知償得此人無過密州次韻趙明叔喬禹功先生依舊廣文貧老守時遭醉尉嗔汝輩何曽堪一笑吾儕相對復三人黃雞催曉淒涼曲白髮驚秋見在身一别膠西舊朋友扁舟歸釣五湖春再過常山和昔年留别詩傴僂山前叟迎我如迎新那知夢幻軀念念非昔人江湖久放浪朝市誰相親却尋泉源去桃花逢避秦再過超然臺贈太守霍翔昔飲雩泉别常山天寒嵗在龍蛇間山中兒童拍手笑問我西去何當還十年不赴竹馬約扁舟獨與漁蓑閒重來父老喜我在扶挈老幼相遮攀當時襁褓皆七尺而我安得留朱顔問今太守為誰歟護羌充國鬢未斑翔自言在熙河作屯田有功躬持牛酒勞行役無復杞菊嘲寒慳超然置酒尋舊迹尚有詩賦鑱堅頑孤雲落日在馬耳照耀金碧開煙鬟郤淇自古北流水跳波下瀨鳴玦環願公談笑作石埭坐使城郭生溪灣海市并叙豫聞登州海市舊矣父老云常出於春夏今嵗晚不復見矣豫到官五日而去以不見為恨禱於海神廣德王之廟明日見焉乃作此詩東方雲海空復空羣仙出沒空明中蕩搖浮世生萬象豈有貝闕藏珠宫心知所見皆幻影敢以耳目煩神工嵗寒水冷天地閉為我起蟄鞭魚龍重樓翠阜出霜曉異事驚倒百嵗翁人間所得容力取世外無物誰為雄率然有請不我拒信我人厄非天窮潮陽太守南遷歸喜見石廪堆祝融自言正直動山鬼豈知造物哀龍鍾信眉一笑豈易得神之報汝亦巳豐斜陽萬里孤鳥沒但見碧海磨青銅新詩綺語亦安用相與變滅隨東風登州孫氏松堂萬松誰種巳樅樅半嶺蒼雲映此邦露重珠纓䝉翠蓋風來石齒碎寒江浮空兩竹橫南閣倒景扶桑射北窗坐待夕烽傳海嶠重城歸去踏逄逄過萊州雪後望三山東海如碧環西北卷登萊雲光與天色直到三山回我行適冬仲薄雪收浮埃黃昏風絮定半夜扶桑開參差太華頂出沒雲濤堆安期與羡門乘龍安在哉茂陵秋風客勸爾麾一杯帝鄉不可期楚些招歸來遺直坊并叙富鄭公之客李君諱常登人也故太守李公諱師中榜其閭曰遺直而其子大方求詩於軾為賦一首使君不浪出羔鴈親扣門先生但清坐薤水巳多言當時邦人化市無晨飲豚嵗月曽幾何客主皆九原魯經有餘歎楚些無歸魂我作遺直詩過者式其藩次韻趙令鑠東坡巳報六年穰惆悵紅塵白首郎枕上溪山猶可見門前冠蓋巳相望故人年少真瓊樹落筆風生戰堵牆端向甕間尋吏部老來専以醉為鄉次韻王定國得潁倅二首仙風入骨巳凌雲秋水為文不受塵一噫固應號地籟餘波猶足掛天紳買牛但自捐三尺射鼠何勞挽六釣莫向百花潭上去醉翁不見與誰春滔滔四海我知津每愧先生植杖藝自少多言晚聞道從今閉口不論文灔翻白獸樽中酒歸煮青泥坊底芹要識老僧無盡處牀前牛蟻不曽聞次韻趙令鑠惠酒神仙無石髓生世悲暫寓坐待玉膏流千載真旦暮青州老從事鬲上非所部惠然肯見從知我憎市酤開瓶自洗盞肴核誰與具門前聽剝啄烹魚得尺素送范純粹守慶州才大古難用論髙常近迂君看趙魏老乃為滕大夫浮雲無根蒂黃潦能須臾知經幾成敗得見真賢愚羽旄照城闕談笑安邊隅當年老使君赤手降於莬諸郎更何事折箠鞭其雛吾知鄧平叔不鬬月支胡次韻王震携文過我治平間霧豹當時始一斑聞道吹噓借餘論故教流落得生還清篇帶月來霜夜妙語先春發病顔詩酒暮年猶足用竹林髙㑹許時攀次韻王定國謝韓子華過飲楚有孫叔敖長城隱千里哀哉練裙子負薪躡破履豈無故交親逝去如覆水不如老優孟談笑託諧美世家不可恃如倚折足几祥符有賢相手握天下砥懿敏亦名公三貴德爵齒蓋棺今幾日公子誰料理誰要卿料理欲說且止止宅相開府公久為蒼生起如何垂老别氷盤餽蒼耳親嫌妨鶚薦相對發微泚新詩如彈丸脫手不移晷我亦老賔客苦語落紈綺莫辭三上章有道貧賤耻惠崇春江曉景二首竹外桃花三兩枝春江水暖鴨先知蔞蒿滿地蘆芽短正是河豚欲上時兩兩歸鴻欲破羣依依還似北歸人遙知朔漠多風雪更待江南半月春次韻周邠南遷欲舉力田科三徑初成樂事多豈意殘年踏朝市有如疲馬畏陵坡羡君同甲心方壯笑我無聊鬢巳皤何日西湖尋舊賞淡煙疏雨暗漁蓑次韻胡完夫青山别淚尚斕斑十載江湖困抱關老去上書還北闕朝來拄笏望西山相從杯酒形骸外笑說平生醉夢間萬事㑹須咨伯始白頭容我占清閒次韻錢穆父老入明光踏舊班染鬚那復唱陽關故人飛上金鑾殿遷客來從飯顆山大筆推君西漢手一言置我二劉間便須置酒呼同舍看賜飛龍出帝間再次韻答完夫穆父二公自言先世同在西掖掖垣老吏識郎君並轡天街兩絶塵汗血固應生有種夜光那復困無因豈知西省深嚴地也著東坡病瘦身免使謫仙明月下狂歌對影只三人次韻答滿思復自甘茅屋老三間豈意彤庭綴兩班紙落雲烟供醉後詩成珠玉看朝還誰言載酒山無賀記取啼烏巷有顔但恐跛牂隨赤驥青雲飛步不容攀東坡全集卷十五
