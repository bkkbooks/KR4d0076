body:
  text: 東坡全集卷七宋蘇軾撰詩八十三首次韻章傳道喜雨禱常山而得去年夏旱秋不雨海畔居民飲鹹苦今年春暖欲生蝝地上戢戢多於土預憂一旦開兩翅口吻如風那肯吐前時渡江入吳越布陳橫空如項羽去歲錢塘見飛蝗自西北來極可畏農夫拱手但垂泣人力區區固難禦撲緣鬃尾困牛馬啖齧衣服穿房户坐觀不救亦何心秉畀炎火傳自古荷鋤散掘誰敢後得米濟飢還小補常山山神信英烈撝駕雷公訶電母應憐郡守老且愚欲把瘡痍手摩撫山中歸時風色變中路巳覺商羊舞夜窗騷騷鬧松竹朝畦泫泫流膏乳從來蝗旱必相資此事吾聞老農語庶將積潤掃遺孽收拾豐歲還明主縣前巳窖八千斛今春及今得蝗子八千餘斛率以一升完一畝更看蠶婦過初眠蠶一眠則蝗不復生矣未用賀客來旁午先生筆力吾所畏蹙踏鮑謝跨徐庾偶然談笑得佳篇便恐流傳成樂府陋邦一雨何足道吾君盛德九州普中和樂職幾時作試向諸生選何武謝郡人田賀二生獻花城裏田員外城西賀秀才不愁家四壁自有錦千堆珍重尤竒品艱難最後開芳心困落日薄艷戰輕雷昨日雷雨老守仍多病壯懷先巳灰殷勤此粲者賀獻魏花三朵攀折為誰哉玉腕揎紅袖金樽瀉白醅何當鑷霜鬢強插滿頭回惜花吉祥寺中錦千堆錢塘花最盛處前年賞花真盛哉道人勸我清明來腰鼓百面如春雷打徹涼州花自開沙河塘上插花回醉倒不覺吳兒咍豈知如今雙鬢催城西古寺沒蒿萊有僧閉門手自栽千枝萬葉巧翦裁就中一叢何所似馬腦盤盛金縷杯而我食菜方清齋對花不飲花應猜夜來雨雹如李梅紅殘緑暗吁可哀和頓教授見寄用除夜韻我笑陶淵明種秫二頃半婦言既不用還有責子歎無絃則無琴何必勞撫玩我笑劉伯倫醉髮蓬茒散二豪苦不納獨以鍤自伴既死何用埋此身同夜旦孰云二子賢自結兩重桉笑人還自笑出口談治亂一生溷塵垢晚以道自盥無成空得懶坐此百事緩仄聞頓夫子講道出新貫豈無一尺書恐不記庸懦陋邦貧且病數米銖稱炭慙愧章先生十日坐空館袖中出子詩貪讀酒屢暖狂言各須慎勿使輸薪粲和子由四首韓太祝送遊太山偶作郊原十日遊未應回首厭籠囚但教塵土驅馳足終把雲山爛漫酬聞道逢春思濯錦便須到處覔莵裘恨君不上東封頂夜看金輪出九幽送春夢裏青春可得追欲將詩句絆餘暉酒闌病客惟思睡蜜熟黃蜂亦懶飛芍藥櫻桃俱掃地病過此二物鬢絲禪榻兩忘機憑君借取法界觀一洗人間萬事非來書云近看此書余未嘗見也首夏官舍即事安石榴花開最遲絳裙深樹出幽菲吾廬想見無限好客子倦遊胡不歸座上一樽雖得滿古來四事巧相違令人却憶湖邊寺垂栁隂隂晝掩扉送李供備席上和李詩家聲赫奕蓋并涼也解微吟錦瑟傍擘水取魚湖起浪引杯看劍坐生光風流别後人人憶才器歸來種種長不用更貪窮事業風騷分付與沉湘西齋西齋深且明中有六尺牀病夫朝睡足危坐覺日長昏昏既非醉踽踽亦非狂蹇衣竹風下穆然濯微涼起行西園中草木含幽香榴花開一枝桑棗沃以光鳴鳩得美蔭困立忘飛翔黃鳥亦自喜新音變圓吭杖藜觀物化亦以觀我生萬物各得時我生日皇皇小兒小兒不識愁起坐牽我衣我欲嗔小兒老妻勸兒癡兒癡君更甚不樂愁何為還坐愧此言洗盞當我前大勝劉伶婦區區為酒錢寄劉孝叔君王有意誅驕虜椎破銅山鑄銅虎聮翩三十七將軍走馬西來各開府南山伐木作車軸東海取鼉漫戰鼓汗流奔走誰敢後恐乏軍興汙質斧保甲連村團未遍方田訟牒紛如雨爾來手實降新書抉剔根株窮脈縷詔書惻怛信深厚吏能淺薄空勞苦平生學問止流俗衆裏笙竽誰比數忽令獨奏鳳將雛倉卒欲吹那得譜况復連年苦飢饉剝齧草木啖泥土今年雨雪頗應時又報蝗蟲生翅股憂來洗盞欲強醉寂寞虛齋臥空甒公厨十日不生煙更望紅裙踏筵舞故人屢寄山中信只有當歸無别語方將雀鼠偷太倉未肯衣冠挂神武吳興丈人真得道平日立朝非小補自從四方冠蓋鬧歸作二浙湖山主髙蹤已自雜漁釣大隱何曾棄簮組去年相從殊未足問道巳許談其粗逝將棄官往卒業俗緣未盡那得覩公家只在霅溪上上有白雲如白羽應憐進退苦皇皇更把安心教初祖孔長源挽詞二首少年才氣冠當時晚節孤風益自竒君勝宜為夫子後林宗不愧蔡雍碑南荒尚記誅元惡東越誰能事細兒耆舊如今幾人在為君無憾為時悲小堰門頭栁繫船吳山堂上月侵筵潮聲夜半千巖響詩句明朝萬口傳長源自越過杭夜飲有美堂上聯句長源詩云天日逺隨雙鳳落海門遙蹙兩潮趨一坐稱善豈憶日斜庚子後忽驚歲在已辰年佳城一閉無窮事南望題詩淚灑箋寄吕穆仲寺丞孤山寺下水侵門每到先看醉墨痕楚相未亡談笑是中郎不見典型存杭有伶人善學吕舉措酷似别後常令作之以為笑君先去踏塵埃陌我亦來尋桑棗村回首西湖真一夢灰心霜鬢更休論余主薄母挽詞閨庭蘭玉照鄉閭自昔雖貧樂有餘豈獨家人在中饋却因麟趾識關雎雲軿忽已歸仙府喬木依然擁舊廬忍把還鄉千斛淚一時灑向老萊裾送趙寺丞寄陳海州景疏樓上喚蛾眉君到應先誦此詩若見孟公投轄飲莫忘衝雪送君時答陳述古二首漫説山東第二州棗林桑泊負春遊城西亦有紅千葉人老簮花却自羞小桃破蕚未勝春羅綺叢中第一人聞道使君歸去後舞衫歌扇總生塵陳有小妓述古稱之張安道樂全堂列子御風殊不惡猶被莊生譏數數步兵飲酒中散琴於此得全非至樂樂全居士全於天維摩丈室空翛然平生痛飲今不飲無琴不獨琴無絃我公天與英雄表龍章鳳姿照魚鳥但令端委坐廟堂北狄西戎談笑了如今老去苦思歸小字親書寄我詩試問樂全全底事無全何處更相虧張文裕挽詞高才本出朝廷右能事空推德業餘每見便聞曹植句至今傳寶魏華書濟南名士新凋喪劔外生祠已潔除欲寄西風兩行淚依然喬木鄭公廬懷西湖寄朝美叔同年西湖天下景逰者無愚賢深淺隨所得誰能識其全嗟我本狂直早為世所捐獨專山水樂付與寧非天三百六十寺幽尋遂窮年所至得其妙心知口難傳至今清夜夢耳目餘芳鮮君持使者節風采爍雲煙清流與碧巘安肯為君妍胡不屏騎從暫借僧榻眠讀我壁間詩清涼洗煩煎策杖無道路直造意所便應逢古漁父葦間自延緣問道若有得買魚勿論錢和梅户曹會獵鐵溝山西從古説三明誰信儒冠也捍城竿上鯨鯢猶未掩近梟數盜草中狐不須驚東州趙叟飲無敵南國梅仙詩有聲不向如皋間射雉歸來何以得卿卿是日惟梅趙不射祭常山回小獵青蓋前頭點皂旗黃茅岡下出長圍弄風驕馬跑空立趁蒼鷹掠地飛回望白雲生翠巘歸來紅葉滿征衣聖朝若用西涼簿白羽猶能效一揮和章七出守湖州二首方丈仙人出渺茫髙情猶愛水雲鄉功名誰使連三捷身世何緣得兩忘早歲歸休心共在他年相見話偏長只應未報君恩重清夢時時到玉堂絳闕雲臺總有名應須極貴又長生鼎中龍虎黃金賤松下龜蛇緑骨輕君好爐火而餌茯苓霅水未渾纓可濯辨峰初見眼應明兩巵春酒真堪羡獨占人間分外榮和張子野見寄三絶句前生我巳到杭州到處長如到舊逰更欲洞霄為隱吏一菴間地且相留過舊遊狂吟跌宕無風雅醉墨淋浪不整齊應為詩人一回顧山僧未忍掃黃泥見題壁柏堂南畔竹如雲此閣何人是主人但遣先生披鶴氅不須更畫樂天真竹閣見憶和蔣夔寄茶我生百事常隨緣四方水陸無不便扁州渡江適吳越三年飲食窮芳鮮金虀玉膾飯炊雪海螯江柱初脫泉臨風飽食甘寢罷一甌花乳浮輕圓自從捨舟入東武沃野便到桑麻川剪毛胡羊大如馬誰記鹿角腥盤筵厨中蒸粟埋飯甕大杓更取酸生涎柘羅銅碾棄不用脂麻白土須盆研故人猶作舊眼看謂我好尚如當年沙溪北苑強分别水腳一線爭誰先清詩兩幅寄千里紫金百餅費萬錢吟哦烹噍兩竒絶只恐偷乞煩封纒老妻稚子不知愛一半巳入薑鹽煎人生所遇無不可南北嗜好知誰賢死生禍福久不擇更論甘苦爭蚩妍知君窮旅不自擇因詩寄謝聊相鐫答李邦直美人如春風著物物未知羈愁似氷雪見子先流澌子從徐方來吏民舉熙熙扶病出見之驚我一何衰知我久慵倦起我以新詩詩詞如醇酒盎然熏四支徑飲不覺醉欲和先昏疲西齋有蠻帳風雨夜紛披放懷語不擇撫掌笑脫頤别來今幾何春物巳含姿栁色日夜暗子來竟何時徐方雖云樂東山禁逰嬉又無狂太守何以解憂思聞子有賢婦華堂詠螽斯盍不倒囊槖賣劔買蛾眉不用教絲竹唱我新歌詞和文與可洋川園池三十首湖橋朱欄畫柱照湖明白葛烏紗曳履行橋下龜魚晚無數識君拄杖過橋聲橫湖貪看翠蓋擁紅粧不覺湖邊一夜霜卷却天機雲錦段從教匹練寫秋光書軒雨昏石硯寒雲色風動牙籖亂葉聲庭下巳生書帶草使君疑是鄭康成氷池不嫌氷雪繞池看誰似詩人巧耐寒記取羲之洗硯處碧琉璃下黑蛟蟠竹塢晚節先生道轉孤歲寒惟有竹相娛粗才杜牧真堪笑喚作軍中十萬夫荻浦雨折霜乾不耐秋白花黃葉使人愁月明小艇湖邊宿便是江南鸚鵡洲蓼嶼秋歸南浦蟪蛄鳴霜落橫湖沙水清卧雨幽花無限思抱叢寒蝶不勝情望雲樓隂晴朝暮幾回新巳向虛空付此身出本無心歸亦好白雲還似望雲人天漢臺漾水東流舊見經銀潢左界上通靈此臺試向天文覔閣道中間第幾星待月臺月與髙人本有期挂簷低户映蛾眉只從昨夜十分滿漸覺氷輪出海遲二樂榭此間真趣豈容談二樂并君巳是三仁智更煩訶妄見坐令魯叟作瞿曇來詩云二見因妄生灙泉亭聞道池亭勝兩川應須爛醉答雲煙勸君多種長腰米消破亭中萬斛泉吏隱亭縱橫憂患滿人間頗怪先生日日間昨夜清風眠北牖朝來爽氣在西山霜筠亭解籜新篁不自持嬋娟巳有歲寒姿要看凛凛霜前意須待秋風粉落時無言亭殷勤稽首維摩詰敢問如何是法門彈指未終千偈了向人還道本無言露香亭亭下佳人錦繡衣滿身瓔珞綴明璣晚香消歇無尋處花巳飄零露巳晞涵虛亭水軒花榭兩爭妍秋月春風各自偏惟有此亭無一物坐觀萬景得天全溪光亭決去湖波尚有情却隨初日動簷楹溪光自古無人畫慿仗新詩與寫成過溪亭身輕步穩去忘歸四柱亭前野彴微忽悟過溪還一笑水禽驚落翠毛衣披錦亭煙紅露緑曉風香燕舞鶯啼春日長誰道使君貧且老繡屏錦帳咽笙簧褉亭曲池流水細鱗鱗髙會傳觴似洛濱紅粉翠蛾應不要畫船來往勝於人菡萏亭日日移牀趂下風清香不盡思何窮若為化作龜千歲巢向田田亂葉中荼䕷洞長憶故山寒食夜野荼䕷發暗香來分無素手簮羅髻且折霜蕤浸玉醅長憶故山一作半雨半晴篔簹谷漢川修竹賤如蓬斤斧何曽赦籜龍料得清貧饞太守渭濱千畝在胸中寒蘆港溶溶晴港漾春暉蘆笋生時栁絮飛還有江南風物否桃花流水鮆魚肥野人廬少年辛苦事犂鋤剛厭青山繞故居老覺華堂無意味却須時到野人廬此君菴寄語菴前抱節君與君到處合相親寫真雖是文夫子我亦真堂作記人金橙徑金橙縱復里人知不見鱸魚價自低須是松江煙雨裏小船燒薤搗香虀南園不種夭桃與緑楊使君應欲候農桑春畦雨過羅紈膩夏壠風來餅餌香北園漢水巴山樂有餘一麾從此首歸塗北園草木慿君問許我他年作主無寄題刁景純藏春塢白首歸來種萬松待看千尺舞霜風年拋造物陶甄外春在先生杖履中楊栁長齊低戶暗櫻桃爛熟滴階紅何時却與徐元直共訪襄陽龎德公玉盤盂二首并敘東武舊俗每歲四月大會於南禪資福兩寺以芍藥供佛而今歲最盛凡七千餘朵皆重跗纍蕚繁麗豐碩中有白花正圓如覆盂其下十餘葉稍大承之如盤姿格絶異獨出於七千朵之上云得之於城北蘇氏園中周宰相莒公之别業也而其名俚甚乃為易之雜花狼藉占春餘芍藥開時掃地無兩寺粧成寶纓絡一枝爭看玉盤盂佳名會作新翻曲絶品難尋舊畫圖從此定知年穀熟姑山親見雪肌膚花不能言意可知令君痛飲更無疑但持白酒勸嘉客直待瓊舟覆玉彛負郭相君初擇地看羊屬國首吟詩吾家豈與花相厚更問殘芳有幾枝和潞公超然臺收韻我公厭富貴常苦勳業尋相期赤松子永望白雲岑清風出談笑萬竅為號吟吟成超然詩洗我蓬之心嗟我本何人麋鹿強冠襟身微空志大交淺屢言深囑公如得謝呼我幸寄音但恐酒錢盡煩公揮槖金聞喬太博換左藏知欽州以詩招飲今年果起故將軍幽夢清詩信有神馬革裹尸真細事虎頭食肉更何人陳雲冷壓黃茆瘴羽扇斜揮白葛巾痛飲從今有幾日西軒月色夜來新喬將行烹鵝鹿出刀劔以飲客以詩戲之破匣哀鳴出素虬倦看鶂鶂聽呦呦明朝只恐兼烹鶴此去還須却佩牛便可先呼報恩子不妨仍帶醉鄉侯他年萬騎歸應好奈有移文在故丘次韻劉貢父李公擇見寄二首白髮相望兩故人眼看時事幾畨新曲無和者應思郢論少卑之且借秦歲惡詩人無好語公擇來詩皆道吳中飢苦之事夜長鰥守向誰親貢父近喪偶少思多睡無如我鼻息雷鳴撼四鄰何人勸我此間來絃管生衣甑有埃緑蟻濡唇無百斛蝗蟲撲面巳三回磨刀入谷追窮冦灑涕循城拾棄孩為郡鮮歡君莫歎猶勝塵土走章臺寄黎眉州膠西髙處望西川應在孤雲落照邊瓦屋寒堆春後雪峨眉翠掃雨餘天治經方笑春秋學好士今無六一賢君以春秋受知於歐陽文忠公公自號六一居士且待淵明賦歸去共將詩酒趂流年和趙郎中捕蝗見寄次韻麥穟人許長穀苖牛可沒天公獨何意忍使蝗蟲發驅攘著令典農事安可忽我僕既胼胝我馬亦款矻飛騰漸云少筋力亦巳竭茍無百篇詩何以醒睡兀初如疏畎澮漸若決澥渤往來供十吏腕脫不容歇平生輕妄庸熟視笑魏勃愛君有逸氣詩壇專斬伐民病何時休吏職不可越慎無及世事向空書咄咄登常山絶頂廣麗亭西望穆陵關東望琅邪臺南望九仙山北望空飛埃相將呌虞舜遂欲歸蓬萊嗟我二三子狂飲亦荒哉紅裙欲先去長笛有餘哀清歌入雲霄妙舞纎腰回自從有此山白石封蒼苔何常有此樂將去復徘徊人生如朝露白髮日夜催棄置當何言萬劫終飛灰薄薄酒二首并敘膠西先生趙明叔家貧好飲不擇酒而醉常云薄薄酒勝茶湯醜醜婦勝空房其言雖俚而近乎達故推而廣之以補東州之樂府既又以為未也復自和一篇聊以發覽者之一噱云耳薄薄酒勝茶湯粗粗布勝無裳醜妻惡妾勝空房五更待漏靴滿霜不如三伏日髙睡足北窗涼珠襦玉柙萬人相送歸北邙不如懸鶉百結獨坐負朝陽生前富貴死後文章百年瞬息萬世忙夷齊盜跖俱亡羊不如眼前一醉是非憂樂都兩忘薄薄酒飲兩鍾粗粗布著兩重美惡雖異醉暖同醜妻惡妾夀乃公隱居求志義之從本不計較東華塵土北窗風百年雖長要有終富死未必輸生窮但恐珠玉留君容千載不朽遭樊崇文章自足欺盲聾誰使一朝富貴面發紅達人自達酒何功世間是非憂樂本來空同年王中甫挽詞先帝親收十五人四方爭看擊鵬鯤如君才業真堪用顧我衰遲不足論出處升沉十年後死生契濶幾人存他時京口尋遺迹宿草猶應有淚痕仁宗朝賢良十五人今惟富鄭公張宣猷錢純老及余與舍弟在耳七月五日二首避謗詩尋醫畏病酒入務蕭條北窗下長日誰與度今年苦炎熱草木困薰煮況我早衰人幽居氣如縷秋來有佳興秫稻巳含露還復此微吟往和糟牀注何處覔新秋蕭然北臺上秋來未云幾風月已清亮雲間聳孤翠林表浮逺漲新棗漸堪剝晚瓜猶可餉西風送落日萬竅含悽悵念當急行樂白髮不汝放趙郎中見和戲復答之趙子吟詩如潑水一揮三百八十字奈何效我欲尋醫恰似西施藏白地趙子飲酒如淋灰一年十萬八千杯若不令君早入務飲竭東海生黃埃我衰臨政多繆錯羡君精采如秋鶚頗哀老子令日飲為君坐嘯主畫諾次韻周邠寄雁蕩山圖二首指點先慿採藥翁丹青化出大槐宫眼明小閣浮煙翠齒冷新詩嚼雪風二華行觀雄陜右九仙今已壓京東將赴河中密邇太華九仙在東武竒秀不減雁蕩也此生的有尋山分已覺溫台落手中西湖三載與君同馬入塵埃鶴入籠東海獨來看出日石橋先去踏長虹遙知别後添華髮時向樽前説病翁所恨蜀山君未見他年携手醉郫筒送碧香酒與趙明叔教授聞君有婦賢且亷勸君慎勿為楚相不羡紫駝分御食自遣赤腳沽村釀嗟君老狂不知愧更吟醜婦惡嘲謗諸生聞語定失笑冬暖號寒卧無帳碧香近出帝子家鵝兒破殼酥流盎不學劉伶獨自飲一壺往助齊眉餉趙既見和復次韻答之長安小吏天所放日夜歌呼和丞相豈知後世有阿瞞曹公自言參之後北海樽前捉私釀先生未出禁酒國詩語孤髙常近謗幾回無酒欲沽君却畏有司書簿帳近制公使酒過數法甚重酸寒可笑分一斗日飲亡何足袁盎更將險語壓衰翁只恐自是臺無餉趙郎中往莒縣逾月而歸復以一壺遺之仍用元韻東鄰主人逰不歸悲歌夜夜聞舂相門前人鬧馬嘶急一家喜氣如春釀王事何曽怨獨賢室人豈忍交謫謗大兒踉蹡越門限小兒咿啞語繡帳定教舞袖掣伊涼更想夜庖鳴甕盎題詩送酒君勿誚免使退之嘲一餉蘇潛聖挽詞妙齡馳譽百夫雄晚節忘懷大隱中悃愊無華真漢吏文章爾雅稱吾宗趨時肯負平生志有子還應不死同惟我間思十年事數行老淚寄西風東坡全集卷七
