body:
  text: 東坡全集卷一百十三宋蘇軾撰內制批答七十六首賜正議大夫同知樞密院事安燾乞外郡不許批答元祐元年十月八日覽表具之卿以應務之才居本兵之地綏靜中外人無間言何疑上章欲求去位未喻厥意聞之憮然夫榮親莫大於功名養志不專於甘㫖而况魏闕之下父母之邦退食問安孰便於此勉循其舊以卒輔豫賜安燾乞外郡不允批答元祐九年十月八日省表具之夫事親者不擇地而安之孝之至也而况艱難之際一日萬幾冰淵之懼當務同濟卿練達兵要灼知邊情寄托之深義難引去亟求自便朕何賴焉賜新除中大夫守尚書右丞劉摯辭恩命不許斷來章批答元祐元年十一月覽表具之道有行藏時有用捨歲不我與難以智求道之將行豈容力避大言大利固當安而受之小行小廉非所望於卿者成命不再可無復辭賜劉摯辭免恩命不允斷來章批答元祐元年十一月省表具之政如農耕以既穫為能事言如藥石以愈疾為成功若耕不穫疾不愈朕何望焉所以用卿者非以富貴卿也勉卒成業何以辭為賜太師文彥博乞致仕不許批答元祐二年三月二十九日卿出入四世師表萬民無羡於功名而有厭於富貴其所以忘身狥國捨逸就勞者豈有求而然哉凡以先帝之恩生民之故也卿之在朝如玉在山如珠在淵光景不陳而草木自遂去就之際損益非輕昔西伯善養老而太公自至魯穆公無人子思之側而長者去之卿自為謀則善矣獨不為朝廷惜乎藥餌有間時遊廟堂家居之樂何以異此賜太師文彥博乞致仕不允批答元祐二年三月二十六日朕修身以承六聖虛已以聽四輔而法度未定隂陽未和民未樂生吏未稱職中夜以思方食而歎雖不敢以事諉元老實望其以身率百官卿猶未即於安孰敢不盡其力此聖母冲人之本意而天下有識之所望也昔唐太宗以干戈之事尚能起李靖於既老而穆宗文宗以燕安之際不能用裴度於未病治亂之效於斯可見朕意如此卿其少安賜宰相吕公著乞退不許批答元祐二年三月二十九日卿才全而德備積厚而施博明亮篤誠坐屈羣策既以天下公議而用於此矣豈以卿之私意而聽其去哉水旱之災不德所召卿當助我求所以消復之道不當求去我也詩不云乎大夫君子昭假無贏大命近止無棄爾成勉思厥職以答民望賜宰相吕公著乞退不允批答元祐二年三月二十九日用賢之功必要之久逺日計不足歲計有餘朕之用卿期於百姓之既富卿之自信亦豈一日而成功常䁑之災天以警朕夙夜祗懼與卿同之朕若歸過於股肱何以答天戒卿若釋政而安逸何以塞民言各思其憂少安厥位賜尚書左丞李清臣乞退不允批答元祐二年日四月十八卿以方聞之舉擢自厚陵禁林之選用於神考逮受顧命弼豫冲人義既同於戚休身豈輕於出處遽欲引去聞之惻然姑安厥常以助豫治賜尚書左丞李清臣乞退不許批答元祐二年四月十八日祥除之初念我聖祖所與共政不忘舊人而卿博學多聞通練古今小心畏慎不見過失力求引去為之惘然勉留輔豫益祗厥服賜文武百寮文彥博以下上第一表請皇帝御正殿復常膳不允批答元祐二年四月二十二日朕即位二年水旱繼作致灾之故實惟冲人既延及於無辜復貽憂於文母是以坐不安席食不甘味實欲深念厥咎豈徒見之空言而雨不崇朝農猶告病欲狥來請惕然未寧其一乃心勉正厥事毋重朕之不德以答天之深戒賜文武百寮文彥博已下上第一表請太皇太后復常膳不許批答元祐二年四月二十二日旱暵之罰自冬及夏天之降灾如此其久則夫致灾之道豈一日而然哉雖力行罪已之文尚恐非應天之實而卿等以膚寸之澤遽欲即安覽之惕然未敢自赦其交修不逮務盡厥誠期兹歲於有秋雖復常其未晚賜文武百寮文彥博已下上第五表請皇帝御正殿復常膳允批答元祐二年五月二十九日朕以寡昧膺受多福常欲損上益下畏天之威矧兹旱灾咎在不德而卿等以雨澤既至封章屢上勉從其意甚愧於中夫天之有風雨雷霆猶朕之有號令賞罰朕不修明其事何以責應于天永思其終無忘納誨賜文武百寮文彥博以下上第五表請太皇太后復常膳許批答元祐二年五月二十九日德積無素民罹其災精誠莫通禱不時應雖䝉膏澤之報僅救焦枯之餘勉狥來章猶虞後患其謹視盜賊勤恤流亡益務交修以裨不逮賜文武百寮太師文彥博已下上第一表請舉樂不許批答元祐二年六月一日先王之禮樂因情而立文君子之哀樂自中而形外夫有莫大之戚則有無窮之悲先皇帝天覆四方子養萬物至今窮髮之表尚餘流涕之民而况宫庭之間母子之愛粗畢三年之制遂講八音之和所未忍聞非不欲作卿等謹於率禮篤於愛君徒欲亟舉舊章顧未深明吾意三復太息難於黽從賜文武百寮太師文彥博以下上第一表請舉樂不允批答元祐二年六月一日禮之至者無文哀之深者無節故禫而不樂古人非以求名琴不成聲君子以為知禮朕以宗廟之重勉蹈先帝之餘履其位惕然而自驚用其物澘焉而出涕未報昊天罔極之德常懷終身不忘之憂欲從衆言亟舉備樂而金石絲竹乃悽耳之聲干戚羽旄皆泫目之具哀既未泯樂何從生再閲來章徒增感慕賜文武百寮太師文彥博已下上第二表請舉樂不許批答元祐二年六月四日遏密之制雖盡於三年追懷之私豈論於歲月金石在御惻然未寧吾不以一身之憂廢天下之樂今施之郊廟用之軍旅州閭之㑹絃歌相聞獨盡餘哀止於中禁以為於義未害是故行之不疑賜文武百寮太師文彥博已下上第二表請舉樂不允批答元祐二年六月四日朕少遭閔凶僅畢祥禫雖俯就企及非以過制為賢而創巨痛深不能以禮自克觀過其黨聖人許之禮曰喪三年以為極亡則弗之忘矣誠重違國老之忠告姑欲盡人子之至情賜太師文彥博等請太皇太后受冊第二表不許批答元祐二年六月四日吾聞聖人以天下為憂未聞以位號為樂也損已裕物畏天檢身此吾平日之本心非獨遇災而一發也孔子曰以約失之者鮮矣卿等以是輔我顧不美哉賜文武百寮太師文彥博已下上第四表請舉樂不許批答元祐二年六月九日吾之本性以清淨寂寞為樂雖在平日無游觀聲技之念矧艱難之後哀疚之餘中夜以興方食而歎將不堪其憂者豈有意於樂哉雖欲勉從未能自克忠告屢却愧歎兼深賜文武百寮太師文彥博已下上第四表請舉樂不允批答元祐二年六月九日鐘鼓以導和羽籥以飾喜譬之飲食之節適於口體之宜今衰麻之除莫敢逾制而琴瑟之御則有未安卿等忠誠確然開喻至矣惟反求諸心而弗得故欲行其言而未能推之人情當識朕意賜太師文彥博等上第三表請太皇太后受冊許批答元和二年六月九日吾上順帝則下酌民言處以無心期於寡過卿等以為協氣既應羣謀僉同若固違典禮之常恐莫慰天人之望遇災而懼昔者非以為謙聞義則遷吾亦豈敢自必勉從故事以副嘉言賜新除中大夫守尚書右丞王存辭免恩命不允斷來章批答元祐二年六月十二日士有品目定于僉言器之廟堂蔽自朕志豈有僉言既穆朕志不移而用過謙之詞反已成之命亟服乃事宜無復云賜新除中大夫守尚書右丞王存辭免恩命不許斷來章批答元祐二年六月十二日為國不患於無人有人而不用之為患事君非難於辭寵居寵而無愧之為難吾之用卿計已審矣卿之自信又何疑哉賜新除知樞密院安燾辭免恩命不許斷來章批答元祐二年六月二十四日覽表具之論材考德聖人所以公天下難進易退君子所以善一身權之以義孰為輕重訓兵論將威懷逺人卿以是事上豈不賢於逡巡退避也哉賜新除知樞密院安燾辭免恩命不允斷來章批答元祐二年六月二十四日覽表具之德稱其服臣主俱榮食浮於人上下交病朕之為天下慮甚於卿之自為謀也思而後行有出無反成命不再卿毋復辭賜新除檢校太尉守司空依前開府儀同三司致仕韓絳辭免恩命不允批答元祐二年七月七日國家尊異耆老砥礪廉隅凡致為臣必厚其禮而况卿出入四世師表萬民身任安危位兼將相永惟三宗眷遇之重宜極一品褒崇之榮成命既孚僉言惟允宜從中外之望罔狥謙冲之私賜韓絳辭免恩命不允批答元祐二年七月七日朕惟耉老成人雖或謝事耄期稱道終不忘君其在丘園豈殊廊廟嘉猷入告卿其不易此心大事就訪朕亦敢忘斯義命秩之數典冊之文不如此無以慰朕心而答民望國有常典卿毋復辭賜太師文彥博辭免不拜恩命許批答元祐二年八月二十七日卿義重股肱望隆堂陛陛廉逺則堂皇峻股肱逸而元首安故出異恩特鐫苛禮而卿深執恭巽力守典刑確然自陳義不可奪勉從其意愧歎于中賜太師文彥博辭免不拜恩命允批答元祐二年八月二十七日朕優禮師傅達德齒之尊以亟拜為可略古之道也卿謹嚴朝廷明君臣之分以不拜為未安禮之節也道並行而不悖義有重而難移勉循所陳不忘嘉歎賜宰相吕公著乞罷相位不許斷來章批答元祐二年八月二十七日孔子曰茍有用我者朞月而已可也三年有成夫以聖人猶待三年而後成功况其下者今卿助我為治自以為既成矣乎其未也譬如玉人雕琢玉中道而易之豈復成器哉賜宰相吕公著乞罷相位不允斷來章批答元祐二年八月二十七日古者君臣之間率常千載一遇今聖母在位正身虛已仰成輔弼雖疏逺小臣猶欲畢命自效而卿乃以小疾求去縱無意於功名獨不惜此時乎勉卒乃事使百姓富足四夷乂安然後謝事歸老豈不臣主俱榮哉賜宰相吕公著乞罷相位除一外任不許批答元祐二年八月二十八日夫以才御物才有盡而物無窮以道應物道無窮而物有盡凡今之患所乏非才以卿篤於愛君必能建長久之策淡然無我可以寄枉直之權二年于兹百度惟正事既就緒民亦小康至於微疾之屢攻此亦高年之常理卿其良食自輔為國少安譬如止水之在槃豈復勞心於鑒物心且不勞而况於力乎賜宰相吕公著乞罷相位除一外任不允批答元祐二年八月二十九日朕以天下之大知為君之難有朽索馭六馬之憂有抱火厝積薪之懼正賴多士協于一心朝夕以思彌縫其闕凡今中外執事膂力之畢陳視吾一二老臣進退以為節卿若無事而引去人皆相顧以自疑而况邊鄙未寧兵民多故而豫左右之老先自求於便安則夫疏逺之臣何以責其盡瘁勉輔不逮期於有成賜宰相吕公著辭免不拜恩命允批答元祐二年九月一日卿執德惟一守禮不回不以坐論為安而以拜上為泰使朕不盡養老之意而卿得畏威之道勉從其志嘉歎不忘賜宰相吕公著辭免不拜恩命許批答元祐二年九月一日君之視臣譬之手足方責其大不强所難而卿深執謙恭力求避免深惟孔子事君盡禮之義曲從其請以警惰偷賜太師文彥博上第一表乞致仕不允批答元祐二年九月八日省表具之卿之求去蓋數矣言不為不切而朕終莫之從朕之留卿亦至矣禮不為不盡而卿終莫之亮君臣之際情不相喻朕甚疑之夫樂丘園而厭軒冕亦古人之一節而非聖賢之髙致尊耆老以重朝廷蓋天下之大計而非冲人之私欲與其使朕屈公議以從卿曷若卿少貶其私意以狥天下乎賜太師文彥博上第一表乞致仕不許批答元祐二年九月八日覽表具之卿之所以欲去者二疲於朝㑹勞於應物一也功成身退欲享其樂二也而吾之所以必留者三卿以英傑之資開物成務世不可闕一也弼亮四朝更涉變故謀無遺策二也名冠天下進退之間為國休戚三也吾方盡養老之道殺禮以優賢廟堂之上猶有足樂則夫卿之欲去者可回而吾之必留者蓋不可易也賜太師文彥博乞致仕不許斷來章批答元祐二年九月十一日覽表具之為君難為臣不易非吾推誠無疑不能起卿於安佚非卿忘身狥國不能從我於艱難召用之初中外相慶搢紳莫不競勸父老至於涕流中道而歸其義安在宜思一身之樂輕於社稷毋使庶人之議及於朝廷賜太師文彥博乞致仕不允斷來章批答元祐二年九月十一日省表具之君子安身崇德如山嶽之鎮開物成務如江河之流若山嶽之鎮動搖不安江河之流行止自便則物將交病人亦何觀朕之望卿無以異此宜守不移之志以成可大之功賜宰相吕公著上第一表乞致仕不允批答元祐三年二月二十八日省表具之古者世臣譬之喬木粵自拱把至于棟梁傑然羣材之中夫豈一日之力卿擢自仁祖逮兹四朝光輔朕躬允有一德不獨卿無心而事自定抑亦民既信而功易成方今布在朝廷豈無豪傑之士猶當養以歲月待其德望之隆卿雖欲歸勢未可去宜安厥位以副朕心賜宰相吕公著上第一表乞致仕不許批答覽表具之卿三世將相一時蓍龜不求備以取人則房喬之比其經遠而無競有謝安之風用能寧輯我家靖共爾位政在元老人無異詞胡為厭事而求歸不復為國之長慮方今官冗財匱歲艱民貧天步難安國是未定若方勤於朴斫而遽易於工師人其謂何勢必不可告老之請吾未欲聞賜宰相吕公著上第二表乞致仕不許斷來章批答元祐三年三月二十九日覽表具之難進易退固君子之常節久勞思逸亦老者之至情然心存社稷則常節為輕身繫安危則至情可奪惟卿體國豈待多言茍大義之未安雖百請而何益宜安厥位勿復此辭賜宰相吕公著上第二表乞致仕不允斷來章批答元祐三年三月二十九日覽表具之宰相不自用人主不自為豫欲識人物之忠邪故以卿為水鏡豫欲知利害之輕重故以卿為權衡茍明此心雖老猶壯與其輕去軒冕獨善其身孰若優游廟堂兼享其樂益敦此義勿復有云賜新除依前中大夫守中書侍郎劉摯辭免恩命不許斷來章批答元祐三年四月十二日省表具之卿蹈道深逺守節淳固雖不留於儻來之物而有志於行可之仕樂告以善勇於敢為進不求當世之名退不叛平生之學未嘗為枉尺直尋之事夫豈有見得忘義之嫌哉毋復過辭往踐乃事賜劉摯辭免恩命不允斷來章批答元祐三年日四月十二省表具之朕纘服之初卿言責是任歷陳治道之要以立太平之基朕欲行其言遂授以政歲月未幾綱紀略陳欲究觀心術之微宜擢居政本之地茍無愧於允蹈豈不賢於力辭往服官針勿違朕命賜新除依前中大夫守尚書左丞王存辭免恩命不許斷來章批答元祐三年四月十二日省表具之夫志大有逺略器博無近用以卿忠義開濟何施不宜今以次遷何足辭也益堅無倦之意以觀可久之業賜王存辭免恩命不允斷來章批答元祐三年日四月十二省表具之夫陛簾之增所以隆堂奧位次有叙所以尊朝廷朕既樂得於英才復以時而遷用庶幾華國非以寵卿祗率厥常毋廢朕命賜新除守尚書右僕射兼中書侍郎范純仁上第一表辭免恩命不允批答元祐三年四月十二日覽表具之夫有烏獲之力然後可以付千鈞有和扁之功然後可以寄死生故宰相之任非所以寵人臣也無其德而當之為不智有其材而辭之為不仁若卿之才德亦可謂稱矣往思其憂以稱天下之望賜范純仁上第一表辭免恩命不許批答元祐三年四月十二日覽表具之吾聞之乃烈考曰君子先天下之憂而憂後天下之樂而樂雖聖人復起不易斯言卿將書之紳銘之盤盂以為一言而可以終身行之者歟則今兹爰立之命乃所以委重投艱而已又何辭乎賜新除司空同平章軍國事吕公著上第二表辭免恩命不許斷來章批答元祐三年四月十二日省表具之夫國以得人為强如猛獸之衛藜藿以積賢為寶如珠玉之茂山川湛然無為物自䝉利故崔公發議則淄青慙服知朝廷之有人蜀使抗詞則孫權回顧歎張昭之不在得失之效豈可同日而語哉朕之用卿意實在此國計之重可無復辭賜新除司空同平章軍國事吕公著上第二表辭免恩命不允斷來章批答元祐三年四月十二日省表具之周之詩曰無曰豫小子召公是似唐之雅曰惟西平有子惟我有臣夫父子君臣之間光明盛大如此載之簡策被之金石豈獨閨門之寵足為邦國之華再省來章具陳先烈雖朕寡昧不敢庶幾於仁祖而卿忠孝當念服勤於世官祗率厥常毋違朕命賜新除守尚書左僕射兼門下侍郎吕大防上第二表辭免恩命不許斷來章批答元祐三年四月十二日省表具之卿有內憂外侮之虞倉廩禮樂之歎隂陽風雨之憂此三者誠當今之大計朕之所以中夜不寐輟食太息者正為此也孟子曰責難於君謂之恭夫既以責其君而不以身任之者非仁人也願卿慨然當古人之重略世俗之謙務踐斯言憂此三者賜吕大防上第二表辭免恩命不允斷來章批答元祐三年四月十二日省表具之夫任賢使能天下之公義而辭大就小君子之自守也惟名器爵祿朕所不敢授以私則勞謙退避卿豈得必行其意所謂唐虞三代信任之至以致稷契伊吕德業之隆若卿之言朕敢不勉請事斯語永觀厥成賜新除守尚書右僕射兼中書侍郎范純仁上第二表辭免恩命不許斷來章批答元祐三年四月十二日省表具之卿以明哲自託不能非獨以見君子勞謙之光亦因以知前世用人之弊功烈無取誠如卿言夫次公減於為郡子元不如為將非獨文獻不足蓋其才德有偏如卿昔在朝廷首談孟軻之仁義旋為帥守專行羊祜之威信慨有大志似其先人茍推此心施于有政則太平可望而小節可略矣賜范純仁上第二表辭免恩命不允斷來章批答元祐三年四月十三日省表具之自昔先帝之世屢歎才難及朕嗣位以來專用德選雖爵祿名器出於獨斷而長育成就實在羣公長短不遺輔相之責茍無為國養人之意必有臨事乏使之憂朕用慨然當食不御思得英雋之老共收文武之朋惟卿篤於憂國明於知人灼見朕心宜在此位往任天下之重毋事匹夫之廉賜新除依前正議大夫守門下侍郎孫固辭免恩命不許斷來章批答元祐二年四月十三日省表具之卿奉事先帝有勸學之舊與聞機政有已試之功固非躐等之遷獨恨用卿之晚勉循大義毋事小廉賜孫固辭免恩命不允斷來章批答元祐三年日四月十二省表具之卿向自西樞出殿藩服頃由近輔入侍燕閒昔有未識之思今乃日聞其語既見君子無踰老臣當益勵於初心尚何辭於新命賜新除中大夫守尚書右丞胡宗愈辭免恩命不許斷來章批答元祐三年四月十四日省表具之卿自天官擢領風憲下有庇民之意上有愛君之忠度其不以利回是故可以大受丞轄之任非卿孰宜毋復固辭以就逺業賜胡宗愈辭免恩命不允斷來章批答元祐三年四月十四日省表具之人才之難古今所病忠厚者多乏於用强濟者或凉於德有德適用如卿幾人方觀卿謀國之良以成朕知人之美深體此意往祗厥官賜新除依前中散大夫充樞密直學士僉書樞密院事趙瞻辭免恩命不允斷來章批答元祐三年四月十四日省表具之君子之仕也喜於知而樂於用如卿之言結髮從仕而白首遇合則君子之用舍進退蓋亦有時矣勉行其道無失斯時茍能遇事而必為則亦立功之未晚古人之事將見於卿賜趙瞻辭免恩命不允斷來章批答元祐三年日四月十四省表具之卿挺然孤忠白首一節逝將力求於退避夫豈有意於進取哉特以雅望既隆公議所在方將度才而授任固難越卿以用人往踐厥官毋違朕志賜正議大夫知樞密院事安燾乞退不允批答元祐三年五月十八日省表具之宥密之司安危所寄雖羌酋款塞少休烽燧之虞而夏童跳邊猶煩箠策之馭翻然求去義有未安夫以朕大烹優賢之資豈不能助卿養志之具足以毋廢子職而能兼為國謀豈不休哉賜正議大夫知樞密院事安燾乞退不許批答元祐三年五月二十八日省表具之乃眷西樞實參大柄吾欲兵民兼利戎夏兩安自非宿業更變之臣懼有傷財縱敵之患卿當念先朝委重之久未可以親庭歸養為詞勉安厥官以副吾意賜新除殿前副都指揮使武泰軍節度使苗授上第一表辭免恩命不許斷來章批答元祐三年七月十九日省表具之試材已舊謀帥尤艱故以久次用人欲其深練於事而卿辭以錮疾豈所望哉速即乃官毋復退避賜新除殿前副都指揮使武泰軍節度使苗授上第二表辭免恩命不允斷來章批答元祐三年七月十九日覽表具之環衛之嚴節制之重誕告多士以長萬夫朕豈輕用其人哉確然固辭未喻厥指往祗朕命毋曠乃官賜太師平章軍國重事文彥博上第一表乞致仕不許批答元祐三年九月二日覽表具之昔師尚父九十秉旄杖鉞猶未告老此諸葛元遜所以屈張昭也而衛武公百年猶針警於國曰無以我老耄而捨我此左史倚相所以誨申公也今卿壽考康寧而退托衰病自引求去獨不念天下之士有如彼二子者議其後乎姑安厥官以答公論賜太師文彥博上第一表乞致仕不允批答元祐三年九月二日覽表具之朕聞之成王之政周公在前召公在後畢公在左史佚在右四子挾而維之目見正色耳聞正言一日即位天下曠然未聞四子以老而求退亦未聞成王以老而聽其去也朕雖不德猶庶幾成王之治卿雖老矣獨不能以四子之心為心乎勉卒輔朕無愧前人賜新除守司空同平章事吕公著上第一表辭免恩命不允批答省表具之夫司空之官自唐以來雖無職事而孔子所謂天子有爭臣七人者三公首當之朕欲聞仁人之要言與天下之大計非此元老將安取斯卿其省思慮慎寢食優游廟堂為朕謀其大者賜新除守尚書左僕射門下侍郎吕大防辭免恩命不允批答省表具之夫天以斯民付人主而人主付之宰相若不得人為慢天之所付朕敢乎哉如卿瑰姿偉望宏毅開濟朕既用之不疑而卿自疑何也往修厥官毋斁朕命賜新除尚書左僕射兼門下侍郎吕大防上第一表辭免恩命不許批答覽表具之自英廟擢卿於言責而先帝用卿於西師則朝廷待卿之重蓋出於祖宗之意矣孔子曰吾之於人也誰毁誰譽如有所譽其有所試若卿者可謂屢試矣卿而不宜其孰宜之賜新除守司空同平章事吕公著上表辭免不許批答覽表具之天下之事使壯者治之老者謀之自堯舜以來未有易此者也今卿議政而不及事勞心而不及力吾自以為得養老之禮而不失用賢之實卿何辭之堅也生獲果莊文武百寮稱賀宣答詞元祐二年八月二十八日太皇太后種羌叛渙西鄙繹騷首出偏師遂擒元惡安邊之喜與卿等同之皇帝凶狡就俘羌戎一震既增吏士之氣亦寬戍守之勞靖寇息民與卿等同喜八月二十八日入內高班蔡克明傳宣取批答宰臣以下賀生獲果莊表太皇太后國家偃兵息民函養中外果莊無故犯順神人棄之雖廟社無疆之休亦將相一心之助封章來上嘉歎不忘皇帝朕上承慈訓下盡羣策務漸寬於民力本無意於邊功既狂狡之就擒知休息之有日再閲來奏嘉歎于中東坡全集卷一百十三
