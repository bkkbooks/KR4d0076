body:
  text: 東坡全集巻七十五宋蘓軾撰書二十首謝歐陽内翰書軾竊以天下之事難於改為自昔五代之餘文教衰落風俗靡靡日以塗地聖上慨然太息思有以澄其源疏其流明詔天下曉諭厥㫖於是招來雄俊魁偉敦厚朴直之士罷去浮巧輕媚叢錯采繡之文將以追兩漢之餘而漸復三代之故士大夫不深明天子之心用意過當求深者或至於迂務竒者怪僻而不可讀餘風未殄新弊復作大者鏤之金石以傳久逺小者轉相摹寫號稱古文紛紛肆行莫之或禁盖唐之古文自韓愈始其後學韓而不至者為皇甫湜學皇甫湜而不至者為孫樵自樵以降無足觀矣伏惟内翰執事天之所付以收拾先王之遺文天下之所待以覺悟學者恭承王命親執文柄意其必得天下之竒士以塞明詔軾也逺方之鄙人家居碌碌無所稱道及來京師久不知名將治行西歸不意執事擢在第二惟其素所蓄積無以慰士大夫之心是以羣嘲而聚罵者動滿千百亦惟恃有執事之知與衆君子之議論故恬然不以動其心猶幸御試不為有司之所排使得搢笏跪起謝恩於門下聞之古人士無賢愚惟其所遇盖樂毅去燕不復一戰而范蠡去越亦終不能有所為軾願長在下風與賓客之末使其區區之心長有所發夫豈惟軾之幸亦執事將有取一二焉不宣謝梅龍圖書軾聞古之君子欲知是人也則觀之以言言之不足以盡也則使之賦詩以觀其志春秋之世士大夫皆用此以卜其人之休咎死生之間而其應若影響符節之宻夫以終身之事而决於一詩豈其誠發於中而不能以自蔽邪傳曰登髙能賦可以為大夫矣古之所以取人者何其簡且約也後之世風俗薄惡漸不可信孔子曰今吾於人也聽其言而觀其行知詩賦之不足以决其終身也故試之論以觀其所以是非於古之人試之䇿以觀其所以措置於今之世而詩賦者或以窮其所不能䇿論者或以掩其所不知差之毫毛輒以擯落後之所以取人者何其詳且難也夫惟簡且約故天下之士皆敦朴而忠厚詳且難故天下之士虚浮而矯激伏惟龍圖執事骨鯁大臣朝之元老憂䘏天下慨然有復古之心親較多士存其大體詩賦將以觀其志而非以窮其所不能䇿論將以觀其才而非以掩其所不知使士大夫皆得寛然以盡其心而無有一日之間倉皇擾亂偶得偶失之歎故君子以為近古軾長於草野不學時文詞語甚朴無所藻飾意者執事欲抑浮剽之文故寧取此以矯其弊人之幸遇乃有如此感荷悚息不知所裁謝范舍人書軾聞之古人民無常性雖土地風氣之所禀而其好惡則存乎其上之人文章之風惟漢為盛而貴顯暴著者蜀人為多蓋相如唱其前而王褒繼其後峩冠曳佩大車駟馬徜徉乎鄉閭之中而蜀人始有好文之意絃歌之聲與鄒魯比然而二子者不聞其能有所薦達豈其身之富貴而遂忘其徒耶嘗聞之老人自孟氏入朝民始息肩救死扶傷不暇故數十年間學校衰息天聖中伯父觧褐西歸鄉人歎嗟觀者塞塗其後執事與諸公相繼登於朝以文章功業聞於天下於是釋耒耜而執筆硯者十室而九比之西劉又以逺過且蜀之郡數十軾不敢逺引其他蓋通義蜀之小州而眉山又其一縣去嵗舉於禮部者凡四五十人而執事與梅公親執權衡而較之得者十有三人焉則其他可知矣夫君子之用心於天下固無所私愛而於其父母之邦茍有得之者其與之喜樂豈如行道之人漠然而已哉執事與梅公之於蜀人其始風動誘掖使聞先王之道其終度量裁置使觀天子之光與相如王褒又甚逺矣軾也在十三人之中謹因閽吏進拜於庭以謝萬一又以賀執事之鄉人得者之多也上王兵部書荆州南北之交而士大夫徃來之衝也執事以髙才盛名作牧如此蓋亦嘗有以相馬之説告於左右者乎聞之曰騏驥之馬一日行千里而不殆其脊如不動其足如無所着升髙而不輊走下而不軒其伎藝卓絶而效見明著至於如此而天下莫有識者何也不知其相而責其技也夫馬者有昻目而豐臆方蹄而宻睫㨗乎若深山之虎曠乎若秋後之逺望目若視日而志不存乎芻粟若是者飄忽騰踔去而不知所止是故古之善相者立於五逹之衢一目而眄之聞其一鳴顧而循其色馬之技盡矣何者其相溢於外而不可蔽也士之賢不肖見於面顔而發泄於辭氣卓然其有以存乎耳目之間而必曰乆居而後察則亦名相士者之過矣夫軾西州之鄙人而荆之過客也其足跡偶然而至於執事之門其平生之所治以求聞於後世者又無所挾持以至於左右蓋亦易疎而難合也然自蜀至於楚舟行六十日過郡十一縣三十有六取所見郡縣之吏數十百人莫不孜孜論執事之賢而敎之以求通於下吏且執事何修而得此稱也軾非敢以求知而望其所以先後於仕進之門者亦徒以為執事立於五逹之衢而庻幾乎一目之眄或有以信其平生爾夫今之世豈惟王公擇士士亦有所擇軾將自楚遊魏自魏無所不遊恐他日以不見執事為恨也是以不敢不進不宣軾再拜與劉宜翁書軾頓首宜翁使君先生閣下秋暑竊惟尊體起居萬福軾乆别因循不通問左右死罪死罪愚闇剛𥚹仕不知止白首投荒深愧朋友然定命要不可逃置之勿復道也惟有一事欲謁之先生出於迫切深可憫笑古之學者不憚斷臂刳眼以求道今若但畏一笑而止則過矣軾齠齓好道本不欲婚宦為父兄所强一落世網不能自逭然未嘗一念忘此心也今逺竄荒服負罪至重無復歸望杜門屏居寝飯之外更無一事胷中廓然實無荆棘竊謂可以受先生之道故託里人任德公親致死懇古之至人本不恡惜道術但以人無受道之質故不敢輕付之軾雖不肖竊自謂有受道之質三謹令德公口陳其詳伏料先生知之有素今尤哀之想見聞此欣然拊掌盡發其秘也幸不惜辭費詳作一書付德公以授程徳孺表弟令專遣人至惠州路逺難於徃返咨問幸與軾盡載首尾勿留後段以俟憤悱也或有外丹已成可助成梨棗者亦望不惜分惠迫切之誠真可憫笑矣夫心之精㣲口不能盡而况書乎然先生筆端有口足以形容難言之妙而軾亦眼中無障必能洞視不傳之意也但恨身在謫籍不能千里踵門北面摳衣耳昔葛稚川以丹砂之故求句嶁令先生黨有意乎嶠南山水竒絶多異人神藥先生不畏嵐瘴可復談笑一遊則小人當奉杖屨以從矣昨夜夢人為作易卦得大有上九及覺而占之乃郭景純為許邁筮有元吉自天祐之之語遽作此書庶幾似之其餘非書所能盡惟祝萬萬以時自重不宣上王刑部書軾今日得於州吏伏審執事移使湖北竊以江陵之地實楚之故國巴蜀甌越三吳之出入者皆取道於是為一都會其山川之勝蓋厯代所嘗用武焉其間吳蜀魏氏尤悉力爭之宋有天下王師平髙繼冲至於降孟昶下周保權又皆出此其人才之秀風物之美有屈宋伍襧之賦詠存焉建節旄而使者專有是土其見倚之重為吏之樂豈細也哉然執事處之則未足賀誠以執事之材力地望宜進任於時不宜任此或者以謂蠻反南方用兵湖北鄰也宜擇人撫之故以屬執事使誠有是議當出於廟堂非愚所得知所不敢臆定所敢伏思者人患材不足施或不得施豈以位之彼此大小為擇哉於執事之心當亦若是肆吾力充吾職而巳豈以位之彼此大小動吾意哉固執事之所務也不宣軾再拜與佛印禪老書軾啟歸宗化主來辱書方欲裁謝棲賢遷師處又得手敎眷與益勤感怍無量數日大熱緬想山門方適清和法體安穏雲居事迹已領冠世絶境大士所廬已難下筆而龍居筆勢巳自超然老拙何以加之幸稍寛假使得欵曲抒思也昔人一渉世事便為山靈勒回俗駕今僕䝉犯塵垢垂三十年困而後知返豈敢便㸃涴名山而山中髙人皆未相識而迎許之何以得此豈非宿縁也哉向熱順時自愛不宣軾再拜收得美石數百枚戲作怪石供一篇以發一笑開却此例山中齋粥今後何憂想復大笑也更有野人於墓中得銅盆一枚買得以盛怪石並送上結縁也上荆公書軾頓首再拜特進大觀文相公執事近者經由屢獲請見存撫敎誨恩意甚厚别來切計台候萬福軾始欲買田金陵庶幾得陪杖屨老於鍾山之下既已不遂今來儀真又二十餘日日以求田為事然成否未可知也若幸而成扁舟徃來見公不難也向屢言髙郵進士秦觀太虚公亦粗知其人今得其詩文數十首拜呈詞格髙下固已無逃於左右獨其行義修飭才敏過人有志於忠義者其請以身任之此外博綜史傳通曉佛書講集醫藥明練法律若此類未易一一數也才難之歎古今共之如觀等輩實不易得願公少借齒牙使増重於世其他無所望也秋氣日佳㣲疾想已失去伏冀順時候為國自重上韓樞宻書軾頓首上樞宻侍郎閣下軾受知門下似稍異於尋常人蓋嘗深言不諱矣明公不以為過其在錢塘時亦䝉以書見及語意親甚自爾不復通問者七年於茲矣頃聞明公入西府門前書生為作賀啟數百言軾輒裂去曰明公豈少此哉要當有輔於左右者昔侯霸為司徒其故人嚴子陵以書遺之曰君房足下位至台鼎甚善懐仁輔義天下悦阿諛順㫖要領絶世以子陵為狂以軾觀之非狂也方是時光武以布衣取天下功成志滿有輕人臣之心躬親吏事所以待三公者甚薄霸為司徒奉法循職而巳故子陵有以感發之今陛下之聖不止光武而明公之賢亦逺過侯霸軾雖不用然有位於朝未若子陵之獨善也其得盡言於左右良不為過今者貪功僥倖之臣勸上用兵於西北使斯言無有則天下之幸孰大於此不幸有之大臣所宜必爭也古今兵不可用明者計之詳矣明公亦必然之軾不敢復言獨有一事以為臣子之忠孝莫大於愛君愛君之深者飲食必祝之曰使吾君子孫多長有天下此豈非臣子之願歟古之人君好用兵者多矣出而無功與有功而君不賢者皆不足道也其賢而有功者莫若漢武帝唐太宗武帝建元元年蚩尤旗見其長亘天後遂命將出師畧取河南地建置朔方其春戾太子生自是之後師行蓋十餘年兵所誅夷屠滅死者不可勝數巫蠱事起京師流血僵尸數萬太子父子皆敗故班固以為太子生長於兵與之終始唐太宗旣平海内破滅突厥髙昌吐谷渾等且猶未厭親駕征遼東當時大臣房魏輩皆力爭不從使無辜之民身膏草野於萬里之外其後太子承乾齊王祐吳王恪皆繼相誅死其餘遭武氏之禍殘殺殆盡武帝好古崇儒求賢如不及號稱世宗太宗克已求治幾致刑措而其子孫遭罹如此豈為善之報也哉由此言之好兵始禍者既足以為後嗣之累則凡忍耻含垢以全人命其為子孫之福審矣軾既無状竊謂人主宜聞此言而明公宜言此此言一聞豈惟朝廷無疆之福將明公子孫實世享其報軾懷此欲陳乆矣恐未信而諫則以為謗不勝區區之忠故移致之明公雖以此獲罪不愧不悔皇天后土宜聞此言上吕相公書軾昨日面論邢䕫事愚意本謂刑鼻是平人邢䕫妄意其為盗殺之若用犯時不知勿論法深恐今後欲殺人者皆因其疑似而殺但云我意汝是盗即免矣公言此自是謀殺若不勘出此情安用勘司軾歸而念公言既心服矣然念近者西京奏秦課兒於大醉不省記中打殺南貴就縳至醒取衆證為定作可憫奏已得㫖貸命而門下别取㫖斷死竊聞輿議亦恐貸之啟奸若殺人者得以醉免為害大矣軾始者亦以為然固已書過録黃再用公昨日之言思之若今後實醉不醒而殺其情可憫可以原貸若託醉而殺自是謀殺有勘司在邢䕫犯時不知秦課兒醉不省記皆在可憫之科而邢䕫臀杖編管秦課兒决殺似輕重相逺情有未安人命至重若公以為然文字尚在尚書省可追改也與章子厚書軾頓首再拜子厚參政諫議執事去嵗吳興謂當再獲接奉不意倉卒就逮遂以至今即日不審台候何似軾自得罪以來不敢復與人事雖骨肉至親未肯有一字徃來忽䝉賜書存問甚厚憂愛深切感嘆不可言也㳟聞拜命與議大政士無賢不肖所共慶快然軾始見公長安則語相識云子厚竒偉絶世自是一代異人至於功名將相乃其餘事方是時應軾者皆憮然今日不獨為足下喜朝之得人亦自喜其言之不妄也軾所以得罪其過惡未易以一二數也平時惟子厚與子由極口見戒反覆甚苦而軾强狠自用不以為然及在囹圄中追悔無路謂必死矣不意聖主寛大復遣視息人間若不改者軾真非人也來書所云若痛自追悔徃咎清時終不以一𤯝見廢此乃有才之人朝廷所惜如軾正復洗濯瑕垢刻磨朽鈍亦當安所施用但深自感悔一日百省庶幾天地之仁不念舊惡使保首領以從先大夫於九原足矣軾昔年粗亦受知於聖主使少循理安分豈有今日追思所犯真無義理與病狂之人蹈河入海者無異方其病作不自覺知亦窮命所迫似有物使及至狂定之日但有慚耳而公乃疑其再犯豈有此理哉然異時相識但過相稱譽以成吾過一旦有患難無復有相哀者惟子厚平居遺我以藥石及困急又有以収恤之真與世俗異矣黄州僻陋多雨氣象昏昏也魚稻薪炭頗賤甚與窮者相宜然軾平生未嘗作活計子厚所知之俸入所得隨手輒盡而子由有七女債負山積賤累皆在渠處未知何日到此見寓僧舍布衣蔬食隨僧一餐差為簡便以此畏其到也窮逹得䘮粗了其理但禄廪相絶恐年載間遂有饑寒之憂不能不少念然俗所謂水到渠成至時亦必自有處置安能預為之愁煎乎初到一見太守自餘杜門不出閒居未免㸔書惟佛經以遣日不復近筆硯矣㑹見無期臨紙惘然冀千萬以時為國自重荅劉巨濟書軾啟人來辱書累幅承起居無恙審比來憂患相仍情懷牢落此誠難堪然君在侍下加以少年美才當深計逺慮不應戚戚狥無已之悲賢兄文格竒拔誠如所云不幸早世其不朽當以累足下見其手書舊文不覺出涕詩及新文愛玩不巳都下相知惟司馬君實劉貢父當以示之恨僕聲勢低弱不能力為發揚然足下豈待人者哉與吳秀才書論佛大善近時士人多學談理空性以追世好然不足深取時以此取之不得不爾耳僕老拙百無堪向在科塲時不得已作應用文不幸為人傳冩深可羞愧以此得虛名天下近世進人以名平居雖孔孟無異一經試用鮮不為笑以此益羞為文自一二年來絶不復為今足下不察猶以所羞者譽之過矣舍弟差入貢院更月餘方出家孟侯雖不得解却用徃年衣服不赴南省得免解其兄安國亦然勤國亦捷州解皆在此因風時惠問以慰饑渴何時㑹合臨紙悵然惟强飯自重與孫運勾書軾啟脾能母養餘臟故養生家謂之黃婆司馬子㣲著天隱子獨教人存黄氣入泥丸能致長生太倉公言安穀過期不安穀不及期以此知脾胃完固百疾不生近見江南老人年七十二状貌氣力如四五十人問其所得初無異術但云平生習不飲湯水耳常人日飲數升吾日减一合今但沾唇而巳脾胃惡濕飲少胃强氣盛液行自然不濕雖冒暑逺行亦不念水此可謂至言不繁聞曼叔比得腫疾皆以利水藥去之中年以後一利一衰豈可數乎當及今無病時力養胃氣若土能制水病何由生陳彦升云少時得此病服商陸防已之類皆不效服金液丹灸臍下乃愈此亦固胃助陽之意也但火力外物不如江南老人之術耳薑橘辣藥例能張肺多為腫媒不可服有書以告之為佳也與王庠書三首軾啟逺蒙差人致書問安否輔以藥物眷意甚厚自二月二十五日至七月十三日凡一百三十餘日乃至水陸盖萬餘里矣罪戾逺黜既為親友憂又使此兩人者跋涉萬里比其還家幾盡此嵗此君愛我之過而重其罪也但喜比來侍奉多暇起居佳勝軾罪大責薄居此固宜無足言者瘴癘之邦僵仆者相屬於前然亦有以取之非寒暖失宜則饑飽過度茍不犯此者亦未遽病也若大期至固不可逃又非南北之故矣以此居之泰然不煩深念前後所示著述文字皆有古作者風力大畧能道意所欲言者孔子曰辭達而已矣辭至於達止矣不可以有加矣經説一篇誠哉是言也西漢以來以文設科而文始衰自賈誼司馬遷其文已不逮先秦古書况其下者文章猶爾况所謂道德者乎若所論周勃則恐不然平勃未嘗一日忘漢陸賈為之謀至矣彼視禄産猶几上肉但将相和調則大計自定若如君言先事經營則吕后覺悟誅兩人而漢亡矣軾少時好議論古人既老涉世更變往往悔其言之過故樂以此告君也儒者之病多空文而少實用賈誼陸贄之學殆不傳於世老病且死獨欲以此教子弟豈意婣親中乃有王郎乎三復來貺喜抃不已應舉者志於得而巳今程試文字千人一律考官亦厭之未必得也如君自信不囘必不為時所棄也又况得失有命决不可移乎勉守所學以卒逺業相見無期萬萬自重而已人還謹奉手啟少謝萬一又軾啟二卒逺來承手書兩幅問勞教誨憂愛備盡仍審侍奉多暇起居萬福感愧深矣軾罪責至重上不忍誅止竄嶺海感恩念咎之外不知其他來書開説過當非親朋相愛保全之道悚息悚息寄示髙文新詩詞氣比舊益見奇偉粲然如珠貝溢目非獨鄉閭世不乏人為喜又幸珍材異産近出姻戚數日讀不釋手每執以告人曰此吾家王郎之文也老朽廢學久矣近日尤不近筆硯見少時所作文如隔世事他人文也足下猶欲使議論其間是顧千里於伏櫪也軾少時本欲逃竄山林父兄不許迫以婚宦故汩没至今南遷以來便自處置生事蕭然無一物大畧似行脚僧也近日又苦痔疾呻吟幾百日縁此斷葷血鹽酪日食淡麵一斤而已非獨以愈疾實務自枯槁以求寂滅之樂耳初欲獨赴貶所兒女輩涕泣求行故與㓜子過一人來餘分寓許下浙中散就衣食既不在目前便與之相忘如本無有也足下過相愛乃遣萬里相問無状自取既為親友憂及又使此兩人者蒙犯瘴霧﨑嶇往來吾罪大矣寄遺藥物并方皆此中無有芎尤奇味得日食以禦瘴也軾為舊患痔今頗發作外無他故不煩深念㑹晤無期惟萬萬以時保練又軾啟前後所寄髙文無不達者每見増歎伏但恨老拙無以少答來貺又流落海隅不能少助聲名於當時然格力自天要自有公論雖欲不顯揚不可得也程夫子尚困塲屋王賢良屈於州縣皆造物有不可曉者海隅風土甚惡亦有佳山水而無佳寺院無士人無醫無藥杜門食淡不飲酒亦粗有味也目昏倦作書又此信發書極多不能盡察之答陳季常書軾啟恵兵還辱得季常手書累幅審知近日尊候安勝擇括等三鳯毛皆安為學日益喜慰無量軾罪大責薄聖恩不貲知幸念咎之外了無絲髮掛心置之不足復道也自當塗聞命便遣骨肉還陽羡獨與㓜子過及老雲并二老婢共吾過嶺到恵将半年風土食物不惡吏民相待甚厚孔子云雖蠻貊之邦行矣豈欺我哉自數年來頗知内外丹要處冒昧厚禄負荷重寄决無成理自失官後便覺三山跬步雲漢咫尺此未易遽言也所以云云者欲季常安心家居勿輕出入老劣不煩過慮决須幅巾草屨相從於林下也亦莫遣人來彼此鬚髯如㦸莫作兒女態也在定日作松醪賦一首今寫寄擇等庶以發後生妙思着鞭一躍當撞破烟樓也長子邁作吏頗有父風二子作詩騷殊勝咄咄皆有跨竈之興想季常讀此捧腹絶倒也今日遊白水佛跡山山上布水三十仞雷輥電散未易名状大畧如項羽破章邯時也自山中歸來燈下裁答信筆而書紙盡乃巳託郡中作皮筒送去想黄人見軾書必不沈墜也子由在筠極安處此者與軾無異也書云老軀極健度去死逺在讀之三復喜可知也吾儕但㫁却少年時無状一事誠是然他未及子由見人説顔状如四十嵗人信此事不辜負人也不宣軾再拜與謝民師推官書軾啟近奉違亟辱問訊具審起居佳勝感慰深矣軾受性剛簡學迂材下坐廢累年不敢復齒縉紳自還海北見平生親舊惘然如隔世人况與左右無一日之雅而敢求交乎數賜見臨傾蓋如故幸甚過望不可言也所示書教及詩賦雜文觀之熟矣大畧如行雲流水初無定質但常行於所當行常止於不可不止文理自然姿態横生孔子曰言之不文行之不逺又曰辭達而已矣夫言止於達意疑若不文是大不然求物之妙如繫風捕影能使是物了然於心者盖千萬人而不一遇也而况能使了然於口與手者乎是之謂辭達辭至於能達則文不可勝用矣揚雄好為艱深之詞以文淺易之説若正言之則人人知之矣此正所謂雕蟲篆刻者其太𤣥法言皆是類也而獨悔於賦何哉終身雕蟲而獨變其音節便謂之經可乎屈原作離騷經盖風雅之再變者雖與日月争光可也可以其似賦而謂之雕蟲乎使賈誼見孔子升堂有餘矣而乃以賦鄙之至與司馬相如同科雄之陋如此比者甚衆可與知者道難與俗人言也因論文偶及之耳歐陽文忠公言文章如精金美玉市有定價非人所能以口舌定貴賤也紛紛多言豈能有益於左右愧悚不已所須恵力法雨堂字軾本不善作大字强作終不佳又舟中局迫難冩未能如教然軾方過臨江當往游焉或僧有所欲記録當作數句留院中慰左右念親之意今日已至峽山寺少留即去愈逺惟萬萬以時自愛不宣與孫知損運使書文安北城如涉無人之境其漸可虞廟堂巳留意兵久驕惰自合警䇿之數年乃見効惟極邉弓箭社射生極得力虜所畏憚公必舊知之矣以數勾集一月村堡幾虛公私惴惴北賊亦多相時生心社人亦苦勾集勞費此出入守望與虜長技同親戚墳墓所在人自為戰不憂其不閑習也宜與永免冬教又當有以優異勸奨之巳條上其事更月餘可發此事行之邊臣無赫赫之功然經久實事無如此者覘者多云可汗老疾欲傳雛雛為人猜忌好兵邊人盡知之此豈可不留意願公痛為一言心之精意所不能言上書豈能盡也虜􅉼浸德澤久矣其勢亦未遽渝盟但恐雛兒鷙忍其下必有不忠貪功好利之人謀之必先使北賊小小盗邊託為不知若不折其萌芽狃於小利張而不已必開邊隙備禦之䇿惟安養弓箭社及稍加優異使當淬礪以待小冦䇿無良於此者矣所條上數事亦甚穏帖不至張皇惟乞免人户折變所費不多及立閒名目奨社人頭首又乞復囘易収息時遣機宜僚屬費少錢粮就地頭賞其髙强者耳與王定國書罪大責輕得此巳幸未嘗戚戚但知識數人縁我得罪而定國為已所累尤深流落荒服親愛隔絶每念至此覺心肺間便有湯火芒刺今得來教既不見棄絶而能以道自遣無絲髮芥蔕然後知公真可人而不肖他日猶得以衰顔白髮厠賔客之末也揚州有侍其太保官於烟瘴地十餘年比歸面紅潤無一㸃瘴氣只是用磨脚心法此法定國自知之更請加功不廢每日飲少酒調食令胃氣壮健安道軟朱砂膏軾在湖親服數兩甚覺有益利可久服子由昨來陳相别面色殊清潤目光烱然夜中行氣臍腹間隆隆如雷聲其所行持亦吾輩所常論者但此君有志節能力行耳粉白黛緑者俱是火宅中狐狸射干之流願公以道眼照破此外又有事須少儉嗇勿輕用錢物一是逺地恐萬一闕乏不繼一是灾難中用貶惡消厄致福之一端也又遞中領手教知到官無恙自處泰然頓慰懸想知攝二千石風聲震於殊俗一叚奇事也軾近頗知養生亦自覺薄有所得見者皆言道貌與往日殊别更相濶數年索我閬風之上矣兼畫得寒林墨竹巳入神品行草尤工只是詩筆殊退也不知何故昨所寄臨江軍書久已収得二書反覆議論及處憂患者甚詳既以解憂又以洗我昏蒙所得不少也然所謂非茍知之亦允蹈之者願公常誦此語也杜子美困厄中一飲一食未嘗忘君詩人以來一人而已今見定國每有書皆有感恩念咎之語甚得詩人之本意僕雖不肖亦當髣髴於庶幾也近有人恵大丹砂少許光彩甚奇固不敢服然其人教以養火觀其變化聊以悦神度日賔去桂不甚逺朱砂差易致或為置數兩因寄及稍難即罷非急用也窮荒之中恐有一奇事但以冷眼隂求之大抵道士非金丹不能羽化而丹材多在南荒故葛稚川求勾漏令竟化於亷州不可不留意也陳璨一月前直往筠州㸔子由亦粗傳要妙云非久當此來此人不唯有道術其與人有情義久要不忘如此亦自可重道術多方難得其要然軾觀之唯能静心閉目以漸習之似覺有功幸信此語使氣流行體中痒痛安能近人也邇來江淮間酷暑殆非人所堪况於嶺外唯道德清曠必有以解煩釋悶者入秋來翛然清逺計尊候安勝君學術日益如川之方増幸更着鞭多讀史書仍手自抄為妙造次造次軾自謫居以來可了得易傳九巻論語説五巻今又下手作書傳迂拙之學聊以娛老且以為子孫藏耳子由亦了得詩傳又成春秋集傳想知之為一笑耳辱恵書并新詩妙曲大慰所懐河凍膠舟咫尺千里意思牢落可知得此佳作終日喜快滯悶氷釋幸甚幸甚近在常置得一小莊子嵗可得百石似可足食非不知揚州之美窮猿投林不暇擇木也東坡全集巻七十五
