body:
  text: 東坡全集卷二十二宋蘇軾撰詩六十九首劉醜厮詩劉生望都民病羸寄空窑有子曰醜厮十二行操瓢墦間得餘粒雪中拾墮樵饑飽共生死水火同焚漂病翁恃一褐度此積雪宵哀哉二暴客掣去如饑梟翁既死於寒客亦易此齠﨑嶇走亭長不憚雪徑遙我仇祝與苑物色同遮邀行路為出涕二客竟就梟譊譊訴我庭慷慨驚吾僚曰此可名寄追配郴之蕘恨我非柳子擊節為爾謡官賜二萬錢無家可歸嬌為媾他日婦婉然初垂髫洗沐作小史裹頭束其腰筆硯耕學苑戈矛戰天驕壯大隨所好忠孝福可徼相國有折脅封侯或吹簫人事豈易料勿輕此僬僥題毛女真霧鬢風鬟木葉衣山川良是昔人非祇應門過商顔老獨自吹簫月下歸寄餾合刷瓶與子由老人心事日摧頽宿火通紅手自焙小甑短瓶良具足稚兒嬌女共燔煨寄居東閣閒蒸栗知我空堂坐畫灰約束家僮好收拾故山梨棗待翁來次韻子由清汶老龍珠丹天公不解防癡龍玉函寶方出龍宫雷霆下索無處避逃入先生衣袂中先生不作金椎袖玩世徜徉隱屠酒夜光明月空自投一鍛何勞緯蕭手黃門寡好心易足荆棘不生梨棗熟𤣥珠白璧兩無求無脛金丹來入腹區區分别笑樂天那知空門不是仙次韻子由書清汶老所傳秦湘二女圖春風消冰失瑶玉我本無身安有觸羊生得婦如得風握手一笑未為辱先生室中無天逰佩環何處鳴風甌隨魔未必皆魔女但與分燈遣歸去胡為寫真傳世人更要維摩一轉語丹元茅茨祇三間太極老人時往還㸃檢凡心早除拂方平神鞭常使物紫團參寄王定國谽谺土門口突兀太行頂豈惟團紫雲實自俯倒景剛風被草木真氣入苕潁舊聞人銜芝生此羊腸嶺纎㩥虎豹鬛蹙縮龍蛇癭蠶頭試小嚼龜息變方騁矧豫明真子巳造浮玉境清宵月挂戶半夜珠落井灰心寧復然汗喘久已靜東坡猶故目北藥致遺秉欲持三丫根往侑九轉鼎為豫置齒頰豈不賢酒茗次韻劉燾撫句蜜漬荔支時新滿座聞名字别久何人記色香葉似楊梅蒸霧雨花如盧橘傲風霜每憐蓴菜下鹽豉肯與蒲萄壓酒漿回首驚塵卷飛雪詩情真合與君嘗立春日小集呈李端叔白髮已十載青春無一堪不驚新嵗換聊與故人談牛健民聲喜鴉嬌雪意酣霏微不到地和暖要冝蠶嵗月斜川似風流曲水慙行吟老燕代坐睡夢江潭丞掾頗哀援歌呼誰怕參衰懷久灰槁習氣尚饞貪白啖本河朔紅消真劒南辛盤得青韭臘酒是黃柑歸卧燈殘帳醒聞葉打庵須煩李居士重說後三三次韻曾仲錫元日見寄蕭索東風兩鬢華年年幡勝翦宫花愁聞塞曲吹蘆管喜見春盤得蓼芽吾國舊供雲澤米定武齊酒用蘇州米君家新致雪坑茶近得曾坑茶燕南異事真堪記三寸黃柑擘永嘉子由生日以檀香觀音像及新合印香銀篆槃為夀栴檀婆律海外芬西山老臍柏所薰香螺脫黶來相羣能結縹眇風中雲一燈如螢起微焚何時度盡繆篆紋繚繞無窮合復分綿綿浮空散氤氲東坡持是夀卯君君少與我師皇墳旁資老𥅆釋迦文共厄中年㸃蠅蚊晚遇斯須何足云君方論道承華勛我亦旗鼓嚴中軍國恩當報敢不勤但願不為世所醺爾來白髮不可耘問君何時返鄉枌收拾散亡理放紛此心實與香俱焄聞思大士應已聞次韻李端叔送保倅翟安常赴闕兼寄子由中山保塞兩窮邊卧治雍容己百年顧我迂愚分竹使與君談笑用蒲鞭松荒三徑思元亮草合平池憶惠連白髮歸心慿說與古來誰似兩疏賢中山松醪寄雄王引進鬱鬱蒼髯千嵗姿肯來杯酒作兒嬉流芳不待龜巢葉唐人以荷葉為酒杯謂之碧筒酒掃白聊煩鶴踏枝醉裏便成欹雪舞醒時與作嘯風辭馬軍走送非無意玉帳人閒合有詩次韻李端叔謝送牛戩鴛鴦竹石圖聞君談西戎廢食忘早晚王師本不陳賊壘何足剗守邊在得士此語要而簡知君論將口似我識畫眼笑指塵壁間此是老牛戩平生師衛玠非意常理遣訴君定何人未用市朝顯置之勿復道世俗固多舛歸去亦何須單車渡殽澠如蟲得羽化已脫安用繭家書空萬軸涼曝困舒卷念當掃長物閉息默自暖此畫聊付君幽處得小展新詩勿縱筆羣吠驚邑犬時來未可知妙斫待輪扁次韻聰上人見寄前身本同社宿業獨臨邊一悟鏡空老始知圓澤賢歸心忘犢佩生術寄羊鞭不似歐陽子空留六一泉次韻王雄州還朝留别老李威名八十年壁間精悍見遺顔自聞出守風流似稍覺承平氣象還但遣詩人歌杕杜不妨侍女唱陽關內朝接武知何日白髮羞歸供奉班三月二十日多葉杏盛開零露泫月蘃溫風散晴葩春工了不睡連夜開此花芳心誰翦刻天質自清華惱客香有無弄粧影橫斜中山古戰國殺氣浮髙牙叢臺餘袨服易水雄悲笳自從此花開玉肌洗塵沙坐令游俠窟化作溫柔家我老念江海不飲空咨嗟明年花開時舉酒望三巴蓋欲請梓州而歸也三月二十日開園三首雪髯霜鬢語傖獰淡蕩園林取次行要識將軍不凡意從來祇啜小人羮是日散父老酒食西園牡籥夜沉沉尚有遊人卧柳陰鶴睡覺時風露下落花飛絮滿衣襟鬱鬱蒼髯真道友絲絲紅萼是鄉人蒼髯松也紅蕚海棠何時翠竹江村路送我柴門月色新次韻王雄州送侍其涇州威聲又數中興年二虜行當一矢聯聞道名城得真將故應驚羽落空弦追鋒歸去雄三衛授鉞重來定十連别酒回頭便陳迹號呶端合發初筵臨城道中作并引豫初赴中山連日風埃未嘗了了見太行也今將適嶺表頗以是為恨過臨城內丘天氣忽清徹西望太行草木可數岡巒北走崖谷秀傑忽悟歎曰吾南遷其速返乎退之衡山之祥也書以付邁使志之逐客何人著眼看太行千里送征鞍未應愚谷能留柳可獨衡山解識韓過湯陰市得踠豆大麥粥示三兒子朔野方赤地河壖但黃塵秋霖暗豆漆夏旱臞麥人逆旅唱晨粥行庖得時珍青班照匕筯脆響鳴牙齦玉食謝故吏風餐便逐臣漂零竟何適浩蕩寄此身爭勸加餐食實無負吏民何當萬里客歸及三年新子由新修汝州龍興寺吳畫壁丹青久衰工不蓻人物尤難到今世每摹市井作公卿畫手懸知是徒𨽻吳生已與不傳死那復典刑留近嵗人間幾處變西方盡作波濤翻海勢細觀手面分轉側妙算毫釐得天契始知真放本精微不比狂花生客慧似聞遺墨留汝海古壁蝸涎可垂涕力捐金帛扶棟宇錯落浮雲卷新霽使君坐嘯清夢餘幾疊衣紋數襟袂他年弔古知有人姓名聊記東坡弟過髙郵寄孫君孚過淮風氣清一洗塵埃容水木漸幽茂菰蒲雜遊龍可憐夜合花青枝散紅茸美人遊不歸一笑當誰供故園在何處已偃手種松我行忽失路歸夢山千重聞君有負郭二頃收橫從卷野畢秋穫殷牀聞夜舂樂哉何所憂社酒粥面醲宦遊豈不好毋令到千鍾僕所至未嘗出逰過長蘆聞復禪師病甚不可不一問既見則有間矣明日阻風復留見之作三絶句呈聞復并請轉呈參寥子各賦數首亦知壺子不死敢問老𥅆所遊瑟瑟寒松露骨耽耽病虎垂頭莫言西蜀萬里且到南華一遊扶病江邊送客杖拿浦口回頭老去此生一訣興來明日重遊卧聞三老白事半夜南風打頭六月七日泊金陵阻風得鍾山泉公書寄詩為謝今日江頭天色惡炮車雲起風欲作獨望鍾山喚寶公林間白塔如孤鶴寶公骨冷喚不聞却有老泉來喚人電眸虎齒霹靂舌為豫吹散千峰雲南行萬里亦何事一酌曹溪知水味他年若畫蔣山圖為作泉公喚居士贈清涼寺和長老代北初辭沒馬塵江南來見卧雲人問禪不契前三語施佛空留丈六身老去山林徒夢想雨餘鐘鼓更清新㑹須一洗黃茅瘴未用深藏白㲲巾豫前後守倅餘杭凡五年夏秋之間蒸熱不可過獨中和堂東南頰下瞰海門洞視萬里三伏常蕭然也紹聖元年六月舟行赴嶺外熱甚忽憶此處而作是詩忠孝王家千柱宫東坡作吏五年中中和堂上東南頰獨有人間萬里風慈湖夾阻風五首捍索桅竿立嘯空篙師酣寢浪花中故應菅蒯知心腹弱纜能爭萬里風此生歸路愈茫然無數青山水拍天猶有小船來賣餅喜聞墟落在山前我行都是退之詩真有人家水半扉千頃桑麻在船底空餘石髮挂魚衣月輪亭午汗珠融誰識南訛長養功暴雨過雲聊一快未妨明月却當空卧看落月橫千丈起喚清風得半帆且並水村欹側過人間何處不巉巗過廬山下并引豫過廬山下雲物騰涌默有禱焉未午衆峰凜然故作是詩亂雲欲霾山勢與飄風南羣隮相應和勇往爭驂驔可憐薈蔚中時出紫翠嵐鴈沒失東嶺龍騰見西龕一時供坐笑百態變立談暴雨破坱圠清颷掃渾酣廓然歸何處陋矣安足戡亭亭紫霄峰窈窈白石庵五老數松雪雙溪落天潭雖云默禱應顧有移文慙江西江西山水真吾邦白沙翠竹石底江舟行十里磨九瀧篙聲犖確相舂撞醉卧欲醒聞淙淙真欲一口吸老龐何人得俊窺魚矼舉義絶呌尺鯉雙秧馬歌并引過廬陵見宣德郎致仕曾君安止出所作禾譜文既溫雅事亦詳實惜其有所缺不譜農器也豫昔遊武昌見農夫皆騎秧馬以榆棗為腹欲其滑以楸桐為背欲其輕腹如小舟昻其首尾背如覆瓦以便兩髀雀躍于泥中繫束藁其首以縛秧日行千畦較之傴僂而作者勞佚相絶矣史記禹乘四載泥行乘橇解者曰橇形如箕擲行泥上豈秧馬之類乎作秧馬歌一首附于禾譜之末云春雲濛濛雨淒淒春秧欲老翠剡齊嗟我婦子行水泥朝分一壠暮千畦腰如箜篌首啄雞筋煩骨殆聲酸嘶我有桐馬手自提頭尻軒昻腹脅低背如覆瓦去角圭以我兩足為四蹄聳踊滑汰如鳬鷖纎纎束藁亦可齎何用繁纓與月題朅從畦東走畦西山城欲閉聞鼓鼙忽作的盧躍檀溪歸來挂壁從髙栖了無芻秣饑不啼少壯騎汝逮老黧何曾蹶軼防顛擠錦韀公子朝金閨笑我一生踏牛犂不知自有木駃騠八月七日初入贑過惶恐灘七千里外二毛人十八灘頭一葉身山憶喜歡勞逺夢蜀道有錯喜歡鋪在大散關上地名惶恐泣孤臣長風送客添帆腹積雨扶舟減石鱗便合與官充水手此生何止略知津鬱孤臺以下四首皆䖍州八境見圖畫鬱孤如舊遊山為翠浪涌水作玉虹流日麗崆峒曉風酣章貢秋丹青未變葉鱗甲欲生洲嵐氣昏城樹灘聲入市樓煙雲侵嶺路草木半炎州故國千峰外髙臺十日留他年三宿處準擬繫歸舟廉泉水性故自清不清或撓之君看此廉泉五色爛摩尼廉者為我廉我以此名為有廉則有貪有慧則有癡誰為柳宗元孰是吳隱之漁父足豈潔許由耳何淄紛然立名字此水了不知毁譽有時盡不知無盡時朅來廉泉上捋鬚看鬢睂好在水中人到處相娛嬉塵外亭楚山淡無塵贛水清可厲散策塵外遊麾手謝此世山髙惜人力十步輒一憩却立浮雲端俯視萬井麗幽人宴坐處龍虎為斬剃馬駒獨何疑豈墮山鬼計夜垣非助我謬敬欲其逝戲留一轉語千載起攘袂天竺寺并引豫年十二先君自䖍州歸為豫言近城山中天竺寺有樂天親書詩云一山門作兩山門兩寺元從一寺分東澗水流西澗水南山雲起北山雲前臺花發後臺見上界鐘清下界聞遙想吾師行道處天香桂子落紛紛筆勢竒逸墨迹如新今四十七年矣豫來訪之則詩已亡有刻石存耳感涕不己而作是詩香山居士留遺迹天竺禪師有故家空詠連珠吟疊壁已亡飛鳥失驚蛇林深野桂寒無子雨浥山薑病有花四十七年真一夢天涯流落涕橫斜過大庾嶺一念失垢汙身心洞清淨浩然天地間惟我獨也正今日嶺上行身世永相忘仙人拊我頂結髮授長生宿建封寺曉登盡善亭望韶石三首雙闕浮空照短亭至今猿鳥嘯青熒君王自此西巡狩再使魚龍舞洞庭蜀人文賦楚人辭堯在崇山舜九疑聖主若非真得道南來萬里亦何為嶺海東南月窟西功成天巳錫𤣥圭此方定是神仙宅禹亦東來隱㑹稽月華寺寺鄰岑水場施者皆坑戶也百年間蓋三焚矣天公胡為不自憐結土融石為銅山萬人探斫富媪泣祇有金帛資豪奸脫身獻佛意可料一瓦坐待千金還月華三火豈天意至今苃舍依榛菅僧言此地本龍象興廢反掌曾何艱髙巖夜吐金碧氣曉得異石青斕斑坑流窟發錢涌地莫施百鎰朝千鍰此山出寶以自賊地脈已斷天應慳我願銅山化南畝爛漫黍麥蘇惸鰥道人修道要底物破鐺煮飯茆三間南華寺云何見祖師要識本來面亭亭塔中人問我何所見可憐明上座萬法了一電飲水既自知指月無復眩我本修行人三世積精練中間一念失受此百年譴摳衣禮真相感動淚雨霰借師錫端泉洗我綺語硯碧落洞在英州下十五里槎牙亂峰合晃蕩絶壁橫遙知紫翠間古來仙釋并陽崖射朝日髙處連玉京陰谷扣白月夢中遊化城果然石門開中有銀河傾幽龕入窈窕别戶穿虛明泉流下珠琲乳蓋交縵纓我行畏人知恐為仙者迎小語輒響答空山自雷驚策杖歸去來冶具煩方平峽山寺傳竒所記孫恪袁氏事即此寺至今有人見白猿者天開清逺峽地轉凝碧灣我行無遲速攝衣步孱顔山僧本幽獨乞食況未還雲碓水自舂松門風為關石泉解娛客琴筑鳴空山佳人劒翁孫遊戲暫人間忽憶嘯雲侣賦詩留玉環林空不可見霧雨霾髻鬟舟行至清逺縣見顧秀才極談惠州風物之美到處聚觀香案吏此邦宜著玉堂仙江雲漠漠桂花濕海雨翛翛荔子然聞道黃柑常抵鵲不容朱橘更論錢恰從神武來𢎞景便向羅浮覓稚川廣州蒲澗寺地産菖蒲十二節相傳安期生之故居始皇訪之於此不用山僧導我前自尋雲外出山泉千章古木臨無地百尺飛濤瀉漏天舊日菖蒲方士宅後來薝蔔祖師禪而今祇有花含笑笑道秦皇欲學仙山中多含笑花贈蒲澗信長老優鉢曇花豈有花問師此曲唱誰家已從子美得桃竹此山有桃竹可作杖而土人不識豫始録子美詩遺之不向安期覓棗瓜燕坐林間時有虎髙眠粥後不聞鴉勝遊自古兼支許為採松肪寄一車發廣州朝市日已逺此身良自如三杯軟飽後浙人謂飲酒為軟飽一枕黑甜餘俗謂睡為黑甜蒲澗踈鐘外黃灣落木初天涯未覺逺處處各樵漁浴日亭在南海廟前劒氣崢嶸夜插天瑞光明滅到黃灣坐看暘谷浮金暈遙想錢塘涌雪山已覺滄涼蘇病骨更煩沆瀣洗衰顔忽驚鳥動行人起飛上千峰紫翠間遊羅浮山一首示兒子過人間有此白玉京羅浮見日雞一鳴南樓未必齊日觀鬱儀自欲朝朱明劉夢得有詩記羅浮夜半見日事山不甚髙而夜見日此可異也山有二石樓今延祥寺在南樓下朱明洞在沖虛觀後云是蓬萊第七洞天東坡之師抱朴老真契蚤巳交前生玉堂金馬久流落寸田尺宅今歸耕道華亦嘗啖一棗唐永樂道士侯道華竊食鄧天師藥仙去永樂有無核棗人不可得道華獨得之豫在岐下亦嘗得食一枚契虛正欲仇三彭唐僧契虛遇人導遊稚川仙府真人問曰汝絶三彭之仇乎契虛不能答鐵橋石柱連空橫山有鐵橋石柱人罕至者杖藜欲趂飛猱輕雲溪夜逢瘖虎伏山有啞虎巡山斗壇晝出銅龍獰沖虛觀後有朱真人朝斗壇近於壇下獲銅龍六銅魚一小兒少年有竒志中宵起坐存黃庭近者戲作凌雲賦筆勢髣佛離騷經負書從我盍歸去羣仙正草新宫銘汝應奴𨽻蔡少霞我亦季孟山𤣥卿唐有夢書新宫銘者云紫陽真人山𤣥卿撰其略曰良常西麓原澤東泄新宫宏宏崇軒䡾䡾又有蔡少霞者夢人遣書碑略曰公昔乘魚車今履瑞雲躅空仰塗綺輅輪囷其末題云五雲書閣吏蔡少霞書還須略報老同叔贏糧萬里尋初平子由一字同叔十月二日初到惠州髣佛曾遊豈夢中欣然雞犬識新豐吏民驚怪坐何事父老相携迎此翁蘇武豈知還漠北管寧自欲老遼東嶺南萬戶皆春色嶺南萬戶酒㑹有幽人客寓公寓居合江樓海上葱曨氣佳哉二江合處朱樓開蓬萊方丈應不逺肯為蘇子浮江來江風初凉睡正美樓上啼鴉呼我起我今身世兩相違西流白日東流水樓中老人日清新天上豈有癡仙人三山咫尺不歸去一杯付與羅浮春豫家釀酒名羅浮春白水山佛迹巖羅浮之東麓也在惠州東北二十里何人守蓬萊夜半失左股浮山若鵬蹲忽展垂天羽根株互連絡崖嶠爭吞吐神工自爐鞴融液相綴補至今餘隙罅流出千斛乳方其欲合時天匠麾月斧帝觴分餘瀝山骨醉后土峯巒尚開闔澗谷猶呼舞海風吹未凝古佛來布武當時汪罔氏投足不蓋拇青蓮雖不見千古落花雨雙溪匯九折萬馬騰一鼓奔雷濺玉雪潭洞開水府潛鱗有饑蛟掉尾取渴虎我來方醉後濯足聊戲侮回風卷飛雹掠面過強弩山靈莫惡劇微命安足賭此山吾欲老慎勿厭求取溪流變春酒與我相賔主當連青竹竿下灌黃精圃詠湯泉在白水山積火焚大槐蓄油災武庫驚然丞相井疑浣將軍布自憐耳目隘未測陰陽故鬱攸火山烈觱沸湯泉注豈惟渴獸駭坐使癡兒怖安能長魚鱉僅可燖狐兔山中惟木客戶外時芒屨雖無傾城浴幸免亡國汙自笑子石如琢玉逺煙真削黳入我病風手古語云磨墨如病風手𤣥雲淹淒淒是中有何好而我喜欲迷既似蠟屐阮又如鍛柳嵇醉筆得天全宛宛天投霓多謝中書君伴我此幽栖朝雲詩并引世謂樂天有粥駱馬放楊柳枝詞嘉其主老病不忍去也然夢得有詩云春盡絮飛留不得隨風好去落誰家樂天亦云病與樂天相伴住春隨樊子一時歸則是樊素竟去也豫家有數妾四五年相繼辭去獨朝雲者隨豫南遷因讀樂天集戲作此詩朝雲姓王氏錢塘人嘗有子曰幹兒未朞而夭云不似楊枝别樂天恰如通德伴伶𤣥阿奴絡秀不同老天女維摩總解禪經卷藥爐新活計舞衫歌扇舊因緣丹成逐我三山去不作巫陽雲雨仙寄虎兒獨倚桄榔樹閒挑蓽撥根謀生看拙否送老此蠻村十一月二十六日松風亭下梅花盛開春風嶺上淮南村昔年梅花曾斷魂豫昔赴黃州春風嶺上見梅花有兩絶句明年正月往岐亭道中賦詩云去年今日關山路細雨梅花正斷魂豈知流落復相見蠻風蜒雨愁黃昏長條半落荔支浦卧樹獨秀桄榔園豈惟幽光留夜色直恐冷艷排冬溫松風亭下荆棘裏兩株玉蕊明朝暾海南仙雲嬌墮砌月下縞衣來扣門酒醒夢覺起繞樹妙意有在終無言先生獨飲勿歎息幸有落月窺清樽再用前韻羅浮山下梅花村玉雪為骨氷為魂紛紛初疑月挂樹耿耿獨與參橫昏先生索居江海上悄如病鶴栖荒園天香國艷肯相顧知我酒熟詩清溫蓬萊宫中花鳥使緑衣倒挂扶桑暾抱叢窺我方醉卧故遣啄木先敲門麻姑過君急灑掃鳥能歌舞花能言酒醒人散山寂寂惟有落蕊粘空樽嶺南珍禽有倒挂子緑毛紅啄如鸚鵡而小自海東來非塵埃間物也新釀桂酒搗香篩辣入瓶盆盎盎春溪帶雨渾收拾小山藏社甕招呼明月到芳樽酒材已遣門生致菜把仍叨地主恩爛煮葵羮斟桂醑風流可惜在蠻村惠守詹君見和復次韻已破誰能惜甑盆頽然醉裏得全渾欲求公瑾一囷米試滿莊生五石樽三杯卯困忘家事萬戶春濃感國恩刺史不須邀半道藍輿未暇走山村花落復次前韻玉妃謫墮煙雨村先生作詩與招魂人間草木非我對奔月偶挂成幽昏暗香入戶尋短夢青子綴枝留小園披衣連夜喚客飲雪膚滿地聊相溫松明照坐愁不睡井花入腹清而暾先生年來六十化道眼已入不二門多情好事餘習氣惜花未忍終無言留連一物吾過矣笑領百罰空罍樽東坡全集卷二十二
