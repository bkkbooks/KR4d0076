body:
  text: 東坡全集卷九十七宋蘇軾撰銘二十五首何公橋銘英州天壤之間水居其多人之往來如鵜在河順水而行雲駛鳥疾維水之利千里咫尺亂流而涉過膝則止維水之害咫尺千里沔彼濫觴蛙跳鯈遊溢而懷山神禹所憂豈無一木支此大壞舞于盤渦氷坼雷解坐使此邦畫為兩州雞犬相聞秦越莫救允毅何公甚勇于仁始作石梁其艱其勤將作復止更此百難公心如石匪鐵則堅公以身先民以悅使老壯負石如負其子疏為玉虹隱為金堤直欄橫檻百賈所棲我來與公同載而出歡呼闐道抱其馬足我歎而言視此滔滔未見剛者孰為此橋願公千歲與橋壽考持節復來以慰父老如朱仲卿食於桐鄉我作銘詩子孫不忘九成臺銘韶陽太守狄咸新作九成臺玉局散吏蘇軾為之銘曰自秦并天下滅禮樂韶之不作蓋千三百一十有三年其器存其人亡則韶既巳隱矣而况於人器兩亡而不傳雖然韶則亡矣而有不亡者存蓋常與日月寒暑晦明風雨並行於天地之間世無南郭子綦則耳未嘗聞地籟也而况得聞其天使耳聞天籟則凡有形有聲者皆吾羽旄干戚管磬匏絃嘗試與子登夫韶石之上舜峰之下望蒼梧之眇莽九疑之聯綿覽觀江山之吐吞草木之俯仰鳥獸之鳴號衆竅之呼吸往來唱和非有度數而均節自成者非韶之大全乎上方立極以安天下人和而氣應氣應而樂作則夫所謂簫韶九成來鳳鳥而舞百獸者既巳粲然畢陳于前矣建中靖國元年正月一日逺遊庵銘并敘吳復古子野吾不知其何人也徒見其出入人間若有求者而不見其所求不喜不憂不剛不柔不惰不修吾不知其何人也昔司馬相如有言列仙之儒居山澤間形容甚癯意甚鄙之乃取屈原遠遊作大人賦其言宏妙不遣而放今子野行於四方十餘年矣而歸於南海之上必將俯仰百世奄忽萬里有得於屈原之遠遊者故以名其庵而銘之曰悲哉世俗之迫隘也願從子而遠遊子歸不來而吾不往使罔象乎相求問道於屈原借車於相如忽焉不自知歷九疑而過崇丘宛兮相逢乎南海之上踞龜殼而食蛤梨者必子也庶幾為我一笑而少留乎蘇程庵銘并引程公庵南華長老辨公為吾表弟程德孺作也吾南遷過之更其名曰蘇程且銘之曰辨作庵寶林南程取之不為貪蘇後到住者三蘇既住程則去一彈指三世具如我説無是處百千燈同一光一塵中兩道場齊説法不相妨本無通安有礙程不去蘇亦在各遍滿無雜壞谷庵銘孔公之堂名虛白蘇子堂後作圓屋堂雖白矣庵自黑知白守黑名曰谷谷庵之中空無物非獨無應亦無答洞然神光照毫髮夕庵銘與晝皆作霧散毛脈夜氣既歸肝膽是宅我銘夕庵惟以照寂八萬四千忽然而一桄榔庵銘并敘東坡居士謫于儋耳無地可居偃息于桄榔林中摘葉書銘以記其處九山一區帝為方輿神尻以遊孰非吾居百柱贔屭萬瓦披敷上棟下宇不煩兵夫海氛瘴霧吞吐吸呼蝮蛇魑魅出怒入娛習居堂奧雜處童奴東坡居士強安四隅以動寓止以實託虛放此四大還於一如東坡非名岷峨非廬須髮不改示現毗盧無作無止無欠無餘生謂之宅死謂之墟三十六年吾其捨此跨汗漫而遊鴻濛之都乎三槐堂銘并敘天可必乎賢者不必貴仁者不必壽天不可必乎仁者必有後二者將安取衷哉吾聞之申包胥曰人衆者勝天天定亦能勝人世之論天者皆不待其定而求之故以天為茫茫善者以怠惡者以肆盜跖之壽孔顔之厄此皆天之未定者也松柏生於山林其始也困於蓬蒿厄於牛羊而其終也貫四時閲千歲而不改者其天定也善惡之報至於子孫而其定也久矣吾以所見所聞所傳聞考之而其可必也審矣國之將興必有世德之臣厚施而不食其報然後其子孫能與守文太平之主共天下之福故兵部侍郎晉國王公顯於漢周之際歷事太祖太宗文武忠孝天下望以為相而公卒以直道不容於時蓋嘗手植三槐於庭曰吾子孫必有為三公者巳而其子魏國文正公相真宗皇帝於景德祥符之間朝廷清明天下無事之時享其福祿榮名者十有八年今夫寓物於人明日而取之有得有否而晉公修德於身責報於天取必於數十年之後如持左劵交手相付吾是以知天之果可必也吾不及見魏公而見其子懿敏公以直諫事仁宗皇帝出入侍從將帥三十餘年位不滿其德天將復興王氏也歟何其子孫之多賢也世有以晉公比李栖筠者其雄才直氣真不相上下而栖筠之子吉甫其孫德裕功名富貴略與王氏等而忠信仁厚不及魏公父子由此觀之王氏之福蓋未艾也懿敏公之子鞏與吾遊好德而文以世其家吾是以録之銘曰嗚呼休哉魏公之業與槐俱萌封植之勤必世乃成既相真宗四方砥平歸視其家槐隂滿庭吾儕小人朝不及夕相時射利皇恤厥德庶幾僥幸不種而獲不有君子其何能國王城之東晉公所廬鬱鬱三槐惟德之符嗚呼休哉山堂銘并敘熙寧九年夏六月大雨野人來告故東武城中溝瀆圮壞出亂石無數取而儲之因守居之北墉為山五成列植松柏桃李其上且開新堂北向以遊心寓意焉其銘曰誰裒斯堅土伯所儲潦流發之神以畀豫因廡為堂踐城為山有喬蒼蒼俯仰百年德威堂銘并敘元祐之初詔起太師潞公於洛命以重事公惟仁宗英宗神考三聖眷倚之重不敢以既老為辭杖而造朝期年乃求去詔曰昔西伯善飬老而太公自至魯穆公無人子思之側則長者去之公自為謀則善矣獨不為朝廷惜乎又曰唐太宗以干戈之事尚能起李靖於既老而穆宗文宗以燕安之際不能用裴度於未病治亂之效於斯可見公讀詔聳然不敢言去蓋復留四年天下無事朝廷奠安乃力請而歸公之在朝也契丹使耶律永昌劉霄來聘軾奉詔館客與使者入覲望見公殿門外却立改容曰此潞公也耶所謂以德服人者問其年曰何壯也軾曰使者見其容未聞其語其綜理庶務酬酢事物雖精練少年有不如貫穿古今洽聞強記雖專門名家有不逮使者拱手曰天下異人也公既歸洛西羌首領有溫錫沁者請於邊吏願獻良馬於公邊吏以聞詔聽之公心服天下至于四夷書曰德威惟畏德明惟明世所以守伯夷之典用臯陶之法者以其德也若夫非德之威雖猛而人不畏非德之明雖察而人不服公修德於几席之上而其威折衝於萬里之外退居於家而人望之如在廊廟可不謂德威乎公之子及為河陽守公將往臨之吏民喜甚自洛至三城歡呼之聲相屬及作堂以待公而請銘於軾乃榜之曰德威而銘之曰德威惟畏德明惟明惟師潞公展也大成公在洛師嵩洛有光駕言三城河流不揚願公百年子孫千億家于兩河日見顔色西戎來朝秪栗公門豈惟兩河四方其訓之清隱堂銘巳去清隱而老崇慶崇慶亦非何者為正清者其行隱者其言非彼非此亦非中間在清隱時念念不住今既情忘本無住處八萬四千劫火洞然但隨他去何處不然四達齋銘并引髙郵使君趙晦之作齋東園戶牗四達因以名之眉山蘇軾過而為之銘曰有藏於中必諜於外惟慢與謹皆盜之誨孰如此間空洞無物戶牗闔開廓焉四達擊去盜易使無盜難我無可攘以守則完趙侯無心得法赤溪四出其齋以達民迷雪浪齋銘并引豫於中山後圃得黑石白脈如蜀孫位孫知微所畫石間奔流盡水之變又得白石曲陽為大盆以盛之激水其上名其室曰雪浪齋云盡水之變蜀兩孫與不傳者歸九原異哉駮石雪浪翻石中乃有此理存玉井芙蓉丈八盆伏流飛空潄其根東坡作銘豈多言四月辛酉紹聖元思無邪齋銘并敘東坡居士問法於子由子由報以佛語曰本覺必明無明明覺居士欣然有得於孔子之言曰詩三百一言以蔽之曰思無邪夫有思皆邪也無思則土木也吾何自得道其惟有思而無所思乎於是幅巾危坐終日不言明目直視而無所見攝心正念而無所覺於是得道乃名其齋曰思無邪而銘之曰大患緣有身無身則無病廓然自圜明鏡鏡非我鏡如以水洗水二水同一淨浩然天地間惟我獨也正夢齋銘并序至人無夢或曰髙宗武王孔子皆夢佛亦夢夢不異覺覺不異夢夢即是覺覺即是夢此其所以為無夢也歟衛玠問夢於樂廣廣對以想曰形神不接而夢此豈想哉對曰因也或問因之説東坡居士曰世人之心依塵而有未嘗獨立也塵之生滅無一念住夢覺之間塵塵相授數傳之後失其本矣則以為形神不接豈非因乎人有牧羊而寢者因羊而念馬因馬而念車因車而念蓋遂夢曲蓋鼓吹身為王公夫牧羊之與王公亦逺矣想之所因豈足怪乎居士始與芝相識於夢中旦以所夢求而得之今二十四年矣而五見之每見輒相視而笑不知是處之為何方今日之為何日我爾之為何人也題其所寓室曰夢齋而子由為之銘曰法身充滿處處皆一幻身虛妄所至非實我觀世人生非實中以寤為正以寐為夢忽寐所遇執寤所遭積執成堅如丘山髙若見法身寤寐皆非知其皆非寤寐無虧遨遊四方齋則不遇南北東西法身本然廣心齋銘細德險微愛爭彼我君子廣心物無不可心不運寸中積瑣瑣得之戚戚忿欲生火沃以遠水井泉無波天下為量萬物一家前聖後聖惠我光華談妙齋銘南華老翁端靜簡潔浮雲掃盡但挂孤月吾宗伯固通亮英發大圭不琢天驥超絶室空無有獨設一榻空毗耶城奔走竭蹶二士共談必説妙法彈指千偈卒無所説有言皆幻無起不滅問我何為鏤氷琢雪人人造語一一説法孰知東坡非問非答淡軒銘以船撑船船不行以鼓打鼓鼓不鳴子欲察味而辨色何不坐於淡軒之上出淡語以問淡叟則味自味而色自形吾然後知淡叟之不淡蓋將盡口眼之變而起無窮之爭其自謂叢林之一害豈虛名也哉擇勝亭銘維古潁城因潁為隍倚舟于門美哉洋洋如淮之甘如漢之蒼如洛之溫如浚之涼可侑我客可流我觴我欲即之為館為堂近水而構夏潦所襄遠水而築邈焉相望乃作斯亭筵楹欒梁鑿枘交設合散靡常赤油仰承青幄四張我所欲往一夫可將與水升降除地布牀可使杜康洗觶而揚可使莊周觀魚而忘可使逸少祓褉而祥可使太白泳月而狂既薺我荼亦醪我漿既濯我纓亦浣我裳豈獨臨水無適不臧春朝花郊秋夕月場無脛而趨無翼而翔敝又改為其費易償榜曰擇勝名實允當維古至人不留一方虛白為室無何為鄉神馬尻輿孰為輪箱流行坎止雖觸不傷居之無盜中靡所藏去之無戀如所宿桑豈如世人生短慮長尺宅不治寸田是荒錫瓦銅雀石門阿房俯仰變滅與生俱亡我銘斯亭以砭世盲惠州李氏潛珍閣銘襲九淵之神龍沕淵潛以自珍雖無心於求世亦擇勝而栖神蔚鵝城之南麓擢仙李之芳根因石阜以庭宇跨飲江之鼇黿岌飛簷與鐵柱插清江之奫淪眩古潭之百尺涵萬象於瑶琨耿月魄以終夜湛天容之方春信蒼蒼之非色極深遠而自然疑貝闕與珠官有玉函之老人豫南征其萬里友魚蝦與蛭蚓逝將去而反顧託江流以投文悼此江之獨西歎妙意之不陳逮公子之東歸寓此懷於一樽雖神龍之或殺終不殺之為仁真相院釋迦舍利塔銘并敘洞庭之南有阿育王塔分葬釋迦如來舍利嘗有作大施會出而浴之者緇素傳捧涕泣作禮有比丘竊取其三色如含桃大如薏苡將置之他方為衆生福田久而不能以授白衣方子明元豐三年軾之弟轍謫官髙安子明以畀之七年軾自齊安蒙恩徙臨汝過而見之八年移守文登召為尚書禮部郎過濟南長清真相院僧法泰方為磚塔十有三層峻峙蟠固人天鬼神所共瞻仰而未有以葬軾默念曰豫弟所寶釋迦舍利意將止於此耶昔豫先君文安主簿贈中大夫諱洵先夫人武昌太君程氏皆性仁行廉崇信三寶捐館之日追述遺意捨所愛作佛事雖力有所止而志則無盡自頃憂患廢而不舉將二十年矣復廣前事庶幾在此泰聞踊躍明年來請於京師探篋中得金一兩銀六兩使歸求之衆人以具棺槨銘曰如來法身無有邊化為舍利示人天偉哉有形斯有年紫金光聚飛為煙惟有堅固百億千輪王阿育願力堅役使空界鬼與仙分置衆剎奠山川棺槨十襲閟精圜神光晝夜發層巔誰其取此智且權佛身普現衆目前昏者坐受逺近遷冥行黑月墮坎泉分身來化會有緣流轉至此誰使然并包齊魯窮海壖懭悍柔淑冥愚賢願持此福達我先生生世世離垢纒大別方丈銘閉目而視目之所見冥冥蒙蒙掩耳而聽耳之所聞隱隱隆隆耳目雖廢見聞不斷以搖其中孰能開目而未嘗視如鑑寫容孰能傾耳而未嘗聽如穴受風不視而見不聼而聞根在塵空湛然虛明遍照十方地獄天宫蹈冒水火出入金石無往不通我觀大别三門之外大江方東東西萬里千溪百谷為江所同我觀大别方丈之內一燈常紅門閉不開光出于隙曄如長虹問何為然笑而不答寄之盲聾但見龎然秀眉月面純漆點瞳我作銘詩相其木魚與其鼓鐘石塔戒衣銘石塔得三昧初從戒定入是故常寶護登壇受戒衣吾聞得道人一物不可留云何此法衣補緝成百衲諸法念巳逝此衣非昔衣此法非生滅衣益無壞者振此無塵衣洗此無垢人壞則隨他去是故終不壞南安軍常樂院新作經藏銘佛以一口而説千法千佛千口則為幾説我法不然非千非一如百千燈共照一室雖各遍滿不相壞雜咨爾學者云何覽閲自非正眼表裏洞達巳受將受則相陵奪惟回屢空無所不悅是名耳順亦號莫逆以此轉經有轉無竭道人山居僻介楚越常樂我靜一食破衲達磨耶藏勤苦建設我無一錢檀波羅密施此法水以灌爾睫廣東東莞縣資福寺舍利塔銘并敘自有生人以來人之所為見於世者何可勝道其鼓舞天下經緯萬世有偉於造物者矣考其所從生實出於一念巍乎大哉是念也物復有烈於此者乎是以古之真人以心為法自一身至一世界自一世界至百千萬億世界於屈信臂頃作百千萬億變化如佛所言皆真實語無可疑者至於持身厲行練精飬志或乘風而仙或解形而去使枯稿之餘化為金玉時出光景以作佛事者則多有矣其見伏去來皆有時會非偶然者豫在惠州或示豫以古舍利狀若覆盂圓徑五寸髙二寸重二斤二兩外密而中踈其理如芭蕉舍利生其中無數五色具備意必真人大士之遺體蓋腦之在顱中顱亡而腦存者豫曰是當以施僧與衆共之藏私家非是其人難之適有東莞資福長老祖堂來惠州見而請之曰吾方建五百羅漢閣壯麗甲於南海舍利當栖我閣上則以犀帶易之有自京師至者得古玉璧試取以薦舍利若合符契堂喜遂并璧持去曰吾當以金銀琉璃為窣堵波置閣上銘曰真人大士何所修心精妙明含九洲此身性海一浮漚委蛻如遺不自收戒光定力相蒸休結為寶珠散若旒流行四方獨此留帶犀微矣何足酬璧來萬里端相投我非豫堂堂非求共作佛事知誰由瑞光一起三千秋永照南海通羅浮東坡全集卷九十七
