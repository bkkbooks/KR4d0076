body:
  text: 東坡全集巻八十四宋蘓軾撰尺牘八十四首答參寥三首恵州専人逺來辱手書并示近詩如獲一笑之樂數日喜慰忘味也某到貶所半年凡百麄遣更不能細説大畧秪似靈隠天竺和尚退院後却在一箇小村院子折足鐺中罨糙米飯喫便過一生也得其餘瘴癘病人北方何嘗不病是病皆死得人何必瘴氣但苦無醫藥京師國醫手裏死漢尤多參寥聞此一笑當不復憂我也故人相知者即以此語之餘人不足與道也未㑹合間千萬為道善愛自重又潁沙彌書迹巉聳可畏他日真妙總門下龍象也老夫不復止以詩句字畫期之矣老師年紀不少尚留情詩句字畫間為兒戲事耶然此回示詩超然真游戲三昧也居閒不免時時弄筆見索書字要楷法輒往數篇終不甚楷也秪一讀了付潁師收勿示餘人也雪浪齋詩尤竒偉感激感激轉海相訪一段竒事但聞海船遇風如在高山上墜深谷中非愚無知與至人皆不可處胥靡遺生恐吾輩不可學若是至人無一事冒此嶮做什麽千萬勿萌此意潁師喜於得預乗桴之游耳所謂無所取裁者其言不可聽切切相知之深不可不盡道其實耳自揣餘生必須相見公但記此言非妄語也又浄慧琳老及諸僧知因見致懇知為黙禱於佛令亟還中州甚荷至意自揣省事以來亦粗為知道者但道心屢起數為世樂所移奪恐是諸佛知其難化故以萬里之行相調伏耳少游不憂其不了此境但得他老兒不動懐其餘不足云也俞承務知為少游展力此大不凡可喜可喜今有一書與之告専一人與轉逹仍有書令兒子輩准備信物令送去俞處託求穏當舶主附與廣州何道士也見說自有斤重脚錢數目體例甚熟答南華辯禪師五首竄逐流離愧見方外人之舊達觀一視延館加厚洗心歸休得見祖師幸甚幸甚人來辱書具審法體佳勝感慰兼集某到恵巳二百日杜門養疴凡百粗遣不煩留意念又專人逺來獲手教累幅具審法履佳勝感慰兼極又䝉逺致筠州書信流落羇寓每煩淨衆愧佩深矣承惠及罌粟鹹豆等益荷厚意泉銘模刻甚精某此凡百如宜不煩念及未由瞻謁懷想不巳熱甚惟萬萬為衆自愛又所要寫栁碑大是山中闕典不可不立石巳輟忙揮汗寫出仍作一小記成此一事小生結縁於祖師不淺矣荒州無一物可寄只有桄榔杖一枚木韌而堅似可采勿笑勿笑舍弟及總師等書信領足比有人去巳發書矣張恵䝉去嵗為令看船不得禮拜祖師及衣鉢甚不足今因來人令相照管一往不訝喧聒此子多病來時告令一得力莊客送囘也留住五七日可矣又浄人來辱書具審法體勝常深慰馳仰至此二年再涉寒暑麄免甚病行館僧舍皆非久居之地已置園築室為苟完之計方斫木陶瓦其成當在冬中也又近苦痔疾極無聊看書筆硯之類殆皆廢也所要寫王維劉禹錫碑未有意思下筆又觀二碑格力淺陋非子厚之比也答王商彦忝親戚之末未嘗脩問左右又方得罪屏居敢望記及之專人逺來辱牋教累幅稱述過重慰勞加等幸甚即日履兹秋暑尊體何如某仕不知止臨老竄逐罪垢増積玷汚親友足下昆仲曲敦風義萬里遣人問安否此意何可忘書詞雅健陳義甚高但非不肖所稱也蜀粤相望天末何時㑹合臨書惘惘未審受任何地來嵗科詔竚聞峻擢以慰願望未間更冀若時自重與程天侔七首去嵗過治下幸獲接奉别後有闕上問過沐省記逺辱手教且審起居佳勝感慰兼集長牋見寵禮意過當非衰廢所宜承當伏讀愧汗而已未由㑹見萬萬以時自重又乏人寫公狀幸恕簡略示喻固合如命但罪廢閒冷衆所鄙逺决無響應之理近發書多不答未欲頻瀆也幸矜察又至後福履増勝辱訪不果見悚怍無量寵惠羊酒紙茗極荷厚意答謝稽緩不罪不罪又適辱訪别豈勝悵仰晚來起居佳勝為餞蔡守遂不得詣違尚丐珍練又少事干煩過河源日告伸意仙尉差一人押木匠作頭王臯暫到郡外令計料數間屋材惟速為妙為家私紛冗不及寫書千萬勿罪幸甚又江君訪别本欲作書醉熟手軟不能多書獨遣此紙而已老拙慕道空能誦楞嚴之語而實無所見賢者得之便能發明如此誦語精妙過辱開示感怍無巳龍眼晚實愈佳特䝉分恵感怍之至錢數封呈煩聒増悚又白鶴峰新居成當從天侔求數色果木太大則難活太小則老人不能待當酌中者又須土碪稍大不傷根者為佳不罪不罪與程正輔提刑二十四首近聞使斾少留番禺方欲上問侯長官來伏承傳誨意㫖甚厚感怍深矣比日履兹新春起居佳勝知車騎不久東按儻獲一見慰幸可量未間伏冀以時自重又竄逐海上諸況可知聞老兄來頗有佳思昔人以三十年為一世今吾老兄弟不相從四十二年矣念此令人悽斷不知兄果能為弟一來否然亦有少拜聞某獲譴至重自到此旬日外便杜門自屏雖本郡守亦不往拜其辱良以近臣得罪省躬念咎不得不爾老兄到此恐亦不敢出迎若以骨肉之愛不責末禮而屈臨之餘生之幸非所敢望也其餘區區殆非紙墨所能盡惟千萬照悉而巳徳孺懿叔久不聞耗想頻得安問八郎九郎亦然令子幾人侍行若巡按必同行因得一見又幸舍弟近得書云在湖口見令子新婦亦具道尊意感服不可言又專人至承賜教累幅感慰兼極比日履兹春陽尊體佳勝知春夏間方按行此邦豈勝繫望韶州風物甚美園亭徳孺所治但不知有可與為樂者否未披奉間更冀若時保練又老兄近日酒量如何弟終日把盞積計不過五銀盞耳然近得一釀法絶竒色香味皆疑於官法矣使斾來此有期當預醖也向在中山創作松醪有一賦閒録呈以發一笑又數日聞使斾來此喜慰不可言方欲遣人奉狀遽捧手教感慰兼至比日涉履風濤起居佳勝旦夕瞻奉併陳區區又某深欲出迎郊外業已杜門知兄知愛之深必不責此然愧悚甚矣專令小兒走舟次也知十秀才侍行喜得㑹見不及别奉書又昨日辱承欵語傾盡感慰深矣經宿起居佳勝所貺皆珍竒物意兩重敢不拜賜少頃面謝又謫居窮寂誰復顧者兄不惜數舍之勞以成十日之㑹惟此恩意如何可忘别後不免數日牢落切惟尊懷亦悵然也但凝望沛澤北歸得復㑹見爾到廣少留否比日起居何如某到家無恙不煩念及未㕘候間萬萬若時自重又河源事上下繆悠而巳有一信箧并書欲附至子由處輒以上干然不須專差人但與尋便附達或轉託洪吉間相識達之其中乃是子由生日香合等他是二月二十日生得前此到為佳也不罪不罪又兩甥相聚多日備見孝義之誠深慰所望未暇别書悉之悉之兒子適令幹少事未及拜狀輒已和得白水山詩録呈為笑并亂做得香積數句同附上前本併納去䃁字輒用椏字盖攀例也呵呵又近檢法行奉書未達間伏䝉賜教并寄恵柑子此中雖有然似此佳者即不識也十有一二壊耳謹如教略嘗不多啖也比日還府以來起居佳勝某與兒子如昨不煩念及大郎三郎有近耗未嵗暮無縁㑹合惟若時珍練又和示香積詩真得淵明體也某喜用陶韻作詩盖有四五十首不知老兄要録何者待稍閒編成一軸附上也只告不示人耳橋錢必不足用學錢且告老兄留取切告切告前所問者巳得實狀本州必已申去蓋亦只止是矣又近鄉僧法舟行奉書必達惠州急足還辱手教且審起居佳勝感慰兼集寵示詩域醉鄉二首格力益清妙深欲繼作不惟髙韻難攀又子由及諸相識皆有書痛戒作詩其言切甚不可不遵用空被來貺但慙汗而已兄欲寫陶體詩不敢奉違今寫在揚州日二十首寄上亦乞不示人也未由㑹合日聽除音而已餘惟萬萬若時自重又承服温胃藥舊疾失去伏惟慶慰反復尋究此至言也拙恙亦當服温平行氣藥耳徳孺書信巳領尚未聞所授豈當到闕乎兄亦歸覲耳何用更求外補惠及佳麪感怍適有河源乾菌少許并香篆一枚頗大謾納去作笑有肉蓯容因便寄示少許無即巳也侯晉叔實佳士頗有文采氣節恐兄不久歸闕此人疑不當遺也故略為記之不罪又少懇冒聞向所見海㑹長老甚不易得院子亦漸興葺巳建法堂甚宏壯某亦助施三千緡足令起寢堂嵗終當圓備也院旁有一陂詰曲羣山間長一里有餘意欲買此陂屬百姓見說數十千可得稍加葺築作一放生池嚢中巳罄輒欲縁化老兄及子由各出十五千足某亦竭力共成此一事所活鱗介嵗有萬數矣老大没用處猶欲作少有為功徳不知兄意如何可便乞附至不罪不罪又此中魚湖之利下塘常為啓閉之所嵗終竭澤而取略無脫者今若作放生池但牢築下塘永不開江水漲冒即聽其自在出入則所活不貲矣又廣州多松脂閎甫嘗買用桑皮灰練得甚精因話告求數斤仍告正輔與買生者十斤因便寄示舶上硫黄如不難得亦告為買通明者數斤欲以合藥散鐵爐􅘮可作時羅夾子者亦告為致一副中様者三物皆此中無有不罪又某前者留博羅一日再見鄧道士所聞别無異者方欲邀來郡中欵問也續寄丹砂巳領感愧之極某於大丹未明了直欲以此砂試煑煉萬一伏火亦恐成藥耳成否當續布聞比日得七哥書逓中已附謝也六郎十郎各計安未及别書所要書字墨竹固不惜徐寄去也外曽祖遺事録呈又蜜極佳荔枝䝉頒賜謹附謝懇蘇州錢倅差一般家人又借惠力院一行者契順與宜興通問萬里勞人甚愧其意因令附此書或畧賜照管幸甚卒子與借請少許甚幸甚幸又忽復殘臘㑹合無縁不能無天末流離之念也急足回辱書具審尊體康勝仍示佳句五章字字新竒歎咏不已老嫂奄隔更此徂嵗想加悽㫁然終無益惟日逺日忘為得理也某近苦痔殊無聊杜門謝客兀然坐忘爾新春為國自愛早膺北歸殊寵又某覩近事巳絶北歸之望然中心甚安之未話妙理達觀但譬如元是惠州秀才累舉不第有何不可知之免憂詩屢欲和韻嶮又巳更老手五𢋫殆難措辭也亦苦痔無情思耳惠黄雀感愧感愧子由一書告蚤入皮筒幸甚幸甚又河南兄弟已歸左右想哀慕之極切希為親自寛也近有慰疏未暇别紙又殘臘只數日感念聚散不能無異鄉之嘆不審兄諸况何如子舍到否新年不獲奉觴惟祝早膺召命未間更乞為時自重又人來辱書伏䝉履兹新春起居佳勝至孝通直已還左右感慰良深且聞有北轅之耗尤副卑望詠史等詩髙絶每篇迺是一論屈滯它作絶句也前後惠詩皆未和非敢懶也盖子由近有書深戒作詩其言切至當焚硯棄筆不但作而不出也不忍違其憂愛之意所以遂不作一字惟深察吾兄近詩益工孟徳有言老而能學惟余與袁伯業此事不獨今人不能古人亦自少也未拜命間頻示數字慰此牢落餘惟萬萬為時自重與廣東提舉蕭大夫二首春和切惟起居佳勝某罪譴得託迹麾下幸甚到惠即欲上問杜門省咎人事俱廢以故後時想不深訝未縁瞻奉伏冀為時自重又伏審使斾巡按至惠得遂際見何幸如之某始寓僧舍凡百不便近因正輔至郡許假館行衙不及面稟輒巳遷入悚側不已想仁愛顧恤不深訝也答王敏仲四首再辱手教感戴深矣仍審比日台候康勝至慰至慰某凡百如昨新居旦夕畢工即遷入長子邁自浙中般挈由循州徑路來閏月可至此漸似無事可以却掃安居矣新政豈弟已穆然嶺海間矣更䝉下訪粗識仁人之用心也欣慰之極未縁面盡臨紙惋結又浮玉聞遂化去殊不知異事可聞其畧乎其母今安在謗者之言何足信也丹元事亦告盡録示决不示人也起居之語未曉亦告指示近頗覺養生事絶不用求新竒惟老生常談便是妙訣嚥真納息真丹頭仍須用尋常所聞般運泝流法令積久透徹乃效也孟子曰事在易而求諸難道在邇而求諸逺董生云尊其所聞則髙明矣行其所知則光大矣又春候清穆切惟撫馭多暇起居百福甘雨應期逺邇滋洽助喜慰也某凡百粗適遷新居已浹日小窗疎籬頗有幽趣賤累亦不久到矣未期瞻奉萬萬為國自重又兩䝉賜教感慰深至曽因周循州行奉狀想已塵覽即日台候何如越人事嬉逰盛於春時髙懷俯就想復與衆同之天色澄穆亦惟此時也莫縁陪後乗西望増慨與范純夫某謂居瘴鄉惟静絶欲念為萬金之良藥公久已爾不在多祝也子由極安常燕坐胎息而巳有一書附納長子邁自宜興挈兩房來巳到循州一行並安過近往迎之得耗旦夕到此某見獨守舍耳次子迨在許下子由長子名遲者官滿來筠省覲亦不久到恐要知六婦與二孫並安健過去日留一書并數品藥在此今附何秀才去如聞公目疾尚未平幸勿過服涼藥暗室瞑坐數息藥功何縁及此兩承惠錫器極荷重意丹霞觀張天師遺跡儻有良藥異事乎令子不及别書侍奉外多慰子功之喪忽巳除祥哀哉奈何諸子想各巳之官某孫婦甚長旦夕到此矣與蕭朝奉近得見令兄提舉稍聞動止之詳為慰少事輒冒聞幸恕率易兒子邁般挈數房賤累自䖍易小舟由龍南江至方口出陸至循州下水到恵賤官重累敢望矜恤特為於郡中諸公醵借白直數十人送至方口計未逺出州界切望垂念已於循州擘畫得數十人至方口迎之也流落困苦想加愍察荅王莊叔二首逺辱教書具道三十年前都下與先人往還伏讀感涕仁人念舊手簡見及足矣書辭累幅禮意莊重此何過也伏審斬焉在疚哀慕之餘起居如宜某罪廢逺屏有玷知識重䝉奬飾衰朽増光㑹合未期尚冀節哀自重又某多病杜門人事都絶懶習巳成筆硯殆廢承長牋寵貺裁謝茍簡愧負深矣黄茒海瘴正作於秋蒸暑麾汗不能盡意恕之與循守周文之二首近日屢獲教音及林増城至又得聞動止之詳併深感慰桃荔米酒諸信皆達矣荷佩厚眷難以盡喻今嵗荔子不熟土産早者既酸且少而増城晚者不至方有空寓嶺表之歎忽信使至坐有五客人食百枚飽外又以歸遺皆云其香如練家紫但差小耳二廣未嘗有此異哉又使人健行八百枚無一損者此尤異也林令竒士幸此少留公所與者故自不凡也蒸暑異常萬萬以時珍嗇又鄭君知其俊敏篤問學觀所為詩文非止科場手段也人去忙作書不及相見且致此意李公弼亦再三傳語承許逺訪何幸如之海州窮獨見人即喜况君佳士乎林行婆當健有香與之到日告便送去也八郎房下不幸傷悼與封守朱朝請二首前日䝉示所藏諸書使末學稍窺家傳之秘幸甚幸甚恕先所訓尤為近古某方治此書得之頗有所開益拜賜之重若獲珠貝又重煩令子運筆益用愧悚老朽不揆輒立訓傳尚未必工異日當以奉呈也新說方熾古學崩壞言之傷心區區所欲陳未易究也臨紙慨然又公於春秋發明固多矣舍弟頗治此學異日相見當出其書互相考也然此書近遭廢錮尚未䝉牽復公尚敢言及耶想當一噱與李大夫近奉狀巳達比日伏計起居佳勝旱勢如此撫字之懷想極焦勞舊見太平廣記云以虎頭骨縋之有龍湫中能致雨仍須以長綆繫之雨足乃取出不爾雨不止在徐與黄試之皆驗敢以告與周文之二首近䝉寄示畫圖及新堂面勢仍求榜名嶺南無大寒甚暑秋冬之交勾萌盜發春夏之際柯葉潜改四時之運黙化而人不知民居其間衣食之奉終嵗一律寡求而易安有足樂者若吏治不煩即其所安而與之俱化豈非牧養之妙手乎文之治循巳用此道故以黙化名此堂如何可用便請題榜也又聞公服何首烏是否此藥温厚無毒李習之𫝊正爾噯之無炮製今人乃用棗或黒豆之類蒸熟皆損其力僕亦服此藥但採得陰乾便搗羅為末棗肉或煉熯和入臼中萬杵乃丸服極有力無毒恐未得此法故以奉白與人累日欲上謁竟未暇辱教承足疾未平不勝馳繫足疾惟葳靈仙牛膝二味為末蜜丸空心服必效之藥也但葳靈仙難得真者俗醫所用多藁本之細者爾其驗以味極苦而色紫黒如胡黄連狀且脆而不韌折之有細塵起向明示之㫁處有黒白暈俗謂之有鴝鵒眼此數者備然後為真服之有竒驗腫痛拘攣皆可巳久乃有走及奔馬之效二物當等分或視臟氣虚實酌飲牛膝酒及熟水皆可下獨忌茶耳犯之不復有效若常服此即每嵗收櫰皁莢芽之極嫩者如造草茶法貯之以代茗飲此效屢嘗目擊知君疾苦故詳以奉白元素書巳作稍暇詣見與惠州都監君南來清節幹譽為有識所稱皆曰此東坡弟子由門下客也兩漢之士多起於游徼卒史至公卿者多矣願君益廣學問以期逺到與史氏太君嫂某謫海南狼狽廣州知時姪及第流落中尤為慶乃知三哥平生孝義亷静自守嫂賢明教誨有方天不虚報也明日當度大海聊致此書嫂知意而巳與林濟甫二首儋耳眉兵至承惠書具審尊體佳勝眷愛各安某與幼子過南來餘皆留惠州生事狼狽勞苦萬狀然胸中亦自有翛然處也今日到海岸地名遞角塲明日順風即過矣囘望鄉國真在天末留書為别未間逺惟以時自重又某兄弟不善處世並遭逺竄墳墓單外念之感涕惟濟甫以久要之契始終留意死生不忘厚徳答劉元忠近别伏惟起居安勝短牋不盡意察之栁伯通因㑹為致區區歐陽秀才寘談道甚妙可與閒逰懷思文忠公愛其屋上烏况族子弟之佳者乎餘惟萬萬若時自重答王敏仲兒子還辱手書具審起居佳勝感慰兼極舟行至扶胥急足示問乃知有袁州之命歎惋而巳行止孰非天者復何言哉道眼所照知已平適但治行忽遽亦少勞神矣答程全父推官六首别遽逾年海外窮獨人事㫁絶莫由通問舶到忽枉教音喜慰不可言仍審起居清安眷愛各佳某與兒子粗無病但黎蜑雜居無復人理資養所急求輒無有初至僦官屋數椽近復遭迫逐不免買地結茅僅免露處而囊為一空困厄之中何所不有置之不足道聊為一笑而巳平生交舊豈復夢見懷想清逰時誦佳句以解牢落此外萬萬以時自重舶回悤悤布謝又閤下才氣秀發當為時用久矣遐荒安可淹駐想益輔以學以昌其詩乎僕焚毁筆硯已五年尚寄味此學隨行有陶淵明集陶寫伊鬱正賴此耳有新作遞中示數篇迺珍惠也山川風氣能清佳否孰與惠州比此間海氣蒸溽不可言引領素秋以日為嵗也寄貺佳酒豈惟海南所無殆二廣未嘗見也副以糖水精麪等物一一感銘非眷存至厚何以得此悚怍之至此間紙不堪覆瓿擕來者已竭有便可寄百十枚否不必甚佳者又便舟來辱書問訊既厚矣又惠近詩一軸為賜尤重流轉海外如逃深谷既無與晤語者又書籍舉無有惟陶淵明一集栁子厚詩文數冊常置左右目為二友今又辱來貺清深温麗與陶栁真為三矣此道比來幾熄海北亦豈有語此者耶新春伏想起居佳勝某與兒子亦麄遣窮困日甚親友皆疎絶矣公獨收卹如舊此古人所難也感怍不可言惟萬萬以時自愛又令子先輩辱書及新詩感慰彌甚筆力益進家有哲匠矣何復下問乎老病百事皆廢尤倦寫書故止附此紙不别緘也不罪不罪又兒子比抄得唐書一部又借得前漢欲抄若了此二書便是窮兒暴富也呵呵老拙亦欲為此而目昏心疲不能自苦故樂以此告壯者爾紙茗佳惠感怍感怍丈丈惠藥米醬薑鹽糖等皆巳拜賜矣江君先輩辱書深欲裁謝連寫數書倦甚且為多謝不敏也又久不得毗陵信如聞浙中去嵗不甚熟曽得家信否彼土出藥否有易致者不拘名物為寄少許此間舉無有得者即為希竒也間或有麄藥以授病者入口如神盖未嘗識耳答程天侔三首去嵗僧舍屢㑹當時豈知為樂今者海外無復夢見聚散憂樂如反覆手幸而此身尚健得來訊喜侍奉清安知有愛子之戚襁褓泡幻不須深留戀也僕離惠州後大兒子房下亦失一男孫悲愴久之今則巳矣此間食無肉病無藥居無室出無友冬無炭夏無寒泉然亦未易悉數大率皆無爾惟有一幸無甚瘴也近與兒子結茅屋數椽居之僅庇風雨然勞費巳不貲矣賴十數學生助工作躬泥水之役愧之不可言也尚有此身付與造物聽其運轉流行坎止無不可者故人知之免憂夏熱萬萬自愛又近得子野書甚安陸道士竟以疾不起葬於河源矣前㑹豈非一夢耶僕既病倦不出然亦無與往還者闔門面壁而巳新居在軍城南極湫隘麄有竹樹烟雨濛晦真蜑塢獠洞也惠酒絶佳舊在惠州以梅醖為冠此又逺過之牢落中得一醉之適非小補也又新詩過䝉寵示格律深妙非淺學所能彷彿歎誦不巳老拙無以答厚意但藏之永以為好爾與鄭嘉二首舶人回奉狀必達比日起居佳勝貴眷令子各安某與過亦幸如昨初賃官屋數間居之既不佳又不欲與官員相交涉近買地起屋五間一龜頭在南汙池之側茂林之下亦蕭然可以杜門面壁少休也但勞費貧窘耳此中枯寂殆非人世然居之甚安况諸史滿前甚可與語者也著書則未日與小兒編排齊整之以須異日歸之左右也小客王介石者有士君子之趣起屋一行介石躬其勞辱甚於家𨽻然無絲髪之求也顧某念之有可以照庇之者幸不惜也死罪死罪柯仲常舊有契因見道區區又邁後來相見否久不得其書聞過房下臥病正月尚未得耗亦憂之公為取一書求瓊州海舶或來人之便封題與瓊倅黄宣義託轉達甚幸也見說瓊州不論時節有人船便也衆妙堂記一本寄上本不欲作適有此夢夢中語皆有妙理皆實云爾僕不更一字也不欲隠没之又皆養生事無可醖釀者故出之與僧隆賢二首某慰疏言不意寳月大師宗古老兄捐衆示化切惟孝誠深至攀慕涕泗久而不忘仍承巳畢大事忽復更嵗觸物感動奈何奈何某謫居遼夐無由往奠追想宗契之深悲愴不巳惟昆仲節哀自重以副逺誠謹奉疏慰不次謹疏正月日趙郡蘇某慰疏上又舟榮二大士逺來極感至意舟又冒涉嶺海尤為愧荷也寳月塔銘本以罪廢流落恐玷髙風不敢輒作而舟師哀請誠切故勉為之也海隅漂泊無復歸望追懷疇昔永望悽㫁與楊濟甫二首寳月師孫來得所恵書喜知尊體佳勝眷聚各清安至慰至慰某凡百粗遣北歸未有期信命且過不煩念及惟聞墳墓安靖非濟甫風義之篤何以得此感荷不可言舟師云當一到眉此中諸事可問其詳也逺祝惟若時珍重而巳又逺䝉厚恵蜀紙藥物等一一如數領訖感怍之至人行速無佳物充信謾寄腰帯一條俗物増愧不罪不罪與元老姪孫四首元老姪孫秀才屢得書感慰十九郎墓表本是老人欲作今豈推辭向者猶作寳月誌文况此文義當作但以日近憂畏愈深飲食語黙百慮而後動想喻此意也若不死終當作耳近來鬚鬢雪白加瘦但健及啖啜如故耳相見無期惟當勉力進道起門户為親榮老人僵仆海外亦不恨也又姪孫元老秀才久不聞問不識即日體中佳否蜀中骨肉想不住得安信老人住海外如昨但近來多病瘦悴不復往日不知餘年復得相見否循恵不得書久矣旅况牢落不言可知又海南連嵗不熟飲食百物艱難又泉廣海舶絶不至藥物醬酢等皆無厄窮至此委命而巳老人與過子相對如兩苦行僧耳然胸中亦超然自得不改其度知之免憂所要志文但數年不死便作不食言也姪孫既是東坡骨肉人所覷看往京凡百倍加周防切祝切祝今有書與許下諸子又恐陳浩秀才不過許只令送與姪孫切速為求便寄達餘惟千萬自重又姪孫近來為學何如恐不免趨時然亦須多讀書史務令文字華實相副期於適用乃佳勿令得一第後所學便為棄物也海外亦麄有書籍六郎亦不廢學雖不解對義然作文極俊壯有家法二郎五郎見說亦長進曽見他文字否姪孫宜熟看前後漢史及韓栁文有便寄近文一兩首來慰海外老人意也又趙先輩儋人此中凡百可問而知也鄉里出百藥煎如收得可寄一二斤趙還時可附也無即巳東坡全集巻八十四
