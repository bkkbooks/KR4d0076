body:
  text: 東坡全集卷六十八宋蘇軾撰表狀四十二首謝除龍圖閣學士表二首臣軾言伏蒙聖恩以臣纍章請郡特除臣龍圖閣學士知杭州者中禁寶儲上應奎璧之象先朝謨訓逺同河洛之符𨽻職其間省躬非據臣軾誠惶誠恐頓首頓首伏念臣學非有得愚至不移雖叨過實之名卒無適用之器少時妄意蓋嘗有志於事功晚歲積憂但欲歸安於田畝屬聖神之履運荷識拔之非常猶冀桑榆之收遽迫犬馬之疾力求間散庶免顛隮豈謂皇帝陛下聖度包荒天慈委照察其才有所短不欲強置之禁嚴知其進不由人故特保全其終始遂加此職以賁其行臣敢不仰緣末光益勵素守往何之而不可中無愧之為安但未死亡必期報塞臣無任感天荷聖激切屏營之至又臣軾言伏蒙聖恩以臣纍章請郡特除臣龍圖閣學士知杭州者北扉清密久愧素餐內閣深嚴復膺殊寵以榮為懼有靦在顔臣軾誠惶誠恐頓首頓首伏念臣賦命數竒與人多忤遭遇仁祖忝竊賢科繼蒙英廟之深知尤荷裕陵之見器而流離若此窮薄可知晚親日月之光常恐瓶罍之溢故求間散以避災迍豈謂太皇太后陛下天髙聽卑坤厚載物愛惜臣下固無異於子孫委任官師本不分於中外致兹衰病不失清華然臣辭寵而益榮求間而得劇雖云稍逺於爭地尚恐終非其久安敢不磨鈍自修履冰知戒庶全孤節少答殊私臣無任謝賜對衣金帶馬表二首臣軾言伏蒙聖慈特賜衣一對金腰帶一條金鍍銀鞍轡一副馬一匹者出笥之珍已華朽質解驂之賜益耀衆觀顧惟何人亦被兹寵臣軾誠惶誠恐頓首頓首伏念臣少而拙訥老益疏愚山野之姿非文繡之所及疲駑之質雖鞭䇿以何加方祈冗散之安更忝便蕃之錫此蓋伏遇皇帝陛下緝熙儒術網羅人材不愛車服寵數之章使為吏民瞻望之美據鞍有愧束袵知榮敢不奉以牧民永思去害之指施之大邑庶無學製之傷臣無任又臣軾言伏蒙聖恩特賜衣一對金腰帶一條金鍍銀鞍轡一副馬一匹者命服斯皇詩詠周宣之德康侯用錫易稱王母之仁惠澤所加臣工知勸臣軾誠惶誠恐頓首頓首伏念臣資材朽鈍學術空疏矧兹衰病之餘豈復光華之羡荷寵章之蕃庶人以為榮顧形影之支離臣惟自愧此蓋伏遇太皇太后陛下知人堯哲遍物舜仁時遣拾遺補過之臣出為承流宣化之任子衣安吉不待請而得之我馬虺隤蓋知勞而賜者敢不勉思忠藎務報恩勤永惟廏庫之珍莫非民力無忘獄市之寄以副上心臣無任笏記二首臣軾言𨽻職宸居承流閫寄自知衰朽有玷寵光此蓋伏遇皇帝陛下總攬羣材靡遺片善曲收頑鈍迭處清華徒傾草木之心莫報乾坤之施臣無任又既塵美職復玷名藩榮寵過情省循知愧此蓋伏遇太皇太后陛下仁均動植明燭幽微特示寵章以旌眷遇恩勤莫報生死難忘臣無任杭州謝上表二首臣軾言伏奉制書除臣龍圖閣學士知杭州臣已於今月三日到任上訖者始衰而病豈非滿溢之災乞越得杭又過平生之望臣軾誠惶誠恐頓首頓首伏念臣起自廢黜驟登禁嚴畢命驅馳未償萬一懷安退縮豈所當然蓋散材不任於斧斤而病馬空糜於芻粟故求外補以盡餘年豈期避寵而益榮求間而得劇此蓋伏遇皇帝陛下剛健中正緝熙光明無為蓋虞舜之仁篤學有仲尼之智而臣猥以末技日奉講帷凛然威光近在咫尺惟古人責難之意每不自量方陛下好問之初遽以疾去推之理數可謂竒窮荷眷遇之不移竊恩榮而愈重雖雨露之施初不擇物而犬馬之報期於殺身臣無任又臣軾言伏奉制書除臣龍圖閣學士知杭州臣已於今月三日到任上訖者入奉榮嚴出膺方面皆人臣之殊選在儒者以尤榮臣軾誠惶誠恐頓首頓首伏念臣受寵逾涯積憂成疾既思退就於安養又欲少逃於滿盈仰荷至仁曲從微願江山故國所至如歸父老遺民與臣相問知朝廷輟近侍為太守蓋聖主視天下如一家鞭撲未施爭訟幾絶臣之厚幸豈易名言此蓋伏遇太皇太后陛下天地之仁賢愚兼取日月之照邪正自分每包函其蠢迂欲保全其終始兄弟孤立嘗親奉於德音死生不移更誓堅於晚節臣無任杭州謝放罪表二首臣軾言臣近以法外刺配本州百姓顔章顔益二人上章符罪奉聖旨特放罪者職在承宣當遵三尺之約束事關利害輒從一切之便宜曲荷天慈不從吏議臣軾誠惶誠恐頓首頓首伏念臣早緣剛拙屢致憂虞用之朝廷則逆耳之奏形於言施之郡縣則疾惡之心見於政雖知難每以為戒而臨事不能自回茍非日月之明肝膽必照則臣豈惟獲罪於今日久已見傾於衆言恭惟皇帝陛下睿哲生知清明旁達委任羣下退託於不能愛養成材惟恐其有過知臣欲去一方之積弊須除二猾以示民特屈憲章以全器使臣敢不省循過咎祗服簡書眷此善良自不犯於漢法時有貸捨用益廣於堯仁臣無任又亂羣之誅不請而決蓋恩威之無素致姦猾之敢行方俟譴訶豈期寬宥臣軾誠惶誠恐頓首頓首伏以法吏網密蓋出於近年守臣權輕無甚於今日觀祖宗信任之意以州郡責成於人豈有不擇師帥之良但知繩墨之馭若平居僅能守法則緩急何以使民顧臣不才難以議此恭惟太皇太后陛下寬仁從衆信順得天推一身之至公納萬方於無罪而臣始終被遇中外蒙恩謂事有専而合宜情無他而可恕故加貸捨以示寵綏朝廷之明粗以臣為可信吏民自服當不令而率從臣無任賀明堂赦書表二首臣軾言宗祀告成修纍朝之盛典端門肆眚答萬宇之歡心凡有識知舉增抃躍臣軾誠歡誠喜頓首頓首竊謂祖宗恩信之所被譬如天地寒暑之不差將推作解之仁必在當郊之歲恭惟皇帝陛下憲章六聖左右三靈上帝眷而風雨時壬人去而蠻夷服講明大禮對越昊天懷柔百神嚮用五福大河修復奏軌道於東流藩邸顧懷錫鴻名於西府臣備貟法從待罪守臣想聞路寢之鼓鐘曾叨奉引嘉與海隅之草木同被恩私臣無任又臣軾言嚴配禮成民心知孝好生德洽天下歸仁凡蒙一洗之恩舉有惟新之喜臣軾誠歡誠忭頓首頓首伏以功存廟社而辭其禮德及草木而諱其名此聖人之所難幸微生之親見恭惟太皇太后陛下勳髙任姒道配唐虞顧惟致治於和平孰不歸心於保佑合宫均福畢修纍聖之文會慶告成不居先后之位臣職叨禁從身逺闕庭既欣渙汗之私溥霑動植更喜謙光之美獨冠古今臣無任謝賜厯日詔書表二首臣軾言伏蒙聖恩特賜臣詔書并元祐五年厯日一卷者論道調元雖大臣之職授時賦政亦郡守之常而臣供奉內朝使指一道居則代言而頒令出則勸民以務農蒙此恩榮敢忘奉順臣軾中謝恭惟皇帝陛下文明憲古睿哲先天厯象教民本堯舜之智水旱罪已蓋禹湯之仁固將推廣其誠心豈特奉行於故事爰因嵗首已宣布於王言孰謂民愚咸識知於帝力臣無任又臣軾言伏蒙聖恩特賜臣詔書并元祐五年厯日一卷者竊惟稽古之君必以授時為急底日不失日官既有常先時不失時罰在無赦申以丁寧之詔致其惻怛之誠習見頒行止謂有司之故事考其情實則本聖人之用心臣軾中謝恭惟太皇太后陛下元功在天盛德冠古順帝之則雖並用於恩威與物為春蓋同歸於仁厚而臣入奉講學出牧農民恭布詔書悉傳閭里庶德音之昭格致嗣嵗之豐穰臣無任賀興龍節表臣軾言天佑民而作君惟德是輔帝生商而立子有開必先納富夀於方來實兆基於兹日臣軾中賀恭惟皇帝陛下文思天縱聖敬日躋以若稽古之心上遵王路行不忍人之政下酌民言神聽靖共天夀平格臣久塵法從出領郡符奉萬年之觴雖阻陪於下列接千嵗之統猶及見於升平草木之情日月所照臣無任賀坤成節表臣軾言仁惟天助夀不假於禱祈澤在民心言自成於雅頌恭臨誕月仰祝聖期雖凡庶之何知亦臣子之常分中謝恭惟太皇太后陛下儲神天地託國祖宗元勳本自於無心神智實生於至靜同守大器於兹六年放億萬之羽毛未若消兵以全赤子飯無數之緇褐豈如散廩以活飢民臣躬領郡符目覩兹事載瞻象闕阻奉瑶觴嘉與海隅之人同慶華封之祝臣無任辭免翰林學士承旨第一狀右臣今月二十八日奉敕已除臣翰林學士承旨左朝奉郎知制誥詔書到日可依條交割公事訖乘遞馬疾速發來赴闕臣已於當日依條交割公事訖伏念臣頃以兩目昏暗左臂不仁堅辭禁林得請便郡庶緣靜退少養衰殘二年於兹一事無補才有限而難強病不減而益增但以東南連被災傷不敢陳乞别求安便敢謂仁聖尚賜恩憐召還故官復加新寵不惟朝廷公議未允實亦衰病勉強不前兼竊覩邸報臣弟轍已除尚書右丞兄居禁林弟為執政在公朝既合回避於私門實懼滿盈計此誤恩必難安處伏望聖慈除臣一郡以息多言臣見起發前去至宿泗間聽候指揮謹録奏聞伏候敕旨第二狀右臣近蒙恩除翰林學士承旨臣以衰病不才難居禁近兼以弟轍忝與執政理合回避奏乞除臣一郡今奉詔書未賜開允恩威之重霈若雷雨豈臣孱陋所敢固違伏念臣自去闕庭日加衰白故疾不愈舊學已荒更冒寵榮必速顛躓而况清要之地衆所奔趨兄弟遞居勢難安處正使緣力辭而獲譴猶賢於忝冒而致災伏望聖慈察臣誠懇特賜除臣知揚越陳蔡一郡臣今已到揚州迤邐前去南京以來聽候指揮干冒天威臣無任戰恐待罪之至謹録奏聞伏候敕旨第三狀右臣近蒙恩除翰林學士承旨臣以衰病不才難居禁近兼以弟轍備位執政理合回避尋兩次奏乞除臣一郡凖尚書省劄子三省同奉聖旨依前降詔書不允者臣之愚慮終以弟轍親嫌於義未安竊見仁宗朝王洙為學士以其從子堯臣參知政事故罷臣今來欲乞依王洙故事回避仍乞檢會前奏除臣揚越陳蔡一郡屢犯天威臣無任戰恐待罪之至謹録奏聞伏候敕旨乞候坤成節上夀訖復遂前請狀右臣近奏乞依王洙故事罷翰林學士承旨仍乞一郡奉聖旨依纍降指揮不允者銜戴恩慈怵迫威命已經三却其敢固違已於今月二十九日赴閣門祇受告命訖然臣衰病日加心力難強親嫌之避愚守不移伏見坤成節在近欲候上夀訖復遂前請勉強供職庶表見臣子恭順之心逡巡力辭蓋終存典刑分義之守謹録奏聞謹奏謝宣召再入學士院狀二首右臣今月十一日翰林待詔梁迪至臣所居奉宣聖旨召臣入院充學士承旨使星下燭生蓬蓽之光華天澤旁流失桑榆之枯稿國有用儒之盛士知稽古之榮伏以翰墨之林號稱內相文章之外不取他才至於用人可以觀政文武並用或成頗牧之功邪正雜居至有伾文之患惟貴且近故難其人而况金鑾玉堂親被絲綸之密北廳東閣獨稱年德之高必有異人以齊衆口而臣本緣衰病出守江湖以一方凋弊之餘當二年水潦之厄戴星而治僅免流離及瓜而還恍如夢寐交親迎勞都邑聚觀驚華髮之半空笑丹心之未折宜投間散以養衰殘豈期過採於虛名復使榮加於舊物此蓋伏遇皇帝陛下德如乾健明配日中既祖述於堯仁復躬行於舜孝才難之歎人誦斯言緣先帝之德音收孤臣於散地言雖直而無罪身愈逺而益親委曲保全始終録用臣敢不更磨朽鈍少補涓埃難得者時未有捐軀之會勿欺而犯誓無患失之心臣無任又右臣今月十一日翰林待詔梁迪至臣所居奉宣聖旨召臣入院充學士承旨者衰遲無用寵既溢於當年眷待有加恩復隆於晚節使華臨賁天語丁寧聳里巷之驚觀歎朝廷之用舊伏以禁林分直法本六人帝語親承舊惟一老不緣名次之先後斷自上心之簡求冠內朝供奉之班極儒者遭逢之盛凡膺此選宜得異材而臣本以愚忠纍塵器使初無已試之效但有過實之名千里闕庭二年江海憂深投杼豈無三至之言詔復賜環不待一人之譽此蓋伏遇太皇太后陛下道無私載公生至明以七年之照臨觀羣臣之邪正知臣剛褊自用雖有寬饒之狂察臣招麾不移庶幾長孺之守故還舊物益茂新恩臣敢不早夜以思死生不易雖桑榆之景已迫殘年而犬馬之心猶思後效謝賜對衣金帶馬狀二首右臣伏蒙聖慈以臣入院特賜衣一對金腰帶一條并魚袋鍍金銀鞍轡馬一匹者漢官三服已分密麗之珍唐監八坊復下權竒之駿拜嘉甚寵省已何功伏念臣受材迂疏賦命寒蹇幼師季路止服緼袍長慕少遊欲乘下澤目眩重金之耀神驚四牡之良俯仰自惟周章失次此蓋伏遇皇帝陛下憂勤黎庶寤寐俊賢故損廏庫之儲以廣英雄之彀致兹孱陋亦被寵光臣敢不求稱於衷益鞭其後薄德盛服當戒維鵜之篇強力安邦庶幾有駜之頌臣無任又右臣伏蒙聖慈以臣入院特賜衣一對金腰帶一條并魚袋金鍍銀鞍轡馬一匹者鏤錫金軛示有馳驅之勞寶帶襲衣豈無約束之義上既循名而責實下當因物以貢誠伏念臣少則賤貧長而困厄仲卿龍具追晏子之一裘伯厚雞栖陋景公之千駟無功拜賜服寵汗顔顧惟何人膺此異數此蓋伏遇太皇太后陛下躬行慈儉德貫天人約於奉已而侈於養賢嚴於私親而寬於馭衆憐其朽鈍借以光華臣敢不衣被訓詞服勤鞭箠惟德其物永觀不易之言思馬斯徂更厲無邪之志笏記二首臣蒙恩授翰林學士承旨知制誥兼侍讀者出膺閫寄入長禁林皆儒者之極榮豈駑材之所稱此蓋伏遇皇帝陛下法天凝命稽古象賢總攬羣英兼收小器欲效涓塵之報未知糜隕之期臣無任又臣蒙恩授翰林學士承旨知制誥兼侍讀者出守無功方期竄逐召還何幸復玷清華此蓋伏遇太皇太后坤載沈潛母慈均一既陶甄於頑礦復封植於散材誓卒餘生少圖來效臣無任謝兼侍讀表二首臣軾言今月四日伏奉告命除臣兼侍讀者用非其分寵至若驚滿溢之憂逡巡莫避臣軾誠惶誠恐頓首頓首伏念臣與弟轍同登進士並擢賢科內外分掌於制書先後迭居於翰苑今臣以經史入侍司言行於中轍以丞轄立朝督綱條於外恭承明詔不許固辭以為兄弟之同升自是朝廷之盛事承明三入僅比古人大雅一門無慙舊史人非木石恩重丘山恭惟太皇太后陛下明極照臨憂深付託欲為社稷之衛莫如臣僕之賢以帝堯之哲而甚畏於壬人以孔子之聖而思見於狷者致兹選擢驟及迂愚臣敢不淬勵初心激昻晚嵗誓堅必死之節少報不資之恩臣無任感天荷聖激切屏營之至謹奉表稱謝以聞臣軾誠惶誠恐頓首謹言又臣軾言今月四日伏奉告命除臣兼侍讀者叨承新命祇服訓詞薄技已窮舊恩未替臣軾誠惶誠恐頓首頓首伏念臣志大而才短論迂而性剛以自用不回之心處衆人必爭之地不早退縮安能保全是以三年翰墨之林屢遭飛語再嵗江湖之上粗免煩言豈此身愚智之殊蓋所居間劇之致臣之自處何者為宜而况講讀之司帷幄最近分章摘句則何以報非常之知因事獻言又必貽前日之患雖仰恃天日之照實常負氷淵之虞恭惟皇帝陛下大德庇民小心順帝雖天覆地載以聖不可知為神而日就月將以學而不厭為智曲收舊物以廣多聞臣敢不職思其憂本無分於中外欲報之德誓不易於死生臣無任謝三伏早休表二首大火既中三庚云伏炎熹之病貴賤所同忽蒙退食之恩遂失流金之酷恭惟皇帝陛下仁均動植明燭幽微上有無逸之勤下無獨賢之歎臣等逢時多暇竊祿安居共揚扇暍之風以安黎庶更勵飲冰之節少答生成臣等無任又星火見而金微日方可畏朝氣鋭而晝惰恩獲少休上既知勞下皆忘暑恭惟太皇太后陛下勞謙恭已內恕及人雖天地無一物之私而父母有至誠之愛臣等仰蒙寬假動獲便安未明無顛倒之衣省循何幸夙退有委蛇之食歌詠而歸臣等無任謝除龍圖閣學士知潁州表二首臣軾言伏蒙聖恩以臣纍章乞郡除臣龍圖閣學士知潁州者引嫌求避顧舊典之甚明易職寵行荷新恩之至厚踈愚自省慙悚交并中謝伏念臣學陋無聞性迂難合受四朝之知遇竊五郡之蕃宣吳會二年但坐糜於廩祿禁林數月曾未補於絲毫敢兾殊私復還舊物恭惟太皇太后陛下仁涵動植明燭幽微知臣獨受於聖知欲使曲全於晚節憐其無用許以少安凡力請八章而後從使不為一乞而遽去在臣進退可謂光榮雖老病懷歸已功名之無望而衷誠思報尚生死之不移臣無任又臣軾言伏蒙聖恩以臣纍章乞郡除臣龍圖閣學士知潁州者備員經席幸依日月之光引避親嫌實有簡書之畏恩還舊職寵寄近蕃衰朽增華省循知愧中謝伏念臣生無他技天與愚忠雖所向之竒窮獨受知於仁聖力求便郡蓋常懷老退之心伏讀訓詞有不為朕留之語殊私難報危涕自零恭惟皇帝陛下緝熙光明剛健篤實方收文王之四友以集孔子之大成而臣茍念餘生之安莫伸一割之用桑榆暮齒恐遂齎志而莫償犬馬微心猶懼蓋棺而後定臣無任謝賜對衣金帶馬狀二首右臣伏蒙聖慈特賜臣對衣一襲金腰帶一條銀鞍轡馬一匹者錫之上駟敢忘致逺之勞佩以良金無復忘腰之適執鞭請事顧影知慙恭惟皇帝陛下禹儉中修堯文外煥長轡以御率皆四牡之良所寶惟賢豈徒三品之貴出捐車服收輯事功而臣衰不待年寵常過分枯羸之質匪伊垂之而帶有餘斂退之心非敢後也而馬不進徒堅晚節難報深恩臣無任又右臣伏蒙聖慈特賜臣對衣一襲金腰帶一條銀鞍轡馬一匹者出笥之珍以旌有德在坰之駟豈及無功而臣首尾四年叨塵三錫省躬內灼服寵汗流恭惟太皇太后陛下慈儉自居龍光四達德被海宇豈惟一襲之衣恩結華夷何止十圍之帶羣賢在馭六轡自調而臣頃以衰羸止求安便奉宣德意庶幾五袴之謠收斂壯心無復千里之志更期力報有愧空言臣無任潁州謝到任表二首臣軾言伏蒙聖恩除臣龍圖閣學士知潁州臣已於今月二十二日到任訖者避嫌引疾慙無國士之風揣分知難粗守人臣之節曲蒙溫詔遂假名邦已見吏民惟知感怍臣某中謝伏念臣早緣多難無意軒裳晚以虛名偶塵侍從雖云時可每與願違既未決於歸田故力求於治郡慈母愛子但憐其無能明君知臣終護其所短自欣投老漸獲安身此蓋伏遇太皇太后陛下慈儉臨民剛柔布政參天地而有信喜怒不陳體水鏡之無心忠邪自辨致兹愚直亦克保全雖任職居官無過人者而見危授命蓋有志焉臣無任又臣軾言伏蒙聖恩除臣龍圖閣學士知潁州臣已於今月二十二日到任訖者支郡責輕未即滿盈於小器豐年事簡非徒飽暖於一家覽几席之溪湖雜簿書於魚鳥平生所樂臨老獲從臣某誠惶誠恐頓首頓首伏以汝潁為州邦畿稱首土風備於南北人物推於古今賔主俱賢蓋宗資范孟博之舊治文獻相續有晏殊歐陽修之遺風顧臣何人亦與兹選此蓋伏遇皇帝陛下丕承六聖總攬羣英生知仁孝之全學識文武之大謂臣簮履之舊物嘗忝帷幄之近臣奉事七年﨑嶇一節意其忠義許國故暫召還察其老病畏人復許補外置之安地養此散材更少勉於桑榆誓不忘於畎畝臣無任上清儲祥宫成賀德音表二首臣軾言伏覩九月二十七日德音以上清儲祥宫成減決四京及諸道見禁罪人者靈光下燭慶新宫之落成霈澤旁流洗庶獄之多罪散為和氣坐致豐年臣某誠歡誠忭頓首頓首臣聞舜禹之心以奉先為孝本釋老之道以損已為福田永惟坤作之成每辭天下之養卑宫何陋大練為安故能捐萬金之資以成二聖之意為國迎祥而國無所費與民祈福而民不知勞鑾輅親臨神靈昭格覩士女之和會既同其休念囹圄之幽囚或非其罪用孚大號以達惠心恭惟太皇太后陛下恭儉以仁明哲作則愛惜帑廪不供浮費之私重慎典刑每存數赦之戒一寬湯網衆識堯心臣以從官出臨近甸率吏民而拜慶助父老之歡謠永望闕庭實同咫尺臣無任又臣軾言伏覩九月二十七日德音以上清儲祥宫成減決四京及諸道見禁罪人者琳館告成神人交慶綸音下霈過故盡除臣某誠歡誠忭頓首頓首臣聞漢武築通天之臺魏明作凌雲之觀皆厲民而私已或祕祝以蘄年然猶形於詠歌被之金石而况文孫繼志神母考祥追六聖之心本枝百世均萬方之慶囹圄一空豈惟洗濯於丹書固已光華於青史恭惟皇帝陛下知人堯哲克已禹勤積德之宫以文章為藻飾庇民之厦以仁義為基扄眷朴斫之成能亦聖神之餘事臣久參法從夙侍經幃樂石銘詩雖幸執太史之筆大圭薦祼不獲踐屬車之塵徒與吏民共兹慶澤臣無任賀興龍節表臣軾言天佑我邦祥開是日山川貢瑞日月增華臣某誠歡誠忭頓首頓首伏以上聖所儲有慈儉不爭之寶輿情共獻蓋憂勤無逸之龜不待禱祠而來自然天人之應恭惟皇帝陛下堯仁舜孝禹勤湯寬德莫大於好生故以不殺為神武道莫尊於問學故以所聞為髙明錫厥庶民嚮用五福臣備貟內閣出守近畿雖違咫尺天威乃身在外而上千萬嵗壽此意則同臣無任賀駕幸太學表二首臣軾言恭聞十月十五日駕幸太學者輦回原廟既崇廣孝之風幄次儒宫復示右文之化禮行一日風動四方臣某誠歡誠忭頓首頓首臣聞五學之臨三代所共蓋天子不敢自聖而盛德必有達尊在漢永平始舉是禮雖臨雍拜老有先王之規而正坐自講非人主之事豈如允哲退託不能奠爵伏興意默通於先聖橫經問難言各盡於諸儒恭惟皇帝陛下文武憲邦聰明齊聖大度同符於藝祖至仁追配於昭陵故舉舊章以興盛節臣早塵法從久侍經幃永矣馳誠想聞合語於東序斐然作頌行觀獻馘於西戎臣無任又臣軾言恭聞十月十五日皇帝駕幸太學者濟濟多士靈承上帝之休雍雍在宫服膺文母之教風傳海宇慶溢臣工臣某誠歡誠忭頓首頓首臣聞學校太平之文而以得士為實經術致治之具而以愛民為心心既立而具乃行實先充而文斯應永惟坤載之厚輔成天縱之能惟使文子文孫莫不仁故於先聖先師無所愧恭惟太皇太后陛下憂深祖構德燕孫謀黃裳之文斧藻萬物青襟之政長育羣材豈惟鼓舞於士夫實亦光華於史册臣冒榮滋久被遇最深外告成功行喜梟音之革中修潛德孰知麟趾之風臣無任謝賜厯日表二首迎日推策雖曰百王之常後天奉時惟我二后之德伏讀詔旨灼知聖心中謝伏以嗣歲將興舊章畢舉三朝受海內之圖籍七月陳王業之艱難冬有祁寒知民言之可畏陽居大夏識天道之至仁故於頒朔之初更下布新之詔恭惟太皇太后陛下視民如子以國為家振廩勸分人自忘於艱歲消兵去殺天必報之豐年臣敢不省事清心貴農時之不奪思患預備期歲計之有餘庶竭微誠少裨洪造臣無任又歲頒正朔蓋春秋統始之經郡賜璽書亦漢家寬大之詔實為令典豈是空文臣某誠惶誠懼頓首頓首伏以望歲者生民之至情畏天者人君之大戒所以常言報應而不言時數每奏水旱而不奏嘉祥上有消復之心下有燮調之道固資共理同底純熙恭惟皇帝陛下祗敬三靈憂勤萬宇為仁一日自然天下之歸教民七年豈無善人之效臣敢不仰遵堯典寅奉夏時謹隄防溝洫之修行勞來安定之政庶殫綿力少助至仁臣無任東坡全集卷六十八
