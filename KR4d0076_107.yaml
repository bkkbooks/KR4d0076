body:
  text: 東坡全集卷一百七宋蘇軾撰外制制敕七十三首司馬光三代曽祖政太子太保敕書曰臯陶邁種德種之逺故其發也難發之難故其報也大古之君子有種德於百年之前而待報於數世之後者昔聞其語今見其人具官某故曽祖某官某篤行有聞信於鄉國懷道不試遺其子孫天不吾欺再世而顯至于曽孫其德日躋衮衣繡裳進位於朝退有事於家廟其致朕命詔于有神尚食其報以康乃後可曽祖母薛氏溫國太夫人敕朕自通籍之臣皆有以寵綏其父母而自祖以上非豫丞弼之家莫獲褒顯君子之孝至於尊祖以及其妣用邦君之禮以隆其家可謂至矣具官某故曽祖母某氏専靜有守柔嘉維則經之以孝慈緯之以恭儉使清白之訓不墜於子孫而隱德之報可質於天地我有異數詔于幽穸翟茀副笄尚服享之可祖炫太子太傅敕朕有元臣以德媚于上下民見其羽旄聞其車馬之音則稽首而聚觀之況其父祖墳墓之所在望其草木蓋有流涕而拜者錫命之寵豈特以慰其家而巳哉具官某故祖父某官某篤學力行追配前人仕道難進止於一命無疆之慶在其子孫風流未逺英烈如在歆豫寵章以慰民望可祖母皇甫氏溫國太夫人敕夫天人之際若不可知而善惡之報各以其類凡今富貴壽考光顯于世朕察其父母大父母未有不仁而得之者也具官某故祖母某氏令德孝恭著于閨門好禮慈儉刑于姻族始生賢子以大其家而餘澤方茂福祿未究再世之後莫之與京愍册追榮國有常典庶幾幽壤服我寵靈可父池贈太師追封溫國公敕朕聞盛德之士必與天合考之古人而無疑質諸鬼神而不慙雖不當世必有達者具官某故父某官某德為世範言為士則躬蹈險夷之節庶幾顏閔之行事我仁祖為時名臣而儒術之用止於侍從德澤之施極於方鎮天厚其世篤生異人不求而名自章不言而人自信皆曰君子之子宜為天下之用朕既采民言俾秉國成而淵源之深推本所自命以師臣胙之大國使人知有道之士雖沒有無疆之休可母聶氏溫國太夫人敕古之烈婦著在史册非有憂患不見名節若夫令德懿行秀于閨門而湮滅無傳何可勝數獨賴子孫之賢或以表見於世君子之欲得位行道豈非以顯親揚名之故歟具官某故母聶氏早以淑女嬪于德人恭儉信順以相其夫慈和嚴翼以成其子使朕得名世之士以濟於艱難其遺風餘澤蓋有存者改封大國正位小君非獨以報其德庶幾令名與子俱傳於天下可故妻張氏溫國夫人敕夫婦之好義同賓友勤瘁相成於艱難之中而死生契闊於安樂之後朕聞其事惻然傷之具官某故妻某氏少以女士不勤姆師歸于德門克有令問從我元老辭寵居約遊神清淨之庭守德寂寞之宅始終之際無愧古人我有寵章慰其永逝其正名於大國以從姑於九原可張恕將作監丞敕具官張恕朕惟人材之難長育之無素事至而求有不可得是以訪之元臣大老之家推擇其子弟庶幾似之以爾名臣之子篤學好禮敏於從政試之匠事以觀其能爾克逺猷無忝乃父以稱朕意可趙濟知解州敕具官趙濟古者官有常人士有定論雍也可使南面求也可使為百乘宰論定而官不浮則民服汝長西師歷年於此矣考之清議不曰汝宜尚畀一城以觀來效敬之戒之毋失朕命可李承之知青州敕朕東望齊魯之區河岱之間沃野千里生齒億萬商農阜通儒俠雜居可以大度長者服難以細謹法吏治也朝散郎前試戶部尚書李承之生于甲族世為名臣屢試有勞所見者大肆豫命爾尹兹東土昔曹參為齊相問治於其師蓋公公曰治道貴清淨而民自定汝師其言則豫汝嘉可特授依前官充樞密直學士差知青州充京東東路安撫使填見闕門下侍郎韓維三代曽祖處均燕國公敕漢諸袁之父子四世繼出五公唐諸溫之兄弟同時並列三省著在圖史古無擬倫眷豫世臣有若韓氏億事仁祖始參大政篤生三子咸秉國政豈惟嗣世之賢實賴積善之報具官某曽祖贈太師荆國公某濳德不耀久而自彰天祚厥家世濟其美盛矣曽孫之貴蔚為三壽之朋逮豫纘嗣之初繼受艱難之託允文而靖既直且溫旋觀純德之全尚識遺風之自是用因上公之舊秩開北國之新封仰以增廟室之光華俯以慰蒸嘗之怵惕曽祖母李氏燕國太夫人敕朕惟公卿之家有能父子躬履一德弼亮三世非其淵源深長外有羔羊諒直之賢內有鳲鳩均一之助亦安能奕世秉義久而不忘者乎具官某故曽祖母荆國太夫人某氏育德名家作嬪良士珩璜之節動必以禮蘋藻之薦欽而有儀用能使其後昆丞弼我國家以無斁於世今其蒞政責任兹始余亦何愛大國不以易湯沐之舊祖保樞魯國公敕朕方圖任股肱之臣以光大祖宗之業用廣斯志以及爾私人之念祖誰不如我是以推沛恩命褒顯前人具官某故祖楚國公某躬履仁義著迹鄉黨積纍深厚見于子孫或佐我仁祖之盛明或相我神考之休烈遺風未逺故史尚存逮兹纘承繼用耆哲朕既恭默思道垂拱責成與其寵祿厥躬不若尊大其祖上以報貽謀之德下以勵移孝之誠肇新曲阜之封增寵師臣之贈服我休命益大爾家祖母郭氏周氏敕古者婦人爵因其夫貴以其子雖有過人之才絶俗之行不得所託不表於世今余輔臣父子兄弟先後相望以師長我百辟願推洪恩光顯光烈維考維妣咸追錫休命肆豫寵嘉之具官某故祖母楚國太夫人某氏某氏德稱閨闈化及宗黨允蹈家人之正居有鵲巢之福翟衣之盛由子而獲國封之貴及孫而大兹用錫爾周公之履以熾韓氏之祧庶其有知服我新命父億冀國公敕朕聞仁宗在位之久有同成康得士之盛不減武宣如儲藥石以待疾病如植梓漆以備器用凡在左右文武之選率多慶厯嘉祐之人而況一時之老成與聞當年之大政德業傳於父老儀刑見於子孫名在國史像在原廟朕用慨然想見其人具官某故父參知政事贈太師秦國公某少稟異材進由直道出為循吏入為名卿福祿終身而人不疵富貴奕世而天不厭篤生三子翼輔兩朝旌旄交馳棨戟互設朕欲賁其家廟而貴巳窮於人爵改封大國益著隆名庶使昭陵之老成永為北土之藩輔母蒲氏王氏冀國太夫人敕慎終追逺仁也顯親揚名孝也得志行道澤可以及天下而富貴不能及其親天也雖不能及而追榮之典可以貫幽明褒大之訓可以表後世禮也嗚呼此亦仁之至義之盡矣具官某故母秦國太夫人某氏某氏族為士望德為女師恭儉以相其夫嚴敏以成其子使朕獲老成之佐以濟艱難之功宜推異恩以報舊德故妻蘇氏永嘉郡夫人敕婦人有德行才智之能而不得施于事有言語文章之美而不得聞於人況夫仁而不壽賢而不祿者乎此詩人所以賦彤管而史氏所以傳列女也具官某故妻南陽郡君某氏少以女士秀于閨門來嬪德人動以禮法而不得與君子偕老翟茀以朝哀哉若人命之不淑其改賜湯沐寵以訓詞庶幾采蘩之遺芳不與宿草而共盡妻張氏同安郡夫人敕朕登進元臣専以德選退食委蛇省察其私有召南之風焉抑抑威儀惟德之隅非內有相二何以及此具官某妻仁壽郡君張氏生於冠族作配君子言有物則行應圖史宜疏湯沐之封以稱山河之象祗服明命佑我老臣俾無內顧之憂専任仰成之寄趙濟落直龍圖閣管勾中嶽廟敕具官趙濟有司言汝罪惡有狀小人有不忍為而汝為之朕惟羞汗縉紳重置汝于理其退處散地以勵風俗可王彭知婺州孫昌齡知蘇州岑象求知果州制同敕具官某為吏莫不欲威而明威不可立也惟公則威明不可作也惟虛則明郡無大小民無剛柔事無繁簡政無難易惟公而虛無適而不治以爾用法之久不失仁恕折獄之多滋識情偽孫昌齡岑象求改云端靜有守悃愊無華奉使歷年吏民宜之其悉乃心施于有政不侮鰥寡毋擾獄市稱朕意焉可王子韶主客郎中周尹考功郎中敕具官某等事有繁簡才有所宜要之郎官天下之清選也朕有所擇於其人而無所輕重於其間以爾子韶博聞強記老而能學以爾尹果藝而達知無不為各率其職而用其長朕將觀焉可蔣之奇天章閣待制知潭州敕三后在上遺文在下炳若雲漢昭回于天乃眷藏書之府因為育材之地爰登秀傑以備顧問雖持節出使剖符分憂一挂名於其間遂增重於所蒞且使民見侍從之出守知朝廷之念逺也具官蔣之奇少以異材輔之博學藝於從政敏而有功使之治劇於一方固當坐嘯以終日勿謂湖湘之逺在余庭戶之間務安斯民以稱朕意可皇伯祖宗勝贈太尉北海郡王敕夫以三公之位冠諸侯王之爵元勳盛德有不能兼非我父兄親賢之隆加之死生哀榮之極則朕豈以此授非其人哉具官宗勝生于髙明克自抑畏忠厚以為質禮敬以自文貴窮人爵而無驕佚之譏考終天命而有歸全之美始終之際中外所賢日月有時窀穸告具備物典册以將余哀豈獨慰九原之思蓋將勸庶邦之義可劉有方可昭宣使依舊嘉州刺史內侍省內侍押班敕朕為天下父母推一心以馭百官內外雖異愛無差等皆欲其處無過之地受有名之賞則上下相安人無間言具官劉有方少知忠恪晚益詳練砥礪亷隅有縉紳之風祗畏簡書無戲怠之色歷歲滋久積勞當遷考之有司皆曰應法往服新寵朕不汝私可宋滋可右侍禁敕宋滋疆埸之臣所以奮不顧身義不旋踵者以朕為能恤其孤也何愛一官不以慰死者之意且以為吏士之勸乎可鞠承之可秦州通判敕具官鞠承之自恢復西鄙秦為內郡宿兵之衆有損於前而逺輸之勞至相倍蓰軍政雖簡民事為重監郡之職専在養民有司擇材曰汝可使往辦乃事無忝所知可文及可衛尉少卿敕具官文及汝三公子以才行聞擢置要劇衆以為宜而師臣執謙重違其請周廬宿衛職親而務簡雖未足以究觀汝能而退食休沐下車里門浣衣子舍豈非縉紳之美談而當世之榮觀乎可李暴卿可京西轉運副使張公庠可廣東轉運副使楚潛可廣西轉運副使吳革可廣東轉運判官敕具官某朕即位以來發號施令務求厥中而寬者喜縱忘先帝之約束急者樂刻襲文吏之故態汝以才能治狀達于朕聽其往視之夫治民如牧羊然視其後者而鞭之可童圭父參年一百二歲可承務郎致仕敕童圭父參古者天子巡守方嶽之下問百年者就見之而絳縣役老趙武謫其輿尉今汝黃髮鮐背以上壽聞其可使與編戶齒乎往以忠孝教而子孫可單可度可三班借職出職敕單可度在官滋久更事亦多而無大過有足嘉者往祗寵命益務亷平可智誠知宜州敕具官智誠蠢爾裔夷譬之蜂蟻勝之不武不勝為患惟爾守臣威信兩立勝之以不戰消患於未萌則民受其賜豫惟汝嘉可張仲可左班殿直敕張仲歲之不易盜賊屢作爰設勇爵以勸追胥爾能奮身以除民害必信之賞其可忘乎可張誠一責受左武衛將軍分司南京敕具官張誠一孝治之極天下順之不子之罰民不輕犯而貴近之間尚有誠一朕甚傷之乃者姦言詖行蠧國殘民之狀論者紛然方議其罪而悖德隱惡達于朕聽考實其狀至不忍言詩不云乎行有死人尚或墐之禮曰父沒而不能讀父之書以為手澤存焉今汝之所為者何為至此極也縱朕不問汝亦何顏以處縉紳之列乎可陳侗知陜州敕朝奉大夫衛尉少卿陳侗士臨利害之際而不失故常者鮮矣以爾出入册府幾二十年安於分義不妄附麗以干進取死喪之威兄弟孔懷願為一郡以恤幼孤朕甚嘉之夫入為九卿二出為二千石此亦縉紳之髙選也汝益勉之可特授依前官知陜州傅燮知鄭州敕具官傅燮鄭廢為邑復為右輔經營繕完之勞民既告病而吏亦勤矣以爾樂易之政屢試有聞往任其事寬信以御民強敏以御吏稱朕意焉可姚居簡押木筏上京酬奬轉三班借職敕姚居簡不煩民力而辦官事會其所運罕所失亡可賈種民吕升卿知軍敕駕部員外郎賈種民吏部員外郎吕升卿天下有道士知分義流品清濁各有攸處如種民升卿亦不汝棄往服寵命益祗厥官種民可差知漢陽軍升卿可差通判海州軍州事張世矩再任鎮戎軍敕具官張世矩髙平故地夷漢雜處啓以夏政疆以戎索惟威與信並行德與法相濟則種落內附民安其生以爾習知邊情克有武略賦政之美歷年于兹夫巳信之民易治已練之兵易使無改乃舊益觀厥成可劉誼知韶州敕奉議郎劉誼汝昔為使者親見民病盡言而不諱厄窮而不悔夫豈知有今日之報乎孔子曰巧言令色鮮矣仁夫能為朕牧養逺民惠鮮鰥寡者必剛毅不回之士也往服厥官益信汝言可特授依前官權發遣韶州仍借紫吕惠卿責授建寧軍節度副使本州安置不得簽書公事敕凶人在位民不奠居司冦失刑士有異論稍正滔天之罪永為垂世之規具官吕惠卿以斗筲之才挾穿窬之智諂事宰輔同升廟堂樂禍而貪功好兵而喜殺以聚斂為仁義以法律為詩書首建青苗次行助役均輸之政自同商賈手實之禍下及雞豚苟可蠧國以害民率皆攘臂而稱首先皇帝求賢若不及從善如轉圜始以帝堯之聰姑試伯鯀終然孔子之聖不信宰豫發其宿姦謫之輔郡尚疑改過稍畀重權復陳罔上之言繼有碭山之貶反覆教戒惡心不悛躁輕矯誣德音猶在始與知已共為欺君喜則摩足以相歡怒則側目以相噬連起大獄發其私書黨與交攻幾半天下姦贓狼籍橫彼江東至於復用之年始倡西戎之隙妄出新意變亂舊章力引狂生之謀馴至永樂之禍興言及此流涕何追逮豫踐阼之初首發安邊之詔假我號令成汝詐謀不圖渙汗之文止為款賊之具迷國不道從古罕聞尚寬兩觀之誅薄示三危之竄國有常典朕不敢私可許懋知福州敕兩浙轉運副使朝請大夫許懋七閩之會其民智巧吏得其人則靡然心服不勞而治不得其人則紛然力爭雖勞不服以爾賦政東南民用不擾既久而信厥聲藹然肆余命爾長兹劇郡夫身在江海之上而職在魏闕之下民之瞻望顧不美歟可特授依前官充祕閣校理知福州兼福建路兵馬鈐轄填見闕喬執中兩浙運副張安上提刑敕具官某等夫以恤刑之道達之于主計則非聚斂之臣以牧民之意推之於恤刑則非文法之吏以爾執中奉使東南吏服其明民懷其惠以爾安上賦政毗陵寬而有制嚴而不殘是以命爾各祗厥服夫民新脫賦泉之弊以從力役之征其謹視貪吏以無害我成法可依云云宇文昌齡吏部郎祝庶刑部郎敕具官某等古之君子以人物掌選而士不濫進以經術斷獄而民無怨言嗚呼何修何飾而至此歟今吾一之以格律而不免於異議何哉昌齡以儒學進有聞于人庶以世家用能宿其業勉思古人以稱朕意可依云云江東提刑侯利建可江東轉運副使福建運判孫奕可福建路轉運副使新差權發遣鄭州傅燮可江東提刑知常州張安上可兩浙提刑朝請郎劉士彥可福建轉運判官敕具官某等朕姑罷賦泉之令復徭役之法使民出力以事其上不責其所無者冀以富之閔閔焉如農夫之望歲也而差發之際吏或緣為姦農民在官貪者動心焉若郡縣御胥吏不嚴而監司察郡縣不謹則南畝之民不困於縣官而困於胥吏其與幾何爾等以治行達于朕聽或已試之效或近臣之薦必能明識朕意以保民察吏為本謹視其亷貪仁暴勤惰明暗以詔賞罰朕亦將觀汝所為而進退焉可依云云王續知太康縣敕具官王續朕以天下為一家然畿甸之民號為根本若近者不悅四方何觀焉爾以才選往服厥事馭吏以明保民以寬無失朕命可新差通判齊州張琬可衛尉寺丞衛尉丞韓敦立可通判齊州敕具官某等朕於士大夫苟便其私而無害於公者蓋未嘗不聽矧以養親為詞而求易地固朕之所樂聞也往服厥職各祗乃事可依云云喬執中可吏部郎敕具官喬執中士知愛身則知愛君知馭民則知馭吏故端靜惠和之士施之內外無適不宜朕察汝久矣今自部使者入為天官屬無易其守以稱朕命可蘇子元可權知新州敕具官蘇子元嗚呼交趾之變蘇氏之禍十年於此矣朕念之不衰哀忘而愍存不忍以常法待汝畀之一郡以勸事君敬之哉思所以致此者可不敬歟可楊汲落待制知黃州崔台符王孝先各降一官台符知相州孝先知濮州制同敕國家臨御百年哀矜庶獄好生惡殺視民如傷六聖一心簡在上帝而市井無賴譛訴公行若廷尉治獄不苛秋官議法有守則仁聖在上姦宄自消豈有數年之間坐致萬人之禍死者不復誰任其辜具官某以患失鄙夫之心而竊乘君子之器欲與羣小共分告織之功専務巧誣以成疑似之罪試加覆視寃狀了然公議不容彈章交上聊從附下之罰少謝無辜之民服我寬恩益務循省台符改此兩句云往蒞安陽兼修馬政勉思來效毋重往愆可趙卨摩勘轉朝議大夫敕趙充國馮奉世名臣也而老於為將婁師德郭元振儒者也而樂於守邊蓋疆埸未寧則以外為重而忠義所激不擇地而安具官趙卨少以異材輔之博學虛心大對方觀朝董之文推轂西陲遂膺羊陸之寄恩威並著戎夏久安論歲月以稍遷姑從舊典收功名於不世勉及前人可趙思明知永靜軍敕具官趙思明武吏之進以守土扞城為髙選而戎壘之政以平徭決獄為餘事汝以財用往分使符知髙選之未易得而餘事之不可忽則寡過矣可鮮于侁大理卿敕具官鮮于侁儒者恥為文吏而廷尉不用仁人久矣流弊之末至於誦法而不知義附勢而不知法罔羅紛張延及無辜朕益厭之爾德惟一信道不回雖古于張何以逺過是以命爾庶幾天下復無寃民不然者朕豈以刑獄之事纍老成哉可吳處厚知漢陽軍賈種民知通利軍敕具官某等漢口黎陽控引江河久廢為邑吏民不悅比詔有司修復故壘因舊而新務適厥中平徭均賦使民宜之明致朕意以慰父老可顧臨直龍圖閣河東轉運使唐義問河北轉運副使敕具官某等復差役之法黜聚斂之吏去薄從忠務以養民而寬厚之弊或至於偷夫外臺按事以不失有罪為稱職若下有幸免之吏則必有不幸之民民困於吏則歸咎吾法朕甚憂之顧臨太原之民困於備邊使者之任匪人可乎以爾儒林之選號稱秀傑有能吏之才而不薄有長者之風而不偷其服新職以蒞一道往任其責以寬吾憂可唐義問趙魏之地被邊帶河以爾直諒之節世其家聲豈弟之心不忽民事必能深識朕意以肅吏靖民為本往任其責以寬吾憂可張問祕書監敕具官張問汝策名三朝宣力四方既有聞矣而篤老之年克已復禮稱道不亂朕聞而嘉之起之鄉閭列之朝會問國故事與民疾苦足矣不必勞以事也優遊吾東觀以為士大夫之表可范子奇將作監敕具官范子奇夫以百工之事較之一路之民為輕而自部刺史入居九卿為重爾久在外服奔走之勞按視之勤亦少休乎今宫室器用皆有常法守之勿失可以寡過往若豫工毋廢厥職可錢長卿比部郎鄧義叔水部郎敕具官某等昔漢郎官出宰百里今自監郡以上乃與其選任益重矣非獨為官求人以濟無窮之務亦將為國儲士以須不次之舉雖會計溝洫有司之一事而馭吏捍災朕將有取焉可林邵太僕丞何琬鴻臚丞敕具官某等爾向以才選出按常平之政官省而歸復使治民蓋將因能而任焉九寺之屬近在輦轂才之所宜易以聞達毋曠厥官朕不汝遺可文保雍將作監丞敕具官文保雍朕仰成元老如涉得舟待以求濟茍有以燕安之使樂從吾遊而忘其老朕無愛焉大匠之屬未足以盡汝才也而從政之餘遂及爾私並事君親豈不休哉可李南公知滄州穆珣知廬州王子韶知壽州趙揚潤州制同敕具官某等刺史秩六百石以按列郡而治行卓然乃以二千石為郡守昔以責人者今以自責則物被其惠民無間言爾等皆嘗奉使督察官吏公明之稱達于朕聽董制江淮控臨河海任亦重矣其益勉之無使風采減於平昔可髙公繪公紀並防禦使敕鄧訓之德蓋活千人叔向之功尚宥十世矧先王却敵之勳而聖母負扆之託子孫賢者休戚同之具官某篤於忠孝文以禮樂襲故家仁厚之風蹈布衣恭儉之節以爾父士林早緣肺腑逮事厚陵沒于中年爵不配德故推餘澤以及後昆抱能未施當俟可為之會臨寵而懼庶保無疆之休公繪可特授秀州公紀可特授永州李之純戶部侍郎敕保國猶保身藥石不如養氣御民猶御馬鞭箠不如輕車故興利以富民不如省事而民自富廣求而豐國不如節用而國自豐朕嘉與庶工共行此志以爾中大夫直龍圖閣知滄州李之純屢試以事號稱循良雖為有司不吝出納宜膺躐等之用庶無虛受之譏服我訓言以厭公議可穆衍可金部員外郎敕具官穆衍士能用其長以自表見者朕未嘗不試也要之必觀其始終然後能決其進退在此選者可不勉歟貨幣之入所以權輕重通有無而非以求富也往服朕訓以永終譽可孫路可陜西運判敕具官孫路關右之民困役傷財譬之七年之病而求三年之艾朕日夜以思庶幾其民勇而知方以爾出入秦雍悉其利病往行所知以稱朕意可蘇頌刑部尚書敕朕聞帝堯之世伯夷以三禮折民西漢之隆仲舒以春秋決獄是知有道之士必使無訟為功乃者法病於煩官失其守盜賊多有獄市紛然敷求迪哲之人以清流弊之末光祿大夫前吏部侍郎蘇頌溫文而毅直亮不回仲由冉求果藝有從政之美子産叔向愛直兼古人之遺遭罹閔凶亦既祥禪特詔虛位以待老成與其遂曽閔之私哀顧懷墳墓曷若蹈威綽之前軌顯揚君親佇聞嘉猷以對休命可王公儀夔州路轉運使程髙夔州路轉運判官敕具官某等役法既復民知息肩矣然在官者皆農末也三峽之民刀耕火耘與鹿豕雜居正賴良使者察其侵寃使政煩而吏貪者此等豈能逺訴乎朕以大臣薦故擢用爾若逺民無告非獨汝咎將咎薦者可不勉哉可吕由庚太常寺太祝敕具官吕由庚先皇帝有賢執法朕不及見也思其人行其言用其平生所豫者猶以為未足也而録其子嗚呼亦可以識朕意也夫詩云惟其有之是以似之汝勉之哉朕不汝忘可杜欣衛尉少卿鍾離景伯少府少監敕具官某等朕登進耆老崇德以靖民敷求雋良養材以待用非更練有素不輕用其人以爾欣久服官針善守家法以爾景伯既敏而藝有聞于時皆吾四世之良往服九卿之二益固爾守將觀厥成並可依云云辛押陀羅歸德將軍敕具官辛押陀羅天日之光下被草木雖在幽逺靡不照臨以爾嘗詣闕庭躬陳琛幣開導種落歲致梯航願自比於內臣得均被於霈澤祗服新寵益思盡忠可髙子壽可三班借職敕髙子壽程力較技國有舊章命以一官勉思自效可李肩可殿中省尚藥奉御直翰林醫官敕具官李肩醫雖一技益通妙物之神法有衆科以助好生之德故縻好爵用勸良能無忘三世之傳庶保十全之效可耿政可東頭供奉官致仕敕具官耿政肇新霈澤爰及庶工雖請老以家居亦先朝之逮事各從遷秩以寵歸休可喬執中可朝請郎尚書吏部郎中敕具官喬執中漢以郎官出宰百里今以郡守選屬列曹任人之隆於古為重有司言爾資格當遷其即正員以茂逺業可東坡全集卷一百七
