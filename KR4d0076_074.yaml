body:
  text: 東坡全集巻七十四宋蘓軾撰書九首答秦太虚書軾啓五月末舍弟來得手書勞問甚厚日欲裁謝因循至今遞中復辱教感愧益甚比日履兹初寒起居何如軾寓居粗遣但舍弟初到筠州即喪一女子而軾亦喪一老乳母悼念未衰又得鄉信堂兄中舍九月中逝去異鄉衰病觸目悽感念人命脆弱如此又承見喻中間得疾不輕且喜復健吾儕漸衰不可復作少年調度當速用道書方士之言厚自養鍊謫居無事頗窺其一二已借得本州大慶觀道堂三間冬至後當入此室四十九日乃出自非廢放安得就此太虛他日一為仕官所縻欲求四十九日閒豈可復得耶當及今為之但擇平時所謂簡要易行者日夜為之寢食之外不治他事但滿此期根本立矣此後縱復出從人事事已則心返自不能廢矣此書到日恐已不及然亦不須用冬至也寄示詩文皆超然勝絶亹亹焉來逼人矣如我輩亦不勞逼也太虚未免求禄仕方應舉求之應舉不可必竊為君謀宜多著書如所示論兵及盜賊等數篇但似此得數十首當卓然有可用之實者不須及時事也但旋作此書亦不可廢應舉此書若成聊復相示當有知君者想喻此意也公擇近過此相聚數日説太虚不離口莘老未嘗得書知未暇通問程公闢須其子履中哀詞軾本自求作今豈可食言但得罪以來不復作文字自持頗嚴若復一作則決壊藩墻今後仍復衮衮多言矣初到黄廩入既絶人口不少私甚憂之但痛自節儉日用不得過百五十毎月朔便取四千五百錢斷為三十塊掛屋梁上平旦用畫乂挑取一塊即藏去乂仍以大竹筒别貯用不盡者以待賔客此賈耘老法也度囊中尚可支一嵗有餘至時别作經畫水到渠成不湏預慮以此胸中都無一事所居對岸武昌山水佳絶有蜀人王生在邑中徃徃為風濤所隔不能即歸則王生能為殺雞炊黍至數日不厭又有潘生者作酒店樊口棹小舟徑至店下村酒亦自醇釅柑橘椑柹極多大芋長尺餘不減蜀中外縣米斗二十有水路可致羊肉如北方猪牛麞鹿如土魚蟹不論錢岐亭監酒胡定之載書萬巻隨行喜借人看黄州曹官數人皆家善庖饌喜作㑹太虛視此數事吾事豈不旣濟矣乎欲與太虛言者無窮但紙盡耳展讀至此想見掀髯一笑也子駿固吾所畏其子亦可喜曽與相見否此中有黄岡少府張舜臣者其兄堯臣皆云與太虛相熟兒子每䝉批問適㑹葬老乳母今勾當作墳未暇拜書嵗晚苦寒惟萬萬自重李端叔一書託為逹之夜中㣲被酒書不成字不罪不罪不宣軾再拜答李琮書軾啟奉别忽然半年思仰無窮近聞公有閨門之戚即欲作書奉慰旣罕遇的便又以為書未必能開釋左右徃徃更益悽悵用是稍緩今辱手敎慙負不巳竊計髙懷逺度必已超然此等情累隨手掃滅猶恐不脱若更反覆尋繹便纒繞人矣望深以明識照之軾凡百如昨愚暗少慮輒復隨縁自娱自夏至後杜門不出惡熱不可過所居又向西多勸遷居遷居非月餘不能定而熱向衰矣亦復不果如聞公以職事當湏一赴闕不知果然否承問及王天常奉職所言邊事天常父齊雄結髪與西南夷戰夷人信畏之天常㓜隨其父入夷中近嵗王中正入蜀亦令天常招撫近界諸夷夷人以其齊雄子亦信用其言向嘗與軾言瀘州事所以致甫望乞弟作過如此者皆有條理可聽然皆已徃之事雖知之無補又似言人長短故不復録呈獨論今日事勢揣量夷人情偽似有本末天常正月中與軾言播州首領楊貴遷者俗謂之楊通判最近烏蠻而梟武可用又有宋大郎者乞弟之死黨㓙猾有謀略若官中見委説楊貴遷令殺宋大郎必可得也數日前有從蜀中來者言貴遷巳殺宋大郎納其首級與銀三千兩以此推之天常之言殆不妄也天常言晏州六縣水路十二村諸夷世與乞弟為仇向者熊察訪誘殺十二村首領及近嵗韓存寳討殺羅狗姓諸夷皆有唇齒之憂貌畏而心貳去年乞弟領兵至羅介牟屯殺害兵官王宣等十二人其地去寧逺安夷寨至近渉歴諸夷族帳不少自來自去殊無留難若諸夷不心與之其勢必不能如此也今欲討乞弟必先有以懷結近界諸夷得其心腹而後可今韓存寳等諸軍既不敢與乞弟戰但翺翔於近界百餘里間多殺不作過熟戸老弱而厚以金帛遺乞弟且遣四人為質然後得乞弟遣人送一封空降書便與約誓即日班師與運司諸君皆上表稱賀上深照其實已降手詔械存寳獄中逺人無不歡快以謂雖漢光武唐太宗料敵察情於萬里之外不能過也今雖巳械存寳而後來者亦未見有精巧必勝之術但言乞弟不過有兵三千而官軍無慮三萬何徃而不克此正如千鈞車弩可以洞犀象而不可以得鼠耳今糧運止於江安縣自江安至乞弟住坐處猶湏十二三程吏士以糗餌行其勢不能過一月乞弟但能深自避匿四五十日則免矣而山谷幽險林木沮洳賊於溪谷間依叢木自蔽以藥箭射人血濡縷立死戰士數萬人知深入未為萬全而將吏不敢復稽留此間事不可不深慮天常言國之用兵正如私家之造屋凡屋若干材石之費糓米之用為錢若干布筭而定無所贏縮矣工徒入門斧斤之聲鏗然而百用毛起不可復計此慮不素定之過也既作而復聚糧既斵而復求材其費必十倍其工必不堅故王者之兵當如富人之造屋其慮周其規摹素定其取材積糧皆有方故其經營之常遲而其作之常速計日而成不愆于素費半他人而工必倍之今日之䇿可且罷諸將兵獨精選一轉運使及一瀘州知府許法外行事與二年限令經畫處置他人更不得與多出錢物茶綵於沿邊博買夷人糧米其費必減倉卒夫運之半使辨士招説十州五團晏州六縣水路十二村羅氏鬼主播州楊貴遷之類作五六頭項更畨出兵以蹂踐乞弟族帳使春不得耕秋不得穫又嘉戎瀘渝四州皆有土豪為把截將自來雇一私兵入界用銀七百兩每得一畨人頭用銀三十兩買之把截將自以為功今可召募此四州人每得二十級即與補一三班差使如不及二十級即每級官與絹三十匹出入山谷耐辛苦瘴毒見利則雲合敗則鳥獸散此本蠻夷之所長而中原之所無奈何也今若召募諸夷及四州把截將私兵使更出迭入則蠻夷之所長我反用之但能積日累月戕殺其丁壯且使終年釋耒而操兵不及二年其族帳必殺乞弟以䧏如其未也則乞朝廷差三五千人將下選兵三路入界西路自江安縣進兵先積糧於寧逺寨以十州五團等諸夷為先鋒以施黔戎瀘四州藥箭弩手繼之中路自納溪寨進兵先積糧於本寨亦以諸夷為先鋒以將下兵馬繼之三路中惟此路稍平可以用官軍東路自合江縣進兵先積糧於安溪寨亦以諸夷為先鋒以嘉戎瀘渝四州召募人繼之可以一舉而蕩滅也天常此䇿雖若不快以蕞爾小醜二年而後定然王者之兵必出於萬全不可以僥倖淮南王安有言厮輿之卒有一不備而歸者雖得越王之首臣猶竊為大漢羞之今乞弟譬猶蚤蝨也克之未足以威四夷萬一不克豈不爲卿大夫之辱也哉趙充國征先零鄧訓征羌及月支胡皆以計磨之數年乃克唐明皇欲取石堡城王忠嗣不奉詔以謂非殺二萬人不可取方唐之盛二萬人豈足道哉而賢將謀國終不肯出此者圖萬全也又漢永和中交趾反議者欲發荆揚兖豫四萬人討之獨李固以謂四州之人逺赴萬里無有還期詔書廹促必致叛亡南州瘟瘴死者必多士卒疲勞比至嶺南不復堪鬭前中郎将尹就討益州叛羌益州諺曰虜來尚可尹來殺我後以兵付刺史張喬因其将吏旬月之間破殄冦虜此發將無益州郡可任之明效也今可募蠻夷使自相攻轉輸金帛以為其資有能反間致頭首者許以封侯之賞因舉祝良為九真太守張喬為交趾刺史由此嶺外悉平今觀其説乃與天常之言若合符節但天常不學言不能起意耳天常又言烏蠻藥箭中者立死無脱理然不能及逺非三十歩内不發發無不中今與烏蠻戰當於百歩以下五六十歩以上强弓勁弩射之若稍近則短兵徑進於五七歩内相格則其長技皆廢今乞弟亦未是正烏蠻也諸如此巧便非一不能盡録略舉一二以見天常之練習疑可驅使耳又有一圖子雖不甚詳宻然大略具是矣按圖以考其説差若易了故以奉呈㸔訖可却付去人見還也此非公職事然孜孜尋訪如此以見忠臣體國知無不為之義也軾其可以罪廢不當言而止乎雖然亦不可使不知我者見以為詬病也知荆公見稱經藏文是未離妄語也便䝉印可何哉圓覺經紙示及得暇為寫下巻令公擇冩上巻秦太虚維揚勝士固知公喜之無乃亦可令荆公一見之歟子駿初見報奪一官耳不知其罷郡能不鬱鬱否有一書不知其今安在敢煩左右逹之江水比去年甚大郡中不為患見説沙湖鎮頗浸居民亦江淮間常事耳臨臯港旣開徃來䝉利無窮而居民貿易之入亦不貲但不免少有淤填議者謂嵗發少春夫淘之甚易承問輒及之未縁展奉惟冀以時自重謹奉手啟起居熱甚幸恕不謹軾頓首再拜荅陳師仲書軾頓首再拜錢塘主簿陳君足下曩在徐州得一再見及見顔長道輩皆言足下文詞卓偉志節髙亮固欲朝夕相從適㑹訟訴偶有相關及者遂不復徃來此自足下門中不幸亦豈為吏者所樂哉想彼此有以相照已而軾又負罪逺竄流離契闊益不復相聞今者䝉書敎累幅相屬之厚又甚於昔者知足下釋然果不以前事介意幸甚幸甚自得罪後雖平生厚善有不敢通問者足下獨犯衆人之所忌何哉及讀所惠詩文不數篇輒拊掌太息此自世間竒男子豈可以世俗趣舍量其心乎詩文皆竒麗所寄不齊而皆歸合於大道軾又何言者其間十常有四五見及或及舍弟何相愛之深也處世齟齬每深自嫌惡不論他人及見足下輩猶如此輒亦少自赦詩能窮人所從來尚矣而於軾特甚今足下獨不信建言詩不能窮人為之益力其詩日巳工其窮殆未可量然亦在所用而巳不龜手之藥或以封安知足下不以此逹乎人生如朝露意所樂則為之何暇計議窮達云能窮人者固繆云不能窮人者亦未免有意於畏窮也江淮間人好食河豚每與人争河豚本不殺人嘗戲之性命自子有美則食之何與我事今復以此戲足下想復千里為我一笑也先吏部詩幸得一觀輒題數字繼諸公之末見為編述超然黄樓二集為賜尤重從來不曽編次縱有一二在者得罪日皆為家人婦女輩焚毁盡矣不知今乃在足下處當為刪去其不合道理者乃可存耳軾於錢塘人有何恩意而其人至今見念軾亦一嵗率常四五夢至西湖上此殆世俗所謂前縁者在杭州嘗逰壽星院入門便悟曽到能言其院後堂殿山石處故詩中嘗有前生巳到之語足下主簿於法得出入當復縱㳺如軾在彼時也山水窮絶處徃徃有軾題字想復題其後足下所至詩但不擇古律以日月次之異日觀之便是行記有便以一二見寄慰此惘惘其餘慎疾自重不宣軾頓首再拜荅畢仲舉書軾啟奉别忽十餘年愚瞽頓仆不復自比於朋友不謂故人尚爾記録逺枉手敎存問甚厚且審比來起居佳勝感慰不可言羅山素號善地不應有瘴癘豈嵗時適爾既無所失亡而有得於齊寵辱忘得䘮者是天相子也僕既以任意直前不用長者所敎以觸罪罟然禍福要不可推避初不論巧拙也黄州濵江帶山既適耳目之好而生事百須亦不難致早寢晩起又不知所謂禍福果安在哉偶讀戰國䇿見處士顔蠋之語晩食以當肉欣然而笑若蠋者可謂巧於居貧者也菜羮菽黍差饑而食其味與八珍等而旣飽之餘芻豢滿前惟恐其不持去也美惡在我何與於物所云讀佛書及合藥救人二事以為閒居之賜甚厚佛書舊亦嘗看但闇塞不能通其妙獨時取其粗淺假説以自洗濯若農夫之去草旋去旋生雖若無益然終愈於不去也若世之君子所謂超然𤣥悟者僕不識也徃時陳述古好論禪自以為至矣而鄙僕所言為淺陋僕嘗語述古公之所談譬之飲食龍肉也而僕之所學猪肉也猪之與龍則有間矣然公終日説龍肉不如僕之食猪肉實美而真飽也不知君所得於佛書者果何耶為出生死超三乘遂作佛乎抑尚與僕輩俯仰也學佛老者本期於静而逹静似懶逹似放學者或未至其所期而先得其所似不為無害僕常以此自疑故亦以為獻來書云處世得安穏無病粗衣飽飯不造寃業乃為至足三復斯言感歎無窮世人所作舉足動念無非是業不必刑殺無罪取非其有然後為寃業也無縁面論以當一笑而已與朱鄂州書軾啟近逓中奉書必逹比日春寒起居何似昨日武昌寄居王殿直天麟見過偶説一事聞之酸辛為食不下念非吾康叔之賢莫足告語故專遣此人俗人區區了眼前事救過不暇豈有餘力及此度外事乎天麟言岳鄂間田野小人例只養二男一女過此輒殺之尤諱養女以故民間少女多鰥夫初生輒以冷水浸殺其父母亦不忍率常閉目背面以手按之水盆中咿嚶良乆乃死有神山鄉百姓石揆者連殺兩子去嵗夏中其妻一産四子楚毒不可堪忍母子皆斃報應如此而愚人不知創艾天麟毎聞其側近有此輒馳救之量與衣服飲食全活者非一既旬日有無子息人欲乞其子者輒亦不肯以此知其父子之愛天性故在特牽於習俗耳聞鄂人有秦光亨者今巳及第為安州司法方其在母也其舅陳遵夢一小兒挽其衣若有所訴比兩夕輒見之其狀甚急遵獨念其姊有娠將産而意不樂多子豈其應是乎馳徃省之則兒巳在水盆中矣救之得免鄂人戸知之凖律故殺子孫徒二年此長吏所得按舉願公明以告諸邑令佐使召諸保正告以法律諭以禍福約以必行使歸轉以相語仍録條粉壁曉示且立賞召人告官賞錢以犯人及隣保家財充若客户則及其地主婦人懷孕經渉嵗月隣保地主無不知者若後殺之其勢足相舉覺容而不告使出賞固宜若依律行遣數人此風便革公更使令佐各以至意誘諭地主豪户若實貧甚不能舉子者薄有以賙之人非木石亦必樂從但得初生數日不殺後雖勸之使殺亦不肯矣自今以徃縁公而得活者豈可勝計哉佛言殺生之罪以殺胎卵為最重六畜猶爾而况於人俗謂小兒病為無辜此真可謂無辜矣悼耄殺人猶不死况無罪而殺之乎公能生之於萬死中其隂徳十倍於雪活壯夫也昔王濬為巴郡太守巴人生子皆不舉濬嚴其科條寛其徭役所活數千人及後伐吳所活者皆堪為兵其父母戒之曰王府君生汝汝必死之古之循吏如此類者非一居今之世而有古循吏之風者非公而誰此事特未知耳軾向在宻州遇饑年民多棄子因盤量勸誘米得出剰數百石别儲之專以收養棄兒月給六斗比朞年養者與兒皆有父母之愛遂不失所所活亦數十人此等事在公如反手耳恃深契故不自外不罪不罪此外惟為民自重不宣軾再頓首荅李昭玘書軾啟向得王子中兄弟書具道足下毎相見語輒見及意相予甚厚即欲作書以道區區又念方以罪垢廢放平生不相識而相向如此此人必有以不肖欺左右者軾所以得罪正坐名過實耳年大以來平日所好惡憂畏皆衰矣獨畏過實之名如畏虎也以此未敢相聞今獲來書累幅首尾句句皆所畏者謹再拜辭避不敢當然少年好文字雖自不能工喜誦他人之工者今雖老餘習尚在得所示書反復不知厭所稱道雖不然然觀其筆勢俯仰亦足以粗得足下為人之一二也幸甚幸甚比日履茲春和起居何似軾䝉庇粗遣毎念處世窮困所向輒值墻谷無一遂者獨於文人勝士多獲所欲如黃庭堅魯直晁補之無咎秦觀太虚張來文潛之流皆世未之知而軾獨先知之今足下又不見鄙欲相從㳺豈造物者專欲以此樂見厚也耶然此數子者挾其有餘之資而騖於無涯之知必極其所如徃而後已則亦將安所歸宿哉惟明者念有以反之魯直旣䘮妻絶嗜好蔬食飲水此最勇决舍弟子由亦云學道三十餘年今始粗聞道考其言行則信與昔者有間矣獨軾倀倀焉未有所得也徐守莘老毎有書來亦以此見敎想時相從有以發明王子中兄弟得相依甚幸子敏雖失解乃得乆處左右想遂磨琢成其妙質也徐州城外有王陵母劉子政二墳向欲為作祠堂竟不暇此為遺恨近以告莘老不知有意作否若果作當有記文莘老若不自作者足下當為作也無由面言臨書惘惘惟順時自愛謹奉手啟為謝不宣軾再拜荅李廌書軾頓首先輩李君足下别後逓中得二書皆未果荅專人來又辱長箋且審比日孝履無恙感慰深矣惠示古賦近詩詞氣卓越意趣不凡甚可喜也但㣲傷冗後當稍收歛之今未可也足下之文正如川之方増當極其所至霜降水落自見涯涘然不可不知也録示孫之翰唐論僕不識之翰今見此書凛然得其為人至論褚遂良不譛劉洎太子瑛之廢縁張説張巡之敗縁房琯李光弼不當圖史思明宣宗有小善而無人君大略皆舊史所不及議論英發暗與人意合者甚多又讀歐陽文忠公志文司馬君實跋尾益復慨然然足下欲僕别書此文入石以為之翰不朽之託何也之翰所立於世者雖無歐陽公之文可也而况欲託字畫之工以求信於後世不以陋乎足下相待甚厚而見譽過當非所以為厚也近日士大夫皆有僣侈無涯之心動輒欲人以周孔譽巳自孟軻以下者皆憮然不滿也此風殆不可長又僕細思所以得患禍者皆由名過其實造物者所不能堪與無功而受千鍾者其罪均也深不願人造作言語務相粉飾以益其疾足下所與㳺者元聿讀其詩知其為超然竒逸人也縁足下以得元君為賜大矣唐論文字不少過煩諸君寫録又以見足下所與㳺者皆好學喜事甚善甚善獨所謂未得名世之士為志文則未葬者恐於禮未安司徒文子問於子思䘮服既除然後葬其服何服子思曰三年之䘮未葬服不變除何有焉昔晉温嶠以未葬不得調古之君子有故不得巳而未葬則服不變官不調今足下未葬豈有不得巳之事乎他日有名世者既𦵏而表其墓何患焉辱見厚不敢不盡冬寒惟節哀自重荅張文潛書軾頓首文潜縣丞張君足下乆别思仰到京公私紛然未暇奉書忽辱手敎且審起居佳勝至慰至慰惠示文編三復感歎甚矣君之似子由也子由之文實勝僕而世俗不知乃以為不如其為人深不願人知之其文如其為人故汪洋澹泊有一唱三歎之聲而其秀傑之氣終不可没作黃樓賦乃稍自振厲若欲以警發憒憒者而或者便謂僕代作此尤可笑是殆見吾善者機也文字之衰未有如今日者也其源實出於王氏王氏之文未必不善也而患在於好使人同已自孔子不能使人同顔淵之仁子路之勇不能以相移而王氏欲以其學同天下地之美者同於生物不同於所生惟荒瘠斥鹵之地彌望皆黃茅白葦此則王氏之同也近見章子厚言先帝晩年甚患文字之陋欲稍變取士法特未暇耳議者欲稍復詩賦立春秋學官甚美僕老矣使後生猶得見古人之大全者正賴黄魯直秦少㳺晁無咎陳履常與君等數人耳如聞君作太學博士願益勉之德輶如毛民鮮克舉之我儀圖之愛莫助之此外千萬善愛偶飲卯酒醉來人求書不能覼縷答毛滂書軾啟比日酷暑不審起居何如頃承示長牋及詩文一軸日欲裁謝因循至今悚息今時為文者至多可喜者亦衆然求如足下閒暇自得清美可口者實少也敬佩厚賜不敢獨饗當出之知者世間唯名實不可欺文章如金玉各有定價先後進相汲引因其言以信於世則有之矣至其品目髙下蓋付之衆口决非一夫所能抑揚軾於黄魯直張文潛輩數子特先識之耳始誦其文蓋疑信者相半乆乃自定翕然稱之軾豈能為之輕重哉非獨軾如此雖向之前輩亦不過如此也而况外物之進退此在造物者非軾事辱見貺之重不敢不盡承不乆出都尚得一見否東坡全集巻七十四
