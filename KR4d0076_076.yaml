body:
  text: 東坡全集卷七十六宋蘇軾撰書十六首與李方叔書軾頓首方叔先輩足下屢獲來教因循不一裁答悚息不已比日履兹秋暑起居佳勝録示子駿行狀及數詩辭意整暇有加於前得之極喜慰纍書見責以不相薦引讀之甚愧然其說不可不盡君子之知人務相勉於道不務相引於利也足下之文過人處不少如李氏墓表及子駿行狀之類筆勢翩翩有可以追古作者之道至若前所示兵鑑則讀之終篇莫知所謂意者足下未甚有得於中而張其外者不然則老病昏惑不識其趣也以此私意猶兾足下積學不倦落其華而成其實深願足下為禮義君子不願足下豐於才而亷於德也若進退之際不甚慎靜則於定命不能有毫髮增益而於道德有丘山之損矣古之君子貴賤相因先後相援固多矣軾非敢廢此道平生相知心所謂賢者則於稠人中譽之或因其言以考其實實至則名隨之名不可掩其自為世用理勢固然非力致也陳履常居都下逾年未嘗一至貴人之門章子厚欲一見終不可得中丞傅欽之侍郎孫莘老薦之軾亦掛名其間㑹朝廷多知履常者故得一官軾孤立言輕未嘗獨薦人也爵祿砥世人主所専宰相猶不敢必而欲責於軾可乎東漢處士私相諡非古也殆似丘明為素臣當得罪於孔門矣孟生貞曜蓋亦蹈襲流弊不足法而况近相名字乎甚不願足下此等也軾於足下非愛之深期之逺定不及此猶能察其意否近秦少游有書來亦論足下近文益奇明主求人如不及豈有終汩沒之理足下但信道自守當不求自至若不深自重恐喪失所有言切而盡臨紙悚息未即㑹見千萬保愛近夜眼昏不一不一軾頓首上知府王龍圖書執事自軒車之來曽未期月蜀之士大夫舉欣欣然相慶以為近之所無有下至閭巷小民雖不足以識知君子之用心亦能歡欣踴躍轉相告語喧譁紛紜洋溢布出而不可掩雖户給之粟帛而人賜之爵其喜樂不如是之甚也伏惟明公何術以致此哉軾也安足以議雖然請得以僣言之蓋明公之於蜀人所以深結其心而納之安居無事以養生送死者有所甚易而亦有所至難夫海濱之人輕游於江河何則其所見者大也昔先魏公宰天下十有八年聞其言語而被其教誨者皆足以為賢人而况於公乎度其視區區之一方不啻户庭之小且公為定州內以養民殖財而外震威武以待不臣之胡為之三年而四方稱之况於實非有難辦之事是以公至之日不勞而自成也此其所以為易者一也自近嵗以來蜀人不知有勤恤之加擢筋割骨以奉其上而不免於刑罰有田者不敢望以為飽有財者不敢望以為富惴惴焉恐死之無所然皆聞見所熟以為當然不知天下復有仁人君子也自公始至釋其重荷而出之於陷穽之中方其困急時簞瓢之饋愈於千金是故莫不歡欣鼓舞之至此其所以為易者二也雖然亦有所至難何者國家蓄兵以衛民而賦民以養兵此二者不可以有所厚薄也然而薄於養兵者其患近而易除厚於賦民者其憂逺而難救故夫庚子之小變起於兵離而甲午之大亂出於民怨由此觀之固有本末也而為政者徒知畏其易除之近患而不知畏其難救之逺憂而有志於民者則或因以生事非當世大賢孰能使之兩存而皆濟此其所以為難者一也蜀人之為怯自昔而然矣民有抑鬱至此而不能以告者且天下未嘗無貪暴之吏惟幸其上之明而可以訴是以猶有所恃今民怯而不敢訴其訴者又不見省幸而獲省者指目以為凶民隂中其禍嗟夫明天子在上方伯連帥之職執民之權而不能為之地哉夫惟天下之賢者則民望之深而責之備若夫庸人誰復求之自頃數公其來也莫不有譽其去也莫不有毁夫豈其民望之深責之備而所以塞之者未至耶今之饑者待公而食寒者待公而衣凡民之失其所者待公而安傾耳聳聽願聞盛德日新而不替此其所以為難者二也伏惟明公以髙世之才何施而不可惟無忽其所以為易而深思其所難者而稍加意焉將天下被其澤而何蜀之足云軾負罪居喪不敢輒至貴人之門妄有所稱述誠不勝惓惓之心敢以告諸左右舊所為文十五篇政事之餘憑几一笑亦或有可觀耳與葉進叔書進叔足下僕狷介寡合之人也足下望其貌而壯其氣聆其語而知其心握手見情素交論古今歡然若將與之忘年焉僕不自知何為而得此於足下也前日南歸草草不能道一辭到家秋氣巳髙窗户蕭然思與足下談笑之樂恍乎若相從於夢中既覺而不知卧於虛榻也行日嘗辱贈言意勤辭直讀之使人惻惻動心足下之所以知僕心者至矣所以責善於朋友者亦至矣而又凡所以為至之中有所不至者僕得以盡之焉僕聞有自知之明者乃所以知人有自達之聰者乃所以達物自知矣可以無疑矣而徇人則疑於人自達矣可以無蔽矣而徇物則蔽於物今足下自知自達而無可疑可蔽矣豈僕所以得人與物之說耶至以謂僕之交不能把臂服膺以示無間凡此者非疑非蔽也乃僕所以為狷介寡合者足下顧不亮乎夫投規於矩雖公輸不能使之合何則方圓者殊也雜宫以羽雖師曠不能使之一何則緩急者異也對辨以訥遇剛以柔雖君子不能以無爭何則所性所操之不同也足下聰明過人無世事不通獨不知物理之有參差者乎昔張籍遺韓愈之書責愈以商論文字不能下氣夫以退之而未免矧其下者乎雖然亦思而改之耳恐足下未審此聊復以書答范景山書自離東武不復拜書疏怠之罪宜獲譴於左右矣兩辱手教存撫愈厚感愧不可言即日起居佳勝知局事勞冗殊甚景山雖去軒冕避津要所欲閒耳而不可得乃知吾道艱難之際仁人君子拾衆人所棄猶不可得然憂喜勞逸無非命者出辦此身與之浮沉則亦安往而不適也軾始到彭城幸甚無事而河水一至遂有為魚之憂近日雖巳减耗而來嵗之患方未可知法令周密公私匱乏舉動尤難直俟逐去耳久不聞餘論頑鄙無所鐫發恐遂汩沒於流俗矣子由在南都亦多苦事近詩一軸拜呈冗迫無佳意思但堪供笑耳近齊居內觀於生術似有所得子由尤為造入景山有異書祕訣倘可見教乎餘非面莫盡惟乞萬萬自重答參寥書去嵗倉卒離湖亦以不一别太虛參寥為恨留語於僧官不識能道否到黃巳半年朋遊常少思念公不去心懶且無便故不奏書逺承差人致問殷勤纍幅所以開諭奬勉者至矣僕罪大責輕謫居以來杜門念舊而巳雖平生親識亦斷往還理固宜爾而釋老數公反復千里致問情義之厚有加於平日以此知道德高風果在世外也見寄數詩及近編詩集詳味灑然如接清顔聽軟語也比巳焚筆硯斷作詩故無緣屬和然時復一開以慰孤寂幸甚筆力愈老健清熟過於向之所見此於至道殊不相妨何為廢之邪更當磨揉以追配彭澤未間自愛答李康年書向承寵訪教語甚厚因循未及裁謝復枉專使辱書纍幅意愈勤重且獲所著通言三篇及新詩碑刻廢學之人徒知愛其文之工妙而不能究極其意之所至欽味反覆不能釋手幸甚幸甚比日起居何如竊想著書講道馳騁百氏而游於藝學有以自娛忘其窮約也通言略獲披味所發明者多矣謹且借留得為究觀他書豈敢輒留他日别為小字寫草書見惠不必心經乃大賜也要跋尾謾寫數字不稱妙筆答舒堯文書軾啓午睡昏昏使者及門授教及詩振衣起觀頓爾醒快若清風之來得當之也大抵詞律莊重叙事精緻要非囂浮之作昔先零侵漢西疆而趙充國請行吐谷渾不貢於唐而文皇臨朝歎息思起李靖為將乃知老將自不同也晉師一勝城濮則屹然而霸雖齊陳大國莫不服焉今日魯直之於詩是巳公自於彼乞盟可也奈何欲為兩屬之國則犧牲玉帛焉得而給諸不敢當即承來命少資嗢􅛐答陸道士書軾啓别來嵗月乃爾許也涉世不巳再罹憂患但知自哂耳感君不遺手書殷勤如此且審道體安休喜慰之極惠州凡百不惡杜門養痾所念君棄家求道二十餘年不見異人當得異書見許今春相訪果然能踐言何喜如之舊過廬山見蜀道士馬希言似有所知今為何在曽與之言否黃君髙人與世相忘者如軾與舍弟何足以致若得一見子由礱錯其所未至則軾可以受賜願因足下致懇當可得否韓朴主事多從傅同年遊近傅得漢東漕幕遂帶得來此否因見亦道意羅浮有一鄧道士名守安専靜有守皆世外良友世外之道金丹為上儀鄰次之服食草木又次之胎息三住為本殆無出此者嵇中散曰守之以一養之以和和理日濟同乎大順然後承以靈芝潤以醴泉晞以朝陽綏以五絃不用其他舉以中散為師矣適飲桂酒一杯醺然徑醉作書奉答真不勒字數矣桂酒乃仙方也釀桂而成盎然玉色非人間物也足下端為此酒一來有何不可但恐足下拘戒籙不飲道家少飲和神非破戒也餘惟善愛答孫志康書自春末聞訃悲愕不巳自惟不肖得交公父子間有年矣即欲奉疏少道哀誠不獨海上無便又聞志康從西路迎護莫知往還的耗故因循至今遂辱専使手書纍幅愧荷深矣竊承巳畢大事營辦勤苦何以堪任即日孝履支持預慰所望志文實録讀之感噎自聞變故即欲撰哀辭以表契義萬一不知爵里之詳今復覩此文旦夕當下筆然不願傳出雖志康亦不以相示藏之家笥須不肖啓手足日乃出之也自惟無狀百無所益於故舊惟文字庶幾不與草木同腐故决意為之然决不敢相示也志康必識此意千萬勿來索看也師是此文甚奇斯人亦可人也哉軾謫居巳逾年諸况粗遣禍福苦樂念念遷逝無足留胸中者又自省罪戾久積理應如此實甘受之今者北歸無日因遂自謂惠人漸作久居計正使終焉亦何所不可志康聞此言可以不深念也玳瑁藥合見遺乃吾介夫遺意謹炷香拜受志康所惠布蜜藥果等一一捧領感怍無量海上窮陋又謫居貧病乃無少物報謝慙負無量見戒勿輕與人詩文謹佩至言如見報出都日所聞虛實不可不知勿以告人也舍弟筠州甚安時得書兒姪輩或在陳或在許下兩兒子在宜興軾與幼子過在兹明年長子邁當挈他一房來此指射差遣因般過房下來見愛之深恐要知其詳示諭開嵗來此相聚雖為厚幸然竄逐中唯欲親故謝絶為孤寂可憐者則孤老猶可以粗安若志康人所指目者而乃不逺千里相求此重增軾罪戾也千萬寢之切告切告李泰伯前輩不相交往然敬愛其人欲作集引亦終不傳出也承諭世膺可為聚其前後文集異日示及當與志康商議少加刪定乃傳世也斯人既無後吾輩當與留意李文叔書巳領諸兒子為學頗長逮自宜興寄詩文來甚可觀此等辱雅遊最舊故輒以奉聞然不敢令拜狀無益徒煩報答也㑹見無期千萬節哀自重上執政乞度牒賑濟因修廨宇書軾頓首上書門下僕射相公閣下去年浙中冬雷發洪太湖水溢春又積雨蘇湖常秀皆水民就高田秧稻以待水退及五六月稍稍分種十不及四五而又繼之以旱以故早晚皆傷高下竝損自元豐以來民之艱食未有如今嵗者也軾巳三奏其事至今未報蓋人微言輕理自當爾然亦恐監司諸郡不盡以實奏而廟堂所訪問往來之人或揣所樂聞不盡以實告故朝廷以軾言為過耳不然豈有仁聖在上羣賢並用而肯恬不為意乎入冬以來緣諸郡閉糴而稅務用例違條收五穀力勝錢故米價斗至八九十衢睦等州至百餘錢皆足錢炎炎可畏軾用印板出榜千餘道止絶此兩事自半月來米穀通流價亦稍平然浙中無麥青黃之交當在來秋而熟不熟又未可知民懲熙寧流殍之禍上户有米者皆靳惜不肯出其勢非大出官米不能救此患自正月至七月本州裏外九縣日糶官米千五百石乃可以平價救饑計當用米三十一萬五千石今本州常平除兑充軍糧外止有十七萬石漕司許於鄰郡致三萬石尚少十一萬五千石計窮理迫須至控告軾近以本州廨宇弊壞奏乞度牒二百道修完未蒙開允意欲以此度牒募人於諸縣納米度可得二萬五千石然後减價出賣每斗六十度可得錢萬五千貫且以此錢修完廨宇雖不及元計錢數且修完緊要處亦粗可足用則是此度牒一出而兩利也伏望相公深念本州廨宇弊壞已甚不可不修及今完葺所費尚少後日大壞其費必倍又因以募人納米出糶救饑設使不因修完廨宇朝廷以饑民之故特出聖恩乞與二百道度牒猶不為過而况救饑修屋兩用而並濟乎軾愚蠢少慮仰恃廟堂諸公仁賢恤民必不忍拒此請意此度牒可以必得以此不候回降指揮輒巳一面告喻商旅令儲峙米斛具水陸腳乘以須度牒之至深望果斷不疑於一兩日內降付急遞日與吏民延頸企踵雖大旱望雲執熱思濯未喻其急也若不蒙哀察則是使軾失信商旅坐視流殍其為慙惶狼狽未易遽言至時朝廷雖加誅殛何補於事兼軾近者奏為本路轉運司今年合起年額米斛百六十萬乞特許且起一半或三分之二其餘候豐熟日隨年額起發未蒙恩許今年漕司窘迫實倍常嵗異時預買紬絹錢常於嵗前散絶今尚闕太半剗刷之急蓋不遺餘力矣若非朝廷少加矜察則督迫之極害必及民近蒙朝廷許輟上供二十萬石出糶此大惠也然望更輟留三十萬石若無米可糶秪乞以此錢收買銀絹上供雖無補於饑民而散幣在民少解錢荒之患亦良䇿也此外秪有勸誘富民出穀助官賑貸及用常平錢米募民工役二事然皆難行勸誘之利未及貧民而誅求之禍先及上户浙中富民缺官錢者十人而九决無可勸誘之理至於募民工役亦非實惠若散募饑貧不堪工役鳥獸聚散得錢便走熙寧中嘗行此事名為召募其實不免於等第上差科官支錢米盡入役夫而本户又須貼錢雇人凶年人户重有此擾皆虛名無實利少害多惟有多糶官米一事簡而易行米價既低民無貧富均享其利惟望相公留意則一路幸甚軾拙於言語不能盡寫憂危之狀以曉左右惟有發書之日西向再拜扣頭默禱庶幾區區丹誠可以感動萬一也不宣上吕僕射論浙西災傷書軾頓首上書門下僕射相公閣下軾近上章論浙西淫雨颶風之災伏蒙恩㫖使與監司諸人議所以為來嵗之備者謹巳條上二事軾才術淺短禦災無䇿但知呌號朝廷乞寬减額米截賜上供言狂計拙死罪死罪然三吳風俗自古浮薄而錢塘為甚雖室宇華好被服粲然而家無宿舂之儲者蓋十室而九自經熙寧饑疫之災與新法聚斂之害平時富民殘破略盡家家有市易之缺人人有鹽酒之債田宅在官房廊傾倒商賈不行市井蕭然譬如衰羸久病之人平時僅自支持更遭風寒暑濕之變便自委頓仁人君子當意外將護未可以壯夫常理期也今年錢塘賣常平米十八萬石得米者皆叩頭誦佛云官家將十八萬石米於烏鳶狐狸口中奪出數十萬人此恩不可忘也夫以區區戰國公子尚知焚券市義今以十八萬石米易錢九萬九千緡而能活數十萬人此豈下䇿也哉竊惟仁聖在上輔以賢哲一聞此言理無不行但恐世俗諂薄成風揣所樂聞與所忌諱不以仁人君子期左右爭言無災或言有災而不甚積衆口之驗以惑聰明此軾之所私憂過慮也八月之末秀州數千人訴風災吏以為法有訴水旱而無訴風災拒閉不納老幼相騰踐死者十一人方按其事由此言之吏不喜言災者蓋十人而九不可不察也軾既條上二事且以關白漕憲兩司官吏皆來見軾曰此固當今之至計也然恐朝廷疑公為漕司地奈何軾曰吾為數十萬人性命言也豈恤此小小悔吝哉去年秋冬諸郡閉糶商賈不行軾既劾奏通之又舉行災傷法約束本路不得收五穀力勝錢三郡米大至施及浙東而漕司官吏緣此愠怒幾不見容文符往來僚吏恐悚以軾之私意其不為漕司地也審矣力勝之免去嵗已有成法然今嵗未敢舉行者實恐再忤漕司怨咎愈深此則軾之疲懦畏人不免小有回屈之罪也伏望相公一言檢舉成法自朝廷行下使五穀通流公私皆濟上以明君相之恩下以安孤危之迹不勝幸甚去嵗朝㫖免力勝錢止於四月浙中無麥須七月初間見新穀故自五月以來米價復增軾亦曽奏乞展限至六月終不報今者若蒙施行則乞以六月為限去嵗恩㫖寬减上供額米三分之一而户部必欲得見錢浙中遂有錢荒之憂軾奏乞以錢和買銀絹上供三請而後可今者若蒙施行即乞一時行下軾竊度事勢若不且用愚計來嵗恐有流殍盜賊之憂或以其狂淺過計事難施用即乞别除一小郡仍選才術有餘可以坐消災沴者使任一路之責幸甚幸甚干冒台重伏紙栗戰不宣揚州上吕相書軾再拜伏䝉手書見謂勇於為義不當在外奬飾過分悚息之至軾竊謂士在用不用不在內外也自揣所宜在外不惟身安耳靜至於束吏養民亦粗似所便又不自量每有所建請蒙相公主張施行使軾常在外為朝廷採托四方利病而相公擇其可行者行之豈非學道者平生之至願也哉頃者所論積缺蒙示諭巳有定議此殆一洗天下瘡痏也近復建言綱運折缺利害乞申明編敕嚴賜約束行下而罷真楊楚泗轉般倉斗子倉法必以關覽此事若行不過嵗失淮南商稅萬緡而數年之後所得必却過之但綱梢飽暖餽運辦集必無三十萬石之缺而能使六路運卒保完背頰使臣人員千百人保完身計此豈小事乎其餘綱運弊害小小枝葉亦不住講求續上其事又軾自入淮南界聞二三年來諸郡稅務刻急日甚行路咨怨商賈幾於不行有稅物者既無脫遺其無稅物及雖有不多者皆不與㸃檢但多喝稅錢商旅不肯認納則苛留十日半月人船既衆資用坐竭則所喝唯命州郡轉運司皆力主此輩無所告訴竊聞東南物貨全不通行京師坐致枯涸若不及相公在位救解此患恐遂滋長至於不可救矣祗如揚州稅額已增不虧而數小吏為虐不巳原其情蓋為有條許酒稅監官分請增剩賞錢此元豐中一小人建議羞汚士風莫此為甚如酒務行此法雖士人所恥猶無大害若稅務行之則既增之外刻剝不巳行路被其虐矣軾旦夕欲上此奏乞罷之亦望相公留念軾巳買田陽羡歸計已成紛紛多言深可憫笑但貪及相公在位求治繩墨之外故時效區區庶小有益於世耳不宣答䖍倅俞括奉議書軾頓首資深使君閣下前日辱訪寵示長箋及詩文一編伏讀數日廢卷拊掌有起豫之歎孔子曰辭達而巳矣物固有是理患不知知之患不能達之於口與手所謂文者能達是而巳文人之盛莫如近世然私所敬慕者獨陸宣公一人家有公奏議善本頃侍講讀嘗繕寫進御區區之忠自謂庶幾於孟軻之敬王且欲推此學於天下使家藏此方人挾此藥以待世之病者豈非仁人君子之至情也哉今觀所示議論自東漢以下十篇皆欲酌古以馭今有意於濟世之用而不志於耳目之觀美此正平生所望於朋友與凡學道之君子也然去嵗在都下見一醫工頗藝而窮慨然謂僕曰人所以服藥端為病耳若欲以適口則莫如芻豢何以藥為今孫氏劉氏皆以藥顯孫氏期於治病不擇甘苦而劉氏専務適口病者宜安所去取而劉氏富倍孫氏此何理也使君斯文未必售於世然售不售豈吾儕所當挂口哉聊以發一笑耳進宣公奏議有一表輒録呈不須示人也餘俟面謝不宣答吳秀才書軾啓逺辱專人惠教具審比來起居佳勝感慰之至與子野先生游幾二十年矣始以李六丈待制師中之言知其為人李公人豪也於世少所屈伏獨與子野書云白雲在天引領何及而子野一見僕便諭出世間法以長生不死為餘事而以練氣服藥為土苴也僕雖未能行然喜誦其言嘗作論養生一篇為子野出也近者南遷過真楊間見子野無一語及得喪休戚事獨謂僕曰邯鄲之夢猶足以破妄而歸真子今目見而身履之亦可以少悟矣夫南方雖號為瘴癘地然死生有命初不由南北也且許過我而歸自到此日夜望之忽得來教乃知子野尚在北不逺當來赴約也長書稱道過實讀之赧然所論孟楊申韓諸子皆有理詞氣翛然又以喜子野之有佳子弟也然昆仲以子野之故雖未識面懸相喜者則附遞一書足矣何至使人繭足逺來又致酒麵海物荔子等僕豈以口腹之故千里勞人哉感愧厚意無以云諭過廣州買得檀香數斤定居之後杜門燒香閉目清坐深念五十九年之非耳今分一半非以為往復之禮但欲昆仲知僕汛掃身心澡瀹神氣兀然灰槁之大略也有書與子野更督其南歸相過少留為僕印可其巳得而訶䇿其所未至也此外萬萬自愛答劉沔都曹書軾頓首都曹劉君足下蒙示書教及編録拙詩文二十卷軾平生以言語文字見知於世亦以此取疾於人得失相補不如不作之安也以此常欲焚棄筆硯為瘖默人而習氣宿業未能盡去亦謂隨手雲散鳥沒矣不知足下默隨其後掇拾編綴略無遺者覽之慙汗可為多言之戒然世之蓄軾詩文者多矣率真僞相半又多為俗子所改竄讀之使人不平然亦不足怪識真者少蓋從古所病梁蕭統集文選世以為工以軾觀之拙於文而陋於識者莫統若也宋玉賦高唐神女其初略陳所夢之因如子虛亡是公相與問答皆賦矣而統謂之敘此與兒童之見何異李陵蘇武贈别長安而詩有江漢之語及陵與武書詞句儇淺正齊梁間小兒所擬作决非西漢文而統不悟劉子𤣥獨知之范曄作蔡琰傳載其二詩亦非是董卓已死琰乃流落方卓之亂伯喈尚無恙也而其詩乃云以卓亂故流入於胡此豈真琰語哉其筆勢乃效建安七子者非東漢詩也李太白韓退之白樂天詩文皆為庸俗所亂可為太息今足下所示二十卷無一篇僞者又少謬誤及所示書詞清婉雅奧有作者風氣知足下致力於斯文久矣軾窮困本坐文字蓋願刳形去智而不可得者然幼子過文益竒在海外孤寂無聊過時出一篇見娛則為數日喜寢食有味以此知文章如金玉珠貝未易鄙棄也見足下詞學如此又喜吾同年兄龍圖公之有後也故勉作報書匆匆不宣答王庠書别紙纍幅過當老病廢忘豈堪英俊如此責望也少年應科目時記録名數沿革及題目等大略與近嵗應舉者同爾亦有節目文字才塵沗後便被舉主取去今日皆無有然亦無用也實無捷徑必得之術但如君高材强力積學數年自有可得之道而其實皆命但卑意欲少年為學者每讀書皆作數過盡之書富如入海百貨皆有之人之精力不能兼收盡取但得其所欲求者耳故願學者每次作一意求之如欲求古人興亡治亂聖賢作用但作此意求之勿生餘念又别作一次求事迹故實典章文物之類亦如之他皆倣此此雖迂鈍而他日學成八面受敵與涉獵者不可同日而語也甚非速化之術可笑可笑東坡全集卷七十六
