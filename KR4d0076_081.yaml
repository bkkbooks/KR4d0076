body:
  text: 東坡全集卷八十一宋蘇軾撰尺牘八十六首與楊元素八首黃州近兩辱手教以多病不即裁謝愧悚殊深比日仰惟履兹溽暑台候清勝某病後百事灰心無復世樂然內外廓然皆獲輕安何時瞻奉略道所以然者未間伏惟為時自重又涉暑疲倦書問稍缺愧仰無量比日起居勝常近領手誨承小疾盡去體力加健此大慶也更望倍加保嗇側聽嚴召以慰輿論又承令弟見訪岸下無泊處又苦風雨匆匆别去至今不足示論田事方憂見罪乃蒙留念如此感幸不可言某都不知彼中事但公意所可無不便者軍屯之東三百石者便為下狀甚佳李教授之兄又云官務相近有一莊大佳此彭寺丞見報亦間與問看今日章質夫之子過此已託於舟中載二百千省上納到乞與留下果蒙公見念令有歸老之資異日公為蒼生復起當却為公葺治田園以報今日之賜也適新舊守到發冗甚不一一又示諭秀才唐君許為留念兼令幹人久逺幹之幸甚幸甚某未能去此間更無人可以往幹必須至奉煩唐君也未嘗相識便蒙開許必以元素之故也深欲作書為謝適冗甚非久别附問且乞道區區天覺彭寺丞皆蒙書示亦未及奉啓乞致下懇又遞中領手教伏審台候勝常為慰某凡百如舊近又大霈庶得歸農乎公決起典郡無疑也近嘉州魏秀才兄弟行附手問不審得達否嵗行盡伏冀順時為人自重又筆凍寫不成字不罪不罪舍弟近得書無恙不知相去幾里但遞中書須半月乃至也竒方承録示感戴不可言固當珍祕也近一相識録得公明所編本事曲子足廣竒聞以為間居之鼓吹也然竊謂宜更廣之但囑知識間令各記所聞即所載日益廣矣輒獻三事更乞㨂擇傳到百四十許曲不知傳得足否又近於城中葺一荒園手種菜果以自娛陳季常者近在州界百四十里住時復來往伯誠親弟近問之云不曽參拜其人甚竒偉得其一詞以助本事又承示諭定襄胡家田公與唐彥議之必無遺䇿小子坐享成熟知幸知幸近答唐君書并和紅字韻詩必皆逹矣胡田先墊後買所謂抱橋澡浴把纜放船也呵呵凡事既不免干瀆左右乞一面裁之不須問某也尚有二百千省若須使乞示喻來便附去見陳季常慥云京師見任郎中其孚之子欲賣荆南頭湖莊子去五六十里有田五百來石厥直六百千先只要二百來千餘可迤邐還不知信否又見樂宣德言此田甚好但稅稍重告為問看彭寺丞之流近日更不敢託他也凂亂尊聽負荆不了也答上官長官二首専人至辱書及詩文二册捧領驚喜莫知所從得伏觀書詞博雅純健有味其言次觀古律詩周思深妙有意於古作者卒讀莊子論筆勢浩然所寄深矣非淺學所能到自惟無狀罪戾汩沒不緣半面獲此三貺幸甚幸甚老謬荒廢不近筆硯忽已數年顧視索然無以為報但藏之巾笥永以為好而已適病中人還草率又詩篇多寫洞庭君山景物讀之超然神馳於彼矣見教作詩既才思拙陋又多難畏人不作一字者已三年矣所居臨大江望武昌諸山如咫尺時復葉舟縱遊其間風雨雲月隂晴蚤暮態狀千萬恨無一語略寫其倣佛耳會面未由惟萬萬以時珍重何時美解當一過我耶與人示諭燕子樓記某於公契義如此豈復有所惜况得託附老兄與此勝境豈非不肖之幸但困躓之甚出口落筆為見憎者所箋注兒子自京師歸言之詳矣意謂不如牢閉口莫把筆庶幾免矣雖託云向前所作好事者豈論前後即異日稍出災厄不甚為人所憎當為公作耳千萬哀察與巢元修日日望歸今日得文甫書乃云昨日始與君瑞成行東坡荒廢春笋漸老餅餤已入末限聞此當伺駕耶老兄别後想健某五七日來苦壅嗽殊甚飲食語言殆廢矧有樂事今日漸住近日牢城失火燒蕩十九雪堂亦危潘家皆奔避堂中飛熖已燎簷矣幸而先生兩瓢無恙四柏亦吐芽矣與千乘姪念二秀才别來又復春深相念不去心邁自北還得手書及見數詩慰喜不可言日月不居奄已除服哀念忽忽如何可言久不知鄉書想諸叔以下各安子明微纍想免矣因書略報大舅書中甚相稱更在勉力副尊長意家門凋落逝者不可復如老叔固已無望而子明子由亦已潦倒頭顱可知正望姪輩振起耳念此不可不加意末由會合千萬自愛與蒲傳正千乘姪屢言大舅全不作活計多買書畫竒物常典錢使欲老弟苦勸公卑意亦深以為然歸老之計不可不及今辦治退居之後決不能食淡衣粗杜門絶客貧親知相干決不能不應副此數事豈可無備不可但言我有好兒子不消與營産業也書畫竒物老弟近年視之不啻如糞土也縱不以鄙言為然且看公亡甥面少留意也與子明兄兄才氣何適不可而數滯留蜀中此回必免衝替何似一入來寄家荆南單騎入京因帶少物來遂謀江淮一住計亦是一䇿試思之他日子孫應舉宦遊皆便也弟亦欲如是但先人墳墓無人照管又不忍與子由作兩處兄自有三哥一房鄉居莫可作此䇿否又只恐亦不忍與三哥作兩處也吾兄弟俱老矣當以時自娛世事萬端皆不足介意所謂自娛者亦非世俗之樂但胸中廓然無一物即天壤之內山川草木魚蟲之類皆是供吾家樂事也如何如何記得應舉時見兄能謳歌甚妙弟雖不會然常令人唱為作詞近作得歸去來引一首寄呈請歌之送長安君一盞呵呵醉中不罪與子安兄近於城中得荒地十數畝躬耕其中作草屋數間謂之東坡雪堂種蔬接果聊以忘老有一大曲寄呈為一笑為書角大逺路恐被拆更不作四小哥二哥及諸親知書各為致下懇巢三見在東坡安下依舊似虎風節愈堅師授某兩小兒極嚴常親自煮豬頭灌血精作薑豉菜羮宛有太安滋味此書到日相次歲豬鳴矣老兄嫂團坐火爐頭環列兒女墳墓咫尺親眷滿目便是人間第一等好事更何所羡可轉此紙呈子明也近購獲先伯父親寫謝蔣希魯及第啓一通躬親褾背題跋寄與念二令寄還二哥因書問取與王元直黃州真在井底杳不聞鄉國信息不審比日起居何如郎娘各安否此中凡百粗遣江邊弄水挑菜便過一日每見一邸報須數人下獄得罪方朝廷綜核名實雖才者猶不堪其任况僕頑鈍如此其廢棄固宜但有少望或聖恩許歸田里得欵段一僕與子衆丈楊宗文之流往還瑞草橋夜還何村與君對坐莊門喫瓜子炒豆不知當復有此日否存道奄忽使我至今酸辛其家亦安在人還詳示數字餘惟萬萬保愛答圓通秀禪師聞名之久而得之詳莫如魯直亦如所喻也自惟潦倒遲暮五十終不聞道區區持其所有欲以求合於世且不可得而况世外之人想望而不之見耶不謂逺枉音問推豫過當豈非醫門多病息黥補劓恃有良藥乎未脫罪籍身非吾有無緣頂謁山門異日聖恩許歸田當畢此意也答寶月禪師三首近遞中兩奉書必逹新歲想法體康勝無緣集會悵望可量屢要經藏碑本以近日斷作文字不欲作既逺書丁寧又悟清日夜煎督遂與作得寄去如不嫌罪廢即請入石碑額見令悟清持書往安州于滕元發大字不知得否其碑不用花草欄界只鐫書字一味已有大字額向下小字但直寫文詞更不須寫大藏經碑一行及撰人寫人姓名即古雅不俗切祝切祝又有小字行書一本若有工夫更入一小橫石亦佳黃州無一物可充信建茶一角子勿訝塵凂餘惟萬萬保練適冗中清師行奉啓草草又此間諸事但問清師即詳也清又遊禮練事多能可喜可喜海惠及隆大師各計安勝每念鄉舍神爽飛去然近來頗常齋居養氣自覺神凝身輕他日天恩放停幅巾杖履尚可放浪於岷峨間也知吾兄亦清健髮不白更請自愛晚歲為道侣也餘附清師口陳此不覼縷又有吳道子絹上畫釋迦佛一軸雖頗損爛然妙迹如生意欲送院中供養如欲得之請示一書即為作記并求的便附去可裝在板子上仍作一龕子此畫與前來菩薩天王無異但人物小而多耳答趙昶晦之四首性喜寫字而怕作書親知書問動盈篋笥而終歲不答對之太息而已乃知剖符南徼賢者處之固不擇逺近劇易矧風土舊諳習而兵興多事適足以發明利器但恨愚暗何時復得攀接耳又南事方興計貴郡亦非靜處長者固自有處之矣聞廟略必欲郡縣荒服就使必克正是添一熙河屯守餽餉中原無復寧歲况其不然憂患未易言也履險涉難可以濟者其惟邁德寡怨之君子乎又示諭處患難不戚戚只是愚人無心肝耳與鹿豕木石何異所謂道者何曽夢見舊收得蜀人蒲永升山水四軸亦近歲名筆其人已亡矣聊致齋閣不罪凂瀆藤既美風土又少訴訟優遊卒歲又復何求某亦甚樂此安土忘懷如一黃人元不出仕而已又久不奉狀懶慢之過逺辱信使慚愧交懷承被命再任逺徼不足久留賢者然彼人受賜多矣晦之風績素聞使者交章佇聞進擢以為交遊故人光寵與蹇序辰四首欲一奉見豈徒然哉深有所欲陳者而竟不遂可勝歎耶子由在部下甚幸但去替不逺耳輒有一書及少信煩從吏甚不當爾恃眷必不深責季常可勸之一起深欲圗其見坐處也一噱又前日已奉書昨日食後垂欲上馬赴約忽兒婦眩倒不知人者久之救療至今雖稍愈尚昏昏也小兒輩未更事義難捨去遂成失信想仁明必恕其不得已也然愧負深矣乍暖起居何如間廢之人徑往一見謂必得之乃爾齟齬人事真不可必也後會何可復期惟萬萬為國自重又江上一别今歲餘矣不謂尚蒙存記手書見及感愧不可言衝涉薄寒起居佳安甚慰所望承奉使江表鄉閭之末亦竊以為寵但罪廢之餘不可復自比數故舊書詞過重只益惶悚旦夕欲遂一見惟冀順候自重又不得一見而别私情甚不足人常蔽於安佚而達於憂患願深照此理况美才令聞豈久棄者耶答濠州陳章朝請二首錢塘一别如夢中事爾後契濶何所不有置之不足道也獨中間述古捐館有識相弔矧故人僚吏相愛之深者然終無一字以解左右蓋罪廢窮竒動輒纍人故往還杜絶至今思之慙負無量昨逺辱書問便欲裁謝而春夏以來卧病幾百日今尚苦目病再枉手教喜知尊體康勝貴眷各佳安罪廢屏居交遊皆斷絶縱復通問不過相勞愍而已孰知如公逺發藥石以振吾過者哉已往者布出不可復掩矣期於不復作而已無緣一見臨紙耿耿萬萬以時自重又每辱不遺時枉書問感愧深矣比日起居佳勝某自竄逐以來不復作詩與文字所諭四望起廢固宿志所願但多難畏人遂不敢爾其中雖無所云而好事者巧以醖釀便生出無窮事也竊望憐察示諭學琴足以自娛私亦欲耳但老懶不能復勞心耳有廬山崔間者極能此逺來見客且留之時令作一弄也江倅遞中辱書此人回欲裁謝適苦寒嗽而此人又告去甚急故未果且為道此其子文格甚髙議論與世俗異也可畏劉宗古近過此甚安健絶無遷謫意江親亦可與言與徐得之十首適辱手簡具審起居佳勝知當少留雪堂所需字詩欵曲為之此興國書可便遣也又數日相從遽别情悰惘然晚來起居佳勝後會未可期惟萬萬以時自重又十一郎昆仲不及再别惟節哀慎重為禱葬期不逺想途中不復滯留凡事稟議大阮為佳仍恕造次又昨日已别情悰惘然辱教喜起居佳勝風雨如此淮浪如山舟中搖撼不可存濟亦無由上岸但闔戶擁衾耳想來日亦未能行若再訪幸甚又逾年相從情均骨肉乍此逺别悵戀可知辱書承起居佳勝為慰來日離此水甚慳澀不知趂得十五日上否得之亦宜早發勉此歲月間早遂定居為佳也餘萬萬自重又小兒蒙下問未暇上狀不罪宗人過望皆公之賜也叨慁叨慁公不能無愧更為多致謝懇也又承舟御不逺數百里相從風義之重感慰何極經宿起居何如郡中雖留數日竟少暇陪接又不得一候館舍遂爾逺别可量悵惘又得之晚得子聞之喜慰可知不敢以俗物為賀所用石硯一枚送上須是學書時矣知似太早計然俯仰間便自見其成立但催促吾儕日益潦倒爾恐得之惜别又復前去家中闕人抱孩兒深為不遑呵呵又别後所辱手教一一皆領罕遇信便不克裁謝甚愧負也再到舊遊不見故人深為惘惘然喜久客牢落得遂歸計也比日已還侍下起居佳勝會合何時臨書悵然又定省之暇稍葺間軒簞瓢雞黍有以自娛想無所慕於外也閩中多異人隱屠釣得之不為簮組所縻倘得見斯人乎僕亦衰老強顔少留如傳舍耳因風時惠問答程彛仲推官二首濶别永久多難流落百事廢弛不復通問吾兄不忘疇昔時枉逺書感怍不可言仍審比來起居佳勝又讀别紙所寄山水園亭之勝廢卷閉目如到其間幸甚幸甚吾兄潛德晚遇當遂光大惟厚自愛慰朋友之望又某與幼纍皆安子由頻得書無恙元修去已久矣今必還家所要亭記豈敢於吾兄有所惜但多難畏人不復作文字惟時作僧佛語耳千萬體察非推辭也逺書不欲盡言所示自是一篇髙文大似把飯叫飢聊發千里一笑會合無期臨書悽然答君瑞殿直春來未嘗一日間欲去奉謁遂成食言愧愧辱書承起居佳勝為慰君猷知四月末乃行猶可一見否乍暄惟萬萬自重與景倩昨日辱訪大慰久渴經宿起居佳勝食已本欲奉謁適陳季常來故且已衆客頗懷公髙論可能只今一訪否禮不當爾意公期我於度外也與趙仲修二首瘡病不往見而仁人敦舊屢承車馬感愧不可言雨涼竊惟起居佳勝旦夕當獲面謝又公清貧更煩輟惠羊邉謹以拜賜使我有數日之飽公亦乃無浹旬蔬食耶一噱與人二首兩日瘡痛殊甚不果見辱簡且喜佳勝二詩髙妙讀之喜慰幸甚病中裁謝草草又兩日瘡痛不出思渴思渴今猶楚痛未已鍾乳丸更求數服吐血者復作也不罪不罪與孟亨之今日齋素食麥飯笋脯有餘味意謂不減芻豢念非吾亨之莫識此味故餉一合并建茗兩片食已可與道媪對啜也與何聖可辱示朱先生所著書詩詞義深矣淺學曽不足以窺其萬一結髮求道篤老不衰世間有幾人而匏繫於此不得一望其履幕慨嘆不已久廢筆硯無以報此嘉貺益增愧赧與毛維瞻歲行盡矣風雨凄然紙窗竹屋燈火青熒時於此間得少佳趣無由持獻獨享為愧想當一笑也與劉器之辱書極論內外丹事劣弟初不及此受賜多矣輒拜呈方丈銘一首更告與敲琢看唐彥道處亦有一贊并為看過因家兄龜年行奉啓半醉中書字不謹代夫人與福應真大師久不聞法音馳仰殊深即日逺想起居安穩兒從夫逺謫百念灰滅持誦之餘幸無恙何時復見一洗嶺瘴春寒千萬為法自重不宣旌德縣君王氏兒再拜答開元明座主二首久别思企不忘辱書具審法履安勝為慰賢上人前年來此尋往金山多時不得消息不知今安在也石橋用工初不滅裂云何一水便爾敗壞無乃亦是不肖窮蹇所纍耶何時復相見千萬保愛又開元大殿非吾師學行人神響應安能便成可喜可喜此書附聖傳塗中更不封勿訝勿訝與無釋老師吾師要寫大字特為飲酒數杯只用尋常小筆作二額八字者可入石六字可上碑兩旁刻年月日及官位姓名字小不稱大伽藍示及大筆皆市人用者不可使也惠及竒菽感服之至與清隱老師二首黃長生人來辱書承起居佳勝為慰示及黃君佳篇及山中圗刻欲令有所記述結緣淨境此宿所願也但多病久廢筆硯里中故人屢有求詩文者皆未能副其請也千萬勿訝又淨因之會茫然如隔生矣名言絶境寤寐不忘何日得脫纓絆一聞笑語思渴思渴與人辱書承起居佳勝竒墨吾儕共寶併蒙輟惠慙悚之甚敬佩厚意也與金山佛印禪師離黃州辱書伏承道體安佳甚慰馳仰見約遊山固所願也方迫往筠州未即走見還日如約匆匆布謝與王文甫數日不審尊候何如前蒙恩量移汝州比欲乞依舊黃州住細思罪大責輕君恩至厚不可不奔赴數日念之行計決矣見己射得一舟不出此月下旬起發沿流入淮泝汴至雍丘陳留間出陸至汝勞費百端勢不得已本意終老江湖與公扁舟往來而事與心違何勝慨歎計公聞之亦凄然也甚有事欲面話治行殊未集冗迫之甚公能兩三日間特一見訪乎至望至望元弼藥并書乞便與送達三五日間買得瓷器更煩差人得否與王慶源窮僻少便久不上狀竊惟退居以來尊體勝常黑頭謝事古今所共賢二疏師傅淵明縣令均為髙退昔人初不為優劣也謹以此為賀二子學術成就瑞草橋果木成隂卧想數年出仕無一可愧者此又有餘味矣除却虛名外物不知文太師何以加此想當一笑也某蒙恩量移汝州回念墳墓心目斷絶方作舟行何時復到汝到後又須營辦生事此身漂然奉羡何及乍熱惟萬萬順時自重與楊元素二首陳主簿人還領手教伏承比日台候萬福深慰馳仰人物豐盛池館清麗足供嘯咏之樂數日來人皆云公移徐州雖未是實語然理當如此惟汲汲行復遷擢矣某本欲秋間往見而汝州之行度不可免見治裝舟行自洛陽出陸百八十里至汝雖繚繞邅回然久困資用殆盡決不能陸行耳無緣詣别惟望順時為國自重又城南有亞父冢然非也冢在居巢城北有劉子政墓昔欲為起一祠堂以水大不果公若有餘力為成之亦佳城西有楚元王墓曽出獵至其下石佛山亦佳觀與胡道士昨日起離中途逆風吹往北岸幾葬魚腹知之二詩録寄到後幸一兩字附遞至他州貴知逹玉芝善守護無為有力者所取餘惟保愛與人久不奉書疊承枉教字慰感良深比日起居佳勝汝郡務簡儒師清間於此相從豈非甚幸區區非面莫究令兄不敢别狀乞道懇與佛印禪師三首専人來辱書纍幅勞問備至感怍不己臘雪應時山中苦寒法體清康一水之隔無緣躬詣道場少聞謦咳但深馳仰又夢想髙風忽復披奉欣慰可知但纍日煩擾為愧耳重承人船相送益用感怍别來法體何如後會不逺萬萬保練又専人來復書教并偈捧讀慰喜且審比日法體安穩幸甚幸甚今聞秀老赴召為衆望公來長廬如何如何某方議買劉氏田成否未可知須臾留數日携家入山決矣殤子之戚亦不復經營惟感覺老憂愛之深也太虛已去知之答賈耘老四首久不奉書尚蒙記録逺枉手教且審比日動止佳勝感慰兼集寄示石刻足見故人風義之深具與世異趣也新詩不蒙録示數篇何也貧固詩人之常齒落目昏當是為雙荷葉所困未可專咎詩也某髮少加白耳餘如故未緣往見萬萬自愛又僕已買田陽羡當告聖主哀憐餘生許於此安置幸而許者遂築室於荆溪之上而老矣僕當閉戶不出公當扁舟過我也醉甚不成字不罪見滕公且告為卑末送相子來揚州又久放江湖不見偉人昨在金山滕元發以扁舟破巨浪來相見出船巍然使人神聳好箇沒興底張鎬相公見時且為致意别後酒狂甚長進也老杜云張公一生江海客身長九尺鬚眉蒼謂張鎬也蕭嵩薦之云用之則為帝王師不用則窮谷一病叟耳又今日舟中無他事十指如懸槌適有人致嘉酒遂獨飲一杯醺然徑醉念賈處士貧甚無以慰其意乃為作怪石古木一紙每遇飢時輒以開看還能飽人否若吳興有好事者能為君月致米三石酒二斗終君之世者便以贈之不爾者可令雙荷葉收掌須添丁長以付之也與千之姪必強姪近在泗州得書喜知安樂房眷子孫各無恙秋試又不利老叔甚失望然慎勿動心益務積學而已人茍知道無適而不可初不計得失也聞姪欲暫還鄉信否叔舟行幾一年近於陽羡買得少田意欲老焉尋奏乞居常見邸報己許文字必在南都此行略到彼葬却老妳二姨子由乾妳也住二十來日却乘舟還陽羡姪能來南都一相見否叔甚欲一往見傳正自惟罪廢之餘動輒纍人故不果爾甚有欲與姪言者非面不盡想不憚數舍之逺也寒暖不定萬萬自愛與潘彥明别來思念不去心逺想起居佳安眷愛各無恙不見黃榜未敢馳賀想必髙捷也某兩曽奉書逹否屢夢東坡笑語覺後惘然也已買得宜興一小莊且乞居彼遂為常人矣公必已赴省試謾發此書不復覼縷惟千萬保愛與開元明師五首奉别纍年舟過境上懷想不忘遣人惠書知法體安穩感慰兼集咫尺無由往見萬萬自愛又石橋之壞每為悵然吾師經營非不堅盡當由窮蹇之人所向無成纍此橋耶知尚未有涯但勿廢此志歲豐人紓會當成耳僕已得請居常州暫至南京即還南也知之又中前經過幸聞清論深欲還日再上謁以數相知約在棲賢且自德安徑赴之遂成食言悚息不巳比日法體何如拙詩一首聊以寄一時之事耳不須示人切祝切祝又久復一見甚以為慰泥雨逺煩瓶錫不克欵語但有感怍乍逺千萬保愛又近過南都見致政太保張公公以所藏禪月羅漢十六軸見授云衰老無復玩好而私家畜畫像乏香燈供養可擇名藍髙僧施之今吾師逺來相别豈此羅漢契緣在彼乎敬以奉贈亦太保公之本意也答王定國三首辱惠書并新詩妙曲大慰所懷河凍膠舟咫尺千里意思牢落可知得此佳作終日喜快滯悶氷釋幸甚近在常置一小莊子歲可得百石似可足食非不知揚州之美窮猿投林不暇擇木也承欲一相見固鄙懷至願但不如彼此省事之為愈也又禦瘴之術惟絶欲練氣一事本自衰晚當然初不為瘴而作也其餘坦然無疑雞豬魚蒜遇著便吃生老病死符到奉行此法差似簡徑也君實常云定國瘴煙窟裏五年面如紅玉不知道能如此否老人知道則不如爾頑愚即過之先帝升遐天下所共哀慕而不肖與公蒙恩尤深固宜作挽詞少陳萬一然有所不敢者耳必深察此意無狀罪廢衆欲置之死而先帝獨哀之而今而後誰復出我于溝壑者歸耕沒齒而己矣又近絶少過臨賔客知其衰懶不能與人為輕重見顧者漸少殊覺自幸昨日偶見子華嗟歎老弟之逺外蒙囑聞過必相告吾弟大節過人而小事亦不經意正如作詩髙處可以追配古人而失處亦受嗤於拙目薄俗正好點檢人小疵不可不留意也答靈鷲遵老二首前日壁間一見新偈便向泥土上識君今日復蒙古藤奇句益知前言之不妄也然既傳之諸祖何不自家留使既己倒持輒當逆化呵呵又疊辱手教且審法體佳勝扇子妙句開發良多本欲攀和恐久立大衆呵呵東坡全集卷八十一
