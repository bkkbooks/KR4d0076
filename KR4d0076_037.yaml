body:
  text: 東坡全集巻三十七宋蘓軾撰記十三首勝相院經藏記元豐三年歳在庚申有大比丘惟簡號曰寳月修行如幻三摩鉢提在蜀成都大聖慈寺故中和院賜名勝相以無量寳黄金丹砂琉璃真珠旃檀衆香莊嚴佛語及菩薩語作大寳藏湧起于海有大天龍背負而出及諸小龍糾結環繞諸化菩薩及䕶法神鎮守其門天魔鬼神各執其物以禦不祥是諸衆寳及諸佛子光色聲香自相磨激璀璨芳郁玲瓏宛轉生出諸相變化無窮不假言語自然顯見苦空無我無量妙義凡見聞者随其根性各有所得如衆飢人入於太倉雖未得食已有飽意又如病人逰於藥市聞衆藥香病自衰減更能取米作無礙飯恣食取飽自然不飢又能取藥以療衆病衆病有盡而藥無窮須臾之間無病可療以是因緣度無量衆時見聞者皆爭捨施富者出財壯者出力巧者出技皆舍所愛及諸結習而作佛事求脱煩惱濁惡苦海有一居士其先蜀人與是比丘有大因緣去國流浪在江淮間聞是比丘作是佛事即欲随衆舍所愛習周視其身及其室廬求可捨者了無一物如焦糓芽如石女兒乃至無有毫髪可捨私自念言我今惟有無始已來結習口業妄言綺語論説古今是非成敗以是業故所出言語猶如鐘磬黼黻文章悦可耳目如人善博日勝日負自云是巧不知是業今捨此業作寳藏偈願我今世作是偈已盡未來世永斷諸業客塵妄想及諸理障一切世間無取無舍無憎無愛無可無不可時此居士稽首西望而説偈言我逰衆寳山見山不見寳巖谷及草木虎豹諸龍蛇雖知寳所在欲取不可得復有求寳者自言已得寳見寳不見山亦未得寳故譬如夢中人未嘗知是夢既知是夢已所夢即變滅見我不見夢因以我爲覺不知真覺者覺夢兩無有我觀大寳藏如以蜜説甜衆生未諭故復以甜説蜜甜蜜更相説千刼無窮盡自蜜及甘蔗查梨與橘柚説甜而得酸以及鹹辛苦忽然反自味舌根有甜相我爾黙自知不煩更相説我今説此偈於道亦云逺如眼根自見是眼非我有當有無耳人聽此非舌言於一彈指頃洗我千刼罪䖍州崇慶禪院新經藏記如來得阿耨多羅三藐三菩提曰以無所得故而得舍利弗得阿羅漢道亦曰以無所得故而得如來與舍利弗若是同乎曰何獨舍利弗至于百工賤技承蜩意鉤履狶畫墁未有不同者也夫道之大小雖至於大菩薩其視如來猶若天淵然及其以無所得故而得則承蜩意鉤履狶畫墁未有不與如來同者也以吾之所知推至其所不知嬰兒生而導之言稍長而教之書口必至於忘聲而後能言手必至於忘筆而後能書此吾之所知也口不能忘聲則語言難於屬文手不能忘筆則字畫難於刻琱及其相忘之至也則形容心術酧酢萬物之變忽然而不自知也自不能者而觀之其神智妙逹不既超然與如來同乎故金剛經曰一切聖賢皆以無爲法而有差别以是為技則技疑神以是為道則道疑聖古之人與人皆學而獨至於是其必有道矣吾非學佛者不知其所自來獨聞之孔子曰詩三百一言以蔽之曰思無邪夫有思皆邪也善惡同而無思則土木也云何能使有思而無邪無思而非土木乎烏乎吾老矣安得數年之暇託於佛僧之宇盡發其書以無所思心㑹如來意庶幾於無所得故而得者謫居惠州終歳無事宜若得行其志而州之僧舍無所謂經藏者獨榜其所居室曰思無邪齋而銘之致其志焉始吾南遷過䖍州與通守奉議郎俞君括㳺一日訪亷泉入崇慶院觀寳輪藏君曰是於江南壯麗爲第一其費二千餘萬前長老曇秀始作之幾於成而寂今長老惟湜嗣成之奔走二老之間勸導經營銖積寸累十有六年而成者僧知錫也子能愍此三士之勞為一言記之乎蓋吾心許之俞君博學能文敏於從政而恬於進取數與吾書欲棄官相從學道自䖍罷歸道病卒於廬陵䖍之士民有巷哭者吾亦爲出涕故作此文以遺湜錫并論孔子思無邪之意與吾有志無書之歎使刻于石且與俞君結未来之因乎紹聖二年五月二十七日記宻州通判㕔題名記始尚書郎趙君成伯爲眉之丹稜令邑人至今稱之余其隣邑人也故知之爲詳君既罷丹稜而余適還眉於是始識君其後余出官於杭而君亦通守臨淮同日上謁辭相見於殿門外握手相與語已而見君於臨淮劇飲大醉於先春亭上而别及移守膠西未一年而君來倅是邦余性不慎語言與人無親疎輙輸寫腑臟有所不盡如茹物不下必吐出乃已而人或記疏以爲怨咎以此尤不可與深中而多數者處君既故人而簡易疎逹表裏洞然余固甚樂之而君又勤於吏職視官事如家事余得少休焉君曰吾㕔事未有壁記乃集前人之姓名以屬於余余未暇作也及爲彭城君每書來輙以爲言且曰吾將託子以不朽昔羊叔子登峴山謂從事鄒湛曰自有宇宙而有此山登此逺望如我與卿者多矣皆湮滅無聞使人悲傷湛曰公之名當與此山俱傳若湛輩乃當如公言耳夫使天下至今有鄒湛者羊叔子之賢也今余頑鄙自放而且老矣然無以自表見於後世自計且不足而况能及於子乎雖然不可以不一言使數百年之後得此文於頺垣廢井之間者茫然長思而一歎也秦太虛題名記元豐二年中秋後一日余自呉興道杭東還㑹稽龍井有辯才大師以事邀余入山比出郭日夕已航湖至普寜遇道人參寥問龍井所遣籃輿則曰以不時至去矣是夕天宇開霽林間月明可數毫髪遂棄舟從參寥杖䇿並湖而行出雷峰度南屏濯足於恵因澗入靈石塢得支徑上風篁領憇于龍井亭酌泉據石而飲之自普寜凡經佛寺十五皆寂不聞人聲道傍廬舍或燈火隠顯草木深鬱流水止激悲鳴殆非人間之境行二鼓矣始至夀聖院謁辯才於潮音堂明日乃還髙郵秦觀題覽太虛題名皆予昔時游行處閉目想之了然可數始予與辯才别五年乃自徐州遷於湖至髙郵見太虛參寥遂載與俱辯才聞予至欲扁舟相過以結夏未果太虛參寥又相與適越云秋盡當還而予倉卒去郡遂不復見明年予謫居黄州辯才參寥遣人致問且以題名相示時去中秋不十日秋潦方漲水面千里月出房心間風露浩然所居去江無十歩獨與兒子邁棹小舟至赤壁西望武昌山谷喬木蒼然雲濤際天因録以寄參寥使以示辯才有便至髙郵亦可錄以寄太虛也奬諭勅記勅蘇某省京東東路安撫使司轉運司奏昨黄河水至徐州城下汝親率官吏驅督兵夫救䕶城壁一城生齒并倉庫廬舍得免漂沒之害遂得完固事河之為中國患久矣乃者堤潰東注衍及徐方而民人保居城郭增固徒得汝以安也使者屢以言朕甚嘉之熈寜十年七月十七日河决澶州曹村埽八月二十一日水及徐州城下至九月二十一日凡二丈八尺九寸東西北觸山而上皆清水無復濁流水髙於城中平地有至一丈九寸者而外小城東南隅不沉者三版父老云天禧中嘗築二堤一自小市門外絶壕而南少西以屬於戲馬䑓之麓一自新墻門外絶壕而西折以屬於城下南京門之北遂起急夫五千人與武衛奉化牢城之士晝夜雜作堤堤成之明日水自東南隅入遇堤而止水牎六先水未至以薪芻爲囊自城外塞之水至而後自城中塞者皆不足恃城中有故取土大坑十五皆與外水相應井有溢者三方皆積化無所取土取於州之南亞夫塜之東自城中附城爲長堤壯其址長九百八十四丈髙一丈闊倍之公私船數百以風浪不敢行分䌫城下以殺河之怒至十月五日水漸退城以全明年二月有㫖賜錢二千四百一十萬起夫四千二十三人又以發常平錢六百三十四萬米一千八百餘斛募夫三千二十人改築外小城創木岸四一在天王堂之西一在彭城樓之下一在上洪門之西北一在大城之東南隅大坑十五皆塞已而澶州靈千歸成水不復至臣某以謂黄河率常五六十年一决而徐州最處汴泗下流上下二百餘里皆阻山水尤深悍難落不與他郡等恐久逺倉卒吏民不復究知故因上之所賜詔書而記其大畧并刻諸石若其詳則藏於有司謂之熙寜防河錄云石氏畫苑記石康伯字㓜安眉之眉山人故紫薇舍人昌言之㓜子也舉進士不第即棄去當以䕃得官亦不就讀書作詩以自娯而巳不求人知獨好法書名畫古器異物遇有所見脱衣輟食求之不問有無居京師四十年出入閭巷未嘗騎馬在稠人中耳目謖謖然専求其所好長七尺髯而黑如世所畫道人劍客而徒歩塵埃中若有所營不知者以爲異人也又善滑稽巧發微中旁人抵掌絶倒而㓜安淡然不變色與人逰知其急難甚於為已有客於京師而病者輙舁置其家親飲食之死則棺斂之無難色凡識㓜安者皆知其如此而余獨深知之㓜安識慮甚逺獨口不言耳今年六十二狀貌如四十許人湏三尺郁然無一莖白者此豈徒然者哉爲亳州職官與富鄭公俱得罪者其子夷庚也其家書畫數百軸取其毫末雜碎者以冊編之謂之石氏畫苑㓜安與文與可遊如兄弟故得其畫為多而余亦善畫古木叢竹因以遺之使置之苑中子由嘗言所貴於畫者為其似也似猶可貴况其真者吾行都邑田野所見人物皆吾畫笥也所不見者獨鬼神耳當頼畫而識然人亦何用見鬼此言真有理今㓜安好畫乃其一病無足録者獨著其為人之大畧云爾元豐三年十二月二十日黄州安國寺記元豐二年十二月余自呉興守得罪上不忍誅以為黄州團練副使使思過而自新焉其明年二月至黄舍舘粗定衣食稍給閉門却掃收召魂魄退伏思念求所以自新之方反觀從來舉意動作皆不中道非獨今之所以得罪者也欲新其一恐失其二觸類而求之有不可勝悔者於是喟然歎曰道不足以御氣性不足以勝習不鋤其本而耘其末今雖改之後必復作盍歸誠佛僧求一洗之得城南精舍曰安國寺有茂林修竹陂池亭榭間一二日輙徃焚香黙坐深自省察則物我想忘身心皆空求罪垢所從生而不可得一念清净染汙自落表裏翛然無所附麗私竊樂之旦徃而暮還者五年於此矣寺僧曰繼連為僧首七年得賜衣又七年當賜號欲謝去其徒與父老相率留之連笑曰知足不辱知止不殆卒謝去余是以媿其人七年余將有臨汝之行連曰寺未有記具石請記之余不得辭寺立於僞唐保大二年始名䕶國嘉祐八年賜今名堂宇齋閤連皆易新之嚴麗深穏悦可人意至者忘歸歳正月男女萬人㑹庭中飲食作樂且祠瘟神江淮舊俗也四月六日汝州團練副使眉山蘇軾記石鐘山記水經云彭蠡之口有石鐘山焉酈元以為下臨深潭微風皷浪水石相搏聲如洪鐘是説也人常疑之今以鐘磬置水中雖大風浪不能鳴也而况石乎至唐李渤始訪其遺蹤得雙石於潭上扣而聆之南聲函胡北音清越枹止響騰餘韻徐歇自以為得之矣然是説也余尤疑之石之鏗然有聲者所在皆是也而此獨以鐘鳴何哉元豐七年六月丁丑余自齊安舟行適臨汝而長子邁將赴饒之徳興尉送之至湖口因得觀所謂石鐘者寺僧使小童持斧於亂石間擇其一二扣之硿硿焉余固笑而不信也至其夜月明獨與邁乘小舟至絶壁下大石側立千仞如猛獸竒鬼森然欲搏人而山上栖鶻聞人聲亦驚起磔磔雲霄間又有若老人欬且笑於山谷中者或曰此鸛鶴也余方心動欲還而大聲發於水上噌吰如鐘皷不絶舟人大恐徐而察之則山下皆石穴罅不知其淺深微波入焉涵澹澎湃而為此也舟廻至兩山間將入港口有大石當中流可坐百人空中而多竅與風水相吞吐有窽坎鏜鞳之聲與向之噌吰者相應如樂作焉因笑謂邁曰汝識之乎噌吰者周景王之無射也窽坎鏜鞳者魏獻子之歌鐘也古之人不余欺也事不目見耳聞而臆斷其有無可乎酈元之所見聞殆與余同而言之不詳士大夫終不肯以小舟夜泊絶壁之下故莫能知而漁工水師雖知而不能言此世所以不傳也而陋者乃以斧斤考擊而求之自以為得其實余是以記之蓋歎酈元之簡而笑李渤之陋也李太白碑隂記李太白狂士也又嘗失節於永王璘此豈濟世之人哉而畢文簡公以王佐期之不亦過乎曰士固有大言而無實虛名不適於用者然不可以此料天下士士以氣為主方髙力士用事公卿大夫爭事之而太白使脱鞾殿上固已氣蓋天下矣使之得志必不肯附權倖以取容其肯從君於昏乎夏侯湛賛東方生云開濟明豁包含宏大陵轢卿相嘲哂豪傑籠罩靡前跆藉貴勢出不休顯賤不憂戚戲萬乗若僚友視儔列如草芥雄節邁倫髙氣蓋世可謂拔乎其萃游方之外者也吾於太白亦云太白之從永王璘當由迫脅不然璘之狂肆寢陋雖庸人知其必敗也太白識郭子儀之為人傑而不能知璘之無成此理之必不然者也吾不可以不辯薦誠禪院五百羅漢記熈寜十年余方守徐州聞河決澶淵入巨野首灌東平吏民恟懼不知所為有僧應言建䇿鑿清泠口道積水北入于古廢河又北東入于海吏方持其議言彊力辯口慨然論河決狀甚明吏不能奪卒以其言決之水所入如其言東平以安言有力焉衆欲為請賞言笑謝去余固異其人後二年移守湖州而言自鄆來見余於宋曰吾鄆人也少為僧以講為事始錢公子飛使吾創精舍於鄆之東阿北新橋鎮且造鐵浮屠十有三級髙百二十尺既成而趙公叔平請諸朝名吾院曰薦誠歳度僧以守之今將造五百羅漢像於錢塘而載以歸度用錢五百萬自丞相潞公以降皆吾檀越也余於是益知言真有過人者又六年余自黄州遷于汝過宋而言適在焉曰像已成請為我記之嗚呼士以功名為貴然論事易作事難作事易成事難使天下士皆如言論必作作必成者其功名豈少哉其可不為一言方丈記年月日住持傳法沙門惟謹重建方丈上祝天子萬夀永作神主斂時五福敷錫庻民地獄天宫同為淨土有性無性齊成佛道野吏亭記故相陳文惠公建立此亭榜曰野吏蓋孔子所謂先進於禮樂者公在政府獨眷眷此邦然庭宇日就圯缺凡九十七年太守朝奉郎方侯子容南圭復完新之南安軍學記古之為國者四井田也肉刑也封建也學校也今亡矣獨學校僅存耳古之為學者四其大者則取士論政而其小者則絃誦也今亡矣直誦而已舜之言曰庻頑讒説若不在時侯以明之撻以記之書用識哉欲並生哉工以納言時而颺之格則承之庸之否則威之格之言改也論語曰有恥且格承之言薦也春秋傳曰奉承齊犠庻頑讒説不率是教者舜皆有以待之夫化惡莫若進善故擇其可進者以射侯之禮舉之其不率教甚者則撻之小則書其罪以記之非疾之也欲與之並生而同憂樂也此士之有罪而未可終棄者故使樂工採其謳謡諷議之言而颺之以觀其心其改過者則薦之且用之其不悛者則威之屏之僰之寄之類是也此舜之學政也射之中否何與於善惡而曰侯以明之何也曰射所以致衆而論士也衆一而後論定孔子射於矍相之圃蓋觀者如堵使弟子揚觶而叙黜者三則僅有存者由此觀之以射致衆衆集而後論士蓋所從來逺矣詩曰在泮獻囚又曰在泮獻馘禮曰受成於學鄭人㳺鄉校以議執政或謂子産毁鄉校何如子産曰不可善者吾行之不善者吾改之是吾師也孔子聞之謂子産仁古之取士論政者必於學有學而不取士不論政猶無學也學莫盛於東漢士數萬人噓枯吹生自三公九卿皆折節下之三府辟召常出其口其取士議政可謂近古然卒為黨錮之禍何也曰此王政也王者不作而士自以私意行之於下其禍敗固宜朝廷自慶厯熈寜紹聖以來三致意於學矣雖荒服郡縣必有學况南安江西之南境儒術之富與閩蜀等而太守朝奉郎曹侯登以治郡顯所至必建學故南安之學甲於江西侯仁人也而勇於義其建是學也以身任其責不擇劇易期於必成士以此感奮不勸而力費於官者為錢九萬三千而助者不貲為屋百二十間禮殿講堂視大邦君之居凡學之用莫不嚴具又以其餘增置廩給食數百人始於紹聖二年之冬而成於四年之春學成而後去今為潮州軾自海南遂過南安見聞其事為詳士既徳侯不已乃具列本末贏糧而從軾者三百餘里願紀其實夫學王者事也故首以舜之學政告之然舜逺矣不可以庻幾有賢太守猶可以為鄭子産也學者勉之無愧於古人而已建中靖國元年三月四日眉山蘇軾書東坡全集巻三十七
