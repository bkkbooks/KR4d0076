body:
  text: 東坡全集巻七十八宋蘓軾撰尺牘一百九首與朱康叔十七首某啓専使至復領手教契愛愈深可量感服仍審比日起居佳勝為慰舍弟巳部賤累到此平安皆出餘庇不煩念及珍惠雙壺遂與子由累醉公之徳也隆暑萬萬以時自重行膺殊相人還上謝又令子歸侍左右日有庭闈之樂恨未際見不敢輒奉書近見提舉司薦章稍慰輿議可喜可喜作墨竹人近為少閒暇俟宛轉求得當續置之呵呵酒極醇美必是故人特遣下㕔也某再拜又某再拜近奉書并舍弟書想必達胡掾至領手教具審起居佳勝兼承以舍弟及賤累至特有厚貺羊麵酒果一捧領訖但有慚怍舍弟離此數日來教尋附洪州遞與之已遷居江上臨臯亭甚清曠風晨月夕杖履野步酌江水飲之皆公恩庇之餘波想味風義以慰孤寂尋得去年六月所寫詩一軸寄去以為一笑酷暑萬乞保練又某啓酷暑不可過百事墮廢稍疎上問想不深訝比日伏想尊履佳勝别乘過郡承賜教及恵新酒到此如新出甕極為竒珍感愧不可言因與二三佳士㑹同飲盛徳也秋熱更望保練行膺峻陟又胡掾與語如公之言佳士佳士渠方寄家齊安時得與之相見也令子必且盤桓侍下中前示諭姻親事可留示年月日恐求親者欲知之造次造次又某啓因循稍疎上問不審近日尊候何如某蒙庇如昨秋色益佳郡事稀少想有遊樂無縁展奉但積思念乍冷萬冀以時自重郭寺丞一書乞指揮送與其人甚有文雅必䝉清顧也聞其墜馬傷手不至甚乎又某啓近附黄岡縣遞拜書必達專人過此領手教具審起居佳勝凄冷此嵗行盡㑹合何時以増悵然唯祈善保敷文宅計此月末方離陳南河淺澁想五六月間方到此荷公憂恤之深其家固貧甚然鄉中亦有一小莊子且隨分過也歸老之説恐未能如雅志又修理積弊已就倫次監司朝廷豈有遽令放閒耶問及物食天漸熱難久停恐空煩費也海味亦不若食既忝雅契自當一一奉白又示諭親情事専在下懐然此中殊少士族若有所得當立上聞也寫字俟少閒續納上墨竹如可尊意當取次致左右畫者在此不逺必可求也呵呵某啓近王察推至辱書承起居佳勝方欲裁謝又枉教勅益増感愧數日來偶傷風百事皆廢今日㣲減尚未有力區區之懐未能盡也乍暄惟冀以時珍攝稍健當別上問次又閣名乆思未獲佳者更乞詳閣之所向及側近故事迹為幸董義夫相聚多日甚歡未嘗一日不談公美也舊好誦陶潜歸去來常患其不入音律近輙微加増損作般涉調哨遍雖微改其詞而不改其意請以文選及本傳考之方知字字皆非創入也謹小楷一本寄上却求為書抛磚之謂也亦請録一本與元弼為病勌不及别作書也數日前飲醉後作頑石亂篠一紙私甚惜之念公篤好故以奉獻幸檢至又令子必在左右計安勝不敢奉書舍弟已到官傳聞筠州大水城内丈餘不知虛的也屏賛硯銘無用之物公好事之過不敢不寫装成送去乞一覽少事不免上干聞有潘原秀才以買僕事被禁某與其兄潘丙觧元至熟最有文行原自是佳士有舉業望賜全庇暑月得早出為此人父母皆篤老聞之憂恐萬端公以仁孝名世能哀之否恃舊干凟不敢逃罪天覺出藍之作本以為公家寳而公乃輕以與人謹収藏以鎮箧笥然尋常不揆以亂道塵獻想公亦隨手将與人耳呵呵又某啓武昌傳到手教繼辱専使墮簡感服併深比日尊體佳勝節物清和江山秀美府事整辦日有勝逰恨不得陪従耳雙壺珍貺一洗旅愁甚幸甚幸佳果収藏有法可愛可愛拙疾乍到不諳土風所致今已復常矣子由尚未到其寸步千里也未由展奉尚冀以時自重又與可船旦夕到此為之泫然想公亦爾子由到此須留也住五七日恐知之前曽録國史補一紙不知到否因書略示諭生細酒四器正濟所乏珍感生酒暑中不易調停極清然閔仲叔不以口腹累人某毎䝉公眷念逺致珍物勞人重費豈不肖所安耶所問凌翠至今虛位雲乃權發遣耳何足掛齒牙呵呵馮君方想如所諭極煩留念又䝉傳示秘訣何以當此寒月得暇當試之天覺亦不得書此君信意簡率乃其常態未可以疎數為厚薄也酒法是用菉豆為麯者耶亦曽見説來不曽録得方如果佳録示亦幸又叠䝉寄恵酒醋麵等一一收檢愧荷不可言不得即時裁謝想仁明必能恕察老媳婦得疾初不輕今已安矣不煩留念食隔已納武昌呉尉處矣適少冗不敢稽留來使少間别奉狀次又見天覺書中言當世云馮君有一學服朱砂法甚竒惟康叔可以得之不知曽得未若果得不知能見傳否想扵不肖不惜也又今日偶讀國史見杜羔一事頗與公相類嗟嘆不足故書以奉寄然幸勿示人恐有嫌者江令乃爾深可罪然猶望公憐其才短不逮而已屢有干凟䝉不怪幸甚幸甚其令章憲今日恐到此知之杜羔有至性其父河北一尉而卒母非嫡經亂不知所之會堂兄兼為澤潞判官嘗鞫獄扵私第有老婦辯對見羔出入竊語人曰此少年狀類吾夫訊之乃羔母也自此迎侍而歸又往訪先人之墓邑中故老已盡不知所在館扵佛寺日夜悲泣忽視屋柱煤烟之下見數行書拂而視之乃父遺迹云我子孫若求吾墓當於某村家問之羔哭而往果有老父年八十餘指其丘隴因得歸𦵏羔官至工部尚書致仕此出唐李肇國史補近偶觀書嘆其事頗與朱康叔同相似因書以遺之元豐三年九月二十五日記又近日隨例紛冗有疎上問不審起居何如兩日來武昌如聞公在告何也豈尊候小不佳乎無由躬間左右但有馳系冬深寒澁尤宜慎䕶又章質夫求琵琶歌詞不敢不寄呈安行言有一既濟鼎様在公處若鑄造時幸亦見為作一枚不用甚大者不罪不罪前日人還曽附古木叢竹兩紙必已到今已寫得經藏碑附上令子推官侍下計安勝何時赴任未敢拜書也與胡深夫五首某啓自聞下車日欲作書紛冗衰病因循至今叠辱書誨感愧交集比日起居佳勝未縁瞻奉伏望以時保練又乍到整葺想勞神用浙西數郡例被霪雨颶風之患而秀之官吏獨以為無灾以故紛紛至此公下車倍加綏撫不惜髙價廣糴以為嗣歲之備憲司行文欲収糴米此最良䇿而㩁户専斗所不樂故妄造言語聰明所照必不摇也病中手字不謹又某乆與周知録兄弟逰其文行才器實有過人不幸遭䘮生計索然未能東歸九江託迹治下竊謂仁明必有以安之不在多言今託栁令咨白冗中不盡區區又彦霖之政光絶前後君復為僚可喜船斬新輟借知之冗中不一又某以衰病紛冗裁書不謹惟恕察王京兆因會幸致區區乆不發都下朋舊書必不罪也朱行中舍人四首某啓别後兩奉状想一一聞逹比日履兹春和台候勝常某留滯贑上以待春水至此月末乃發瞻望惋悵南海雖外然雅量固有以處之矣詩酒之樂恨不日陪接也更冀若時為國保練不宣某再拜又某已得舟尚在贑石之下若月末不至當乘小舟往就之買公用人以節級持所齎錢竄去又以疾疫氣多死亡以此求還亦官舟無用多人故悉遣回皆以指揮嚴切甚得力乞知之適少冗馳問不盡區區某再拜又少事不當上煩東筦資福長老祖堂者建五百羅漢閣極宏麗營之十年今成矣某近為作記公必見之塗中為告文安國篆額甚妙今封附去人公若欲觀拆開不妨却乞差一公人齎附祖堂者不罪某再拜又某啓蒙眷厚借搬行李人感愧不在言也但節級朱立者無狀侵漁不已又遂竄去林聰者又歐平人㡬死見禁幸所歐者漸安决不死耳此中多言於法有礙不可帶去故輒牒䖍云得明公書令某遣還多難畏事想必識此心也買公用人於法無礙故仍舊帶去此二十餘人皆謹力不作過望不賜罪窮途作事皆此類慙怍不可言得二座船不失所幸不貽念陋句數首端欲發一笑耳某再拜與李之儀五首某年六十五矣體力毛髪正與年相稱或得復與公相見亦未可知也前者皆夢已後者獨非夢乎置之不足道也所喜者在海南了得易書論語傳數十巻似有益扵骨朽後人耳目也少逰遂卒於道路哀哉痛哉世豈復有斯人乎端叔亦老矣迨云鬚髮已皓然然顔極丹且渥僕亦正如此各宜閟嗇庻㡬復見也兒姪軰在治下頻與教督一書幸送與某大醉中不成字不罪不罪又某啓契濶八年豈謂復有見日漸近中原辱書尤數喜出望外比日起居佳勝某已得舟决歸許如所教而長子邁遽捨去深以為恨報除輦運似亦不惡近日除目時有如人所料者此後端叔必已信安矣但老境少安餘皆不足道乍熱萬萬以時自愛某再拜又某以囊装罄盡而子由亦久困無餘故欲就食淮浙已而深念老境知有㡬日不可復作兩處又得子由書及教語尤切已决歸許下矣但須少留儀真令兒子往宜興刮制變轉往還須月餘約至許下巳七月矣去歲在㢘州託孫叔静寄書及小詩達否叔静云端叔一生坎坷晚節益牢落正賴漁軒賢徳能委曲相順適以忘百憂此豈細事不爾人生豈復有佳味乎叔静相友想得其詳故輒以奉慶忝契不罪又近孫叔静奉書逺遞得達否比來尊體如何眷聚各安勝某䝉恩領真祠世間美任復有過此者乎伏惟君恩之重不可量數遥知朋友為我喜而不寐也今已到䖍即往淮浙間居處多在毗陵也子由聞已歸許秉燭相對非夢而何一書乞便與餘惟萬萬自愛某再拜又某啓辱書多矣無不達者然不一荅非特衰病簡懶之過實以罪垢深重不忍更以無益寒温之問玷累知交然竟不免累公慙負不可言比日承以赴潁昌伏惟起居佳勝眷聚各安慶某移永州過五羊度大庾至吉出陸由長沙至永荷叔静拏舟相送數十里大浪中作此書上問無他祝惟保愛之外酌酒與婦飲尚勝俗侣對梅二丈詩云耳與馮祖仁四首某慰疏言伏承艱疚退居久矣日月逾邁衰痛理極未嘗獲陳區區少解思慕萬一實以漂寓窮荒人事斷絶非敢慢也比辱手疏且審孝履支持廓然逾逺追痛何及伏惟俯禮適變寛中强食謹奉慰疏不次又蒙示長牋粲然累幅光彩下燭衰朽增華但以未拜告命不敢具啓荅謝感怍不可言喻老瘁不復疇昔但偶未死耳水道間關寸進更二十餘日方至曲江首當詣宇下區區非面不既乏人寫大狀不罪手拙簡略不次又昨日辱逺迓喜慰難名客散己夜不能造門蚤來又聞已走松楸未敢上謁領手教愧悚無地至節想惟孝思難堪奈何來日當往謁慰節晨蒙惠羊邊酒壺仁者之餽謹以薦先感佩不可言也又兩日不果詣見伏計孝履如宜欲告借前日盛會包子厨人一日告白朝散絶早遣至不罪不罪家人軰欲逰南山祖仁若無事可能同到彼閒行否與黄師是行計屢改近者㓜累舟中皆伏暑自愍一年在道路矣不堪復入汴出陸又聞子由亦窘用不忍更以三百指諉之已决意旦夕渡江過毗陵矣荷憂愛至深故及之子由一書政為報此事乞蚤與達之塵埃風葉滿室隨掃隨有然不可廢掃以為賢於不掃也若知本無一物又何加焉有詩録呈簾巻牕穿户不扄隙塵風葉任縦横幽人睡足誰呼覺欹枕牀前有月明一笑一笑某再拜與廣西憲曹司勲五首某啓奉别忽二載犇走南北不暇附書申問子由轉附到天門冬煎故人於我至矣日夜服食㡬月遂盡之到惠州又遞中領手書懶廢已放不即裁謝死罪死罪又一云與林天和某啓専人辱書仰服眷厚仍審比来起居清勝至慰至慰長子未得耗小兒數日前往河源獨幹築室極為勞冗承恵芽蕉數品有未嘗識者幸得徧嘗感愧不已怱怱奉謝又某啓數日稍稍清冷伏惟起居佳勝構架之勞少休暇思企清論日積滯念尚冀保衞區區之至因吳子野行附啓不宣又某啓専人至賜教累幅慰拊周至且審比來起居佳勝感慰兼至某得罪幾二年矣愚陋貪生輒縁聖主寛貸之慈灰心槁形以盡天年即目殊健也公别後微疾盡去想今益康佳養生亦無他術安寢無念神氣自復知吕公讀華嚴有得固所望於斯人也居閒偶念一事非吾子方莫可告者故崇儀陳侯忠勇絶世死非其罪廟食西路威靈肅然願公與程之邵議之或同一陳乞載祀典使此侯英魄少信眉於地中如何如何然慎勿令人知不肖有言也陳侯有一子在髙郵白首頗有立知之蒙恵竒茗丹砂烏藥敬餌之矣西路洞丁足制交人而近歲綏馭少方殆不可用願為朝廷熟講之此外惟萬萬自重又公勸某不作詩又却索近作閒中習氣不免有一二然未嘗傳出也今録三首奉呈看畢便毁之切祝千萬恵州風土差厚山水秀邃食物粗有但少藥耳近報有永不叙復指揮正坐穏處亦且任運也子由頻得書甚安某惟少子隨侍餘皆在宜興見今全是一行脚僧但吃些酒肉耳此書此詩只可令之邵一閲餘人勿視也與晦夫一云與趙仲修某啓辱荅教感服風月之約敢不敬諾庾公南樓所謂老子於此興復不淺便當携被往也與范夣得八首某啓一别俯仰十五年所喜君子漸用足為吾道之慶比日起居何如某旦夕南遷後會無期不能無悵惘也過揚見東平公極安行復見之矣新著必多無縁借觀為耿耿耳乍暄惟順候自重因李豸秀才行附啓上問不宣又某啓辱教字起居佳勝郊外路逺不當更煩屈臨可且寢處耳有事以書垂喻可也界紙望示及來日自不出只在舟中静坐恵貺鳳團感眷意之厚熱甚不謹又某啓辱教承台候康勝為恵得請知幸以未謝尚稽詣見竦息竦息子功復舊物甚慰衆望來日方往浴室也人還怱卒不宣又某啓不肖所得寡薄惟公愛念以道義相期眷予無窮既承感戀不可言乍寒不審起居休否某已次陳橋瞻望益逺惟萬萬以時自重又今日謁告不克往見辱教伏承文體佳勝楊君舉家人服其藥多効亦覺其穏審然近見王定國云張安道書云曽下疎藥數日不能食又謝之不滿意然不知果爾否有聞不敢不盡又某啓辱手柬且審起居佳勝為慰和篇髙絶木與種者皆被光華矣幸甚幸甚舊句竒偉試當強勉繼作怱怱不宣又某啓違逺二年瞻仰為勞辱書承起居佳勝慰喜可量覲罷當往造門併道區區又某啓昨日方叔處領手誨今又辱書備増感慰乍冷台候勝常未由詣見但有欽仰怱怱上啓與李無悔某啓久留浙中過辱存顧最為親厚既去又承追餞最逺自惟衰拙衆所鄙棄自非風義之篤何以至此既别但有思詠兩辱書教具審起居佳勝今歲科舉聞且就鄉里承示喻進取之意甚倦盛時美才何遽如此且勉之决取為望新文不惜見寄未縁集會惟萬萬自重不宣與李公擇某啓兩日連見怱怱竟何言暄和起居何如夷中送王徐州詩有見及語方是時人以相識為諱欲一見面道此為笑竟不見可太息也適所白是宗人棫雅州幕不一一與陳懐立昨日辱訪感怍不已經宿起居佳勝蒙借示子明傳神筆勢精妙髣髴莫辨恐更有别本願得一軸使觀者動心駭目也嶺海濶絶不謂生還復得瞻奉慰幸之極比日履此秋凉起居佳勝少選到岸即伏謁以盡區區與孫叔静七首昨日辱臨顧夙昔之好不替有加感嘆深矣屬飲藥汗後不可以風未即詣謝又枉使旌重增悚惕捧手教且審尊體佳勝旦夕造謁以究所懐又辱手教伏審晚來起居佳勝恵示珠攬頃所未見非獨下視沙塘矣應當一笑羊麫酒醋為恵禮意兼厚敬己拜賜感佩之極又前日辱下顧尚未走謝悚息不己捧手教承起居佳勝卑體尚未清快坐阻談論為悵惘也惠示妙劑及方獲之幸甚従此衰疾有瘳矣又已别瞻企不去心辱手教且審佳勝感慰之極早來風起舟不敢觧故復少留因來浄惠與惠州三道人語耳無縁重詣臨紙惋悵又令子重承訪及不暇往别為愧深矣珍恵菜膳增感怍也河源藤己領衰疾可恃矣又睂山人有巢谷者字元修曾應進士武舉皆無成篤於風義已七十餘矣聞某謫海南徒歩萬里來相勞問至新興病亡官為藁殯録其遺物於官庫元修有子蒙在里中某已使人呼蒙來迎䘮頗助其路費仍約過永而南當更資之但未到耳旅殯無人照管或毁壊暴露願公愍其不幸因廵檢至其所特為一言於彼守令得稍修治其殯常戒主者保䕶之以須其子之至則恩及存亡耳死罪死罪又去徳彌月思仰縈懐比日履此新陽起居増勝行路百阻至英方再宿矣少留數日此去尤艱閡借舟未知能達韶否流行坎止輒復任縁不煩深念也後會未卜惟萬萬為國自重荅劉貢父二首乆濶暫聚復此違異悵惘至今公私紛紛有失馳問辱書感怍無量字畫妍㓗及問來使云尊貌比初下車時晢且澤矣聞之喜甚比來起居想益佳何日歸覲慰士大夫之望未間萬萬為時自重不宣又某忝冒過甚出於素奨然迂拙多忤而處争地不敢作乆安計兄當有以教督之血指汗顔旁觀之説奈何奈何舉官之事有司逃失行之罪歸咎於兄清明在上豈可容此小子何與焉茯苓松脂雖乏近効而歲計有餘未可棄也黙坐反照瞑目數息當記别時語耶荅曽子宣三首某啓流落江湖晚復叨遇惟公知炤如一日也孤愚寡與日親髙誼謂可永乆不謂尚煩藩翰之寄違濶以來思仰日深辱書教伏審履兹秋涼台候萬福欣慰之極二聖思治求人如不及公豈久外惟千萬為國順時自愛又自公之西有識日望詔還豈獨契愛之末邉落寧肅公豈乆外哉示諭塔記久不馳納愧恐之極乞少寛之秋涼下筆也親家柳子良宣徳赴潞幕獲在屬城知幸知幸謹奉手啓冗廹不盡區區又某啓辱教伏承台候萬福為慰塔記非敢慢蓋供職數日職事如麻歸則為詞頭所廹卒以夜半乃息五更復起實未有餘暇乞限一月所敢食言者有如河碩公一笑而恕之旦夕當卜一邂逅而别與李公擇秋色佳哉想有以為樂人生惟寒食重九慎不可虛擲四時之變無如此節者近有潮州人寄一物其上云扶劣膏不言何物狀似羊脂而堅盛竹筒中公識此物否味其名必佳物也若識之當詳以示可分去或問習海者子由近作棲賢僧堂記讀之惨凛覺崩崖飛瀑逼人寒栗與姜唐佐秀才六首某啓特辱逺訪意貺甚重衰朽廢放何以獲此悚汗不已經宿起居佳勝長箋詞義兼美窮陋增光病卧不能裁荅聊奉手啓又某啓昨日辱夜話甚慰孤寂示字承起居佳勝竒荈佳恵感服至意當同啜也適睡不即荅悚息某頓首又今日霽色尤可喜食已當取天慶觀乳泉潑建茶之精者念非君莫與共之然早來市無肉當相與啖菜飯耳不嫌可只今相過某啓上又適寫此簡得來示知廵檢有會更不敢邀請會若散早可來啜茗否酒麫等承佳惠感愧來旦必如諾十月十五日白又某啓别來數辱問訊感怍至意毒暑具喜起居佳勝堂上嘉慶甚慰所望也知非久適五羊益廣學問以卒逺業區區之禱此外萬萬自重不宣又某已得合浦文字見治装不過六月初離此只従石排或澄邁渡海無縁更到瓊會見也此懐甚惘惘因見二車略道下懇有一書至兒子邁處従者往五羊時為帶去轉託何崇道附達為幸兒子治装冗甚不及奉啓所借烟蘿子兩巻吳志四册會要兩册並馳納與傅維巖秘校四首某啓専人至承不鄙罪廢長箋見及援證古今陳義甚髙伏讀愧感仍審比來起居佳勝至慰至慰守局海徼淹屈才美然仕無髙下但能隨事及物中無所愧即為達也伏暑萬萬自愛不宣又衰病裁荅草草不訝知不乆美解即獲會見至喜至喜掩骼之事知甚留意旦夕再遣馮何二士面禀亦有錢物在二士處此不覼縷曽城荔子一籃附去人持上不罪不罪某又上又某啓逺䝉惠書非眷念之厚何以及此仍審比來起居佳勝感慰兼集老病之餘復此窮獨豈有再見之期尚冀勉進學問以究逺業餘萬萬自愛不宣又官事有暇得為學不輟否有可與往還者乎此間百事不類海北但杜門面壁而已彼中如有粗藥治病者為致少許此間如蒼术橘皮之類皆不可得但不嫌粗賤為相度致數品不罪不罪與林天和長官二十三首某啓近辱手書冗中不果即荅悚息悚息春寒想體中佳勝火後凢百想勞神用勤民之意計不倦也末由披奉萬萬自愛不宣又某啓専人辱書具審起居佳勝為慰春物益妍時復尋賞否想亦以雨軫懐也末由往見萬萬若時加攝不宣又兒子往循已數日矣賤累閏月初可到此新居旦夕畢工承問及感感不已領書又惠筍蕨益用愧刻聞相度移邑果爾否又某啓辱手教伏承起居佳勝甚慰馳仰承問賤累正月末已到贑上矣閏月上旬必到此也考室勞費乃老業也旦夕遷入末由會見萬萬以時自重不宣又花木栽感留意恵貺鹿肉尤増慚荷某又上又某啓近數奉書想皆達雨後清和起居佳勝花木悉佳品又根撥不傷遂成幽居之趣荷雅意無窮未即面謝為媿耳人還怱怱不宣又某啓昨辱訪别尤荷厚眷恨老病龍鍾不果詣達愧負多矣經宿起居何如果成行未忘已為民誰如君者願益進此道譬之農夫不以水旱而廢藨蓘也此外萬萬自愛不宣又某啓比日蒸熱體中佳否承恵楊梅感佩之至聞山薑花欲出録夢得詩去庶致此餽也呵呵豐樂橋數木匠請假暫歸多日不至敢煩㫖麾勾押送來為幸草草奉啓不罪又某啓人來辱書具審比日尊體佳勝甚慰所望出意加減秧馬曲盡其用非拊字究心何以得此具白太守矣乍熱萬萬以時加嗇不宣又某啓人來辱手教具審起居佳勝吏民恵愛謡頌布聞甚慰所望秧馬聊助美政萬一耳何足云乎承示喻愧悚之至僧磨已成秋凉當往觀也毒熱萬萬為民自愛不宣又某啓辱教承微疾已平起居清勝甚慰馳仰暑雨不常官事疲勩攝衞為難惟加意節調以時休息為佳也怱怱不宣又某啓多日不奉書思仰之至伏暑尊體何如惠貺荔子極佳郡中絶少得與數客同飲幸甚幸甚未由會合萬萬以時自愛某再拜又某啓辱手教承起居佳勝乆以冗率有闕馳問愧企深矣承恵龍眼牙蕉皆郡中所乏感怍之至未由瞻奉萬萬以時自重不宣又髙君一臥遂化深可傷念其家不失所否瘴疫横流僵仆者不可勝計奈何奈何某亦旬日之間䘮兩女使謫居牢落又有此狼狽想聞之亦為之撫然也某再啓又某啓近日辱書伏承别後起居佳勝甚慰馳仰數夕月色清絶恨不同賞想亦對景獨酌而已未即披奉萬萬自重人還布啓不宣又某啓近辱過訪病中恨不欵奉人來枉手教具審起居佳勝至慰至慰旦夕中秋想復佳風月莫由陪接増悵仰也乍凉萬萬自重不宣又某啓人還奉書必達即候漸凉起居佳否叠煩頥㫖感怍交深未縁面謝惟祝若時自重不宣又某啓秋髙氣爽伏計尊候清勝公宇已就想日有佳思未縁披奉萬萬以時珍嗇不宣又某啓前日人回裁謝必逹比日履兹薄冷起居佳否未縁展奉但有翹想尚冀保衞區區之至不宣又某啓近奉狀知入山未還即日想已還治起居佳否往來衝冒然勝遊計不為勞也未瞻奉間更乞若時自重不宣又某啓辱書伏承起居佳勝示諭㓜累己到城流寓中一喜然老穉紛紛口衆食貧向之孤寂未必不佳也可以一笑蒸鬱未解萬萬以時自重不宣骨肉逺至重為左右費羊麫鱸魚已拜賜矣感怍之至又某啓従者往還見過皆不欵奉愧仰何勝辱書承起居清勝聞還邑以來老穉鼓舞數日調治想服清暇矣歲莫萬萬加愛不宣又某啓昨日江干邂逅未盡所懐來日欲奉屈早膳庶少欵曲闕人不獲躬詣不罪與張朝請五首某啓兄弟流落同造治下蒙不鄙遺眷待有加感服髙誼悚佩不已别來未㡬思仰日深比來起居何如某已到瓊過海無虞皆託餘庇旦夕西去回望逾逺後會無期惟萬萬以時自重慰此區區途次裁謝草草不宣又海南風物與治下略相似至餘食物人烟蕭條之甚去海康逺矣到後杜門黙坐喧寂一致也蒙差人津送極得力感感舍弟居止處若得蚤成令渠獲一定居遺物離人而逰於獨乃公之厚賜也兒子幹事未暇上狀不罪某上啓又某再啓聞已有詔命甚慰輿議想旦夕登途也當别具賀幅某闕人寫啓狀止用手書乞加恕也子由荷存庇深矣不易一二言謝也新書海上嘯咏之餘有足樂者島中孤寂春色所不到也某再拜又某啓乆不上狀想察其衰疾多畏非簡慢也新軍使來捧教字且審比日起居佳勝感慰兼極某到此數卧病今幸少間久逃空谷日就灰稿而已因書瞻望又復悵然尚冀若時自厚區區之餘意也不宣又新釀四壺開嘗如宿昔香味醇冽有京洛之風逐客何幸得此但舉杯屬影而已海錯亦珍絶此雖島外人不收此得之又一段竒事也眷意之厚感怍無已荅漢卿某啓辱教承起居佳勝為慰知不乆入城遂當一見何幸如之地黄煎已領感怍適自局中還熱甚懣塞奉書地黄煎蒙寄恵極佳薑蜜之劑甚適宜也仰煩神用愧感不可言東坡全集巻七十八
