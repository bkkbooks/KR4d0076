body:
  text: 東坡全集卷七十二宋蘇軾撰書十一首上梅直講書某官執事某每讀詩至鴟梟讀書至君奭常竊悲周公之不遇及觀史見孔子厄於陳蔡之間而絃歌之聲不絶顔淵仲由之徒相與問答夫子曰匪兕匪虎率彼曠野吾道非邪吾何為於此顔淵曰夫子之道至大故天下莫能容雖然不容何病不容然後見君子夫子油然而笑曰回使爾多財吾為爾宰夫天下雖不能容而其徒自足以相樂如此乃今知周公之富貴有不如夫子之貧賤夫以召公之賢以管蔡之親而不知其心則周公誰與樂其富貴而夫子之所與共貧賤者皆天下之賢才則亦足與樂乎此矣軾七八嵗時始知讀書聞今天下有歐陽公者其為人如古孟軻韓愈之徒而又有梅公者從之逰而與之上下其議論其後益壯始能讀其文詞想見其為人意其飄然脫去世俗之樂而自樂其樂也方學為對偶聲律之文求斗升之祿自度無以進見於諸公之間來京師逾年未嘗窺其門今年春天下之士羣至於禮部執事與歐陽公實親試之誠不自意獲在第二既而聞之人執事愛其文以為有孟軻之風而歐陽公亦以其能不為世俗之文也而取焉是以在此非左右為之先容非親舊為之請屬而嚮之十餘年間聞其名而不得見者一朝為知巳退而思之人不可以茍富貴亦不可以徒貧賤有大賢焉而為其徒則亦足恃矣茍其僥一時之幸從車騎數十人使閭巷小民聚觀而贊歎之亦何以易此樂也傳曰不怨天不尤人蓋優哉遊哉可以卒嵗執事名滿天下而位不過五品其容色溫然而不怒其文章寬厚敦朴而無怨言此必有所樂乎斯道也軾願與聞焉上韓太尉書軾生二十有二年矣自七八嵗知讀書及壯大不能曉習時事獨好觀前世盛衰之迹與其一時風俗之變自三代以來頗能論著以為西漢之衰其大臣守尋常不務大略東漢之末士大夫多竒節而不循正道元成之間天下無事公卿將相安其祿位顧其子孫各欲樹私恩買田宅為不可動之計低回畏避以苟嵗月而皆依倣儒術六經之言而取其近似者以為口實孔子曰惡居下流而訕上惡訐以為直劉歆谷永之徒又相與彌縫其闕而緣飾之故其衰也靡然如蛟龍釋其風雲之勢而安於豢畜之樂終以不悟使其肩披股裂登於匹夫之爼豈不悲哉其後桓靈之君懲往昔之弊而欲樹人主之威權故頗用嚴刑以督責臣下忠臣義士不容於朝廷故羣起於草野相與力為險怪驚世之行使天下豪俊奔走於其門得為之執鞭而其自喜不啻若卿相之榮於是天下之士囂然皆有無用之虛名而不適於實效故其亡也如人之病狂不知堂宇宫室之為安而號呼奔走以自顛仆昔者太公治齊舉賢而尚功周公曰後世必有篡弒之臣周公治魯親親而尊尊太公曰後世浸微矣漢之事迹誠大類此豈其當時公卿士大夫之行與其風俗之剛柔各有以致之邪古之君子剛毅正直而守之以寬忠恕仁厚而發之以義故其在朝廷則士大夫皆自洗濯磨淬戮力於王事而不敢為非常可怪之行此三代王政之所由興也曾子曰上失其道民散久矣天下之人幸而有不為阿附苟容之事者則務為倜儻矯異求如東漢之君子惟恐不及可悲也已軾自幼時聞富公與太尉皆號為寬厚長者然終不可犯以非義及來京師而二公同時在兩府愚不能知其心竊於道塗望其容貌寬然如有容見惡不怒見善不喜豈古所謂大臣者歟夫循循者固不能有所為而翹翹者又非聖人之中道是以願見太尉得聞一言足矣太尉與大人最厚而又嘗辱問其姓名此尤不可以不見今已後矣不宣軾再拜上富丞相書軾聞之進說於人者必其人之有間而可入則其說易行戰國之人貪天下之士因其貪而說之危國之人懼天下之士因其懼而說之是故其說易行古之人一說而合至有立談之間而取公相者未嘗不始於戰國危國何則有間而可入也居今之世而欲進說於明公之前不得其間而求入焉則亦可謂天下之至愚無知者矣地方萬里而制於一姓極天下之尊而盡天下之富不可以有加矣而明公為之宰四夷不作兵革不試是明公無貪於得而無懼於失也方西戎之熾也敵人乘間以跨吾北中國之大不畏而畏明公之一詞是明公之勇冠於天下也明公居於山東而傾河朔之流人父棄其子夫棄其妻而自歸於明公者百餘萬明公人人而食之旦旦而撫之此百萬人者出於溝壑之中而免於烏鳶豺狼之患生得以養其父母而祭其祖考死得以使其子孫葬埋祭祀不失其故常是明公之仁及於百世也勇冠於天下而仁及於百世士之生於世如此亦足矣今也處於至足之勢則是明公無復有所羡慕於天下之功名也五帝三代之事百家之書莫不盡讀禮樂刑政之大小兵農財賦之盛衰四海之內地理之逺近山川之險易物土之所宜莫不盡知當世之賢人君子與夫姦僞嶮詐之徒莫不盡究至於曲學小數茫昧戃恍而不可知者皆獵其華而咀其英泛其流而涉其源雖自謂當世之辨不能傲之以其所不知則是明公無復有所畏憚於天下之博學也名為天下之賢人而貴為天子之宰無貪於得而無懼於失無羡於功名而無畏於博學是其果無間而可入也天下之士果不可以進說也軾也聞之楚左史倚相曰昔衛武公年九十有五猶日針警於國曰自卿以下至於官師茍在朝者無謂我老耄而舍我朝夕以交戒我猶以為未也而作詩以自戒其詩曰抑抑威儀惟德之隅夫衛武公惟居於至足而日以為不足故其沒也諡之曰睿聖武公嗟夫明公豈以其至足而無間以拒天下之士則士之進說者亦何必其間之入哉不然軾將誦其所聞而明公試觀之夫天下之小人所為奔走輻輳於大人之門而為之用者何也大人得其全小人得其偏大人得其全故能兼受而獨制小人得其偏是以聚而求合於大人之門古之聖人惟其聚天下之偏而各收其用以為非偏則莫肯聚也是故不以其全而責其偏夫惟全者之不可以多有也故天下之偏者惟全之求今以其全而責其偏夫彼若能全將亦為我而已矣又何求焉昔者夫子亷潔而不為異衆之行勇敢而不為過物之操孝而不徇其親忠而不犯其君凡此者是夫子之全也原憲亷而至於貧公良孺勇而至於鬬曽子孝而徇其親子路忠而犯其君凡此者是數子之偏也夫子居其全而收天下之偏是以若此巍巍也若夫明公其亦可謂天下之全矣亷而天下不以為介直而天下不以為訐剛健而不為强敦厚而不為弱此明公之所得之於天而天下之所不可望於明公者也明公居其全天下效其偏其誰曰不可異時士大夫皆喜為卓越之行而世亦貴狡悍之才自明公執政而朝廷之間習為中道而務循於規矩士之矯飾力行為異者衆必共笑之夫卓越之行非至行也而有取於世狡悍之才非真才也而有用於天下此古之全人所以坐而收其功也今天下卓越之行狡悍之才舉不敢至於明公之門懼以其不純而獲罪於門下軾之不肖竊以為天下之未大治兵之未振財之未豐天下之有望於明公而未獲者其或由此也歟昔范公收天下之士不考其素茍可用者莫不咸在雖其狂狷無行之徒亦自效於下風而范公亦躬為詭特之操以震之夫范公之取人者是也其自為者非也伏惟明公以天下之全而自居去其短而襲其長以收功於無窮軾也西南之匹夫求斗升之祿而至於京師翰林歐陽公不知其不肖使與於制舉之末而發其猖狂之論是以輒進說於左右以為明公必能容之所進䇿論五十篇貧不能盡寫而致其半觀其大略幸甚上曾丞相書軾聞之將有求於人而其說不誠則難以望其有合矣世之竒特之士其處也莫不為異衆之行而其出也莫不為怪詭之詞比物引類以搖撼當世理不可化則欲以勢劫之將以術售其身古之君子有韓子者其為說曰王公大人不可以無貧賤之士居其下風而推其後大其聲名而久其傳雖其貴賤之闊絶而其相須之急不啻若左右手嗚呼果其用是說也則夫世之君子所為老死而不遇者無足怪矣今夫扣之者急則應之者疑其辭夸則其實必有所不副今吾以為王公大人不可以一日而無吾也彼將退而考其實則亦無乃未至於此耶昔者漢高未嘗喜儒而不失為明君衛霍未嘗薦士而不失為賢公卿吾將以吾之說而彼將以彼之說彼是相拒而不得其歡心故貴賤之間終不可以合而道終不可以行何者其扣之急而其詞夸也鬻千金之璧者不之於肆而願觀者塞其門觀者歎息而主人無言焉非不能言知言之無加也今也不幸而坐於五達之衢又呶呶焉自以為希世之珍過者不顧執其裾而强觀之則其所鬻者可知矣王公大人其無意於天下後世者亦安以求為也茍其不然則士之過於其前而有動於其目者彼將褰裳疾行而摟取之故凡皇皇汲汲者舉非吾事也昔者嘗聞明公之風矣以大臣之子孫而取天下之高第才足以過人而自視缺然常若不足安於小官而樂於恬淡方其在太學之中衣繒飯糗若將終身至於德發而不可掩名高而不可抑貴為天子之少宰而其自視不加於其舊之錙銖其度量宏逹至於如此此其尤不可以夸詞而急扣者也軾不佞自為學至今十有五年以為凡學之難者難於無私無私之難者難於通萬物之理故不通乎萬物之理雖欲無私不可得也已好則好之已惡則惡之以是自信則惑也是故幽居默處而觀萬物之變盡其自然之理而斷之於中其所不然者雖古之所謂賢人之說亦有所不取雖以此自信而亦以此自知其不悅於世也故其言語文章未嘗輒至於公相之門今也天子舉直諫之士而兩制過聽謬以其名聞竊以為與於此者皆有求於吾君吾相者也故輒有獻其文凡十篇而書為之先惟所裁擇幸甚應制舉上兩制書軾聞古者有貴賤之際有聖賢之分二者相勝而不可以相參其勢然也治其貴賤之際則不知聖賢之為高行其聖賢之分則不知貴賤之為差昔者子思孟軻之徒不見諸侯而耕於野比閭小吏一呼於其門則攝衣而從之至於齊魯千乘之君操幣執贄因門人以願交於下風則閉門而不納此非茍以為異而已將以明乎聖賢之分而不參於貴賤之際故其攝衣而從之也君子不以為畏而其閉門而拒之也君子不以為傲何則其分定也士之賢不肖固有之矣子思孟軻不可以人人而求之然而貴賤之際聖賢之分二者要以不可不知也世衰道喪不能深明於斯二者而錯行之施之不得其處故其道兩亡今夫軾朝生於草茅塵土之中而夕與於州縣之小吏其官爵勢力不足較於世亦明矣而諸公之貴至與人主揖讓周旋而無間大車駟馬至於門者逡巡而不敢入軾也非有公事而輒至於庭求以賔客之禮見於下執事固已獲罪於貴賤之際矣雖然當世之君子不以其愚陋而使與於制舉之末朝廷之上不以其疏賤而使奏其猖狂之論軾亦自忘其不肖而以為是兩漢之主所孜孜而求之親降色辭而問之政者也其才雖不足以庶幾於聖賢之間而學其道治其言則所守者其分也是故踽踽然而來仰不知明公之尊而俯不知其身之賤不由紹介不待辭讓而直言當世之故無所委曲者以為貴賤之際非所以施於此也軾聞治事不若治人治人不若治法治法不若治時時者國之所以存亡天下之所最重也周之衰也時人莫不茍偷而不立周雖欲其立而不可得也故周亡秦之衰也時人莫不貪利而不仁秦雖欲其仁而不可得也故秦亡西漢之衰也時人莫不柔懦而謹畏故君臣相䝉而至於危東漢之衰也時人莫不矯激而奮厲故賢不肖不相容以至於亂夫時者豈其所自為邪王公大人實為之軾將論其時之病而以為其權在諸公諸公之所好天下莫不好諸公之所惡天下莫不惡故軾敢以今之所患二者告於下執事其一曰用法太密而不求情其二曰好名太高而不適實此二者時之大患也何謂用法太密而不求情昔者天下未平而法不立則人行其私意仁者遂其仁勇者致其勇君子小人莫不以其意從事而不困於繩墨之間故易以有功而亦易以亂及其治也天下莫不趨於法不敢用其私意而惟法之知故雖賢者所為要以如法而止不敢於法律之外有所措意夫人勝法則法為虛器法勝人則人為備位人與法並行而不相勝則天下安今自一命以上至於宰相皆以奉法循令為稱其職拱手而任法曰吾豈得自由哉法既大行故人為備位其成也其敗也其治也其亂也天下皆曰非我也法也法之弊豈不亦甚矣哉昔者漢高之時留侯為太子少傅位於叔孫之後而周昌亦自御史大夫為諸侯相天下有緩急則功臣左遷而不怨此亦知其君臣之歡不以法而相持也今天下所以任法者何也任法生於自疑自疑生於多私惟天下之無私則能於法律之外有以效其智何則其自信明也夫唐永泰之間姦臣執政政以賄成德宗發憤而用常衮衮一切用法四方奏請莫有獲者然天下否塞賢愚不分君子不以為能也崔祐甫為相不至朞年而除吏八百多其親舊或者以為譏祐甫曰不然非親與舊則安得而知之顧其所用如何爾君子以為善用法今天下泛泛焉莫有深思逺慮者皆任法之過也何謂好名太高而不適實昔者聖人之為天下使人各致其能以相濟也不一則不專不專則不能自堯舜之時而伯夷后䕫稷契之倫皆不過名一藝辦一職以盡其能至於子孫世守其業而不遷䕫不敢自與於知禮而契不敢自任於播種至於三代之際亦各輸其才而安其習以不相犯躐凡書傳所載者自非聖人皆止於名一藝辦一職故其藝未嘗不精而其職未嘗不舉後世之所希望而不可及者由此故也下而至於漢其君子各務其所長以相左右故史之所記武宣之際自公孫魏邴以下皆不過以一能稱於當世夫人各有才才各有小大大者安其大而無忽於小小者樂其小而無慕於大是以各適其用而不喪其所長及至後世上失其道而天下之士皆有侈心耻以一藝自名而欲盡天下之能事是故喪其所長而至於無用今之士大夫其實病此也仕者莫不談王道述禮樂皆欲復三代追堯舜終於不可行而世務因以不舉學者莫不論天人推性命終於不可䆒而世教因以不明自許太高而措意太廣太高則無用太廣則無功是故賢人君子布於天下而事不立聼其言則侈大而可樂責其效則汗漫而無當此皆好名之過深惟古之聖賢建功立業興利捍患至於百工小民之事皆有可觀不若今世之因循鹵莽其故出於此二者歟伏惟明公才略之宏偉度量之寬厚學術之廣博聲名之煒燁冠於一時而振於百世百世之所望而正者意有所向則天下奔走而趨之則其愍時憂世之心或有取於斯言也軾將有深於此者而未敢言焉不宣軾再拜上劉侍讀書軾聞天下之所少者非才也才滿於天下而事不立天下之所少者非才也氣也何謂氣曰是不可名者也若有鬼神焉而隂相之今夫事之利害計之得失天下之能者舉知之而不能辦能辦其小而不能辦其大則氣有所不足也夫氣之所加則已大而物小於是乎受其至大而不為之驚納其至繁而不為之亂任其至難而不為之憂享其至樂而不為之蕩是氣也受之於天得之於不可知之間傑然有以蓋天下之人而出萬物之上非有君長之位殺奪施與之權而天下環向而歸之此必有所得者矣多才而敗者世之所謂不幸者也若無能焉而每以成者世之所謂天幸者也夫幸與不幸君子之論不施於成敗之間而施於窮逹之際故凡所以成者其氣也其所以敗者其才也氣不能守其才則焉往而不敗世之所以多敗者皆知求其才而不知論其氣也若夫明公其亦有所得矣軾非敢以虛辭而曲說誠有所見焉耳夫天下有分得其分則安非其分而以一毫取於人則羣起而爭之天下有無窮之利自一命以上至於公相其利可愛其塗甚夷設為科條而待天下之擇取然天下之人翹足企首而羣望之逡巡而不敢進者何也其分有所止也天下有無功而遷一級者則衆指之矣遷者不容於下遷之者不容於上而况其甚者乎明公起於徒步之中執五寸之翰書方尺之簡而列於士大夫之上橫翔捷出冠壓百吏而為之表猶以為未也而加之師友之職付之全秦之地地方千里則古之方伯連帥所不能有也東障崤澠北跨河渭南倚巴蜀西控戎夏則古之秦昭王商君白起之徒所以殣身殘民百戰而有之者也奮臂而取兩制不十餘年而天下不以為速非有汗馬之勞米鹽之能以擅富貴之美而天下不以為無功抗顔高議自以無前而天下不以為無讓此其氣固有以大服於天下矣天下無大事也天下而有大事非其氣之過人者則誰實辦之軾逺方之鄙人遊於京師聞明公之風幸其未至於公相而猶可以誦其才氣之盛美而庶幾於知言惜其將遂西去而不得從也故請間於門下以願望見其風采不宣軾再拜上韓魏公論場務書軾再拜獻書昭文相公執事軾得從宦於西嘗以為當今制置西事其大者未便非痛整齊之其勢不足以久安未可以隨欹而拄隨壞而補也然而其事宏闊浩汗非可以倉卒輕言者今之所論特欲救一時之急解朝夕之患耳往者寶元以前秦人之富强可知也中户不可以畝計而計以頃上戶不可以頃計而計以賦耕於野者不願為公侯藏於民家者多於府庫也然而一經元昊之變氷消火燎十不存三四今之所謂富民者嚮之僕𨽻也今之所謂蓄聚者嚮之殘棄也然而不知昊賊之遺種其將永世而臣伏邪其亦有時而不臣也以向之民力堅完百倍而不能支以今之傷殘之餘而能辦者軾所不識也夫平安無事之時不務多方優裕其民使其氣力渾厚足以勝任縣官權時一切之政而欲一旦納之於患難軾恐外憂未去而內憂乘之也鳯翔京兆此兩郡者陜西之囊槖也今使有變則緣邊被兵之郡知戰守而已戰而無食則北守而無財則散使戰不北守不散其權固在此兩郡也軾官於鳯翔見民之所最畏者莫若衙前之役自其家之甕盎釜甑以上計之長役及十千鄉戶及二十千皆占役一分所謂一分者名為糜錢十千可辦而其實皆十五六千至二十千而多者至不可勝計也科役之法雖始於上戶然至於不足則遞取其次最下至於家資及二百千者於法皆可科自近嵗以來凡所科者鮮有能大過二百千者也夫為王民自甕盎釜甑以上計之而不能滿二百千則何以為民今也及二百千則不免焉民之窮困亦可知矣然而縣官之事嵗以二千四百分為計所謂優輕而可以償其勞也不能六百分而捕獲强惡者願入焉擲發贓弊者願入焉是二千四百分者衙前之所獨任而六百分者未能純被於衙前也民之窮困又可知矣今之最便惟重難日損優輕日增則民尚可以生此軾之所為區區議以官𣙜與民也其詳固已具於府之所録以聞者從軾之說而盡以豫民失錢之以貫計者軾嘗粗較之嵗不過二萬失之於酒課而償之於稅緡是二萬者未得為全失也就使為全失二萬均多補少要以共足此一轉運使之所辦也如使民日益困窮而無告異日無以待倉卒意外之患則雖復嵗得千萬無益於敗此賢將帥之所畏也軾以為陛下新御宇內方求所以為千萬年之計者必不肯以一轉運使之所能辦而易賢將帥之所畏况於相公才略冠世不牽於俗人之論乃者變易茶法至今以為不便者十人而九相公尚不顧行之益堅今此事至小一言可决去嵗赦書使官自買木關中之民始知有生意嚮非相公果斷而力行必且下三司三司固不許幸而許必且下本路本路下諸郡或以為可或以為不可然而監司類聚其說而參酌之比復於朝廷固已朞嵗矣其行不行又未可知也如此而民何望乎方今山陵事起日費千金軾乃於此時議以官𣙜與民其為迂闊取笑可知矣然竊以為古人之所以大過人者惟能於擾攘急迫之中行寬大閒暇久長之政此天下所以不測而大服也朝廷自數十年以來取之無術用之無度是以民日困官日貧一旦有大故則政出一切不復有所擇此從來不革之過今日之所宜深懲而永慮也山陵之功不過嵗終一切之政當訖事而罷明年之春則陛下逾年即位改元之嵗必將首行王道以風天下及今使郡吏議之減定其數當復以聞則言之今其時矣伏惟相公留意千萬幸甚上蔡省主綸放缺書軾於門下蹤迹絶疏然私自揆度亦似見知於明公者尋常無因緣固不敢造次致書今既有所欲言而又默默拘於流俗人之議以為跡疏不當干說則是謂明公亦如凡人拘於疏密之分者竊以為不然故輒有所言不顧惟少留聽軾於府中實掌理缺自今嵗麥熟以來日與小民結為嫌恨鞭笞鎖繫與縣官日得千百錢固不敢憚也彼實侵盜欺官而不以時償雖日撻無愧然其間有甚足悲者或管押竹木風水之所漂或主持糧斛嵗久之所壞或布帛惡弱估剝以為虧官或糟滓潰爛紐計以為實缺或未輸之贓責於當時主典之吏或敗折之課均於保任干繫之家官吏上下舉知其非辜而哀其不幸迫於條憲勢不得釋朝廷亦深知其無告也是以每赦必及焉凡今之所追呼鞭撻日夜不得休息者皆更數赦逺者六七赦矣問其所以不得釋之狀則皆曰吾無錢以與三司之曹吏以為不信而考諸蒨籍則有事同而先釋者矣曰此有錢者也嗟夫天下之人以為言出而莫敢逆者莫若天子之詔書也今詔書且已許之而三司之曹吏獨不許是猶可忍邪伏惟明公在上必不容此輩故敢以告凡四十六條二百二十五人錢七萬四百五十九千粟米三千八百三十斛其餘炭鐵器用材木冗雜之物甚衆皆經監司選吏詳定灼然可放者軾已具列聞於本府府當以奏奏且下三司議者皆曰必不報雖報必無决然了絶之命軾以為不然往年韓中丞詳定放缺以為赦書所放必待其家業蕩盡以至於干繫保人亦無孑遺可償者又當計赦後月日以為放數如此則所及甚少不稱天子一切寬貸之意自今茍無所隱欺者一切除免不問其他以此知今之所奏者皆可放無疑也伏惟明公獨斷而力行之使此二百二十五家皆得歸安其藜糗養其老幼日晏而起吏不至門以歌詠明公之德亦使赦書不為空言而無信者干冒威重退增恐悚答安師孟書辱書為貺過厚吾子自以美才積學取榮名於當時所宜德者平生之師友朝夕相與講學者也如軾何與焉然吾子之於軾其得失休戚軾所宜知何者其勢足以相及也嚮也聞七子者之失恍然如軾之有失也既乃聞吾子之得則亦如軾之有得也今吾子書來以為自為喜者少而為軾喜者多甚矣吾子之見愛也然彼七子者豈以一失為戚哉彼將退治其所有益廣而新之則吾猶有望焉若吾子既得不驕而日知其所不足則軾之所得又將有大者也與曾子固書軾叩頭泣血言軾負罪至大茍生朝夕不自屏竄輒通書問於朋友故舊之門者伏念軾逮事祖父祖父之沒軾年十二矣尚能記憶其為人又嘗見先君欲求人為撰墓碣雖不指言所屬然私揣其意欲得子固之文也京師人事擾擾而先君亦不自料止於此嗚呼軾尚忍言之今年四月軾既護喪還家未葬偶與弟轍閲家中舊書見先君子自疏録祖父事迹數紙似欲為行狀未成者知其意未嘗不在於此也因自思念恐亦一旦卒然則先君之意永已不遂謹即其遺書粗加整齊為行狀以授同年兄鄧君文約以告於下執事伏惟哀憐而幸諾之豈惟罪逆遺孤之幸抑先君有知實寵綏之軾不任哀祈懇切之至上韓魏公乞葬董傳書軾再拜近得秦中故人書報進士董傳三月中病死軾往嵗官岐下始識傳至今七八年知之熟矣其為人不通曉世事然酷嗜讀書其文字蕭然有出塵之姿至詩與楚詞則求之於世可與傳比者不過數人此固不待軾言公自知之然傳嘗望公不為力致一官軾私心以為公非有所愛也知傳所稟付至薄不任官耳今年正月軾過岐下而傳居喪二曲使人問訊其家而傳徑至長安見軾於傳舍道其饑寒窮苦之狀以為幾死者數矣賴公而存又且薦我於朝吾平生無妻近有彭駕部者聞公薦我許嫁我其妹若免喪得一官又且有妻不虛作一世人皆公之賜軾既為傳喜且私憂之此二事生人之常理而在傳則為非常之福恐不能就今傳果死悲夫書生之窮薄至於如此其極耶夫傳之才器固不通於世用然譬之象犀珠玉雖無補於饑寒要不可使在塗泥中此公所以終薦傳也今父子暴骨僧寺中孀母弱弟自謀口腹不暇决不能葬軾與之故舊在京師者數人相與出錢賻其家而氣力微薄不能有所濟甚可憫笑公若猶憐之不敢望其他度可以葬傳者足矣陳繹學士當往涇州而宋迪度支在岐下公若有以賜之軾且斂衆人之賻并以豫陳而致之宋使葬之有餘以豫其家傳平生所為文當使人就其家取之若獲當獻諸公干冒左右無任戰越東坡全集卷七十二
