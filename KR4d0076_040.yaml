body:
  text: 東坡全集卷四十宋蘇軾撰論十二首省試刑賞忠厚之至論論曰堯舜禹湯文武成康之際何其愛民之深憂民之切而待天下以君子長者之道也有一善從而賞之又從而咏歌嗟嘆之所以樂其始而勉其終有一不善從而罰之又從而哀矜懲創之所以棄其舊而開其新故其吁俞之聲歡休慘戚見於虞夏商周之書成康既沒穆王立而周道始衰然猶命其臣吕侯而告之以祥刑其言憂而不傷威而不怒慈愛而能斷惻然有哀憐無辜之心故孔子猶有取焉傳曰賞疑從與所以廣恩也罰疑從去所以慎刑也當堯之時臯陶為士將殺人臯陶曰殺之三堯曰宥之三故天下畏臯陶執法之堅而樂堯用刑之寬四嶽曰鯀可用堯曰不可鯀方命圮族既而曰試之何堯之不聽臯陶之殺人而從四嶽之用鯀也然則聖人之意蓋亦可見矣書曰罪疑惟輕功疑惟重與其殺不辜寧失不經嗚呼盡之矣可以賞可以無賞賞之過乎仁可以罰可以無罰罰之過乎義過乎仁不失為君子過乎義則流而入於忍人故仁可過也義不可過也古者賞不以爵祿刑不以刀鋸賞以爵祿是賞之道行於爵祿之所加而不行於爵祿之所不加也刑以刀鋸是刑之威施於刀鋸之所及而不施於刀鋸之所不及也先王知天下之善不勝賞而爵祿不足以勸也知天下之惡不勝刑而刀鋸不足以裁也是故疑則舉而歸之於仁以君子長者之道待天下使天下相率而歸於君子長者之道故曰忠厚之至也詩曰君子如祉亂庶遄已君子如怒亂庶遄沮夫君子之已亂豈有異術哉時其喜怒而無失乎仁而已矣春秋之義立法貴嚴而責人貴寬因其褒貶之義以制賞罰亦忠厚之至也謹論御試重巽申命論論曰昔聖人之始畫卦也皆有以配乎物者也巽之配於風者以其發而有所動也配於木者以其仁且順也夫發而有所動者不仁則不可以久不順則不可以行故發而仁動而順而巽之道備矣聖人以為不重則不可以變故因而重之使之動而能變變而不窮故曰重巽以申命言天子之號令如此而後可也天地之化育有可以指而言者有不可以求而得之者今夫日皆知其所以為暖雨皆知其所以為潤雷霆皆知其所以為震雪霜皆知其所以為殺至於風悠然布於天地之間來不知其所自去不知其所入噓而炎吹而冷大而鼓乎泰山喬嶽之上細而入乎竅空蔀屋之下發達萬物而天下不以為德摧敗草木而天下不以為怒故曰天地之化育有不可求而得者此聖人之所法以令天下之術也聖人在上天下之民各得其職士者皆曰吾學而仕農者皆曰吾耕而食工者皆曰吾作而用賈者皆曰吾負而販不知聖人之制命令以鼓舞通變其道而使之安乎此也聖人之在上也天下可由而不可知可言而不可議蓋得乎巽之道也易者聖人之動而卦者動之時也蠱之彖曰先甲三日後甲三日而巽之九五亦曰先庚三日後庚三日而說者謂甲庚皆所以申命而先後者慎之至也聖人憫斯民之愚而不忍使之遽陷於罪戾也故先三日而令之後三日而申之不從而後誅蓋其用心之慎也以至神之化令天下使天下不測其端以至詳之法曉天下使天下明知其所避天下不測其端而明知其所避故靡然相率而不敢議也上令而下不議下從而上不誅順之至也故重巽之道上下順也謹論學士院試孔子從先進論論曰君子之欲有為於天下莫重乎其始進也始進以正猶且以不正繼之况以不正進者乎古之人有欲以其君王者也有欲以其君霸者也有欲强其國者也是三者其志不同故其術有淺深而其成功有巨細雖其終身之所為不可逆知而其大節必見於其始進之日何者其中素定也未有進以强國而能霸者也未有進以霸而能王者也伊尹之耕於有莘之野也其心固曰使吾君為堯舜之君而吾民為堯舜之民也以伊尹為以滋味說湯者此戰國之䇿士以已度伊尹也君子疾之管仲見桓公於纍囚之中其所言者固欲合諸侯攘夷狄也管仲度桓公足以霸度其身足以為霸者之佐是故上無侈說下無卑論古之人其自知明也如此商鞅之見孝公也三說而後合甚矣鞅之懷詐挾術以欺其君也彼豈不自知其不足以帝且王哉顧其刑名慘刻之學恐孝公之不能從是故設為髙論以衒之君既不能是矣則舉其國惟吾之所欲為不然豈其負帝王之略而每見輒變以徇人乎商鞅之不終於秦也是以進之不正也聖人則不然其志愈大故其道愈髙其道愈髙故其合愈難聖人視天下之不治如赤子之在水火也其欲得君以行道可謂急矣然未嘗以難合之故而少貶焉者知其始於少貶而其漸必至陵遲而大壞也故曰先進於禮樂野人也後進於禮樂君子也如用之則吾從先進孔子之世其諸侯卿大夫視先王之禮樂猶方圎冰炭之不相入也進而先之以禮樂其不合必矣是人也以道言之則聖人以世言之則野人也若夫君子之急於有功者則不然其未合也先之以世俗之所好而其既合也則繼以先王之禮樂其心則然然其進不正未有能繼以正者也故孔子不從而孟子亦曰枉尺直尋者以利言也如以利則枉尋直尺而利亦可為與君子之得其君也既度其君又度其身君能之而我不能不敢進也我能之而君不能不可為也不敢進而進是易其君不可為而為是輕其身是二人者皆有罪焉故君子之始進也曰君苟用我矣我且為是君曰能之則安受而不辭君曰不能天下其獨無人乎至於人君亦然將用是人也則告之以已所欲為要其能否而責成焉其曰姑用之而試觀之者皆過也後之君子其進也無所不至惟恐其不合也曰我將權以濟道既而道卒不行焉則曰吾君不足以盡我也始不正其身終以謗其君是人也自以為君子而孟子之所謂賊其君者也謹論學士院試春秋定天下之邪正論論曰為穀梁者曰成天下之事業定天下之邪正莫善於春秋請因其說而極言之夫春秋者禮之見於事業者也孔子論三代之盛必歸於禮之大成而其衰必本於禮之漸廢君臣父子上下莫不由禮而定其位至以為有禮則生無禮則死故孔子自少至老未嘗一日不學禮而不治其他以之出入周旋亂臣强君莫能加焉知天下莫之能用也退而治其紀綱條目以遺後世之君子則又以為不得親見於行事有其具而無其施設措置之方於是因魯史記為春秋一斷於禮凡春秋之所褒者禮之所與也其所貶者禮之所否也記曰禮者所以別嫌明疑定猶豫也而春秋一取斷焉故凡天下之邪正君子之所疑而不能決者皆至於春秋而定非定於春秋定於禮也故太史公曰春秋者禮義之大宗也為人君父而不知春秋者前有讒而不見後有賊而不知為人臣子而不知春秋者守經事而不知其宜遭變事而不知其權夫禮義之失至於君不君臣不臣父不父子不子其意皆以善為之而不知其義是以被之空言而不敢辭夫邪正之不同也不啻若黑白使天下凡為君子者皆如顔淵凡為小人者皆如桀跖雖微春秋天下其孰疑之天下之所疑者邪正之間也其情則邪而其迹若正者有之矣其情以為正而不知其義以陷於邪者有之矣此春秋之所以丁寧反復於其間也宋襄公疑於仁者也晉荀息疑於忠者也襄公不修德而疲弊其民以求諸侯彼其心豈湯武之心也哉獨至於戰則曰不禽二毛不鼓不成列非有仁者之素而欲一旦竊取其名以欺後世苟春秋不為正之則世之為仁者相率而為僞也故其書曰冬十一月乙巳朔宋公及楚人戰於泓宋師敗績春秋之書戰未有若此其詳也君子以為其敗固宜而無有隱諱不忍之辭焉荀息之事君也君存不能正其違沒又成其邪志而死焉荀息而為忠則凡忠於盜賊死於私昵者皆忠也而可乎故其書曰及其大夫荀息不然則荀息孔父之徒也而可名哉謹論儒者可與守成論聖人之於天下也無意於取也譬之江海百谷赴焉譬之麟鳯鳥獸萃焉雖欲辭之豈可得哉禹治洪水排萬世之患使溝壑之地疏為桑麻魚鱉之民化為衣冠契為司徒而五教行棄為后稷而蒸民粒世濟其德至於湯武拯塗炭之民而置之於仁壽之域故天下相率而朝之此三聖人者蓋推之而不可去逃之而不能免者也於是益修其政明其教因其民不易其俗以是得之以是守之傳數十世而民不叛豈有二道哉周室既衰諸侯並起力征爭奪者天下皆是也德既無以相過則智勝而已矣智既無以相傾則力奪而已矣至秦之亂則天下蕩然無復知有仁義矣漢髙帝以三尺劒起布衣五年而併天下雖稍輔於仁義然所用之人常先於智勇所行之䇿常主於權謀是以戰必勝攻必取天下既平思所以享其成功而安於無事以為子孫無窮之謀而武夫謀臣舉非其人莫與為者故陸賈譏之曰陛下以馬上得之豈可以馬上治之叔孫通亦曰儒者難與進取可與守成於是酌古今之宜與禮樂之中取其簡而易知近而易行者以為朝覲㑹同冠昏喪祭一代之法雖足以傳數百年上下相安然不若三代聖人取守一道源深而流長也夫武夫謀臣譬之藥石可以伐病而不可以養生儒者譬之五穀可以養生而不可以伐病宋襄公爭諸侯不禽二毛不鼓不成列以敗於泓身夷而國蹙此以五穀伐病者也秦始皇焚詩書殺豪傑東城臨洮北築遼水民不得休息傳之二世宗廟蕪滅此以藥石養生者也善夫賈生之論曰仁義不施攻守之勢異也夫世俗不察直以攻守為二道故具論三代以來所以取守之術使知文武禹湯之威德亦儒者之極功而陸賈叔孫通之流蓋儒術之粗也物不可以苟合論論曰昔者聖人之將欲有為也其始必先有所甚難而其終也至於久逺而不廢其成之也難故其敗之也不易其得之也重故其失之也不輕其合之也遲故其散之也不速夫聖人之所為詳於其始者非為其始之不足以成而憂其終之易敗也非為其始之不足以得而憂其終之易失也非為其始之不足以合而憂其終之易散也天下之事如是足以成矣如是足以得矣如是足以合矣而必曰未也又從而節文之綢繆委曲而為之表飾是以至於今不廢及其後世求速成之功而倦於遲久故其欲成也止於其足以成欲得也止於其足以得欲合也止於其足以合而其甚者又不能待其足其始不詳其終將不勝弊嗚呼此天下治亂享國長短之所出歟聖人之始制為君臣父子夫婦朋友也坐而治政奔走而執事此足以為君臣矣聖人懼其相易而至於相陵也於是為之車服采章以别之朝覲位著以嚴之名非不相聞也而見必以贊心非不相信也而出入必以籍此所以久而不相易也杖屨以為安飲食以為養此足以為父子矣聖人懼其相䙝而至於相怨也於是制為朝夕問省之禮左右佩服之飾族居之為歡而異宫以為别合食之為樂而異膳以為尊此所以久而不相䙝也生以居於室死以葬於野此足以為夫婦矣聖人懼其相狎而至於相離也於是先之以幣帛重之以媒妁不告於廟而終身以為妾晝居於內而君子問其疾此所以久而不相狎也安居以為黨急難以相救此足以為朋友矣聖人懼其相瀆而至於相侮也於是戒其羣居嬉遊之樂而嚴其射享飲食之節足非不能行也而待擯相之詔禮口非不能言也而待紹介之傳命此所以久而不相瀆也天下之禍莫大於苟可以為而止夫苟可以為而止則君臣之相陵父子之相怨夫婦之相離朋友之相侮久矣聖人憂焉是故多為之飾易曰藉用白茅無咎苟錯諸地而可矣藉之用茅何咎之有此古之聖人所以長有天下而後世之所謂迂闊也又曰嗑者合也物不可以苟合故受之以賁盡矣王者不治夷狄論論曰夷狄不可以中國之治治也求其大治必至於大亂先王知其然是故以不治治之治之以不治者乃所以深治之也春秋書公㑹戎於潜何休曰王者不治夷狄録戎來者不拒去者不追也夫天下之至嚴而用法之至詳者莫過於春秋凡春秋之書公書侯書字書名其君得為諸侯其臣得為大夫者舉皆齊晉也不然則齊晉之與國也其書州書國書氏書人其君不得為諸侯其臣不得為大夫者舉皆秦楚也不然則秦楚之與國也夫齊晉之君所以治其國家擁衛天子而愛養百姓者豈能盡如古法哉蓋亦出於詐力而參之以仁義是亦未能純為中國也秦楚者亦非獨貪冒無恥肆行而不顧也蓋亦有秉道行義之君焉是秦楚亦未至於純為夷狄也齊晉之君不能純為中國而春秋之所豫者常嚮焉有善則汲汲而書之惟恐其不得聞於後世有過則多方而開赦之惟恐其不得為君子秦楚之君未至於純為夷狄而春秋之所不豫者常在焉有善則纍而後進有惡則略而不録以為不足録也是非獨私於齊晉而偏疾於秦楚也以見中國之不可以一日背而夷狄之不可以一日嚮也其不純者足以寄其褒貶則其純者可知矣故曰天下之至嚴而用法之至詳者莫如春秋夫戎者豈特如秦楚之流入於戎狄而己哉然而春秋書之曰公㑹戎於潜公無所貶而戎為可會是獨何歟夫戎之不能以㑹禮㑹公亦明矣此學者之所以深疑而求其說也故曰王者不治夷狄録戎來者不拒去者不追也夫以戎之不可以化誨懷服也彼其不悍然執兵以與我從事於邊鄙則已幸矣又况乎知有所謂會者而欲行之是豈不足以深嘉其意乎不然將深責其禮彼將有所不堪而發其憤怒則其禍大矣仲尼深憂之故因其來而書之以會曰若是足矣是將以不治深治之也由是觀之春秋之疾戎狄者非疾純戎狄也疾夫以中國而流入於戎狄者也謹論劉愷丁鴻孰賢論論曰君子之為善非特以適已自便而已其取於人也必度其人之可以與我也其豫人也必度其人之可以受於我也我可以取之而其人不可以與我君子不取我可以豫之而其人不可受君子不豫既為已慮之又為人謀之取之必可豫豫之必可受若已為君子而使人為小人是亦去小人無幾耳東漢劉愷讓其弟荆而詔聽之丁鴻亦以陽狂讓其弟而其友人鮑駿責之以義鴻乃就封其始自以為義而行之其終也知其不義而復之以其能復之知其始之所行非詐也此范氏之所以賢鴻而下愷也其論稱太伯伯夷未始有其讓也故太伯稱至德伯夷稱賢人及後世徇其名而昧其致於是詭激之行興矣若劉愷之徒讓其弟使弟受非服而已受其名不已過乎丁鴻之心主於忠愛何其終悟而從義也范氏之所賢者固已得之矣而其未盡者請得畢其說夫先王之制立長所以明宗明宗所以防亂非有意私其長而沮其少也天子與諸侯皆有太祖其有天下有一國皆受之太祖而非已之所得専有也天子不敢以其太祖之天下與人諸侯不敢以其太祖之國與人天下之通義也夫劉愷丁鴻之國不知二子所自致邪將亦受之其先祖邪受之其先祖而傳之於所不當立之人雖其弟之親與塗人均耳夫吳太伯伯夷非所以為法也太伯將以成周之王業而伯夷將以訓天下之讓而為是詭時特異之行皆非所以為法也今劉愷舉國而讓其弟非獨使弟受非服之為過也將以壞先王防亂之法輕其先祖之國而獨為是非常之行考之以禮繩之以法而愷之罪大矣然漢世士大夫多以此為名者安順桓靈之世士皆反道矯情以盜一時之名蓋其弊始於西漢之世韋𤣥成以侯讓其弟而為世主所賢天下髙之故漸以成俗履常而蹈易者世以為無能而擯之則丁鴻之復於中道尤可以深嘉而屢歎也謹論禮義信足以成德論論曰有大人之事有小人之事愈大則身愈逸而責愈重愈小則身愈勞而責愈輕綦大而至天子綦小而至農夫各有其分不可亂也責重者不可以不逸不逸則無以任天下之重責輕者不可以不勞不勞則無以逸夫責重者二者譬如心之思慮於內而手足之動作步趨於外也是故不耕而食不蠶而衣君子不以為愧者所職大也自堯舜以來未之有改後世學衰而道弛諸子之智不足以見其大而竊見其小者之一偏以為有國者皆當惡衣糲食與農夫並耕而治一人之身而自為百工蓋孔子之時則有是說矣夫樊遲親受業於聖人而猶惑於是說是以區區焉欲學稼於孔子孔子知是說之將蔓延於天下也故極言其失而深折其詞以為上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情夫如是則四方之民襁負其子而至矣安用稼而解者以為禮義與信足以成德夫樊遲之所為汲汲於學稼者何也是非以穀食不足而民有苟且之心以慢其上為憂乎是非以人君獨享其安榮而使民勞苦獨賢為憂乎是非以人君不身親之則空言不足勸課百姓為憂乎是三憂者皆世俗之私憂過計也君子以禮治天下之分使尊者習為尊卑者安為卑則夫民之慢上者非所憂也君子以義處天下之宜使祿之一國者不自以為多抱關擊柝者不自以為寡則夫民之勞苦獨賢者又非所憂也君子以信一天下之惑使作於中者必形於外循其名者必得其實則夫空言不足以勸課者又非所憂也此三者足以成德矣故曰三憂者皆世俗之私憂過計也謹論形勢不如德論論曰傳有之天時不如地利地利不如人和此言形勢之不如德也而吳起亦云在德不在險太史公以為形勢雖强要以仁義為本儒者之言兵未嘗不以藉其口矣請拾其遺說而備論之凡形勢之說有二有以人為形勢者三代之封諸侯是也天子之所以繫於天下者至微且危也歡然而合合而不去則為君臣其善可得而賞其惡可得而罰其穀米可得而食其功力可得而役使當此之時君臣之勢甚固及其一旦潰然而去去而不返則為寇讎强者起而見攻智者起而見謀倣徨四顧而不知其所恃當是時君臣之勢甚危先王知其固之不足恃而危之不可以忽也故大封諸侯錯置親賢以示天下形勢劉頌所謂善為國者任勢而不任人郡縣之察小政理而大勢危諸侯為邦近多違而逺慮固此以人為形勢者也然周之衰也諸侯肆行而莫之禁自平王以下其去亡無幾也是則德衰而人之形勢不足以救也以地為形勢者秦漢之建都是也秦之取天下非天下心服而臣之也較之以富搏之以力而猶不服又以詐囚其君虜其將然後僅得之今之臣服而朝貢皆昔之暴骨於原野之子孫也則吾安得泰然而長有之漢之取天下雖不若秦之暴然要皆不本於仁義也當此之時不大封諸侯則無以答功臣之望諸侯大而京師不安則其勢不得不以關中之固而臨之此雖堯舜湯武亦不能使其德一日而信於天下荀卿所謂合其參者此以地為形勢者也然及其衰也皆以大臣専命危自內起而關中之形勢曾不及施此亦德衰而地之形勢不能救也夫三代秦漢之君慮其後世而為之備患者不可謂不至矣然至其亡也常出於其所不慮此豈形勢不如德之明效歟易曰神而明之存乎其人人存則德存德存則無諸侯而安無障塞而固矣謹論禮以養人為本論論曰三代之衰至於今且數千歲豪傑有意之主博學多識之臣不可以勝數矣然而禮廢樂墜則相與咨嗟發憤而卒於無成者何也是非其才之不逮學之不至過於論之太詳畏之太甚也夫禮之初始諸人情因其所安者而為之節文凡人情之所安而有節者舉皆禮也則是禮未始有定論也然而不可以出於人情之所不安則亦未始無定論也執其無定以為定論則塗之人皆可以為禮今儒者之論則不然以為禮者聖人之所獨尊而天下之事最難成者也牽於繁文而拘於小說有毫毛之差則終身以為不可論明堂者惑於考工吕令之說議郊廟者泥於鄭氏王肅之學紛紛交錯者纍歲而不決或因而遂罷未嘗有一人果斷而決行之此皆論之太詳而畏之太甚之過也夫禮之大意存乎明天下之分嚴君臣篤父子形孝弟而顯仁義也今不幸去聖人逺有如毫毛不合於三代之法固未害其為明天下之分也所以嚴君臣篤父子形孝弟而顯仁義者猶在也今使禮廢而不修則君臣不嚴父子不篤孝弟不形仁義不顯反不足重乎昔者西漢之書始於仲舒而至於劉向悼禮樂之不興故其言曰禮以養人為本如有過差是過而養人也刑罰之過或至殺傷今吏議法筆則筆削則削而至禮樂則不敢是敢於殺人而不敢於養人也而范曄以為樂非夔襄而新音代作律謝臯蘇而法令亟易而至於禮獨何難歟夫法者末也又加以慘毒繁難而天下常以為急禮者本也又加以和平簡易而天下常以為緩如此而不治則又從而尤之曰是法未至也則因而急之甚矣人之惑也平居治氣養生宣故而納新其行之甚易其過也無大患然皆難之而不為悍藥毒石以搏去其疾則皆為之此天下之公患也嗚呼王者得斯說而通之禮樂之興庶乎有日矣謹論既醉備五福論論曰君子之所以大過人者非以其智能知之彊能行之也以其功興而民勞與之同勞功成而民樂與之同樂如是而已矣富貴安逸者天下之所同好也然而君子獨享焉享之而安天下以為當然者何也天下知其所以富貴安逸者凡以庇覆我也貧賤勞苦者天下之所同惡也而小人獨居焉居之而安天下以為當然者何也天下知其所以貧賤勞苦者凡以生全我也夫然故獨享天下之大利而不憂使天下為已勞苦而不怍耳聽天下之備聲目視天下之備色而民猶以為未也相與禱祠而祈祝曰使吾君長有吾國也又相與詠歌而稱頌之被於金石溢於竹帛使其萬世而不忘也嗚呼彼君子者獨何修而得此於民哉豈非始之以至誠中之以不欲速而終之以不懈歟視民如視其身待其至愚者如其至賢者是謂至誠至誠無近效要在於自信而不惑是謂不欲速不欲速則能久久則功成功成則易懈君子濟之以恭是謂不懈行此三者所以得之於民也三代之盛不能加毫末於此矣既醉者成王之詩也其序曰既醉太平也醉酒飽德人有士君子之行焉而說者以為是詩也實具五福其詩曰君子萬年壽也介爾景福富也室家之壼康寧也髙明有融攸好德也髙朗令終考終命也凡言此者非美其有是五福也美其全享是福兼有是樂而天下安之以為當然也夫詩者不可以言語求而得必將深觀其意焉故其譏刺是人也不言其所為之惡而言其爵位之尊車服之美而民疾之以見其不堪也君子偕老副笄六珈赫赫師尹民具爾瞻是也其頌美是人也不言其所為之善而言其冠佩之華容貌之盛而民安之以見其無愧也緇衣之宜兮敝豫又改為兮服其命服朱芾斯皇是也故既醉者非徒享是五福而已必將有以致之不然民將盻盻焉疾視而不能平又安能獨樂乎是以孟子言王道不言其他而獨言民之聞其作樂見其田獵而欣欣者此可謂知本矣謹論東坡全集卷四十
