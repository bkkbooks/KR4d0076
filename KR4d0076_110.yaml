body:
  text: 東坡全集卷一百十宋蘇軾撰內制詔敕五十二首賜觀文殿大學士光祿大夫知永興軍韓縝三上表陳乞致仕不允斷來章詔元祐三年四月七日敕韓縝朕體貌諸老儀刑四方假以方面之安略其筋力之禮如卿屢請固無懷祿之嫌而朕固留宜有忘歸之意今中外無事民物小康顧恐安居之榮未逾坐嘯之樂朕命不易卿其少安賜新除大中大夫守尚書右僕射兼中書侍郎范純仁再上劄子辭免恩命不允詔元祐三年四月七日敕純仁卿奉事先帝義深愛君與政西樞論不阿世昔聞汲黯之不奪今有徐公之有常參以衆言蔽自朕志右宰之任非卿而誰屢執謙詞殊非所望賜新除依前中大夫守中書侍郎劉摯辭免恩命不允詔元祐三年四月七日敕劉摯朝廷設三省建丞弼雖所治不同至於因時立政昭德塞違其實一也卿既任其事矣今以次遷無足辭者賜新除依前中大夫守尚書左丞王存辭免恩命不允詔元祐三年四月七日敕王存卿學足以經邦才足以應務更練愈久開益居多以積日而少遷顧僉言之咸允國之常典何以辭為賜新除中大夫守尚書左丞胡宗愈辭免恩命不允詔元祐三年四月七日敕宗愈卿昔在諫垣首開正論出入滋久操守不回雅望在人既非一日之積歷試而用亦自羣言之公往祗厥官毋替朕命賜新除依前中散大夫充樞密直學士簽書樞密院事趙瞻辭免恩命不允詔元祐三年四月七日敕趙瞻朕惟夲兵之地司命吾民矧羌戎叛服之無常實邉鄙安危之未決豈以此柄輕授其人以卿望重縉紳學兼文武歷試而用衆言允諧往踐厥官勿違朕命賜新除門下侍郎孫固辭恩命不允詔元祐三年四月八日敕孫固朕惟三朝老臣義同休戚先帝舊學存者幾人意其風采之聳聞可使朝廷之增重矧卿德望素著寄任已隆昔冠西樞今二東省衆以為允義無足辭賜新除試御史中丞孫覺辭免恩命不允詔元祐三年四月八日敕孫覺卿三居諫省皆以直聞蓋嘗遇事以建言志在行義以達道擢為執法實允僉言以卿直諒多聞而朕聞納不諱固無觀望難言之病豈有喪失名節之憂哉載閲來章甚非所望賜新除右光祿大夫依前知樞密院事安燾辭恩命不允詔元祐三年四月八日敕安燾卿謀國之重歷年於兹紀綱修明中外寧輯夫圖任共政所憂者大則久勞遷秩亦理之常雖固執於撝謙恐難回於成命往服休寵以彰眷懷賜新除中大夫守尚書右丞胡宗愈辭免恩命不允詔元祐三年四月十日敕宗愈卿更涉夷險踐敡中外出奉使指而民宜之入治天官而吏畏之非獨能言者也書不云乎敷奏以言明試以功朕得之矣卿其勿辭賜新除依前中散大夫充樞密直學士簽書樞密院事趙瞻辭免恩命不允詔元祐三年四月十日敕趙瞻朕之進人可謂難矣自非耆老久次悃愊無華則樞機之任不以輕授卿之自視何愧於斯祗服厥官思所以稱而已賜新除翰林學士朝請大夫知制誥許將赴闕詔元祐三年四月十一日敕許將卿敏而好學達於從政出殿方國則修儒術以飾吏事入備顧問則酌民言以廣上聽待命北門號稱內相雖於卿為舊物實當今之髙選亟踐厥職佇聞嘉猷賜新除司空同平章軍國事吕公著辭免册禮許詔元祐三年四月十三日敕公著多儀以隆輔弼國之彛典自損以信君父卿之美志再閲誠言之請益彰謙德之光勉徇所陳不忘嘉歎賜正議大夫知樞密院事安燾辭免遷官恩命允詔元祐三年四月十五日敕安燾卿國之雋輔位冠樞庭以時褒升豈待功閥而能力辭寵命欲以身率羣臣使亷恥相先名器益重勉從來請以篤此風賜新除中大夫守尚書右丞胡宗愈辭免恩命不允詔元祐三年四月十五日敕宗愈朕之用卿蓋聽其言考其行事參之公議而斷自朕心可謂審矣而卿固辭不已朕甚惑之夫小人以位為寵求之而不可得君子以寵為憂推之而莫能去自古以然卿何疑哉賜新除司空同平章軍國事吕公著辭免册禮允詔元祐三年四月十五日敕公著册祝於廟惟周之典臨朝親拜亦漢之舊事大則禮重禮重則樂備古之道也今卿遜避不居自處以約勉從所乞以成其美賜許將辭免恩命不允詔元祐三年四月十八日敕許將進以經術當告我以安危來自西南固知民之利病渴聞讜論少副虛懷而乃退托無能力辭舊物既非所望其可曲從賜河西軍節度使西蕃邈川首領阿里庫進奉回詔元祐三年四月二十二日敕阿里庫惟爾祖先世篤忠孝本與夏賊日尋干戈亦惟恃我朝廷爵秩之隆用能保爾子孫黎民之衆肆朕命爾嗣長乃師而承襲以來強酋外擅爾弗能禁恣其所為遂據逃城以犯王略隂連夏賊約日盜邉朕愍屬羌之無辜出偏師而問罪元惡俘獲餘黨散亡山後底平河南綏服朕惟率酋豪而捍疆埸乃爾世功叛君父而從仇讐豈其夲意庶能改過未忍加兵果因物以貢誠願洗心而效順爾既知悔朕復何求已指揮熙河路更不出兵及除已招納到部族外住罷招納依舊許般次往來買賣及上京進奉爾宜約束種類共保邉陲期寵祿於有終知大恩之難再勿使來欵復為虛言賜新除依前朝散大夫守尚書吏部侍郎充龍圖閣待制傅堯俞辭免恩命不允詔元祐三年五月二十三日敕堯俞夙望所在舊疾既平及兹言旋慰我虗佇徒得君重雖暫屈於淮陽雅意本朝寧久安於馮翊復求自便殊戻所期往修厥官務稱朕命賜守尚書右丞胡宗愈乞除間慢差遣不允詔元祐三年五月二十七日敕宗愈朕開奬言路通來下情雖許風聞猶當核實豈以無根之語輕搖輔政之臣朕方馭衆以寬退人以禮加之美職付以大邦朕既無負於聽言卿亦何嫌而避位祗服乃事毋自為疑賜尚書右僕射兼中書侍郎范純仁生日詔元祐三年六月九日敕純仁卿河嶽之靈神明所相載更誕日永介壽祺體我眷懷受兹寵錫賜正議大夫守門下侍郎孫固生日詔元祐三年六月二十三日敕孫固卿圖任之舊縉紳所推難老之祥神人攸相載更良日益永壽祺申以寵章式隆眷遇賜正議大夫知樞密院事安燾生日詔元祐三年六月二十三日敕安燾桑弧告慶降哲輔於兹辰綵服拜嘉冠榮名於當代祗服朕命益壽乃親賜龍圗閣學士河東路經略使兼知太原府曾布乞除一間慢州郡不允詔元祐三年七月二十一日敕曾布將不久任難以責成謀不素定難以應猝卿屢試劇郡所臨有聲而况二年於兹諸將所服事既即敘人誰易卿夫搗虗攻瑕兵家常勢知難避整外國亦然卿若有以待之彼將望而去矣勉卒乃事毋忘朕言敕河西軍節度使西蕃邈川首領阿里庫進奉回程詔元祐三年八月三日敕阿里庫卿屢欵塞垣願終臣節爰因貢篚益著誠心再省忠勤良深嘉嘆賜皇叔改封徐王皓上表辭免册禮允詔元祐三年八月二十日敕皓卿大雅不羣自得詩書之富為善最樂不知軒冕之榮既殿文邦宜膺盛禮而抑損之志逡巡不居雖莫稱朕所以極褒崇之心而將使卿庶幾獲謙沖之福勉從其意嘉歎不忘賜皇叔改封徐王皓上表辭免册禮許詔元祐三年八月二十日敕皓錫山土田以昭令德備物典册蓋有常儀而卿深懼滿盈過形抑畏一謙四益當克永年三命滋恭固將有後曲成美志以勸事君賜知渭州劉昌祚進奉興龍節銀詔元祐三年十一月六日敕昌祚卿禦侮邉庭馳神魏闕會嘉辰之獻夀納貢篚以效珍載省忠勤不忘褒歎賜皇伯祖宗晟辭免起復恩命不許詔元祐三年十二月五日敕宗晟夫要絰服事出於孔門墨衰從政見於魯史永惟徇國忘家之義非有食稻衣錦之嫌若非使卿居之而安則吾豈敢強所不欲勉從前詔往服厥官賜皇伯祖宗晟辭免起復恩命不允詔元祐三年十二月二日敕宗晟卿德爵與齒皆天下達尊服屬之隆為宗室祭酒任獨髙於三世報冝異於常人故奪情非以私卿而服事所以徇國義無所愧何以辭為賜正議大夫知鄧州蔡確乞量移弟碩允詔元祐三年十二月九日敕蔡確以義責備春秋有失教之譏以情內恕詩人有將母之念碩之得罪事在有司難以貴近之親而廢朝廷之典及觀來請有槩豫心重違兄弟急難之詞以傷人子奉飬之意賜知渭州劉昌祚進奉謝恩并賜月俸公使及賀端午節馬詔元祐三年十二月二十四日敕昌祚卿執德宏毅秉心恪恭拜新渥於公朝謹舊儀於令節抗章來上因物見誠再省忠勤良深嘉嘆賜端明殿學士銀青光祿大夫致仕范鎮奬諭詔元祐三年閠十二月二日敕范鎮朕惟春秋之後禮樂先亡秦漢以來韶武僅在散樂工於河海之上往而不還聘先生於齊魯之間有莫能致魏晉以下曹鄶無譏豈惟鄭衛之音已雜華夏之器間有作者猶有典刑然銖黍之一差或宫商之易位惟我四朝之老獨知五降之非審聲知音以律生尺覽詩書之來上閲􅴒虡之在廷君臣同觀父老太息方詔學士大夫論其法工師有司考其聲上追先帝移風易俗之心下慰老臣愛君憂國之志究觀所作嘉歎不忘賜朝散大夫守尚書吏部侍郎充龍圖閣待制傅堯俞乞外郡不允詔元祐三年閠十二月十四日敇堯俞卿望重夲朝進由公議方卿大夫有為之際亦士君子難得之時而卿出領郡章入佐治典席未暖而輒去政何時而報成小疾行瘳姑安厥位賜保寧軍節度使知大名府馮京進奉賀興龍馬一十匹并冬節馬二匹詔元祐三年閠十二月十八日敕馮京卿坐鎮全魏隱若長城逺馳頌禱之心來效驂騑之貢眷言忠藎良極嘉歎賜泰寧軍節度觀察留後知相州李珣進奉賀冬馬一匹詔元祐三年閠十二月十八日敕李珣卿宣化近邦馳神北闕屬兹陽月之吉逺效王間之良言念忠勤不忘嘉歎賜中大夫守尚書左丞王存生日詔元祐四年正月四日敕王存在易之泰與物皆春於時良臣生我王國宜膺寵賚以介壽祺賜龍圗閣直學士正議大夫權知開封府吕公著上表陳乞致仕不允詔元祐四年正月五日敕公著朕雞鳴而起志於求助鮐背之老未敢即安矧卿體力不衰髮齒猶壯遽有引年之講殊乖圗篤之心宜安厥心以稱朕意賜吕公著上表陳乞致仕不允詔敕吕公著卿將相三世凛乎正始之風出入四朝蔚然難老之狀浩穰之治談笑而成方觀報政之能遽有歸休之請公議未可卿其少安賜濟陽郡王曹佾在朝假將百日特與寬假將理詔元祐四年正月十二日敕曹佾卿賢戚莫二德齒並隆眷言朝請之勤思見儀刑之老謝病既久軫念良深推豫賜告之恩期於勿藥之喜賜光祿大夫守吏部尚書兼侍讀蘇頌上表乞致仕不允詔元祐四年正月十三日敕蘇頌吾聞有志之士以身徇道而遺名有道之君使人樂用而忘老今卿不安其位豈吾有愧於古哉夫難進之士年僅及而輒退則已試之才吾莫得而盡用矣激揚多士方資崔毛之德講誦舊聞未卒楮馬之業事非小補卿其少安賜蘇頌上表陳乞致仕不允詔敕蘇頌卿歷事四朝允有一德徒論徐公之奢儉莫見子文之慍喜朕既寤寐哲士體貌元臣方貴德齒之達尊豈求筋力之常禮矧卿方膺難老之錫宜勵益壯之心惜日有為古人所重引年求去公議未安勉為朕留以慰人望賜光祿大夫守吏部尚書兼侍讀蘇頌上第二表陳乞致仕不允詔元祐四年二月二日敕蘇頌夫天以多士寧王國而祖宗以成德遺後人方使壽考康強以究其用而朕乃以引年而聽其去可乎矧卿鈐綜之精談笑而辦勉思職事以稱朕心賜蘇頌上第二表請乞致仕不許詔敇蘇頌天官之任老成所冝坐執銓衡有山公晚年之故事簿書煩雜獨蕭俯一時之偏詞卿其總攬綱條濶略苛細委蛇退食以慰士心新除權禮部尚書梁燾辭免恩命不允詔元祐四年二月三日敕梁燾卿出處以義進退以禮昔請補外朕不得已而聽其去今兹選用衆以為宜而恨其晚而卿又固辭豈朕所望成命不易其速造朝賜宣徽南院使充太一宫使馮京乞依職任官例祗赴六參不允詔元祐四年六月十四日敕馮京朕以卿耆老厚德重煩以庶事而卿篤恭盡禮自同於有司既朝朔望尚復勤請雖抑抑自警知卿有衛武之風而僕僕亟拜非朕待子思之意宜遵前命以副眷懷賜右正議大夫守尚書左僕射吕大防生日詔元祐四年六月十五日敕大防股肱之良與國為重家庭之慶亦朕所同適斯干獻夢之辰均既醉太平之福膺豫寵錫介爾壽祺賜翰林學士中大夫兼侍讀趙彥若辭免國史修撰不允詔元祐四年六月二十三日敕彥若卿學世其家宜居載筆之地官宿其業巳奏殺青之書自託不能殊非所望祗膺成命毋復固辭賜河東節度使太師開府儀同三司太原尹致仕文彥博溫錫沁馬詔元祐四年七月二日敕彥博惟我宗臣名震夷落狼心鵙舌知獻厥誠朕以張奐拒羌之獻不如旅􅋙昭德之致已敕邉吏答賜所直其馬今以賜卿至可領也賜夏國主進奉賀坤成節回詔元祐四年七月二十二日敕節紀誕彌慶均臨照眷守邦之雖逺亦執贄以來同嘉與朝臣咸稱壽斚載惟忠恪宜有寵頒賜皇伯祖宗晟辭免恩命起復允終喪制詔敕宗晟朕寤寐雋賢燮和中外眷言釋位之久實有乏才之憂而三年未終五詔不起與其貪明哲之美以緝熙庶工不若執孝弟之純以風勵宗子俯從誠守良極歎咨賜皇伯祖宗晟辭免恩命起復允終喪制詔敕宗晟夫衰麻之哀達於上下損益之變權以重輕雖事君均於事親而奪志難於奪帥俯聽終喪之守以成致孝之全言念篤誠實增屢歎內制敕書三十三首賜南平王李乾德厯日敕書元祐元年十月八日敕乾德眷彼海隅被豫聲教宜有王正之賜以為農事之祥勤恤逺民以開嗣嵗賜新除依前交趾郡王李乾德加恩制誥敕書元祐元年十月十五日敕乾德朕躬執圭幣大饗帝親朌布湛恩遍暨諸夏卿世綏侯服欽順朝廷冝錫徽章以昭異數賜外任臣寮厯日詔敕書元祐元年十月二十八日敕韓絳朕申命日官逆推嗣嵗眷豫共理頒此成書勉劭農功毋違時令賜侍衛親軍馬軍都虞侯劉昌祚進奉賀明堂禮畢馬敕書元祐元年十一月二十日敕劉昌祚大事告成多方同慶汝以分符之重特修效馬之儀載念勤誠不忘嘉歎賜外任臣寮進奉興龍節馬詔敕書元祐二年四月十三日敕韓縝誕彌之慶逺邇攸同眷惟外服之良來效右牽之禮言念誠恪不忘歎嘉賜溪洞蠻人彭允宗等進奉端午布敕書元祐二年三月十日敕彭允宗等汝旌居裔壤心慕華風來修任土之儀逺效充庭之實載惟勤悃良用歎嘉賜權陜府西路轉運判官孫路銀絹奬諭敕書元祐二年六月二十八日為築蘭州西荆堡成下同敕孫路宣力計臺悉心邉政相視襟要繕完保障訖用有成不愆於素使虜無可乘之便民有足恃之安乃眷忠勤不忘嘉歎賜知蘭州王文郁銀絹奬諭敕書元祐二年六月二十八日敕王文郁汝以禦侮之才當專城之寄百堵皆作三月而成非威服民夷身先士卒則安能以一時之役成無窮之利達於朕聽良用歎嘉賜新除依前靜海軍節度使進封南平王李乾德制誥敕書元祐二年七月八日敕朕子養兆姓囊括四荒譬之於天豈吝膏澤卿守藩滋久事上益虔髙爵隆名極其榮顯庶緣大寵以服民心其思盡忠以稱恩禮賜外任臣寮進奉坤成節銀敕書元祐二年七月二十八日敕劉昌祚汝承流外服雅意夲朝爰因載誕之辰逺致同寅之禮眷惟忠藎良極歎嘉賜西南羅藩進奉敕書元祐二年九月三日敕汝世為要服時欵塞垣志慕華風來修職貢載惟忠恪良用歎咨賜諸路知州職司等并總管鈐轄至使臣初冬衣襖敕書敕馮潔已王事靡盬日月其除屬霜露之戒寒待衣裘而卒嵗宜加寵錫以示眷懷賜諸路蕃官并溪洞蠻人初冬衣襖敕書敕瞎氊職在捍邉志常面內屬此嚴凝之候宜均輕暖之恩服我寵頒益思忠報賜諸路屯駐駐洎就糧夲城諸貟寮等初冬衣襖都敕敕汝等久勤外服屬戒祈寒爰念捍城之勞普均挾纊之惠賜外任臣寮等進奉坤成節功德疏詔敕書元祐二年九月二十四日敕馮京職雖在外忠不忘君集勝妙之良因致壽康之善禱眷言誠盡良極歎嘉賜朝奉郎通判梓州趙君奭進奉坤成節無量壽佛敕書元祐二年九月二十四日敕趙君奭相好妙嚴𠂻誠傾盡汝期乃后享無量之年吾欲斯民同極樂之世永言忠愛良用歎咨沿路賜奉安神宗御容押班馮宗道并內臣等銀合茶藥敕書元祐二年十月七日敕馮宗道逮事有年追逺不懈屬祠官之告具驂日馭以遄征往復之間忠勞亦至特加存問尚體至懷賜五臺山十寺僧正省竒等進奉興龍節功德疏等奬諭敕書元祐二年十一月一日敕省竒等清涼之域仙聖所遊爰因彌月之辰來獻後天之祝永言勤至良極嘆咨賜外任臣寮厯日敕書元祐二年十二月四日敕韓縝朕肇修人紀祗畏天明欽若舊章式頒新厯凡我承流之寄共成平秩之功賜于闐國黑汗王進奉登位敕書元祐二年十二月十一日敕卿守藩西極慕義中華逺聞踐阼之新來致梯山之貢眷言忠恪良用歎咨賜于闐國黑汗王進奉示諭敕書元祐二年十二月十一日敕卿逺馳信使來效貢琛載詳重譯之言深亮勤王之意益隆裒賜以答忠誠賜外任臣寮進奉興龍節馬敕書元祐二年十二月二十四日敕劉永年汝職在蕃宣義均休戚旅庭稱慶因物見誠乃眷忠勤不忘嘉歎賜溪洞彭儒武等進奉興龍節溪布敕書元祐二年十二月二十八日敕彭儒武汝世能保境志在觀光逺修任土之宜來備充庭之實載惟忠恪良極歎嘉賜保州團練使潞州總管王保進奉戀闕并到任馬敕書元祐二年正月七日敕王寶汝以選掄出分憂寄來效充庭之駿以將衛上之誠再省忠勤良深嘉歎賜知乾寧軍內殿承制張赴奬諭敕書元祐二年四月十八日敕張赴橫流之災所在蒙害惟吏得其人則公私賴之使者列上有司不以時聞嵗月既逺豫猶汝嘉故兹奬諭想宜知悉賜于闐國黑汗王進奉示諭敕書元祐三年五月一日敕卿恪居蕃守申遣使車來欵塞垣恭修壤貢忠誠逺達褒歎良深賜于闐國黑汗王進奉敕書敕卿守土西極馳誠中華璧馬充庭尚識漢儀之舊織皮在篚聊觀禹貢之餘載省忠勤不忘嘉歎賜于闐國黑汗王男被令帝英進奉敕書敕汝世敦忠厚志慕聲明逺附奏函亦馳貢篚載惟恭順良極歎咨賜五臺山十寺僧正省竒巳下奬諭敕書元祐三年六月十八日敕清涼之峯先聖所宅爰修淨供以慶誕辰再省恭勤不忘嘉歎示諭武泰軍官吏軍人僧道百姓等敕書元祐三年八月十八日敕朕以苖授賦材勇嚴馭衆整暇擢為宿衛之長寵以節旄之榮惟爾邦人當諭朕意賜殿前都虞侯寧州團練使知熙州劉舜卿進奉賀冬馬敕書元祐三年閠十二月十八日敕劉舜卿職在分憂忠存衛上屬此秦正之旦逺輸冀産之良再省忠勤不忘嘉歎賜外任臣寮進奉興龍節馬敕書元祐三年閠十二月十八日敕劉舜卿汝忠於衛上逺不忘君爰因彌月之晨來效充庭之禮眷言勤篤良極嘉歎賜西南蕃莫世忍等進奉敕書元祐四年正月二十一日敕莫世忍汝守土遐陬歸誠北闕梯山修貢欵塞觀光言念忠勤至於嘉歎賜五臺山十寺僧正省竒等奬諭敕書六月二十五日下院敕異景靈光久聞示化寶祠淨供爰慶設彌念此恭勤至於嘉歎東坡全集卷一百十
