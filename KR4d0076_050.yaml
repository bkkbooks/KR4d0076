body:
  text: 東坡全集卷五十宋蘇軾撰南省說書十道左傳三道問供養三德為善對易者聖人所以盡人情之變而非所以求神於卜筮也自孔子沒學者惑乎異端之說而左丘明之論尤為可怪使夫伏羲文王孔子之所盡心焉者流而入於卜筮之事甚可憫也若夫季友豎牛之事若親見而指言之固君子之所不取矣雖然南蒯之說頗為近正其卦遇坤之比而其繇曰黃裳元吉黃者中之色也裳者下之飾也元者善之長也夫以中庸之道守之以謙抑之心而行之以體仁之德以為文王之兆無以過此矣雖然君子視其人觀其德而吉凶生焉故南蒯之筮也遇坤之比而不祥莫大焉且夫負販之夫朝而作暮而息其望不過一金之儲使之無故而得千金則狂惑而喪志夫以南蒯而得文王之兆安得不狂惑而喪志哉故曰供養三德為善又曰參成可筮而南蒯無以勝之所以使後世知夫卜筮之不可恃也穆姜筮于東宫遇艮之八史曰是謂艮之隨其繇曰元亨利貞而穆姜亦知其無以當之故左氏之論易唯南蒯穆姜之事為近正而其餘者君子之所不取也杜預之論得之矣以為洪範稽疑之說通龜筮以同卿士之數學者觀夫左氏之書而正之以杜氏之說庶乎其可也謹對問小雅周之衰對詩之中唯周最備而周之興廢於詩為詳蓋其道始於閨門父子之間而施及乎君臣之際以被冒乎天下者存乎二南后稷公劉文武創業之艱難而幽厲失道之漸存乎二雅成王纂承文武之烈而禮樂文章之備存乎頌其愈削而至夷于諸侯者在乎王黍離蓋周道之盛衰可以備見於此矣小雅者言王政之小而兼陳乎其盛衰之際者也夫周雖衰文武之業未墜而宣王又從而中興之故雖怨刺並興而未列於國風者以為猶有王政存焉故曰小雅者兼乎周之盛衰者也昔之言者皆得其偏而未備也季札觀周樂歌小雅曰其周之衰乎文中子曰小雅烏乎衰其周之盛乎札之所謂衰者蓋其當時親見周之衰而不覩乎文武成康之盛也文中子之所謂盛者言文武之餘烈歷數百年而未忘雖其子孫之微而天下猶或宗周也故曰二子者皆得其偏而未備也太史公曰國風好色而不淫小雅怨誹而不亂當周之衰雖君子不能無怨要在不至於亂而已文中子以為周之全盛不已過乎故通乎二子之說而小雅之道備矣謹對問君子能補過對甚哉聖人待天下之通且恕也朝而為盜跖莫而為伯夷聖人不棄也孟僖子之過也其悔亦晚矣雖然聖人不棄也曰猶愈乎卒而不知悔者也孟僖子之過可悲也已仲尼之少也賤天下莫知其為聖人魯人曰此吾東家丘也又曰此鄒人之子也楚之子西齊之晏嬰皆當時之所謂賢人君子也其言曰孔丘之道迂濶而不可用况夫三桓之間而孰知夫有僖子之賢哉僖子之病也告其子曰孔丘聖人之後也其先正考甫三命益恭而弗父何以有宋而授厲公華父督之亂無罪絶於宋其後必有聖人今孔丘博學而好禮殆其是與爾必往師之以學禮嗚呼孔丘用於魯三月而齊人畏其霸以僖子之賢而知夫子之為聖人也使之未亡而授之以政則魯作東周矣故曰孟僖子之過可悲也已雖然夫子之道充乎天下者自僖子始懿子學乎仲尼請於魯君而與之車使適周而觀禮焉而聖人之業然後大備僖子之功雖不能用之於未亡之前而猶能救之於已沒之後左丘明懼後世不知夫僖子之功也故丁寧而稱之以為補過之君子昔仲虺言湯之德曰改過不吝夫以聖人而不稱其無過之為能而稱其改之為善然則補過者聖人之徒歟孟僖子者聖人之徒也謹對穀梁四首問侵伐土地分民何以明正對三傳侵伐之例非正也左氏有鐘鼓曰伐無曰侵公羊粗曰侵精曰伐穀梁包人民驅牛馬曰侵斬樹木壞宫室曰伐愚以謂有隙曰侵有辭曰伐齊桓公侵蔡隙也蔡潰遂伐楚辭也司馬九伐之法負固不服則侵之賊賢害民則伐之然則負固不服者近乎隙賊賢害民者近乎辭周之衰也諸侯相吞而先王之疆理城郭蓋壞矣故侵伐之間夫子尤謹而書之蓋古者有分土而無分民諸侯之侵地者猶不容於春秋而况包人民驅牛馬哉桓公侵蔡不書所侵之地者侵之無辭也楚子入陳鄉取一人謂之夏州春秋略而不書以謂驅民之非正也嗚呼春秋之際非獨諸侯之相侵也晉侯取汶陽之田而陽樊之人不服愚又知春秋之不忍書乎此也謹對問魯猶三望對先儒論書猶之義者可以已也愚以為不然春秋之所以書猶者二曰如此而猶如此者甚之之辭也公子遂如齊至黃乃復辛巳有事於太廟仲遂卒于垂壬午猶繹萬入去籥是也曰不如此而猶如此者幸之之辭也閏月不告月猶朝于廟不郊猶三望是也夫子傷周道之衰禮樂文章之壞而莫或救之也故區區焉掇拾其遺亡以為其全不可得而見矣得見一二斯可矣故閏月不告月猶朝于廟者憫其不告月而幸其猶朝於廟也不郊猶三望者傷其不郊而幸其猶三望也夫郊祀者先王之大典而夫子不得親見之於周也故因魯之所行郊祀之禮而備言之耳春秋之書三望者皆為不郊而書也或卜郊不從乃免牲猶三望或郊牛之口傷改卜牛牛死乃不郊猶三望榖梁傳曰乃者亡乎人之辭也猶者可以已之辭也且夫魯雖不郊而猶有三望者存焉此夫子之所以存周之遺典也若曰可以已則是周之遺典絶矣或曰魯郊僣也而夫子何存焉曰魯郊僣也而夫子不譏夫子之所譏者當其罪也賜魯以天子之禮樂者成王也受天子之禮樂者伯禽也春秋而譏魯郊也上則譏成王次則譏伯禽成王伯禽不見于經而夫子何譏焉故曰猶三望者所以存周之遺典也范寧以三望為海岱淮公羊以為太山河海而杜預之說最備曰分野之星及國中山川皆因郊而望祭之此說宜可用謹對問魯作丘甲對先王之為天下也不求民以其所不為不強民以其所不能故其民優遊而樂易周之盛時其所以賦取於民者莫不有法故民不告勞而上不闕用及其衰也諸侯恣行其所以賦取於民者唯其所欲而刑罰隨之故其民至於窮而無告夫民之為農而責之以工也是猶居山者而責之以舟楫也魯成公作丘甲而春秋譏焉榖梁傳曰古者農工各有職甲非人人之所能為也丘作甲非正也而杜預以為古者四丘為甸甸出長轂一乘戎馬四匹牛十二頭甲士三人步卒七十二人而魯使丘出之也夫四丘而後為甸魯雖重斂安至於四倍而取之哉哀公用田賦曰二吾猶不足而夫子譏其殘民之甚未有四倍而取者也且夫變古易常者春秋之所譏也故書作三軍舍中軍初稅畝作丘甲用田賦者皆所以譏政令之所由變也而榖梁杜氏之說如此之相戾安得不辨其失而歸之正哉故愚曰穀梁之說是謹對問雩月何以為正對雩者先王所以存夫愛民之心而已也天之應乎人君者以其德不其言也人君修其德使之無愧乎其中而又何禱也雖然當嵗之旱也聖人不忍安坐而視民無告故為之雩雩者先王之所以存夫愛人之心而已也為傳者不逹乎此而為是非紛紛之論亦可笑矣穀梁傳曰月雩正也秋大雩非正也冬大雩非正也月雩之為正何也其時窮人力盡是月不雨則無及矣雩之必待其時窮人力盡何也雩者為旱請也古人之重請以為非讓也嗚呼為民之父母安視其急而曰毛澤未盡人力未竭以行其區區之讓哉愚以為凡書雩者記旱也一月之旱故雩書月一時之旱故雩書時書雩之例時月而不日唯昭公之末年八月上辛大雩季辛又雩而昭公之雩非旱雩也公羊以為又雩者聚衆以逐季氏然則旱雩之例亦可見矣傳例曰凡災異歷日者月歷月者時歷時者加日又雩記旱也旱記災也故愚以此為例謹對公羊三道問大夫無遂事對春秋之書遂一也而有善惡存焉君子觀其當時之實而已矣利害出於一時而制之於千里之外當此之時而不遂君子以為固上之不足以利國下之不足以利民可以復命而後請當此之時而遂君子以為専専者固所貶也而固者亦所譏也故曰春秋之書遂一也而有善惡存焉君子觀其當時之實而已矣公子結媵陳人之婦于鄄遂及齊侯宋公盟公羊傳曰媵不書此何以書以其有遂事書大夫無遂事此其言遂何大夫出疆有可以安國家利社稷則専之可也公子遂如周遂如晉公羊亦曰大夫無遂事此其言遂何公不得為政也其書遂一也而善惡如此之相逺豈可以不察其實哉春秋者後世所以學為臣之法也謂遂之不譏則愚恐後之為臣者流而為専謂遂之皆譏則愚恐後之為臣者執而為固故曰觀乎當時之實而已矣西漢之法有矯詔之罪而當時之名臣皆引此以為據若汲黯開倉以賑饑民陳湯發兵以誅郅支若此者専之可也不然獲罪於春秋矣謹對問定何以無正月對始終授受之際春秋之所甚謹也無事而書首時事在二月而書王二月事在三月而書王三月者例也至於公之始年雖有二月三月之書而又特書正月隱元年春王正月三月公及邾儀父盟于蔑莊元年春王正月二月夫人孫于齊所以揭天子之正朔而正諸侯之始也公羊傳曰緣民臣之心不可一日無君緣始終之義一年不二君不可曠年無君故諸侯皆踰年即位而書正月定公元年書曰王三月晉人執宋仲幾于京師先儒疑焉而未得其當也嘗試論之春秋十有二公其得終始之正而備即位之禮者四文公成公襄公哀公也攝而立不得備即位之禮者一隱公也先君不以其道終而已不得備即位之禮者六桓公莊公閔公僖公宣公昭公也先君不以其道終而又在外者二莊公定公也在外踰年而後至者一定公也且夫先君雖在外不以其道終然未嘗有踰年而後至者則是二百四十二年未嘗一日無君而定公之元年魯之統絶者自正月至于六月而後續也正月者正其君也昭公未至定公未立季氏當國而天子之正朔將誰正耶此定之所以無正月也公羊傳曰正月者正即位也定無正月者即位後也定哀多微辭而何休以為昭公出奔國當絶而定公又不得繼體奉正故諱為微詞嗚呼昭公絶而定公又不得立是魯遂無君矣穀梁以為昭無正終故定無正始觀莊公元年書正則不言而知其妄矣謹對問初稅畝對古者公田曰籍籍借也言其借民力以治此也詩曰雨我公田遂及我私言民之必先公田也傳曰私田稼不善則非吏公田稼不善則非民言上之必恤私稼也民先其公而上恤其私故民不勞而上足用也宣也無恩信於民民不肯盡力於公田故按行擇其善畝而稅之公羊傳曰稅畝者何履畝而稅也夫民不盡力於公田者上之過也宣公不責已悔過擇其善畝而稅之宜其民之謗讟而災異之作也稅畝之明年冬蝝生公羊傳曰蝝生不書此何以書幸之也猶曰受之云爾上變古易常應是而有天災其諸則宜於此焉變矣何休以為宣公懼災復古故其後大有年愚以為非也按春秋書作三軍後又書舍中軍書躋僖公後又書從祀先公事之復正未嘗不書宣公而果復古也春秋當有不稅畝之書故何休之說愚不信也謹對邇英進讀八首漢髙祖赦季布唐屈突通不降髙祖軾以謂漢髙祖唐髙祖皆創業之賢君季布屈突通皆一時之烈丈夫惟烈丈夫故能以身殉主有死無二惟賢君故能推至公之心不以私怨殺士此可以為萬世臣主之法漢宣帝詰責杜延年治郡不進軾以謂古者賢君用人無內外輕重之異故雖杜延年名卿不免出為邊吏治效不進則詰責之既進則褒賞之所以歷試人才考核事功蓋如此孝宣之治優於孝文者以此也馬周諫唐太宗亦以為言治天下者不可不知也叔孫通不能致二生軾以謂叔孫通制禮雖不能如三代然亦因時施宜有補於世者魯二生非之其言未必皆當通以謂不知時變亦宜矣然謹按揚子法言昔齊魯有大臣史失其名或曰如何其大也曰叔孫通欲制君臣之儀聘先生於齊魯所不能致者二人由此觀之大臣以道事君不可則止然後可以托六尺之孤寄百里之命若與時上下隨人俯仰雖或適用於一時何足謂之大臣為社稷之衛哉狄山論胸奴和親軾謹按漢制博士秩皆六百石耳然朝廷有大事必與丞相御史九卿列侯同議可否蓋親儒臣尊經術不以小臣而廢其言故狄山得與張湯爭議上前此人臣之所甚難而人主之所欲聞也溫顔以來之虛懷以受之猶恐不敢言又况如武帝作色憑怒致之於死乎故湯之用事至使盜賊半天下而漢室幾亂蓋起於狄山之不容也唐太宗夢虞世南軾謂古之賢君知直臣之難得忠言之難聞故生則盡其用歿則思其言想見其人形於夢寐可謂樂賢好德之主矣漢武帝雄才大略不减太宗汲黯之賢過於世南世南已死太宗思之汲黯尚存而武帝厭之故太宗之治幾於刑措而武帝之政盜賊半天下由此也夫文宗訪鄭公後得魏謨軾觀唐文宗覽貞觀事而思魏鄭公之後亦有意於善治矣雖然唐室凌遲未易興起非高才偉人無足以圖之而信訓注之狂謀幾隕宗社良可歎已至於奬魏謨之極諫願處於無過之地亦賢君之用心也張九齡不肯用張守圭牛仙客軾竊謂士大夫砥礪名節正色立朝不務雷同以固祿位非獨人臣之私義乃天下國家所恃以安者也若名節一衰忠信不聞亂亡隨之捷如影響西漢之末敢言者惟王章朱雲二人而已而雲廢則公卿持祿保妻子如張禹孔光之流耳故王莽以斗筲穿窬之才恣取神器如反掌唐開元之末大臣守正不回惟張九齡一人九齡既已忤㫖罷相明皇不復聞其過以致祿山之亂治亂之機可不慎哉顔真卿守平原以抗祿山軾以謂古者任人無內外輕重之異故雖漢宣之急賢蕭望之之得君猶更出治民然後大用非獨以歷試人材亦所以維持四方均內外之勢也唐開元天寶間重內輕外當時公卿名臣非以罪責不出守郡雖藩鎮帥守自以為不如寺監之僚佐故郡縣多不得人祿山之亂河北二十四郡一朝降賊獨有一顔真卿而明皇初不識也此重內輕外之弊可以為鑒東坡全集卷五十
