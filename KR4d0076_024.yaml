body:
  text: 東坡全集卷二十四宋蘇軾撰詩六十八首丙子重九二首三年瘴海上越嶠真我家登山作重九蠻菊秋未花唯有黃茆根堆壠生坳窊蜒酒糵衆毒酸甜如梨樝何以侑一樽鄰翁餽蛙蛇亦復強取醉歡謠雜悲嗟今年吁惡歲僵仆如亂麻此會我雖健狂風卷朝霞使我如霜月孤光挂天涯西湖不欲往墓樹號寒鴉窮塗不擇友過眼如亂雲餘子誰復數坐閲兩使君共飲去年堂俯看秋水紋此水與此人相追兩沄沄老去各休息造物嗟長勤佳哉此令節不惜與子分何以娛我客遊魚在清濆水師三百指鐵網欲掩羣獲多雖一快買放尤可欣此樂真不朽明年我歸耘白鶴峰新居欲成夜過西鄰翟秀才二首林行婆家初閉戶翟夫子舍尚留關連娟缺月黃昏後縹眇新居紫翠間繫悶豈無羅帶水韓退之云水作青羅帶山為碧玊簪割愁還有劍鋩山栁子厚云海上尖峯若劍鋩秋來處處割愁腸皆嶺南詩也中原北望無歸日鄰火村舂自往還甕間畢卓防偷酒壁後匡衡不點燈待鑿平江百尺井要分清署一壺氷佐卿恐是歸來鶴次律寧非過去僧他日莫尋王粲宅夢中來往本何曾次韻子由所居六詠堂前種山丹錯落馬腦盤堂後種秋菊碎金收辟寒草木如有情慰此芳歲闌幽人正獨樂不知行路難詩人故多感花發憶兩京石榴有正色玉樹真虛名粲粲秋菊花卓為霜中英萸槃照重九纈蕊兩鮮明幽居有古意義井分西牆誰言三伏熱止須一杯涼先生坐忍渴羣囂自披猖衆散徐酌飲逡巡味尤長先生飯土塯無物與劉義何以娛醉客時嗅砌下花井水分西鄰竹隂借東家蕭然行腳僧一身寄天涯東齋手種柏今復幾尺長知有桓司馬榛茆為遮藏近聞南臺松新枝出餘僵年來此懷抱豈復驚凡亡新居巳覆瓦無復風雨憂榿栽與籠竹小詩亦可求尚欲煩二師刺山出飛流應須鑿百尺兩綆載一牛吳子野絶粒不睡過作詩戲之芝上人陸道士皆和豫亦次其韻聊為不死五通仙終了無生一大緣獨鶴有聲知半夜老蠶不食巳三眠憐君解比人間夢芝有夢齋子由作銘許我時逃醉後禪會與江山成故事不妨詩酒樂新年又次韻二守同訪新居二首數畝蓬蒿古縣隂曉窗清快夜堂深也知卜築非真宅聊欲跏趺看此心聞道攜壺問竒字更因登木助微音相娛北戶江千頃直下都無地可臨此生真欲老牆隂却掃都忘歲月深拔薤已觀賢守政折蔬聊慰故人心風流賀監常吳語憔悴鍾儀獨楚音治狀兩邦俱第一潁川歸去肯重臨循守臨行出小鬟復用前韻學語雛鶯在栁隂臨行呼出翠帷深通家不隔同年面二守同年家得路方知異日心趂著春衫遊上苑要求國手教新音嶺梅不用催歸騎截鐙須防舊所臨循守近為韶種茶松間旅生茶巳與松俱瘦茨棘尚未容蒙翳爭交構天公所遺棄百歲仍稚幼紫笋雖不長孤根乃獨夀移栽白鶴嶺土軟春雨後彌旬得連隂似許晚遂茂能忘流轉若戢戢出鳥咮未任供臼磨且作資摘嗅千團輸大官百餅衒私鬬何如此一啜有味出吾囿白鶴山新居鑿井四十尺遇盤石石盡乃得泉海國困蒸溽新居利高寒以彼陟降勞易此寢處乾但苦江路峻常慙汲腰酸矻矻煩四夫磽磽斫層巒彌旬得尋丈下有青石磐終日但迸火何時見飛瀾豐我粲與醪利汝椎與鑽山石有時盡我意殊未闌今朝僮僕喜黃土復可摶晨瓶得雪乳莫甕渟氷湍我生類如此何適不艱難一勺亦天賜曲肱有餘歡三月二十九日二首南嶺過雲開紫翠北江飛雨送淒涼酒醒夢回春盡日閉門隱几坐燒香門外橘花猶的皪墻頭荔子已斕斑樹暗草深人靜處卷簾欹枕卧看山吾謫海南子由雷州被命即行了不相知至梧乃聞其尚在藤也旦夕當追及作此詩示之九疑聨綿屬衡湘蒼梧獨在天一方孤城吹角煙樹裏落月未落江蒼茫幽人拊枕坐歎息我行忽至舜所藏江邊父老能説子白鬚紅頰如君長莫嫌瓊雷隔雲海聖恩尚許遙相望平生學道真實意豈與窮達俱存亡天其以我為箕子要使此意留要荒他年誰作輿地志海南萬里真吾鄉行瓊儋間肩輿坐睡夢中得句云千山動鱗甲萬谷酣笙鐘覺而遇清風急雨戲作此數句四州環一島百洞蟠其中我行西北隅如度月半弓登高望中原但見積水空此生當安歸四顧真途窮眇觀大瀛海坐詠談天翁茫茫太倉中一米誰雌雄幽懷忽破散永嘯來天風千山動鱗甲萬谷酣笙鐘安知非羣仙鈞天宴未終喜我歸有期舉酒屬青童急雨豈無意催詩走羣龍夢雲忽變色笑電亦改容應怪東坡老顔衰語徒工久矣此妙聲不聞蓬萊宫次前韻寄子由我少即多難邅回一生中百年不易滿寸寸彎強弓老矣復何言榮辱今兩空泥丸尚一路古語云十方薄伽梵一路涅槃門所向餘皆窮似聞崆洞西仇池迎此翁胡為適南海復駕埀天雄下視九萬里浩浩皆積風回望古合州屬此琉璃鍾離别何足道我生豈有終渡海十年歸方鏡照兩童還鄉亦何有暫假壺公龍峩眉向我笑錦水為君容天人巧相勝不獨數子工指點昔遊處蒿萊生故宫安期生并引安期生世知其為仙者也然太史公曰蒯通善齊人安期生生嘗以䇿干項羽羽不能用羽欲封此兩人兩人終不肯受亡去豫每讀此未嘗不廢書而歎嗟乎仙者非斯人而誰為之故意戰國之士如魯連虞卿皆得道者歟安期本䇿士平日交蒯通嘗干重瞳子不見隆凖公應如魯仲連抵掌吐長虹難堪踞牀洗寧挹扛鼎雄事既兩大繆飄然籋遺風乃知經世士出世或乘龍豈比山澤臞忍飢啖柏松縱使偶不死正堪為僕僮茂陵秋風客望祀猶蟻蜂海上如瓜棗可聞不可逢夜夢并引七月十三日至儋州十餘日矣淡然無一事學道未至靜極生愁夜夢如此不免以書自怡夜夢嬉遊童子如父師檢責驚走書計功當畢春秋餘今乃始及桓莊初怛然悸寤心不舒起坐有如挂鈎魚我生紛紛嬰百緣氣固多習獨此偏棄書事君四十年仕不顧留書繞纒自視汝與丘孰賢易韋三絶丘猶然如我當以犀革編遷居之夕聞鄰舍兒誦書欣然而作幽居亂蛙黽生理半人禽跫然已可喜況聞弦誦音兒聲自圓美誰家兩青襟且欣習齊咻未敢笑越吟九齡起韶石薑子家日南吾道無南北安知不生今海濶尚挂斗天高欲橫參荆榛短牆缺燈火破屋深引書與相和置酒仍獨斟可以侑我醉琅然如玉琴聞子由瘦儋耳至難得肉食五日一見花豬肉十日一遇黃雞粥土人頓頓食薯芋薦以熏鼠燒蝙蝠舊聞蜜唧嘗嘔吐稍近蝦蟇緣習俗十年京國厭肥羜日日蒸花壓紅玉從來此腹負將軍今者固宜安脫粟俗諺云大將軍食飽捫腹而歎曰我不負汝左右曰將軍固不負此腹此腹負將軍未嘗出少智慮也人言天下無正味蝍蛆未遽賢麋鹿海康别駕復何為帽寬帶落驚僮僕相看會作兩臞仙還鄉定可騎黃鵠客俎經旬無肉又子由勸不讀書蕭然清坐乃無一事病怯鯹醎不買魚爾來心腹一時虛使君不復憐烏攫屬國方將掘鼠餘老去獨收人所棄遊哉時到物之初從今免被孫郎笑絳帕蒙頭讀道書宥老楮我牆東北隅張王維老榖樹先樗櫟大葉等桑柘沃流膏馬乳漲墮子楊梅熟胡為尋丈地養此不材木蹶之得輿薪規以種松菊靜言求其用略數得五六膚為蔡侯紙子入桐君録黃繒練成素黝面頮作玉灌灑蒸生菌腐餘光吐燭雖無傲霜節幸免狂酲毒孤根信微陋生理有倚伏投斧為賦詩德怨聊相贖觀棊并引豫素不解棋嘗獨遊廬山白鶴觀觀中人皆闔户晝寢獨聞棋聲於古松流水之間意欣然喜之自爾欲學然終不解也兒子過乃粗能者儋守張中日從之戲豫亦隅坐竟日不以為厭也五老峰前白鶴遺趾長松蔭庭風日清美我時獨遊不逢一士誰歟棋者戶外屨二不聞人聲時聞落子紋枰坐對誰究此味空鈎意釣豈在魴鯉小兒近道剝啄信指勝固欣然敗亦可喜優哉遊哉聊復爾耳糴米糴米買束薪百物資之市不緣耕樵得飽食殊少味再拜請邦君願受一廛地知非笑昨夢食力免內愧春秧幾時花夏稗忽已穟悵焉撫耒耜誰復識此意入寺曳杖入寺門輯杖挹世尊我是玊堂仙謫來海南村多生宿業盡一氣中夜存旦隨老鴉起飢食扶桑暾光圓摩尼珠照耀玻璃盆來從佛印可稍覺魔忙奔間看樹轉午坐到鐘鳴昏斂收平生心耿耿聊自溫次韻子由三首東亭仙山佛國本同歸世路玄關兩背馳到處不妨間卜築流年自可數期頥遙知小檻臨廛市定有新松長棘茨誰道茆簷劣容膝海天風雨看紛披東樓白髮蒼顔自照盆董生端合是前身獨栖高閣多辭客為著新書未絶麟小醉易醒風力軟安眠無夢雨聲新長歌自誷真堪笑底處人間是所欣栁子厚詩云長歌返故室自謂非所欣椰子冠天教日飲欲全絲美酒生林不待儀自漉疏巾邀醉客更將空殼付冠師前漢高紀注云薛有作冠師規摹簡古人爭看簪導輕安髮不知更著短簷高屋帽東坡何事不違時次韻子由月季花再生幽芳本長春暫瘁如蝕月且當付造物未易料枯枿也知宿根深便作紫笋茁乘時出婉娩為我暖栗冽先生蚤貴重廟論推英拔如今城東瓜不記召南茇陋居有逺寄小圃無濶躡還為久處計坐待行年匝子由明年六十臘果綴梅枝春杯浮竹葉誰言一萌動已覺萬木活聊將玊蕊新世謂此玫瑰花插向綸巾折次韻子由浴罷理髮千梳淨風晞勝湯沐閉息萬竅通霧散名乾浴頽然語默喪靜見天地復時令具薪水漫欲濯腰腹陶匠不可求盆斛何由足海南無浴器故常乾浴而已老雞卧糞土振羽雙瞑目倦馬𩥇風沙奮鬛一噴玉垢淨各殊性快愜聊自沃雲母透蜀紗琉璃瑩蘄竹稍能夢中覺漸使生處熟楞嚴在牀頭妙偈時仰讀返流歸照性獨立遺所矚未知仰山禪已就季主卜安心會自得助長毋相督借前韻賀子由生第四孫斗老今日散幽憂彈冠及新沐況聞萬里孫巳報三日浴朋來四男子大壯泰臨復開書喜見面未飲春生腹無官一身輕有子萬事足舉家傳吉夢殊相驚凡目爛爛開眼電磽磽峙頭玊李賀詩云頭玉磽磽眉宇翠杜郎生得真男子但令強筋骨可以耕衍沃不須富文章端解耗紙竹君歸定何日我計久已熟長留五車書要使九子讀吾與子由共九孫男矣簞瓢有內樂軒冕無流矚人言適似我窮達已可卜蚤謀二頃田莫待八州督吾前後典八州獨覺瘴霧三年恬不怪反畏北風生體疥朝來縮頸似寒鴉焰火生薪聊一快紅波翻屋春風起先生默坐春風裏浮空眼纈散雲霞無數心花發桃李翛然獨覺午窗明欲覺猶聞醉鼾聲回首向來蕭瑟處也無風雨也無晴十二月十七日夜坐達曉寄子由燈燼不挑垂暗蕊爐灰重撥尚餘薰清風欲發鴉翻樹缺月初升犬吠雲閉眼此心新活計隨身孤影舊知聞雷州别駕應危坐跨海幽光與子分謫居三適三首旦起理髮安眠海自運浩浩潮黃宫日出露未晞鬱鬱濛霜松老櫛從我久齒疏含清風一洗耳目明習習萬竅通少年苦嗜睡朝謁常忽匆爬搔未云足已困冠巾重何異服轅馬沙塵滿風騣雕鞍響珂月實與杻械同解放不可期枯栁豈易逢誰能書此樂獻與腰金翁午窗坐睡蒲團盤兩膝竹几閣雙肘此間道路熟徑到無何有身心兩不見息息安且久睡蛇本亦無何用鉤與手神凝疑夜禪體適劇卯酒我生有定數祿盡空餘夀枯楊下飛花膏澤回衰朽謂我此為覺物至了不受謂我今方夢此心初不垢非夢亦非覺請問希夷叟夜卧濯足長安大雪年束薪抱衾裯雲安市無井斗水寬百憂今我逃空谷孤城嘯鵂鶹得米如得珠食菜不敢留況有松風聲釡鬵鳴颼颼瓦盎深及膝時復冷暖投明燈一爪翦快若鷹辭韝天低瘴雲重地薄海氣浮土無重膇藥獨以薪水瘳誰能更包裹冠履裝沐猴子由生日上天不難知好惡與我一方其未定間人力破隂騭少忍待其定報應真可必季氏生而仁觀過見其實端如栁下惠焉往不三黜天有時而定夀考未易畢兒孫七男子三子四孫次第皆逢吉遙知設羅門獨掩懸罄室回思十年事無愧篋中筆但願白髮兄年年作生日以黃子木拄杖為子由生日之夀靈夀扶孔光菊潭飲伯始雖云間草木豈樂蒙此恥一時偶收用千載相瘢疻海南無嘉植野果名黃子堅瘦多節目天材任操倚嗟我始剪裁世用或緣此貴從老夫手往配先生几相從歸故山不愧仙人杞本草枸杞一名仙人杖過於海舶得邁寄書酒作詩逺和之皆粲然可觀子由有書相慶也因用其韻賦一篇并寄諸子姪我似老牛鞭不動雨滑泥深四蹄重汝如黃犢走却來海濶山高百程送庶幾門戶有八慈不恨居鄰無二仲他年汝曹笏滿牀中夜起舞踏破甕會當洗眼看騰躍莫指癡腹笑空洞譽兒雖是兩翁癖積德已自三世種豈惟萬一許生還尚恐九十煩珍從六子晨耕簞瓢出衆婦夜績燈火共春秋古史乃家法詩筆離騷亦時用但令文字還照世糞土腐餘安足夢上元夜過赴儋守召獨坐有感戊寅歲使君置酒莫相違守舍何妨獨掩扉靜看月窗盤蜥蝪卧聞風幔落蛜蝛燈花結盡吾猶夢香篆消時汝欲歸搔首淒涼十年事傳柑歸遺滿朝衣海南人不作寒食而以上已上冢豫攜一瓢酒尋諸生皆出矣獨老符秀才在因與飲至醉符蓋儋人之安貧守靜者也老鴉銜肉紙飛灰萬里家山安在哉蒼耳林中太白過鹿門山下德公回管寧投老終歸去王式當年本不來記取城南上巳日木棉花落刺桐開新居朝陽入北林竹樹散疏影短籬尋丈間寄我無窮境舊居無一席逐客猶遭屏結茅得兹地翳翳村巷永數朝風雨涼畦菊發新穎俯仰可卒歲何必謀二頃五色雀并引海南有五色雀常以兩絳者為長進止必隨焉俗謂之鳯皇云久旱而見輒雨潦則反是吾卜居儋耳城南嘗一至庭下今日又見之進士黎子雲及其弟威家既去吾舉酒祝之曰若為吾來者當再集也已而果然乃為賦詩粲粲五色羽炎方鳯之徒青黃縞玄服翼衛兩紱朱仁心知閔農常告雨霽符我窮惟四壁破屋無瞻烏惠然此粲者來集竹與梧鏘鳴如玉佩意欲相嬉娛寂寞兩黎生食菜真臞儒小圃散春物野桃陳雪膚舉杯得一笑見此紅鸞雛高情如飛仙未易握粟呼胡為去復來眷眷豈屬吾回翔天壤間何必懷此都倦夜倦枕厭長夜小窗終未明孤村一犬吠殘月幾人行衰鬢久已白旅懷空自清荒園有絡緯虛織竟何成用過韻冬至與諸生飲酒小酒生黎法乾糟瓦盎中芳辛知有毒滴瀝取無窮凍醴寒初泫春醅暖更饛華夷兩樽合醉笑一歡同里閈峩山北田園震澤東歸期那敢説安訊不曾通鶴鬢驚全白犀圍尚半紅愁顔解符老夀耳鬭吳翁得穀鵝初飽亡貓鼠益豐黃薑收土芋蒼耳斫霜叢兒瘦緣儲藥奴肥為種松頻頻非竊食數數尚乘風河伯方夸若靈媧自舞馮歸途陷泥淖炬火燎茅蓬膝上王文度家傳張長公和詩仍醉墨戲海亂羣鴻符吳皆坐客其餘皆即事實録也縱筆三首寂寂東坡一病翁白鬚蕭散滿霜風小兒誤喜朱顔在一笑那知是酒紅父老爭看烏角巾應緣曾現宰官身溪邊古路三義口獨立斜陽數過人北船不到米如珠醉飽蕭條半月無明日東家知祀竈隻雞斗酒定膰吾貧家淨掃地貧家淨掃地貧女好梳頭下士晚聞道聊以拙自修扣門有嘉客一飯相邀留舂炊勿草草此客未易偷慎勿用勞薪感我如薰蕕德人抱衡石銖黍安可廋次韻子由贈吳子野先生二絶句馬迹車輪滿四方苦為閉暑小茆堂仙心欲捉左元放癡疾還同顧長康江令蒼苔圍故宅謝家語燕集華堂先生笑説江南事祇有青山繞建康被酒獨行遍至子雲威徽先覺四黎之舍三首半醒半醉問諸黎竹刺藤梢步步迷但尋牛矢覓歸路家在牛欄西復西總角黎家三小童口吹蔥葉送迎翁莫作天涯萬里意溪邊自有舞雩風符老風情奈老何朱顔減盡鬢絲多投梭每困東鄰女換扇唯逢春夢婆是日復見符林秀才説換扇之事夜燒松明火歲暮風雨交客舍凄薄寒夜燒松明火照室紅龍鸞快焰初煌煌碧煙稍團團幽人忽富貴繐帳芬椒蘭珠煤綴屋稍香􅢧音詣松瀝也出本草注流銅槃坐看十八公俯仰灰燼殘齊奴朝爨蠟萊公夜長歎海康無此物燭盡更未闌庚辰歲人日作時聞黃河已復北流老臣舊數論此今斯言乃驗老去仍栖隔海村夢中時見作詩孫天涯巳慣逢人日歸路猶欣過鬼門三策巳應思賈讓孤忠終未赦虞翻典衣剩買河源米屈指新篘作上元不用長愁挂月村檳榔生子竹生孫海南勒竹每節生枝如竹竿大蓋竹孫也新巢語燕還窺硯舊雨來人不到門春水蘆根看鶴立夕陽楓葉見鴉翻此生念念隨泡影莫認家山作本元庚辰歲正月十二日天門冬酒熟豫自漉之且漉且嘗遂以大醉二首自撥牀頭一甕雲幽人先巳醉濃芬天門冬熟新年喜麴米春香並舍聞杜子美詩云間道雲安麴米春蓋酒名也菜圃漸疏花漠漠竹扉斜掩雨紛紛擁裘睡覺知何處吹面東風散纈紋載酒無人過子雲年來家醖有竒芬醉鄉杳杳誰同夢睡息齁齁得自聞口業向詩猶小小眼花因酒尚紛紛點燈更試淮南語泛溢東風有縠紋淮南子云東風至而酒泛溢許慎注云酒泛清酒也追和戊寅歲上元春鴻社燕巧相違白鶴峯頭白板扉石建方欣洗牏厠薑龎不解歎蠨蝛一龕京口嗟春夢萬炬錢塘憶夜歸合浦賣珠無復有當年笑我泣牛衣題過所畫枯木竹石三首老可能為竹寫真小坡今與石傳神山僧自覺菩提長心境都將付卧輪散木支離得自全交柯蚴蟉欲相纒不須更説能鳴雁要以空中得盡年倦看澀勒暗蠻村亂棘孤藤束瘴根唯有長身六君子依依猶得似淇園真一酒歌并引布算以步五星不如仰觀之捷吹律以求中聲不如耳齊之審鉛汞以為藥䇿易以候火不如天造之真也是故神宅空樂出虛踏踘者以氣升孰能推是理以求天造之藥乎於此有物其名曰真一逺遊先生方治此道不飲不食而飲此酒食此藥居此堂豫亦竊其一二故作真一之歌其詞曰空中細莖插天芒不生沮澤生陵岡涉閲四氣更六陽森然不受螟與蝗飛龍御月作秋涼蒼波改色屯雲黃天旋雷動玉塵香起搜十裂照坐光跏趺牛噍安且詳動搖天關出瓊漿壬公飛空丁女藏三伏遇井了不嘗釀為真一和而莊三杯儼如侍君王湛然寂照非楚狂終身不入無功鄉東坡全集卷二十四
