body:
  text: 東坡全集巻二十三宋蘇軾撰詩六十七首江郊并引惠州歸善縣治之北數百步抵江少西有盤石小潭可以垂釣作江郊詩云江郊葱矓雲水蒨絢碕岸斗入洄潭輪轉先生悦之布席閒燕初日下照潜鱗俯見意釣忘魚樂此竿綫優哉悠哉玩物之變詹守攜酒見過用前韻作詩聊復和之箕踞狂歌老瓦盆燎毛燔肉似羌渾傳呼草市來攜客洒掃漁磯共置樽山下黄童爭看舞江干白骨已銜恩時詹方議𦵏暴骨孤雲落日西南望長羨歸鴉自識村寄鄧道士并引羅浮山有野人相傳葛穉川之𨽻也鄧道士守安山中有道者也嘗於庵前見其足迹長二尺許紹聖二年正月十日予偶讀韋蘇州寄全椒山中道士詩云今朝郡齋冷忽念山中客澗底束荆薪歸來煑白石遥持一樽酒逺慰風雨夕落葉滿空山何處尋行迹乃以酒一壺仍依蘇州韻作詩寄之云一盃羅浮春逺餉採薇客遥知獨酌罷醉卧松下石幽人不可見清嘯聞月夕聊戯庵中人空飛本無迹上元夜前年侍玉輦端門萬枝燈璧月挂罘罳珠星綴觚稜去年中山府老病亦宵興牙旗穿夜市鐵馬響春冰今年江海上雲房寄山僧亦復舉膏火松間見層層散筞桄榔林林疎月鬅鬙使君置酒罷簫鼓轉松陵狂生來索酒賈道人也一舉輒數升浩歌出門去我亦歸瞢騰正月二十四日與兒子過賴仙芝玉原秀才僧曇頴行全道士何宗一同㳺羅浮道院及栖禪精舍過作詩和其韻寄邁迨斷橋隔勝踐脱屨欣小憇瘴花已繁紅官柳猶疎細斜川二三子悼歎吾年逝凄凉羅浮館風壁頽雨砌黄冠常苦饑迎客羞破袂仙山在何許歸鶴時墮毳崎嶇拾松黄欲救齒髮弊坐令禪客笑一夢等千嵗栖禪晚置酒蠻果粲蕉荔齋厨釡無羮野餉籃有蕙嬉逰趂時節俯仰了此世猶當洗業障更作臨水禊寄書陽羨兒并語長頭弟門户各努力先期畢租税正月二十六日偶與數客野步嘉祐僧舍東南野人家雜花盛開扣門求觀主人林氏媪出應白髮青裙少寡獨居三十年矣感歎之餘作詩記之縹蔕緗枝出絳房緑陰青子送春忙涓涓泣露紫含笑焰焰燒空紅佛桑落日孤煙知客恨短籬破屋為誰香主人白髮青裙袂子美詩中黄四娘龍尾石硯寄猶子逺皎皎穿雲月青青出水荷文章工㸃􅚭忠義老研磨偉節何須怒寛饒要少和吾衰此無用寄與小東坡逺為人類予贈王子直秀才萬里雲山一破裘杖端閒挂百錢㳺五車書已留兒讀二頃田應為鶴謀水底笙歌蛙兩部山中奴婢橘千頭幅巾我欲相隨去海上何人識故侯次韻表兄程正輔江行見桃花曲士賦懷沙草木傷莽莽徳人無荆棘坐失嶺嶠阻我兄瑚璉姿流落瘴江浦淨眼見桃花紛紛墮紅雨蕭然振衣裓笑問散花女我觀解語花粉色如黄土一言破千偈况爾初不語可憐一轉話他日如何舉故復此微吟聊和鷗鴉櫓江邊閒草木閒客當為主爾來子美瘦正坐作詩苦袖手焚筆硯淸篇真漫與願兄理北轅六轡去如組上林桃花開水暖鴻北翥追餞正輔表兄至博羅賦詩為别孤臣南㳺墮黄菅君亦何事來牧蠻艤舟蜑戸龍岡窟置酒椰葉桄榔間高談已笑衰語陋傑句尤覺清詩孱博羅小縣僧舍古我不忍去君忘還君應囘望秦與楚夢渉漢水愁秦關我亦坐念高安客神㳺黄蘗㕘洞山何時曠蕩洗瑕謫與君歸駕相追攀梨花寒食隔江路兩山遥對雙烟鬟歸耕不用一錢物惟要兩脚飛孱顔玉牀丹鏃記分我助我金鼎光斕斑再用前韻賦樂天霜鬢如霜菅始知謝遣素與蠻我兄緑髮蔚如故已了夢幻齊人間蛾眉勸酒聊爾耳處仲太忍茂𢎞孱三盃徑醉便歸卧海上知復幾往還連娟六么趂蹋鞠杳𦕈三疊縈陽關酒醒夢斷何所有落花流水空靑山忽驚鐃鼓發半夜明月不許幽人攀贈行無物惟一語莫遣瘴霧侵雲鬟羅浮道人一傾葢欲繫白日留君顔應知我是香案吏他年許綴蓬萊班真一酒并引米麥水三一而已此東坡先生真一酒也撥雪披雲得乳泓蜜蠭又欲醉先生真一色味頗類予在黄州日所醖蜜酒也稻垂麥仰陰陽足器潔泉新表裏清曉日着顔紅有暈春風入髓散無聲人間真一東坡老與作青州從事名游博羅香積寺并引寺去縣七里三山犬牙夾道皆美田麥禾甚茂寺下谿水可作碓磨若築塘百步閘而落之可轉兩輪舉四杵也以屬縣令林抃使督成之二年流落鼃魚鄉朝來喜見麥吐芒東風搖波舞淨緑初日泫露酣嬌黄汪汪春泥已沒膝剡剡秋榖初分秧誰言萬里出無友見此二美喜欲狂三山屛擁僧舍小一谿雷轉松陰凉要令水力供磑磨與相地脉增隄防霏霏落雪㸔收麫隱隱疊鼓聞舂糠散流一啜雲子白炊裂十字瓊肌香豈惟牢九薦古味東晳餅賦云漫頭薄持起搜牢九要使真一流仙漿詩成捧腹便絶倒書生説食真膏肓次韻定慧欽長老見寄八首并引蘇州定慧長老守欽使其徒卓契順來惠州問予安否且寄擬寒山十頌語有璨忍之通而詩無島可之寒吾甚嘉之為和八首左角㸔破楚南柯聞長滕鈎簾歸乳燕穴紙出癡蠅為䑕常留飯憐蛾不㸃燈崎嶇真可笑我是小乘僧鐵橋本無柱石樓豈有門舞空五色羽吠雲千嵗根松花釀仙酒木客餽山飱我醉君且去陶云吾亦云羅浮高萬仞下看扶桑卑黙坐朱明洞玉池自生肥從來性坦率醉語漏天機相逢莫相問我不記吾誰幽人白骨觀大士甘露滅根塵各清淨心境兩奇絶真源未純熟習氣餘陋劣譬如已放鷹中夜時掣紲誰言窮巷士乃竊造物權所見皆我有安居受其全戲作一篇書千古發爭端儒墨起相殺予初本無言閒居蓄百毒救彼跛與盲依山作陶穴掩此暴骨横區區効一溉豈能濟含生力惡不已出時哉非汝爭少壯欲及物老閒餘此心微生山海間坐受瘴霧侵可憐鄧道士攝衣問呻吟覆舟却私渡㫁橋費千金淨名毘耶中妙喜恒沙外初無往來相二土同一在云何定慧師尚欠行脚債請判維摩慿一到東坡界二月十九日攜白酒鱸魚過詹使君食槐葉冷淘枇杷巳熟粲金珠桑落初嘗灧玉蛆暫借垂蓮十分琖一澆空腹五車書青浮卵盌槐芽餅紅㸃冰槃藿葉魚醉飽高眠真事業此生有味在三餘江漲用過韻草木生故墟牛羊滿空瀆春江圍草市夜浪浮竹屋巳連漲海白尚帶霍山緑坎離更休王魚鼈横陵陸得非崑崙囚欲報陸渾衂行㸔北風競來救南國蹙長驅連山燒一掃含沙毒孤吟愍造化何時停倚伏當憐水旱氓不作舟車蓄江流儻席巻社酒期茆縮連雨江漲二首越井岡頭雲出山牂牁江上水如天牀牀避漏幽人屋浦浦移家蜒子船龍巻魚鰕并雨落人隨雞犬上墻眠祗應樓下平堦水長記先生過嶺年急雨蕭蕭作晚凉卧聞榕葉響長廊微明燈火耿殘夢半濕簾帷浥舊香高浪隱牀吹罋盎闇風驚樹擺琳琅先生不出晴無用留向空堦滴夜長四月十一日初食荔支南村諸楊北村盧謂楊梅盧橘也白花青葉冬不枯垂黄綴紫煙雨裏特與荔支為先驅海山仙人絳羅襦紅紗中單白玉膚不須更待妃子笑風骨自是傾城姝不知天公有意無遣此尤物生海隅雲山得伴松檜老霜雪自困樝梨麄先生洗琖酌桂醑氷槃薦此赬虬珠似聞江鰩斫玉柱更洗河豚烹腹腴予嘗謂荔支厚味高格兩絶果中無比惟江鰩柱河豚魚近之耳我生涉世本為口一官久巳輕蓴鱸人間何者非夢幻南來萬里真良圖桄榔杖寄張文潜一首時初聞黄魯直遷黔南范淳父九疑也睡起風清酒在亡身隨殘夢兩茫茫江邊曵杖桄榔瘦林下尋苖蓽撥香獨步儻逢勾漏令逺來莫恨曲江張遥知魯國真男子獨憶平生盛孝章荅周循州蔬飯藜牀破衲衣掃除習氣不吟詩前生似是盧行者後學過呼韓退之未敢叩門求夜話時叨送米續晨炊知君清俸難多輟且覓黄精與療饑次韻程正輔㳺碧落洞空山不難到絶境未易名何時謫仙人來作鈞天聲胸中幾雲夢餘地方恢宏長庚與北斗錯落綴冠纓黄公獻紫芝赤松餽青精谿山久寂寞請續離騷經抱枝寒蜩咽繞耳飛蚊清謫仙拊掌笑笑此羽皇銘我頃嘗獨㳺自適孤雲情君今又繼往霧雨愁青㝠感君兄弟意尋羊問初平玉牀分箭鏃不忍獨長生詩成輒寄我妙絶陶謝并孤鴻方避弋老驥猶在坰鳥獸如可羣永寄槁木形何山不堪隱飲水自修齡六月十二日酒醒歩月理髮而寢羽蟲見月爭翾飜我亦散髮虛明軒千梳冷快肌骨醒風露氣入霜蓬根起舞三人漫相屬停盃一問終無言曲肱薤簟有佳處夢覺瓊樓空㫁魂荔支歎十里一置飛塵灰五里一候兵火催顛坑仆谷相枕藉知是荔支龍眼來飛車跨山鶻横海風枝露葉如新採宫中美人一破顔驚塵濺血流千載永元荔支來交州天寳嵗貢取之涪至今欲食林甫肉無人舉觴酹伯㳺漢永元中交州進荔支龍眼十里一置五里一候奔馳死亡罹猛獸毒蟲之害者無數唐𦍑字伯㳺為臨武長上書言狀和帝罷之唐天寳中葢取涪州荔支自子午谷路進入我願天公憐赤子莫生尤物為瘡痏君不見武夷谿邊粟粒芽前丁後蔡相籠加爭新買寵各出意今年鬪品充官茶吾君所乏豈此物致養口體何陋耶洛陽相君忠孝家可憐亦進姚黄花洛陽貢花自錢惟演始大小龍茶始於丁晉公成於蔡君謨歐陽永叔聞君謨進小龍團驚歎曰君謨士人也何至作此事今年閩中監司乞進鬪茶許之江月五首并引嶺南氣候不常吾嘗云菊花開時乃重陽涼天佳月即中秋不須以日月為斷也今嵗九月殘暑方退既望之後月出愈遲然予嘗夜起登合江樓或與客逰豐湖入栖禪寺叩羅浮道院登逍遥堂逮曉乃歸杜子美云四更山吐月殘夜水明樓此殆古今絶唱也因其句作五首仍以殘夜水明樓為韻一更山吐月玉塔卧微瀾正似西湖上涌金門外㸔冰輪横海闊香霧入樓寒停鞭且莫上照我一盃殘二更山吐月幽人方獨夜可憐人與月夜夜江樓下風枝夕未停露草不可藉歸來掩關卧唧唧蟲夜話三更山吐月栖鳥亦驚起起尋夢中㳺清絶正如此驅雲掃衆宿俯仰迷空水幸可飲我牛不須違洗耳四更山吐月皎皎為誰明幽人赴我約坐待玉䋲横野橋多斷板山寺有微行今夕定何夕夢中㳺化城五更山吐月窓逈室幽幽玉鈎還挂户江練却明樓星河澹欲曉鼓角冷知秋不眠飜五詠清切變蠻謳聞正輔表兄將至以詩迎之生逢堯舜仁得作嶺海㳺雖懐跫然喜豈免跕墮憂暮雨侵重膇曉烟騰鬱攸朝槃見蜜唧夜枕聞鵂鶹幾欲烹鬱屈固嘗饌鈎輈舌音漸獠變而汗嘗騂羞賴我存黄庭有時仍丹丘目聽不任耳踵息殆廢喉稍欣素月夜遂度黄茆秋我兄清廟器持節瘴海頭蕭然三家步横此萬斛舟人言得漢吏天遣活楚囚惠然再過我樂哉十日留但恨參語賢忽潜九原幽萬里儻同歸兩鰥當對耰軾䘮婦已三年矣正輔近亦有亡嫂之戚故云强歌非真達何必師莊周正輔既見和復次前韻慰皷盆勸學佛稚川真長生少從鄭公游孝章偶不死免為文舉憂餘齡㑹有適獨往豈相攸由來警露鶴不羨撮蚤鶹願加視後鞭同駕躅空輈寧飱墮齒堇勿憶齊眉羞何時遂縱壑歸路同首丘東岡松柏老西嶺橘柚秋著意尋彌明長頸髙結喉無心逐定逺燕頷飛虎頭君方卒功名一泛范蠡舟我亦霑沛渥漸解鍾儀囚寧須張子房萬户自擇留猶勝嵇叔夜孤憤甘長幽南牕可寄傲北山早歸耰此語君勿疑老彭跨商周同正輔表兄㳺白水山偉哉造物真豪縱攫土摶沙為此弄擘開翠峽走雲雷截破奔流作潭洞因隨化人履巨迹得與仙兄躡飛鞚曵杖不知巖谷深穿雲但覺衣裘重坐㸔驚鳥投霜葉知有老蛟蟠石甕金沙玉礫粲可數古鏡寳奩寒不動念兄獨立與世疎絶境難到惟我共永辭角上兩蠻觸一洗胸中九雲夢浮來山高囘望失武陵路絶無人送筠籃擷翠爪甲香素綆分碧銀缾凍歸路霏霏湯谷暗野堂活活神泉涌觧衣浴此無垢人身輕可試雲間鳳與正輔㳺香積寺越山少松竹常苦野火厄此峯獨蒼然感荷佛祖力茯苓無人採千嵗化琥珀幽光發中夜見者惟木客我豈無長鑱真贗苦難識靈苖與毒草疑似在毫髮把玩竟不食棄置長太息山僧類有道辛苦常谷汲我慙作機舂鑿破混沌穴幽尋恐不繼書板記嵗月次韻正輔同㳺白水山祗知楚越為天涯不知肝膽非一家此身如綫自縈繞左旋右轉隨繅車誤抛山林入朝市平地咫尺千褒斜欲從穉川隱羅浮先與靈運開永嘉首參虞舜欵韶石次謁六祖登南華仙山一見五色羽雪樹兩摘南枝花赤魚白蟹筯屢下黄柑緑橘籩常加糖霜不待蜀客寄荔支莫信閩人誇恣傾白蜜收五稜細斸黄土栽三椏正輔分人參一苖歸種韶陽來詩本用䃁字惠州無書不見此字所出故且從木奉和朱明洞裏得靈草翩然放杖凌蒼霞豈無軒車駕熟鹿亦有鼓吹號寒蛙仙人勸酒不用勺石上自有樽罍窪徑從此路朝玉闕千里莫遣毫釐差故人日夜望我歸相迎欲到長風沙豈知乘槎天女側獨倚雲機㸔織紗世間誰似老兄弟篤愛不復相疵瑕相攜行到水窮處庶幾一見留子嗟千年枸杞常夜吠無數草棘工藏遮但令凡心一洗濯神人仙藥不我遐山中歸來萬想滅豈復囘顧雙雲鴉轍有白髮近二十年矣然止百餘莖不增不減䖍州道人王正彦教令拔去以真水火養之恐不復更生從其言巳數月而白髮不出更年嵗不見豈真不生耶子曕兄示我月中梳頭詩戯次來韻言拔白之驗水上有車車自飜懸流如線垂前軒霜蓬已枯不再緑有客勸我抽其根根根一去紫茸茁珎重已試幽人言紛紛華髮不足道當返六十過去魂和夏畦流膏白雨翻北窓幽人卧羲軒風輪曉入春笋節露珠夜上秋禾根或為予言草木之長常在昧明間蚤作而伺之乃見其枝起數寸竹笋尤甚又夏秋之交稲方含秀黄昬月出露珠起于其根纍纍然忽自騰上若有推之者或入于莖心或垂于葉端稻乃秀實驗之信然此二事與子由養生之説契故以此為寄從來白髮有公道始信丹經非妄言此身法報本無二他年妙絶兼形魂傳燈録有形神俱妙者乃不復有解化之事十一月九日夜夢與人論神仙道術因作一詩八句既覺頗記其語録呈子由弟後四句不甚明了今足成之耳析塵妙質本來空夢中於此句若了然有所得者更積微陽一綫功照夜一燈長耿耿閉門千息自濛濛養成丹竈無煙火㸃盡人間有暈銅寄語山神停伎倆不聞不見我何窮章質夫送酒六壺書至而酒不達戯作小詩問之白衣送酒舞淵明急掃風軒洗破觥豈意青州六從事化為烏有一先生空煩左手持新蟹漫繞東籬齅落英南海使君今北海定分百榼餉春耕小圃五詠人參上黨天下脊遼東真井底𤣥泉傾海腴白露洒天醴靈苖此孕毓肩肢或具體移根到羅浮越水灌清泚地殊風雨隔臭味終祖禰青椏綴紫萼圓實墮紅米窮年生意足黄土手自啟上藥無炮炙齕齧盡根柢開心定魂魄憂恚何足洗糜身輔吾生既食首重稽地黄地黄飼老馬可使光鑒人吾聞樂天語喻馬施之身我衰正伏櫪垂耳氣不振移栽附沃壤蕃茂爭新春沈水得穉根重湯養陳薪投以東阿清和以兆海醇崖蜜助甘冷山薑發芳辛融為寒食餳嚥作瑞露珍丹田自宿火渇肺還生津願餉内熱子一洗胸中塵枸杞神藥不自閟羅生滿山澤日有牛羊憂嵗有野火厄越俗不好事過眼等茨棘青荑春自長絳珠爛莫摘短籬護新植紫笋生卧節根莖與花實收拾無棄物大將𤣥吾鬢小則餉我客似聞朱明洞中有千嵗質靈厖或夜吠可見不可索仙人儻許我借杖扶衰疾甘菊越山春始寒霜菊晚愈好朝來出細粟稍覺芳嵗老孤根蔭長松獨秀無衆草晨光雖照耀秋雨半摧倒先生卧不出黄葉紛可掃無人送酒壺空腹嚼珠寳香風入牙頰楚些發天藻新荑蔚已滿宿根寒不槁揚揚弄芳蝶生死何足道頗訝昌黎翁恨爾生不蚤薏苡伏波飯薏苡禦瘴傳神良能除五谿毒不救讒言傷讒言風雨過瘴癘久亦亡兩俱不足治但愛草木長草木各有宜珍産駢南荒絳囊懸荔支雪粉剖桄榔不謂蓬荻姿中有藥與糧舂為芡珠圓炊作菰米香子美拾橡栗黄精誑空腸今吾獨何者玉粒照座光雨後行菜夢囘聞雨聲喜我菜甲長平明江路濕並岸飛兩槳天公真富有膏乳瀉黄壤霜根一蕃滋風葉漸俯仰未任筐筥載已作盃案想艱難生理窄一味敢專饗小摘飯山僧清安寄真賞芥藍如􅌲蕈脆美牙頰響白菘類羔豚冒土出蹯掌誰能視火候小竈當自養殘臘獨出二首幽尋本無事獨往意自長釣魚豐樂橋採杞逍遥堂羅浮春欲動雲日有清光處處野梅開家家臘酒香路逢𦕈道士疑是左元放我欲從之語恐復化為羊江邊偶㣲行詰曲背城市平湖春草合步到栖禪寺堂空不見人老穉掩闗睡所營在一食食已寧復事客來豈無得施子淨掃地風松獨不靜送我作鼓吹新年五首曉雨暗人日春愁連上元水生挑菜渚煙濕落梅村小市人歸盡孤舟鶴蹋翻猶堪慰寂寞漁火亂黄昬北渚集羣鷺新年何所之盡歸喬木寺分占結巢枝生物㑹有役謀身各及時何當禁畢弋㸔引雪衣兒海國空自暖春山無限清氷谿結瘴雨雪菌到江城更待輕雷發先催凍笋生豐湖有藤菜似可敵蓴羮小邑浮橋外青山石岸東茶槍燒後有麥浪水前空萬户不禁酒三年真識翁結茆來此住嵗晚有誰同荔子幾時熟花頭今已繁探春先揀樹買夏欲論園居士常攜客參軍許扣門明年更有味懷抱帶諸孫二月八日與黄燾僧曇頴過逍遥堂何道士宗一問疾安心守𤣥牝閉眼覓黄庭問疾來三士澆愁有半缾風松時落蘂病鶴不梳翎樽空我歸去山月照君醒次韻高要令劉湜峽山寺見寄新聞妙無多舊學閒可束猶當隱季主未遽逃梅福空腸吐餘思靜似蠶綴簇寸田結初果秀若銅生緑荆棘掃誠盡梨棗憂不熟高人寧鑄金下士乃服玉君㸔嶺嶠隘我欲巾笥蓄曾攀羅浮頂亦到朱明谷旋觀真厯塊歸卧甘破屋故人老猶仕世味薄如縠偶從越女笑不怕蠻江浴驚聞尺書到喜有新詩辱應憐五管客曾作八州督骨銷䜛口鑠膽破獄吏酷壠雲不易寄江月乃可掬遥知清逺寺不稱空洞腹蹇驢步武碎短瑟絃柱促仰㸔泉落珮俯聽石響轂千峰瀉清駛一往無囘躅狂雷失晤語過電不容目要知僧長饑正坐山少肉人間無南北蝸角空出縮仇池九十九仇池有九十九泉予嘗夢至有詩嵩山三十六子由近買田陽翟北望嵩山甚近天人同一夢仙凡無兩録陋邦真可老生理亦粗足便囘爇天熖長作照海燭爇天熖見退之詩近黄魯直寄詩云蓮花合裏一寸燭牝馬海中燒百川魯直蓋近有得也食荔支二首并引惠州太守東堂祠故相陳文惠公堂下有公手植荔支一株郡人謂將軍樹今嵗大熟賞啖之餘下逮吏卒其高不可致者縱猿取之丞相祠堂下將軍大樹旁炎雲駢火實瑞露酌天漿爛紫垂先熟高紅挂逺揚分甘徧鈴下也到黒衣郎羅浮山下四時春盧橘楊梅次第新日啖荔支三百顆不妨長作嶺南人和子由盆中石菖蒲忽生九花春荑秋莢兩須㬰神藥人間果有無無鼻何由識薝蔔有花今始信菖蒲芳心未飽兩蛺蝶寒意知鳴幾蟪蛄記取明年十二節小兒休更籋霜鬚遷居有引吾紹聖元年十月二日至惠州寓合江樓是月十八日遷于嘉祐寺二年三月十九日復遷于合江樓三年四月二十日復歸于嘉祐寺時方卜築白鶴峰之上新居成庶幾其少安乎前年家水東囘首夕陽麗去年家水西濕面春雨細東西兩無擇縁盡我輒逝今年復東徙舊館聊一憇已買白鶴峰規作終老計長江在北户雪浪舞吾砌青山滿墻頭䰀鬌幾雲髻雖慙抱朴子金鼎陋蟬蜕猶賢柳柳州廟爼薦丹荔吾生本無待俯仰了此世念念自成劫塵塵谷有際下觀生物息相吹等蚊蚋兩橋詩并引惠州之東江谿合流有橋多廢壞以小舟渡羅浮道士鄧守安始作浮橋以四十舟為二十舫鐵銷石矴隨水漲落榜曰東新橋州西豐湖上有長橋屢作屢壞栖禪院僧希固築進兩岸為飛閣九間盡用石鹽木堅若鐵石榜曰西新橋皆以紹聖三年六月畢工作二詩落之東新橋羣鯨貫鐵索背負横空霓首摇飜雪江尾挿崩雲谿機牙任信縮漲落隨高低轆轤巻巨索青蛟挂長堤奔舟免狂觸脱筏防撞擠一橋何足云讙傳廣東西父老有不識喜笑爭攀躋魚龍亦驚逃雷雹生馬􅕭嗟此病涉久公私困留稽奸民食此險出没如鳬鷖似賣失船壺如去登樓梯不知百年來幾人隕沙泥豈知濤瀾上安若堂與閨往來無晨夜醉病休扶攜使君飲我言妙割無牛雞不云二子勞歎我捐腰犀二士造橋予常助施犀帶我亦夀使君一言聽扶藜常當修未壞勿使後噬臍西新橋昔橋本千柱挂湖如斷霓浮梁陷積淖破板隨奔谿笑看逺岸沒坐覺孤城低聊因三農隙稍進百步堤炎州無堅植潦水輕推擠千年誰在者鐵柱羅浮西獨有石鹽木白蟻不敢躋似開銅駞峰如鑿鐵馬號岌岌類鞭石山川非㑹稽嗟我久閣筆不書紙尾鷖蕭然無尺箠欲構飛空梯百夫下一杙㭬此百尺泥橋柱石磉之下皆有堅木㭬入泥中丈餘謂之頂樁探囊賴故侯寳錢出金閨子由之婦史頃入内得賜黄金錢數千助施卜父老喜雲集簞壺無空攜三日飲不散殺盡西村雞似聞百嵗前海近湖有犀豐湖舊名鰐湖葢嘗有鮫鰐之類那知陵谷變枯瀆生茭藜後來勿忘今冬涉水過臍悼朝雲詩并引紹聖元年十一月戲作朝雲詩三年七月五日朝雲病亡於惠州塟之栖禪寺松林中東南直大聖塔子既銘其墓且和前詩以自解朝雲始不識字晚忽學書粗有楷法葢嘗從泗上比丘尼義冲學佛亦略聞大義且死誦金剛經四句偈而絶苖而不秀豈其天不使童烏與我𤣥駐景恨無千嵗藥贈行唯有小乘禪傷心一念償前債彈指三生斷後縁歸卧竹根無逺近夜燈勤禮塔中仙東坡全集巻二十三
