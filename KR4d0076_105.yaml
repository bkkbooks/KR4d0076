body:
  text: 東坡全集卷一百五宋蘇軾撰志林十三條論古武王克殷以殷遺民封紂子武庚祿父使其弟管叔鮮蔡叔度相祿父治殷武王崩祿父與管蔡作亂成王命周公誅之而立微子於宋蘇子曰武王非聖人也昔孔子蓋罪湯武顧自以為殷之子孫而周人也故不敢然數致意焉曰大哉巍巍乎堯舜也禹吾無間然其不足於湯武也亦明矣曰武盡美矣未盡善也又曰三分天下有其二以服事殷周之德其可謂至德也巳矣伯夷叔齊之於武王也蓋謂之弒君至恥之不食其粟而孔子豫之其罪武王也甚矣此孔氏之家法也世之君子茍自孔氏必守此法國之存亡民之死生將於是乎在其孰敢不嚴而孟軻始亂之曰吾聞武王誅獨夫紂未聞弒君也自是學者以湯武為聖人之正若當然者皆孔氏之罪人也使當時有良史如董狐者南巢之事必以叛書牧野之事必以弒書而湯武仁人也必將為法受惡周公作無逸曰殷王中宗及髙宗及祖甲及我周文王兹四人迪哲上不及湯下不及武王亦以是哉文王之時諸侯不求而自至是以受命稱王行天子之事周之王不王不計紂之存亡也使文王在必不伐紂紂不見伐而以考終或死於亂殷人立君以事周命為二王後以祀殷君臣之道豈不兩全也哉武王觀兵於孟津而歸紂若改過否則殷改立君武王之待殷亦若是而巳矣天下無王有聖人者出而天下歸之聖人所以不得辭也而以兵取之而放之而殺之可乎漢末大亂豪傑並起荀文若聖人之徒也以為非曹操莫與定海內故起而佐之所以與操謀者皆王者之事也文若豈教操反者哉以仁義救天下天下既平神器自至將不得已而受之不至不取也此文王之道文若之心也及操謀九錫則文若死之故吾嘗以文若為聖人之徒者以其才似張子房而道似伯夷也殺其父封其子其子非人也則可使其子而果人也則必死之楚人將殺令尹子南子南之子棄疾為王馭士王泣而告之既殺子南其徒曰行乎曰吾與殺吾父行將焉入然則臣王乎曰棄父事讐吾弗忍也遂縊而死武王親以黃鉞誅紂使武庚受封而不叛豈復人也哉故武庚之必叛不待智者而後知也武王之封蓋亦有不得巳焉耳殷有天下六百年賢聖之君六七作紂雖無道其故家遺民未盡滅也三分天下有其二殷不伐周而周伐之誅其君夷其社稷諸侯必有不恱者故封武庚以慰之此豈文之意哉故曰武王非聖人也太史公曰學者皆稱周伐紂居洛邑其實不然武王營之成王使召公卜居九鼎焉而周復都豐鎬至犬戎敗幽王周乃東徙于洛蘇子曰周之失計未有如東遷之繆者也自平王至於亡非有大無道者也頿頿音兹即靈王王之神聖諸侯服享然終以不振則東遷之過也昔武王克商遷九鼎于洛邑成王周公復增營之周公既沒蓋君陳畢公更居焉以重王室而巳非有意於遷也周公欲葬成周而成王葬之畢此豈有意於遷哉今夫富民之家所以遺其子孫者田宅而巳不幸而有敗至於乞假以生可也然終不可議田宅今平王舉文武成康之業而大棄之此一敗而粥田宅者也夏商之王皆五六百年其先王之德無以過周而後王之敗亦不減幽厲然至於桀紂而後亡其未亡也天下宗之不如東周之名存而實亡也是何也則不粥田宅之效也盤庚之遷也復殷之舊也古公遷于岐方是時周人如狄人也逐水草而居豈所難哉衛文公東徙渡河恃齊而存耳齊遷臨菑晉遷于絳于新田皆其盛時非有所畏也其餘避冦而遷都未有不亡雖不即亡未有能復振者也春秋時楚大饑羣蠻叛之申息之北門不啓楚人謀徙於阪髙蒍賈曰不可我能往冦亦能往於是乎以秦人巴人滅庸而楚始大蘇峻之亂晉幾亡矣宗廟宮室盡為灰燼溫嶠欲遷都豫章三吳之豪欲遷㑹稽將從之矣獨王導不可曰金陵王者之都也王者不以豐儉移都若𢎞衛文大帛之冠何適而不可不然雖樂土為墟矣且北冦方强一旦示弱竄於蠻越望實皆喪矣乃不果遷而晉復安賢哉導也可謂能定大事矣嗟夫平王之初周雖不如楚之强顧不愈於東晉之微乎使平王有一王導定不遷之計收豐鎬之遺民修文武成康之政以形勢臨東諸侯齊晉雖强未敢二也而秦何自霸哉魏惠王畏秦遷于大梁楚昭王畏吳遷于鄀頃襄王畏秦遷于陳考烈王畏秦遷于壽春皆不復振有亡徵焉東漢之末董卓劫帝遷于長安漢遂以亡近世李景遷于豫章亦亡故曰周之失計未有如東遷之繆者也秦始皇帝十八年取韓二十二年取魏二十五年取趙取楚二十六年取燕取齊初并天下蘇子曰秦并天下非有道也特巧耳非幸也然吾以為巧於取齊而拙於取楚其不敗於楚者幸也烏乎秦之巧亦創智伯而巳魏韓肘足接而智伯死秦知創智伯而諸侯終不知師韓魏秦并天下不亦宜乎齊湣王死法章立君王后佐之秦猶伐齊也法章死王建立六年而秦攻趙齊楚救之趙乏食請粟於齊而齊不豫秦遂圍邯鄲幾亡趙趙雖未亡而齊之亡形成矣秦人知之故不加兵於齊者四十餘年夫以法章之才而秦伐之建之不才而秦不伐何也太史公曰君王后事秦謹故不被兵夫秦欲并天下耳豈以謹故置齊也哉吾故曰巧於取齊者所以慰齊之心而解三晉之交也齊秦不兩立秦未嘗須臾忘齊也而四十餘年不加兵者豈其情乎齊人不悟而與秦合故秦得以其間取三晉三晉亡齊蓋岌岌矣方是時猶有楚與燕也三國合猶足以拒秦秦大出兵伐燕而齊不救故二國亡而齊亦虜不閲歲如晉取虞虢也可不謂巧乎二國既滅齊乃發兵守西界不通秦使嗚呼亦晚矣秦初遣李信以二十萬人取楚不克乃使王翦以六十萬攻之蓋空國而戰也使齊有中主具臣知亡之無日而掃境以伐秦以久安之齊而入厭兵空虛之秦覆秦如反掌也吾故曰拙於取楚然則奈何曰古之取國者必有數如取齠齒也必以漸故齒脫而兒不知今秦易楚以為是齠齒也可拔遂抉其口一拔而取之兒必傷吾指必齧故秦之不亡者幸也非數也吳為三軍迭出以肄楚三年而入郢晉之平吳隋之平陳皆是物也惟苻堅不然使堅知出此以百倍之衆為迭出之計雖韓白不能支而況謝𤣥牢之之流乎吾以是知二秦之一律也始皇幸勝而堅不幸耳秦初并天下丞相綰等言燕齊荆地逺不置王無以鎮之請立諸子始皇下其議羣臣皆以為便廷尉斯曰周文武所封子弟同姓甚衆然後屬疏逺相攻擊如仇讐諸侯更相誅伐天子不能禁止今海內賴陛下神靈一統皆為郡縣諸子功臣公賦稅重賞賜之甚足易制天下無異意則安寧之術也置諸侯不便始皇曰天下共苦戰鬬不休以有侯王賴宗廟天下初定又復立國是樹兵也而求其寧息豈不難哉廷尉議是分天下為三十六郡郡置守尉監蘇子曰聖人不能為時亦不失時時非聖人之所能為也能不失時而巳三代之興諸侯無罪不可奪削因而君之雖欲罷侯置守可得乎此所謂不能為時者也周衰諸侯相并齊晉秦楚皆千餘里其勢足以建侯樹屏至于七國皆稱王行天子之事然終不封諸侯不立强家世卿者以魯三桓晉六卿齊田氏為戒也久矣世之畏諸侯之禍也非獨李斯始皇知之始皇既并天下分郡邑置守宰理固當然如冬裘夏葛時之所宜非人之私智獨見也所謂不失時者而學士大夫多非之漢髙帝欲立六國後張子房以為不可世未有非之者李斯之論與子房何異也特以成敗為是非耳髙帝聞子房之言吐哺罵酈生知諸侯之不可復明矣然卒王韓彭英盧豈獨髙帝子房亦與焉故栁宗元曰封建非聖人意也勢也昔之論封建者曹元首陸機劉頌及唐太宗時魏徴李百藥顏師古其後有劉秩杜佑栁宗元宗元之論出而諸子之論廢矣雖聖人復起不能易也故吾取其說而附益之曰凡有血氣必爭爭必以利利莫大於封建封建者爭之端而亂之始也自書契以來臣弒其君子弒其父父子兄弟相賊殺有不出於襲封而爭位者乎自三代聖人以禮樂教化天下至刑措不用然終不能已篡弒之禍至漢以來君臣父子相賊虐者皆諸侯王子孫其餘卿大夫不世襲者蓋未嘗有也近世無復封建則此禍幾絶仁人君子忍復開之歟故吾以為李斯始皇之言栁宗元之論當為萬世法也越既滅吳范蠡以為勾踐為人長頸烏喙可與共患難不可與共逸樂乃以其私徒屬浮海而行至齊以書遺大夫種曰蜚鳥盡良弓藏狡兔死走狗烹子可以去矣蘇子曰范蠡獨知相其君而巳以吾相蠡蠡亦烏喙也夫好貨天下賤士也以蠡之賢豈聚斂積實者何至耕于海濱父子力作以營千金屢散而復積此何為者哉豈非才有餘而道不足故功成名遂身退而心終不能自放者乎使勾踐有大度能始終用蠡蠡亦非清淨無為以老於越者也故曰蠡亦烏喙也魯仲連既退秦軍平原君欲封連以千金為壽笑曰所貴於天下士者為人排難解紛而無所取也即有取是商賈之事連不忍為也遂去終身不復見逃隱於海上曰吾與富貴而詘於人寧貧賤而輕世肆志焉使范蠡之去如魯連則去聖人不逺矣嗚呼春秋以來用舍進退未有如蠡之全者也而不足於此吾是以纍嘆而深悲焉蘇子曰子胥種蠡皆人傑而揚雄曲士也欲以區區之學疵瑕此三人者以三諫不去鞭尸籍館為子胥之罪以不强諫勾踐而栖之㑹稽為種蠡之過雄聞古有三諌當去之說即欲以律天下士豈不陋哉三諫而去為人臣交淺者言也如宮之奇泄冶乃可耳至如子胥吳之宗臣與國存亡者也去將安往哉百諌不聽繼之以死可也孔子去魯未嘗一諫又安用三父受誅子復讐禮也生則斬首死則鞭尸發其至痛無所擇也是以昔之君子皆哀而恕之雄獨非人子乎至於籍館闔閭與羣臣之罪非子胥意也勾踐困於㑹稽乃能用二子若先戰而强諫以死之則雄又當以子胥之罪罪之矣此皆兒童之見無足論者不忍三子之見誣故為一言魯定公十三年孔子言於公曰臣無藏甲大夫無百雉之城使仲由為季氏宰將墮三都於是叔孫氏先墮郈季氏將墮費公山不狃叔孫輒率費人襲公公與二子入于季氏之宫孔子命申句須樂頎下伐之費人北二子奔齊遂墮費將墮成公斂處父以成叛公圍成弗克或曰殆哉孔子之為政也亦危而難成矣孔融曰古者王畿千里寰內不以封建諸侯曹操疑其論建漸廣遂殺融融特言之耳安能為哉操以為天子有千里之畿將不利巳故殺之不旋踵季氏親逐昭公公死于外從公者皆不敢入雖子家羈亦亡季氏之忌刻忮害如此雖地勢不及曹氏然君臣相猜蓋不減操也孔子安能以是時墮其名都而出其藏甲也哉考於春秋方是時三桓雖若不悅然莫能違孔子也以為孔子用事於魯得政與民而三桓畏之歟則季桓子之受女樂也孔子能却之矣彼婦之口可以出走是孔子畏季氏季氏不畏孔子也孔子盍姑修其政刑以俟三桓之隙也哉蘇子曰此孔子之所以聖也蓋田氏六卿不服則齊晉無不亡之道三桓不臣則魯無可治之理孔子之用於世其政無急於此者矣彼晏嬰者亦知之曰田氏之僭惟禮可以巳之在禮家施不及國大夫不收公利齊景公曰善哉吾今而後知禮之可以為國也嬰能知之而不能為之嬰非不賢也其浩然之氣以直養而無害塞乎天地之間者不及孔孟也孔子以羇旅之臣得政期月而能舉治世之禮以律亡國之臣墮名都出藏甲而三桓不疑其害已此必有不言而信不怒而威者矣孔子之聖見於行事至此為無疑也嬰之用於齊也久於孔子景公之信其臣也愈於定公而田氏之禍不少衰吾是以知孔子之難也孔子以哀公十六年卒十四年陳恆弒其君孔子沐浴而朝告於哀公請討之吾是以知孔子之欲治列國之君臣使如春秋之法者至於老且死而不忘也或曰孔子知哀公與三子之必不從而以禮告也歟曰否孔子實欲伐齊孔子既告哀公公曰魯為齊弱久矣子之伐之將若之何對曰陳恆弒其君民之不豫者半以魯之衆加齊之半可克也此豈禮告而已哉哀公患三桓之逼嘗欲以越伐魯而去之夫以蠻夷伐國民不豫也臯如出公之事斷可見矣豈若從孔子而伐齊乎若從孔子而伐齊則凡所以勝齊之道孔子任之有餘矣既克田氏則魯之公室自張三桓不治而自服也此孔子之志也商鞅用於秦變法定令行之十年秦民大悅道不拾遺山無盜賊家給人足民勇於公戰怯於私鬬秦人富强天子致胙於孝公諸侯畢賀蘇子曰此皆戰國之游士邪說詭論而司馬遷暗於大道取以為史吾嘗以為遷有大罪二其先黃老後六經退處士進姦雄蓋其小小者耳所謂大罪二則論商鞅桑𢎞羊之功也自漢以來學者恥言商鞅桑𢎞羊而世主獨甘心焉皆陽諱其名而隂用其實甚者則名實皆宗之庶幾其成功此則司馬遷之罪也秦固天下之强國而孝公亦有志之君也修其政刑十年不為聲色畋遊之所敗雖微商鞅有不富强乎秦之所以富强者孝公務本力穡之效非鞅流血刻骨之功也而秦之所以見疾於民如豺虎毒藥一夫作難而子孫無遺種則鞅實使之至於桑𢎞羊斗筲之才穿窬之智無足言者而遷稱之曰不加賦而上用足善乎司馬光之言也曰天下安有此理天地所生財貨百物止有此數不在民則在官譬如雨澤夏潦則秋旱不加賦而上用足不過設法侵奪民利其害甚於加賦也二子之名在天下者如蛆蠅糞穢也言之則汙口舌書之則汙簡牘二子之術用於世者滅國殘民覆族亡軀者相踵也而世主獨甘心焉何哉樂其言之便已也夫堯舜禹世主之父師也諌臣拂士世主之藥石也恭敬慈儉勤勞憂畏世主之繩約也今使世主日臨父師而親藥石履繩約非其所樂也故為商鞅桑𢎞羊之術者必先鄙堯笑舜而陋禹也曰所謂賢主専以天下適已而巳此世主之所以人人甘心而不悟也世有食鍾乳烏喙而縱酒色以求長年者蓋始於何晏晏少而富貴故服寒食散以濟其欲無足怪者彼其所為足以殺身滅族者日相繼也得死於寒食散豈不幸哉而吾獨何為效之世之服寒食散疽背嘔血者相踵也用商鞅桑𢎞羊之術破國亡宗者皆是也然而終不悟者樂其言之美便而忘其禍之慘烈也漢用陳平計間疏楚君臣項羽疑范增與漢有私稍奪其權增大怒曰天下事大定矣君王自為之願賜骸骨歸卒伍歸未至彭城疽發背死蘇子曰增之去善矣不去羽必殺增獨恨其不蚤耳然則當以何事去增勸羽殺沛公羽不聽終以此失天下當於是去耶曰否增之欲殺沛公人臣之分也羽之不殺猶有君人之度也增曷為以此去哉易曰知幾其神乎詩曰相彼雨雪先集維霰增之去當以羽殺卿子冠軍時也陳涉之得民也以項燕扶蘇項氏之興也以立楚懷王孫心而諸侯叛之也以弒義帝也且義帝之立增為謀主矣義帝之存亡豈獨為楚之盛衰亦增之所以同禍福也未有義帝亡而增獨能久存者也羽之殺卿子冠軍也是弒義帝之兆也其弒義帝則疑增之本也豈必待陳平哉物必先腐也而後蟲生之人必先疑也而後讒入之陳平雖智安能間無疑之主哉吾嘗論之義帝天下之賢主也獨遣沛公入關而不遣項羽識卿子冠軍於稠人之中而擢以為上將不賢而能如是乎羽既矯殺卿子冠軍義帝必不能堪非羽弒帝則帝殺羽不待智者而後知也增始勸項梁立義帝諸侯以此服從中道而弒之非增之意也夫豈獨非其意將必力爭而不聽也不用其言殺其所立項羽之疑增必自是始矣方羽殺卿子冠軍增與羽比肩而事義帝君臣之分未定也為增計者力能誅羽則誅之不能則去之豈不毅然大丈夫也哉增年巳七十合則留不合則去不以此時明去就之分而欲依羽以成功陋矣雖然增髙帝之所畏也增不去項羽不亡嗚呼增亦人傑也哉春秋之末至于戰國諸侯卿相皆爭養士自謀夫說客談天雕龍堅白同異之流下至擊劍扛鼎雞鳴狗盜之徒莫不賓禮靡衣玉食以館於土者何可勝數越王勾踐有君子六千人魏無忌齊田文趙勝黃歇呂不韋皆有客三千人而田文招致任俠姦人六萬家於薛齊稷下談者亦千人魏文侯燕昭王太子丹皆致客無數下至秦漢之間張耳陳餘號多士賓客厮養皆天下豪傑而田橫亦有士五百人其略見於傳記者如此度其餘當倍官吏而半農夫也此皆姦民蠧國者民何以支而國何以堪乎蘇子曰此先王之所不能免也國之有姦也猶鳥獸之有鷙猛昆蟲之有毒螫也區處條理使各安其處則有之矣鋤而盡去之則無是道也吾考之世變知六國之所以久存而秦之所以速亡者蓋出於此不可以不察也夫智勇辨力此四者皆天民之秀傑者也類不能惡衣食以養人皆役人以自養者也故先王分天下之貴富與此四者共之此四者不失職則民靖矣四者雖異先王因俗設法使出於一三代以上出於學戰國至秦出於客漢以後出於郡縣吏魏晉以來出於九品中正隋唐至今出於科舉雖不盡然取其多者論之六國之君虐用其民不減始皇二世然當是時百姓無一人叛者以凡民之秀傑者多以客養之不失職也其力耕以奉上皆椎魯無能為者雖欲怨叛而莫為之先此其所以少安而不即亡也始皇初欲逐客因李斯之言而止既并天下則以客為無用於是任法而不任人謂民可以恃法而治謂吏不必才取能守吾法而巳故墮名城殺豪傑民之秀異者散而歸田畝向之食於四公子呂不韋之徒者皆安歸哉不知其能槁項黃馘以老死於布褐乎抑將輟耕太息以俟時也秦之亂雖成於二世然使始皇知畏此四人者有以處之使不失職秦之亡不至若是速也縱百萬虎狼於山林而飢渴之不知其將噬人世以始皇為智吾不信也楚漢之禍生民盡矣豪傑宜無幾而代相陳豨從車千乘蕭曹為政莫之禁也至文景武之世法令至密然吳濞淮南梁王魏其武安之流皆爭致賓客世主不問也豈懲秦之禍以為爵祿不能盡縻天下士故少寬之使得或出於此也耶若夫先王之政則不然曰君子學道則愛人小人學道則易使也嗚呼此豈秦漢之所及也哉秦始皇帝時趙髙有罪䝉毅案之當死始皇赦而用之長子扶蘇好直諫上怒使北監䝉恬兵於上郡始皇東遊㑹稽並海走琅琊少子胡亥李斯䝉毅趙髙從道病使䝉毅還禱山川未反而上崩李斯趙髙矯詔立胡亥殺扶蘇䝉恬䝉毅卒以亡秦蘇子曰始皇制天下輕重之勢使內外相形以禁姦備亂者可謂密矣䝉恬將三十萬人威振北方扶蘇監其軍而䝉毅侍帷幄為謀臣雖有大姦賊敢睥睨其間哉不幸道病禱祠山川尚有人也而遣䝉毅故髙斯得成其謀始皇之遣毅毅見始皇病太子未立而去左右皆不可以言智然天之亡人國其禍敗必出於智所不及聖人為天下不恃智以防亂恃吾無致亂之道耳始皇致亂之道在用趙髙夫閹尹之禍如毒藥猛獸未有不裂肝碎首者也自書契以來惟東漢呂强後唐張承業二人號稱善良豈可望一二於千萬以徼必亡之禍哉然世主皆甘心而不悔如漢桓靈唐肅代猶不足深怪始皇漢宣皆英主亦湛於趙高恭顯之禍彼自以為聰明人傑也奴僕熏腐之餘何能為及其亡國亂朝乃與庸主不異吾故表而出之以戒後世人主如始皇漢宣者或曰李斯佐始皇定天下不可謂不智扶蘇親始皇子秦人戴之久矣陳勝假其名猶足以亂天下而䝉恬持重兵在外使二人不即受誅而復請之則斯髙無遺類矣以斯之智而不慮此何哉蘇子曰嗚呼秦之失道有自來矣豈獨始皇之罪自商鞅變法以殊死為輕典以參夷為常法人臣狼顧脅息以得死為幸何暇復請方其法之行也求無不獲禁無不止鞅自以為軼堯舜而駕湯武矣及其出亡而無所舍然後知為法之弊夫豈獨鞅悔之秦亦悔之矣荆軻之變持兵者熟視始皇環柱而走莫之救者以秦法重故也李斯之立胡亥不復忌二人者知威令之素行臣子不敢復請也二人之不敢請亦知始皇之鷙悍而不可回也豈料其僞也哉周公曰平易近民民必歸之孔子曰有一言而可以終身行之其恕矣乎夫以忠恕為心而以平易為政則上易知而下易達雖有賣國之姦無所投其隙倉卒之變無自發焉然其令行禁止蓋有不及商鞅者矣而聖人終不以彼易此商鞅立信於徙木立威於棄灰刑其親戚師傅積威信之極以及始皇秦人視其君如雷電鬼神不可測也古者公族有罪三宥然後制刑今至使人矯殺其太子而不忌太子亦不敢請則威信之過也故夫以法毒天下者未有不反中其身及其子孫者也漢武與始皇皆果於殺者也故其子如扶蘇之仁則寧死而不請如戾太子之悍則寧反而不訴知訴之必不察也戾太子豈欲反者哉計出於無聊也故為二君之子者有死與反而已李斯之智蓋足以知扶蘇之必不反也吾又表而出之以戒後世人主之果於殺者魯隱公元年不書即位攝也公子翬請殺桓公公曰為其少故也吾將授之矣使營菟裘吾將老焉翬懼反譖公於桓而使賊殺公歐陽子曰隱公非攝也使隱而果攝也則春秋不書為公春秋書為公則隱非攝無疑也蘇子曰非也春秋信史也隱攝而桓弒著於史也詳矣周公攝而克復子者也以周公薨故不稱王隱公攝而不克復子者也以魯公薨故稱公史有諡國有廟春秋獨得不稱公乎然則隱公之攝也禮歟曰禮也何自聞之曰聞之孔子曽子問曰君薨而世子生如之何孔子曰卿大夫士從攝主北面於西階南何謂攝主曰古者天子諸侯卿大夫之世子未生而死則其弟若兄弟之子次當立者為攝主子生而女也則攝主立男也則攝主退此之謂攝主古之人有為之者季康子是也季桓子且死命其臣正常曰南孺子之子男也則以告而立之女也則肥也可桓子卒康子即位既葬康子在朝南氏生男正常載以如朝告曰夫子有遺言命其圉臣曰南氏生男則以告於君與大夫而立之今生矣男也敢告康子請退康子之謂攝主古之道也孔子行之自秦漢以來不修是禮也而以母后攝孔子曰惟女子與小人為難養也使與聞外事且不可牝雞之晨惟家之索而況可使攝主而臨天下乎女子為政而國安惟齊之君王后吾宋之曹髙向也蓋亦千一矣自東漢馬鄧不能無譏而漢吕后魏胡武靈唐武氏之流蓋不勝其亂王莽楊堅遂因以易姓由此觀之豈若攝主之庶幾乎使母后而可信也攝主亦可信也若均之不可信則攝主取之猶吾先君之子孫也不猶愈於異姓之取哉或曰君薨百官總巳以聽于冢宰三年安用攝主曰非此之謂也嗣天子長矣宅憂而未出令則以禮設冢宰若太子未生生而弱未能君也則三代之禮孔子之學決不以天下付異姓其付之攝主也夫豈非禮而周公行之歟故隱公亦攝主也鄭𤣥儒之陋者也其傳攝主也曰上卿代君聽政者也使子生而女則上卿豈繼世者乎蘇子曰攝主先王之令典孔子之法言也而世不知習見母后之攝也而以為當然故吾不可不論以待後世之君子公子翬請殺桓公以求太宰隱公曰為其少故也吾將授之矣使營菟裘吾將老焉翬懼反譛公於桓公而弒之蘇子曰盜以兵擬人人必殺之夫豈獨其所擬塗之人皆捕擊之矣塗之人與盜非仇也以為不擊則盜且并殺已也隱公之智曽不若是塗人也哀哉隱公惠公繼室之子也其為非嫡與桓均耳而長於桓隱公追先君之志而授國焉可不謂仁人乎惜乎其不敏於智也使隱公誅翬而讓桓雖夷齊何以尚兹驪姬欲殺申生而難里克則施優來之二世欲殺扶蘇而難李斯則趙髙來之此二人之智若出一人而其受禍亦不少異里克不免於惠公之誅李斯不免於二世之戮皆無足哀者吾獨表而出之以為世戒君子之為仁義也非有計於利害然君子之所為義利常兼而小人反是李斯聽趙髙之謀非其本意獨畏䝉氏之奪其位故俯而聽髙使斯聞髙之言即召百官陳六師而斬之其德於扶蘇豈有既乎何䝉氏之足憂釋此不為而具五刑於市非下愚而何嗚呼亂臣賊子猶蝮蛇也其所螫草木猶足以殺人況其所噬齧者歟鄭小同為髙貴鄉公侍中嘗詣司馬師師有密疏未屏也如厮還問小同見吾疏乎曰不見師曰寧我負卿無卿負我遂鴆之王允之從王敦夜飲辭醉先寢敦與錢鳯謀逆允之已醒悉聞其言慮敦疑己遂大吐衣面皆汙敦果照視之見允之卧吐中乃已哀哉小同殆哉岌岌乎允之也孔子曰危邦不入亂邦不居有由也夫吾讀史得魯隱公晉里克秦李斯鄭小同王允之五人感其所遇禍福如此故特書其事後之君子可以覽觀焉鄭太子華言於齊桓公請去三族而以鄭為內臣公將許之管仲不可公曰諸侯有討於鄭未捷苟有釁從之不亦可乎管仲曰君若綏之以德加之以訓辭而率諸侯以討鄭鄭將覆亡之不暇豈敢不懼若總其罪人以臨之鄭有辭矣公辭子華鄭伯乃受盟蘇子曰大哉管仲之相桓公也辭子華之請而不違曹沫之盟皆盛德之事也齊可以王矣恨其不學道不自誠意正身以刑其國使家有三歸之病而國有六嬖之禍故桓公不王而孔子小之然其豫之也亦至矣曰桓公九合諸侯不以兵車管仲之力也如其仁如其仁曰仲尼之徒無道桓文之事者孟子蓋過矣吾讀春秋以下史而得七人焉皆盛德之事可以為萬世法又得八人焉皆反是可以為萬世戒故具論之太公之治齊也舉賢而上功周公曰後世必有篡弒之臣天下誦之齊其知之矣田敬仲之始生也周史筮之其奔齊也齊懿氏卜之皆知其當有齊國也篡弒之疑蓋萃於敬仲矣然桓公管仲不以是廢之乃欲以為卿非盛德能如此乎故吾以為楚成王知晉之必霸而不殺重耳漢髙祖知東南之必亂而不殺吳王濞晉武帝聞齊王攸之言而不殺劉元海苻堅信王猛而不殺慕容垂唐明皇用張九齡而不殺安祿山皆盛德之事也而世之論者則以為此七人者皆失於不殺以啓亂吾以謂不然七人者皆自有以致敗亡非不殺之過也齊景公不繁刑重賦雖有田氏齊不可取楚成王不用子玉雖有晉文公兵不敗漢景帝不害吳太子不用朝錯雖有吳王濞無自發晉武帝不立孝惠雖有劉元海不能亂苻堅不貪江左雖有慕容垂不能叛明皇不用李林甫楊國忠雖有安祿山亦何能為秦之由余漢之金日磾唐之李光弼渾瑊之流皆蕃種也何負於中國哉而獨殺元海祿山乎且夫自今而言之則元海祿山死有餘罪自當時而言之則不免為殺無罪豈有天子殺無罪而不得罪於天者上失其道塗之人皆敵國也天下豪傑其可勝既乎漢景帝以鞅鞅而殺周亞夫曹操以名重而殺孔融晉文帝以臥龍而殺嵇康晉景帝亦以名重而殺夏侯𤣥宋明帝以族大而殺王彧齊後主以謡言而殺斛律光唐太宗以䜟而殺李君羡武后以謡言而殺裴炎世皆以為非也此八人者當時之慮豈非憂國備亂與憂元海祿山者同乎久矣世之以成敗為是非也故夫嗜殺人者必以鄧侯不殺楚子為口實以鄧之微無故殺大國之君使楚人舉國而仇之其亡不愈速乎吾以謂為天下如養生憂國備亂如服藥養生者不過慎起居飲食節聲色而巳節慎在未病之前而服藥於巳病之後今吾憂寒疾而先服烏喙憂熱疾而先服甘遂則病未作而藥殺人矣彼八人者皆未病而服藥者也東坡全集卷一百五
