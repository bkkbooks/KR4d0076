body:
  text: 東坡全集卷九十八宋蘇軾撰頌一十七首仁宗皇帝御書頌並叙天禧中仁宗皇帝在東宫故太傅鄧國張文懿公諱士遜為太子諭德帝親書十二字以賜之曰寅亮天地弼余一人又曰日新其德公之曾孫假承務郎臣欽臣以屬翰林學士臣蘇軾為之頌二篇其一曰天地不言付之人君明其德刑物自秋春人君無心屬之輔弼信其賞罰身為衡石惟天惟君與相為三孰能俯仰其德不慚於皇仁宗恭巳無為以天為心以民為師其相鄧公履信思順天下頌之以退為進壽考百年以沒元身嗚呼休哉寅亮天地弼余一人其一曰聖人如天時殺時生君子如水因物賦形天不違仁水不失平惟一故新惟新故一一故不流新故無斁伊尹暨湯咸有一德周雖舊邦其命維新孰知此言若出一人小臣稽首敬頌遺墨嗚呼休哉日新其德英宗皇帝御書頌嘉祐中太常博士周秉以文行選為諸王記室宗室之賢者多愛敬之時英宗皇帝龍潛藩邸嘗賜秉手書其家寶之臣過曲江見其孫袁州司法參軍超出以示臣謹稽首再拜為之頌曰雲漢之章融為慶雲結為甘露融而不晞結而不散以燾冒其子孫東坡羮頌并引東坡羮蓋東坡居士所煮菜羮也不用魚肉五味有自然之甘其法以菘若蔓菁若蘆蔔若薺皆揉洗數過去辛苦汁先以生油少許塗釜緣及瓷碗下菜湯中入生米為糝及少生薑以油碗覆之不得觸觸則生油氣至熟不除其上置甑炊飯如常法既不可遽覆須生菜氣出盡乃覆之羮每沸涌遇油輒下又為碗所壓故終不得上不爾羮上薄飯則氣不得達而飯不熟矣飯熟羮亦爛可食若無菜用瓜茄皆切破不揉洗入罨熟赤豆與粳米半為糝餘如煮菜法應純道人將適廬山求其法以遺山中好事者以頌問之甘苦嘗從極處回醎酸未必是鹽梅問師此箇天真味根上來麼塵上來桂酒頌禮曰喪有疾飲酒食肉必有草木之滋焉薑桂之謂也古者非喪食不徹薑桂楚辭曰奠桂酒兮椒漿是桂可以為酒也本草桂有小毒而菌桂牡桂皆無毒大略皆主溫中利肝肺氣殺三蟲輕身堅骨養神發色使常如童子療心腹冷疾為百藥先無所畏陶隱居云仙經服三桂以葱涕合雲母蒸為水而孫思邈亦云久服可行水上此輕身之效也吾謫居海上法當數飲酒以禦瘴而嶺南無酒禁有隱者以桂酒方授吾釀成而玉色香味超然非人間物也東坡先生曰酒天祿也其成壞美惡世以兆主人之吉凶吾得此豈非天哉故為之頌以遺後之有道而居夷者其法蓋刻石置之羅浮鐵橋之下非忘世求道者莫至焉其詞曰中原百國東南傾流膏輸液歸南溟祝融司方發其英沐日浴月百寶生水娠黃金山空青丹砂晝㬠一作晨暾珠夜明百卉甘辛角芳馨栴檀沈水乃公卿大夫芝蘭士蕙蘅桂君獨立冬鮮榮無所懾畏時靡爭釀為我醪淳而清甘終不壞醉不酲輔安五神伐三彭肌膚渥丹身毛輕泠然風飛罔水行誰其傳者疑方平教我常作醉中醒一作教我醒醉醉時醒油水頌熙寧元年七月二十八日元叔設食嘉祐謁長老觀佛牙趙郡蘇某為之頌曰水在油中見火則起油水相搏水去油住湛然光明不知有火在火能寶內外淨故若不經火油水同定非真定故見火復起豬肉頌淨洗鐺少著水柴頭罨煙焰不起待他自熟莫催他火候足時他自美黃州好豬肉價賤如泥土貴者不肯喫貧者不解煮早辰起來打兩碗飽得自家君莫管食豆粥頌道人親煮豆粥大衆齊念般若老夫試挑一口巳覺西家作馬答子由頌子由問黃檗長老疾云五藴皆非四大空身心河嶽盡圓融病根何處容他住日夜還將藥石攻不知黃檗如何答老僧代云有病宜須著藥攻寒時火燭熱時風病根既是無容處藥石還同四大空六月二十日禪戲頌巳熟之肉無復活理投在東坡無礙羮釜中有何不可問天下禪和子且道是肉是素喫得是喫不得是大竒大竒一碗羮勘破天下禪和子答孔子君頌夢中投井入半而止出入不能本非住處我今何為自此作苦忽然夢覺身在牀上不知向來本元無井不應復作出入住想道無深淺亦無逺近見物失空空未嘗滅物去空現亦未嘗生應當正逺作如是觀醉僧圖頌人生得坐且穩坐劫劫地走覔什麼今年且屙東禪屎明年去拽西林磨石恪畫維摩頌我觀衆工工一師人持一藥療一病風勞欲寒氣欲暖肺肝胃腎更相克挾方儲藥如丘山卒無一藥堪施用有大醫王拊掌笑謝遣衆工病隨愈問大醫王以何藥還是衆工所用者我觀三十二菩薩各以意談不二門而維摩詰默無語三十二義一時墮我觀此義亦不墮維摩初不離是說譬如油蠟作燈燭不以火㸃終不明忽見默然無語處三十二說皆光焰佛子若讀維摩經當作是念為正念我觀維摩方丈室能受九百萬菩薩三萬二千師子坐皆悉容受不迫迮又能分布一鉢飯饜飽十方無量衆斷取妙喜佛世界如持針鋒一棗葉云是菩薩不思議住大解脫神通力我觀石子一處士麻鞋破帽露兩肘能使筆端出維摩神力又過維摩詰若云此畫無實相毗耶城中亦非實佛子若見維摩像應作此觀為正觀阿彌陀佛頌并叙錢塘圓照律師普勸道俗歸命西方極樂世界阿彌陀佛眉山蘇軾敬捨亡母蜀郡太君程氏遺留簪珥命工胡錫采畫佛像以薦父母冥福謹再拜稽首而獻頌曰佛以大圓覺充滿河沙界我以顛倒想出沒生死中云何以一念得往生淨土我造無始業本從一念生既從一念生還從一念滅生滅滅盡處則我與佛同如投水海中如風中鼓槖雖有大聖智亦不能分别願我先父母與一切衆生在處為西方所遇皆極樂人人無量壽無往亦無來魚枕冠頌瑩淨魚枕冠細觀初何物形氣偶相值忽然而為魚不幸遭網罟剖魚而得枕方其得枕時是枕非復魚湯火就模範巉然冠五嶽方其為冠時是冠非復枕成壞無窮巳究竟亦非冠假使未變壞送與無髮人簮導無所施是名為何物我觀此幻身巳作露電觀而况身外物露電亦無有佛子慈閔故願受我此冠若見冠非冠即知我非我五濁煩惱中清淨常歡喜釋迦文佛頌并引端明殿學士兼翰林侍讀學士蘇軾為亡妻同安郡君王氏閏之請奉議郎李公麟敬畫釋迦文佛及十大弟子元祐八年十一月十一日設水陸道埸供養軾拜手稽首而作頌曰我願世尊足指按地三千大千淨琉璃色其中衆生靡不解脫如日出時眠者皆作如雷震時蟄者皆動同證無上永不退轉觀世音菩薩頌並引金陵崇因禪院長老宗襲自以衣鉢造觀世音像極相好之妙余南遷過而禱焉曰吾北歸當復過此而為之頌建中靖國元年五月日自海南歸至金陵乃作頌曰慈近乎仁悲近乎義忍近乎勇憂近乎智四者似之而卒非是有大圓覺平等無二無寃故仁無親故義無人故勇無我故智彼四雖近有作有止此四本無有取無匱有二長者皆樂檀施其一大富千金日費其一甚貧百錢而巳我說二人等無有異吁觀世音淨聖大士遍滿空界挈攜天地大解脫力非我敢議若其四無我亦如此十八大阿羅漢頌蜀金水張氏畫十八大阿羅漢軾謫居儋耳得之民間海南荒陋不類人世此畫何自至哉久逃空谷如見師友乃命過躬易其裝標設燈塗香果以禮之張氏以畫羅漢有名唐末蓋世擅其藝今成都僧敏行其𤣥孫也梵相竒古學術淵博蜀人皆曰此羅漢化生其家也軾外祖父程公少時遊京師還遇蜀亂絶糧不能歸困卧旅舍有僧十六人往見之曰我公之邑人也各以錢二百貸之公以是得歸竟不知僧所在公曰此阿羅漢也歲設大供四公年九十凡設二百餘供今軾雖不親覩至人而困厄九死之餘鳥言卉服之間獲此竒勝豈非希濶之遇也哉乃各即其體像而窮其思致以為之頌第一尊者結跏正坐蠻奴側立有鬼使者稽顙于前侍者取其書通之頌曰月明星稀孰在孰亡煌煌東方惟有啓明咨爾上座及阿闍梨代佛出世惟大弟子第二尊者合掌趺坐蠻奴捧牘于前老人發之中有琉璃器貯舍利十數頌曰佛無滅生通塞在人牆壁瓦礫誰非法身尊者斂手不起于坐示有敬耳起心則那第三尊者扶烏木養和正坐下有白沐猴獻果侍者執盤受之頌曰我非標人人莫吾識是雪衣者豈具眼隻方食知獻何愧於猿為語栁子勿憎王孫第四尊者側坐屈三指答胡人之問下有蠻奴捧函童子戲捕龜者頌曰彼問云何計數以對為三為七莫有知者雷動風行屈信指間汝觀明月在我指端第五尊者臨淵濤抱膝而坐神女出水中蠻奴受其書頌曰形與道一道無不在天宫鬼府奚往而礙婉彼竒女躍于濤瀧神馬凥輿攝衣從之第六尊者右手支頥左手拊稚師子顧視侍者擇瓜而剖之頌曰手拊雛猊目視瓜獻甘芳之意若達于面六塵並入心亦遍知即此知者為大摩尼第七尊者臨水側坐有龍出焉吐珠其手中胡人持短錫杖蠻奴捧鉢而立頌曰我以道眼為傳法宗爾以願力為護法龍道成願滿見佛不怍盡取玉函以畀思邈第八尊者並膝而坐加肘其上侍者汲水過前有神人涌出于地捧槃獻寶頌曰爾以捨來我以慈受各獲其心寶則誰有視我如爾取與則同我爾福德如四方空第九尊者食巳襆鉢持數珠誦咒而坐下有童子構火具茶又有埋筒注水蓮池中者頌曰飯食巳畢襆鉢而坐童子茗供吹籥發火我作佛事淵乎妙哉空山無人水流花開第十尊者執經正坐有仙人侍女焚香于前頌曰飛仙玉潔侍女雲眇稽首炷香敢問至道我道大同有覺無修豈不長生非我所求第十一尊者趺坐焚香侍者拱手胡人捧函而立頌曰前聖後聖相喻以言口如布榖而意莫傳鼻觀寂如諸根自例孰知此香一炷千偈第十二尊者正坐入定枯木中其神騰出于上有大蟒出其下頌曰默坐者形空飛者神二俱非是孰為此身佛子何為懷毒不巳願解此相問誰縛爾第十三尊者倚杖垂足側坐侍者捧函而立有虎過前有童子怖匿而竊窺之頌曰是與我同不噬其妃一念之差墮此髬髵導師悲愍為爾顰歎以爾猛烈復性不難第十四尊者持鈴杵正坐誦咒侍者整衣于右胡人橫短錫跪坐于左有虬一角若仰訴者頌曰彼髯而虬長跪自言特角亦來身移怨存以無言音誦無說法風止火滅無相仇者第十五尊者鬚眉皆白袖手趺坐胡人拜伏于前蠻奴手持挂杖侍者合掌而立頌曰聞法最先事佛亦久耄然衆中是大長老薪水井臼老矣不能摧伏魔軍不戰而勝第十六尊者橫如意趺坐下有童子發香篆侍者注水花盆中頌曰盆花浮紅篆烟繚青無問無答如意自橫㸃瑟既希昭琴不鼓此間有曲可歌可舞第十七尊者臨水側坐仰觀飛鶴其一既下集矣侍者以手拊之有童子提竹籃取果實投水中頌曰引之浩茫與鶴皆翔藏之幽深與魚皆沉大阿羅漢入佛三昧俯仰之間再拊海外第十八尊者植拂支頥瞪目而坐下有二童子破石榴以獻頌曰植拂支頥寂然跏趺尊者所遊物之初耶聞之於佛及吾子思名不用處是未發時跋尾佛滅度後閻浮提衆生剛狠自用莫肯信入故諸賢聖皆隱不現獨以像設遺言提引未悟而峩眉五臺廬山天台猶出光景變異使人了然見之軾家藏十六羅漢像每設茶供則化為白乳或凝為雪花桃李芍藥僅可指名或云羅漢慈悲深重急於接物故多現神變儻其然乎今於海南得此十八羅漢像以授子由弟使以時修敬遇夫婦生日輒設供以祈年集福并以前所作頌寄之子由以二月二十日生其婦德陽郡夫人史氏以十一月十七日生是歲中元日題針一首東交門針漢武帝為竇太主置酒宣室使謁者引納董偃東方朔以謂有斬罪三安得入宣室上為更置酒北宫而引偃從東司馬門而前更無譏焉作東交門針上所好惡民實趨之風俗厚薄君實驅之道之以正民俗罔中唱之以淫實煩有從帝于館陶在齊文姜矧董外人于國亂常既不能戮反以為好豫飲豫燕宣室是傲偉彼臣朔辟㦸趨陛鬻拳是效剛而有禮改館徹饌北宫東門雖曰從諫東交實存維藩維戚禮法遂恣延及齊民惟上所使昔在季孫賞盜以邑魯遂多盜而罔敢詰矧茲王宫姦人是納昭示來世有慙斯闔蕢也揚觶杜舉得名殿檻勿輯直臣是旌人孰無過過而勿二宣室東交實同名異疏二首請淨慈法涌禪師入都疏京師禪學之盛發於本秀二公本既還山秀復入寂駙馬都尉張君子來聘法涌繼揚宗風東坡居士適在錢塘實為敦勸太丘道廣廣則難周仲舉性峻峻則少通法涌童子畫沙巳具佛智維摩無語猶涉二門雖吾先師不異是說質之孔孟蓋有成言不為穿窬仁義不可勝用博施濟衆堯舜其猶病諸我願法涌廣大慈悲印宗仁得仁之侣深嚴峻峙訶未證謂證之人本自不然伏惟珍重重請戒長老住石塔疏大士未曾說法誰作金毛之聲衆生各自開堂何關石塔之事去無作相住亦隨緣長老戒公開不二門施無盡藏念西湖之久别本是偶然為東坡而少留無不可者一時作禮重聽白椎渡口船回依舊雲山之色秋來雨過一新鐘鼓之音青詞七首鳳翔醮土火星青詞嗚呼天之保佑下民罔不至所資以生罔不蕃育民既不知德天亦維不倦乃朝夕戕取以厚厥躬天既不我咎乃不恭畏于神祗不修敕厥心驕淫矜夸以干上帝威命帝用不赦丕降罪疾于下則惟雨暘常以訖我黍稷禾菽麻麥我民用蕩析隕越天亦終哀矜其忍翦棄其命罔孑遺今秦民既不獲于秋乃十旬弗雨曰其尚克有夏走于山川鬼神亦罔不至既不獲乃曰維熒惑鎮星次于井秦民其亦應受多罪茲用即于齊宫為壇位以與百姓請命嗚呼其庶幾哀之俾克有夏亦克藝厥秋民今其栗栗朝不謀一作能夕徐州祈雨青詞河失故道遺患及於東方徐居下流受害甲於他郡田廬漂蕩父子流離飢寒頓仆於溝坑盜賊充盈於犴獄人窮計迫理極詞危望二麥之一登救饑民於垂死而天未悔禍歲仍大荒水未落而旱巳成冬無雪而春不雨烟塵蓬勃草木焦枯今者麥巳過期穫不償種禾未入土憂及明年臣等恭循舊章並走羣望意水旱之有數非鬼神之得專是用稽首告哀籲天請命若其賦政多僻以謫見于隂陽事神不恭以獲戾于上下臣實有罪罰其敢辭小民無知大命近止願下雷霆之詔分勑山川之神朝隮寸雲暮洽千里使歲中熟則民猶小康諸宫觀等處祈雨青詞饑饉之患民流者期年吁嗟之求詞窮於是日仰惟至道之助推廣上天之仁召呼羣龍時賜霈澤罔以不德而廢其言醮北嶽青詞少年出仕本有志於救人晚節倦逰了無心於交物蠢冥多罪憂患再罹飄然流行靡所歸宿仰止髙真之馭降於喬嶽之陽稽首投誠齊心悔過庶一念之清淨洗千劫之塵勞妙用無方先解纒身之網靈光所燭幸逢出世之師誓此餘生永依至道醮上帝青詞三首臣聞報應如響天無妄降之災恐懼自修人有可延之壽敢傾微懇仰瀆大鈞臣兩遇禍災皆由滿溢早竊人間之美仕多收天下之虛名濫取三科叨臨八郡少年多欲沉湎以自殘𥚹性不容剛愎而好勝積為咎厲遘此艱屯臣今稽首投誠洗心歸命誓除驕慢永斷貪嗔幸不死於嶺南得退歸於林下少駐桑榆之暮景庶幾松柏之後凋又代子駿切以洪覆至神固不期於報謝羣生多故實有賴於祈禳切輸悃愊之私仰瀆髙明之聼伏念某遭逢盛際䝉被餘恩賦形宇宙之中殆將四紀竊祿江淮之上幾及二年身雖曲盡於勤勞事豈舉無於過誤慮愆尤之浸廣恐譴責之隂加粵自先朝當聿修於醮事及茲歲暮輒謹按於科文祗建壇場肅陳香火伏願上真保佑列聖扶持宦路亨通無謗傷之橫至私門安燕絶災釁之潜生福逮親闈慶延子舍又代陸和叔伏聞妙道淵微非塵凡之可測圓穹杳邈有誠信之能通輒伸悃愊之私上瀆髙明之聼切念臣叨司三局從事六官勤勞更歷於嵗終修省每恭於夙夜昨於正旦嘗啓願心許大醮之祈禳乞靈庇之保護今逢誕日恭按科文集道侣於壇場頂晬容於香火仰回聖馭曲享清羞伏望上帝垂慈列聖降祐延偏親之壽考茂合族之禧祥三考書成祈有更代之慶百神來相俾無災滯之虞疏文一十四首興龍節功德疏文五首右伏以上帝垂休真人誕降乾坤合契永為慶喜之辰草木何知舉有欣榮之意矧惟遭遇獲侍清閒不緣梵釋之因曷致涓塵之效伏願皇帝陛下受天之祿如川方增奄有漢唐之封疆倍萬唐虞之壽考永均介福下及函生右伏以三王之樂固常與天下同四海之心莫不欲吾君壽以茲願力叩彼佛乘仰惟無礙之慈副我必從之欲伏願皇帝陛下配天而治如日之中安樂延年錫帝齡之無算寅畏享福過周歷以常新下及海隅同躋壽域右伏以上帝立子將開太平之基下民歸仁自享延鴻之壽不假龍天之㑹曷旌臣子之心伏願皇帝陛下受祿無疆如川方至五兵不用同萬國之車書多士克生達四門之耳目永均介福普及函生右伏以候嘉平之臘協氣充流歌長發之祥羣心踊躍華夷交慶草木增榮矧惟扈從之私獲在封疆之守敢緣願力祗叩佛乘仰惟無礙之慈副我必從之欲伏願皇帝陛下配天而治如日之中安樂延年錫帝齡之無算寅畏享福過周厯以常新下及海隅同躋壽域右伏以瑞乙來翔共紀生商之兆羣龍下集適同浴佛之辰爰崇勝因以薦多祉伏願皇帝陛下立民之極先天不違福如南山之不騫壽等西方之無量集寧海宇永庇神天坤成節功德疏文七首右伏以功存社稷慶鍾髙密之門澤及本枝天胙大任之德候西風之協應占南極之嘉祥特啓真壇仰祈睿算順帝之則固不待於禱求應地無疆亦難忘於祝頌臣無任懇禱激切之至右伏以慈儉之化無得而名保佑之功云何可報仰首雲天之望傾心草木之微至哉坤元德既超於載籍養以天下福宜冠於古今敢兾神休永為民極臣無任右伏以寶儉與慈地無私載履信思順天且不違眷惟江海之邦日蒙雨露之施民心所祝神聽必臨祈萬壽於無疆庶羣生之永賴臣無任右伏以上帝儲休遺寶龜而降聖羣方仰德執瑞玉以來賔恪修臣子之誠䖍奉天人之禱供精蒲塞文演貝多致海衆之莊嚴廣潮音之清淨勝因所集睿算日隆恭惟太皇太后陛下伏願大安大榮永對無窮之問時萬時億獨觀有道之長臣無任右伏以玉勝發祥金行正候合天人之寶運實華夏之昌辰巳格鴻休猶資善禱展祗園之淨供發祕藏之真乘庶假良因益崇睿算恭惟太皇太后陛下伏願威神有截盡龍象以瞻依壽考無疆等乾坤之久大臣無任右伏以神聖在御天地無可報之恩臣子何知佛老有歸誠之法敢緣淨供仰祝遐齡太皇太后陛下伏願日照月臨海涵嶽峙帝簡好生之德錫壽無疆民銜既富之仁保邦何極臣無任右伏以星火西流方嵗功之平秩夕月既望昭隂德之致隆凡我有生歸誠兹日佛身充滿天監聰明太皇太后陛下伏願享德三靈齊光兩曜坐俟雲來之養受祿無疆屢觀甲子之周與民同樂臣無任太皇太后本命嵗功德疏文右伏以天人合契輔成繼照之明歲月襲祥允協重坤之象肇臨正旦寅奉德音盡海宇之無疆集緇黃而來㑹旁推舜孝仰叩佛乘伏願太皇太后陛下下順民心仰膺天保配西方之無量與南山而不傾豈獨五音六律之旋再臨此歲將推三統九㑹之復以卜其年永與函生共兹介福謹疏景靈宫祈福道場功德疏文右伏以仁心浹物自然憂樂之同孝治格天宜爾感通之速庶殫精懇仰叩上真恭惟太皇太后陛下保佑聖神勤勞夙夜偶倦東朝之御未復太官之常爰即珠庭大陳妙供法音上達雖有假於雲章民志下同自不勞於祕祝願膺勿藥之喜永保無疆之休東坡全集卷九十八
